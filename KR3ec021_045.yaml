body:
  text: 續集卷之一玉石部寶石寶石主去翳明目入點藥用之灰塵入目以珠拭拂即去本草綱目名李時珍云紅者名刺子碧者名靛子翠者名馬價珠黃者名木難珠紫者名蠟子又有鴉鶻石貓睛石石榴子紅扁豆地出西番回鶻地方諸坑井內雲南遼東亦有之山海經云騍山多玉淒水出焉西注於海中多采石採石即寶石也碧者唐人謂之瑟瑟紅者宋人謂之靺鞨今通呼為寶石以鑲首飾器物張勃吳録云越雋雲南河中出碧珠須祭而取之有縹碧緑碧此即碧色寶石也質大者如指頭小者如豆粒皆碾成珠狀色有白黃紅緑碧紫數色水精無毒水精主尉目除熱淚本草拾遺亦入點目藥穿串吞咽中推引諸哽物本草綱目名水晶水玉石英李時珍云瑩徹晶光如水之精英會意也山海經謂之水玉廣雅謂之石英地倭國多水精第一南水精白北水精黑信州武昌水精濁質性堅而脆刀刮不動色徹如泉清明而瑩置水中無瑕不見珠者佳色有黑白青紫類書云太康四年林邑王範能獻紫水精唾壺一口青白水精唾壺二口味辛性寒贋古語云冰化謬言也藥燒成者有氣眼謂之硝子一名海水精抱朴子云交廣人作假水精蓋是此火珠綱目附録李時珍云説文謂之火齊珠漢書謂之玫瑰音枚回唐書云東南海中有羅剎國出火齊珠大者如雞卵狀類水精圓白照數尺日中以艾承之則得火用灸艾炷不傷人今占城國有之名朝霞大火珠又續漢書云哀牢夷出火精琉璃則火齊乃火精之訛正與水精對碝石音耎綱目附録李時珍云出雁門石次於玉白色如冰亦有赤者山海經云北山多碝石禮云上佩碝玫是也銀硃有毒銀硃主破積滯劫痰涎散結胸療疥癬惡瘡殺蟲及蝨功同粉霜本草綱目名猩紅紫粉霜李時珍云昔人謂水銀出於丹砂熔化還復為朱者即此也名亦由此味辛性溫制胡演丹藥祕訣云升煉銀硃用石亭脂二斤新鍋內熔化次下水銀一斤炒作青砂頭炒不見星研末罐盛石版蓋住鐵線縛定鹽泥固濟大火煅之待冷取出貼罐者為銀硃貼口者為丹砂今人多用水銀一斤燒上好水花朱一十四兩八分次朱三兩五錢治李樓怪症方治火焰丹毒銀硃調雞子清塗之多能鄙事方治湯火灼傷銀硃研細菜油調敷二次愈普濟方治魚臍疔瘡四面赤中央黑銀硃水和丸每服一丸溫酒下名走馬丹合治心鑑方治小兒內釣多啼銀硃五分乳香煨蒜各一錢為末研丸黍米大半歲五丸薄荷湯下唐瑤經驗方治男女陰毒銀硃輕粉各一錢用五日獨蒜一枚搗和作餅貼手心男左女右以手合定放陰下頃間氣回汗出即愈但口中微有氣即活曾世榮活幼全書云痰氣結胸鶴頂丹不問陰陽虛實炒過陷胸瀉心等藥用銀硃半兩明礬一兩同碾以尉斗盛火瓦盞盛藥熔化急刮搓丸每服一錢真茶入薑汁少許服之心上隱隱有聲結胸自散不動臟腑不傷真氣明礬化痰銀硃破積故也普濟方治水腫病大便利者銀硃半兩硫黃煅四兩為末麵糊丸梧子大每飲下三十丸又方治楊梅毒瘡銀硃官香等分為末以紙卷作捻點燈置桶中以鼻吸煙一日一作七日愈又方銀硃二錢孩兒茶一錢龍挂香一錢皂角子一錢為末如上法用又方銀硃輕粉各一錢黃蠟清油各一兩化開和收以油紙攤貼瘡痂自脫也急救方治咽喉疼痛銀硃海螵蛸末等分吹之取涎又方治瘡疽發背銀硃白礬等分煎湯溫洗卻用桑柴火遠遠炙之日三次甚效纂要奇方治筋骨疼痛猩紅三錢枯礬四錢為末作三紙捻每旦以一捻蘸油點火熏臍被覆臥之取汗應急良方治日久頑瘡不收臁瘡不斂者銀硃一錢千年地下石灰五分松香五錢香油一兩為末化攤紙上貼之簡便方治血風臁瘡生腳股上乃濕毒成風也黃蠟一兩溶化入銀硃一兩攪攤紙上刺孔貼之集元方治黃水濕瘡銀硃鹽梅和搗敷之醫方摘要云癬瘡有蟲銀硃牛骨髓桐油調搽積德堂方治頭上生蝨銀硃浸醋日日梳頭又方包銀硃紙以碗覆燒之茶清洗下煙紙揉之包頭一夜至旦蝨盡死又方銀硃枯礬蒼朮苦參等分為末摻入發內梳洗數次禁銀硃乃硫黃同汞升煉而成其性燥烈亦能爛齦攣筋其功過與輕粉同也今廚人往往以之染色供饌應禁用之贋銀硃真者謂之水華朱今人多以黃丹及礬紅雜之其色黃黯宜辨之蜜栗子蜜栗子主金瘡折傷有效本草綱目地李時珍云生川廣江浙金坑中有之質狀似蛇黃而有刺上有金線纏之亦無名異之類也丹爐家採作五金匱藥制三黃用之色紫褐石炭有毒石炭主婦人血氣痛及諸瘡毒金瘡出血小兒痰癇本草綱目名煤炭石墨鐵炭烏金石焦石李時珍云石炭即烏金石上古以書字謂之石墨今俗呼為煤炭煤墨音相近也拾遺記云焦石如炭嶺表録云康州有焦石即此也地南北諸山産處亦多昔人不用故識之者少今人以之代薪炊爨煅煉鐵石大為民利孝經援神契云王者德至山陵則出墨丹水經言石炭可書然之難盡煙氣中人酉陽雜俎云無勞縣出石墨爨之彌年不消夷堅志云彰德南郭村井中産石墨宜陽縣有石墨山檿陽縣有石墨洞燕之西山楚之荊州興國州江西之廬山袁州澧城贛州皆産石炭可以炊爨並此石也又有一種石墨舐之黏舌可書字畫眉名畫眉石者即墨石脂也見石脂下時採無時土人皆鑿山為穴橫入十餘丈取之用入藥取堅塊如石者質有大塊如石而光者有疏散如炭末者俱有硫黃氣以酒噴之則解昔人言夷陵黑土為劫灰者即此疏散者也色純黑味甘辛性溫合治醫學集成方治金瘡出血急以石炭末厚敷之瘡深不宜速合者加滑石普濟方治誤吞金銀及錢在腹中者不能下用光明石炭一杏核大硫黃一皂子大為末酒下張子和儒門事親方治腹中積滯烏金石三兩自然銅為末醋熬一兩當歸一兩大黃童尿浸曬一兩為末每服二錢紅花酒一盞童尿半盞同調食前服日二服衛生易簡方治月經不通巴豆去油如緑豆大三丸以烏金石末一錢調湯送下即通張潔古保命集云産後兒枕刺痛黑白散用烏金石燒酒淬七次寒水石煅為末等分每用粥飲服一錢半即止未止再服解人有中煤氣毒者昏瞀至死惟飲冷水即解獨孤滔云去錫暈制三黃硇砂硝石然石綱目附録曹叔雅異物志云豫章有石黃色而理疏以水灌之便熱可以烹鼎冷則再灌張華謂之然石高安亦有之石面無毒石面主益氣調中食之止飢本草綱目地李時珍云石面不常生亦瑞物也或曰飢荒則生之唐元宗天寶三載武威番禾縣醴泉湧出石化為面貧民取食之憲宗元和四年山西云蔚代三州山谷間石化為麵人取食之宋真宗祥符五年四月慈州民飢鄉寧縣山生石臘如面可作餅餌仁宗嘉祐七年三月彭城地生面五月鍾離縣生面哲宗元豐三年五月青州臨朐益都石皆化為麵人取食之搜集於此以備得石面者考求云味甘性平石芝石芝本草綱目主延年益壽返老還童品彙續集諸芝搗末或化水服令人輕身長生不老葛洪神仙傳名葛洪云芝有石木草菌肉五類各近百種地道家有石芝圖石芝者石像芝也生於海隅名山島嶼之涯有積石處時採須齋祭取之用全體質其狀如肉有頭尾四足似生物附於大石間大者十餘斤小者三四斤色赤者如珊瑚白者如截肪黑者如澤漆青者如翠羽黃者如紫金皆光明洞徹味甘辛性溫熱制搗末服之其類有五著明於後以便收採七明芝九光芝品彙分録葛洪云生臨水高山石崖之間狀如盤碗不過徑尺有莖連綴之起三四寸有七孔者名七明九孔者名九光光皆如星百步內夜見其光常以秋分伺之搗服方寸匕入口則吸然身熱五味甘美得盡一斤長生不老可以夜視也玉脂芝品彙分録葛洪云生於有玉之山玉膏流出千百年凝而成芝有鳥獸之形多似元玉蒼玉及水晶色無常彩採得搗末之以無心草汁和之須臾成水服至一升長生也石蜜芝品彙分録葛洪云生少室石戶中有深谷不可過但望見石蜜蜂從石戶上入石偃蓋中良久輒有一滴得服一升長生不老也石桂芝品彙分録葛洪云生石穴中有枝條似桂樹而實石也高尺許色光明味辛李時珍云神仙之説渺茫不知有無然其所述之物則非無也貴州普定分司署內有假山山間有樹根乾枝條皆石其中有葉如榴嫋嫋茂翠開花似桂微黃嘉靖丁巳僉事焦希程賦詩紀之以比康於斷松化石之事而不知其名今按圖及抱朴子之説此乃石桂芝也又有海邊生石梅枝幹橫斜石柏葉如側柏亦是石桂之類云土黃有毒土黃主枯瘤贅痔乳食瘻癧並諸瘡惡肉本草綱目味辛酸性熱制李時珍云用砒石二兩木鱉子仁巴豆仁各半兩硇砂二錢為末和木鱉子油石腦油調成一塊油裹埋土坑內四十九日取出劈作小塊瓷器收之解獨孤滔云土黃制雄黃金剛石金剛石主磨水塗湯火傷作叉鈈服佩辟邪惡毒氣本草綱目名金剛鑽削玉刀李時珍云其砂可以鑽玉補瓷故謂之鑽地李時珍云出西番天竺諸國葛洪抱朴子云扶南出金剛石生水底石上周密齊東野語云相傳出西域及回紇高山頂上鷹隼黏帶食入腹中遺糞於河北砂磧間未知然否元中記云大秦國出金剛一名削玉刀大者長尺許小者如稻黍著環中可以刻玉觀此則金剛有甚大者番僧以充佛牙是也十洲記載西海流沙有昆吾石治之作劍如鐵光明如水精割玉如泥此亦金剛之大者也又獸有貘及齧鐵狡兔皆能食鐵其糞皆可為兵切玉詳見獸部貘下時採於夏秋乘天熱人可沒水取之用可以刻玉周密齊東野語云玉人攻玉以恆河之砂以金剛鑽鏤之質狀如鍾乳體似紫石英又形如鼠屎色青黑色如石如鐵性甚堅雖鐵椎擊之亦不能傷制若覺鈍則鍛赤冷定即鋭也忌葛洪抱朴子云用羚羊角扣金剛石則漼然冰泮丹房鑑源云紫背鉛能碎金剛鑽贋欲辨真偽燒赤淬醋中如故不酥碎者為真元中記云金剛石最堅羚羊角又能克之即可以悟嗜欲之足以亂真故西方以金剛喻佛性羚羊角喻煩惱也砭石音邊砭石主刺百病及癰腫本草綱目通血脈理氣滯古時用之品彙續集名針石地東山經云高氏之山鳧麗之山皆多鐵石用郭璞注云鐵石可為砭針質王冰注云砭石如玉蓋古者以石為針季世以針代石今人又以瓷針刺病亦砭之遺意也治素問異法方宜論云東方之域魚鹽之地海濱旁水其病為瘡瘍其治宜砭石故砭石亦從東方來但世無識者豈即石砮之屬為之歟故附石砮於後石砮綱目附録李時珍云石砮出肅慎國人以枯木為矢青石為鏃施毒中人即死石生山中禹貢荊州梁州皆貢砮即此石也又南方滕州以青石為刀劍如銅鐵婦人用作環玦琉璃國人墾田以石為刀長尺余皆此類也杓上砂杓上砂主面上風粟或青或黃赤隱暗澀痛及人唇上生瘡者本家杓上刮去唇砂一二粒即安本草綱目名李時珍云此淘米杓也有木杓瓢杓皆可用治李時珍方治婦人吹乳取砂七枚溫酒送下更以炊帚枝通乳孔此者莫解其理石鱉無毒石鱉主淋疾血病磨水服本草綱目地李時珍云石鱉生海邊質形狀大小儼如雘蟲蓋亦化成者雘蟲俗名土鱉味甘性涼雷墨雷墨主小兒驚癇邪魅諸病以桃符湯磨服即安本草綱目名劉恂嶺表録云雷州驟雨後人於野中得石如黳石謂之雷公墨扣之錚然光瑩可愛地雷書云雷州每雷雨大作飛下如沙石黑色光豔至重質大者如塊小者如指堅硬如石李肇國史補云雷州多雷秋則伏蟄狀如人掘取食之觀此則雷果有物矣色李時珍曰按雷書云凡雷書木石謂木札入二三分青黃色或云雄黃青黛丹砂合成以雷楔書之或云蓬萊山石脂所書湯瓶內鹼湯瓶內鹼主止消渴以一兩為末粟米燒飯丸梧子大每服人參湯下二十丸本草綱目地李時珍云此煎湯瓶內澄清成水鹼如細沙者也治李時珍方小兒口瘡臥時以醋調末書十字兩足心驗合治聖濟録云消渴引飲湯瓶內鹼葛根水萍焙等分每服五錢水煎服又方湯瓶內鹼菝葜根炒各一兩烏梅連核二兩焙為散每服二錢水一盞石器煎七分溫呷日一服馬肝石馬肝石主和九轉丹吞一粒彌年不飢亦可作硯綱目總附諸石內地郭憲洞冥記云郅支國進馬肝石百片收以金函盛水銀養之用拭白髮應手皆黑質如馬肝色青黑豬牙石豬牙石主明目去翳綱目總附諸石內地李時珍云出西番質文理如象牙色如棗紅碧霞石碧霞石主明目去翳障綱目總附諸石內龍涎石龍涎石主大風癘瘡綱目總附諸石內名李時珍云一名龍仙石地出齊州者為上鉛光石鉛光石主骨鯁綱目總附諸石內太陽石太陽石主目疾諸症綱目總附諸石內合治劉守真宣明方治遠年近日一切目疾用太陽石太陰石碧霞石豬牙石河洛石寒水石紫石英代赭石菩薩石金精石銀精石禹余石礬礦石雲母石爐甘石井泉石陽起石滑石烏賊骨青鹽銅青各一兩硇砂半兩密陀僧一兩硼砂三錢乳香二錢麝香腦子一錢輕粉一錢五分黃丹四兩各為末熊膽一斤白砂蜜二斤井華水九碗同熬至四碗點水內不散為度濾淨收點此方所用太陽石太陰石等多無考證以俟識者朵梯牙朵梯牙主明目去翳綱目總附諸石內合治周憲王普濟方治眼去翳用水飛朵梯牙火煅大海螺碗糖霜為末日點又方用可鐵刺一錢阿飛勇一錢李子樹膠四錢白雪粉八錢為末雞子白調作錠每以乳女兒汁磨點之又方用安咱蘆出回回地面黑丁香即蠟糞海螵蛸各為末日點所謂朵梯牙碗糖霜安咱蘆可鐵刺阿飛勇皆不知何物也並附於此亦俟識者錫吝脂錫吝脂主目生翳膜用火燒銅針輕點乃敷之不痛又主一切風氣及三焦消渴飲水併入丸藥用本草綱目名銀礦悉藺脂地李時珍云此乃波斯國銀鉚也一作悉藺脂合治普濟方治小兒天吊多涎搐搦不定錫吝脂一兩水淘黑汁令盡水銀一分以小棗肉研不見星牛黃半分麝香半分研勻粳米飯丸黍米大每服三十二丸新汲水下名保命丹鐵斧鐵斧主婦人産難橫逆胞衣不出燒赤淬酒服亦治産後血瘕腰腹痛綱目總録諸鐵器內用李時珍云古人轉女為男法懷妊三月名曰始胎血脈未流象形而變是時宜服藥用斧置床底系刃向下勿令本婦知恐不信以雞試之則一窠皆雄也蓋胎化之法亦理之自然故食牡雞取陽精之全於天産者佩雄黃取陽精之全於地産者操弓矢藉斧斤取剛物之見於人事者氣類潛感造化密移物理所必有故妊婦見神像異物多生鬼怪即其徵矣象牙犀角紋逐象生山藥雞冠形隨人變以雞卵告灶而抱雛以苕帚掃貓而成孕物且有感況於人乎治陳藏器云凡人身有胬肉可聽人家釘棺下斧聲之時便下手連擦二七遍以後自得消平産婦勿宜用大刀環大刀環主産難數日不出燒赤淬酒一杯頓服綱目總録諸鐵器內剪刀股剪刀股主小兒驚風錢氏有剪刀股丸用剪刀環頭研破煎湯服藥綱目總録諸鐵器內鐵鏃鐵鏃主胃熱厄逆用七十二個煎湯啜之綱目總録諸鐵器內馬鐙馬鐙主田野磷火人血所化或出或沒來逼奪人精氣但以馬鐙相戛作聲即滅綱目總録諸鐵器內張華云金葉一振遊光斂色其斯之謂歟黃土無毒原本注好土綱目改黃土黃土主泄痢冷熱赤白腹內熱毒絞結痛下血取乾土水煮三五沸絞去滓暖服一二升本草拾遺名陳藏器云張司空言三尺以上曰糞三尺以下曰土凡用當去上惡物勿令入客水味甘性平治劉跂錢乙傳云元豐中皇子儀國公病瘛瘲國醫未能治長公主舉乙入進黃土湯而愈神宗召見問黃土愈疾之故乙對曰以土勝水水得其平則風自退爾上悅擢太醫丞又夷堅志云吳少師得疾數月消瘦每日飲食入咽如萬蟲攢攻且癢且病皆以為勞瘵迎明醫張鋭診之鋭令明旦勿食遣卒詣十里外取行路黃土至以溫酒二升攪之投藥百粒飲之覺痛幾不堪及登溷下馬蝗千餘宛轉其半已困死吳亦憊甚調理三日乃安因言夏月出師燥渴飲澗水一杯似有物入咽遂得此疾鋭云蟲入人臟勢必孳生飢則聚咂精血飽則散處臟腑苟知殺之而不能掃取終無益也是以請公枵腹以誘之蟲久不得土味又喜酒故乘飢畢集一洗而空之公大喜厚賂謝之以禮送歸小兒祕訣云烏沙驚風遍身多烏者急推向下將黃土一碗搗末入久醋一鍾炒熱包定尉之引下至足刺破為妙陳藏器本草云治卒患心痛畫地作五字撮取中央土水和一升服良肘後方治目卒無所見用黃土攪水中澄清洗之救急方治小兒吃土用干黃土一塊研末濃煎黃連湯調下又方治牛馬肉毒及肝毒取好土三升水煮清一升服即愈一方入頭髮寸截和之發皆貫肝而出也談野翁方治湯火傷灼醋調黃土塗之集簡方治蜈蚣螫傷畫地作土字內取土糝之即愈千金方治蜂蟻叮螫反手取地上土敷之或入醋調塗又方治蠼螋尿瘡畫地作蠼螋形以刀細取腹中土唾和塗之再塗即愈孫真人云豫得此疾經五六日不愈或教此法遂瘳乃知萬物相感莫曉其由也孫真人千金方治攧撲將死一切傷損從高墜下及木石所迮落馬撲車淤血凝滯氣絶將死者亦活用淨土五升蒸熱以故布重裹作二包更互尉之勿大熱恐破肉候痛止則已此神效之方合治孫氏集效方治內痔痛腫朝陽黃土黃連末皮硝各一兩用豬膽汁同研如泥每日旋丸棗大納入肛內過一夜隨大便去之內服烏梅黃連二味丸藥攝生方治秋瘡未破干黃土末童尿入雞子清調塗刷上干即上隨以熱水洗去復刷復洗數十次以紫轉紅為度仍刷兩胯以防血攻陰也禁陳藏器云土氣久觸令人面黃掘土犯地脈