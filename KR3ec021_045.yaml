灌夕已除是矣地國風雲於彼行潦大雅云泂酌彼行潦左傳云潢汙行潦之水是其地也用大雅云挹彼注茲可以餴饎左傳云可薦於鬼神可饈於王公是其用也味甘性平治成無己云張仲景治傷寒瘀熱在裡身上發黃必用潦水煎麻黃連軺赤小豆湯取其味薄而不助濕氣利熱也神水無毒神水主心腹積聚及蟲病和獺肝為丸服本草綱目名端午雨水地藏在竹竿中者時生於五月五日午時採於午時內取之收金門記云五月五日午時有雨急伐竹竿中必有神水即收之用瀝取為藥味甘性寒治李時珍云得飲神水能清熱化痰定驚安神此雨罕逢惜乎不易得耳阿井水無毒陳井水主下膈疏痰止吐本草綱目地李時珍云阿井在今兗州陽穀縣即古東阿縣也用沈括筆談云古説濟水伏流地中今歷下凡發地下皆是流水東阿亦濟水所經取井水煮膠謂之阿膠又青州范公泉亦濟水所注其水用造白丸子利膈化痰質其性趣下清而且重用攪濁水則清色管子云齊之水其泉清白其人堅徑寡有疥瘙終無消酲水性之不同如此味甘鹹性平治烏井水性重故能治瘀濁及逆上之痰贋李時珍云陸羽烹茶尚辨天下之水性美惡烹藥者反不知辨此豈不誤哉山岩泉水無毒倘遇驟雨後不宜飲之有大毒山岩泉水主霍亂煩悶嘔吐腹空轉筋恐入腹宜多服之名曰洗腸勿令腹空空則更服人皆懼此然嘗試有效但身冷力弱者防致臟寒當以意消息之本草拾遺名爾雅云水正出曰檻泉懸出曰沃泉反出曰汍泉地李時珍云此山岩土石間所出泉流於溪澗者也小雅云觱沸檻泉是正出泉水之地耳用爾雅云其泉源遠清冷或山有玉石美草木者為良味甘性平禁陸羽云凡瀑湧漱湍之水飲之令人有頸疾汪穎云昔在潯陽忽一日城中馬死數百詢之云數日前雨洗出山谷中蛇蟲之毒馬飲其水然也忌爾雅云其山有黑土毒石惡草者不可用車轍中水車轍中水主癧瘍風取洗之甚良牛蹄中水亦可本草綱目名李時珍云轍乃車行迹也時採五月五日取之齏水無毒齏水主吐諸痰飲宿食本草綱目名李時珍云此乃作黃齏水也味酸鹹氣酸苦湧泄為陰也磨刀水無毒磨刀水主利小便消熱腫本草綱目味咸性寒治活人心統云耳中卒痛磨刀鐵漿滴入即愈集簡方治小便不通磨刀交股水一盞服之效又方治肛門腫痛欲作痔瘡急取屠刀磨水服甚效合治扁鵲云盤腸生産腸幹不上者以磨刀水少潤腸煎好磁石一杯溫服自然收上禁不宜洗手恐生濕瘡解救急方解蛇咬毒攻入腹以兩刀於水中相摩飲其汁即能解其毒矣銅壺滴漏水銅壺滴漏水本草綱目主上可至顛下可至泉宜煎四末之藥醫學正傳性滑浸藍水無毒染布水附浸藍水主除熱解毒殺蟲染布水療咽喉病及噎疾溫服一鍾良本草綱目味辛苦性寒治李時珍云誤吞水蛭成積脹痛黃瘦蛭聚腹中飲浸藍水取下即愈解浸藍水染布水皆取藍及石炭能殺蟲解毒之義昔有人因醉飲田中水誤吞水蛭胸腹脹痛面黃遍醫不效因宿店中渴甚誤飲此水大瀉數行平明視之水蛭無數其病頓愈也洗手足水洗手足水本草綱目主病後勞復或因梳頭或食物復發取一合飲之效太平聖惠方洗兒湯洗兒湯本草綱目主胎衣不下服一盞勿令知之延年祕録繅絲湯繅絲湯品彙續集主止消渴大驗本草綱目地溲綱目附録石腦油內李時珍云溝澗流水及引水灌田之次多有之形狀如油又如泥色如黃金甚腥烈冬月收取以柔鐵燒赤投之二三次剛可切玉陽火陰火陽火陰火主造化兩間生殺萬物顯仁藏用神竗無窮合天地人而言之陽火有六陰火有六共十二焉諸陽火遇草而焫得木而燔可以濕伏可以水滅諸陰火不焚草木而流金石得濕愈焰遇水益熾以水折之則光焰詣天物窮方止以火逐之以灰撲之則灼性自消光焰自滅故人之善反於身者上體於天而下驗於物則君火相火正治從治之理思過半矣本草綱目天之陽火二太陽真火也星精飛火也赤物暾暾降則有災俗呼火殃天之陰火二龍火也雷火也龍口有火光霹靂之火神火也地之陽火三鑽木之火也擊石之火也戛金之火也地之陰火二石油之火也見綱目石腦油內水中之火也江湖河海夜動有火或云水神夜出則有火光人之陽火一丙丁君火也心小腸離火也人之陰火二命門相火也起於北海遊行三焦寄位肝膽三昧之火也純陽干火也又有蕭丘之寒火抱朴子外篇云蕭丘在南海中上有自然之火春生秋滅生一種木但小焦黑又陸遊云火山軍其地鋤耘深入則有烈焰不妨種植亦寒火也澤中之陽焰素問王冰注云狀如火焰起於水面野外之鬼磷其火色青其狀如炬或聚或散俗呼鬼火或云諸血之磷光也金銀之精氣凡金銀玉寶皆夜有火光此皆似火而不能焚物者也至於樟腦猾髓皆能水中發火樟腦見木部猾髓見獸部濃酒積油得熱氣則火自生燒酒醇酒得火氣則自焚油滿百石則火自生油紙油衣油鐵得熱氣蒸激皆自生火也南荒有厭火之民國近黑崑崙人能食火炭食火之獸原化記云禍鬥獸狀如犬而食火糞復為火能燒人屋西戎有食火之鳥駝鳥見禽部火鴉蝙蝠能食焰煙火龜火鼠生於火地火龜見魚部龜下火鼠見獸部鼠下此皆五行物理之常而乍聞者目為怪異蓋未深詣乎此理故爾復有至人入水不溺入火不焚入金石無礙步日月無影斯人也與道合真不知其名謂之至人蔡九峰止言木火石火雷火水火蟲火磷火似未盡該也以上俱本草綱目朱震亨云太極動而生陽靜而生陰陽動而變陰靜而合而生水火木金土各一其性惟火有二曰君火人火也曰相火天火也火內陰而外陽主乎動者也故凡動皆屬火以名而言形氣相生配於五行故謂之君以位而言生於虛無守位稟命因其動而可見故謂之相天主生物故恆於動人有此生亦恆於動動者皆相火之為也見於天者出於龍雷則木之氣出於海則水之氣也具於人者寄於肝腎二部肝木而腎水也膽者肝之腑膀胱者腎之腑心包絡者腎之配三焦以焦言而下焦司肝腎之分皆陰而下者也天非此火不能生物人非此火不能自生天之火雖出於木而皆本乎地故雷非伏龍非蟄海非附於地則不能鳴不能飛不能波也鳴也飛也波也動而為火者也肝腎之陰悉具相火人而同乎天者也然而李東垣以火為元氣之賊與元氣不兩立一勝則一負者何哉周子曰神發知矣五性感物而萬事出有知之後五者之性為物所感而動即內經五火也五性厥陽之火與相火相扇則妄動矣火起於妄變化莫測煎熬真陰陰虛則病陰絶則死君火之氣經以暑與濕言之相火之氣經以火言之蓋表其暴悍酷烈甚於君火也故曰相火元氣之賊周子又曰聖人定之以中正仁義而主靜朱子曰必使道心常為一身之主而人心每聽命焉夫人心聽命而又主之以靜則彼五火之動皆中節相火惟有裨補造化以為生生不息之運用爾何賊之有或曰內經止於六氣言火未言及臟腑也曰岐伯歷舉病機一十九條而屬火者五諸熱瞀瘛皆屬於火諸逆衝上皆屬於火諸躁狂越皆屬於火諸禁鼓剽如喪神守皆屬於火諸病胕腫疼酸驚駭皆屬於火是也劉河間云諸風掉眩屬於肝風火也諸氣膹郁屬於肺燥火也諸濕腫滿屬於脾濕火也諸痛癢瘡屬於心鬱火也是皆火之為病出於臟腑者然也李時珍云以陳無擇之通敏猶以暖溫為君火日用之火為相火無怪乎後人之聾瞽也燧火燧火本草綱目主救人四時之疾因時鑽取因病而用五色之火煎五臟之藥品彙續集名榆柳木火杏棗木火桑柘木火柞楢木火槐檀木火時生四時四季採春夏季夏秋冬取之用取於四時配合五臟質榆柳先百木而青故春取之其火色青杏棗之木心赤故夏取之其火色赤桑柘之木肌黃故季夏取之其火色黃柞楢之木里白故秋取之其火色白槐檀之木心黑故冬取之其火色黑色青赤黃白黑性熱氣上炎升也陰中之陽也治李時珍云周官司爟氏四時變國火以救時疾季春出火季秋納火民咸從之蓋人資於火食者疾病壽夭生焉因時鑽燧取新火以為飲食之用依歲氣而使無亢不及所以救民之時疾也禁道書云灶下炭火謂之伏龍屎不可爇香祀神解天文大火之次於星為心季春龍見於辰而出火於時為暑季秋龍伏於戍而納火於時為寒順天道而百工之作息皆因之以免水旱災傷之流行也贋後世寒食禁火乃季春改火遺意而俗作介推事謬矣桑柴火桑柴火主癰疽發背不起瘀肉不腐及陰瘡瘰癧流注臁瘡頑瘡然火吹滅日炙二次未潰拔毒止痛已潰補接陽氣去腐生肌本草綱目用李時珍云桑木能利關節養津液得火則拔引毒氣而祛逐風寒所以能去腐生新制凡一切補藥諸膏宜此火煎之治朱震亨云火以暢達拔引郁毒此從治之法也助抱朴子云一切仙藥不得桑煎不服桑乃箕星之精能助藥力除風寒痹諸痛久服終生不患風疾故也行陳藏器云桑柴火灸蛇則足見忌此火不可點艾傷肌白炭火白炭火主誤吞金銀銅鐵在腹燒紅急為末煎湯呷之甚者刮末三錢井水調服未效再服本草綱目地燒木為炭處處有之諸木皆可燒炭入藥惟用白炭櫟炭烰炭用白炭性堅木久則腐而炭入土不腐者木有生性炭無生性也葬家用炭能使蟲蟻不入竹木之根自回亦緣其無生性耳古者冬至夏至前二日垂土炭于衡兩端令勻陰氣至則土重陽氣至則炭重也質長短不等大小不齊色生紅死黑性溫熱氣炎可升可降陰中之陽也陽中之陰也治百一方治白癩頭瘡用白炭燒紅投沸湯中溫洗之取效千金方治卒然咽噎用炭末蜜丸含咽濟急方治湯火灼瘡用炭末香油調塗合治聖惠方治白虎痛風日夜走注百節如齧用炭灰五升蚯蚓泥屎一升紅花七捻和熬以醋拌之用故布包作二包更互尉痛處取效解李時珍云解水銀輕粉毒帶火炭納水底能取水銀出也上立炭帶之辟邪惡鬼氣除夜立之戶內亦辟邪惡祟氣櫟木炭火主煅煉一切金石藥品彙分録周王普濟方久近腸風下氣用緊炭三錢枳殼燒存性五錢為末每服三錢五更米飲下一服天明再服當日見效忌油膩毒烰炭火主烹煎焙炙百藥丸散品彙分録陳氏經驗方陰囊濕痹用麩炭紫蘇葉末撲之蘆火竹火蘆火竹火主煎一切滋補藥本草綱目用李時珍云陳蘆枯竹火取其不強不損藥力也桑柴火取其能助藥力烰炭取其力慢櫟炭取其力緊溫養用粳及馬屎牛屎者取其緩而能使藥力勻遍也制凡服湯藥雖品物專精修治如法而煎藥鹵莽造次水火不良火候失度則藥亦無功觀夫茶味之美惡飯味之甘餲皆繫於水火烹飪之得失即可推矣是以煎藥須用小心老成人以深罐密封新水活火先武后文如法服之未有不效者艾火艾火主灸百病若灸諸風冷疾入硫黃少許尤良本草綱目用李時珍云凡灸艾火宜用陽燧火珠承日取太陽真火其次則鑽槐取火為良若急卒難備即用真麻油燈或蠟燭火以艾莖燒點於炷滋潤灸瘡至愈不痛也性溫熱氣炎陰中之陽也禁戛金擊石鑽燧八木之火皆不可用邵子云火無體因物以為體金石之火烈於草木之火也忌所謂入木者松火難瘥柏火傷神多汗桑火傷肌肉柘火傷氣脈棗火傷內吐血橘火傷營衛經絡榆火傷骨失志竹火傷筋損目也南齊書載武帝時有沙門從北齊齎赤火來其火赤於常火而小云以療疾貴賤爭取之灸至七炷多得其驗吳興楊道慶虛疾二十年灸之即瘥咸稱為聖火詔禁之不止不知此火何物之火而能愈疾也陽燧綱目附録李時珍云火鏡也以銅鑄成其面凹摩熱向日以艾承之則得火周禮司烜氏以火燧取明火於日是矣火珠見本部水精下神針火神針火主心腹冷痛風寒濕痹附骨陰疽凡在筋骨隱痛者針之火氣直達病所甚效本草綱目名桃枝木針火地向東引桃樹枝時採五月五日取之收取桃枝削為木針如雞子大長五六寸干之用李時珍云用時以綿紙三五層襯於患處將針蘸麻油點著吹滅乘熱針之雷火神針品彙分録李時珍云用時於燈上點著吹滅隔紙十層乘熱針於患處熱氣直入病處其效更速製法用熟蘄艾一兩乳香沒藥穿山甲硫黃雄黃草烏頭川烏頭桃樹皮末各一錢麝香五分為末拌艾以厚紙裁成條鋪艾藥於內緊卷如指大長三四寸收貯瓶內埋地中七七日取出應用用針時忌冷水火針火針主風寒筋急攣引痹痛或癱緩不仁者針下疾出急按孔穴則疼止不按則疼甚症塊結積冷病者針下慢出仍轉動以發出汙濁癰疽發背有膿無頭者針令膿潰勿按孔穴凡用火針太深則傷經絡太淺則不能去病要在消息得中針後發熱惡寒此為中病凡面上及夏月濕熱在兩腳時皆不可用此本草綱目名燔針淬針燒針煨針李時珍云火針者素問所謂燔針淬針也張仲景謂之燒針川蜀人謂之煨針制其法麻油滿盞以燈草二七莖點燈將針頻塗麻油燒於燈上令通赤用之不赤或冷則反損人且不能去病也其針須用火箸針造之為佳點穴墨記必要明白差則無功治素問云病在筋調之筋燔針劫刺其下及筋急者病在骨調之骨淬針藥尉之又靈樞經敘十二經筋所發諸痹痛皆云治在燔針劫刺以知為度以痛為輸禁又云經筋之病寒則反折筋急熱則縱弛不收陰痿不用淬刺者淬寒急也縱緩不收者無用燔針觀此則燔針乃為筋寒而急者設以熱治寒正治之法也而後世以針積塊亦假火氣以散寒涸而發出汙濁也或又以治癰疽者則是以從治之法潰泄其毒氣也而昧者以治傷寒熱病則非矣忌張仲景云太陽傷寒加溫針必發驚營氣微者加燒針則血流不行更發熱而煩躁太陽病下之心下痞表裡俱虛陰陽俱竭復加燒針胸煩面色青黃膚潤者難治此皆用針者不知往哲設針之理而謬用以致害人也解又凡肝虛目昏多淚或風赤及生翳膜頑厚或病後生白膜失明或五臟虛勞風熱上衝於目生翳並宜尉烙之法蓋氣血得溫則宣流得寒則凝澀故也其法用平頭針如翳大小燒赤輕輕當翳中烙之烙後翳破即用除翳藥敷點之燈火燈火主小兒驚風昏迷搐搦竄視諸病初生時因冒風寒氣將絶者勿斷臍急烘絮包之將胎衣烘熱用燈炷於臍下往來燎之暖氣入腹內氣回自蘇又燒銅匙柄尉烙眼弦內去風退赤甚妙本草綱目用凡燈惟用胡麻油蘇子油然者能明目治病治李時珍云治頭風脹痛視頭額太陽絡脈盛處以燈心蘸麻油點燈淬之良外痔腫痛者亦淬之濟急方治攪腸沙痛陰陽腹疼手足冷但身上有紅點以燈草蘸油點燈淬於點上小兒驚風祕訣云治諸驚仰向後者燈火淬其囟門兩眉際之上下眼翻不下者淬其臍之上下不省人事者淬其手足心心之上下手拳不開口往上者淬其頂心兩手心撮口出白沫者淬其口上下手足心濟急方治百蟲咬傷以燈火熏之出水妙合治方廣心法附余治楊梅毒瘡用鉛汞結砂銀硃各二錢白花蛇一錢共為末作紙捻七條初日用三條自後日用一條香油點燈於烘爐中放被內蓋臥勿透風須食飽口含椒茶熱則吐去再含神燈熏法用銀硃二錢孩兒茶龍挂香皂角子各一錢為末以紙卷作燈心大長三寸每用一條安燈盞內香油浸點置水桶中以被圍坐用鼻吸煙咽之口含冷茶熱則吐去日熏二次三日後口中破皮以陳醬水漱之神燈照法治楊梅瘡年久破爛坑陷者用銀硃水粉線香各三錢乳香沒藥各五分片腦二分為末以紙卷作捻浸油點燈照瘡日三次七日見效須先服通聖散數帖臨時口含椒茶以防毒氣入齒也集元方治年深疥癬遍身延蔓者硫黃艾葉研勻作捻浸油點燈於被中熏之以油塗口鼻耳目露之禁李時珍云諸魚油諸禽獸油諸菜子油棉花子油桐油豆油石腦油諸燈煙皆能損目亦不治病也解油能去風解毒火能通經故也燭燼燭燼主疔腫九漏本草綱目用李時珍云燭用蜜蠟桕油者燼可入藥合治疔腫同胡麻針砂等分為末和醋敷之又治九漏同陰乾馬齒莧等分為末以泔水洗淨和臘豬油敷之日三上禁蟲蠟燭牛脂燭燼俱不可用
