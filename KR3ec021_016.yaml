body:
  text: 卷之十五草部下品之下草之草葫蘆巴無毒植生葫蘆巴主元臟虛冷氣名醫所録名苦豆望江南苗圖經曰春生苗莖高四五尺葉葉對生如槐夏開黃花五出隨作莢如蠶豆其實似萊蔔子而匾採之以供茶食人家庭院植之為玩謂之望江南今市者俱嶺南所産入藥然不及舶上來者為真本經不注唐以前方書亦不見用是蓋出之甚近也別録云或云葫蘆巴蕃蘿蔔子也當附蘆蔔之次世俗相傳未知審的又補骨脂徐表南州記云是韭子也亦不附於菜部是相例也地圖經曰出海南諸蕃嶺南廣州黔州河南道地舶上者佳時生春生苗採七月取收日乾用子質類萊蔔子有稜而匾色淡黃味苦性溫泄氣氣厚於味陽中之陰臭香主膀胱冷氣制研細用合治合附子硫黃治腎虛冷腹脅脹滿面色青黑合蘹香子桃仁治膀胱冷氣甚效惟桃仁麩炒各等分半以酒糊丸半以為散每服五七十丸空心食前鹽酒任下散以熱米飲調下與丸子相間服之日各一二服瘥禁妊婦勿服服之令兒矮木賊無毒叢生木賊主目疾退翳膜又消積塊益肝膽明目療腸風止痢及婦人月水不斷名醫所録苗圖經曰叢生苗如箭笴長二三尺色青而無花葉每根一𦾮寸寸有節其紋直而甚利凌冬不凋地圖經曰生秦隴同華諸郡山谷近水地有之道地秦州時生春生苗採四月取收曝乾用莖色青味甘微苦性平緩氣氣之薄者陽中之陰臭朽主明目退翳制去節銼以水潤濕火上烘用治療衍義曰治小腸膀胱氣細銼炒搗為末食前沸湯點二錢緩緩服之必效別録云治瀉血不止以木賊十二分切碎用水一升八合煎取八合去滓空心溫分二服如人行五里再服之合治合牛角䚡麝香治休息痢日久不瘥合禹餘糧當歸芎藭治崩中赤白合槐鵝桑耳治腸風下血合槐子枳實治痔疾出血合枳殼各二兩乾薑一兩大黃一分四味煎銼一處於銚子內炒黑色存三分性搗羅為末溫粟米飲調食前服一錢匕治腸痔下血多年不瘥藎草無毒叢生藎音燼草主久咳上氣喘逆久寒驚悸痂疥白禿瘍氣殺皮膚小蟲神農本經名緑蓐草王芻鴟腳沙鹿蓐苗唐本注云此草葉似竹而細薄莖亦圓小生平澤溪澗之側荊襄人煮以染黃作金色極鮮彩詩衛風雲瞻彼淇澳緑竹猗猗是也地圖經曰生青衣川穀唐本注云生平澤溪澗之側道地荊襄時生春生苗採九月十月取用莖葉質類竹而細小色青緑味苦性平泄氣味厚於氣陰中之陽主殺蟲反畏鼠婦治療唐本注云洗諸瘡藥性論云治一切惡瘡蒲公草無毒植生蒲公草主婦人乳癰腫水煮汁飲之及封之立消名醫所録名構耨草蒲公英地丁苗圖經曰春初生苗葉如苦苣有細刺中心抽一莖莖端出一花色黃如金錢斷其莖有白汁出人亦啖之衍義曰蒲公草今地丁也四時常有花如菊花罷飛絮絮中有子落處即生所以庭院間亦有者蓋因風而來也地圖經曰舊不著所出州土今處處平澤田園皆有之時生春生苗採四月五月取收曝乾用根莖色青緑味甘性平緩氣氣之薄者陽中之陰主乳癰瘡腫治療圖經曰搗敷諸瘡及惡刺狐尿刺摘取根莖白汁塗之惟多塗立瘥別録云治産後不乳兒畜積乳汁結作癰毒取此草搗敷腫上日三四度易之即瘥穀精草無毒植生穀精草主療喉痹齒風痛及諸瘡疥飼馬主蟲顙毛焦等病名醫所録名戴星草苗圖經曰春生於穀田中葉𦾮俱青根花並白色一名戴星草以其葉細花白而小圓似星故以名爾又有一種莖梗差長有節根微赤出秦隴間古方稀有今口齒藥中多用之地圖經曰舊不載所出州土今處處有之道地江寧秦州時生春生苗採二月三月取收陰乾用苗葉色青味辛性溫氣氣之厚者陽也臭香主口齒風痛治療別録云治偏正頭風痛以穀精草一兩為末用白麵調攤紙花上貼痛處干即易之牛扁無毒叢生牛扁音褊主身皮瘡熱氣可作浴湯殺牛蝨小蟲又療牛病神農本經名扁特扁毒苗圖經曰葉似三堇石龍芮等根如秦艽而細多生平澤下濕地即蘇恭注云太常貯名扁特是也今潞州一種名便特六月有花八月結實根苗主療大都相似疑此即是牛扁但扁便不同其亦聲近而訛乎地圖經曰出桂陽川穀今寧州亦有之道地潞州時生春生苗採二月八月取根收日乾用根葉色青緑味苦性微寒泄氣氣薄味厚陰也臭朽主洗熱瘡合治根搗末合油調敷殺蟣蝨苦芺無毒植生苦芺音襖主面目通身漆瘡名醫所録苗蜀本圖經云子若貓薊莖圓無刺其苗五月採之堪以生啖而今人以為漏蘆非也地蜀本圖經云生所在下濕地陶隱居云處處有之時生春生苗採五月五日取莖收曝乾用莖色緑味苦性微寒泄氣氣薄味厚陰也主漆瘡丹毒制燒灰或生用治療陶隱居云燒作灰敷金瘡食療云生食治漆瘡或燒灰敷患處禁不堪多食酢漿草無毒叢生酢漿草主惡瘡瘑瘻搗敷之殺諸小蟲名醫所録名酸漿醋母草鳩酸草小酸苗苗圖經曰葉如水萍叢生莖端有三葉葉間生細黃花實黑其葉切生嫩時小兒多食之南人用揩鍮石器令白如銀地圖經曰舊不載所出州土但云生道傍今南中下濕地及人家園圃中多有之北地亦或有生者時生春生苗採四月五月取葉收陰乾用葉質類水萍色青緑味酸性寒收氣氣薄味厚陰也臭腥主瘡瘻熱渴制搗碎用昨葉何草無毒叢生昨葉何草主口中乾痛水穀血痢止血名醫所録名瓦松苗唐本注云初生葉似蓬高尺餘生年久瓦屋上遠望如松故名瓦松地圖經曰生上黨屋上今處處有之時生春生苗採六月七月收日乾用苗色青緑味酸性平收氣味厚於氣陰中之陽臭腥治療唐本注云生眉發膏中為要別録云治頭風白屑燒灰淋汁熱洗頭不過五七度瘥蒻頭無毒植生蒻音弱頭主癰腫風毒摩敷腫上搗碎以灰汁煮成餅五味調和為茹食性冷主消渴生戟人喉出血名醫所録名蒟音矩蒻苗圖經曰春生苗高一二尺莖似由跋而有斑葉亦似由跋半夏根大如碗生陰地而雨滴葉下生子名蒟蒻又有斑杖苗相似斑杖即虎杖也至秋有花直出生赤子其根敷癰腫毒甚好根亦如蒻頭但毒猛不堪食又云如天南星夏開花似蛇頭黃色秋結子作穗似石榴子紅色根似芋而圓採者當辨之但莖斑花紫者乃是蒟蒻也又有白蒟蒻亦曰鬼芋根都似天南星但南星小柔膩肥細炮之易裂差可辨爾地圖經曰生江南吳蜀陰地道地揚州時生春生苗採二月八月取根收日乾用根質類芋頭色黑白味辛性寒散氣氣之薄者陽中之陰臭腥主消腫毒制搗碎或摩汁用禁生不可食戟人咽喉出血贋斑杖根為偽夏枯草無毒植生夏枯草主寒熱瘰癧鼠瘻頭瘡破症散癭結氣腳腫濕痹輕身神農本經名夕句乃東燕面郁臭苗圖經曰冬至後生葉似旋覆三月四月開花作穗紫白色似丹參花結子亦作穗至五月枯衍義曰今又謂之郁臭自秋便生經冬不瘁春開白花中夏結子遂枯初生嫩時須浸洗淘去苦水作菜食之地圖經曰生蜀郡川穀今河東淮浙州郡亦有之唐本注云生平澤處處有之時生冬至後生苗採四月取莖葉收日乾用莖葉質葉似旋覆而短色緑味苦辛性寒泄氣氣薄味厚陰中之陽臭香主瘰癧鼠瘻助土瓜為之使治療衍義曰燒灰合緊面藥合治夏枯草半兩合香附子一兩共為末每服一錢匕無時候用臘茶調服治肝虛目睛疼冷淚不止筋脈痛及眼羞明怕日燕蓐草無毒燕蓐草主眠中遺溺不覺燒令黑研水進方寸匕亦主噦氣名醫所録收日乾用燕窠中者主遺溺惡瘡制去沙土並毛燒令黑用治療孫真人云卒患腰惡瘡若先發於心已有汗者以胡燕窠為末水塗之若治遲遍身即害人死別録云婦人無故尿血以胡燕窠中草燒末酒服半錢亦治丈夫鴨跖草無毒植生鴨跖草主寒熱瘴瘧痰飲疔腫肉症澀滯小兒丹毒發熱狂癇大腹痞滿身面氣腫熱痢蛇犬咬癰疽等毒名醫所録名跖雞舌草碧竹草鼻斫草苗圖經曰葉如竹高一二尺花深碧有角如鳥嘴北人呼為雞舌草亦名鼻斫草吳人呼為跖蓋跖斫聲相近也又名碧竹草花好為色地圖經曰生江東淮南平地北地吳中亦有之時生春生苗採夏月取莖葉收陰乾用莖葉色緑味苦性大寒泄氣氣薄味厚陰也臭朽主去熱毒消癰疽合治合赤小豆煮服下水氣濕脾利小便山慈菰有小毒植生山慈菰主癰腫瘡瘻瘰癧結核等醋磨敷之亦剝人面皮除皯𪒟名醫所録名金燈花鹿蹄草苗圖經曰春生苗葉似車前根如慈菰零陵間又有團慈菰根似小蒜所主與此略同地圖經曰生山中濕地及零陵間道地吳中者佳時生春生苗採八月取根收日乾用根質類榛子仁而極大色白味甘性平緩氣氣厚於味陽中之陰臭朽主癰腫瘡毒制剝去毛絮合治莖葉搗為膏和蜜貼瘡腫候瘡口有清血出效草之本𦯶實無毒植生𦯶音頃實主赤白冷熱痢散服飲之吞一枚破癰腫名醫所録苗圖經曰莖高六七尺葉似苧而薄花黃實帶殼如蜀葵中子黑色今人種之以績布及打繩索是此也古方亦有用根者地圖經曰舊不載所出州土今處處有之時生春生苗採八月九月十月取實收陰乾用實質類大麻子色黑味苦性平泄氣味厚於氣陰中之陽臭香治療唐本注云熱結癰腫無頭者吞之則頭易穴合治以一兩炒令香熟為末合蜜漿調服一錢治赤白痢不瘥再服草之草赤車使者有毒叢生赤車使者主風冷邪疰蠱毒症瘕五臟積氣名醫所録名小錦枝苗唐本注云苗似香葇及蘭香葉其莖赤而根紫赤色也地蜀本云出荊州襄州山谷唐本注云生溪谷之陰時生春生苗採二月八月九月取根收日乾用根色紫赤味辛苦性溫散氣氣厚味薄陽中之陰臭朽主惡風冷氣制雷公云幾使並粗搗用七歲童子小便拌了蒸令乾更曬每修事五兩用童便一鎰為度治補藥性論云悅澤皮肌好顏色合治合酒浸服之治大風濕痹草之走狼跋子有小毒蔓生狼跋子主惡瘡瘑疥殺蟲魚名醫所録名黃環子度谷就葛苗陶隱居云其苗春生作蔓花紫色而實形匾雜米搗為餌投水中魚無大小皆浮出而死今京下呼為黃環子亦謂度谷又名就葛唐本注云今交廣送入太常正是黃環子非他物也地陶隱居云出交廣時生春生苗採秋取實收日乾用實味苦性寒泄氣氣薄味厚陰也臭朽合治合苦酒磨治疥草之草屋遊無毒麗生屋遊主浮熱在皮膚往來寒熱利小腸膀胱氣名醫所録名昔邪苗陶隱居云此古瓦屋上青苔衣也陸龜蒙苔賦云高有瓦松卑有澤葵散岩竇者有石發補空田者曰垣衣在屋曰昔邪在藥曰陟疒𢛓昔邪即屋遊也然所産雖異主療則同皆由積陰而生於瓦石爾故推類而言之地圖經曰生屋上陰處時生春夏採八月九月取收陰乾用苔質類垣衣色緑味甘性寒緩氣氣之薄者陽中之陰臭朽主清熱止渴制剝取淨洗服治療別録云主小兒癇熱時氣煩悶止渴地錦草無毒蔓生地錦草主通流血脈亦可用治氣名醫所録苗圖經曰莖葉細弱蔓延於地莖赤葉青紫色夏中茂盛六月開紅花結細實經云絡石條中注有地錦是藤蔓之類雖與此名同而其類全別地圖經曰近道田野中有之道地滁州者尤良時生春生苗採夏月取收曝乾用苗子色紫赤味辛性溫散氣氣之厚者陽也臭朽主調氣和血合治為末和米飲調下二錢治臟毒赤白敗船茹敗船茹主婦人崩中吐痢血不止名醫所録地陶隱居云此是大貓步典切䏶他盍切刮竹茹挰直萌切漏處者今處處有之收日乾用茹性平氣氣之薄者陽中之陰臭朽制煮之或燒作屑用合治船故如為末合酒調服療婦人遺尿不知出船中故竹茹乾末合酒調服三錢匕日三服療無故遺血溺燈心草燈心草根及苗主五淋生煮服之人將為席敗席煮服更良名醫所録苗圖經曰莖圓細而長直土人亦將為席衍義曰陝西亦有蒸熟乾則折取中心穰然燈者謂之熟草又有不蒸但生干剝取者謂之生草入藥宜用生者謹按燈心草蒔田澤中圓細而長直有𦾮無葉南人夏秋間採之剝皮以為蓑衣其心能然燈故名燈心草由其性味淡滲故有利水之功而本經乃言為席非也其席草亦産江南形比燈心草細而短自是一種實非此類也若然席草亦可去皮而然燈乎地圖經曰生江南澤地衍義曰陝西亦有之時生春生苗採六月七月取收曝乾用根及苗心質類席草肥長而輕虛色白味甘性寒緩氣氣之薄者陽中之陰臭朽主通心竅利水道制剝去皮用治療別録云治小兒夜啼以燈心燒灰塗乳上與兒服之又治破傷多用燈心草爛嚼和唾貼之以帛裹血立止合治燈心浸油釣小蟲蟻入耳挑不出者五毒草無毒植生五毒草根主癰疽惡瘡毒腫赤白遊疹蟲蠶蛇犬咬並醋摩敷亦搗莖葉敷之恐毒入腹亦煮服之名醫所録名五蕺俎及切蛇罔苗圖經曰花葉如蕎麥根緊硬似狗脊又別有蠶罔草如苧麻與蕺同名也地圖經曰生江東平地時生春生苗採夏秋取收日乾用根莖葉色緑味酸性平收氣氣之薄者陽中之陰臭腥主癰腫蟲毒制醋摩或搗碎用鼠麴草無毒植生鼠麴草主調中益氣止泄除痰壓時氣去熱嗽名醫所録名香茅鼠耳草苗圖經曰春生苗高尺余葉有白毛開黃花采之以雜米粉作糗食之甜美山南人呼為香茅取花雜櫸皮染褐至破猶鮮江西人呼為鼠耳草也地圖經曰生江西山南平岡熟地時生春生苗採三月三日取收日乾用花實色青緑味甘性平緩氣氣之薄者陽中之陰臭香合治荊楚歲時記云三月三日取汁蜜和為粉謂之龍舌粄以壓時氣列當無毒麗生列當主男子五勞七傷補腰腎令人有子去風血煮及浸酒服之名醫所録名栗當草蓯蓉苗圖經曰莖圓紫色根如耦根初生長五六寸至一尺以來四月中旬掘取之名草蓯蓉壓令匾以代肉者一種鎖陽味甘丹溪云補陰氣治虛大便燥結者用之虛而大便不燥結者勿用亦以代蓯蓉也今考之二種形色氣味及可互相代用恐一物而異其名乎附見於此以備參用地圖經曰生南山岩石上蜀本云出原州秦州靈州皆有之時生春生苗採四月中旬取根收陰乾用根色紫味甘性溫緩氣氣之厚者陽也臭腥主補勞益腎制洗淨煮或浸酒合治二斤為末以酒一斗浸經宿遂性飲之主興陽事馬勃無毒馬勃主惡瘡馬疥名醫所録名馬庇馬屁勃馬屁菌苗蜀本圖經曰此馬屁菌也其狀如狗肺生濕地及腐木上虛軟如紫絮彈之有紫塵出衍義曰此唐韓退之所謂牛溲馬勃俱收並蓄者也其大者如斗小者如杓彈之則粉出也地圖經曰生園中久腐濕處時生無時採夏秋取收陰乾用大而虛軟者佳色紫味辛性平散氣氣之薄者陽中之陰臭朽主瘡疥喉閉制去膜用治療陶隱居云敷諸瘡合治合蜜揉拌少以水調呷治喉閉咽痛屐屧鼻繩灰屐音劇屧音燮鼻繩灰水服主噎哽心痛胸滿名醫所録地別録云江南以桐木為屐及屧用蒲為蒵用麻穿其鼻也入藥取以著腳經久而欲爛斷者為良用著腳經久者佳色黑制燒灰用質汗無毒質汗主金瘡傷折瘀血內損補筋肉消惡血下血氣婦人産後諸血結腹痛內冷不下食並酒消服之亦敷病處名醫所録地圖經曰出西蕃如凝血蕃人煎甘草松淚柳乳地黃並熱血成之陳藏器云蕃人試藥取兒斷一足納藥於口中以足踏之當時能走者至良謹按斷兒足以試藥可謂神矣考其藥味不過甘草松淚輩而已豈能如是之速哉但恐後人説夢向癡試之不驗將何如邪設若誤傷以此治之則可欲試藥而斷人之足其與文伯下二胎之意同也仁人者可不慎歟色紫紅味甘性溫氣氣之厚者陽也臭香水蓼無毒植生水蓼主蛇毒搗敷之絞汁服止蛇毒入內心悶水煮漬捋腳消氣腫名醫所録苗唐本注云生於水澤中故名水蓼其葉大於家蓼莖赤水挼食之勝於蓼子衍義曰大率與水紅花相似但枝低爾今造酒取汁和麵作曲亦假其辛爾地唐本注云生下濕水傍時生春生苗採夏月取莖葉收陰乾用莖葉質類水紅花而枝短色緑味辛性冷散氣氣之薄者陽中之陰臭香治療別録云腳痛成瘡煮湯令溫熱得所頻頻淋洗瘡干自安合治水紅子不以多少微炒一半餘一半生用同為末以好酒調二錢日三服食後夜臥各一服治瘰癧破者亦治蕕草無毒叢生蕕草主濕痹消水氣合赤小豆煮食之勿與鹽主腳氣頑痹虛腫小腹急小便赤澀搗葉敷毒腫又絞取汁服之主消渴名醫所録名蕕蔓於㩆音猶證蕕苗圖經曰生水中似結縷葉長馬多食之爾雅云蕕蔓於江東人呼為㩆證俗云蕕水草也左傳亦曰一薰一蕕十年尚猶有臭者是此草也地圖經曰生江東水田中時生春生苗採夏秋取葉收曝乾用葉色緑味甘性大寒緩氣氣之薄者陽中之陰臭臭主消水氣敷腫毒敗芒箔無毒敗芒箔主産婦血滿腹脹痛血渴惡露不盡月閉止好血下惡血去鬼氣疰痛癥結酒煮服之亦燒為末酒下彌久著煙者佳今東人作箔多草為之爾雅云芒以茅可以為索名醫所録狗舌草有小毒叢生狗舌草主蠱疥瘙瘡殺小蟲名醫所録苗唐本注云葉似車前無文理抽莖花開黃白而細地唐本注云生渠塹濕地時生春生苗採四月五月取收曝乾用莖色青緑味苦性寒泄氣氣薄味厚陰也海金沙無毒植生海金沙主通利小腸名醫所録苗圖經曰初生作小株高一二尺七月採全科於日中曝之令乾紙襯以杖擊之有細沙落紙上旋收之且曝且擊以沙盡為度地圖經曰在黔中山谷湖南亦有之時生春生苗採七月取收日中擊之用沙色黃味淡性平氣氣之薄者陽中之陰臭朽主通關竅利水道合治合梔子馬牙硝硼砂治傷寒熱狂海金沙一兩臘茶半兩二味搗碾令細每服三錢煎生薑甘草湯調服無時治小便不通臍下滿悶未通再服萱草根無毒叢生萱草根治沙淋下水氣主酒疸黃色通身者取根搗絞汁服亦取嫩苗煮食之又主小便赤澀身體煩熱風土記云懷妊婦人佩其花生男也名醫所録名鹿蔥花宜男忘憂苗謹按此種春初宿根而生葉十數作叢類菖蒲而稍薄一莖挺出其端有花次第而開類百合而紅黃色亦有純黃者夏採花秋採根用今人多采嫩苗及花跗作菹煮食之其花孕婦佩紉則生男故名宜男詩傳云食之亦能令人合歡樂忘憂故名忘憂也地圖經曰處處田野有之時生春生苗採五月取花八月取根收日乾用根色白味甘辛性涼緩氣氣之薄者陽中之陰臭香主利水竅除煩熱治療圖經曰安五臟利心志令人好歡樂無憂輕身明目嫩苗花作菹食利胸膈甚佳合治萱草根洗淨研汁一大盞合生薑汁半盞時時細呷治大熱衄血格注草有大毒叢生格注草主蠱疰諸毒疼痛等名醫所録苗唐本注云葉似蕨根紫色若紫草根一株有二十許地圖經曰生齊魯山澤唐本注云出兗州山谷間時生春生苗採二月八月取根五月六月取苗收日乾用根苗色苗緑根紫味辛苦性溫散氣氣厚味薄陽中之陰雞窠中草雞窠中草主小兒白禿瘡和白頭翁花燒灰臘月豬脂敷之瘡先以酸泔洗然後塗之又主小兒夜啼安席下勿令母知名醫所録時採無時收曝乾用雞久棲者良制燒灰用合治燒作末合酒下一錢匕治産後遺尿雞冠子無毒植生雞冠子主腸風瀉血赤白痢婦人崩中帶下名醫所録苗謹按苗高三五尺獨莖而匾紅緑色葉如蓼葉而長至端漸小花開莖巔狀若雞冠故謂之雞冠花也其子細黑似車前子但稜匾而有光澤爾地處處有之時生春生苗採秋取子收日乾用子色黑性涼氣氣之薄者陽中之陰主崩中帶下制炒碾碎用草之走地椒有小毒散生地椒主淋炸腫痛可作殺蛀蟲藥名醫所録苗圖經曰其苗因舊莖覆地而生莖葉甚細花作小朵紫白色地圖經曰出上黨郡時生春生苗採秋取實收日乾用實色青味辛性溫散氣氣之厚者陽也臭香主殺蟲草之草草三稜無毒叢生草三稜療産後惡血通月水血結墮胎破積聚癥瘕止痛利氣名醫所録名雞爪三稜苗圖經曰春生苗高三四尺似茭蒲葉皆三稜五六月開花如莎草黃紫色霜降後採根其形不一有初生成塊者或傍生一根成塊出苗者其不出苗只生細根者謂之雞爪三稜即草三稜也所謂雞爪者以其根端釣屈如雞爪然爾亦如烏頭烏喙因形而名之其實一類也地圖經曰生蜀地時生春生苗採二月八月取根收曝乾用根質類雞爪而長大色皮黑肉白味甘性平溫緩氣氣之厚者陽也主逐瘀血破積氣制細銼用合明草無毒植生合明草主暴熱淋小便赤澀小兒瘛病明目下水止血痢搗絞汁服名醫所録苗圖經曰葉如四出花向夜即葉合地圖經曰生下濕地時生春生苗採夏秋取收日乾用莖葉色緑味甘性寒緩氣氣之薄者陽中之陰臭朽主風熱利竅鹿藥無毒植生鹿藥主風血去諸冷益老起陽浸酒服之名醫所録苗圖經曰春生苗高一尺以來葉似竹而兩兩相對苗根並似黃精其根鹿好食故名鹿藥也地圖經曰生姑藏已西時生春生苗採夏秋取根收日乾用根質類黃精色黃白味甘性溫緩氣氣之厚者陽也臭朽主益陽去冷制酒浸用弓弩弦弓弩弦主難産胞不出名醫所録謹按弓弩弦舊本附於草部蓋古者以麻為之而然也近世易之以絲以筋之類欲其堅且約耳內則所謂男子生而桑弧蓬矢以射四方射乃男子之事況弦有捷速之義故妊娠佩之以宜男臨蓐而易産物之所感理或然也性微寒平主易産治療別録云治婦人始覺有孕取弦一條袋盛擊於左臂必成男胎又臨蓐取一條纏縛腰間令易産治耳中有物不可出者以三寸打散一頭塗膠注耳中物處停之今相著其物即出一十一種陳藏器余毛茛鉤吻注陶云鉤吻或是毛茛蘇云毛茛是有毛石龍芮也百一方云菜中有水茛葉圓而光有毒生水旁蟹多食之蘇云又注似水茛無毛其毛茛似龍芮而有毒也蔭命鉤吻注陶云有一物名陰命赤色著木懸其子生海中有毒又云海薑生海中赤色狀如龍芮亦大毒應是此也今無的識之者毒菌地漿注陶雲山中多有毒菌地漿解之地生者為菌木生者為檽江東人呼為菌爾雅雲中馗菌注云地菌子也或云地雞亦云獐頭夜中光者有毒煮不熟者有毒煮訖照人無影者有毒有惡蟲鳥從下過者有毒欲爛無蟲者有毒冬春無毒及秋夏有毒者為蛇過也草禹餘糧注陶公雲南人又呼平澤中一藤如菝葜為餘糧言禹採此當糧根如盞連綴半在土上皮如茯苓肉赤味澀人取以當谷不飢調中止泄健行不睡云昔禹會諸侯棄糧於地化為此草故名餘糧今多生海畔山谷鼠蓑草莎草注陶云別有鼠蓑草治體異此有名無用條有蓑草味苦寒主溫瘧寒熱酸斯利氣生淮南山谷即此也廉薑杜若注陶云若似廉按廉薑熱主胃中冷吐水不下食似薑生嶺南劍南人多食之草石蠶蟲石蠶注陶云今俗用草根黑色按草石蠶生高山石上根如箸上有毛節如蠶葉似卷柏山人取浸酒除風破血主溪毒煮食之本經從蟲部出復有蟲食蠶已出拾遺漆姑草杉木注陶云葉細細多生石間按漆姑草如鼠迹大生階墀間陰處氣辛烈主漆瘡挼研敷之熱更易亦主溪毒瘡蘇云此蜀羊泉羊泉是大草非細者乃同名耳麂目豆蔻注陶云麂目小冷按麂目云出嶺南如麂目食之發冷痰余別無功梨豆蚺蛇注陶云蛇膽如梨豆生江南蔓如葛子如皂莢子作貍首文故名梨豆爾雅云慮涉子人炒食之一名虎涉別無功諸草有毒瓜兩蒂兩鼻害人瓜瓠正苦有毒簷溜滴著菜有毒堇黃花害人芹赤葉害人菰首蜜食下痢生蔥不得雜白犬肉食之令人九竅流血食戎葵並鳥肉令人面無顏色食葵發狂犬咬食葫蔥青魚令人腹生蟲薤不得和牛肉食成癥瘕痼疾婦人妊娠食乾薑令胎肉消生蔥和雞子食變嗽蓼齏食生食令氣奪乏令陰痿九月食霜下瓜血必冬發三月不得食陳菹夏熱病發惡瘡瓠牛踐苗子即苦
