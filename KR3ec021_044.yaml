body:
  text: 進本草品彙精要續集表太醫院吏目臣王道純醫士臣江兆元謹奏為欽奉上諭事康熙三十九年七月二十六日武英殿監造臣赫世亨臣張常住奉聖旨發下明弘治年繪像本草品彙精要四十二卷再行繪錄一部命臣道純臣兆元查對校正其中字句錯落註釋舛誤者臣道純臣兆元單開請旨悉蒙聖鑑改定其品彙所載比綱目尚少四百八十餘條復命臣道純臣兆元補足以備參考欽此臣等考校綱目謹照舊例編集十卷復將脈訣四言舉要附以註釋上呈睿覽臣等謹奉表稱進者伏以芝圃云凝仙草貢山川之瑞璇源露潤靈枝敷堥谷之芳德至於地而無地不春仁及於物而有物皆壽猶以傳心者傳書邈若赤文碧字復以醫民者醫國重披綠籍青囊永垂千載之模欣承曠世之遇臣等誠惶誠恐稽首頓首上言竊惟素問傳於黃帝微言與大易同觀藥性嘗自神農取類比爾雅更悉弘景註釋於梁代世勣重刊於唐時郭璞蘇恭之賢互有證據慎微劉翰之輩相繼增修降及前明李時珍兼眾美以集成迨至本朝張朝璘搜散帙而傳世要皆大醇而小疵遂使金韜而玉璞茲蓋伏遇皇帝陛下功侔造化道合裁成氣順可以補天不待女媧彩石風行可以偃地無煩炎帝頳鞭乃己溺為懷每當蘊隆而問疾苦如傷在抱時施藥餌以濟煢羸謂六經雖劑世之綱維而百卉亦生人之祥瑞況良醫必資良藥奇方端賴奇書爰頒琅函重修善本復宣玉詔指示多方以為內經諸部在前代俱有刻文至於品彙一編惟弘治始成繪像但參之綱目缺漏等於蠹鱏核其字音謬訛多於亥豕務使精意究詳勤加讎校踵其事無妨青本於藍增其華勿令朱奪於紫屢煩聖心之區畫遂成寶籍之輝煌開上林之園禽魚飛躍入萬花之谷錦繡繽紛從此延壽丹泉可以披圖細看長生藥餌無庸涉海遠求臣等材微續斷職典從容難上太醫之箴莫辨桐君之錄仰承寵命不棄草木無知奉詔欣懷已同鳥獸咸若敢不勉效寸長少圖一得因思脈訣雖有四診而舉要更有四言崔嘉彥著之於前李言聞補之於後然意旨拘於聲韻而字句有類歌歈求顯愈迷茫若擿埴欲明反晦渾如面牆蓋必奧義湛於鏡中而後陽春生於指下用是參證群書釋以註解敢曰老馬識途庶幾腐螢照壁仰祈聖擇芻蕘海容支派鉛黃末業獲入金匱石室之藏纖芥微名上近日照月臨之大小草空沾雨露遠志無補涓埃惟居太和之時慶萬物之登壽域遊郅隆之世觀庶品之樂春臺別無報稱祗益悚懼臣等無任瞻天仰聖激切屏營之至謹奉表稱進以聞康熙四十年十一月日臣王道純臣江兆元
