body:
  text: 卷之四玉石部中品之下石之水食鹽無毒煎煉成食鹽主殺鬼蠱邪疰毒氣下部𧈟瘡傷寒寒熱吐胸中痰癖止心腹卒痛堅肌骨名醫所録名山鹽木鹽末鹽印鹽解鹽海鹽白鹽黑鹽柔鹽赤鹽澤鹽臭鹽石鹽馬齒鹽駁鹽青鹽井鹽鹽枕地圖經曰舊不著所出州郡陶隱居云有東海北海鹽及河東鹽池梁益有鹽井交廣有南海鹽西羌有山鹽胡中有木鹽而色類不同以河東者為勝河東鹽今解州安邑兩池所種最為精好又有並州兩監末鹽乃刮咸煎煉不甚佳其咸蓋下品所著滷咸生河東鹽池者是也下品又有大鹽生邯鄲及河東池澤蘇恭云大鹽即河東印鹽人之常食者形粗於末鹽乃似今解鹽也解人取鹽於池傍耕地沃以池水每鹽南風急則宿昔成鹽滿畦彼人謂之種鹽東海北海南海鹽者今滄密楚秀溫臺明泉福廣瓊化諸州官場煮海水作之以給民食者又謂之澤鹽醫方所謂海鹽是也其煮鹽之器漢謂之牢盆今或鼓鐵為之或編竹為之上下周以蜃灰廣丈深尺平底置於灶皆謂之鹽盤南越志所謂織篾為鼎和以牡蠣是也然後於海濱掘地為坑上布竹木覆以蓬茅積沙於其上每潮汐沖沙滷咸淋於坑中水退則以火炬照之滷氣衝火皆滅則滷氣多火不滅則滷氣少取滷注盤中煎之頃刻而就梁益鹽井者今歸州及四川諸郡皆有鹽井汲其水以煎作鹽如煮海之法但以食彼方之民耳然羌胡之鹽種類自多陶注又云虜中有九種白鹽食鹽常食者黑鹽柔鹽赤鹽駁鹽臭鹽馬齒鹽之類今人不能遍識本經云北海青南海赤今青鹽從西羌來者形塊方稜明瑩而青黑色最奇又通泰海州並有停戶刮咸煎鹽輸官如並州末鹽之類以供給江湖極為饒衍其味乃優於並州末鹽也濱州亦有人戶煎煉草土鹽其色最粗黑不堪入藥但可啖馬耳其大鹽戎鹽滷咸光明鹽詳具下條用白淨者色青白味咸性溫軟氣氣之薄者陽中之陰臭朽主吐痰涎止霍亂助漏蘆為之使制炒治療藥性論云殺一切毒氣鬼疰尸疰氣及小兒卒不尿炒鹽於臍中尉之面上五色瘡及蠼螋尿瘡蚯蚓咬瘡鹽湯綿浸拓瘡上日易五六度瘥以空心揩齒吐水中洗眼夜見小字若婦人隱處疼痛以青布裹鹽尉之下部𧈟蟲蝕瘡炒鹽布裹坐尉之兼主火灼瘡日華子云治霍亂心痛及金瘡明目止風淚邪氣一切蟲傷瘡腫消食滋五味通大小便小兒疝氣並內腎氣以葛袋盛於戶口懸之父母用手捻盡當愈別録云治腳氣鹽蒸候熱布裹踏之令腳心熱愈肝臟氣虛風冷搏於筋遍體轉筋入腹不可忍者及一切風身體如蟲行並用熱鹽湯漬之效治天行後脅脹滿炒鹽尉之小便澀亦尉臍下兒逆生以鹽塗兒足底並摩産婦腹上即順凡諸瘡癬嚼鹽塗之治耳中卒痛蒸鹽尉之又金瘡中風煎鹽令熱瀝汁瘡上效穀道中疼痛炒鹽尉之治蜈蚣咬痛嚼鹽沃之及鹽湯浸痛即止卒中尸遁其壯腹脹氣急衝心服鹽湯取吐瘥中毒箭以鹽貼瘡上灸鹽三十壯補日華子云暖火臟長肉補皮膚合治用鹽如雞子大青布裹燒赤內酒中頓服治心痛中惡或連腰臍疼當吐惡物合槐白皮切蒸治腳氣炒鹽一大匙合童子小便一升溫服之治霍亂上不得吐下不得利出冷汗氣欲絶者此湯入口即吐絶氣復通鹽一升內粗瓷瓶中實築泥頭訖於炭火燒勿令瓶破候赤鹽如水汁去火冷即凝破瓶取之合豉一升炒桃仁一兩麩炒巴豆二兩去心膜炒令出油不可過熟煉蜜丸如桐子大每服三丸皆平旦服治天行時氣豉汁茶下心痛酒下血痢飲下鬼瘧茶飲下骨熱蜜湯下忌冷漿水服藥後吐利勿怪吐利多煎黃連汁服止之此藥合就密器盛之勿令泄氣合皂莢同炒令赤研揩齒治血𧈟齒及牢牙鹽三兩合豉二兩搗捏作餅安新瓦上炙熱尉小兒臍風撮口炒鹽合酒服治金傷經脈及大脈血出不止者鹽合醋作湯服治氣淋臍下切痛禁多食令人失色膚黑及傷肺損筋力及水腫人不宜食忌不宜與甜瓜同食令人霍亂髮渴病嗽大鹽無毒土生大鹽出神農本經主令人吐以上朱字神農本經主腸胃結熱喘逆胸中病以上黑字名醫所録地圖經曰大鹽生邯鄲及河東池澤唐本注云大鹽即河東印鹽人常食者形粗於末鹽故名大鹽衍義曰大鹽新者不苦久則鹹苦今解州鹽池所出者皆成斗子其形大小不等久亦苦海水煎成者但味和二鹽互有得失入藥及金銀作多用大鹽及解鹽傍海之人多黑色蓋日食魚鹽此走血之驗也謹按解人取鹽於池傍耕地沃以池水每南風急則宿夕而成其味苦而力薄較諸海水煎成者為不及遠矣所謂煮海為鹽煮池為鹽鹽苦而易敗故詩云王事靡盬是也時生無時採無時色青白味甘鹹性寒氣氣薄味厚陰中微陽臭朽主腸胃結熱及止痛行接諸藥入腎助漏蘆為之使制研細用滷咸無毒土生滷咸出神農本經主大熱消渴狂煩除邪及下蠱毒柔肌膚以上朱字神農本經去五臟腸胃留熱結氣心下堅食已嘔逆喘滿明目目痛以上黑字名醫所録地圖經曰滷咸生河東鹽池陶隱居云是煎鹽釜下凝滓唐本注云滷咸既生河東其河東鹽不以釜煎於此論之明非凝滓此是鹼土名滷咸今人熟皮皆用之此則鹼地掘取者是也別録云滷鹽純制四黃可作焊藥時生無時採無時色黃白味苦鹹性寒軟氣氣薄味厚陰也臭朽主散結氣軟肌膚制研細用戎鹽無毒附鹽藥土生戎鹽出神農本經主明目目痛益氣堅肌骨去毒蠱以上朱字神農本經心腹痛溺血吐血齒舌血出以上黑字名醫所録名胡鹽禿登鹽陰土鹽地圖經曰生胡鹽山及西羌北地酒泉福祿城東南角北海青南海赤者是也補下藥多用青鹽疑此即戎鹽今青鹽從西羌來者形塊方稜明瑩而青黑色最奇北胡來者作大塊而不光瑩又多孔竅若蜂窠狀色亦淺於西鹽彼人謂之鹽枕入藥差劣陶隱居云今虜中甚有從涼州來芮芮河南使及北部胡客從敦煌來亦得之自是稀少耳其形作塊片或如雞鴨卵或如菱米色紫白味不甚咸口嘗氣臭正如毈音假雞子臭者為真又有一種鹽藥味咸無毒生海西南雷羅諸州山谷似芒硝末細入口極冷南人多取敷瘡腫少有服者恐極冷入腹傷人且宜慎之唐本注云其戎鹽即胡鹽沙州名為禿登鹽廓州名為陰土鹽生河岸山阪之陰土石間塊大小不常堅白似石燒之不鳴灹爾戎鹽赤黑二色者纍卵干汞制丹砂時生無時採十月取用顆塊者佳質類石膏而堅色青味咸性寒氣味厚於氣陰也臭朽主化堅積制研細用治療日華子云除五臟癥結心腹積聚痛瘡疥癬衍義曰除目中瘀赤澀昏陳藏器云鹽藥主眼赤眥爛風赤細研水和點目中入腹去熱煩痰滿頭痛明目鎮心水研服之又主虴蛇惡蟲毒疥癬癰腫瘰癧水消服之著瘡正爾摩敷補日華子云助水臟益精氣禁性冷不宜多服光明鹽無毒土生光明鹽主頭面諸風目赤痛多眵音蚩淚名醫所録名石鹽聖石地圖經曰生鹽州五原鹽池下鑿取之大者如升皆正方光徹又階州一種生山石中不由煎煉自然成鹽色甚明瑩彼人甚貴之云即光明鹽也時生無時採無時用白淨光徹者佳質類方解石色白味鹹甘性平軟氣味厚於氣陰中之陽臭朽制研細用石之石緑鹽無毒土石生緑鹽主目赤淚出膚翳眵暗名醫所録地圖經曰以光明鹽硇砂青銅屑釀之為塊而色緑其真有出焉耆國水中石下取之狀若扁青空青別録云波斯國在石上生按舶上將來為之石緑裝色久而不變中國以銅醋造者不堪入藥色亦不久時生無時採無時用緑色成塊者好質狀如扁青空青色緑味鹹苦辛性平氣味厚於氣陰中之陽臭朽主明目消翳制研細用治療海藥云治小兒無辜疳氣石之金鐵有毒土生鐵主堅肌耐痛神農本經地圖經曰單言鐵者鍒鐵也諸鐵不著所出州土今江南西蜀有爐冶處皆有之鐵乃黑金也其體堅重至於熔冶然後成器蓋鐵有生有熟有鋼有精有落有粉並華粉胤粉之類祈文立條而鑐鐵乃再三拍打以作鐷者亦謂之熟鐵也時採無時用鍒鐵質類磁石色黑味辛性平散氣氣之薄者陽中之陰臭腥反畏磁石石灰炭解制石亭脂毒生鐵土生生鐵主療下部及脫肛名醫所録地圖經曰出江南西蜀有爐冶處有之初煉去礦用以鑄寫器物者為生鐵即陶隱居所謂不破鑐音柔鎗音錚釜之類是也時採無時用鑄成器物者色黑味辛性微寒氣氣之薄者陽中之陰臭腥主鎮心惡瘡制日華子云鍛後飛淘去粗赤汁烘乾用或燒紅投淬酒中或水中並堪用治療日華子云除癇疾鎮心安五臟能黑鬚發及惡瘡疥癬別録云熊虎所傷毒痛煮令有味洗之治脫肛久不愈以生鐵煮水洗之日再合治燒赤投酒中飲之仍以磁石塞耳中日一易夜去之旦別著治耳聾以一斤合酒三升煮取一升服之療被打瘀血在骨節及脅外不去燒赤淬水二七遍浴療小兒熛瘡即爛瘡也合蒜生油摩敷蜘蛛咬鐵粉無毒鍛鍊成鐵粉主安心神堅骨髓除百病變白潤肌膚令人不老體健能食久服令人身重肥黑合和諸藥各有所主名醫所録地圖經曰舊不著所出州郡今江南爐冶處皆有之其造粉飛煉之法文不多載人以雜鐵作屑飛之令體重真鋼則不爾時人錯柔鐵屑和針砂飛粉市之飛煉家亦莫能辨也謹按雷公炮炙論序云鐵遇神砂如泥似粉竊嘗試之不就其亦祕而不悉乎博詢術家得究其奧遂令經目法煉載之不為無稽據其方以鐵十兩不限生熟入銷銀罐內熔化為汁以塊雄黃五兩徐徐投入常令鐵箸攪之候黃盡復加猛火約人行百步許傾出候冷取輕脆者研細入藥其存性者不堪用也砒與硫黃亦能制粉但其毒甚服之傷生慎之慎之用粉質類針砂而細色黑味咸性平氣味厚於氣陰中之陽臭腥主安心神堅骨髓鋼鐵無毒鍛鍊成鋼鐵主金瘡煩滿熱中胸膈氣塞食不化名醫所録名跳音條鐵地圖經曰出江南西蜀有爐冶處皆有之其鋼鐵以生柔相雜和用以作刀劍鋒刃者是也時採無時用堅精而脆者色黑味甘性寒氣氣之薄者陽中之陰臭腥鐵落無毒鐵落出神農本經主風熱惡瘡瘍疽瘡痂疥氣在皮膚中以上朱字神農本經除胸膈中熱氣食不下止煩去黑子可以染皂以上黑字名醫所録名鐵液地圖經曰出牧羊平澤及祊音伻城或析城今江南西蜀有爐冶處皆有之其鐵落乃鍛家燒鐵赤沸砧上打落細皮屑俗呼為鐵花是也時採無時用屑色黑味辛甘性平散氣氣之薄者陽中陰臭腥主風熱諸瘡治療日華子云除心驚邪一切毒蛇蟲及蠶咬漆瘡腸風痔瘻脫肛時疾熱狂並染鬚髮鐵華粉無毒附鐵胤粉鐵華粉主安心神堅骨髓強志力除風邪養血氣延年變白去百病名醫所録地圖經曰出江南西蜀有爐冶處皆有之其造鐵華粉之法取鋼鍛作葉如笏或團平面磨錯令光淨以鹽水灑之於醋甕中陰處埋之百日鐵上衣生鐵華成矣此鐵之精華功用強於鐵粉也日華子云有鐵胤粉止驚悸虛癇鎮五臟去邪氣強志壯筋骨治健忘冷氣心痛痃癖癥結脫肛痔瘻宿食等及敷竹木刺其所造之法與華粉同惟懸於醬瓿上就潤地及刮取霜時研淘去粗汁鹹味烘乾亦入藥用用霜色紫味咸性平軟氣味厚於氣陰中之陽主安神養血制刮取霜細搗篩入乳鉢研如面入諸藥用治療別録云治心虛風邪精神恍惚以經使鏵鐵四斤炭火燒令赤投醋中如此七遍即堪打碎如棋子大水二斗浸二七食後服一小盞愈合治合棗膏為丸服之隨所冷熱去百病鐵精附鐵爇淬鐵水針砂鍛鑕下鐵屑刀刃犁鑱尖鐵精出神農本經主明目化銅以上朱字神農本經療驚悸定心氣小兒風癇陰潰脫肛鍛鑕下鐵屑味辛平無毒主鬼打鬼注邪氣水漬攪令沫出澄清服之鐵爇主惡瘡蝕𧈟金瘡毒物傷皮肉止風水不入入水不爛手足皸折瘡根結筋瘰癧毒腫染髭發令永黑並及熱未凝塗之少頃當乾硬項邊癧子以桃核燒熏之又殺蟲立效淬鐵水味辛無毒主小兒丹毒飲一合針砂性平無毒堪染白為皂及和沒石子染須至黑飛為粉功用如鐵粉刀刃味辛無毒主蛇咬毒入腹者取兩刀於水中相磨飲其汁又兩刀於耳門上相磨敲作聲主百蟲入耳聞刀聲即自出也鐵屑治驚邪癲癇小兒客忤消食及冷氣並煎汁服之犁鑱尖浸水名為鐵精可制硃砂石亭脂水銀毒以上黑字名醫所録地圖經曰舊不著所出州郡今江南西蜀有爐冶處皆有之乃鍛鐵灶中飛出如塵紫色而輕虛可以摩瑩銅器者是也日華子云犁鑱尖浸水名為鐵精二説意實矛盾謹考諸方所用者皆曰鐵精粉誠如經之所云彼犁鑱浸水僅可制硃砂石亭脂水銀毒於治病之功無所取矣及鍛鑕下鐵屑鑕乃鐵砧也此爐冶處打鐵砧下屑耳又鐵爇以竹木爇火於刀斧刃上燒之津出如漆者一名刀煙江東人多用之以防水是矣若淬鐵水此打鐵器時堅鐵槽中水也針砂即作針家磨鑢之細末爾若其治病之功當各適其用焉時採無時用粉質類塵而輕虛色紫味辛性平微溫氣氣厚味薄陽中之陰臭腥主驚悸風癇治療別録云産後陰下脫以粉推內即入蛇骨刺人毒痛以粉一匕管吹瘡內並敷陰腫小兒因痢肛門脫合治合羊脂攪令稠布裹炙熱尉陰脫合雞肝和為丸桐子大每服五丸酒下治食中有蠱毒腹內堅痛面目青黃淋露骨立病變無常禁服多傷肺鐵漿有小毒鐵漿主鎮心癲癇發熱急狂走六畜癲狂人為蛇犬虎狼毒刺惡蟲等齧服之毒不入內名醫所録地圖經曰出江南西蜀有爐冶處皆有之取諸鐵於器中以水浸之經久色青沫出即堪染皂兼解諸毒入腹別説云鐵漿即是以生鐵漬水服餌者日取飲旋入新水日久鐵上生黃膏則力愈勝令人肌體輕健唐太妃所服者乃此也若以染皂者為漿其酸苦臭澀不可近況服食乎時採無時用漿色青味微咸性寒氣味厚於氣陰也臭腥主癲狂發熱制以水浸經久色青沫出者為度治療別録云洗消漆瘡並時氣病骨中熱生疱瘡豌豆瘡飲之瘥稱錘無毒附鐵杵故鋸鑰匙鑄寫成稱錘主賊風止産後血瘕腹痛及喉痹熱塞並燒令赤投酒中及熱飲之時人呼血瘕為兒枕産後即起痛不可忍無錘用斧名醫所録謹按孟子曰權然後知輕重蓋權稱錘也有銅者有鐵者雖皆熔冶以成之然性質既殊功效亦異用以治病當擇而施之用古者佳色黑味辛性溫銅稱錘平氣氣之厚者陽也臭腥主産後血瘕腹痛制燒赤漬酒中用合治鐵稱錘燒令赤淬酒中飲之治妊娠卒下血銅稱錘燒令赤淬酒中服之治産難並橫逆産者鐵杵鐵斧並燒令赤投酒中飲之治婦人橫産故鋸燒令赤漬酒中及熱飲治誤吞竹木入喉咽出入不得者鑰匙同生薑醋小便煎服治婦人血噤失音沖惡弱房人煎湯服亦得鐵杵鐵錢燒令赤投酒中飲之治胞衣不下馬銜無毒馬銜主難産小兒癇産婦臨産時手持之亦煮汁服一盞名醫所録地圖經曰馬銜即馬勒口鐵也處處有之古舊鋌者堪作醫家針用謹按鐵體堅重其性鎮墜故有治癇之功馬乃行地無疆則順而健矣夫欲馳者必藉勒以先之故用催生亦取其健順之義爾色黑味微咸性平氣味厚於氣陰中之陽臭腥主婦人難産小兒驚癇制煮汁用治療別録云走馬喉痹喉中深腫連頰壯熱吐氣數者用馬銜一具水三大盞煎取一盞半分為三服石之石太陰玄精無毒附鹽精鹵地生太陰玄精主除風冷邪氣濕痹益精氣婦人痼冷漏下心腹積聚冷氣止頭疼解肌名醫所録地圖經曰出解縣解池及通泰州積鹽倉中亦有之其色青白如龜背者佳蓋稟陰數而成故有六出因名太陰玄精也近地亦有色赤青白大片者次之沈存中雲大滷之地即生陰精石是也解池一種鹽精無毒味更鹹苦青黑色大者三二寸形似鐵鏵嘴三月四月採亦主除風冷又名泥精蓋玄精之類也古方不見用者近世補藥及治傷寒多用之時生無時採無時用龜背者為好質類井泉石色青白味微咸性溫軟氣味厚氣薄陰中之陽臭朽主益精氣消積聚制研細用合治合硝石硫黃各二兩硇砂一兩細研入瓷瓶中固濟以火半斤於瓶子周一寸脅之約半日候藥青紫色住火待冷取出用臘月雪水拌令勻濕入瓷罐中放屋後北陰下陰乾又入地埋二七日取出細研以麵糊和丸如雞頭實大先用熱水浴後以艾湯研下一丸以衣蓋出汗名正陽丹瘵傷寒三日頭痛壯熱四肢不利石之金車轄無毒車轄主喉痹及喉中熱塞燒令赤投酒中及熱飲之名醫所録謹按轄與𬠜同即軸頭金也以脂膏塗之使其滑澤設之而後行不駕則脫之時所謂載脂載𬠜還車言邁遄臻於衛實取回旋至速之義今療喉痹用之以其鐵體鎮重而所稟之捷速爾用鐵色黑味咸性平寒氣味厚於氣陰也臭腥主喉閉制燒赤淬酒用治療別録云治小兒大便失血用一枚燒赤內水中服合治用火燒赤投酒中候冷飲之療妊娠咳嗽釭中膏釭音工中膏主逆産以膏畫兒腳底即正又主中風發狂取膏如雞子大以熱醋攪令消服之名醫所録謹按周禮考工記曰轂也者以為利轉也轂非正不行然車之用在轂轂之用在釭蓋釭乃轂中之鐵其軸端鐵曰鐧轂中鐵曰穿鐧穿之外有捎釘曰轄穿即釭也引重致遠欲其滑利故用油以潤之鐧穿轄磨蕩日久遂成脂膏因其流行無滯所以取治逆産而有轉正速下之功前人立意殊深切矣用脂垢色黑臭腥主中風逆産治療別録云諸蟲入耳取塗耳孔中即出合治合酒服治妊娠婦熱病燒末合酒調服療妊娠腹中痛釭頭脂內酒中溫服療産後陰脫亦治咳嗽車脂無毒車脂主卒心痛中惡氣以溫酒調及熱攪服之又主婦人奶乳乳癰取脂熬令熱塗之亦和熱酒服名醫所録地此即行使車穿上油脂是也今北地多有之收瓷器貯之用脂色黑味辛性散氣氣厚於味陽也臭腥主瘡癰治療陳藏器云消蝦蟆及蝌蚪蠱得之心腹脹滿口乾思水不能食悶亂大喘而氣發者以半升漸漸服之其蠱即出並治小兒驚啼取一豆許內臍中瘥合治合綿裹塞耳中療聤耳膿血出銀膏無毒煉成銀膏主熱風心虛驚癇恍惚狂走膈上熱頭面熱風衝心上下安神定志鎮心明目利水道治人心風健忘名醫所録地圖經曰此膏以符陵平土水銀和白錫及銀薄合成之凝硬如銀堪補牙齒缺落謹按本經合煉之法未詳詢之方士備云其法先以汞一百分銀箔四十五分殺作泥子後用白錫九百分內鐵鍋中火熔成汁出爐約人行二十步將泥子投入令勻則成膏矣其煉之法以人行二十步為則者恐錫太熱則汞飛走太冷則錫堅凝與其不相合也時經試煉果如所言質類銀色白味辛性大寒散氣氣之薄者陽中之陰臭朽主安神定志清心明目石之石黑羊石土生黑羊石解諸藥毒名醫所録地圖經曰生兗州宮山之西春中掘地採之以黑色有牆壁光瑩者為上時採春月取質類方解石色黑味淡性熱氣氣厚味薄陽中之陰臭朽制研細水飛用白羊石無毒土生白羊石解衆藥毒名醫所録地圖經曰生兗州白羊山春中掘地取之以白瑩者為良時採春月取色白味淡性生冷熟熱氣氣味俱薄陰中之陽臭朽制研細水飛用膚青無毒石生膚青出神農本經主蠱毒及蛇菜肉諸毒惡瘡以上朱字神農本經不可久服令人瘦以上黑字名醫所録名推青推石地別録云生益州川穀俗方及仙經並無用此者亦相與不復識色青味辛鹹性平散軟氣氣味俱薄陰中之陽主惡瘡諸毒石蛇無毒石生石蛇主解金石毒名醫所録地圖經曰出南海水傍山石間其形盤屈如蛇無首尾內空紅紫色又如車螺不知何物所化大抵與石蟹同類功用亦相近衍義曰本經不收自開寶本草添附其色如古牆上土盤結如楂梨大中空兩頭巨細一等不與石蟹同類蟹則真蟹也蛇非真蛇今人用之絶少時採無時用左盤者為好質類蛇而無首尾色紅紫味咸性平軟氣味厚於氣陰中之陽臭朽制研細水飛用二十種陳藏器余鼠壤土主中風筋骨不隨冷痹骨節疼手足拘急風掣痛偏枯死肌多收取曝乾用之屋內壖下蟲塵土治惡瘡久不瘥干敷之亦油調塗之鬼屎主人馬反花瘡刮取和油塗之生陰濕地如屎亦如地錢黃白色寡婦床頭塵土主人耳上月割瘡和油塗之效也床四腳下土主猘犬咬人和成泥敷瘡上灸之一七壯瘡中得大毛者愈猘犬狂犬也瓦甑主魘寐不寤覆人面疾打破之覺好魘及無夢取火燒死者灰著枕中履中即止甘土無毒主去油垢水和塗之洗膩服如灰水主草葉諸菌毒熱湯末和之出安西及東京龍門土底澄取之二月上壬日取土泥屋四角大宜蠶也柱下土無毒主腹痛暴卒者末服方寸匕胡燕窠內土無毒主風瘙癮疹末以水和敷之又巢中草主卒溺血燒為灰飲服又主惡刺瘡及浸淫瘡遍身至心者死亦用之道中熱塵土主夏中熱暍死取土積心口少冷即易氣通則蘇亦可以蓼汁灌之正月十五日燈盞令人有子夫婦共於富家局會所盜之勿令人知之安臥床下當月有娠仰天皮無毒主卒心痛中惡取人膏和作丸服之一七丸人膏者人垢汙也揩取仰天皮者是中庭內停汙水後乾地皮也取捲起者一名掬天皮亦主人馬反花蒼和油塗之佳蟻穴中土取七枚如粒和醋搽狐刺瘡古磚熱燒之主下部久患白痢膿泄下以物裹上坐之入秋小腹多冷者亦用此古磚煮汁服之主噦氣又令患處尉之三五度瘥又主婦人帶下五色俱治之取黃磚石燒令微赤熱以面五味和作煎餅七個安磚上以黃瓜蔞敷面上又以布兩重患冷病人坐上令藥氣入腹如熏之有蟲出如蠶子不過三五度瘥富家中庭土七月丑日取之泥灶令人富勿令人知百舌鳥窠中土末和釅醋敷蚯蚓及諸惡蟲咬瘡豬槽上垢及土主難産取一合和麵半升烏豆二十顆煮取汁服之故茅屋上塵無毒主老嗽取多年煙火者拂取上塵和石黃款冬花婦人月經衣帶為末以水和塗於茅上待乾內竹筒子中燒一頭以口吸之入咽喉數數咽之無不瘥也諸土有毒怪曰羵羊掘土見之不可觸已出上土部土有氣觸之令人面黃色上氣身腫掘土處謹之多斷地脈古人所忌地有仰穴令人移也
