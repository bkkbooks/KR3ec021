body:
  text: 卷之九草部上品之下草之草續斷無毒植生續斷出神農本經主傷寒補不足金瘡癰傷折跌續筋骨婦人乳難久服益氣力以上朱字神農本經崩中漏血金瘡血內漏止痛生肌肉及踠傷惡血腰痛關節緩急以上黑字名醫所録名龍豆屬折接骨南草槐苗圖經曰三月以後生苗干四稜似苧麻葉亦類之兩兩相對而生四月開花紅白色似益母花根如大薊赤黃色按範汪方云即是馬薊與小薊菜相似但大如小薊爾葉似旁翁菜而小厚兩邊有刺刺人其花紫色與今越州生者相類今之市者亦有數種人莫能辨醫家用之但以節節斷皮黃皺者為真也地圖經曰生常山山谷今陝西河中興元府舒越晉絳州道地蜀川者佳時生春生苗採七月八月取根收陰乾用根脂潤肥大者為好質類玄參而黃皺色赤黃味苦辛性微溫氣氣厚於味陽中之陰臭香主續筋骨行足厥陰經助地黃為之使反惡雷丸制雷公云去向里硬筋了酒浸一伏時橫切碎焙乾用治療藥性論云主絶傷去諸溫毒宣通經脈日華子云破癥結瘀血消毒腫腸風痔瘻乳癰瘰癧撲損婦人産前後一切病面黃虛腫縮小便止泄精尿血胎漏子宮冷別録云産後心悶手足煩熱厭厭氣欲絶血暈心頭硬乍寒乍熱補日華子云助氣調血補五勞七傷贋草茆根為僞漏蘆無毒陳藏器云有毒植生漏蘆出神農本經主皮膚熱惡瘡疽痔濕痹下乳汁久服輕身益氣耳目聰明不老延年以上朱字神農本經止遺溺熱氣瘡癢如麻豆可作浴湯以上黑字名醫所録名野蘭老翁花莢蒿苗圖經曰莖葉似白蒿有莢花黃生莢端莖若筋大其子作房類油麻房而小七八月後皆黑異於衆草今諸郡所圖上惟單州者差相類沂州者花葉頗似牡丹秦州者花似單葉寒菊紫色五七枝同一幹上海州者花紫碧如單葉蓮花花萼下及根傍有白茸裹之根黑色如蔓荊而細又類蔥本淮甸人呼為老翁花三州所生花雖別而葉頗相類但秦海州者葉更作鋸齒狀爾一物而殊類若此醫家何所適從當依舊說以單州者為勝地圖經云生喬山山谷今京東州郡及秦州海州沂州皆有之蜀本圖經曰曹兗州下濕地最多道地江寧及上黨者佳單州出者為勝時生春生苗採八月取根收日乾用南人用苗北人用根色黑味苦鹹性大寒泄氣氣薄味厚陰也臭腥主瘡瘍下乳汁助連翹為之使制雷公云去蘆以甘草同蒸從巳至申去甘草用治療陶隱居云除諸瘻瘡疥藥性論云治身上熱毒風生惡瘡皮肌瘙癢癮疹陳藏器云殺蟲洗瘡疥用之合治合連翹為使治小兒壯熱通小腸泄精尿血風赤眼乳癰發背瘰癧腸風排膿補血並撲損續筋骨敷金瘡止血長肉通經脈杵為散以一錢匕合豬肝一兩鹽少許水煮熟空心頓服治小兒無辜疳肚脹或時瀉痢冷熱不調根合苦酒摩療瘡疥贋木藜蘆漏為僞草之木營實無毒蔓生營實出神農本經主癰疽惡瘡結肉跌筋敗瘡熱氣陰蝕不瘳利關節以上朱字神農本經久服輕身益氣根止泄痢腹痛五臟客熱除邪逆氣疽癩諸惡瘡金瘡傷撻生肉復肌以上黑字名醫所録名薔薇牆麻牛棘牛勒薔蘼山棘苗蜀本圖經云營實即薔薇子也莖間多刺蔓生子若杜棠子其花有百葉八出六出或赤或白入藥以白花者為良其根可煮釀酒莖葉亦可作飲地圖經曰生零陵川穀及蜀郡今所在有之時生春生苗採八月九月取實收陰乾用子根質類杜棠子色赤白味酸根苦澀性溫微寒收根冷氣氣薄味厚陰中之陽臭香主瘡瘍治療藥性論云除白禿瘡五臟客熱日華子云消熱毒風癰疽惡瘡疥癬牙齒痛辟邪氣通血結止赤白痢腸風瀉血小兒疳蟲肚痛別録云鯁及刺不出以薔薇灰末服方寸匕日三亦治折箭刺入肉膿囊不出堅燥及鼠撲服之十日鯁刺皆穿皮出根煮濃汁稍稍咽療瘡及胸中生瘡久不瘥者合治根合酒飲治少小睡中遺尿不自覺草之草天名精植生天名精出神農本經主瘀血血瘕欲死下血止血利小便除小蟲去痹除胸中結熱止煩渴久服輕身耐老以上朱字神農本經逐水大吐下以上黑字名醫所録名天門精麥句姜豨蘞地菘天蔓荊鹿活草豕首彘顱天蕪荊蟾蜍藍豨首覲玉門精蝦蟆藍劉𢣺草大鞠蓫麥茢音列薽音真苗圖經曰夏秋抽條頗似薄荷花紫白色南人謂之地菘香氣似蘭故名蟾蜍蘭狀如藍故名蝦蟆藍其味甘辛故名麥句姜一名豕首爾雅所謂茢薽豕首是也江東人用此以煼音炒蠶蛹按下品又有地菘條云所主功狀與此正同及據陳藏器解紛合陶蘇二說亦以天名精為地菘則此條不當重出雖陳藏器拾遺別立地菘條此乃陳藏器自成一書務多條目爾解分拾遺亦自差互後人即不當仍其謬而重有新附也今刪去地菘條地圖經曰生平原川澤江湖間皆有之時生春生苗採五月取收曝乾用莖葉質類薄荷色青緑味甘辛性寒緩氣氣之薄者陽中之陰臭香主清熱消毒助垣衣地黃為之使治療唐本注云破血生肌止渴利小便殺三蟲除諸毒腫疔瘡瘻痔金瘡內射身癢癮疹不止揩之立已藥性論云治瘡止血及鼻衄不止決明子無毒植生決明子出神農本經主青盲目淫膚赤白膜眼赤痛淚出久服益精光輕身以上朱字神農本經療唇口青以上黑字名醫所録名薢茩芵茪苗圖經曰夏初生苗高三四尺許根帶紫色葉似苜蓿而大七月有花黃白色其子作穗如青緑豆而鋭爾雅云薢茩芵茪釋曰藥草芵明也郭璞注云葉黃鋭赤華實如山茱萸或曰䔖也關西謂之薢茩與此種頗不類又有一種葉如江豆子形似馬蹄故謂之馬蹄決明也衍義曰決明子苗高四五尺春亦為蔬秋深結角其子生角中如羊腎今湖南北人家園圃所種甚多或在村野或成段種圖經言葉似苜蓿而闊大甚為允當地圖經曰生龍門川穀廣州桂州今處處有之時生夏初生苗採十月十日取實收陰乾百日用子色青碧味鹹苦甘性平微寒泄氣氣厚味薄陰中陽也臭朽主益肝明目助蓍實為之使反惡大麻子治療藥性論云利五臟除肝家熱服百日見夜光日華子云為末水調塗消腫毒㶸大腸穴療頭痛貼腦心止鼻洪作枕勝黑豆治頭痛明目補日華子云助肝氣益精解蛇毒丹參無毒丹參出神農本經主心腹邪氣腸鳴幽幽如走水寒熱積聚破症除瘕止煩滿益氣以上朱字神農本經養血去心腹痼疾結氣腰脊強腳痹除風邪留熱久服利人以上黑字名醫所録名郗蟬草赤參本羊乳奔馬草山參苗圖經曰二月生苗高尺許莖幹方稜青色葉生相對如薄荷而有毛三月開花紅紫色似蘇花根赤大如指長一尺餘一苗數根冬月採者良夏日採者虛惡不甚佳也地圖經曰出桐柏山川穀及泰山陝西河東州郡亦有之道地隨州時生二月生苗採五月九月十月取收曝乾用根粗壯者佳質類川當歸而赤色赤味苦性微寒泄氣氣薄味厚陰也臭腥主養陰血除邪熱反藜蘆畏鹹水制去蘆銼碎用治療藥性論云治腳弱疼痹主中惡殺百邪鬼魅腹痛氣作吼聲能定精日華子云通利關脈除冷熱勞骨節疼痛四肢不遂排膿止痛生肌長肉破宿血生新血安生胎落死胎止血崩帶下調婦人經脈不勻血邪心煩惡瘡疥癬癭贅腫毒丹毒頭痛赤眼熱溫狂悶補日華子云養神定志合治合酒浸服療風軟腳以一兩杵為散每服熱酒調下二錢匕治寒疝小腹及陰中相引痛自汗出欲死者草之走茜根無毒蔓生茜根出神農本經主寒濕風痹黃疸補中以上朱字神農本經止血內崩下血膀胱不足踒跌蠱毒久服益精氣輕身可以染絳以上黑字名醫所録名地血茹藘茅搜牛蔓茜苗圖經曰此即今染絳草也蔓延草木上葉似棗葉而頭尖下闊三五對生節間其根紫色陸機疏云茹藘茅搜茜草也齊人謂之茜徐人謂之牛蔓今圃人或作畦種蒔故貨殖傳云卮茜千石亦比千乘之家言地利之厚也地圖經曰生喬山山谷今近處皆有之時生春生苗採二月三月八月取根收曝乾用根粗壯者為好色紫赤味苦性寒泄氣氣薄味厚陰中微陽臭朽主吐血瀉反畏鼠姑制雷公云凡使去蘆銅刀於槐砧上銼碎炒用勿犯鐵並鉛治療藥性論云治六極傷心肺吐血瀉血日華子云止鼻洪帶下産後血暈乳結月經不止腸風痔瘻瘡癤排膿及泄精尿血撲損瘀血陳藏器云除蠱毒別録云除心疸心煩心中熱合治合蘘荷葉根各三兩切以水四升煮取二升去滓適寒溫頓服治中蠱毒或吐下血如爛肝合酒煎服亦殺蠱毒贋赤柳草根為僞誤服令人患內障眼速服甘草水解之草之草飛廉無毒植生飛廉出神農本經主骨節熱脛重痠疼久服令人身輕以上朱字神農本經頭眩頂重皮間邪風如蜂螫針刺魚子細起熱瘡癰疽痔濕痹止風邪咳嗽下乳汁益氣明目不老以上黑字名醫所録名天薺飛輕伏豬木禾飛雉伏兔苗蜀本圖經曰葉似苦芙莖似軟羽葉多刻缺花紫色子白有毛唐本注云一種生山岡上者葉頗相似而無疏缺且多毛莖亦無羽根直下更無傍枝生則肉白皮黑中有黑脈干則黑如玄參用莖葉及根與圖經所云者俱有驗也地圖經曰河內川澤今處處有之時生春生苗採正月取根七月八月取花收陰乾用葉莖花根質類漏蘆色黑味苦性平泄氣味厚於氣陰中之陽臭腥主疳蝕殺蟲助得烏頭良反惡麻黃制雷公云去粗皮了杵用苦酒拌之一夜至明漉出日乾細杵用治療藥性論云主留血合治為散合漿水下之治小兒疳痢贋赤脂蔓為僞草之走五味子無毒蔓生五味子出神農本經主益氣咳逆上氣勞傷羸瘦補不足強陰益男子精以上朱字神農本經養五臟除熱生陰中肌以上黑字名醫所録名會及玄及𨹤荎蕏苗圖經曰春初生苗引赤蔓於高木長六七尺葉尖圓似杏葉三四月開黃白花類小蓮花七月成實如豌豆許生青熟紅紫爾雅云𨹤荎蕏即五味也蔓生子叢莖端疏云今有數種大抵相近而以味甘者為佳一說小顆皮皺泡者有白色鹽霜一重其味酸鹹苦辛甘味全者真也地圖經曰生齊山山谷及代郡今河東陝西州郡秦州虢州杭越間亦有唐本注云蒲州藍田山中河中府陶隱居云青州冀州道地高麗建平者佳時生春初生苗採八月取收陰乾用子滋潤而大者佳質類落葵子色赤味酸性溫收氣味厚氣輕陰中微陽臭香主咳嗽生津行手太陰經足少陰經助蓯蓉為之使反惡葳蕤勝烏頭制雷公云凡用以銅刀劈作兩片用蜜浸蒸從巳至申卻以漿水浸一宿焙乾用或去梗敲碎用治療藥性論云能治中下氣止嘔逆除熱氣病人虛而有氣兼嗽加用之日華子云明目暖水臟除風下氣消食霍亂轉筋痃癖賁豚冷氣消水腫反胃心腹氣脹止渴除煩熱補藥性論云諸虛勞令人體悅澤日華子云壯筋骨孫真人云五月常服益肺金之氣在上則滋源在下則補腎合治合黃耆人參麥門冬少加黃孽療季夏之時困乏無力無氣以動服之使人精神頓加兩足筋力湧出合人參麥門冬生脈解酒毒草之草旋花無毒蔓生旋花主益氣去面皯黑色媚好其根味辛主腹中寒熱邪氣利小便久服不飢輕身神農本經名筋根花金沸美草苗圖經曰苗作叢蔓葉似山藥而狹長花紅白夏秋間遍生田野所謂旋葍是也根無毛節蒸煮堪啖甚甘美其根似筋故名筋根根主續筋故南人皆呼為續筋根下品有旋覆花與此殊別人疑其相近殊無謂也黔南出一種旋花粗莖大葉無花不作蔓恐別是一物地圖經曰生豫州平澤今處處皆有之時生夏秋生苗採二月八月取根五月取花收根曬乾花陰乾用花根色花紅白根土黃味甘辛性溫散氣氣之厚者陽中之陰臭香主續筋骨制根洗去蘆土治療陶隱居云根煮服之除腹中冷痛陳藏器云根食之不飢及續筋骨合金瘡同苗搗汁主丹毒小兒熱毒贋杜若為僞蘭草無毒叢生蘭草出神農本經主利水道殺蠱毒闢不祥久服益氣輕身不老通神明以上朱字神農本經除胸中痰癖以上黑字名醫所録名水香燕尾香香水蘭苗衍義曰葉如麥門冬而闊且韌長及一二尺四時常青花黃中間瓣上有細紫點其春芳者為春蘭色深秋芳者為秋蘭色淡秋蘭稍難得二蘭移植小檻中置座右花開時滿室盡香與他花香又別唐白樂天有種蘭不種艾之詩正謂此蘭矣地圖經曰生大吳池澤今江陵鼎澧州山谷陰濕地之間亦有時生春生苗採四月五月取收陰乾用葉花色青味辛性平散氣氣之薄者陽中之陰臭香主痰癖惡氣治療唐本注云煮水浴療風陳藏器云主惡氣香澤可作膏塗發草之走忍冬無毒蔓生忍冬主寒熱身腫久服輕身長年益壽名醫所録名左纏藤金銀花鷺鷀藤老翁須金叉股苗唐本注云藤生繞覆草木上苗莖紫赤色宿者有薄白皮膜其嫩莖有毛葉似胡豆亦上下有毛花白蕊紫別録云此藤凌冬不凋故名忍冬草其藤左繞附樹延蔓或在園圃之上藤方而紫葉似薜荔而青三月開花五出微香蒂帶紅色花初開則色白經一二日則色黃故名金銀花本經不載治諸惡瘡而近代名醫用之多效其功猶勝於紅內消也地陶隱居云處處有之時生三月開花採十二月取莖葉收陰乾用莖葉花色青味甘性溫緩氣氣厚於味陽中之陰臭香主一切癰疽五發瘡瘍制細銼治療藥性論云消腹脹滿止氣下澼陳藏器云主熱毒血痢水痢別録云莖葉煮濃汁服治飛尸者遊走皮膚穿臟腑每發刺痛變作無常遁尸者附骨入肉攻鑿血脈每發不可得近見尸喪聞哀哭便作風尸者淫躍四肢不知痛之所在每發風昏恍得風雪便作沉尸者纏骨結臟衝心脅每發絞切遇寒冷便作尸注者舉身沉重精神錯雜常覺昏廢每節氣至則輒致大惡合治浸酒治癰疽發背初發時便當服此不問疽發何處發眉發頤或頭或頂或背或腰或脅或婦人乳癰或在手足皆有奇效煮汁釀酒補虛療風蛇床子無毒蛇床子出神農本經主婦人陰中腫痛男子陰痿濕癢除痹氣利關節癲癇惡瘡久服輕身以上朱字神農本經溫中下氣令婦人子臟熱男子陰強好顏色令人有子以上黑字名醫所録名蛇粟虺床思益繩毒盱音籲蛇米馬床牆蘼棗棘苗圖經曰三月生苗高一二尺葉青碎似芎藭作叢似蒿枝每枝上有花頭百餘結同一窠似馬芹類四五月開白花又似傘狀子黃褐色如黍米至輕虛地圖經曰生臨淄川穀及田野濕地今處處有之道地揚州襄州南京時生三月生苗採五月取實收陰乾用子質類蒔蘿而細色黃褐味苦辛甘性平散氣氣厚於味陽中之陰臭臭主除風益陽反惡牡丹巴豆貝母制雷公云須用濃藍汁並百部草根自然汁二味同浸三伏時日乾再以生地黃汁拌蒸從午至亥日乾用又微炒殺毒即不辣治療藥性論云去男子女人虛濕痹毒風𤸷痛男子腰疼浴男女陰去風冷大益陽事及大風身癢煎湯浴之瘥療齒痛及小兒驚癇日華子云除暴冷撲損瘀血腰胯疼陰汗濕癬四肢頑痹赤白帶下縮小便補日華子云暖丈夫陽氣助女人陰氣合治合豬脂治小兒癬瘡地膚子無毒叢生地膚子出神農本經主膀胱熱利小便補中益精氣久服耳目聰明輕身耐老以上朱字神農本經去皮膚中熱氣散惡瘡疝瘕強陰使人潤澤以上黑字名醫所録名地葵涎衣草益明地麥鴨舌草落帚苗圖經曰地膚子星之精也初生薄地高四五尺根形如蒿莖赤葉青大似荊芥三月開黃白花子青色或曰其苗即獨帚也密州一種根作叢生每窠有二三十莖莖有赤有黃七月開黃花其實地膚也至八月而䕸幹成可採正與此地獨帚相類按陶隱居謂莖苗可謂掃帚蘇恭云苗極弱不能勝舉二說不同蓋地土所宜而有肥瘠強弱之異爾地圖經曰生荊州平澤及田野今關中近地皆有之道地密州蜀州時生二月生苗採四月五月取葉八月十月取實收陰乾用子質類一眠起蠶砂色黃褐味苦性寒泄氣氣薄味厚陰也臭腥主益精補氣明目強陰治療藥性論云治陰卵潰疾作湯沐浴去熱風日華子云治客熱丹毒圖經曰葉療大腸泄瀉止赤白痢和氣澀腸胃解惡瘡毒唐本注云莖葉搗汁洗目去熱暗雀盲澀痛合治合陽起石同服治丈夫陰痿不起補氣益力為末酒調方寸匕治積年久疢腰痛有時發動草之走千歲虆無毒蔓生千歲虆汁主補五臟益氣續筋骨長肌肉去諸痹久服輕身不飢耐老通神明名醫所録名虆蕪常春藤苣菰苗圖經曰藤生似葛蔓延木上葉如葡萄下白而小四月摘其莖有白汁而甘五月開花七月結實八月熟時青黑微赤可食冬則葉凋此藤大者盤薄故云千歲虆即詩所謂葛虆者是也地圖經曰生泰山川穀今處處有之時生春生葉採夏秋取莖收瓷罐收貯用莖中汁質類葛藤色白味甘性平緩氣氣厚於味陽中之陰臭朽主補五臟益氣制搗取汁治療日華子云止渴悅色唐本注云主噦逆及傷寒後噦逆更良陳藏器云藤水浸吹取氣汁滴目中去熱翳赤障贋櫻薁藤為僞草之草景天無毒叢生景天出神農本經主大熱火瘡身熱煩邪惡氣花主女人漏下赤白輕身明目以上朱字神農本經諸蠱毒痂疕寒熱風痹諸不足久服通神不老以上黑字名醫所録名戒火火母救火據火慎火苗圖經曰春生苗葉似馬齒而大作層其上莖極脆弱夏中開紅紫碎花秋後枯萎亦有宿根者人家多種於中庭或以盆盛植於屋上云以闢火謂之慎火草地圖經曰生泰山山谷今南北皆有之時生春生苗採四月四日七月七日取花苗葉收陰乾用花苗葉質類馬齒莧作層而葉大色花紅紫苗葉青味苦酸性平泄氣味厚於氣陰中之陽臭朽主火瘡風疹治療圖經曰苗葉花治瘡毒及嬰孺風疹在皮膚不出者陶隱居云葉療金瘡止血洗浴小兒去煩熱驚氣藥性論云除風疹惡癢小兒丹毒及發熱驚疾花能明目日華子云葉治心煩熱狂赤眼頭疼寒熱遊風丹腫女人帶下衍義曰根研汁塗火心瘡別録云莖葉生搗敷小兒赤遊行於體上下至心即死者合治苗葉五兩合鹽三兩同研絞汁以手摩塗一切熱毒丹瘡陰乾苗葉一斤合酒五升煮取汁溫分四服治産後陰下脫茵陳蒿無毒植生茵陳蒿出神農本經主風濕寒熱邪氣熱結黃疸久服輕身益氣耐老以上朱字神農本經通身發黃小便不利除頭熱去伏瘕面白悅長年白兔食之仙以上黑字名醫所録名山陳茵苗圖經曰春初生苗高五七寸似蓬蒿而葉緊細無花實秋後葉枯莖幹經冬不死至春仍因舊苗而生新葉故名茵陳蒿今謂之山茵陳也江寧府一種葉大根粗黃白色至夏有花實階州一種名白蒿亦似青蒿而背白本土皆通入藥用之惟京下北地用為山茵陳者最佳也地圖經曰生泰山丘陵坡岸及階州和州江南北地皆有之道地江寧府絳州時生春初生苗採五月七月立秋取收陰乾用莖葉質類蓬蒿而葉緊細色青味苦性平微寒泄氣氣薄味厚陰中微陽臭香主黃疸濕熱行足太陽經制雷公云用葉八角者細銼勿犯火治療圖經曰除腦痛解傷寒發汗行肢節滯氣化痰利膈及勞倦最要亦解肌下膈去腦中煩藥性論云療眼目通身黃小便赤日華子云療天行時疾熱狂頭痛頭旋風眼疼瘴瘧女人癥瘕並閃損乏絶陳藏器云通關節去滯熱傷寒孫真人云煮汁洗療遍身風癢生瘡疥合治合山梔子秦艽升麻治傷寒後發汗不徹有留熱身面皆黃多熱期年不愈者合梔子大黃除濕熱合梔子柏皮除燥熱俱治陽黃合附子治陰黃杜若無毒叢生杜若出神農本經主胸脅下逆氣溫中風入腦戶頭腫痛多涕淚出久服益精明目輕身以上朱字神農本經眩倒目䀮䀮止痛除口臭氣令人不忘以上黑字名醫所録名杜蘅杜蓮白連白芩若芝苗圖經曰葉似姜花赤色根似高良薑而小其子如豆蔻按此草一名杜蘅而中品自有杜蘅條杜蘅爾雅所謂土滷者也杜若廣雅所謂楚衡者也其類自別然古人多相雜引用九歌云採芳洲兮杜若又離騷云雜杜蘅與芳芷王逸輩皆不分別但云香草也今醫家亦稀用之地圖經曰生武陵川澤及冤句陶隱居云今處處有之時生春生苗採二月八月取根收曝乾用根質類高良薑而細色青白味辛性微溫散氣氣之厚者陽也臭香主頭痛淚出助得辛夷細辛良反惡柴胡前胡制雷公云凡修事採得後刀刮上黃赤皮了細銼用二三重絹作袋盛陰乾臨使以蜜浸一夜至明漉出用贋鴨喋草為僞沙參無毒叢生沙參出神農本經主血積驚氣除寒熱補中益肺氣久服利人以上朱字神農本經療胃痹心腹痛結熱邪氣頭痛皮間邪熱安五臟補中以上黑字名醫所録名知母苦心志取虎鬚白參文希識美苗圖經曰苗長一二尺叢生崖壁間葉似枸杞而有叉丫七月開紫花根如葵根箸許大赤黃色中正白實者佳南土生者葉有細有大花白瓣上仍有白黏膠此為小異也地圖經曰生河內川穀及冤句般陽續山今出齊潞州而江淮荊湖州郡或有之道地淄州歸州隨州華州時生春生苗採二月八月取根收曝乾用根堅實者為好質類桔梗而微黃色黃味苦性微寒泄氣氣薄味厚陰也臭朽主清肺熱除驚氣反藜蘆惡防己治療藥性論云去皮肌浮風疝氣下墜及常欲眠養肝氣宣五臟風氣日華子云止驚煩並一切惡瘡疥癬及身癢排膿消腫毒補日華子云補虛益心肺合治合酒調服方寸匕治卒得諸疝小腹及陰中相引痛如絞自汗出欲死者草之走白兔藿無毒蔓生白兔藿出神農本經主蛇虺蜂蠆猘狗菜肉蠱毒鬼疰以上朱字神農本經風疰諸大毒不可入口者皆消除之又去血可末著痛上立消毒入腹者煮飲之即解以上黑字名醫所録名白葛苗唐本注云苗似蘿摩葉圓厚若蓴莖俱有白毛與衆草異蔓生山南俗謂之白葛地圖經曰生交州及荊襄山谷汝州南岡時生春生苗採五月六月取苗收曬乾用苗葉質類蘿摩葉圓厚有毛色白味苦性平泄氣氣薄味厚陰中之陽主風邪熱極治療藥性論云敷諸毒解諸毒草之草徐長卿無毒叢生徐長卿出神農本經主鬼物百精蠱毒疫疾邪惡氣溫瘧久服強悍輕身以上朱字神農本經益氣延年以上黑字名醫所録名別仙蹤苗圖經曰三月生青苗葉似小桑亦有似柳葉兩兩相對而有光潤七八月著子似蘿摩而小九月苗黃十月而枯根黃色似細辛微粗長而有臊氣本經又名鬼督郵其鬼督郵別自有條今俗以此代之非也地圖經曰生泰山岩谷及隴西今淄齊淮泗間亦有之時生三月生苗採三月四月八月取根收曬乾用根質類細辛而粗長色黃味辛性溫散氣氣之厚者陽也臭臊主蠱毒瘧痰制雷公云粗杵拌少蜜令遍用瓷器盛蒸三伏時日乾用石龍芻無毒叢生石龍芻出神農本經主心腹邪氣小便不利淋閉風濕鬼疰惡毒久服補虛羸輕身耳目聰明延年以上朱字神農本經補內虛不足痞滿身無潤澤出汗除莖中熱痛殺鬼疰惡毒氣以上黑字名醫所録名龍鬚龍華草續斷方賓龍珠懸莞草毒苗陶隱居云莖青細相連實赤今出近道水石處似東陽龍鬚以作席者但多節爾蜀本圖經云莖如涎叢生俗名龍鬚草今人以為席者是也地圖經曰生梁州山谷濕地及汾州今處處有之時生春生苗採五月七月取莖八月九月取根收曝乾用莖九節多味者為好質類麻黃多節而粗長色青味苦性微寒微溫氣氣薄味厚陰中之陽臭香主利水除熱治療唐本注云殺蛔蟲及能消食陳藏器云止淋及小便卒不通薇銜無毒叢生薇銜出神農本經主風濕痹歷節痛驚癇吐舌悸氣賊風鼠瘻癰腫以上朱字神農本經暴症逐水療痿蹶久服輕身明目以上黑字名醫所録名麋銜承膏吳風草無顛無心承肌鹿銜草苗蜀本圖經云葉似茺蔚叢生有毛黃花根赤黑唐本注云此草似白頭翁其葉有毛莖赤南人謂之吳風草一名鹿銜草言鹿有疾銜之即瘥又有大小二種楚人謂大者為大吳風草小者為小吳風草也地圖經曰生漢中川澤及冤句邯鄲時生春生苗採七月取莖葉收陰乾用莖葉質類茺蔚色葉青莖赤味苦性平微寒泄氣氣薄味厚陰中之陽主除風濕消癰腫助得秦皮良治療唐本注云祛賊風合治以五分合澤瀉術各十分以三指撮為後飯治酒風身熱懈惰汗出如浴惡風少氣禁婦人服之絶産無子雲實無毒叢生雲實出神農本經主泄痢腸澼殺蟲蠱毒去邪惡結氣止痛除寒熱花主見鬼精物多食令人狂走久服輕身通神明益壽以上朱字神農本經實消渴花殺精物下水燒之致鬼以上黑字名醫所録名員實雲英天豆馬豆苗羊石子草臭草草雲母苗圖經曰苗高五六尺葉如槐而狹長枝上有刺花黃白色作莢實若麻子大黃黑色俗名馬豆本經云十月採用今當三月四月採苗五月六月採實恐過時則枯落也唐本注云叢生澤傍葉如苜蓿枝間微刺其實大如黍黃黑色似豆故名天豆地圖經曰生河間川穀蜀本圖經云今所在平澤中皆有之道地瀛州時生春生苗採三月四月取苗五月六月取實收曝乾用子花質類黍米色子黃黑花黃白味辛苦性溫散泄氣氣厚味薄陽中之陰臭朽主消渴泄痢制雷公云凡使採得後粗搗相對拌渾顆橡實蒸一日後出用治療圖經曰治瘧王不留行無毒植生王不留行出神農本經主金瘡止血逐痛出刺除風痹內寒久服輕身耐老增壽以上朱字神農本經止心煩鼻衄癰疽惡瘡瘻乳婦人難産以上黑字名醫所録名禁宮花剪金花剪金草苗圖經曰苗莖俱青高七八寸以來根黃色如薺根葉尖如小匙頭亦有似槐葉者四月開花黃紫色隨莖而生如松子狀又似豬藍花俗謂之剪金草河北一種葉圓花紅與此小別蜀本圖經曰葉似松藍等花紅白色子殼似酸漿實圓黑如黍粟地圖經曰生泰山山谷及江浙河中府今近處皆有之道地成德軍江寧府時生春生苗採二月八月取苗莖五月取實收曬乾用實質類酸漿實而圓黑色黑味苦甘性平泄氣氣之薄者陽中之陰臭朽主金瘡瘻乳制雷公云凡採得拌濕蒸從巳至未出卻下漿水浸一宿至明出焙乾用之治療圖經曰除諸風痙藥性論云去風毒通血脈日華子云治發背遊風風疹婦人經血不勻及難産別録云竹木刺在肉中不出疼痛水調敷即出鬼督郵無毒叢生鬼督郵主鬼疰卒忤中惡心腹邪氣百精毒溫瘧疫疾強腰腳益膂力名醫所録名獨搖草苗唐本注云苗惟一莖葉生莖端若繖音傘根如牛膝而細黑今人以徐長卿代之非也蜀本云徐長卿赤箭之類亦名鬼督郵但主治不同宜審用也又圖經云莖似細箭竿高二以已下葉生莖端狀傘蓋根橫而不生須花生葉心黃白色地唐本注云所在有之時生春初生苗採二月八月取根收曬乾用根質類牛膝而細黑色黑味辛苦性平泄散氣氣之薄者陽中之陰制雷公云細銼搗用生甘草水煮一伏時漉出用草之走白花藤無毒蔓生白花藤主虛勞風熱酒漬服之名醫所録苗唐本注云蔓生苗似野葛葉有細毛花白色根似牡丹骨柔皮白而厚凌冬不凋雷公云菜花藤真似白花藤只是味不同菜花藤味酸澀不堪用白花藤味甘為異也地圖經曰生嶺南交州廣州平澤時生春生新葉採無時收陰乾用莖色白味苦甘性寒泄氣氣薄味厚陰也臭香主退虛熱制雷公云去根細銼陰乾用之解諸藥菜肉中毒贋菜花藤為僞地不容無毒蔓生地不容主煩熱闢瘴癘利喉閉及痰毒名醫所録名解毒子苗圖經曰蔓生葉青如杏葉而大厚硬凌冬不凋無花實根黃白色外皮微粗褐纍纍相連如藥實而圓大地圖經曰生山西谷戎州時生春生新葉採無時收曬乾用根質類藥實而圓大色黃白味苦性大寒泄氣氣薄味厚陰也主闢瘴氣治療圖經曰治咽喉閉塞解蠱毒留軍待味辛溫無毒主肢節風痛筋脈不遂折傷瘀血五緩攣痛生劍州山谷其葉似楠木而細長採無時獨用將軍味辛無毒主治毒腫奶癰解毒破惡血生林野採無時節節穿葉心生苗其葉似楠根並採用山胡椒味辛大熱無毒主心腹痛中冷破滯所在有之似胡椒顆粒大如黑豆其色黑俗用有效燈籠草味苦大寒無毒主上氣咳嗽風熱明目所在有之八月採枝杆高三四尺有花紅色狀若燈籠內有子紅色可愛根莖花實併入藥使一十種陳藏器余人肝藤主解諸毒藥腫遊風腳手軟痹並研服之亦煮服之亦敷病上生嶺南葉三丫花紫色一名承露仙又有伏雞子亦名承露仙葉圓與此名同物異別録云廣志云生嶺南山石間引蔓而生主蟲毒及手腳不遂等風生研服療中蠱毒人肝藤以清水磨一彈丸飲之不過三兩服越王余算味鹹平無毒主下水破結氣生南海水中如竹算子長尺許異苑曰晉安有越王余算葉白者似骨黑者似角云是越王行海作籌有餘棄於水中而生海藥云謹按異苑記云昔晉安越王因渡南海將黑角白骨算籌所餘棄水中故生此遂名算味鹹溫主水腫浮氣結聚宿滯不消腹中虛鳴並宜煮服之石蓴味甘平無毒下水利小便生南海中水石上南越志云似紫菜色青臨海異物志曰附石生也海藥云主風祕不通五膈氣並小便不利臍下結氣宜煮汁飲之胡人多用治耳疾海根味苦小溫無毒主霍亂中惡心腹痛鬼氣注忤飛尸喉痹蠱毒癰疽惡腫赤白遊疹蛇咬犬毒酒及水磨服敷之亦佳生會稽海畔山谷莖赤葉似馬蓼根似菝葜而小也海人極用之海藥云胡人採得蒸而用之餘並用寡婦薦主小兒吐痢霍亂取二七莖煮飲之自縊死繩主卒發癲狂燒為末服三指撮三年陳蒲煮服之亦佳刺蜜味甘無毒主骨熱痰嗽痢暴下血開胃止渴除煩生交河沙中草頭有刺上有毛毛中生蜜一名草蜜胡人叫為給㪍羅骨路支味辛平無毒主上氣浮腫水氣嘔逆婦人崩中余血症瘕殺三蟲生崑崙國苗似凌霄藤根如青木香安南亦有一名飛藤長松味甘溫無毒主風血冷氣宿疾溫中去風草似松葉上有脂山人服之生關內山谷中合子草有小毒子及葉主蠱毒螫咬搗敷瘡上蔓生岸傍葉尖花白子中有兩片如合子
