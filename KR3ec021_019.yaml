body:
  text: 卷之十八木部中品之上木之木桑根白皮附桑椹桑耳俱無毒葉灰有小毒植生桑根白皮出神農本經主傷中五勞六極羸瘦崩中脈絕補虛益氣葉主寒熱出汗桑耳黑者主女子漏下赤白汁血病症瘕積聚陰痛陰陽寒熱無子以上朱字神農本經去肺中水氣唾血熱渴水腫腹滿臚脹利水道去寸白可以縫金瘡葉汁有小毒解蜈蚣毒桑耳療月水不調其黃熟陳白者止久泄益氣不飢其金色者治癖飲積聚腹痛金瘡以上黑字名醫所錄名梔樹半無椹女桑山桑家桑雞桑葉椏者桑耳桑菌木麥蜀本麥作𩖵詮筍切桑黃桑巨葉神仙葉霜後枯者苗圖經曰木高一二丈春生葉至夏結實生青綠熟紫黑根皮黃白色如虎斑其葉可以飼蠶根出土上者不可用惟用東行根益佳或曰木白皮亦可用也桑葉以夏秋再生者為上木耳名桑黃有黃熟陳白者又有金色者皆可用皮上白蘚花名桑花狀似地錢其柴燒灰淋汁醫家亦多用之爾雅云女桑桋桑桑木之小而條長者為女桑又山桑木堪弓弩檿桑絲中琴瑟皆材之美者也他木鮮及焉地圖經曰處處有之時生春生葉採無時收曝乾用根皮東行者佳質類北苦參而厚大色白味甘性寒氣氣之薄者陽中之陰臭腥主上氣咳嗽五勞羸瘦行手太陰經助續斷桂心麻子為之使反惡鐵及鉛制雷公云以銅刀剝上青黃薄皮一重只取第二重白嫩青涎者於槐砧上用銅刀銼焙令乾勿使皮上涎落涎是藥力而不可去也治療圖經曰桑葉煮湯淋渫手足去風痹桑枝消水氣肺氣腳氣癰腫及遍體風癢乾燥風氣四肢拘攣上氣眼暈肺氣嗽消食利小便久服輕身聰明耳目令人光澤兼療口乾桑花止衄血吐血皮中白汁塗小兒口瘡並金刃所傷燥痛須臾血止更剝白皮裹之令汁得入瘡中良桑上蠹蟲止暴心痛金瘡肉生不足唐本注云桑葉除腳氣水腫利大小腸桑椹止消渴藥性論云根白皮止肺喘咳水氣浮腫主絕傷利水道消水氣日華子云根白皮調中下氣消痰止渴利大小腸開胃下食殺腹臟蟲止霍亂吐瀉家桑東行根汁治小兒天吊驚癇客忤及敷鵝口瘡家桑葉利五臟通關節下氣煎服除風痛出汗並撲損瘀血陳藏器云葉汁除霍亂腹痛吐下合金瘡並小兒口吻瘡煎如赤糖去老風及宿血桑椹利五臟關節通血氣久服不飢孟詵云根白皮煮汁飲利五臟桑葉炙煎飲止渴蕭炳云桑葉炙煮飲止霍亂湯液本草云根白皮除肺氣止唾血熱渴消水腫補藥性論云根白皮主虛勞客熱頭痛內補不足日華子云根白皮益五臟湯液本草云根白皮治傷中五勞羸瘦補虛益氣又云甘以固元氣辛以瀉肺氣之有餘合治作線縫金瘡腸出者更以熱雞血塗上立效葉炙微乾和桑衣煎服治痢亦療金瘡及諸損傷止血又蒸後鹽挼敷治蛇蟲蜈蚣咬疼痛處桑椹合蜜食之能令人聰明安魂鎮神黑椹暴搗末合蜜為丸每日服六十丸變白不老椹合科斗各一升瓶盛封閉懸屋東頭一百日盡化為泥染白鬢如漆椹二七枚和胡桃脂研如泥拔去白髮點孔中即生黑者桑灰淋取汁為煎與冬灰等同滅痣疵黑子蝕惡肉煮小豆大下水脹敷金瘡止血生肌禁根出土上者殺人五木耳無毒寄生五木耳主益氣不飢輕身強志神農本經名檽音軟苗唐本注云楮槐榆柳桑耳此為五耳軟者並堪啖藥性論云蕈耳亦可單用古槐桑柘樹上者良其餘樹上不堪用又煮漿粥罨槐木上草覆之而生者為次也孟詵云菌子有數種槐樹上生者良野田中者恐有毒殺人不宜食也地圖經曰生犍為山谷處處有之時生六月多雨時採無時收曝乾用古槐桑上者良色黃白黑性平寒氣氣之薄者陽中之陰臭朽主利五臟治療藥性論云桑耳治女子崩中帶下月閉血凝產後血凝男子痃癖兼療伏血下赤血蕈耳能治風破血益力孟詵云木耳利五臟宣腸胃氣壅毒氣日華子云桑耳止腸風瀉血婦人心腹痛唐本注云槐耳療痔疾合治其餘樹上者食之多動風氣發痼疾令人肋下急損經絡食菌子發五臟風壅經脈動痔疾令人昏昏多睡背膊四肢無力木之飛竹葉無毒附根汁實皮茹筍叢生竹葉出神農本經主咳逆上氣益筋急惡瘍殺小蟲根作湯益氣止渴補虛下氣汁主風痓實通神明輕身益氣以上朱字神農本經䈽竹葉大寒無毒除煩熱風痙喉痹嘔吐根消毒淡竹葉味辛平大寒主胸中痰熱咳逆上氣瀝大寒療暴中風風痹胸中大熱止煩悶皮茹微寒主嘔啘溫氣寒熱吐血崩中溢筋苦竹葉及瀝療口瘡目痛明目利九竊竹筍蜀本作諸筍味甘無毒主消渴利水道益氣可久食以上黑字名醫所錄名妒母草言筍旬有六日而齊母故俗呼云苗謹按竹之為物其根叢致而多筋節者也其萌曰筍經旬日余高四五尺解籜成竿漸至丈餘放稍生葉葉似蒻而狹短體圓質勁虛心直節凌冬不凋故以歲寒名之然其類甚多而堪入藥者不過三四種而已竹譜云䈽竹堅而促節皮白如霜苦竹有白有紫甘竹叢生如篁而茂即淡竹也一種肉薄節間有粉與諸竹相等者亦謂之淡竹醫家所貴炙其汁曰竹瀝刮其皮曰竹茹穗於枝曰竹實雖出一體其療疾之功則各有所尚也抑考竹實大如雞子竹葉層層包裹味甘勝蜜傳稱鸞鳳食之必非常物也今近道竹間開白花實似小麥南人號為竹米諸竹有此即死稽聖賦云竹布實而根枯是也鸞鳳所食者豈謂是哉地圖經曰處處有之時生春生苗採不拘時取用葉根實筍茹瀝色青綠味苦性平大寒泄氣氣味俱薄陰中微陽臭朽主止煩解渴清熱消風制銼碎用凡用茹以刀刮青皮上膜竹瀝以青嫩竹火炙之汁出為瀝矣治療藥性論云淡竹葉主吐血熱毒風壓丹石毒止消渴其竹燒瀝治卒中風失音不語苦者及去眼赤青竹茹止肺痿唾血鼻衄消五痔日華子云淡竹並根消痰去熱狂煩悶中風失音不語壯熱頭痛頭風並懷妊婦人頭旋倒地止驚悸瘟疫迷悶小兒驚癇天吊枝葉同用苦竹止渴解酒除煩熱發汁並治中風失音作瀝功用與淡竹同陳藏器云苦竹筍主不睡去面目並舌上熱黃止渴明目解酒毒除熱氣健人除煩熱孟詵云筍除逆氣煩熱慈竹瀝療熱風和食飲服之良蜀本圖經曰竹節間黃白者名竹黃制丹石藥毒發熱別錄云淡竹上甘竹次主咳逆消渴痰飲喉痹鬼疰惡氣殺小蟲除煩熱苦竹葉主口瘡目熱喑啞苦竹茹主下熱壅苦竹根一斤水五升煮取一升服治五臟熱毒氣淡竹瀝大寒主中風大熱煩悶勞復淡竹茹主噎膈鼻衄湯液本草云竹葉除煩熱緩皮而益氣陰中微陽涼心經丹溪云竹瀝本草云大寒泛觀其意以與石膏芩連等同類而諸方治產後胎前諸病及金瘡口噤與血虛自汗消渴尿多皆陰虛之病無不縮手待盡哀哉內經曰陰虛發熱大寒而能補正與病對薯蕷寒而能補世或用之惟竹瀝因大寒置疑是猶因盜嫂受金而棄陳平之國七也竹瀝味甘性緩能除陰虛之有大熱者大寒者言其功也非以氣言也幸相與可否若曰不然世人吃筍自幼至老者可無一人因筍寒而病瀝則筍之液也況假火而成者何寒如此之甚合治竹茹三兩水五升煮取三升去滓令冷內破雞子三枚攪調更煮三沸飲之治飲酒頭痛苦竹茹四兩合醋漬一宿含之治齒齦間津液血出不止青竹茹五兩合酒一升煎取五合頓服治妊娠八月九月若墮僕或牛馬驚傷得心痛竹葉濃煮合鹽少許寒溫得所含之治齒間血出苦竹葉燒灰和雞子黃敷卒得惡瘡不識者竹瀝半盞合新汲水半盞調服治時氣五六日心神煩躁不解竹瀝一升合茯苓三兩水四升同煎至二升分三服治妊娠恆若煩悶此名子煩苦竹瀝五合黃連二分綿裹入竹瀝內浸一宿點目中數度令熱淚出治目赤眥痛如刺不得開肝經實熱致生障翳竹葉燒末和豬脂塗上或雞子白敷之治小兒頭瘡並耳上生瘡新青竹茹二合好酒一升煮三五沸分作三服治妊娠誤有失墜忽推築著疼痛禁諸筍發氣苦竹筍動氣發症不可多食解淡竹根壓丹石發熱渴木之木吳茱萸有小毒附根葉並梂子植生吳茱萸出神農本經主溫中下氣止痛咳逆寒熱除濕血痹逐風邪開腠理根殺三蟲以上朱字神農本經去痰冷腹內絞痛諸冷食不消中惡心腹痛逆氣利五臟根白皮殺蟯蟲治喉痹咳逆止泄注食不消女子經產余血療白癬以上黑字名醫所錄名羊梂鼠查梂根藙苗圖經曰木高丈餘皮青綠色葉似椿而闊厚紫色三月開花紅紫色七八月結實似椒子嫩時微黃至成熟則深紫風土記曰俗尚九月九日謂為上九茱萸到此日熟而色赤氣亦烈折其房以插頭可辟惡氣御冬又續齊諧記曰汝南桓景隨費長房學長房謂曰九月九日汝家有災厄汝宜急去家各作絳囊盛茱萸以係臂上登高飲菊花酒此禍可消景如言舉家登高山夕還見雞犬牛羊一時暴死長房聞之曰此代之矣故世人每至此日登高飲酒戴茱萸囊由此爾地圖經曰生上谷川谷及冤句江浙蜀漢尤多今處處有之道地臨江軍越州吳地時生春生葉採九月九日取實收陰乾用子及根質類花椒小而有瓣色紫赤味辛苦性溫大熱散葉熱氣氣味俱厚陽中之陰臭香主溫中下氣行足太陰經少陰經厥陰經助蓼實為之使反畏紫石英惡丹參硝石白堊制雷公云去葉核用鹽水洗一百轉自然無涎日乾用治療藥性論云去心腹積冷心下結氣疰心痛及霍亂轉筋胃中冷氣吐瀉腹痛不可勝忍者並遍身癢痹冷食不消大腸壅氣皮能療漆瘡及中惡腹中刺痛下痢不禁治寸白蟲日華子云健脾通關節治霍亂瀉痢消痰破症癖逐風止腹痛腎氣腳氣水腫下產後余血葉主霍亂下氣心腹痛冷氣孟詵云主除嘔逆臟冷心痛下氣皮止齒痛及魚骨在人腹中煮汁服愈骨在肉中不出者嚼封之骨當爛出衍義曰此物下氣最速腸虛人服之愈甚東垣云咽嗌寒氣噎塞而不通胸中冷氣閉塞而不利脾胃停冷腹痛而不任心氣刺痛成陣而不止湯液本草云主溫胃及寒邪所膈氣不得上下此病不已令人寒中腹滿膨脹下利寒氣諸藥不可代也及去胸中逆氣溫胃別錄云止瀉痢厚腸胃梂子根濃煮浸痔疾燒末服亦良合治茱萸一升合酒五升煮取一升半去滓以汁暖洗療風瘙癢痛合酒各一升煮四五沸冷服半升日三服治中賊風口偏不能語者煮汁一盞和生薑汁飲之治腳氣衝心合鹽研罯治內外腎釣痛神驗合艾以醋湯拌罯治伏暑霍亂腳轉筋以一升合大棗二枚生薑一兩人參一兩水五升煎三升每服七合日三治嘔而胸滿及乾嘔吐涎沫而頭痛者東行根大者一尺大麻子八升橘皮二兩共為咀合酒一斗浸一宿微火暖之三下絞去滓空腹服一升療脾勞熱有白蟲在脾中令人好嘔者服之取盡蟲便下出或死或半爛或下黃汁作藥時禁聲勿語取蟲便驗禁肥健人不宜多食檳榔無毒植生檳榔主消穀逐水除痰癖殺三蟲伏屍療寸白名醫所錄名山檳榔豬檳榔蒳子苗圖經曰木大如桄榔高五七丈正直無枝皮似青銅節如桂竹葉生木巔大如楯頭又似芭蕉葉其實春生至夏乃熟作房從葉中出傍有刺若棘針重疊其下一枝數百實狀如雞子皆有皮殼肉滿殼中正白味苦澀得扶留藤與瓦屋子灰同咀嚼之則柔滑而甘美嶺南人當果啖之由其地溫不食此無以祛瘴癘然有三四種有小而味甘者名山檳榔有大而味澀核亦大者名豬檳榔最小者名蒳子其功用不言有別又云尖長而有紫文者名檳圓而矮者名榔檳力小榔力大其大腹所出與檳榔相似但莖葉根干小異連皮收之謂之大腹檳榔而功用差別爾地圖經曰生南海今嶺外州郡皆有之唐本注云交州愛州崑崙海藥云東海諸國道地廣州時生春生葉採夏取實收生者易爛須用灰汁煮熟仍大焙熏干始堪停久用實質狀如雞子色土褐味辛苦性溫泄氣氣輕味厚陰中陽也丹溪云純陽臭朽主破氣殺蟲制雷公云凡使先以刀刮去底細切勿經火恐無力效若熟使不如不用治療唐本注云消腹脹搗末服利水穀道敷瘡生肌肉止痛燒為灰敷口吻白瘡藥性論云利五臟六腑壅滯破堅滿氣下水腫治心痛風血積聚日華子云除一切風下一切氣通關節利九竅健脾調中除煩破癥結下五膈氣南海藥譜云殺蟲兼補別錄云主賁豚諸氣風冷氣五膈氣宿食不消及腳氣日華子云五勞七傷合治合沙牛尿一盞磨一枚空心暖服療腳氣壅毒水腫浮氣以二枚一生一熟搗末酒煎服善治膀胱諸氣用一兩為末合水煮蔥白濃汁調下一錢匕療胎動腰痛或下血不止以半兩炮搗為末合蔥蜜煎湯每服二錢空心調服治諸蟲在臟腑久不瘥者梔子無毒植生梔子出神農本經主五內邪氣胃中熱氣面赤酒疱渣鼻白癩赤癩瘡瘍以上朱字神農本經療目熱赤痛胸心大小腸大熱心中煩悶胃中熱氣以上黑字名醫所錄名木丹越桃花薝蔔苗圖經曰木高七八尺葉似李而厚硬又似樗蒱子二三月生白花花皆六出甚芬香俗說即西域薝蔔也夏秋結實如訶子狀生青熟黃中仁深紅皮薄而圓小刻房七稜至九稜者為山梔子甚佳其大而長者但可染色不堪入藥地圖經曰南陽川穀今南方及西蜀州郡皆有之道地臨江軍江陵府建州時生春生葉採九月取實收曝乾用子質如訶子而輕色黃赤味苦性大寒泄氣氣薄味厚陰也臭香主除積熱瀉肺火行手太陰經制雷公云去皮取仁以甘草水浸一宿漉出焙乾用治療圖經曰燒末服治霍亂轉筋藥性論云去熱毒氣利五淋中惡通小便解五種黃病明目及目赤腫時疫除熱消渴口乾衍義曰胃中熱氣既亡血亡津液臟腑無潤養內生虛熱非此物不可去湯液本草云心煩懊憹而不得眠心神顛倒欲絕血滯小便不利止渴去煩躁又云仲景治煩胸為至高之分也故易老云輕浮而象肺也色赤而象火故能瀉肺中之火本草不言吐仲景用此為吐藥梔子本非吐為邪氣在上拒而不納故令上吐邪因得以出經曰高者因而越之此之謂也或用梔子利小便實非利小便清肺也肺氣清而化膀胱為津液之府小便得此氣化而出也丹溪云仁能屈曲下行降火從小便泄出人所不知又治痞塊中之火別錄云以三十枚水煎一升療傷寒差後交接發動欲死眼不開不能語者合治仁合火煨大黃連翹炙甘草等分末之水煎三錢療心經留熱小便赤澀合豉名梔子豉湯治煩躁煩者氣也躁者血也氣主肺血主腎故用梔子以治肺煩用香豉以治腎躁躁者懊憹不得眠也如少氣虛滿者加甘草若嘔噦者加生薑橘皮合厚朴枳實治傷寒下後腹滿虛煩合甘草乾姜治傷寒下後身熱微煩合茵蔯香豉甘草等分作湯飲治發黃合鼠矢等湯治大病起勞復合大黃煮汁治時行病後勞發食復解羊躑躅毒殺䗪蟲毒紫𨥥有小毒紫𨥥音礦主五臟邪氣帶下止痛破積血金瘡生肉名醫所錄名勒佉樹渴廩苗圖經曰木高丈許枝幹繁郁葉似橘柚冬不凋落三月開花不結子每有霧露微雨沾濡其枝條則為紫𨥥而真蠟國使人言蟻運土上於木端作窠蟻壤為霧露所沾即化為紫𨥥又交州地誌亦云本州歲貢紫𨥥出於蟻壤乃知其血竭雖俱出於木而非一物明矣今醫方亦罕用惟染家所須耳海藥云其樹紫赤色是木中津液成也衍義曰如糖霜結於細枝上累累然紫黑色研破則紅今人造綿胭脂邇來亦難得也地圖經曰出真蠟國波斯國交州南海山谷道地崑崙者善時生無時採無時收陰乾質類糖霜色赤黑味甘性平氣氣厚於味陽中之陰臭朽主濕癢瘡疥治療別錄云消陰滯氣驢馬蹄漏可熔補之補別錄云添益陽精合治合豬脂入牛馬漏蹄燒鐵篦烙之即平麒麟竭無毒麒麟竭主心腹卒痛止金瘡血生肌肉除邪氣名醫所錄名血竭樹渴留苗圖經曰木高數丈葉似櫻桃而有三角婆娑可愛其脂液從木中流出滴下狀如膠飴久則堅凝而成赤如血色故謂之血竭若味鹹而氣腥者是海母血不可入藥欲驗真偽嚼之不爛如蠟作梔子氣者是也蓋稟熒惑之氣生於湯石之陰結而成質舊說紫𨥥大都相類而別是一物況所出不同功力亦別故各立其條耳地圖經曰出南番諸國及廣州西胡時生無時採無時收陰乾用堅凝如蠟者佳色黃赤味甘鹹性平氣氣厚於味陽中之陰臭朽主破血生肌助得密陀僧良制雷公云欲使先研作粉重篩過臨使入於丸散或膏中切勿與眾藥同搗化作飛塵也治療日華子云一切瘡疥癬不合者敷之此藥性急亦不可多使卻引膿別錄云金瘡血不止疼痛為末敷之立止合治合酒服治打傷折損一切疼痛補虛及血氣攪刺內傷血聚為末合酒調服二錢匕治產後血暈不知人及狂語贗味鹹有腥氣者是海母血為偽食茱萸無毒植生食茱萸主水氣名醫所錄苗圖經曰其木極高大枝莖青黃上有小白點葉正類油麻花而黃蜀人呼其子為艾子禮記所謂藙者藙艾聲訛故也宜入羹中能發辛香然功用與吳茱萸同但力少劣爾唐本注云顆粒大而經久色黃黑者是食茱萸顆粒緊小色青綠者乃吳茱萸也其閉目者名欓子不堪食地圖經曰今南北皆有之道地蜀州吳地者為佳時生春生葉採九月取實收曝乾用實及皮質類花椒而有五六瓣色黃黑味辛苦性大熱散氣氣味俱厚陽中之陰臭香主心腹冷痛反畏紫石英治療唐本注云殺鬼魅及惡蟲毒起陽殺牙齒蟲痛藥性論云治冷痹腰腳弱通身刺痛腸風痔疾殺腸中三蟲去虛冷陳藏器云樹皮殺牙齒蟲止痛食療云主心腹氣痛中惡除咳逆去臟腑冷能溫中魚骨在腹中刺痛煎汁服之其骨軟出如魚骨刺入肉中不出者碎搗封之亦自爛出合治合美豉酒煮服殺鬼毒中賊風口偏不語者得汗便瘥合酒煎含之治齒痛合酒水煎溫洗去皮肉癢痛禁不可多食多食沖眼兼又脫髮六七月勿食傷人氣發瘡痍解蛇咬毒冷水調末服立瘥蕪荑無毒植生蕪荑出神農本經主五內邪氣散皮膚骨節中淫淫溫行毒去三蟲化食以上朱字神農本經逐寸白散腸中嗢嗢喘息以上黑字名醫所錄名無姑𦽄音殿䕋音唐苗圖經曰大類榆而差小其實亦早成比榆乃大氣臭如𤜢爾雅釋木云無姑其實夷郭璞云無姑姑榆也生山中葉圓而厚剝取皮合漬之其味辛香久而作臭此大蕪荑也衍義曰蕪荑有大小兩種小蕪荑即榆莢也揉取仁醞為醬味尤辛入藥當用大蕪荑也地圖經曰生晉山川穀唐本注云河東河西近道處處有之道地延州同州者最佳時生春生葉採三月取實收陰乾用實陳久者良質實類酸棗仁而匾皺色青黑味辛性平散氣氣之薄者陽中之陰臭臭主殺蟲消疳助得訶子豆蔻良制搗末用治療藥性論云主積冷氣心腹症痛除肌膚骨節中風淫淫如蟲行日華子云治腸風痔瘻惡瘡疥癬孟詵云除五臟皮膚肢節邪氣秋天食之尤宜人常食治五痔諸病不生衍義曰療大腸寒滑及多冷氣不可闕也食療云散腹中氣痛中惡蠱毒海藥云治冷痢心氣殺蟲止痛又婦人子宮風虛小兒疳瀉補圖經曰去三尸益神駐顏合治合豬脂塗熱瘡瘥合白蜜治濕癬合沙牛酪治一切瘡合飯丸治久患脾胃氣泄不止合食鹽等分治膀胱氣急宜下氣合白麵炒黃調服治脾胃有蟲食即痛面黃無色疼痛無時禁多食令人發熱心痛解殺中惡蟲毒枳殼無毒植生枳殼主風癢麻痹通利關節勞氣咳嗽背膊悶倦散留結胸膈痰滯逐水消脹滿大腸風安胃止風痛名醫所錄苗圖經曰其樹如橘而小高五七尺葉如橙多刺春生白花至秋成實舊說七月八月採者為實九月十月採者為殼今醫家多以皮厚而小者為枳實實完大者為枳殼皆以翻肚如盆口唇狀須陳久者為勝近道所出者俗呼臭橘不堪用地圖經曰京西江湖州郡皆有之汝州商州者為佳時生春生新葉採九月十月取實收日乾用實陳久者佳質類香圓而小色黃味苦酸性微寒泄氣味薄氣厚陽也又云陰中微陽臭香主腸風痔疾心腹結氣制雷公云凡使去瓤以麩炒過待麩焦黑遂出用布拭上焦黑單搗如粉用治療藥性論云治風熱疹肌中如麻豆惡癢兩脅虛脹關膈壅塞日華子云健脾開胃調五臟下氣止嘔逆消痰反胃霍亂瀉痢消食破癥結痃癖五膈氣除風明目及肺氣水腫利大小腸皮膚癢痔腫可炙熨湯液本草云治脾胃痞塞泄肺氣及利胸中滯氣勝濕化痰涎合治合羊脛灰米飲服治遠年近日腸風下血不止以四兩合甘草二兩為末空心湯點服二錢孕婦臨月服之易生仍無胎中惡病忌登高側禁多用損胸中至高之氣枳實無毒植生枳實出神農本經主大風在皮膚中如麻豆苦癢除寒熱結止痢長肌肉利五臟益氣輕身以上朱字神農本經除胸脅痰癖逐停水破結實消脹滿心下急痞痛逆氣脅風痛安胃氣止溏泄明目以上黑字名醫所錄苗圖經曰其樹如橘而小高五七尺葉如橙多刺春生白花至秋成實七月八月採皮厚而小者為枳實九月十月採皮薄而大者為枳殼用之須陳久者為勝近道所出者俗呼為臭橘不堪入藥衍義曰枳實枳殼一物也小則其性酷而速大則其性詳而緩故張仲景治傷寒倉卒之病承氣湯中用枳實此其意也皆取其疏通決泄破結實之義他方但導敗風壅之氣故用枳殼其意如此地圖經曰生河內川澤今京西江湖州郡皆有之道地成州商州川穀時生春生新葉採七月八月取實收日乾用實莖皮根皮質類青皮而堅厚色青黑味苦酸性寒泄氣氣薄味厚陰也臭香主消痰飲除堅積制銼碎麩炒用治療藥性論云治傷寒結胸上氣喘咳腎傷冷陰痿陶隱居云莖皮消水脹並暴風骨節疼急陳藏器云根皮主痔及大便下血湯液本草云除寒熱破結實消痰癖並心下痞逆氣脅痛去脾經積血消宿食破水積以泄里除氣合治合白朮水煎療水飲所作心下堅大如盤合酒漬木皮治卒中風身直不得屈伸合米飲調末治胸痹氣壅滿心膈不利厚朴無毒植生厚朴出神農本經主中風傷寒頭痛寒熱驚悸氣血痹死肌去三蟲以上朱字神農本經溫中益氣消痰下氣療霍亂及腹痛脹滿胃中冷逆胸中嘔不止泄痢淋露除驚去留熱心煩滿厚腸胃子療鼠瘻明目益氣以上黑字名醫所錄名厚皮赤樸榛逐折苗圖經曰木高三四丈徑一二尺春生葉如槲葉四季不凋紅花而青實皮極鱗皴而厚紫色多潤者佳薄而白者不堪入藥地圖經曰出交趾冤句今京西陝西江淮湖南山谷中皆有之道地蜀川商州歸州梓州龍州最佳時生春生葉採三月九月十月取皮收陰乾用皮紫厚者佳質類桂皮而粗厚色紫味苦辛性大溫散氣氣厚味薄陽中之陰臭香主溫胃氣除腹脹助乾薑為之使反惡澤瀉寒水石硝石制雷公云去粗皮薑汁炙或薑汁炒用用酥炙治療藥性論云治積冷氣腹內雷鳴虛吼宿食不消除痰飲去結水破宿血消化水穀止痛大溫胃氣嘔吐酸水及心腹滿病人虛而尿白日華子云健脾主反胃霍亂轉筋冷熱氣瀉膀胱泄五臟一切氣婦人產前產後腹臟不安調關節殺腹臟蟲除驚去煩悶明耳目合治合枳實大黃治腹脹合桂心枳實生薑治霍亂禁妊娠不可服忌與豆同食動氣茗苦䳓無毒植生茗苦䳓主瘻瘡利小便去痰熱渴令人少睡苦䳓主下氣消宿食作飲加茱萸蔥姜等良名醫所錄名茶檟蔎茗荈苗圖經曰茶乃南方佳木高二三尺經冬不凋臘月已結蓓蕾春中抽芽爾雅所謂檟苦荼釋云早採者為荼晚採者為茗蜀人謂之苦荼今通謂之茶蓋茶荼字相似而誤也一種自一尺以至於數十尺巴峽亦有兩人合抱者伐而掇之其木如瓜蘆葉如梔子花如白薔薇實如栟櫚蒂若丁香根似胡桃其名有五今人或以枸杞槐柳等嫩芽雜和作茶實能亂真以此治病功用大不相侔建州等處所產性味與別品尤勝獨名臘茶唯鼎州性味略類建州者今河北等處磨末亦冒臘茶入藥唯以建州為勝又有蒙山五頂其中頂曰上清峰峻險人跡少到雲霧蔽虧鷙獸時出草木繁密所產與他頂不同春分先後俟雷發聲採者為佳此品製作精於他處人所貴重為其性不甚冷而卻病延年爾謹按古無茶茗之文在禹則無貢周禮亦不載爾雅雖有檟苦荼之名而秦漢史傳亦無所稽至唐陸羽輩著茶經等說而茶品始備故貴於唐而與鹽並榷於宋也世之昏禮納采非茶不行蓋取其種蒔不可移植以喻無再盟之義然飲少則醒神思過多則能致疾故荼飲序云釋滯消壅一日之利暫佳瘠氣侵精終身之累斯大是也地圖經曰出閩浙蜀荊江湖淮南鼎州山中皆有之道地雅州蒙山建州時生春初發萌採春分先後取芽收曬乾用葉色青褐味甘苦性微寒氣氣味俱輕陰中之陽臭香主清頭目消熱渴行手足厥陰經治療圖經曰祛宿疾釋滯消壅陳藏器云破熱氣除瘴氣利大小腸湯液本草云清頭目消熱渴中風昏憒多睡不醒及瘻瘡別錄云除痰下氣消宿食痰厥頭痛如破赤白痢熱毒痢合治合生油敷蠼螋尿著人成瘡疼痛水煎合醋療氣壅暨腰痛轉動不得煎合醋服治傷暑泄瀉及心痛不可忍者禁宜熱飲若冷啜則聚痰久食令人瘦去人脂使不睡贗枸杞槐柳等芽為偽秦皮無毒特生秦皮出神農本經主風寒濕痹洗洗寒氣除熱目中青翳白膜久服頭不白輕身以上朱字神農本經療男子少精婦人帶下小兒癇身熱可作洗目湯皮膚光澤肥大有子以上黑字名醫所錄名岑皮石檀盆桂苦樹苗圖經曰其木大都似檀枝幹皆有青綠色葉如匙頭許大而不光並無花實根似槐根其皮有白點而不粗錯俗呼為白樳木取皮漬之水則碧色和墨書之於紙青瑩而不脫也地圖經曰生廬江川穀及冤句今陝西州郡河陽亦有之道地河中府成州時生春生葉採二月八月取皮收陰乾用皮質類槐皮而碧薄色碧味苦性大寒泄氣氣薄味厚陰也臭腥主明目去肝經熱助大戟為之使反惡吳茱萸苦瓠防葵制細銼用治療藥性論云去肝中久熱兩目赤腫疼痛風淚不止及洗赤目小兒身熱作湯浴日華子云洗肝明目小兒熱驚皮膚風痹退熱別錄云治赤眼及睛上瘡眼中翳暈解煮汁飲之解天蛇螫毒天蛇即草間黃花蜘蛛秦椒有毒植生秦椒出神農本經主風邪氣溫中除寒痹堅齒髮明目久服輕身好顏色耐老增年通神以上朱字神農本經療喉痹吐逆疝瘕去老血產後余疾腹痛出汗利五臟以上黑字名醫所錄名大椒檓欣詭切苗圖經曰初秋生花秋末結實葉及莖子都似蜀椒但實細味短形似茱萸有針刺莖葉堅而滑又云南北所生一種其實大於蜀椒當以實大者為秦椒觀此二說不同恐用者狐疑不決不可不辯考之衍義曰秦椒此秦地所產者故言秦椒大率椒株皆相似秦椒但葉差大椒粒亦大而紋低不若蜀椒皺紋高為異也地圖經曰生泰山川穀及琅琊秦鳳明越金商州皆有之別錄云天水隴西藍田道地秦嶺歸州時生春生葉採九月十月取實收陰乾用實質類茱萸而赤色紅味辛性生溫熟寒氣氣之厚者陽也臭香主溫中堅齒反畏雌黃惡栝蔞防葵制去莖目及閉口者焙出汗用治療藥性論云祛惡風遍身四肢𤸷痹口齒浮腫搖動女人月閉不通產後惡血痢多年痢能生髮及腹中冷痛孟詵云滅瘢長毛去血合治合醋煎含療齒痛合面作餫飩灰中燒令開口治損瘡中風者封瘡口上合鹽醋和敷手足心風腫合瓜蒂水調寸匕治膏癉其病飲少小便多者山茱萸無毒附胡蘈子植生山茱萸出神農本經主心下邪氣寒熱溫中逐寒濕痹去三蟲久服輕身以上朱字神農本經腸胃風邪寒熱疝瘕頭風風氣去來鼻塞目黃耳聾面皰溫中下氣出汗強陰益精安五臟通九竅止小便利明目強力長年以上黑字名醫所錄名蜀棗雞足鬾音妓實鼠矢苗圖經曰木高丈餘葉似榆花白子初熟未乾紅色大如枸杞亦似胡蘈子有核九月後採實亦可啖既干皮甚薄一種名鼠矢葉如梅有刺毛二月花如杏四月實如酸棗而赤五月採實與此小異也陳藏器云胡蘈子生平林間樹高丈餘葉背白冬不凋冬花春熟最早諸果其實酢澀小兒當果食之地圖經曰生漢中山谷及琅琊冤句東海承縣今海州亦有之陶隱居云出近道諸山中道地兗州海州時生春初生葉採九月十月取實收陰乾用實質類酸棗赤而尖小色赤味酸性平微溫收氣氣厚於味陽中之陰臭朽主添精髓悅顏色行足厥陰經少陰經助蓼實為之使反惡桔梗防風防己制雷公云湯潤去核用治療藥性論云去腦骨疼痛止月水療耳鳴除面上瘡能發汗止老人尿不節日華子云除一切風逐一切氣破癥結及酒渣陳藏器云胡蘈子止水痢補藥性論云興陽道添精髓日華子云暖腰膝助水臟雷公云壯元氣秘精禁核不宜食食之滑精贗其核八稜者名雀兒蘇別是一物為偽木之走紫葳無毒蔓生紫葳音威出神農本經主婦人產乳余疾崩中癥瘕血閉寒熱羸瘦養胎以上朱字神農本經莖葉味苦主痿蹶益氣以上黑字名醫所錄名陵苕茇華凌霄花女葳苗圖經曰此即凌霄花也種蒔初作藤蔓生依大木歲久延引至巔而有花紫黃色夏中乃盛衍義曰紫葳今蔓延而生謂之為草又有木身謂之為木又須物而上然幹不逐冬斃亦得木之多也故居木部為至當唐白樂天詩有木名凌霄擢秀非孤標由是益知非草矣木經又云莖葉味苦是與瞿麥別一種甚明唐本注云且紫葳瞿麥皆本經所載若用瞿麥根為紫葳何得復用莖葉此說盡矣然其花赭黃色本條雖不言其花又卻言莖葉味苦則紫葳為花故可知矣謹按紫葳人家植之嗅其花氣致不能孕由其性味能行經墮胎故也今諸方破血下胎用為要藥而本經有養胎之說恐傳寫之誤耳地圖經曰生西海川穀及山陽今處處人家園圃亦有之時生春生葉採夏取花收曬乾用花葉莖根色紫黃味酸性微寒收氣氣薄味厚陰也臭香主崩中帶下血閉寒熱反畏滷咸制銼碎用治療圖經曰花主婦女血崩血熱風毒四肢皮膚癮疹藥性論云去熱風風癇大小便不利腸中結實止產後奔血不定淋瀝日華子云療酒渣刺風婦人血膈根療熱風身癢遊風風疹及瘀血帶下花葉同功別錄云葉治暴耳聾取汁灌耳中效合治合酒調服二錢能行經脈禁妊娠不可服木之木胡桐淚無毒胡桐淚主大毒熱心腹煩滿水和服之取吐又主牛馬急黃黑汗水研三二兩灌之立瘥又為金銀焊藥名醫所錄名胡桐律苗圖經曰其木甚高大皮似白楊青桐輩其葉初生似柳漸大則似桑桐輩其津液淪入地中與大石相著狀如黃礬姜石而堅實得水便消如硝石也今口齒家為最要之藥又名胡桐律律淚聲訛也有夾爛木者云是胡桐樹滋淪入土石鹼音減鹵地作之又有一種木律極相類不堪入藥地圖經曰出肅州以西平澤及山谷中今西番亦有蜀本圖經曰涼州以西有之海藥云出波斯國時生無時採冬月取收瓷器收貯用石淚質類黃礬而堅實色土黃味鹹苦性大寒軟氣氣薄味厚陰也臭腥主疳蝕齒痛制碾末用治療日華子云止風蚛牙齒痛海藥云除風疳䘌齒牙疼痛骨槽風勞禁多服令人吐解殺火毒並面毒能軟一切物白棘無毒叢生白棘出神農本經主心腹痛癰腫潰膿止痛以上朱字神農本經決刺結療丈夫虛損陰痿精自出補腎氣益精髓以上黑字名醫所錄名棘針棘刺苗圖經曰叢高三四尺花葉莖實都似棗而有赤白二種蘇恭云白棘莖白如粉子葉與赤棘同赤棘中時復有之亦為難得然有鉤直二種直者宜入補藥鉤者入癰腫藥而後條用花即白棘花也蓋花棘功用不同故別立其條衍義曰白棘乃是取其肥盛紫色枝上有皺薄白膜先剝起者故曰白棘取白之意不過如此其棘刺花乃棘上所開花是也地圖經曰生雍州川穀今近京道傍皆有之時生春生葉採無時收曬乾用針根色白味辛性寒散氣氣之薄者陽中之陰臭朽制銼碎或燒末用治療別錄云棘燒末水服一錢匕治小兒驚風口噤乳不下及諸惡腫失治有膿服之經宿頭出棘三升以水五升煮取二升分三服治尿血含之治齒蟲根煮汁洗之治癰疽痔漏瘡並小兒丹棘刺花無毒附實棗針叢生棘刺花主金瘡內漏實主明目心腹痿痹除熱利小便又有棗針療腰痛喉痹不通名醫所錄名菥蓂馬朐刺原苗棘刺花即白棘花也苗葉花實詳見前條故不重載地圖經曰生道傍田野間皆有之時生春生葉採冬至後百二十日取花四月取實收曝乾用花實針色黃白味苦性平泄氣味厚於氣陰中之陽臭香主金瘡治療唐本注云刺有鉤者消腫直者益人合治刺針合瓜蒂末吹鼻中治小兒一切疳豬苓無毒附刺豬苓植生豬苓主痎音皆瘧解毒蠱疰不祥利水道久服輕身耐老神農本經名地烏桃苓根豕橐猳豬屎苗圖經曰舊說是楓木苓今則不必楓根下乃有生土底皮黑作塊似豬糞故以名之以肉白而實者佳今施州有一種刺豬苓味甘性涼無毒蔓生春夏採根彼土人削皮焙乾用敷瘡毒殊效地圖經曰生衡山山谷及濟陰冤句今蜀州眉州亦有之道地龍州者良時生春採二月八月取根收陰乾用根堅實者為佳質類茯神小而皮黑色外黑內白味甘苦性平緩氣氣之薄者陽中之陰臭朽主除濕利小便行足太陽經少陰經制雷公云凡採得用銅刀削上粗皮一重薄切下東流水浸一夜至明漉出細切以升麻葉對蒸一日出去升麻葉令淨曬乾用治療圖經曰治渴藥性論云解傷寒溫疫大熱發汗腫脹滿腹急痛別錄云去邪氣妊娠患子淋及妊娠從腳上至腹腫小便不利微渴引飲又消遍身腫合治合茯苓澤瀉滑石阿膠療傷寒諸病在臟而渴或嘔而思水者以一兩水煮合雞屎白一錢調服治小兒大便不通禁久服損腎氣昏人目墨無毒墨止血生肌膚合金瘡主產後血暈崩中卒下血醋摩服之亦主眯目物芒入目摩點瞳子上又止血痢及小兒客忤搗篩和水溫服之名醫所錄地衍義曰墨松之煙也世有粟草灰偽為者不可用須松煙墨方可入藥然惟遠煙為佳今高麗貢者不知用何物合和不宜入藥此蓋未達不敢嘗之義又鄜延界內有若油然之煙甚濃其煤可為墨黑光如漆松煙為不及也識文曰延川石液者是不可入藥謹按燒松油之法先以砂堝竅其底取松之老節者斫碎豎於其中盎器覆之藉於瓷石盤上其盤亦竅其底二寸許下以瓷器承之泥固其縫處勿令氣泄外用文武火煨逼油自瀝貯於所承之器取油於瓷盞以布作捻然於灶其灶以銅鐵鍋腔為之上覆鍋釜之類濕紙固封其縫或以磚垍砌之其內務令泥鏝光淨使煙不耗而易掃上覆瓷缶之器亦得一法用明淨松香貯鐵器上就以木片點入前灶候圭煙盡發覆器掃出制墨其松香取煙與松油同理但為簡易耳每煙一斤以秦皮訶梨勒酸石榴皮黃柏各一兩蘇木四兩汲新水浸一宿煎耗十去其三入錫罐內投洗淨廣膠七兩阿膠三兩二錢候熔化已盡研入血竭一兩龍腦減半竹匙攪勻濾滴煙內和之更以杏仁去皮取油潤劑及擦模內成笏置炭灰上滲干取出入藥用嘗自經試故詳載之味辛性溫散氣氣厚於味陽中之陰臭香主止血敷腫毒治療別錄云治物落眼中不出以好墨清水研銅箸點之即出治客忤病於道間門外得之令人心腹絞痛脹滿氣衝心胸不即治亦殺人搗墨水和服一錢匕療崩中漏下青黃赤白服好墨末一錢匕治難產以墨一寸為末水服之立產治鼻衄出血太多眩冒欲死者濃香墨點入鼻孔中合治以好墨為末合雞子白丸如桐子大用生地黃汁下一二十丸如人行五里再服之治天行毒病鼻衄數升者好墨合乾薑各五兩為末以醋漿和丸如桐子大每服三十丸加至四五十丸米飲下日夜六七服治赤白痢及諸痢垂死者服之愈以好墨細研不拘時合溫酒調下二錢匕以好墨二寸為末合酒服治妊娠胎死腹中及胞衣不下上迫心者服之立效以好墨為細末二錢用白湯化阿膠清調稀稠得所頓服之治大吐血若熱多者尤相宜二十三種陳藏器余必慄香味辛溫無毒主鬼氣煮服之並燒為香殺蟲魚葉搗碎置上流魚悉暴鰓一名化木香詹香也葉如椿生高山堪為書軸白魚不損書也海藥云主鬼疰心氣斷一切惡氣葉落水中魚當暴死櫚木味辛溫無毒主破血血塊冷嗽並煮汁及熱服出安南及南海人作床幾似紫檀而色赤為枕令人頭痛為熱故也海藥云謹按廣志云生安南及南海山谷胡人用為床坐性堅好主產後惡露衝心癥瘕結氣赤白漏下並銼煎服之研藥味苦溫無毒主霍亂下痢中惡腹內不調者服之出南海諸州根如烏藥圓小樹生也海藥云葉如椒主赤白痢蠱毒中惡並銼煎服之黃龍眼味苦溫無毒主解金藥銀藥毒以水研取半合空心少少服經二十許日差出嶺南狀如龍眼黃色也海藥云功力勝解毒子也箭𦼮及鏃主婦人產後腹中癢安所臥席下勿令婦人知元慈勒味甘無毒主心病流血合金瘡去腹內惡血血利下血婦人帶下明目去障翳風淚胬肉生波斯國似龍腦香海藥云慈勒樹中脂也味甘平消翳破血止痢腹中惡血今少有都咸子及皮葉味甘平無毒主渴潤肺去煩除痰火干作飲服之生南方樹如李徐表南州記云都咸樹子大如指取子及皮作飲極香美海藥云謹按徐表南州記云生廣南山谷味甘平無毒主煩躁心悶痰鬲傷寒清涕咳逆上氣宜煎服子食之香大小如半夏鑿孔中木主難產取入鐵裹者燒末酒服下產也櫟木皮味苦平無毒根皮主惡瘡中風犯毒露者取煎汁洗瘡當令膿血盡止亦治痢南北總有作柴亦云櫪音同也別錄云治諸瘡因風致腫以根皮三十斤銼以水三斛濃煮內鹽一把潰瘡當出膿血日日為之差止省藤味苦平無毒主蛔蟲煮汁服之又主齒痛打碎口中含之又取和米煮粥飼狗去瘑生南地深山皮赤如指堪縛物片片自解也松楊木皮味苦平無毒主水痢不問冷熱取皮濃煎令黑服一升生江南林落間大樹葉如梨江西人呼為涼木松楊縣以此樹為名也楊廬耳平無毒主老血結塊破血止血煮服之楊廬木上耳也出南山故甑蔽無毒主石淋燒灰末服三指撮用水下之又主盜汗書云止鹹味別錄云治膀胱虛熱下砂石澀痛利水道燒灰研食前溫酒調下一錢匕效梫木味苦平無毒破產後血煮服之葉搗碎封蛇咬亦洗瘡癬樹如石榴葉細高丈餘四月開花白如雪生江東林筤間象豆味甘平無毒主五野雞病蠱毒飛屍喉痹取子中人碎為粉微熬水服一二匕亦和大豆藻面去䵟生嶺南山林作藤著樹如通草藤三年一熟角如弓袋子若雞卵皮紫色剖中人用之一名榼子一名合子主野雞病為上地主平無毒主鬼氣心痛酒煮服一合此土中古木腐爛者也腐木主蜈蚣咬末和醋敷之亦漬取汁敷咬處良石刺木根皮味苦平無毒主破血因產血不盡結瘕者煮汁服此木上寄生破血神驗不可得生南方林筤已江西人呼為靳刺亦種為籬院樹似棘而大枝上有逆鉤也柟木枝葉味苦溫無毒主霍亂煎汁服之木高大葉如桑出南方山中郭注爾雅云柟汝占切大木葉如桑也息王藤味苦溫無毒主產後腹痛血露不盡濃煮汁服之生嶺南山谷冬月不凋角落木皮味苦溫無毒主赤白痢皮煮汁服之生江西山谷似茱萸獨莖也鴆鳥漿味甘溫無毒主風血羸老山人浸酒用解諸毒故曰鴆鳥漿生江南林木下高一二尺葉陰紫色冬不凋有赤子如珠紫珠味苦寒無毒解諸毒物癰疽喉痹飛屍蠱毒毒腫下瘻蛇虺蟲螫狂犬毒並煮汁服亦煮汁洗瘡腫除血長膚一名紫荊樹似黃荊葉小無椏非田氏之荊也至秋子熟正紫圓如小珠生江東林澤間
