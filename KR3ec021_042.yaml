body:
  text: 卷之四十一本草圖經本經外草類草之草水英無毒水生水英主丈夫婦人無故兩腳腫滿連膝脛痛屈伸急強者名骨風其疾不宜針刺及灸亦不宜服藥惟單煮此藥浸之不經五日即瘥數有神驗每用取五六斤以水一石煮取三斗及熱浸腳兼淋膝上日夜三四頻用之以瘥為度若腫甚者即於前方加生椒目三升加水二大斗依前煮取汁將淋瘡腫隨湯消即摩粉避風乃良出圖經名水節牛葒草海精木海荏水棘龍移草魚津草地圖經曰元生永陽池澤及河海邊臨汝人呼為牛葒草河北信都人名水節河內連內黃呼為水棘劍南遂寧等郡名龍移草蜀郡人採其花合面藥淮南諸郡名海荏嶺南亦有土地尤宜莖葉肥大名海精木亦名魚津草所在皆有之時生春生苗採春取苗夏收莖葉及花秋冬取根收曝乾用苗葉花根色青緑味苦性寒氣味厚於氣陰也臭微香主膝痛忌油膩蒜生菜豬魚肉麗春草無毒植生麗春草療因時患傷熱變成癊黃通身壯熱小便黃赤眼如金色面又青黑心頭氣痛繞心如刺頭旋欲倒兼肋下有瘕氣及黃疸等證經用有驗取花一升搗為散每平明空腹取三方寸匕和生麻油一盞頓服之日惟一服隔五日再進以知為度根療黃疸搗取汁一盞空腹頓服訖須臾即利三兩行立已一劑不能全愈隔七日更一劑永瘥出圖經名龍羊草夢蘭艾定參草仙女蒿地圖經曰出檀嵎山川穀檀嵎山在高密界河南淮陽郡潁川及譙郡汝南郡等並呼為龍羊草河北近山鄴郡汲郡名夢蘭艾上黨紫團山亦有名定參草亦名仙女蒿今所在有甚療癊黃人莫能知唐天寶中潁川郡楊正進名醫嘗用有效時生春初生苗採三月取花根收陰乾用花及根色花紅根白味甘性微溫緩氣氣之厚者陽也臭香忌酒面豬魚蒜粉酪坐拿草植生坐拿草治打撲所傷兼壯筋骨及風痹出圖經苗圖經曰六月開紫花結實採其苗為藥江西北甚易得後因人用之有效今頗貴重神醫普救治風方中已有用者地圖經曰生江西及滁州時生春生苗採六月取收陰乾用苗紫堇無毒植生紫堇主大小人脫肛每天冷及吃冷食即暴痢不止肛則下脫久療不瘥者取花二斤曝乾搗為散加磁毛末七兩相和研令細塗肛上納既入納了即使人噀冷水於面上即吸入腸中每日一塗藥噀面不過六七度即瘥又以熱酒半升和散一方寸匕空腹服之日再漸加至二方寸匕以瘥為度若五歲以下小兒即以半杏子許散和酒令服亦佳出圖經名楚葵蜀堇苔菜水萄菜地圖經曰生江南吳興郡淮南名楚葵宜春郡名蜀堇豫章郡名苔菜晉陵郡名水萄菜惟出江淮南單服之能療脫肛之疾時生春初生苗採二三月取花收曝乾用花味酸性微溫氣氣厚於味陽中之陰忌食生冷及陳倉米草之走杏葉草無毒蔓生杏葉草主腸痔下血久不瘥者出圖經名金盞草苗圖經曰蔓生籬下葉葉相對秋後有子如雞頭實其中變生一小蟲子脫而能行地圖經曰生常州時生春生苗採中夏取花收曝乾用花味酸性寒氣味厚於氣陰也草之草水甘草無毒水生水甘草主小兒風熱丹毒瘡與甘草同煎飲服出圖經苗圖經曰春生苗莖青色葉如楊柳無花多生水際土人多單服不入衆藥地圖經曰生筠州時生春生苗採八月十月取收曝乾用莖色青味甘性緩氣氣之薄者陽中之陰草之走地柏散生地柏主臟毒下血其方與黃耆等分末之米飲服二錢神效出圖經苗圖經曰根黃壯如絲莖細上有黃點子無花葉三月生苗長四五寸許蜀中九月藥市多有貨之地圖經曰生蜀中山谷及河中府亦有之時生春生苗採四月取莖花收曝乾用莖及根草之草紫背龍牙無毒植生紫背龍牙治咽喉中痛含咽之便效出圖經苗圖經曰其藥冬夏長生地圖經曰生蜀中時生夏冬生採無時味辛甘性溫氣氣之厚者陽也解一切蛇毒甚妙攀倒甑植生攀倒甑主解利風壅熱盛煩渴狂躁取葉研搗冷水浸絞汁服之甚效出圖經名斑骨草斑杖莖苗圖經曰其莖葉如薄荷地圖經曰生宜州郊野時生春生苗採春夏取葉用葉色青緑味苦性寒氣味厚於氣陰也佛甲草微毒叢生佛甲草療湯火瘡毒爛研如膏貼之出圖經苗圖經曰多附石向陽而生有似馬齒莧細小而長有花黃色不結實四季皆有地圖經曰生筠州時生四季皆有採無時用莖及葉味甘性寒氣氣之薄者陽中之陰百乳草無毒叢生百乳草主下乳亦通順血脈調氣甚佳出圖經名百蕊草苗圖經曰此即百蕊草也三月生苗四月長及五六寸莖葉俱青有如松葉無花其根黃白色形似瓦松也地圖經曰生河中府秦州劍州亦有之時生春生苗採四月取根收曬乾用根色黃白撮石合草無毒植生撮石合草療金瘡甚佳出圖經苗圖經曰苗莖高二尺以來葉似谷葉十二月萌芽生苗二月有花而不結實地圖經曰生眉州平田中時生十二月萌芽採二月取苗收陰乾用苗色青緑味甘性緩氣氣之薄者陽中之陰石莧有小毒叢生石莧與甘草同服療齁䶎及吐風涎出圖經苗圖經曰春生苗葉莖青高一尺以來葉如水柳而短地圖經曰出筠州多附河岸沙石上生時生春生苗採八月九月取用莖葉色青味辛苦性散泄氣味厚於氣陰中之陽草之木百兩金無毒植生百兩金療壅熱咽喉腫痛取根含一寸許咽津效出圖經苗圖經曰葉似荔枝初生背面俱青結花實後背紫面青苗高二三尺有干如木凌冬不凋初秋開花青碧色結實如豆大生青熟赤根入藥用河中出者根赤色如蔓荊莖細青色四月開碎黃花似星宿花五月根長及一寸地圖經曰生戎州雲南軍河中府亦有之時生春生苗採五月取根收曬乾用根色白赤味苦性平泄氣味厚於氣陰中之陽制凡使根捶去心用治療圖經曰去風涎草之草小青植生小青治癰瘡搗葉敷之甚效出圖經地圖經曰生福州時生三月生花採三月取葉曲節草無毒植生曲節草治發背瘡消壅腫拔毒與甘草作末米汁調服出圖經名蛇籃緑豆青六月冷苗圖經曰四月生苗莖方色青有節七月八月著花似薄荷結子無用葉似劉寄奴而青軟地圖經曰生筠州時生四月生苗採五月六月取莖葉收陰乾用莖葉色青味甘性平緩氣氣之薄者陽中之陰制細銼為末用獨腳仙植生獨腳仙治婦人血塊取根葉連梗焙乾為末以酒煎半錢服之效出圖經苗圖經曰春生苗至秋冬而葉落其葉圓上青下紫其腳長三四寸地圖經曰生福州山林旁陰泉處多有之時生春生苗採夏取根葉梗收焙乾用根葉及梗色青緑露筋草無毒植生露筋草療蜘蛛並蜈蚣咬傷瘡取根末和白礬水調貼之出圖經苗圖經曰株高三尺以來春生苗隨即開花結子四時不凋其子碧緑色地圖經曰生施州時生春生苗採不拘時取根用根味辛澀性涼散氣氣之薄者陽中之陰制焙乾搗羅為末用紅茂草叢生紅茂草主癰疽瘡腫取根葉焙乾為末以冷水調貼之出圖經名地沒藥長生草苗圖經曰四季枝葉繁盛故有長生之名地圖經曰生施州時生春生新葉採春取根葉用根及葉味苦性大涼氣味厚於氣陰也制焙乾搗羅為末用見腫消有微毒植生見腫消治狗咬瘡消癰腫以生苗葉爛搗貼之出圖經苗圖經曰春生苗葉莖紫色高一二尺葉似桑而光面青紫赤色地圖經曰生筠州時生春生苗採無時用苗葉色紫赤味酸澀性寒氣味厚於氣陰也制搗爛用半天回無毒植生半天回與雞翁藤野蘭根崖棕四味洗淨去粗皮焙乾等分搗羅為末溫酒服二錢匕療婦人血氣五勞七傷出圖經苗圖經曰春生苗高二尺以來赤斑色至冬苗葉皆枯地圖經曰生施州時生春生苗採夏月取根用根味苦澀性溫氣氣厚於味陽中之陰忌婦人服之忌羊血雞魚濕面丈夫服之無所忌龍牙草無毒植生龍牙草治赤白痢根為末米飲調服一錢匕服之無所忌出圖經苗圖經曰株高二尺以來春夏有苗葉至秋冬而枯地圖經曰生施州時生春生苗採春夏取根用根味辛澀性溫氣氣之厚者陽也制洗淨揀擇去蘆頭焙乾搗羅為末用苦芥子無毒植生苦芥子明眼目治血風煩躁出圖經苗圖經曰苗長一尺以來枝莖青色葉如柳開白花似榆莢其子黑色地圖經曰生秦州時生春生苗採秋取子用實色黑味苦性大寒氣味厚於氣陰也野蘭根無毒叢生野蘭根與半天回雞翁藤崖棕等四味洗淨去粗皮焙乾等分搗羅為末溫酒調服二錢匕療婦人血氣並五勞七傷出圖經苗圖經曰叢生高二尺以來四時有葉而無花地圖經曰生施州時生春生新葉採無時取根用根味微苦性溫泄氣氣厚於味陽中之陰忌婦人服之忌雞魚濕面羊血丈夫無所忌草之走都管草蔓生都管草主風癰腫毒赤疣以醋磨其根塗之亦治咽喉腫痛切片含之立愈出圖經名香球苗圖經曰其根似羌活頭歲長一節高一尺許葉似土當歸有重臺施州生者作蔓又名香球蔓長丈餘赤色秋結紅實四時皆有地圖經曰生施州及宜州田野時生春生苗採二月八月取根收陰乾用根味苦辣性寒泄氣氣薄味厚陰中之陽治療圖經曰採其根枝煎湯淋洗去風毒瘡腫草之草小兒群無毒叢生小兒群與左纏草旋花根也二味洗淨焙乾等分搗羅為末每服一錢溫酒調下療淋疾無忌出圖經苗圖經曰叢高一尺春夏生苗葉無花至冬而枯地圖經曰生施州時生春夏生苗採無時取根用根味辛性涼氣氣之薄者陽中之陰菩薩草無毒叢生菩薩草治諸蟲蛇傷飲其汁及研敷之良又主婦人妊娠咳嗽搗篩蜜丸服之立效出圖經名尺二苗圖經曰此草凌冬不凋秋中有花直出赤子似蒻頭地圖經曰生江浙州郡近京亦有之時生春生新葉採冬月取根用根味苦性泄氣味厚於氣陰也解中諸藥食毒者酒研服之仙人掌草無毒麗生仙人掌草與甘草浸酒服治腸痔瀉血不入衆藥使出圖經苗圖經曰多於石壁上貼壁而生如人掌故以名之葉細而長春生至冬猶青地圖經曰生合州筠州時生春生葉採無時用葉色青味微苦而澀性泄氣味厚於氣陰也紫背金盤草無毒植生紫背金盤草療婦人血氣能消胎氣取根洗淨去粗皮焙乾搗羅為末溫酒調服半錢匕效出圖經苗圖經曰苗高一尺以來其葉背紫而無花地圖經曰生施州時生春生苗採無時取根用根味辛澀性熱氣氣之厚者陽也禁孕婦不可服忌雞魚濕面羊血石逍遙草無毒植生石逍遙草療癱瘓諸風手足不遂取苗葉搗為末煉蜜丸如梧桐子大酒服二十粒日二服百日瘥久服益血輕身初服微有頭疼無害出圖經苗圖經曰其草冬夏常有無花實生亦不多地圖經曰生常州時生冬夏常有採無時用苗葉味苦性微寒氣味厚於氣陰也胡堇草無毒叢生胡堇草主五臟營衛肌肉皮膚中瘀血止疼痛散血絞汁塗金瘡出圖經苗圖經曰科葉似小堇菜花紫色似翹軺花七科七葉花出三兩莖地圖經曰生密州東武山田中時生春初生採春取苗用苗味辛性散氣氣之薄者陽中之陰合治苗搗篩為末與松枝乳香花桑柴炭亂髮灰同熬如彈丸大如有打撲損筋骨折傷及惡癰癤腫破以熱酒磨一彈丸服之其疼痛立止無心草無毒叢生無心草主積血逐氣塊益筋節補虛損潤顏色療澼泄腹痛出圖經地圖經曰生商州秦州時生三月開花五月結實採六七月取根苗收陰乾用苗及根性溫氣氣之厚者陽也草之走千里光無毒蔓生千里光與甘草煮作飲服主退熱明目不入衆藥用出圖經苗圖經曰春生苗秋取莖葉其葉似橘葉而長背有毛枝幹圓而青花黃色不結實花無用地圖經曰生筠州淺山及路旁時生春生苗採秋取莖葉用莖及葉色青緑味苦甘性寒氣氣薄味厚陰中之陽草之草九牛草有小毒植生九牛草與甘草同煎服解風勞治身體痛不入衆藥用出圖經苗圖經曰二月生苗獨莖高一尺葉似艾葉圓而長面青背有白毛地圖經曰生筠州山岡上時生二月生苗採五月取莖葉用莖葉色青味微苦性泄氣味厚於氣陰也刺虎植生刺虎理一切腫痛風疾以根葉枝干細銼焙乾搗羅為末暖酒調服一錢匕效出圖經苗圖經曰其葉凌冬不凋地圖經曰生睦州時生春生新葉採無時取根葉枝干用根葉枝干味甘性緩氣氣之薄者陽中之陰生瓜菜無毒叢生生瓜菜治走疰攻頭面四肢及陽毒傷寒壯熱頭痛心神煩躁利胸膈俗用搗自然汁飲之及生搗貼腫毒出圖經苗圖經曰苗長三四寸作叢春生莖葉其葉青圓似白莧菜夏開紫白花結黑細實其味作生瓜氣故以為名地圖經曰生資州平田陰畦間時生春生苗採春夏取莖葉用莖葉味甘性微寒氣氣之薄者陽中之陰建水草植生建水草治走疰風取其葉焙乾碾末暖酒服出圖經苗圖經曰其枝葉似桑四時常有地圖經曰生福州時生春生苗採無時取葉用葉紫袍植生紫袍治咽喉口齒出圖經苗圖經曰春深發生葉如苦益菜至五月生花紫色如金錢地圖經曰生信州時生春生苗採夏取苗葉用苗葉老鴉眼睛草無毒植生老鴉眼睛草治風補益男子元氣婦人敗血出圖經名天茄子苗圖經曰葉如茄子葉故名天茄子或云即漆枯草也漆枯即蜀羊泉已見本經人亦不能決識之地圖經曰生高郵軍江湖間亦有之時生春生苗採七月取子用根葉及子味甘性溫氣氣之厚者陽也合治葉入醋細研治小兒火焰丹消赤腫根與木通胡荽煎湯服通利小便草之走天花粉無毒蔓生天花粉主消渴身熱煩滿大熱補氣安神續絶傷除腸中痼熱八疸身面黃唇乾口燥短氣通月水止小便利出圖經地圖經曰生明州時生春生苗採十一月十二月取根用根味苦性寒氣味厚於氣陰也草之草瓊田草植生瓊田草治風取根葉焙乾生搗羅蜜丸服之出圖經苗圖經曰春生苗葉無花地圖經曰生福州時生春生苗採三月取根葉用根葉石垂植生石垂治蠱毒以其子焙乾生搗羅蜜丸服之甚佳出圖經地圖經曰生福州山中時生春生苗三月生花採四月取子用子紫金牛植生紫金牛主時疾膈氣去風痰用之出圖經苗圖經曰葉如茶上緑下紫實圓紅如丹朱根微紫色採之去心頗似巴戟地圖經曰生福州時生春生苗採八月取根收曝乾用根色紫味辛性散氣氣之厚者陽也制去心銼碎用雞項草植生雞項草治下血出圖經名千針草苗圖經曰葉如紅花葉上有刺青色亦名千針草根似小蘿蔔枝條直上三四月苗上生紫花八月葉凋地圖經曰生福州時生春夏生苗採十月取用根制取根洗淨焙乾碾羅為散服拳參植生拳參搗末淋炸消腫氣出圖經苗圖經曰葉如羊蹄根似海鮍黑色地圖經曰生淄州田野時生春生苗採五月取根子叢生根子主心中結塊久積氣攻臍下出圖經地圖經曰生威州山中時生春生苗採無時取根用根味苦辛性溫氣氣厚味薄陽中之陰杏參植生杏參主腹臟風壅上氣咳嗽出圖經苗圖經曰根似小菜根地圖經曰生淄州田野時生春生苗葉採五月取用苗葉赤孫施植生赤孫施治婦人血結不通每用一手握淨洗細研暖酒調服之出圖經苗圖經曰葉如浮萍草四時常有地圖經曰生福州時生春生新葉採無時田母草植生田母草主煩熱及小兒風熱用之尤效出圖經苗圖經曰無花實地圖經曰生臨江軍時生春生苗採二月取根用根性涼氣氣之薄者陰也鐵線無毒植生鐵線療風消腫毒有效出圖經地圖經曰生饒州時生春生苗採三月取根收陰乾用根味微苦性泄氣味厚於氣陰也草之走天壽根蔓生天壽根治胸膈煩熱有效出圖經地圖經曰出臺州性涼氣味厚於氣陰也草之草百藥祖植生百藥祖治風有效出圖經苗圖經曰苗葉冬夏常青地圖經曰生天台山中時生春生新葉採冬取根用根黃寮郎植生黃寮郎治風有效出圖經苗圖經曰苗葉冬夏常青地圖經曰生天台山中時生春生新葉採無時取根用根催風使植生催風使治風有效出圖經苗圖經曰苗葉冬夏常青地圖經曰生天台山中時生春生新葉採秋取用葉陰地厥無毒植生陰地厥主療腫毒風熱出圖經苗圖經曰葉似青蒿莖青紫色花作小穗微黃根似細心地圖經曰生鄧州順陽縣內鄉山谷時生春生苗採七月取根苗收陰乾用苗及根味甘苦性微寒氣氣薄味厚陰中之陽千里急植生千里急治眼有效出圖經苗圖經曰春生苗秋開花地圖經曰生天台山中時生春生苗採秋取花葉用花及葉地芙蓉無毒植生地芙蓉花主惡瘡葉以敷貼腫毒出圖經地圖經曰生鼎州時生春生苗採九月取花葉收陰乾用花葉味辛性平散氣氣之薄者陽中之陰黃花了植生黃花了療咽喉口齒出圖經苗圖經曰春生青葉至三月而有花似辣菜花黃色至秋中結實地圖經曰生信州時生春生葉採無時布里草有小毒植生布里草治皮膚瘡疥出圖經苗圖經曰莖高三四尺葉似李而大至夏不花而實地圖經曰生南恩州原野中時生春生苗採無時取根皮用根皮味苦性寒氣氣薄味厚陰也合治以根割取皮焙乾為末油和塗瘡疥殺蟲禁食之令人瀉香麻叢生香麻去風以苗葉煎湯浴之甚佳出圖經苗圖經曰四季常有苗葉而無花地圖經曰生福州時生春生新葉採無時用苗葉半邊山植生半邊山主風熱上壅喉咽腫痛及項上風瀝以酒磨服出圖經名水苦蕒謝婆菜苗圖經曰其根壯似白朮而軟葉似苦蕒厚而光地圖經曰生宜州溪澗時生春生苗採二月八月九月取根用根味微苦辛性寒氣氣薄味厚陰中之陽火炭母草無毒植生火炭母草去皮膚風熱流注骨節癰腫疼痛取葉搗爛於垍器中以鹽酒炒敷腫痛處經宿一易出圖經苗圖經曰莖赤而柔似細蓼葉端尖近梗方夏有白花秋實如菽青黑色味甘可食地圖經曰生南恩州原野中時生春生苗採無時用葉味酸甘性平收氣味厚於氣陰中之陽亞麻子無毒植生亞麻子治大風疾出圖經名鴉麻苗圖經曰苗葉俱青花白色八月上旬採其實用地圖經曰出兗州威勝軍時生春生苗採八月取實用實味甘性微溫氣氣之厚者陽也田麻植生田麻療癰癤腫毒出圖經苗圖經曰春夏生青葉七月八月中生小莢子地圖經曰生信州田野及溝澗旁時生春夏生苗採冬月取用葉色青鴆鳥威植生鴆鳥威療癰癤腫毒出圖經苗圖經曰春生青葉至九月而有花如蓬蒿菜淡黃色不結實地圖經曰生信州山野中時生春生葉採無時茆質汗植生茆質汗治風腫行血有效出圖經苗圖經曰葉青花白地圖經曰生信州時生春生苗採七月取地蜈蚣叢生地蜈蚣水磨塗腫毒出圖經地圖經曰出江寧州村落間鄉人採之以塗腫毒醫方鮮用地茄子有小毒叢生地茄子主中風痰涎麻痹下熱毒氣破堅積利膈消癰腫瘡癤散血出圖經苗圖經曰三月開花結子地圖經曰生商州時生春生苗採五月六月取子收陰乾用子味微辛性溫氣氣之厚者陽也水麻金燈石蒜有小毒植生石蒜主敷貼腫毒出圖經地圖經曰水麻生鼎州其根名石蒜又名金燈花金燈之根亦名石蒜或云三物共一類也時生春生苗採九月取莖葉根用莖葉根味辛性溫散氣氣之厚者陽也蕁麻有大毒植生蕁麻療蛇毒出圖經地圖經曰生江寧府山野中禁人誤服之吐利不止山姜有小毒叢生山姜去皮間風熱可作淋炸湯又主暴冷及胃中逆冷霍亂腹痛出圖經苗圖經曰開紫花不結子地圖經曰生衛州時生春生苗採八月取根用根味辛性平散氣氣之薄者陽中之陰草之走馬腸根有毒蔓生馬腸根主蠱除風療瘡疥出圖經苗圖經曰其葉似桑性熱地圖經曰生秦州時生春生苗採三月取葉五月六月取根用根葉味苦辛性寒氣氣薄味厚陰中之陽撒馥蘭無毒植生撒馥蘭主寬胸膈開胃進飲食久服滋下元悅顏色及治傷寒發狂今補名番紅花苗謹按撒馥蘭三月蒔種於陰處其根如蒜硬而有須抽一莖高六七寸上著五六葉亦如蒜葉細長緑色五月莖端開花五六朵如紅藍花初黃漸紅六月結子大如黍花能療疾彼土人最珍重今亦入貢合香多用之地出忽剌散並怯里慢黑裡撒馬兒罕時生三月生苗採五月取花收曝乾用花質類紅藍花而長色紅味甘微酸性平溫氣氣厚味薄陽中之陰臭香主散郁調血制碾細用合治碾爛合羊心牛心或鹿心用火炙令紅色塗於心上食之能治腰背胸膈頭項作疼及止弱人食之亦能壯盛本草圖經本經外木蔓類木之草大木皮無毒植生大木皮與苦桃皮櫻桃皮三味去粗皮淨洗焙乾等分搗羅酒調服一錢匕療一切熱毒氣服食無忌出圖經苗圖經曰其高下大小不定四時有葉無花地圖經曰生施州時生春生苗採無時取皮用皮味苦澀性溫泄氣味厚於氣陰中之陽崖棕無毒叢生崖棕根與半天回雞翁藤野蘭根四味淨洗焙乾去粗皮等分搗羅溫酒調服二錢匕療婦人血氣並五勞七傷出圖經苗圖經曰苗高一尺以來四季有葉無花地圖經曰生施州石崖上時生春生苗採無時取根用根味甘辛性溫氣氣之厚者陽也禁婦人服忌雞魚濕面丈夫服無所忌木之走鵝抱麗生鵝抱主風熱上壅咽喉腫痛及解蠻箭藥毒篩末以酒調服之有效亦消風熱結毒赤腫用酒磨塗之立愈出圖經苗圖經曰此種多生山林中附石而生作蔓使大豆根形似萊蔔大者如三升器小者如拳地圖經曰生宜州山洞中時生春生苗採二月八月取根收切片陰乾用根味苦性寒泄氣味厚於氣陰也雞翁藤蔓生雞翁藤與半天回野蘭根崖棕四味淨洗去粗皮焙乾等分搗羅為末每服二錢用溫酒調下療婦人血氣並五勞七傷出圖經苗圖經曰其苗蔓延大木有葉無花地圖經曰出施州時生春生苗採無時味辛性溫散氣氣之厚者陽也忌婦人服忌雞魚濕面羊血丈夫無所忌紫金藤蔓生紫金藤治丈夫腎氣出圖經苗圖經曰春初單生葉青色至冬凋落其藤似苦條地圖經曰生福州山中時生春生葉採無時取皮收曬乾用皮制為末用獨用藤無毒蔓生獨用藤與小赤藥頭二味洗淨焙乾各等分搗羅為末溫酒調一錢匕療心氣痛出圖經苗圖經曰四時有葉無花葉上有倒刺地圖經曰生施州時生春生新葉採無時取皮用皮味苦辛性熱氣氣厚味薄陽中之陰瓜藤無毒蔓生瓜藤與刺豬零二味洗淨去粗皮焙乾等分搗羅為末用甘草水調貼治諸熱毒惡瘡出圖經苗圖經曰四時有葉無花地圖經曰生施州時生春生新葉採無時取皮用皮味甘性涼緩氣氣之薄者陽中之陰金稜藤無毒蔓生金稜藤與續筋馬接腳三味洗淨去粗皮焙乾等分為末溫酒調服二錢匕治筋骨疼痛無所忌出圖經苗圖經曰四時有葉無花地圖經曰生施州時生春生新葉採無時取皮用皮味辛性溫氣氣之厚者陽也野豬尾無毒蔓生野豬尾與百藥頭二味洗淨去粗皮焙乾等分搗羅為末溫酒調下一錢匕療心氣痛解熱毒出圖經苗圖經曰其苗纏木作藤生四時有葉無花地圖經曰生施州時生春生新葉採無時取皮用皮味苦澀性涼氣味厚於氣陰也烈節無毒蔓生烈節主肢節風冷筋脈急痛出圖經苗圖經曰春生蔓苗莖葉俱似丁公藤而纖細無花實以浴湯佳地圖經曰生榮州多在林菁中時生春生苗採九月取莖葉收曝乾用莖葉味辛性溫氣氣厚於味陽也木之草杜莖山植生杜莖山主溫瘴寒熱發歇不定煩渴頭疼心躁取其葉搗爛以新酒浸絞汁服之吐出惡涎甚效出圖經苗圖經曰其苗高四五尺葉似苦蕒菜秋有花紫色實如枸杞子大而白地圖經曰生宜州用葉味苦性寒泄氣味厚於氣陰也木之走血藤蔓生血藤行血治氣塊出圖經苗圖經曰葉如蔢蘭葉根如大拇指其色黃地圖經曰生信州時生春生葉採五月取色黃木之草土紅山無毒植生土紅山主骨節疼痛治勞熱瘴瘧以葉搗爛酒浸服之出圖經苗圖經曰其大者高七八尺葉似枇杷而小無毛秋生白花如粟粒不實福州生者作細藤似芙蓉葉其葉上青下白根如葛頭是也地圖經曰生福州及南恩州山野中時生春生苗採無時取葉根用葉根味甘苦性微寒氣味厚氣薄陰中之陽合治根切薄片用米泔浸一宿更用清水又浸一宿取出炒令黃色搗末每服一錢水一盞生薑一小片同煎服治勞瘴甚佳木之走百稜藤蔓生百稜藤治盜汗出圖經苗圖經曰春生苗蔓延木上無花葉地圖經曰生台州時生春生苗採冬取皮用皮祁婆藤蔓生祁婆藤治風有效出圖經苗圖經曰其苗蔓延木上四時常有彼土人採其葉入藥用地圖經曰生天台山中時生春生葉採無時用葉含春藤蔓生含春藤治風有效出圖經苗圖經曰其苗蔓延木上冬夏常青彼土人採其葉入藥用地圖經曰生台州時生春生新葉採無時用葉清風藤蔓生清風藤治風有效出圖經苗圖經曰其苗蔓延木上四時常有彼土人採其葉入藥用地圖經曰生天台山中時生春生新葉採無時用葉七星草蔓生七星草入烏髭發藥用之出圖經苗圖經曰葉如柳而長作藤蔓延長二三尺其葉堅硬背上有黃點如七星地圖經曰生江州山谷石上時生春生葉採無時味微酸性收氣味厚於氣陰也石南藤蔓生石南藤治腰疼出圖經苗圖經曰其苗蔓延木上四時不凋彼土人採其葉入藥用地圖經曰生天台山中時生春生新葉採無時用葉石合草蔓生石合草治一切惡瘡腫及斂瘡口以葉焙乾搗羅為末溫水調貼出圖經苗圖經曰其苗纏木作藤四時有葉無花地圖經曰生施州時生春生新葉採無時用葉味甘性涼緩氣氣之薄者陽中之陰木之草馬接腳無毒植生馬接腳與續筋即旋葍根也金稜藤三味洗淨去粗皮焙乾等分搗羅為末溫酒調服一錢匕治筋骨疼痛出圖經苗圖經曰作株大小不常四時有葉無花地圖經曰生施州時生春生新葉採無時取皮用皮味甘性溫緩氣氣之厚者陽也木之走芥心草蔓生芥心草搗末治瘡疥甚效出圖經苗圖經曰初生似臘謨草引蔓白色根黃色地圖經曰生淄州時生春生苗採四時取用苗葉木之木醋林子無毒植生醋林子療蛔咬心痛及痔漏下血並久痢不瘥尤治小兒疳蛔咬心腹脹滿黃瘦下寸白蟲單搗為末酒調一錢匕服之甚效出圖經苗圖經曰其木高丈餘枝條紫茂三月開花色白四出九月十月結子纍纍數十枚成朵生青熟赤略類櫻桃而蒂短彼土人多以鹽醋收藏以充果食之生津液醒酒止渴及熟採之陰乾和核用其葉味酸夷獠人採得入鹽和魚鱠食之勝用醋也地圖經曰出邛州山野林菁中時生春生葉採無時取子收陰乾用子色赤味酸性溫收氣氣厚於味陽中之陰禁不可多食令人口舌粗折木之走天仙藤微毒蔓生天仙藤解勞風得麻黃治傷寒發汗與大黃同服則墮胎氣出圖經苗圖經曰春生苗蔓延作藤葉似葛葉圓而小有毛白色四時不凋根有須地圖經曰生江淮及浙東山中時生春生苗採夏取根苗用根苗味苦性溫泄氣氣厚於味陽中之陰
