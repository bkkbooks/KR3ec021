body:
  text: 進本草品彙精要表承德郎太醫院院判臣劉文泰臣王槃修職郎太醫院御醫臣高廷和等謹以所修本草品彙精要進呈者臣等誠惶誠恐稽首頓首伏以民生有欲式弘慮患之規王道無偏克廣推仁之術蓋大聖亦克用又雖小道必有可觀顧茲本草之編實自炎黃而起李唐之上代有發明趙宋以來時加增正傳流已越乎千載鋟梓奚啻乎數番奈何咨諏未遍於遐方兼之詮釋徒拘於已見多或過於餖飣粗秪識其皮膚遂俾千古不刊之書肆有纍朝未就之歉時將有待事豈徒然茲蓋伏遇皇帝陛下乃聖乃神允文允武虛心講學雖山川草木亦寧留意生人暨鳥獸魚鱉咸若無為而治有道之長邇者慨醫道之中衰命臣等以復正顧惟朽質曷稱淵謀筆札屢勤於尚方指麾一出於宸斷翻諸舊刻式用新圖躬鉛槧以冰兢撫心膺而汗愧定異同互考夫諸説大較就簡以芟繁辨真偽兼採夫群書時或補遺而輯略用嚴君臣使之別類分上中下之殊列部而系以條比種而詳其地凡諸草石金玉之類毛蟲飛走之形而大綱畢舉與夫性味氣質之偏助合反忌之辨而細目俱陳於以成之有名斯萃薄言觀者按圖可知是雖出於古人而實備於今日典彝攸在恭敬是將聊伸犬馬之忱敢謂無遺於一得猥辱腹心之視庶期有補於萬分鄙華陀終於不傳嗤漢帝以為無益竊惟醫流之用藥譬則世主之掄才苟去取之未精實存亡之攸系但臣等愧非醫國之手冀陛下勿忘苦口之言居安以慮危原診而知政更期萬幾之暇善推所為克俾一世之民咸躋於壽元氣同天而不息皇圖配地之無疆臣等無任瞻天仰聖激切屏營之至謹以所修本草品彙精要四十二卷外目録一卷裝成三十六帙隨表上進以聞臣等誠惶誠恐稽首頓首謹言弘治十八年三月初三日承德郎太醫院院判臣劉文泰等謹上表奉命纂修本草品彙精要官員職名總督司設監太監臣張瑜提調中議大夫贊治尹通政使司右通政掌太醫院事臣施欽中憲大夫通政使司右通政同掌太醫院事臣王玉總裁承德郎太醫院院判臣劉文泰承德郎太醫院院判臣王槃修職郎太醫院御醫臣高廷和副總裁太醫院冠帶醫士臣崔鼎儀太醫院醫士臣盧志太醫院冠帶醫士臣唐鋐纂修太醫院冠帶醫士臣徐鎮太醫院冠帶醫士臣夏英太醫院醫士臣錢宙太醫院冠帶醫士臣徐浦太醫院冠帶醫士臣徐昊太醫院冠帶醫士臣吳錢太醫院冠帶醫士臣鄭通中書科儒士臣王瓏太醫院醫士臣劉翬太醫院冠帶醫士臣張鐸催纂承德郎太醫院院判臣張綸承德郎太醫院院判臣方叔和承德郎太醫院院判臣錢鈍謄録中書科冠帶儒士臣吉慶中書科冠帶儒士臣周時敕中書科儒士臣薑承儒中書科儒士臣仰仲瞻太醫院醫士臣吳恩太醫院醫士臣祝壽太醫院醫士臣王棠太醫院醫士臣方榮太醫院醫士臣祝恩太醫院冠帶儒士臣王宜壽太醫院醫士臣戴仲紳太醫院冠帶醫士臣何祥太醫院冠帶醫士臣李潤中書科冠帶儒士臣練元獻驗藥形質奉議大夫通政使司右參議臣丘鈺奉議大夫太醫院院使臣李宗周修職郎太醫院御醫臣施鑑修職郎太醫院御醫臣劉珍太醫院惠民藥局副使臣楊恆凡例一本草品彙精要首玉石次草次木次人次獸次禽次蟲魚次果次米穀次菜每部悉遵神農本經分為三品共四十二卷一神農本經朱書於前名醫別録墨書於次庶不紊亂一分二十四則一曰名紀別名也二曰苗敘所生也三曰地載出處也四曰時分生採也五曰收書蓄法也六曰用指其材也七曰質擬其形也八曰色別青黃赤白黑也九曰味著酸辛甘苦鹹也十曰性分寒熱溫涼收散緩堅軟也十一曰氣具厚薄陰陽升降之能也十二曰臭詳腥膻香臭朽也十三曰主專某病也十四曰行走何經也十五曰助佐何藥也十六曰反反何味也十七曰制明炮爁炙爆也十八曰治陳療疾之能也十九曰合治取相與之功也二十曰禁戒輕服也二十一曰代言假替也二十二曰忌避何物也二十三曰解釋何毒也二十四曰贋辨真偽也亦以朱書於上而各墨書著於其下一玉石按皇極經世書分天然人為之異蓋金石之類天然者也鹽礬之類人為者也今據經世書而分石水火土加金庶幾盡之一草木谷菜果按皇極經世分草木飛走之四類其草有草之草草之木草之飛草之走而木谷果菜並如是例以定物形一草木之生不一今以特然而起者為特生散亂而生者為散生植立而生者為植生牽藤而緣者為蔓生寄附他木者為寄生依麗牆壁者為麗生自泥淖中出者為泥生各狀其形以便採用一禽獸蟲魚分羽毛鱗甲裸為五類每類又分胎卵濕化之四生一玉石草木禽獸蟲魚菜果米穀之類舊本雖有名用而無形質者今悉博考之繪圖增補一有世所經用而舊本未載者如玉石之爐甘石鵝管石東流水甘爛水草之草果三賴木之樟腦八角茴香果之香圓馬檳榔平波八簷仁銀杏株子必思答米之豌豆青小豆菜之胡蘆甘露子蘑菰香菜薇菜胡蘿蔔天花菜禽之天鵝鴇䳄䳓水扎鳥獸之塔剌不花毫豬之類今則考其形質性味各立其條增補各部之內一有今名而異乎古稱者用必致疑今以通脫木為木通木通為通草假蘇為荊芥薯蕷為山藥之類悉改世所通稱之名一有種同而用異者如薑石之有麥飯石獨活之與羌活枸杞之與地骨樗木之與椿木葉胡麻之與巨勝木香之有青木香栝蔞根之與栝蔞實術之有蒼白芍藥之有赤白豺之與狼丹雄雞之與烏白雌雄之類皆各析其條使用者不難於揀用一如大鹽戎鹽光明鹽緑鹽俱系鹽類取次於食鹽條後又如殷孽孔公孽石花石床之類俱附於石鐘乳條後又如益智子鬱金香藿香皆草類也俱自木部移附草部阿魏牡丹盧會皆木也自草部移附木部龍眼椰子棐實皆果也自木部移附果部棠球自外經移附果部凡系以類相從者率皆移就一部之中庶不乖紊一舊本諸家注釋皆依漢唐宋年代先後次序今議圖經之説多為切當是經前人所推究者也故首書之其餘如陶隱居日華子唐本蜀本陳藏器唐慎微等説必擇考其當者録之其重言疊論皆不復瑣屑又衍義之言多能折中雖書其末實以正諸家之疑也又如近代李明之王好古朱彥修注釋藥味之言有切於治用者悉附於下一刪繁拾遺等本草之論及華陀吳普徐之才掌禹錫等注釋不須逐一詳名但曰別録云一藥有近代用效而衆論僉同舊本欠發揮者今考著其詳則曰謹按一天有陰陽風寒暑濕燥火三陰三陽上奉之溫涼寒熱四氣是也溫熱者天之陽也寒涼者天之陰也此乃天之陰陽也地有陰陽金木水火土生長化收藏下應之辛甘淡酸苦鹹五味是也皆象於地辛甘淡者地之陽也酸苦鹹者地之陰也此乃地之陰陽也味之薄者為陰中之陽味薄則通酸苦鹹平是也味之厚者為陰中之陰味厚則泄酸苦鹹寒是也氣之厚者為陽中之陽氣厚則發熱辛甘溫熱是也氣之薄者為陽中之陰氣薄則發泄辛甘淡平涼寒是也輕清成象本乎天者親上重濁成形本乎地者親下是以辛甘發散為陽酸苦湧泄為陰今於各品之下皆法東垣詳其陰陽以辨升降浮沉之理一用藥法象有云風升生熱浮長濕化成燥降收寒沉藏此五者明五行稟五氣之所生也故曰生物者氣也成之者味也以奇生則成而耦以耦生則成而奇寒氣堅故其味可用以火熱氣耎故其味可用以堅風氣散故其味可用以收燥氣收故其味可用以散土者沖氣之所生沖氣則無所不和故其味可用以緩氣堅則壯故苦可以養氣脈耎則和故咸可以養脈骨收則強故酸可以養骨筋散則不攣故辛可以養筋肉緩則不壅故甘可以養肉堅之而後可以耎收之而後可以散欲緩則用甘不欲則弗用用之不可太過太過亦生病今於各品之下的分生長收藏氣味厚薄以明五行五氣所稟而生也一人部舊本不圖緣繪圖之設蓋以取其便於識用耳人身之物所同有者故不復繪一如天名精之與地松蘩蔞之與雞腸草之類名雖不同其實一物者皆並去之仍類附於退出之次一書方土生産多依唐宋地名欲更當代郡縣恐先後不同難以考據今復考其世稱附載卷末神農本經例上藥一百二十種為君主養命以應天無毒多服久服不傷人欲輕身益氣不老延年者本上經中藥一百二十種為臣主養性以應人無毒有毒斟酌其宜欲遏病補虛羸者本中經下藥一百二十五種為佐使主治病以應地多毒不可久服欲除寒熱邪氣破積聚愈疾者本下經三品合三百六十五種法三百六十五度一度應一日以成一歲藥有君臣佐使以相宣攝合和宜用一君二臣三佐五使又可一君三臣九佐使也藥有陰陽配合子母兄弟根莖花實草石骨肉有單行者有相須者有相使者有相畏者有相惡者有相反者有相殺者凡此七情合和視之當用相須相使者良勿用相惡相反者若有毒宜制可用相畏相殺者不爾勿合用也藥有酸鹹甘苦辛五味又有寒熱溫涼四氣及有毒無毒陰乾曝乾採造時月生熟土地所出真偽陳新並各有法藥性有宜丸者宜散者宜水煮者宜酒漬者宜膏煎者亦有一物兼宜者亦有不可入湯酒者並隨藥性不得違越欲療病先察其源先候病機五臟未虛六腑未竭血脈未亂精神未散服藥必活若病已成可得半愈病勢已過命將難全若用毒藥療病先起如黍粟病去即止不去倍之不去十之取去為度療寒以熱藥療熱以寒藥飲食不消以吐下藥鬼疰蠱毒以毒藥癰腫瘡瘤以瘡藥風濕以風濕藥各隨其所宜病在胸膈以上者先食後服藥病在心腹以下者先服藥而後食病在四肢血脈者宜空服而在旦病在骨髓者宜飽滿而在夜夫大病之主有中風傷寒寒熱溫瘧中惡霍亂大腹水腫腸澼下痢大小便不通賁豚上氣咳逆嘔吐黃疸消渴留飲癖食堅積癥瘕驚邪癲癇鬼疰喉痹齒痛耳聾目盲金瘡踒折癰腫惡瘡痔瘻癭瘤男子五勞七傷虛乏羸瘦女子帶下崩中血閉陰蝕蟲蛇蠱毒所傷此大略宗兆其間變動枝葉各宜依端緒以取之採用斤兩制度例凡採用時月皆是建寅歲首則從漢太初後所記也其根物多以二月八月採者謂春初津潤始萌未沖枝葉勢力淳濃故也至秋枝葉乾枯津潤歸流於下今即事驗之春寧宜早秋寧宜晚華實莖葉乃各隨其成熟爾一古稱惟有銖兩而無分名今則以十黍為一銖六銖為一分四分成一兩十六兩為一斤雖有子谷秬黍之制從來均之已久正爾依此用之今方家所云等分者非分兩之分謂諸藥斤兩多少皆同爾先視病之大小輕重所須乃以意裁之凡此之類皆是丸散丸散竟依節度用之湯酒之中無等分也凡散藥有云刀圭者十分方寸匕之一準如梧桐子大也方寸匕者作匕正方一寸炒散取不落為度錢五匕者今五銖錢邊五字者以抄之亦令不落為度一撮者四刀圭也十撮為一勺十勺為一合以藥升分之者謂藥有虛實輕重不得用斤兩則以升平之藥升方作上徑一寸下徑六分深八分內散藥勿按抑之正爾微動令平調爾云一字者為二分半少許即半字是矣凡丸藥有云如細麻者即胡麻也不必匾但令較略大小相稱爾如黍粟亦然以十六黍為一大豆也如大麻子者準三細麻也如胡豆者即今青班豆是也以二大麻子準之如小豆者今赤小豆也粒有大小以三大麻子準之如大豆者以二小豆準之如梧桐子者以二大豆準之一方寸匕散蜜和得如梧子準十丸為度如彈丸及雞子黃者以十梧子準之凡湯酒膏藥舊方皆云㕮咀者謂稱畢搗之如大豆又使吹去細末此於事殊不允當藥有易碎難碎多末少末稱兩則不復均平今皆細切之較略令如㕮咀者乃得無末而片粒調和也凡丸散藥亦先切細曝燥乃搗之有各搗者有合搗者並隨方所言其酒濕藥如天門冬乾地黃輩皆先切曝獨搗令偏碎更出細擘曝乾若逢陰雨亦以微火烘之既燥少停冷乃搗之凡濕藥燥皆大耗當先增分兩須得屑乃稱之為正其湯酒中不須如此也凡篩丸藥用重密絹令細於蜜丸易熟若篩散草藥用輕疏絹於酒中服即不泥其石藥亦用細絹篩令如丸者凡篩丸散藥畢皆更合於臼中以杵搗之數百過視其色理和同為佳也凡湯酒膏中用諸石皆細搗之如粟米亦可以葛布篩令調並以新綿別裹內中其雄黃硃砂輩細末如粉凡煮湯欲微火令小沸其水數依方多少大略二十兩藥用水一斗煮取四升以此為準然則利湯欲生少水而多取汁補湯欲熟多水而少取汁不得令水多少用新布兩人以尺木絞之澄去垽魚靳切濁紙覆令密溫湯勿用鐵器或如熟湯上煮令暖亦好服湯寧令小沸熱易下冷則嘔湧凡云分再服三服者要令勢力相及並視人之強羸病之輕重以為進退增減之不必悉依方説也凡漬藥酒皆須細切生絹袋盛之乃入酒密封隨寒暑日數視其濃烈便可漉出不必待至酒盡也滓可曝燥微搗更漬飲之亦可凡建中腎瀝諸補湯滓合兩劑加水煮竭飲之亦敵一劑新藥貧人可當依此用皆應先曝令燥凡合膏初以苦酒漬令淹浹不用多汁密覆勿泄云晬時者周時也從今旦至明旦亦有止一宿者煮膏當三上三下以泄其熱勢令藥味得出上之使幣幣沸乃下之使沸靜良久乃止其中有薤白者以兩頭微焦黃為候有白芷附子者亦令小黃色為度豬肪皆勿令經水臘月者彌佳絞膏亦以新布絞之若是可服之膏膏滓亦可酒煮飲之可摩之膏膏滓則宜以傅病上此蓋欲兼盡其藥力故也凡膏中有雄黃硃砂輩皆別搗細研如面須絞膏畢乃投中以物疾攪至於凝強勿使沉聚在下不調也有水銀者於凝膏中研令消散胡粉亦爾凡湯酒中用大黃不須細銼作湯者先以水浸令淹浹密覆一宿明旦煮湯臨熱乃內湯中又煮兩三沸便絞出則勢力猛易得快利丸散中用大黃舊皆蒸之今不須爾凡湯中用麻黃皆先別煮兩三沸掠去其沫更益水如本數乃內余藥不爾令人煩麻黃皆折去節令理通寸銼之小草瞿麥五分銼之細辛白前三分銼之丸散膏中則細銼也凡湯中用完物皆擘破干棗梔子栝蔞之類是也用細核物亦打破山茱萸五味子蕤核決明子之類是也細花子物正爾完用之旋覆花菊花地膚子葵子之類是也米麥豆輩亦完用之諸蟲先微炙之惟螵蛸當中破炙之生薑射干皆薄切之芒硝飴糖阿膠皆須絞湯畢內汁中更上火兩三沸煬盡乃服之凡用麥門冬皆微潤抽去心杏仁桃仁湯柔撻去皮巴豆打破剝去皮刮去心不爾令人悶石葦刮去毛辛夷去毛及心鬼箭削取羽皮藜蘆剔取根微炙枳實去其瓤亦炙之椒去實於鐺中微熬令汗出則有勢力礬石於瓦上若鐵物中熬令沸汁盡即止凡石皆以黃土泥包使燥燒之半日令熟而解散犀角羚羊角皆鎊刮作屑諸齒骨並炙搗碎之皂莢去皮子炙之凡湯並丸散用天雄附子烏頭烏喙側子皆煻灰中炮令微坼削去黑皮乃稱之惟薑附湯及膏酒中生用亦削皮乃稱之直理破作七八片隨其大小但削除外黑尖處令盡凡湯酒丸散膏中用半夏皆且完用熱湯洗去上滑以手挼之皮釋隨剝去更復易湯洗令滑盡不爾戟人咽喉舊方云洗十許過今六七過便足亦可煮之一兩沸一易水如此三四過仍挼洗畢便曝乾隨其大小破為細片乃稱之以入湯若膏酒丸散皆須曝燥乃稱之凡丸散用阿膠皆先炙使通體沸起燥乃可搗有不沸處更炙之凡丸中用蠟皆煬投少蜜中攪調以和藥若用熟艾先細擘合諸藥搗令散不可篩者別搗內散中和之凡用蜜皆先火煎掠去其沫令色微黃則丸經久不壞掠之多少隨蜜精粗凡丸散用巴豆去皮心膜杏仁桃仁葶藶胡麻諸有膏膩藥皆先熬黃黑別搗令如膏指櫗莫結切視泯泯爾乃以向成散稍稍下臼中合研搗令消散仍復都以輕疏絹篩度之須盡又內臼中依法搗數百杵也湯膏中用亦有熬之者雖生並搗破之凡用桂心厚朴杜仲秦皮木蘭之輩皆削去上虛軟甲銷處取裹有味者稱之茯苓豬苓削除黑皮牡丹巴戟天遠志野葛等皆捶破去心紫苑洗去土皆畢乃稱之薤白蔥白除青令盡莽草石南茵芋澤蘭皆剔取葉及嫩莖去大枝鬼臼黃連皆除根毛蜀椒去閉口者及目熬之凡狼毒枳實橘皮半夏麻黃吳茱萸皆欲得陳久者良其餘須精新也凡方云巴豆若干枚者粒有大小當先去心皮乃稱之以一分準十六枚附子烏頭若干枚者去皮畢以半兩準一枚枳實若干枚者去穰畢以一分準二枚橘皮一分準三枚棗有大小三枚準一兩云乾薑一纍者以重一兩為正凡方云半夏一升者洗畢稱五兩為正蜀椒一升者三兩為正吳茱萸一升者五兩為正菟絲子一升九兩為正庵䕡子一升四兩為正蛇床子一升三兩半為正地膚子一升四兩為正此其不同也云某子一升者其子各有虛實輕重不可通以稱準者取平升為正凡方云用桂一尺者削去皮畢重半兩為正甘草一尺者重二兩為正云某草一束者以重三兩為正云一把者重二兩為正云蜜一斤者有七合豬膏一斤者有一升二合也凡諸藥子仁皆去皮尖及雙仁者仍切之凡烏梅皆去核入丸散熬之大棗擘去核凡用麥糵麴大豆黃卷澤蘭蕪荑殭蠶乾漆蜂房皆微炒凡湯中用麝香犀角鹿角羚羊角牛黃蒲黃丹砂須熟末如粉臨服內湯中攪令調和服之凡茯苓芍藥補藥須白者瀉藥惟赤者凡石蟹皆以槌極打令碎乃入臼不爾搗不能細牛膝石斛等入湯酒拍碎用之凡菟絲子暖湯淘汰去沙土乾漉暖酒漬經一宿漉出曝微白搗之不盡者更以酒漬經一宿漉出曝微白搗之不盡者更以酒漬經三五日乃出更曬微干搗之須臾悉盡極易碎凡斑蝥等諸蟲皆去足翅微熬用牡蠣熬令黃凡諸湯用酒者皆臨熟下之凡用銀屑以水銀和成泥凡用鍾乳等諸石以玉槌水研三日三夜漂煉務令極細
