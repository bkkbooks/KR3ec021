front:
  text: 序例本草之興神農既辨藥味而即有其目蓋載之三墳者也其三百六十五種取以應度數耳此即神農本經上藥一百二十種為君主養命以應天無毒多服久服亦不傷人故有輕身益氣不老延年之説中藥一百二十種為臣主養性以應人無毒有毒斟酌其宜故有遏病補虛益損之用下藥一百二十五種為佐使主治病以應地多毒不可久服故有除寒熱邪氣破積聚愈疾之功逮後品第之者率由此也其伊尹湯液之興本乎神農仲景傷寒論作出諸湯液至梁陶隱居始進名醫別録亦三百六十五種唐顯慶中命蘇恭李世績等托其差謬參考得失又增一百一十四種謂之唐本草宋開寶中詔劉翰馬志盧多遜李昉王祐扈蒙等又取醫家嘗用有效者一百三十三種刊定而附益之謂之宋本先附蜀孟昶命韓保升等以唐本圖經稍加增廣世謂之蜀本草而漢唐宋千載之間三經刊著增補猶為未當厥後宋之嘉祐二年覆命掌禹錫等參究諸家本草再加校正補注而成名曰政和經史證類本草世傳既久經閲賢哲不為不多每有識者病其繁亂卒不可正雖有衍義之興以其訛正並存用之難別及王好古李明之朱彥修等皆作本草俱簡而略皇上嗣登大寶十有六年嘗於萬幾之暇亦親覽之特命臣等刪繁補缺纂輯成書以便觀覽然而仁民愛物之心即神農黃帝之心也掌太醫院事右通政臣施欽臣王玉院判臣劉文泰臣王槃御醫臣高廷和等與同總督修輯太監臣張瑜膺命以來夙夜驚惕敢不竭庸聞膚見考證諸家之説刪定補輯以副聖意切維臣等醫固職業所當司預者非聖君簡命恐不能息偏執者之言又何以垂乎綿遠也前代之人雖妍於辭章而方技之理恐有未諳但臣等才識淺陋不足以當付任蓋陰陽五行形而上者也飛潛動植形而下者也皇極經世觀物篇云五行之具各有相兼飛走之情不無草木故石有水火之分水有木石之異如斯之類不可不明品彙所生尤當識別鳥獸蟲魚別胎卵濕化之生草木果菜分叢植散寄之長其神農本經朱書於前名醫別録墨書於次此蓋以舊本而參訂之者也嘗觀舊本陶隱居已言於前日華子復注於次至於圖經宋按蜀本陳藏器一物之名言之二三一品之情序之再四唐本既已辨其乖衍義復以非其説陶言既知少當竟未刪除宗奭已鑑前非不能盡釋如此立言者尚昧其真考用者何所取據今則定為二十四則採諸家之確論條陳於各則之下取舊本之精微參注於今昔之右其圖經議論經前人之講究者也多有切當故書於前陶氏之言擇備於次日華子唐本蜀本云次第其詳藥性論衍義陳藏器各著其要但重疊薦贅者亦從而刪之是非未決者則考而擇用如吳普禹錫沈括諸人之言斗門博濟肘後等方之説不必盡言其人俱謂之別録若近代用之獲效輿論昭然者則曰謹按舊本不分者如獨活羌活青皮陳皮白朮蒼朮青廣木香之類功效頗殊形質亦異皆各立其條舊本所遺者若草果三賴八角茴香樟腦爐甘石之流亦繪圖增品此醫之所常用而世之不能無者其生長花葉形質性味先究之於用者貨者復訪之於土産之人一言而必叩其端未嘗己意增損其名請定宸宮制曰本草品彙精要臣等稽首奉行是書既就非敢欲超越前代但舊本之文而志士鴻儒則能斟酌其是非新本之條雖初學庸材不待參詳而即悟大抵方技之書何須義理淵微治病之由貴乎功能易曉臣愚膚見如斯條陳次序於後雷公炮炙論序若夫世人使藥豈知自有君臣既辨君臣寧分相制只如鍁毛今鹽草也沾溺立銷斑腫之毒象膽揮黏乃知藥有情異鮭魚插樹立使乾枯用狗塗之以犬膽灌之插魚處立如故也卻當榮盛無名無名異形似玉仰面又如石灰味別止楚截指而似去甲毛聖石開盲明目而如雲離日當歸止血破血頭尾效各不同頭止血尾破血蕤子熟生足睡不眠立據弊簞淡滷常使者甑中簞能淡鹽味如酒沾交今蜜枳繳枝又云交加枝鐵遇神砂加泥似粉石經鶴糞化作塵飛鍁見橘花似髓斷絃折劍遇鸞血而如初以鸞血煉作膠黏折處鐵物永不斷海竭江枯投遊波燕子是也而立泛令鉛拒火須仗修天今呼為補天石如要形堅豈忘紫背有紫背天葵如常食葵菜只是背紫面青能堅鉛形留砒住鼎全賴宗心別有宗心草有呼石竹不是石者棕心恐誤其草出炊州生處多蟲獸雌得芹花其草名為立起其形如芍藥花色青可長三尺已來葉上黃斑色味苦澀堪用煮雌黃立住火立便成庾硇遇赤須其草名赤須今呼為虎鬚草是用煮硇砂即生火驗木留金鼎水中生火非猾髓而莫能海中有獸名曰猾以髓入在油中其油沾水水中火生不可救之用酒噴之即止勿於屋下收長齒生牙賴雄鼠之骨末其齒若折年多不生者取雄鼠脊骨作末揩折處齒立生如故發眉墮落塗半夏而立生眉發墮落者以生半夏莖杵之取涎塗發落處立生目闢眼雖有五花而自正五加皮是也其葉有雄雌三葉為雄五葉為雌須使五葉者作末酒浸飲之其目雖者正腳生肉鍁禈系菪根腳有肉鍁者取莨菪根於裩帶上系之感應永不痛囊皺漩多夜煎竹木多小便者夜煎萆薢一片服之永不夜起也體寒腹大全賴鸕鷀若患腹大如鼓米飲調鸕鷀末服立枯如故也血泛經過飲調瓜子甜瓜子內仁搗杵末去油飲調服之立絶咳逆數數酒服熟雄天雄炮過以酒調一錢匕服立定遍體疹風冷調生側附子傍生者曰側子作末冷酒服立瘥也腸虛瀉痢須假草零搗五倍子作末以熟水下之立止也久渴心煩宜投竹瀝除症去塊全仗硝硇硝硇即硇砂硝石二味於乳鉢中研作粉同鍛了酒服神效也益食加觴須煎蘆朴不食者並飲酒少者煎逆水蘆根並厚朴二味湯服強筋健骨須是蓯鱔蓯蓉並鱔魚二味作末以黃精汁丸服之可力倍常也出干寧記中駐色延年精蒸神錦黃精自然汁拌細研神錦於柳木甑中蒸七日了以末蜜丸服顏貌可如幼女之容色也知瘡所在口點陰膠陰膠即是甑中氣垢少許於口中即知臟腑所起直至住處知痛足可醫也産後肌浮甘皮酒服産後肌浮酒服甘皮立愈口瘡舌拆立愈黃蘇口瘡舌拆以根黃塗蘇炙作末含之立瘥腦痛欲亡鼻投消末頭痛者以硝石作末內鼻中立止心痛欲死速覓延胡以延胡索作散酒服之立愈也如斯百種是藥之功某忝遇明時謬看醫理雖尋聖法難可窮微略陳藥餌之功能豈溺仙人之要術其製藥炮熬煮炙不能記年月哉欲審元由須看海集某不量短見直録炮熬煮炙列藥制方分為上中下三卷有三百件名具陳於後右雷公炮製序上古之文也雖義理高古文勢似欠接續意往古逮今年紀既多不無脫落且以本經言之云分三卷而有三百件名具陳於後及稽其數大有不同足以知其非全文也姑録之以備參考凡方云丸如細麻子許者取重四兩鯉魚目比之云如大麻子許者取重六兩鯉魚目比之云如小豆許者取重八兩鯉魚目比之云如大豆許者取重十兩鯉魚目比之云如兔菌俗云兔屎許者取重十二兩鯉魚目比之云如梧桐子許者取重十四兩鯉魚目比之云如彈子許者取重十六兩鯉魚目比之一十五個白珠為準是一彈丸也凡方中雲以水一鎰至二鎰至十鎰者每鎰稱之重十二兩為度凡云一兩一分一銖者正用今絲綿稱也勿得將四銖為一分有誤必所損兼傷藥力也凡雲散只作散丸只作丸或酒煮或用醋或乳煎一如法則凡方煉蜜每一斤只煉得十二兩半或一分是數若火少若火過並用不得也凡膏煎中用脂先須煉去革膜了方可用也凡修事諸藥物等一一併須專心勿令交雜或先熬後煮或先煮後熬不得改移一依法則也凡修合丸藥用蜜只用蜜用餳只用餳用糖只用糖勿交雜用必宣瀉人也
