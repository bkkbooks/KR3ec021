body:
  text: 卷之三十蟲魚部中品毛蟲蝟皮無毒胎生蝟皮出神農本經主五痔陰蝕下血赤白五色血汁不止陰腫痛引腰背酒煮殺之以上朱字神農本經療腹痛疝積亦燒為灰酒服之以上黑字名醫所録地圖經曰生楚山川穀及田野間山林中皆有之狀類猯豚腳短多刺尾長寸餘人觸近便藏頭足因外皆刺不可向爾陶云能跳入虎耳中惟見鵲則仰腹受喙蓋物或有相制然耳又云惡鵲聲故欲掩取之猶蚌𧑐音聿也此類亦多惟蒼白色腳似豬蹄者佳鼠腳者次其毛端有兩岐者名山枳鼠肉味酸者名虎鼠味苦而皮褐色類兔皮者名山草一口土凡此皆不堪用尤宜詳識耳唐本注云蝟極獰鈍大者如小豚小者猶瓜大或惡鵲聲故反腹令啄其虎耳不受雞卵且去地三尺蝟何能跳之而入此野俗鄙説未可輕信時生無時採無時用皮質如猯豚而身多刺色蒼白味苦性平氣味厚於氣陰中之陽臭腥主五痔下血助得酒良反畏桔梗麥門冬制酥炙黃或燒灰用治療藥性論云皮炙末白飲下方寸匕主腸風瀉血痔病有頭多年不瘥者燒末吹止鼻衄日華子云開胃氣止血汗肚脹痛疝氣脂治腸風瀉血孟詵云蝟食之肥下焦理胃氣又煮汁服止反胃別録云皮燒末水調服方寸匕治蠱毒下血當吐出蠱毒及搽乳頭上與小兒飲治卒驚啼狀如物刺者合治皮燒灰合酒服療胃逆皮方三指大合熏黃如棗大及熟艾右穿地作坑調和取便熏之以口中熏黃煙氣出為佳火氣稍盡即停三日將息更熏之療五痔不過三度永瘥勿犯風冷羹臛將補慎忌雞豬魚生冷二十日後補之皮燒灰合生油敷腸痔下部如蟲齧合穿山甲等分燒存性入肉豆蔻末一半空腹米飲調服二錢療痔禁勿使中濕及其骨能瘦人不可食誤食令人瘦劣解甚解一切藥力露蜂房有毒附土蜂房露蜂房出神農本經主驚癇瘛瘲寒熱邪氣癲疾鬼精蠱毒腸痔火熬之良以上朱字神農本經又療風毒毒腫以上黑字名醫所録名石蜂窠蜂腸獨蜂窠革蜂窠百穿草蜂窠蜂𭄰音窠大黃蜂窠地圖經曰生牂牱山谷今處處山林中皆有之此木上大黃蜂窠也大者如甕小者如桶其蜂黑色長寸許螫牛馬及人乃至欲死者用此多效人家屋間亦往往有之但小而力慢不堪用不若山林中得風露氣者最佳衍義曰露蜂房有兩種一種小而色淡黃窠長六七寸至一尺者闊三四寸如蜜脾不垂一邊是房多在叢木鬱翳之中世謂之牛舌蜂又一種或在高木上或屋之下作房大如三四斗許小者亦一二斗中有窠如瓠之狀由此得名蜂色赤黃其形大於諸蜂世謂之玄瓠蜂也時生無時採七月七日十一月十二月取收陰乾用樹上得風露氣者佳色青黑味苦鹹性平泄氣味厚於氣陰中之陽臭腥主牙疼癰腫反惡乾薑丹參黃芩芍藥牡蠣制火炙微黃治療圖經曰取十二分炙以水二升煮取八合溫分再服主乳石發動頭痛煩熱口乾小便赤少者服後當利諸惡毒隨小便出瘥又以半兩水煎重濾洗目三四過療熱病後毒氣衝目唐本注云水煮汁每服五合下乳石熱毒壅悶小便中即下石末大效又療上氣赤白痢遺尿失禁並洗狐尿刺瘡日華子云乳癰蜂叮惡瘡即煎洗入藥並炙用別録云大者一枚水三升煮令濃赤浴小兒日三四次療卒癇合治合豬膏調敷蜂螫人以三指撮末合酒調服治崩中漏下青黃赤白使人無子者服之合細辛等分含之治眼翳火炙焦為末合酒服方寸匕日三治鼻中外㾴瘤膿水血出燒灰合酒服治陰痿合亂髮蛇皮燒灰酒服方寸匕日三療諸惡疽附骨癰根在臟腑歷節腫出疔腫惡脈諸毒皆瘥以二枚炙末合臘月豬脂和塗瘰癧成風瘻作孔者土蜂房合醋塗癰腫干即易之瘥解蠱毒甲蟲鱉甲無毒附肉能魶卵生鱉甲出神農本經主心腹癥瘕堅積寒熱去痞息肉陰蝕痔惡肉以上朱字神農本經療溫瘧血瘕腰痛小兒脅下堅肉味甘主傷中益氣補不足以上黑字名醫所録地圖經曰生丹陽池澤今處處有之以嶽州沅江其甲有九肋者為勝仍生取甲剔去肉為好不用煮脫者但看有連厭及干岩便真若上兩邊骨出者是已被煮熟過者不堪入藥南人養魚池中多畜鱉云令魚不隨霧起鱉之類三足者為能奴來切大寒而有毒主折傷止痛化血生搗其肉及血敷之道家云可闢諸厭穢死氣畫像亦能止之無裙而頭足不縮者名魶奴來切食之令人昏塞誤中其毒以黃耆吳藍煎湯服之立解其殼亦主傳尸勞及女子經閉病也時生無時採無時收陰乾用甲生脫九肋多裙重七兩者為上色青緑味咸性平軟氣味厚於氣陰也臭腥主消癥瘕去勞熱反惡礬石理石制雷公云治氣破塊消症定心藥中用之每個鱉甲以六一泥固濟瓶子底待乾入於大火以物搘於中下頭醋三升同煎之以醋盡為度去裙並肋骨方炙乾然入藥用又治勞熱藥中用依前泥以童子小便一斗二升晝夜煮盡童便為度取出去裙留骨於石臼中搗成粉以雞䏶皮裹之取東流水三兩鬥盛於盆內將此閣於盆上一宿至明任用力有萬倍常用酥炙黃色治療圖經曰鱉甲療瘕癖虛勞方中多用之能奴來切生搗其肉及血敷折傷止痛化血又搗肉血塗壁道家云闢厭穢魶殼主傳尸勞女子經閉唐本注云鱉頭燒灰主小兒諸疾及産後陰脫脫肛下墜尸疰心腹痛藥性論云消宿食症塊痃癖氣冷瘕勞瘦下氣除骨熱骨節間勞熱結實壅塞日華子云鱉甲去血氣破癥結惡血隨胎消瘡腫並撲損瘀血瘧疾腸癰陳藏器云鱉主熱氣濕痹腹中激熱細擘五味煮食之當微泄孟詵云鱉主婦人漏下羸瘦別録云鱉甲燒灰服方寸匕療篤病新起早勞食飲多致復欲死者合治鱉甲合訶黎勒皮乾薑末等分為丸桐子大空心下三十丸再服療症癖病又醋炙黃為末合牛乳一合調一匙朝朝服之治痃癖氣又合琥珀大黃作散酒服二錢下婦人畜積惡血血盡即休服又合雞子白和敷丈夫陰頭癰又合酒服方寸匕療石淋又合蜜丸如小豆大服療小兒癇又以一大兩炙黃為末食前合燈心一握水二升煎取五合服一錢匕食後合蜜水服一錢匕療上氣急滿坐臥不得禁目陷者及厭下有王字形者亦不可食鱉膏脫人毛髮塗孔中即不生鱉頷下有軟骨如龜形食之令人患水病又赤足者並獨目者並有大毒食之殺人妊娠不可食其肉令子項短鱉腹下成五字食之作瘕其三足者謂之能奴來切不可食忌合雞子食之殺人合莧菜食之生鱉瘕合芥子同食生惡疾蟹有毒附爪蟹出神農本經主胸中邪氣熱結痛喎僻面腫敗漆燒之致鼠以上朱字神農本經解結散血愈漆瘡養筋益氣爪主破胞墮胎以上黑字名醫所録名蛫蠘蝤蛑桀步彭螖蟳蟧擁劍執火彭蜞撥棹子螖蠌音澤地圖經曰生伊洛池澤諸水中今淮海京東河北陂澤中多有之伊洛反難得也其蟹八蛫二螯大者箱角兩出足節屈曲行則旁橫今人以為食品中之佳味蟹於八月一日後方可食之則味全以前時長未成就其毒尤猛也然蟹之類甚多六足者名蛫音跪及四足者皆有大毒不可食闊殼而多黃者名蠘生南海中其螯最鋭斷物如芟刈焉食之動風氣扁而最大後足闊者為蝤蛑嶺南人謂之撥棹子以後腳形如棹也一名蟳隨潮退殼一退一長其大者如斗小者如盞碟兩螯無毛所以異於蟹其力至強世傳與虎鬥者此也一螯大一螯小者名擁劍又名桀步常以大螯鬥小螯食物一名執火以其螯赤故也其最小者名彭螖音滑吳人語訛為彭越爾雅云螖蠌音澤小者蟧力刀切郭璞云即彭螖也似蟹而小其膏可以塗癬食之令人吐下至困彭蜞亦其類蔡謨度江誤食之即此也衍義曰伊洛絶少今河北沿邊滄瀛州等處所出甚多徐州亦有但不及河北者河北人取之當八九月蟹浪之時夜以燈火照皆出遂捕得之此物每至夏末秋初則如蟬蛻解當日名蟹之意必取此義爾時生無時採八月九月經霜後取用殼肉爪黃色青黑味咸性寒軟氣味厚於氣陰也臭腥主療漆瘡破宿血治療圖經曰蠘食之行風氣蟹爪療孕婦僵仆胎轉上搶心困篤日華子云蟹生搗炒罯療筋骨折傷蝤蛑解熱氣並小兒痞氣陳藏器云蟹腳中髓及腦與殼中黃並能續繼絶筋骨取碎之微熬內瘡中筋即相連也彭蜞主濕癬疽瘡不瘥者塗之孟詵云蟹主散諸熱理脾胃氣調經脈消宿食別録云蟹搗爛敷瘡疥效合治蟹合醋食之利肢節去五臟中煩悶氣合酒服療産後肚痛血不下爪合酒及醋湯煎服破宿血止産後血閉肚痛生蟹足骨焙乾為末合白蘞末等分用乳汁和貼小兒解顱不合禁獨螯獨目及兩目相向者皆有大毒不可食其有六足四足者不可食誤食急以豉汁解之又蟹足斑目赤者誤食之殺人十二月食之傷神妊娠食之令兒橫生俱不可食未經霜時甚有毒云食水茛音建所為人中之不速療即死解中蟹毒服冬瓜汁紫蘇汁瘥殺莨菪羽蟲蚱蟬無毒附蟬蛻化生蚱音笮又音側蟬出神農本經主小兒驚癇夜啼癲病寒熱以上朱字神農本經驚悸婦人乳難胞衣不出又墮胎以上黑字名醫所録名蟬馬蟬鳴蟬殼蟬蛻枯蟬蝒馬蜩鳴蜩蟬殼伏蜟地圖經曰本經不載所出州土但云生楊柳上今在處有之陶隱居以為啞蟬蘇恭以為鳴蟬二説不同按字書解蚱字乃蟬聲也月令云仲夏之月蟬始鳴言五月始有此蟬鳴也而本經亦云五月採正與月令所記始鳴者同時蘇説得之矣蟬類甚多爾雅云蝒馬蜩郭璞注云蜩中最大者為馬蟬今夏中所鳴者比衆蟬最大陶又引詩鳴蜩嘒嘒云是形大而黑昔人所啖者又禮冠之飾附蟬者亦黑而大皆此類也然則爾雅所謂馬蜩詩人所謂鳴蜩月令禮家所謂蟬本草所謂蚱蟬其實一種蟬類雖衆而為時用者獨此一種爾醫方所用蟬殼亦此蟬所蛻也又名枯蟬本生於土中雲是蜣螂所轉丸久而化成此蟲至夏便登木而蛻也衍義曰蚱蟬夏月身與聲皆大者是始終一般聲仍皆乘昏夜方出土中升高處背殼坼蟬出所以皆夜出者一以畏人二畏日炙乾其殼而不能蛻也至時寒則墜地小兒蓄之雖數日亦不須食古人以為飲風露信有之蓋不糞而溺亦可見矣時生四月五月採六月七月取用殼不蠹佳色土黃味鹹甘性寒氣氣薄味厚陰中之陽臭腥主去風熱殺疳蟲制去土蒸熟用治療唐本注云除小兒癇絶不能言蟬蛻主女人生子不出灰服之止久痢藥性論云止小兒驚哭不絶殺疳蟲去壯熱並腸中幽幽作聲蟬蛻療小兒渾身壯熱驚癇兼能止渴衍義曰蟬蛻治目昏翳又水煎汁服治小兒出瘡疹不快甚良合治蟬殼微炒為末合溫酒不拘時服一錢療風頭眩又合薄荷葉等分為末酒調一錢匕日三服療風氣客皮膚瘙癢蟬花無毒化生蟬花主小兒天吊驚癇瘛瘲夜啼心悸名醫所録地圖經曰本經不載所出州土今所在皆有之生苦竹林中者良花出土上今蜀中有一種蟬其蛻殼頭上有一角如花冠狀謂之蟬花西人有齎至都下者入藥最奇衍義曰西川有蟬花乃是蟬在殼中不出而化為花自頂中出者也時生五月採七月取收陰乾用花白全者良色黃白味甘性寒氣氣之薄者陽中之陰臭腥主風癇驚悸制雷公云凡收得於屋下東角懸干去甲土後用漿水煮一日至夜焙乾碾細用裸蟲蠐螬有毒濕生蠐螬出神農本經主惡血血瘀痹氣破折血在脅下堅滿痛月閉目中淫膚青翳白膜以上朱字神農本經療吐血在胸腹不去及破骨踒折血結金瘡內塞産後中寒下乳汁以上黑字名醫所録名蟦扶文切蠐蜰音肥齊勃齊地圖經曰生河內平澤及人家積糞草中今處處有之大者有如足大指以背行反快於腳用之以反行者良爾雅所謂蟦蠐螬郭璞云在糞土中者是也而諸朽木中蠹蟲形亦相似但潔白於糞土中者即爾雅所云蝤蠐蠍又云蠍蛣䖦又云蠍桑蟲郭云在木中雖通名蠍所在異者是此也蘇恭以謂入藥當用木中者乃與本經云生糞草中相戾矣有名未用中自有桑蟲條桑蟲即蛣䖦也與此主療殊別今醫家與蓐婦下乳藥用之乃是掘糞土中者其效殊速乃知蘇説未可據也張仲景治雜病方大蟅蟲丸中用蠐螬以其主脅下堅滿也陳藏器云蠐螬居糞土中身短足長背有毛筋但從水入秋蛻為蟬飛空飲露能鳴高潔蠍在朽木中食木心穿如錐刀一名蠹身長足短口黑無毛節慢至春羽化為天牛兩角狀如水牛色黑背有白點上下緣木飛騰不遙二蟲出處既殊形質又別蘇乃混其狀總名蠐螬異乎蔡謨彭蜞幾為所誤蘇注乃千慮一失矣衍義曰此蟲諸腐木根下有之構木津甘故根下多有此蟲其木身未有完者亦有生於糞土中者雖肥大但腹中黑不若木中者雖瘦而稍白生研水絞汁濾清飲下奶女蟹切乳也時生無時採無時一云冬月取者佳收陰乾用反行者良色白味咸性溫一云微寒氣味厚於氣陰中之陽臭腥主下乳汁敷惡瘡助蜚蠊為之使反惡附子制雷公云凡使與糯米同炒待米焦黑為度然後去米取之去口畔並身上肉毛及黑塵了作三四截碾成粉用之治療圖經曰除喉痹藥性論云取汁滴目中去翳障主血止痛日華子云去目中瘀膜桑柳木內者去風疹陳藏器云汁塗赤白遊疹桑蠹主心暴痛並金瘡別録云取末敷治丹走皮中浸淫名火丹瘡又搗塗竹木刺在肉中不出及敷癰疽痔漏惡瘡效合治以青布覆目中取蠐螬在布上摩之治稻麥芒入眼最良烏賊魚無毒附肉柔魚章舉石距烏賊魚骨出神農本經主女子漏下赤白經汁血閉陰蝕腫痛寒熱症瘕無子以上朱字神農本經驚氣入腹腹痛環臍陰中寒腫令人有子又止瘡多膿汁不燥肉味酸平主益氣強志以上黑字名醫所録名烏鰂纜魚地圖經曰生東海池澤今越州近海州郡皆有之云是鸔音剝烏所化其口角猶存頗相似故名烏鰂能吸波噀墨似溷水所以自衛使水匿不能為人所害又云性嗜烏每暴水上有飛烏過謂其已死便啄其腹則卷取而食之以此得名言為烏之賊害也形若革囊口在腹下八足聚生口傍只一骨厚三四分似小舟輕虛而白又有兩須如帶可以自纜故別名纜魚南越志云烏賊有矴遇風便虯前一須下碇而住碇亦纜之義也腹中血及膽如墨堪用書字作好墨亦用之世謂烏賊懷墨而知禮故俗謂是海若白事小吏其肉食之益人其無骨者名柔魚又有章舉石距二物與此相類而差大味更珍好食品所貴重然不入藥用故略焉時生無時採無時用骨肉色白味咸性微溫軟氣氣厚於味陽中之陰臭腥主止精滑去目翳反惡白蘞白芨附子制雷公云凡使要上文順者用血滷作水浸並煮一伏時了漉出於屋下掘一地坑可盛得前件烏賊骨多少先燒坑子去炭灰了盛藥一宿至明取出用其效倍多或炙黃去皮用之治療素問曰肉主女子血枯唐本注云去牛馬目中障翳藥性論云骨止婦人漏血及耳聾日華子云肉能通經骨療血崩殺蟲陳藏器云骨末飲之主小兒痢下及婦人血瘕殺小蟲孟詵云骨為末治眼中熱淚別録云骨為末敷丈夫陰頭瘡效合治骨為末合蜜點眼中去一切浮翳骨末一兩合龍腦少許點治傷寒熱毒攻眼生赤白翳骨合醋磨療癧瘍風及三年者先以布磨肉赤即敷之效骨合雞子黃敷之喉及舌下療小兒重舌腹中墨合醋磨服療血刺心痛贋沙魚骨為偽白殭蠶無毒附蠶蛹卵生白殭蠶出神農本經主小兒驚癇夜啼去三蟲滅黑皯令人面色好男子陰易音亦病以上朱字神農本經女子崩中赤白産後余痛滅諸瘡瘢痕以上黑字名醫所録地圖經曰生穎川平澤今所在養蠶處皆有之用自僵死白色而條直者為佳衍義曰然蠶有三番惟頭番僵者最佳大而無蛆也時生三月採四月取收曝乾用頭眠自僵者佳色白味鹹辛性平軟氣味厚氣薄陰中之陽臭腥主去諸風消疔腫反惡桑螵蛸桔梗茯苓茯神萆薢制雷公云凡使先用糯米泔浸一日待蠶桑涎出如蝸牛涎浮於水上然後漉出微火焙乾以布淨拭蠶上黃肉毛並黑口甲及絲單搗篩如粉用治療唐本注云為末封疔腫根當自出藥性論云除口噤發汗及婦人崩中下血不止日華子云療中風失音並一切風疾小兒客忤男子陰癢痛女子帶下蠶蛹子食治風及勞瘦又研敷蠶瘑惡瘡別録云白殭蠶為末水調服五分治瘰癧及治背瘡以針挑四畔水調敷之即拔出根又炒黃為末敷一切金瘡合治合衣中白魚鷹屎白等分治瘡滅瘢為末合生薑自然汁調灌之療中風急喉痹欲死者合蠍稍等分天雄尖附子尖共一錢微炮過為細末每服一字或半錢以生薑溫水調下治小兒驚風合酒調兩錢服少頃以脂麻茶一錢熱投之梳乳數十遍下奶汁如泉合天南星刮去皮等分並生為末每服一字以生薑汁下療喉閉如咽喉閉緊即以小竹筒子擘口灌之涎出後用大薑一塊略炙含之小可只敷唇上即瘥直者七個細研合薑汁一茶匙溫水調下治風痰微炒黃為末合烏梅丸如桐子大每服薑蜜湯下五丸療風痔忽生痔頭腫痛又忽自消發歇不時者合慎火草搗塗野火丹從背上兩脅起炒黃拭去蠶上黃肉毛為末合蜜敷小兒口瘡通白者及風疳瘡蝕透者合黑牽牛等分為末如澡豆用之去黑皯令人面色好及浴小兒胎穢良禁勿令中濕濕則有毒不可用羽蟲原蠶蛾雄者有小毒附蠶砂無毒化生原蠶蛾主益精氣強陰道交接不倦亦止精屎溫主腸鳴熱中消渴風痹癮疹名醫所録名晚蠶蛾魏蠶夏蠶熱蠶地圖經曰本經舊不載所出州土今東南州郡養蠶處皆有之此乃第二番重養者即晚蠶蛾也有原復敏速之義北人不甚復養惡其損桑而周禮禁原蠶者鄭康成注云為其傷馬傷馬亦是一事耳淮南子曰原蠶一歲再登非不利也然王者之法禁之為其殘桑也人既稀養市者亦多早蛾不可用也至於用蠶砂亦須晚而食桑者乃佳食柘者不堪也時生四月五月採六月七月取收陰乾用蛾及屎色黃白味咸性溫軟氣氣厚於味陽中之陰臭腥主壯陽暖水臟止血療金瘡制炒去絲用治療日華子云蛾止泄精尿血及暴風凍瘡湯火瘡滅瘡瘢入藥炒用屎治風痹頑疾不仁腸鳴陳藏器云屎炒令熱以布袋盛熱尉之主偏風筋骨癱緩手足不隨及腰腳軟皮膚頑痹別録云屎一升水二斗煮取一斗二升去滓溫熱得所洗治風瘙癮疹遍身癢成瘡者尤宜避風又焙乾為末水服二錢治渴疾不過數服又取一枚井花水下日三服治婦人始覺妊娠轉女為男法合治蛾二枚炙黃研末合蜜塗口唇內治小兒撮口及發噤者蠶蛻無毒附蠶紙布蠶蛻主血風病益婦人名醫所録名馬鳴蛻地圖經曰今東南州郡養蠶處所在皆有之近世醫家多用蠶蛻紙而東方諸醫家用蠶欲老眠起所蛻皮雖二者之用各殊然東人所用者為正用之當微炒和諸藥可作丸散服也衍義曰此則眠起時所蛻皮也其蠶蛻紙謂之蠶連亦燒灰用之時生三月採四月五月取用皮以晚蠶眠而蛻者佳色黑臭腥主消疳止𧈟制燒灰存性用治療日華子云蠶布紙止吐血鼻洪腸風瀉血崩中帶下赤白痢衍義曰蠶蛻燒灰止婦人血露別録云蠶蛻紙燒灰存性揩牙宣牙癰並敷口瘡合治蠶蛻紙燒灰為末合蜜丸如雞頭子大含化咽津治纏喉風喉痹牙宣牙癰及口瘡合麝香少許敷小兒走馬疳蠶紙燒灰合酒水任下療風癲狂發欲走或自高貴稱神或悲泣呻吟者瘥甲蟲緣桑螺無毒緣桑螺主人患脫肛燒末和豬膏敷之脫肛立縮名醫所録地圖經曰此螺全似蝸牛而黃小雨後好緣桑葉者謂之緣桑螺也今所在皆有之時採無時收陰乾用殼肉質類蝸牛而黃小色黃臭腥制燒為末用之裸蟲鰻鱺魚有毒附鰍魚海鰻鰻音謾鱺音黎魚主五痔瘡瘻殺諸蟲名醫所録名海鰻慈鰻猧狗魚地圖經曰本經不載所出州土今在處有之似鱔無鱗而腹大青白色善攻崎岸使輒頽陀除爾切小崩也近江河居人畏之此魚雖有毒能補五臟虛損燒之熏氈中及舍屋免竹木生蛀蚛置其骨於衣箱中亦斷白魚諸蟲歙州出一種頭似蝮蛇背有五色文其功最勝出海中者名海鰻相類而大功用亦同海人謂之慈鰻又名猧狗魚又有鰍音秋亦相似而短常在泥中主狗及牛瘦取一二枚以竹筒從口及鼻生灌之立肥也時生無時採無時收曝乾用肥大者佳色青白味甘性平寒氣氣之薄者陽中之陰臭腥主補虛勞殺蟲毒制去腸及涎煮食之治療唐本注云鰻鱺膏療耳中有蟲痛者日華子云海鰻治皮膚惡瘡疥疳𧈟痔瘻鰻魚殺傳尸疰氣惡瘡及治婦人産戶瘡蟲癢孟詵云治癧瘍風及婦人帶下百病並一切風常食甚驗衍義曰生割曬乾取少許於火上微炙油出塗白刺風以指擦即色轉凡五七次乃愈別録云淡炙熟令患人食三五度治諸蟲心痛多吐四肢不和冷氣上攻心腹滿悶並悁心痛者佳以乾者空室燒之即化蚊蟲鱉蝨為水矣鰻鱺魚脂敷頸項及面上白駁浸淫漸長有似癬無瘡者先割使燥痛後以敷之不過三五度便愈補日華子云鰻魚治勞補不足暖腰膝起陽道合治鰻魚合五味米煮空腹食之治腰腎間濕風痹常如水洗者甚補益濕腳氣人及久病罷瘵者亦可以一條治如食法切作片合椒鹽醬炙食之治五痔瘻瘡以二斤切作段子治如食法合酒二盞入鹽醋少許煮食之治骨蒸勞瘦及腸風下血者瘥解諸草食藥毒及殺蠱毒甲蟲鮀魚甲有毒附肉黿甲鮀音駝魚甲出神農本經主心腹癥瘕伏堅積聚寒熱女子崩中下血五色小腹陰中相引痛瘡疥死肌以上朱字神農本經五邪涕泣時驚腰中重痛小兒氣癃眥潰肉主少氣吸吸足不立地以上黑字名醫所録地圖經曰生南海池澤今江湖極多即鼉也形似守宮陵鯉輩而長一二丈背尾俱有鱗甲善攻崎岸夜則鳴吼舟人甚畏之其皮亦中冒鼓其最大者為黿江中或有闊一二丈者南人亦捕而食之其肉有五色而白多如雞肉卵大如雞鴨子一産一二百枚人亦掘取以鹽淹可食之陳藏器云鮀魚即鼉合作鼉字口內涎有毒長一丈者能吐氣成霧致雨力至猛能攻陷江岸性嗜睡恆目閉形如龍大者自齧其尾極難死聲甚可畏人於穴中掘之百人掘亦須百人牽一人掘亦須一人牽不然終不可出此物靈強不可食其肉云是龍類宜去魚字可也時生無時採無時用甲肉皮骨肝色青白味辛性微溫散氣氣之厚者陽也臭腥主除帶下積聚祛百邪鬼魅助蜀漆為之使反畏狗膽芫花甘遂制生剝其甲火炙令黃用治療圖經曰黿甲主五臟邪氣及婦人血熱藥性論云鼉甲治婦人帶下消腹內血積聚伏堅相引結痛日華子云鼉療齒疳𧈟宣露及五臟邪氣並續人筋骨陳藏器云肉主濕氣邪氣諸蠱膏摩風及惡瘡孟詵云鼉療驚恐及止小腹氣疼補陶隱居云肉益氣合治皮骨燒灰研末合米飲服治腸風痔疾甚者合紅雞冠花末白礬灰末空腹服之甲炙合酒浸治瘰癧殺蟲風瘻瘡風頑疥瘙肝一具炙熟合蒜齏食之治五尸禁肉發冷氣痼疾解殺百蟲毒百藥毒羽蟲樗雞有小毒化生樗醜如切雞出神農本經主心腹邪氣陰痿益精強志生子好色補中輕身以上朱字神農本經又療腰痛下氣強陰多精不可近目以上黑字名醫所録名酸雞樗鳩螒音翰地圖經曰生河內山谷樗木上今近都皆有之形似寒螿而小爾雅云螒天雞郭璞注云小蟲黑身赤頭一云莎雞又曰樗雞李巡曰一名酸雞廣雅謂之樗鳩蘇恭云五色具者為雄良青黑質白斑者是雌不入藥用然今所謂莎雞者亦生樗木上六月後出飛而振羽索索作聲人或出之樊中但頭方腹大翅羽外青內紅而身不黑頭不赤此殊不類蓋別一種而同名也今在樗木上者人呼為紅娘子頭翅皆赤乃如舊説然不名樗雞疑即是此蓋古今之稱不同耳古方大麝香丸用之近人少用故亦鮮別衍義曰東西京界尤多形類蠶蛾但頭足微黑翅兩重外一重灰色下一重深紅五色皆具腹大此即樗雞也時生無時採七月取收曝乾色青紅味苦氣味厚於氣陰中之陽主益精強志制去翅足火炙乾用治療衍義曰行瘀血血閉裸蟲蛞蝓無毒蛞音闊蝓音俞主賊風喎口乖切僻軼音益筋及脫肛驚癇攣縮神農本經名陵蠡土蝸附蝸蛞蝸地圖經曰生泰山池澤及陰地沙石垣下今處處有之本經蛞蝓一名附蝸蛞蝓無殼不應有蝸名或以其頭形相類猶似蝸牛故以名之或云多是一物有二名如雞腸蘩蔞之比按郭璞注爾雅附裸力果切螔思移切蝓蝸牛也字書解蝓字亦云螔蝓蝸牛也如此一物明矣然今下濕處有一種大於蝸牛亦有角而無殼相傳云是蝸牛之老者若然本一物而久脫殼者為異耳衍義曰蛞蝓蝸牛為二物矣蛞蝓其身肉止一段蝸牛背上別有肉以負殼而行顯然異矣若為一物經中焉得分為二條也其治療亦大同小異故知別類又謂蛞蝓是蝸牛之老者甚無謂蛞蝓二角蝸牛四角兼背負殼豈得謂一物哉時生無時採八月取質類蝸牛而無殼色青黑味咸性寒軟氣氣薄味厚陰也臭腥主諸風解能闢蜈蚣蚰蜒若蜈蚣蚰蜒遇其涎圍之則不得出甲蟲蝸牛無毒濕生蝸牛主賊風喎僻踠趺大腸下脫肛筋急及驚癇名醫所録名蠡牛地圖經曰生泰山池澤及陰地沙石人家牆垣下今處處有之陶隱居注云蝸牛形似蛞蝓但背上負殼耳莊子所謂戰於蝸角是也久雨晴竹林池沼間多有出者其城牆陰處一種匾而小者無力不堪用蝸牛入嬰孺藥為最勝其殼亦堪用蜀本云形似小螺白色生池澤草樹間頭有四角行則出驚之則縮首尾俱能藏入殼中時生無時採無時用形圓大者為勝質類蛞蝓而負殼色青白味咸性寒軟氣氣薄味厚陰也臭腥主祛風熱消瘡腫制入藥炒用或搗取汁用治療圖經曰蝸牛涎主消渴別録云蝸牛殼二十枚燒灰細研每用揩齒療齒𧈟有蟲蝸牛取汁治蜈蚣咬痛不可忍滴入即瘥合治蝸牛一兩燒灰合豬脂和敷大腸久積虛冷每因大便脫肛不收蝸牛二百個入小淨瓶中用新汲水一盞浸瓶中封系自晚至明取蝸牛放其水如涎合真蛤粉不以多少旋調敷以雞翎掃治發背瘡日可十餘度其熱痛止瘡愈矣蝸牛殼十枚洗去塵土令乾內酥蜜中瓷盒盛之卻用紙糊於飯甑內蒸之下饙即安之至飯熟取出細研漸漸吃一日食盡之治小兒一切疳疾鱗蟲石龍子有小毒卵生石龍子主五癃邪結氣破石淋下血利小便水道神農本經名蜥音錫蜴音亦守宮石蜴蠑螈蝘音偃蜓音電蛇醫虺蜴刺易蠦音盧𧓋音廛易蜥山龍子地圖經曰生平陽川穀及荊山山石間今處處有之爾雅云蠑螈蜥蜴蝘蜓守宮四者一物形狀相類而異名也字林雲蠑螈蛇醫也説文云在草曰蜥蜴在壁曰蝘蜓秦晉西夏謂之守宮或謂之蠦𧓋或謂刺易南陽人呼蝘蜓在澤中者謂之易蜥楚謂之蛇醫東方朔雲非守宮即蜥蜴按此諸説蓋在草澤中者名蠑螈蜥蜴在壁者名蝘蜓守宮也漢武於午日取蜥蜴飼以丹砂其體盡赤次年此日搗之塗宮人臂如赤痣有犯即消故謂之守宮衍義曰大者長七八寸身有金碧色仁廟朝有一蜥蜴在右掖門西浚溝廟中是真蜥蜴也鄭狀元有詩昔有樵者於澗下行見一蜥蜴自石罅中出飲水訖而入良久凡百十次尚不已樵者疑之不免翻石視之有冰雹一二升樵人訝而去行方三五里大雨至風雹暴作今用祈雨經云治五癃破石淋利水道亦此義爾時生無時採三月四月五月八月九月取用身有金碧色者色青味咸性寒氣氣薄味厚陰也臭腥主破諸淋消結氣反惡硫黃斑蝥蕪荑制去腹內物火炙乾研細或著石上令乾用羽蟲木虻有毒木虻音萌主目赤痛眥傷淚出瘀血血閉寒熱酸𢠹音西無子神農本經名魂常地圖經曰生漢中川澤今處處有之而襄漢近地尤多虻有數種皆能啖牛馬血木虻最大而緑色幾若蜩蟬蜚虻狀若蜜蜂黃色醫方所用虻蟲即此也又一種小蟲名鹿虻大如蠅咂牛馬亦猛三種大抵同體俱能治血方家相承只用蜚虻它不復用陳藏器云木虻從木葉中出卷葉如子形圓著葉上破中初出如白蛆漸大羽化坼破便飛即能齧物塞北亦有嶺南極多如古度花成蟻耳時生無時採五月取收陰乾質類蟬而小色緑味苦性平泄氣味厚於氣陰中之陽制去翅足炒用蜚虻有毒蜚虻出神農本經主逐瘀血破下血積堅痞癥瘕寒熱通利血脈及九竅以上朱字神農本經女子月水不通積聚除賊血在胸腹五臟者及喉痹結塞以上黑字名醫所録地圖經曰生江夏川穀今處處有之而襄漢近地尤多狀如蜜蜂黃色醫方所用虻蟲即此也本經以腹有血者良但得之即堪用然物性能破血何假充腹用耳衍義曰虻蟲今人多用之大如蜜蜂腹凹匾微黃緑色者雄霸州順安軍沿塘濼界甚多以其惟食牛馬等血故治瘀血血閉也時生無時採五月取收陰乾用腹有血者良質類蠅而大色黃緑味苦性微寒氣味厚於氣陰也主下血積通月經反惡麻黃制去翅足炒用治療日華子云破癥結消積膿禁妊娠不可服服之墮胎蜚蠊有毒蜚蠊出神農本經主血瘀症堅寒熱破積聚喉咽痹內寒無子以上朱字神農本經通利血脈以上黑字名醫所録名石薑負盤滑蟲蠦草楚音肥地圖經曰生晉陽川澤及金房等州山中今人家屋間亦有之此物多生林樹中百十為聚山人採而啖之謂之石薑爾雅云蜚蠦草楚即負盤臭蟲也陶隱居云形似虻蟲而輕小能飛本在草中八九月知寒多逃入人家爾有兩三種以作廉薑氣者為真南人亦食之唐本注云形似蠶蛾腹下赤其味辛辣而臭漢中人食之言下氣即南人謂之滑蟲者是也時生無時採立秋取用廉薑氣者為真質類虻蟲而輕小味咸性寒氣味厚於氣陰也臭臭主通血脈破積聚鱗蟲蟅蟲有毒蟅音柘蟲主心腹寒熱洗洗血積癥瘕破堅下血閉生子大良神農本經名地鱉土鱉簸箕蟲地圖經曰生河東川澤及沙中人家牆壁下土中濕處狀似鼠婦而大者寸余形匾如鱉故名土鱉但有鱗而無甲不能飛小有臭氣今小兒多捕以負物為戲張仲景治雜病方主久瘕積結有大黃蟅蟲丸又大鱉甲丸及治婦人藥並用蟅蟲以其有破堅積下血之功也衍義曰蟅蟲今人謂之簸箕蟲為其像形也時生無時採十月取收曝乾質形匾似鱉而小色青紫味苦鹹性寒氣氣薄味厚陰也臭腥主消血積破癥瘕反畏皂莢菖蒲屋遊治療藥性論云主月水不通破留血積聚衍義曰研一枚水半合濾清服療乳脈不行勿使服藥人知甚效鮫魚皮無毒鮫魚皮主蠱氣蠱疰方用之即裝刀靶音霸䱜音鵲魚皮也名醫所録名沙魚鰒魚地圖經曰舊不著所出州土今南海有之陳藏器云其形似鱉無腳而有尾圓廣尺余尾長尺許子隨母行驚即從口入於母腹其魚狀貌非一皮上有沙堪揩木如木賊也山海經云鮫沙魚其皮可以飾劍今南人但謂之沙魚然有二種其最大而長喙如鋸者謂之胡沙性善而肉美小而皮粗者曰白沙肉強而有小毒二種彼人皆鹽為修脯其皮刮治去沙剪為鱠皆食品之美者食之益人然皆不類鱉蓋其種類之別耳時生無時採臘月取收曝乾用皮上有真珠斑者佳色青紫味甘鹹性平緩氣氣厚於味陽中之陰臭腥治療圖經曰除心氣鬼疰蠱毒吐血補食療云作鱠食之補五臟合治合硃砂雄黃金牙椒天雄細辛鬼臼麝香乾薑雞舌香桂心莽草各二兩貝母半兩蜈蚣蜥蜴各炙二枚共十六味同為末溫清酒服半錢日三漸增至五分匕亦可帶之療五尸鬼疰百毒惡氣膽汁利白礬灰丸如豆顆綿裹內喉中治患喉閉良久吐惡涎沫即喉嚨開解中魚毒燒灰服之白魚無毒卵生白魚主胃氣開胃下食去水氣令人肥健名醫所録地圖經曰生江湖中大者六七尺色白頭昂鱗細而匾長者是也時生無時採無時色白味甘性平緩氣氣之薄者陽中之陰臭腥治療日華子云灸瘡不發作鱠食之良孟詵云主肝家不足氣補日華子云助血脈明目合治炙之合蔥醋中重煮食之調五臟助脾氣能消食理十二經脈禁患瘡癤人不可食甚發膿又多食泥人心若經宿者不堪食食則令人腹冷生諸疾鱖魚微毒卵生鱖居衛切魚主腹內惡血益氣力令人肥健去腹內小蟲名醫所録名鱖豚水豚地圖經曰生江漢間細鱗大腹背有黑點味尤重昔仙人劉憑常食石桂魚今此魚猶有桂名恐是此也時生無時採臘月中取膽收膽於臘月北簷下懸令乾用肉及膽質類鱸魚色黑黃味甘性平緩氣氣厚於味陽中之陰臭腥主補虛勞益脾除腸風瀉血合治臘月膽每用一皂子許合酒煎化溫溫呷之治大人小兒一切骨鯁或竹木簽刺喉中不下者服後若得逆便吐骨即隨頑涎出若未出更吃溫酒以吐為妙酒即隨性量力飲之若更不出再煎一塊服之無不出者此藥應是鯁在臟腑中日久痛黃瘦甚者服之皆出禁患寒濕病人不可食青魚無毒附眼膽枕骨卵生青魚主腳氣濕痹作鮓與服石人相反眼睛主能夜視頭中枕蒸取干代琥珀用之摩服主心腹痛膽主目暗滴汁目中並塗惡瘡名醫所録地圖經曰生江湖間今北地或有之似鯉鯇而背正青色南人多以作鮓古作鯖字所謂五侯鯖鮓是也頭中枕蒸令通氣曝乾狀如琥珀云可以代琥珀非也荊楚間取此魚枕煮拍作器皿甚佳膽與目睛併入藥用時生無時採無時用肉眼睛頭中枕膽質類鯉而身圓頭小色青味甘性平緩氣氣之薄者陽中之陰臭腥治療日華子云除腳軟煩悶蕭炳云除卒氣研服止腹痛白煮吃除腳氣腳弱孫真人云膽陰乾以少許口中含之咽津治喉閉及著骨鯁者愈食療云頭中枕療卒心痛平水氣以水研服之補日華子云益氣力合治合韭白煮食之治腳氣弱煩悶益心力也頭中枕醋摩治水氣血氣心痛者忌不可同葵蒜食之服木人亦勿啖也裸蟲河豚無毒衍義曰有大毒卵生河豚音屯主補虛去濕氣理腰腳去痔疾殺蟲名醫所録名胡夷魚麗龷比魚吹肚魚規魚地圖經曰生江河淮間皆有之此魚無頰無鱗口小腹大背青有黑斑腹白有刺者是也衍義曰河豚經言無毒此魚實有大毒味雖珍然修治不如法食之殺人不可不慎也厚生者不食亦好梅聖俞雲河豚於此時貴不數魚蝦庖廚一失手人口為鏌鎁然此物多怒觸之則怒氣滿腹翻浮水上遂為人獲也時採二月取用肉色青白有斑味甘性溫緩氣氣之厚者陽也臭腥主補虛勞去濕氣助和禿菜食良反荊芥制去睛並脊血禁燕尾者殺人子有大毒煮不熟者脹殺人肝有大毒忌梁上挂塵解中其毒以橄欖並蘆根汁解之鱗蟲石首魚無毒石首魚頭中有石如棋子主下石淋磨石服之亦燒為灰末服和蓴菜作羹開胃益氣候乾食之名為鯗音想炙食之主消瓜成水亦主卒服脹食不消暴下痢名醫所録地圖經曰生東海此魚頭大身小細鱗而黃初出水時能鳴夜視有光其螵為膠有奪木之功寧波等處以鹽醃曬乾色白謂之白鯗頭中有石如棋子故名石首也又野鴨頭中亦有石者云是此魚所化也時生無時採四五月取收鹽醃曝乾用肉及頭中石質類鱸魚而無斑色黃味甘性平緩氣氣厚味薄陽中之陰臭腥主消宿食嘉魚無毒食療云微有毒卵生嘉魚食之令人肥健悅澤此乳穴中小魚常食乳水所以益人能久食之力強於乳有似英雞功用同乳名醫所録地陳藏器云吳都賦謂嘉魚出於丙穴李善注云丙日出穴今則不然丙者向陽穴也陽穴多生此魚魚復何能擇丙日耶此注誤矣謹按詩傳云嘉魚鯉質鱒鯽肌肉美食乳泉出於丙穴先儒謂穴在漢中沔陽縣北穴口向丙故曰丙也時生無時採無時用肉色鱗青目赤味甘性溫緩氣氣之厚者陽也臭腥主腎虛消渴勞損羸瘦鯔魚無毒卵生鯔魚主開胃通利五臟久食令人肥健名醫所録地圖經曰此魚似鯉身圓頭匾骨軟生江海淺水中食泥與百藥無忌時生無時採無時用肉色青白味甘性平緩氣氣之薄者陽中之陰臭腥甲蟲紫貝紫貝主明目去熱毒名醫所録名砑磊地圖經曰本經不載所出州土蘇恭注云出東海及南海南海多有之即砑磊也形似貝而圓大二三寸儋振夷黎採以為貨市北人惟畫家用研物按爾雅云餘貾直其切黃白文謂以黃為質白為文點余泉白黃文謂以白為質黃為文點今紫貝則以紫為質黑為文點也貝之類極多古人以為寶貨而此紫貝尤為世所貴重漢文帝時南越王獻紫貝五百後世以多見賤而藥中亦稀用之時生無時採無時用肉及殼色紫味咸性軟氣味厚於氣陰也臭腥鱗蟲鱸魚有小毒卵生鱸魚主補五臟益筋骨和腸胃治水氣多食宜人作鮓猶良又曝乾甚香美雖有小毒不至發病名醫所録地謹按此魚出松江巨口細鱗背有黑點一尾四腮作鱠食之甚佳即張翰思之者也時生無時採秋取收曝乾色青白味甘性平緩氣氣之薄者陽中之陰臭腥治補食療云安胎補中禁一云多食發痃癖及瘡腫忌不可與乳酪同食甲蟲鱟微毒陳藏器云無毒卵生鱟主痔殺蟲殼入香發衆香氣尾燒焦治腸風瀉血並崩中帶下及産後痢脂燒集鼠名醫所録地陳藏器云生南海大小皆牝牡相隨牝無目得牡始行牡去牝死以骨及尾長二尺按山海經云形如車文青黑色十二足長五六尺似蟹雌常負雄漁者必得其雙子如麻子南人為醬食之時生無時採無時用肉殼尾脂色青黑味辛性平散氣氣厚於味陽中之陰臭腥合治尾燒黑灰米飲下大主産後痢先服地黃蜜等煎訖然後服尾無不斷也禁多食發嗽並瘡癬海馬無毒海馬主難産名醫所録名水馬地圖經曰生西海中大小如守宮蟲頭形若馬身如蝦背傴僂有竹節紋長五六寸乃蝦之類也漁人布網罟此物多系網上得之以雌雄為對也色黃褐味咸性溫平氣氣薄味厚陰中之陽臭腥主調氣和血制凡採得以酒浸酥炙用或燒存性搗末用治療圖經曰産婦帶之或手持之易産又臨産燒一對為末飲調服易生二種海藥余郎君子謹按異志云生南海有雄雌青碧色狀似杏仁欲驗真假先於口內含令熱然後放醋中雄雌相趁逡巡便合即下其卵如粟粒狀真也主婦人難産手把便生極有驗也乃是人間難得之物今無之海蠶砂謹按南洲記云生南海山石間其蠶形大如拇指砂甚白如玉粉狀每有節味鹹大溫無毒主虛勞冷氣諸風不遂久服令人光澤補虛羸輕身延年不老難得真者多隻被人以水搜葛粉石灰以梳齒隱成此即非也縱服無益反損人審服之二十種陳藏器余黿鱔魚注陶云黿肉補此老者能變化為魅按黿甲功用同鱉甲炙浸酒主瘰癧殺蟲逐風惡瘡瘻風頑疥瘙肉主濕氣諸邪氣蠱消百藥毒張鼎云膏塗鐵摩之便明膏摩風及惡瘡子如雞卵正圓煮之白不凝今時人謂藏卵為黿子似此非為木石機也至難死剔其肉盡頭猶咬物可以張鳶鳥食療云微溫主五臟邪氣殺百蟲蠱毒消百藥毒續筋又膏塗鐵摩之便明淮南術方中有用處齊蛤遠志注陶云遠志畏齊蛤蘇云藥録下卷有蛤而不言功狀注又云蠟畏齊蛤按齊蛤如蛤兩頭尖小生海水中無別功用海人食之柘蟲屎詹糖注陶云詹糖偽者以柘蟲屎為之按即今之柘木蟲在水間食木注為屎其屎破血不香詹糖燒之香也既不相似不堪為類蚱蜢石蟹注陶雲石蟹如蚱蜢形長小兩股如石蟹在草頭能飛蛗螽之類無別功與蚯蚓交在土中得之堪為媚藥入拾遺記寄居蟲蝸牛注陶雲海邊大有似蝸牛火炙殼便走出食之益顏色按寄居在殼間而非螺也候螺蛤開當自出食螺蛤欲合已還殼中亦名寄生無別功用海族多被其寄又南海一種似蜘蛛入螺殼中負殼而走一名闢亦呼寄居無別功用之也䖦音拙蟱蜘蛛注陶云懸網狀如魚罾者亦名䖦蟱在孔穴中及草木稠密處作網如蠶絲為幕絡者就中開一門出入形段小似蜘蛛而斑小主疔腫出根作膏塗之陶云罾網此正蜘蛛也非為䖦蟱此物族類非一也負蠜葵注蘇云戎人重薰渠猶巴人重負蠜按飛廉一名負盤蜀人食之辛辣也已出本經左傳云蜚不為災杜注云蜚負蠜也如蝗蟲又夜行一名負盤即屁盤蟲也名字及蟲相似終非一物也蠜音煩蛗螽也蠼螋雞腸注陶云雞腸草主蠼螋溺按蠼螋能溺人影令發瘡如熱沸而大繞腰匝不可療蟲如小蜈蚣色青黑長足山蠼螋溺毒更猛諸方中大有主法其蟲無能惟扁豆葉敷即瘥蠱蟲敗鼓皮注陶云服敗鼓皮即喚蠱主姓名按古人愚質造蠱圖富皆取百蠱甕中盛經年間開之必有一蟲盡食諸蟲即此名為蠱能隱形似鬼神與人作禍然終是蟲鬼咬人至死者或從人諸竅中出信候取之曝乾有患蠱人燒為黑灰服少許立愈亦是其類自相伏耳新注云凡蠱蟲療蠱是知蠱名即可治之如蛇蠱用蜈蚣蠱蟲蜈蚣蠱用蝦蟆蠱蟲蝦蟆蠱病復用蛇蠱蟲是牙相能伏者可取治之土蟲蚰蜒並馬陸注陶云今有一細黃蟲狀如蜈蚣俗呼為土蟲按土蟲無足如一條衣帶長四五寸身匾似韭葉背上有黃黑襇頭如鏟子行處有白涎生濕地有毒雞吃即死陶云如蜈蚣者正是蚰蜒非土蟲蘇云馬陸如蚰蜒按蚰蜒色正黃不斑大者如叉股其足無數正是陶呼為土蟲者此蟲好脂油香能入耳及諸竅中以驢乳灌之化為水蘇云似馬陸誤也鱅魚鮑魚注陶云魚是臭者按鱅魚嶺南人作鮑魚劉元紹云其臭如尸正與陶云相背海人食之所謂海上有逐臭之夫也其魚以格額目旁有骨名乙禮云魚去乙鄭云東海鰫魚也只食之別無功用也吊脂有毒主風腫癰毒癮疹赤瘙瘑疥痔瘻皮膚頑痹踠跌折傷肉損瘀血以脂塗上炙手及熱摩之即透生嶺南蛇頭鱉身廣州記云吊蛇頭鱉身亦水宿亦樹棲俗謂之吊膏主蛭刺以銅及瓦器盛之浸出唯雞卵盛之不漏摩理毒腫大驗其透物甚於醐醍也砂挼子有毒殺飛禽走獸合射罔用之人亦取生置枕令夫妻相好生砂石中作旋孔有蟲子如大豆背有刺能倒行一名倒行狗子性好睡亦呼為睡蟲是處有之蛔蟲汁大寒主目膚赤熱痛取大者淨洗斷之令汁滴目中三十年膚赤亦瘥蛗螽蚯蚓二物異類同穴為雄雌令人相愛五月五日收取夫妻帶之蛗螽如蝗蟲東人呼為舴艋有毒有黑斑者候交時取之灰藥令人喜好相愛出嶺南陶家如青灰彼人以竹筒盛之云是蟯蟯音蛔蟲也所作以灰拭物皆可喜損小兒雞犬等不置家中未知此事虛實吉丁蟲功用同前人取帶之甲蟲背正緑有翅在甲下出嶺南賓澄州也腆顆蟲一作顒功用同前人取帶之似尸氣盤褐色身扁出嶺南人重之也鼷鼠有毒食人及牛馬等皮膚成瘡至死不覺此蟲極細不可卒見爾雅云有蟲毒食人至盡不知左傳云食郊牛角者也博物志云食人死膚令人患惡瘡多是此蟲食主之法當以貍膏摩之及食貍肉凡正月食鼠殘多為鼠瘻小孔下血者是此病也諸蟲有毒不可食者鱉目白殺人腹下有卜字及五字不可食頷下有骨如鱉不利人蝦煮白食之腹中生蟲蟹腹下有毛兩目相向腹中有骨不利人鱉肉共雞肉食成瘕病也
