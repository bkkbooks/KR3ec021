body:
  text: 卷之三十一蟲魚部下品裸蟲蝦蟆有毒附蟾蜍山蛤田父卵生蝦蟆出神農本經主邪氣破症堅血癰腫陰瘡服之不患熱病以上朱字神農本經療陰蝕疽癘音賴惡瘡猘犬傷瘡能合玉石以上黑字名醫所録名去甫苦壟音龍鼀𪓰音蹙秋地圖經曰生江湖池澤今處處有之腹大形小皮上多黑斑點能跳接百蟲食之時作呷呷聲在跛澤間舉動極急入藥以東行者良本經以蟾蜍與此為一物似非的也郭璞注云蟾蜍似蝦蟆居陸地又蝌蚪注云蝦蟆子也是非一物明矣且蟾蜍形大背上多痱㿔其肪塗玉則軟刻削如蠟行極遲緩不能跳躍亦不解鳴多在人家下濕處其腹下有丹書八字者為真蟾蜍其屎謂之土檳榔也二物雖一類而功用小別亦當分而用之又一種大者名田父能食蛇蛇行田父逐之蛇不得去田父銜其尾良久蛇死也又有一種大而黃色多在山石中藏蟄能吞氣飲風露不食雜蟲謂之山蛤山中人亦食之主小兒勞瘦及疳疾等最良衍義曰蝦蟆品類甚多蟾蜍最大者也遇陰雨或昏夜即出食取眉間白汁謂之蟾酥以油單裹眉裂之酥出單上入藥用時生無時採五月五日取收陰乾用肉蟾蜍屎眉酥色青黑味辛性微寒氣氣之薄者陽中之陰臭腥主消惡瘡祛邪氣制雷公云日乾及火幹一法剝去皮腸酒浸一宿又用黃精自然汁浸一宿塗酥炙乾用治療圖經曰蝦蟆眉酥主蚛牙及小兒疳瘦唐本注云腦主明目療青盲藥性論云蝦蟆主闢百邪鬼魅塗癰腫及熱結腫蟾蜍殺疳蟲治鼠漏惡瘡及燒灰敷一切有蟲癢滋胤瘡日華子云蝦蟆治犬咬及熱狂貼惡瘡解煩熱蟾蜍破癥結治疳氣小兒面黃癖氣陳藏器云蟾蜍主溫病身斑者取一枚生搗絞汁服亦燒末服及狂犬咬發狂欲死作鱠食之瘥土檳榔主惡瘡別録云治蝮蛇螫用蝦蟆一枚爛杵敷之愈又小兒臍風及臍瘡久不瘥者以乾者燒末敷之日三四度瘥小兒口瘡以五月五日收者杵末敷瘡上亦治小兒蓐瘡合治端午日取蟾酥合硃砂麝香為丸如麻子大小孩子疳瘦者空心服一丸如腦疳以奶汁調滴鼻中亦可糞炒合吳茱萸苗汁調敷惡瘡疔腫雜蟲咬糞合油調敷瘰癧瘻瘡干蝦蟆燒灰合硃砂等分為末水調服一錢日三四次治風邪燒杵末合酒服方寸匕日三治卒狂言鬼語以五月收者燒杵末合豬膏敷小兒初得月蝕瘡取長股青背者一枚合雞骨一分燒為灰內入下部令深治蟲食穀道肛盡腸穿者數用有驗燒末合米飲調服方寸匕療小兒洞泄下痢蟾蜍眉酥合牛酥摩敷腰眼並陰囊治腰腎冷並助陽氣燒灰為末和豬脂敷癬瘡毛蟲牡鼠無毒附肉尿胎生牡鼠主踒折續筋骨搗敷之三日一易四足及尾主婦人墮胎易出肉熱無毒主小兒哺露大腹炙食之糞微寒無毒主小兒癇疾大腹時行勞復名醫所録名父鼠地陶隱居云牡鼠即父鼠也生人家房室間及土穴處處有之其糞多遺於虛器中得兩頭尖而鞭者是牡入藥用之否則是牝不堪用也膽主目疾但方死其膽即消故難得之時生無時採無時用肉尾足膽糞色蒼黑味甘性微溫氣氣之厚者陽也臭腥治療圖經曰肉主骨蒸勞極四肢羸瘦殺蟲及小兒疳瘦脂主湯火瘡陶隱居云目主明目夜見書臘月燒鼠辟惡氣膏煎之療諸瘡膽主目暗日華子云鼠治小兒驚癇疾及生搗罯折傷筋骨糞亦治癇疾明目足燒食催生別録云雄鼠脊骨末能長齒多年不生者敷之效鼠皮一枚燒灰細研封癰瘡中冷瘡口不合者效鼠蠟療因醫人針折在肉中塗之即出鼠膽療卒耳聾內耳中不過三次愈鼠肝及腦敷箭鏑丁狄切及針刀刃在咽喉胸膈隱處不出兼竹木諸刺入肉者敷之愈燒死鼠研敷蛇骨刺人毒痛愈活鼠破腹去五臟就熱治項強身中急者敷之瘥雄鼠屎三七枚水研服治食馬肝有毒殺人者立愈鼠屎二升燒末敷狂犬咬人瘡上瘥鼠燒末以井花水調方寸匕日三與臨月孕婦食之令易産雌鼠屎三七枚一日一枚拭小兒齒不生拭之即生婦人無乳以鼠作臛與食勿令知乳即下合治活鼠油煎為膏療湯火瘡滅瘢疵良或同油煎令消入蠟亦敷湯火瘡雄鼠糞二十枚合豉五合水二升煮取一升頓服治勞復正月取鼠頭燒灰合臘月豬膏細搗敷鼻中外㾴瘤膿血出者屎一兩燒灰研半錢合溫酒空心服治室女月水不通日一枚燒作屑合魚膏和注目眥治人目澀喜睡及取鼠兩目縫囊盛帶之屎燒末合豬脂和敷從高墜下傷損筋骨瘀血疼痛叫喚不得裹之不過半日痛止以頭和尾燒作灰細研合臘月豬脂敷因瘡中風腰脊反張牙關口噤四肢強直者瘥臘月老鼠一個和腸肚劈破合油半斤煎令焦黑以瓷罐收貯用時以雞翎掃敷打傷瘡上即干瘥死鼠頭一枚燒末合酒調服方寸匕治婦人無乳汁與服勿令知甲蟲馬刀有毒化生馬刀出神農本經主漏下赤白寒熱破石淋殺禽獸賊鼠以上朱字神農本經除五臟間熱肌中鼠𪖈蒲利切止煩滿補中去厥痹利機關用之當煉得水爛人腸又云得水良以上黑字名醫所録名馬蛤地圖經曰生江湖池澤及東海今處處有之蝏音亭蛢蒲幸切亦謂之蚌之類也長三四寸闊五六分頭小鋭多在沙泥中江漢間人名為單姥音母亦食其肉方書稀用也衍義曰馬刀京師人謂之木亥醜涉切岸春夏人多食又順安軍界河中亦出𧍧大抵與馬刀相類此等皆不可多食過多則發風也時生無時採無時用肉質類蚌而狹鋭色青黃味辛性微寒氣氣之薄者陽中之陰臭腥主臟熱石淋禁多食發風疾蛤蜊無毒化生蛤蜊主潤五臟止消渴開胃解酒毒主老癖能為寒熱者及婦人血塊煮食之此物性雖冷乃與丹石相反服丹石人食之令腹結痛名醫所録地圖經曰生東海及登萊滄州皆有之其形正圓一二寸大小不一背表有文理其肉鮮美人多啖之時生九月採正月二月三月取用殼肉質類蚌而圓小色青白味甘微咸性冷氣氣薄味厚陰中之陽臭腥主老痰血積制殼燒灰以栝蔞仁和再煅研細用合治殼煅灰為末合油調塗湯火傷效禁服丹石人不可食解酒毒蜆無毒蜆音顯主時氣開胃壓丹石藥及疔瘡下濕氣下乳糟煮服良生浸取汁洗疔瘡陳殼治陰瘡止痢肉寒去暴熱明目利小便下熱氣腳氣濕毒解酒毒目黃浸取汁服主消渴爛殼溫燒為白灰飲下主反胃吐食除心胸痰水殼陳久療胃反及失精名醫所録地圖經曰生江湖池澤及水泥中處處有之陳藏器言候風雨亦能以殼為翅飛也時生無時採無時收曝乾用肉殼質類蛤蜊而小色青黑味甘性冷氣味厚於氣陰中之陽臭腥合治白蜆殼不計多少搗研極細合米飲調服一錢匕日三四服治卒咳嗽不止禁多食發嗽並冷氣消腎解肉解酒毒𧍧䗯無毒𧍧火咸切䗯殼燒作末服之主痔病名醫所録名生進地圖經曰此種亦蜂屬其形似蛤長匾而有毛生江海及湖澤中有之人取殼為藥食其肉無功用也時生無時採無時用殼色青黑臭腥制燒灰為末用治療陳藏器云主野雞病燒作末服之效蚌蛤無毒蚌蛤主明目止消渴除煩解熱毒補婦人虛勞下血並痔瘻血崩帶下爛殼粉飲下治反胃痰飲蚌粉冷無毒治疳止痢並嘔逆癰腫醋調敷兼能制石亭脂名醫所録名蜃地圖經曰生江湖池澤及東海間皆有之此即寶裝大者也謹按埤雅云蚌孚乳以秋聞雷聲則㾭其孕珠若懷妊然故謂之珠胎一名蜃乃蚌之大者也物有非其類而化者若牡蠣蚌蛤無陰陽牝牡須雀鴿以化故蚌之久者能生珠專一於陰也海物異名記曰蜃布泥有疆界其蒸氣為樓臺月令云雉入大水為蜃是也時生十月採無時用殼及肉質類馬刀而闊大色青白味微甘性冷氣味厚於氣陰也臭腥主止煩渴消酒毒治療別録云除濕清大熱合治以黃連末內蚌中取汁點赤眼並暗良禁多食動冷病解壓丹石藥毒車螯無毒化生車螯主酒毒消渴酒渴並癰腫殼治瘡癤腫毒燒二度各以醋淬搗為末又甘草等分酒服以醋調敷腫上妙名醫所録地圖經曰是大蛤能吐氣為樓臺海中春夏間依約島漵常有此氣時生無時採無時收曝乾用肉及殼味咸性冷氣味厚於氣陰也制搗碎用禁不可多食蚶無毒蚶主心腹冷氣腰脊冷風利五臟健胃令人能食每食了以飯壓之不爾令人口乾又云溫中消食起陽益血色殼燒以米醋三度淬後埋令壞醋膏丸治一切血氣冷氣症癖名醫所録名瓦壟子地圖經曰出海中今浙人畜種于田而生是謂之蚶田其形似蜆殼有文理橫直如瓦屋稜故名瓦壟子時亦重之時生無時採無時用肉及殼色白味咸性溫氣氣薄味厚陰中之陽主補中益陽蟶無毒化生蟶主補虛冷利煮食之主婦人産後虛損又主胸中邪熱煩悶氣與服丹石人相宜名醫所録地圖經曰生海泥中長二三寸大如指而兩頭開者是也時生無時採無時用肉色青白味甘鹹性溫又云寒氣氣薄味厚陰中之陽臭腥主胸中邪氣治療圖經曰飯後食之止渴禁天行病後不可食淡菜無毒化生淡菜主補五臟理腰腳氣益陽事能消食除腹中冷氣消痃癖氣亦可燒令汁沸出食之補虛損産後血結腹內冷痛治癥瘕腰痛潤毛髮崩中帶下燒食一頓令飽大效名醫所録名殼菜東海夫人地陳藏器云出東南海隅間多有之其形似珠母一頭尖中銜少毛然有二種肉赤者屬陽肉白者屬陰形雖不典而甚益人其味甘美人好食之浙人謂之殼菜也時生無時採十月十一月取收焙乾用肉色土褐味甘性溫緩氣氣厚於味陽也臭腥主虛羸勞損血氣結聚制圖經曰常時頻燒食即苦不宜人與少菜先煮熟後除肉內兩邊鎖及毛再入蘿蔔或紫蘇或冬瓜皮同煮即更妙治療陳藏器云除腹冷腸鳴下痢腰疼婦人帶下漏下疝瘕及吐血丈夫久痢補陳藏器云主産婦瘦瘠及虛勞傷憊精血少者禁多食令頭悶目暗可微利即止久食令人發脫介蟲蝦卵生蝦主小兒患赤白遊腫搗碎敷之名醫所録地謹按生江湖池澤水田及溝渠中處處皆有之種類雖有大小青白之分其形皆似蜻蛉背傴僂有節蟹目長鬚頭多芒刺遊則冉冉而進退捷速又謂之長鬚蟲也時生無時採無時色青白味甘性微寒氣氣薄味厚陰中之陽臭腥制生搗爛用治療陳藏器云除五野雞病禁作鮓食之毒人至死小兒及雞狗食之腳屈不能行又動風發瘡疥多食損人又蝦無須者不可食鱗蟲蚺蛇膽有小毒附膏蚺音髯蛇膽主心腹䘌痛下部䘌瘡目腫痛膏主皮膚風毒婦人産後腹痛余疾名醫所録地圖經曰本經不載所出州土蘇恭云出桂廣以南高賀等州今嶺南州郡有之此蛇極大牙有長五六寸者彼土人多食其肉取其牙辟邪以利遠行其膽及膏為藥用也嶺表録異云雷州有蛇戶每歲五月五日即擔舁蚺蛇入官以取膽每一蛇兩人擔舁致大籠中藉以軟草屈盤於內將取之則出置地上用杈拐十數翻轉蛇腹旋覆按之使不得轉側約分寸於腹間剖出肝膽其膽狀若鴨卵剖取之復內肝於腹中以線縫合瘡口仍放於川澤蛇亦復活其膽曝乾以充上貢此物極多僞欲試之剔取如粟米許著淨水上浮游水上回旋行走者為真其經沉者諸膽血也試之不可多多亦沉矣其膏真者磊磊如梨豆子他蛇膏皆大如梅李子此為別也埤雅云大蛇可食尾圓無鱗身有斑文如故暗錦纈難死似鼉行地常俯其首膽隨目轉上旬近頭中旬在心下旬近尾南人云俗取其膽以充藥材即以線合其瘡縱之後遇捕者輒自見金瘡以明無膽亦其知也時生無時採五月五日取膽收曝乾用膽膏肉色青黃味甘苦性寒氣氣薄味厚陰中之陽臭腥主䘌瘡瘻目腫痛治療藥性論云膽主下部蟲殺小兒五疳陳藏器云膽主破血止血痢蠱毒下血小兒熱丹口瘡疳痢肉主飛尸遊蠱喉中有物吞吐不得出者作膾食之孟詵云膏主皮肉間毒氣肉作膾食之除疳瘡及主小兒腦熱水漬注鼻中良食療云肉主瘟疫氣可作膾食膏主小兒疳痢海藥云膽主小兒八癇別録云肉治風合治膏合麝香末敷齒根宣露膽如豆大二枚合通草汁研以意多少飲之並塗五心及下部治溫痢久不斷體瘦昏多睡坐則閉目飲食不下者禁四月勿食之蛇蛻無毒蛇蛻音稅出神農本經主小兒百二十種驚癇瘛尺曳切瘲子用切癲疾寒熱腸痔蟲毒蛇癇以上朱字神農本經弄舌搖頭大人五邪言語僻越惡瘡嘔咳明目以上黑字名醫所録名龍子衣蛇符龍子單衣弓皮地圖經曰出荊州川穀及田野間今南中於木石上及人家屋拱間多有之古今方書用之最多或云蛇蛻無時但著不淨之物則脫矣陶隱居云草中不甚見虺蝮蛻惟有長者多是赤𧐖黃頷輩其皮不可復識今往往得爾皆須完全石上者彌佳衍義曰蛇蛻從口翻退出眼睛亦退今閣眼藥多用取此義也時生無時採五月五日十五日取之良用皮白如銀色者佳其青黃蒼色者勿用色白味鹹甘性平軟氣氣薄味厚陰中之陽臭腥制雷公云凡使先於屋下掘一坑深一尺二寸安蛇皮於中一宿至卯時取出以醋浸一時於火上炙乾用或洗浸即用之治療藥性論云闢百鬼魅除喉痹日華子云療蠱毒辟惡止嘔逆及小兒驚悸客忤催生癧瘍白癜風食療云治諸惡瘡並安胎別録云燒末敷小兒重齶重斷重舌腫痛及緊唇又水調敷蛇露瘡又全蛻一條盛以絹袋療日月未足而欲産痛時繞於腰中合治燒末合醋調敷治白駁瘡燒全者一條為末合豬脂敷惡瘡十年不瘥似癩者及小兒初生月蝕瘡並頭面身上生瘡燒末合乳汁服一錢匕療小兒喉痹腫痛及吐血者以一條內瓶中鹽泥固濟燒灰存性合榆白皮湯調服二錢療橫生難産炙黃合當歸等分為末溫酒調服一錢匕療纏喉咽中如束氣不通燒灰存性合雞子黃一彈子同研治陷甲生入肉常有血疼痛先以溫漿水洗瘡針破貼藥以一尺七寸燒令黑研末合好酒一盞微溫頓服療兒吹奶腫疼裸蟲蜘蛛有毒附壁錢卵生蜘蛛主大人小兒㿉網療喜音戲忘名醫所録名次蟗音秋蜘蛛上音知下音朱土蜘蛛草蜘蛛䖦音悅切蟱音謀蝃音掇蝥絡新婦喜子蛛蝥蠨音蕭蛸音鞘地圖經曰舊本不著所出州土今處處有之其類極多爾雅云次蟗蜘蛛蜘蛛蛛蝥郭璞云江東呼蝃蝥者又云土蜘蛛在地布網者草蜘蛛絡幕草上者蠨蛸長踦小蜘蛛長腳者俗呼為喜子陶隱居云當用懸網狀如魚罾者亦名䖦蟱即爾雅所謂蛛蝥郭璞所謂蝃蝥者是也一種壁錢蟲平無毒是壁上作繭蜘蛛也亦入藥用衍義曰蜘蛛種類亦多經不言是何種今人多用人家檐角籬頭陋巷之間空中作圓網大腹深灰色遺尿著人作癬瘡者也時生三月四月採七月七日取用身色灰黑性微寒氣氣之薄者陽中之陰臭腥主斷瘧闢忘制雷公云凡用去頭足研如膏投入藥中用治療圖經曰蛇齧傷取汁塗之小兒腹疳者燒熟啖之贅疣者取其網絲纏之七日消爛蜂及蜈蚣毒者生置痛上令吸其毒皆有驗陶隱居云除乾嘔霍亂唐本注云療小兒大腹丁奚三年不能行者除溫瘧止嘔逆日華子云消疔腫網七夕朝取食令人巧去健忘壁錢蟲治小兒吐逆止鼻洪並瘡滴汁敷鼻中及瘡上並敷鼠瘻瘡別録云蜘蛛子治中風口喎僻取摩其偏急頰車候視正即止亦可向火摩之燒蜘蛛二七枚敷鼠瘻腫核痛若已有瘡出膿水者及敷療卒脫肛研汁敷蠍螫人合治大蜘蛛五枚日乾細研合酥調如面脂療瘰癧無間有頭無頭者日兩度貼之效戶邊蜘蛛杵以醋調療背瘡先挑四畔令血出根稍露用藥敷干即易旦至夜拔根出有效蜘蛛十四枚熬焦合桂半兩為末每服八分匕日再服治陰狐疝氣偏有大小時時上下者蜜丸亦得禁五色者兼大身上有毛生者及薄小者並不堪用解蛇蜂蜈蚣毒鱗蟲蝮蛇膽有毒附肉千歲蝮胎生蝮蛇膽主䘌瘡肉釀作酒療癩疾諸瘻心腹痛下結氣除蠱毒其腹中吞鼠有小毒療鼠瘻名醫所録名蚖蛇地圖經曰蝮蛇形不長頭匾口尖頭斑身赤文斑亦有青黑色者人犯之頭足貼著是也東間諸山甚多草行不可不謹之又有一種狀如蝮而短有四腳能跳來齧人東人名為千歲蝮人或中之必死然其齧人已即跳上木作聲其聲云斫木斫木者不可救也若云博叔博叔者猶可急療之陳藏器云按蛇既衆多入用非一本經雖載未能分析其蝮蛇形短鼻反錦文亦有與地同色者著足斷足著手斷手不爾合身糜潰其蝮蛇七八月毒盛時齧樹以泄其氣樹便死又吐口中涎沫草木上著人身腫成瘡卒難治療名曰蛇蟆瘡蝮所主略與虺同衆蛇之中此獨胎産出山南金州房州均州皆有之時生無時採無時收陰乾用膽色赤斑亦有青黑者味苦性微寒泄氣味厚於氣陰也臭腥主殺下部蟲五痔腸風治療圖經曰膽主䘌瘡肉釀作酒治諸惡風瘡瘻瘰癧皮膚頑痹唐本注云屎療痔瘻器中養取之皮灰瘡疔腫惡瘡骨疽蛻皮主身癢瘑疥癬陳藏器云蝮蛇腹中死鼠主鼠瘻脂著物皆透骨燒為黑末飲下三錢匕主赤痢別録云死蛇一條水煮濃汁洗臂腕腫痛合治活蛇一條著器中以醇酒一斗投之埋於馬溺處周年以後開取酒味猶存蛇已消化有患大風及諸惡風惡瘡瘰癧皮膚頑痹半身枯死手足臟腑間重疾並主之服一升以來當覺身習習服訖服他藥不復得力亦有小毒不可頓服大蛇一條勿令傷合酒漬之大者一斗小者五升以糠火溫令稍稍熱治白癩取蛇一寸許以臘月豬脂和敷上解中千歲蝮咬毒以細辛雄黃等分為末內咬傷瘡中及諸蛇虎傷俱解之白頸蚯蚓無毒濕生白頸蚯蚓出神農本經主蛇瘕去三蟲伏尸鬼疰蠱毒殺長蟲仍自化作水以上朱字神農本經療傷寒伏熱狂謬大腹黃疽以上黑字名醫所録名土龍地龍子千人踏曲蟺蚓螻地圖經曰主平澤皋壤地今處處皆有之謹按埤雅云蚓乃土之精也其為物不息引而後伸善長吟於地中江東人謂之歌女亦曰鳴砌又名千人踏即行路人踏死者亦入藥用月令云蚯蚓結言蚯蚓穴居首陽下向陽動則穴而上首故其身結而屈也白頸是其老者爾時生無時採三月取收陰乾用白頸自死者良色頸白身紫味咸性大寒軟氣氣薄味厚陰也臭腥制雷公云凡使用糯米泔水浸一宿至明漉出以無灰酒浸一日至夜漉出焙令乾後細切取蜀椒並糯米及切了蚯蚓三物同熬之待糯米熟去米椒了揀淨用之凡修事二兩使米一分椒一分為準今用先捶碎去中沙土置竹篩內於水面上洗淨曝乾用之治療陶隱居云蚯蚓為汁除溫病大熱狂言飲之皆瘥干蚓熬作屑去蛔蟲唐本注云屎封狂犬傷毒出犬毛效藥性論云干蚓熬末敷蛇傷日華子云蚯蚓除中風並癇疾治傳尸天行熱疾喉痹蛔蟲傷陳藏器云屎無沙者一升炒令煙盡水沃取半升濾去滓空腹服之療赤白久熱痢瘥衍義曰治腎臟風下疰病丹溪云解諸毒行濕病別録云蚯蚓杵為泥敷代指又幹杵為末敷裂齒痛良又杵爛以水濾過濃汁治小便不通服半碗立通兼大解熱疾不知人事欲死者服之亦效又以數條絞取汁服之治交接勞復陰卵腫或縮入腹絞痛氣欲絶者糞以水和敷一切丹毒流腫又為末敷小兒患聵耳出膿水成瘡兼吹耳中效合治以十條為末每服三錢匕合冷茶調下治風赤眼以一條內蔥葉中化水滴耳中治蚰蜒入耳亦化為水又合鹽貯蔥尾內為水點之治耳聾及療蜘蛛咬遍身瘡以十四條合苦酒三升漬之蚓死但服其汁治中蠱毒或吐下血若爛肝糞合鹽研敷治蛇犬咬並熱瘡合生甘草汁調輕輕塗小兒陰囊虛熱腫痛又水和為泥火干極赤研細如粉合臘月豬脂調敷療齒齦宣露日三瘥又合豬脂敷小兒耳後月蝕瘡有效解解諸毒及射罔毒又人中蚯蚓毒先飲鹽湯一盞次以鹽湯浸足愈羽蟲蠮螉無毒化生蠮音噎螉烏紅切主久聾咳逆毒氣出刺出汗以上朱字神農本經療鼻窒陟栗切土房主癰腫頭風以上黑字名醫所録名土蜂蜾裸地圖經曰生熊耳川穀及牂牁或人家屋間今處處有之黑色細腰雖一名土蜂而不在土中作穴但敬鳥刀展切土於人家壁間或器物傍作房如竹管者是也郭璞注爾雅云蜾裸蒲蘆即細腰蜂也俗呼為蠮螉詩小雅云螟蛉有子蜾裸負之注螟蛉桑蟲也蜾裸蒲蘆也言蒲蘆取桑蟲之子負持而去嫗養之以成其子又揚雄法言云螟蛉之子殪而逢蜾裸祝之曰類我類我注云蜾裸遇螟蛉而受化久乃變成蜂爾陶隱居乃謂生子如粟米大在其房中乃捕取草蟲以擬其子大為糧耳又有人壞其房而看之果見有卵如粟在死蟲之上皆如陶說又段成式云書齊中多蠮螉好作窠於書卷或在筆管中祝聲可聽有時開卷視之悉是小蜘蛛大如蠅虎旋以泥隔之乃知不獨負桑蟲也數說雖不同人或疑之然物類變化固不可度蚱蟬生於轉丸衣魚生於瓜子龜生於蛇蛤生於雀白鶂之相視負螽之相應其類非一若桑蟲蜘蛛之變為蜂不為異矣如陶所說卵如粟者未必非祝蟲而成之也宋齊丘所謂蠮螉之蟲孕螟蛉之子傳共情交其精混其氣和其神隨物大小俱得其真蠢動無定情萬物無定形斯言得之矣時生無時採無時收陰乾用身及房質類蜂而小色黑味辛性平散氣氣之薄者陽中之陰臭腥主癰腫制炒碾入藥用治療日華子云除嘔逆生研罯竹木刺合治窠微炙為末合乳汁調下一字治小兒霍亂吐瀉立止房合醋調塗蜂蠆土蜂燒末合油敷蜘蛛咬瘡介蟲葛上亭長有毒化生葛上亭長主蠱毒鬼疰破淋結積聚墮胎名醫所録地陶隱居云葛花開時取之身黑而頭赤喻如人著玄衣赤幘故名亭長此一蟲五變為療皆相似三月三月在芫花上即呼為芫青四月五月在王不留行上即呼為王不留行蟲六月七月在葛花上即呼為葛上亭長八月在豆花上即呼為斑蝥九月十月欲還地蟄即呼為地膽此是僞地膽爾主療猶同唐本注云今檢本草及古方諸方未見用王不留行蟲者若爾則四蟲專在一處今地膽出豳州芫花出寧州亭長出雍州斑蝥所在皆有四蟲出四處其蟲可一歲周遊四州乎且芫青斑蝥形段相似亭長地膽貌狀大殊豳州地膽三月至十月草菜上採非地中取陶之所言恐亂證之爾紹興校定云葛上亭長乃斑蝥芫青之類然別是一種驗其破血之性亦不遠矣大抵破畜血堅積多見用之本經云味辛微溫有毒是矣注云一蟲五變若以一歲能周遊四州者即無據矣惟山東州郡多産之時生無時採六月七月取收曝乾用身黑頭赤者良色黑味辛性微溫散氣氣厚於味陽也臭腥主淋制雷公云凡用亭長之類當以糯米同炒看米色黃黑即出去頭足及翅腳以亂髮裹懸屋棟上一宿然後入藥用治療圖經曰取得折斷腹腹中有白子如小米著白板子上陰乾藥成久患淋服三枚或二枚服時以水著小杯中內藥盞中爪甲研當匾匾見於水中乃令病人飲之勿令著牙藥雖微小直至下焦淋所少頃藥當作煩隨飲干麥飯汁或飲水亦可則藥勢止也老小者服三分之一當下如膿血石淋狀如指頭或青或黃男女服之皆愈禁妊娠不可服斑蝥有毒化生斑蝥出神農本經主寒熱鬼疰蠱毒鼠瘻惡瘡疽蝕死肌破石癃以上朱字神農本經疥癬血積傷人肌墮胎以上黑字名醫所録名龍尾晏青腃發斑蠔音刺龍苗斑菌盤蛩龍蠔地圖經曰生河東川穀今處處有之七八月大豆盛時此蟲多在豆葉上長五六分甲上黃黑斑文烏腹尖喙如巴豆大就葉上採之古方書多有用此其字或作斑蝥亦作斑蠔也時生四月五月採七八月露中取收陰乾用身色黃黑斑文味辛性寒散氣氣之薄者陽中之陰主鼠瘻淋瀝助馬刀為之使反畏巴豆丹參空青惡膚青豆花制衍義曰凡使須在糯米中炒待米色黃為度去翅足用治療藥性論云消瘰癧利水道日華子云療淋疾敷惡瘡瘻別録云治疔腫以一枝捻破用針劃瘡上作十字封之即根出又治沙蝨毒以二枚一枚為末服之一枚燒令煙絶研末敷之立瘥及妊娠或已不活欲下胎者燒末服一枚即下合治以半兩微炒為末合蜜調敷乾癬積年生痂搔之黃水出每逢陰雨即癢者以一兩去翅足用粟米一升同炒令米焦黃去米不用細研入干薄苛末四兩同研令勻合烏雞子清丸如緑豆大空心臘茶下一丸加至五丸每日減一丸減至一丸後每日服五丸治大人小兒瘰癧內消禁妊娠不可服為能潰人肉治淋藥多用極苦人尤宜斟酌凡入藥不可令生生即吐瀉人芫青有毒化生芫青主蠱毒風疰鬼疰墮胎名醫所録地圖經曰本經不載所出州土今處處有之其形頗與斑蝥相類但純青緑色背上有一道黃文尖喙三四月芫花發時乃生多就花上採之雷公云芫青斑蝥亭長地膽等四件其樣各不同所居所食所效亦各不同其芫青嘴尖背上有一畫黃斑蝥背上一畫黃一畫黑嘴尖處一小點赤在豆葉上居食豆葉汁亭長形黑黃在蔓葉上居食蔓膠汁地膽額上有大紅一點身黑用各有處時生三月四月採三月四月取收曝乾用身質類斑蝥色碧味辛性微溫散氣氣厚於味陽也制雷公云用糯米小麻子相拌同炒待米黃黑出去麻子等去頭及翅足更以亂髮裹之掛於東壁角上一宿去毒至明取用治療陶隱居云治鼠瘻瘡禁妊娠不可服地膽有毒化生地膽出神農本經主鬼疰寒熱鼠瘻惡瘡死肌破癥瘕墮胎以上朱字神農本經蝕瘡中惡肉鼻中息肉散結氣石淋去子服一刀圭即下以上黑字名醫所録名蚖青青蛙烏媧切地陶隱居云出梁州及汶山川穀今邠州亦有之狀如大馬蟻有翼本經一名蚖青蚖字乃異恐是相乘誤矣時生夏採八月取用身質類大馬蟻色黑味辛性寒氣氣之薄者陽中之陰主鼻齆瘰癧反惡甘草禁妊娠不可服蜈蚣有毒卵生蜈蚣出神農本經主鬼疰蠱毒啖諸蛇蟲魚毒殺鬼物老精溫瘧去三蟲以上朱字神農本經療心腹寒熱結聚墮胎去惡血以上黑字名醫所録地圖經曰生吳中川穀及江南今江浙山南唐鄧間皆有之多在土石及人家屋壁間以頭足赤者為勝其性能制蛇見大蛇便緣而啖其腦若黃足者最多人以火炙令赤以當之不堪用也衍義曰蜈蚣背光黑緑色足赤腹下黃者是畏蛞蝓遇其所行之路輒不敢過若觸其身則死故人取以治蜈蚣毒也時生無時採七月八月取收曝乾用頭足赤者良味辛性溫散氣氣之厚者陽也臭腥制雷公云凡使蜈蚣先以木末合柳蚛末於土器中同炒令木末焦黑後去木末用竹刀刮去足甲或炙用亦可治療圖經曰去尸疰惡氣諸方皆用日華子云除癥結邪魅別録云為末治蛇瘡汁治小兒撮口病但看舌上有瘡如粟米大者是也刮破指甲研敷兩頭內瘥治以一條炙黃為末合苦酒敷之大治射工水弩毒亦治口噤炙黃去足為末合豬乳二合調半錢分三四服溫灌之主初生兒口噤不開不收乳者以乾者一條合白礬皂子大雷丸一個百部二錢同為末以醋調塗丹毒瘤解人中其毒以烏雞屎水稠調塗咬處或用大蒜又桑汁白鹽塗之並效贋千足蟲真似只是頭上有白肉面並嘴尖鱗蟲蛤蚧有小毒卵生蛤蚧主久肺勞傳尸殺鬼物邪氣療咳嗽下淋瀝通水道名醫所録地圖經曰生嶺南山谷及城牆或榕樹間首若蝦蟆背有細鱗如蠶子色黃為土長四五寸尾與身等形如大守宮一雄一雌常自呼其名蛤蚧最護惜其尾或見人欲取之多自齧斷其尾人即不取之凡採之者須存其尾則用之力全在尾故也人欲得其首尾完者乃以長柄兩股鐵叉如黏黐醜知切竿狀伺於榕木間以叉刺之皆一股中腦一股著尾故不能齧也行常雌雄相隨入藥亦須兩用之或云陽人用雌陰人用雄時生無時採無時收曝乾用首尾全者佳質類守宮而大色土黃味咸性平軟氣味厚氣薄陰中之陽臭腥主肺痿制雷公云凡使須認雌雄雄者為蛤皮粗口大身小尾粗雌者為蚧口尖身大尾小凡修事服之去甲上尾上並腹上肉毛毒在眼如斯修事了用酒浸才幹以紙兩重於火上緩隔焙紙炙待兩重焦乾透後去紙取蛤蚧於瓷器中盛於東舍角畔懸一宿取用力可十倍勿傷尾效在尾也日華子云去頭足洗去鱗鬣內不淨以酥炙用良治療日華子云清肺氣止嗽並通月經下石淋及治血海藥云除肺痿上氣咯血咳嗽補衍義曰補肺虛勞嗽有效合治合阿膠生犀角鹿角膠羚羊角各一兩除膠外皆為屑次入膠分四服每服用河水三升於銀石器中慢火煮至半升濾去滓臨臥微溫細細呷其滓候服盡再捶都作一服以水三升煎半升如前服治久嗽不愈肺間積虛熱久則成瘡故嗽出膿血曉夕不止喉中氣塞胸膈噎痛裸蟲水蛭有毒水蛭出神農本經主逐惡血瘀血月閉破血瘕積聚無子利水道以上朱字神農本經墮胎以上黑字名醫所録名蚑音蜞至掌馬蟥石蛭草蛭泥蛭地圖經曰生雷澤池澤今近處河中多有之此有數種生水中者名水蛭亦名馬蟥生山中者名石蛭生草中者名草蛭生泥中者名泥蛭並皆著人及牛馬股脛間齧咂其血甚者入肉中産育為害甚大水蛭有長尺者用之當以小者為佳古法有用水蛭啖瘡者緩急所須亦不可得雀知悌令預收養之以備用此物極難死如火炙經年得水猶可活也石蛭等並頭尖腹粗不堪入藥誤用之則令人目中生煙不已漸致枯損不可不辨也時生無時採五月六月取收曝乾用水中小者為佳色黃味鹹苦性平微寒泄氣味厚於氣陰也臭腥主通經脈破血積反畏石灰鹽制圖經曰採得當以䈽竹筒盛之待乾又用米泔浸經宿然後出之曝已又用冬月豬脂煎令黃乃堪用干蛭當展令長腹中有子者去之治療藥性論云主女子月候不通欲成血勞症塊並一切血積聚合治以一兩銼碎炒令煙出合麝香末酒調一錢治從高墜下及打擊內傷當下畜血效禁妊娠不可服甲蟲田中螺無毒附螪尸揚切螺胎生田中螺汁主目熱赤痛止渴名醫所録地陶隱居云狀類蝸牛形圓而極高大小者如桃李大者如梨橘人亦煮食之今湖濱岸側多有入藥以水田中者佳一種小而有稜者名螪螺亦止渴不能下水此物至難死爛殼燒灰為末服主反胃胃冷及卒心痛或用之時生無時採夏秋取色青黃味甘性寒氣氣之薄者陽中之陰臭腥治療陶隱居云汁除熱醒酒唐本注云殼療尸疰心腹痛又主失精水漬飲汁止瀉日華子云田螺治手足腫及熱瘡生研汁敷之陳藏器云田中螺煮食之利大小便去腹中結熱目下黃腳氣衝上小腹急硬小便赤澀手腳浮腫碎其肉敷熱瘡食療云汁服之壓丹石合治水中螺蚌肉合蔥豉椒姜煮汁飲三兩盞治連月飲酒咽喉爛舌上生瘡田中螺大者七枚洗淨新汲水養去穢泥重換水一升浸洗旋取於乾淨器中著少鹽花於口上承取自出者用點目中治肝熱目赤腫痛禁不可常食貝子有毒貝子出神農本經主目翳鬼疰蠱毒腹痛下血五癃利水道燒用之良以上朱字神農本經除寒熱溫疰解肌散結熱以上黑字名醫所録名貝齒白貝地圖經曰生東海池澤今南海亦有之乃貝類之最小者其中肉如蝌蚪而有首尾交州記曰大貝出日南如酒杯小貝貝齒也貝皆紫色此則潔白如魚齒故名貝齒古人用飾軍容服物今亦稀用但穿之與小兒戲髢達計切頭家以飾鑑帶畫家以砑物用之蓋獸二為友貝二為朋詩曰錫我百朋是也時生無時採無時用殼質類紫貝而小色白味咸性平氣氣味俱薄陰中之陽臭腥制雷公云凡使勿用花蟲殼其二味相似只是用之無效凡用先以苦酒與蜜相對稱二味相和了將貝齒於酒蜜中蒸取出卻於清酒中淘令淨研用之治療藥性論云能破五淋利小便治傷寒狂熱日華子云除目中翳障並鬼毒鬼氣下血海藥云主水氣浮腫及孩子疳蝕吐乳並燒過入藥用別録云治食物中毒取一枚含之自吐合治以十枚燒灰合珠子等分細研除目中息肉取一胡豆大點上仰臥如炊一石米飲久乃滅以一兩燒灰研如面合龍腦少許點小兒黑花眼翳澀痛解食麵臛毒漏脯毒射罔在諸肉毒石蠶有毒附草石蠶化生石蠶主五癃破石淋墮胎肉解結氣利水道除熱神農本經名沙蝨地圖經曰生江漢池澤石上形如蠶為生氣之物猶海中蠣蛤輩附石而生不動皆活物也所在水石間亦有之取以為鉤餌今馬湖石門出此最多彼人亦好啖之福州及信州山石上一種草四時常有苗青色有節其根亦名石蠶三月採根焙乾主走注風散血止痛其節亦堪單用搗篩取末酒溫服之衍義曰草根似蠶而名石蠶者別是一種若以水中石上者謂之草則謬矣經曰肉解結氣注中更辨不定此物在處有之附生水中石上作繭如叉股長寸許以蔽其身色如泥蠶在其中此所謂之石蠶也時生無時採無時色灰褐味咸性寒氣氣薄味厚陰也臭腥毛蟲雀甕無毒卵生雀甕主小兒驚癇寒熱結氣蠱毒鬼疰神農本經名天漿子雀兒飯甕蠔與蠔同毛蟲棘剛子蠔七吏切蟲蛅音髯蟖音新躁舍雀癰地圖經曰雀甕蛅蟖房也生漢中木枝上今處處有之蛅蟖蠔蟲也亦曰蠔毛蟲好在石榴木上似蠶而短背上有五色斑刺螫人有毒欲老者口吐白汁凝聚漸堅硬正如雀卵故名之又名雀癰癰甕聲相近耳其子在甕中作蛹如蠶之在繭也久而作蛾出枝間葉上放子如蠶子復為蟲也一曰雀好食其甕中子故俗呼為雀兒飯甕舊注以甕為蟲卵非也時生無時採八月取用窠質類雀卵而小色紫白而斑味甘性平氣氣厚於味陽中之陰臭腥主小兒驚癇制蒸之或搗汁用治療陳藏器云小兒撮口病先泰力咨切剝也小兒口傍令見血以甕擊碎取汁塗之及與平常小兒飲之令無疾合治天漿子有蟲者合白殭蠶乾蠍三物各三枚微炒搗羅為末煎麻黃湯調服一字治小兒慢驚日三服之隨兒大小與之大效合鼠婦生搗汁塗小兒口傍治撮口不得飲乳者鱗蟲白花蛇有毒卵生白花蛇主中風濕痹不仁筋脈拘急口面喎斜半身不遂骨節疼痛大風疥癩及暴風瘙癢腳弱不能久立名醫所録名褰鼻蛇地圖經曰生南地及蜀郡諸山中今黔中及蘄州鄧州皆有之其文作方勝白花喜螫人足黔州人有螫者立斷之補養既愈或作木腳續之亦不妨行治風速於諸蛇然有大毒頭尾各一尺尤甚不可用只用中斷乾者以酒浸去皮骨炙過收之不復蛀壞其骨須遠棄之不然刺傷人與生者殆同此蛇入人室屋中忽作爛瓜氣者便不可向須速闢除之用干蛇亦以眼不陷者為真時生無時採九月十月取收炙乾用肉中斷以白花者良色白味甘鹹性溫氣氣厚味薄陽中之陰臭腥主癘風濕痹制雷公云凡使去頭兼皮鱗帶子了二寸許銼之以苦酒浸之一宿至明漉出向柳木炭火焙之令乾即以酥炙之酥盡為度炙乾後於屋下以地上掘一坑可深一尺以來安蛇於中一宿至明再炙令乾任用凡修事一切蛇並去膽並上皮了乾溼須酒煮過用之治療藥性論云除肺風鼻塞身生白癜風癧瘍斑點及浮癮疹合治生取蛇中段先用火燒一大磚令通紅沃醋令熱氣蒸便置蛇於上以盆覆宿昔如此三過去骨取肉芼以五味令過熟治疥癬遍體諸藥不效者使頓啖之瞑眩一晝夕乃醒疕隨皮便退其人即愈禁四月勿食食之害人解遭惡蛇所螫貼蛇皮於患處炙之引去毒氣即止烏蛇無毒卵生烏蛇主諸風瘙癮疹疥癬皮膚不仁頑痹諸風用之炙入丸散酒浸合膏名醫所録地圖經曰生商洛山今蘄州黃州山中有之背有三稜色黑如漆性至善不噬物多在蘆叢中嗅其花氣亦乘南風而吸最難採捕多於蘆枝上得之至枯死眼不陷稱之重三分至一兩者為上粗大者轉重力彌減也又頭有逆毛二寸一路可長半分以來頭尾相對用之入神此極難得也江東有黑稍蛇能纏物至死亦如其類作僞者用他蛇生熏之至黑亦能亂真但眼不光為異爾衍義曰烏蛇尾細長能穿小銅錢一百文者佳有身長一丈餘者蛇類中此蛇入藥最多嘗於順安軍塘濼堤上見一烏蛇長一丈餘有鼠狼齧蛇頭曳之而去是亦相畏伏爾烏蛇脊高世謂之劍脊烏稍也時生無時採無時用肉質類諸蛇但極小而黑如漆色黑味甘性平溫氣氣厚於味陽中之陰臭腥主諸風疥癬制去皮骨炙用治療藥性論云消熱毒風及肌生瘡眉髭脫落瘑癢疥等別録云以綿裹蛇膏塞耳中治耳聾合治用二兩燒灰為末合臘月豬脂調敷治面上瘡及䵟以蛇一條酒浸服治大風效金蛇無毒附銀蛇金星地鱔卵生金蛇解生金毒人中金藥毒者取蛇四寸炙令黃煮汁飲頻服之以瘥為度人中金毒候之之法合瞑取銀內口中含至曉銀變為金色者是也令人肉作雞腳裂名醫所録地圖經曰出賓澄州大如中指長尺許常登木飲露身作金色照日有光亦有銀蛇解銀藥毒今不見有捕得者而信州上饒縣靈山鄉出一種蛇酷似此彼人呼為金星地鱔冬月捕之亦能解衆毒止泄瀉及邪熱然方書未見其用者時生無時採無時色黃味咸性平氣味厚於氣陰也臭腥制炙黃煮汁用解金蛇解金毒銀蛇解銀毒及衆毒羽蟲蜣螂有毒化生蜣螂出神農本經主小兒驚癇瘛瘲腹脹寒熱大人癲疾狂昜音羊以上朱字神農本經手足端寒肢滿賁豚以上黑字名醫所録名蛣蜣推丸胡蜣螂地圖經曰生長沙池澤今處處有之其類極多取其大者又鼻高目深者名胡蜣螂用之最佳陶隱居云蛣蜣之智在於轉丸其喜入人糞中取糞丸而卻推之俗名為推丸當取大者其類有三四種以鼻頭匾者為真衍義曰有大小二種一種大者為胡蜣螂身黑光腹翼下有小黃子附母而飛行晝則不行夜方飛出至人家庭戶中見燈光則來一種小者身黑暗晝方飛出夜則不飛今當用胡蜣螂其小者研三十枚以水灌牛馬治脹結絶佳狐遇而必盡食之時生無時採五月五日取收蒸過藏之色黑味咸性寒氣味厚於氣陰也臭腥反畏羊肉羊角石膏制圖經曰凡使去足炒用治療圖經曰搗爛貼疔瘡半日許可再易血盡根出遂愈又沙塵入眼不可出者取一枚手持其背遂於眼上影之沙塵自出唐本注云搗為丸塞下部引痔蟲出盡永瘥藥性論云治小兒疳蟲蝕日華子云治疰忤糞窒痔瘻出蟲別録云治癧瘍風取途中自死者杵爛當揩令熱封之一宿瘥又治大人小兒忽得惡瘡未辨識者杵絞取汁敷其上良合治合乾薑敷惡瘡及出箭頭以巴豆微炒並研勻塗箭鏃入骨不可拔者罯所傷處斯須痛定必微癢且忍之待極癢不可忍便撼動箭鏃拔之立出以自死者燒為末和醋敷治蜂瘻端午日收乾者十枚杵末合油調敷一切惡瘡及沙蝨水弩惡疽用七枚和大麥爛搗封之治附骨癰燒末以唾調敷小兒舌上療重舌禁妊娠不可用之勿置水中飲飲之令人吐五靈脂無毒五靈脂主療心腹冷氣小兒五疳闢疫治腸風通利氣脈女子月閉名醫所録名蟲寒號蟲地圖經曰出北地今惟河東州郡有之云是寒號蟲糞也此蟲四足有肉翅不能遠飛所以不入禽部其糞色黑如鐵多夾砂石絶難修治衍義曰五靈脂行經血有功不能生血嘗有人病眼中翳往來不定如此乃是血所病也蓋心生血肝藏之肝受血則能視目病不治血則為背理此物入肝最速也時生無時採無時用糞色黑味甘性溫氣氣之厚者陽也臭腥主傷寒積聚心腹冷痛制圖經曰若用之先以酒研飛煉令去砂石乃佳治療圖經曰除傷冷積聚小兒女子藥中多用之又治産婦血暈昏迷上衝悶絶不知人事者用二兩一半炒熟一半生用搗末每服一錢溫熟水調下如口噤者以物斡開灌之入喉即愈合治取十兩搗羅為末以水五盞煎三盞去滓澄清再煎為膏入神麯末二兩和丸如桐子大每服二十丸空心溫酒服治血崩不止揀精好者不計多少搗羅為末研狗膽汁和丸如芡實大每服一丸以生薑湯酒磨令極細更以少生薑酒化令極熱與患人服之不得漱口急與粥吃不令太多治丈夫婦人吐逆粥食湯藥不能下者合蒲黃等分為末每服二錢用好醋一杓熬成膏再入水一盞煎七分熱服治婦人心痛血氣刺不可忍者效末炒令煙盡每服二錢合當歸少許酒一盞與藥末同煎六分去滓熱服治婦人經血不止連三五服瘥取二兩合乳香沒藥半兩川烏頭一兩半炮去皮同為末滴水丸如彈子大每服一丸生薑溫酒磨服治風冷氣血閉手足身體疼痛冷麻取一兩合雄黃半兩同為末每服二錢以酒調灌之治毒蛇所傷仍以滓塗咬處蠍有毒胎生蠍療諸風癮疹及中風半身不遂口眼喎斜語澀手足抽掣名醫所録名蛜𧌴主薄蟲地圖經曰舊不著所出州土今河陝州郡皆有之惟青州者良其身似蝦簇八足二螯尾如蜻蜓尾端有毒如刺螫人痛不可忍然有雌雄二種雄者螫人痛在一處雌者痛牽諸處蓋毒有輕重故也衍義曰蠍大人小兒通用治小兒驚風不可缺也有用全者有隻用稍者稍力尤功今青州山中石下捕得慢火逼或烈日中曬蠍渴熱時乃與青泥食之既滿腹以火逼殺之故其色多赤售之而欲其體重也時生無時採夏秋取收焙乾用緊小者良色青黃味甘性平緩氣氣之薄者陽中之陰臭腥主諸風制去毒炒乾用治療圖經曰除大人中風小兒驚搐合治取五枚以大石榴一個割頭去子作甕內蠍其中以頭蓋之紙筋黃泥封裹微火炙乾漸加火燒令通赤去火取中焦黑者細研乳汁調半錢匕灌之治小兒風癇兒稍大則以防風湯調末服之取至小者四十九枚合生姜如蠍大四十九片二物於銅器內炒候生薑干為度搗末作一服晚用溫酒下至夜儘量飲酒醉治耳聾因腎虛所致次日耳中如笙簧即效解若雄蠍螫人用井泥敷之溫則易之雌蠍螫者當用瓦屋溝下泥敷之或不值天雨泥可新汲水從屋上淋下取泥用又可畫地作十字取上土水服五分匕又云曾經螫毒痛苦不可忍諸法療不效有人令以冷水漬指亦漬手即不痛水微暖復痛即易冷水余處不可用冷水浸則以故布拓之小暖則易之皆驗螻蛄無毒日華子云有毒生螻蛄主産難出肉中刺漬癰腫下更噎解毒除惡瘡夜出者良神農本經名蟪蛄天螻碩鼠梧鼠𧎅音斛地圖經曰生東城平澤今處處有之穴地糞壤中而生夜則出求食人夜行忽見多打殺之言其為鬼所使也爾雅云𧎅天螻夏小正篇云三月𧎅則鳴是也蔡雍勸學篇云碩鼠五能不成一技術注云能飛不能過屋能緣不能窮木能遊不能度谷能穴不能掩身能走不能免人荀子云梧鼠五技而窮併為此螻蛄也及魏詩碩鼠刺重斂傳注皆謂大鼠即爾雅所謂碩鼠關西呼為鼩音瞿鼠者陸機云今河東有大鼠能人立交見兩腳於頸上能舞善鳴食人禾苗人逐則走木空中亦有五技或謂之雀鼠其形大然螻蛄與此鼠二物同名碩鼠也螻蛄有技而窮此鼠技不窮故不同耳螻蛄又名梧鼠本經蓋未見也衍義曰此蟲當立夏後至夜則鳴月令謂之螻蟈鳴者是矣其聲如蚯蚓此乃是五技而無一長者也時生春採夏至取收曝乾用腦及身味咸性寒軟氣味厚於氣陰也臭腥主消水腫除惡瘡制去翅足炒用治療日華子云主惡瘡水腫頭面腫孫真人云治箭鏃在咽喉胸膈及針刺不出搗取汁滴上三五度箭頭自出別録云治十種水病腫滿喘促不得臥用五枚干為末食前湯調下半錢匕至一錢小便通效治鯁用腦吞之瘥亦治刺不出敷之即出合治取七枚合鹽二兩同於新瓦上鋪蓋焙乾研末溫酒下一錢匕治石淋導水即愈馬陸有毒濕生馬陸出神農本經主腹中大堅瘕破積聚息肉惡瘡白禿以上朱字神農本經療寒熱痞結脅下滿以上黑字名醫所録名百足馬軸土蟲飛蚿音玄蟲馬蚿刀環蟲地圖經曰生玄菟川穀陶隱居云此蟲形長五六寸狀如大蛩夏月登樹鳴冬則蟄今人呼為飛蚿蟲也恐不必是馬陸爾今有一細黃蟲狀如蜈蚣而甚長俗名土蟲雞食之醉悶亦至死唐本注云此蟲大如細筆管長三四寸斑色一如蚰蜒襄陽人名為馬蚿亦名馬軸亦呼刀環此蟲之死其身側臥狀如刀環也有人自毒服一枚便死也衍義曰馬陸即今百節蟲也身如槎節節有細蹙紋起紫黑色光潤百足死則側臥如環長二三寸尤者粗如小指西京上陽宮及內城磚牆中甚多入藥至鮮時生無時採夏月取收曝乾用身質類蜈蚣而粗色紫黑味辛性溫散氣氣厚於味陽也臭腥主破堅積消惡瘡制雷公云凡使收得後糠頭炒令糠頭焦黑取馬陸出用竹刮足去頭研成末用之裸蟲蛙無毒卵生蛙主小兒赤氣肌瘡臍傷止痛氣不足名醫所録名長股青蛙水雞金線蛙土鴨蛙子地圖經曰本經不載所出州土云生水中今處處有之似蝦蟆而背有青緑色俗謂之青蛙背有黃文者謂之金線蛙陶隱居云蜂蟻蛙蟬其類最多大腹而脊青者俗名土鴨其鳴甚壯即爾雅所謂在水曰蛙者是也又一種黑色者南人呼為蛤子食之至美即今所謂之蛤亦名水雞也閩蜀浙東人以為珍饌彼人云食之補虛損産婦尤宜食之即此也又一種形小善鳴者名蛙子即藥中所用蛙是也衍義曰蛙其色青腹細嘴尖後腳長故善躍其聲大則曰蛙其聲小則曰蛤也時生夏生採無時用肉質類蝦蟆而小色青緑味甘性寒氣氣之薄者陽中之陰臭腥主去勞熱補虛損治療日華子云青蛙除小兒熱瘡金線蛙殺尸疰病蟲去勞劣解熱毒甲蟲鯪鯉甲有大毒鯪鯉甲主五邪驚啼悲傷燒之作灰以酒或水和方寸匕療蟻瘻名醫所録名穿山甲地圖經曰舊不著所出州郡今湖嶺及金商均房間深山大谷中皆有之似鼉而短小色黑又似鯉魚而有四足能陸能水日中出岸開鱗甲如死令蟻入中蟻滿便閉而入水蟻皆浮出因接而食之故主蟻瘻為最衍義曰其鯪鯉甲穴山而居故今謂之穿山甲也時生無時採無時用甲質類鼉而短小色黑性微寒氣氣之薄者陽中之陰臭腥制燒灰或炙用治療圖經曰主惡瘡疥癩燒其甲末敷之藥性論云治山瘴瘧日華子云治小兒驚邪婦人鬼魅悲泣別録云治蟻入耳燒為末以水調灌之即出合治燒末合肉豆蔻末少許米飲調服治腸痔疾取二七枚為末合豬膏調敷蟻漏炙黃合木通各一兩自然銅半兩生用三味搗羅為散每服二錢溫酒調下不計時候治吹乳疼痛不可忍者取一兩童子小便浸一宿以慢火炙令黃為散每服一錢合狗膽少許熱酒調下治産後血氣上衝心成血暈者合蝟皮各一兩俱燒存性肉豆蔻仁三個同為末米飲調服二錢治氣痔膿血甚者中病即已不必盡劑珂無毒珂主目中翳斷血生肌名醫所録地圖經曰珂貝類也生南海大如腹皮黃黑而骨白人取以為飾也時生無時採無時或冬月取用殼及骨質類蚌色皮黃黑骨白味咸性平氣味厚於氣陰中之陽臭腥制雷公云採得白色膩者並有白旋水文勿令見火凡用以銅刀刮作末細研用重絹羅篩過後再研千餘下用之治療別録云主消翳膜及筋胬肉並刮點之禁不入婦人藥中用羽蟲蜻蛉無毒化生蜻音青蛉音零主強陰止精名醫所録名蜻蜓諸乘胡蜊馬大頭地圖經曰舊不載所出州郡今處處有之六足四翼其翅輕薄似蟬翼而狹長取蚊虻食之將雨多好集款飛溪渠水上尾端亭午則亭故名之曰蝏也然有數種當用青色大眼者為良其餘黃赤及黑者不入藥用衍義曰其中一種大者名為馬大頭身緑色雌者腰間一遭碧色入藥當以雄者若謂之青色大眼一類之中元無青者眼一類皆大蓋此物生化於水中故多飛水上也俗間正名蜻蜓道家雖多用之而不甚入藥也時生四月生採夏秋取色緑性微寒氣氣之薄者陽中之陰臭腥制去翅足炒用治補日華子云壯陽暖水臟鼠婦無毒日華子云有毒濕生鼠婦主氣癃不得小便婦人月閉血瘕癇痓寒熱利水道神農本經名負蟠蜲𧑓鼠姑𧉅音伊蝛音威鼠負鼠黏蟠地圖經曰生魏郡平谷及人家地上今處處有之多在下濕處甕器底及土坎中常惹著鼠背負之故名鼠負俗亦謂之鼠黏正猶葈耳名羊負來之義今作婦字則謬矣爾雅云蟠鼠負郭璞云甕器底蟲又云𧉅蝛蜲𧑓詩東山云𧉅蝛在室鄭箋云家無人則生然本經亦有此名是今人所謂濕生蟲者也衍義曰鼠婦濕生蟲也多足其色如蚓背有橫紋蹙起大者長三四分在處有之磚甃及下濕多有用處絶少時生無時採五月五日取色微紫味酸性溫微寒氣氣厚味薄陽中之陰治療圖經曰張仲景主久瘧大鱉甲丸中用之以其主寒熱也合治用七枚熬為屑作一服合酒調下治産後小便不利禁妊娠不可服螢火無毒化生螢火主明目小兒火瘡傷熱氣蠱毒鬼疰通神精神農本經名夜光放光挾火即照音照據火育燭磷然照磷熠以入切耀以灼切地圖經曰生階地池澤及陰濕地處處有之陶隱居云此是腐草及爛竹根所化初猶未如蟲腹下已有光數日遂變而能飛方術家捕取內酒中令死乃干之醫家用之亦少衍義曰螢常在大暑前後飛出是得大火之氣而化故如此明照也呂氏春秋云腐草化為螢月令亦曰腐草所化然非陰濕處終無有也時生六月生採七月七日取收陰乾色黃味辛性微溫氣氣之厚者陽也臭朽治療藥性論云治青盲甲蟲甲香無毒胎生甲香主心腹滿痛氣急止痢下淋名醫所録名流螺地圖經曰甲香海蠡音螺之掩也生南海今嶺外閩中近海州郡及明州皆有之南州異物志曰甲香大者如甌面前一邊直攙長數寸圍殼岨峿有刺其掩雜衆香燒之使益芳獨燒則臭一名流螺諸螺之中流最厚味是也其蠡大如小拳青黃色長四五寸人亦啖其肉而無損益今醫家稀用但合香家所須用時先以酒煮去腥及涎云可聚香使不散也台州小者尤佳凡蠡之類亦多絶有大者珠蠡瑩潔如珠鸚鵡蠡形似鸚鵡頭並堪酒杯者梭尾蠡如梭狀釋輩所吹者皆不入藥故不悉録海藥云南人常食若龜鱉之類又有小甲香若螺子狀取其蒂而修成也衍義曰甲香善管香烟與沉檀龍麝用之甚佳時生無時採無時用黶色青黃味咸性平氣味厚於氣陰中之陽臭腥制雷公云凡使須用生茅香皂角二味煮半日卻漉出於石臼中搗用馬尾篩篩過用之別録云甲香修製法不限多少先用黃土泥水煮一日以溫水浴過次用米泔或灰汁煮一日依前浴過後用蜜酒煮一日又浴過爆干任用之治療別録云和氣清神主腸風痔瘻及甲疽瘻瘡蛇蠍蜂螫疥癬頭瘡饞瘡等裸蟲衣魚無毒化生衣魚出神農本經主婦人疝瘕小便不利小兒中風項強背起摩之以上朱字神農本經又療淋墮胎塗瘡滅瘢以上黑字名醫所録名白魚壁魚蟫潭尋二音地圖經曰生咸陽平澤今處處有之衣中乃少而多在書卷中爾雅所謂蟬白魚郭璞云衣書中蟲一名蛃音丙魚是也別録云補闕張周見壁上瓜子化為白魚因知列子朽瓜為魚之言不虛也今人謂之壁魚衍義曰衣魚多在故書中久不動帛中或有之不若故紙中多也身有厚粉手搐之則落亦齒毳衣用處亦少其形稍似魚其尾又分二岐世人以滅瘢痕用之時生無時採無時色青白味咸性溫軟氣氣薄味厚陰中之陽治療圖經曰主小兒淋閉取以摩臍及小腹即通藥性論云利小便孫真人云卒患偏風口喎語澀取數枚摩耳下喎向左摩右向右摩左正即止別録云小兒中客忤取十枚敷乳頭飲之瘥又眼翳為末注少許於翳上又婦人無故遺血溺取三十個內陰中合治合鷹屎殭蠶敷瘡瘢即滅合乳汁注目中治沙石草落目中眯不出者禁妊娠不可服三十六種陳藏器余海螺百一方治目痛纍年或三四十年方取生螺一枚洗之內燥抹螺口開以黃連一枚內螺口中令其螺飲黃連汁以綿注取汁著眥中孫真人云合菜食治心痛海月味辛平無毒主消渴下氣令人能食利五臟調中生薑醬食之消腹中宿物令易飢止小便南海水沫所化煮時猶變為水似半月故以名之海蛤類也別録云平主消痰辟邪鬼毒以生椒醬調和食之良能消諸食使人易飢又其物是水沫化之煮時猶是水入腹中之後便令人不小便故知益人也又有食之人亦不見所損此看之將是有益耳亦名以下魚青蚨味辛溫無毒主補中益陽道去冷氣令人悅澤生南海狀如蟬其子著木取以塗錢皆歸本處一名蟱蝸廣雅云青蚨也搜神記曰南方有蟲名𧍡蠋如蟬大辛美可食其子如蠶種取其子歸則母飛來雖潛取必知處殺其母塗錢子塗貫用錢則自還淮南子萬畢云青蚨一名魚伯以母血塗八十一錢以子血塗八十一錢置子用母置母用子皆自還也別録云謹按畢志云生南海諸山雄雌常處不相舍主祕精縮小便青金色相似人採得以法末之用塗錢以貨易晝用夜歸亦是人間難得之物也豉蟲有毒殺禽獸蝕息肉敷惡瘡別録云豉蟲主射工取一枚致口中便愈已死者亦起蟲有毒應不可吞云以白梅皮裹含之烏爛死蠶有小毒蝕瘡有根者亦主外野雞病並敷瘡上在簇上烏臭者白死蠶主白遊赤死蠶主赤遊並塗之遊一名疹也繭滷汁主百蟲入肉䘌蝕瘙疥及牛馬蟲瘡山蜍山蛭入肉蚊子諸蟲咬毒鹽繭甕下收之以竹筒盛滷浸瘡山行亦可預帶一筒取一蛭置中兼持一片干海苔則闢諸蛭蘇恭注本經蛭條雲山人自有療法豈非此乎亦可為湯浴小兒去瘡疥此汁是繭中蛹汁故能殺蟲非為滷咸也壁錢無毒主鼻衄及金瘡下血不止捺取蟲汁點瘡上及鼻中亦療外野雞病下血其蟲上錢幕主小兒嘔吐逆取二七煮汁飲之蟲似蜘蛛作白幕如錢在暗壁間此土人呼為壁繭針線袋主婦人産後腸中癢不可忍以袋安所臥褥下勿令知之故錦燒作灰主小兒口中熱瘡研灰為末敷口瘡上煮汁服療蠱毒嶺南有食錦蟲屈如指環食故緋帛錦如蠶之食葉故緋帛主惡瘡疔腫毒腫諸瘡有根者作膏用帛如手大取露蜂房彎頭棘刺爛草節二七亂髮燒為末空腹服飲下方寸匕大主毒腫緋帛亦入諸膏主疔腫用為上又主兒初生臍未落時腫痛水出燒為末細研敷之又五色帛主盜汗拭訖棄五道頭赦日線主人在牢獄日經赦得出候赦日於所被囚枷上合取將為囚縫衣令犯罪經恩也苟印一名苟鬥取膏滴耳中令左右耳徹出潮州似蛇有四足大主聾也溪鬼蟲取其角帶之主溪毒射工出有溪毒處山林間大如雞子似蛣蜣頭有一角長寸餘角上有四岐色黑甲下有翅能飛六月七月取之別録云射工蟲口邊有角人得帶之闢溪毒江南有射工蟲甲蟲類也口邊有弩以氣射人水狐蟲也長四寸其色黑背上有甲其口有角向前如弩以氣射人江淮間謂之短狐射工通為溪病此既其蟲故能相壓伏也周禮壺湪氏掌除水蟲以炮土之豉歐之以禁石投之注云投使驚去也今人過諸山溪先以石投水蟲當先去不著人也赤翅蜂有小毒主蜘蛛咬及疔腫疽病瘡燒令黑和油塗之亦取蜂窠土酢和為泥敷蜘蛛咬處當得絲出嶺南如土蜂翅赤頭黑穿土為窠食蜘蛛大如螃蟹遙知蜂來皆狼狽藏隱蜂以預知其處相食如此者無遺也獨腳蜂所用同前似小蜂黑色一足連樹根不得去不能動搖五月採取出嶺南又有獨腳蟻功用同蜂亦連樹根下能動搖出嶺南蠟音蛇味鹹無毒主生氣及婦人勞損積血帶下小兒風疾丹毒湯火炸出以姜酢進之海人亦為常味一名水母一名摴蒱魚生東海如血䘓大者如床小者如斗無腹胃眼目以蝦為目蝦動䖳除駕切沈故曰水母目蝦如駏驉之與蛩蛩相假矣盤蝥蟲蝥牟二音有小毒主傳尸鬼疰如夜行蟲而小亦未可輕用也螲音窒蟷音當有毒主一切疔腫附骨疽蝕等瘡宿肉贅瘤燒為末和臘月豬脂敷之亦可諸藥為膏主疔腫出根似蜘蛛穴土為窠爾雅云跌音迭蜴音蕩郭璞云螲蟷也穴上有蓋覆穴口今呼為顛蟷蟲河北人呼為跌蟷音侄螳是處有之崔知悌方云主疔腫為上山蛩蟲有大毒主人嗜酒不已取一節燒成灰水下服之訖便不喜聞酒氣過一節則毒人主死此用療嗜酒人也亦主蠶白僵死取蟲燒作灰粉之以燒令黑敷惡瘡烏斑色長二三寸生林間如百足而大更有大者如指名馬陸能登木群吟已見本經溪狗有小毒主溪毒及遊蠱燒末服一二錢匕似蝦蟆生南方溪石間尾三四寸水黽有毒令人不渴殺雞犬長寸許四腳群游水上水涸即飛亦名水馬非海中主産難之水馬也飛生蟲無毒令人易産取角臨時執之亦得可燒末服少許蟲如齧發頭上有角蘆中蟲無毒主小兒飲乳後吐逆不入腹亦出破蘆節中取蟲二枚煮汁飲之蟲如小蠶小兒嘔逆與哯乳不同宜細詳之哯乳乳飽後哯出者是蓼螺無毒主飛尸遊蠱生食以姜醋進之彌佳生永嘉海中味辛辣如蓼故名蓼螺蛇婆味鹹平無毒主赤白毒痢蠱毒下血五野雞病惡瘡生東海一如蛇常在水上浮游炙食亦燒末服一二錢匕朱鱉帶之主刀刃不傷亦云令人有媚生南海山水中大如錢腹下赤如血云在水中著水馬腳皆令仆倒耳未知虛實擔羅味甘平無毒主熱氣消食雜昆布為羹主結氣生新羅蛤之類羅人食之青腰蟲有大毒著皮肉腫起殺癬蟲食惡瘡息肉剝人面皮除印字印骨者亦盡蟲如中蟻大赤色腰中青黑似狗猲一尾尖有短翅能飛春夏時有蝨主腦裂人大熱發頭熱者令頭縫裂開取黑蝨三五百搗碎敷之及主疔腫以十枚置瘡上以荻箔繩作炷炙蝨上即根出反腳指間有肉刺𠲿以黑蝨敷根出也酉陽雜俎云人將死蝨離身或云取病蝨於床前可以卜病之將死蝨行向病者皆死枸杞上蟲味鹹溫無毒主益陽道令人悅澤有子作繭子為蛹時取之曝乾炙令黃和乾地黃為丸服之大起陽益精其蟲如蠶食枸杞葉大紅蝦鮓味甘平小毒主飛尸蛔蟲口中甘䘌風瘙身癢頭瘡牙齒去疥癬塗山蜍蚊子入人肉初食瘡發後而愈生臨海會稽大者長一尺須可為簪虞嘯父答晉帝云時尚溫未及以貢即會稽所出也盛密器及熱飯作鮓毒人主死崔豹云遼海間有蜚蟲如蜻蛉名紺翻七月群飛暗天夷人食之云是蝦化為之又杜臺卿淮賦云蝗化為雉入水為蜃木蠹味辛平小毒主血瘀勞積月閉不調腰脊痛有損血及心腹間痰桃木中有者殺鬼去邪氣桂中者辛美可啖去冷氣一如蠐螬節長足短生腐木中穿木如錐刀至春羽化一名蠍爾雅云蠍結蒫注云木蠹也蘇恭證云蠐螬深誤也留師蜜味甘寒主牙齒䘌痛口中瘡含之蜂如小指大正黑色齧竹為窠蜜如稠糖酸甜好食方言云留師竹蜂也藍蛇頭大毒尾良當中有約從約斷之用頭合毒藥藥人至死嶺南人名為藍藥解之法以尾作脯與食之即愈藍蛇如蝮有約出蒼梧諸縣頭毒尾良兩頭蛇見之令人不吉大如指一頭無目無口二頭俱能行出會稽人云是越王弩弦昔孫叔敖埋之恐後人見之將必死也人見蛇足亦云不佳蛇以桑薪燒之則足出見無可怪也活師主火飈熱瘡及疥瘡並搗碎敷之取青胡桃子上皮和為泥染髭發一染不變胡桃條中有法即蝦蟆兒生水中有尾和鮽音余魚漸大腳生尾脫卵主明目山海經云活師蝌蚪蟲也
