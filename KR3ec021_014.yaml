body:
  text: 卷之十三草部下品之上草之草附子有大毒植生附子出神農本經主風寒咳逆邪氣溫中金瘡破症堅積聚血瘕寒濕踒烏臥切躄拘攣膝痛不能行步以上朱字神農本經腳疼冷弱腰脊風寒心腹冷痛霍亂轉筋下痢赤白堅肌骨強陰為百藥長以上黑字名醫所録苗圖經曰苗高三四尺莖方中空葉厚四四對生與蒿相似花碧子黑如椹即烏頭根旁散生圓大如芋者也其種出龍州種之之法冬至前先肥腴陸田耕五七遍以豬糞糞之然後布種逐月耘耔至次年八月後方成衍義曰烏頭烏喙天雄附子側子凡五等皆一物也止依大小長短似像而名之後世補虛寒則須用附子仍取其端平而圓大及半兩以上者其力全風家多用天雄亦取其大者以其尖角多熱性不肯就下故取傳散也用烏頭附子之大略如此餘三等各量其材而用之地圖經曰生犍為山谷及廣漢龍州綿州彰明縣種之惟赤水一鄉者最佳道地梓州蜀中時生春生苗採冬月取根收陰乾用根質類烏頭而圓大色皮黑肉白味辛甘性溫一云大熱散氣氣之厚者陽中之陽臭朽主除六腑之沉寒補三陰之厥逆行手少陽經三焦命門之劑通行諸經引用助地膽為之使反畏防風黑豆甘草黃耆人參烏韭惡蜈蚣制雷公云凡修事每十兩於柳木文武灰火中炮令皴拆者去之用刀刮去上孕子並去底尖細劈破於屋下午地上掘一坑可深一尺安於中一宿至明取出若陰制即生去尖皮底薄切用東流水並黑豆浸五日夜漉出曬乾一用紙裹數層以鹽水蘸透灰火中炮一用童便浸炮俱去皮臍銼碎用治療湯液本草云治脾濕腎寒別録云治卒忤停尸不能言口噤不開生附子為末置管中吹內舌下或吹喉中瘥療暴眼赤腫磣痛不得開又淚出不止削附子赤皮如蠶屎著眥中定為度合治去皮炮令拆以蜜塗炙令蜜入內含之勿咽其汁療喉痹效為末合醋和塗疔瘡腫甚者干即再塗以一枚重半兩者二枚亦得炮過合酒漬春冬五日夏秋三日每服二錢日再服療大風冷痰癖脹滿諸痹等病以瘥為度以大者一個合生姜一片細銼煮研如麵糊米飲下療嘔逆翻胃生末合醋及面調敷男左女右腳心日再換療大人久患口瘡以一枚去皮臍分作八片入鹽一錢水一升煎半升溫服治熱病吐下水及下利身冷脈微發躁不止黑附子一個去皮臍生搗為末用生薑汁調如膏敷腳氣連腿腫滿久不瘥者干則再塗以消為度一枚重七錢者炮去皮臍為末每服四錢水兩盞合鹽半錢煎取一盞溫服療霍亂大瀉不止附子一枚酢漬三宿令潤微削一頭內耳中上灸十四壯令氣通耳內療耳聾風牙關急不得開者瘥一枚燒存性為末作一服合蜜水調下治傷寒陰盛隔陽其人必躁熱而不欲飲水者服此逼散寒氣然後熱氣上行汗出乃愈附子炮石膏煅各等分為末入腦麝少許茶酒任下半錢治頭痛生附子一個去皮臍合緑豆一合同入銚內煮豆熟為度去附子只服緑豆療頭風每個附子可煮五服後為末服之用一個可半兩者立劈作四片生薑一大塊亦立劈作三片如中指長合糯米一撮以水一升煎取六合去滓服治陰毒傷寒煩躁迷悶不醒人事急者如人體溫頓服厚衣覆或汗出或不出候心神定即服別藥禁妊娠不可服烏頭有大毒植生烏頭出神農本經主中風惡風洗洗出汗除寒濕痹咳逆上氣破積聚寒熱其汁煎之名射罔殺禽獸以上朱字神農本經烏頭消胸上痰冷食不下心腹冷疾臍間痛肩胛痛不可俯仰目中痛不可久視又墮胎射罔味苦有大毒療尸疰症堅及頭中風痹痛烏喙音諱味辛微溫有大毒主風濕丈夫腎濕陰囊癢寒熱歷節掣引腰痛不能行步癰腫膿結又墮胎以上黑字名醫所録名芨堇草千秋毒公莨果負耿子奚毒苗圖經曰苗高三四尺莖作四稜葉如艾花紫碧色作穗實小紫黑色如桑椹蓋烏頭附子烏喙天雄側子五物同種而異名似烏鳥頭者為烏頭又云原種者為烏頭兩歧狀如牛角者為烏喙細長至三四寸者為天雄散生如芋者為附子旁連生小者為側子也日華子云生去皮搗濾汁澄清旋添曬乾取膏獵人蘸箭鏑以射禽獸謂之射罔中人亦死宜速解之地圖經曰出朗陵山谷及龍州綿州彰明縣皆有之道地出蜀土及赤水邵州成州晉州梓州江寧府者佳時生春生苗採三月取根收曬乾用根質類附子而尖小色皮黑肉白味辛甘性溫又云大熱氣氣之厚者陽中之陽臭朽主除寒濕散冷疾行諸經助莽草遠志為之使反半夏栝蔞貝母白蘞白芨惡藜蘆制凡用炮裂去皮臍切片治療藥性論云除惡風憎寒濕痹逆氣冷痰包心腸腹㽲痛痃癖氣塊齒痛烏喙治男子腎氣衰弱陰汗及風溫濕邪痛並寒熱陳藏器云射罔主瘻瘡瘡根結核瘰癧毒腫及蛇咬先取藥塗四畔漸漸近瘡習習逐病至骨瘡有熟膿及黃水出塗之若無膿水有生血及新傷肉破即不可塗立殺人亦如殺走獸敷箭鏃射之十步即倒別録云久患疥癬以七枚生搗碎用水三大盞煎一大盞去滓溫洗之耳鳴如流水聲並風聲久不愈漸聾者用新掘得烏頭承濕削如棗核大塞耳內晝夜更易不過三日愈射罔敷沙風毒補藥性論云益陽事強志合治生者去皮臍搗末合釅醋調塗於故帛上貼患風腰腳冷痹疼痛須臾痛止臘月取一升炒令黃作末絹袋盛合酒三升浸溫服療頭風頭痛以一斤用五升許大瓷鉢盛合童子小便浸逐日添注任令溢出浸二七日其烏頭通軟揀去爛壞者不用余以竹刀切破每個作四片用新汲水淘七遍後浸之每日一易水至七日通前浸二十一日取出焙乾其藥潔白為末酒煮麵糊丸如緑豆大每服十丸空心鹽湯或酒下以些少粥飯壓之服此去一切冷氣及風痰止遍身疼痛益元氣強力固精益髓令人少病如冷氣稍盛加數服之用一個好者炭火燒煙欲盡取出地上盞子合定良久細研合蠟丸如麻子大每服三丸赤痢黃連甘草黑豆煎湯白痢甘草黑豆煎湯俱候冷吞下如瀉及肚疼水吞下每於空心服之忌熱物以一斤合清油四兩鹽四兩鐺內熬令裂如桑椹色為度去皮臍入五靈脂四兩同為末搗令勻用蒸餅和丸如梧子大空心以溫酒或鹽湯下二十丸治婦人血風虛冷月候不勻或腳手心煩熱頭面浮腫頑麻及丈夫風疾去皮臍者五兩合五靈脂五兩為末入龍腦麝香各少許研令細滴水丸如彈子大每服一丸先以生薑汁研化次以溫酒調服之日再空心及晚食前療癱瘓風手足嚲曳口眼喎斜語言謇澀履步不正治一人只須三十丸服五六丸後便覺抬得手移得步十丸可以自梳頭為末少許合頭醋調敷蠍螫止痛取尖合黃柏等分為末療陷甲割甲成瘡久不瘥者洗淨貼之用三兩以一兩生一兩炒一兩燒存性共研為末合醋麵糊為丸如緑豆大每服五丸空心服如瀉用井花水下赤痢甘草湯下白痢乾薑湯下赤白痢生薑甘草湯下燒作灰合菖蒲等分為末綿裹塞耳中治耳鳴無晝夜禁妊娠不可服忌豉汁解人中射罔毒者以甘草藍青小豆葉浮萍冷水薺苨解之天雄有大毒植生天雄出神農本經主大風寒濕痹歷節痛拘攣緩急破積聚邪氣金瘡強筋骨輕身健行以上朱字神農本經療頭面風去來疼痛心腹結積關節重不能行步除骨間痛長陰氣強志令人武勇力作不倦以上黑字名醫所録名白幕苗圖經曰此是烏頭下與附子同生皆非正出其莖有稜而方高及二三尺葉如艾花作穗紫赤色有實如椹別說云始種烏頭而不生諸附子側子之類經年獨生三寸以上者謂之天雄蜀人種烏頭而生此物意為不利如養蠶而為白殭蠶也地圖經曰生少室山谷及蜀道綿州龍州時生春生苗採二月八月中旬取收陰乾用根質類附子而細長色皮黑肉白味辛甘性大溫散氣氣之厚者陽中之陽臭朽主助陽道暖水臟行諸經助遠志為之使反惡腐婢制凡用炮令裂去皮臍用治療藥性論云去風疾冷痹軟腳毒風能止氣喘促急日華子云除諸風一切氣通九竅利皮膚調血脈四肢不遂破痃癖癥結排膿止痛續骨消瘀血療霍亂轉筋背脊僂佝消風痰下胸膈水發汗止陰汗炮含治喉痹補日華子云暖腰膝益精明目補冷氣虛損禁妊娠不可服忌豉汁解殺禽獸毒側子有大毒植生側子主癰腫風痹歷節腰腳疼冷寒熱鼠瘻名醫所録名莨虎掌苗蜀本圖經曰苗高二尺許葉似石龍芮及艾花紫赤色其實紫黑如椹唐本注云此雖與烏頭同根乃附子之旁出者也蘇恭云附子旁生絶小如棗核者或云附子芽角削下者今據附子旁果有角如大棗核及有大如檳榔以來形狀不繫削落而自是一顆則是附子旁出為側子明矣地圖經曰生犍為山谷及廣漢道地蜀地龍州綿州者佳時生春生苗採八月取根收陰乾用根質類芋而小色皮墨肉白味辛性大熱散氣氣之厚者陽中之陽臭腥主冷風濕痹行諸經助地膽為之使反畏防風黑豆甘草黃耆人參烏韭惡蜈蚣制凡用炮裂去皮臍切片用治療陶隱居云除腳氣藥性論云治大風筋骨攣急合治作末合冷酒調服療遍身風疹禁妊娠不可服忌豉汁半夏有毒植生半夏出神農本經主傷寒寒熱心下堅下氣喉咽腫痛頭眩胸脹咳逆腸鳴止汗以上朱字神農本經消心腹胸膈痰熱滿結咳嗽上氣心下急痛堅痞時氣嘔逆消癰腫墮胎療萎黃悅澤面目生令人吐熟令人下以上黑字名醫所録名守田地文水玉示姑苗圖經曰春生苗一莖高尺許莖端三葉淺緑色頗似竹葉而光江南者似芍藥葉根下相重生上大下小皮黃肉白五月採者虛小八月採者實大然以圓白陳久者為佳其平澤生者甚小名羊眼半夏一種由跋生林下苗高一二尺許其根絶類半夏足能亂真地圖經曰生槐里川穀今在處有之陶隱居云出青州吳中亦有道地齊州者為佳時生二月苗採八月取根收曝乾用根質類南星而圓小色白味辛性平生微寒熟溫氣氣之薄者陽中之陰臭朽主開胃健脾消痰止嘔行足陽明經太陰經少陽經助射干柴胡為之使反烏頭畏雄黃生薑乾薑秦皮龜甲惡皂莢制初採得當以灰裛二日卻用湯泡洗十遍漉出洗去滑令盡生薑汁製之不爾戟人咽喉令人氣通治療藥性論云消痰涎去胸中痰滿下肺氣除咳新生者塗癰腫不消能除瘤癭氣虛而有痰者加用之日華子云治吐食反胃霍亂轉筋腸腹冷及痰瘧別録云蠍瘻有五孔皆相通者作末水調敷之瘥治五絶一曰自縊二曰牆壁壓三曰溺水四曰魘寐五曰産暈凡五絶皆以半夏一兩搗為末冷水和丸如大豆許內鼻中即愈及諸卒死如心溫者以大豆許末吹鼻可瘥合治以三升合人參三兩白蜜一斤用水一斗二升和揚之一百四十遍煮取三升半溫服一升日再服治反胃嘔吐及膈間支飲以一升合生姜半斤茯苓三兩切碎用水七升煎取一升半溫分服療嘔噦谷不得下及眩悸者以半兩湯浸洗七次去滑合生姜一兩同銼用水一大盞煎至六分去滓分二服治時氣嘔逆不下食以四兩淨洗焙乾搗羅為末合生姜自然汁和為餅子以濕紙裹於慢火中煨令香熟用水兩盞煎彈丸大餅子一塊入鹽半錢同煎取一盞溫服治胸膈壅滯去痰開胃及治酒食所傷其功極驗以末三錢合白麵一兩和水溲作棋子塊用水煮以面熟為度加生薑醋調和服之治久積不下食嘔吐不止冷在胃中者愈洗干作末合生薑湯服一錢匕治傷寒病踠不止以少許洗搗末合酒和丸如粟米大每服二丸生薑湯吞下治小兒腹脹如未瘥加數丸服或以火炮為末貼臍亦佳不計多少酸漿浸一宿後用溫湯洗五七遍去惡氣曬乾搗為末漿水搜作餅子仍曬乾再為末每五兩合腦子一錢研勻以濃漿腳和丸如雞頭子大以紗袋盛掛通風處陰乾每服一丸茶湯或薄荷湯下治膈壅風痰禁妊娠不可服渴病人不可服解誤食此中毒者以生薑汁解之忌羊血羊肉海藻飴糖贋白傍芁子為僞虎掌有大毒植生虎掌出神農本經主心痛寒熱結氣積聚伏梁傷筋痿拘緩利水道以上朱字神農本經除陰下濕風眩以上黑字名醫所録苗圖經曰初生根如豆大漸長大似半夏而匾纍年者其根圓及寸大者如雞卵周匝生圓芽二三枚或五六枚三四月生苗高尺余獨莖上有葉如爪葉五六出分布尖而圓一窠生七八莖時出一莖作穗直上如鼠尾中生一葉如匙裹莖作房傍開一口上下尖中有花微青褐色結實如麻子大熟即白色自落布地一子生一窠其苗九月凋殘江州有一種草葉大如掌面青背紫四畔有芽如虎掌生三四葉為一本冬月常青不結花實與此名同故附見之唐本注云此藥是由跋宿者其苗一莖莖頭一葉枝丫音鴉脥古協切莖根大者如拳小者如雞卵都似匾柿四畔有圓芽如虎掌故有此名其跋是新根猶大於半夏二三倍但四畔無子牙爾地圖經曰生漢中山谷及冤句今河北州郡亦有道地冀州江州時生三月四月生苗採二月八月九月取根收陰乾用根質類半夏而匾大色白味苦性溫微寒泄氣氣薄味厚陰中之陽臭朽主疝瘕腸痛助蜀漆為之使反惡莽草制以湯清三七日湯冷乃易日換三四遍洗去涎曝乾用之治療藥性論云治風眩目轉及傷寒時疾強陰由跋有毒植生由跋主毒腫結熱名醫所録苗圖經曰春抽一莖苗高一二尺似苣蒻莖端直八九葉根如雞卵大圓匾而肉白多生林下所謂由跋也地陶隱居云出始興時生春生苗採五月八月取根收曝乾用根質類半夏而大色白味辛性平散氣氣之薄者陽中之陰臭朽合治合苦酒摩塗腫效禁不入湯藥鳶尾有毒叢生鳶尾出神農本經主蠱毒邪氣鬼疰諸毒破癥瘕積聚去水下三蠱以上朱字神農本經療頭眩殺鬼魅以上黑字名醫所録名烏園根鳶頭鳶根苗圖經曰葉似射干而闊短不抽長莖花紫碧色布地生黑根似高良薑而節大數個相連皮黃肉白鳶頭即其根也地圖經曰生九疑山谷及人家亦種所在有之時生春生苗採五月九月十月取收曬乾用莖葉質類射干葉而匾闊色青緑味苦性平泄氣氣之薄者陽中之陰臭香主蠱毒邪氣制銼碎用治療陳藏器云飛尸遊蠱著喉中氣欲絶者以根削去皮內喉中摩病處令血出乃瘥大黃無毒植生大黃出神農本經主下瘀血血閉寒熱破癥瘕積聚留飲宿食蕩滌腸胃推陳致新通利水穀調中化食安和五臟以上朱字神農本經平胃下氣除痰實腸間結熱心腹脹滿女子寒血閉脹小腹痛諸老血留結以上黑字名醫所録名將軍黃良苗圖經曰春生青葉似萆麻其形如扇根如芋大者如碗長一二尺傍生細根如牛蒡小者亦如芋四月開黃花亦有青紅似蕎麥花者莖青紫色形如竹江淮出者名土大黃二月開花結細實鼎州出者名羊蹄大黃初生苗葉似羊蹄纍年長大葉似商陸而狹尖四月內於押條上出穗五七莖相合花葉同色結實如蕎麥而輕小五月熟即黃色亦呼為金蕎麥破之亦有錦紋干之亦呼為土大黃也地圖經曰生河西山谷及隴西江淮鼎州河東州郡亦有之陶隱居云益州北部汶山西山唐本注云宕州西羌道地蜀州陝西涼州時生正月生苗採九月取根收曬乾用根錦紋者為佳質類商陸色黃味苦性大寒泄氣味厚氣薄陰也臭香主蕩滌濕熱推陳致新行手足陽明經酒浸入足太陽經酒洗入手陽明經助黃芩為之使反惡乾漆制銼碎或酒浸洗用治療藥性論云消食安五臟通女子經候利水腫破留飲並痰實冷熱結聚利大小腸貼熱腫毒及蝕膿兼小兒寒熱時疾日華子云宣通一切氣調血脈利關節泄壅滯水氣四肢冷熱不調溫瘴熱疾並敷一切瘡癤癰毒湯液本草云瀉諸實熱不通蕩滌腸胃間熱別録云治發豌豆瘡以半兩微炒用水一大盞煎至七分去滓分為二服小兒腦熱常閉目以一分粗銼用水三合浸一宿一歲兒每日與半合服余者塗頂上干即再塗愈合治合乾薑巴豆各等分搗末蜜和更杵一千下丸如小豆大每服三丸以暖水或酒服未瘥更加數九老小斟量與之療心腹諸疾卒暴百病中惡客忤心腹脹滿如刀錐刺卒痛氣急口噤停尸卒死者若不下扶頭起灌令下喉須臾腹當雷鳴轉即吐下便愈若口已噤亦須折齒灌之即瘥錦紋新實者丸兩去蒼皮搗末合米醋三升和置銅器內於大鐺中浮湯上緩火蒸煮常以竹篦攪藥候堪丸易瓷器另貯丸如梧子大療小兒無辜閃癖瘰癧或頭干黃聳或乍痢乍瘥諸狀多者服此藥後當下青赤膿為度若不下膿或膿少者稍稍加丸服之若下膿多又須減少丸數量兒大小斟酌用之此藥惟下膿宿結不令兒利須禁食毒物食乳者乳母毒物亦宜忌之用五兩銼炒微赤搗末合臘月雪水五升煎如膏每服半匙冷水調下不計時候療熱病狂語及諸發黃者愈錦紋者一兩杵末合醋半斤同熬成膏丸如梧桐子大每以溫醋七分盞化五丸服之治産後惡血衝心或胎衣不下腹中血塊良久即下赤治墜馬內損者以三兩搗末合酒二升煮十沸頓服治婦人血癖痛以四兩合牽牛子四兩二味半生半熟搗末煉蜜為丸如梧子大每服十丸茶湯下解風熱積熱風壅消食化氣導血大解壅滯欲微動服十五丸冬月最宜解以半兩合生姜半兩同切如小豆大鐺內炒黃色投水兩碗至五更初頓服天明即下腰間惡血如雞肝樣療腰痛即止以末一錢合生地黃汁一合水半盞煎三五沸無時服療吐血即止以四分合童子小便五六合煎取四合去滓空腹分為兩服如人行四五里再服治骨節熱積漸黃瘦切二兩水三升半漬一宿平旦煎絞汁一升半合芒硝二兩緩服須臾當快利療急黃病葶藶無毒植生葶藶出神農本經主癥瘕積聚結氣飲食寒熱破堅逐邪通利水道以上朱字神農本經下膀胱水伏留熱氣皮間邪水上出面目浮腫身暴中風熱痱音沸癢利小腹久服令人虛以上黑字名醫所録名丁藶蕇音典蒿大室大適狗薺靡草薺苗圖經曰初春生苗葉高六七寸有似薺根白枝莖俱青三月開花微黃莖端結角子匾小如黍粒微長黃色又有一種苟芥草葉近根下作奇生角細長取時必須分別也衍義曰葶藶用子子之味有甜苦兩等其形則一也經既言味辛苦即甜者不復更入藥也大概治體皆以行水走泄為用故曰久服令人虛蓋取苦泄之義其理甚明地圖經曰生藁城平澤及陝西河北州郡皆有之道地曹州彭城時生初春生苗採立夏後取收陰乾用子苦者質類車前子色赤黃味辛苦性大寒泄氣味厚於氣陰也臭朽主消水腫定喘促助榆皮為之使反惡殭蠶石龍芮制雷公云用糯米相合微焙待米熟去米單搗用治療陶隱居云除肺壅上氣咳嗽定喘促及胸中痰飲藥性論云利小便泄肺氣止喘息急別録云治一切毒入腹不可療及馬汗毒以一兩炒研用水一升浸湯服取下惡血愈又治小兒白禿以一兩搗末湯洗瘡訖塗上愈又治小兒蛔蟲以一分生為末用水三合煎取一合一日服盡蟲即下合治以三升微火熬搗為末合清酒五升漬之冬七日夏三日服如桃許大日三服夜一服冬日二服夜二服取微利為度如患急困不得待日滿亦可以綿細絞即服療上氣咳嗽不得臥遍體氣腫面腫足腫並治之以四兩炒搗末丸如彈丸大每服用大棗二十枚水三升煎二升然後內丸煎取一升頓服之治肺癰喘急不得臥及支飲久不瘥者曹州者一兩襯紙熬令黑合知母一兩貝母一兩同搗末以棗肉半兩別銷沙糖一兩半同和為丸如彈子大每用以綿裹一丸含之徐徐咽津療嗽含之不過三丸以三兩杵六千下令如泥合漢防己末四兩取緑頭鴨就藥臼中截頭瀝血於臼中血盡和頭更搗五千下丸如梧子大患甚者空腹白湯下十丸療水腫及暴腫以半兩微炒搗如泥合棗肉搗為丸如緑豆大每服五丸空心晚後棗湯下治小兒水氣腹腫兼下利膿血小便澀量兒大小加減服之禁久服令人虛贋赤鬢子苟芥草為僞桔梗有小毒植生桔梗出神農本經主胸膈痛如刀刺腹滿腸鳴幽幽驚恐悸氣以上朱字神農本經利五臟腸胃補血氣除寒熱風痹溫中消穀療咽喉痛下蠱毒以上黑字名醫所録名利如房圖白藥梗草葉隱忍苗圖經曰春生苗莖高尺余葉似杏葉而長隋四葉相對而生嫩時亦可煮食之夏開花紫碧色頗似牽牛花秋後結子其根有心如小指大黃白色無心者乃薺苨也而薺苨亦能解毒二物頗相亂但薺苨葉下光澤無毛為異關中桔梗根黃頗似蜀葵根莖細葉小俱青色葉似菊花葉耳唐本注云薺苨桔梗又有葉差互者亦有葉三四對者皆一莖直上葉既相亂惟以根有心無心為別爾地圖經曰生嵩高山谷及冤句在處有之道地解州成州和州時生春生苗採二月八月取根收曝乾用根堅直白者為好質類人參色白味辛苦性微溫散氣味厚氣輕陽中之陰臭香主利肺氣止喉痹行手太陰經足少陰經助節皮為之使反畏白芨龍眼龍膽制去蘆頭銼碎用治療藥性論云止下痢破血去積氣消積聚痰涎主肺氣氣促嗽逆除腹中冷痛主中惡及小兒驚癇日華子云下一切氣止霍亂轉筋心腹脹痛養氣除邪辟溫補虛痰破癥瘕養血排膿補內漏湯液本草云治鼻塞寒嘔別録云鼻衄及吐血為末水服方寸匕立止又打擊瘀血在內久不消時發動者搗末熟水下刀圭瘥及卒蠱毒下血如鵝肝晝夜痛不絶臟腑敗壞者搗汁服七合瘥補日華子云補五勞養氣血合治合甘草各二兩以水三升煮一升分再服療胸中滿而振寒脈數咽燥不渴時時出渴唾腥臭日久吐膿如粳米粥是肺癰也服後朝暮吐膿血則瘥又治上焦有熱口舌咽中生瘡者以一兩細銼合生姜三片水一盞煎至一分去滓溫服療妊娠中惡心腹疼痛以二兩燒末合米飲調服仍服麝香如大豆許治卒客忤停尸不能言者忌豬肉解瘮毒以白粥解之贋薺苨為僞莨菪有毒植生莨音浪菪音蕩子出神農本經主齒痛出蟲肉痹拘急使人健行見鬼多食令人狂走久服輕身走及奔馬強志益力通神以上朱字神農本經療癲狂風癇顛倒拘攣以上黑字名醫所録名橫唐行唐天仙子狼蓎苗圖經曰苗莖高二三尺葉似地黃王不留行紅藍等葉三指闊四月開花紫色苗莢莖有白毛五月結實有殼作罌子狀如小石榴房中子至細如米粒地圖經曰出海濱川穀及雍州處處有之道地秦州時生春生苗採六月七月取子收曬乾用子質類米粒而微匾色青白味苦甘性寒泄氣氣薄味厚陰中之陽臭朽主風癇癲狂制雷公云用十兩以頭醋一鎰煮盡醋為度卻用黃牛乳汁浸一宿至明看牛乳黑即是莨菪子毒出曬乾別搗重篩用治療藥性論云熟炒止冷痢主齒痛蚛牙咬之孔內蟲即出又焦炒碾細末服治脫肛日華子云燒熏蚛牙及洗陰汗陳藏器云主痃癖安心定志聰明耳目除邪逐風變白合治以三升作末合酒一升漬數日取出搗細以內汁和絞去滓湯上煎令可丸如小豆大每服三丸日三次治癲狂服後當覺口面急頭中似有蟲行額及手足有赤色處如此並是瘥候未知再服以一升曝乾搗末和生薑汁半斤入銀鍋中更以無灰酒二升投之微火煎令如稠餳即旋投酒度及五升即止煎令可丸乃丸大如梧子每旦酒飲通下三丸增至五七丸則止治腸風若丸時黏手則用菟絲子粉襯之煎熬切戒火緊則藥焦而失力矣初服微熱勿怪疾甚者服過三日當下利疾去利亦止絶有效禁生食之能瀉人贋蒼冥子為僞解誤服本藥以甘草升麻犀角解之草蒿無毒植生草蒿主疥瘙痂癢惡瘡殺蝨留熱在骨節間明目神農本經名青蒿方潰𤜢蒿菣蒿菣苗圖經曰春生苗葉極細嫩時人亦取雜諸香菜食之至夏葉似茵陳蒿而背不白莖高四五尺秋後開細淡黃花花下便結子如粟米大詩小雅云食野之蒿陸機云青蒿是也地圖經曰出華陰川澤今處處有之道地汝陰荊豫楚州時生春生苗採八月九月取收曝乾用根莖子葉質類野艾而葉背不白色青白味苦性寒泄氣味厚於氣陰也臭香主骨蒸邪熱制雷公云凡採葉不計多少用七歲兒童小便浸七日七夜後漉出曬乾用治療圖經曰療金刃所傷生搗敷上以綿裹之血止即愈唐本注云生挼敷金瘡生肉止疼痛日華子云去蒜髮心痛熱黃生搗汁服並敷之子炒用開胃童便浸治勞壯健人及煎湯洗惡瘡疥癬風疹臭蒿子下氣開胃止盜汗及邪氣鬼毒別録云蜂螫人嚼敷瘡上瘥補日華子云補中益氣輕身補勞駐顏色長毛髮令發黑不老合治曝乾為末合小便服如覺冷合酒煮服療鬼氣尸疰伏連婦人血氣腹內滿及冷熱久痢秋冬用子春夏用苗或單搗絞汁服亦可燒灰用紙八九重淋取汁合石灰點息肉惡瘡去瘢靨作末合飯飲調服五錢匕療瀉痢八九月採帶子者五升細銼合澄過童子小便五斗共內大釜中以猛火煎取三斗去滓淨洗釜令乾再瀉汁安釜中以微火煎可二斗取豬膽十枚相和煎一斗半除火待冷以瓷器盛每欲服時取甘草二三兩炙搗末以蒿煎和搗一千杵為丸如梧子大空腹粥飲下二十丸漸增至三十丸療骨蒸鬼氣及丈夫婦人勞瘦禁雷公云使子勿使葉使葉勿使莖四者若同用反成痼疾旋覆花有小毒植生旋覆花出神農本經主結氣脅下滿驚悸除水去五臟間寒熱補中下氣以上朱字神農本經消胸上痰結唾如膠漆心脅痰水膀胱留飲風氣濕痹皮間死肉目中眵音嗤䁾音蔑利大腸通血脈益色澤根主風濕以上黑字名醫所録名戴椹金沸草盛椹盜庚苗圖經曰二月後生苗多近水傍大似紅藍而無刺長一二尺葉如水蘇六月開花如菊花小銅錢大深黃色上黨田野人呼為金錢花今近人家園圃所蒔金錢花花葉並如上說極易繁盛即此旋覆也地圖經曰生平澤川穀今所在有之道地隨州河南時生二月生苗採七月八月取花收曝乾用花質類野菊花色黃味鹹甘性溫軟緩氣氣厚味薄陽中之陰臭香主消結痰逐水腫制雷公云凡採得後去裹花蕊殼皮並蒂子花蕊蒸從巳至午曬乾用治療藥性論云療肋脅氣下寒熱水腫逐大腹開胃止嘔逆不下食日華子云明目治頭風通血脈葉止金瘡血衍義曰行痰水去頭風別録云根搗汁瀝治破斫筋斷瘡仍用滓封瘡上十五日其斷筋便續效合治洗塵去淨搗末合蜜為丸如梧子大夜臥時以茶清下五丸至七丸十丸療中風及壅滯藜蘆有毒植生藜蘆出神農本經主蠱毒咳逆泄痢腸澼頭瘍疥瘙惡瘡殺諸蟲毒去死肌以上朱字神農本經療噦逆喉痹不通鼻中息肉馬刀爛瘡不入湯以上黑字名醫所録名蔥苒蔥菼音毯山蔥蔥葵豐蘆蕙葵鹿蔥苗圖經曰春生苗葉青似初出棕心亦似車前莖似蔥白青紫色高五六寸上有黑皮裹莖似棕皮有花肉紅色根似馬腸根長四五寸許黃白色此有二種一種水藜蘆莖葉大同但生在近水溪澗石上根鬚百餘莖不中入藥今用者名蔥白藜蘆其根鬚二三十莖生高山者為佳均州土俗亦呼為鹿蔥今萱草亦謂之鹿蔥其類全別用者宜審之地圖經曰生泰山山谷及均州河東陝西山南東西州郡皆有之道地解州時生三月生苗採八月取收陰乾用根質類百部色黃白味辛苦性寒散氣氣薄味厚陰中之陽臭腥主殺蟲疥癬助黃連為之使反細辛芍藥人參玄參丹參沙參苦參惡大黃制雷公云凡採得去頭用糯米泔汁煮從巳至未出曬乾用之治療圖經曰大吐上膈風涎暗風癇病藥性論云主上氣去積年膿血及治惡風瘡頭禿衍義曰作末細調治馬疥癬別録云治黑痣生於身面上燒灰五兩水一大碗淋灰汁於銅器中盛以重湯煮令如膏以針微刺破痣處點之不過三遍驗又作末內牙孔中治牙疼效勿咽其汁又以半兩煮灰汁中炮過小變色搗為末水服半錢匕取小吐療黃疸不過數服瘥又治中風不省人事牙關緊急者以一兩去蘆頭濃煎防風湯浴過焙乾碎切炒微褐色搗為末每服半錢溫水調下以吐出風涎為效如人行三里未吐再服合治以一分用天南星一個去浮皮於臍上陷一坑子內陳醋二橡斗許四面用火逼令黃色合一處搗研極細用麵糊丸如赤豆大每服三丸溫酒下治中風不語喉中如拽鋸聲口吐涎沫者瘥禁多服令人惡吐不已鉤吻有大毒蔓生鉤吻出神農本經主金瘡乳痓中惡風咳逆上氣水腫殺鬼疰蠱毒以上朱字神農本經破症積除腳膝痹痛四肢拘攣惡瘡疥蟲殺鳥獸以上黑字名醫所録名根野葛固活苗蜀本云葉似黃精而紫當心抽花黃色頭尖處有兩毛若鉤唐本注云其苗蔓生葉似柿葉皮白骨黃宿根似地骨嫩根如漢防己根節斷者良上說似黃精且黃精直生如龍膽澤漆兩葉或四葉相對鉤吻蔓生葉如柿葉以此觀之非黃精之類也經云折之青煙出者名固活甚熱不入湯用地圖經曰生傅高山谷及會稽東野桂州南越山益州皆有之時生春生苗採二月八月取根收曝乾用根質宿根類地骨嫩根類漢防己色褐味辛性溫散氣氣之厚者陽也臭腥主塗惡毒瘡助半夏為之使反惡黃苓禁不可食入口則死解誤中其毒以羊血桂心蔥葉涎解之射干有毒植生射音夜干出神農本經主咳逆上氣喉痹咽痛不得消息散結氣腹中邪逆食飲大熱以上朱字神農本經療老血在心脾間咳唾言語氣臭散胸中熱氣久服令人虛以上黑字名醫所録名烏扇烏蒲烏翣烏吹草姜鳳翼苗圖經曰春生苗高二三尺葉似蠻姜而狹長橫張疏如翅羽狀故名烏翣謂其葉中抽莖似萱草而彊硬六月花開紅黃色瓣上有細紋秋結實作房中子黑色根多須皮黃黑肉黃赤地圖經曰生南陽川穀田野今所在有之道地滁州時生春生苗採三月三日取根收陰乾用根質類高良薑色黃赤味苦性平微溫泄氣氣之薄者陽中之陰臭朽主喉痹腫毒制雷公云凡使先以米泔水浸一宿漉出然後用䈽竹葉煮從午至亥漉出曬乾用之治療藥性論云通女子月閉治疰氣消瘀血日華子云消痰破癥結胸膈滿腹脹氣喘痃癖開胃下食消腫毒鎮肝明目別録云小兒疝發時腫痛如刺以生者搗汁取下亦可作丸服之禁久服令人虛蛇含無毒植生蛇含出神農本經主驚癇寒熱邪氣除熱金瘡疽痔鼠瘻惡瘡頭瘍以上朱字神農本經療心腹邪氣腹痛濕痹養胎利小兒以上黑字名醫所録名蛇銜威蛇雀瓢苗圖經曰生土石上或下濕地蜀中人家亦種之一莖五葉或七葉此有兩種當用細葉黃色花者為佳地圖經曰生益州山谷今近處亦有之道地興州時生春生苗採五月取葉八月取根收陰乾用根葉質類竟命草而葉小色青味苦性微寒泄氣味厚於氣陰也臭腥主諸瘡瘍制去根莖只取葉細切曬乾不犯火一用根治療圖經曰葉搗極爛敷赤疹丹毒瘡腫別録云金瘡及蜈蚣螫人搗敷之佳根治産後瀉痢濃煎服之解誤服竟命草吐血不止服知時子解之贋竟命草為僞草之木常山有毒植生常山出神農本經主傷寒寒熱熱發溫瘧鬼毒胸中痰結吐逆以上朱字神農本經療鬼蠱往來水脹灑灑惡寒鼠瘻以上黑字名醫所録名互草苗圖經曰常山即蜀漆根也葉似茗而狹長兩葉相當莖圓有節三月生白花青萼五月結實而圓三子為房苗高者不過三四尺根似荊黃色而海州出者葉似楸葉八月開紅白花子碧色似山楝子而小今天台山出一種草名土常山苗葉極甘人用為飲由其味香甘如蜜又名蜜香草性亦溫飲之益人非此常山也地圖經曰生益州山谷及漢中金州房州梁州皆有之道地宜都建平時生春生苗採八月取根收曬乾用根細實如雞骨者佳質類荊根而微黃色黃味苦辛性微寒泄氣氣薄味厚陰中之陽臭腥主截諸瘧吐痰涎反畏玉扎制雷公云酒浸一宿漉出曬乾用合治合小麥竹葉煮服療小兒瘧灑灑寒熱項下瘤癭以三兩合漿水三升浸一宿煎取一升治瘧疾於欲發前頓服取微吐瘥以三兩搗末合雞子白和丸如梧子大空心服三十丸治瘧病效禁多服令人大吐又老人久病不宜服忌蔥菘菜即今白菜也蜀漆有毒植生蜀漆出神農本經主瘧及咳逆寒熱腹中症堅痞結積聚邪氣蠱毒鬼疰以上朱字神農本經療胸中邪結氣吐出之以上黑字名醫所録名雞尿草鴨尿草苗圖經曰春生苗高三四尺葉似茗而狹長兩兩相當莖圓有節三月生紅花青萼五月結實而圓三子為房而海州出者葉似楸葉八月開紅白花子碧色似山楝子而小此種即常山苗也地圖經曰生江林山川穀及蜀漢中益州山谷淮浙湖南州郡亦有之道地明州海州時生春生苗採五月取收曝乾用苗葉質類荊莖而有節色黃味辛性平微溫散氣氣之厚者陽也臭腥主久瘧積聚助栝蔞桔梗為之使反畏橐吾惡貫衆制雷公云取莖並葉五兩以甘草四兩細銼拌水令濕同蒸臨時去甘草取蜀漆又拌甘草水勻再蒸了任用治療藥性論云主鬼瘧溫瘧又寒熱瘧下肥氣積聚日華子云治癥瘕合治合雲母龍骨等分杵末以漿水調半錢療瘧疾於未發前服效如溫瘧再加蜀漆半分臨發時服一錢匕瘥忌木筍禁不可多服令人吐逆草之草甘遂有毒附草甘遂植生甘遂出神農本經主大腹疝瘕腹滿面目浮腫留飲宿食破症堅積聚利水穀道以上朱字神農本經下五水散膀胱留熱皮中痞熱氣腫滿以上黑字名醫所録名甘藁陵藁陵澤重澤主田苗圖經曰苗似澤漆莖短小而葉有汁根皮赤肉色白作連珠又似和皮甘草以實重者為勝又有一種草甘遂苗一莖六七葉如萆麻鬼白葉用之殊惡唐本注云真甘遂皮赤肉白草甘遂皮白皮白者乃蚤休俗名重臺也地圖經曰生中山川穀及陝西江東汴滄亦有之道地江寧府京西時生春生苗採二月取根收陰乾用根質類和皮甘草色皮赤肉白味苦甘性大寒泄氣味厚於氣陰也臭朽主逐水腫破症堅助瓜蒂為之使反甘草惡遠志制雷公云凡採去莖於槐砧上細銼用生甘草湯小薺苨自然汁二味攪浸三日其水如墨汁更漉出用東流水淘六七次以水清為度漉出於土器中熬令脆用之治療唐本注云草甘遂療癰疽蛇毒藥性論云甘遂瀉十二種水疾治心腹堅滿下水去痰水主皮肌浮腫別録云治腹滿大小便不利氣急者搗末二分分五服熟水下如覺心下煩得微利日一服愈合治甘遂末一分豬腎一枚分為七臠散甘遂末於中以火炙之令熟日食一次至四五日治卒腫滿身面皆浮當覺腹脅鳴小便利瘥禁氣虛人不可服解蛇毒贋蚤休為僞草之走白蘞無毒蔓生白蘞出神農本經主癰腫疽瘡散結氣止痛除熱目中赤小兒驚癇溫瘧女子陰中腫痛以上朱字神農本經下赤白殺火毒以上黑字名醫所録名菟核白草白根崑崙苗圖經曰二月生苗多在林中作蔓生其莖赤色莖端有五葉如小桑五月開花七月結實根如雞鴨卵三五枚同窠皮黑肉白濠州有一種赤蘞功用與白蘞同花實亦相類但表裡俱赤爾唐本注云此根似天門冬一株下有十許根皮赤黑肉白如芍藥地圖經曰生衡山山谷及江淮州郡荊襄懷孟商齊濠諸州皆有之道地滁州時生春生苗採二月八月取根收曝乾用根質類地瓜而長色皮黑肉白味苦甘性寒泄氣氣薄味厚陰中之陽臭朽主一切腫毒生肌止痛助代赭為之使反烏頭治療圖經曰治風金瘡及面藥日華子云止驚邪血邪發背瘰癧腸風痔瘻刀箭瘡撲損溫熱瘧疾血痢火瘡別録云療疔瘡及發背並湯火灼爛瘡以水調末敷之效合治合赤小豆𦬣草為末用雞子白調塗腫毒解殺火毒草之草青葙子無毒植生青葙子出神農本經主邪氣皮膚中熱風瘙身癢殺三蟲療唇口青以上朱字神農本經惡瘡疥蝨痔蝕下部慝瘡以上黑字名醫所録名草蒿萋蒿草藁崑崙草草決明苗圖經曰二月生苗長三四尺葉闊似柳軟莖似蒿青紅色六七月開花上紅下白子黑光而匾有似莨菪根似蒿根而白直下獨莖生根又有一種花黃名陶珠術苗亦相似恐不堪用唐本注云此草苗高尺許葉細軟花紫白色實作角子黑而扁光似莧實而大四月五月生下濕地荊襄人名為崑崙草地圖經曰生江淮州郡平谷道傍皆有之道地滁州時生二月生苗採三月取莖葉六月八月取子收陰乾用子質類雞冠花子色黑味苦性微寒泄氣味厚於氣陰也主惡瘡疥瘙目腫盲翳制雷公云凡用先燒鐵臼杵單搗用治療唐本注云苗治溫癘搗汁服藥性論云子治肝臟熱毒沖眼赤障青盲翳腫日華子云子治五臟邪氣鎮肝堅筋骨去風寒濕痹苗止金瘡血別録云子汁療鼻衄出血不止以三合灌鼻中瘥補日華子云益腦髓明耳目贋思蓂子鼠細子為僞萑菌有小毒植生萑音完菌音郡出神農本經主心痛溫中去長蟲白𤸭音蘚蟯音饒蟲蛇螫毒症瘕諸蟲以上朱字神農本經疽蝸去蛔蟲寸白惡瘡以上黑字名醫所録名萑蘆鸛菌苗唐本注云渤海蘆葦澤中鹹鹵地自然有此菌爾亦非鸛屎所化生也其色白輕虛表裡相似與衆菌不同然秋雨以時即有天旱及霖即稀也食療云又菌子有數種槐樹上生者良野田中生者恐有毒生食之殺人地圖經曰生東海池澤及渤海武章滄州皆有之時生無時採八月取收陰乾用頭莖質類菌而大小不一色白味鹹甘性平微溫氣氣厚味薄陽中之陰臭朽助得酒良反畏雞子制杵末用治療藥性論云除腹內冷痛及治白禿瘡合治以清汁萑蘆一兩合羊肉臛日食一次療蛔蟲攻心如刺為末合豬肉作臛食之療蛔蟲禁仰卷紫色及大耳青色仰生者皆不可食發五臟風壅經絡多食動痔病昏多睡背膊四肢無力白芨無毒植生白芨出神農本經主癰腫惡瘡敗疽傷陰死肌胃中邪氣賊風鬼擊痱音肥緩不收以上朱字神農本經除白癬疥蟲以上黑字名醫所録名甘根連及草苗圖經曰春生苗高一尺許似栟櫚及藜蘆莖端生一臺葉似杜若兩指大而青四月開紫花七月結實熟時黃黑色至冬葉凋根似菱米有三角角端生芽古方雖稀用今人亦作糊用之地圖經曰生北山川穀冤句越山及江淮河陝漢黔諸州近道皆有之道地興州申州時生春生苗採二月八月九月取根收曝乾用根質類菱而大小不一色黃褐味苦辛性平寒泄氣氣薄味厚陰中之陽臭香主癰疽瘡腫生肌止痛助紫石英為之使反烏頭畏李核杏仁惡理石制去蘆須銼碎用治療唐本注云手足皸音軍折取嚼塗之有效藥性論云治結熱不消及陰下痿並面上䵟疱令人肌滑日華子云止驚邪血邪癇疾赤眼癥結發背瘰癧腸風痔瘻刀箭瘡撲損溫熱瘧疾血痢湯火瘡風痹別録云鼻衄不止以末津調塗山根立愈大戟有小毒叢生大戟出神農本經主蠱毒十二水腹滿急痛積聚中風皮膚疼痛吐逆以上朱字神農本經頸腋癰腫頭痛發汗利大小腸以上黑字名醫所録名邛巨苗圖經曰春生紅芽漸長作叢高尺許葉似初生楊柳而小團三四月開黃紫花團圓似杏花又似蕪荑根似細苦參皮黃黑肉黃白色淮甸出者莖圓高三四尺花黃葉至心亦如百合苗江南生者葉似芍藥此品乃澤漆根也地圖經曰生常山及淮甸江南皆有之道地滁州河中府信州並州時生春生苗採二月八月十二月取根收陰乾用根質類苦參而粗大色皮黃肉白味苦甘性大寒泄氣氣薄味厚陰中微陽臭焦主利水道去積聚助小豆為之使反甘草畏菖蒲蘆草鼠屎惡山藥制雷公云凡採得於槐砧上細銼與細銼海芋葉拌蒸從巳至申去芋葉曬乾用治療圖經曰治癮疹風及風毒腳腫並煮水熱淋之日再三便愈藥性論云破新陳惡血癖塊腹內雷鳴通月水善治瘀血日華子云泄天行黃病溫瘧破癥結合治合當歸橘皮各一兩水二升煮取七合頓服治水腫無問年月深淺雖脈惡亦宜服之服後利水二三升不愈再服便瘥須禁食毒物一年禁妊娠不可服澤漆無毒叢生澤漆出神農本經主皮膚熱大腹水氣四肢面目浮腫丈夫陰氣不足以上朱字神農本經利大小腸明目輕身以上黑字名醫所録名漆莖苗圖經曰澤漆大戟苗也春生紅芽漸長作叢高尺許葉似初生楊柳而小團三四月開黃紫花團圓似杏花又似蕪荑生時摘葉有白汁出亦能齧人肉故以為名地圖經曰生泰山川澤及冀州鼎州明州皆有之時生春生苗採三月三日七月七日取收陰乾用莖葉質類新柳莖葉而團聚色青味苦辛性微寒泄氣氣薄味厚陰中之陽臭腥主水腫蠱毒助小豆為之使反惡山藥治療藥性論云利小便日華子云止瘧疾消痰去熱合治以三斤用東流水五斗煮取一斗五升然後用半夏半升紫參生薑白前各五兩甘草黃芩人參桂心各三兩八物㕮咀入澤漆汁中煎取五升每服五合日三服治肺咳上氣脈沉者愈夏間取莖嫩葉十斤入水一斗研汁約二斗於銀鍋內慢火熬如稀餳用瓷器收貯每日空心以一茶匙合溫酒調服治十種水氣以愈為度茵芋有毒植生茵芋出神農本經主五臟邪氣心腹寒熱羸瘦如瘧狀發作有時諸關節風濕痹痛以上朱字神農本經療久風濕走四肢腳弱以上黑字名醫所録名莞草卑共苗圖經曰春生苗高三四尺莖赤葉似石榴葉而短厚又似石南葉四月開細白花五月結實地圖經曰生泰山川穀及雍州華州杭州皆有之道地絳州彭城時生春生苗採三月三日四月七月取收陰乾用莖葉質類石榴葉而短厚色青味苦性溫泄氣氣厚味薄陽中之陰臭朽主祛風除濕制銼碎炙用治療藥性論云治男子女人軟腳毒風並溫瘧發作有時日華子云治一切冷風筋骨怯弱羸顫合治合附子天雄烏頭秦艽女葳防風防己躑躅石南細辛桂心各一兩切碎以絹袋盛合清酒一斗漬之冬七日夏三日春秋五日藥成初服一合日三漸增之治賊風手足枯痹四肢拘攣瘥草之走赭魁無毒蔓生赭音者魁主心腹積聚除三蟲名醫所録苗蜀本云其苗蔓延而生葉似蘿摩根若菝葜皮紫黑肉黃赤其大者輪囷如升小者若拳陶隱居云狀如小芋子肉白皮黃梁漢人蒸食之唐本注云葉似杜衡蔓生草木上大者如斗小者如升陶所說者乃土卵爾不堪入藥梁漢人名黃獨蒸食之非赭魁也地圖經曰生山谷中所在有之時生春生苗採二月取收曝乾用根質類芋而大小不一色紫黑味甘性平緩氣氣厚於味陽也臭朽草之草貫衆有毒植生貫衆出神農本經主腹中邪熱氣諸毒殺三蠱以上朱字神農本經去寸白破癥瘕除頭風止金瘡花療惡瘡令人泄以上黑字名醫所録名貫節貫渠百頭虎卷扁符伯萍藥藻草鴟頭苗圖經曰春生苗赤葉大如蕨而少有花者莖幹三稜葉緑色似小雞翎又名鳳尾草根紫黑色形如大瓜下有黑鬚毛又似老鴟爾雅云濼舒若切貫衆郭璞注云葉圓鋭莖毛黑布地經冬不死廣雅謂之貫節是也蜀本云苗似狗脊狀如雉尾根直多枝皮黑肉赤曲者名草鴟頭也地圖經曰生玄山山谷及冤句少室山今陝西河東州郡及荊襄間多有之道地淄州時生春生苗採二月八月取根收陰乾用根質類黑狗脊而有甲色黑味苦性微寒氣味厚於氣陰中之陽臭香主消毒殺蟲助萑菌赤小豆為之使制去土須用治療圖經曰根止鼻血搗末水調服一錢效草鴟頭療頭風蕘花有毒叢生蕘音饒花出神農本經主傷寒溫瘧下十二水破積聚大堅癥瘕蕩滌腸胃中留癖飲食寒熱邪氣利水道以上朱字神農本經療痰飲咳嗽以上黑字名醫所録苗陶隱居云形似芫花而極細色白唐本注云今此種苗似胡荽高二尺許莖無刺花細黃色實與芫花全不相似也地圖經曰生咸陽川穀及河南中牟今所在有之道地雍州時生春生苗採六月取花收陰乾用花色黃味苦辛性寒泄氣味厚於氣陰中之陽臭香主下水腫破積聚治療藥性論云治咳逆上氣喉中腫滿疰氣蠱毒痃癖氣塊牙子有毒植生牙子主邪氣熱氣疥瘙惡瘍瘡痔去白蟲神農本經名狼牙狼齒狼子大牙苗圖經曰苗似蛇莓而厚大深緑色根黑若獸之齒牙故以名之地圖經曰生淮南川穀及冤句今江東京東州郡多有之時生春生苗採三月八月取根收曝乾用根質類狼牙色黑味苦酸性寒泄氣味厚於氣陰也臭朽助蕪荑為之使反惡地榆棗肌治療圖經曰治婦人陰瘡藥性論云治浮風瘙癢煎汁洗惡瘡日華子云殺腹臟一切蟲止赤白痢煎服別録云小兒陰瘡濃煮草汁洗之射工中人已有瘡者取葉或根搗敷又飲汁五六合效合治獨莖者細搗合臘月豬脂敷蛇咬毒以五兩㕮咀用水四升煮取半升去滓合苦酒一小盞以綿濡湯瀝患處日四五次治婦人陰蝕若中爛傷者即愈禁根中濕腐爛生衣者殺人及已有毒植生及已主諸惡瘡疥痂瘻蝕及牛馬諸瘡名醫所録苗唐本注云此草一莖莖頭四葉葉隙著白花好生山谷陰虛軟地根如細辛而黑今以當杜衡非也地唐本注云處處山谷中有之時生春生苗採二月取根收曬乾用根質類細辛色黑味苦性平泄氣味厚於氣陰中之陽臭朽制洗去土用治療藥性論云單用治瘑疥日華子云煎湯洗白禿瘡皮膚瘙癢並敷效禁不入湯藥入口使人吐血贋杜衡為僞羊躑躅有大毒植生羊躑躅出神農本經主賊風在皮膚中淫淫痛溫瘧惡毒諸痹以上朱字神農本經邪氣鬼疰蠱毒以上黑字名醫所録名玉支苗圖經曰春生苗高三四尺葉似桃葉夏開花似凌霄山石榴旋葍輩而正黃色羊誤食其葉則躑躅而死故以為名一種今嶺南蜀道山谷遍生皆深紅色如錦繡然或云此種不入藥用地圖經曰生太行山川穀及淮南山今所在有之道地潤州海州時生春生苗採三月四月取花收陰乾用花色黃味辛性溫散氣氣之厚者陽也反惡諸石及面禁不入湯服藿香無毒叢生藿香療風水毒腫去惡氣霍亂心痛名醫所録苗圖經曰二月生苗莖梗甚密作叢葉似桑而小薄六月七月採曝之乃芬香須黃色然後可收又金樓子及俞益期箋皆云扶南國人言衆香共是一木根便是栴檀節是沉水花是雞舌葉是藿香膠是薰陸詳本經所以與沉香等共條蓋義出於此然今南中所有乃是草類南方草木狀云藿香榛生吏民自種之正相符合也一云形如都梁可著衣服中蓋取其芬香爾地圖經曰舊不著所出州土今嶺南郡多有之人家亦多種植別録云出交址九真諸國蒙州廣東諸州時生二月生苗採七月八月取收曝乾用葉質類桑葉而小薄色青黃味甘辛性微溫散氣氣之厚者陽也臭香主溫中快氣助脾開胃行手足太陰經制去枝梗水洗去土用治療圖經曰治脾胃吐逆湯液本草云溫中下氣止嘔及治口臭上焦壅煎湯嗽口補湯液本草云補衛氣益胃進食合治合烏藥順氣補肺合黃耆參朮補脾贋棉花葉為僞草之走何首烏無毒蔓生何首烏主瘰癧消癰腫療頭面風瘡五痔止心痛益血氣黑髭鬢悅顏色久服長筋骨益精髓延年不老亦治婦人産後及帶下諸疾名醫所録名野苗交藤夜合地精陳知白桃柳藤赤葛苗圖經曰春生苗葉葉相對如山芋而不光澤其莖紫色蔓延於竹木牆壁間生雖相遠夜則蔓交或隱化不見夏秋開黃白花似葛勒花結子有稜似蕎麥而細小才如粟大秋冬取根大者如拳各有五稜瓣似小甜瓜此有二種赤者為雄白者為雌日華子云此藥有雌雄雄者苗葉黃白雌者苗葉黃赤其藥本草原名交藤因何首烏見藤夜交即採食之有功因以採人為名耳地圖經曰出順州河南西洛嵩山今嶺外江南諸州皆有之道地懷慶府柘城縣時生春生苗採春末夏中秋初候晴明日取根收曬乾用根雌雄相兼質類茯苓有稜瓣色赤白味苦澀又云甘性微溫氣氣厚於味陽中之陰臭朽主益氣血黑髭鬚助茯苓為之使反惡蘿蔔制圖經曰採得以苦竹刀切之米泔浸經宿曝乾木杵臼搗用之一用大棗拌蒸一用黑豆拌蒸俱以棗豆熟為度又法九蒸九曝並勿犯鐵器治療日華子云治腹臟宿疾一切冷氣及腸風補日華子云久服令人有子合治以大有花紋者合牛膝各一斤同銼以好酒一斤浸七日曝乾木臼內搗為末煉蜜丸如梧子大每日空心酒下三五十丸治骨軟風腰膝疼行履不得遍身瘙癢者末合生薑汁調成膏敷遍身皮裡面痛以帛裹之用火炙鞋底熱尉之即瘥合艾各四兩用水煎令濃於盆內洗疥癬滿身作瘡不可治者浴之甚能解痛生肌肉禁與蘿蔔同食令人髭鬚早白忌鐵器豬羊血無鱗魚何首烏傳昔何首烏者順州南河縣人祖名能嗣父名延秀能嗣常慕道術隨師在山因醉夜臥山野忽見有藤二株相去三尺余苗蔓相交久而方解解了又交驚訝其異至旦遂掘其根歸問諸人無識者後有山老忽來示之答曰子既無嗣其藤乃異此恐是神仙之藥何不服之遂杵為末空心酒服一錢服數月似強健因此常服又加二錢服之經年舊疾皆痊發烏容少數年之內即有子名延秀秀生首烏首烏之名因此而得生數子年百餘歲發黑有李安期者與首烏鄉里親善竊得方服其壽至長遂敘其事何首烏味甘生溫無毒茯苓為使治五痔腰膝之病冷氣心痛積年勞瘦痰癖風虛敗劣長筋力益精髓壯氣駐顏黑髮延年婦人惡血蔞黃産後諸疾赤白帶下毒氣入腹久痢不止其功不可具述一名野苗二名交藤三名夜合四名地精五名首烏本出處州江南諸道皆有之苗葉有光澤又如桃李葉雄苗赤根遠不過三尺春秋可採曬乾去皮為末酒下最良有疾即用茯苓湯下為使常杵末新瓷器盛服之忌豬肉血無鱗魚觸藥無力此藥形大如拳連珠其中有作鳥獸山嶽之狀珍也掘得去皮生吃得味甘甜休糧贊曰神效助道著在仙書雌雄相交夜合晝疏服之去穀日居月諸返老還少變安病軀有緣者遇傳之勿泄最爾自如明州刺史李遠傳録經驗何首烏所出順州南河縣韶州潮州恩州賀州廣州四會縣潘州以上出處為上雍州晉興縣桂州原州春州勤州高州循州以上所出次之其仙草五十年者如拳大號山奴服之一年髭鬢青黑一百年者如碗大號山哥服之一年顏色紅悅一百五十年者如盆大號山伯服之一年齒落重生二百年者如斗大號山翁服之一年顏如童子行及奔馬三百年者如三斗栲栳大號山精服之一年延齡純陽之體久服成地仙草之草商陸有毒植生商陸出神農本經主水脹疝瘕痹尉除癰腫殺鬼精物以上朱字神農本經療胸中邪氣水腫痿痹腹滿洪直疏五臟散水氣如人形者有神以上黑字名醫所録名䓪根夜呼白昌當陸薚章陸蓫薚馬尾莧陸樟柳根苗圖經曰商陸即樟柳根也春生苗高三四尺葉青如牛舌而長莖青赤至柔脆夏秋開紅紫花作朵根如蘆蔔而長爾雅謂之蓫薚廣雅謂之馬尾易謂之莧陸皆謂此商陸也然有赤白二種花赤者根赤花白者根白白者入藥赤者見鬼神甚有毒但貼腫外用不可服也又一種名赤葛苗葉絶相類不可服服之傷筋消腎須細辨之地圖經曰生咸陽川穀今處處有之多生人家園圃中道地並州鳳翔府時生春生苗採二月八月九月取收曝乾用根質類蘆蔔而長色白赤味辛酸性平散氣氣之薄者陽中之陰臭腥主水氣浮腫助得大蒜良制雷公云每修事先以銅刀刮去上皮薄切以東流水浸兩宿然後漉出架甑蒸以豆葉一重商陸一重如斯蒸從午至亥去豆葉曝乾細銼用若無豆葉以豆代之治療圖經曰治喉中卒被毒氣攻痛及瘡中毒並切根炙令熱隔布尉之冷即易立愈藥性論云瀉十種水病日華子云通大小腸瀉蠱毒㶸腫毒敷惡瘡別録云治石癰堅如石不作膿者取生根搗擦之燥即易以軟為度合治初生根合鯉魚煮湯療水腫以白者去皮切如小豆許一大盞用水三升煮取一升候爛合粟米一大盞煮成粥每日空心服一次治水氣微利有效不得雜食以白者六兩取汁半合合酒半升空心服療腹大水腫當下水瘥小兒量與服之禁赤者有毒服之傷人乃至利血不已妊娠亦不可服贋赤葛為僞忌犬肉威靈仙無毒叢生威靈仙主諸風宣通五臟去腹內冷滯心膈痰水久積癥瘕痃癖氣塊膀胱宿膿惡水腰膝冷疼及療折傷久服之無溫疫瘧名醫所録名能消苗圖經曰初生先於衆草莖方葉似柳葉作層每層六七葉如車輪有六層至七層者七月內生花淺紫或碧白色作穗似莆臺子亦有似菊花頭者實青根生稠密多須似谷歲久益繁秋深朽敗尚有宿根其性甚善不觸諸藥地圖經曰出商州上洛山及華山並平澤今陝西州軍等及河東河北京東江湖州郡或有之道地並州晉州石州寧化軍時生初春生苗採九月至十二月於丙丁戊己日採根以不聞水聲者佳余月並不堪採收陰乾用根色紫黑味苦甘性溫泄氣氣厚味薄陽也臭香主風濕疼痛行通十二經脈制去蘆水潤細銼酒炒用治療唐本注云治腰腎腳膝積聚腸內諸冷病積年不瘥者合治陰乾搗末合清酒調空腹服二錢匕治重病足不履地數十年者如人本性殺藥可加及六錢匕利過兩行則減之病除乃停服忌飲茶及麵湯以甘草梔子湯代飲可也只一味洗焙為末合好酒和令微濕入竹筒內牢塞筒口九蒸九曝如干添酒灑之煉蜜丸如桐子大每服二十丸至三十丸空心白湯好酒任下去諸風通十二經脈疏宣五臟冷膿宿水及重病足不履地並風狂人傷寒頭痛鼻流清涕服經二次即止及頭旋目眩白癜風極治大風皮膚風癢熱毒風瘡深治勞疾連腰骨節風繞痰積口中涎水好吃茶滓浮氣瘴氣憎寒壯熱頭痛甚者攻耳成膿而聾又沖眼赤大小腸祕服此立通及黃疸黑疸面無顏色瘰癧産後祕澀膈氣冷氣攻衝腎臟風壅腹肚脹滿頭面浮腫脾肺氣痰熱咳嗽氣急坐臥不安疥癬痔疾等瘡婦人月水不來動經多日血氣衝心及孩子無辜令母含藥灌兒並皆治之末合蜜丸如梧子大於一更內生薑湯下十丸至二十丸治大腸久冷禁多服疏人五臟真氣忌茶及湯草之走牽牛子有毒蔓生牽牛子主下氣療腳滿水腫除風毒利小便名醫所録名盆甑草金鈴草金零苗圖經曰二月種子三月生苗作藤蔓繞籬牆長者或二三丈其葉青色有三尖角七月生花如鈴蒂微紅瓣碧色似鼓子花而大其向陽者倍碧向陰者則淡紅日未出時則開日起即斂八月結實外有白皮里作球如白豆蔻狀每球內有子四五枚如麥大有三稜然有黑白二種以氣藥引之則入氣以血藥引之則入血也羅謙甫云牽子味辛烈屬火善走瀉人元氣若病濕勝濕氣不得施化致大小便不通則宜用之然濕病之根在下焦是血分中氣病不可用辛辣氣藥瀉上焦太陰之氣也凡人飲食勞倦皆血受病率以此藥瀉之是血病瀉氣使氣血俱虛也地圖經曰舊不著所出州土今處處有之道地越州時生春生苗採二月取子收曝乾用子質類木猴梨中子色黑白味苦性寒泄氣味厚於氣陰也臭焦主利水腫消積滯助得青木香乾姜良制雷公云凡用曬乾卻入水中淘浮者去之取沉者曬乾拌酒蒸從巳至未曬乾臨用舂去黑皮或炒用治療藥性論云治痃癖氣塊利大小便除水氣虛腫合治合木香乾姜治腰痛下冷膿瀉蠱毒並一切氣壅滯合山茱萸去冷氣以二兩搗末合蜜丸如小豆大每服五丸生薑湯下治風毒腳氣若脛腫滿捻之沒指者服後令小便利即愈以數兩合童子小便浸一宿用長流水上洗半日卻用生絹袋盛掛當風處令乾每日以鹽湯下三十粒治風氣所攻臟腑積滯及搜風消虛腫久服令人體清爽以一斤生搗末八兩餘滓於新瓦上炒令香熟再搗取四兩熟末共十二兩合蜜丸如桐子大治男子婦人五般積氣成聚至重者三五十丸用陳皮生薑湯下臨臥空心服之微利為效若未動再與三十丸轉下積聚之物小兒十五以下至七歲以上者服五丸至七丸年老人不宜服以二兩微炒搗取其中粉一兩合麩炒去皮尖桃仁末半兩以熟蜜丸如桐子大每服溫水下二三十丸治大腸風祕壅熱結澀病愈勿服禁久服脫人元氣多食稍冷妊婦不可服草之木萆麻子有小毒附葉植生萆音萆麻子主水症水研二十枚服之吐惡沫加至三十枚三日一服瘥則止又主風虛寒熱身體瘡癢浮腫尸疰惡氣榨取油塗之葉主腳氣風腫不仁搗蒸敷之名醫所録名萆麻苗圖經曰夏生苗葉似葎草而厚大莖赤有節如甘蔗而中空高丈許秋生細花隨結實殼上有刺實類巴豆青黃斑褐形如牛蜱故以為名唐本注云葉似大麻葉而甚大其子如蜱今胡中來者莖赤樹高丈餘子大如皂莢核用之益良地圖經曰舊本不著所出州郡今在處人家皆有之道地明州儋州時生春生苗採夏取莖葉秋取實冬取根收曝乾用莖葉實根質類巴豆而斑褐色碧味甘辛性平散氣氣之薄者陽中之陰主産難疥癩雷公云凡使先須和皮用鹽湯煮半日去皮取子研過用治療圖經曰治胎衣不下以七粒研如膏塗腳心底子及衣才下便速洗去不爾腸出即用此膏塗頂腸當自入日華子云治水腫腹滿細研五粒水服及敷瘡痍疥癬別録云治水氣以去皮殼者研令熟水調三合清旦頓服之日中當下青黃水愈治一切毒腫疼痛不可忍去皮搗敷之瘥治難産取二枚令孕婦兩手各持一枚須臾立下治瘰癧炒熟去皮殼爛嚼二三枚臨睡時服漸加至十數枚亦可唐本注云葉止衄血以油塗葉炙熱尉漾上立驗合治去皮者不拘多少擘為二片合銼碎黃連等分用水浸七日每日空心日午臨臥將浸水吞下一片療癘風鼻拓及手指曲節間痛不可忍漸至脫落者兩月後便覺有效若浸水少旋添如只腿脹用針刺出毒物忌食動風之物去皮者五枚細研合面一匙水調塗小兒丹瘤以一枚合朴硝一錢研細用新汲水調服治咽中瘡腫未效連進二三服愈合蛤粉等分研膏敷湯火傷湯傷用油調火傷用水調草之草天南星有毒植生天南星主中風除痰麻痹下氣破堅積消癰腫利胸膈散血墮胎名醫所録苗圖經曰春生苗似荷梗莖高一尺以來葉如蒟蒻兩枝相抱五月開花似蛇頭黃色七月結子作穗似石榴子紅色根似芋而圓亦與蒟蒻根相類人多誤採莖斑花紫是蒟蒻一說天南星如本草所說即虎掌也小者名由跋後人採用乃別立一名爾今天南星大者四邊皆有子採時盡削去之陳藏器云半夏高一二尺由跋高一二寸此正誤相反言也今由跋苗高一二尺莖似蒟蒻而無斑根如雞卵半夏高一二寸亦有盈尺者根如小指正圓也江南吳中又有白蒟蒻亦曰鬼芋根都似天南星生下平澤極多皆雜採以為天南星了不可辨市中所收往往是也但天南星小柔膩肌細炮之易裂差可辨爾地圖經曰生平澤今處處有之陳藏器云生安東山谷道地江寧府滁州時生二月生苗採二月八月取根收曝乾用根質類蒟蒻根而小色白味苦辛性烈散氣氣厚於味陽中之陰臭朽主祛風化痰反畏附子乾薑生薑制薑汁浸透炮過或用白礬皂莢煮去其毒並曬乾用又以南星為末裝入臘月牛膽內當風處陰乾入藥用治療圖經曰療中風痰毒陳藏器云主金瘡傷折瘀血搗敷傷處良日華子云主蛇蟲咬疥癬惡瘡合治合躑躅花並生搗作餅子蒸四五遍以稀葛囊盛掛候乾為末以蒸餅糊丸如梧子大每服酒下三丸治風痛若腰腳痛空心服手臂痛食後服五月五日午時以大者合龍腦等分研細入小磁器中密封治急中風目瞑牙噤無門下藥者用一字或半錢以中指點末揩齒大牙左右二三十指其口自開始得下別藥名開關散以一個當心作坑子合雄黃一塊在內用麵裹燒候雄黃作汁以盞子合定出火毒去面研末入麝香少許治小兒走馬牙疳蝕透損骨及小攻蝕者拂瘡上驗以一個重一兩換酒浸七伏時取出於新瓦上周回炭火炙令乾裂濕地去火毒搗末合硃砂一分研勻每服半錢荊芥湯調下治驚風墜涎空心日午時進一二服以大者一個炮為末每服一大錢合生姜三片水一盞煎至五分空心臨臥各一服治咳嗽以末三錢合京棗三枚水二盞煎八分溫服治吐瀉不止四肢發厥虛風不省人事服此四肢漸暖神識便省名回陽散合防風等分為末醋調貼破傷風瘡強直者禁妊娠不可服贋鬼芋根為僞三賴無毒叢生三賴闢穢氣作面脂療風邪潤澤顏色為末擦牙祛風止痛及牙宣口臭今補苗謹按其根分蒔春月抽芽直上生一葉似車前而卷至秋旁生一莖開碎花紅白色不結子其本旁生小根作叢每根發芽亦生一葉至冬則凋土人取根作段市之其香清馥逼人可愛今合香多用之地出廣東及福建皆有之時生春生苗採十月取根收陰乾用根色白味辛性溫氣氣之厚者陽也臭香制碾細用八角茴香八角茴香主一切冷氣及諸疝㽲痛今補地謹按大明一統志所載土産占城國今四川湖廣永州府祁陽等縣所貢多由舶上來者苗葉傳聞未諳其的據其形大如錢有八角如車輻而鋭赤黑色每角中有子一枚如皂莢子小匾而光明可愛今藥中多用之又四川雅州出一種木蟹其形與此無異但六角味酸無香為別然不聞入藥而市人多以此亂真用者當細辨耳用八角者佳色赤黑味辛甘性溫散氣氣之厚者陽也臭香制細銼火炒用合治合木香乳香川楝子丁香破故紙香附子葫蘆巴京三稜甘草各一兩杜仲五錢共為末酒糊為丸如桐子大每服三十丸加至五十丸空心用溫酒或鹽湯送下日進三服治男子小腸氣肚疼一切氣積及補下元虛冷脾胃不和並宜服之有效合沉香木香青鹽食鹽各一錢川楝肉小茴香各二錢新荔枝核十四個燒存性為末每服三錢空心用熱酒調下治疝氣陰核腫大痛不可忍合木香木通檳榔當歸赤芍藥青皮澤瀉橘皮甘草入桂少許姜三片每服三錢煎服治冷氣凝滯小便淋澀作痛身體冷贋木蟹為僞兩頭尖有毒兩頭尖療風及腰腿濕痹痛今補苗謹按此種乃附子之類苗葉亦相似其根似草烏皮黑肉白細而兩端皆鋭故以為名也地出陝西時生春生苗採二月八月取根收曝乾用根色皮黑肉白味辛性熱氣氣之厚者陽也臭朽制搗碎入藥用贋白附子經石灰水泡皮皴皺者為僞佛耳草無毒叢生佛耳草治寒嗽及痰除肺中寒大升肺氣今補苗謹按此草春生苗高尺余莖葉頗類旋覆而遍有白毛折之有綿如艾且柔韌莖端分歧著小黃花十數作朵瓣極茸細今醫家治寒嗽多用之由其能升肺氣而散寒邪故也地江南多有時生春生苗採夏秋取收陰乾用莖葉花色花黃葉緑味辛性熱氣氣之厚者陽也臭朽助少用款冬花為使制銼碎用治療治形寒飲冷痰嗽經久不瘥者煎湯細細咽之效合治治風入肺久嗽不愈用佛耳草同鵝管石雄黃款冬花為末以雞子清刷紙卷藥末作筒燒煙口銜吸之又方用佛耳草同南星鬱金鵝管石款冬花為末和姜艾置舌上以藥艾於姜上灸之取煙入喉中禁過食損目三種海藥余瓶香謹按陳藏器云生南海山谷草之狀也味寒無毒主天行時氣鬼魅邪精等並宜燒之又於水煮善洗水腫浮氣與土姜芥子等煎浴湯風瘧甚驗也叉子股謹按陳氏云生嶺南及南海諸山每莖三十根狀似細辛味苦平無毒主解毒癰疽神驗忠萬州者佳草莖功力相似以水煎服緣嶺南多毒家家貯之宜南草謹按廣州記云生廣南山谷有莢長二尺許內有薄片似紙大小如蟬翼主邪小男女以緋絹袋盛一件佩之臂上辟惡止驚此草生南方故作南北字今人多以男女字非也宜男草者即萱草是一十三種陳藏器余狼把草叢生狼把草秋穗子並染皂黑人鬚髮令人不老生山道旁圖經曰狼把草主療丈夫血痢不療婦人若患積年疳痢即用其根俗間頻服有效患血痢者取草二斤搗絞取汁一小升內白麵拌雞子許和之調令勻空腹頓服之極重者不過三服若無生者但收取苗陰乾搗為散患痢者取散一方寸匕和蜜水半盞服之效今按別録云狼把草出近道古方未見其用者雖陳藏器嘗言其黑人鬚髮令不老生道傍然未甚詳悉太宗皇帝御書記其主療甚為精至謹用書於本草圖經外類篇首云藒音挈車香味辛溫主鬼氣去臭及蟲魚蛀蚛生彭城高數尺白花爾雅曰藒車藝音乞輿郭注云香草也廣志云黃葉白花也海藥云按廣志云生海南山谷陳氏云生徐州微寒無毒主霍亂辟惡氣薰衣甚好齊民要術云凡諸樹木蛀者煎此香冷淋之善闢蛀蚛也朝生暮落花主惡瘡疽䘌疥癰蟻瘻等並曬乾末和油塗之生糞穢處頭如筆紙色朝生暮死小兒呼為狗溺臺又名鬼筆菌從地出者皆主瘡疥牛糞上黑菌尤佳更有燒作灰地經秋雨生菌重臺名仙人帽大主血沖洞根味苦平無毒主熱毒蛇大蟲癰瘡等毒功用同陳家白藥苗蔓不相似嶺南恩州取根陰乾海藥云謹按廣州記云生嶺南及海隅苗蔓如土瓜根相似味辛溫無毒主一切毒氣及蛇傷並取其根磨服之應是著諸般毒悉皆吐出井口邊草主小兒夜啼著母席下勿令母知豚耳草主溪毒射工絞取汁服滓敷瘡上血別録云豚耳多種未知何是菘菜白葉者亦名豚耳顏氏家訓馬莧一名豚耳馬齒莧也又車前葉圓者亦名豚耳燈花末敷金瘡止血生肉令瘡黑今燭花落有喜事不爾得錢之兆也千金檵草主蛇蠍蟲咬等毒取草搗敷瘡上生肌止痛生江南高二三尺也斷罐草主疔瘡合白牙埊恥六反羊蹄菜也菜青苔半夏地骨皮蜂窠小兒發緋帛並等分燒作灰五月五日和諸藥末服一匕下根出也百草灰主腋臭及金瘡五月五日採露取之一百種陰乾燒灰作以井花水為團重燒令白以釅醋和為餅腋下挾之干即易當抽一身痛悶瘡出即止以水小便洗之不過三兩度又主金瘡止血生肌取灰和石灰為團燒令白刮敷瘡上産死婦人冢上草主小兒醋瘡取之勿回顧作浴湯洗之不過三度佳孝子衫襟灰敷面䵟靈床下鞋履主腳氣
