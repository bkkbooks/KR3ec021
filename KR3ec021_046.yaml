body:
  text: 續集卷之二草部鎖陽無毒鎖陽出補遺主大補陰氣益精血利大便虛人大便結燥者啖之可代蓯蓉煮粥彌佳不燥結者勿用朱震亨潤燥養筋治痿弱本草綱目地李時珍曰鎖陽出肅州按陶九成輟耕録云鎖陽生韃靼田地野馬或與蛟龍遺精入地久之乃生收土人掘取洗滌去皮薄切曬乾質形如竹筍上豐下儉鱗甲櫛比筋脈連絡絶類男陽即肉蓯蓉之類土人掘取洗滌去皮薄切曬乾以充藥貨功力百倍於蓯蓉味甘性溫三七無毒三七主止血散血定痛金刃箭傷跌撲杖瘡血出不止者嚼爛塗或為末摻之其血即止亦主吐血衄血下血血痢崩中經水不止産後惡血不下血暈血痛赤目癰腫虎咬蛇傷諸病葉主折傷跌撲出血敷之即止青腫經夜即散余功同根本草綱目名山漆金不換地李時珍曰生廣西南丹諸州番峒深山中收採根曝乾色黃黑色質略似白芨長者如老幹地黃有節味微甘而苦頗似人參之味性溫主一切血病與騏驎竭紫𨥥相同贋以末摻豬血中血化為水者乃真治凡杖撲傷損淤血淋漓者隨即嚼爛罨之即止青腫者即消散若受杖時先服一二錢則血不衝心杖後尤宜服之産後服亦良行乃陽明厥陰血分之藥合治吐血衄血山漆一錢自嚼米湯送下或以五分加入八核湯大腸下血三七研末同淡白酒調一二錢服三服可愈加五分入四物湯亦可婦人血崩産後血多山漆研末米湯服一錢無名癰腫疼痛不止山漆磨米醋調塗即散已破者研末干塗虎咬蛇傷山漆研末米飲服三錢仍嚼塗之土當歸無毒土當歸本草綱目主除風和血煎酒服之閃拗手足同荊芥蔥白煎湯淋洗之衛生易簡方水仙無毒水仙出會編主癰腫及魚骨鯁本草綱目花主作香澤塗身理髮去風氣又療婦人五心發熱同乾荷葉赤芍藥等分為末白湯每服二錢熱自退也衛生易簡方名金盞銀臺地叢生下濕處時冬月生葉春初抽莖質似蒜及薤莖如蔥頭莖頭開花數朵大如簪頭狀如酒杯五尖上承黃心宛然盞樣其花瑩韻其香清幽收張機曰水仙花葉似蒜其花香甚清九月初栽於肥壤則花茂盛瘦地則無花五月初收根以童尿浸一宿曬乾懸火暖處若不移宿根更旺味苦微辛性滑寒臭香合治土宿真君曰取汁伏汞煮雄黃拒火吉利草無毒吉利草主解蠱毒極驗本草綱目地李時珍曰嵇含南方草木狀云此草生交廣質莖如金叉股形類石斛根類芍藥味苦性平解蠱毒硃砂根無毒硃砂根主咽喉腫痹磨水或醋咽之甚良本草綱目地李時珍曰硃砂根生深山中時夏月長茂今惟太和山人採之苗高尺許質葉似冬青葉背甚赤根大如筋赤色味苦性涼金絲草無毒金絲草主吐血咳血衄血下血血崩瘴氣解諸藥毒療癰疽疔腫惡瘡涼血散熱本草綱目地李時珍曰金絲草出慶陽山谷苗狀當俟訪問也味苦性寒合治婦人血崩金絲草海柏枝砂仁花椒蠶蛻紙舊錦灰等分為末煮酒空心服癰疽疔腫一切惡瘡金絲草忍冬藤五葉藤天喬麥等分煎湯溫洗黑色者加醋又鐵箍散用金絲草灰二兩醋拌曬乾貝母五兩去心白芷二兩為末以涼水調貼瘡上香油亦可或加龍骨少許天蛇頭毒金絲草金銀花藤五葉紫葛天喬麥等分切碎用絶好醋濃煎先熏後洗蜘蛛香無毒蜘蛛香主闢瘟疫中惡邪精鬼氣尸疰本草綱目地李時珍曰蜘蛛香出蜀西茂州松潘山中色黑質有粗須狀如蜘蛛味辛性溫臭芳香線香無毒線香主熏諸瘡癬本草綱目質李時珍曰今人合香之法甚多惟線香可入瘡科用其料加減不等大抵多用白芷芎藭獨活甘松三奈丁香藿香藁木高良薑角茴香連翹大黃黃芩柏木兜婁香末之類為末以榆皮面作糊和劑以唧筒笮成線香成條如線也亦或盤成物象字形用鐵銅絲懸爇者名龍掛香味辛性溫臭香合治楊梅毒瘡龍掛香孩兒茶皂角子各一錢銀硃二錢為末紙卷作捻點燈置桶中以鼻吸烟一日三次三日止內服解毒藥數服其瘡即干瑞香無毒瑞香根本草綱目主急喉風用白花香研水灌之出醫學集成地李時珍曰南陵諸處山中有之苗枝幹婆娑柔條厚葉時四時不凋冬春之交開花成簇色微紫花長三四分如丁香狀有黃白紫三色格古論云瑞香高者三四尺有數種有枇杷葉者楊梅葉者柯葉者球子者攣枝者惟攣枝者花紫香烈枇杷葉者結子攣枝者其節攣曲如斷折之狀也其根綿軟而香收其始出廬山宋時人家栽之始著名味根甘鹹臭香氣香烈茉莉無毒茉莉花主蒸油取液作面脂頭澤長髮潤髮香肌亦入茗湯根有毒主以酒磨一寸服則昏迷一日乃醒二寸二日三寸三日凡跌損骨節脫臼接骨者用此則不知痛也汪機名奈花李時珍曰嵇含草木狀作末利洛陽名園記作末厲佛經作抹利王龜齡集作沒利洪邁集作末麗蓋末利本胡語無正字隨人會意而已韋君呼為狎客張叔敏呼為遠客楊慎丹鉛録云晉書都人簪奈花即今末利花也地李時珍曰末利原出波斯移植南海今滇廣人栽蒔之其性畏寒不宜中土時初夏開小白花重瓣無蕊秋盡乃止苗弱莖繁枝緑葉團尖不結實有千葉者紅色者蔓生者其花皆夜開芬香可愛女人穿為首飾或合面脂亦可熏茶或蒸取液以代薔薇水又有似末利而瓣大其香清絶者謂之狗牙亦名雪瓣海南有之素馨指甲皆其類也附録素馨李時珍曰素馨亦自西域移來謂之耶悉茗花即酉陽雜俎所載野悉蜜花色枝幹嫋娜葉似末利而小其花細瘦四瓣有黃白二色採花壓油澤頭甚香滑也指甲花有黃白二色夏月開香似木犀可染指甲過於鳳仙花野菊有小毒野菊出拾遺主調中止泄破血婦人腹內宿血宜之治癰腫疔毒瘰癧眼瘜本草綱目名苦薏李時珍曰薏乃蓮子之心此物味苦似之故與之同名地陳藏器曰苦薏生澤畔李時珍曰苦薏處處原野極多質莖如馬藺花如菊菊甘而薏苦李時珍曰苦薏與菊無異但葉薄而多尖花小而蕊多如蜂窠狀味李時珍曰苦辛慘烈性溫氣辛禁朱震亨曰野菊花服之大傷脾胃治一切無名腫毒孫氏集效方用野菊花連莖搗爛酒煎熱服取汗以渣敷之即愈瑞竹堂經驗方瘰癧未破野菊花根搗爛煎酒服以渣敷之自消不消亦自破也天泡濕瘡野菊花棗木煎湯洗之合治衛生易簡方用野菊花莖葉蒼耳草各一握共搗入酒一碗絞汁服以渣敷之取汁即愈或六月六日採蒼耳葉九月九日採野菊花為末每酒服三錢亦可千年艾無毒千年艾主男子虛寒婦人血氣諸痛水煎服之本草綱目地李時珍曰千年艾出武當大和山中苗小莖高尺許其根如蓬蒿其葉長寸余無尖丫秋開黃花如野菊而小結實如青珠丹顆之狀時三伏日採葉曝乾色面青背白質葉不似艾而作艾香搓之即碎不似艾葉成茸味微苦性溫氣辛黃花蒿無毒黃花蒿主小兒風寒驚熱本草綱目名臭蒿大明曰臭蒿一名草蒿質李時珍曰香蒿臭蒿通名草蒿與青蒿相似色此蒿色緑帶淡黃味苦性涼氣辛臭辛臭不可食人家採以罨醬黃酒麴者是也子無毒主勞下氣開胃止盜汗及邪氣鬼毒大明性涼氣辛燕脂無毒燕脂主小兒聤耳浸汁滴之開寶所録活血解痘毒本草綱目名𧹬赦李時珍曰按伏候中華古今注云燕脂起自紂地産於燕地故曰燕脂或作𦭭赦色燕脂以紅藍花汁凝作之調脂飾女面胸奴人名妻為閼氏音同燕脂謂其顏色可愛如燕脂也用入血病藥用質李時珍曰燕脂有四種一種以紅藍花汁染胡粉而成乃蘇鶚演義所謂燕脂葉似薊花似蒲出西方中國謂之紅藍以染粉為婦人面色者也一種以山燕脂花汁染粉而成乃段公路北戶録所謂端州山間有花叢生葉類藍正月開花似蓼土人採含苞者為燕脂粉亦可染帛如紅藍者也一種以山榴花汁作成者鄭虔胡本草中載之一種以紫𨥥染綿而成者謂之胡燕脂李珣南海藥譜載之今南人多用紫𨥥燕脂俗呼紫梗是也又落葵子亦可取汁和粉勻面亦謂之胡燕脂味甘性平治防痘入目燕脂嚼汁點之合治乳頭破裂燕脂嚼汁點之嬰兒鵝口白厚如紙用坯子燕脂以乳汁調塗之一宿效男用女乳女用男乳痘瘡倒陷干燕脂三錢胡桃燒存性一個研末用胡荽煎酒服一錢再服取效漏瘡腫痛豬膽七個綿燕脂十個洗水和勻搽七次即可箬無毒箬主男女吐血衄血嘔血咯血下血並燒存性溫湯服一錢匕又通小便利肺氣喉痹消癰腫本草綱目名篛亦與箬同𦼔葉李時珍曰箬若竹而弱故名其生疏遼故又謂之𦼔地箬生南方平澤苗其根與莖皆似小竹其節籜與葉皆似蘆荻而葉之面青背淡柔而韌新舊相代四時常青材南人取葉作笠及裹茶鹽包米粽女人以襯鞋底味甘性寒治一切眼疾籠箬燒灰淋汁洗之久之自效耳忽作痛或紅腫內脹將經霜青箬葉露在外將朽者燒存性為末敷入耳中其疼即止吹奶乳癰五月五日粽箬燒灰酒服二錢即散纍效合治咽喉閉痛𦼔葉燈心草燒灰等分吹之甚妙肺壅鼻衄箬葉燒灰白麵三錢研勻井花水服二錢經水不止箬葉灰蠶紙灰等分為末每服二錢米飲下腸風便血茶簍內箬葉燒存性每服三匙空心糯米湯下男婦血淋亦治五淋多年煮酒瓶頭箬葉三五年至十年者尤佳每箬七個燒存性入麝香少許陳米飲下日三服有人患此二服愈尿白如注小腹氣痛茶籠內箬葉燒存性入麝香少許米飲下小便澀滯不通干箬葉一兩燒灰滑石半兩為末每米飲服三錢痘瘡倒靨箬葉灰一錢麝香少許酒服淡竹葉無毒淡竹葉主葉去煩熱利小便清心根能墮胎催生本草綱目名根名碎骨子地李時珍曰處處原野有之時春生苗高數寸八九月抽莖質細莖緑葉儼如竹米落地所生細竹之莖葉其根一窠數十鬚鬚上結子與麥門冬一樣但堅硬爾用俚人採其根苗搗汁和米作酒麴甚芳烈味甘性寒禁孕婦勿服迎春花無毒迎春花本草綱目主腫毒惡瘡陰乾研末酒服二三錢出汗便瘥衛生易簡方地李時珍曰處處人家栽插之苗叢生高者二三尺方莖厚葉葉如初生小椒葉而無齒面青背淡對節生小枝一枝三葉時正月初開小花質狀如瑞香花黃色不結實色黃色味苦澀性平剪春羅無毒剪春羅本草綱目主火帶瘡繞腰生者採花或葉搗爛蜜調塗之為末亦可證治要訣名剪紅羅苗高尺余柔莖時二月生苗入夏開花色緑葉花深紅色質花大如錢凡六出周回如剪成可愛結實大如豆內有細子人家多種之為玩也又有剪紅紗花莖高三尺葉似旋覆夏秋開花狀如石竹花而稍大四圍如剪鮮紅可愛結穗亦如石竹穗中有細子方書不見用者計其功亦應利小便主癰腫也味甘性寒金盞草無毒金盞草救荒本草主腸痔下血久不止名醫別録名杏葉草長春花李時珍曰金盞其花形也長春言耐久也地蘇頌曰杏葉草一名金盞草生常州蔓延籬下葉葉相對秋後有子如雞頭實其中變生一小蟲脫而能行時中夏採花四時不絶質周憲王曰金盞兒花苗高四五寸葉似初生萵苣葉厚而狹抱莖而生莖柔脆莖頭開花大如指頭色金黃色收李時珍曰夏月結實在萼內宛如尺蠖蟲數枚蟠屈之狀故蘇氏言其化蟲實非蟲也味酸其葉酸炸熟水浸過油鹽拌食性寒狗尾草無毒狗尾草莖主疣目貫發穿之即干滅也凡赤眼拳毛倒睫者翻轉目瞼以一二莖蘸水戛去惡血甚良本草綱目名莠光明草阿羅漢草苗苗葉似粟而小其穗亦似粟地李時珍曰原野垣牆多生之用李時珍曰莠草秀而不實故字從秀穗形象狗尾故俗名狗尾草主其莖治目病收採莖筒盛以治目病色黃白色而無實莠之亂苗即此也水楊梅無毒水楊梅主疔瘡腫毒本草綱目名地椒地李時珍曰生水邊庚辛玉冊云地椒一名水楊梅多生近道陰濕處荒田野中亦有之苗叢生苗葉似菊莖端開黃花實類椒而不赤用實可結伏三黃白礬制丹砂粉霜味辛性溫半邊蓮無毒半邊蓮主蛇蛔傷搗汁飲以滓圍塗之又治寒齁氣喘及瘧疾寒熱同雄黃各二錢搗泥碗內覆之待色青以飯丸梧子大每服九丸空心鹽湯下李時珍壽域方地李時珍曰半邊蓮小草也生陰濕塍塹中就地細梗質引蔓節節而生細葉秋開小花如蓮花狀色花淡紅紫色止有半邊又呼急解索氣平味辛紫花地丁無毒紫花地丁主一切癰疽發背疔腫瘰癧無名腫毒惡瘡本草綱目名箭頭草獨行虎羊角子米布袋地李時珍曰處處有之平地生者起莖溝壑邊生者起蔓時夏開紫花結角質其葉似柳而微細普濟方云鄉村籬落生者夏秋開小白花如鈴兒倒垂葉微似木香花之葉此與紫花者相戾恐別是一種也味苦辛性寒治黃疸內熱地丁末酒服三錢稻芒黏咽不得出者箭頭草嚼咽下癰疽發背無名諸腫貼之如神紫花地丁草三伏時收以白麵和成鹽醋浸二夜貼之昔有一尼發背夢得此方數日而痊一切惡瘡紫地丁根曬乾以罐盛燒煙對瘡熏之出黃水取盡愈疔瘡腫毒備急方用紫花地丁草搗汁服雖極者亦效合治癰疽惡瘡楊誠經驗方用紫花地丁連根同蒼耳葉等分搗爛酒一鍾攪汁服瘰癧疔瘡發背諸腫乾坤祕韞云紫花地丁根去粗皮同白蒺藜為末油和塗神效喉痹腫痛普濟方用箭頭草葉入醬少許研膏點入取吐漏藍子有毒漏藍子主惡痢冷漏瘡惡瘡癘風本草綱目名本鱉子虎掌李時珍曰此乃附子之瑣細未成者小而漏藍故名之南星之最小者名虎掌此物類之地大明會典載四川成都府歲貢天雄二十對附子五十對烏頭五十對漏藍二千斤不知何用用李時珍曰按楊士瀛直指方云凡漏瘡年久者復其元陽當用漏藍子輩加減用之如不當用而輕用之又恐熱氣乘虛變移結核而為害尤甚也蓋此物不堪服餌止宜入瘡科也味苦辛禁雷斆曰服之令人喪目治類編云一人兩足生瘡臭潰難近夜宿五夫人祠下夢神授方用漏藍子一枚生研為末入膩粉少許井水調唾依法治之果愈合治一切惡痢雜下及休息痢百歲丸用漏藍子一個大者阿膠木香黃連罌粟殼各半兩俱炒焦存性入乳香少許為末糊丸梧子大每一歲一丸米飲下鳳仙有小毒鳳仙子主産難積塊噎膈下骨哽透骨通竅本草綱目名急性子旱珍珠金鳳花小桃紅染指甲草菊婢海蒳夾竹桃李時珍曰其花頭翅尾足俱其翅儼然如鳳狀故以名之女人採其花及葉包染指甲其實狀如小桃老則迸裂故有指甲急性小桃諸名宋光宗李後諱鳳宮中呼為好女兒花張宛丘呼為菊婢韋居士呼為羽客地鳳仙人家多種之極易生時二月下子五月可再種苗按苗高二三尺莖有紅白二色其大如指中空而脆葉長而尖似桃柳葉而有鋸齒丫間開花或黃或白或紅或紫或碧或雜色亦自變易狀如飛禽自夏初至秋盡開謝相續結實纍然大如櫻桃其形微長色如毛桃生青熟黃犯之即自裂皮卷如拳苞中有子似蘿蔔子而小褐色人採其肥莖浥汋以充萵筍華酒浸一宿亦可食但此草不生蟲蠹蜂蝶亦不近恐亦不能無毒也味微苦性溫氣氣之薄者陽中之陰臭微香主李時珍曰鳳仙子其性急速故能透骨軟堅庖人烹魚肉硬者投數粒即易軟爛是其驗也禁緣其透骨最能損齒與玉簪根同丸服者不可著齒也多用亦戟人咽治噎食不下摘玄方用鳳仙子酒浸三宿曬乾為末酒丸緑豆大每服八粒溫酒下不可多用即急性子也咽中骨哽欲死者普濟方白鳳仙子研水一大呷以竹筒灌入咽其物即軟不可近牙或為末吹之合治産難催生集簡方鳳仙子二錢研末服勿近牙外以萆麻子隨年數搗塗足心牙齒欲取摘玄方金鳳花子研末入砒少許點疼牙根取之小兒痞積孫天仁集效方急性子水葒花子大黃各一兩俱生研末每味取五錢外用皮硝一兩拌勻將白鵓鴿一個或白鴨亦可去毛屎剖腹勿犯水以布拭淨將末裝入內用綿扎定沙鍋內入水三碗重重紙封以小火煮乾將鴿或鴨翻調焙黃冷定早晨食之日西時疾軟三日大便下血病去矣忌冷物百日花無毒主蛇傷擂酒服即解又治腰脅引痛不可忍者研餅曬乾為末空心每酒服三錢活血消積本草綱目味甘滑性溫合治吳旻扶壽精方風濕臥床不起用金鳳花柏子仁朴硝木瓜煎湯洗浴每日二三次內服獨活寄生湯根有小毒主雞魚骨鯁誤吞銅鐵杖撲腫痛散血通經軟堅透骨本草綱目味苦甘辛治咽喉物硬危氏得效方金鳳花根嚼爛噙咽骨自下雞骨尤效即以溫水漱口免損齒也亦治誤吞銅鐵打杖腫痛葉廷器通變要法鳳仙花葉搗如泥塗腫破處干則又上一夜血散即愈冬月收取陰乾者研末水和塗之馬患諸病衛生易簡方白鳳仙花連根葉熬膏遇馬有病抹其眼四角上即汗出而愈曼陀羅花有毒花子主諸風及寒濕腳氣煎湯洗之又主驚癇及脫肛併入麻藥本草綱目名風茄兒山茄子李時珍曰法華經言佛說法時天雨曼陀羅花又道家北斗有陀羅星使者手執此花故後人因以名花曼陀羅梵言雜色也茄乃因葉形耳姚伯聲花品呼為惡客地李時珍曰曼陀羅生北土人家亦栽之時春生夏長苗獨莖直上高四五尺生不旁引葉如茄葉八月開白花凡六瓣狀如牽牛花而大攢花中折駢葉外包而朝開夜合結實圓而有子拐中有小子採八月採花九月採實用花子色緑莖碧葉白花味辛性溫氣氣之薄者陽中之陰主八月採此花七月採火麻子花陰乾等分為末熱酒調服三錢少頃昏昏如醉割瘡灸火宜先服此則不覺苦也禁李時珍曰相傳此花笑採釀酒飲令人笑舞豫常試之飲須半酣更令一人或笑或舞引之乃驗可見有毒治面上生瘡衛生易簡方曼陀羅花曬乾研末少許貼之合治小兒慢驚御藥院方曼陀羅花七朵重一字天麻二錢半全蠍炒十枚天南星炮丹砂乳香各二錢半為末每服半錢薄荷湯調下大腸脫肛曼陀羅子連殼一對橡斗十六個同銼水煎三五沸入朴硝少許洗之醉魚草有小毒花葉主痰飲成齁遇寒便發取花研末和米粉作粿炙熟食之即效又治誤食石斑魚子中毒吐不止及諸魚骨鯁者搗汁和冷水少許咽之吐即止骨即化也久瘧成癖者以花填鯽魚腹中濕紙裹煨熟空心食之仍以花和海粉搗貼便消本草綱目名鬧魚花魚尾草櫝木地李時珍曰醉魚草南方處處有之多在塹岸邊作小株生苗李時珍曰高者三四尺根狀如枸杞莖似黃荊有微稜外有薄黃皮校易繁衍葉似水楊對節而生經冬不凋時七八月開花成穗質儼如芫花一樣結細子色紅紫色主漁人採花及葉以毒魚盡圉圉而死呼為醉魚兒草也用花葉味辛苦性溫氣氣之薄者陽中之陰禁沼邊不可種之此花色狀氣味如芫花毒魚亦同但花開不同時為異耳按中山經云熊耳山有草焉其狀如蘇而赤花名曰葶薴可以毒魚其此草之類與番木鱉無毒番木鱉主傷寒熱病咽喉痹痛消痞塊並含之咽汁或磨水噙咽本草綱目名馬前子苦實把豆火失刻把都地李時珍曰番木鱉生回回國今西十邛州諸處皆有之苗蔓生夏開黃花亦如木鱉其核小於木鱉而色白彼人言治一百二十種病每證各有湯引或云以豆腐制過用之良或云能毒狗至死時七八月結實如栝蔞色生青熟赤質李時珍曰狀似馬之連錢故名馬前用子味苦性寒氣氣薄味苦陰也治苦實把豆兒研膏納入牝戶三四寸去胎合治合番木鱉青木香山豆根等分為末療喉痹作痛番木鱉仁一個木香三分同磨水調熊膽三分膽礬五分以雞毛掃纏喉風腫取效癍瘡入目苦實把豆兒即馬前子半個輕粉水花銀硃各五分片腦麝香枯礬少許為末左目吹右耳右目吹左耳日二次月季花無毒月季花王活血消腫敷毒本草綱目名月月紅勝春瘦客鬥雪紅地李時珍曰處處人家多栽插之亦薔薇類也苗青莖長蔓硬刺葉小於薔薇千葉厚瓣不結子也時逐月開放色花深紅味甘性溫氣氣薄味淡陰中微陽合治療瘰癧未破用月季花頭二錢沉香五錢芫花炒三錢碎銼入大鯽魚腹中就以魚腸封固酒水各一盞煮熟食之即愈魚須安糞水內遊死者方效此是家傳方活人多矣九仙子無毒九仙子主咽痛喉痹散血以新汲水或醋磨汁含咽甚良本草綱目名仙女嬌地李時珍曰九仙子出均州太和山苗蔓高六七尺莖細而光葉如烏桕葉而短扁不團每葉丫生子枝或一或二嫋嫋下垂六七月開碎青黃花隨即結實碎子叢簇如穀精草子時生二月生苗採九月採根色白質一根連綴九枚大者如雞子小者如半夏味苦性涼氣降也陰也黃藤無毒黃藤主飲食中毒利小便煮汁頻服即解本草綱目地李時珍曰黃藤生嶺南質狀若防己主中飲食毒俚人常服此藤縱飲食有毒亦自然不發席辨刺史云甚有效味甘苦性平氣氣之薄者陽中之陰蘋無毒蘋主暴熱下水氣利小便吳普搗塗熱瘡搗汁飲治蛇傷毒入腹內曝乾枯樓等分為末人乳和丸服止消渴本草拾遺食之已勞山海經名芣菜四葉菜田字草李時珍曰蘋本作䤵左傳蘋蘩蘊藻之菜可薦於鬼神可羞於王公則䤵有賓之之義故字從賓其草四葉相合中折十字故俗呼為四葉菜田字草破銅錢皆象形也諸家本草皆以蘋注水萍蓋由蘋萍二字音相近也按韻書蘋在真韻蒲真切萍在庚韻薄經切切腳不同為物亦異今依吳普本草別出於此地吳普曰水萍一名水廉生池澤水上苗一莖一葉葉圓小根入水底陶弘景曰水中大萍非溝渠所生之萍乃楚王渡江所得即斯實也蘇恭曰萍有三種大者名蘋中者名荇葉皆相似而圓其小者即水上浮萍也陳藏器曰蘋葉圓闊寸許葉下有一點如水沫一名芣菜小萍是溝渠間者劉禹錫按爾雅云萍蓱也其大者曰蘋又詩云於以採蘋於澗之濱陸機注云其粗大者謂之蘋小者為萍季春始生可糝蒸為茹又可以苦酒淹之按酒今醫家少用此蘋惟小萍耳李時珍曰蘋乃四葉菜也葉浮水面根連水底其莖細於蓴荇其葉大如指頂面青背紫有細紋頗似馬蹄決明之葉四葉合成中折十字夏秋開小白花故稱白蘋其葉攢簇如萍故爾雅謂大者為蘋也呂氏春秋云菜之美者有崑崙之蘋即此韓詩外傳謂浮者為藻沉者為蘋臞仙謂白花者為蘋黃花者為荇即金蓮也蘇恭謂大者為蘋小者為荇楊慎卮言謂四葉菜為荇陶弘景謂楚王所得者為蘋皆無一定之言蓋未深加體審惟據紙上猜度而已李時珍一一採視頗得其真云其葉徑一二寸有一缺而形圓如馬蹄者蓴也似蓴而稍尖長者荇也其花並有黃白二色葉徑四五寸如小荷葉而黃花結實如小角黍者萍蓬草也楚王所得萍實乃此萍之實也四葉合成一葉如田字形者蘋也如此分別自然明白又項氏言白蘋生水中青蘋生陸地按今之田字草有水陸二種陸生者多生稻田沮洳之處其葉四片合一與白蘋一樣但莖生地上高三四寸不可食方士取以煅硫結砂煮汞謂之水田翁項氏所謂青蘋蓋即此也或以青蘋為水草誤矣時生三月採五月收曝乾入藥色白味甘性寒滑氣降也陰也水藻無毒水藻主去暴熱熱利止渴搗汁服之小兒赤白遊疹火焱熱瘡搗爛封之名醫別録名李時珍曰藻乃水草之有紋者潔淨如藻浴故謂之藻地蘇頌曰藻生水中處處有之周南詩云於以採藻於沼於沚於彼行潦是也苗陸機注云藻生水底有二種葉如雞蘇莖如箸長四五尺一種葉如蓬蒿莖如叉股謂之聚藻二藻皆可食熟挼去腥氣米麵糝蒸為茹甚滑美荊揚人饑荒以當穀食陳藏器曰馬藻生水中如馬齒相連李時珍曰藻有二種水中甚多藻葉大二三寸兩兩對生即馬藻也聚藻葉細如絲及魚腮狀節節連生即水蘊也俗名鰓草又名牛尾蘊是也爾雅云莙牛藻也郭璞注云細葉蓬茸如絲可愛一節長數寸長者二三十節即蘊也二藻皆可食入藥以馬藻為勝左傳云蘋繁蘊藻之菜即此主患熱毒腫並丹毒味甘性大寒滑治孫思邈曰凡天下極冷無過藻菜但有患熱毒腫並丹毒者取渠中藻菜切搗敷之厚三分干即易其效無比虎耳草有小毒虎耳草主瘟疫擂酒服生用吐利人熟用則止吐利又治聤耳搗汁滴之痔瘡腫痛者陰乾燒煙桶中熏之本草綱目名石荷葉地李時珍曰虎耳生陰濕處人亦栽於石山上苗莖高五六寸有細毛一莖一葉如荷蓋狀人呼為石荷葉大如錢狀似初生小葵葉及虎之耳形時夏開小花色淡紅色味微苦辛性寒白龍鬚無毒白龍鬚本草綱目主男子婦人風濕腰腿疼痛左癱右瘓口目喎斜及産後氣血流散脛骨痛頭目昏暗腰腿痛不可忍並宜之惟虛勞癱痿不可服研末每服一錢氣弱者七分無灰酒下密室隨左右貼床臥待汗出自干勿多蓋被三日勿下床見風一方得疾淺者用末三錢瓷瓶煮酒一壺每日先服桔梗湯少頃飲酒一盞早一服晚一服保壽堂方地李時珍曰劉松石保壽堂方云白龍鬚生近水旁有石處寄生搜風樹節乃樹之餘精也苗細如棕絲直起無枝葉最難得真者一種萬纏草生於白線樹根細絲相類但有枝莖稍粗為異誤用不妨愚按所云二樹名皆隱語無從考證味缺性平治李時珍曰保壽方云成化十二年盧玄真道士六十七歲六月偶得癱瘓服白花蛇丸牙齒盡落三年扶病入山得此方服百日復舊壽至百歲乃卒凡男婦風濕腰腿痛先服小續命湯及滲濕湯後乃服此凡女人産後腰腿腫痛先服四物湯二服次日服此若癱瘓年久痰老氣微者服前藥出汗三日之後則日服龍鬚末一分好酒下隔一日服二分又隔一日服三分又隔一日服四分又隔一日服五分又隔一日復從一分起如前法周而復始至月餘其病漸愈謂之升陽降氣調髓蒸骨追風逐邪排血安神忌房事魚鵝雞羊韭蒜蝦蟹及寒冷動風之物又不可過飲酒及麵食只宜米粥蔬菜合治諸風癱瘓筋骨不收用白龍鬚根皮一兩鬧羊花即老虎花七分好燒酒三斤封固煮一炷香埋土中一夜能飲者三杯不能飲者一杯臥時服服至三五杯見效但知痛者可治雜草樹孔中草李時珍曰主小兒腹痛夜啼暗著戶上即止豬窠草大明曰小兒夜啼密安席下勿令母知牛齝草主絞汁服止噦陳藏器療反胃霍亂小兒口噤風本草綱目名牛轉草即牛食而復出者俗曰回噍主李時珍曰牛齝治反胃噎膈雖取象回噍之義而沾濡口涎為多故主療與涎之功同治小兒流涎用牛噍草絞汁少少與之初生小兒口噤十日內者用牛口齝草絞汁灌之合治反胃噎膈大方奪命丸牛囀草杵頭糠各半斤糯一升為細末取黃母牛涎和丸龍眼大煮熟食之入砂糖二兩尤妙霍亂吐利不止用烏牛齝草一團人參生薑各三錢甜漿水一升半煮汁五合服盧精別録曰治蠱毒地生益州味平九龍草名金叉草地李時珍曰生平澤苗苗解諸毒質生紅子狀如楊梅治喉痛搗汁灌之折傷筋骨者搗罨患處楊清叟外科云喉風重舌牙關緊閉者取九龍草單枝上者為妙只用根不用皮打碎綿裹箸上擦牙關即開乃插探喉中取出痰涎乃以火炙熱蘸鹽點之即愈合治蛇虺傷者搗汁入雄黃三錢服其痛立止荔枝草李時珍曰衛生易簡方治蛇咬犬傷及破傷風取草一握約三兩以酒二盞煎一盞服取汗出效水銀草李時珍曰衛生易簡方治眼昏每服三錢入木賊少許水一盞煎八分服透骨草主筋骨一切風濕疼痛攣縮寒濕腳氣本草綱目合治孫氏集效方治癘風遍身瘡癬用透骨草苦參大黃雄黃各五錢研末煎湯於密室中席圍先熏至汗出如雨淋洗之反胃吐食透骨草獨根蒼耳生牡蠣各一錢姜三片煎服楊誠經驗方治一切腫毒初起用透骨草蘆防風地榆等分煎湯綿蘸乘熱不住蕩之二三日即消蛇眼草主蛇咬搗爛敷患處本草綱目地李時珍曰生古井及年久陰下處質形如淡竹葉背後皆是紅圈如蛇眼狀主唐珤經驗方治蛇咬搗爛敷患處蛇魚草李時珍曰戴元禮證治要訣云治金瘡血出不止搗敷之九里香草李時珍曰傅滋醫學集成治肚癰搗碎浸酒服白筵草李時珍曰香草也蟲最畏之孫真人千金方治諸蟲瘡疥癩取根葉煎水隔一日一洗環腸草李時珍曰張子和儒門事親方治蠱脹曬乾煎水日服以小便利為度扎耳草李時珍曰王執中資生經治氣聾方中用之銅鼓草李時珍曰范成大虞衡志云出廣西其實如瓜治瘍毒野芕草李時珍曰摘玄方治痞滿用五斤以一半安烏盆內置雞子十個在草上以草一半蓋之米醋浸二宿雞子殼軟乃取於飯上蒸熟頓食之塊漸消也經驗纖霞草李時珍曰陳巽經驗方元臟虛冷氣攻臍腹痛用硇砂一兩生烏頭去皮二兩纖霞草二兩為末以小砂罐固濟慢火燒赤以此草拌硇入內不蓋口頂火一稱煅之爐冷取出同烏頭末蒸餅為丸梧子大每服三丸醋湯下牛脂艻李時珍曰經驗良方治七孔出血為粗末每服一勺瓦器煎服以紗合頭頂並扎小指根鴨腳青李時珍曰普濟方治疔瘡如連珠者同䔡蘇研爛糖水拌刷之天仙蓮治李時珍曰衛生易簡方惡毒瘡節搗葉敷之雙頭蓮治李時珍曰一名催生草主婦人産難左手把之即生又主腫脹利小便衛生易簡方大人小兒牙疳搗爛貼之豬藍子治李時珍曰衛生易簡方治耳內有膿名通耳散用子為末筒吹入不過二三次愈天芥菜名雞痾黏地生平野質小葉如芥狀合治雞痾黏主蛇傷同金沸草入鹽搗敷之王璽醫林集要治腋下生腫毒以鹽醋同搗敷之散腫止痛膿已成者亦安亦治一切腫毒佛掌花本草綱目合治李時珍曰衛生易簡方疔瘡如櫻桃者用根同生姜蜜研汁服之外以天茄葉貼之郭公刺本草綱目名光骨刺治李時珍曰取葉搗細油調敷天泡瘡虞博醫學正傳治哮喘取根銼水煎服即止籩箕柴本草綱目地李時珍曰生山中治王永輔惠濟方治癧瘡取皮煎湯服須臾癢不可忍以手爬破出毒氣即愈碎米柴本草綱目治李時珍曰主癰疽發背取藥入敷藥用羊屎柴本草綱目名一名牛屎柴地生山野苗葉類鶴蝨四月開白花亦有紅花者結子如羊屎狀名鐵草子根可毒魚時四月開花夏用苗葉冬用根治癰疽發背搗爛敷之能合瘡口散膿血乾者為末漿水調敷又治下血如傾水取生根一片生白酒二斗煮一斗空心隨量飲山枇杷柴本草綱目主李時珍曰危亦林得效方治湯火傷取皮焙研末蜜調敷之三角風本草綱目名一名三角尖收取石上生者尤良主風濕流注疼痛及癰疽腫毒葉下紅本草綱目主飛絲入目腫痛同鹽少許絹包滴汁入目仍以塞鼻左塞右右塞左滿江紅本草綱目主癰疽入膏用隔山消本草綱目地李時珍曰出太和山色白色主腹脹積滯合治孫天仁集效方治氣膈噎食轉食用隔山消二兩雞肫皮一兩牛膽南星硃砂各一兩急性子二錢為末煉蜜丸小豆大每服一錢淡薑湯下石見穿主骨痛大風癰腫本草綱目醉醒草本草綱目地李時珍曰天寶遺事玄宗於興慶池邊植之苗叢生葉紫心殷醉客摘草嗅之立醒故名墓頭回本草綱目合治李時珍曰董炳集驗方治崩中赤白帶下用一把酒水各半盞童便半盞新紅花一捻煎七分臥時溫服日近者一服久則三服愈其效如神一僧用此治蔡大尹內人有效羊茅本草綱目治李時珍曰羊喜食之故名普濟方治喉痹腫痛搗汁咽之阿兒只本草綱目地李時珍曰劉郁西域記云出西域質狀如苦參主打撲傷損治婦人損胎用豆許咽之自安又治馬鼠瘡阿息兒本草綱目地李時珍曰西域記云出西域質狀如地骨皮治主婦人胞衣不下又治金瘡膿不出嚼爛塗之即出奴哥撒兒本草綱目地李時珍曰西域記云出西域質狀如桔梗治主金瘡及腸與筋斷者嚼爛敷之自續也
