body:
  text: 卷之三玉石部中品之上石之石雄黃有毒石生雄黃出神農本經主寒熱鼠瘻惡瘡疽痔死肌殺精物惡鬼邪氣百蟲毒勝五兵煉食之輕身神仙以上朱字神農本經療疥蟲䘌瘡目痛鼻中息肉及絶筋破骨百節中大風積聚癖氣中惡腹痛鬼疰殺諸蛇虺毒悅澤人面餌服之者皆飛入人腦中勝鬼神延年益壽保中不飢得銅可作金以上黑字名醫所録名黃食石黃石地圖經曰生武都山谷敦煌山之陽今階州山中亦有之形塊如丹砂明徹不挾石其色如雞冠者為真有青黑色而堅者名熏音訓黃有形色似真而氣臭者名臭黃並不入藥其臭以醋洗之便去足以亂真用之尤宜細辨又階州接西戎界出一種水窟雄黃生於山岩中有水泉流處其石名青煙石白鮮石雄黃出其中其塊大者如胡桃小者如粟豆上有孔竅其色深紅而微紫體極輕虛而功用勝常丹灶家尤所貴重或云雄黃金之苗也故南方近金坑冶處時或有之但不及西來者真正爾水經云黃水出零陽縣西北連巫山溪出雄黃頗有神異采常以冬月祭祀鑿石深數丈方得故溪水取名焉衍義曰雄黃非金之苗今有金窟處無雄黃條中言金之所生處處皆有雄黃豈處處皆得也時生無時採無時用純而不雜燁燁如雞冠色者為佳質類石黃而赤亮色紅黃味苦甘性平寒大溫氣氣味俱厚陽中之陰臭臭主瘡瘍闢百邪制雷公云凡修事先以甘草紫背天葵地膽碧稜花四件並細銼每件各五兩雄黃三兩下東流水入垍堝中煮三伏時漉出搗如粉水飛澄去黑者曬乾再研方入藥用治療唐本注云辟惡療瘡藥性論云治尸疰闢百邪鬼魅殺蠱毒日華子云治疥癬風邪癲癇風瘴蛇蟲犬獸傷咬陳藏器云熏黃主惡瘡殺蠱熏瘡疥蟻蝨補日華子云久服不飢合治末合酒服一匙日三治卒中鬼擊及刀所傷血滿腹者化血為水合細辛等分研細用一字治偏頭痛左邊疼嗅入右鼻右邊疼嗅入左鼻解藜蘆毒殺百毒人佩之鬼神不能近入山林虎狼伏涉川濟毒物不敢傷贋今人敲取石黃中精明者為雄黃外黑者為熏黃武都雄黃燒不臭熏黃燒則臭以此分別石之火石硫黃有毒石生石硫黃出神農本經主婦人陰蝕疽痔惡血堅筋骨除頭禿能化金銀銅鐵奇物以上朱字神農本經療心腹積聚邪氣冷癖在脅咳逆上氣腳冷疼弱無力及鼻衄惡瘡下部䘌瘡止血殺疥蟲以上黑字名醫所録名石硫黃地圖經曰石硫黃礬石液也生東海牧羊山谷中及泰山河西今惟出南海諸蕃嶺外州郡或有而不甚佳以色如鵝子初出殼者為真謂之崑崙黃其赤者名石亭脂青色者號冬結石半白半黑名神驚石並不堪入藥又有一種土硫黃出廣南及榮州溪澗水中流出其味辛性熱腥臭可煎煉成汁以模䥱作器蜀中雅州亦出光膩甚好功力不及舶上來者按古方書未有服餌硫黃者其經所說功用止於治瘡蝕及積聚冷氣腳弱而已世遂火煉治為常服丸散觀其制煉服食之法殊無本源非若乳石之有議論節度故服之其效雖緊而其患更速可不戒之時生無時採八月九月取用瑩淨無夾石者為佳色淡黃味酸性溫大熱氣氣厚味薄陽也臭臭主心腹積聚冷癖邪氣助石亭脂曾青為之使反朴硝石亭脂畏細辛飛廉鐵制雷公云凡用硫黃四兩先以龍尾蒿自然汁一鎰東流水三鎰紫背天葵汁一鎰粟遂子莖汁四件合之攪令勻入垍堝用六一泥固濟底下將硫黃碎之入於堝中以前件藥汁旋旋添入火煮之汁盡為度了再以百部末十兩柳蚛末二斤一簇草二斤細銼之以東流水並藥等同煮硫黃二伏時日滿去諸藥取用熟甘草湯洗了入鉢中研二萬匝方用治療藥性論云煉服能下氣主腳弱腰腎久冷除風頑痹虛損泄精生用療寒熱咳逆及疥癬圖經曰土硫黃殺疥瘡蟲毒日華子云石亭脂壯陽道除痃癖冷氣強筋骨勞損風勞止嗽上氣及下部痔瘻惡瘡疥癬殺腹臟蟲邪魅解中硫黃毒以豬肉鴨羹余甘子並解之石之石雌黃有毒石生雌黃出神農本經主惡瘡頭禿痂疥殺毒蟲蝨身癢邪氣諸毒煉之久服輕身增年不老以上朱字神農本經蝕鼻中息肉下部䘌瘡身面白駁散皮膚死肌及恍惚邪氣殺蜂蛇毒久服令人腦滿以上黑字名醫所録地圖經曰生武都山谷與雄黃同山其陰山有金金精熏則生雌黃今出階州以其色如金又似雲母甲錯可析者為佳其夾石及黑如鐵色者不可用或云一塊重四兩者析之可得千重此尤奇好也時採無時用軟如爛金可析者為佳質類雲母石色黃味辛甘性平大寒氣氣之薄者陽中之陰臭臭主辟邪去惡療瘡殺毒制雷公云公凡修事勿令婦人雞犬臭穢等物觸之若犯之者其色黑如鐵不堪用及損人壽每四兩用天碧枝和陽草粟遂子草各五兩三件乾溼加一倍用瓷堝子中煮三伏時其色如金汁一垛在堝底下用東流水猛投於中如此淘三度去水取出拭乾於臼中搗篩過研如塵用之不入湯藥合治研如粉合醋並雞子黃打令勻塗於瘡上干即更塗治烏癩瘡殺蟲石膏無毒附玉火石石生石膏出神農本經主中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛除邪鬼産乳金瘡以上朱字神農本經除時氣頭痛身熱三焦大熱皮膚熱腸胃中結氣解肌發汗止消渴煩逆腹脹暴氣喘息咽熱亦可作浴湯以上黑字名醫所録名細石地圖經曰生齊山山谷及齊廬山魯蒙山今汾孟虢耀州興元府亦有之生於山石上色至瑩白其黃者不堪此石與方解石絶相類今難得真者惟取未破者以別之其方解不附石而生端然獨處外皮有土及水苔色破之皆作方稜石膏自然明瑩如玉此為異也陶隱居云今出錢塘皆在地中雨後時時自出取之皆如棋子此又不附石生也據本草又似長石議者又謂青石間往往有白脈貫徹類肉之有膏肪者為石膏此亦本草所謂理石也今密州九仙山東南隅地中出一種石青白而脆擊之內有火謂之玉火石彼土醫常用之云味甘微辛溫療傷寒發汗止頭目昏眩痛功與石膏等彼土人或以當石膏諸家之說不一其真僞將何據耶按丹溪云藥之命名固有不可曉者中間亦多有意義蓋石膏火煅細研醋調封丹爐其固密甚於石脂苟非有膏焉能為用此兼質與能而得名正與石脂同意閻孝忠妄以方解石為石膏況石膏甘辛本陽明經藥陽明主肌肉其甘也能緩脾益氣止渴去火其辛也能解肌出汗上行至頭又入手太陰手少陽彼方解石止有體重質堅性寒而以其所謂石膏而可謂三經之主者焉在哉醫欲責效不亦難乎大抵石膏當如經中所言有細理白澤為真無細理而不白澤為僞仍如經中所言州土方可入藥如此庶不惑於多岐之論而灼然有定矣時採無時用細理白色者良質類長石而肌細色白味甘辛性微寒一云大寒氣氣薄味厚陰中之陽臭朽主清胃去熱解肌發汗行足陽明經手太陰經少陽經助雞子為之使反畏鐵惡莽草巴豆馬目毒公制雷公云凡使先於石臼中搗成粉以密絹羅過生甘草水飛過澄令乾重研用之治療藥性論云治傷寒頭痛壯熱皮如火燥煩渴解肌出毒汗通胃中結煩悶心下急煩躁唇口乾焦日華子云治天行熱狂下乳頭風旋揩齒益齒別録云熱油湯火燒瘡痛不可忍搗末敷之愈合治合蔥煎茶服治頭痛合知母甘草粳米治傷寒熱病或大汗後脈洪大口舌乾燥頭痛大渴不以合香白芷治牙痛禁黃色者令人淋不可服贋方解石為僞方解石無毒土生方解石主胸中留熱結氣黃疸通血脈去蠱毒名醫所録名黃石地圖經曰出方山不附石而生端然獨處外皮有土及水苔色破之皆作方稜唐本注云此種大與石膏相似惟不附石而端然獨處形塊大小不同或在土或生溪水得之敲破皆方解故以為名今沙州大鳥山出者佳時採無時用方而有稜者佳質類晉礬色白味苦辛性大寒泄氣氣薄味厚陰中之陽臭朽主除熱反惡巴豆制搗為末水飛過用凝水石無毒土生凝水石出神農本經主身熱腹中積聚邪氣皮中如火燒煩滿水飲之久服不飢以上朱字神農本經除時氣熱盛五臟伏熱胃中熱煩滿止渴水腫小腹痹以上黑字名醫所録名白水石寒水石淩水石地圖經曰凝水石鹽之精也生常山山谷及出中水縣邯鄲今河東汾隰州德順軍亦有之此有兩種有縱理者有橫理者色清明如雲母可析投置水中與水同色其水凝動者為佳或曰縱理者為寒水石橫理者為凝水石又有一種冷油石全與此相類但投沸油鐺中油即冷者是也此石有毒切勿誤用衍義曰凝水石又謂之寒水石紋理通徹人磨刻為枕以備暑月之用入藥須燒過或市人燒入膩粉中以亂真不可不察也圖經云入水凝動者佳如此則舉世不能得也時採三月取又云無時用清明如雲母可析者良質類滑石而有紋理色青黃味辛甘性寒一云大寒氣氣薄味厚陰中之陽臭朽主伏熱積聚反畏地榆制雷公云每修事十兩以生薑自然汁一鎰煮汁盡為度細研成粉用或以火燒半日淨地坑內盆合四面濕土擁起候經宿取出用治療藥性論云能壓丹石毒風去心煩渴悶解傷寒勞復合治合白土為末用米醋調敷小兒丹毒皮膚熱赤解巴豆毒贋冷油石為僞若誤服之令人腰以下不能舉石之土石鐘乳無毒巖穴生石鐘乳出神農本經主咳逆上氣明目益精安五臟通百節利九竅下乳汁以上朱字神農本經益氣補虛損療腳弱疼冷下焦傷竭強陰久服延年益壽好顏色不老令人有子不煉服之令人淋以上黑字名醫所録名公乳蘆石夏石虛中地圖經曰生少室山谷及泰山道州江華縣連英韶階峽州山中皆有之生巖穴陰處溜山液而成長者五六寸中空相通如鵝翎管狀色白微紅碎之如爪甲中無雁齒光明者善舊說乳有三種有石鐘乳者其山純石以石津相滋狀如蟬翼者為石乳性溫有竹乳者其山多生篁竹竹津相滋乳如竹狀謂之竹乳性平有茅山乳者其山遍生茅草以茅津相滋乳色稍黑而滑潤謂之茅山乳性微寒唐李補闕煉鍾乳法云取韶州鍾乳無問厚薄但令顏色明淨光澤者宜入修煉惟黃赤者不堪用也時採無時收以瓷器貯之用明淨白薄者為上質類鵝管石而大小不等色白微紅味甘性溫緩氣氣厚味薄陽中之陰臭朽主固精壯元氣助蛇床為之使反惡牡丹玄石牡蒙畏紫石英蘘草制雷公云凡修事鍾乳八兩用沉香零陵藿香甘松白茅等各一兩以水先煮過一度方用甘草等二味各二兩再煮了漉出拭乾緩火焙之然後入臼杵如粉篩過卻入鉢中令有力少壯者三兩人不住研三日夜勿歇然後用水飛過以絹籠之於日中曬令乾又入鉢中研二萬遍用之治療藥性論云止寒嗽及通聲別録云治心煩肝氣不平補藥性論云止泄精壯元氣益陽事日華子云補五勞七傷添精益髓禁煮不如法服之多發淋渴忌羊血贋石腦黃石砂為僞殷孽無毒巖穴生殷孽出神農本經主爛傷瘀血泄痢寒熱鼠瘻癥瘕結氣以上朱字神農本經腳冷疼弱以上黑字名醫所録名姜石地圖經曰殷孽即鍾乳根也生趙國山谷又梁山及南海唐本注云盤結如姜故名姜石蜀本云孽之類有五種惟以次小巃嵸者為殷孽蓋原出於一體而主療有異此但可以浸酒不堪入藥也謹按孔公孽殷孽乃鍾乳之旁出者也從石室中汁溜垂下漸溜稍長旁岐而中通者為孔公孽再溜分岐中實如姜石者曰殷孽正溜中空而輕者為石鐘乳滴下積久盤結者為石床床上有槎牙如鹿角者曰石花三種同體其上下懸殊而功用亦異也時採無時用石盤結巃嵸者佳質類姜岐而長色白微紅味辛性溫散氣氣之厚者陽也臭朽主壯筋骨消癥瘕反畏術惡防已制搗末水飛過用治療日華子云治筋骨弱並痔瘻及下乳汁孔公孽無毒巖穴生孔公孽出神農本經主傷食不化邪結氣惡瘡疽瘻痔利九竅下乳汁以上朱字神農本經男子陰瘡女子陰蝕及傷食病常欲眠睡以上黑字名醫所録名通石地陶隱居云孔公孽即殷孽根也生梁山山谷亦出始興從石室上汁溜積久盤結者為鍾乳床即此孽也唐本注云此孽次於鍾乳如牛羊角者中有孔通故名通石也時採無時色白微紅味辛性溫散氣氣之厚者陽也臭朽主療陰瘡消宿食助木蘭為之使反惡細辛制研細水飛過用治療藥性論云治腰冷膝痹毒風男女陰蝕瘡人常欲多睡能使喉聲圓亮日華子云療癥結補別録云輕身充肌合治合酒漬飲之治腳弱忌羊血石花無毒巖穴生石花主腰腳風冷與殷孽同名醫所録名乳香石筍地圖經曰石花與殷孽同産即鍾乳之類從石室上汁溜積久盤結於地者為石床花即床上槎牙而生者是也衍義曰色白圓如覆大馬杓上有百十枝每枝各槎牙分岐如鹿角上有細紋起以指撩之錚錚然有聲此石花也時採三月九月取用白如霜雪者佳色白味甘性溫緩氣氣之厚者陽也臭朽主暖腰膝制研細水飛過以酒漬服治補日華子云壯筋骨助陽石床無毒巖穴生石床酒漬服與殷孽同名醫所録名乳床逆石地圖經曰出南海及趙國梁山山谷從石室中汁溜積久盤結為床謂之石床本經雲石床與殷孽同又云孔公孽殷孽根也鍾乳床即孔公孽其次小而巃嵸者為殷孽也謹按以上四種本乎一體互說紛紜而無定見竊觀乳之下溜有似於乳故曰鍾乳二孽亦乳之別溜猶孟子所謂孽子而亦乳之傍出者也石床乃鍾乳水滴盤結於地如床故謂之床床上生枝幹槎牙如花者謂之石花噫前人命名之義有自來矣時採無時用盤結如床者佳色白味甘性溫緩氣氣之厚者陽也臭朽制研細水飛過用石之石長石無毒石生長石出神農本經主身熱四肢寒厥利小便通血脈明目去翳眇下三蟲殺蠱毒久服不飢以上朱字神農本經胃中結氣止消渴下氣除脅肋肺間邪氣以上黑字名醫所録名方石土石直石地圖經曰生長子山谷及泰山臨淄今潞州有之文理如馬齒方而潤澤玉色此石頗似石膏但厚大縱理而長為別耳陶隱居云理石亦呼為長理石蘇恭云理石皮黃赤肉白作斜理不似石膏市人刮去皮以代寒水石並當礜石今靈寶丹用長理石為一物醫家相承用者乃似石膏與今潞州所出長石無異而諸郡無復出理石醫方亦不見單用往往呼長石為長理石也謹按本經理石長石二物以立二條其味與功效亦別豈得為一物哉今均州遼阪山有之土人以為理石者是此長石也時採無時質類石膏紋如馬齒色白味辛苦性寒散氣氣薄味厚陰中之陽臭朽主利小便殺蠱毒制研細水飛過用理石無毒石生理石出神農本經主身熱利胃解煩益精明目破積聚去三蟲以上朱字神農本經除營衛中去來大熱結熱解煩毒止消渴及中風痿痹以上黑字名醫所録名立制石肌石地圖經曰出漢中山谷及盧山今出寧州理石如石膏順理而細唐本注云此石夾兩石間如石脈採用之或在土中重疊而生肉白皮黃赤作斜理文全不似石膏市人或刮削去皮以代寒水石並當礜石今盧山亦無此物見出襄州西泛水側者是也時採無時用白淨斜理文者紋真色肉白皮黃赤味辛甘性大寒氣氣之薄者陽中之陰臭朽主破癖塊助滑石為使反惡麻黃制研細水飛過用治補唐本注云令人肥悅磁石無毒附磁石毛石生磁石出神農本經主周痹風濕肢節中痛不可持物洗洗酸痟音消除大熱煩滿及耳聾以上朱字神農本經養腎臟強骨氣益精除煩通關節消癰腫鼠瘻頸核喉痛小兒驚癇煉水飲之亦令人有子以上黑字名醫所録名玄石處石磁君地圖經曰生泰山山谷及慈山山陰有鐵處則生其陽今慈州徐州及南海傍山中皆有之慈州者最佳能吸鐵虛連十數針或一二斤刀器回轉不落者尤真其石中有孔孔中黃赤色其上有細毛謂之磁石毛性溫功用尤勝按南州異物志云漲海崎頭水淺而多磁石徼外大舟以鐵鐷錮之者至此多不能過以此言之南海所出尤多也又本經一名玄石其玄石亦自有條以其形質頗同疑重其名爾雷公云人欲驗者一斤磁石四面只吸鐵一斤者名延年沙四面吸鐵八兩者曰續末石四面只吸鐵五兩以來者號磁石蓋磁石為鐵之母取鐵猶母之召子焉時採無時用能吸鐵有力者佳質類生鐵色赤黑味辛鹹性寒氣氣薄味厚陰中之陽臭朽主滋養腎臟補益精氣助柴胡為之使反畏黃石脂惡牡丹莽草制雷公云凡修事一斤用五花皮五花者即五加皮之五葉花也一鎰地榆一鎰故綿十五兩三件並細銼以捶於石上碎作二三十塊子將磁石於瓷孔子中下草藥以東流水煮三日夜然後漉出拭乾以布裹之向大石上再捶令細卻入乳鉢中研細如塵以水沉飛過了又研如粉用之治療藥性論云治肝腎虛風虛身強腰中不利日華子云除煩躁消腫毒小兒誤吞針鐵陳藏器云止小便白數去瘡瘻補日華子云主眼昏筋骨弱五勞七傷陳藏器云補絶傷益陽道長肌膚令人有子合治合釅酢封疔腫合滑石末米飲調治金瘡腸出者服之瘥解殺鐵毒贋玄石為僞玄石無毒土石生玄石主大人小兒驚癇女子絶孕小腹冷痛少精身重服之令人有子名醫所録名玄水石處石地圖經曰生泰山之陽山陰有銅銅者雌鐵者雄主療與磁石頗亦相近而寒溫銅鐵畏惡乃別蘇恭以為鐵液也是磁石中無孔光澤純黑者其功劣於磁石又不能懸針者即玄石也今北蕃以磁作禮物其塊多光澤又吸鐵無力疑是此石醫方罕用耳時採無時用光澤純黑者好質類磁石無孔而不能懸針色黑味咸性溫氣氣厚於味陽中之陰臭朽主小兒驚癇女人絶孕反惡松脂柏實菌桂陽起石無毒土石生陽起石出神農本經主崩中漏下破子臟中血症瘕結氣寒熱腹痛無子陰痿不起補不足以上朱字神農本經療男子莖頭寒陰下濕癢去臭汗消水腫久服不飢令人有子以上黑字名醫所録名白石石生陽起石地圖經曰生齊山山谷及琅邪或云山陽起山今惟出齊州他處不復有或云邢州鵲山亦有之然不甚好今齊州城西惟一土山石出其中彼人謂之陽起山其山常有溫暖氣雖盛冬大雪遍境獨此山無積白蓋石氣熏蒸使然也山惟一穴官中常禁閉至初冬則州發丁夫遣人監視取之歲月積久其穴亦深鑱鑿他石得之甚艱以色白肌理瑩明若狼牙者為上亦有挾他石作塊者不堪每歲採擇上供之餘州中貨之不爾市賈無由得也貨者雖多而精好者亦難得舊說是雲母根其中猶挾帶雲母今不復見此色古服食方不見用者今補下藥多用之陶隱居云所出即與雲母同而甚似雲母但厚實耳唐本注云此石以白色肌理似殷孽仍夾帶雲母滋潤者為良故本經一名白石今有用純黑如炭者誤矣雲母條中既云黑者名云膽又名地涿服之損人黑陽起石必為惡矣經言生齊山齊山在齊州歷城西北五六里採訪無陽起石陽起石乃齊山西北六七里盧山出之本經云或云山云盧字訛矣今泰山沂州惟有黑者其白者獨出齊州也別録云惟泰山所出黃者絶佳邢州鵲山出白者亦好時採無時用肌理瑩明者為佳質類雲母而厚實色白味咸性微溫氣氣厚於味陽中之陰臭朽主扶陽益陰助桑螵蛸為之使反惡澤瀉菌桂雷丸蛇蛻皮石葵畏菟絲子制火煅水飛研用不入湯藥治療藥性論云除濕痹冷症寒瘕止月水不定日華子云止帶下溫疫冷氣補藥性論云益腎氣精乏腰疼膝冷暖女人子宮日華子云補五勞七傷衍義曰主男子婦人下部虛冷忌羊血礪石無毒附砥石土生礪石主破宿血下石淋除癥結伏鬼物惡氣燒赤熱投熱酒中飲之名醫所録名磨石地圖經曰即今磨刀石本經不載所出今處處有之又不欲人踏之令人患帶下未知所由又有越砥石極細磨汁滴目除障暗燒赤投酒中破血瘕痛功狀極同名又相近應是礪矣禹貢注云砥細於礪皆磨石也時採無時臭朽制研細水飛過用治療圖經曰磨刀石垽敷蠼螋溺瘡桃花石無毒石生桃花石主大腸中冷膿血痢久服令人肌熱能食名醫所録地圖經曰本經不載所出州土注云出申州鐘山縣今信州亦有之形塊似赤石脂紫石英輩其色似桃花光潤而體重以舐之不著舌者為佳陶隱居解赤石脂云用義陽者狀如豚腦色鮮紅可愛蘇恭以為非是此即桃花石也衍義曰桃花石有赤白兩笄有赤地淡白點如桃花片者有淡白地淡赤點如桃花片者人往往鐫磨為器用今人亦罕服食時採無時用舐之不著舌者為佳色紅白味甘性溫緩氣氣之厚者陽也臭朽主溫腸止痢制研細水飛過用治補蜀本云令人肥悅能食石之土石腦無毒石生石腦主風寒虛損腰腳疼痹安五臟益氣名醫所録名石飴餅地陶隱居云生名山土石中此石亦鍾乳之類形如曾青而白色黑斑軟易破今茅山東及西平山並有鑿土龕取之俗方不見用仙經有劉君導仙散用之又真誥曰李整採服療風痹虛損而得長生唐本注又云隋時有化公者所服亦名石腦出徐州宋里山初在爛石中入土一丈以下得之大如雞卵或如棗許觸著即散如面黃白色土人號為握雪礜石此種實非下品握雪礜石也時生無時採無時質類土粉色黃白味甘性溫緩氣氣之厚者陽也臭朽主安五臟制研細用石之石石蟹毒附浮石土石生石蟹主青盲目淫膚翳及疔翳漆瘡細研水飛過入諸藥相佐用之點目良名醫所録地圖經曰生南海今嶺南近海州郡皆有之體質石也而都與蟹相似又云是尋常蟹爾年月深久水沫相著因化成石每遇海潮即飄出又一種入洞穴年深者亦然衍義云石蟹真似今之生蟹更無異處但有泥與粗石相著爾又有浮石平無毒亦産海濱今皮作家用之磨皮上垢無出此石及治淋止渴殺野獸毒水飛亦治目中翳有效故附見於此時生無時採無時用形體全具者佳質狀如生蟹色青黑味咸性寒軟氣氣薄味厚陰也臭朽主消癰腫去目翳制去泥並粗石細研水飛過用治療日華子云催生血暈天行熱疾並熟水磨服浮石止渴治淋合治合醋磨癰腫禁妊娠不可服忌一切藥毒並蠱毒金石毒野獸毒石之金金屑生有毒熟無毒石生金屑主鎮精神堅骨髓通利五臟除邪毒氣服之神仙名醫所録名生金寶藏論云凡金有二十種還丹金水中金瓜子金青麩金草砂金以上五種是真金堪入藥用雄黃金雌黃金曾青金硫黃金土中金生鐵金熟鐵金生銅金偷石金砂子金硃砂金白錫金土碌砂子金金母砂子金黑鉛金以上十五種是假金不入藥用地圖經曰金之所産雖有數處而梁益寧三州尤多生於水底沙中謂之生金今人乃以氈上淘取又黔南遂府吉州水中併産麩金嶺表録云廣州洽涯縣有金池彼中居人多養鵝鴨常於屎中淘得之山海經說諸山出金最多不獨生於水也蔡州出瓜子金雲南出顆塊金俱于山石間取之其饒信南劍登州金亦多端或有若山石狀者或有若米豆粒者此類未經火煅皆為生金不堪入藥其屑古方不見用者而金薄入藥最為甚便紅雪紫雪輩皆取金汁用之此亦煅煉者爾衍義曰金屑不曰金而更加屑字者是已經磨屑如玉漿之義也生金若不煅屑不可入藥顆塊金穴山或至百十尺若見伴金石定見金也其石褐色一頭如火燒黑之狀此金色深赤黃麩金乃江水中淘汰而得其色淡黃此皆生金若銷煉之麩金耗折少塊金耗折多入藥當用塊金蓋取其金色深則金氣足矣時採無時用經煅煉者佳質類沙而黃色黃味辛性平散氣氣之薄者陽中之陰臭朽主辟邪去惡鎮心安魄反畏水銀惡錫制以火煅煉則為熟金磨屑用或煎取汁用或為金箔入丸藥用治療藥性論云主小兒驚傷五臟風癇失志日華子云鎮心利血脈別録云治風熱上氣咳嗽傷寒肺損吐血骨蒸勞極渴補日華子云益五臟添精補髓禁不煉服之殺人多服傷損肌肉解中金毒以鷓鴣肉解之銀屑有毒石生銀屑主安五臟定心神止驚悸除邪氣久服輕身長年名醫所録地衍義曰所産之地已備生銀條下屑義與金屑之義同焉然銀屑經言有毒生銀經言無毒釋者漏略不言蓋生銀已發生於外無蘊郁之氣故無毒礦銀尚蘊蓄於石中鬱結之氣未泄故有毒也時採無時用經煅煉者良質類沙而白亮色白味辛性平散氣氣之薄者陽中之陰臭朽主定心志去驚癇反惡錫制磨銼為屑用治療藥性論云主小兒顛疾狂走別録云妊娠猝腰背痛如折用水煮服之破冷除風生銀有毒附硃砂銀石生生銀主熱狂驚悸發癇恍惚夜臥不安譫音詹語邪氣鬼崇服之明目鎮心安神定志小兒諸熱丹毒並以水磨服功勝紫雪名醫所録名寶藏論云夫銀有一十七種至藥銀山澤銀草砂銀母砂銀黑鉛銀以上五種是真銀堪入藥用白錫銀曾青銀土碌銀丹陽銀生鐵銀生銅銀硫黃銀砒霜銀雄黃銀雌黃銀鑰石銀真水銀銀以上十二種是假銀不入藥用地圖經曰出饒州樂平諸坑生銀礦中狀如硬錫文理粗錯自然者真今坑中所得乃在土石中滲溜成條狀若絲髮土人謂之老翁須似此者極難得方書用生銀必得此乃真爾別録云銀生洛平盧氏縣褐色石打破內即白生於鉛坑中形如筍子此有變化之道亦曰自然牙亦曰生鉛又曰自然鉛可為利術不堪食鉛內銀性有毒可用結砂子一種硃砂銀冷無毒畏石亭脂磁石鐵及忌諸血有延年益色鎮心安神止驚悸辟邪治中惡蠱毒心熱煎煩憂忘虛劣之功故附於此衍義曰其生銀即是不自礦中出而特然自生者又謂之老翁須亦取像而言之耳時採無時用紋理粗錯自然生者佳質狀如硬錫色白味辛性寒散氣氣之薄者陽中之陰臭朽主鎮心安神反畏石亭脂磁石制雷公云金銀銅鐵氣凡使在藥中用時即渾安置於藥中借氣生藥力而已若以金銀銅鐵入於藥中用之俱消人脂也治療日華子云治小兒沖惡熱毒煩悶水磨服別録云身有赤疵常以銀揩令熱不久漸漸消除禁其性戾服之傷肝石之水水銀有毒石生水銀出神農本經主疹瘻痂音加瘍音羊白禿殺皮膚中蝨墮胎除熱殺金銀銅錫毒熔化還復為丹久服神仙不死以上朱字神農本經以敷男子陰陰消無氣以上黑字名醫所録名汞澒紅董切地圖經曰生符陵平土今出秦商道等州邵武軍而秦州者來自西羌界經云出自丹砂者乃是山中採粗次硃砂和硬炭屑勻內陽城罐內令實以薄鐵片可罐口作數小孔掩之仍以鐵線羅固一罐貯水承之兩口相接鹽泥和豚毛固濟上罐及縫處候乾以下罐入土出口寸許外置爐圍火煅煉旁作四竇欲氣達而火熾也候一時則成水銀溜於下罐矣陶隱居云今水銀有生熟符陵平土者是出硃砂腹中亦別出沙地皆青白色最勝今不聞有此至於西羌來者彼人亦云如此燒煅但其山中所生極多至於一山自折裂人採得砂石皆大塊如升斗碎之乃可燒煅故西來者極多於南方但不及生者甚能銷化金銀成泥人以鍍物是也按廣雅謂之澒丹灶家乃名汞蓋字亦通用爾衍義曰水銀入藥雖各有法極須審謹有毒故也唐韓愈云太學博士李干遇信安方士柳賁能燒水銀為不死藥以鉛滿一鼎按中為空實以水銀蓋封四際燒為丹砂服之下血比四年病益急乃死余不知服食之說起自何時殺人不可計而世慕尚之益至此其惑也在方冊所記及耳聞傳者不說今親與之遊者刑部尚書等官李遜輩亦服此藥敗者六七人矣痛可惜哉近世有水銀燒成丹砂醫人不曉研為藥衣或入藥中豈弗違誤可不慎歟時採無時收以竹筒成貯或瓷器葫蘆收之質類熔錫色白味辛性寒氣氣之薄者陽中之陰臭朽主殺蟲疥下死胎助得鉛則凝得硫黃則結得紫河車則伏與棗肉研之則散反畏磁石制雷公云凡使勿用草中取者並舊朱漆中者及經別藥制過者在尸過者半生半死者若在硃砂中産出者其色微紅收得後用葫蘆貯之則免遺失若先以紫背天葵並夜交藤自然汁二味同煮一伏時其毒自退每修十兩用前二味汁各七鎰和合煮足為度治療藥性論云療瘑疥殺蟲日華子云治天行熱疾催生下死胎惡瘡除風安神鎮心陳藏器云利水道去熱毒禁婦人服之絶娠及墮胎入人耳能食腦至盡入肉令百節攣縮倒陰絶陽解殺五金毒鍍金燒粉人患風須飲酒食肥豬肉及服鐵漿以御其毒石之金水銀粉無毒煅煉成水銀粉主通大腸敷小兒疳並瘰癧殺瘡疥癬蟲及鼻上酒渣風瘡燥癢名醫所録名汞粉輕粉峭粉謹按升符陵平土水銀作輕粉凡作粉先要作曲其作曲之法以皂礬一斤鹽減半二味入舊鐵鍋內以慢火炒之仍以鐵方鏟攪不住手炒乾成曲如柳青色其升粉法先置一平臺高三尺余徑二尺不拘磚垍以荊柴炭一斤碎之如核桃大爖於臺上扇熾每升粉一料用水銀一兩二錢曲二兩二錢內石臼內石杵研不見水銀星為度卻入白礬粗末二錢三味攪勻平攤鐵鏊中心約厚三分許鵝翎遍插小孔將澄漿瓦盆覆之縫以鹽泥固濟勿令太實實則難起置鏊於熾火上候微熱以手蘸水輕抹其縫及盆復用磚疏立鏊下周護火氣待火盡盆溫揭之勿令手重重則振落其粉凝於盆底狀若雪花而瑩潔以翎掃之瓷器收貯其盆鏊濁滓入後料再升此法目經修煉詳不過此收瓷器貯之用有鋒芒入水不沉者佳質類雪花色白味辛性冷氣氣之薄者陽中之陰主殺蟲反畏磁石石黃制研細用治療衍義曰小兒涎潮瘛瘲以此主之禁虛人不宜服忌一切血贋寒水石糯米粉明瓦屑為僞石之水靈砂無毒煅煉成靈砂主五臟百病養神安魂魄益氣明目通血脈止煩滿益精神殺精魅惡鬼氣久服通神明不老輕身神仙令人心靈名醫所録名二氣砂地謹按升煉之法用符陵平土水銀四兩入鐵鍋內以硫黃末一兩徐徐投下慢火炒作青砂頭候冷研細內陽城罐中上坐鐵盞將鐵線纏束數匝釘紐之彈線聲清亮為緊以赤石脂入鹽密封其縫仍用鹽泥和豚毛通令固濟厚一大指許日乾之藉以鐵架為磚作爐外以文火自下煅至罐底約紅寸余以香燼一炷復用武火漸加至罐口候香燼二炷為度鐵盞貯水淺則益之乃既濟之義也候冷取出其砂升凝盞底如束針紋者則成就矣收瓷器盛貯用砂如束針紋者質類密陀僧而赤色紫赤味甘性溫緩氣氣味俱厚陽也臭腥主安魂魄益精神反畏鹹水惡磁石制研細用治療別録云除風冷密陀僧有小毒土生密陀僧主久痢五痔金瘡面上瘢𩈅面膏藥用之名醫所録名沒多僧地圖經曰舊不載所出州土注云出波斯國今嶺南閩中銀銅冶處亦有之其初採礦時銀銅相雜先以鉛同煎煉銀隨鉛出又採山木葉燒灰開地作爐填灰其中謂之灰池置銀鉛於灰上更加火大鍛鉛滲灰下銀結灰上候火冷出銀其灰池感鉛銀之氣積久遂成此物即銀鉛腳也今之用者往往是此未必胡中來者形似黃龍齒而堅重者佳別録云今之市者乃是用瓷瓶實鉛丹鍛成塊大者尚有瓶之形狀銀冶所出最良而罕有其外國來者則未嘗見之時採無時用金色者為好質類黃龍齒而堅重色黃味鹹辛性平軟氣味厚於氣陰中之陽臭腥主澀痢去𩈅制雷公云凡使搗令細於瓷堝中安置用重絹袋盛柳蚛末焙密陀僧堝中次下東流水浸令滿火煮一伏時足去柳末絹袋取用治療蜀本注云主諸痔及腸癖下血不止日華子云鎮心補五臟驚癇嗽嘔及吐痰別録云治口瘡豆瘡瘢面靨合治合人乳調塗面治䵟𪒟斑點及令面上生光並㾴鼻皰水之木珊瑚無毒石生珊瑚主宿血去目中翳鼻衄末吹鼻中名醫所録地圖經曰生南海及波斯國師子國今廣州亦有之生海底作枝柯狀明潤如紅玉中多有孔亦有無孔者枝柯多者更難得海中經曰取珊瑚先作鐵網沉水底珊瑚貫中而生歲高三二尺有枝無葉因絞網出之皆摧折故難得完好者漢積翠池中有高一丈餘者夜有光影晉石崇家有高六七尺今並不聞有此高大者衍義曰一種紅油色有細縱紋可愛又有鉛丹色無縱紋者為下入藥用紅油色者嘗見一本高尺許兩枝直上分十餘岐將至其顛則交合連理仍紅潤有縱紋亦一異也其所初生時白如菌一歲而黃三歲則赤枝幹交錯高三四尺網發其根絞而出之失時不取則腐矣時採無時用紅色有細縱紋者佳質類琅玕而紅潤色紅味甘性平緩氣氣之薄者陽中之陰臭朽主鎮心止驚退翳目石之石瑪瑙無毒石生瑪瑙主辟惡尉目赤爛名醫所録地圖經曰自西國玉石間來紅色似馬腦亦美石之類重寶也今中國貴以為器陳藏器云出日本國用砑木不熱者為上砑木熱者非真也衍義曰馬腦非石非玉自是一類有紅白黑色三種亦有其紋如纏絲等理出西裔者佳彼土人以小者碾為玩好之物大者碾為器今古方藥多用之時採無時用砑木不熱者為佳質類玉而有紋彩色紅白味辛性寒散氣氣之薄者陽中之陰臭朽二十種陳藏器余天子借田三推犁下土無毒主驚悸癲邪安神定魄強志入官不懼利見大官宜婚市王者所封五色土土亦其次焉已前主病正爾水服余皆藏寶社壇四角土牧宰臨官自取以塗門戶主盜不入境今郡縣皆有社壇也土地主斂萬物毒人患發背者掘地為孔一頭傍通取風以穴大小可腫處仰臥穴上令癰入穴孔中吸之作三五個覺熱即易仍以物借他處又人卒患急黃熱盛欲死者於沙土中掘坎斜埋患人令頭出土上灌之久乃出曾試有效當是土能收攝熱也又人患丹石發腫以腫處於濕地上臥尉之地熱易之市門土無毒主婦人易産取土臨月帶之又臨月産時取一錢匕末酒服之又捻為丸小兒於苦瓠中作白龍乞兒此法崔知悌方文多不録自然灰主白癜風癧瘍重淋取汁和醋先以布揩白癜風破敷之當為創勿怪能軟琉璃玉石如泥至易雕刻及浣衣令白洗惡瘡疥癬驗於諸灰生海中如黃土南中異物志云自然灰生南海畔可浣衣石得此灰即爛可為器今馬瑙等形質異者先以此灰埋之令軟然後雕刻之也鑄鐘黃土無毒主卒心痛疰忤惡氣置酒中溫服之彌佳也戶垠下上無毒主産後腹痛末一錢匕酒中熱服之戶者門之別名也新注云和雄雀糞暖酒服方寸匕治吹彌效鑄鏵鋤孔中黃土主丈夫陰囊濕癢細末摸之亦去陰汗最佳瓷塸中里白灰主遊腫醋磨敷之瓷器物初燒時相隔皆以灰為泥然後燒之塸瓷也但看里有即收之彈丸土無毒主難産末一錢匕熱酒調服之大有功效也執日取天星上土和柏葉薰草以塗門戶方一尺盜賊不來抱朴子亦云有之大甑中蒸土一兩碩熱坐臥其上取病處熱徹汗遍身仍隨疾服藥和鼠壤用亦得蚡鼠壤堆上土苦酒和為泥敷腫極效又云鬼疰氣痛取土以秫米甘汁搜作餅燒令熱以物裹尉痛處凡蚡鼠是野田中尖嘴鼠也冢上土及磚石主溫疫五月一日取之瓦器中盛埋之著門外階下閣家不患時氣又正月朝早將物去冢頭取古磚一口將咒要斷一年無時疫懸安大門也桑根下土搜成泥餅敷風腫上仍灸三二十壯取熱通瘡中又人中惡風水肉腫一個瘥以土碗灸二百壯當下黃水即瘥也春牛角上土收置戶上令人宜田土蜂窠上細土主腫毒醋和為泥敷之亦主蜘蛛咬土蜂者在地土中作窠者是載鹽車牛角上土主惡瘡黃汁出不瘥漸潰者取土封之即止牛角謂是車邊脂角也好用驢溺泥土主蜘蛛咬先用醋泔汁洗瘡然後泥敷之黑驢彌佳浮汁洗之更好故鞋底下土主人適他方不伏水土刮取末和水服之不伏水土與諸病有異即其狀也
