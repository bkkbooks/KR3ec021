body:
  text: 卷之十一草部中品之中草之草紫參無毒植生紫參出神農本經主心腹積聚寒熱邪氣通九竅利大小便以上朱字神農本經療腸胃大熱唾血衄血腸中聚血癰腫諸瘡止渴益精以上黑字名醫所錄名牡蒙眾戎童腸馬行苗圖經曰苗長一二尺莖青而細葉亦青似槐葉亦有似羊蹄者五月開花白色似蔥花亦有紅紫色似水葒者根皮紫黑肉紅白色如地黃狀別錄云一種團聚而生根黃赤有紋皮黑中紫五月華紫赤其實黑大如豆地圖經曰生河西及冤句山谷今河中解齊淮蜀州郡皆有之道地滁州濠州眉州蒲州晉州時生春初生苗採三月六月取實收曬乾用根脂潤者為好質類人參而團聚色紫味苦辛性寒微寒氣氣之薄者陰中之陽臭香主心腹堅脹反畏辛夷制火炙令紫治療藥性論云散瘀血去心腹堅脹婦人血閉不通合治以半斤用水五升煎二升內甘草二兩煎取半升分三服療痢藁本無毒植生藁本出神農本經主婦人疝瘕陰中寒腫痛腹中急除風頭痛長肌膚悅顏色以上朱字神農本經闢霧露潤澤療風邪嚲曳金瘡可作沐藥面脂實主風流四肢以上黑字名醫所錄名鬼卿地新微莖苗圖經曰葉似白芷香如芎藭但芎藭似水芹而大藁本葉細耳五月有白花七八月結子根上苗下似禾藁故以為名也陶隱居云俗中皆用芎藭其根鬚形氣乃相類桐君藥錄言芎藭苗似藁本論說花實皆不同所生處又異今東山別有藁本形氣甚相似惟長大爾地圖經曰生崇山山谷西川河東州郡兗州杭州唐本注云出宕州者為勝道地幷州威勝軍寧化軍時生春生苗採正月二月取根收曝乾三十日用根粗大者為好色黑味辛苦性溫散氣氣厚味薄陽也丹溪云陽中微陰臭香主風邪頭疼行足太陽經反畏青葙子惡䕡茹制去蘆水浸潤銼用治療藥性論云治一百六十種惡風鬼疰流入腰痛冷能化小便通血去頭風䵟疱日華子云療癇疾並皮膚疵皯酒渣粉刺湯液本草云太陽經風藥逐寒邪結鬱於本經治頭痛腦痛大寒犯腦令人腦痛齒亦痛並巔頂痛合治合木香療霧露之氣合白芷作面脂藥石葦無毒附瓦葦叢生石葦出神農本經主勞熱邪氣五癃閉不通利小便水道以上朱字神農本經止煩下氣通膀胱滿補五勞安五臟去惡風益精氣以上黑字名醫所錄名石䩾之夜切石皮苗圖經曰叢生石上葉如柳葉背有毛而斑點如皮故名石葦唐本注云生石旁陰處不蔓延福建一種三月有花采葉煎湯浴之主風有生於古瓦屋上者謂之瓦葦地圖經曰生華陰山谷及晉絳滁福州江寧府皆有之陶隱居云建平今處處有之生山谷石上道地海州時生春生苗採二月取葉以不聞水及人聲者良收陰乾用葉質類柳葉而長大色綠味苦甘性平泄氣味厚於氣陰中之陽臭朽主補勞利水助絡石杏仁為之使得菖蒲良制去黃毛微炙治療藥性論云除勞及主五淋胞囊結熱不通膀胱熱滿日華子云治淋瀝遺溺合治炒末合酒調服療發背禁誤用葉上黃毛射入肺令人咳不可療萆薢無毒蔓生萆薢出神農本經主腰背痛強骨節風寒濕周痹惡瘡不瘳熱氣以上朱字神農本經傷中恚怒陰痿失溺關節老血老人五緩以上黑字名醫所錄名白菝葜赤節苗圖經曰根黃白色多節大三指許苗葉俱青作蔓生葉作三叉似山芋又似綠豆葉花有黃紅白數種亦有無花結白子者舊說此藥有二種莖有刺者根白實無刺者根虛軟以軟者為勝今成德軍所產者根亦如山芋體硬其苗引蔓葉似蕎麥子有三稜陶隱居云亦似菝葜而小異根大不甚有角節其色小淺耳地圖經曰出真定山谷今河陝及荊蜀諸郡陶隱居云今處處有之道地興元府鞏州荊門軍成德軍時生春生苗採二月八月取根收曝乾用根質類菝葜而有須色黃白味苦甘性平緩氣味厚於氣陰中之陽臭香主諸痹強筋骨助薏苡為之使反畏葵根大黃茈胡牡蠣前胡制細銼用治療藥性論云治冷風𤸷痹腰腳不遂手足驚掣男子䓶腰痛久冷是腎間有膀胱宿水日華子云治癱瘓軟風頭旋癇疾中風失音效補日華子云壯水臟堅筋骨益精明目合治合杜仲末溫酒調服療丈夫腰腳痹緩急行履不穩合淨貫眾等分為末名如聖散空心酒調服二錢治腸風痔漏贗菝葜為偽杜蘅無毒散生杜蘅主風寒咳逆香人衣體名醫所錄名馬蹄香苗圖經曰苗葉都似細辛惟香氣小異而根亦粗黃白色葉似馬蹄故名馬蹄香山海經雲天帝之山有草狀如葵其臭如蘼蕪食之可以已癭郭璞注云帶之可以走馬或曰馬得之而健走也今人作浴湯及衣香甚佳衍義曰杜蘅用根似細辛但根色白葉如馬蹄之下市者往往亂細辛須如此別之爾雅以謂似葵而香是也將杜蘅與細辛相對便見真偽況細辛惟出華州者良杜蘅其色黃白拳局而脆干則作團地圖經曰生江淮間及水澤下濕地今處處皆有之時生春生苗採三月三日取根收曝乾用根質類白薇細小而拳促色白味辛性溫散氣氣之厚者陽也臭香主氣奔喘促消痰飲制去蘆梗葉並洗去土銼用治療藥性論云破留血及項間瘤癭贗及已為偽白薇無毒植生白薇出神農本經主暴中風身熱肢滿忽忽不知人狂惑邪氣寒熱痠疼溫瘧洗洗髮作有時以上朱字神農本經療傷中淋露下水氣利陰氣益精久服利人以上黑字名醫所錄名白幕春草薇草骨美苗圖經曰莖葉俱青頗類柳葉六七月開紅花八月結實根黃白色類牛膝而短小者是也地圖經曰生平原川穀今陝西諸郡及舒潤遼州亦有之陶隱居云近道處處有之道地滁州時生春生苗採三月三日取根收陰乾用根質類牛膝而短細色黃白味苦鹹性平大寒氣味厚於氣陰中之陽臭香主風狂溫瘧反惡黃耆大黃大戟乾薑乾漆山茱萸大棗制雷公云以糯米泔汁浸一宿至明取出去須了於槐砧上細銼蒸從巳至申出用治療陶隱居云治驚邪疰病藥性論云主百邪鬼魅草之木菝葜無毒植生菝蒲八切葜棄八切主腰背寒痛風痹益血氣止小便利名醫所錄名金剛根王瓜草苗圖經曰苗莖成蔓長二三尺有刺其葉如冬青烏藥葉又似菱葉差大秋生黃花結黑子大如櫻桃許其根作塊赤黃色江浙人呼為金剛根是也地圖經曰生山野近京及江浙州郡多有之道地成德軍海州江州江寧府時生春生苗採二月八月取根收曝乾用根結塊者為好質類萆薢色黃褐味甘性溫平緩氣氣厚於味陽中之陰臭朽主散腫毒益血氣治療日華子云治時疾瘟瘴葉治風腫止痛合治葉合鹽搗敷撲損惡瘡合米釀酒療風毒腳弱痹滿上氣草之草大青無毒叢生大青主療時氣頭痛大熱口瘡名醫所錄苗圖經曰春生莖長尺許青紫色苗葉似石竹花紅紫色似馬蓼亦似芫花而根黃色耳地圖經曰生江東州郡及荊南眉蜀濠淄諸州皆有之道地信州時生春生苗採三月四月取莖葉收陰乾用莖葉質類馬蓼色青紫味苦性大寒氣氣薄味厚陰也臭腥主時行熱疾治療陶隱居云治傷寒時行熱毒藥性論云去大熱並溫疫寒熱日華子云療熱風心煩悶渴疾口乾小兒身熱疾風天行熱疾兼塗罯腫毒合治入葛根湯服療傷寒頭痛身強腰脊痛解金石藥毒草之走女葳無毒蔓生女葳主風寒洒洒霍亂泄痢腸鳴遊氣上下無常驚癇寒熱百病出汗李氏本草云止下消食名醫所錄名蔓楚苗唐本注云蔓生葉似白蘞花白子細荊襄之間名為蔓楚是也地唐本注云出荊襄之間時生初春生苗採二月取莖收陰乾用苗色青味辛性溫散氣氣之厚者陽也臭香主霍亂驚癇制雷公云凡使去頭並白蕊槐砧上銼拌豆淋酒蒸從巳至未出曬令乾用草之草石香葇無毒叢生石香葇主調中溫胃止霍亂吐瀉心腹脹滿臍腹痛腸鳴名醫所錄名石蘇苗圖經曰苗葉類萱草根似石菖蒲生山岩石縫中衍義曰石香葇處處有之不必山岩石縫中但山中臨水附崖處或有之九月十月尚有花地圖經曰生蜀郡陵榮資簡州及南中今處處有之時生春生苗採二月八月取莖收陰乾用莖花實色青綠味辛性溫散氣氣之厚者陽也臭香主調中溫胃艾葉無毒叢生艾葉主灸百病可作煎止下痢吐血下部䘌瘡婦人漏血利陰氣生肌肉闢風寒使人有子名醫所錄名冰臺醫草苗圖經曰初春布地生苗莖類蒿而葉背白甚香灸百病尤勝用之以苗短者為佳地圖經曰生田野今處處有之道地蘄州明州時生春生苗採三月三日五月五日取葉收曝乾作煎勿令見風用葉實質類菊葉而背白有毛色青白味苦性微溫泄氣味厚於氣陰中之陽臭香主灸百病止崩血制去枝梗揉如絮用治療圖經曰生搗汁止心腹惡氣熟用塌金瘡及中風掣痛不仁不隨陶隱居云止傷血並殺蛔蟲唐本注云主下血及膿血痢藥性論云止崩血安胎除腹痛實主明目並一切鬼氣日華子云葉止霍亂轉筋並心痛鼻洪及帶下湯液本草云溫胃別錄云治傷寒時氣溫病頭痛壯熱脈盛煮服補圖經曰補虛羸日華子云實壯陽助水臟強腰膝暖子宮合治合醋煎療癬及赤白痢下並臟痔瀉血實合乾薑末蜜丸如梧桐子大服療一切冷氣鬼邪毒氣最去惡氣鼠黏子無毒植生鼠黏子主明目補中除風傷根莖療傷寒寒熱汗出中風面腫消渴熱中逐水久服輕身耐老名醫所錄名牛蒡子惡實根蝙蝠刺牛菜苗圖經曰葉如芋而長實似葡萄核而褐色外殼如慄梂小而多刺鼠過之則綴惹之不可脫故謂鼠黏子亦如羊負來之義也根有極大者作菜茹益人衍義曰惡實是子也今謂之牛蒡子在萼中萼上有細鉤多至百十未去萼時又謂之鼠黏子根長一二尺粗如拇指謂之牛菜本為一物而根實之名不同耳地圖經曰生魯山平澤今處處有之道地蜀州時生春生葉夏結實採秋後取子冬月取根收曝乾用根實莖質實類柏子而匾色黑褐味辛性平散氣氣之薄者陽中之陰臭香主咽喉痛瘡瘍毒行通十二經脈制雷公云用子淨揀勿令有雜子凡用以酒拌蒸待上有白霜拭去焙乾別搗如粉入藥用根以竹刀或荊刀刮去皮去蒸曝之治療唐本注云子除諸風癥瘕冷氣吞一枚可出癰疽頭根主牙齒疼痛勞瘧腳緩弱風毒癰疽咳嗽傷肺肺癰疝瘕積血藥性論云根主面目煩悶四肢不健通十二經脈洗五臟惡氣陳藏器云子消風毒腫諸瘻葉搗敷杖瘡不膿闢風湯液本草云子利咽膈潤肺散氣別錄云子散肢節筋骨煩熱毒根搗汁療時氣餘熱不退煩躁發渴四肢無力不能飲食莖葉取汁夏月多浴去皮間習習如蟲行風洗了慎風少時並消一切腫毒補藥性論云根作菜食令人身輕合治子末浸酒任性服多少除諸風明目利腰腳合馬藺子療喉痹合荊芥穗等分療瘡疱將出如瘡疹巳出服之亦妙合浮萍薄荷等分療皮膚風熱遍身生癮疹合荊芥炙甘草療風壅痰涎多唾咽膈不利根搗汁合蜜服療中暴風莖葉搗取濃汁合無灰酒鹽花煻火煎成膏摩療風頭及腦掣痛不可禁者亦主時行頭痛禁用根鬚蒸曝乾不爾令人吐解丹石毒草之走水萍無毒浮生水萍出神農本經主暴熱身癢下水氣勝酒長鬚發主消渴久服輕身以上朱字神農本經下氣以沐浴生毛髮以上黑字名醫所錄名水花水白水蘚芣菜苗圖經曰此是水中大萍葉圓闊寸許葉下有一點如水沫名芣菜爾雅謂之蘋其大者曰蘋季春始生可糝蒸以為茹也蘇恭云此有三種大者曰蘋中者曰荇菜即下條之鳧葵小者曰浮萍即溝渠間生者是也高供奉歌曰不在山兮不在岸採我之時七月半選甚癱風與瘓風些小微風都不筭豆淋酒內下三丸鐵幞頭上也出汗地圖經曰生雷澤池澤今處處溪澗水間皆有之時生春生採三月七月取收曝乾用葉質類鳧葵色青綠味辛酸性寒散氣氣薄味厚陰中之陽臭腥主消水腫利小便制為末或搗汁用治療圖經曰惡疾遍身瘡濃煮汁漬浴之日華子云治毒風熱疾熱狂㶸腫毒湯火瘡風疹陳藏器云小萍子末敷面䵟亦可敷熱瘡又為膏長髮合治合栝蔞人乳為丸止消渴為末合酒服除中毒合雞子清貼發背毒腫焮熱赤爛浮萍草一兩以四月十五日者合麻黃去節根桂心附子炮裂去臍皮各半兩搗篩每服二錢以水一中盞入生薑半分煎至六分不拘時和滓服治時行熱病汗出乃瘥解蛇咬毒入腹搗絞汁飲之王瓜無毒蔓生王瓜出神農本經主消渴內痹瘀血月閉寒熱痠疼益氣愈聾以上朱字神農本經療諸邪氣熱結鼠瘻散癰腫留血婦人帶下不通下乳汁止小便數不禁逐四肢骨節中水療馬骨刺人瘡以上黑字名醫所錄名土瓜老鴉瓜葵與暌同菇與姑同鉤菇苗圖經曰月令云四月王瓜生即此也蔓生葉似栝蔞圓無叉缺有刺如毛五月開黃花花下結子如彈丸而長生青熟赤根似葛細而多糝謂之土瓜根北間者其實累累相連大如棗皮黃肉白苗葉都相似但根狀不同耳衍義曰王瓜體如栝蔞其殼徑寸一種長二寸許上微圓下尖長七八月間熟紅赤色殼中子如螳螂頭者今人又謂之赤雹子其根即土瓜根也於細根上又生淡黃根三五相連如大指許根與子兩用地圖經曰生魯地平澤田野及人家牆垣間今處處有之時生四月生苗採三月取根七八月取實收陰乾用根實葉質實類栝蔞實而小長根類葛細而多糝色紅味苦性寒泄氣味厚於氣陰也臭腥制銼碎用治療唐本注云王瓜除黃疸破血藥性論云子主蟲毒並小便數遺不禁日華子云子潤心肺除黃病生用肺痿吐血腸風瀉血赤白痢炒用根主通血脈天行熱疾酒黃病壯熱心煩悶吐痰痰瘧排膿熱勞撲損消瘀血破症癖落胎陳藏器云王瓜主蠱毒小兒閃癖痞滿並瘧根及葉搗絞汁服當吐下宜少進之有小毒故也別錄云土瓜根主小便不通及關格生搗根取汁以少水解之筒中吹下部取通合治土瓜根末合酒服下乳汁每服一錢日三禁妊娠不可服草之草地榆無毒植生地榆出神農本經主婦人乳痓痛七傷帶下病止痛除惡肉止汗療金瘡以上朱字神農本經止膿血諸瘻惡瘡熱瘡消酒除消渴補絕傷產後內塞可作金瘡膏以上黑字名醫所錄名玉豉苗圖經曰宿根生苗布地莖直高三四尺對分出葉葉似榆少狹細長作鋸齒狀青色七月開花如椹子紫黑色又如豉故名玉豉根外黑裡紅似柳根其葉山人乏茗時採之作飲地圖經曰生桐柏冤句山谷及平原川澤今處處有之道地江寧府衡州時生三月生苗採二月八月取根收曝乾用根如綿軟者為好質類續斷而肥色黑味苦甘酸性微寒收氣味厚於氣陰也臭腥主月經不止腸風瀉血助得發良反惡麥門冬制去蘆銼碎治療圖經曰止小兒疳痢煮之如飴糖服之便愈唐本注云除帶十二病孔氏音義云一曰多赤二曰多白三曰月水不通四曰陰蝕五曰子臟堅六曰子門僻七曰合陰陽患痛八曰小腹寒痛九曰子門閉十曰子宮冷十一曰夢與鬼交十二曰五臟不定藥性論云除產後余瘀疹痛七傷愈金瘡止血痢蝕膿日華子云排膿止吐血鼻洪月經不止血崩產前後諸血疾及赤白痢水瀉濃煎止腸風合治合鼠尾草療下血二十年者等分水煎服禁虛寒人及水瀉白痢者不可輕用解搗根汁飲之解毒蛇螫人猘犬咬傷之毒大薊無毒植生大薊主女子赤白沃安胎止吐血衄鼻令人肥健名醫所錄名刺薊山牛蒡苗衍義曰大小薊皆相似花如髻但大薊高三四尺葉皺小薊高一二尺許葉不皺以此為異謹按本經大小薊混名同條然大薊生山谷而小薊生平澤二薊莖葉相似比小薊但肥大耳以功力言之則有殊也二物皆能破血大薊破血之外亦療癰腫而小薊專主血疾不能消癰腫也地圖經曰舊不著所出州土今處處有之道地薊州山谷時生二月生苗採四月取苗九月取根收陰乾用根苗花葉質類紅藍花色青味苦性平泄氣味厚氣薄陰中之陽臭香主諸血瘡腫制銼碎用治療圖經曰消癰腫藥性論云止崩中下血別錄云根煮汁服治陰冷漸漸冷氣入陰囊腫滿夜疼悶不得眠補日華子云滋養下氣合治葉汁合酒並小便療腸癰腹臟瘀血血暈撲損合鹽研窨敷惡瘡疥癬忌犯鐵器小薊無毒植生小薊根主養精保血名醫所錄名青刺薊千針草苗圖經曰苗高一二尺許葉多刺心中出花頭如紅藍花而青紫色北人呼為千針草初生二三寸時並根作茹食之甚美然小薊力微只可退熱不似大薊能補養下氣也衍義曰山野人取為蔬甚適用雖有微芒亦不能害人地圖經曰舊不著所出州土今處處有之陶隱居云田野甚多唐本注云生平澤別錄云北地者為勝道地冀州時生二月生苗五月開花採四月取苗九月取根收陰乾用根苗葉質類紅藍花而短小色青味甘性溫緩氣氣之厚者陽也臭香主諸血制銼碎用治療圖經曰根汁止吐血衄血下血唐本注云破血日華子云根除熱毒風並胸膈煩悶開胃下食退熱苗生研汁服去煩熱陳藏器云破宿血止新血暴下血血崩金瘡出血等小薊絞取汁溫服別錄云作菜煮食之除風熱根主崩中又女子月候傷過葉主封金瘡血不止取汁服療夏月熱煩悶不止並心熱吐血又鼻窒塞不通補日華子云根益虛損合治作煎和糖合金瘡及蜘蛛蛇蠍毒搗汁合蜜少許療乳石發動壅熱心悶吐血搗汁合酒服或末以水調服三錢治九竅出血忌犯鐵器海藻無毒附石帆水松馬藻水生海藻出神農本經主癭瘤氣頸下核破散結氣癰腫癥瘕堅氣腹中上下鳴下十二水腫以上朱字神農本經療皮間積聚暴潰留氣熱結利小便以上黑字名醫所錄名落首藫䓞海蘿苗圖經曰葉似𣚊音薤生海中根著水底石上黑色如亂髮而粗大類水藻謂之大葉藻一種如短馬尾者生淺水細而黑色海人以繩繫腰沒水下則得之二種不分功狀總謂之海藻者由其皆生於海其味鹹能軟堅之義也若詩所謂於以採藻於彼行潦陸機云藻水草也生水底亦有二種一種葉如雞蘇莖似筋長四五尺一種莖如釵股葉如蓬蒿謂之聚藻二藻但能作茹而已非海中所生者其味未必咸其功未必同也又有石帆平無毒生海嶼石上狀如柏梗高尺許如筋紫色無葉見風漸硬色如漆其華離樓相貫連死則浮水中人於海邊得之稀有見其生者水松其形似松出南海交趾又有馬藻大寒生水上如馬齒相連者是也三物各有療疾之功故並附之地圖經曰生東海池澤今出登萊諸州海中皆有之時生無時採七月七日取收曝乾用莖葉質類水藻而細色黑味咸性寒軟氣氣薄味厚陰也臭腥主散癰瘰潰堅腫反甘草制雷公云凡使先須用生烏豆並紫貝天葵同蒸一伏時候曬乾用之治療圖經曰治水癊藥性論云闢百邪鬼魅除氣疾急滿去疝氣下墜疼痛核腫腹中雷鳴幽幽作聲孟詵云起男子陰氣消男子潰疾別錄云消宿食療五膈痰壅水氣浮腫腳氣賁豚氣陶隱居云水松療溪毒陳藏器云馬藻大寒搗敷小兒赤白遊疹火焱熱瘡絞汁服去暴熱熱痢止渴石帆主婦人血結月閉石淋合治合酒漬數日稍稍飲之療頷下瘰癧如梅李並療頸下卒結囊欲成癭禁北人不可多食食之倍生諸病妊娠亦不可服水松食之生水腫澤蘭無毒植生澤蘭出神農本經主乳婦內衄中風余疾大腹水腫身面四肢浮腫骨節中水金瘡癰腫瘡膿以上朱字神農本經產後金瘡內塞以上黑字名醫所錄名虎蘭龍棗虎蒲水香苗圖經曰根紫黑色似粟根二月生苗高二三尺莖幹青紫色作四稜葉生相對如薄荷微香七月開花帶紫白色萼通紫色亦似薄荷花荊湖嶺南人家多種之壽州出者無花子與蘭草大抵相類但蘭草生水旁無枝幹葉光潤根小紫而澤蘭生水澤中及下濕地葉尖微有毛不光潤方莖紫節雷公云使須分別大澤蘭形葉圓根青黃生血調氣與榮合小者迥別地圖經曰生汝南諸大澤傍今荊隨壽蜀州河中府皆有之道地徐州梧州時生春生苗採三月三日取莖葉收陰乾用莖葉質狀如薄荷色青紫味苦甘性微溫泄氣氣厚味薄陽中之陰臭微香主養血氣去虛腫助防己為之使制雷公云凡修事細銼以絹袋盛懸於屋南畔角上令乾用治療藥性論云治產後肚腹痛血氣衰冷成勞瘦羸又除通身面目大腫並婦人血瀝腰痛日華子云通九竅利關脈破宿血消癥瘕產前產後百病通小腸長肉生肌消撲損瘀血治鼻洪吐血頭風目痛婦人勞瘦丈夫面黃別錄云小兒蓐瘡嚼澤蘭心封上昆布無毒附紫菜水生昆布主十二種水腫癭瘤聚結氣瘻瘡名醫所錄苗陶隱居云生南海葉如手大似薄葦紫色出高麗綯作繩索如卷麻而黃黑色柔韌可食海藥云生東海水中其草順流而生新羅者黃黑色葉細胡人採得搓之為索又有一種紫菜附石生南海上正青取干之則紫色而亦有療疾之功故附於此地圖經曰生東海今亦出登萊諸州陶隱居云出高麗及南海有之時生無時採無時收陰乾用葉質類紫菜而匾厚色紫赤味咸性寒軟氣味厚於氣陰也臭腥主散癭瘰潰堅腫制雷公云凡使先同弊甑箄煮去鹹味焙細銼用每修事一斤用甑箄大小十個同昆布細銼二味各一處下東流水從巳煮至亥水旋添勿令少治療藥性論云利水道去面腫並惡瘡鼠瘻陳藏器云陰㿉含之咽汁紫菜味甘寒主下熱煩多食令人腹痛發氣吐白沫飲少熱醋消之合治搗末合醋浸含之咽津治癭氣結核瘰瘰腫硬禁久服瘦人妊娠亦不可服草之走防己無毒附木防己蔓生防己出神農本經主風寒溫瘧熱氣諸癇除邪利大小便以上朱字神農本經療水腫風腫去膀胱熱傷寒寒熱邪氣中風手腳攣急止泄散癰腫惡結諸蝸疥癬蟲瘡通腠理利九竅以上黑字名醫所錄名離解苗圖經曰漢中出者苗葉小類牽牛莖梗甚嫩折其莖一頭吹之氣從中貫如木通類截斷有紋如車輻色黃堅實而香它處者青白虛軟及有腥氣皮皺上有丁足子名木防己不任用也地圖經曰生興化軍黔中宜都建平華州道地漢中為勝時生春生葉採二月八月取根收陰乾用根大而有粉者為好質類木通黃實而香色黃味辛苦性平溫泄氣氣薄味厚陰中之陽臭香主利竅滲濕行十二經助殷孽為之使反漢防己畏萆薢惡細辛木防己畏女菀滷咸制雷公云凡用與車前根相對同蒸半日後出曬去車前草根細銼之治療陶隱居云療風水氣藥性論云祛濕風口面喎斜手足疼散留痰主肺氣嗽喘木防己治男子肢節中風毒風不語及散結氣壅腫溫瘧風水腫合治合葶藶等分為末糯米飲調服治肺痿咯血多痰忌生蔥解殺雄黃毒贗木通為偽草之草天麻無毒植生天麻主諸風濕痹四肢拘攣小兒風癇驚氣利腰膝強筋力久服益氣輕身長年名醫所錄名定風草龍皮赤箭脂苗圖經曰春生苗初出若芍藥獨抽一莖直上高三二尺如箭竿狀青赤色故名赤箭脂莖中空依半以上貼莖微有尖小葉稍頭生成穗開花結子如豆粒大其子至夏不落卻透虛入莖中潛生土內其根形如黃瓜連生一二十枚大者有重半斤或五六兩其皮黃白色陶隱居云莖端結實狀若續隨子至葉枯時子黃熟其根連一二十枚如天門冬之類亦如蘆菔大小不定彼人多生啖或蜜漬為果或蒸煮食之地圖經曰出鄆州利州泰山嶗山諸山今京東京西湖南淮南州郡亦有之道地邵州鄆州者佳時生春生苗採二月三月五月八月取根收曝乾用根白而明淨者為好質類黃瓜而微小色黃白味辛性平散氣氣之薄者陽中之陰臭香主諸風眩暈制初取得去蘆乘潤刮去皮蒸之曝乾用治療藥性論云治冷氣𤸷痹癱瘓不遂語多恍惚多驚失志日華子云殺鬼疰蠱毒通血脈關竅陳藏器云療熱毒癰腫別錄云主諸毒惡氣支滿寒疝下血子去熱氣補日華子云助陽氣五勞七傷禁御風草緣與天麻相似只是根莖有斑葉皆白有青點使御風草根若與天麻同用即令人有腸結之患高良薑無毒叢生高良薑主暴冷胃中冷逆霍亂腹痛名醫所錄苗圖經曰春生莖葉如姜苗而大高一二尺許花紅紫色如山姜陶隱居云形氣與杜若相似生嶺南者形大虛軟江左者細緊亦不甚辛其實一也地陶隱居云出高良郡今嶺南諸州及黔蜀皆有之道地儋州雷州時生春生苗採二月三月取根收曝乾用根質類菖蒲而堅色赤味辛性大溫氣氣之厚者陽也臭香主心腹冷痛制銼碎用治療藥性論云治腹久冷胃氣逆嘔吐祛風破氣腹冷氣痛及風冷痹弱並下氣冷逆衝心腹痛吐瀉日華子云治轉筋瀉痢反胃嘔食消食陳藏器云益聲好顏色合治為末合米飲調服治心脾痛以一錢匕立止解酒毒百部根唐本云有小毒叢生百部根主咳嗽上氣名醫所錄名婆婦草苗圖經曰春生苗作藤蔓葉大而尖長頗似竹葉面青色而光根下作撮如芋子一撮十五六枚黃白色陶隱居云其根數十相連似天門冬而苦強博物志云九真有一種草似百部但長大耳懸火上令乾夜取四五寸短切含咽汁勿令人知主暴嗽甚良名為嗽藥恐其土肥潤處是以長大為異雷公云忽有一窠自有八十三條者號曰地仙苗若修事餌之壽可千歲地圖經曰舊不著所出州土今江湖淮陝齊魯州郡皆有之道地衡州滁州陝州時生春生苗採二月三月八月取根收曝乾用根肥潤者佳質類天門冬而細小色黃白味苦甘性微寒氣氣厚味薄陽中之陰臭腥主益肺氣制雷公云凡用竹刀劈破去心酒浸一宿漉出焙乾用之或生用亦可治療藥性論云治肺熱上氣咳逆日華子云療疳蛔傳屍骨蒸勞殺蛔蟲寸白蟯蟲並治一切樹木蛀蚛補藥性論云潤肺合治汁合生薑汁煎服二合療合猝嗽炙合酒浸空腹飲去蟲蠶咬兼疥癬瘡贗今房山以萱草根蒸壓令匾市之亂真然百部根細潤肥膩而色黃白萱草根虛軟而色微紫為異耳茴香子無毒叢生茴香子主諸瘻霍亂及蛇傷名醫所錄名蘹音懷香子苗圖經云三月生葉似老胡荽極疏細作叢至五月高三四尺七月生花頭如傘蓋黃色結實如麥而小青色北人呼為土茴香者是今人家園圃種之甚多衍義曰茴香葉似老胡荽此誤矣胡荽葉如蛇床茴香徒有葉之名但散如絲髮特異諸草其枝上時有大青蟲形如蠶亦治小腸氣甚良地圖經曰本經不載所出今交廣諸蕃及近郡皆有之道地簡州時生春生葉採八月九月取實收陰乾用實色青褐味辛性平散氣氣厚於味陽也臭香主腎勞㿗疝行手太陽經少陰經足太陽經少陰經助得酒良制微炒搗碎用治療圖經曰除惡毒癰腫或連陰髀間疼痛急攣牽入小腹不可忍一宿則殺人者用茴香苗葉搗取汁服之其滓以貼腫上冬間根亦可用唐本注云茴香子主膀胱腎間冷氣及育腸氣調中止痛嘔吐藥性論云破一切臭氣又卒噁心腹中不安取莖葉煮食之即瘥日華子云茴香子除乾溼腳氣開胃下食及膀胱痛陰疼衍義曰茴香子療膀胱腫痛調和胃氣並小腸氣合治茴香子合生姜同搗令勻淨器內濕紙蓋一宿次以銀石器中文武火炒令黃焦為末酒丸桐子大服十丸茶酒下理脾胃進食生搗莖葉汁合熱酒等分服之療卒腎氣衝脅如刀刺痛喘息不得亦理小腸氣款冬花無毒叢生款冬花出神農本經主咳逆上氣善喘喉痹諸驚癇寒熱邪氣以上朱字神農本經消渴喘息呼吸以上黑字名醫所錄名橐吾顆凍虎鬚菟奚氐冬鑽凍苗圖經曰根紫色莖青葉紫似萆薢十二月開黃花青紫萼去土一二寸初出如菊花萼通直而肥實無子即陶隱居所謂出高麗百濟者近此類也又有紅花者葉如荷而鬥直大者容一升小者容數合俗呼為蜂鬥葉又名水斗葉即唐注所謂大如葵而叢生者是也衍義曰百草中惟此不顧冰雪最先春也世又謂之鑽凍雖在冰雪之下至時亦生芽春時人或採以代蔬入藥須微見花者良如巳芬芳則都無力也今人又多使如箸頭者恐未有花耳地圖經曰出常山山谷及上黨水傍今關中亦有之唐本注云雍州南山溪水華州山谷澗間道地晉州潞州耀州秦州時生春生苗採十一月取花收陰乾用花質類枇杷花未舒者色赤紫味辛甘性溫散氣氣之厚者陽也臭香主溫肺止嗽助杏仁為之使得紫菀良反畏貝母辛荑麻黃黃耆黃芩黃連青葙惡皂莢硝石玄參制雷公云凡採得須去向里裹花蕊殼並向裡實如粟零殼者並枝葉用以甘草水浸一宿卻取款冬花葉相拌裛一夜臨用時去兩件拌者曬乾用治療藥性論云清肺氣心促急熱乏勞咳連連不絕涕唾稠黏肺癰吐膿日華子云潤心肺除煩消痰肺痿吐血心虛驚悸洗肝明目及中風等疾衍義曰有人病嗽多日或教以燃款冬花三兩枚於無風處以筆管吸其煙滿口則咽之數日效補日華子云益五臟補勞劣紅藍花無毒植生紅藍花主產後血暈口噤腹內惡血不盡絞痛胎死腹中並酒煮服亦主蟲毒下血堪作胭脂苗生搗碎敷遊腫子吞數顆主天行瘡子不出胭脂主小兒聤耳滴耳中名醫所錄名紅花黃藍苗圖經曰此即紅花也今處處場圃中冬月布子於熟地至春生苗狀如大薊莖端作梂匯多刺五六月花蕊出球上圃人乘露採之採已復出至盡而罷球中結實白顆如小豆大其花可以染真紅但葉頗似藍故有藍名耳博物志云此種乃張騫使西域所得也地圖經曰出梁漢及西域今倉魏亦種之道地鎮江時生春生苗採五六月取花收曝乾用花實質類小薊蕊色紅味辛甘苦性溫散氣氣厚於味陽中之陰臭香主破血治療圖經曰花絞汁服主婦人產暈欲絕者併產後血病及喉痹壅塞不通白子主女子中風血熱煩渴唐本注云花主口噤不語血結產後諸疾別錄云花療一切腫子療產後中風煩渴合治以二錢半合酒一大升煎強半頓服療六十二種風兼腹內血氣刺痛五錢為末合酒二中盞煎取一盞並服如口噤斡開灌之治產後血暈心悶氣絕新者三兩合無灰酒童便各半升煮一大盞冷服療血暈絕不識人煩悶者京三稜無毒附雞爪三稜石三稜植生京三稜主老癖癥瘕結塊俗傳昔人患症癖死遺言令開腹取之得病塊乾硬如石紋理有五色人謂異物竊取削成刀柄後因以刀刈三稜柄消成水乃知此可療症癖也名醫所錄苗圖經曰春生苗高三四尺似茭蒲葉皆三稜五六月開花似莎草黃紫色霜降後採根削去皮須黃色形扁長如小鯽魚狀體重者佳多生淺水旁或陂澤中其根初生成塊如附子大或有扁者傍生一根又成塊亦出苗其不出苗只生細根鉤屈如爪者謂之雞爪三稜又不生細根者謂之黑三稜大小不常其色黑狀似烏梅而稍大有須相連蔓延體輕去皮即白三者本一物但力有剛柔各適其用因其形為名如烏頭烏喙雲母雲華之類本非兩物也河中府又有石三稜根黃白色形如釵股葉綠色如蒲苗高及尺葉上亦有三稜四月開花白色如紅蓼花五月採根亦消積氣一說三稜生於荊楚字當作荊以著其地本經作京非也今世都不復有三稜所用皆淮南紅蒲根耳秦州尤多舉世皆用之雖世醫不以為謬蓋流習既久用根者不識其苗採藥者莫究其用因緣差失不復更辨今紅蒲根至堅重刻削而成莫知形體又葉扁莖圓不復有三稜處不知何緣名三稜也今三稜皆獨有二根傍引而無直下者其形大體亦多如鯽魚狀也地圖經曰舊不著所出地土今河陝江淮荊襄間皆有之道地隨州荊州時生春生苗採五月取根收曝乾用根體重者佳質形扁如鯽魚色黃味苦性平泄氣味厚於氣陰中之陽臭朽主消瘀血破積氣制火炮去皮須治療日華子云治婦人血不調心腹痛消惡血通月經除氣脹消撲損瘀血產後腹痛血暈並宿血不下湯液本草云破血中之氣及破積氣別錄云煎汁洗奶下乳汁合治取汁合米麵為羹粥治小兒氣癖與乳母食每日取一棗大與小兒食凡小兒十歲以下及新生百日無問癇熱無辜痃癖並治之禁妊娠不可服元氣虛者勿用贗紅蒲根為偽薑黃無毒附蒁藥叢生薑黃主心腹結積疰忤下氣破血除風熱消癰腫功力烈於鬱金名醫所錄苗圖經曰葉長一二尺許闊三四寸青綠色有斜紋如紅蕉葉而小花紅白色至中秋漸凋春末復生其花先生次方生葉不結實根盤屈黃色類生薑而圓有節或云真者是經種三年以上老薑能生花花在根際一如蘘荷根節堅硬氣味辛辣種姜處有之按鬱金薑黃蒁藥三物相近蘇恭不細辯所說乃如一物陳藏器解紛云蒁味苦色青薑黃味辛溫色黃鬱金味苦寒色赤三物不同所用全別地圖經曰舊不載所出州郡今江廣蜀川多有之道地宜州澧州時生春生苗採八月取根收曝乾用根質類生薑圓而有節色黃味辛苦性大寒又云溫氣氣厚味薄陽中之陰臭香主散瘡瘍消積氣制銼碎用治療圖經曰消氣脹及產後敗血攻心甚驗生啖可以祛邪辟惡日華子云除癥瘕血塊癰腫通月經消撲損瘀血並腫毒止暴風痛冷氣下食唐本注云蒁主惡氣疰忤心痛血氣結積別錄云瘡癬初生或始痛癢為末敷之合治以一兩合桂三兩為末醋湯下一錢匕療心痛一十種陳藏器余百丈青味苦寒平無毒主解諸毒物天行瘴瘧疫毒並煮服亦生搗絞汁生江南林澤藤蔓緊硬葉如薯蕷對生根服令人下痢斫合子無毒主金瘡生膚止血搗碎敷瘡上葉主目熱赤挼滴目中雲昔漢高帝戰時用此敷軍士金瘡故云斫合子籬落間藤蔓生至秋霜子如柳絮一名薰桑一名雞腸獨自草有大毒煎敷箭鏃人中之立死生西南夷中獨莖生續漢書曰出西夜國人中之輒死今西南夷獠中猶用此藥敷箭鏃解之法在拾遺石部鹽藥條中金釵股味辛平小毒解諸藥毒人中毒者煮汁服之亦生研更烈必大吐下如無毒亦吐去熱痰瘧瘴天行蟲毒喉閉生嶺南山谷根如細辛三四十莖一名三十根釵子股嶺南人用之博落回有大毒主惡瘡瘻根瘤贅息肉白癜風蠱毒精魅溪毒以上瘡瘻者和百丈青雞桑灰等為末敷瘻瘡蠱毒精魅當有別法生江南山谷莖葉如蓖麻莖中空吹作聲如博落回折之有黃汁藥人立死不可入口也毛建草及子味辛溫有毒主惡瘡癰腫疼痛未潰煎搗葉敷之不得入瘡令人肉爛主瘧令病者取一握微碎縛臂上男左女右勿令近肉便即成瘡子和姜搗破破冷氣田野間呼為猴蒜生江東澤畔葉如芥而大上有毛花黃子如蒺藜又有建有毒生水傍葉似胡芹未聞余功大相似數低味甘溫無毒主冷風冷氣下宿食不消脹滿生西蕃北土亦無有似茴香胡人作羹食之仰盆味辛溫有小毒主蠱飛屍喉閉水磨服少許亦磨敷皮膚惡腫生東陽山谷苗似承露仙根圓如仰盆子大如雞卵離鬲草味辛寒有小毒主瘰癧丹毒小兒無辜寒熱大腹痞滿痰飲膈上熱生研絞汁服一合當吐出胸膈間宿物生人家階庭濕處高二三寸苗葉似薍𥰭去瘧為上江東有之北土無蓋藥味鹹溫無毒主折傷內損瘀血生膚止痛主產後血病治五臟除邪氣補虛損乳及水煮服之亦搗碎敷傷折處生胡國似干茅黃赤色
