body:
  text: 續集卷之五獸部毛蟲䰍牛角無毒黃犩牛𤛋牛海牛日支牛山牛附胎生䰍牛角主驚癇熱毒諸血病黃主驚癇癲狂本草綱目名毛犀廣志貓牛漢書注竹牛昨夢錄㸲牛音作犘牛音麻犨牛音抽李時珍云犛者髦也其髦可為旌旄也其體多長毛而身角如犀故曰毛犀汲塚周書作𤬈牛顏師古作貓牛爾雅作犘牛音皆相近也山海經作㸲牛西人呼為竹牛因角理如竹也或云竹即㸲音之轉而犨又竹音之轉也楊慎丹鉛錄云毛犀即彖也狀如犀而角小善知吉凶古人呼為貓豬交廣人謂之豬神是也曹昭格古論云毛犀即䰍牛也角之花斑皆類山犀而無粟紋其理似竹不甚為奇故謂毛犀觀此則䰍之角勝於旄而旄之毛尾勝於䰍也又有野牛與此相類者並附於下地出西南徼外居深山中野牛也唐宋西徼諸州貢之中山經云荊山多䰍牛時生無時用角黃其尾名曰𤬈亦可為旌旄纓帽之用昨夢錄云西夏多竹牛重數百斤角甚長制弓極勁彼人以偽犀角卒莫能辨質狀及毛尾俱同旄牛旄小而䰍大有重千斤者色郭璞注云旄牛之屬也其色黑又昨夢錄云竹牛角甚長而黃黑相間味角味酸鹹性角性涼代李時珍云䰍牛亦有黃彼人以亂牛黃但堅而不香云功用亦相近也其角亦可亂犀但無粟紋蘇頌圖經誤以為牯犀角者是也亦可用而功不及犀昨夢錄格古論說之詳矣犩牛音危綱目附錄又名夔牛如牛而大肉重數千斤出蜀山中𤛋牛綱目附錄廣志云出日南及潯州大賓縣色青黃與蛇同穴性嗜鹽人裹手塗鹽取之其角如玉可為器海牛綱目附錄齊地誌云出登州海島中形似牛鼉腳鮎毛其皮甚軟可供百用脂可然燈寰宇志名潛牛廣志名𤘺牛日支牛綱目附錄元中記云出西胡及大月氏國今日削取肉明日其創即復合也山牛綱目附錄狀如水牛而角有枝如鹿角旄牛音毛胎生旄牛喉靨主項下癭氣本草綱目名䗚牛音鬣爾雅犏牛音偏李時珍云旄與旄同或作毛後漢書云冉駹夷出旄牛一名䗚牛重千斤毛可為旄觀此則旄牛之名蓋取諸此顏師古云旄牛即犏牛也葉盛水東日記云毛牛與封牛合則生犏牛亦類毛牛偏氣使然故謂之犏是毛之遺種耳地出甘肅臨洮及西南徼外野牛也人多畜養之時生無時用喉靨喉脆骨質狀如水牛體長多力載重迅行如飛性至粗梗其尾最長大如斗亦自愛護草木鉤之即止而不動古人取為旌旄今人以為纓帽雜白色者以茜染紅色色髀膝尾背胡下皆有黑毛長尺許味山海經云潘侯之山有旄牛狀如牛而四足節生毛即此也其肉味甘美故呂氏春秋云肉之美者是旄象之肉也歟治李時珍云旄牛古方未見用者近世臞仙壽域方載治癭氣用其喉靨亦因類之義也其方用犏牛喉脆骨二寸許一節連兩邊扇動脆骨取之或煮或燒仰臥頓服仍取巧舌即靨子也嚼爛噙之食頃乃咽病人容貌必瘦減而癭自內消矣不過二服即愈云神妙無比也野馬肉有小毒陰莖無毒胎生野馬肉主人病馬癇筋脈不能自收周痹肌肉不仁陰莖主男子陰痿縮少精千金食治名爾雅云尸公水如馬一角似鹿茸不角者騏也地郭璞云野馬似馬而小出塞外今西夏甘肅及遼東山中亦有之時生無時用郭璞云取其皮為裘食其肉云如家馬肉但落地不沾沙耳質山海經云北海有獸狀如馬名曰騊駼此皆野馬類也色山海經云馬色青味肉味甘陰莖味酸鹹性肉性平陰莖性溫制食醫心鏡治馬癇證用肉一斤豉汁煮熟入五味蔥白作醃臘及羹粥頻食之白煮亦可治李時珍云野馬孫思邈千金方載有功用而本草未收今續補之騾肉有小毒附蹄屎胎生騾蹄主難產燒灰入麝香少許酒服一錢普濟方屎主打損諸瘡破傷中風腫痛炒焦裹熨之冷即易本草綱目名李時珍云騾古文作羸從馬從羸諧聲地其類有五牡驢交馬而生者騾也牡馬交驢而生者為駃騠音決題牡驢交牛而生者為馲𩢷音宅陌牡牛交驢而生者為䮰𩦺音謫蒙牡牛交馬而生者為駏驉今俗通呼為騾矣時採無時用肝蹄屎質騾大於驢而徤於馬其力在腰其後有鎖骨不能開故不䓈乳色青黃黑白味辛苦性溫治李時珍云古方未見用騾者近時小籍時有其方云按呂氏春秋云趙簡子有白騾甚愛之其臣陽城胥渠有疾醫云得白騾肝則生不得則死簡子聞之曰殺畜活人不亦仁乎乃殺騾取肝與之胥渠病愈此亦剪須以救功臣之意書之於此以備醫案禁寧原云騾性頑劣肉不益人孕婦食之難產黃羊無毒附髓胎生黃羊肉主補中益氣治勞傷虛寒本草綱目髓主補益功同羊髓飲膳正要名羳羊音煩繭耳羊李時珍云羊腹帶黃故名或云幼稚曰黃此羊肥小故也爾雅謂之羳出西番也其耳甚小西人謂之繭耳地出關西西番及桂林諸處質有四種狀與羊同但低小細肋腹下帶黃色角似羖羊喜臥沙地生沙漠能走善臥獨居而尾黑者名黑尾黃羊生野草內或群至數十者名曰黃羊其皮皆可為衾褥出南方桂林者則深褐色黑脊白斑與鹿相仿也味甘性溫禁正要云煮湯少味腦不可食大尾羊綱目附錄羖羊內李時珍云羊尾皆短而哈密及大食諸番有大尾羊細尾薄皮尾上旁廣重一二十斤行則以車載之唐書謂之靈羊云可療毒胡羊綱目附錄羖羊內方國志云大食國出胡羊高三尺余其尾如扇每歲春月割取脂再縫合之不取則脹死葉盛水東日記云莊浪衛近雪山有饕羊土人歲取其脂不久復滿洮羊綱目附錄羖羊內出臨洮諸地大者重百斤其尾似獐鹿按郭義恭廣志云西域驢羊大如驢即此類也𦍧羊此思切綱目附錄羖羊內出西北地其皮蹄可以割黍封羊綱目附錄羖羊內出涼州郡縣其背有肉封如駝亦呼為駝羊地生羊綱目附錄羖羊內出西域劉有出使西域記以羊臍種於土中溉以水聞雷而生臍臍與地連及長驚以木聲臍乃斷便能行齧草至秋可食臍內復有種名瓏種羊段公路北戶錄云大秦國有地生羊其羊生土中國人築牆圍之臍與地連割之則死但走馬擊鼓以駭之驚鳴臍斷便逐水草吳策淵穎集云西域地生羊以脛骨種土中聞雷聲則羊子從骨中生走馬驚之則臍脫也其皮可為褥一云漠北人種羊角而生大如兔而肥美三說稍異未知果種何物也當以劉說為是然亦神矣造化之妙微哉羵羊綱目附錄羖羊內此土之精也其肝木也有雌雄不食季桓子曾掘土得之又千歲樹精亦為青羊山羊無毒原本注羚羊內綱目分條胎生山羊肉主男人食之肥軟益人治冷勞山嵐瘧痢婦人赤白帶下圖經本草療筋骨急強虛勞益氣利產婦不利時疾人日用本草名野羊圖經羱羊李時珍云是羊之在原野者故名地陶弘景雲山羊即爾雅羱羊出西夏似吳羊而大角角墮者能陟峻阪羌夷以為羚羊角極長惟一邊有節節亦疏大不入藥用用肉其角堪為鞍橋質蘇恭云山羊大如牛或名野羊善鬥至死陸氏云羱羊狀如驢而群行其角甚大以時墮角暑天塵露在上生草戴行故代都賦云羱羊養草以盤桓李時珍云山羊有二種一種大角盤環肉至百斤者一種角細者說文謂之莧羊音桓色青味甘性熱臭膻禁蘇頌云南方野羊多啖石香薷故腸臟頗熱不宜多食之閩廣山中一種野羊彼人謂之羚羊其皮厚硬不堪炙食其肉頗肥贗吳瑞雲山羊似羚羊其角有掛痕者為羚羊無者為山羊貘音陌附膏屎原本注豹內綱目分條胎生貘皮主寢之可驅溫癘闢濕氣邪氣圖經本草膏主癰腫能透肌骨尿主吞銅鐵入腹者水和服之即化為水本草綱目名陸佃云皮為坐毯臥褥能消膜外之氣故字從膜省文地出黔蜀及峨嵋山中用皮膏屎質似熊而頭小腳卑形象鼻犀目牛尾虎足色黑白駁文又有黃白色蒼白色治能化銅鐵段成式云貘膏性利銅鐵瓦器盛之悉透惟以骨盛則不漏世傳羚羊角能碎金剛石者即此物相畏耳按說文云貘似熊黃白色出蜀中南中志云貘大如驢狀似熊蒼白色多力舐鐵消千斤其皮溫暖埤雅云貘似熊獅首豺髲銳鬐卑腳糞可為兵切玉尿能消鐵為水又有齧鐵豻昆吾兔皆能食銅鐵亦貘類也並附之齧鐵綱目附錄神異經云南方有獸角足大小狀如水牛毛黑如漆食鐵飲水糞可為兵其利如鋼名曰齧鐵唐史云葉火羅獻大獸高七尺食銅鐵日行三百里豻綱目附錄禽書云豻應井星胡狗也狀似狐而黑身長七尺頭生一角老則有鱗能食虎豹蛟龍銅鐵獵人亦畏之狡兔綱目附錄拾遺記云狡兔生昆吾山形如兔雄黃雌白食丹石銅鐵昔吳王武庫兵器皆食盡掘得二兔一黃一白腹中腎膽皆鐵取鑄為劍切玉如泥貓無毒頭骨腦眼睛牙舌涎肝胞衣皮毛尿屎附胎生貓出蜀本草肉主勞疰鼠瘻蠱毒頭骨主鬼疰蠱毒心腹痛殺蟲治疳及痘瘡變黑瘰癧癙瘻惡瘡本草綱目腦主瘰癧癙瘻潰爛同莽草等分為末納孔中千金方眼睛主瘰癧癙瘻燒灰井華水服方寸匕日三外臺秘要牙主小兒痘瘡倒黶將死同人牙豬牙犬牙燒炭等分研末蜜水服一字即便發起本草綱目舌主瘰癧癙瘻生曬研敷千金方涎主瘰癧刺破塗之本草綱目肝主勞瘵殺蟲取黑貓肝一具生曬研末每朔望五更酒調服之直指方胞衣主反胃吐食燒灰入硃砂末少許壓舌下甚效楊氏經驗方皮毛主瘰癧諸瘻癰疽潰爛本草綱目尿主蚰蜒諸蟲入耳滴入即出儒門事親屎主痘瘡倒陷不發瘰癧潰爛惡瘡蠱疰蠍螫鼠咬燒灰水服治寒熱鬼瘧發無期度者極驗蜀本草名家貍李時珍云貓苗茅二音其名自呼陸佃云鼠害苗而貓捕之故字從苗禮記所謂迎貓為其食田鼠也亦通格古論云一名烏圓地貓捕鼠小獸也處處畜之時其孕也兩月而生一乳數子恆有自食之者俗傳牝貓無牡但以竹帚掃背數次則孕或用鬥覆貓於灶前以刷帚頭擊鬥視灶神而求之亦孕此與以雞子祝灶而抱雛者相同俱理之不可推測者也收腦紙上陰乾眼睛懸風處陰乾舌生曬乾肝生曬乾胞衣懸風處陰乾皮毛風乾尿以姜或蒜擦鼻或生蔥紝鼻中即遺出屎臘月取乾者泥固燒存性收用用肉頭骨腦眼睛牙舌涎肝胞衣皮毛尿屎李時珍云本草以貓貍為一類註解然貍肉入食貓肉不佳亦不入食品故用之者稀質貍身而虎面柔毛而利齒以尾長腰短目如金銀及上齶多稜者為良或云其睛可定時子午卯酉如一線寅申巳亥如滿月辰戌丑未如棗核也其鼻端常冷惟夏至一日則暖性畏寒而不畏暑能畫地卜食隨月旬上下齧鼠首尾皆與虎同陰類之相符如此色有黃黑白駁數色味肉味甘酸頭骨味甘性肉性溫頭骨性溫治李時珍云古方多用貍今人多用貓雖是二種性氣相同故可通用孫氏治痘瘡倒黶用人貓豬犬四頭骨方見綱目人部天靈蓋內壽域方治心下鱉瘕用貓頭骨一枚燒灰酒服方寸匕日三又方治走馬牙疳用黑貓頭燒灰酒服方寸匕又方治小兒陰瘡用貓頭骨燒灰敷之即愈又方治鼠咬成瘡用貓屎揉之即愈醫學正傳方治痰齁發喘用貓頭骨燒灰酒服三錢便止千金方治貓鬼野道病歌哭不自由用臘月死貓頭燒灰水服一錢匕日二又方治鬼舐頭瘡用貓兒毛燒灰膏和敷之又方治鬼舐頭禿用貓屎燒灰臘豬脂和敷之趙氏方治鼠咬瘡痛用貓頭燒灰油調敷之以瘥為度吳球便民食療方治對口毒風貍原本注貍內綱目分條胎生風貍本草拾遺腦主風疾酒浸服嶺南志和菊花服至十斤可長生十洲記尿主諸風本草拾遺大風疾虞衡志名風母綱目風生獸同上平猴同上狤𤟎音吉屈李時珍云風貍能因風騰越死則得風復生而又治風疾故得風名狤𤟎言其詰崛也地陳藏器云出邕州以南李時珍云其獸生嶺南及蜀西徼外山林中故考十洲記之風生獸廣州異物志之平猴嶺南異物志之風母酉陽雜俎之狤𤟎虞衡志之風貍皆一物也但其文有大同小異爾收其尿甚難得人取養之乃可得用其腦與尿質陳藏器云其形似兔而短棲息高樹上候風而吹至他樹食果子其尿如乳汁難得李時珍云其大如貍如獺其狀如猿猴而小其目赤其尾短如無其性食蜘蛛亦啖薰陸香書則倦伏不動如蝟夜則因風騰躍甚捷越堥過樹如鳥飛空中人網得之見人則如羞而叩頭乞憐之態人撾擊之倏然死矣以口向風須臾復活惟碎其骨破其腦乃死一云刀斫不入火焚不焦打之如皮囊雖鐵擊其頭破得風復起惟石菖蒲塞其鼻即死也一云此獸常持一杖指飛走悉不能去見人則棄之人獲得擊打至極乃指示人人取以指物令所欲如意也二說見十洲記及嶺南志未審然否色其色青黃而黑其紋如豹或云一身無毛惟自鼻至尾一道有青毛廣寸許長三四分木狗胎生木狗皮主除腳痹風濕氣活血脈暖腰膝本草綱目地熊太古冀越集云木狗生廣東左右江山中用其皮為衣褥能運動血氣元世祖有足疾取以為褲人遂貴重之此前所未聞也質形如黑狗善能登木色黑李時珍云嘗聞蜀人言川西有元豹大如狗黑色尾亦如狗其皮作褥甚暖冬月遠行用其皮包肉食數日猶溫彼土亦珍貴之此亦木狗之屬也故附見於此云山獺陰莖無毒骨附胎生山獺陰莖主陽虛陰痿精寒而清者酒磨少許服之獠人以為補助要藥骨主解藥箭毒研少許敷之立消本草綱目名插翹地李時珍云山獺出廣之宜州嵠峒及南丹州土人號為插翹其性淫毒山中有此物凡牝獸皆避去獺無偶則抱木而枯獠女有時成群入山以採物為事獺聞婦人氣必躍來抱之次骨而入牢不可脫因扼殺之負歸取其陰一枚直金一兩若得抱木死者尤奇貴峒獠甚珍重之私貨出界者罪至死然本地亦不常有時生無時用陰莖及骨味陰莖味甘性熱氣厚陽也升也代方士多以鼠璞猴胎假為之贗試之之法但令婦人摩手極熱取置掌心以氣呵之即趯然而動蓋陰氣所感也此說出範石湖虞衡志周草窗齊東野語中而不載其形狀亦缺文也猾音滑猾髓主水中生火炮炙論地雷斅云海中有獸名曰猾其髓入油中油即沾水水中生火不可救止以酒噴之即滅故曰水中生火非猾髓而莫能收不可於屋下收之用李時珍云此獸之髓水中生火與樟腦相同其功亦當與樟腦相似也第今無識者鮓答無毒腹生鮓答主驚癇毒瘡本草綱目地李時珍云鮓答生走獸及牛馬諸畜肝膽之間有肉囊裹之多至升許質其形大者如雞子小者如慄如榛其狀似石非石似骨非骨打破層疊重重耳色白味甘鹹性平李時珍云嘉靖庚子年靳州侯屠殺一黃牛得此物人無識者有番僧云此至寶也牛馬豬畜皆有之可以祈雨西域有密咒則霖雨立至不知咒者但以水浸搬弄亦能致雨後考陶九成輟耕錄所載鮓答即此物也其言曰蒙古人禱雨惟以淨水一盆浸石子數枚淘漉玩弄密持咒語良久輒雨石子名鮓答大者如雞卵小者不等乃走獸腹中所產獨牛馬者最妙蓋牛黃狗寶之類也又按京房易占云兵強主武則牛腹生石據此知鮓答狗寶同一類也但生於狗腹者為狗寶耳酋耳綱目附錄虎內瑞應圖云酋耳似虎絕大不食生物見虎豹即殺之太平則至郭璞云即騶虞也白虎黑紋尾長於身駮綱目附錄虎內山海經云駁狀如馬白身黑尾一角鋸牙能食虎豹周書謂之茲白說苑云師曠言鵲食蝟蝟食駿駿食豹豹食駮駮食虎渠搜綱目附錄虎內逸周書云渠搜西戎露犬也能食虎豹一云犴胡犬也能逐虎黃腰綱目附錄虎內蜀志云黃腰獸鼬身貍首長則食母形雖小而能食虎及牛鹿也又孫恛云縠音斛似豹而小腰以上黃以下黑形類犬食獼猴名黃腰羆綱目附錄熊內李時珍云羆熊類也比熊大而色黃白陸機謂羆為黃熊是矣羆頭長腳高猛憨多力能拔樹木虎亦畏之遇人則人立而攫之故俗呼為人熊關西呼猳熊羅願爾雅翼云熊有豬熊形如豕有馬熊形如馬即羆也或云羆即熊之雄者其白如熊白而理粗味減功用亦同魋綱目附錄熊內李時珍云魋亦熊類比熊小而色黃赤建平人呼魋為赤熊是矣功用亦同山驢綱目附錄麢羊內原本亦注羚羊內南史云滑國出野驢有角廣志云驢羊似驢山海經云晉陽懸甕之山女凡之山荊山綸山並多閭郭璞注云閭即羭也似驢而岐蹄馬尾角如麢羊一名山驢俗人亦用其角以代羚羊又北山經云太行之山有獸名䮝狀如麢羊而四角馬尾有距善旋其名自叫此亦山驢之類也隱鼠原本注鼴鼠內綱目分條隱鼠出本草拾遺膏主痔瘻惡瘡名醫別錄名鼴鼠音偃偃鼠綱目鼠母同上𪀉古役切地陶弘景注鼴鼠生諸山林中雲是鼠王其精溺一滴落地輒成一鼠災年則多出也蘇頌云鼴鼠出滄州及湖中似牛而鼠首黑足大者千斤多伏於水又能堰水放沫彼人食其肉色灰赤色胸前尾上皆白有力而鈍用膏其皮可作秋轡質其大如水牛形似豬狀類鼠下腳似象味肉味亦似牛人取食之多以作脯贗陳藏器云此是獸類非鼠之儔大如牛而前腳短皮入秋轡用莊子所謂鼴鼠飲河不過滿腹者陶言是鼠王精滴成鼠遍訪山人無其說亦不能土中行此乃妄說陶誤信爾異物志云鼠母頭腳似鼠口銳蒼色大如水牛而畏狗見則主水災晉書云宣城郡出隱鼠大如牛形似鼠褲腳類象而驢蹄毛灰赤色胸前尾上白色有力而鈍金樓子云晉寧縣境出大鼠狀如牛土人謂之偃牛時出山遊毛落田間悉成小鼠苗稼盡耗梁書云倭國有山鼠如牛又有大蛇能吞之據此則隱鼠非無而陶說有本諸家闢之太甚者未深考耳又爾雅云𪀉身似鼠而馬蹄長鬚而賊物一歲千斤秦人謂之小驢者即此物也鼫鼠音石無毒胎生鼫鼠本草綱目肚主咽喉痹痛一切熱氣研末含咽神效虞衡志名碩鼠與鼫同周易䶂鼠音酌廣雅雀鼠埤雅𪕞鼠音俊唐韻李時珍云碩大也似鼠而大也關西方音轉鼫為䶂訛䶂為雀蜀人謂之𪕞鼠取其毛作筆俊亦大也地處處有之居土穴樹孔中善鳴能人立交前足而舞好食粟豆是與鼢鼠俱為田害鼢小居田而鼫大居山也用肚質其形大於鼠其頭似兔色尾有毛青黃色味甘性寒贗范成大云賓州鼫鼠專食豆根土人取其腹干之入藥名鼫鼠肚陸機謂此亦有五技與螻蛄同名者誤矣竹䶉留柳二音無毒胎生竹䶉肉主補中益氣解毒本草綱目名竹豚李時珍云䶉狀其肥豚言其美也地出南方居土穴中食竹根之鼠也時生無時採無時用肉質其大如兔味肉味甘人有食之味如鴨肉性平燕山錄云煮羊以䶉煮鱉以蚊物性相感也貂鼠無毒毛皮附胎生貂鼠肉無毒毛皮主塵沙眯目以裘袖抆之即出本草綱目名栗鼠爾雅翼松狗李時珍云貂亦作鼦羅願云此鼠好食慄及松皮夷人呼為栗鼠松狗地許慎說文云貂鼠尾大而黃黑色出丁零國今遼東高麗及女直韃靼諸胡皆有之耳時生無時採秋冬取之收皮掛通風處用其肉中國不可得其皮為裘帽風領寒月服之得風更暖著水不濡得雪即消拂面如焰拭眯即出亦奇物也惟近火則毛易脫耳質其形大如獺而尾粗其毛深寸許蔚而不耀色黑色黃色紫色白色漢制侍中冠金璫飾首前插貂尾加以附蟬取其內勁而外溫毛帶黃色者為金貂白色者為銀貂黑色者為黑貂紫黑者為紫貂貴賤不等味肉味甘性溫平黃鼠無毒胎生黃鼠肉主潤肺生津煎膏貼瘡腫解毒止痛本草綱目名禮鼠韓文拱鼠同上鼲鼠音渾貔貍李時珍云黃鼠晴暖則出坐穴口見人則交其前足拱而如揖乃竄入穴即詩所謂相鼠有體人而無禮韓文所謂禮鼠拱而立者也古文謂之鼲鼠遼人呼為貔貍胡人亦名令邦地出太原大同延綏及沙漠諸地皆有之遼人尤為珍貴穴居有土窖如床榻之狀者是牝牡所居之處秋時畜豆粟草木之實以御冬各為小窖別而貯之時生無時採無時村民以水灌穴而捕之用肉味極肥美如豚子而脆皮可為裘領遼金元時以羊乳飼之用供上膳以為珍饌千里贈遺今亦不甚重之矣質狀類大鼠足短善走極肥色黃味甘性平合治李時珍云黃鼠北方所食之物而方書不載按經驗良方有靈鼠膏云治諸瘡腫毒去痛退熱用大黃鼠一個清油一斤慢火煎焦水上試油不散乃濾滓澄清再煎次入炒紫黃丹五兩柳枝不住攪勻滴水成珠下黃蠟一兩熬黑乃成去火毒三日如常攤貼禁正要云多食發瘡代北胡又有青鼠皮亦可用銀鼠白色如銀古名𪕯鼠音吸抱朴子云南海白鼠重數斤毛可為布也百感錄云西北有獸類黃鼠短喙無目性狡善聽聞人足音輒逃匿不可卒得土人呼為瞎撞亦黃鼠類也忌黃鼠最畏鼠狼能入穴銜出也贗或以貔貍為竹䶉貍獾者非鼬鼠音佑肉有小毒心肝微毒附胎生鼬鼠肉主煎油塗瘡疥殺蟲心肝肺主心腹痛殺蟲本草綱目名黃鼠狼綱目鼪鼠音生去聲𪕸鼠音谷地猴李時珍云按廣雅鼠狼即鼬也江東呼為鼪其色黃赤如柚故名地處處有之時生無時採秋冬取之用肉及心肝肺其毫與尾可作筆嚴冬用之不折世所謂鼠須貍尾者是也此物健於捕鼠及禽畜又能制蛇虺莊子所謂騏驥捕鼠不如貍鼪者即此質狀似鼠而身長尾大許慎所謂似貂而大色黃色帶赤味肉味甘臭心肝肺味臭性肉性溫臭腥膻其氣極臊臭合治海上仙方治心腹痛用黃鼠心肝肺一具陰乾瓦焙為末入乳香沒藥孩兒茶血竭末各三分每服一錢燒酒調下立止食蛇鼠食蛇鼠尿主蛇虺傷螫本草綱目地唐書云罽賓國貢食蛇鼠能食蛇虺用尿質喙尖色尾赤治人有被蛇螫者以鼠嗅而尿之即愈解李時珍云今雖不聞說此恐後有貢者存此以備考證知解蛇毒鼨鼠音終綱目附錄鼠內郭璞云其大如拳其紋如豹漢武帝曾獲此以問終軍者䶄鼠音平綱目附錄鼠內許慎云一名瘑鼠音含斑紋𪖂鼠音離艾綱目附錄鼠內孫㿐云小鼠也相銜而行李時珍云按秦記及草木子皆載群鼠數萬相銜而行以為鼠妖者即此也鼩鼱音劬精綱目附錄鼠內李時珍云似鼠而小即今地鼠也又爾雅說文有鼸鼶鼮𧓎鼭魚𧔑䶅䶈入鼠皆無考證音歉斯廷吠時文鶴博也水鼠綱目附錄鼠內李時珍云似鼠而小食菱芡魚鰕或云小魚小蟹所化也冰鼠綱目附錄鼠內東方朔雲生北荒積冰下皮毛甚柔可為席取之卻寒食之已熱耳火鼠綱目附錄鼠內李時珍云出西域及南海火州其山有野火春夏生秋冬死鼠產於中甚大其毛及草木之皮皆可織為布汙則燒之即潔因名火浣布鼵鼠音突綱目附錄鼠內郭璞云鳥鼠同穴山在今隴西首陽之西南其鳥為䳜音塗狀如家雀而黃黑色其鼠為突狀如家鼠而色小黃尾短鳥居穴外鼠居穴內蟨鼠音蹶綱目附錄鼠內爾雅云北方有比肩獸與邛邛巨虛比為齧甘草即有難邛邛巨虛負之而走其名曰蟨李時珍云今契丹及交河北境有跳兔頭目毛色皆似兔而爪足似鼠前足僅寸許後足僅尺尾亦長其端有毛一跳數尺止即蹷僕此即蹷鼠也土人掘食之郭璞以邛邛巨虛為獸名兔前鼠後張楫注漢書云邛邛青獸狀如馬巨虛似騾而小本草稱巨虛食庵䕡子而仙則是物之至駿者也猩猩本作狌音生無毒猩猩本草綱目肉主食之不昧不飢令人善走窮年無厭可以辟穀出逸書山海經水經名李時珍云猩猩能言而知來猶惺惺也地自爾雅逸周書以下數十說今參集之云出哀牢夷及交趾封溪縣山谷中成群伏行時採法按阮檿云封溪俚人以酒及草屐置道側猩猩見即呼人祖先姓名罵之而去頃復相與嘗酒著屐因而被擒檻而養之將烹則推其肥者泣而遣之西胡取其血染毛罽不黯刺血必棰而問其數至一斗乃已用肉按逸書云猩猩肉食之令人不昧其猩猩可知矣古人以為珍味故荀子言猩猩能言笑二足無毛而人啜其羹食其肉呂氏春秋云肉之美者猩猩之唇獾獾之炙為珍味耳質狀如狗及獼猴人面人足長髮頭顏端正聲如小兒啼亦如犬吠又按禮記云猩猩能言而郭義恭廣志云猩猩不能言山海經云猩猩能知人言三說不同大抵猩猩略似人形如猿猴類耳縱使能言亦若鸚鵡之屬亦不必擬定三說也又羅願爾雅翼云古之說猩猩者如豕如狗如猴今之說猩猩者與狒狒不相遠云如婦人被髮袒足無膝群行遇人則手掩其形謂之野人據羅說則似乎後世所謂野女野婆者也豈即一物耶色山海經云人面白身能言語李時珍云黃毛如猿白耳如豕味甘鹹性溫野女綱目附錄唐蒙博物志云日南有野女群行覓夫其狀白色遍體無衣襦周密齊東野語云野婆出南丹州黃髮椎髻裸形跣足儼然若一媼也群雌無牡上下山谷如飛猱自腰以下有皮蓋膝每遇男子必負去求合嘗為健夫所殺死以手護腰間剖之得印方寸瑩若蒼玉有紋類符篆也李時珍云合此二說與前阮氏羅氏之說觀之則野女似即猩猩矣又雄鼠卵有紋如符篆治鳥腋下有鏡印則野婆之印篆非異也亦當有功用但人未知耳彭侯無毒彭侯本草綱目肉主食之辟邪令人志壯出白澤圖用肉可烹食質狀如狗無尾色黑味甘酸性溫白澤圖云木之精名曰彭侯狀如黑狗無尾可烹食千歲之木有精曰賈胐狀如豚食之味如狗搜神記云吳時敬叔伐大樟樹血出中有物人而狗身敬叔云此名彭侯乃烹而食之味如狗也罔兩罔兩本草綱目名魍魎方良夔罔兩龍罔象弗述蝹李時珍云罔兩一作魍魎又作方良周禮方相氏執戈入壙以驅方良罔兩好食亡者肝故驅之忌其性畏虎柏故墓上樹石虎植柏國語云木石之怪夔罔兩水石之怪龍罔象即此述異記云秦時陳倉人獵得獸若彘若羊逢二童子曰此名弗述又名蝹在地下食死人腦但以柏插其首則死此即罔兩也雖於藥石無與而於死人有關故錄之其方相有四目若二目者為魅皆鬼物也故人設人像之解昔費長房識李娥藥用方相腦則其物亦入辟邪方藥而法失傳矣封封本草綱目肉主食之多力出白澤圖李時珍按江鄰幾雜誌云徐稹於廬州河次得小兒手一隻無指無血懼而埋之此白澤圖所謂封食之多力者也田九成西湖志云董表儀撤屋掘土得一肉塊術士云太歲也棄之亦無害又山海經敦隅之山及開明南北東南海外並有視肉郭璞注云聚肉形如牛肝有兩目食之無盡尋復生如舊也此皆封類可食者但人不知耳又海中一種土肉正黑長五寸大如小兒臂有腹無口目有三十足亦可炙食此又蟲魚之屬類乎封者也玃音卻綱目附錄獼猴內李時珍云玃老猴也生蜀西徼外山中似猴而大色蒼黑能人行善攫持人物又善顧盼故謂之玃純牡無牝故又名玃父亦曰猳玃善攝人婦女為偶生子又神異經云西方有獸名蟕大如驢狀如猴善緣木純牝無牡群居要路執男子合之而孕此亦玃類而牡牝相反者豦音據綱目附錄獼猴內郭璞云建平山中有之大如狗狀如猴黃黑色多髯鬣好奮頭舉石擲人西山經云崇吾之山有獸焉狀如禺而長臂善投名曰舉父即此也猿綱目附錄狨內李時珍云猿善援引故謂之猿俗作猿產川廣深山中似猴而長大其臂甚長能引氣故多壽或言其通臂者誤矣臂骨作笛甚清亮其色有青白黑黃緋數種其性靜而仁慈好食果實其居多在林木能越數丈著地即泄瀉死惟附子汁飲之可免其行多群其鳴善啼一鳴三聲悽切入人肝脾範氏桂海志云猿有金絲者黃色玉面者黑色及身面俱黑者或云黃是牡黑是牝牝能嘯牡不能也王濟日詢記云廣人言猿初生毛黑而雄老則變黃潰去勢囊轉雄為雌與黑者交而孕數百歲黃又變白也李時珍按此說與列子蠵變化為猿莊子獱狙以猿為雌之言若相合必不妄也獨綱目附錄狨內李時珍云獨似猿而大其性獨一鳴即止能食猿猴故諺曰獨一鳴而猿散獨大蓋取諸此或云即黃腰也已見附錄虎內蒙頌綱目附錄果然內李時珍云蒙頌一名蒙貴乃蜼之又小者也紫黑色出交趾畜以捕鼠勝於貓貍耳玂猢音慚胡綱目附錄果然內許氏說文作同黽鼊乃蝯蜼之屬黑身白腰如帶手有長毛白色似握版之狀蜀地誌云獑猢似猴而甚捷在樹上歘然騰躍如飛鳥也山都綱目附錄狒狒內任昉述異記云南康有神曰山都形如人長二丈餘黑色赤目黃髮深山樹中作窠狀如鳥卵高三尺余內甚光采體質輕虛以鳥毛為褥二枚相連上雄下雌能變化隱形罕睹其狀若木客山𤢖之類也山𤟤綱目附錄狒狒內北山經云山𤟤狀如犬而人面善投見人則笑其行如風見則天下大風木客綱目附錄狒狒內幽明錄云生南方山中頭面語言不全異人但手腳爪如鉤利居絕巖間死亦殯殮能與人交易而不見其形也今南方有鬼市亦類此又有木客鳥下見附錄治鳥內山𤢖綱目附錄狒狒內東方朔神異經云西方深山有人長丈餘袒身捕蝦蟹就人火炙食之名曰山𤢖其名自呼人犯之則發寒熱蓋鬼魅耳所在亦有之惟畏爆竹煏煿聲劉義慶幽明錄云東昌縣山岩間有物如人長四五尺裸身被髮髮長五六寸能作呼嘯聲不見其形每從澗中發石取蝦蟹就火炙食永嘉記云安國縣有山鬼形如人而一腳僅長一尺許好盜伐木人鹽炙石蟹食人不敢犯之能令人病及焚居也元中記云山精如人一足長三四尺食山蟹夜出晝伏千歲蟾蜍能食之抱朴子云山精形如小兒獨足向後夜喜犯人其名曰魃呼其名則不能犯人白澤圖云山之精狀如鼓色赤一足名曰夔亦曰揮文呼之可使取虎豹海錄雜事云嶺南有物一足反踵手足皆三指雄曰山丈雌曰山姑能夜叩人門求物也神異記云南方有魃一名旱母長二三尺裸形目在頂上行走如風見則大旱遇者得之投溷中則旱除文字指歸云旱魃山鬼也所居之處天不雨女魃入人家能竊物以出男魃入人家能竊物以歸李時珍謹按諸說雖少有參差大抵俱是怪類今俗所謂獨腳鬼者是也邇來處處有之能隱形入人家淫亂致人成疾放火竊物大為家害法術不能驅醫藥不能治呼為五通七郎諸神而祀之蓋未知其原如此故備載之非但博聞而已據云呼其名則無害千歲蟾蜍能食之者非治法歟引申觸類必有能制之者又有治鳥亦此類見禽部精怪之屬甚夥皆為人害惟白澤圖元中記抱朴子酉陽雜俎神異記諸書載之頗悉起居者亦不可不知然正人君子則德可勝妖自不敢近也
