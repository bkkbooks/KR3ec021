body:
  text: 續集卷之四人部爪甲原本載懷妊婦人爪甲綱目補男女眾人爪甲爪甲主催生下胞衣利小便治尿血及陰陽易病破傷中風去目翳本草綱目名筋退地李時珍曰爪甲者筋之餘膽之外候也靈樞經云肝應爪爪厚色黃者膽厚爪薄色紅者膽薄爪堅色青者膽急爪耎色赤者膽緩爪直色白者膽直爪惡色黑者膽結味甘鹹性堅用太上元科云斬三尸法常以庚辰日去手爪甲午日去足爪每年七月十六日將爪甲燒灰和水服之三尸九蟲皆滅名曰斬三尸一云甲寅日三尸遊兩手剪去手爪甲甲午日三尸遊兩足剪去足爪甲外臺秘要云消除腳氣每寅日割手足甲少侵肉去手腳氣治千金方治小兒腹脹用父母指爪甲燒灰敷乳上飲之又方治妊婦尿血取夫爪甲燒灰酒服聖惠方治胞衣不下取本婦手足爪甲燒灰酒服即令有力婦人抱起將竹筒於胸前趕下危氏得效方治飛絲入目刮爪甲末同津液點之其絲自聚拔出也集簡方治目生花翳用刀刮爪甲細末和乳點之簡便方治鼻出衄血用刀刮指甲細末吹之即止試驗又方治物入目中用左手爪甲刀刮屑末燈草蘸點翳上三次即出也合治普濟方治破傷風手足顫掉搐搖不已用人手足指甲燒存性六錢薑製南星獨活丹砂各二錢共為末分作二服酒下立效又方治破傷中風手足十指甲用香油炒研熱酒調呷服之汗出便好千金方治陰陽易病用手足爪甲二十片中衣襠一片燒灰分三服溫下男用女女用男聖濟錄云治小便尿血用人指甲五分頭髮一錢半燒研末每服一錢空心溫酒下萬表積善堂方治諸痔腫痛蠶繭納入男子指甲令滿外用童子頂發纏裹燒存性研末蜜調敷之仍日日吞牛膽制過槐子甚效聖惠方治針刺入肉凡針折入肉及竹木刺者刮人指甲末用酸棗搗爛塗之次日定出又方治癍痘生翳一切目疾並以木賊擦取爪甲末同硃砂末等分研勻以露水溲丸芥子大每以一粒點入目內又方治目生珠管用手爪甲燒灰貝齒燒灰龍骨各五錢為末日點三四次聖濟總錄方治積年瀉血百藥不效用人指甲炒焦麝香各二錢半乾姜炮三兩白礬枯過敗皮巾燒灰各一兩為末每日服用粥飲一錢日二服膝頭垢膝頭垢本草綱目主唇緊瘡以綿裹燒研敷之外臺秘要癖石癖石主消癖治噎膈本草綱目地李時珍云有人專心成癖及病症塊凝結成石如牛黃狗寶鮓答之類皆諸獸之病也觀夫星隕為石沙淋石淋及釋氏顱囟結成舍利子皆精氣凝結而然故格物論云石者氣之核也群書所載如寶圭化石老樹化石皆無情之變異也魚蛇蝦蟹皆能化石乃有情之變異也質程子遺書云波斯人發古墓見肌膚都盡惟心堅如石鋸開中有山水如畫旁有一女憑欄凝睇蓋此女有愛山水癖遂致融結如此宋濂云一浮屠行大舟三昧法示寂後焚之惟心不化狀如佛像非金非石又一人行禪觀法及死火葬心內包觀音像悉具醫書云一人病症死火化有塊如石此皆症癖頑凝成石之蹟故並錄之性世說載貞婦登山望夫化而為石此蓋志一不分有情之至物極必反遂入於無情也宋史載石工採石陷入石穴三年掘出猶活見風遂化為石此蓋吞納石氣久而與之俱化也夫生形尚全化石則頑心症癖之化石亦其理也人汗有毒人汗入飲食食之令人生疔毒本草綱目地李時珍云汗出於心在內則為血在外則為汗故曰奪汗者無血奪血者無汗味咸性溫眼淚有毒眼淚其母哭泣墮子目令子傷睛生翳本草綱目地李時珍云淚者肝之液五臟六腑津液皆上滲於目凡悲哀笑咳則火激於中心系急而臟腑皆搖搖則宗脈感而液道開津上溢故涕泣出焉正如甑上水滴之意也味咸人氣人氣主下元虛冷日令童男女以時隔衣進氣臍中甚良凡人身體骨節痹痛令人更互呵熨久久經絡通透又鼻衄金瘡噓之能令血斷本草綱目名李時珍云醫家所謂元氣相火仙家所謂元陽真火一也天非此火不能生物人非此火不能有生耳時採於春食東方青氣於夏食南方赤氣於秋食西方白氣於冬食北方黑氣四季食中央黃氣亦大有效用凡老人虛人與二七以前少陰同寢藉其熏蒸最為有益杜甫詩云暖老須燕玉正此意也但不可行淫以喪寶促生耳近時術家令童女以氣進入鼻竅臍中精門以通三田謂之接補此亦小法不得其道者反以致疾應宜慎之治謝承續漢書云太醫史循宿禁中寒疝病發求火不得眾人以口更噓其背至旦遂愈劉敬叔異苑云孫家奚奴治虎傷蛇噬垂死者以氣禁之皆安解葛洪抱朴子云人在氣中氣在人中天地萬物無不須氣以生善行氣者內以養生外以卻惡然行之有法從子至巳為生氣之時從午至亥為死氣之時常以生氣時鼻中引氣入多出少閉而數之從九九八八七七六六五五而止乃微吐之勿令耳聞習之既熟增至千數此為胎息故善行氣者可以避飢渴可以延年命可以行水上可以居水中可以治百病可以入瘟疫以氣噓水則水逆流噓火則火遙滅噓沸湯則手可探物噓金瘡則血即自止噓兵刃則刺不能入噓箭矢則矢自射噓犬則不吠噓虎狼則伏退噓蛇蜂則不動吳越有禁咒行氣之法遇有大疫可與同床不相傳染遇有精魅或聞聲或現形擲石放火以氣禁之皆自絕或毒蛇所傷噓之即愈若在百里之外遙以我手噓咒男左女右亦即可安夫氣出於無形用之其效至此而況絕谷延年乎李時珍按此即吾內養浩然之氣也符篆家取祖氣即此但彼徒皆氣餒庸人依仿安得驗哉人魄人魄主鎮心安神魄定驚怖顛狂磨水服之本草綱目地李時珍云人受陰陽二氣合成形體魂魄聚則生散則死死則魂升於天魄入於地魄屬陰其精沉淪入地化為此物亦猶星隕為石虎死目光墜地化為白石人血入地為磷為碧之意也質此是縊死人處其下有物如麩炭即時掘取便得稍遲則深入矣解不掘去則必有再縊之禍雖不入藥用亦宜速掘去早解釋之可也人骨人骨主骨病接骨臁瘡並取焚棄者本草拾遺名李時珍云許慎言骨者肉之核也靈樞經云腎主骨有骨度篇論骨之大小長短廣狹甚詳治醫林集要方治代杖用燒過人骨為末空心酒服三錢受杖不腫不作瘡久服皮亦厚也壽域神方治臁瘡用燒過人骨碎者為末摻之合治醫林集要方治接骨用燒過童子骨一兩乳香二錢喜紅絹一方燒灰為末熱酒調服先以桐木片札定立效扶壽精方治折傷用死童子骨煅過香瓜子仁炒乾為末好酒下止痛極速禁李時珍云古人以掩曝骨為仁德每獲陰報而方技之流心乎利慾乃收人骨為藥餌仁術固如此乎且犬不食犬骨而人食人骨可乎父之白骨惟親生子刺血瀝之即滲入又酉陽雜俎云荊州一人損脛張七政飲以藥酒破肉去骨一片塗膏而愈二年復痛張云所取出骨寒也尋之尚在床下以湯洗綿裹收之其痛遂止氣之相應如此孰謂枯骨無知乎仁者當知所悟矣人勢人勢主下蠶室創口不合本草綱目名陰莖治李時珍云人陰莖非藥物也陶九成輟耕錄載杭州沈生犯奸事露引刀自割其勢流血經月不合或令尋所割勢搗粉酒服不數日而愈觀此則下蠶室者不可不知此法也故附於此云木乃伊木乃伊本草綱目地陶九成輟耕錄云天方國有人年七八十歲願捨身濟眾者絕不飲食惟澡身啖蜜經月便溺皆蜜既死國人殮以石棺仍滿用蜜浸之鐫年月於棺瘞之俟百年後起封則成蜜劑矣治凡遇人折傷肢體服少許立愈雖彼中亦不多得亦謂之蜜人陶氏所載如此不知果有否姑附卷末以俟博識方民方民本草綱目地李時珍云人稟性於乾坤而囿形於一氣橫目二足雖則皆同而風土氣習自然不一是故蝨處頭而黑豕居遼而白水食者腥草食者膻膏粱藜莧腸胃天淵葈褐羅紈肌膚玉石居養所移其不能齊者亦自然之勢也故五方九州水土各異其民生長氣息亦殊乃集方民附於人部以備醫診云東方海濱旁水魚鹽之地其民食魚而嗜咸黑色疏理其病多瘡瘍其治宜砭石西方陵居多風水土剛強其民不衣而褐華食而肥脂其病生於內其治宜毒藥北方地高陵居風寒冰洌其民野處而乳食其病臟寒生滿其治宜灸焫南方地下水土弱霧露所聚其民嗜酸而食胕致理而赤色其病多攣痹其治宜微針中央地平濕其民雜而不勞其病多痿躄其治宜導引按蹻出素問九州殊題水泉各異風聲氣習剛柔不同青州其音角羽其泉咸以酸其氣舒遲其人聲緩荊揚其音角徵其泉酸以苦其氣剽輕其人聲急梁州其音商徵其泉苦以辛其氣剛勇其人聲塞兗豫其音宮徵其泉甘以苦其氣平靜其人聲端雍冀其音商羽其泉辛以咸其氣快烈其人聲捷徐州其音角宮其泉酸以甘其氣悍勁其人聲雄出河圖括地象堅土之人剛弱土之人懦壚土之人細息土之人美耗土之人醜出孔子家語山林之民毛而瘦得木氣多也川澤之民黑而津得水氣多也丘陵之民團而長得火氣多也墳衍之民晰而方得金氣多也原隰之民豐而痹得土氣多也出宋太史集荊州一男二女揚州二男五女青州二男二女兗州二男三女幽州一男三女幷州二男三女豫州二男三女雍州三男二女冀州五男三女出周禮土地生人各以類應故山氣多男澤氣多女水氣多喑風氣多聾林氣多癃木氣多傴石氣多力下氣多尰險氣多癭穀氣多痹丘氣多狂廣氣多仁陵氣多貪暑氣多夭寒氣多壽輕土多利重土多遲清水音小濁水音大湍水人重中土多聖賢出淮南子鴻烈篇人傀人傀公回切怪異也本草綱目李時珍云太初之時天地絪縕一氣生人乃有男女男女構精乃自化生如草木之始生子一氣而後有根及子為種相繼也人之變化有出常理之外者亦司命之師所當知博雅之士所當識故撰為人傀附之人部以備多聞青咎之徵易曰一陰一陽之謂道男女構精萬物化生幹道成男坤道成女此蓋言男女生生之機亦惟造化之良能焉耳齊司徒褚澄言血先至裹精則生男精先至裹血則生女陰陽均至非男非女之身精血散分駢胎品胎之兆道藏經言月水止後一三五日成男二四六日成女東垣李杲言血海始淨一二日成男三四五日成女聖濟經言因氣而左動陽資之則成男因氣而右動陰資之則成女丹溪朱震亨乃非褚氏而是東垣主聖濟左右之說而立論歸於子宮左右之系諸說可謂悉矣時珍竊謂褚氏未可非也東垣未盡是也蓋褚氏以精血之先後言道藏以日數之奇偶言東垣以女血之盈虧言聖濟丹溪以子宮之左右言各執一見會而觀之理自得矣夫獨男獨女之胎則可以日數論而駢胎品胎之感亦可以日數論乎稽之諸史載一產三子四子者甚多其子有半男半女或男多女少男少女多西樵野記載明天順時揚州民家一產五男皆育成觀此則一三五日為男二四六日為女之說豈其然哉有一日受男而二日復受女之理乎此則聖濟褚氏丹溪主精血子宮左右之論為有見而道藏東垣日數之論為可疑矣王叔和脈經以脈之左右浮沉辨猥生之男女高陽生脈訣以脈之縱橫逆順別駢品之胎形恐亦臆度非確見也王冰元珠密語言人生三子主太平人生三女國淫失政人生十子諸侯競位人生肉塊天下饑荒此乃就人事而論則氣化所感又別有所關也夫干為父坤為母常理也而有五種非男不可為父五種非女不可為母何也豈非男得陽氣之虧而女得陰氣之塞耶五不男天犍漏怯變也天者陽痿不用古云天宦是也犍者陽勢閹去寺人是也漏者精寒不固常自遺泄也怯者舉而不強或見敵不興也變者體兼男女俗名二形晉書以為亂氣所生謂之人疴其類有三有值男即女值女即男者有半月陰半月陽者有可妻不可夫者此皆具體而無用者也五不女螺紋鼓角脈也螺者牝竅內旋有物如螺也紋者竅小即實女也鼓者無竅如鼓也角者有物如角古名陰挺是也脈者一生經水不調及崩帶之類是也胎足十月而生常理也而有七月八月生者十二三月生者十四五月生者或云氣虛也虞摶醫學正傳言有十七八月至二十四五月而生劉敬叔異苑言太原溫磐石孕孕三年乃生豈亦氣虛至於許久耶今有孕七月而生子者多可育八月而生者多難育七變而八不變也魏略云黃牛羌人孕六月而生博物志云獠人孕七月而生晉書云苻堅母孕十二月生劉搠母孕十三月生漢書云堯及昭帝皆以十四月生三十國春秋云劉聰母孕十五月乃生搜神記云黃帝母名附寶孕二十五月而生帝胞門子臟為奇恆之府所以為生人之戶常理也而有自脅產自額產自背產自髀產者何也豈子臟受氣駁雜而其繫有不同如宋史所記男陰生於脊女陰生於頭之類耶史記云陸終氏娶鬼方之女孕而左脅出三人右脅出三人子孫傳國千年天將興之必有尤物如修己背坼而生禹簡狄胸坼而生契也魏志云黃初六年魏郡太守孔羨表言汝南屈雍妻王氏以去年十月十二日生男兒從右腋下小腹上而出其母自若無他畏痛今瘡已愈母子全安異苑云晉時魏興李宣妻樊氏義熙中懷孕不生而額上有瘡兒從瘡出長為軍將名胡兒又云晉時常山趙宣母妊身如常而髀上作癢搔之成瘡兒從瘡出母子平安野史云莆田尉舍之左有市人妻生男從股髀間出瘡合母子無恙可證屈雍之事浮屠氏言釋迦生於摩耶之右脅亦此理也嵩山記云陽翟有婦人妊三十月乃生子從母背上出五歲便入山學道琅琊鈔云明朝成化中宿州一婦人孕脅腫如癰及期兒從癰出瘡痏隨合其子名佛記兒李時珍云明朝隆慶五年二月唐山縣民婦有孕左腫脅疼兒從脅生母子無恙陽生陰長孤陽不生獨陰不長常理也而有思士不妻而感思女不夫而孕婦女生須丈夫出潼男子產兒者何也豈其氣脈時有變易如女國自孕雄雞生卵之類耶史記云姜源見巨人跡履之而生棄有娀氏吞元鳥卵而生契皆不夫而孕也宣政錄云宋宣和初朱節妻年四十一夕頷癢至明須身長余草木子云元至正間京師一達婦髭鬚長尺余漢書云南陽朱元全家疫死止一孫初生數旬蒼頭李善自哺乳之乳為生潼唐書云元德秀兄子襁褓喪親德秀自乳之數日乳中潼流能食乃止宋史云宣和六年都城有賣青果男子孕而生子蓐母不能收易七人始免而逃去西樵野記云明嘉靖乙酉橫涇傭農孔方忽患膨脹憒憒幾數月自脅產一肉塊剖視之一兒肢體毛髮悉具也男生而覆女生而仰溺水亦然陰陽秉賦一定不移常理也而有男化女女化男者何也豈乖氣致妖而變亂反常耶京房易占云男化為女宮刑濫也女化為男婦政行也春秋潛潭包云男化女賢人去位女化男賤人為王此但以人事言而其臟腑經絡變易之微不可測也漢書云哀帝建平中豫章男子化為女子嫁人生一子續漢書云獻帝建安二十年越雋男子化為女子李時珍云明隆慶二年山西御史宋纁疏言靜樂縣民李良雨娶妻張氏已四年矣後因貧出其妻自傭於人隆慶元年正月偶得腹痛時作時止二年二月初九日大痛不止至四月內腎囊不覺退縮入腹變為女人陰戶次月經水亦行始換女妝時年二十八矣洪範五行傳云魏襄王十三年有女子化為丈夫晉書云惠帝元康中安豐女子周世寧以漸化為男子至十七八而性氣成又孝武皇帝寧康初南郡女子唐氏漸化為丈夫南史云劉宋文帝元嘉二年燕有女子化為男人唐書云僖宗光啟二年春鳳翔郿縣女子朱齔化為丈夫旬日而死人異於物常理也而有人化物物化人者何也豈人亦太虛中一物並囿於氣交得其靈則物化人失其靈則人化物耶抑譚子所謂至媱者化為婦人至暴者化為猛虎心之所變不得不變孔子所謂物老則群精附之為五酉之怪者耶譚子化書云老楓化為羽人自無情而之有情也賢婦化為貞石自有情而之無情也世說武昌貞婦望夫化而為石宋史云崑山石工採石陷入石穴三年掘出猶活見風遂化為石幽冥錄云陽羨小吏吳龕於溪中拾一五色浮石歸置床頭至夜化為女子左傳云堯殛鯀於羽山其神化為黃熊入於淵黃熊龍類也續漢書云靈帝時江夏黃氏母浴水化為黿入於淵搜神記云魏文帝黃初中清河宋士宗母浴於室化為鱉入於水時復還家異苑云宋文帝元嘉中高平黃秀入山經日遂化為熊淮南子云牛哀病七日化而為虎搏殺其兄郡國志云藤州夷人往往化貙貙小虎也有五指博物志云江漢有貙人能化為虎唐書云武后時郴州左史因病化虎擒之乃止而虎毛生矣又憲宗元和二年商州役夫將化為虎眾以水沃之乃不果顧微廣州記云湞陽縣俚民一兒年十五六牧牛牛日舐兒甚快舐處悉白俄兒病死殺此牛以供食食此牛者男女二十餘人悉化為虎隋書云文帝七年相州一桑門化為蛇繞樹自抽長二丈許抱朴子云狐狼猴玃滿三百歲皆能變人參同契云燕雀不生鳳狐兔不字馬常理也而有人產蟲獸神鬼怪形異物者何也豈其視聽言動觸於邪思隨形感應而然耶又有人生於卵生於馬者何也豈有神異憑之或因有所感遘而然耶博物志云徐偃王之母產卵棄之孤獨老母取伏之出一兒後繼徐國異說云漢末有馬生人名曰馬異及長亡入胡地人具四肢七竅常理也而荒裔之外有三首比肩飛頭垂尾之民此雖邊徼餘氣所生同於鳥獸不可與吾同胞之民例論然亦異矣山海經云三首國一身三首在崑崙東爾雅云北方有比肩民半體相合迭食而迭望異物志云嶺南溪峒中有飛頭蠻項有赤痕至夜以耳為翼飛去食蟲物將曉復還如故搜神記云吳將軍朱桓一婢頭能夜飛即此種也永昌志云西南徼外有濮人生尾如龜長三四寸欲坐則先穿地作孔若誤折之便死也是故天地之造化無窮人物之變化亦無窮賈誼賦所謂天地為爐兮造化為工陰陽為炭兮萬物為銅合散消息兮安有常則千變萬化兮未始有極忽然為人兮何足控摶化為異物兮又何足患此亦言變化皆由於一氣也膚學之士豈可恃一隅之見而概指古今六合無窮變化之事物為迂怪耶蠶繭無毒蠶繭主癰腫無頭燒灰酒服次日即破又療諸疳瘡及下血血淋血崩煮汁飲止消渴反胃除蛔蟲本草綱目名繭甕地處處有之時生於四五月採於五月取之用已出蛾者陶弘景雲繭甕入術用質狀如蛋形中空如紙薄色白黃味甘性溫治李時珍云蠶繭方書多用而諸家本草並不言及誠缺文也近世用治癰疽代針用一枚即出一頭二枚即出二頭神效無比煮湯治消渴古方甚稱之丹溪朱氏云此物屬火有陰之用能瀉膀胱中相火引清氣上朝於口故能止渴也繰絲湯及絲綿煮汁功並相同又黃絲絹能補脬錦灰止血並見本部蟲魚部內合治陳文中小兒方治痘瘡疳蝕膿水不絕用出了蠶蛾繭以生白礬末填滿煅枯為末擦之甚效一方治口舌生瘡用蠶繭五個包蓬砂瓦上焙焦為末抹之惠濟方治反胃吐蛔吐食用蠶繭十個煮汁烹雞子三枚食之以無灰酒下日二服神效或以繰絲湯煮粟米粥食之聖惠方治大小便血及婦人血崩血淋疼痛並腸風下血用爾黃蠶蛻紙並燒存性晚蠶砂白殭蠶並炒等分為末入麝香少許每服二錢米飲送下日三服甚效名繭黃散絹無毒黃絲絹主產婦脬損小便不出淋瀝不斷燒灰止血痢下血吐血血崩煮汁止消渴洗痘瘡潰爛本草綱目名李時珍云絹疏帛也生曰絹熟曰練地處處有之時生織成無時採取用無時用入藥用黃絲絹新者乃蠶所吐黃絲成繭本色織成非染色也質長短不齊闊狹不等色黃味甘性溫合治集簡方治婦人血崩用黃絹灰五分棕櫚灰一錢貫眾灰京墨灰荷葉灰各五分水酒調服即止婦人良方治產後脬損小便淋瀝不斷用黃絲絹三尺以炭灰淋汁煮至極爛清水洗淨入黃蠟半兩蜜一兩茅根二錢馬勃末二錢水一升煎一盞空心頓服服時勿作聲作聲即不效名固脬散又方治產時傷脬終日不小便只淋濕不斷用生絲黃絹一尺白牡丹根皮末白芨末各一錢水二碗煮至絹爛如餳服之不宜作聲即效緋絹燒灰入瘧藥綱目附錄汗衫汗衫主卒中忤惡鬼氣卒倒不知人逆冷口鼻出清血或胸脅腹內絞急切痛如鬼擊之狀不可按摩或吐血衄血用久垢汗衫燒炎百沸湯或酒服二錢男用女女用男中襯衣亦可本草綱目名中單裲襠羞袒李時珍云古者短襦為衫今謂長衣亦曰衫矣王藛炙轂子云漢王與項王戰汗透中單改名汗衫劉熙釋名云汗衣詩謂之澤衣或曰鄙袒或曰羞袒用六尺裁足覆胸背言羞鄙於袒故衣此爾又前當胸後當背故曰裲襠治生生編云小兒夜啼用本兒初穿毛衫兒放瓶內自不哭也病人衣病人衣主天行疫瘟取初病人衣服於甑上蒸過則一家不染本草綱目布無毒布主血崩金瘡燒灰用品彙續集名厚布希布紫花布李時珍云布有木綿布麻布字從手從巾會意也地處處有之用白布青布新麻布舊麻布諸布灰青布漬汁質厚希闊狹長短不同色本白本紫有染青黃赤黑諸色味甘性溫制燒煙煅研水漬取汁酢煮青布治陳藏器本草方治瘡傷風水用青布燒煙於器中以器口熏瘡得惡汁出則痛癢瘥千金方治霍亂轉筋入腹無可奈何以酢煮青布搽之冷則易又方治病後目赤用冷水漬青布掩之數易活人書云治傷寒陽毒狂亂甚者用青布一尺浸冷水貼其胸前聖惠方治目痛𥕺澀不得瞑用青布炙熱以時熨之又蒸大豆作枕合治陳藏器本草方治惡瘡防水用青布和蠟燒煙筒中熏之入水不爛鄧筆峰雜興方治臁瘡潰爛用陳艾五錢雄黃二錢青布同卷作大炷點火熏之熱水流數次愈僧坦集驗方治交接違禮女人血出不止用青布同發燒灰納之二次即愈解陳藏器云青布解諸物毒天行煩毒小兒寒熱丹毒並水漬取汁飲之新麻布主逐瘀血婦人血閉腹痛產後血痛以數重包白鹽一合煅研溫酒服之綱目分錄舊麻布主同旱蓮草等分瓶內泥固煅研日用揩齒能固牙烏須綱目分錄白木綿布主口唇緊小不能開合飲食不治殺人作大炷安刀斧上燒令汗出拭塗之日三五度再用青木綿布燒灰酒服綱目分錄青木綿布浸汁和生薑汁服止霍亂燒灰敷惡瘡經年不瘥者及灸瘡止血令不傷風水燒煙燻嗽殺蟲熏虎狼咬瘡能出水毒入諸膏藥療疔腫狐尿等惡瘡本草拾遺燒灰酒服主唇裂生瘡口臭仍和脂塗之與藍靛同功綱目分錄頭巾故頭巾主天行勞復後渴取多膩者浸汁暖服一升出千金方名李時珍云古以尺布裹頭為巾後世以紗羅布葛縫合方者曰巾圓者曰帽加以漆制曰冠又束髮之帛曰𢄼覆發之巾曰幘罩發之絡曰網巾近制也治集元方治霍亂吐利偷本人頭繒以百沸湯泡汁服一呷勿令知之聖惠方治卒忽心痛用三年頭𢄼沸湯淋汁飲之以碗覆𢄼於閒地周時即愈合治馬氏方治惡氣心痛用破網巾燒灰一錢貓屎燒灰五分溫酒用集簡方治下蝕疳瘡破絲網燒存性孩兒茶各五分研末以濃茶洗淨擫之三五次效忌生冷房事發物袱頭袱頭主燒煙燻產後血暈燒灰水服治血崩及婦人交腸病本草綱目名李時珍云袱頭朝冠也北周武帝始用漆紗制之至唐又有紗帽之制逮今用之合治陳總領方治暴崩下血琥珀散用漆紗帽灰雲取陽氣衝上之義夏子益奇疾方治婦人因生產陰陽易位前陰出糞名曰交腸病取舊袱頭燒灰酒服再間服五苓散分利之代如無袱頭凡舊漆紗帽皆可代之此皆取漆能行敗血之義耳皮巾子皮巾子主下血及大風癘瘡燒灰入藥本草綱目合治聖惠方治積年腸風瀉血百藥不瘥用敗皮巾子燒灰白礬煅過各一兩人指甲燒焦麝香各一分乾薑炮三兩為末每服一錢米飲下皮腰帶皮腰帶主大風癘瘡燒灰入藥本草綱目氈屜音替氈屜主瘰癧燒灰五匕酒一升和平旦向日服取吐良千金食治名屜音替屧音燮李時珍云凡履中薦襪下氈皆曰屜可以代替也治集要方治痔瘡初起癢痛不止用氈襪烘熱熨之冷又易壽域方治一切心痛用氈襪後跟一對燒灰酒服男用女女用男千金方治斷酒不飲以酒漬氈屜一宿平旦飲得吐即止也皮靴皮靴主癬瘡取舊靴底燒灰同皂礬末摻之先以蔥椒湯洗淨本草綱目名靴李時珍云靴皮履也所以華足故字從革華地劉熙云靴跨也本胡服趙武靈王好著短靿靴後世乃作長靿靴質有牛皮馬皮驢皮麂皮等靴用入藥惟用牛皮者色本色黃染黑色味甘性溫臭膻制洗淨煮爛或燒灰治聖惠方治小兒頭瘡用皮鞋底洗淨煮爛洗訖敷之直指方治身項粉瘤用舊皮鞋底洗淨煮爛成凍子常食之瘤自破如豆腐極臭集元方治瘰癧已潰用牛皮油靴底燒灰麻油調敷之合治直指方治牛皮癬瘡用牛皮鞋底燒灰入輕粉少許麻油調抹聖惠方治腸風下血用皮鞋底蠶繭蛻核桃殼紅雞冠花等分燒灰每服一錢酒送下又方治小兒頭瘡用舊皮鞋面燒灰入輕粉少許生油調敷之草鞋草鞋主催生療霍亂本草綱目名屩草屨不借千里馬李時珍云世本言黃帝之臣始作屨即今草鞋也劉熙釋名云屨名者拘也所以拘足也屩者蹻也著之蹻便也不借者賤而易得不假借人也地南方用稻草結成之時採無時於路途中收之用有去兩頭用者有全用者質如履狀口用繩結系足背色黃味甘性溫制洗淨燒灰或煎湯應用治胎產方治產婦催生用路旁破草鞋一隻洗淨燒灰酒服二錢如得左足男胎右足女胎覆者兒死側者兒驚自然之理也事海文山云出路在家應急方治霍亂吐瀉用路旁破草鞋去兩頭洗三四次水煎湯一碗滾服之即愈合治救急方治渾身骨痛用破草鞋燒灰香油和逄痛處即止又方治行路足腫被石墊傷者用草鞋浸尿缸內半日以磚一塊燒紅置鞋於上將足踏之令熱氣入皮里即消海上方治臁瘡潰爛有詩云左腳草鞋將捧挑水中洗淨火中燒細研為末加輕粉濯用鹽湯敷即消紙無毒紙主吐血衄血血痢不止月經不絕產後血暈老小尿床俱燒灰用品彙續集名李時珍云古者編竹炙青書字謂之汗青故簡策字皆從竹按文天祥詩云留取丹心照汗青是也至秦漢間以繒帛書字謂之幡紙故紙字從系或從巾也從氏諧聲也劉熙釋名云紙者砥也其平如砥也地東漢和帝時來陽蔡倫始採樹皮故帛魚網麻繒煮爛造紙天下乃通用之蘇易簡紙譜云蜀人以麻閩人以嫩竹北人以桑皮剡溪以藤海人以苔浙人以麥𪌭稻稈吳人以繭楚人以楮為紙是也用凡燒藥以墨塗紙裹藥最能拒火藥品中有閃刀紙乃摺紙之際一角疊在紙中匠人不知漏裁者醫人取入藥用今方中未見用此何歟質有繭紙竹紙楮紙藤紙草紙麻紙苔紙桑皮紙麥面稻稈紙厚薄不同大小不等色有白有黃有蒼色或染成青黃赤黑諸色味甘性平制燒灰煅研治普濟方治吐血不止用白薄紙五張燒灰水服效不可言又方用屏風上故紙燒灰酒服一錢即止王璆百一選方治皮膚血濺出者以煮酒罈上紙扯碎如楊花捏在出血處按之即止聖惠方治血痢不止用白紙三張裹鹽一匙燒赤研末分三服米飲下劉禹錫傳信方治月經不絕來無時者案紙三十張燒灰清酒半升和服頓定冬月用暖酒服之又治產後血暈上方服之立驗已斃經一日者去板齒灌之亦活集元方治諸蟲入耳以紙塞耳鼻留蟲入之耳不塞閉口勿言少頃蟲當出也集簡方治老小尿床用白紙一張鋪席下待遺於上即取紙曬燒酒服楮紙燒灰主吐血衄血血崩金瘡出血綱目分錄竹紙包犬毛燒末酒服止瘧聖惠方藤紙燒灰敷破傷出血及大人小兒內熱衄血不止用故藤紙瓶中燒存性二錢入麝香少許酒服仍以紙捻包麝香燒煙燻鼻綱目分錄草紙作捻紝癰疽最拔膿蘸油燃燈照諸惡瘡浸淫濕爛者出黃水數次取效綱目分錄麻紙止諸失血燒灰用綱目分錄紙錢主癰疽將潰以筒燒之乘熱吸患處其灰止血其煙久嗅損人肺氣綱目分錄青紙青紙主妒精瘡以唾黏貼數日即愈且護痛也彌久者良上有青黛殺蟲解毒本草綱目桐油傘紙桐油傘紙主蛀干陰瘡燒灰出火毒一夜敷之便結痂本草綱目合治醫方捷徑云治疔瘡發汗用千年石灰炒十分舊黑傘紙燒灰一分每用一小匙先以齏水些少次傾香油些少入末攪勻沸湯一盞調下厚被蓋之一時大汗出也歷日歷日主邪瘧不止本草綱目名李時珍云太昊始作歷日是有書禮記十二月天子頒朔於諸侯治衛生易簡方治邪瘧用隔年全歷端午午時燒灰糊丸如梧子大發日早用無根水送下五十丸鍾馗鍾馗主辟邪止瘧本草綱目地逸史云唐高祖時鐘馗應舉不第觸階而死後明皇夢有小鬼盜玉笛一大鬼破帽藍袍捉鬼啖之上問之對曰臣終南山進士鍾馗也蒙賜袍帶之葬誓除天下虛耗之鬼乃命吳道子圖像傳之天下治楊起簡便方治婦人難生產用鍾馗左腳燒灰水服合治聖濟錄云治鬼瘧來去畫鍾馗紙燒灰二錢阿魏砒霜丹砂各一皂子大為末寒食麵和丸小豆大每服一丸發時冷水下用正月十五日五月初五日修合贗李時珍云謹按爾雅言中馗菌名也考工記注云終葵椎名也菌似椎形椎似菌形故得同稱俗畫神執一椎擊鬼故亦名中馗好事者因作鍾馗傳言是未第進士能啖鬼遂成故事不知其訛矣桃符桃符主中惡精魅邪氣煮汁服藥性本草地李時珍云風俗通云東海度朔山有大桃蟠屈千里其北有鬼門二神守之名神荼鬱壘主領眾鬼黃帝因立此板於門畫二神以御凶鬼邪祟時生無時採無時應用取之用取桃樹向陽者質典術云桃乃西方之木五木之精仙木也削成大小木板用之色黃白味辛性溫氣惡故能厭伏邪氣制百鬼耳合治錢乙小兒方有桃符圓疏取積熱及結胸用巴豆霜黃蘖大黃各一錢一字輕粉硇砂各半錢為末麵糊丸粟米大量大小用桃符湯下無則以桃枝代之蓋桃性快利大腸兼取厭伏邪惡之義耳解今人門上往往用桃符辟邪氣吹火筒吹火筒主小兒陰被蚯蚓呵腫令婦人以筒吹其腫處即消本草綱目銃楔銃楔主難產燒灰酒服之又闢忤惡邪氣本草綱目馬鞭馬鞭主馬汗氣入瘡或馬毛入瘡腫毒煩熱入腹殺人燒鞭皮末和膏敷之本草綱目名馬策李時珍云竹柄編革為之故鞭從革便策從竹束會意合治李時珍方治狐尿刺瘡腫痛取鞭梢二寸鼠屎二七粒燒研和膏敷之箭笴及鏃箭笴及鏃主婦人產後腹中癢密安所臥席下勿令婦知本草拾遺刺傷風水刮箭下漆塗之又主疔瘡惡腫刮箭笴茹作炷灸二七壯本草綱目名揚雄方言云自關而東謂之矢自關而西謂之箭江淮之間謂之鏃劉熙釋名云矢又謂之鏑本曰足末曰括體曰干旁曰羽諸名合治外臺秘要方治婦人難產用箭干三寸弓弦三寸燒末酒服方出崔氏小品方治難產飛生丸用故箭羽方見禽部䴎鼠下紡車弦紡車弦主坐馬癰燒灰敷之本草綱目凡人逃走取其發於緯車上逆轉之則迷亂不知所適本草拾遺連枷關連枷關本草綱目主轉胞小便不通燒灰水服千金方楤檐尖楤檐尖本草綱目主腸癰已成取少許燒灰酒服當作孔出膿千金食治簟簟主蜘蛛尿蠼螋尿瘡取舊者燒灰敷之本草綱目名籧篨筕簹筍席李時珍云簟可延展故字從竹𧃐𧃐延長也地出竹處有之用有蒲簟藤簟竹簟入藥當用竹簟必須睡舊者為佳質細削竹為篾編織成之長短闊狹不等按邶風雲籧篨不鮮朱注云籧篨本竹蓆之名竹蓆即簟也簟即簀也色新成者黃睡舊者黑味甘辛性溫涼合治外臺秘要云治小兒初生吐不止者用籧篨少許同人乳二合鹽二粟許煎沸入牛黃粟許與服此劉五娘方也簾箔簾箔嘉祐補註本草廁屋戶簾主小兒霍亂燒灰飲服一錢外臺秘要箔經繩主癰疽有膿不潰燒研和臘豬脂敷下畔即潰不須針灸千金方名李時珍云其形方廉而薄故曰簾曰箔地處處有之用廁戶簾及箔經繩並敗芒箔質以竹及葦芒編成其帛幕曰帟敗芒箔見草部下漆器漆器主產後血暈燒煙燻之即蘇又殺諸蟲本草綱目名漆碗漆鍾漆盤漆盒地處處有之用硃紅漆黑漆金漆諸器質器有大小不等色赤黑黃紫味辛性溫治集簡方治血崩不止用黑漆器燒灰童便調服救急方治白禿頭瘡用破硃紅漆器剝取漆朱燒灰油調敷之合治集簡方治血崩不止用漆器灰棕灰各一錢柏葉煎湯下解古今錄驗方解蠍蠆螫傷以漆木碗合螫處神驗燈盞油有毒燈盞油主一切急病中風喉痹痰厥用鵝翎掃入喉內取吐即效又塗一切惡瘡疥癬本草綱目名燈窩油地家家有之味辛苦性溫合治集元方治乳上生癰用芝麻炒焦搗爛以燈盞內油腳調敷即散解解釋走馬喉痹詩云急喉痹腫最堪憂速取點燈盞內油甚者不過三五呷此方原是至人留鍋蓋鍋蓋主牙疳陰疳取黑垢同雞䏶胵黃皮灰蠶繭灰枯礬等分為末米泔洗後頻敷之本草綱目蒸籠蒸籠本草拾遺主取年久竹片同弊帚扎縛草舊麻鞋底系及蛇蛻皮燒灰擦白癜風太平聖惠方炊單布炊單布主墜馬及一切筋骨傷損張仲景方中用之本草綱目解王璆百一選方言一人因開甑熱氣蒸麵即浮腫眼閉一醫以意取久用炊單布為末隨敷隨消蓋此物受湯上之氣多故用此引出湯氣之毒亦猶鹽水取鹹味以類相感也弊帚弊帚主白駁癩風燒灰入藥本草綱目名彗許慎說文云帚從手持巾以掃除也竹帚曰彗地處處有之凡竹枝荊苕黍艹蠋茭蒲芒草落帚之類皆可為帚也治聖惠方治身面疣目每月望子時以禿帚掃疣目三七遍漸漸消去合治古今錄驗方治白駁風用弊帚弊帛履底甑帶脯臘蟬頸蛇皮等分以月食時合燒為末酒服方寸匕日三服仍以醇醋和塗之忌食發風物此乃徐玉方也簸箕舌簸箕舌本草綱目主重舌出涎燒研酒服一錢又主月水不斷太平聖惠方名竹簸箕艹厂畀柳簸箕李時珍云簸揚之箕也地南人用竹北人用艹厂畀柳為之治集元方催生用簸箕淋水一盞飲數口竹籃竹籃主取耳燒灰敷狗咬瘡本草拾遺名陳藏器云做成竹器也國風雲不盈頃筐朱注云筐竹器故又名筐地出於南方甚多無竹處罕有魚笱魚笱本草綱目主舊笱須療魚骨哽燒灰粥飲服方寸匕肘後方名歐陽詢初學記云取魚之器曰笱音苟曰𥰣音留曰罛音孤曰篧音罩曰㺜音抄諸名草麻繩索草麻繩索主大腹水病取三十枚去皮研水三合旦服日中當吐下水汁結囊若不盡三日後再作未盡更作瘥後禁水飲咸物本草綱目名李時珍云小曰索大曰繩治肘後方治斷瘟不染以繩度所住戶中壁屈繩結之即不染也聖惠方治消渴煩躁取七家井索近瓶口結處燒灰新汲水服一錢不過三五服效馬絆繩馬絆繩主煎水洗小兒癇唐本草燒灰摻鼻中瘡本草綱目縛豬繩縛豬繩本草綱目主小兒驚啼發歇不定用臘月者燒灰水服少許本草拾遺牛鼻桊音卷牛鼻桊本草綱目木桊主小兒癇草桊燒研敷小兒鼻下瘡名醫別錄木桊煮汁或燒灰酒服治消渴草桊灰吹喉風有效本草綱目名李時珍云穿牛鼻繩木也合治普濟方治消渴飲水用牛鼻木二個男用牝牛女用牡牛者洗銼人參甘草半兩大白梅一個水四碗煎三碗熱服甚妙救急方治冬月皸裂用牛鼻繩末和五倍子末填入薄紙貼之廁籌廁籌主難產及霍亂身冷轉筋於床下燒取熱氣徹上亦主中惡鬼氣此物最微其功可錄本草拾遺合治王氏小兒方治小兒驚竄兩眼看地不上者用皂角燒灰以童尿浸刮屎柴竹火烘乾為末貼其囟門即蘇聖惠方治小兒齒遲正旦取尿坑中竹木刮塗之即生尿桶尿桶本草綱目舊板主霍亂吐利煎水服山村宜之如宜方舊箍主腳縫搔癢或瘡有竅出血不止燒灰敷之年久者佳本草綱目
