body:
  text: 卷之三十五米穀部上品谷之木胡麻無毒植生胡麻出神農本經主傷中虛羸補五內益氣力長肌肉填髓腦久服輕身不老以上朱字神農本經堅筋骨療金瘡止痛及傷寒溫瘧大吐後虛熱羸困明耳目耐飢渴延年以上黑字名醫所錄名藤苰鴻藏方金苗圖經曰苗梗如麻而葉圓銳光澤嫩時可作蔬道家多食之按廣雅云藤苰胡麻也陶隱居云其莖方者名巨勝圓者名胡麻蘇恭云其實作角八稜者名巨勝六稜四稜者為胡麻如此巨勝胡麻為二物矣或云本生胡中形體類麻故名胡麻也然仙方中乃有服食胡麻巨勝二法功用小別亦如天雄附子有分二物之義今按時用內實扁小而三稜者為胡麻四稜差大而方者為巨勝今服食家最為要藥又一種形類大麻葉如荏而狹尖莖方高四五尺開黃花結子成房如胡麻角而小其色黃俗謂之黃麻其實黑色如韭子而粒細味苦如膽略無膏油乃是今之油麻非此胡麻也衍義曰胡麻諸家之說參差不一止是今脂麻更無他義蓋其種出於大宛故言胡麻今胡地所出者皆肥大其紋鵲其色紫黑有如此區別取油亦多故詩云松下飯胡麻此乃是所食之谷無疑與白麻油為一物如川大黃川當歸川升麻上黨人參齊州半夏之類不可與他土者更為二物蓋特以其地之所宜立名也是知胡麻與白油麻為一物嘗官於順安軍雄霸州之間備見之又二條皆言無毒治療大同今之用白油麻世不可一日闕也然亦不至於大寒宜詳審之地圖經曰生上黨川澤今處處有皆園圃所種稀復野生道地出胡地者佳時生春生苗採八月九月取子收曬乾用子三稜者佳色紫黑味甘性平氣氣厚於味陽也臭香主養五臟堅筋骨制雷公云若修事一斤先以水淘浮者去之沉者漉出令乾以酒拌蒸從巳至亥出攤曬乾於臼中舂令粗皮一重盡拌小豆相對同炒小豆熟即出去小豆用之上有薄皮亦留用力在皮殼也一法九蒸九曝治療藥性論云患崩中血凝疰者生搗納湯中絞汁服日華子云療產後羸困及止心驚別錄云生嚼塗小兒頭瘡及浸淫惡瘡婦人陰瘡補日華子云補中益氣耐寒暑療勞氣葉作湯沐潤毛髮滑皮膚益血色令髮長合治合白大豆棗九蒸九曝作丸食令人不飢延年斷谷合蒼耳子搗末服療風癩禁蒸不熟令人發落生菜巨勝子無毒植生巨勝子主五臟虛損羸瘦益氣力堅筋骨油主天行熱閉腸結葉可沐頭令髮長潤澤名醫所錄名狗蝨方莖苗圖經曰巨勝與胡麻形體相類陶隱居云莖圓者為胡麻莖方者為巨勝蘇恭云其實作角八稜者名巨勝六稜四稜者名胡麻如此胡麻巨勝為二物矣然八谷之中最為大勝故名巨勝也廣雅云狗蝨巨勝也葛稚川亦云胡麻中有一葉兩莢者為巨勝今按時用其角內實扁小而三稜者為胡麻差大四稜而方者為巨勝也地圖經曰生上黨川澤今處處有之皆園圃所種稀復野生道地生胡地者甚佳時生春生苗採八月九月取子收曬乾用子四稜者佳色紫黑味甘酸澀性平緩氣氣之薄者陽中之陰臭香主益五臟填骨髓制九蒸九曝搗之治療日華子云利大小腸催生落胞逐風溫氣遊風頭風塗頭長髮補日華子云益肺氣潤五臟填精髓別錄云餌之令人不老耐風濕合治合白蜜等分為丸名靜神丸益肺氣潤五臟休糧填骨髓禁蒸不熟令人發落胡麻油無毒胡麻油主利大腸胞衣不落生者摩瘡腫生禿髮名醫所錄苗謹按胡麻春生苗梗如麻其梗圓高三四尺而葉圓銳光澤至秋結實其實作角四稜六稜者是人採其實去殼用仁榨取其油外潤毛髮內滋臟腑蓋潤利之功多也地圖經曰生上黨川澤今處處有之皆園圃所種稀復野生道地生胡地者甚佳時生無時採無時色青黃味甘性微寒氣氣之薄者陽中之陰臭香制熬熟入藥生亦可用治療陳藏器云利天行熱秘腸內結熱生油殺蟲別錄云主喑啞禁多食損聲令體重青蘘無毒植生青蘘音葙主五臟邪氣風寒濕痹益氣補腦體堅筋骨久服耳目聰明不飢不老增壽神農本經名夢神苗衍義曰青蘘即油麻葉也陶隱居注亦曰胡麻葉也胡地脂麻鵲色子頗大日華子云葉作湯沐潤毛髮乃是今人所取胡麻葉以湯浸之良久涎出湯遂稠黃色婦人用之梳髮由是言之胡麻與白油麻今人所謂脂麻者是矣青蘘即其葉無疑地圖經曰生上黨川澤今處處有之皆園圃所種稀復野生道地出胡地大宛者甚佳時生春生苗採四月五月收陰乾用葉色青味甘性寒緩氣氣之薄者陽中之陰臭朽主潤毛髮益血氣治療圖經曰利大腸作湯沐頭令髮長日華子云作湯沐滑皮膚麻蕡有毒麻子附植生麻蕡音墳出神農本經主五勞七傷利五臟下血寒氣多食令見鬼狂走久服通神明輕身麻子味甘平主補中益氣肥健不老以上朱字神農本經麻蕡破積止痹散膿麻子無毒主中風汗出逐水利小便破積血復血脈乳婦產後余疾長髮可為沐藥久服神仙以上黑字名醫所錄名麻勃荸麻母苗圖經曰苗高丈許葉似黃蜀葵而小有鉤齒七月開花子如茴實即大麻子也其皮漚之可績為布麻蕡又謂麻勃乃麻上花勃勃者七月七日採麻子九月採入土者不用陶隱居以麻蕡為牡麻牡麻則無花蘇恭以為蕡即實非花也又引爾雅蕡枲實及禮云苴麻之有蕡者皆謂蕡為子也謂其子條重出為誤按本經麻蕡主七傷利五臟多食令人狂走觀古今方書用麻子所治亦爾又麻花非所食之物如蘇之論似當矣然朱字云麻蕡味辛麻子味甘此又似二物疑本草與爾雅禮記有稱謂不同者耳又古方亦有用麻花者云味苦微熱無毒主諸風及女經不利䗪以蟲為使然則蕡也子也花也其三物乎據紹興校定云此即世之作布麻者蓋麻蕡乃麻花衣勃其麻子即實也然有花者即無實有實者即不生花似有牡牝故分兩種爾注云以蕡為子理頗遠矣性味主治各具本經及諸方亦間用之隨其所宜也其花衣勃食之麻人本經云有毒麻實即無毒矣地圖經曰生泰山川穀今處處田圃蒔之時生春生苗採七月七日取花勃九月取實收曬乾用花上勃及實色青綠味辛性平氣氣之薄者陽中之陰臭朽制衍義曰凡用麻子以帛包之沸湯中浸湯冷出之垂井中一夜勿令著水次日日中曝乾就新瓦上挼去殼簸揚取仁粒粒皆完也治療圖經曰皮青淋湯濯瘀血根煮汁冷服主下血不止根及葉療踠折骨痛不可忍並撾打瘀血心腹滿氣短搗汁服如無煮乾麻亦同唐本注云根產難衣不出破血壅脹帶下崩中不止漚麻汁止消渴葉汁殺蛔蟲並敷蠍毒藥性論云花治一百二十種惡風黑色遍身苦癢逐諸風惡血葉沐髮長潤麻仁除大腸風熱結澀及熱淋日華子云大麻補虛勞逐一切風氣長肌肉益毛髮去皮膚頑痹下水氣及下乳止消渴催生橫逆產合治合大豆熬香搗末蜜丸服令不飢耐老益氣禁不宜多食損血脈滑精氣痿陽氣婦人髮帶疾白油麻無毒植生白油麻主虛勞滑腸胃行風氣通血脈去頭浮風潤肌食後生啖一合終身不輟與乳母食其孩子永不病生若客熱可作飲汁服之停久者發霍亂又生嚼敷小兒頭上諸瘡良久食抽人肌肉生則寒炒則熱油冷無毒殺五黃下三焦熱毒氣通大小腸治蛔心痛敷一切瘡疥癬殺一切蟲陳者煎膏生肌長肉止痛消癰腫補皮裂名醫所錄苗圖經曰白油麻與胡麻一等但以其色言之比胡麻差淡亦不全白今人謂之脂麻前條已具炒熟乘熱壓出油而謂之生油但可點照須再煎煉方可謂之熟油始可食之復不中點照亦一異也如鐵自火中出而謂之生鐵亦此義耳地圖經曰出上黨川澤及中原川穀今處處有之皆園圃所種不復野生時生二月三月採七月八月收曝乾用仁油葉色白味甘性大寒氣氣之薄者陰中之陽臭香主潤肌膚滑臟腑治療圖經曰白麻除癰疽熱病麻油治蚰蜒入耳以油煎餅枕臥須臾自出別錄云白麻豌豆瘡服之即不生白漿水蜘蛛咬人研敷小兒急疳瘡嚼敷小兒軟癤焦炒乘熱嚼敷生麻療心痛無問冷熱合治油合蔥豉煎香置患人枕邊令空服嗅而不食療胸喉間有瘕蟲其蟲即出烏麻油一盞合水半盞雞子白一枚熟攪令勻服治傷寒三五日忽有黃白麻合酒煎去麻服療嘔油一升薤白三斤油中煎令薤黑服酒令百脈血充盛服金石人先宜服葉搗和漿水絞去滓沐頭去風潤髮油一合合雞子兩顆芒硝一兩攪服之少時即瀉治熱毒瘥禁久食抽人肌肉多食發冷疾滑骨髓發臟腑渴困脾臟凡飲食物須逐日熬熟若經宿者即動氣有牙齒並脾胃疾切不可吃解壓丹石熱毒飴糖無毒煎煉成飴音貽糖主補虛乏止渴去血名醫所錄地蜀本圖經曰飴即軟糖也乃作糵所成北人謂之餳以粳米粟米大麻白朮黃精枳音止椇音矩子等並堪作之今醫家用以和藥惟糯與粟米作者入藥為佳余不堪用蜀黍米亦可造唐白樂天詩一㾧較牙糃者是也湯液本草云其色紫凝如深琥珀色謂之膠飴色白而枯者非膠飴即餳糖也不入藥用中滿不宜用嘔家切忌仲景謂嘔家不用建中湯以甘故也收瓷器貯之用糯米作者佳色紫赤味甘性微溫氣氣之厚者陽也臭香行足太陰經治療日華子云消痰止渴孟詵云止渴去留血別錄云止吐血誤吞錢及鈈釵漸食一斤便出魚骨鯁在喉中為丸如雞子黃大吞之即瘥補日華子云益氣力潤五臟孟詵云補虛乏健脾胃氣益中合治合酒服療打損瘀血合蔓菁薤汁中煮沸服治傷寒大毒嗽禁多食動脾風中滿不宜用忌嘔家勿用灰藋無毒植生灰藋主惡瘡蟲蠶蜘蛛等咬搗碎和油敷之亦可煮食亦作浴湯去疥癬風瘙燒為灰口含及納齒孔中殺齒䘌疳瘡取三四度淋取汁蝕息肉除白癜風黑子䵟著肉作瘡子炊為飯香滑殺三蟲名醫所錄名金鎖天苗圖經曰生熟地葉心有白粉似藜而藜心赤莖大堪為杖亦殺蟲人食為藥不如白藋也雷公云時呼為灰藋是金鎖天葉撲蔓翠上往往有金星堪用若白青色是忌女莖不入用也紹興校定云灰藋乃野生之物本經主治多以外用其子炊飯殺蟲但未聞用驗之據村人或以作菜煮食也地處處有之時生春生苗採夏秋取收曬乾用莖葉色白味甘性平氣氣厚於味陽也臭香主殺三蟲除疥癬制雷公曰若使金鎖天葉莖高低二尺五寸妙也若長若短不中使凡用勿令犯水先去根曬乾用布拭上肉毛令盡細銼焙乾用之四種陳藏器余師草實味甘平無毒主不飢輕身出東海洲島似大麥秋熟一名禹餘糧非石之餘糧也海藥云其實如球子八月收之彼常食之物主補虛羸乏損溫腸胃止嘔逆久食健人一名然殼中國人未曾見也寒食飰主滅瘢痕有舊瘢及雜瘡並細研敷之飰灰主病後食勞別錄云治蛟龍瘕寒食餳三斤每服五合一日三服遂吐出蛟龍有兩頭及尾也𦬣米味甘寒無毒主利腸胃益氣力久食不飢去熱益人可為飯生水田中苗子似小麥而小四月熟爾雅云守田似燕麥可食一名守氣也狼尾草子作黍食之令人不飢似茅作穗生澤地廣志云可作黍爾雅云孟狼尾今人呼為狼茅子蒯草子亦堪食如粳米苗似茅
