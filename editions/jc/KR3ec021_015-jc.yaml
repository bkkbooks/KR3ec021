body:
  text: 卷之十四草部下品之中草之草羊蹄無毒附根實葉酸模植生羊蹄出神農本經主頭禿疥瘙除熱女子陰蝕以上朱字神農本經浸淫疽痔殺蟲以上黑字名醫所錄名東方宿連蟲陸鬼目蓄禿菜金橋麥蓫苗圖經曰春生苗高三四尺葉狹長頰似萵苣而色深莖節間紫赤花青白成穗子三稜有若茺蔚夏中即枯根似牛蒡而堅實詩小雅云言採其蓫陸機云蓫即今之羊蹄也又有一種極相類而葉黃味酢名酸模爾雅所謂須薞音孫蕪郭璞云薞蕪似羊蹄葉細味酢可食一名蓚音修是也地圖經曰生陳留川澤今所在有之時生春生苗採夏取根秋取實收日乾用根實葉質根似牛藭而堅實色蒼白味苦性寒泄氣味厚於氣陰也主癬瘡殺蟲治療唐本注云實除赤白痢根療蠱毒日華子云根殺一切蟲並癬葉治小兒疳蟲酸模主小兒壯熱衍義曰根研取汁三二匙水半盞煎一二沸空肚溫服治產後風秘別錄云羊蹄根葉爛煮一碗食之療腸風痔瀉血不止陳藏器云酸模葉酸美小兒折食其英根除暴熱腹脹搗汁服當下痢殺皮膚小蟲合治根於生鐵上令醋磨旋旋刮取塗癧瘍風未瘥更入硫黃少許同傅之合酢敷漏瘤瘡濕癬癢浸淫日久癢不可忍搔之黃水出瘥後復發者合醋摩貼腫毒效根搗汁合膩粉少許調如膏敷癬瘡久不瘥者干即用豬脂和敷禁不宜多食解殺胡夷魚召宏魚檀胡魚毒菰根無毒附菰葑叢生菰根主腸胃痼熱消渴止小便利名醫所錄名茭草茭白茭手菰菜菰手烏郁茭郁蘧蔬苗圖經曰生水中葉如蒲葦輩江南人謂之茭草刈以養馬甚肥春亦生筍甜美堪啖即菰菜也又謂之茭白歲久者中心生白薹如小兒臂謂之菰手今人作菰首非是爾雅所謂蘧蔬注云似土菌生菰草中正謂此也故南方人至今謂菌為菰亦緣此義爾其薹中有黑者謂之茭郁其根亦如蘆根冷利更甚浙濟下澤處一種菰草其根相結而生謂之菰葑刈去其葉更可耕蒔其苗有莖硬者謂之菰蔣草可作薦花穗如葦結青子細若青麻黃長几寸彼人收之謂之雕胡米合粟為粥食之甚濟飢此杜甫所謂願作冷秋菰是也古人以為美饌今飢歲採以當糧西京雜記雲漢太液池邊皆是雕胡紫籜綠節蒲叢之類菰之有米者長安人謂為雕胡葭蘆之米解葉者紫籜菰之有首謂之綠節也地圖經曰出江湖陂澤中今在處有之時生春生苗採七月八月取用根實薹葉質類蒲根色白味甘性大寒氣氣之薄者陽中之陰臭朽主除積熱治療日華子云菰葉利五臟陳藏器云菰菜去煩熱止渴除目黃利大小便止熱痢菰手煮食之止渴烏郁止小兒水痢孟銑云菰菜利五臟邪氣酒渣面赤白癩癧瘍目赤茭手去心胸中浮熱風滋人齒別錄云菰蔣節末以敷小兒風瘡久不瘥者及封毒蛇齧瘡口效合治菰菜合鹽醋煮食之療熱毒風氣卒心痛菰菜合鯽魚為羹食之開胃口解酒毒菰蔣根燒灰合雞子黃封湯火瘡禁菰菜滑中不可多食茭手食之發冷氣傷陽道令下焦冷滑忌茭手雜蜜食之發痼疾菰葉食巴豆人不可食萹蓄無毒叢生萹音褊蓄出神農本經主浸淫疥瘙疽痔殺三蟲以上朱字神農本經療女子陰蝕以上黑字名醫所錄名萹竹苗圖經曰春中布地生道傍苗似瞿麥葉細綠如竹赤莖如釵股節間花出甚細微青黃色其根如蒿根爾雅云竹萹蓄郭璞注云似小梨赤莖節好生道傍可食衛詩綠竹猗猗說者曰綠王芻也竹萹竹也即謂此萹蓄也地圖經曰出東萊山谷今在處有之道地冀州時生春生苗採二月八月取收陰乾或日乾用苗質類瞿麥色赤味苦性平泄氣味厚於氣陰中之陽臭腥主痔疾熱黃治療陶隱居云煮汁飲療小兒蛔蟲藥性論云除蛔蟲咬心痛面青口中沫出臨死者取十斤細銼以水一石煎去滓仍煎如飴空腹服之蟲自下蟲盡藥止葉搗汁頓服一升主患痔疾及熱黃根一握洗去土搗汁服一升療丹石毒發沖目腫痛又敷熱腫效別錄云療惡瘡連痂癢痛搗爛敷之痂落即瘥合治汁搜面作餺飥空心吃治外痔日三度常吃效合豉汁中以五味調和煮羹食之治霍亂吐痢不止者狼毒有大毒植生狼毒出神農本經主咳逆上氣破積聚飲食寒熱水氣惡瘡鼠瘻疽蝕鬼精蠱毒殺飛鳥走獸以上朱字神農本經脅下積癖以上黑字名醫所錄名續毒苗圖經曰苗葉似商陸及大黃莖葉上有毛四月開花八月結實其根皮黃肉白以實重沉水者為良浮虛輕者為劣也地圖經曰生秦亭山谷奉高宕昌泰山漢中建平秦州成州今陝西州郡及遼州亦有之道地石州時生春生苗採二月八月取根收陰乾用根陳久者良質類玄參色皮黃肉白味辛性平散氣氣之薄者陽中之陰臭腥主破積聚心腹脹助大豆為之使反畏密陀僧惡麥句姜治療藥性論云除痰飲癥瘕亦殺鼠別錄云為末敷乾癬積年生痂搔之黃水出每逢陰雨即癢者合治以二兩合附子半兩搗篩蜜丸桐子大一日服一丸二日二丸三日三丸再一丸至六日又三丸自一至三常服治心腹相連常脹痛者效合秦艽等分為末酒服方寸匕日二療惡疾末一錢合餳一皂子大沙糖少許以水同化臨臥空腹各一服下臟肉一切蟲豨薟有小毒植生豨音喜薟音鍁主熱䘌煩滿不能食生搗汁服三四合多則令人吐名醫所錄名火薟火杴草苗圖經曰春生苗葉似芥菜而狹長文粗莖高三四尺秋初花開黃白色如菊秋末結實頗似鶴蝨諸州所說皆云性寒有小毒與本經意同惟文州高郵軍云性熱無毒兩說不同蓋系土地所產而然也地圖經曰本經不著所出州土今處處有之道地海州文州高郵軍時生春生苗採三月四月五月五日六月六日取苗葉九月九日取花實收曝乾用苗葉枝花實質葉似芥而狹長色黃白味苦性寒泄氣味厚於氣陰也臭香主諸風制圖經曰淨洗入甑中層層灑酒與蜜蒸之又曝如此九過用治療圖經曰去肝腎風氣四肢麻痹骨間疼腰膝無力亦能行大腸氣及風濕瘡肌肉頑痹婦人久冷別錄云治中風失音不語口眼喎斜時吐涎沫補圖經曰補虛安五臟生毛髮別錄云明眼目烏髭發壯筋力合治五月五日採去地五寸者摘枝葉九蒸九曝為末丸如桐子大合酒或米飲下二三十丸治久患中風者多服效馬鞭草有小毒植生馬鞭草主下部䘌瘡名醫所錄苗圖經曰春生苗似狼牙亦類益母而莖圓高三二尺抽三四穗開紫花似車前其穗類鞭鞘故名馬鞭按陳藏器云若云馬鞭鞘亦未近之其節生紫花如馬鞭節故也地圖經曰舊不載所出州土今廬山江淮郡皆有之道地衡州時生春生苗採七月八月取收日乾用苗葉質類益母草而莖圓色青味甘苦性微寒泄氣氣薄味厚陰中之陽臭朽主通月經破癥瘕制銼碎用治療日華子云通月經治婦人血氣肚脹月候不勻別錄云搗爛塗蠼螋尿瘡效又搗汁飲療食魚鱠及生肉停滯胸膈不化必成癥瘕者又取一握勿見風截去兩頭搗汁服療喉痹躁腫連頰吐血數者名馬喉痹及塗男子陰腫大如升核痛人所不能治者效合治作煎如糖合酒服主症癖血瘕久瘧破腹中血皆下又殺蟲及婦人月水滯澀不快通結成瘕塊肋脹大欲死者並效苧根無毒植生苧根主小兒赤丹漬苧汁療渴名醫所錄苗圖經曰苗高七八尺葉如楮葉面青背白有短毛夏秋間著細穗青花其根黃白而輕虛又有一種山苧亦相似按陸機云苧一科數十莖宿根在地中至春自生不須栽種荊陽間歲三刈官令諸園種之歲再刈便剝取其皮以竹刮其表厚處自脫得裹如筋者煮之用緝今江浙閩中尚如此地圖經曰舊本不載所出州土今閩蜀江浙江左山南皆有之時生春生苗採二月八月取根收曝乾用根葉色黃白味甘性寒平緩氣氣之薄者陽中之陰臭朽主安胎制銼碎或搗汁用治療圖經曰苧根葉熟搗敷療癰疽發背初覺未成膿者日夜數易之腫消則瘥矣唐本注云根貼熱丹毒腫漚苧汁主消渴日華子云根除心膈熱漏胎下血產前後心煩悶天行熱疾大渴大狂服金石藥人心熱罯毒箭蛇蟲咬陳藏器云苧麻與產婦枕之止血暈及產後腹痛以苧安腹上則止別錄云根煮服治五種淋疾合治根二兩合銀五兩酒一盞水一大盞同煎去滓不拘時候溫分二服療妊娠胎動欲墮腹痛不可忍者及療妊娠忽下黃汁如膠或如小豆汁解蠶咬人毒入肉飲苧汁解之白頭翁無毒名醫云有毒叢生白頭翁出神農本經主溫瘧狂昜音羊寒熱症瘕積聚癭氣逐血止痛療金瘡以上朱字神農本經鼻衄以上黑字名醫所錄名野丈人胡王使者柰何草苗圖經曰正月生苗作叢狀如白薇而柔細稍長葉生莖端上有細白毛而不滑澤近根有白茸正似白頭老翁故以名之根紫色深如蔓荊二月三月開紫花黃蕊五月六月結實其苗有風則靜無風自搖與赤箭獨活同爾地圖經曰生嵩山山谷及近京州郡皆有之道地商州徐州時生春生苗採二月取花四月取實七八月取根收曝乾用根莖葉質類軟柴胡而有白茸色黑味苦性溫氣氣薄味厚陰中之陽臭朽主赤毒痢助豚實為之使得酒良制銼碎用治療藥性論云止腹痛齒痛及項下瘤癧百骨節痛日華子云治一切風氣明目消贅子功用與上莖葉同別錄云治陰㿗用白頭翁根生者不限多少搗之隨偏腫處敷之一宿當作瘡二十日愈小兒禿取白頭翁根搗敷一宿或作瘡二十日愈補日華子云暖腰膝甘蕉根無毒附芭蕉油植生甘蕉根主癰腫結熱名醫所錄名紅蕉水蕉牙蕉苗圖經曰春生苗葉與芭蕉相類初夏捲心中抽乾作花初生大萼如倒垂菡萏有十數層層皆作瓣漸大則花出瓣中極繁盛紅者如火炬謂之紅蕉白者如蠟色謂之水蕉其花大類象牙謂之象蕉其色亦有青黃之別品類亦多食之大甘美者是也然作花成實而甘者謂之甘蕉不作花實者乃芭蕉也衍義曰此種三年以上即有花自心中出一莖止一花全如蓮花瓣亦相似但其色微黃綠從下脫葉花心但向上生常如蓮樣然未嘗見其花心剖而視之亦無蕊悉是瓣但花頭常下垂每一朵自中夏開直至中秋後方盡凡三葉開則三葉脫落北地惜其種人故少用縷其苗為布取汁婦人塗發令黑余說如經地圖經曰舊不著所出州郡今二廣閩中川蜀江東皆有之道地南恩州時生春生苗採秋取實不拘時取根收子曝乾用取油以竹筒插皮中如取漆用用根實油色青味甘性大寒氣氣之薄者陽中之陰臭朽主敷癰腫去熱毒制根搗汁用治療圖經曰芭蕉根汁治時疾狂熱及消渴金石發動躁熱並飲之油主暗風癇病涎作暈悶欲倒者飲之得吐便瘥唐本注云甘蕉根搗汁服主產後血脹悶並敷腫去熱毒日華子云生芭蕉根治天行熱狂煩悶患癰毒人並絞汁服及梳頭長益發遊風風疹頭痛並研罯敷之油治頭風熱並女人發落止消渴及療湯火瘡食療云根主黃疸子生食止渴潤肺蒸熟暴之令口開舂取仁食之通血脈別錄云發背欲死者搗芭蕉根塗上瘥小兒赤遊行於上下至心即死搗芭蕉根汁煎塗之補食療云子蒸熟取仁食填骨髓禁子生食發冷病多動風疾蘆根無毒附蓬茸叢生蘆根主消渴客熱止小便利名醫所錄名蓬蕽花也苗圖經曰狀都似竹而無枝其葉抱莖而生花白若茅作穗根亦若竹而節疏闊陶隱居云入藥當掘取水底味甘辛者其露出及浮水中者並不堪用抑考蘆狄蒹菼同類俱生水傍下濕地今人罕別人家園圃植者亦謂之蘆其干差大深碧色者曰碧蘆亦難得然則本草所用蘆今北地謂之葦者皆可通用也地圖經曰舊不載所出州土今在處下濕陂澤中皆有之時生春生苗採二月八月取根收曝乾用根色青黃味甘性寒緩氣氣之薄者陽中之陰臭香主胃熱消渴制雷公云凡使須要逆水蘆其根逆水生並黃泡肥厚味甘者採得後去節須並上赤黃子細銼用治療圖經曰根水煮汁頓服一升止嘔噦蓬茸一把煮濃汁頓服二升治卒得霍亂氣息危急者唐本注云根主嘔逆不下食胃中熱傷寒患者彌佳花水煮汁服主霍亂大效藥性論云根解大熱開胃治噎噦不止日華子云根療寒熱時疾煩悶妊孕人心熱並瀉痢人渴衍義曰根水煎去滓不拘時溫服除五噎心膈氣滯煩悶吐逆不下食別錄云根三升煮濃汁治乾嘔噦若手足厥冷及食狗肉不消心下堅或䐜脹發熱妄語者並效解食牛馬肉中毒癢痛及食鱸魚肝鯸鮐魚中毒並煮根汁解之兼主中魚蟹毒服之尤佳鬼臼有毒叢生鬼臼出神農本經主殺蠱毒鬼疰精物辟惡氣不祥逐邪解百毒以上朱字神農本經療咳嗽喉結風邪煩惑失魄妄見去目中膚翳殺大毒不入湯以上黑字名醫所錄名爵犀馬目毒公九臼天臼解毒害母草苗圖經曰葉似蓖麻重樓輩初生一莖莖端一葉亦有兩歧者年長一莖莖枯為一臼二十年則二十臼也花生莖間赤色三月開後結實一說鬼臼生深山陰地葉六出或五出如雁掌莖端一葉如傘蓋旦時東南及暮則西傾蓋隨日出沒也花紅紫如荔枝正在葉下常為葉所蔽未嘗見日一年生一葉既枯則為一臼及八九年則八九臼矣然一年一臼生而一臼腐蓋陳新相易也故俗名害母草如芋魁烏頭輩亦然新苗生作舊苗死前年之魁腐矣地圖經曰生九真山谷及冤句江寧府滁商杭襄峽等州荊門軍亦有之多生深山岩石之陰道地舒州齊州時生正月生苗採二月七月八月取根收曝乾用根質類南星而極大色白味辛性微溫散氣氣之厚者陽也臭朽主鬼疰蠱毒反畏垣衣治療藥性論云除屍疰殗於劫切殜余攝切勞疾傳屍瘦疾辟邪氣逐鬼角蒿有小毒附礚蒿叢生角蒿主甘濕䘌諸惡瘡有蟲者名醫所錄苗唐本注云葉似蒿花如瞿麥紅赤可愛子似王不留行黑色作角衍義曰角蒿莖葉如青蒿開淡紅紫花花大約徑三四分花罷結角子長二寸許微彎陳藏器云一種礚蒿味辛溫無毒主破血下氣煮食之似小薊生高岡宿根先於百草一名莪蒿爾雅云莪蘿注云礚蒿也詩小雅云菁菁者莪陸機云莪蒿也一名蘿蒿生澤田塹洳如庶切漸濕也處似邪蒿而細科生三月中莖香美可食味頗似蔞蒿也地蜀本圖經云所在皆有之時生三月生苗採七月八月取收曝乾用莖葉質類蒿而作角色青味辛苦性平散氣氣之薄者陽中之陰臭香主口瘡制雷公云凡採得並於槐砧上細銼用治療衍義曰治口齒別錄云燒灰療齒齦宣露多是疳者夜塗齦上切忌油膩沙糖干棗及口中瘡久不瘥入胸中並生瘡者塗之一宿口中若有汁吐之效亦貼小兒口瘡妙贗紅蒿邪蒿為偽草之走馬兜鈴無毒蔓生馬兜鈴主肺熱咳嗽痰結喘促血痔瘻瘡名醫所錄名根雲南根土青木香獨行根苗圖經曰春生苗作藤蔓葉如山芋葉六月開黃紫花頗類枸杞花七月結實棗許大子狀如鈴作四五瓣其根名雲南根似木香小指大赤黃色亦名土青木香衍義曰蔓生附木而上葉脫時鈴尚垂之其狀如馬項鈴故得名須於七八月間採之若熟則自折圻間有子全者也地圖經曰生關中河東河北江淮夔浙州郡亦有之道地信州滁州時生春生苗採二月取根七月八月取實收曝乾用實根質類粟殼而圓小色黃褐味苦性寒泄氣味厚於氣陰也臭朽主咳嗽喘促制雷公云凡使採得後去葉並蔓了用生絹袋盛於東屋角畔懸令乾劈作片取向裡子去革膜並皮用治療圖經曰實主肺病根消氣下膈止刺痛藥性論云實主肺氣上急坐息不得並咳逆連連不止日華子云根除痔瘻瘡以藥於瓶中燒熏患處別錄云根三兩為末分為三貼以水一盞煎五分去滓頓服治五種蠱毒當吐蠱出未快再服以快為度草蠱術在西涼之西方及嶺南人若行此毒入人咽刺痛欲死者苗一兩為末以溫水調下一錢匕即消化蠱出效蛇蠱食飲中得之咽中如有物咽不下吐不出心悶熱服兜鈴即吐出合治淨取子二兩酥半兩入碗內拌勻慢火炒乾合甘草一兩炙二味為末每服一錢水一盞煎六分溫呷或為末含咽津亦得治肺氣喘嗽草之草仙茅有毒植生仙茅主心腹冷氣不能食腰腳風冷攣痹不能行丈夫虛勞老人失溺無子益陽道久服通神強記助筋骨益肌膚長精神明目名醫所錄名獨茅根茅瓜子婆羅門參梵云阿輪干陀苗圖經曰其葉如茅青色軟而稍闊面有縱理又似棕櫚至冬盡枯春初乃生三月有花如梔子黃不結實其根獨莖而直傍有短細根相附肉黃白外皮稍粗褐色其葉似茅故名仙茅也傳云十斤乳石不及一斤仙茅表其功力耳一種衡山出者花碧色五月結黑子與此小異地圖經曰生西域及大庾嶺今蜀川江湖兩浙諸州亦有之道地戎州江寧衡山時生春初生苗採二月八月取根收曝乾用根質類芍藥而細小色黃褐味辛性溫散氣氣之厚者陽也臭香主心腹冷氣丈夫虛勞制雷公云凡採得後用清水洗令淨刮去皮於槐砧上用銅刀切豆許大卻用生稀布袋盛於烏豆水中浸一宿取出用酒濕拌了蒸從巳至亥取出曝乾銼碎用彭祖單服法以米泔浸去赤汁出毒後無妨損治療日華子云除一切風氣開胃下氣海藥云祛風消食補日華子云延年益壽補五勞七傷海藥云補暖腰膝清安五臟強筋骨明耳目久服輕身益顏色填骨髓益陽不倦忌犯鐵器斑人須鬢若食牛乳黑牛肉大減藥力草之走羊桃有毒蔓生羊桃出神農本經主熛熱身暴赤色風水積聚惡瘍除小兒熱以上朱字神農本經去五臟五水大腹利小便益氣可作浴湯以上黑字名醫所錄名鬼桃羊腸銚音姚弋萇楚御弋細子根苗蜀本圖經曰花葉似桃子細如棗核苗長弱即蔓生不能為樹多生溪澗傍南人呼為細子根也爾雅云萇楚銚弋郭云今羊桃也葉似桃花白子如小麥亦似桃陸機云葉長而狹華紫赤色其枝莖弱過一尺引蔓於草上詩所謂隰有萇楚是也地圖經曰生山林川穀及田野中唐本注云多生溝渠隍塹之間道地蜀川川穀時生春生苗採二月取收陰乾用根實質似桃而極小色赤味苦性寒泄氣味厚於氣陰也主諸瘡瘍治療唐本注云根煮汁以洗風癢及諸瘡腫合治合酒浸服主風熱羸老煮汁合少鹽豉漬之療傷寒毒攻手足痛草之草鼠尾草無毒植生鼠尾草主鼠瘻寒熱下痢膿血不止白花者主白下赤花者主赤下名醫所錄名葝音勍陵翹烏草水青苗圖經曰其苗夏生如蒿莖端作四五穗穗若車前花有赤白二色爾雅謂葝鼠尾云可以染皂草也古治痢方多用之地圖經曰舊不載所出州土云生平澤中今所在有之道地黔州時生春生苗採四月取葉七月取花收陰乾用葉花色葉青花赤白味苦性微寒泄氣味厚於氣陰也臭香主下瘻諸痢制銼搗為末或煮汁用草之走女青有毒蔓生女青主蠱毒逐邪惡氣殺鬼溫瘧闢不祥神農本經名實雀瓢苗唐本注云此即雀瓢也葉似蘿摩兩葉相對子似瓢形大如棗許名雀瓢根似白薇生平澤莖葉並臭別錄云葉嫩時似蘿摩圓端大莖實黑莖葉汁黃白亦與前說相似本經云蛇銜根非也若是蛇銜根何得苗生益州根在朱崖相去萬餘里然蛇銜亦自有條信為二種明矣地圖經曰生朱崖時生春生苗採八月取收陰乾用莖葉汁質類蘿摩色綠味辛性平散氣氣之薄者陽中之陰臭臭主溫瘧寒熱治療陶隱居云帶此屑一兩則疫癘不犯合治末內口中酒服治大人小兒卒患腹皮青黑赤不能喘息並治吐痢卒死以末一錢安喉中合酒或水送下治卒死立活故麻鞋底故麻鞋底主霍亂吐下不止名醫所錄謹按此乃今人捆麻而成如足之方穿以伐履輕捷可以致遠故謂之千里馬也壞則棄於道傍人取其鼻煎湯飲之以治難產亦取其輕捷之義爾未產欲先驗男女得左者生男得右者生女蓋左陽右陰以為男女之先兆也偶得覆者其所產不免無虞矣名千里馬用鞋底鞋網繩鞋尖頭鞋𩍥鞋網帶俱敗腐者良主解毒消渴制燒灰或煮汁用治療陳藏器云底主消渴煮汁服之鞋尖頭二七為灰歲朝用井花水調服之主遺溺別錄云治蜈螉蚣人用故麻鞋底炙以揩之即瘥脫肛以麻履底炙熱令頻按即入燒麻鞋灰吹鼻中療鼻塞立通治鼻衄血鞋𩍥燒作灰吹鼻孔中效合治取鞋網繩如棗大婦人內衣有血者手大鉤頭棘針二七枚三物並燒作灰以豬脂調敷狐刺瘡出蟲鞋底燒令赤投酒煮粟殼汁中服之治霍亂轉筋破草鞋和人亂髮燒作灰醋調敷小兒熱毒遊腫解煮汁服解紫石英發毒及解食牛馬肉毒腹脹吐痢不止者草之草劉寄奴無毒植生劉寄奴草主破血下脹名醫所錄名金寄奴苗圖經曰春生苗莖似艾蒿上有四稜高三二尺以來葉青似柳四月開碎小黃白花形如瓦松七月結實似黍而細一莖上有數穗互生根淡紫色似萵苣其苗花子入藥亦通用也地圖經曰生江南今河中府孟州漢中及越州皆有之道地滁州時生春生苗採六月七月取苗八月取實收日乾用苗花子質類艾蒿而有穗色青綠味苦性溫泄氣味厚於氣陰中之陽主心腹痛通經脈制雷公云凡使實先以布拭上薄殼皮令淨拌酒蒸從巳至申出曝乾用之治療日華子云除心腹痛下氣水脹血氣通婦人經脈癥結止霍亂水瀉別錄云療金瘡止血產後余疾下血止痛又為末治湯火瘡先以糯米漿掃湯著處後摻末在上並不痛亦無痕大凡湯著處先用鹽末摻之護肉不壞然後用藥敷之至妙禁多服令人痢骨碎補無毒寄生骨碎補主破血止血補傷折名醫所錄名胡孫姜石菴䕡骨碎布石毛薑猴姜苗圖經曰春生葉其根生大木或石上多在背陰處引根成條上有黃毛及短葉附之又有大葉成枝面青綠色有黃點背青白色有赤紫點無花實至冬干黃本名胡孫姜唐明皇以其主折傷有效故名骨碎補衍義曰骨碎補苗不似姜姜苗如葦稍此物苗每一大葉兩邊小葉槎牙兩相對葉長有尖瓣余如經地圖經曰生江南今淮浙陝西夔路州郡及嶺南虔吉亦有之道地海州舒州戎州秦州時生春生苗採無時取根收曝乾用根質類姜而細長色赤黑味苦性溫泄氣氣厚於味陽中之陰臭香主折傷制雷公云凡使採得後先用銅刀刮去上黃赤毛盡細切用蜜拌令潤入柳甑蒸一日後出曝乾用治療圖經曰治耳聾削作條子火炮乘熱塞耳中亦入婦人血氣藥用藥性論云主骨中毒氣風血疼痛五勞六極口手不收上熱下冷日華子云治惡瘡蝕爛肉殺蟲別錄云治虛氣攻牙齒痛血出牙齦癢痛用二兩細銼炒令黑色杵末如常盥漱後揩齒根下良久吐之或臨臥用咽之無妨合治取根搗篩煮黃米粥和之裹傷損閃折筋骨良搗篩為末用炮豬腎同吃治耳聾亦能止諸雜痛連翹無毒植生連翹出神農本經主寒熱鼠瘻瘰癧癰腫惡瘡癭瘤結熱蠱毒以上朱字神農本經去白蟲以上黑字名醫所錄名異翹蘭華折根三廉連苕連草軹苗圖經曰翹有大小二種生下濕地或山岡上葉青色而狹長如榆葉水蘇輩莖赤色高三四尺許花黃可愛秋結實似蓮作房翹出眾草以此得名根黃如蒿根其小翹生岡原之上葉花實皆似大翹而細南方生者葉狹而小莖短才高一二尺花亦黃其房黃黑內含黑子如粟粒南中醫家云連翹蓋有兩種一種似椿實之未開者殼小堅而外完無跗萼剖之則中解氣甚芬馥其實才干振之皆落不著莖也一種乃如菡萏殼柔外有跗萼抱之無解脈亦無香氣干之雖久著莖不脫此甚相異也今如菡萏者江南下澤間極多如椿實者乃是蜀中來用之亦勝江南者據本草言則蜀中來者為勝然未見其莖葉如何也地圖經曰生泰山山谷及河中江寧府潤淄兗鼎岳利州南康軍皆有之道地澤州時生春生苗採八月取子殼收陰乾用子殼色黃褐味苦性平微寒氣氣味俱輕陰中陽也臭香主心經客熱瘰癧惡瘡行手足少陽經手足陽明經入手少陰經治療藥性論云通利五淋小便不通日華子云排膿治疥癤止痛通月經湯液本草云諸經客熱非此不能除乃瘡家聖藥也丹溪云瀉心火降脾胃濕熱治血證為中使合治洗痔以連翹煎湯洗訖次用刀上飛過綠礬入麝香少許貼痔瘡上效合鼠黏子治瘡瘍續隨子有毒植生續隨子主婦人血結月閉癥瘕痃癖瘀血蠱毒鬼疰心腹疼冷氣脹滿利大小腸除痰飲積聚下惡滯物莖中白汁剝人面皮去䵟𪒟名醫所錄名拒冬千金子菩薩豆聯步千兩金苗圖經曰苗如大戟初生一莖莖端生葉復出數莖相續花亦類大戟實青有殼人家園亭中多種以為飾秋種冬長春秀夏實地圖經曰生蜀郡處處有之道地廣州時生夏結實採秋月取收曝乾用子色蒼褐味辛性溫散氣氣之厚者陽也主惡瘡疥癬制凡使去殼研爛以紙裹用石壓出油盡復研用之治療日華子云宣一切宿滯治肺氣水氣葉汁敷白癜面皯合治研碎合酒服之治積聚痰飲不下食嘔吐及腹內諸疾不過三顆當下惡物取聯步一兩即續隨子是也去殼研以紙裹用物壓出油重研末分作七服每治一人只用一服丈夫生餅子酒下婦人荊芥湯下凡五更服之至晚自止後以厚朴湯補之治水氣頻吃益善仍不用吃鹽醋一百日瘥取七顆去皮合重臺六分二物搗篩為散酒服方寸匕治蛇咬腫毒悶欲死者兼唾和少許敷咬處立瘥禁虛損人不可多服解如服十粒瀉多者以酸漿並薄醋粥吃即止敗蒲席無毒附編薦索敗蒲席主筋溢惡瘡名醫所錄用陶隱居云蒲席惟船家用狀如蒲帆爾人家所用席皆是莞音官草而薦多是蒲方家有用也唐本注云席薦一也皆人臥之以得人氣為佳青齊間人謂蒲薦為蒲席亦曰蒲葢音合謂藁作者為薦爾山南江左機上織者為席席下重厚為薦如經所說當以人臥久破敗者為佳不論薦席也色黃褐性平氣氣之薄者陽中之陰臭朽主婦人血奔制燒灰或煮汁用合治合蒲黃赤芍藥當歸大黃朴硝治從高墜下瘀血在腹刺痛煎服之下瘀血取一握細切漿水一盞煮汁頓服治霍亂轉筋燒灰合雞子白傅五色丹俗名遊腫若犯多致死不可輕易編薦索燒作黑灰用二指撮酒調服主霍亂轉筋草之走山豆根無毒附石鼠腸蔓生山豆根主解諸藥毒止痛消瘡腫毒人及馬急黃髮熱咳嗽殺小蟲名醫所錄名解毒黃結中藥苗圖經曰其葉青色經冬不凋苗蔓如豆根以此為名也今人寸截含以解咽喉腫痛極妙廣南者如小槐高尺余石鼠食其根人捕石鼠破取其腸胃曝乾解毒攻熱甚效地圖經曰生劍南山谷今廣西亦有道地宜州果州以忠萬州者佳時生春生新葉採八月取根收曝乾用根色黑黃味苦性寒泄氣氣薄味厚陰中之陽臭朽主止咽痹消瘡腫制刮去皮銼用治療圖經曰寸截含之除咽喉腫痛別錄云密遣人水研禁聲服少許消蠱毒如不止再服之及治五種痔疾並麩豆等瘡又止腹痛入口即瘥末水調服少許治腹脹喘滿悶服二錢除五般急黃以水研敷熱腫並狗咬蛇咬蚍蜉瘡並效合治搗末合油調塗治頭風搗末合密為丸空心煎水下二十丸治赤白痢搗末合臘月豬脂調塗瘡癬搗末合油浸塗治頭上白屑小兒乳汁調半錢搗末空心合酒調下三錢治宿冷蟲寸白蟲其蟲自出末合酒調下二錢治蠱氣合橘皮湯下三錢治霍亂末三錢以熱酒調空心服之治女人血氣腹腫末以唾和塗之治蜘蛛咬瘡草之草三白草有小毒植生三白草主水腫腳氣利大小便消痰破癖除積聚消疔腫名醫所錄苗唐本注云其葉如山藥又似菝葜高尺許根如芹根黃白色而粗大陳藏器云此草初生無白入夏葉端半白如粉農人候之蒔田三葉白草便秀故謂之三白草也地圖經曰生池澤畔蜀本圖經云出襄州時生春生苗採二月八月取根收曝乾用根質類芹根而粗大色黃白味甘辛性寒散氣氣之薄者陽中之陰臭朽主水腫腳氣治療陳藏器云搗絞汁服令人吐逆除胸膈熱疾亦主瘧及小兒痞滿䕡茹有小毒植生䕡音閭茹音如出神農本經主蝕惡肉敗瘡死肌殺疥蟲排膿惡血除大風熱氣善忘不樂以上朱字神農本經去熱痹破癥瘕除息肉以上黑字名醫所錄名屈據離婁漆頭苗圖經曰二月生苗葉似大戟而花黃色根如蘿蔔皮赤黃肉白初斷時汁出凝黑如漆三月開淺紅花亦淡黃色不著子其根用之以漆頭者良又有一種草䕡茹瘡家亦用之其根色白採者燒鐵爍頭令黑以當漆頭非真也地圖經曰生代郡川穀及河陽齊州亦有之陶隱居云今第一齣高麗道地淄州時生春生苗採四月五月取根收陰乾用根質類蘿蔔而大小不一色皮赤黑肉白味辛酸性寒散氣氣薄味厚陰中之陽臭腥主去死肌散惡血助甘草為之使反惡麥門冬治療陶隱居云療瘡衍義曰治疥馬疥尤善別錄云用一兩搗為散不計時候溫水調下二錢匕治緩疽傷寒毒攻咽喉腫以如爪甲大一塊內口中嚼汁咽之瘥蛇莓汁有毒散生蛇莓音每汁主胸腹大熱不止名醫所錄苗蜀本云春生苗莖端三葉花黃子赤若覆盆子根似敗醬衍義曰附地生葉如覆盆子但光潔而小微有縐紋花黃比蒺藜花差大春末夏初結紅子如荔枝色也地蜀本云生下濕處衍義曰今田野道傍處處有之時生春生苗採二月八月取根四月五月取子用根子色紫褐味甘酸性大寒氣氣薄味厚陰中之陽臭朽主㶸瘡腫敷蛇毒制搗絞取自然汁用治療陶隱居云除溪毒射工毒傷寒熱日華子云通月經食療云消胸胃熱氣及主孩子口噤以汁灌口中死亦再活別錄云治天行熱盛口中生瘡搗絞自然汁一斗煎取五升稍稍飲之效合治取汁三合烏梅水漬令濃合崖蜜飲之日三治毒攻手足腫痛禁有蛇殘不得食金星草無毒植生金星草主癰疽瘡毒發背癰腫結核用葉和根酒煎服之先服石藥悉下又可作末冷水服及塗發背瘡腫上殊效根碎之浸油塗頭大生毛髮名醫所錄名金釧草苗圖經曰生陰中石上淨處及竹箐中不見日處或大木下或古屋上此草惟單生一葉色青長一二尺至冬大寒葉背生黃星點子兩行相對如金色因得金星之名其根盤屈如竹根而細折之有筋如豬馬鬃凌冬不凋無花實地圖經曰生西南州郡關陝川蜀及潭婺諸州皆有之道地施州峽州時生春生苗採五月取根不拘時取葉收風乾用葉根色深綠味苦性寒泄氣味厚於氣陰也主癰腫治療圖經曰治發背瘡搗末溫水服方寸匕及塗瘡上合治葉合根火焙乾四兩生甘草一錢俱末分四服用酒一升煎二三沸更以冷酒和入瓶內封時時飲之治五毒發背忌生冷油膩毒物禁多服令人痢及老年人不可輒服解硫黃及丹石毒草之走葎草無毒蔓生葎草主五淋利小便止水痢除瘧虛熱渴煮汁及生汁服之名醫所錄名葛律蔓來莓草葛勒蔓苗圖經曰蔓生有細刺葉如蓖麻而小薄花黃白其子類大麻子地圖經曰舊本不著所出州土云生故墟道傍今處處有之時生春生苗採四月五月取莖葉收曝乾用莖葉色青綠味甘苦性寒氣氣薄味厚陰中之陽主利水道解煩渴制煮汁或生取汁用治療圖經曰治疥癩生遍體者用一擔以水二石煮取一石以漬瘡不過三作乃愈治久痢成疳取干蔓搗篩量多少用管吹入穀道中瘥衍義曰治傷寒汗後虛熱銼研取生汁飲一合愈合治搗生汁三升酢二合相和空腹頓服治膏淋當溺下如白汁瘥草之草鶴蝨有小毒植生鶴蝨主蛔蟯蟲用之為散以肥肉臛汁服方寸匕亦丸散中用名醫所錄名鵠蝨苗圖經曰春生苗葉皺似紫蘇大而尖長不光莖高二尺許七月開黃白花似菊八月結實子極尖細干即黃黑色南人呼其葉為火杴火杴即豨薟也雖花葉相類而別是一物不可雜用之唐本注云子似蓬蒿子而細合葉莖用之胡名鵠蝨也地圖經曰生西戎今江淮衡湘間皆有之唐本注云出波斯為勝今上黨亦有道地滁州成州時生春生苗採不拘時取子收陰乾用子葉莖質類蓬蒿子而細色黃黑味苦性平泄氣味厚於氣陰中之陽主殺蟲治療日華子云殺五臟蟲止瘧及敷惡瘡上合治為末和淡醋服半匕治心痛立瘥取十兩搗篩蜜和丸如梧子大以蜜湯空腹吞四十丸日增至五十丸療蛔咬心痛服之忌酒肉細研以肥豬肉汁下治小兒蛔蟲齧心腹痛五歲一服二分蟲出便止余以意增減雀麥無毒叢生雀麥主女人產不出煮汁飲之名醫所錄名蘥燕麥牡栳草牛星草苗衍義曰苗似小麥而弱其穗細長而疏實似穬麥而細今人謂之燕麥即唐人所謂菟葵燕麥動搖春風者是也地圖經曰生故墟野林下今嶺南在處亦有時生春生苗採夏取實莖收曝乾用實莖質類穬麥而細色淡黃味甘性平緩氣氣之薄者陽中之陰臭朽主催生去蟲治療別錄云妊娠胎死腹中若胞衣不下上搶心者取一把水五升煮汁二升服之瘥合治雀麥一味合苦瓠葉三十枚淨洗取麥剪長二寸以瓠葉作五包包廣一寸厚五分以三年酢漬之至日中以兩包火中炮令熱內口中齒外邊熨之冷更易取銅器貯水取包置水中解視即有蟲長三分老者黃色少者白色多即二三十枚少即一二十枚治齒䘌並蟲積年不瘥者甑帶灰無毒甑帶灰主腹脹痛脫肛煮汁服主胃反小便失禁不通及淋中惡屍疰金瘡刃不出名醫所錄苗別錄云江南以蒲為甑帶取久用者燒灰入藥蓋甑帶因久被蒸氣故能散氣而通氣也地別錄云出江南用久敗爛者為佳色黑黃味辛性溫散氣氣之厚者陽也臭朽制燒灰或煮汁用治療別錄云燒灰封金瘡止血止痛出刃又治小兒大便失血用灰塗乳上與飲之瘥及小兒臍瘡久不瘥燒灰敷之如小兒夜啼用甑帶懸戶上並治草芒沙石眯目不出燒灰水調服之草之走赤地利無毒叢生赤地利主赤白冷熱諸痢斷血破血帶下赤白生肌肉名醫所錄名山蕎麥苗圖經曰春夏生苗作蔓繞草木上莖赤葉青似蕎麥蘿摩輩七月開白花亦如蕎麥根若菝葜皮黑肉黃赤蜀本云蔓生繞草木上花子皆青色根若菝葜皮紫赤色地圖經曰舊本不載所出州土今所在山谷有之道地華州時生春夏生苗採八月取根收曝乾用根質類菝葜色皮黑肉黃赤味苦性平泄氣味厚於氣陰也主調血止痢制雷公云凡採得後細銼用藍葉並根並銼惟赤地利細銼了用生絹袋盛同蒸一伏時去藍曝乾用治療別錄云治小兒面及身上生瘡如火燒搗末粉之良合治取二兩搗末合生油調塗火燒瘡滅瘢草之草烏韭無毒散生烏韭出神農本經主皮膚往來寒熱利小腸膀胱氣以上朱字神農本經療黃疸金瘡內塞補中益氣好顏色以上黑字名醫所錄名石衣石苔石發苗唐本注云此物即石衣也亦曰石苔又名石發生岩石之陰不見日處與卷柏相類陳藏器云生山石及木間陰處茸茸然長四五寸青翠似苔而非苔也地圖經曰生山谷石上及木間陰濕處有之時生春夏採無時收陰乾質類卷柏而綠色碧味甘性寒緩氣氣之薄者陽中之陰主黃疸金瘡助垣衣為之使治療陳藏器云燒灰浴發能令長黑白附子無毒植生白附子主心痛血痹面上百病行藥勢名醫所錄苗蜀本圖經云葉細周匝生於穗間出沙磧下濕地唐本注云生沙中獨莖似鼠尾草葉生穗間形如黑附子而小其色白故名白附子也地唐本注云出高麗今涼州巴西蜀郡皆有之道地生東海新羅國時生春生苗採三月取根收陰乾用根質類烏頭而小色白味甘辛性溫散氣氣之厚者陽也主小兒驚風面皯瘢疵制麵裹或濕紙包火中煨炮用治療日華子云主中風失音一切冷風氣別錄云治疥癬風瘡頭面痕陰囊下濕腿無力諸風冷氣亦入面脂用草之走紫葛無毒蔓生紫葛主癰腫惡瘡取根皮搗為末醋和封之名醫所錄苗圖經曰春生冬枯似葡萄而紫色長丈許大者徑二三寸葉似蘡薁根皮俱紫色然有二種此即是藤生者也地圖經曰舊不著所出州土今所在山谷皆有之道地江寧府苔州雍州時生春生苗採三月四月八月取根收日乾用根皮色紫味甘苦性寒泄氣氣薄味厚陰中之陽主癰瘡腫毒制細銼或搗末用治療日華子云主癰緩攣急並熱毒風通小腸別錄云治產後血氣衝心煩渴取三兩以水二升煎取一升去滓服之又治金瘡生肌破血補損取二兩細銼以順流水三大盞煎一盞半去滓食前分溫三服酒煎亦妙獨行根有毒日華子云無毒蔓生獨行根主鬼疰積聚諸毒熱腫蛇毒水摩為泥封之日三四立差水煮一二兩取汁服吐蠱毒名醫所錄名土青木香兜鈴根苗唐本注云此即馬兜鈴根也蔓生葉似蘿摩而圓且澀花青白色其子懸草木上如桃李枯則頭四開若囊中實似榆莢其根匾長尺許作葛根氣亦似漢防己山南名為土青木香也地唐本注云生古堤城傍蜀本云所在平澤草木叢林中有之時生春生苗採二月八月取根收曝乾用根質類漢防己色黃褐味辛苦性冷泄氣氣薄味厚陰中之陽臭臭主積聚腫毒制搗末或煮汁用治療日華子云治血氣衍義曰細搗水調敷疔腫禁多服令人吐痢不止草之草豬膏莓無毒植生豬膏莓音每主金瘡止痛斷血生肉除諸惡瘡消浮腫搗封之湯漬散敷並良名醫所錄名虎膏狗膏苗蜀本云葉似蒼耳而莖圓兩枝相對莖葉俱有毛黃白色地唐本注云生平澤下濕地所在皆有時生春生苗採五月六月取苗收日乾用苗質類蒼耳色黃白味辛苦性平泄氣氣之薄者陽中之陰主惡瘡治療陳藏器云主久瘧痰癊生搗絞汁服得吐出痰效亦碎敷蜘蛛及蟲蠶咬並蠼螋溺瘡別錄云療虎及狗咬瘡至良草之走鹿藿無毒蔓生鹿藿主蠱毒女子腰腹痛不樂腸癰瘰癧瘍氣神農本經名鹿豆蔨莥實名苗唐本注云此草苗似豌豆有蔓而長大人取以為菜亦微有豆氣名為鹿豆也爾雅云蔨鹿藿其實莥郭云鹿豆也葉似大豆根黃而香蔓延而生地圖經曰生汶山山谷今所在有之時生春生苗採五月六月取苗收日乾用苗質類豌豆苗而長大色青綠味苦性平泄氣味厚於氣陰中之陽臭腥主瘡瘍治療別錄云止頭痛草之草蚤休有毒植生蚤音早休主驚癇搖頭弄舌熱氣在腹中癲疾癰瘡陰蝕下三蟲去蛇毒神農本經名蚩休紫河車重樓金線重臺螫休草甘遂苗圖經曰蚤休即紫河車也苗葉似王孫鬼臼等作二三層六月開黃紫花蕊赤黃色上有金線垂下秋結紅子根如菖蒲又似肥姜皮赤肉白衍義曰無傍枝止一莖挺生高尺余顛有四五葉葉有岐似虎杖中心又起莖亦如是生葉惟根入藥用地圖經曰生山陽川穀及冤句河中河陽華鳳文州及江淮間亦有之道地滁州時生春生苗採四月五月取根收日乾用根質類肥菖蒲肌細而脆色皮赤肉白味苦性微寒泄氣味厚於氣陰也主驚癇癲疾制洗去土治療日華子云治胎風搐手足能吐瀉瘰癧合治合醋摩療癰腫敷蛇毒有效石長生有毒叢生石長生出神農本經主寒熱惡瘡大熱闢鬼氣不祥以上朱字神農本經下三蟲以上黑字名醫所錄名丹草苗陶隱居云俗中雖時有采者方藥亦不復用是細細草葉花紫色爾南中多生石岩山葉似蕨而細如龍鬚草大黑如漆高尺余不與余草雜也唐本注云今市人用筀音零筋草為之葉似青葙莖細勁紫色今太常用者是也藥性論云石長生皮亦云石長生也味酸有小毒亦入藥用地圖經曰生咸陽山谷陶隱居云近道亦有之時生春生苗採五月六月取莖葉收日乾用莖葉色黑味鹹苦性微寒泄氣味厚於氣陰也臭朽主瘡癬諸蟲治療藥性論云療疥癬逐諸風治百邪鬼魅別錄云下三蟲烏蘞莓無毒蔓生烏蘞音斂莓音每主風毒熱腫遊丹蛇傷搗敷並飲汁名醫所錄名籠草五葉莓烏蘞草苗圖經曰蔓生葉似白蘞莖端五葉花色青白其子黑色俗呼為五葉莓也地唐本注云生平澤及人家籬牆間所在有之時生春生苗採四月五月取根苗收陰乾用根苗色青味酸苦性寒泄氣味厚於氣陰也主散癰腫制搗碎或取汁用治療蜀本云取根搗以敷癰腫多效別錄云根葉搗敷瘡腫及蛇蟲咬處陸英無毒植生陸英主骨間諸痹四肢拘攣疼酸膝寒痛陰痿短氣不足腳腫神農本經苗圖經曰春抽苗莖有節節間生枝葉大似水芹及接骨春夏採葉秋冬取根莖即蒴藋也然蒴藋本經別立一條陶隱居亦以為一物蘇恭云藥對及古方無蒴藋惟言陸英明非別物今注以性味不同疑非一種謂其類爾況亦不能細別然陸英用花蒴藋用根莖葉蓋一物而所用有別故性味不同何以明之蘇恭云此葉似芹及接骨花亦一類故芹名水英此名陸英接骨名木英此三英花葉並相似又按爾雅雲華荂音敷也華荂榮也木謂之華草謂之榮不榮而實者謂之秀榮而不實者謂之英然此物既有英名當是其花耳故本經云陸英立秋採立秋正是其花時也又葛氏方有用蒴藋者有用蒴藋根者有用葉者三用名別正與經載三時所採者相會謂陸英為花蒴藋為根莖無疑矣地圖經曰生熊耳川穀及冤句時生春生苗採立秋取花收曝乾用花味苦性寒泄氣味厚於氣陰也臭香主諸痹合治陸英煎湯合少酒浴之能捋風毒腳氣上衝心煩悶絕及主水氣虛腫風瘙皮肌惡癢蒴藋有毒植生蒴藋主風瘙癮疹身癢濕痹可作浴湯名醫所錄名堇草芨苗謹按此即前條陸英苗也同種異名花謂之陸英根莖葉謂之蒴藋然其性味不同收採時月亦異故本經別立一條正如澤蘭之與地筍蓬虆之與覆盆其義同也地圖經曰舊不載所出州土但云生田野墟村甚多今所在有之時生春生苗採春夏取葉秋冬取莖根收曝乾用莖葉根色青綠味酸性溫收氣氣厚於味陽中之陰臭朽主諸瘡制雷公云生用作煎取根用銅刀細切於柳木臼搗取自然汁緩緩於鍋子中煎如稀餳任用治療日華子云治瘑癩風痹並煎湯浸並葉用之孫真人云治腳腫漸上以莖葉埋熱灰中令熱敷腫上瘥即止別錄云治風濕冷痹及婦人患傷冷腰痛不得動履取葉火燎厚鋪床上趁熱眠臥於上冷復易之冬月取根舂碎熬極熱准前用治下部閉不通及腳氣取根一把搗汁水和絞去滓強壯者服一升瘥治瘧疾用蒴藋一大握炙令黃色以水濃煎一盞欲發前服治熊傷人瘡取蒴藋一大把銼碎用水一升漬須臾取汁飲余滓以封裹瘡上效治小兒赤遊行於身上下至心即死以蒴藋煎汁洗之合治取根二小束洗瀝去水細擘以酒二升漬三宿溫暖服五合至一升日三治卒暴症腹中有物堅如石痛欲死者若欲速服於熱灰中溫令藥味出服之亦可取根一分搗碎和酒醋共三分合蒸熟封裹腳氣從足至膝脛痛骨疼者一二日即消亦治不仁根二升合酒二升煮服之治頭風根刮去皮搗汁一合和酒一合空心暖服治水腫坐臥不得頭面身體悉腫者當微吐痢為效草之走預知子預知子殺蟲療蠱治諸毒傳云取二枚綴衣領上遇蠱毒物則聞其有聲當便知之有皮殼其實如皂莢子去皮研服之有效名醫所錄名仙沼子聖知子聖先子聖無憂盍合子苗圖經曰蔓生依大木上葉綠有三角面深背淺七月八月有實作房初生青至熟深紅色每房有子五七枚如皂角子斑褐色光潤如飛蛾取二枚綴衣領上遇蠱毒則側側有聲當便知之故有此名今蜀人極貴重云亦難得又云雙仁者帶之尤勝其根冬月採之陰乾味苦性極冷其效愈於子山民目為聖無憂也地圖經曰舊不載所出州土今淮蜀漢黔諸州有之道地壁州時生春生苗採秋取實冬取根收陰乾用子根質類皂莢子色斑褐味苦性寒泄氣味厚於氣陰也主諸風蠱毒制去皮研碎用治療圖經曰中蠱毒以根於石臼內搗為末用水煎三錢匕溫服立已日華子云子治一切風並痃癖氣塊天行瘟疫消宿食止煩悶利小便催生及中惡失音發落敷一切蛇蠱蠶咬單服治一切病每日取仁二七粒患者服不過三千粒永瘥補日華子云子補五勞七傷解毒藥一十二種陳藏器余虻母草葉卷如實中有血蟲羽化為虻便能咬人生塞北草葉如葵以葉合和桂杵為末敷人馬山行無復虻來故蓑衣結燒為灰和油敷蠼螋溺瘡佳故炊帚主人面生白駁以月蝕夜和諸藥燒成灰和苦酒合為泥敷之天羅勒主溪毒挼碎敷之瘡上天羅勒生江南平地毛蓼主癰腫疽瘻瘰癧杵碎內瘡中引膿血生肌亦作湯洗瘡兼濯足治腳氣生山足似烏蓼葉上有毛冬根不死也蛇芮草主蛇虺及毒蟲等螫取根葉搗敷咬處當下黃水生平地葉似苦杖而小節赤高一二尺種之闢蛇又一種草莖圓似芋亦敷蛇毒別錄云東關有草狀如芋莖方節赤挼敷蛇毒如摘卻亦名蛇芮草二草總能主蛇未知何者的是又有鼠芮草如菖蒲出山上取根藥鼠立死爾萬一藤主蛇咬杵篩以水和如泥敷癰上藤蔓如小豆生嶺南亦名萬吉螺黶草主癰腫風疹腳氣腫搗敷之亦煮湯洗腫處藤生石上似螺黶微有赤色背有少毛繼母草主惡瘡杵敷之生塞北川原有紫碧花花有角角上有刺蒿之類也亦名繼母籍甲煎味辛平無毒主甲疽瘡及雜瘡難差者蟲蜂蛇蠍所螫疼小兒頭瘡吻瘡耳後月蝕瘡並敷之合諸藥及美果花燒成灰和蠟成口脂所生與甲煎略同三年者治蟲雜瘡及口傍嚵瘡甲疽等瘡金瘡小草味甘平無毒主金瘡止血長肌斷鼻中衄血取葉挼碎敷之又預知石灰杵為丸日乾臨時刮敷亦煮服斷血瘀及卒下血生江南落野田間下濕地高一二寸許如薺葉短春夏間有淺紫花長一粳米也鬼釵草味苦平無毒主蛇及蜘蛛咬杵碎敷之亦杵絞汁根生池畔葉有椏方莖子作釵腳著人衣如針北人呼為鬼針
