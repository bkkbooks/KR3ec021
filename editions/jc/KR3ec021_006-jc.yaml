body:
  text: 卷之五玉石部下品之上土之土伏龍肝無毒伏龍肝主婦人崩中吐血止咳逆止血消癰腫毒氣名醫所錄地圖經曰此灶中對釜月下黃土也以灶有神故號為伏龍肝並以迂隱其名爾雷公云凡使勿誤用灶下土其伏龍肝是十年以來灶額內火氣積久結如赤色石中黃其形貌八稜者是丹房鏡源云伏龍肝或經十年者灶下掘深一尺其片紫瓷色者可用謹按三說然雖皆取於灶但今所用並以灶中對釜月下經久者療疾多效與圖經所言吻合用之無疑矣時生無時採無時用土色紫味辛性微溫散氣氣之厚者陽也臭腥主調血消毒制研細羅過用治療圖經曰消化積滯日華子云止鼻洪腸風帶下血崩泄精尿血催生下胞及小兒夜啼及中風心煩恍惚別錄云治鬼魘不寤及諸腋臭合治合四交道土為末飲兒闢夜啼為末合醋調塗癰腫石之土石灰有毒鍛成石灰出神農本經主疽瘍疥瘙熱氣惡瘡癩疾死肌墮眉殺痔蟲去黑子息肉以上朱字神農本經療髓骨疽以上黑字名醫所錄名惡灰希灰石堊鍛石石鍛地圖經曰生中山川穀及所在近山處皆有之今之作窯燒青石為灰也有風化水化兩種其風化者以經鍛灰塊置風中自解此為有力水化者以水沃之即熱蒸而解其力差劣矣時採無時用風化者為勝色白味辛甘性溫散氣氣味俱厚陽也臭腥主止血生肌制雷公云凡使用醋浸一宿漉出待乾下火鍛令腥穢氣出用瓶盛著蜜蓋放冷拭上灰令淨細研用治療藥性論云治瘑疥蝕惡肉止金瘡血日華子云療白癜癧瘍瘢疵及婦人粉刺痔瘻疽瘡癭贅疣子又產後陰不能合濃煎湯熏洗瘥補日華子云暖水臟合治五月五日采蘩蔞葛葉鹿活草槲葉芍藥地黃葉蒼耳葉青蒿葉合石灰搗為團如雞卵曝乾為末療金瘡生肌神驗合百草團為末治金瘡或以臘月黃牛膽取汁溲和卻內膽中掛之當風百日研之亦治金瘡合水調如粥浸好糯米粒全者半置灰中半在外經宿取糯米點人面上黑靨合醋調如泥療口喎斜者左喎塗右右喎塗左立便牽正禁不入湯藥妊娠不可服石之石礜石有毒石生礜石出神農本經主寒熱鼠瘻蝕瘡死肌風痹腹中堅癖邪氣以上朱字神農本經除熱明目下氣除膈中熱止消渴益肝氣破積聚痼冷腹痛去鼻中息肉火煉百日服一刀圭以上黑字名醫所錄名青分石食鹽立制石鼠鄉太白石澤乳固羊石白礜玉地圖經曰生漢中山谷及少室今潞州亦有焉其性大熱置水中令水不冰質堅而能拒火燒之一日夕但解散而不奪其堅市人多取潔白細理石當之燒即為灰也此石惟攻擊積聚痼冷之病亦能柔金真者乃佳唐本注云今漢川武當西遼阪名礜石谷此即是其真出處少室亦有粒細理不如漢中者入藥必須鍛鍊蓋其有毒故也時採十二月取收瓷器盛貯質類晉礬色白味辛甘性大熱生溫熟熱氣氣味俱厚陽也臭朽主消積聚除風冷助得火良棘針鉛丹為之使反畏水惡馬目毒公鶩屎虎掌細辛制火煅研細水飛用治療圖經曰治冷積聚藥性論云除胸膈間積氣去冷濕風痹瘙癢皆積年者衍義曰消久積及久病胸腹冷合治礜石煉合乾薑桂心皂莢桔梗各三兩附子二兩蜜丸桐子大服五丸療寒冷百病禁久服令人筋攣不煉服之則殺人及百獸忌羊血石之土砒霜大青附砒黃土生砒霜主諸瘧風痰在胸膈可作吐藥名醫所錄地圖經曰舊本不著所出郡縣今近銅山處亦有之惟信州者佳其塊甚有大者色如鵝子黃明徹不雜此種甚難得每一兩大塊者人競珍重市之不啻金價古服食方必得此種乃可入藥其市肆所蓄片如細屑亦夾土石入藥服之為害不淺衍義曰今信州鑿坑井下取之其坑官常封鎖甚嚴坑中有濁淥水先絞水盡然後下鑿取生砒謂之砒黃其色如牛肉或有淡白路謂石非石謂土非土治病雖有功不可造次服也取砒之法將生砒就置火上以器覆之令砒煙上飛著覆器遂凝結累然下垂如乳尖長者為勝平短者次之圖經云大塊者其大塊是下等片如細屑者極下也入藥當用如乳尖長者佳別錄云初取飛燒霜時人在上風十餘丈外立下風所近草木皆死又多見以和飯毒鼠若貓犬食死鼠者亦死其毒猛於射罔遠矣時生無時採無時用如乳尖長者佳色黃白味苦酸性泄氣味厚於氣陰中之陽臭臭主諸瘧反畏綠豆冷水醋制雷公云凡使用小瓷瓶子盛後入紫背天葵石龍芮二味三件便下火煅從巳至申便用甘草水浸從申至子出拭乾入瓶盛於火中煅別研三萬下用之治療日華子云砒霜除婦人血氣衝心痛落胎砒黃祛瘧疾腎氣帶闢蚤蝨別錄云砒霜療卒中風昏瞶若醉痰涎壅四肢不收用如綠豆大研以新汲水調下少許用熱水投大吐即愈合治末二兩合膠清塗之治毒蛇尿草木著人似刺札便腫痛肉爛若手腳著之節即墮落砒黃一錢合麝香半錢研細先用紙條子以生油塗之後摻藥末在上少用末剪作小紙片棋子大看大小用插在爛動處治小兒牙宣常有鮮血不止牙齦臭爛信州砒黃細研合濃墨汁丸如桐子大於銚子內炒令乾後用竹筒子盛要用如所患處灸破或針將藥半丸敲碎貼之以自然蝕落為度覺藥盡更貼少許療瘰癧禁不可輕服能傷人妊婦不可服解誤中其毒以冷水研綠豆將飲之及得石腦油即伏鐺墨無毒附百草霜鐺墨主蠱毒中惡血暈吐血以酒或水細研溫服之亦塗金瘡生肌止血名醫所錄地謹按鐺墨是鐺底煤也又有灶額上墨謂之百草霜然百草霜入藥必須山野人家釜底者為勝蓋因取雜草供爨得眾草之性故有是名張仲景黑奴丸以此二味及梁上塵同用蓋其功力相近百草霜治證舊本混收鍛灶灰條下今移附於此時生無時採無時用霜質類窯煤色黑臭朽主止血制研細用治療別錄云治鼻氣壅塞不通者水調服又逆產以手中指取墨交畫兒足下即順生合治合酒塗舌下療舌卒腫如豬胞狀滿口者不治須臾死合熱小便調下二錢匕療心痛以五錢合鹽一錢熟水調頓服療中惡心痛欲絕合酒服療轉筋入腸中欲轉者百草霜二錢合狗膽汁一處拌勻分作二服以當歸酒調下療婦人崩中百草霜末合米飲調下二錢治暴瀉痢百草霜合白芷等分每服二錢童子小便醋各少許調勻更以熱湯化開服療逆生橫生瘦胎妊娠產前產後虛損月候不調崩中不過一服瘥百草霜合膩粉少許研細生油調塗療頭瘡及諸熱瘡先用醋少許和水淨洗去痂再用水洗裛干然後塗之禁瘡生在面慎勿塗之黑入肉如印石之水硇砂有毒石生硇砂主積聚破結血爛胎止痛下氣療咳嗽宿冷去惡肉生好肌柔金銀可為焊音旱藥名醫所錄名北庭砂狄鹽濃沙氣砂地圖經曰出西戎今西涼夏國及河東陝西近邊州郡亦有之其北庭者為上然西戎來者顆塊光明大者如拳重三五兩小者如指入藥最緊亦能消五金八石邊界出者難碎如麻豆粒又夾砂石用之須飛澄去土石訖亦無力矣彼人謂之氣砂此物多食腐壞人腸胃生用又能化人心為血固非平居可餌者西土用醃肉炙以當鹽食之無害蓋積習之久若魏武啖野葛不毒之義也本經云柔金銀可為焊藥今人作焊藥乃用硼砂此則不甚須也衍義曰金銀有偽投硇砂於熔鍋中其偽物盡消矧人腹中有久積豈不潰腐乎時生無時採無時收瓷器貯之用光明大者佳質類牙硝色白味鹹苦辛性溫軟氣氣味俱厚陽中之陰臭腥主破積聚結血去惡肉生肌反畏漿水一切酸物制日華子云凡修制以黃丹石灰作櫃鍛赤用之無毒或水飛過入瓷器中以重湯煮之使其自干而殺其毒及去塵穢也治療藥性論云伏煉者除冷病大益陽事日華子云益水臟暖子宮消冷癖瘀血宿食不消氣塊痃癖及血崩帶下惡瘡息肉食肉飽脹女人血氣心疼須修制可服陳藏器云婦人丈夫積病血氣不調痰飲喉中結氣反胃吐水禁誤服生癰腫多食腐壞人腸胃忌羊血解服此藥毒研生綠豆汁飲一二升解之鉛丹無毒鉛丹出神農本經主吐逆胃反驚癇癲疾除熱下氣煉化還成九光久服通神明以上朱字神農本經止小便除毒熱臍攣金瘡血溢以上黑字名醫所錄名鉛華黃丹地別錄云出蜀郡平澤即今熬鉛而成者也其製法以鉛一斤土硫黃一兩硝石一兩先熔鉛成汁下醋點之滾沸時下土硫黃一小塊續更下硝石少許沸定再點醋依前下硝黃少許待硝黃沸盡炒為末乃成丹也時生無時採無時用細膩無砂者色紅黃味辛性微寒氣氣之薄者陽中之陰臭朽主生肌肉止疼痛制水飛過細研炒紫色用治療藥性論云治驚悸狂走嘔逆消渴煎膏止痛生肌日華子云鎮心安神除反胃止吐血及嗽敷金瘡長肉及湯火瘡染鬚髮別錄云小兒重舌用安舌下及逆產以刀圭塗兒蹠下即順合治合醋調塗療蠍螫合百草霜各等分研空心米飲調服二錢匕療瘧疾於發日服合蜜水服二錢匕療小兒瘧疾冷即以酒和服真丹方寸匕合蜜三合和服之療忤中惡心腹疼痛腹滿氣衝心胸如口噤者折齒灌之黃丹四兩米醋半升同煎乾卻用炭火鍛透紅研為末以粟米飲丸如桐子大名碧霞丹酒下七丸療吐逆立效合白礬各二兩為末用三角磚相鬥七寸紙鋪磚上先以丹鋪紙上次以礬鋪丹上然後用紙扭卻將十斤柳木柴燒過研為末名驅風散每用二錢溫酒調下療風癇合醋調塗蠍螫毒石之金鉛無毒附鉛灰土生鉛主鎮心安神治傷寒毒氣反胃嘔噦蛇蜴所咬炙熨之名醫所錄地圖經曰鉛乃青金也生蜀郡平澤別錄云鉛咸鉛者不出銀熟鉛是也嘉州隴陀利州出鉛精之葉深有變形之狀文曰紫背鉛鉛能碎金鋼鑽草節鉛出嘉州打著碎如燒之有硫黃臭煙者信州鉛盧氏鉛此粗惡用時直須濾過陰平鉛出劍州是鐵之苗鉛黃花投汞中以文武火養自浮面上掠刮取炒作黃丹色釣腳鉛出雅州山洞溪砂中形如皂子又如蝌蚪子黑色此皆稟北方壬癸陰極之精而生也又有鉛灰其法取鉛三兩鐵器中熬之久當有腳如黑灰治瘰癧有效故附於此時生無時採無時質類錫而軟色黑味甘性緩氣氣之薄者陽中之陰臭朽主鎮心神消惡瘡合治以一斤合甘草三兩微炙銼用酒一斗著空瓶在傍先以甘草置在酒瓶內然後熔鉛投在酒瓶中卻出酒在空瓶內取出鉛依前熔後投如此者九度並甘草去之只留酒治發背及諸般癰毒瘡令飲醉寢即愈以半斤內大鍋中熔成汁旋入桑條灰柳木攪令成砂後以熟絹羅為末每日早晨如常揩牙齒後用溫水漱在盂內取其水洗眼治諸般眼疾鬚髮黃白者用之皆變黑也以一斤坩堝中熔成汁投酒一升如此十數回候酒至半升去鉛頓服之療金石藥毒以三兩鐵器中熬之久當有腳如黑灰取此灰合臘月豬脂塗瘰癧上仍以舊帛貼之數數去帛拭惡汁又貼如此半月許亦不痛不破不作瘡但內消之為水瘥雖流過項亦瘥禁性濡滑服之多陰毒傷人心胃金之土粉錫無毒粉錫出神農本經主伏屍毒螫音釋殺三蟲以上朱字神農本經去鱉瘕療惡瘡墮胎主小便利以上黑字名醫所錄名解錫定粉胡粉地陶隱居云即今化鉛所作胡粉也而謂粉錫事與經乖唐本注云鉛丹胡粉實用錫造陶云化鉛作之經云粉錫亦為誤矣謹按李含光云黃丹胡粉二物俱是化鉛為之未聞用錫者故恭同契云若胡粉投炭中色壞為鉛抱朴子內篇云愚人乃不信黃丹及胡粉是化鉛所作噫古者或以鉛錫兼稱乎故英公序云鉛錫莫辯者蓋謂此也唐注因襲遂以三物俱言炒錫所致殊深誤矣更熟思之陶說為是今造粉之法以磚作灶高五六尺中砌一小缸貯糟醋至八分許以竹篦平置缸口篦底木作井字架之用蜀郡平澤鉛不限分兩熔化成汁以杓傾鐵掀模內作方片每重二十兩至三百片數攢積篦上以醬蓬覆蓋缸底用重一斤炭墼火煨日夜各二餅使醋氣熏蒸於上候至二七日夜其醋已盡將鉛片上浮粉擊取稱過泡水缸中仍帶水細羅澄於別缸撆去上面清水以粉三百斤為則加白鹽一斤福蜜四兩二味相和煉熟稍澄羅濾入粉令勻外作一炕上鋪細砂土一層再以綿紙嚴遮其土攤粉於紙上炕下仍煨炭墼微火轉展將近一月方干以竹刀切成塊冬月水寒不宜造也用光膩者佳色白味辛性寒氣氣之薄者陽中之陰臭腥制研細用治療別錄云主從高落下瘀血搶心面青短氣欲死以胡粉一錢匕和水服之即瘥治乾溼癬及胡臭若股內陰下常濕且臭或作瘡以胡粉一物塗之即愈常用大驗小兒夜啼水調服三豆許日三服之效合治胡粉水和合雞子白服治小兒久痢成疳服之以糞黑為度為其殺蟲而止痢也合炭灰白等分以脂和塗療孔上治瘡中水即止合羊髓和塗火燒瘡合豬𩩅骨中髓治小兒舌上瘡日三敷之效熬八分合豬脂塗小兒疳瘡以瘥為度合鹽熬色變以摩小兒腹上治腹脹及腹皮青若不理須臾死合土和塗小兒耳後月蝕瘡禁妊娠不可服解硫黃毒錫灰有毒錫灰主殺蟲去積名醫所錄名白蠟地圖經曰生桂陽山谷今有銀坑處皆有之而臨賀所出尤盛又謂之白蠟然有黑有白黑即鉛也與此形雖相近而所用殊別錫灰乃以錫置鐵盤中熔鍊良久澄下粗滓如灰者是今妙應丸中用之時生無時採無時用灰色黑褐味咸性平氣味厚於氣陰中之陽臭朽制去錫細研羅過用土之土東壁土無毒附好土土消土檳榔東壁土主下部瘡脫肛名醫所錄地陶隱居云此朽壁干久之土取其東向者故謂之東壁土也由其感旭日之精華鍾震方發育之氣刮取之亦可去衣油垢張司空云土三尺已上曰糞三尺已下曰土服之當去上惡物勿令入客水陳藏器云一種土消大寒無毒莊子云蛣蜣轉丸是也藏在土中掘地得之正圓如人捻作彌久者佳又有土檳榔狀如檳榔於土穴中及階除間得之新者猶軟云蟾蜍屎也蟾食百蟲故特主惡瘡衍義曰今詳南壁上土亦向陽久干何不取之蓋東壁常得曉日烘炙日者太陽真火故治瘟瘧或曰何不取午盛之時南壁土而取日初出東壁土者何也火生之時其氣壯故素問云少火之氣壯及其當午之時則壯火之氣衰故不取之實用此義或曰何以知日者太陽真火以水精珠或心凹銅鑑向日射之以艾承接其光聚處火出故知之時生無時採無時收曝乾色黃味甘性平溫緩氣氣厚於味陽也臭朽主解毒除濕制研細用治療陶隱居云治小兒風臍唐本注云摩乾溼癬藥性論云點目中去翳東壁土上蜆殼為末敷豌豆瘡及除溫瘧陳藏器云止泄痢霍亂煩悶好土味甘無毒主泄痢冷熱赤白腹內熱毒絞結痛下血取入地乾土以水煮三五沸絞去滓適稀稠暖服一二升土消主傷寒時氣黃疸病煩熱湯淋取汁頓服之良土檳榔主惡瘡諸蟲咬及瘰癧疥瘻細研油塗之別錄云東壁土主小兒臍風瘡歷年不瘥合治東壁土一升合皂莢三挺長一尺二寸療肛門凸出以壁土挹粉肛門頭出處皂莢炙暖更遞熨之瘥好土合頭發療食牛馬肉及肝中毒者先銼頭髮令寸長拌好土作溏泥二升合和飲之須臾發皆貫所食肝出多年煙燻壁土合黃柏同搗羅末以生薑汁拌成膏攤貼之更以茅香湯調下一錢匕療背生癰癤解好土以水煮三五沸去滓適稀稠暖服二升解諸藥毒中肉毒合口椒毒野菌毒石之金赤銅屑微毒附銅器赤銅屑以醋和如麥飯袋盛先刺腋下脈去血封之攻腋臭神效又熬使極熱投酒中服五合日三主賊風反折又燒赤銅五斤內酒二斗中百遍服同前主賊風甚驗名醫所錄地陳藏器云出武昌蓋銅稟東方乙陰之氣結而成魄其性利能焊入骨凡六畜有損者取細研酒中溫啖之直入骨損處六畜死後取骨視之猶有焊痕赤銅為佳黃熟銅不堪用別錄云定州人崔務墜馬折足醫者令取赤銅末和酒服之遂痊平及亡後十餘年改葬視其脛骨折處有銅束之是其驗也時生無時採無時用屑色赤味苦性平泄氣味厚於氣陰也臭腥主折傷制細銼為屑或燒淬酒服治療日華子云明目及風眼接骨焊齒療女人血氣及心痛銅器治霍亂轉筋腎堂及臍下疰痛並衣被襯後貯火熨之陳藏器云主折傷能焊人骨合治合酢於銀器中炒極熱以布裹熨腋下冷復易之治狐臭或用清酢漿淨洗訖微揩使破取銅屑和酢熱揩之甚驗錫銅鏡鼻無毒附古鑑錫銅鏡鼻出神農本經主女子血閉癥瘕伏腸絕孕以上朱字神農本經伏屍邪氣以上黑字名醫所錄地陶隱居云古無純銅鑄鏡皆用錫和雜之以取其明白故也以廣陵者為勝今所用銅鏡鼻者乃破古銅鏡之鼻爾用之當燒令赤內酒中飲之若置醯中出入百過亦可搗矣其入藥之義即銅弩牙古文錢之類皆有錫相雜故所用也以意推之其理則一時生無時採無時用古者愈佳色青綠味酸性冷氣氣薄味厚陰也臭朽主祛邪通經制燒赤淬酒碾細服治療日華子云古鑑闢一切邪魅女人鬼交飛屍蠱毒小兒驚癇百蟲入人耳鼻中就將彼敲其蟲自出合治以七枚投醋中熬過呷之亦可入當歸芍藥煎服療產後余疹刺痛三十六候銅照子鼻燒赤著少許酒淬過少少與兒服之療小兒卒中客忤古鑑燒赤淬酒服療暴心痛及催生金之土銅青微毒銅生銅青主婦人血氣心痛合金瘡止血明目去膚赤息肉名醫所錄地圖經曰生熟銅皆有青青則銅之精華而在銅器上綠色者是也用之以北庭䐬者最佳時生無時採無時用細膩者佳色青綠味酸性平寒氣氣薄味厚陰中之陽臭腥主明目去膚赤治療陳藏器云青銅明目去膚赤合金瘡止血入水不爛令瘡青黑合治生碌二兩淨洗於乳缽內研細以水飛去石澄清同碌粉慢火熬令乾取辰日辰時於辰位上修合再研勻入麝香一分同研以糯米糊和丸如彈子大陰乾名備急大效碧琳丹療痰涎潮盛卒中不語者每丸作二服用薄荷酒研下癱瘓一切風用硃砂酒研化下候吐涎出沫青碧色瀉下惡物瘥研細如粉合醋糊和丸如芡實大名綠雲丹治小兒才覺中風者便用薄荷酒磨下一丸須臾便吐其涎如膠令人以手拔之候吐罷神驗土之土井底沙井底沙主治湯火燒瘡用名醫所錄地謹按井底沙即井中泥而具坤體乃至陰也蓋井水靜而不流為陰水也非江湖之水日夜流蕩上薄陽光為之陽水所以浸漬成泥其性愈冷故能祛大熱湯火之毒也用沙色青黑味淡性至冷氣味厚於氣陰也臭腥主天泡瘡治療別錄云塗敷蠍螫溫則易之及妊娠得時疫病以敷心下令胎不傷並療臥忽不寤勿以火照照之即殺人但痛齧其踵及足拇指甲際而唾其面即活以井底泥塗目畢令人垂頭於井中呼其姓名便起石之土代赭無毒附赤土代赭出神農本經主鬼疰賊風蠱毒殺精物惡鬼腹中毒邪氣女子赤沃漏下以上朱字神農本經帶下百病產難胞衣不出墮胎養血氣除五臟血脈中熱血痹血瘀大人小兒驚氣入腹及陰痿不起以上黑字名醫所錄名須丸血師地圖經曰生齊國山谷今河東京東山中亦有之以赤紅青色如雞冠有澤染爪甲不渝者良古方紫丸治小兒用代赭云無真者以左顧牡蠣代之乃知真者難得今醫家所用多擇取大塊其上有如浮漚丁者為勝謂之丁頭代赭陶隱居云舊說是代郡城門下上江東久絕其魏國所獻猶是彼間赤土非復真物矣唐本注云出姑幕者名須丸出代郡者名代赭此石多從代州來雲山中採得非城門下土又言生齊地山谷今齊州亭山出赤石其色有赤紅青者其赤者亦如雞冠且潤澤土人惟採以丹楹柱而紫色且暗此物與代州出者相似古來用之今靈州鳴沙縣界河北平地掘深四五尺得者皮上赤滑中紫如雞肝大勝齊代所出者時生無時採無時用如雞冠光澤有浮漚丁者佳色紫赤味苦甘性寒泄緩氣氣薄味厚陰也臭朽主驚風闢鬼魅行手少陰經足厥陰經助赤土以乾薑為使反畏附子天雄制雷公云凡使不計多少用蠟水細研盡重重飛過水麵上有赤色如薄雲者去之然後用細茶腳湯煮之一伏時取出又研一萬匝方入用淨鐵鐺一口著火得鐺熱底赤即下白蠟一兩於鐺底逡巡間便投新汲水沖之於中沸一二千度瞭如此放冷取出使之治療藥性論云療女子崩中淋瀝不止及生子不落末溫服闢鬼魅日華子云止吐血鼻衄腸風痔瘻月經不止小兒驚癇疳疾反胃止瀉痢脫精尿血遺溺金瘡長肉安胎健脾及夜多小便合治以一兩合米醋一升用火燒代赭通赤淬米醋中以盡為度搗羅如面用湯調下一大錢療小腸氣瘥赤土不計多少研碎空心溫酒調下一錢療風疹疼癢不可忍石之石石燕無毒土生石燕以水煮汁飲之主淋有效婦人難產兩手各把一枚立驗名醫所錄地圖經曰出零陵郡今永州祈陽縣江傍沙灘上有之形似蚶而小其實石也或云生山洞中因雷雨則飛出墮於沙上而化為石未審的否唐本注云俗云因雷雨則從石穴中出隨雨飛墮者妄也惟永州祁陽縣西北百一十五里土岡上掘深丈餘取之形似蚶而小堅重如石是也衍義曰今人用者如蜆蛤之狀色如土堅重則石也既無羽翼焉能自石穴中飛出何故只墮沙灘上此說近妄唐本注永州土岡上掘深丈餘取之形似蚶而小重如石則此自是一物余說不可取也時生無時採無時收洗刷去泥土質類蚶而小色青白味淡性涼氣氣之薄者陽中之陰臭腥主催生明目制研細水飛過用治療圖經曰能催生令產婦兩手各握一枚須臾子則下別錄云療久患腸風痔瘻一二十年不瘥面色虛黃飲食無味及患臟腑傷損多患泄瀉暑月常瀉不止及諸般淋瀝久患消渴婦人月候湛濁赤白帶下多年不瘥應是臟腑諸疾皆主之用石燕淨洗刷去泥土收之右每日空心取一枚于堅硬無油瓷器內以溫水磨服之如彈丸大者一個分三服大小以此為準晚食更一服若欲作散杵羅為末以磁石吸去杵頭鐵屑後更入乳缽內研細水飛過取白汁如泔乳者澄去水曝乾每服半錢至一錢清飯飲調下溫水亦得此藥遍治久年腸風痔須常服勿令歇服至一月諸疾皆愈合治合水牛鼻和煮飲之止消渴以二七枚和五味炒令熟合酒一斗浸三日即每夜臥時隨性飲一兩盞甚能補益能吃食令人健力為末不計時候合蔥白湯調服半錢療傷寒小腹脹滿小便不通以七枚搗如黍米粒大合新桑根白皮三兩銼如豆粒同拌令勻分作七貼每一貼用水一盞煎取七分去滓於空心午前各一服治淋瀝漿水無毒附冰漿漿水主調中引氣宣和強力通關開胃止渴霍亂泄痢消宿食宜作粥薄暮啜之解煩去睡調理腑臟粟米新熱白花者佳煎令酸止嘔噦白人膚體如繪帛為其常用故人不齒其功冰漿至冷婦人懷妊不可食之食譜所忌也名醫所錄謹按作漿水之法於清明日用倉黃粟米一升淘淨下鍋內以水四斗入酒一鍾煎至米開花為度後將柳枝截短一大把先內壇中然後貯漿水於內以苧布封口使出熱氣每日用柳條攪一次如用去旋加米湯仍前攪用之收瓷壇盛貯色青白味甘酸性溫緩氣氣厚味薄陽中之陰臭腥主除霍亂止消渴合治去黑子方夜以暖漿水洗面用布揩令黑子赤痛水研白檀香取濃汁以塗之旦又以漿水洗面仍用鷹糞敷上效合鹽少許熱漬之療手指腫冷即易之漿水稍醋味者合乾薑屑煎呷之治人霍亂頗有神效及夏月腹肚不調者並瘥酸漿水合水少許頓服令孕婦易產禁妊娠不得食漿水粥令兒骨瘦不成人忌勿與李實同食令人霍亂吐利井華水無毒井華水主人九竅大驚出血以水噀面亦主口臭正朝含之吐棄廁下數度即瘥又令好顏色和硃砂服之又堪煉諸藥石投酒醋令不腐洗目膚翳及酒後熱痢名醫所錄謹按此水乃平旦第一汲者取其清冷澄澈靜而不動得純陰之氣故療疾與諸水有異不爾非謂之井華水也水體雖屬陰汲而動之則不得純陰之性其性既失療疾欲神不可得也噫前人取義深遠於斯可見矣收瓷器貯之用平旦第一汲者色白味甘性平寒氣味厚氣薄陰也臭朽主解熱毒治療別錄云眼睛無故突出者以新汲水頻易灌漬睛上其睛自入又療馬汗及毛入人瘡腫毒熱痛入腹以冷水浸瘡數易飲好酒立愈合治新汲水合蜜飲之治心悶汗出不識人菊花水無毒菊花水主除風補衰久服不老令人好顏色肥健益陽道溫中去痼疾名醫所錄地圖經曰出南陽酈縣北潭水其源悉芳菊生被崖水為菊味盛洪之荊州記云酈縣菊水太尉胡廣久患風羸常汲飲此水後疾遂瘳此菊甘美廣後收此菊實播之京師處處傳植抱朴子雲南陽酈縣山中有甘谷水所以甘者谷上左右皆生甘菊菊花墮其中歷世彌久故水味為變其臨此谷中居民皆不穿井悉食甘谷水無不壽考故司空王暢太尉劉寬太傅袁隗皆為南陽太守每到官常使酈縣月送甘谷水四十斛以為飲食此諸公多患風痹及眩冒皆得愈衍義曰菊花水本條言南陽酈縣北潭水其源悉芳菊生被崖水為菊味此說甚怪且菊生於浮土上根深者不過尺百花之中此特淺露水泉莫非深遠而來況菊根亦無香其花當九月十月間止開三兩旬中焉得香入水也若因花而香其無花之月合如何也殊不詳水自有甘淡鹹苦焉知無有菊味者嘗官於水耀間沿干至洪門北山下古渠中泉水清澈眾官酌而飲其味與惠山泉水等亦微香世皆未知之烹茶尤相宜由是知泉脈如此非緣浮土上所生菊能變泉味敷識之士宜細詳之時生無時採無時色白味甘性溫緩氣氣厚於味陽中之陰臭香主風痹地漿無毒地漿主解中毒煩悶名醫所錄地陶隱居云此掘地作坎以水沃其中攪令渾濁俄頃取之以解中諸毒山中有毒菌人不識煮食之無不死又楓樹菌食之令人笑不止惟飲此漿皆瘥余藥不能救矣色土黃味甘性平寒氣氣之薄者陽中之陰臭腥主熱渴心悶解中諸毒及食生肉中毒臘雪無毒附霜臘雪主解一切毒治天行時氣溫疫小兒熱癇狂啼大人丹石發動酒後暴熱黃疸仍小溫服之名醫所錄謹按大寒節後而雨雪謂之臘雪時當陽氣潛伏寒令大行其花六出乃稟純陰之數故能治一切瘟熱之疾及醃藏果實經年不壞其春雪則易生蟲水亦易敗前人故不收用臘雪之功斯可見矣收瓷器收貯色白味甘性冷緩氣味厚於氣陰也臭朽主疫癘熱病合治霜合蚌粉敷治暑月汗漬腋下赤腫及疿瘡泉水無毒泉水主消渴反胃熱痢熱淋小便赤澀兼洗漆瘡射癰腫令散久服卻溫調中下熱氣利小便並宜多飲之名醫所錄地謹按水稟壬癸乃天一所生若穴沙石而出者謂之泉水爾雅云一見一否為瀐泉正出為濫泉下出為沃泉仄出為泛泉此皆泉水發原之名也亦有鑿地取水曰井夫井亦泉耳易所謂改邑不改井井冽寒泉是也其皆得陰寒之性具體玄潔潤下故有療熱解毒之功若男女心腹有疾取新汲者互相授受飲之得陰陽從治之義臘日以椒投井而飲水亦歲旦屠蘇之意爾用者當以類分可也時生無時採無時用新汲者味甘性平寒氣味厚於氣陰也臭朽主解煩渴消瘡腫治療別錄云患心腹冷病者若男子病令女人以一杯與飲女子病令男子以一杯與飲又主食魚肉為骨取鯁取一杯水合口向水張口取水氣鯁當自下及人忽被墜損腸出以冷水噴之令身噤腸自入也又臘日夜令人持椒井傍毋與人語內椒井中服此水去溫氣禁不用停汙濁暖非直無效固亦損人半天河無毒半天河主鬼疰狂邪氣惡毒名醫所錄謹按此水乃天澤水也由雨貯於高樹穴中及竹籬頭上蓋稟干陽之氣謂之半天河故能鎮心殺鬼也若諸水聚於地者得坤陰之性治療於此有別用之當各適其宜可也時生無時採無時用水色白性微寒氣氣之薄者陽中之陰主殺鬼精除邪氣治療陶隱居云洗諸瘡用之藥性論云能殺鬼精恍惚妄語勿令知之與飲瘥日華子云主蠱毒陳藏器云在槐樹穴間者療諸風及惡瘡風瘙疥癢亦溫取洗瘡別錄云身體白駁取樹木孔中水洗之搗桂屑唾和敷駁上日三白駁者浸淫漸長似癬但無瘡也熱湯無毒附繅絲湯麻沸湯燖豬湯熱湯主忤死先以衣三重借忤死人腹上乃取銅器若瓦器盛湯著衣上湯冷者去衣大冷者換湯即愈又霍亂手足轉筋以銅器若瓦器盛湯熨之亦可令蹋器使腳底熱徹亦可以湯酹之冷則易用醋煮湯更良煮蓼子及吳茱萸汁亦好以綿絮及破氈襯腳以湯淋之貴在熱徹又鎖絲湯無毒主蛔蟲熱取一盞服之此煮繭汁為其殺蟲故也又燖豬湯無毒主產後血刺心痛欲死取一盞溫服之名醫所錄謹按水經火煎作沸者謂之湯也衍義曰助陽氣通經絡用以熨治風冷氣痹等疾正合內經所謂寒因熱用之意抑考朱丹溪云鎖絲湯屬火有陰之用能瀉膀胱水中相火使清氣上朝於口而止消渴也又成無已云瀉心湯用麻沸湯漬服者取其氣薄而泄虛熱也觀此厥有旨矣用者審之治療陳藏器云凡初覺傷寒三日內但取熱湯飲之候吐則止可飲一二升隨吐汗出瘥重者亦減半又凍瘡不瘥者熱湯洗之效衍義曰熱湯助陽氣行經絡患風冷氣痹人多以湯渫腳至膝上厚覆使汗出周身然別有藥亦終假湯氣而行也四時暴泄痢四肢冷臍腹疼深湯中坐浸至腹上頻頻作生陽佐藥無速於此虛寒人始坐湯中必戰仍常令人伺守可也別錄云風疾數年不效者掘坑令患者解衣坐於坑內遂以熱湯上淋之良久復以簟蓋之瘥石之土白堊無毒土生白堊烏恪切出神農本經主女子寒熱症瘕月閉積聚以上朱字神農本經陰腫痛漏下無子泄痢以上黑字名醫所錄名白善土地圖經曰生邯鄲山谷及始興小桂縣晉陽鄉有白善今處處有之即畫家所用者多而且賤醫方亦稀用之又云大次之山其陽多堊又北山經天池之山其中多黃堊及中山經蔥蘢之山其中有大谷多白黑青黃堊注云言有雜色之堊也然堊有五色入藥惟白者佳衍義曰白堊即白善土京師謂白土子截成方寸段瓷鬻以浣衣也時生無時採無時用白者為佳色白味苦辛性溫泄氣氣厚味薄陽中之陰臭朽主破癥瘕止泄痢制雷公云入藥勿用色青並底白者凡使先搗細三度篩過入缽中研之然後將鹽湯飛過晾乾每修事白堊二兩用白鹽一分投於鬥水中用銅器物內沸十餘沸然後水飛過白堊免結澀人腸也或入藥燒用治療藥性論云調女子血結月候不通能澀腸止痢溫暖日華子云止瀉痢痔瘻泄精女子子宮冷男子水臟冷鼻洪吐血合治合王瓜等分為末湯調二錢服療頭痛禁不入湯久服傷五臟令人羸瘦贗白磁為偽土之木冬灰無毒附荻灰桑薪灰青蒿灰柃灰冬灰主黑子去疣音尤息肉疽蝕疥瘙神農本經名藜灰地圖經曰出方谷川澤即今浣衣黃灰爾燒諸蒿藜積聚煉作之性甚烈又荻灰尤烈欲銷黑痣疣贅取此三種灰和水蒸以點之即去不可廣用爛人皮肉唐本注云桑薪灰最入藥用療黑子疣贅功勝冬灰用煮小豆大下水腫然冬灰本是藜灰余草不真又有青蒿灰燒蒿作之柃灰燒木葉作之併入染用亦堪蝕惡肉柃一作苓字衍義曰冬灰諸家止解灰而不解冬亦其闕也諸灰一烘而成惟冬灰則經三四月方徹爐此灰既朝夕燒灼其力得不全燥烈乎又體益重今一爇而成者火力為劣其體則輕故不及冬灰也若古緊面少容方中用九燒益母灰蓋取此義爾諸方中用桑灰自合依本法既用冬灰則須爾用經冬三月者佳色青白味辛性微溫散氣氣之厚者陽也臭朽主去黑子蝕惡肉治療陳藏器云桑灰去風血症瘕塊及水癊淋取釅汁作飲服三五升合治餅爐中灰細羅脂麻油調療湯火灼以羽掃不得著水仍避風桑灰汁合鱉一頭治如食法同煎如泥和諸癥瘕藥重煎堪丸眾手捻成日服十五丸療癥瘕痃癖無不瘥者水之木青琅玕無毒附琉璃玻璃石生青琅玕出神農本經主身癢火瘡癰傷疥瘙死肌以上朱字神農本經白禿侵淫在皮膚中煮煉服之起陰氣可化為丹以上黑字名醫所錄名石珠青珠地圖經曰青琅玕生蜀郡平澤及西音髓州西烏白蠻中於闐國蘇恭云琅玕乃有數種是琉璃之類火齊寶也火齊珠名琅玕五色惟青者入藥為勝秘書中有異魚圖載琅玕青色生海中雲海人於海底以網掛得之初出水紅色久則青黑枝柯似珊瑚而上有孔竅如蟲蛀擊之有金石之聲爾雅云西北之美者有崑崙墟之璆琳琅玕焉孔安國郭璞皆以為石之似珠者山海經云崑崙山有琅玕若然是石之美者明瑩若珠之色而其狀森植爾大抵古人謂石之美者多謂之珠廣雅謂琉璃珊瑚皆珠也故本經一名青珠亦此義也抑考之琅玕出海中以其色瑩如珠故蘇云琉璃火齊之類實非琉璃也蓋琉璃火成人為之物此則天然成者其不同也明矣況皇極經世雲水之木珊瑚之類正此是也蓋珍瑰之物山海谷俱產焉時生無時採無時質類珊瑚色青而有孔色青白味辛性平散氣氣之薄者陽中之陰臭朽主火瘡止癢助得水銀良反畏雞骨治療日華子云玻璃安心止驚悸明目磨翳障陳藏器云琉璃主身熱目赤以水浸冷熨之解殺錫毒二十種陳藏器余玉井水味甘平無毒久服神仙令人體潤毛髮不白出諸有玉處山谷水泉皆有猶潤於草木何況於人乎夫人有發毛如山之草木故山有玉而草木潤身有玉而毛髮黑異類云崑崙山有一石柱柱上露盤盤上有玉水溜下土人得一合服之與天地同年又太華山有玉水人得服之長生玉既重寶水又靈長故能延生之望今人近山多壽者豈非玉石之津乎故引水為玉證碧海水味鹹小溫有小毒煮浴去風瘙疥癬飲一合吐下宿食臚脹夜行海中撥之有火星者鹹水色既碧故云碧海東方朔十洲記云秋露水味甘平無毒在百草頭者愈百疾止消渴令人身輕不飢肌肉悅澤亦有化雲母成粉朝露未晞時拂取之柏葉上露主明目百花上露令人好顏色露即一般所在有異主療不同甘露水味甘美無毒食之潤五臟長年不飢神仙緣是感應天降祐兆人也繁露水是秋露繁濃時也作盤以收之煎令稠可食之延年不飢五月五日取露草一百種陰乾燒為灰和井華水重煉令白鹼醋為餅腋下挾之干即易主腋氣臭當抽一身間瘡出即以小便洗之續齊諧記云司農鄧沼八月朝入華山見一童子以五彩囊承取柏葉下露露皆如珠云赤松先生取以明目今人八月朝朝作露華明像此也漢武帝時有吉云國有吉云草食之不死日照草木有露著皆五色東方朔得玄露青黃二露各盛五合帝賜群臣老者皆少病者皆除東方朔曰日初出處露皆如糖可食漢武帝洞冥記所載今時人煎露亦如糖久服不飢呂氏春秋雲水之美者有三危之露為水即味重於水也六天氣服之令人不飢長年美顏色人有急難阻絕之處用之如龜蛇服氣不死陽陵子明經言春食朝露日欲出時向東氣也秋食飛泉日沒時向西氣也冬食沆瀣北方夜半氣也夏食正陽南方日中氣也並天玄地黃之氣是為六氣亦言平明為朝露日中為正陽日入為泉飛夜半為沆瀣及天地玄黃為六氣皆令人不飢延年無疾者人有墮穴中穴中有蛇蛇每日作此氣服之其人既見蛇如此依蛇時節飢時便服又即仿蛇日日如之經久漸漸有驗即體輕健似能輕舉啟蟄之後人與蛇一時躍出焉梅雨水洗瘡疥滅瘢痕入醬令易熟沾衣便腐浣垢如灰汁有異佗水江淮已南地氣卑濕五月上旬連下旬尤甚月令土潤溽暑是五月中氣過此節已後皆須曝書漢崔實七夕曝書阮咸焉能免俗蓋此謂也梅沾衣皆以梅葉湯洗之脫也余並不脫醴泉味甘平無毒主心腹痛疰忤鬼氣邪穢之屬並就泉空腹飲之時代昇平則醴泉湧出讀古史大有此水亦以新汲者佳止熱消渴及反胃腹痛霍亂為上甘露蜜味甘平無毒主胸膈諸熱明目止渴生巴巴絕域中如餳也漢武帝立金莖作仙人掌承露盤取雲表之露服食以求仙冬霜寒無毒團食者主解酒熱傷寒鼻塞酒後諸熱面赤者雹主醬味不正當時取一二升醬甕中即如本味也溫湯主諸風筋骨攣縮及皮頑痹手足不遂無眉發疥癬諸疾在皮膚骨節者入浴浴幹當太虛憊可隨病與藥及飯食補養自非有他病人則無宜輕入又云下有硫黃即令水熱硫黃主諸瘡病水亦宜然水有硫黃臭故應愈諸風冷為上當其熱處大可燖豬羊夏冰味甘太寒無毒主去熱煩熱熨人乳石發熱腫暑夏盛熱食此應與氣候相反便非宜人或孔入腹冷熱相激卻致諸疾也食譜云凡夏用冰正可隱映飲食令氣冷不可打碎食之雖腹當時暫快久皆成疾今冰井西陸朝覿出之頒賜官宰應悉此淮南子亦有作法又以凝水石為之皆非正冰也諸方水味甘寒無毒主明目定心去小兒熱煩止渴方諸大蚌也向月取之得三二合水亦如朝露陽燧向日方諸向月皆能致水火也周禮明諸承水於月謂之方諸陳饌明水以為玄酒酒水也乳穴中水味甘溫無毒久服肥健人能食體潤不老與乳同功近乳穴處人取水作食釀酒則大有益也其水濃者秤重他水煎上有鹽花此真乳液也所為穴中有魚出魚部中水花平無毒主渴遠行山無水處和苦栝蔞為丸朝預服二十丸末無渴亦人殺野獸藥和狼毒皂莢礬石為散揩安獸食余肉中當令不渴渴恐飲水藥解名水沫江海中間久沫成乳石故如石水沫猶軟者是也赤龍浴水小毒主瘕結氣諸瘕惡蟲入腹及咬人生瘡者此澤間小泉赤蛇在中者人或遇之經雨取水服及人浴蛇有大毒故以為用也糧罌中水味辛平小毒主鬼氣中惡疰忤心腹痛惡夢鬼神進一合多飲令人心悶又云洗眼見鬼未試害蛔蠱其清澄久遠者佳古塚云文𧀹留余節瓜毒潰屍言此二物不爛余皆成水北人呼糧罌為食罌也甑氣水主長毛髮以物於炊飲飯時承取沐頭令髮長密黑潤不能多得朝朝梳小兒頭漸漸覺有益好千里水及東流水味平無毒主病後虛弱湯之萬過煮藥禁神驗二水皆堪盪滌邪穢煎煮湯藥禁呪鬼神潢汙行潦尚可薦羞王公況其靈長者哉蓋取其潔誠也本經云東流水為雲母所畏煉雲母用之與諸水不同即其效也
