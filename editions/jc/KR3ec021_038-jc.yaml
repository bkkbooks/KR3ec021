body:
  text: 卷之三十七米穀部下品醋無毒醋主消癰腫散水氣殺邪毒名醫所錄名醯苦酒陶隱居云醋酒為用無所不入逾久逾良亦謂之醯以有苦味俗呼為苦酒衍義曰醋酒糟為之乞鄰者是此物然有米醋麥醋棗醋之類皆不及米醋最釅入藥多用其穀氣全也故勝於糟醋耳然今人食酸則齒軟謂其水生木水氣弱木氣盛故如是也造靴皮須得此而紋皺故知其性收斂不負酸收之說收煮過瓷器貯之用米造者良色黑味酸性溫收氣氣薄味厚陰中之陽臭香主消腫解毒治療日華子云婦人產後並傷損及金瘡血暈下氣除煩破癥結並婦人心痛陳藏器云除症塊堅積消食殺惡毒破結氣心中酸水痰飲孟詵云產後血氣暈取美清醋煎稍稍含之愈食療云醋糟主氣滯風壅手臂腳膝痛炒裹之三兩易當瘥湯液本草云斂咽瘡別錄云轉筋取故綿以釅醋浸甑中蒸及熱用裹病人腳冷更易勿停又霍亂心腹脹痛煩滿短氣未得吐下者飲醋三盞老小羸者可飲一二盞即瘥合治合黃柏皮漬含之療口瘡合青木香研服之止卒心痛血氣等病合生大黃煎服治痃癖合大黃飛丹塗腫三年釅醋五升熱煎三五沸合切蔥白二三升煮一沸許漉出用布帛熱裹熨患風毒腫白虎病當痛上以瘥為度合硫黃磨敷癧瘍風即止三年釅醋合石灰敷狐臭醇醋合附子微火煎削令尖塞耳內治耳聾效合胡粉半棗許服療鼻血出不止者合蚯蚓屎敷身體手足卒腫合雀屎敷癰已有膿當壞癰頭上如小豆大即穿合豉研如膏敷因單服硫黃髮為癰瘡上干則易之醋一升合枸杞白皮一升煮取半升含漱齒痛即瘥合蒼朮漬常以拭面療面上多䵟鱠或似雀卵色者漸漸除之合附子磨敷蠍螫合生鐵磨敷蜈蚣蜘蛛咬毒合泥敷火瘡愈後無痕合大豆三升煮服治妊娠月未足胎死不出者服訖死兒即分解如未下再服合芥共一甌療目中常見鏡子因吃魚鱠太多所致令病人飢時啜之遂愈禁不可多食損人肌臟並腰及胃又損筋骨不益男子損顏色服諸藥不可多食解消諸毒殺一切魚肉菜毒忌不可與蛤肉同食谷之草糯稻米無毒叢生糯稻米主溫中令人多熱大便堅名醫所錄苗謹按糯稻米其苗出於谷中以穀雨日水浸其谷出芽少許分布於水田中漸長尺余曰秧五月插蒔成畔其莖漸高三四尺節間生葉如茅葉六七月作穗開細黃白花結實如粳米穀八九月成熟割取其穀日曬作米變白如霜而黏也按衍義云即今造酒者是其性溫故可以為酒酒為陽故多熱今人蒸作食用者最多地圖經曰舊不載所出州土今江南皆有之時生春苗採秋收收曬乾用實白如霜者佳質類粳米色白味苦又云甘性溫氣氣厚於味陽中之陰臭香主補中益氣治療日華子云糯米以水煮粥服一合止霍亂稻穩濃煎汁服除蠱毒稻稈治黃病通身煮汁服之陳藏器云糯米作糜食一斗主止消渴稻穰治黃病身如金色煮汁浸之孟詵云糯米除霍亂後吐逆不止以清水研一碗飲之即瘥陳士良云糯米能行營衛中血積孫真人云糯米患脾疾者宜食止泄別錄云治渴以糯米二升淘取泔飲訖則定止霍亂心悸熱心煩渴以糯米水漬研之冷熟水混取米泔汁任意飲之止鼻衄不絕微炒黃為末服二錢新汲水調下作飰食之利大便金瘡水毒及竹木簽刺癰疽熱毒瘡腫喉閉咽喉腫痛痄腮並用糯米三升揀去粳米入瓷盆內於端午前四十九日以冷水浸之一日兩度換水輕以手淘轉逼去水勿令攪碎浸至端午日取出陰乾生絹袋盛掛通風處旋取少許炒令焦黑碾為末冷水調如膏藥隨大小裹定瘡口外以絹帛包定更不要動直候瘡愈若貼瘡腫處即換之常令濕為妙惟金瘡及水毒不可換恐傷動瘡口稻穰治天行熱病手腫欲脫者燒灰汁漬之佳補孫真人云糯米益氣合治稻殼芒炒令黃細研作末合酒服治黃病身如金色糯米合駱駝脂作煎餅空腹服之治痔疾勿令病人知稻稈燒灰合新熟酒未壓者和糟入鹽合淋前灰取汁淋馬墜撲損痛處立瘥直至背損亦可淋用糯米三合水五升細研和蜜一合濾取汁分兩服治霍亂心煩悶發渴不止禁妊身糯米不可與雜肉食之不利子久食令人身軟緩筋使人多睡發風動氣心悸及癰疽瘡癤中痛亦不可合酒共食醉難醒多食則壅諸經絡氣使四肢不收發風昏昏解芫青毒稷米無毒叢生稷米主益氣補不足名醫所錄名穄糜䵖音擇粢苗圖經曰其苗葉類黍今所謂穄米也書傳皆稱稷為五穀之長五穀不可遍祭故祀其長以配社呂氏春秋云飯之美者陽山之穄高誘云關西謂之糜冀州謂之䵖皆一物也廣雅解云如黍黑色稗有二種一黃白一紫黑其紫黑者其芑有毛北人呼為烏禾是也今人不甚重此惟祠事則用之農家種之以備他谷之不熟則為糧矣時生春苗採秋收收曬乾用實質類黍而微匾色黃味甘性緩氣氣厚味薄陽中之陰臭香主利胃益脾治療日華子云治熱病補孟詵云益諸不足別錄云益氣力安中補不足莖穗作提掃破壞者煮汁浴之去浮腫合治合五穀燒作灰爇和松脂雄黃燒灰治惡瘡疥癬蟲瘻疽螫毒塗之瘥合小豆煮汁服之利小便禁不宜多食發冷氣又發三十六種冷病氣發痼疾不可與川附子同服又不可與瓠子同食能發冷病發即黍釀汁飲之即瘥解服丹石人發熱食之熱消壓丹石毒解苦瓠毒煮汁飲之即止腐婢無毒叢生腐婢出神農本經主痎音皆瘧寒熱邪氣泄利陰不起病酒頭痛以上朱字神農本經止消渴以上黑字名醫所錄名小豆花藿葉名也苗圖經曰腐婢即赤小豆花也陶隱居以為海邊有小木狀似梔子氣作臭腐土人呼為腐婢唐本注云腐婢山南相承呼為葛花然則三物皆有腐婢之名乃異類同名耳今據別說云腐婢今既收在谷部當是小豆花也設有別物同名名隨部分不必多辯此說與圖經相合誠為赤小豆花也明矣時生春生苗採夏月取收陰乾用花色粉紅味辛性平散氣氣之薄者陽中之陰臭臭主痎瘧泄痢治療圖經曰止瘧及心腹痛藥性論云明目散氣滿不能食煮一頓服之又下水氣並小兒丹毒熱腫別錄云小豆藿一把搗汁服止渴小便利復作淋小豆止失血合治合酒漬皮治心腹恐解能消酒毒醬無毒醬主除熱止煩滿殺百藥熱湯及火毒名醫所錄地陶隱居云醬多以大豆與面䐬作而成但純麥者少今此當是豆者亦以久久彌妙又有肉醬魚醬皆呼為佉不入藥用唐本注榆仁醬辛美蕪荑醬大美雖有少臭亦辛好也其豆麵作者乃世之常用今處處有之而入藥以陳久者為良用豆麵作者良色赤味鹹酸性冷利氣氣薄味厚陰也臭香治療唐本注云榆仁醬利小便蕪荑醬殺三蟲日華子云醬敷蛇蟲蜂蠆等毒食療云醬治小兒無辜榆仁醬殺諸蟲並心腹惡氣別錄云醬汁主飛蛾入耳滴入耳即出禁榆仁醬不宜多食多食落髮妊娠不可以豆醬合雀肉同食令兒面黑解殺百藥一切魚肉菜蔬蕈毒陳廩米無毒陳廩米主下氣除煩渴調胃止泄名醫所錄苗圖經曰陳廩米即粳粟二米以廩軍人者是也衍義曰陳廩米今經與諸家注說皆不言是粳米為復是粟米然粳粟二米陳者性皆冷頻食之令人自利煎煮亦無膏膩也與本經所說稍有戾焉陳藏器云凡熱食即熱冷食即冷假以火氣故也體自溫平吳人以粟為良漢地以粳為善亦猶吳紵鄭縞蓋貴遠賤近之義焉確論其功粟居前也收倉貯用陳久者佳色黃味鹹酸性溫軟氣味厚氣薄陰中之陽臭香主補五臟止泄痢治療陳士良云平胃口止泄瀉暖脾去憊氣宜作湯食食療云炊作乾飯食之止痢研取汁服止卒心痛別錄云作飰食之除煩熱下氣調胃補日華子云補五臟澀腸胃食療云補中益氣堅筋骨通血脈起陽道北人炊之於甕中水浸令酸食之暖五臟六腑之氣合治蒸作飰和酢封毒腫惡瘡立瘥禁不宜和馬肉食之發痼疾罌子粟無毒植生罌子粟主反胃胸中痰滯及丹石發動不下食和竹瀝煮作粥食之極美粟殼性澀止泄痢澀腸名醫所錄名象谷米囊御米囊子苗圖經曰花有紅白二種微腥氣其實作瓶子似髇音哮箭頭中有米極細人家園庭多蒔以為疒念種之甚難圃人隔年糞地九月布子涉冬至春始生苗極繁茂不爾種之多不出出亦不茂俟其瓶子焦黃則採之衍義曰罌子粟其花有四葉亦有多葉者其子一罌數千萬粒如葶藶子而色白其殼性澀固有澀腸斂肺之功然久嗽久痢者用之固有若初患而用之太早則邪氣收斂不得外泄其疾愈甚正謂不徒無益而又害之也地圖經曰舊不著所出州土今處處有之時生春生苗採秋取實收曬乾用子及殼質類葶藶子色白味甘性平緩氣氣厚於味陽中之陰臭朽制子研細殼去穰蒂醋炒入痢藥用或蜜炙用之合治合竹瀝作粥大佳能行風氣逐邪熱治反胃胸中痰滯及丹石發動然性寒利大小腸不宜多食食過度則動膀胱氣白罌粟米二合合人參末三大錢生山芋五寸長細切研三物以水一升二合煮取六合入生薑汁及鹽花少許攪勻分二服不計早晚食之治反胃不下飲食研子以水煎加蜜為罌粟湯服丹石人甚宜飲之谷之走豌豆無毒蔓生豌豆主調順營衛益中平氣出紹興本草名寒豆苗謹按此種引蔓而生花開青紅色作莢長寸余其實有蒼白二種皆如梧桐子差小而少圓四五月熟南人謂之寒豆儉年亦可代糧世亦取以為醬近多水浸磨之以亂蒸粉也紹興校定云一名蠶豆但叢生不作蔓葉如慎火草而長大沙綠色三月內著莢如人指其實甘美煮食之益人地處處有之時生春生苗採四五月取實收曬乾用實色蒼白味甘性平氣氣之薄者陽中之陰臭腥制去莢用谷之木青小豆無毒植生青小豆主熱中消渴止下痢去腹脹產婦無乳汁爛煮三五升食之即乳多今補苗謹按此種苗葉花實皆與大豆相似惟其實小而色青為異也地處處皆有之時生夏生苗採秋取實收曬乾用實色青味甘性寒氣氣之薄者陽中之陰臭腥四種陳藏器余糟筍中酒味鹹平無毒主噦氣嘔逆小兒乳和少牛乳飲之亦可單服少許磨癧瘍風此糟筍節中水也社酒噴屋四壁去蚊蟲納小兒口中令速語此祭祀社余者酒也蓬草子作飯食之無異糠米儉年食之也寒食麥人粥有小毒主咳嗽下熱氣調中和杏仁作之佳也別錄云治蛟龍病寒食強餳開皇六年有人正月食芹得之其病發似癇面色青黃服寒食強餳二年日三吐出蛟龍有兩頭可驗
