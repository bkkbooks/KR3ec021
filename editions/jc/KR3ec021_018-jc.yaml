body:
  text: 卷之十七木部上品之下木之木辛夷無毒植生辛夷出神農本經主五臟身體寒熱風頭腦痛面䵟久服下氣輕身明目增年耐老以上朱字神農本經溫中解肌利九竅通鼻塞涕出治面腫引齒痛眩冒身兀兀如在車船之上者生鬚髮去白蟲可作膏藥以上黑字名醫所錄名辛矧侯桃房木迎春木筆苗圖經曰木離根二三尺時枝柯繁茂可愛高至丈餘葉似柿葉而狹長正月二月生花其苞似著毛小桃子其蕊初發如筆故以木筆名之花白帶紫落時無實至夏其杪復著花又有一種枝葉並相類但歲一開花四月落時有子如相思子或云別是一種經一二十年老者方結實其開花先後亦隨南北風土節氣爾衍義曰辛夷先花後葉即木筆花也最先春以其花未開時花苞有毛蕊光長如筆故取象曰木筆有紅紫二本一本如桃紅色者一本紫者今入藥當用紫色者仍須未開時收之入藥當去毛苞地圖經曰生漢中川穀今處處皆有而人家園庭亦多植之陶隱居云出丹陽近道時生春生苗採正月二月取花九月取實收曝乾用花蕊縮者良已開者劣謝者不佳色紫味辛性溫散氣氣之厚者陽也臭香主利竅通鼻助芎藭為之使反畏菖蒲蒲黃黃連石膏黃環惡五石脂制雷公云凡用之去粗皮拭上赤肉毛了即以芭蕉水浸一宿漉出用漿水煮從巳至未出焙乾用若治眼目即一時去皮用向裡實者或炙用治療藥性論云去面生䵟疱面脂用主光澤日華子云通關脈明目及頭痛憎寒體禁瘙癢禁毛射人肺令人咳桑上寄生無毒寄生桑上寄生出神農本經主腰痛小兒背強巨兩切癰腫安胎充肌膚堅發齒長鬚眉實明目輕身通神以上朱字神農本經桑上寄生主金瘡去痹女子崩中內傷不足產後余疾下乳汁以上黑字名醫所錄名寄屑寓木宛童蔦音鳥又音吊苗圖經曰是烏鳥食物子落枝節間感氣而生也其葉似橘而厚軟莖似槐枝而肥脆三四月生花黃白色六月七月結實黃色如小豆大凡槲櫸柳水楊楓等上皆有寄生惟桑上者堪用然殊難辨別醫家非自採不敢用或云斷其莖而視之其色深黃並實中有汁稠黏者為真衍義曰若以為鳥食物子落枝節間感氣而生則麥當生麥谷當生谷不當但生此一物也又有於柔滑細枝上生者如何得子落枝節間由是言之自是感造化之氣別是一物古人當日惟取桑上者實假其氣爾朱丹溪云近海州邑及海外其地暖其地不蠶由是桑木得氣厚生意濃而無採捋之苦但葉上自然生出且所生處皆是光澤皮膚之上何曾有所為節間可容化樹子也地圖經曰出弘農川穀桑樹上今處處有之道地江寧府時生春生葉採三月三日取莖葉收陰乾用莖葉質葉如橘而厚軟莖似槐而肥脆色青黃味苦甘性平緩氣氣之薄者陽中之陰臭香主安胎孕止漏血制雷公云凡使在樹上自然生獨枝樹是也採得後用銅刀和根枝莖細銼陰乾了任用勿令見火治療藥性論云能令胎牢固及懷妊漏血不止補日華子云助筋骨益血脈禁他木寄生者服之殺人杜仲毒植生杜仲出神農本經主腰脊痛補中益精氣堅筋骨強志除陰下癢濕小便餘瀝久服輕身耐老以上朱字神農本經腳中痠疼不欲踐地以上黑字名醫所錄名思仲木綿思仙檰芽苗圖經曰木高數丈葉頗似辛夷圓而有尖亦似柘葉其皮全類厚朴但折之其中有絲光亮如綿相連不斷雖銼碎其絲上存須經火炒方盡故入藥必以炒斷絲為度南人謂之檰者此也初生嫩時採之可食其實亦入藥用但苦澀不堪食木可作屐其性亦能益腳也地圖經曰生上虞山谷及上黨漢中今出商州成州峽州近處大山中亦有之道地建平宜都者佳時生春生葉採二月五月六月九月取皮收曬乾用皮質類厚朴內有白絲色紫味辛甘性平溫氣氣之厚者陽也臭朽主益精氣堅筋骨反惡蛇蛻皮玄參制雷公云凡使先須削去粗皮橫理切令絲斷用酥蜜炙之細銼用凡修事杜仲一斤酥二兩蜜三兩二味相和令一處用也或鹽炒酒炒入藥治療圖經曰初生嫩葉食去風毒腳氣及久積風冷腸痔下血亦宜乾末作湯藥性論云除腎冷䓶公對切腰痛也腰病人虛而身強直風也腰不利加而用之日華子云能治腎勞腰脊攣入藥炙用潔古云壯筋骨腳弱無力以行合治一兩去粗皮炙微黃銼碎以水二盞煎至一盞去滓合羊腎二對細切去脂膜入藥中煮次入薤白七莖鹽花椒姜醋等作羹空腹食之療卒患腰腳疼痛補腎氣一斤合酒二斤漬十日服三合治腰背痛以杜仲瓦上焙乾於木臼中搗為末煮棗為丸如彈子大每服一丸爛嚼以糯米飲下治婦人胎臟不安併產後諸疾楓香脂無毒附皮植生楓香脂主癮疹風癢浮腫齒痛樹皮味辛平有小毒主水腫下水氣煮汁用之名醫所錄名白膠香苗圖經曰木似白楊甚高大葉圓作岐有三角而香二月有花白色乃連著實大如鴨卵八月九月熟曝乾可燒南方草木狀曰楓實惟九真有之用之有神乃難得之物五月斫樹為坎脂流於內十一月採之為白膠香爾雅謂楓為攝攝言天風則鳴攝攝也說文解字云楓木厚葉弱枝善搖漢宮中多植之至霜後葉丹可愛故騷人多稱之任昉述異記曰南中有楓子鬼楓木之老者為人形亦呼為靈楓蓋瘤癭也至今越巫有得之者以雕刻鬼神可致靈異衍義曰楓香松脂皆可亂乳香尤宜區別楓香微黃白色燒之尤見真偽地圖經曰舊本不載所出州郡所在大山皆有今南方及關陝多有之唐本注云生商洛之間時生春生葉採十一月取脂收陰乾用脂皮質類乳香色黃黑味辛苦性平散氣氣之薄者陽中之陰臭香主浮腫齒痛治療別錄云白膠香研為末新吸水調服治吐血不止日華子云皮止霍亂刺風冷風煎湯浴之陳藏器云皮水煎止下痢解楓樹菌食之令人笑不止以地漿解之女貞實無毒附枸骨冬青植生女貞實主補中安五臟養精神除百疾久服肥健輕身不老神農本經苗圖經曰山海經云泰山多真木是此木也樹高數丈其葉似枸骨及冬青木極茂盛凌冬不凋花細青白色九月而實成似牛李子或云即今冬青木也而冬青木肌理白文如象齒道家取以為簡其實亦浸酒去風補血葉燒灰作面膏塗之治癉龿殊效兼滅瘢疵李邕云五臺山冬青葉似椿子如郁李微酸性熱與此小有同異當是別有一種耳又嶺南有一種女貞花極繁茂而深紅色如此殊別不開入藥品也枸骨木多生江浙間木體白似骨故以為名南人取以旋作合器甚佳詩小雅雲南山有枸陸機雲山木其狀如櫨一名枸骨理白可為函板者是此也地圖經曰生武陵川穀及泰山今處處有之時生春生新葉採立冬取實收曝乾用實質類牛李子色黑味苦甘性平泄氣味厚於氣陰中之陽臭朽主安五臟養精神治療圖經曰枸骨枝葉燒灰淋取汁塗白癜風日華子云冬青皮去風補益肌膚合治枸骨皮浸酒補腰腳令健冬青子浸酒去風血補益木蘭無毒植生木蘭出神農本經主身大熱在皮膚中去面熱赤皰酒渣惡風癲疾陰下癢濕明耳目以上朱字神農本經療中風傷寒及癰疽水腫去臭氣以上黑字名醫所錄名林蘭杜蘭苗圖經曰木高數丈葉似菌桂葉亦有三道縱文皮如板桂縱橫有文香味劣於桂此與桂枝全別而韶州所生者乃云與桂同是一種取外皮為木蘭中肉為桂心蓋是桂中之一種爾昔人嘗刻其木以為舟詩家所謂木蘭舟者是此木也陶隱居云零陵諸處皆有狀如楠樹皮甚薄而味辛香今益州有皮厚狀如厚朴而氣味為勝今東人以山桂皮當之亦相類地圖經曰生零陵山谷及泰山今湖嶺韶春蜀州皆有之道地益州時生春生葉採三月四月十一月十二月取皮收陰乾用皮質類厚朴而薄色紫味苦性寒泄氣氣薄味厚陰也臭香主惡風癲疾合治皮細切一斤合三年酢漿漬之百日出於日中曬搗末漿水服方寸匕日三療面上渣䩅皯黯皮一尺廣四寸削去粗皮合醋一升漬取汁療小兒重舌以汁注舌上瘥蕤核無毒植生蕤核出神農本經主心腹邪結氣明目目赤痛傷淚出久服輕身益氣不飢以上朱字神農本經目腫眥爛齆鼻破心下結痰痞氣以上黑字名醫所錄名口椹苗圖經曰其木高五七尺莖間有刺葉細似枸杞而尖長花白子紅紫色附枝莖而生類五味子六月成熟古今方中治眼甚要地圖經曰生函谷川谷及巴西今河東亦有之陶隱居云彭城道地弁州時生三四月採五月六月取實收陰乾用實質類郁李仁色黃白味甘性溫微寒氣氣之薄者陽中之陰臭香主目中諸疾制雷公云凡使先去殼取仁湯浸去皮尖擘作兩片用芒硝木通草二味和蕤仁同水煮一伏時後瀝出去諸般藥取蕤仁研成膏任加減入藥中使每修事四兩用芒硝一兩木通草七兩治療藥性論云止鼻衄合治蕤核仁去皮研為膏緣此性稍濕難為末合宣州黃連末等分和勻取無蚛病干棗三枚割頭少許留之去卻核以二藥滿填於中卻取所割棗頭依前合定以少綿裹之用水半碗於銀器中文武火煎取一雞子大仍以綿濾待冷點眼療風癢或生翳或赤眥皆治之丁香無毒附母丁香植生丁香主溫脾胃止霍亂壅脹風毒諸腫齒疳䘌能發諸香根療風熱毒腫名醫所錄苗圖經曰木類桂高丈餘葉似櫟凌冬不凋盛冬生花圓細黃色其子出枝蕊上如釘子長三四分而紫色其中有粗大如山茱萸者謂之母丁香也海藥云二月三月花開紫白色至七月始成實其小者為丁香大者如巴豆即母丁香也謹按以上二說花實先後不同考之本經云出於交廣南蕃廣州者冬月生花次年春採子出於東海及崑崙國者二三月開花八月採子蓋地土有寒暖不同然爾地圖經曰生交廣南蕃今惟廣州有之海藥云生東海及崑崙國時生春生新葉採二月八月取實收曬乾用花蕊及根實色紫味辛性溫散氣氣之厚者陽也臭香主冷氣腹痛霍亂嘔吐行手太陰經足陽明經少陰經制雷公云凡使有雄雌雄顆小雌顆大似檈棗核方中多使雌力大膏煎中用雄若欲使須去丁蓋治療藥性論云除冷氣腹痛日華子云治口氣反胃鬼疰蠱毒及腎氣賁豚氣陰痛祛冷氣殺酒毒消痃癖除冷勞衍義曰治口中穢氣及脾胃冷氣不和母丁香縫絳紗囊如小指實末內陰中主陰冷病瘥即已海藥云去風疳䘌骨槽勞臭諸氣殺蟲及五痔辟惡去邪並奶頭花止五色毒痢正氣止心腹痛皮治齒痛別錄云以十四枚為末沸湯一升調服治乾霍亂不吐不下又水調方寸匕療妒乳乳癰補日華子云壯陽暖腰膝海藥云烏髭發合治末合蜜調塗治桑蠍螫人以二兩合酒二升取半分服療崩中晝夜不止合乾柿蒂各一兩搗羅為散每服一錢煎人參湯不拘時調下療傷寒咳噫不止及噦逆不定母丁香主鬚髮變白以生薑汁研拔去白鬚塗孔中即異常黑也合五味子廣朮療奔豚之氣能泄肺補胃大能療腎沉香無毒植生沉香療風水毒腫去惡氣名醫所錄苗圖經曰其木類椿櫸但多節而青花白子似檳榔大如桑椹紫色夷人採時先斷老根俟其雨水漬久其不朽爛者擇而取之必得堅黑沉水中心不空者最佳乃沉香之上品宜入藥用其次細枝緊實者為青桂香半沉半浮者為雞骨香粗者為棧香樹自枯爛者為生結香伐僕爛脫者為黃熟香淡黃者為散黃香又有麻葉竹葉馬蹄牛頭等香不啻二十餘品其實一種但有精粗之異耳俱不堪入藥用衍義曰嶺南旁海諸州所產最多山民或以構屋架橋而有香者百無一二蓋木得水則香方結所以多在折枝枯乾中或有自枯而死者為水盤香又謂之角沉黃沉俱堪藥用及有南恩高竇等州山民見香木必以刀斫成坎經久得雨水所漬遂結香為斑點故名鷓鴣斑燔之極清烈又瓊崖等州有依木皮而結者謂之青桂氣尤清馥在土中歲久不待刓剔而成者謂之龍鱗亦有削之自卷咀之柔韌謂之黃蠟沉尤難得也如竇化高雷中國出香之地也比諸海南優劣不侔何也蓋所稟既殊復售者多而取者速是以黃熟不俟少成棧沉不待似是蓋趨利戕賊之深也非若瓊管黎人非時不妄剪伐故木無夭札之患而香亦得以全其用也地圖經曰出海南諸國及嶺南交廣諸郡有之道地瓊崖等州時生無時採無時用堅實沉水者良色黑黃味辛性微溫散氣氣之厚者陽也臭香主升降諸氣制雷公云凡使須要不枯者如觜角硬沉重於水下為上若丸散中用須候眾藥出即入拌和之不宜見火治療陶隱居云消惡核腫毒日華子云調中去邪氣止轉筋吐瀉冷氣破症癖冷風麻痹骨節不任濕風皮膚癢心腹痛氣痢補日華子云補五藏益精壯陽暖腰膝衍義曰保和衛氣為上品藥東垣云能養諸氣上而至天下而至泉用為使最相宜湯液本草云補右腎命門合治合酒煮服主心腹痛霍亂中惡邪鬼疰清人神合烏藥磨服走散滯氣薰陸香無毒植生薰陸香主風水毒腫去惡氣伏屍名醫所錄苗圖經曰其木生於海邊沙上盛夏木膠流出沙上形似白膠夷人取得賣與賈客乳香亦其類也唐本注云出天竺及邯鄲似松脂黃白色天竺者多白邯鄲者夾綠色香不甚衍義曰薰陸香木葉類棠梨南印度界阿吒釐國出今謂之西香南番者更佳此即今人謂之乳香因其垂滴如乳故以名之熔塌在地者謂之塌香皆一類也地圖經曰出天竺單于二國及大秦國衍義曰出南印度阿吒釐國道地南番者佳時生無時採無時收陰乾用脂質類白膠香色黃白邯鄲者夾綠色味辛性微溫散氣氣之厚者陽也臭香主去惡氣除腫毒制用時以繒袋掛於窗隙間良久取研之乃不黏也治療唐本注云去惡氣消惡瘡別錄云嚼薰陸香咽其汁治齒蟲痛不可忍乳香日華子云微毒植生乳香主風水毒腫去惡氣療風癮疹癢毒名醫所錄苗衍義曰木葉類棠梨南印度界阿吒釐國出今謂之西香南番者更佳此即今謂之乳香由其垂滴如乳故也其熔塌在地者謂之塌香其實一也謹按木高一二丈其體大小拱把不一葉如榆而極大對生枝間又有似葉而小者兩傍附枝如箭翎然其香即木液流出凝積而成者也銳氣如皮上錐之白汁隨出經久累累色亦紫赤蓋薰陸總名也乳香是薰陸之乳頭也新出未雜沙土者謂之乳香重疊不成乳頭及雜沙土者謂之薰陸也舊說出海外今京都西山及近道多有之地圖經曰出南海波斯國別錄云出天竺單于二國時生無時採無時收陰乾用脂明潔者佳色赤黃味辛性微溫氣氣味俱厚陽也臭香主下氣止痛制凡使置箬上以灰火烘焙熔化候冷研細用治療日華子云下氣止霍亂衝惡中邪氣心腹痛疰氣煎膏止痛長肉陳藏器云療耳聾中風口噤不語善治婦人血氣能發酒理風冷止大腸泄澼療諸瘡令內消補日華子云益精補腰膝治腎氣合治黃明乳香一分細研為末合母豬血和勻丸如梧桐子大每服酒下五丸能催生端午日午時或歲除夜用乳香為末收豬心血相和為丸如雞頭大以紅絹袋盛掛於門上如患子死腹中者令酒磨下一丸效合甘遂各半兩同研細末每服半錢用乳香湯調下治急慢驚風或小便調服亦妙為末合膽礬燒研等分治甲疽胬肉裹甲膿血疼痛不瘥敷之以肉消為愈凡此疾須剔去肉中甲雖不治亦愈雞舌香無毒植生雞舌香主風水毒腫去惡氣療霍亂心痛名醫所錄名丁子香苗圖經曰枝葉及皮並似慄其花如梅花子似棗核此雌者也雄者著花不實或云採花釀之以成香者今不復見埤雅云是沉香木花又云草花蔓生實熟貫之其說無定蓋雞舌香與丁香同種花實叢生其中心最大者為雞舌香擊破有解理如雞舌者此乃是母丁香也俗又以其似丁子故謂之丁子香如古方五香連翹湯用雞舌香千金五香連翹湯無雞舌香卻有丁香況舊本原無丁香一條則知丁香與雞舌香為一種此最為驗明矣別錄云三省故事尚書郎口含此奏事欲使對答其氣芬香千金方皆謂是母丁香抱朴子入眼方用之其說自相矛盾若藥性論謂入香中令人身香及為丁子香則可謂之母丁香若抱朴子為可入眼則丁香恐非所宜若云含之奏事口中熱臭不可近以乳香中所揀者含之雖無香味口得不臭亦有淡利九竅之理也用當量之地圖經曰出崑崙及交愛以南時生二月三月開花採七月八月取實收曝乾用花色紫赤味辛性微溫氣氣之厚者陽也臭香主去惡氣止心痛治療圖經曰除口臭破諸氣別錄云煮汁含之療齲齒以綿裹其末含之療唇舌忽生瘡合治合酒研服療暴氣刺心切痛者合黃連乳汁煎治目中之病末入吹鼻散中用殺腦疳詹糖香無毒植生詹糖香療風水毒腫去惡氣伏屍名醫所錄苗圖經曰木似橘煎枝葉以為香往往以其皮及蠹屑和之難得純好者唐方多用今亦稀見出晉安岑州上真純者難得多以其皮及蠹蟲屎雜之為軟者為佳餘香無真偽而有精粗爾唐本注云詹糖樹似橘煎枝為香似沙糖而黑出交廣以南云詹糖香也地圖經曰出交廣以南晉安岑州時生春生葉採無時收曝乾色黑味辛性微溫氣氣之厚者陽也臭香主水毒腫治療陶隱居云除惡核毒唐本注云消惡瘡檀香無毒植生檀香主心腹痛霍亂中惡鬼氣殺蟲名醫所錄地圖經曰其木如檀故名檀香生南海有數種黃白紫之異今人盛用之蘇恭云出崑崙盤盤國雖不生於中華人間遍有之一種生江淮及河朔山中其木作斧柯者亦檀香類但不香耳其葉至夏有不生者忽然葉開當有大水農人以測水旱號為水檀又有一種葉亦相類高五六尺生高原地四月開花正紫亦名檀根如葛有小毒也謹按此有黃白紫之異其氣味亦優劣也黃者極清芬白者次之紫者又次之入藥不可不別時生春生葉採無時收曝乾用木質類檀木色黃白味辛性熱氣氣味俱厚陽也臭香主心腹痛霍亂行手太陰經足少陰經通行陽明經制銼碎用不見火治療圖經曰消風熱腫毒檀根主瘡疥殺蟲日華子云檀香濃煎服治腎氣腹痛霍亂水磨敷外腎並腰腎痛處降真香無毒植生降真香拌和諸雜香燒煙直上天召鶴得盤旋於上名醫所錄地別錄云生南海山及大秦國謹按此有二種枝葉未詳出於番中者紫色堅實而香為上出於廣南者淡紫不堅而少香為次其番中來者燒之能引鶴降功力極驗故名降真宅舍怪異燒之辟邪用紫色堅實者為好質類蘇方木色紫味甘性溫平氣氣之厚者陽也臭香主天行時氣治療海藥云小兒帶之能辟邪惡之氣蘇合香無毒煎煉成蘇合香主辟惡殺鬼精物溫瘧蠱毒癇痓去三蟲除邪令人無夢魘久服通神明輕身長年名醫所錄苗圖經曰蘇恭云此香從西域及崑崙來紫色與真紫檀相似而堅實極芬香其香如石燒之灰白者好今不復見廣南雖有而類蘇木無香氣藥中但用如膏油者極芬烈也梁書雲天竺出蘇合香是諸香汁煎之非自然一物也又云大秦國採得蘇合香先煎其汁以為香膏乃賣其滓與諸人是以展轉來達中國者不甚香也然則廣南貨者已經煎煉之餘今用膏油乃其合治成者陶隱居以為是獅子屎亦是指此膏油為言然獅子屎今內帑亦有之其臭極甚燒之雖可辟邪惡固知非此也其胡人將來誑言獅子屎者亦是西國草木皮汁所為即今之膏香也蓋胡人欲貴重之故妄飾其名而誑之耳地圖經曰生中臺川穀及崑崙中天竺國時生無時採無時收瓷器盛貯用膏質類蜂蜜而香色黃白味甘性溫氣氣之厚者陽也臭香主辟邪惡愈癇痓制濾去滓入藥治療唐本余除鬼魅龍腦香無毒附相思子植生龍腦香及膏香主心腹邪氣風濕積聚耳聾明目去目赤膚翳名醫所錄苗圖經曰木高七八丈大可六七圍如積年杉木狀傍生枝葉正圓而背白結實如豆蔻皮有甲錯香即木中脂似白松脂作杉木氣膏乃根下清液爾亦謂之婆律膏明淨者善久經風日或如雀屎者不佳段成式酉陽雜俎說此木有肥瘦瘦者出龍腦香其香在木心波斯斷其木翦取之肥者出婆律膏其膏如木端流出斫木作坎而承之兩說大同而小異或云南海山中亦有此木唐天寶中交趾貢龍腦皆如蟬蠶之形彼人云老根節方有之然極難得時禁中呼為瑞龍腦帶之衣衿香聞十餘步外自後不聞有此今海南龍腦多用火煏成片其中亦容雜偽入藥惟貴生者壯若梅花瓣甚佳也衍義曰龍腦條中與圖經所說各未盡此物大通利關膈熱塞其清氣為百藥之先大人小兒風涎閉壅及暴得驚熱甚濟用然非常服之藥獨行則勢弱佐使則有功於茶亦相宜多則掩茶氣味萬物中香無出其右者西方抹羅短吒國在南印度境有羯布羅香乾如松株葉異濕時無香採干之後折之中有香狀類雲母色如冰雪此龍腦香也陳藏器云相思子平有小毒通九竅治心腹氣令人香止熱悶頭痛風痰殺腹臟及皮膚內一切蟲又主蠱毒取二七枚末服當吐出生嶺南樹高丈餘子赤黑間者佳舊本原附於此今仍錄之地圖經曰出婆律國今惟南海番舶貨之西方亦有時生無時採無時收陰乾合糯米炭黑豆相思子同貯之則不耗用脂明淨者為好質類樟腦而碎小作片色白味辛苦性微寒散一云溫平氣氣之薄者陽中之陰臭香主明目退翳治療唐本注云下惡氣消食散脹滿香人口衍義曰通利關膈熱塞大人小兒風涎閉壅及暴得驚熱海藥云主內外障眼殺三蟲除五痔明目鎮心秘精又以少許研新汲水調服治婦人難產立生蒼龍腦主風瘡䵟𪒟入膏煎良南海藥譜云龍腦油摩一切風合治龍腦合天南星等分為末乳缽內研自五月五日午時合出者名開關散治急中風目瞑牙禁無門下藥者以中指點散子揩齒三二十揩大牙左右其口自開龍腦一錢細研旋滴豬心血和丸如雞頭肉大每服一丸合紫草湯下治時疾發豌豆瘡及赤瘡子未透心煩狂躁氣喘妄語或見鬼神者服此少時心神便定得睡瘡復發透依常將息取安禁蒼龍腦點眼則有傷安息香無毒植生安息香主心腹惡氣鬼疰名醫所錄苗段成式酉陽雜俎云樹高三丈許皮色黃黑葉有四角經冬不凋二月開花黃色花心微碧不結實刻其木皮則枝如飴亦若松脂桃膠黃黑色為塊新者亦柔韌音刃六七月堅凝乃取之燒則通神闢眾惡故波斯呼其木為辟邪樹地圖經曰出西戎海藥云生南海波斯國時生春生新葉採六月七月取脂收陰乾用脂質類松脂色黃黑味辛苦性平散氣氣之薄者陽中之陰臭香主通神辟惡治療日華子云除邪氣魍魎鬼胎血邪辟蠱毒腎氣霍亂風痛及婦人血噤併產後血暈海藥云主男子遺精暖腎辟惡氣合治合臭黃為丸療婦人夜夢鬼交燒薰丹穴永斷金櫻子無毒叢生金櫻子主脾泄下痢止小便利澀精氣久服令人耐寒輕身名醫所錄苗圖經曰此即今之刺梨子也叢生郊野中葉尖有刺大類薔薇四月開白花夏秋結實形似山梔無稜有刺內有細子而多毛初生微黃味澀熟則色赤微甘江南蜀中人作煎以酒調服補治殊效方術多用之地圖經曰舊不載所出州土今南中州郡在處有之以江西劍南嶺外者為勝道地舒州泉州宜州時生春生葉採十一月十二月取實收陰乾用實質類山梔無稜而有刺色赤味酸澀性平溫氣氣厚於味陽中之陰主澀精脾泄制孫真人云金櫻子煎經霜後半黃時採紅熟則失本性以竹夾子摘取於大木臼中轉杵去刺勿損破擘為兩片去其子並內毛以水淘洗過爛搗入大鍋以水煎不得絕火煎約水耗一半取出澄濾去滓仍慢火煎似稀餳為度今人丸散擘開兩片刮去子毛用治療別錄云子止遺泄日華子云花止冷熱痢殺寸白蛔蟲皮止瀉血及崩中帶下合治子合雞頭實作水陸丹益氣補真東行根銼碎二兩合糯米三十粒水二升煎五合空心服治寸白蟲須臾瀉下神效花合鐵粉研拔白髮敷之再出黑者亦可染髮禁未經霜採服之令人利樟腦有小毒煎煉成樟腦主殺蟲除疥癬療湯火瘡敵穢氣辟邪惡新增名韶腦潮腦苗謹按木高四五丈徑大丈許皮如柳而堅實葉似梨厚大而面青碧背丹如楓枝幹婆娑蔭地夏開白花五出若梅秋結子至冬成實如榛褐色而不堪啖惟可作油然燈而已凡造樟腦先砌上灶一座上置鐵鍋數口伐其木極大者截剝去枝皮以鷹嘴槽斧砍斫柤塊每鍋下木柤五斤入水浸過三指許以瓷盆覆之濕布密塞縫處勿令氣泄各用文武火熬兩時方止候冷其腦升凝於盆底以翎掃裝瓷器內仍封之謂之青腦復出焙於別灶其灶長六尺闊減其半高亦似之以木五六楞竹笆藉可灶方篩於上內布如芡實大砂子厚寸許灶面四旁用泥圍高四五寸將青腦分置瓷盤各以碗覆之下用柴火慢燒從晨至暮其腦升凝碗底而成餅色白瑩潔火不宜緊緊則色黃焙灶橫開圭竇內斡坑深尺余不然楞木必燎腦亦廢矣地生福建福州府羅源深山谷及漳州府或道傍郊野中亦有之時生無時採無時收瓷器密貯用明淨者佳質類焰硝而潤色白味苦辛性溫氣氣之厚者陽中之陰臭香制碎用治療普濟方云作膏治諸惡瘡及打撲傷損風濕腳氣等疾入薰香內用之收毛絨衣服則不蛀合治合香油研敷湯火瘡定痛如瘡濕乾摻上其痛立止火毒不入內也禁不入湯藥中用四種海藥余木之走落雁木無毒蔓生落雁木謹按徐表南州記云生南海山野中藤蔓而生四面如刀削代州雁門亦有藤蘿高丈餘雁過皆綴其中故曰落雁木又云雁銜至代州雁門皆放落而生以此為名蜀中雅州亦出味平溫無毒主風痛傷折腳氣腫腹滿虛脹以粉木同煮汁醮洗並立效又主婦人陰瘡浮疱以椿木同煮之妙也圖經曰落雁木生雅州味甘性平無毒治產後血氣痛並折傷內損等疾其苗作蔓纏繞大木苗葉形色大都似茶無花實彼土人四月採苗入藥用柵木皮謹按廣志云生廣南山野郊漢爾雅注云柵木如桑樹味苦溫無毒主霍亂吐瀉小兒吐乳暖胃正氣並宜煎服無名木皮謹按徐表南州記云生廣南山谷大溫無毒主陰腎痿弱囊下濕癢並宜煎取其汁小浴極妙也其實號無名子波斯家呼為阿月渾狀若榛子味辛無毒主腰冷陰腎虛弱房中術使用者眾得木香山茱萸良也奴會子謹按拾遺云生西國諸戎大小如苦藥子味辛平無毒主治小兒無辜疳冷虛渴脫肛骨立瘦損脾胃不磨劉五娘方用為煎治孩子瘦損也一十三種陳藏器余龍手藤味甘溫無毒主偏風口喎手足癱緩補虛益陽去冷氣風痹斟酌多少以醇酒浸近火令溫空心服之取汗出安荔浦山石上向陽者葉如龍手因以為名採之無時也放杖木味甘溫無毒主一切風血理腰腳輕身變白不老浸酒服之生溫括睦婺山中樹如木天蓼老人服之一月放杖故以為名也石松味苦辛溫無毒主人久患風痹腳膝疼冷皮膚不仁氣力衰弱久服好顏色變白不老浸酒良生天台山石上如松高一二尺也牛奶藤味甘溫無毒主荒年食之令人不飢取藤中粉食之如薥根令人發落牛好食之生深山大如樹震燒木主火驚失心煮服之又取掛門戶間大壓火災此霹靂木也木麻味甘無毒主老血婦人月閉風氣羸瘦癥瘕久服令人有子生江南山谷林澤葉似胡麻相對山人取以用釀酒也帝休主不愁帶之愁自銷矣生少室嵩高山山海經曰少室山有木名帝休其枝五衢黃花黑實服之不愁今嵩山應有此木人未識固可求之亦如萱草之忘憂也河邊木令飲酒不醉五月五日取七寸投酒中二遍飲之必能飲也檀桓味苦寒無毒主長生神仙去萬病末為散飲服方寸匕盡一枝有驗此百歲蘖之根如天門冬長三四尺別在一旁以小根綴之一名檀桓芝靈寶方亦云木蜜味甘平無毒止渴除煩潤五臟利大小便去膈上熱功用如蜜樹生南方枝葉俱可啖亦煎食如飴今人呼白石木蜜子名枳椇味甜本經云木蜜非此中汁如蜜也崔豹古今注云木蜜生南方合體甜軟可啖味如蜜老枝煎取倍甜止渴也朗榆皮味甘寒無毒主下熱淋利水道令人睡生山中如榆皮有滑汁秋生莢如北榆陶公只見榆作注為南土無榆也那耆悉味苦寒無毒主結熱熱黃大小便澀赤毒諸熱明目取汁洗目主赤爛熱障生西南諸國一名龍花也黃屑味苦寒無毒主心腹痛霍亂破血酒煎服之主酒疸目黃及野雞病熱痢下血水煮服之從西南來煮並作屑染黃用之樹如檀
