body:
  text: 卷之十九木部中品之下木之木烏藥毒植生烏藥主中惡心腹痛蠱毒疰忤鬼氣宿食不消天行疫瘴膀胱腎間冷氣攻衝背膂婦人血氣小兒腹中諸蟲葉及根嫩時採作茶片炙碾煎服能補中益氣偏止小便滑數名醫所錄名旁其苗圖經曰其木似茶檟高丈餘葉微圓而尖一葉作三椏面青背白五月開細花黃白色六月結實根色黑褐狀如山芍藥根而有極粗大者斷之作車轂文又似烏樟根其本根直者不堪用然有二種嶺南者黑褐色而堅硬天台者白而虛軟形似連珠者佳或云天台者香白可愛而不及海南者力大也地圖經曰生嶺南邕容州及江南雷州衡州信州潮州洪州道地天台者勝時生春生葉採八月取收曝乾用根質類山芍藥而輕虛色黃黑味辛性溫散氣氣之厚者陽也臭香主調一切氣行足陽明經少陰經制去木銼碎用治療日華子云治一切氣除一切冷霍亂及反胃吐食瀉痢癰節疥癩並解冷熱及療貓犬百病並可磨服合治合沉香同磨作湯點療胸腹冷氣甚穩當沒藥無毒植生沒藥主破血止痛療金瘡杖瘡諸惡瘡痔漏卒下血目中翳暈痛膚赤名醫所錄苗圖經曰木之根株皆如橄欖葉青而密歲久者則有膏液流滴在地凝結成塊或大或小亦類安息香海藥云按徐表南州記云狀如神香赤黑色是彼處松脂也地圖經曰生波斯國今海南諸國及廣州或有之時生無時採無時收陰乾用脂質類安息香色紫黑味苦性平泄氣氣薄味厚陰中之陽臭香主通滯血定諸痛治療日華子云破癥結宿血消腫毒別錄云主墮胎心腹俱痛及野雞漏痔產後血氣痛合治合酒飲之療打搕損心腹血瘀傷折踒跌筋骨瘀痛金刃所傷痛不可忍者亦治婦人內傷痛楚並血暈及臍腹㽲刺者以半兩合酥塗炙黃虎骨二兩為末勻和溫酒調二錢療歷風骨節疼痛晝夜不可忍者合熱酒調服療折傷馬墜推陳致新能生好血禁妊娠不可服仙人杖無毒叢生仙人杖主噦氣嘔逆闢隖小兒吐乳大人吐食並水煮服小兒驚癇及夜啼安身伴睡良又主痔病燒為末服方寸匕名醫所錄苗圖經曰此是筍將成竹時立死者色黑如漆惟苦筀竹多生此也又別一種仙人杖生劍南平澤葉似苦苣叢生味甘小溫無毒食之能堅筋骨令人不老及作茹食之去痰癖除風冷陳子昂觀玉篇序云夏四月次於張掖河洲草木無他異者皆仙人杖往往叢生予家世代服食者昔嘗餌之及此行也息意茲味成人有薦嘉蔬者此物存焉豈非將欲扶吾壽也地圖經曰處處有之時生春生苗採五月六月取用筍自立死者佳色黑味咸性平冷氣味厚於氣陰中之陽臭朽主嘔吐驚癇制銼碎用木之走松蘿無毒寄生松蘿出神農本經主嗔昌真切怒邪氣止虛汗頭風女子陰寒腫痛以上朱字神農本經療痰熱溫瘧可為吐湯利水道以上黑字名醫所錄名女蘿苗圖經曰松蘿即女蘿也詩所謂蔦與女蘿施於松上是也經云松蘿當用松上者謂之松蘿生雜樹上者非真也詩云蔓連草上黃赤如金釋文曰在草曰菟絲在木曰松蘿地圖經曰生熊耳山川穀陶隱居云東山甚多時生春生採五月取收陰乾用莖葉質類藤而細色青味苦甘性平緩氣味厚於氣陰中之陽臭朽主項上瘤癭制銼碎用治療藥性論云祛寒熱能吐胸中客痰涎去頭瘡日華子云令人得眠木之木毗黎勒無毒植生毗梨勒主溫暖腸腹去一切冷氣名醫所錄名三果苗唐本注云樹似胡桃子形亦似胡桃核似訶黎勒而圓短無稜戎人謂之三果藥性論云番中人以此作漿甚熱能染鬚髮變黑色海藥云樹不與訶黎勒同子相似但圓乃毗爾地圖經曰出西域及嶺南交愛等州海藥云生南海諸國時生春生葉採冬月取收曝乾用實質類胡桃色青白味苦澀性寒海藥云微溫氣氣薄味厚陰也臭朽主下氣止瀉痢制銼碎用庵摩勒無毒植生庵音諳摩勒主風虛熱氣名醫所錄名余甘子苗圖經曰木高一二丈枝條甚軟葉青細密朝開暮斂如夜合而葉微小春生冬凋三月有花著條而生如粟粒微黃隨即作莢每莢三兩子至冬成熟狀如李柰而青白色核圓作五六瓣干即並核皆裂其俗亦作果啖之初覺味苦良久更甘故名余甘也衍義曰庵摩勒余甘子也大小狀如枳橘即經中所謂庵摩勒果者是也地圖經曰生嶺南交廣愛等州及西川蠻界山谷中皆有之道地戎州時生春生葉採十月取收曝乾用實及核中仁質類李柰而小色青白味苦甘性寒泄氣氣薄味厚陰中之陽臭朽主益氣強力治療別錄云治丹石傷肺上氣咳嗽補別錄云久服輕身延年長生合治子汁合油塗發去風癢脫後復生如漆黑衛矛無毒植生衛矛出神農本經主女子崩中下血腹滿汗出除邪殺鬼毒蠱疰以上朱字神農本經中惡腹痛去白蟲消皮膚風毒腫令從陰中解以上黑字名醫所錄名鬼箭狗骨苗圖經曰衛矛即鬼箭也三月後生苗長四五尺其干有三羽狀如箭翎葉亦似山茶青色衍義曰衛矛所在山谷皆有之然未嘗於平陸地見也葉絕少其莖黃褐色若柏皮三面如鋒刃人家多燔之遣祟方家用之亦少雷公云一種石茆根頭形真似鬼箭只是上葉不同味亦各別用者亦宜辨之地圖經曰出霍山山谷今江淮州郡有之陶隱居云山野處亦有道地信州時生三月後生苗採八月十一月十二月取收陰乾用莖色黃褐味苦性寒泄氣氣薄味厚陰也臭朽主通月經去瘀血制雷公云凡採得拭上赤毛用酥緩炒過用之每修事三兩用酥一分炒酥盡為度治療陶隱居云調婦人血氣藥性論云破陳血落胎主中惡腰腹痛及百邪鬼魅日華子云通月經破癥結止血崩帶下殺腹臟蟲及產後血咬肚痛別錄云以五兩水六升煮四升每服八合日三治乳無汁禁妊娠不可服贗石茆根為偽海桐皮無毒植生海桐皮主霍亂中惡赤白久痢除甘䘌疥癬牙齒蟲痛並煮服及含之水浸洗目除膚赤名醫所錄苗圖經曰葉如手大作三花尖皮若梓白皮堅韌可作繩索入水不爛廣志云似桐皮黃白色故以名之地圖經曰出南海以南山谷及近海州郡亦有之道地雷州時生春生葉採不拘時取收曝乾用皮質類梓白皮而有釘蓋擘之可脫色黃白味苦性平泄氣味厚於氣陰中之陽臭朽主利腰膝祛濕痹治療日華子云治血脈麻痹疼痛海藥云腰腳不遂頑痹腿膝疼痛霍亂赤白瀉痢血痢疥癬合治以二兩合牛膝芎藭羌活地骨皮五加皮各一兩甘草半兩薏苡仁二兩生地黃十兩八物淨洗焙乾細銼生地黃以竹刀切通用綿一兩包裹入無灰酒二斗浸冬二七日夏一七日候熟日三四次時時一盞長令醺醺治風蹶腰膝痛不可忍及腎臟風毒攻刺大腹無毒植生大腹主冷熱氣攻心腹大腸壅毒痰膈醋心並以姜鹽同煎入疏氣藥良名醫所錄苗圖經曰所出與檳榔相似但莖葉根干小異其實為大腹子皮為大腹皮連皮收之謂之大腹檳榔或云狀如雞心者為檳榔其平塌者大腹子也地圖經曰生南海諸國今嶺外州郡皆有之時生春生採夏月取收曝乾用皮及子色蒼味辛性微溫散氣氣之厚者陽也臭朽主除膨脹利水腫制孫真人云鴆鳥多棲此樹上凡使宜先酒洗仍以大豆汁洗方可用治療日華子云下一切氣止霍亂通大小腸健脾開胃調中木之走紫藤有小毒蔓生紫藤作煎如糖下水良花挼碎拭酒醋白腐壞角中仁熬令香著酒中令不敗酒敗者用之亦正名醫所錄名招豆藤苗圖經曰四月生紫花可愛人亦種之江東人呼為招豆藤皮著樹從心重重有皮陳藏器云京都人亦種之以飾庭池也地圖經曰出江東時生春生葉採四月取花秋取子不拘時取藤收陰乾用藤花子色藤青花紫味甘性微溫氣氣厚味薄陽中之陰臭香主水癊病制銼碎用木之木合歡無毒植生合歡主安五臟利心志令人歡樂無憂久服輕身明目得所欲神農本經名合歡樹葉合昏花夜合花苗圖經曰合歡即夜合花也木似梧桐枝甚柔弱葉似皂莢槐等極細而繁密互相交結每一風來輒似相解了不相牽綴其葉至暮而合故名合昏五月花發紅白色瓣上若絲茸然至秋而實作莢子極薄細崔豹古今注曰欲蠲人之憂則贈以丹棘欲蠲人之忿則贈以青裳青裳合歡也故嵇康種之舍前是也衍義曰合歡花其色如今之醮暈線上半白下半肉紅散垂如絲為花之異其綠葉至夜則合是謂之夜合花也地圖經曰生益州山谷今近京雍洛及人家庭除間各植之時生春初生葉採秋取實不拘時取皮葉收曬乾用皮葉花質枝葉類槐而柔弱色青綠味甘性平氣氣之薄者陽中之陰臭香主消癰腫續筋骨治療圖經曰皮治肺癰以掌大一片水三升煎半服之陳藏器云皮殺蟲合治皮為末合㮴墨生油調塗蜘蛛咬瘡花為末酒調二錢服治打磕損痛虎杖根無毒植生虎杖根主通利月水破留血症結名醫所錄名苦杖大蟲杖酸杖苗圖經曰三月生苗莖如竹筍狀上有赤斑點初生便分枝丫葉似小杏葉七月開花九月結實南中出者無花根皮黑色破開即黃似柳根亦有高丈餘者爾雅云蒤虎杖郭璞云似葒草而粗大有細刺可以染赤者也藥性論云暑月和甘草同煎色如琥珀可愛嘗之甘美瓶置井中令冷徹如冰極解暑毒衍義曰虎杖根微苦經不言味此草藥也圖經言作高丈餘此全非虎杖大率皆似寒菊然花葉莖蕊差大為異仍莖葉有淡黑斑自六月七月旋旋開花至九月中方已花片四出其色如桃花差大外微深陝西山麓水次甚多今天下暑月多煎根汁為飲不得甘草則不堪飲藥性論云味甘實非虎杖之味蓋因甘草同煎故也論其攻治則甚當矣地圖經曰今處處有之道地越州汾州滁州時生春生苗採二月三月八月收曝乾用根色皮黑肉黃味微苦性微溫泄氣氣厚於味陽中之陰臭朽主通經脈破血症制雷公云凡使根細銼仍用其葉裛一夜去葉曬乾用治療藥性論云治大熱煩躁止渴利小便壓一切熱毒日華子云治產後惡血不下心腹脹滿排膿及瘡癤癰毒婦人血暈撲損瘀血破風毒結氣陳藏器云治風在骨節間及血瘀煮汁作酒服之合治為末合蜜丸如赤豆大米飲下療腸痔下血為末合米飲不拘時調服二錢治五淋禁妊娠不可服贗天藍並斑袖根二種形味相似為偽五倍子無毒寄生五倍子主齒宣疳䘌肺臟風毒流溢皮膚作風濕癬瘡瘙癢膿水五痔下血不止小兒面鼻疳瘡名醫所錄名文蛤百蟲倉苗圖經曰生膚木葉上於七月間無花結實木色青黃其實亦青至熟而黃謹按五倍子附木葉而生其木高丈許青黃色葉如冬青厚而光澤四月開細黃花有實如豆人亦取食之其葉可以飼豬故名豬草樹又名膚木於五六月露零葉底凝結成窠初白漸黃小者如指大者如兒拳經霜採之久則其中有蟲及白花茸茸然蓋稟露氣之精華鍾木之脈液而成者也地圖經曰生洋州今在處有之道地蜀中者為勝時生五六月採九月取收曝乾用子色蒼褐味苦酸性平收氣味厚於氣陰中之陽臭腥主生津液澀腸胃制去枝梗搗末用治療陳藏器云止腸虛泄痢衍義曰治口瘡為末摻之合治生熟各一枝合甘草濕紙裹炮搗末治小兒吐不定每服米泔調下半錢立瘥伏牛花無毒植生伏牛花療久風濕痹四肢拘攣骨肉疼痛作湯主風眩頭痛五痔下血名醫所錄名隔虎刺花苗圖經曰其葉青細似黃柏葉而不光莖赤有刺花淡黃作穗似杏花而小地圖經曰生蜀地所在皆有今惟益蜀近郡有之多生川澤中時生春生葉採三月取收陰乾用花質類杏花而小色淡黃味苦甘性平緩氣氣味俱薄陽中之陰臭香主滲濕舒筋天竺黃無毒植生天竺黃主小兒驚風天吊鎮心明目去諸風熱療金瘡止血滋養五臟名醫所錄名竹膏苗圖經曰按臨海志云生天竺國今諸竹內往往得之衍義曰天竺黃自是竹內所生如黃土著竹成片人剖而得之乃真也地圖經曰生天竺國道地閩中時生無時採無時收陰乾用竹中黃色青白味甘性寒緩氣氣之薄者陽中之陰臭香主祛風鎮驚制搗細用治療日華子云治中風痰壅卒失音不語小兒客忤及癇痰衍義曰涼心經去風熱作小兒藥尤宜和緩故也贗人多燒諸骨及葛粉等雜之為偽密蒙花無毒植生密蒙花主青盲膚翳赤澀多眵淚消目中赤脈小兒麩豆及疳氣攻眼名醫所錄名小錦花苗圖經曰樹高丈餘葉似冬青葉而厚背白色有細毛又似橘葉花微紫色衍義曰其葉凌冬不凋然不似冬青蓋柔而不光潔色不深綠花細碎數十房成一朵冬生春開以蜜制花故曰密蒙花也地圖經曰生益州川穀今蜀中州郡皆有之衍義曰利州路甚多道地簡州時生冬生蕊採二月三月取收曝乾用花色微紫味甘性平微寒氣氣味俱薄陽中之陰臭香主目疾制雷公云凡使先揀淨每花一兩用酒八兩浸一宿漉出候乾卻拌蜜半兩令潤蒸從卯至酉出日乾如此拌蒸三度又卻日乾用天竺桂無毒植生天竺桂主腹內諸冷血氣脹功用似桂皮薄不過烈名醫所錄苗衍義曰天竺桂與牡菌桂同但薄而已方家少用之地圖經曰出西胡國海藥云生南海山谷時生春開花採秋取用皮色紫味辛性溫散氣氣之厚者陽也臭香制去粗皮銼碎用治療海藥云破產後惡血治血痢腸風補海藥云暖腰腳木之走折傷木無毒蔓生折傷木主傷折筋骨疼痛散血補血產後血悶止痛酒水煮濃汁飲之名醫所錄苗唐本注云藤生繞樹上葉似莽草葉而光厚地圖經曰生資州山谷時生春生葉採八月九月收收日乾用莖色青黃味甘鹹性平緩氣氣之薄者陽中之陰臭朽主散血補血木之木桑花無毒麗生桑花主健脾澀腸止鼻洪吐血腸風崩中帶下名醫所錄苗圖經曰此不是桑椹花乃桑樹皮上白蘚狀如地錢花者是也地圖經曰處處有之時生無時採無時收陰乾用花質類地錢色青白性暖氣氣之厚者陽也臭朽主澀腸胃止鼻衄制微炒用椋子木無毒植生椋音良子木主折傷破惡血養好血安胎止痛生肉名醫所錄苗唐本注云葉似柿兩葉相當子細圓如牛李子生青熟黑其木堅重煮汁赤色郭注云椋材中車輞亦堪入藥時生春生葉採八月九月取收日乾用木色赤味甘鹹性平緩氣氣之薄者陽中之陰臭朽主破惡血養好血制銼碎煮汁用木之走每始王木無毒蔓生每始王木主傷折跌筋骨生肌破血止痛酒水煮濃汁飲之名醫所錄苗唐本注云藤生繞樹木上生葉似蘿摩葉地圖經曰生資州山谷時生春生葉採二月八月取收曝乾用藤色青綠味苦性平泄氣味厚於氣陰中之陽臭朽主生肌止痛制銼碎用木之木阿魏無毒植生阿魏主殺諸小蟲去臭氣破症積下惡氣除邪鬼蠱毒名醫所錄名形虞阿虞苗圖經曰苗葉根極似白芷搗根汁日煎作餅者為上截根穿曝乾者為次體性極臭而能止臭亦為奇物也今廣州出者云是木膏液滴釀結成二說不同按段成式酉陽雜俎云生波斯國呼為阿虞木長八九尺皮色青黃三月生葉似鼠耳無花實斷其枝汁出如飴久乃堅凝或云取其汁和米豆屑合釀而成與廣州所產者相近別錄云是木津液如桃膠狀其色黑者不堪其狀黃散者為上又云南長河中亦有舶上來者滋味相似只無黃色耳地圖經曰出西蕃及崑崙別錄云伽闍郍國道地波斯國及廣州時生春生葉採無時收曝乾用液黃赤者為佳雷公云其有三驗第一驗將半銖安於熟銅器中一宿至明沾阿魏處白如銀永無赤色第二驗將一銖置於五斗草自然汁中一夜至明如鮮血色第三驗將一銖安於柚樹上立干便是真質類沒藥而軟色黃黑白亦有瑪瑙斑者味辛性平散氣氣味俱厚陽也臭臭主去臭辟邪制雷公云凡使先於淨缽中研如粉了於熱酒器上裛過任入藥用治療日華子云治傳屍破症癖冷氣闢溫除瘧及霍亂心腹痛腎氣溫瘴海藥云主風邪鬼注心腹中冷解一切蕈菜毒贗日煎蒜餅為偽牡丹無毒植生牡丹出神農本經主寒熱中風瘛音契瘲音縱痙驚癇邪氣除症堅瘀血留舍腸胃安五臟療癰瘡以上朱字神農本經除時氣頭痛客熱五勞勞氣頭腰痛風噤癲疾以上黑字名醫所錄名鹿韭鼠姑百兩金吳牡丹木芍藥苗圖經曰其莖梗枯燥黑白色二月於梗上生苗葉三月開花有黃紫紅白數色其花葉與人家所種者相似但花止五六瓣爾五月結子黑色如雞頭子大根黃白色長五七寸大如筆管此山牡丹也宜入藥用近世人多貴重圃人慾其花之詭異皆秋冬移接培以壤土至春盛開其狀百變故其根性殊失本真此品絕無力也唐本注云劍南者苗似羊桃夏生白花秋實圓綠冬實赤色凌冬不凋根似芍藥肉白皮丹謂之吳牡丹者為真今俗用者異於此別有臊氣也地圖經曰生巴郡山谷漢中丹延青越滁和等州山中皆有之日華子云海鹽次之道地巴蜀劍南合州和州宣州者並良時生二月生苗採二月八月取收陰乾用根皮質類地骨皮而堅赤色紫味辛苦性微寒泄氣氣薄味厚陰中之陽臭香主無汗骨蒸瀉陰中火行手厥陰經足少陰經反畏菟絲子制雷公云凡使採得後日乾用銅刀劈破去骨細銼如豆許用清酒拌蒸從巳至未出日乾用治療藥性論云除冷氣散諸痛治女子經脈不通血瀝腰疼日華子云祛邪氣通關腠血脈排膿消撲損瘀血續筋骨除風痹治胎下胞產後一切疾女人冷熱血氣湯液本草云治腸胃積血衄血吐血及神志不足別錄云治蠱毒及下部生瘡並末服一錢匕日三補日華子云悅顏色忌蒜蘆薈無毒植生蘆薈主熱風煩悶胸膈間熱氣明目鎮心小兒癲癇驚風療五疳殺三蟲及痔病瘡瘻名醫所錄名訥會奴會象膽苗圖經曰其木生山野中滴脂淚而成俗呼為象膽蓋以其味苦如膽而然也藥普云樹脂也本草不細委曲謂是象膽殊非矣謹按此種多偽若欲辨之以磁盤貯熱水取蘆薈如黃豆許兩粒置於水內兩傍其水底各出黃色一道自然相接者乃為真也地圖經曰生波斯國今廣州有之時生無時採無時收以瓷器盛貯用脂以明亮者為好質類黑餳而堅硬色黑味苦性寒泄氣氣薄味厚陰也臭香主消疳殺蟲制搗細用治療藥性論云殺小兒疳疣吹鼻殺腦疳除鼻癢別錄云除小兒諸熱合治以一兩合炙甘草半兩各為末勻和治癬先以溫漿水洗後絹帛拭乾以敷之良以四分杵末先以鹽揩齒令洗淨然後敷少末於上治䘌齒敗天公無毒敗天公主鬼疰精魅燒灰酒服之名醫所錄名竹笠苗陶隱居云敗天公乃人所戴舊竹笠也謹按南人織篾而成襯以㹖葉冠首以避雨暘名曰竹笠物雖小而加於眾體之上歲月既久雨淋日炙人氣所蒸感受精華故能逼祟謂之敗天公者所以重之也用篾性平制燒灰酒服木之走豬腰子無毒蔓生豬腰子敷一切腫毒今補苗謹按此種宿藤圍可盈尺嫩時色青老則紫黑上有裂紋多於山溪澗旁緣木石而上每莖端著三葉青色斷之有紅汁出漁人取以染網三月開花色紅紫如刀豆花至夏作莢中有獨實者或有二實者色紫而有白絡形如豬腎故以名之經霜後落莢坼自露人亦啖之地生廣西西融縣時生五月六月採八月九月收日乾用仁質類豬腎色皮紫肉黃白味酸甘性平氣氣之薄者陽中之陰臭香制去皮用治療咽喉疼痛含之咽津合治合山慈菇續隨子大戟文蛤麝香雄黃硃砂作錠子敷一切惡瘡癰疽發背疔腫此方即加味神仙太乙金丹也二十二種陳藏器余牛領藤味甘溫無毒主腹內冷腰膝疼弱小便白數陽道乏煮汁浸酒服之生嶺南高山形褊如牛領取之陰乾也枕材味辛小溫無毒主咳嗽痰飲積聚脹滿鬼氣注忤煮汁服之亦可作浴湯浸腳氣及小兒瘡疥生南海山谷作𦨴舡次於樟木無藥處用之也鬼膊藤味苦溫無毒主癰腫搗莖葉敷之藤堪浸酒去風血生江南林澗中葉如梨子如楂子山人亦名鬼薄者也木戟味辛溫無毒主痃癖氣在臟腑生山中葉如梔子也奴柘味苦小溫無毒主老血瘕男子痃癖閃痞取刺和三稜草馬鞭草作煎如稠糖病在心食後在臍空心服當下惡物生江南山野似柘節有刺冬不凋溫藤味甘溫無毒主風血積冷浸酒服之生江南山谷不凋著樹生也鬼齒無毒主中惡注忤心腹痛此腐竹根先入地者煮服之亦名鬼針為其賊惡隱其名爾鐵槌柄無毒主鬼打及強鬼排突人致惡者和桃奴鬼箭等丸服之古櫬板無毒主鬼氣注忤中惡心腹痛背急氣喘惡夢悸常為鬼神所祟撓者水及酒和東引桃枝煎服當得吐下古塚中棺木也彌古者佳杉材最良千歲者通神作琴底爾雅注云杉生江南作棺埋之不腐慈母無毒取枝葉炙黃香作飯下氣止渴令人不睡主小兒痰痞生山林間葉如櫻桃而小樹高丈餘山人並識之飯籮燒作灰無毒主時行病後食勞取方寸匕服南方人謂筐也又籃耳燒作灰末敷狗咬瘡籃竹器也白馬骨無毒主惡瘡和黃連細辛白調牛膝雞桑皮黃荊等燒為末淋汁取治瘰癧惡瘡蝕息肉白癜風以物揩破塗之又單取莖葉煮汁服之止水痢生江東似石榴而短小對節紫衣味苦無毒主黃疸暴熱目黃沉重下水癊亦止熱痢煮服之作灰淋取汁沐頭長髮此古木錦花也石瓦皆有之堪染褐下水廣濟方云長髮也梳篦無毒主蝨病者汁服蝨病是活蝨入腹為病如癥瘕者又梳篦垢主小兒惡氣霍亂水和飲之倒掛藤味苦無毒主一切老血及產後諸疾結痛血上欲死煮汁服生深山如懸鉤有逆刺倒掛於樹葉尖而長也故木砂一名百味無毒主人病後食勞復取發當時來參病人行止腳下土如錢許男病左女病右和砧上垢及鼠頭一枚無即以鼠屎三七煮服之神效又卒心腹痛取砧上垢著人鞋履底悉穿又㭢几上屑燒敷吻上嚵瘡古廁木主鬼魅傳屍溫疫魍魎神等取木以太歲所在日時當戶燒熏之又熏之杖瘡冷風不入以木於瘡上熏之廁籌主難產及霍亂身冷轉筋於床下燒取熱氣徹上亦主中惡鬼氣此物雖微其功可錄桃橛無毒主卒心腹痛鬼疰破血惡氣脹滿煮服之三載者良桃性去惡撅更辟邪桃符與桃橛同功也梭頭主失音不語吃病者刺手心令痛即語男左女右救月杖主月蝕瘡及月割耳燒為灰油和敷之杖即月蝕時救月擊物木也人亦取月桂子碎敷耳後月蝕耳瘡今江東諸處每至四五月後晦多於衢路間得之大如貍豆破之辛香古老相傳是月中下也山桂猶堪為藥況月桂乎正應不的識其功耳今江東處處有不知北地何意獨無為當非月路耶月感之矣餘杭靈隱寺僧云種得一株近代詩人多所論述漢武洞冥記云有遠飛雞朝往夕還常銜桂實歸於南土所以北方無南方月路所以有也地龍藤味苦無毒主風血羸老腹內及腰腳諸冷食不作肌膚浸酒服之生天目山蟠屈如龍故號地龍藤繞樹木生似龍所生與此頗同小有異耳吳中亦有也火槽頭主蠍螫橫井上立愈上立炭主金瘡刮取敷瘡上止血生肉帶之辟邪惡鬼帶火內水底取得水銀著出
