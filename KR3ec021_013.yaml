body:
  text: 卷之十二草部中品之下草之草肉豆蔻無毒叢生肉豆蔻主鬼氣溫中治積冷心腹脹痛霍亂中惡冷疰嘔沫冷氣消食止泄小兒乳霍名醫所録名迦拘勒苗圖經曰春生苗花實似豆蔻其形圓小皮紫緊薄中肉辛辣而有油色者為佳枯白味薄瘦虛者為下也地圖經曰出胡國今惟嶺南人家種之海藥云生秦國及崑崙道地廣州時生春生苗採六月七月取實收曝乾用實質類橡子無殼而皮皺色蒼褐味辛性溫散氣氣之厚者陽也臭香主止瀉痢開胃消食行手陽明經制雷公云凡使須以糯米作粉使熱湯搜裹豆蔻於灰火中炮待米糰子焦黃熟然後去米團取用治療藥性論云治小兒吐逆不下乳腹痛宿食不消痰飲日華子云調中下氣別録云止心腹蟲痛脾胃虛冷氣並冷熱虛泄赤白痢合治以二顆用醋調麵裹煨黃焦和麵碾末合炒檔子末一兩以炒陳米末二錢煎飲調下三錢治脾泄氣痢日二服瘥合生薑湯服治霍亂吐利禁多服則泄氣勿令犯銅器解酒毒草之木補骨脂無毒植生補骨脂主五勞七傷風虛冷骨髓傷敗腎冷精流及婦人血氣墮胎名醫所録名破故紙婆固脂胡韭子補骨鴟苗圖經曰莖高三四尺葉似薄荷花微紫色實如麻子圓匾而黑或云胡韭子也此物本自外蕃隨海舶而來非中華所有蕃人呼為補骨鴟語訛為破故紙也地圖經曰出波斯國今廣南諸州及嶺外山阪間道地南蕃梧州時生春生苗採九月取實用子質類五味核而匾黑色黑味辛性大溫氣氣之厚者陽也臭香主固精氣止腰痛反惡甘草制雷公云凡使性本大燥毒用酒浸一宿後漉出卻用東流水浸三日夜卻蒸從巳至申出曬乾用治療藥性論云治腰膝冷疼痛囊濕逐諸冷頑痹止小便利腹中冷日華子云治冷勞明耳目補日華子云興陽事合治以十兩去皮洗淨為末用去皮胡桃瓤二十兩細研入前末內蜜和攪如飴盛瓷器中旦日以酒調服一匙治濕傷內外衆疾久服則延年益氣悅心明目補添筋骨服後以飯壓下如不飲酒以湯調服但禁食蕓薹羊血草之草零陵香無毒植生零陵香主惡氣疰心腹痛滿下氣令體香和諸香作湯丸用之名醫所録名燕草薰草香草蕙草苗圖經曰多生下濕地葉如羅勒亦似麻兩兩相對莖方氣如蘼蕪常以七月中旬開花至香即古所謂薰草是也其莖葉謂之蕙其根謂之薰三月採脫節者良今江淮間土生者作香亦可用但不及湖嶺者芬薰爾地圖經曰生湖嶺諸州江淮間皆有之海藥云廣南山谷道地零陵山谷蒙州濠州時生春生苗採三月取莖葉收陰乾用莖葉色青黃味甘性平緩氣氣厚於味陽中之陰臭香主去邪惡闢穢氣助得酒良制圖經曰作窯灶以火炭焙乾令黃色乃佳治療陳藏器云明目止淚療泄精去邪惡氣傷寒頭痛合治合升麻細辛煎含療風邪衝心牙車腫痛疳䘌合酒煎服治血氣腹脹禁多服令人氣喘縮砂蜜無毒植生縮砂蜜主虛勞冷瀉宿食不消赤白泄痢腹中虛痛下氣名醫所録苗圖經曰生南地者苗似廉姜形如白豆蔻其皮緊厚而皺黃赤色又云苗莖似高良薑高三四尺葉青長八九寸闊半寸許三月四月開花在根下五六月成實五七十枚作一穗狀似益智皮緊厚而皺如粟文外有刺黃赤色皮間細子一團八隔可四十餘粒如黍米大微黑色也地圖經曰生南地今惟嶺南山澤間有之藥性論云出波斯國道地新州時生春生苗採七月八月取實收曝乾用實質類白豆蔻皮緊厚而皺黃赤色色黑褐味辛性溫散氣氣之厚者陽也臭香主快氣消食行手足太陰經陽明經太陽經足少陰經助得訶子鱉甲豆蔻白蕪荑良與白豆蔻為使則入肺與人參益智為使則入脾與黃柏茯苓為使則入腎與黑白石脂為使則入大小腸制去皮土治療藥性論云治冷氣腹痛止休息氣痢勞損消化水穀溫暖脾胃陳藏器云主上氣咳嗽奔豚鬼疰驚癇邪氣日華子云除一切氣霍亂轉筋心腹痛能起酒香味合治砂仁二錢炒令熱透為末合熱酒調服治妊娠偶因所觸或墜高傷打致胎動不安腹中痛不可忍者服之須臾覺腹中胎動處極熱即胎已安蓬莪朮無毒叢生蓬莪朮主心腹痛中惡疰忤鬼氣霍亂冷氣吐酸水解毒食飲不消酒研服之又療婦人血氣丈夫奔豚名醫所録名蓬莪朮波殺苗圖經曰春生田野其莖如錢大高二三尺葉青白色長一二尺大五寸以來頗類蘘荷五月有花作穗黃色頭微紫子似干椹根如生薑而術在根下似雞鴨卵大小不常並生一好一惡惡者有毒西戎人取時先放羊食羊食者用之羊不食者則棄之陳藏器云黑色者為蓬莪黃色者為術味甘有大毒者為波殺也地圖經曰生廣南諸州今江浙亦有之道地西戎時生三月生苗採九月取根收曝乾用根堅實者為好質類芋色黑黃味苦辛性溫泄散氣氣厚味薄陽中之陰臭香主破積聚消瘀血助得酒醋良制圖經曰削去粗皮蒸熟曝乾用此物極堅硬難搗治用時熱灰火中煨令透熟乘熱入臼中搗之即碎如粉雷公云凡使於砂盆中用醋磨令盡然後於火畔吸令乾重篩過用之治療日華子云除一切氣開胃消食通月經及內損惡血合治合酒醋磨服治女子血氣心痛破痃癖冷氣積雪草無毒蔓生積雪草主大熱惡瘡癰疽浸淫赤熛皮膚赤身熱神農本經名地錢草連錢草胡薄荷海蘇苗圖經曰葉圓如錢莖細而徑五月開花蔓延溪澗之側荊楚人以葉如錢謂之地錢草衍義曰此草今南方多生陰濕地形如水荇而小面亦光潔微尖為異爾今人亦謂之連錢草蓋取其象也地圖經曰生荊州川穀及咸陽臨淄濟陽郡濕地池澤今處處有之時生春生苗採八月九月取苗葉收陰乾用苗葉花質類水荇光潔而微尖色青味苦性寒泄氣氣薄味厚陰也臭香主熱腫丹毒治療唐本注云除暴熱小兒丹毒寒熱腹內熱結搗絞汁服藥性論云治瘰癧鼠漏寒熱時節來往衍義曰治一切熱毒癰疽搗末水調敷之合治合鹽挼貼腫毒並風疹疥癬花搗末方寸匕合醋服療女子小腹中痛月經初來腰中切痛連脊間如刀錐所刺忍不堪者白前無毒植生白前主胸脅逆氣咳嗽上氣名醫所録名石藍苗圖經曰苗似細辛而大色白易折亦有葉似柳或似芫花苗者並高尺許生洲渚砂磧之上根白長於細辛亦似牛膝白薇輩今用蔓生者味苦非真也地圖經曰生蜀中及淮浙州郡皆有之道地越州舒州時生春生苗採二月八月取根收曝乾用根粗脆者為好質類牛膝而白色白味甘性微溫緩蜀本云微寒氣氣薄味厚陽中之陰主保肺氣止咳嗽助得溫藥相佐使為良制雷公云凡使先用生甘草水浸一伏時後漉出去頭須焙乾任入藥中用治療陶隱居云除氣嗽唐本注云治上氣衝喉中呼吸欲絶者日華子云療賁豚腎氣肺氣煩悶合治以二兩合紫菀半夏各三兩大戟七合水一斗漬一宿煮取三升分三服療久咳逆上氣體腫短氣脹滿不得臥常作水雞聲者服此禁食羊肉餳薺苨無毒植生薺苨主解百藥毒名醫所録名菧苨苗圖經曰春生苗莖都似人參而葉小異根似桔梗但無心為異潤州尤多人家收以為果菜或作脯啖之味甚甘美陶隱居云絶能殺毒以其與毒藥共處而毒皆自然歇不止入方家用也地圖經曰生川蜀江浙皆有之道地潤州蜀州時生春生苗採二月八月取根收曝乾用根質類桔梗而無心色黃白味甘性寒緩氣氣之薄者陽中之陰臭腥主熱狂溫疾治療日華子云殺蟲毒蛇蠱咬罯毒箭別録云蒸作羹粥食之利肺氣和中明目止痛搗爛敷疔腫解煮水服解誤食鉤吻葉毒汁解五石毒白藥無毒蔓生白藥主金瘡生肌名醫所録名白藥子栝蔞實名苗圖經曰三月生苗似苦苣葉四月而赤莖長似葫蘆蔓六月開白花八月結子其根皮黃肉白江西出者葉似烏臼子如緑豆至八月其子變成赤色地圖經曰出原州今夔州江西嶺南亦有之道地興元府臨江軍洪州施州時生春生苗採九月取根收曝乾用根質類栝蔞根色皮黃肉白味辛性溫散氣氣之厚者陽也臭朽主消腫毒制洗淨細銼用治療圖經曰主諸瘡癰腫不散唐本注云治刀斧折傷能止血痛藥性論云治喉中熱塞噎痹不通胸中隘塞咽中常痛腫脹日華子云消痰止嗽治渴並吐血喉閉苗莖消惡瘡疥癬風瘙合治合野豬尾洗去粗皮為末酒服療心氣痛解熱毒末合雞子清調攤貼臍下護妊娠傷寒恐動胎解野葛生金巴豆藥毒草之木葒草無毒植生葒音紅草主消渴去熱明目益氣名醫所録名鴻镸鼠音纈游龍苗圖經曰此即水紅花也似蓼而葉大赤白色高丈餘其枝杆樛屈著土處有根如龍詩所謂隰有游龍是也陸機云一名馬蓼本經云似馬蓼而大若然馬蓼自是一種也地圖經曰舊不載所出州土今生水傍及所在下濕地多有之時生春生苗採五月取實收陰乾用莖實根質類馬蓼而大色紅味咸性微寒軟氣氣薄味厚陰中之陽臭香主明眼目消瘡毒治療陶隱居云作湯洗除腳氣陳藏器云消水氣惡瘡腫作湯洗之草之草香附子無毒叢生香附子主除胸中熱充皮毛久服令人益氣長鬚眉名醫所録名莎草根薃音號侯莎雀頭香緹實名苗圖經曰苗莖葉都似三稜根如棗許周匝多毛交州者最大為勝今近道生者苗葉似薤而瘦其子若麥門冬附根而生如山茱萸大至秋堅實因附根生而有香氣故謂之香附子凡血氣藥中必用之能引血藥至氣分而生血此陽生陰長之義乃婦人之仙藥也地圖經曰生田野今處處有之道地澧州交州者最勝時生春生苗採二月八月取根下子收陰乾用根下子色皮黑肉紫味甘性微寒氣氣之薄者陽中之陰臭香主散郁快氣制圖經曰凡採得後陰乾於石臼中搗碎去毛醋煮或童便浸炒黑能止血治療唐本注云大下氣除胸中熱湯液本草云治崩漏又能逐去凝血合治合蒼朮撫芎解諸郁香附子一斤醋浸一日用瓦銚慢火煮令醋盡漉出切片焙乾為末合艾葉末四兩當歸末三兩以醋糊丸如梧子大每服五十丸淡醋湯下治婦人經候不調血氣刺痛腹脅膨脹頭暈噁心崩漏帶下便血症瘕並宜服之忌鐵器水香稜無毒叢生水香稜主丈夫心肺中虛風及客熱膀胱間連脅下時有氣妨皮膚瘙癢癮疹飲食不多日漸瘦損常有憂愁心忪少氣名醫所録名水莎草附子地賴根續根草莎結水巴戟三稜草苗圖經曰苗名香稜根名莎結亦名草附子河南及淮南名水莎隴西謂之地賴根蜀郡名續根草又名水巴戟今涪都最饒名三稜草用莖作鞋履者是也功狀與香附子頗相類但味差耳謹按此種苗葉似莎草長而有稜故名三稜草根若附子謂之草附子圖經以此與香附子功狀相類考之出産不同實非一種析之庶不互用地圖經曰生博平郡池澤中及河南淮南隴西蜀郡涪都今所在皆有之時生春生苗採春取苗及花入冬取根收陰乾用苗及根色苗青根紫味辛性微寒澀氣氣之薄者陽中之陰臭香治療圖經曰苗二十斤銼以水二石五斗煮取一石五斗浴之令汗出五六度治肺中風及膚瘙癢即止每載四時常用則癮疹風永瘥合治根二斤切熬令香以生絹袋盛貯於三鬥無灰清酒中近暖處浸之春三月浸一日冬十月浸七日每空腹服一盞日夜三四服之常令酒氣相續治心中客熱膀胱間連脅下氣妨常日憂愁不樂兼心忪者若不飲酒以根十兩合桂心五兩蕪荑三兩和搗為末蜜丸搗一千杵丸如梧子大每空心用酒及姜蜜湯飲汁等下二十丸日再服漸加至三十丸以瘥為度草之木蓽澄茄無毒植生蓽澄茄主下氣消食皮膚風心腹間氣脹令人能食療鬼氣能染髮及香身名醫所録名毗陵茄子苗圖經曰春夏生葉青滑可愛結實似梧桐子及蔓荊子而微大地圖經曰生佛誓國道地廣州時生春夏生葉採八月九月取實用實質類蔓荊子有柄而蒂圓色黑味辛性溫散氣氣之厚者陽也臭香主胃寒霍亂腎氣膀胱冷制雷公云去柄酒拌蒸從巳至酉出細杵任用之治療日華子云治諸氣並霍亂吐瀉腹痛海藥云主心腹卒痛痰癖冷氣合治合高良薑各三分為末每服二錢水六分煎十餘沸入醋少許攪勻和滓服之治傷寒咳逆日夜不定者草之草胡黃連無毒叢生胡黃連主久痢成疳傷寒咳嗽溫瘧骨熱理腰腎去陰汗小兒驚癇寒熱不下食霍亂下痢名醫所録名割孤露澤苗圖經曰苗若夏枯草初生似蘆干似楊柳枯枝根頭似烏觜心黑外黃折之肉似鸜鵒眼者小兒藥中多用之地圖經曰生胡國今南海及秦隴間亦有之唐本云出波斯國海畔陸地道地廣州時生春生苗採八月上旬取根又不拘時月取之用根折之塵出如煙者為真質類宣黃連而粗大色黑黃味苦性平寒泄氣氣薄味厚陰中之陽臭香主骨蒸疳熱反惡菊花玄參白蘚皮制銼碎用治療唐本注云治骨蒸勞熱三消五痔並冷熱泄痢及婦人胎蒸虛驚大人五心煩熱補唐本注云補肝膽明目益顏色厚腸胃合治合人乳汁浸點目甚良合柴胡等分為末蜜丸如雞頭大每服一二丸以酒少許水五分化開重湯煮二十沸食後服之治小兒盜汗潮熱往來忌與豬肉同食令人漏精解巴豆毒船底苔無毒附水中苔麗生船底苔治鼻洪吐血淋疾以炙甘草並豉汁濃煎湯旋呷又主五淋取一團鴨子大煮服之水中細苔主天行病心悶搗絞汁服名醫所録苗謹按舊船之底浸漬日久得水土之氣積襲而生也時生無時採無時收陰乾用苔色青緑味淡性冷泄氣氣之薄者陽中之陰主諸淋治療別録云治乳石發動小便淋澀不通心神悶亂者以船度苔如半雞子大以水一盞煎至五分去滓溫服日三四服水中苔治小兒赤遊行於體上下至心即死搗末敷之良紅豆蔻無毒叢生紅豆蔻主腸虛水瀉心腹攪痛霍亂嘔吐酸水解酒毒名醫所録苗圖經曰其苗如蘆高一二尺葉似姜花作穗嫩葉卷而生微帶紅色其結實如豆而紅即高良薑子也地圖經曰出南海諸國時生春生苗採秋取實收曝乾用實質類益智而赤小色紅味辛性溫散氣氣之厚者陽也臭香主冷氣腹痛治療藥性論云消瘴霧氣毒去宿食溫腹腸吐瀉痢疾禁多服令人舌粗不思飲食解酒毒蒔蘿無毒叢生蒔蘿主小兒氣脹霍亂嘔逆腹冷食不下兩肋痞滿名醫所録名慈謀勒苗圖經曰三月四月生苗花實大類蛇床而香辛今人多以和五味不聞入藥用善滋食味多食無損若與阿魏同合奪其味耳地圖經曰出佛誓國今嶺南及近道皆有之時生春生苗採六月七月取實收曝乾用實質類馬芹子而輕色青褐味辛性溫散氣氣之厚者陽也臭香主健脾開胃氣制水洗微炒用治療日華子云溫腸治腎氣別録云治膈氣消食溫胃補日華子云益水臟壯筋骨解殺魚肉毒艾蒳香無毒麗生艾蒳香去惡氣殺蟲主腹冷泄痢名醫所録地廣志云出西國及剽國似細艾又有松樹皮緑衣亦名艾蒳可以和合諸香燒之能聚其煙青白不散而與此不同也時生無時採無時收陰乾用緑衣質類青苔色青味甘性溫氣氣之厚者陽也臭香主闢瘟疫去惡氣治療陳藏器云除癬闢疰別録云治傷寒五泄心腹注氣下寸白蟲止腸鳴合治合蜂窠浴腳氣甚良甘松香無毒叢生甘松香主惡氣卒心腹痛滿兼用合諸香名醫所録苗圖經曰叢生葉細如茅草根極繁密作湯浴令人體香地圖經曰出姑臧山野今黔蜀州郡及遼州亦有之別録云出源州涼州道地文州時生春生苗採八月取根莖收曝乾用根莖質類茅草紫而繁密色紫黑味甘性溫緩氣氣之厚者陽也臭香主消脹下氣助得白芷附子良制水洗去土治療日華子云治腹脹下氣廣志云去黑皮䵟黯風疳齒䘌野雞痔垣衣無毒附地衣麗生垣衣主黃疸心煩咳逆血氣暴熱在腸胃金瘡內塞久服補中益氣長肌好顏色名醫所録名垣嬴天韭鼠韭苗圖經曰垣衣生古垣牆背陰處青苔衣是也其石上生者名昔邪屋上生者名屋遊形療略同以具下品又地衣冷微毒即陰地苔蘚日曬起者也時生無時採三月三日收陰乾用苔質類土馬鬃色青緑味酸性微寒收氣味厚於氣陰也臭腥主暴風口噤制洗去土治合生油調敷馬反花瘡地衣合人垢膩為丸服七粒治卒心痛中惡陟釐無毒麗生陟釐主心腹大寒溫中消穀強胃氣止泄痢名醫所録名石發苗圖經曰陟釐即石發也生於水中石上如毛而青黃似苔而粗澀古人取以作紙謂之苔紙作脯謂之苔脯蓋可啖也別録云生於水石上者名陟釐浮於水中者乃苔爾二物俱産水中然水苔性冷陟釐甘溫為異也地圖經曰生江南池澤時生春生採無時收陰乾用苔水中石上者為好質類水苔而粗澀色青黃味甘性大溫氣氣之厚者陽也臭腥主益胃厚腸治療圖經曰治虛冷下痢衍義曰止渴疾忌食鹽乾薹無毒水生乾薹主痔殺蟲及霍亂嘔吐不止煮汁服之又心腹煩悶者冷水研如泥飲之即止又發諸瘡疥下一切丹石殺木蠹蟲內木孔中但是海族之流皆下丹石名醫所録地生海中時生春生採無時收曬乾用苔色緑味咸性寒又云溫氣味厚於氣陰也臭腥禁多食令人痿黃少血色解諸藥毒草之走鳧葵無毒水生鳧葵主消渴去熱淋利小便名醫所録名接余莕音荇菜葉苻苗圖經曰此即莕菜也生水中葉圓似蓴而在莖端花黃色極繁盛其根長短隨水深淺詩所謂參差荇菜是也陸機云莖白葉紫赤色圓徑寸余浮在水面根在水底大如叉股上青下白江東人食之醫方鮮用地圖經曰生水中今處處池澤中皆有之時生春生苗採無時收曝乾用莖葉質類蘋而圓色莖白葉紫赤味甘性冷緩氣氣之薄者陽中之陰臭腥主諸淋制水洗銼碎用治療別録云搗汁服之除寒熱解蠱毒毒藥草之草女菀無毒叢生女菀出神農本經主風寒洗洗霍亂泄痢腸鳴上下無常處驚癇寒熱百疾以上朱字神農本經療肺傷咳逆出汗久寒在膀胱支滿飲酒夜食發病以上黑字名醫所録名白菀織女菀茆音柳苗唐本注云此即白菀也苗葉與紫菀相類但根白爾其療體並同無紫菀時亦可通用也地別録云生漢中川穀或山陽時生春生苗採正月二月取根收陰乾用根質類細辛而白色白味辛性溫散氣氣之厚者陽也臭香主咳嗽反畏滷咸王孫無毒植生王孫出神農本經主五臟邪氣寒濕痹四肢疼酸膝冷痛以上朱字神農本經療百病益氣以上黑字名醫所録名長孫黃孫黃昏白功草海孫蔓延牡蒙苗蜀本注云葉似及已而大根長尺余皮肉亦紫色唐本注云小品述本草牡蒙一名王孫藥對有牡蒙無王孫此則一物明矣地圖經云生海西川穀及汝南城郭垣下時生春生苗採秋取根收曝乾用根質類及已色紫味苦性平泄氣味厚於氣陰也主金瘡止痛治療唐本注云療金瘡破血生肌止痛赤白痢除腳腫發陰陽也補唐本注云益氣補虛土馬鬃無毒麗生土馬鬃治骨熱敗煩熱毒壅衄鼻名醫所録地圖經曰生於背陰古牆垣上有之歲多雨則茂盛世人以為垣衣非也垣衣生垣牆之側此物生垣牆之上比垣衣更長大抵苔之類也以其所附不同故立名與主療亦異在屋則謂之屋遊瓦苔在牆垣則謂之垣衣土馬鬃在地則謂之地衣在井則謂之井苔在水中石上則謂之陟釐土馬鬃近世常用而諸書未著故附新定條焉時生春生採無時收陰乾用苔牆垣上者佳質類垣衣而長色緑味酸性寒氣氣薄味厚陰也臭腥蜀羊泉無毒植生蜀羊泉出神農本經主頭禿惡瘡熱氣疥瘙痂癬蟲療齲齒以上朱字神農本經女子陰中內傷皮間實積以上黑字名醫所録名羊泉羊飴漆姑苗唐本注云葉似菊花紫色子類枸杞子根如遠志無心有糝方藥不復用彼土人時有采識者地圖經曰生蜀郡川穀唐本注云處處陰濕地皆有之時生無時採三月四月取苗收陰乾用苗葉色青味苦性微寒泄氣味厚於氣陰也主漆瘡制銼碎用治療唐本注云主小兒驚生毛髮草之木菟葵無毒植生菟葵主下諸石五淋止虎蛇毒名醫所録名莃苗圖經曰似葵而葉小狀若藜有毛汋食角切煮也而啖之甚滑爾雅所謂莃菟葵是也唐本注云苗如石龍芮葉光澤花白似梅莖紫色衍義曰緑葉如黃蜀葵花似拒霜甚雅形如至小者初開單葉蜀葵有檀心色如牡丹姚黃蕊則蜀葵也唐劉夢得云菟葵燕麥領春風者此也地爾雅云所在平澤及田間皆有之時生春生苗採六月七月取莖葉收曝乾用莖葉質類石龍芮色葉緑莖紫味甘性寒緩氣氣之薄者陽中之陰主淋瀝熱結治療別録云治蛇虎毒諸瘡搗汁飲之及塗瘡能解毒止痛草之草蔛草無毒植生蔛草主暴熱喘息小兒丹腫名醫所録名蔛榮苗唐本注云葉圓似澤瀉而小花青白亦堪啖江南人用蒸魚食之甚美地圖經曰生水旁所在有之時生春生苗採五月六月取莖葉收曝乾用莖葉質葉類澤瀉而小色青味甘性寒緩氣氣之薄者陽中之陰主熱毒制銼碎用鱧腸無毒植生鱧腸主血痢針灸瘡發洪血不可止者敷之立已汁塗發眉生速而繁名醫所録名蓮子草旱蓮子金陵草苗圖經曰葉似柳而光澤莖似馬齒莧高一二尺花細而白其實若小蓮房蘇恭云以其苗似旋覆者是也一種苗更枯瘦頗似蓮花而黃色實亦作房而圓摘其苗皆有汁出須臾即黑故取此以烏髭發也地圖經曰生下濕地及在坑渠間亦有之南方尤多道地滁州時生春生苗採三月八月取莖葉收陰乾用莖葉質類旋覆色青味甘酸性平緩氣氣之薄者陽中之陰臭朽主烏髭發排膿止血制孫真人云揀選無泥土者不宜水洗銼碎用治療日華子云通小腸長鬚發敷一切瘡並蠶瘑蕭炳云作膏點鼻中添腦爵床無毒叢生爵床主腰脊痛不得著床俯仰艱難除熱可作浴湯神農本經名香蘇赤眼苗唐本注云此草似香葇葉長而大或如荏且細地圖經曰生漢中川穀及平澤熟田道旁有之時生春生苗採無時收陰乾用莖葉質類香葇色青味咸性寒軟氣味厚於氣陰也臭朽主血脹下氣制銼碎用治療唐本注云汁塗杖瘡立瘥井中苔萍無毒附藍麗生井中苔及萍主漆瘡熱瘡水腫井中藍殺野葛巴豆諸毒名醫所録苗陶隱居云廢井中多生苔萍及磚土間生雜草菜藍在井中者彌佳時生春生採不拘時取收陰乾用苔色緑味苦性大寒泄氣味厚於氣陰也茅香花無毒附白茅香花叢生茅香花主中惡溫胃止嘔吐療心腹冷痛苗葉可煮作浴湯辟邪氣令人身香名醫所録苗圖經曰苗似大麥五月開白花亦有黃花者或有結實者亦有無實者其莖葉黑褐色而花白者名曰茅香即非白茅香也又有一種白茅香味甘平無毒生安南如茅根衍義曰茅香花白根如茅但明潔而長皆可作湯浴也地圖經曰生劍南道諸州今陝西河東京東州郡亦有之道地丹州岢嵐軍淄州時生三月生苗採正二月取根五月取花八月取莖收曝乾用花及根質花似蘆花而輕軟根如茅根而潔白色白味苦性溫泄氣氣厚於味陽中之陰臭香主辟惡止血治療日華子云白茅香花塞鼻洪敷久不合灸瘡罯刀箭瘡止血並痛煎服止吐血鼻衄陳藏器云白茅香主惡氣令人身香美煮服止服內冷痛別録云白茅根煮汁飲之治熱淋疾良合治白茅根燒末合脂膏塗諸竹木刺在肉中不出亦治因風致腫馬蘭無毒附山蘭植生馬蘭主破宿血養新血合金瘡斷血痢蠱毒解酒疸止鼻衄吐血及諸菌毒生搗敷蛇咬人山蘭亦大破血名醫所録名紫菊苗圖經曰如澤蘭氣臭楚詞以惡草喻惡人北人見其花呼為紫菊以其花似菊而紫也又山蘭生山側似劉寄奴葉無丫不對生花心微黃赤亦大破血里人多用之地圖經曰生水澤傍時生春生苗採夏秋取收陰乾用莖葉質類澤蘭色花紫葉緑味辛性平散氣氣之薄者陽中之陰臭臭主調血解毒草之走使君子無毒蔓生使君子主小兒五疳小便白濁殺蟲療瀉痢名醫所録苗圖經曰莖作藤如手指其葉青如兩指頭長二寸三月生花淡紅色久乃深紅有五瓣七八月結子如拇指長寸許大類梔子亦似訶梨勒而輕有五稜其殼紫黑色內有仁白色俗傳始因潘州郭使君療小兒多是獨用此物後來醫家因號為使君子也地圖經曰生交廣等州今嶺南州郡山野中及水岸皆有之道地眉州時生春生苗採七八月取實收曝乾用仁質類訶梨勒而輕色紫黑味甘性溫緩氣氣之厚者陽也臭香主消疳殺蟲草之草百脈根無毒植生百脈根主下氣止渴去熱除虛勞補不足名醫所録苗唐本注云葉似苜蓿花黃根如遠志地圖經曰出肅州巴西時生春生苗採二月八月取根收曬乾用根質類遠志色黃味甘苦性微寒氣氣之薄者陽中之陰臭朽主降氣除熱制酒浸或水煮用白豆蔻無毒植生白豆蔻主積冷氣止吐逆反胃消穀下氣名醫所録名多骨苗圖經曰形如芭蕉葉似杜若長八九尺而光滑冬夏不凋花淺黃色子作朵如葡萄其子初出微青熟則變白地圖經曰出伽古羅國今廣州宜州亦有之不及蕃舶者佳時生春生苗採七月取實收曝乾用實質類縮砂蜜碧而辛香色皮白仁碧味辛性大溫散氣氣厚味薄陽也臭香主諸氣胃冷行手太陰經制去殼治療東垣云破肺中滯氣退目中雲氣散胸中冷氣補上焦元氣合治合好酒調末服療胃氣冷吃食即欲吐地筍無毒叢生地筍利九竅通血脈排膿治血止鼻洪吐血産後心腹痛一切血病肥白人産婦可作蔬菜食甚佳名醫所録苗圖經曰地筍乃澤蘭根也苗高二三尺莖幹青紫色作四稜葉生相對如薄荷葉而有毛七月開花紫白色其根紫黑如粟根南人採其嫩而有節者淹作茹亦美地圖經曰生汝南諸大澤傍及下濕地今荊隨壽蜀州河中府皆有之道地徐州梧州時生二月生苗採八月取根收曝乾用根質類粟根色紫黑味甘性溫氣氣厚於味陽中之陰海帶無毒麗生海帶催生治婦人及療風亦可作下水藥名醫所録苗圖經曰此海藻更粗柔韌而長今登州人取干之可以苴束器物者是也地圖經曰生東海水中石上時生無時採無時收曝乾質類海藻粗而長色黑味苦鹹性寒泄氣氣薄味厚陰也陀得花陀得花主一切風血浸酒服名醫所録名三勒漿苗圖經曰胡人採此花以釀酒呼為三勒漿地圖經曰生西國用花味甘性溫緩氣氣之厚者陽也翦草無毒植生翦草治惡瘡疥癬風瘙名醫所録名根白藥苗陳藏器云葉如茗而細黑色生山澤間今瘡家多用之地圖經曰生潤州台州道地婺州時生春生苗採二月三月取收曝乾用莖葉質類茜草亦如細辛色黑味苦性平涼泄氣氣之薄者陽中之陰臭香主蟲瘡疥癬制九蒸九曝治療圖經曰諸瘡疥痂瘻蝕及牛馬諸瘡並治之合治以一斤淨洗為末合生蜜二斤和為膏用瓷器盛之九蒸九曝令病人五更起面東用匙炒藥如粥服之每服四兩以稀粟米飲壓之粥飲不可太熱或吐或下皆不妨療久病肺損咯血一服愈尋常咳嗽血妄行每服一匙可也忌犯鐵器一十種陳藏器余迷迭香味辛溫無毒主惡氣令人衣香燒之去鬼魏略云出大秦國廣志云出西海海藥云味平不治疾燒之祛鬼氣合羌活為丸散夜燒之闢蚊蚋此外別無用矣故魚網主鯁以網覆鯁者頸差如煮汁飲之骨當下矣故繳腳布無毒主天行勞復馬鬃風黑汗洗汁飲帶垢者佳江中採出蘆蘆令夫婦和同用之有法此江中出波蘆也蝨建草味苦無毒去蟣蝨挼取汁沐頭盡死人有誤吞蝨成病者搗絞汁服一小合亦主諸蟲瘡生山足濕地莖葉似山丹微赤高一二尺又有水竹葉如竹葉而短小生水中亦云去蝨人取水竹葉生食含生草主婦人難産口中含之立瘥亦咽其汁葉如卷柏而大生靺羯國其葉煮之不熱無毒兔肝草味甘平無毒主金瘡止血生肉解丹石發熱初生細軟似兔肝一名雞肝與蘩蔞同名石芒味甘平無毒主人畜為虎狼等傷恐毒入肉者取莖雜葛根濃煎服之亦取汁生高山如芒節短江西人呼為折草六月七月生穗如荻也蠶繭草味辛平無毒主蠶及諸蟲如蠶類咬人恐毒入腹煮汁服之生搗敷瘡濕地如蓼大莖赤花白東土亦有之問荊味苦平無毒主結氣瘤痛上氣氣急煮服之生伊洛間洲渚苗似木賊節節相接亦名接續草
