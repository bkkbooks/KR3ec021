body:
  text: 續集卷之十木部蘹香無毒蘹香主頭癤腫毒碾末麻脂調塗七日腐落本草綱目名兜婁婆香地李時珍曰蘹香江淮湖嶺山中有之苗木大者近丈許小者多被樵採葉青而長有鋸齒質狀如小薊葉而香對節生其根狀如枸杞根而大煨之甚香用楞嚴經云壇前具列小爐以兜婁婆香煎水沐浴即此香也味苦澀性平篤耨香無毒篤耨香主面黧皯𪒟同白附子冬瓜子白芨石榴皮等分為末酒浸三日洗面後敷之久則面瑩如玉本草綱目地李時珍曰篤耨香出真臘國樹之脂也苗樹如松形其香老則溢出色白而透明者名曰篤耨盛夏不融香氣清遠土人取後夏月以火炙樹令脂液再溢至冬乃凝復收之以瓠瓢盛置陰涼處乃得不融雜以樹皮者則色黑名黑篤耨為下品時夏融冬結附録膽八香李時珍曰膽八樹生交趾南番諸國樹如稚木稚葉鮮紅色類霜楓其實壓油和諸香爇之辟惡氣肥皂莢微毒肥皂莢主去風濕下痢便血瘡癬腫毒本草綱目地李時珍曰肥皂莢生高山中質其樹高大葉如檀及皂莢葉五六月開白花結莢長三四寸狀如雲實之莢而肥厚多肉內有黑子數顆大如指頭不正圓其色如漆而甚堅中有白仁如栗煨熟可食亦可種之十月採莢煮熟搗爛和白麵及諸香作丸澡身面去垢而膩潤勝於皂莢也相感志言肥皂莢水死金魚闢馬蟻麩見之則不就亦物性然耳味辛性溫治腸風下血獨子肥皂燒存性為末糊丸每服一錢米飲下便毒初起肥皂搗爛敷之甚效玉莖濕癢肥皂一個燒存性香油調搽即愈合治下痢噤口肥皂莢一枚以鹽實其內燒存性為末以少許入白米粥內食之即效風虛牙腫老人腎虛或因涼藥擦牙致痛用獨子肥皂以青鹽實之燒存性研末摻之或入生樟腦三四錢頭耳諸瘡眉癬燕窩瘡並用肥皂煅存性一錢枯礬一分研勻香油調塗之小兒頭瘡因傷湯水成膿出水不止用肥皂燒存性入膩粉麻油調搽臘梨頭瘡不拘大人小兒用獨核肥皂去核填入沙糖入巴豆二粒扎定鹽泥包煅存性入檳榔輕粉五七分研勻香油調搽先以灰汁洗過溫水再洗拭乾乃搽一宿見效不須再洗癬瘡不愈以川槿皮煎湯用肥皂去核及肉膜浸湯時時搽之相思子有小毒相思子主通九竅去心腹邪氣止熱悶頭痛風痰瘴瘧殺腹臟及皮膚內一切蟲除蠱毒取二七枚研服即當吐出本草綱目名紅豆李時珍曰按古今詩話云相思子圓而紅故老言昔有人沒於邊其妻思之哭於樹下而卒因以名之此與韓憑冢上相思樹不同彼乃連理梓木也或云即海紅豆之類未審的否地李時珍曰相思子生嶺南質樹高丈餘白色其葉似槐其花似皂莢其莢似扁豆其子大如小豆彼人以嵌首飾段公路北戶録言有蔓生用子收龍腦香相宜令香不耗也色半截紅半截黑味苦性平治瘴瘧寒熱相思子十四枚水研服取吐立瘥解中蠱毒必效方用未鑽相思子十四枚杵碎為末溫水半盞和服欲吐抑之勿吐少頃當大吐非常輕者但服七枚神效合治貓鬼野道眼見貓鬼及耳有所聞用相思子萆麻子巴豆各一枚硃砂末蠟各四銖合搗丸如萆麻子大服之即以灰圍患人面前著一斗灰火吐藥入火中沸即畫十字於火上其貓鬼者死也胡頽子無毒胡頽子本草拾遺主止水利陳藏器根主煎湯洗惡瘡疥並犬馬瘑瘡陳藏器吐血不止煎水飲之喉痹痛塞煎酒灌之皆效本草綱目葉主肺虛短氣喘咳劇者取葉焙研米飲服二錢本草綱目名蒲頽子盧都子雀兒酥半含春黃婆奶李時珍曰陶弘景注山茱萸及櫻桃皆言似胡頽子凌冬不凋亦應益人陳藏器又于山茱萸下詳著之別無識者今考訪之即雷斆炮炙論所謂雀兒酥也雀兒喜食之越人呼為蒲頽子南人呼為盧都子吳人呼為半含春言早熟也襄漢人呼為黃婆奶象乳頭也劉績霏雪録言安南有小果紅色名盧都子則盧都乃蠻語也地陳藏器曰胡頽子生平林間苗陳藏器曰樹高丈餘冬不凋藏冰白小兒食之當果又有一種大相似冬凋春實夏熟人呼為木半夏無別功效時冬花春熟最早質李時珍曰胡頽即盧都子也其樹高六七尺其枝柔軟如蔓其葉微似棠梨長狹而尖面青背白俱有細點如星老則星起如麩經冬不凋春前生花孕如丁香蒂極細倒垂正月乃敷白花結實小長儼如山茱萸上亦有細星斑點立夏前採食酸澀核亦如山茱萸但有八稜軟而不堅核內白綿如絲中有小仁其木半夏樹葉花實及星斑氣味並與盧都同但枝強硬葉微團而有尖其實圓如櫻桃而不長為異耳立夏後始熟故吳楚人呼為四月子亦曰野櫻其核亦八稜大抵是一類二種也色生青熟紅味酸性平禁陶弘景曰寒熱病不可用治李時珍曰蒲頽葉治喘咳方出中藏經云甚者亦效如神云有人患喘三十年服之頓愈甚者服藥後胸上生小癮疹作癢則瘥也虛甚加人參等分名清肺散大抵皆取其酸澀收斂肺氣耗散之功耳枸骨無毒枸骨本草綱目木皮主浸酒補腰腳令健陳藏器枝葉主燒灰淋汁或煎膏塗白癜風陳藏器名貓兒刺陳藏器曰此木肌白如枸之骨李時珍曰葉有五刺如貓之形故名又衛矛亦名枸骨與此同名地蘇頌曰多生江浙間取以鏇盒器甚佳質陸機詩疏云枸骨山木也其狀如櫨木理白滑可為函板有木虻在葉中卷之如子羽化為虻李時珍曰枸骨樹如女貞肌理甚白葉長二三寸青翠而厚硬有五刺角四時不凋結實如女貞及菝葜子皮薄味甘核有四瓣人採其木皮煎膏以黏烏雀謂之黏䅻時五月開細白花九月成熟色緋紅色味微苦性涼山礬無毒山礬葉主久痢止渴殺蚤蠹用三十片同老薑三片浸水蒸熱洗爛弦風眼本草綱目名藝香碇花柘花瑒花春桂七里香李時珍曰藝盛多也老子曰方物藝藝是也此物山野叢生最多而花繁香馥故名按周必大云柘音鄭出南史荊俗訛柘為鄭呼為鄭礬而江南又訛鄭為瑒也黃庭堅云江南野中碇花極多野人採葉燒灰以染紫為黝不借礬而成豫因以易其名為山礬地李時珍曰山礬生江淮湖蜀野中質樹之大者莖高丈許其葉似梔子葉生不對節光澤堅強略有齒凌冬不凋三月開花繁白如雪六出黃蕊甚芬香結子大如椒其葉味澀人取以染黃及收豆腐或雜入茗中按沈括筆談云古人藏書闢蠹用藝香謂之藝草即今之七里香也葉類豌豆作小叢生啜嗅之極芬香秋間葉上微白如粉汙闢蠹殊驗又按蒼頡解詰云藝香似邪蒿可食闢紙蠹許慎説文云藝似苜蓿成公緩藝香賦云莖類秋竹枝象青松郭義恭廣志有藝香膠杜陽編云藝香草也出於闐國其香潔白如玉入土不朽元載造藝暉堂以此為屑塗壁也據此數説則藝香非一種沈括指為七里香者不知何據所云葉類豌豆啜嗅芬香秋間有粉者亦與今之七里香不相類狀頗似烏藥葉恐沈括亦自臆度爾曾端伯以七里香為玉蕊花未知的否色青黑色熟則黃色可食味酸澀微甘扶桑無毒扶桑葉及花主癰疽腮腫取葉或花同白芙蓉葉牛蒡葉白蜜研膏敷之即散本草綱目名佛桑朱槿赤槿日及李時珍曰東海日出處有扶桑樹此花光豔照日其葉似桑因以比之後人訛為佛桑乃木槿別種故日及諸名亦與之同地李時珍曰扶桑産南方質扶桑乃木槿別種枝柯柔軟葉深緑微澀如桑其花有紅黃白三色紅者尤貴呼為朱槿嵇含草木狀云朱槿一名赤槿一名日及出南涼郡花莖葉皆如桑其葉光而厚木高四五尺而枝葉婆娑其花深紅色五出大如蜀葵重敷柔澤有蕊一條長如花葉上綴金屑日光所爍疑若焰生一叢之上日開數百朵朝開暮落插樹乃活時自五月開花始至中冬乃歇色紅白黃三色味甘性平木芙蓉無毒木芙蓉葉並花主清肺涼血散熱解毒治一切大小癰疽腫毒惡瘡消腫排膿止痛本草綱目名地芙蓉木蓮華木杹木拒霜李時珍曰此花豔如荷花故有芙蓉木蓮之名又名拒霜俗呼為杹皮樹相如賦謂之華木注云皮可為索也蘇東坡詩云喚作拒霜猶未稱看來卻是最宜霜蘇頌圖經本草有地芙蓉云出鼎州九月採葉治瘡腫蓋即此物也地李時珍曰木芙蓉處處有之質插條即生小木也其干叢生如荊高者丈許其葉大如桐有五尖及七尖者花類牡丹芍藥有千葉者最耐寒而不落不結實山人取其皮為索川廣有添色據霜花初開白色次日稍紅又明日則深紅先後相間如數色時霜時採花霜後採葉收陰乾入藥色紅白黃三色用李時珍曰芙蓉花並葉氣平而不寒不熱味微辛而性滑涎黏其治癰腫之功殊有神效近時瘍醫祕其名為清涼膏清露散鐵箍散皆此物也其方治一切癰疽發背乳癰惡瘡不拘已成未成已穿未穿並用芙蓉葉或根皮或花或生研或乾研末以蜜調塗於腫處四圍中間留頭干則頻換初起者即覺清涼痛止腫消已成者即膿聚毒出已穿者即膿出易斂妙不可言或加生赤小豆末尤妙味微辛性平山茶無毒山茶花主治吐血衄血腸風下血並用紅者為末入童便薑汁及酒調服可代鬱金朱震亨湯火傷灼研末麻油調塗本草綱目子主婦人發䐈研末摻之本草綱目名李時珍曰山茶其葉類茗又可作飲故得茶名地山茶産南方質樹生高者丈許枝幹交加葉頗似茶葉而厚硬有稜中闊頭尖面緑背淡深冬開花紅瓣黃蕊格古論云花有數種寶珠者花簇如珠最勝海榴茶花蒂青石榴茶中有碎花躑躅茶花如杜鵑花宮粉茶串珠茶皆粉紅色又有一捻紅千葉紅千葉白等名不可勝數葉各小異或云亦有黃色者虞衡志云廣中有南山茶花大倍中州者色微淡葉薄有毛結實如梨大如拳有數核如肥皂子大山茶嫩葉炸熟水淘可食亦可蒸曬作飲蠟梅無毒蠟梅花主解暑生津本草綱目名李時珍曰本非梅類因其與梅同時香又相近色似蜜蠟故得此名質李時珍曰蠟梅小樹叢枝尖葉種凡三種以子種出不經接者臘月開小花而香淡名狗蠅梅經接而花疏開時含口者名罄口梅花密而香濃色深黃如紫檀名檀香梅最佳結實如垂鈴尖長寸餘子在其中其樹皮浸水磨墨有光彩色黃色臭香味辛性溫木綿無毒白綿及布主血崩金瘡燒灰用本草綱目名古貝古終李時珍曰木綿有二種似木者名古貝似草者名古終或作吉貝者乃古貝之訛也梵書謂之啖婆又曰迦羅婆劫地李時珍曰木綿有草木二種交廣木綿樹大如抱其枝似桐其葉大如胡桃葉入秋開花紅如山茶花黃蕊花片極厚為房甚繁短側相比結實大如拳實中有白綿綿中有子今人謂之斑枝花訛為攀枝花李延壽南史所謂林邑之國出古貝花中如鵝毳抽其綿紡為布張勃吳録所謂交州永昌木綿樹高過屋有十餘年不採者實大如杯花中綿軟白可為縕絮及毛布者皆指似木之木綿也江南淮北所種木綿莖弱如蔓高者四五尺葉有三尖如楓葉入秋開花黃色如葵花而小亦有紅紫者結實大如桃中有白綿綿中有子大如梧子亦有紫綿者謂之紫綿花李延壽南史所謂高昌國有草實如繭中絲為細纑名曰白疊取以為帛甚軟白沈懷遠南越志所謂桂州出古終藤結實如鵝毳核如珠珣治出其核紡為絲綿染為斑布者皆似草之木綿也此種出南番宋末始入江南今則遍及江北與中州矣不蠶而綿不麻而布利被天下其益大哉又南越志言南詔諸蠻不養蠶惟收娑羅子中白絮紉為絲織為幅名娑羅籠段祝穆方輿志言平緬出婆羅樹大者高四五丈結子有綿紉綿織為白氈兜羅綿此亦斑枝花之類各有稱呼不同耳色白亦有紫綿者時交廣木綿入秋開花江南淮北所種木綿者四月下種入秋開花八月採球味甘性溫黃楊木無毒黃楊葉主婦人難産入達生散中用又主暑月生癤搗爛塗之本草綱目地李時珍曰黃楊生諸山野人家多栽插之枝葉攢簇上聳葉似初出槐芽而青厚不花不實四時不凋其性難長俗説歲長一寸遇閏則退今試之但閏年不長耳其木堅膩作梳剜印最良按段成式酉陽雜俎云世重黃楊以其無火也用水試之沉則無火凡取此木必以陰晦夜無一星伐之則不裂味苦性平桃寄生無毒桃寄生本草綱目主小兒中蠱毒腹內堅痛面目青黃淋露骨立取二兩為末如茶點服日四五服出聖惠方味苦辛柳寄生無毒柳寄生主膈氣刺痛搗汁服一杯本草綱目味苦性平
