body:
  text: 卷之十六木部上品之上木之木桂有小毒附桂心肉桂桂枝植生桂主溫中利肝肺氣心腹寒熱冷疾霍亂轉筋頭痛腰痛出汗止煩止唾咳嗽鼻齆能墮胎堅骨節通血脈理疏不足宣導百藥無所畏久服神仙不老名醫所録名丹桂薑桂苗謹按木高三四丈其葉如柏葉而澤黑皮黃心赤凌冬不凋其傍無雜木蓋木得桂而枯之謂也按衍義云桂大熱素問謂辛甘發散為陽故仲景治傷寒表虛用桂枝湯專取辛甘發散之意也又云療寒以熱故知三種之桂不取菌桂牡桂者蓋此二種性止溫而已不可以治風寒之病獨有一字桂本經謂甘辛大熱正合素問辛甘發散之旨尤知菌桂牡桂為不及也今爾雅云梫為木桂郭璞雲南人呼桂厚皮為木桂蘇恭以為牡桂即木桂及單名桂者非也湯液本草云有菌桂牡桂木桂筒桂肉桂板桂桂心官桂之類用者罕有分別衍義言不知何緣而得官之名考諸本草有出觀賓諸州者佳世人以筆畫多而懶書之故只作官也如黃檗作黃柏生薑作薑同意本草所説諸桂有厚薄不同大抵細薄者為枝厚脂者為肉其身者刮去皮與里止用中者為桂心故仲景用桂枝發表用肉桂補腎亦本乎天者親上本乎地者親下之義也地陶隱居云出湘州桂州交州道地桂陽廣州觀州時生春生新葉採二月八月十月取皮收陰乾用皮心枝質類厚朴而薄色紫味甘辛性大熱氣氣之厚者陽也臭香主伐肝氣逐寒邪行桂手少陰經桂枝足太陰經制去粗皮治療藥性論云桂心止九種心痛殺三蟲破血通利月閉及腳軟痹不仁並胞衣不下除咳逆結氣壅痹止腹內冷氣痛不可忍止下痢治鼻息肉日華子云桂心療一切風氣通九竅利關節暖腰膝破痃癖癥瘕消瘀血及風痹骨節攣縮續筋骨生肌肉湯液本草云桂枝發表及表虛自汗輕薄者宜入治眼目發散藥肉桂治沉寒痼冷秋冬下部腹痛並療奔豚別録云桂心療卒中惡心痛及小兒臍腫炙熱尉之桂療心腹脹悶及外腎偏腫疼痛為末水調方寸匕塗之補日華子云益精明目並五勞七傷湯液本草云肉桂補下焦熱火不足及補腎合治合人參麥門冬甘草大黃黃芩調中益氣合柴胡紫石英乾地黃止嘔逆桂心為末二兩合熱酒調一錢匕不拘時服治寒疝心痛四肢逆冷全不欲食牡桂無毒牡桂出神農本經主上氣咳逆結氣喉痹吐吸利關節補中益氣久服通神輕身不老以上朱字神農本經心痛脅風脅痛溫筋通脈止煩出汗以上黑字名醫所録名梫音寢木桂苗圖經曰木高三四丈皮薄色黃少脂肉氣如木蘭味亦相類葉狹於菌桂而長數倍亦似枇杷葉而大四月生白花全類茱萸花不著子生於岩嶺枝葉冬夏常青間無雜木所謂牡桂是也其葉用之作飲甚香人家園圃亦有種者移植於嶺北則氣味亦少辛辣故不甚入藥也地圖經曰生南海山谷道地融州桂州交州宜州甚良時生三月四月生花採二月八月十月取皮收陰乾用皮質類厚朴而光薄色紫味辛性溫散氣氣之厚者陽也臭香主溫筋通脈冷風疼痛行手少陰經制刮去粗皮銼碎用菌桂無毒菌桂主百病養精神和顏色為諸藥先聘通使久服輕身不老面生光華媚好常如童子神農本經苗圖經曰葉似柿葉而尖狹光淨中有三道文花白蕊黃四月開花五月結實樹皮青黃肌理緊薄無骨正圓如竹大枝小枝皮俱是筒有二三重者因其似筒而謂之筒桂也然筒桂即菌桂爾筒桂字相近其亦傳寫之誤乎大枝皮不能重卷者味極淡薄不入藥用地陶隱居云出交州桂林及蜀都山谷岩崖間道地韶州賓州時生春生新葉採三月七月取皮收日乾用皮質類厚朴而卷薄作筒色紫味辛性溫散氣氣之厚者陽也臭香主養神悅色行手少陰經制刮去粗皮銼碎用松脂植生松脂出神農本經主疽惡瘡頭瘍白禿疥瘙風氣安五臟除熱久服輕身不老延年以上朱字神農本經胃中伏熱咽乾消渴及風痹死肌煉令白服之其赤者主惡痹實味苦溫無毒主風痹寒氣虛羸少力補不足葉味苦溫主風濕瘡生毛髮安五臟守中不飢延年節溫無毒主百節久風風虛腳痹疼痛根白皮味苦溫無毒主辟穀不飢以上黑字名醫所録名松膏松肪松黃苗謹按蕭柄云松有五鬣為一葉或有兩鬣七鬣者歲久則實繁其脂蓋由樹枝榮盛時為炎熱所灼津液流出凝結於外製服之勝於鑿樹及煮用膏也亦有花上黃粉名松黃山人及時拂取點湯甚佳燒其枝上下承取汁液名松𣿉音詣能療牛馬瘡疾皮上緑衣謂之艾蒳合和諸香用之夫松凌冬不凋理為佳物但人多輕忽近易之耳中原雖有然不及塞上者佳也地圖經曰生泰山山谷今處處有之時生四時不凋採六月取脂九月取實收陰乾用通明如薰陸香成顆者為好質類乳香色黃味苦甘性溫泄緩氣氣厚味薄陽中之陰臭香主諸瘡腫除熱疾制圖經曰用大釜加水置甑用白茅藉甑底又加黃沙於茅上厚寸許然後布松脂於上炊以桑薪湯減即添熱水常令滿候松脂盡入釜中乃出之投於冷水既凝又蒸如此三過其白如玉然後入藥治療藥性論云殺蟲治耳聾牙有蛀孔以少許咬之不落蟲自死貼諸瘡膿血煎膏生肌止痛抽風日華子云潤心肺下氣除邪煎膏治瘻爛排膿葉炙罯凍瘡風濕瘡節主腳軟骨節風別録云節燒灰揩牙齦歷蟲齒根黑暗補日華子云根白皮補五勞益氣合治煮煉投冷水中五十遍合蜜丸服二兩飢即服之日三療惡風疾鼻柱斷離者二百日瘥斷鹽及房室以三十斤煉五十遍或二十遍每三升合煉酥三升溫和熟攪極稠空腹以酒服方寸匕日三數食麵粥為佳慎血腥生冷酢物果子療歷節諸風百節痠痛不可忍以三兩煉合巴豆一兩勻和熟搗丸通過以薄綿裹內耳孔中療耳久聾日一易之瘥又以三十斤合酒五斗漬三七日服一合日五六服療歷節風四肢疼痛如解葉合水面飲服之斷谷併除患惡病節釀酒療苦腳弱人花合酒服輕身花合川芎當歸石膏蒲黃為末服二錢水二合紅花二捻同煎七分粥後溫服療産後壯熱頭痛頰赤口乾唇焦煩燥渴昏悶不爽實搗為膏合酒調下三錢日三則不飢渴飲水勿食他物百日身輕日行五百里實合柏子仁服療虛祕槐實無毒植生槐實出神農本經主五內邪氣熱止涎唾補絶傷五痔火瘡婦人乳瘕以上朱字神農本經子臟急痛以七月七日取之搗取汁銅器盛之日煎令可作丸大如鼠屎內竅中三易乃愈又墮胎久服明目益氣頭不白延年枝主洗瘡及陰囊下濕癢皮主爛瘡根主喉痹寒熱可作神燭以上黑字名醫所録苗圖經曰其木有極高大者爾雅云槐有數種葉大而黑者名懷古回切槐晝合夜開者名守宮槐葉細而青緑色者但謂之槐五月六月開花七月八月結實其功用不言有別地圖經曰處處有之道地河南平澤時生春生葉採六月取花七月七日取嫩實搗汁作煎十月取老實入藥根皮取無時收日乾用實及皮枝根色青黃味苦酸鹹性寒泄氣氣薄味厚陰也臭腥主五痔心痛助景天為之使制雷公云凡使去單子並五子者只取兩三子者以銅錘搗令破用烏牛乳浸一宿蒸過用治療陶隱居云十月巳日採之新盆盛合泥百日皮爛為水核如大豆服之令腦滿發不白而長生藥性論云大熱難産皮煮汁淋陰囊墜腫氣白皮治口齒風疳𧈟血以煎漿水含之及煎淋浴男子陰疝卵腫日華子云療丈夫女人陰瘡濕癢及催生吞七粒效皮主中風皮膚不仁喉痹浸洗五痔並一切惡瘡婦人産門癢痛及湯火瘡煎膏止痛長肉生肌陳藏器云殺蟲去風連莢折取陰乾煮服味一如茶明目除熱淚頭腦心胸間熱風煩悶風眩欲倒心頭吐涎如醉漾漾如船車上者木為灰擦之長毛髮圖經曰春採嫩枝煅為黑灰揩齒去蚛燒青枝取瀝塗癬白皮主汁療口齒及下血水吞黑子變白髮食療云春初嫩葉食之除邪氣産難絶傷及主癮疹牙齒諸風疼合治斷槐大枝使生嫩蘖煮汁釀酒療大風痿痹槐花附葉無毒植生槐花主五痔心痛眼赤殺腹臟蟲及熱治皮膚風並腸風瀉血赤白痢葉平無毒煎湯治小兒驚癇壯熱疥癬及疔腫皮莖同用名醫所録苗衍義曰即今染家所用者收時折其未開花煮一沸出之釜中有所澄下稠黃滓滲漉為餅染色更鮮明也地圖經曰生河南平澤今所在有之時生四月五月生葉採七月取花收日乾用花未開者佳色青黃味苦性平泄氣味厚於氣陰也臭腥主涼血制去枝梗炒用治療圖經曰陳久者為末服止下血衍義曰止腸風熱瀉血合治槐花燒灰細研合酒調食前服二錢匕療婦人漏下血不絶槐膠槐膠主一切風化涎治肝臟風筋脈抽掣及急風口噤或四肢不收頑痹或毒風周身如蟲行或破傷風口眼偏斜腰脊強硬任作湯散丸煎雜諸藥用之亦可水煮和諸藥為丸及作湯下藥名醫所録謹按槐膠乃槐之液也其木因夏日酷烈肢液灼出凝結於外稠黏如膠故曰槐膠地圖經曰處處有之時生無時採五月六月取膠收瓷器貯之用脂色蒼褐制水煮過研細用枸杞無毒叢生枸杞出神農本經主五內邪氣熱中消渴周痹久服堅筋骨輕身不老以上朱字神農本經風濕下胸脅氣客熱頭痛補內傷大勞噓吸堅筋骨強陰利大小腸耐寒暑以上黑字名醫所録名枸忌地輔卻暑地仙苗枸檵苦杞托盧仙人杖西王母杖實羊乳天精卻老苗圖經曰春生苗葉如石榴葉而軟薄其莖幹高三五尺作叢六七月生小紅紫花隨便結實形微長如棗核沈存中雲陝西枸杞長一二丈其圍數寸無刺根皮如厚朴甘美異於諸處子如櫻桃全少核今人相傳謂枸杞與枸棘相類其實形長而無刺者真枸杞圓而有刺者枸棘也衍義曰枸杞當用梗皮地骨當用根皮枸杞子當用紅實本一物而有三用實微寒梗皮寒根大寒亦三等孟子所謂性猶杞柳之杞後人徒勞分別又謂之枸棘茲強生名耳凡杞未有無刺者雖大至有成架然亦有刺但此物小則多刺大則少刺還如酸棗與棘其實皆一也地圖經曰生常山平澤及丘陵阪岸今處處有之道地實陝西甘州茂州時生春生苗採春取葉秋取莖實收陰乾用葉莖實質葉如石榴葉而軟薄色青緑味苦實甘性寒實微寒氣氣薄味厚陰也臭朽反惡乳酪主強陰益精治療藥性論云葉搗絞汁點眼除風障赤膜昏痛日華子云苗除煩去皮膚骨節間風消熱毒散瘡腫食療云葉子除風去虛勞補陶隱居云補益精氣強盛陰道藥性論云子葉能益精及諸虛不足易顏色變白明目安神令人長壽日華子云苗益志補五勞七傷壯心氣食療云葉子堅筋能老合治葉合羊肉作羹甚益人及除風明目若渴可煮作飲以代茶葉上蟲窠子曝乾為末入乾地黃中為丸益陽事助精氣子五升好酒二斗研搦破浸七日漉去滓飲之初二三合為始後即任性飲之補虛長肌肉益顏色肥健人能去勞熱名曰枸杞子酒葉半斤切碎合粳米二合以豉汁中根和煮作粥以五味末蔥白等調和食之療五勞七傷房事衰弱解發熱諸毒煩悶煮汁解之及消熱面毒地骨皮無毒叢生地骨皮解骨蒸肌熱主風濕痹消渴堅筋骨去骨用根皮名醫所録名杞根苗謹按地骨皮即枸杞根皮也苗葉詳具枸杞條下但其功用所載簡略按湯液本草王海藏以地骨皮立條概可見矣考其名以地為陰骨為里皮為表所以去骨蒸肌熱之要藥也亦如地筍澤蘭根苗各立其條表而出之庶不混於用也地圖經曰生常山平澤及丘陵阪岸今處處有之道地陝西甘州茂州時生春生苗採冬取根皮收陰乾用根皮質類五加皮而輕細色褐味苦性大寒泄氣氣薄味厚陰也臭朽主無定之風邪有汗之骨蒸行手少陽經足少陰經制雷公云凡使根掘得後使東流水浸以物刷上土瞭然後待乾破去心用熟甘草湯浸一宿然後焙乾用其根若似物命形狀者上春食葉夏食子秋冬食根並子也治療食療云去骨熱消渴別録云除虛勞客熱及療癰疽惡瘡血出不止以地骨皮不計多少淨洗先刮上面粗皮留之再刮取細白穰仍取粗皮同地骨一處煎湯淋洗瘡令膿血淨以細穰貼之次日結痂遂愈合治細銼合面拌熟煮服之療腎家風以三斤合水三升煮取二升絞去滓更內鹽一兩煎二升敷目或加甘薑二兩療眼天行腫癢痛木之飛柏實無毒附葉皮植生柏實出神農本經主驚悸安五臟益氣除風濕痹久服令人潤澤美色耳目聰明不飢不老輕身延年以上朱字神農本經療恍惚虛損吸吸歷節腰中重痛益血止汗柏葉尤良柏葉味苦辛微溫主吐血衄血痢血崩中赤白輕身益氣令人耐寒暑去濕痹止飢柏白皮主火灼爛瘡長毛髮以上黑字名醫所録苗圖經曰柏有數種入藥惟用葉皆側向謂之側柏者佳而他柏所不及三月開花九月結子成熟是謂之柏實其木心赤而香人多采焚謂之柏香乃香之下品也別録云實葉採食尤能益人後漢獵者見一人越澗如飛伺而得之云是秦時避難山中採柏充食遂至不畏飢寒而本經輕身延年之説信矣若入藥以得古柏尤良嘗見孔明廟柏蜀時所植氣味甘香勝常治病功必倍之然圖經以乾州者為勝何也蓋乾州之柏葉皆茂盛而木有文理多肖山水形象乃靈氣所鍾宜其實之最佳衍義曰嘗官陝西每登高望之雖千萬株皆一一西指蓋此木乃至堅之木不畏霜雪得木之正氣而他木不逮也所以受金之氣所制故一一向之陶云忌採冢上所産者蓋有泥於方士之説而別録謂干柏多出於乾陵殆干柏俱不可用也然物各有所宜豈可以乾陵而費柏乎亦豈干柏盡出於乾陵乎蓋乾水土厚而産物氣全是可尚耳地之所宜又何拘焉地圖經曰生泰山山谷陝州宜州益州終南山道地乾州密州時生九月結實採冬月取實四時各隨方向取葉收實曝乾葉陰乾用實葉白皮質類小麥而圓色殼褐仁白味甘性平緩氣氣厚於味陽中之陰臭香主養氣血益容顏助牡蠣桂瓜子為之使反畏菊花羊蹄草諸石面曲制別録云採蒸曝乾舂礧去殼取仁用治療圖經曰葉濕搗令爛如泥冷水調作膏治大人小兒湯燙火燒塗傷處用帛系定三兩日瘡常斂仍滅瘢藥性論云柏子仁除腰中冷膀胱冷膿宿水去頭風及百邪鬼魅並小兒驚癇葉治冷風歷節疼痛日華子云柏子仁祛風潤皮膚葉炙罯凍瘡燒取汁塗頭黑潤鬚髮唐本注云柏枝節煮以釀酒除風痹歷節風燒取𣿉療瘑疥及癩瘡良別録云柏子仁為末溫水調服二錢治小兒躽啼驚癇腹滿不乳食大便青白色社中西南柏樹東南枝為末水調一錢匕日三四服治時氣瘴疫柏樹木細銼煮湯淋洗治霍亂轉筋補藥性論云興陽道益壽合治側柏葉合酒止尿血青柏葉一把合乾薑三片阿膠一挺炙三味以水二升煮一升去滓別絞馬通汁一升相和合煎取一升綿濾一服盡之療吐血不止者又葉焙乾為末合川黃連二味同煎為汁服療男子婦人小兒大腹下黑血如茶腳色或膿血如澱色所謂蟲痢者服之有殊效及殺五臟蟲柏子仁合大麻子松子仁等分同研溶白蠟丸如桐子大以少黃丹湯每以二三十丸食前服療老人虛祕柏葉搗為細末不計時候合粥飲調下二錢匕療憂恚嘔血煩滿少氣胸中疼痛木之木茯苓無毒附茯神寄生茯苓出神農本經主胸脅逆氣憂恚驚邪恐悸心下結痛寒熱煩滿咳逆口焦舌乾利小便久服安魂養神不飢延年以上朱字神農本經止消渴好唾大腹淋瀝膈中痰水水腫淋結開胸腑調臟氣伐腎邪長陰益氣力保神守中茯神平主闢不祥療風眩風虛五勞口乾止驚悸多恚怒善忘開心益智安魂魄養精神以上黑字名醫所録名茯菟苗圖經曰出大松下附根而生無苗葉花實作塊如拳在土底大者至數斤似人形龜形者佳皮黑肉有赤白二種衍義曰茯苓乃樵斫訖多年松根之氣所生蓋根之氣抑鬱未絶故為此物然亦由土地所宜與不宜其津氣盛者發泄於外結為茯苓故不抱根而成既離其本則有潛伏之義故曰茯苓其茯神雖有津氣而不甚盛故止能伏結於本根既不離其本則有藉松之靈故曰茯神或云松既樵矣而根尚能生物乎答曰如馬勃菌五芝木耳石耳之類皆生於枯木土石之上精英未淪安得不為物也傳云上有菟絲下有茯苓及多年松脂入地所化甚為輕信地圖經曰生泰山山谷泰華嵩山郁州雍州南山道地嚴州者佳時生無時採二月八月收陰乾用堅實者為上色白赤味甘淡性平緩氣氣之薄者陽中之陰臭朽行白者入手太陰經足太陽經少陽經赤者入足太陰經手太陽經少陰經主利水除濕益氣和中助馬藺為之使反惡白蘞畏牡蒙地榆雄黃秦艽龜甲制雷公曰凡採得後去皮心搗令細於水盆中攪令濁浮去之是茯苓筋若誤服之令人眼中瞳子並黑睛點小兼盲目甚記之治療陶隱居云白茯苓通神而致靈和魂而煉魄明竅而益肌厚腸而開心調榮而理衛藥性論云白茯苓開胃止嘔逆安心神及肺痿痰壅並小兒驚癇療心腹脹滿婦人熱淋赤茯苓破結氣茯神安神定志及驚癇心下急痛堅滿人虛而小腸不利加而用之心名黃松節去中偏風口面喎斜毒風筋攣不語心神驚掣虛而健忘日華子云白茯苓安胎暖腰膝止健忘湯液本草云白茯苓除濕益燥和中益氣利腰臍間血其淡能利竅甘以助陽除濕之聖藥所以補脾逐水濕淫所勝小便不利淡味滲泄陽也故治水緩脾生津導氣赤茯苓入丙丁伐腎邪小便多能止之小便澀能利之補藥性論云白茯苓補勞乏日華子云白茯苓補五勞七傷開心益智合治白茯苓酒浸合光亮硃砂同用能祕真白茯苓為末合蜜和敷面上療面皯皰及産婦黑疱如雀卵白茯苓合甘草防風芍藥紫石英麥門冬共療五臟禁如小便利或數服之則大損人目如汗多人服此損真氣夭人壽陰虛人不宜服忌醋及酸物琥珀無毒琥珀主安五臟定魂魄殺精魅邪鬼消瘀血通五淋名醫所録名石珀水珀花珀物象珀苗圖經曰松脂入地千年所化而成也其産之地傍無草木入土淺者五六尺深者八九尺大者如斛削去其皮初如桃膠久乃堅凝光彩甚麗是由松樹枝節榮盛時為炎熱所灼流脂出外日漸厚大淪入土中津潤歲久乃為土所滲泄而光瑩之體獨存中有蚊蟲蜂蜾之形恐未入土之時黏著物耶其類有水珀多無紅色淺黃多粗皮皺石珀如石重色黃不堪用花珀文似新馬尾松心文一路赤一路黃物象珀其內自有物命動此使有神妙然琥珀其色如血蓋生於陽而成於陰故也欲驗其真以手摩熱能拾芥者是矣地圖經曰生永昌益州陳藏器云出䀮賓國別録云出南蠻海南林邑國秦象郡林邑縣皆有之時生無時採無時用色紅潤而拾芥者為好質類紅瑪瑙色紅黃味甘性平緩氣氣厚於味陽也主安心利水明目磨翳制雷公曰夫入藥用水調側柏子末安於瓷鍋子中安琥珀於末中了下火煮從巳至申別有異光別搗如粉重篩用治療藥性論云除百邪産後血枕痛日華子云消蠱毒壯心明目磨翳止心痛及癲邪破癥結合治以一兩合鱉甲京三稜各一兩延胡索沒藥各半兩大黃二錢五分熬搗為散空心溫酒服三錢匕日再服能止血生肌鎮心明目破癥結氣塊産後血暈悶絶見枕痛並效若産即減大黃為末合童便調一錢匕療金瘡弓弩箭中悶絶無所識贋煮毈大亂切雞子及青魚枕作者為偽醫無毒醫烏兮切主補心安神破血尤善名醫所録名木醫醫珀地圖經曰古來相傳云松脂入地千年為茯苓又千年為琥珀又千年為醫然二物燒之皆有鬆氣為用與琥珀同狀似玄玉而輕是衆珀之長故號曰醫珀出西戎而有茯苓處無此物今西州南三百里磧中得者大則方尺黑潤而輕燒之腥臭高昌人名為木醫謂玄玉為石醫洪州土石間得者燒作鬆氣破血生肌亦與琥珀同見風折破不堪為器量此二種及琥珀或非松脂所為也有此差舛今略論也謹按本經云醫乃琥珀千年所化衍義云琥珀謂千年茯苓所化則其間有黏著蜾裸蜂蟻宛然完具者是極不然也地裡志雲林邑多琥珀實松脂所化耳此説為勝但土地有所宜不宜故有能化有不能化者觀琥珀如是則醫可知為一物而成者也時生無時採無時用黑色光潤者為好質類玄玉而輕色黑味甘性平緩氣氣厚於味陽也臭朽主安神破血治療藥性論云小兒帶之辟惡磨滴目中除翳去赤障別録云為末服之攻婦人小腸癥瘕諸疾榆皮無毒植生榆皮出神農本經主大小便不通利水道除邪氣久服輕身不飢其實尤良以上朱字神農本經腸胃邪熱氣消腫性滑利療小兒頭瘡痂疕花主小兒癇小便不利傷熱以上黑字名醫所録名零榆榆錢莢也類錢故云苗圖經曰三月生莢其仁古人採以為糜羹今無復食者惟用其實陳老者作醬爾然榆之類有十數種葉皆相似但皮及木理有異白榆先生葉卻著莢皮白色剝之刮去上粗皺中極滑白即爾雅所謂榆白粉也此皮入藥今孕婦滑胎方中多用之刺榆有針刺如柘古人茹之云美於白榆爾雅所謂樞荎詩唐風雲山有樞是也並勿令中濕榆皮荒歲農人食之以當糧其莢過食則令人多睡嵇公所謂榆令人瞑是也地圖經曰生潁川山谷今處處有之時生三月生莢採四月取實不拘時取皮收曝乾用皮莢質類桑皮而厚色白味甘性平緩氣氣之薄者陽中之陰臭腥主諸瘡癬治療藥性論云通利五淋治不眠療齁取白皮陰乾後焙杵為末每日朝夜用水五合末二錢煎如膠服瘥日華子云通經脈涎敷癬孟詵云服丹石人採葉生服一兩頓佳子醬食能助肺殺諸蟲下氣令人能食消心腹間惡氣卒心痛陳藏器云嫩葉作羹食之壓丹石消水腫食療云塗諸瘡癬別録云焙乾為末妊娠臨月日三服方寸匕令産極易産下兒身尚有之信其驗也又火灼爛瘡嚼爛白皮敷之瘥合治為末合苦酒調塗療小兒白禿髮不生榆莢合牛肉作羹食之療婦人帶下生皮三兩搗末合三年醋滓封之療暴患赤腫日六七易瘥亦療女人如乳腫白皮末合雞子白調敷療五色丹俗名油腫若犯多致死不可輕之惟此可療皮搗屑隨多少雜米作粥食療身體暴腫滿如小便利即瘥白皮炒令黃搗為散合好苦酒塗療身體及頭悉生瘡又以綿裹覆上蟲出即瘥皮為屑合檀皮服之令人不飢白皮合菜菹食之令人能食及服丹石人食之取利關節故也禁皮實並勿令中濕濕則傷人酸棗無毒植生酸棗出神農本經主心腹寒熱邪結氣聚四肢痠疼濕痹久服安五臟輕身延年以上朱字神農本經煩心不得眠臍上下痛血轉久泄虛汗煩渴補中益肝氣堅筋骨助陰氣令人肥健以上黑字名醫所録苗圖經曰似棗木而皮細其木心赤色莖葉俱青花似棗花八月結實紫紅色似棗而圓小爾雅辨棗之種類曰實小而酸曰樲棗孟子曰養其樲棗趙岐注所謂酸棗是也衍義曰酸棗微熱經不言取仁仍療不得眠天下皆有之但以土産宜與不宜嵩陽子曰酸棗縣即滑之屬邑其木高數丈味酸醫之所重今市人賣者皆棘子此説未盡殊不知小則為棘大則為酸棗平地則易長居崖塹則難生故棘多生崖塹上久不樵則成幹人方呼為酸棗更不言棘徒以世人之意如此在物則曷若是也其實一木以其不甚為世所須及礙塞行路故成大木者少多為人樵去然此物才及三尺便開花結子但窠小者氣味薄木大者氣味厚又有此別今陝西臨潼山野所出者亦好此土地所宜也並可取仁後有白棘條乃是酸棗未長大時枝上刺也及至長成其刺亦少實亦大故棗取大木刺取小窠也亦不必強分別爾謹按本經惟用實療不得眠而不言用仁者恐失於詳也然酸棗肉味酸服之使不思睡其核中仁補中益氣服之療不得眠正如麻黃髮汗根節止汗之別用者當審之地圖經曰生河東川澤今近京及西北州郡皆有之野生多在坡阪及城壘間時生四月生葉採八月取實收陰乾四十日用仁質類大棗仁圓匾而小色赤味酸性平收氣氣之薄者陽中之陰臭香主熟治不眠生治多睡反惡防己制雷公云凡使採得後曬乾取葉重拌酸棗仁蒸半日了去皮尖任研用治療陶隱居云酸棗啖之使人醒睡藥性論云酸棗仁主筋骨風炒為末作湯服日華子曰酸棗仁止臍下滿痛食療云酸棗主寒熱結氣安五臟別録云棗樹棘針朽落地者以水二升煎取一升含之日四五度療齒蟲腐爛合治酸棗仁二升合茯苓白朮人參甘草各二兩生薑六兩六物切以水八升煮取二升分四服療振悸不得眠酸棗仁二升合知母乾薑茯苓芎藭各二兩甘草一兩炙並切以水一升先煮棗減三升後內五物煮取三升分服療虛煩不得眠酸棗仁一兩炒令香熟搗細為散每用二錢不拘時合竹葉湯調服療膽虛睡臥不安心多驚悸蓋膽虛不眠者寒也酸棗仁一兩生用合金挺臘茶二兩以生薑汁塗炙令微焦搗羅為散每用二錢水七分煎六分無時溫服療膽風毒氣虛實不調昏沉睡多蓋膽實多睡者熱也黃柏無毒植生柏木黃柏也出神農本經主五臟腸胃中結熱黃疸腸痔止泄痢女子漏下赤白陰傷蝕瘡以上朱字神農本經療驚氣在皮間肌膚熱赤起目熱赤痛口瘡久服通神根主心腹百病安魂魄不飢渴久服輕身延年通神以上黑字名醫所録名根檀桓苗圖經曰柏木黃柏也木高數丈葉類吳茱萸亦如紫椿經冬不凋皮外白里深黃色根如松下茯苓作結塊別有一種多刺而小細葉者名刺柏不入藥用又有一種木如石榴皮黃子赤如枸杞兩頭尖人銼以染黃今醫家亦稀用地圖經曰生漢中山谷及永昌今處處有之蜀本圖經云出房商合等州山谷道地蜀州者為佳時生春生新葉採五月六月取皮收曝乾用皮根質類厚朴而層層作片色黃味苦性寒泄氣氣薄味厚陰也臭腥主除下部濕熱及男子陰瘡行足太陽經反惡乾漆制雷公曰凡使用刀削上粗皮了用生蜜水浸半日漉出曬乾用蜜塗文武火炙令蜜盡為度凡修事五兩用蜜三兩或鹽炒用治療圖經曰止卒消渴小便多以一斤水一升煮三五沸渴即飲之恣意飲數日便止藥性論云主男子陰痿治下血如雞鴨肝片及男子莖上瘡屑末敷之日華子云安心除勞及骨蒸洗肝明目多淚口乾心熱殺疳蟲治疣心痛疥癬陳藏器云主熱瘡疱起蟲瘡利下血殺蛀蟲煎服主消渴湯液本草云瀉膀胱之熱利下竅及補腎不足別録云以五斤用水三升煮漬療傷寒時氣溫病毒攻手足腫疼痛欲斷亦治毒攻陰腫又切片含之療卒喉痹為末塗敷小兒臍瘡不合合治合蜜炙療鼻洪腸風瀉血後分急熱腫痛身皮力微次於根以三寸合土瓜三枚大棗七枚和膏先用湯洗面乃塗藥不過四五日令面悅光澤合苦竹瀝浸之點治小兒重舌末合苦酒調敷咽喉卒腫食飲不通干服易之瘥末合雞子白調塗治癰疽發背或髮乳房初起微赤不急治之即殺人合蜜於慢火上炙焦搗為細末每服二錢溫糯米飲調下療吐血熱極以少許合黃耆湯中用之治腎水膀胱不足諸痿厥腳膝無力合蜜炒為細末療口瘡如神合蜜炙同青黛各一分為細末入龍腦一字研勻療心脾熱舌頰生瘡當摻瘡上有涎即吐解食自死六畜肉中毒楮實無毒植生楮實主陰痿水腫益氣充肌膚明目久服不飢不老輕身葉味甘無毒主小兒身熱食不生肌可作浴湯又主惡瘡生肉樹皮主逐水利小便莖主癮疹癢單煮洗浴皮間白汁療癬名醫所録名谷實榖桑楮桑苗圖經曰此有二種一種皮有斑花文謂之斑榖今人用為冠者一種皮無花枝葉大相類但取其葉似葡萄葉作瓣而有子者為佳其實初夏生如楊梅青緑色至六七月漸深紅乃成熟俗謂之榖一説榖構樹也榖田久廢必生構葉有瓣曰楮無瓣曰構詩小雅云爰有樹檀其下惟谷陸機疏云幽州謂之榖桑或曰楮桑荊陽交廣謂之榖江南人績其皮以為布又搗以為紙長數丈光澤甚好採嫩芽以當菜茹其汁合硃砂為團名曰五金膠漆地圖經曰生少室山今所在有之道地滁州明州時生春生葉採八月九月取實收日乾四十日用子葉皮莖色赤味甘性寒緩氣氣之薄者陽中之陰臭朽主水痢水腫制雷公曰凡使採得後用水浸三日將物攪旋投水浮者去之然後曬乾卻用酒浸一伏時了便蒸從巳至亥出焙令乾用治療圖經曰主四肢風痹赤白下痢葉主鼻洪及鼻衄出數升不斷者搗取汁飲三升如不止再三飲瘥灰止金瘡出血木枝中白汁塗癬甚效藥性論云皮味甘平治水腫氣滿日華子云斑榖樹葉治刺風身癢榖樹汁療蛇蟲蜂犬咬別録云葉搗爛敷治癬濕癢枝汁隨意服療天行後兩脅脹滿臍下如水腫樹白汁塗療蠍螫人痛不止補日華子云壯筋骨助陽氣補虛勞助腰膝益顏色合治楮紙三十張燒灰合酒半升調服療女子月經不絶來無時者及蓐中血暈干葉三兩熬搗為末合烏梅煎湯服方寸匕治瘴痢無問老少日夜百餘度者瘥干葉炒為末合面作餔浦各切飥他各切食之主水痢榖樹葉八兩水一斗煮六升去滓合米煮粥療人虛肥積年氣上如水病面腫腳不腫乾漆無毒名醫云有毒植生乾漆出神農本經主絶傷補中續筋骨填髓腦安五臟五緩六急風寒濕痹生漆去長蟲久服輕身耐老以上朱字神農本經療咳嗽消瘀血痞結腰痛女子疝瘕利小腸去蛔蟲以上黑字名醫所録苗圖經曰木高三二丈皮白葉似椿花似槐子若牛李木心黃六月七月以竹筒釘入木中取之崔豹古今注曰以剛斧斫其皮開以竹管承之汁滴則成漆詩傳曰木有液黏黑可飾器物者是也乾漆舊云用漆桶中自然乾者狀如蜂房孔孔相隔今多用筒子內乾者以黑如醫堅若鐵石者為佳地圖經曰出漢中川穀金襄歙州皆有之陶隱居云梁州益州廣州道地峽州嚴州時生春生葉採六月七月取滋汁收陰乾用桶簍中自然乾硬者佳質狀如蜂房孔孔相隔色黃黑味辛性溫散氣氣之厚者陽也臭臭主消瘀血破疝瘕助半夏為之使反畏雞子制搗碎炒令煙盡或濕漆煎乾亦好治療藥性論云殺三蟲治女人經脈不通日華子云除傳尸勞及除風合治乾漆一兩為末濕漆一兩先入銚子內熬如一食飯頃住火與乾漆末一處拌和丸如半皂子大每服一丸合溫酒吞下無時治婦人不曾生長血氣臟腑疼痛不可忍及療丈夫元氣小腸氣撮痛者如元氣小腸膀胱氣痛牙關緊急但斡開牙關溫酒化一丸灌下必安怕漆人不可服筒子乾漆二兩搗碎炒煙出細研合醋糊和為丸如桐子大每服五丸至十丸熱酒下醋湯亦得治九種心痛及腹脅積聚滯氣合白蕪荑等分為末米飲調一字至一錢治小兒胃寒蟲上諸證危惡與癇相似一兩為粗末炒令煙盡合生漆末一兩以生地黃汁一升入銀器中熬似可丸丸如桐子大每服一丸加至三五丸酒飲下治女人經血不行及諸癥瘕等病室女萬瘕丸以通利為度漆葉合青黏為散服之去三蟲利五臟輕身益氣使人頭不白禁生服損人腸胃妊娠不可服忌油脂解中此毒發飲鐵漿並黃櫨汁及甘豆湯吃蟹並可治之五加皮無毒植生五加皮出神農本經主心腹疝氣腹痛益氣療躄小兒不能行疽瘡陰蝕以上朱字神農本經男子陰痿囊下濕小便餘瀝女人陰癢及腰脊痛兩腳疼痹風弱五緩虛羸補中益精堅筋骨強志意久服輕身耐老以上黑字名醫所録名豺漆豺節追風使木骨刺通苗圖經曰春生苗莖葉俱青作叢赤莖者似藤蔓高三五尺上有黑刺葉生無叉作簇者良四葉三葉者最多為次每一葉下生一刺三四月開白花結細青子至六月漸黑色根若荊根皮黃黑肉白骨堅硬蘄州人呼為木骨一説今所用乃有數種京師北地者大片類秦皮黃柏輩平直如板而色白絶無氣味療風痛頗效余不堪用吳中乃剝野椿根為五加皮柔韌而無味殊為乖失今江淮間所生乃為真者類地骨皮輕脆芬香是也其苗莖有刺類薔薇長者至丈餘葉五出如桃花香氣如橄欖春時結實如豆粒而扁春青得霜乃紫黑吳中亦多俗多為追風使亦曰刺通剝取酒漬以療風乃不知其為五加皮也江淮吳中往往為藩籬正似薔薇金櫻輩一如上所説但北間多不知用此種耳雷公云今五加皮其樹本是白楸樹其上葉如蒲葉者其葉三花是雄五葉花是雌剝皮陰乾陽人使陰陰人使陽地圖經曰生漢中及冤句今湖南州郡京師北地蘄州皆有之道地江淮間及吳中者佳時生春生苗採五月七月取莖皮十月取根皮收陰乾用皮質類地骨皮輕脆而芬香色褐味辛苦性溫微寒散氣氣厚味薄陽中之陰臭香主諸痹風濕堅壯筋骨助遠志為之使反畏蛇皮玄參制銼碎用治療藥性論云能破逐惡風血四肢不遂賊風傷人軟腳藾公對切腰主多年瘀血在皮肌及痹濕內不足並虛羸小兒三歲不能行用此便行走日華子云明目下氣治中風骨節攣急葉治皮膚風補日華子云補五勞七傷合治釀酒飲之治風痹四肢攣急牡荊實無毒植生牡荊實主除骨間寒熱通利胃氣止咳逆下氣名醫所録名黃荊苗圖經曰此即作箠杖者俗名黃荊是也枝莖堅徑作科不為蔓生故稱牡葉如萆麻更疏瘦花紅作穗實細而黃如麻子大或云即小荊也此有青赤二種以青者為佳唐本注云今人相承多以牡荊為蔓荊此極誤也地圖經曰生河間南陽冤句山谷或平壽都鄉高岸上及田野中今眉州蜀州近京亦有之時生春生葉採八月九月取實收陰乾用實根葉及瀝質類麻子色黃味苦葉苦根甘性溫葉平根平氣氣厚於味陽中之陰臭香主止咳逆利胃氣助防風為之使反惡石膏制用瀝取莖於火上燒之兩頭以器承取治療唐本注云葉主久痢霍亂轉筋血淋下部瘡濕𧈟薄腳及腳氣腫滿根水煮服主心風頭風肢體諸風解肌發汗陳藏器云荊木取莖截以火上燒以物承取瀝飲之去心悶煩熱頭風旋目眩心頭漾漾欲吐卒失音小兒心熱驚癇止消渴除痰唾令人不睡別録云荊瀝二升火煎至一升六合每服四合日夜一度治心虛驚悸不定羸瘦稍稍含咽之治喉腫生瘡服五六合止下赤白痢五六年者塗治濕瘑瘡燒木出黃汁敷治目卒痛葉袋盛薄蛇傷瘡毒腫上合治實合木柏實青葙療頭風荊葉取汁合酒服二合療九竅出血木之走蔓荊實無毒蔓荊實出神農本經主筋骨間寒熱濕痹拘攣明目堅齒利九竅去白蟲長蟲久服輕身耐老以上朱字神農本經主風頭痛腦鳴目淚出益氣令人光澤脂致音雉小荊實亦等以上黑字名醫所録苗圖經曰蔓生水濱苗莖蔓延春因舊枝而生小葉五月葉成如杏葉六月有花淺紅色蕊黃九月實熟上有黑斑大如梧子而虛輕冬則葉凋唐本注云蔓生葉似杏葉而細莖長丈餘花紅白色今人誤以小荊為蔓荊遂將蔓荊子為牡荊子也蜀本注云或云蔓荊即牡荊以理推之蔓生者為蔓荊樹生者為牡荊蔓生者大如梧子樹生者細如麻子據今之用正如梧子而輕虛則蔓荊是蔓生者明矣衍義曰蔓荊實諸家所解蔓荊牡荊粉糾音九不一經既言蔓荊明知是蔓生即非高木也既言牡荊則自是木上生者況漢書郊祀志所言以牡荊莖為幡竿故知蔓荊即子大者是又何疑焉故圖經云一説作蔓生者名蔓荊而今之所有者並非蔓生也地圖經曰舊不載所出州土今近京及秦隴明越州多有之道地眉州時生春生葉採八月九月取實收曬乾用實質類畢澄茄稍大而有白膜色蒼黑味辛苦性溫微寒氣氣味俱輕陽中之陰臭香主清頭目散風邪行足太陽經反惡烏頭石膏制雷公云凡使去蒂子下白膜一重用酒浸一伏時後蒸從巳至未出曬乾杵碎用治療藥性論云祛賊風能長髭發日華子云利關節治赤眼癇疾湯液本草云涼諸經血止頭痛及目暗內痛禁胃虛人勿服恐生痰疾四種海藥余藤黃謹按廣志云出鄂嶽等州諸山崖其樹名海藤花有蕊散落石上彼人收之謂沙黃就樹採者輕妙謂之臘草酸澀有毒主蚛牙蛀齒點之便落據今所呼銅黃謬矣蓋以銅藤語訛也按此與石淚採無異也畫家及丹灶家並時用之返魂香謹按漢書雲漢武帝時西國進返魂香武帝內傳云聚窟洞中上有返魂樹採其根於釜中以水煮候成汁方去滓重火煉之如漆候凝則香成也西國使云其香名有六帝曰六名何一名返魂一名驚精一名回生一名震壇一名人馬精一名節死香燒之一豆許凡有疫死者聞香再活故曰返魂香也海紅豆謹按徐表南州記云生南海人家園圃中大樹而生葉圓有英微寒有小毒主人黑皮皯𪒟花癬頭面遊風宜入面藥及藻豆近右蜀中種亦成也莎木謹按蜀記云生南中八郡樹高數十餘丈闊四五圍葉似飛鳥翼皮中亦有面彼人作餅食之廣志云作飯餌之輕滑美好白勝桄榔面味平溫無毒主補虛冷消食彼人呼為莎面也一十三種陳藏器余干陀木皮味平無毒主破宿血婦人血閉腹內血塊酒煮服之生安南皮厚堪染者葉如櫻桃海藥云按西域記云生西國彼人用染僧褐故名干陀褐色也樹大皮厚味平溫主癥瘕氣塊溫腹暖胃止嘔逆並良也含水藤中水味甘平無毒主止渴潤五臟山行無水處斷之得水可飲清美去濕痹煩熱生嶺南葉似狗蹄煮汁服之主天行時氣搗葉傅中水爛瘡皮皸劉欣期交州記亦載之也海藥云謹按交州記云生嶺南及諸海山谷狀若葛葉似枸杞多在路行人乏水處便吃此藤故以為名主煩渴心躁天行疫氣瘴癘丹石發動亦宜服之皋蘆葉味苦平作飲止渴除痰不睡利水明目出南海諸山葉似茗而大南人取作當茗極重之廣州記云新平縣出皋蘆皋蘆茗之別名也葉大而澀又南越志曰龍川縣出皋蘆葉似茗味苦澀土人為飲南海謂之過羅或曰物羅皆夷語也海藥云謹按廣州記云出新平縣狀若茶樹闊大無毒主煩渴熱悶下痰通小腸淋止頭痛彼人用代茶故人重之如蜀地茶也蜜香味辛溫無毒主臭除鬼氣生交州大樹節如沉香異物志云蜜香蟲名又云樹生千歲斫僕之四五歲乃往看已腐敗惟中節堅貞是也樹如椿按法華經注云木蜜香蜜也樹形似槐而香伐之五六年乃取其香海藥云謹按內典云狀若槐樹異物志云其葉如椿交州記云樹似沉香無異主辟惡去邪鬼尸注心氣生南海諸山中種之五六年便有香也阿勒勃味苦大寒無毒主心膈間熱風心黃骨蒸寒熱殺三蟲生佛逝國似皂莢圓長味甜好吃一名婆羅門皂莢也海藥云按異域記云主熱病及下痰殺蟲通經絡子療小兒疳氣凡用先炙令黃用鼠藤味甘溫無毒主丈夫五勞七傷腰腳痛冷陰痿小便數白益陽道除風氣補衰老好顏色取根及莖細銼濃煮服之訖取微寒亦浸酒如藥酒法性極溫服訖稍令人悶無苦生南海海岸山谷作藤繞樹莖葉滑淨似枸杞花白有節心虛苗頭有毛南人皆識其藤有鼠咬痕者良但須嚼咽其汁驗也海藥云謹按廣州記云生南海山谷藤蔓而生鼠愛食此故曰鼠藤咬處即人用入藥彼人食之如吃甘蔗味甘美主腰腳風冷大補水藏好顏色長筋骨並銼濃煎服之亦取汁浸酒更妙浮爛囉勒味酸平無毒主一切風氣開胃補心除冷痹和調臟腑生康國似厚朴也靈壽木根皮味苦平止水作杖令人延年益壽生劍南山谷圓長皮紫漢書孔光年老賜靈杖顏注曰木似竹有節長不過八九尺圍可三四寸自然有合杖之制不須削理也綟木味甘溫無毒主風血羸瘦補腰腳益陽道宜浸酒生林漢山谷木文側故曰綟木斑珠藤味甘溫無毒主風血羸瘦婦人諸疾浸酒服之生山谷中不凋子如珠而斑冬取之阿月渾子味辛溫澀無毒主諸痢去冷氣令人肥健生西國諸蕃云與胡榛子同樹一歲榛子二歲渾子也不凋木味苦溫無毒主調中補衰治腰腳去風氣卻老變白生太白山岩谷樹高二三尺葉似槐莖赤有毛如棠梨曼遊藤味甘溫無毒久服長生延年去久嗽出犍為牙門山谷如寄生著大樹春花色紫葉如柳張司空云蜀人謂之沉花藤亦治癬
