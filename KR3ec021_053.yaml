body:
  text: 續集卷之九果部榔梅無毒榔梅主生津止渴清神下氣消酒本草綱目地李時珍曰榔梅出均州太和山相傳真武折梅枝插於榔樹誓曰吾道若成花開果結後果如其言今樹尚在五龍宮北榔木梅實杏形桃核道士每歲採而蜜煎以充貢獻焉榔乃榆樹也味甘酸性平龍荔有小毒龍荔生食令人發癇或見鬼物綱目出桂海志名李時珍曰按范成大桂海志雲龍荔出嶺南狀如小荔枝而肉味如龍眼其木之身葉亦似二果故名曰龍荔時三月開小白花與荔枝同時熟不可生啖但可蒸食味甘性熱五斂子無毒五斂子主風熱生津止渴本草綱目名五稜子陽桃李時珍曰按嵇含草木狀雲南人呼稜為斂故以為名地李時珍曰五斂子出嶺南及閩中閩人呼為陽桃其大如拳形甚詭異狀如田家碌碡上有五稜如刻起作劍脊形皮肉脆軟其味初酸久甘其核如柰以蜜漬之甘酢而美俗亦曬乾以充果食又有三廉子蓋亦此類也陳祈暢異物志云三廉出熙安諸郡南人呼稜為廉雖名三廉或有五六稜者食之多汁味甘且酸尤宜與眾果參食時五月熟一樹可得數石十月再熟色色青黃潤綠形味酸甘澀性平五子實無毒五子實主霍亂金瘡宜食之出潮州志名李時珍曰五子樹今潮州有之按裴淵廣記云五子實大如梨而內有五核故名味甘性溫波羅蜜無毒波羅蜜瓤主止渴解煩醒酒益氣令人悅澤本草綱目核中仁主補中益氣令人不飢輕健本草綱目名曩伽結李時珍曰波羅蜜梵語也因此果味甘故借名之安南人名曩伽結波斯人名婆那娑拂林人名阿薩軃皆一物也地李時珍曰波羅蜜生交趾南番諸國今嶺南滇南亦有之苗樹高五六丈樹類冬青而黑潤倍之葉極光淨冬夏不凋樹至斗大方結實不花而實出於枝間多者數十枚少者五六枚大如冬瓜外有厚皮裹之若慄球上有軟刺礧砢顆重五六斤剝去外皮殼內肉層疊如橘囊食之味至甜美如蜜香氣滿室一實凡數百核核大如棗其中仁如慄黃煮炒食之甚佳果中之大者惟此與椰子而已味甘香微酸性平無花果無毒無花果食物本草主開胃止泄痢汪穎治五痔腫痛煎湯頻熏洗之取效朱震亨葉有小毒主五痔腫痛煎湯頻熏洗之取效朱震亨名映日果優曇缽阿駔李時珍曰無花果凡數種此乃映日果也即廣中所謂優曇缽及波斯所謂阿駔也地李時珍曰無花果出揚州及雲南今吳楚閩越人家亦或折枝插成枝柯如枇杷樹實出枝間時三月發葉如花構葉五月內不花而實質狀如木饅頭其內虛軟採以鹽漬壓實令扁曬乾充果食熟則紫色軟爛甘味如柹而無核也按方輿志云廣西優曇缽不花而實狀如枇杷又段成式酉陽雜俎云阿駔出波斯拂林人呼為底珍樹長丈餘枝葉繁茂有子如蓖麻無花而實色赤類椑柹一月而熟味亦如柹二書所說皆即此果也又有文光果天仙果古度子皆無花之果並附於下味甘性平附錄文光果出景州形如無花果肉味如慄五月成熟天仙果出四川樹高八九尺葉似荔枝而小無花而實子如櫻桃累累綴枝間六七月熟其味至甘宋祁方物贊云有子孫枝不花而實薄言採之味埒蜂蜜古度子出交廣諸州樹葉如慄不花而實枝柯間生子大如石榴及楂子而色赤味甘醋煮以為粽食之若數日不煮則化作飛蟻穿皮飛去也沙棠果無毒沙棠果本草綱目主食之卻水病出山海經地李時珍曰按呂氏春秋云果之美者沙棠之實今嶺外寧鄉瀧水羅浮山中皆有之木狀如棠黃花赤實其味如李而無核味甘性平㼌部蘡薁無毒蘡薁本草綱目主止渴悅色益氣蘇恭名燕薁嬰舌山葡萄野葡萄藤名木龍地蘇頌曰蘡薁子生江東實似葡萄細而味酸亦堪為酒李時珍曰蘡薁野生林墅間亦可插植蔓葉花實與葡萄無異其實小而圓色不甚紫也詩云六月食蘡即此其莖吹之氣出有汁如通草也苗蘇恭曰蘡薁蔓生苗葉與葡萄相似而小亦有莖大如碗者冬月惟葉凋而藤不死藤汁味甘子味甘酸即千歲虆也陳藏器曰蘇恭注千歲虆即是蘡妄言也千歲虆藤如葛而葉背白子赤可食蘡薁藤斫斷通氣更無甘汁詳見草部千歲虆下李時珍曰蘇恭所說蘡薁形狀甚是但以千歲虆則非矣味甘酸性平藤主噦逆傷寒後嘔噦搗汁飲之良蘇恭止渴利小便本草綱目治嘔啘厥逆蘡薁藤煎汁呷之目中障翳蘡薁藤以水浸過吹氣取汁滴入目中去熱翳赤白障合治五淋血淋木龍湯用木龍即野葡萄藤也竹園荽淡竹葉麥門冬連根苗紅棗肉燈心草烏梅當歸各等分煎湯代茶飲味甘性平根主下焦熱痛淋閟消腫毒本草綱目治根治一切腫毒赤龍散用野葡萄根曬研為末水調塗之即消也赤遊風腫忽然痛癢不治則殺人用野葡萄根搗如泥塗之即消合治男婦熱淋野葡萄根七錢葛根三錢水一鍾煎七分入童子小便三分空心溫服附錄諸果一十九種李時珍曰方冊所記諸果名品甚多不能詳其性味狀既列於果則養生者不可不知因略採附以俟知者津符子李時珍曰孫真人千金方云味苦平滑多食令人口爽不知五味甘劍子李時珍曰范成大桂海志云狀似巴欖子仁附肉有白靨不可食發人病北人呼為海胡桃是也楊搖子李時珍曰沈瑩臨海異物志云生閩越其子生樹皮中其體有脊形甚異而味甘無奇色青黃長四五寸海梧子李時珍曰嵇含南方草木狀云出林邑樹似梧桐色白葉似青桐其子如大慄肥甘可食木竹子李時珍曰桂海志云皮色形狀全似大枇杷肉味甘美秋冬實熟出廣西櫓罟子李時珍曰桂海志云大如半鬥碗數十房攢聚成球每房有絳冬生青至夏紅破其瓣食之效甚出廣西羅晃子李時珍曰桂海志云狀如橄欖其皮七種出廣西顧玠海槎錄云橫州出九層皮果至九層方見肉也夏熟味如慄㯆子李時珍曰徐表南州記云出九真交趾樹生子如桃實長寸餘二月開花連著子五月熟色黃鹽藏食之味酸似梅夫編子李時珍曰南州記云樹生交趾山谷三月開花仍連著子五六月熟入雞魚豬鴨羹中味美亦可鹽藏白椽子李時珍曰劉欣期交州記云出交趾樹高丈餘實味甘美如胡桃系彌子李時珍曰郭義恭廣志云狀圓而細赤如軟棗共味初苦甘可食人面子李時珍曰草木狀云出南海樹似含桃子如桃實無味以蜜漬可食其核正如人面可玩祝穆方輿勝覽記云出廣中大如梅李春花夏實秋熟蜜煎甘酸可食其核兩邊似人面口目鼻皆具黃皮果李時珍曰海槎錄云出廣西橫州狀如楝子及小棗而味酸四味果李時珍曰段成式酉陽雜俎云出祁連山木生如棗剖以竹刀則甘鐵刀則苦木刀則酸蘆刀則辛行旅得之能止飢渴千歲子李時珍曰草木狀云出交趾蔓生子在根下須綠色交加如織一苞恆二百餘顆皮殼青黃殼中有肉如慄味亦如之干則殼肉相離撼之有聲桂海志云狀似青黃李味甘侯騷子李時珍曰酉陽雜俎云蔓生子大如雞卵既甘且冷消酒輕身王太僕曾獻之酒杯藤子李時珍曰崔豹古今注云出西域藤大如臂花堅硬可以酌酒文章映徹實大如指味如豆蔻食之消酒張騫得其種於大宛蕳音間子李時珍曰賈思勰齊民要術云藤生交趾合浦緣樹木正二月花四五月熟如梨赤如雞冠核如魚鱗生食味淡隈支李時珍曰宋祁益州方物圖云生邛州川穀中樹高丈餘枝修而弱開白花實大如雀卵狀似荔枝肉黃膚甘
