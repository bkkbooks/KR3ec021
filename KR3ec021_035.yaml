body:
  text: 卷之三十四果部下品果之木桃核仁無毒植生桃核仁出神農本經主瘀血血閉癥瘕邪氣殺小蟲桃花殺疰惡鬼令人好顏色桃鳧微溫主殺百鬼精物桃毛主下血瘕寒熱積聚無子桃蠹殺鬼邪惡不祥以上朱字神農本經桃核仁止咳逆上氣消心下堅除卒暴擊血破癥瘕通月水止痛桃花味苦平無毒主除水氣破石淋利大小便下三蟲悅澤人面桃鳧味苦療中惡腹痛殺精魅五毒不祥桃毛平帶下諸疾破堅閉刮取毛用之桃蠹食桃樹蟲也莖白皮味苦辛無毒除邪鬼中惡腹痛去胃中熱葉味苦辛平無毒主除尸蟲出瘡中蟲膠煉之主保中不飢忍風寒以上黑字名醫所録名崑崙桃油桃山桃金桃餅子桃桃鳧桃奴梟景用圖經曰木高丈餘三月開紅花有深淺二色漸敷青葉如柳葉而大花謝始結實漸大如杏六七月成熟圃人欲其肥美詭異多以他木接之殊失本性此種不宜用也入藥當以自然生成而不經接者則不失本性而治療有功也其實已幹著木上經冬不落此名桃鳧又名桃奴正月採之以中實者良衍義曰桃核仁桃品亦多京畿有油桃光小於衆桃不益脾有小點斑而光如塗油山中一種正是月令中桃始華者但花多子少不堪啖惟堪取仁唐文選謂山桃發紅萼者是矣又太原有金桃色深黃西京有崑崙桃深紫紅色此二種尤甘又餅子桃如今之香餅子如此數種入藥惟以山中自生者為正蓋取走泄為用不取肥好者雷公云用鬼髑髏勿用干桃子其鬼髑髏只是千葉桃花結子在樹上幹不落者於十一月內採得可為神妙東京賦云上古有神荼與鬱壘兄弟二人桃樹下閲百鬼無道理者縛以葦索而飼虎今人作桃符板云左神荼右鬱壘者是也地圖經曰生泰山川穀今處處有之道地東京及陝西出者佳時生三月開花採正月取鳧三月三日取花秋取仁收陰乾用仁花鳧毛蠹莖葉膠實及白皮質類杏仁而大色皮黃肉白味苦甘性平泄緩氣味厚於氣陰中之陽臭微香主破血殺蟲行手厥陰經足厥陰經制雷公云凡使須擇去皮用白朮烏豆二味和桃仁於垍堝子中煮一伏時後漉出用手擘作兩片其心黃如金色任用治療圖經曰桃花貼面上瘡黃水出並眼瘡桃鳧除中惡毒氣蠱疰實上毛刮取之治女子崩中唐本注云桃膠主下石淋破血中惡疰忤花主下惡氣消腫滿利大小腸藥性論云桃符主中惡孟詵云桃仁殺三蟲止心痛葉治女人陰中生瘡如蟲咬疼痛者可生搗綿裹內陰中日三四易瘥花曬乾杵末以水服二錢匕小兒半錢治心腹痛白毛及膠主惡鬼邪氣桃符及奴主精魅邪氣日華子云樹上自干桃實治肺氣腰痛除鬼精邪氣破血葉治惡氣小兒寒熱客忤別録云桃膠如彈丸含之治虛熱渴桃葉治腸痔大腸常下血杵取一斛蒸之內小口器中以下部拓上坐蟲自出桃枝上幹不落桃子燒灰水服療胎下血不出桃葉治諸蟲入耳熟挼塞兩耳即出桃白皮治狂狗咬人以一握水煎服桃樹蟲屎治瘟病令不相染為末水服方寸匕東行桃枝煮湯浴治天行時疫癘者東引桃枝白皮一握水煮服半升主鬼疰心腹痛不可忍燒桃仁敷治産後陰腫痛補日華子云桃益色桃蠹食之肥悅人顏色別云戊子日取東引桃枝二寸枕之補心虛治健忘令耳目聰明合治桃花漬酒飲之除百病益顏色桃仁去皮尖合粳米煮粥食之主上氣咳嗽胸膈痞滿氣喘桃仁去皮尖杵碎煮汁煮粥空心食之主尸疰鬼氣咳嗽痃癖注氣血氣不通日漸消瘦桃仁一升去皮尖炒令煙出熱研如脂膏合酒三升攪令相和一服取汗療風勞毒腫痛攣痛或牽引小腹及腰痛不過三瘥桃仁三十枚別研合虻蟲三十枚去翅水蛭二十枚各炒以大黃一兩同為末再與桃仁同搗令勻煉蜜丸如小豆大桃仁湯下療傷寒八九日間發熱如狂不解小腹滿痛有瘀血者利下瘀血惡物便愈未利再服收未開花陰乾與桑椹紫者等分作末以豬脂和先取灰汁洗去瘡痂即塗藥治痜瘡禁實味酸多食令人有熱杏核仁有毒植生杏核仁出神農本經主咳逆上氣雷鳴喉痹下氣産乳金瘡寒心奔豚以上朱字神農本經驚癇心下煩熱風氣去來時行頭痛解肌消心下急花味苦無毒主補不足女子傷中寒熱痹厥逆以上黑字名醫所録名金杏漢帝杏木杏白杏苗圖經曰其木高丈餘二月敷青葉如梅葉圓而尖三月開紅花四月結實五六月熟大如黃梅其實有數種黃而圓者名金杏相傳云出濟南郡之分流山彼人謂之漢帝杏今近都多種之熟最早其扁而青黃者名木杏味酢不及金杏其仁入藥今以東來者為勝衍義曰杏仁曬蓄為果其深赭色核大而匾者為金杏此等須接食之味美其他皆不逮也如山杏輩用仁入藥當以不接者為佳又有白杏至熟色青白或微黃其味甘淡而不酸耳地圖經曰生濟南及晉州山谷今處處有之時生二月開花採五月取核收焙乾用實仁花質類桃核仁而圓小色皮黃肉白味甘苦性溫氣氣味俱厚陽中之陰臭香主散結潤燥定喘寧嗽行手太陰經助得火良反惡黃芩黃耆葛根畏蘘草制雷公云凡使須以沸湯浸少時去皮膜及尖擘作兩片用白火石並烏豆杏仁三件於鍋子中下東流水煮從巳至午其杏仁色褐黃然用每修一斤用白火石一斤烏豆合水旋添勿令闕治療藥性論云除腹痹不通發汗及瘟病與心下急滿痛並心腹煩悶及肺氣咳嗽上氣喘促陳藏器云殺蟲燒令煙未盡細研如脂物裹內𧈟齒孔中亦主産門中蟲瘡癢不可忍者杏酪濃煎如膏服之潤五臟去痰嗽合治合天門冬煎潤心肺合酪作湯益潤聲氣湯經宿即動冷氣去皮搗和雞子白夜臥塗面明早以暖清曬洗之療面皯以三分去皮尖熬合桂末一分和如泥取李核大綿裹含細細咽之日午夜三療卒啞及利咽喉去喉痹痰唾咳嗽喉中熱結生瘡合橘皮桂心訶黎勒皮為丸療心腹中結伏氣湯浸研一升以水一升半翻覆絞取稠汁入生蜜四兩甘草一莖約一錢銀石器中慢火熬成稀膏瓷器盛食後夜臥入酥沸湯點一錢匕服治肺臊喘熱大腸祕潤澤五臟如無上證更入鹽為佳禁生熟吃俱得半生熟殺人實味酸不可多食傷神損筋骨小兒尤不可食多致瘡癰上膈熱雙仁者殺人狗食之亦死解錫毒胡粉毒食狗肉中毒安石榴無毒植生安石榴主咽燥渴酸實殼療下痢止漏精東行根療蛔蟲寸白名醫所録名丹若苗圖經曰木不甚高大枝柯附干自地便能作叢種極易息折其條盤土中遂生花有黃赤二色實亦有甘酢二種甘者可食酢者入藥陸機書云張騫使西域於塗林國所得者是也又一種山石榴形頗相類而絶小不作房生青齊間甚多不入藥但蜜漬以當果或寄京下甚美衍義曰安石榴有酸淡兩種旋開單葉花旋結實實中子紅秋後經雨則自坼裂道家謂之三尸酒云三尸得此果則醉又有一種子白瑩徹如水晶者味亦甘謂之水晶石榴惟酸石榴皮合斷下藥仍須老木所結及收之陳久者佳地圖經曰本生西域今處處有之衍義曰河陰縣最多時生春生葉採五月取花七月八月取實收陰乾陳久者佳用子皮花根色黃赤味甘酸性溫收氣氣厚味薄陽中之陰臭香主止痢解渴制雷公云凡使石榴殼不計乾溼先用漿水浸一宿至明漉出其水如黑汁方可用治療圖經曰東行根並殼入殺蟲及染鬚髮口齒等藥花百葉者主心熱吐血及衄血等干之作末吹鼻中立瘥藥性論云皮味酸能除筋骨風腰腳不遂行步攣急疼痛澀腸止赤白下痢取汁止目淚下並漏精根青者入染須方陳藏器云石榴子止渴別録云酸石榴皮燒赤為末服治赤白痢下水穀宿食不消合治酸石榴皮炙令黃杵末合棗肉為丸空腹三丸日二服治赤白痢腹痛酸石榴皮末合茄子枝湯調服療糞前有血令人面色黃禁多食損齒令黑及損人肺禁忌鐵器梨無毒植生梨多食令人寒中金瘡乳婦尤不可食名醫所録名乳梨鵝梨水梨紫煤梨茅梨桑梨鹿梨紫花梨消梨青梨甘棠御兒梨苗圖經曰梨之種類殊別醫家相承用乳梨鵝梨乳梨出宣城皮厚而肉實其味極長鵝梨出近京州郡及北都皮薄而漿多味差短於乳梨惟香則過之其餘水梨消梨紫煤梨赤梨甘棠御兒梨之類甚多俱不聞入藥也又有青梨茅梨並不任用又有桑梨惟堪蜜煮食之生食不益人冷中不可多食又有紫花梨療心熱唐武宗有此疾百醫不效青城山邢道人以此梨絞汁而進帝疾遂愈後復求之苦無此梨常山忽有一株因緘實以進帝多食之解煩燥殊效歲久木枯不復有種者今人不得而用之又有江寧府信州出一種小梨名鹿梨葉如茶根如小拇指彼處人取其皮治瘡癬及疥癩甚效近處亦有但採其實作幹不聞入藥也地圖經曰出宣城及近京州郡北都今處處有之時生春生葉採八月九月取實用實色黃味甘微酸性寒緩氣氣薄味厚陰中之陽臭香主除熱嗽止煩渴制去皮核笮汁用治療圖經曰鵝梨除咳嗽熱風痰實紫花梨療心熱鹿梨根皮治瘡癬疥癩甚效梨葉主霍亂吐下煮汁服亦可作煎治風唐本注云梨削貼湯火瘡不爛止痛妊婦臨月食之易産消梨主客熱中風不語並傷寒發熱祛邪止驚咳嗽消渴亦利大小便日華子云梨消風療咳嗽氣喘熱狂又除賊風胸中熱結作漿吐風痰孟詵云梨止心煩又胸中痞塞熱結者可多食生梨即通卒暗風失音不語者生搗汁一合頓服之日再服止衍義曰病酒煩渴人食之甚佳別録云小兒寒疝腹痛大汗出濃煮梨葉汁七合頓服以意消息可作三四度飲之嚼梨汁敷蠼螋尿瘡黃水出干即易之合治梨一顆刺作五十孔每孔納川椒一粒以麵裹於熱火灰中煨令熟出停冷去椒食之療卒咳嗽或去核納酥蜜麵裹燒令熟食之搗汁一升合酥一兩蜜一兩地黃汁一升緩火煎細細含咽凡治嗽皆須待冷喘息定然後方食如熱食之反傷矣梨一顆搗絞取汁合黃連三枝碎之綿裹漬令色變仰臥注目中療卒患赤目胬肉坐臥痛梨三枚用水二升煮汁一升去滓合粳米一合煮粥食之療小兒心臟風熱昏懵躁悶不能食禁多食動脾氣金瘡及産婦不可食解丹石熱氣林檎無毒植生林檎不可多食令人發熱澀氣令人好睡發冷痰生瘡癤脈閉不行名醫所録名來禽花紅沙果苗圖經曰其樹似奈樹實比奈差圓六七月成熟亦有甘酢二種甘者早熟而味肥美酢者差晚須熟爛乃堪啖陳士良云此有三種大長者為奈圓而夏熟者為林檎小而味澀秋熟者為梣也地圖經曰舊不著取出州土今在處有之收生春生葉採六月七月取實用實質如奈而差圓色淡黃味酸甘性溫收氣氣厚味薄陽中之陰臭香主消渴下氣制笮取汁用治療日華子云下氣除霍亂肚痛消痰孟詵云止消渴別録云止谷痢泄精並水痢小兒痢東行根治白蟲蛔蟲消渴好睡合治為末合醋敷療小兒閃癖頭髮堅黃瘰癧羸瘦禁不可多食令人心中生冷痰李核仁無毒植生李核仁主僵仆躋瘀血骨痛根皮大寒主消渴止心煩逆奔氣實除痼熱調中名醫所録青李黃李房陵李駁赤李赤李緑李馬肝李朱仲李趙李麥李御李子南居李痤接慮李苗圖經曰木高丈餘至春敷葉如杏葉而尖開白花春末結實五六月成熟李之類甚多爾雅云休李之無實者一名趙李痤祖禾切接慮李即今之麥李也細實有溝道與麥同熟故名之駁赤李其子赤者是也又有青李緑李赤李房陵李朱仲李馬肝李黃李散見書傳美其味之可食陶隱居云皆不入藥用惟姑熟所出南居李解核如杏子者為佳今不復識此醫家但用核若杏子形者根皮亦入藥用衍義曰北地所産株大者高及丈今畿內小窯鎮一種最佳堪入貢又有御李子如櫻桃許紅黃色先諸李熟此李品甚多然天下皆有之地圖經曰舊不著所出州土今處處有之道地蜀州時生四月結實採五六月取收曝乾用仁花實及根皮質類杏仁而小色黃赤味苦性平泄氣味厚於氣陰中之陽主下水氣除腫滿制去殼取仁治療藥性論云仁除女子小腹腫滿並踒折骨疼肉傷利小腸下水氣除腫滿根皮治腳下氣主熱毒煩躁根煮汁止消渴日華子云根涼無毒主赤白痢濃煎服葉平無毒治小兒壯熱痁疾驚癇作浴湯孟詵云李實主女人卒赤白帶下或李樹東面皮去皺皮炙令黃香水煮汁去滓服亦驗生李實去骨節間勞熱牛李煮濃汁含之治𧈟齒脊骨有疳蟲可後灌此汁更空腹服一盞別録云肝病宜食補日華子云李益氣合治李核仁去皮細研合雞子白和如稀餳塗面上至曉以淡漿水洗之後塗胡粉療面皯黑子核仁和麵作餅子空腹食之少頃當瀉療鼓脹禁不可合雀肉同食及臨水上啖之令人發痰瘧多食令人虛熱和蜜食之損五臟合漿水吃令人霍亂澀氣楊梅無毒植生楊梅主去痰止嘔噦消食下酒干作屑臨飲酒時服方寸匕止吐酒名醫所録名聖生梅白蒂梅苗圖經曰樹若荔枝樹葉細陰青形似水楊其實生青熟紅紫肉在核上而無皮殼南人以蜜漬或淹藏可以寄遠誠果品中之珍味也今醫方鮮用地圖經曰生江南及嶺南山谷皆有之時生四月生採五月六月取實用實色生青熟紫味酸甘性溫緩氣氣厚味薄陽中之陰臭香主止渴消痰治療日華子云止嘔逆吐酒皮根煎湯洗惡瘡疥癬孟詵云和五臟滌腸胃除煩憒惡氣燒灰服亦能止痢陳藏器云止渴別録云去痰實合治用鹽藏楊梅合核杵之如泥成挺子以竹筒中收之治一切傷損止血生肌無瘢痕絶妙遇破處用少許填之此藥之功神驗禁多食令人發熱甚能損齒及筋忌生蔥胡桃無毒植生胡桃食之令人肥健潤肌黑髮取瓤燒令黑末斷煙和松脂研敷瘰癧瘡又和胡粉為泥拔白鬚發以納孔中其毛皆黑多食利小便能脫人眉動風故也去五痔外青皮染髭及帛皆黑樹皮止水痢可染褐仙方取青皮壓油和詹糖香塗毛髮色如漆其木春斫皮中出水承取沐頭至黑名醫所録苗圖經曰大株厚葉多陰實亦有房秋冬乃熟外有青皮包之胡桃乃核也核中穰為胡桃肉此果本出羌胡漢張騫使西域還始得其種植之秦中後漸生東土故曰陳倉胡桃薄皮多肌陰平胡桃大而皮脆擊之易碎江表亦嘗有之梁沈約集有謝賜樂遊園胡桃啓乃其事也今京東亦有其種而實不佳南方則無地圖經曰生陝洛及江表間亦多有之道地北土者佳時生四五月生採秋冬取實收曝乾用肉皮色肉白皮青味甘性平緩氣氣之薄者陽中之陰臭微香主潤肌黑髮制凡使去殼湯浸剝去肉上薄苦皮用治療日華子云潤肌肉益發孟詵云除風冷令人能食不得並漸漸食之通經脈潤血脈黑鬢髮又服法初一日一顆五日加一顆至二十顆止之常服骨肉細膩光潤能療一切痔別録云穰燒令黑杵如脂敷火燒瘡合治肉合破故紙搗篩蜜丸如梧桐子大朝服三十丸補下元肉搗和酒溫頓服療壓撲損傷肉和細米各等分煮粥頓服療石淋便中有石子肉一筒合炒橘核為末一錢匕溫酒調服以知為度療患酒齄風鼻上赤禁多食動痰飲及發風過夏至則不堪食解食酸齒齼初舉切細嚼此解之果之走獼猴桃無毒蔓生獼猴桃止暴渴解煩熱冷脾胃動泄澼壓丹石下石淋熱壅反胃者取汁和生薑汁服之枝葉殺蟲煮汁飼狗療瘑也名醫所録名藤梨木子獼猴梨苗圖經曰藤生著樹葉圓有毛實似雞卵大皮褐色經霜始甘美可食衍義曰十月爛熟色淡緑生則極酸子繁細其色如芥子枝條柔弱高二三丈多附木而生淺山傍道則有存者深山則多為猴所食皮亦堪作紙也地圖經曰生山谷衍義曰出永興軍南山甚多時生春生葉採十月取實用實質類雞卵色褐味酸甘性寒收氣氣薄味厚陰中之陽臭香主止消渴除煩熱制搗汁用治療陳藏器云除骨節風癱瘓不隨長年變白野雞內痔病調中下氣藤中汁至滑下石淋合治取汁合生薑汁服之主胃開候熟收之取穰和蜜作煎去煩熱亦能止消渴禁多食令人臟寒泄果之木海松子無毒植生海松子主骨節風頭眩去死肌變白散水氣潤五臟不飢名醫所録苗圖經曰如小栗三角其中仁香美東夷食之當果與中土松子不同海藥云食之甚甘美味與卑占國偏桃仁相似與雲南松子不同雲南松子似巴豆其味不厚多食發熱毒地圖經曰生新羅時生春採秋取收曝乾用仁質如小栗三角色白味甘性小溫緩氣氣厚於味陽也臭香主祛諸風溫腸胃制去皮取仁治療日華子云逐風痹寒氣補日華子云虛羸少氣補不足潤皮膚肥五臟海藥云久服輕身延年不老奈無毒植生奈多食令人臚音閭脹病人尤甚名醫所録苗謹按木高丈餘葉似梨葉二三月開紅白花四月結實漸大如林檎六七月成熟據陳士良云此有三種長大者為奈圓而夏熟者為林檎小而秋熟味澀者為梣也地陶隱居云江南乃有北國最豐時生春生葉採六月七月取實收曬乾用實質類林檎而長色紅黃味苦性寒泄氣氣薄味厚陰也臭香主益心氣和脾胃治療日華子云治飽食多肺壅氣脹孟詵云卒患食後氣不通生搗汁服之補孟詵云補中焦諸不足氣別録云耐飢禁多食令人脹庵羅果無毒植生庵羅果食之止渴動風氣名醫所録苗圖經曰樹若林檎而極大葉似茶葉衍義曰西洛甚多亦梨之類也其狀亦梨先諸梨熟七夕前後已堪啖色黃如鵝梨才熟便鬆軟入藥絶稀用地衍義曰西洛甚多時生春生葉採七夕前後取實用實葉質類鵝梨色黃味甘性溫緩氣氣之厚者陽也臭香主止渴生津治療別録云調婦人經脈不通丈夫營衛中血脈不行葉可作湯飲療渴疾補別録云久服令人不飢禁天行病後及飽食後俱不可食之又不可同大蒜辛物食令人患黃病橄欖無毒植生橄音敢欖音覽主消酒療鯸音侯鮐音怡毒人誤食此魚肝迷悶者可煮汁服之必解其木作楫撥著魚皆浮出故知物有相畏如此也核中仁研敷唇吻燥痛名醫所録苗圖經曰其樹似木槵子樹而高且端直可愛春敷葉二月開花秋晚結實其實長寸許形似生訶子無稜瓣南人尤重之咀嚼則滿口香久不歇山野中生者子繁而木峻不可梯緣但刻其木下方寸許納鹽於中一夕子皆落木亦無損蘇東坡詩云紛紛青子落紅鹽是也其枝節間有脂膏如桃膠南人採得並其皮葉煎之如黑餳謂之欖糖用膠船著水益干牢於膠漆雍州又有一種波斯橄欖色類相似但其核作三瓣可以蜜漬食之地圖經曰生嶺南交趾及雍州閩廣諸郡皆有之道地泉州時生春生葉採八月九月取實收曝乾用實核中仁質類生訶子而無稜瓣色青味酸甘性溫收氣氣厚味薄陽中之陰臭香主止渴消酒制去核用治療日華子云開胃下氣止瀉衍義曰嚼汁咽治魚鯁解諸毒及主鯢魚毒以汁服之此魚肝子毒人立死惟此木能解及誤食鯸鮐肝至迷悶者飲其汁立瘥榲桲無毒植生榲桲主溫中下氣消食除心間醋水去臭闢衣魚名醫所録苗圖經曰樹若林檎花白緑色有香其實似楂子而小但膚慢而多毛初熟時其氣氛馥人將致衣笥中亦香諸果中惟此多生蟲少有不蚛者地圖經曰生關陝今孟州皆有之道地沙苑出者更佳時生春生葉採秋取實收曝乾用實質類楂子而小色淡黃味酸甘性微溫緩氣氣厚味薄陽中之陰臭香主下氣消食制拭去上浮毛用治療圖經曰消胸膈中積食去醋水下氣止渴及主霍亂轉筋並煮汁飲之常食亦能去心間醋痰皮搗末敷瘡上黃水日華子云除煩渴治氣禁食之不去毛損人肺多食澀血脈榛子無毒叢生榛子主益氣力寬腸胃令人不飢健行名醫所録苗圖經曰樹高丈許子如小栗軍行食之當糧中土亦有鄭注禮云榛似栗而小關中鄜坊甚多桂陽一種莘音榛叢生實大如杏子中仁皮子形色與栗無異也但差小耳地圖經曰生遼東山谷及桂陽新羅關中鄜坊皆有之時生春採秋取實收曝乾用仁色殼褐肉白味甘性平緩氣氣厚於味陽中之陰臭香主和胃寬中制去皮殼治療日華子云止飢調中開胃龍眼無毒植生龍眼出神農本經主五臟邪氣安志厭食久服強魂聰明輕身不老通神明以上朱字神農本經除蟲去毒以上黑字名醫所録名益智苗圖經曰木高二丈許似荔枝而葉微小凌冬不凋春末夏初生細白花七月而實成殼青黃色形圓如彈丸核若無患子而不堅肉白有漿甚甘美其實極繁每枝常二三十枚荔枝才過龍眼即熟故南人目為荔枝奴一名益智以其味甘歸脾而能益智耳草部自有益智子非此物也地圖經曰生南海山谷今閩廣蜀道皆有之時生春末夏初開花採八月取實收曝乾用實質形圓如彈丸色殼青黃肉白味甘性平緩氣氣厚於味陽也臭香主益脾安志治療蜀本云除蟲毒去三蟲椰子皮無毒植生椰子皮止血療鼻衄吐逆霍亂煮汁服之殼中肉益氣去風漿主消渴塗頭益發令黑飲之得醉名醫所録苗圖經曰木如棕櫚亦似桄榔無枝條高數丈葉在木末如束蒲實大如瓠垂於枝間如挂物實外有粗皮如棕包次有殼圓而且堅里有膚至白如豬肪厚半寸許味似胡桃膚里有漿四五合如乳飲之冷而氛醺人多取殼為器南人取肉糖蜜漬之作果寄遠甚佳衍義曰椰子開之有汁如乳極甘香別是一種氣味中又有一塊瓤形如栝蔞上有細壠起亦白色但微虛紋若婦人裙褶其味亦如汁又著殼一重白肉削取之皆可與瓤糖煎為果汁色如白酒其味如瓤然謂之酒者好事者當日強名之取其殼為酒器如酒中有毒則酒沸起今人皆漆其里則全失用椰子之意也地圖經曰生安南今嶺南州郡亦有之海藥云南海安南時生春生採九月十月取收陰乾用皮根肉漿質類大腹皮而極大色黃白味苦性平泄氣味厚於氣陰中之陽臭朽主止血吐逆制日華子云炙銼碎用治療海藥云椰子漿止消渴吐血消水腫去風禁汁多食動氣棐實無毒植生棐音匪實主五痔去三蟲蠱毒鬼疰名醫所録苗唐本注云其樹大連抱高數仞葉似杉其木如柏作松理肌細軟堪為器用即爾雅所謂披杉也衍義曰棐實大如橄欖殼色紫褐而脆其中子有一重粗黑衣其仁黃白色嚼久味漸甘美也地圖經曰生永昌陶隱居云東陽諸郡亦有之時生春採秋取實收曝乾用仁質類橄欖色殼紫褐仁黃白味甘性平緩氣氣厚於味陽中之陰臭香主消宿食行營衛制去殼用治療陶隱居云除寸白蟲孟詵云多食令人不發病能食消穀補孟詵云助筋骨明目輕身禁衍義曰食之過多則滑腸香圓無毒植生香圓主下氣開胸膈皮去氣除心頭痰水名醫所録名枸櫞香櫞子苗圖經曰樹似橘而葉大其實狀如小瓜皮若橙而光澤可愛肉甚厚味雖短而香氛大勝於柑橘之類置衣笥中則數日香不歇今南方有之謂之香櫞子或將至都下人亦貴之地圖經曰生閩廣江西今南方多有之時生四月開花採九月十月取實收陰乾用實色皮黃肉白味辛酸性溫氣氣厚味薄陽中之陰臭香馬檳榔無毒植生馬檳榔主催生若難産臨死者用仁細嚼井花水送下須臾立出或産母兩手各握二枚而惡水自下名醫所録苗樹高一二丈葉似楝葉兩兩相對三月蕊生枝端開淡紅白花五出隨結實如連皮核桃而有三五稜瓣至秋漸大如梨熟則皮黑析之每瓣有子三四枚如龍眼核其仁甘美故北人當果食之地生北地道地雲南時生春生葉採八月九月取實收曝乾用實質狀如梨而有稜色皮黑仁白味苦甘性寒泄氣氣薄味厚陰中之陽臭香制去皮殼取仁用治療別録云生産繁者用二枚細嚼以井花水吞下其水味甜如蜜久服則子宮冷自然絶矣常食之亦不傷人平波無毒植生平波止渴生津出飲膳正要苗樹高一二丈葉如林檎葉而微圓三月開淡紅花六七月成實亦似林檎而大生青白熟淡紅色食之甚甘美及置篋笥中香氣可愛地出北地時生四月採六月七月取實收曝乾用實色白紅味甘性緩氣氣之薄者陽中之陰臭香八簷仁無毒植生八簷仁止咳下氣消心腹逆悶出飲膳正要苗樹高丈許枝葉花實與杏無異但實差小亦可啖之核中仁食之味甘美與榛子仁相似非若杏仁苦而有毒也地出回回田地今北地亦有之時生四月生採五月六月取實收曝乾用仁質類杏仁而圓小色皮褐仁白味甘性緩氣氣之薄者陽中之陰臭香制䕋去殼湯泡去皮用銀杏無毒植生銀杏炒食煮食皆可生食發病出飲膳正要名鴨腳白果苗謹按樹高五六丈徑三四尺葉似鴨腳五六月結實如李八九月熟則青黃色採之浸爛去皮取核為果亦名鴨腳梅聖俞詩云鴨腳類緑李其名因葉高是也地出宣域郡及江南皆有之時生五六月生採八月九月取實收曝乾用核中肉色殼白肉青黃味甘苦性緩泄氣味厚於氣陰中之陽臭腥制火煨去殼用治療煨熟食之止小便頻數合治葉為末和麵作餅煨熟食之止瀉痢禁生食有小毒發病株子無毒植生株子不可多食出飲膳正要苗謹按株子樹高三五尺枝葉類橘而小冬月不凋春復繁茂四月開小白花其實有三種小而圓者謂之金豆大如彈丸者謂之金橘鋭而長者謂之牛奶金柑即株子也生青熟黃人家庭院多植而玩之九月採食其清香經日不歇或蜜漬作湯果寄遠人貴重之稀入藥用地生南山川穀及江浙荊襄湖嶺皆有之時生四月開花採九月十月取實用實色生青熟黃味酸甘性平微寒氣氣薄味厚陰中之陽臭香必思答無毒植生必思答主調中順氣出飲膳正要苗謹按必思答即必思忒也出回回田中樹高一二丈葉如杏其實如桃李去肉取核仁作果食之今亦入貢焉收曬乾味甘性緩氣氣之薄者陽中之陰臭香棠球子無毒植生棠球子治疾痢及腰疼皆效又能消食行結氣健胃催瘡疹名醫所録名山查子海紅山裡果苗圖經曰樹高三五尺葉似杏葉而長三月開白花隨便結實如酸棗而差匾至八九月色赤山人採之以當果食今藥中多用之以其能消食而健脾也地圖經曰生滁州今處處有之時生春生採八九月取收曬乾用實色紅味甘主消食健胃四種陳藏器余君遷子味甘平無毒主止渴去煩熱令人潤澤生海南樹高丈餘子中有汁如乳汁吳都賦云平仲君遷海藥云謹按劉斯交州記云其實中有乳汁甜美香好微寒無毒主消渴煩熱鎮心久服耐老輕身亦得悅人顏色也韶子味甘溫無毒主暴痢心腹冷生嶺南子如栗皮肉核如荔枝廣志云韶葉似栗有刺斫皮內白脂如豬肪味甘酸亦云核如荔枝也探子味甘澀平無毒生食主水痢熟者和蜜食之去嗽子似梨生江南吳都賦云探榴御霜是也諸果有毒桃杏仁雙有毒五月食未成核果令人發癰節及寒熱又秋夏果落地為惡蟲緣食之令人患九漏桃花食之令人患淋李仁不可和雞子食之患內結不消
