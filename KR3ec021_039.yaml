body:
  text: 卷之三十八菜部上品菜之草冬葵子無毒植生冬葵子出神農本經主五臟六腑寒熱羸瘦五癃利小便久服堅骨長肌肉輕身延年以上朱字神農本經療婦人乳難內閉葵根味甘寒無毒主惡瘡療淋利小便葉為百菜主其心傷人以上黑字名醫所録苗詩豳風雲七月亨普庚反葵及菽葵菜也山陰陸氏云葵有紫白二種葵心隨日光所轉輒低覆其根爾雅云莖大葉小花紫紅色者可茹圖經曰其子是秋種葵覆養經冬至春作子者謂之冬葵子古方入藥用最多苗葉作菜茹更甘美其種早者俗呼為葵菜也地圖經曰生少室山今處處有之時生秋生採春取收曝乾用子及根葉質類蜀葵子而小色黑緑味甘性寒緩氣氣之薄者陽中之陰臭朽主利小便助黃芩為之使治療圖經曰葉作茹宣導積壅煮汁服之利小腸孕婦臨産煮葉食之則胎滑易産燒灰及干搗末敷金瘡根治惡瘡及小兒誤吞錢煮汁服之立出藥性論云子治五淋奶腫下乳汁葉單煮汁服治時行黃病孟詵云女人産時困悶以子一合水二鍾煮取半鍾去滓頓服之少時便産衍義曰子治患癰癤毒熱腫內攻未出膿者水吞三五枚遂作竅膿出孫真人云葵能充脾氣別録云生葵菜葉絞汁散小兒發斑惡毒氣少少與服之葵根五大斤切以水五升煮取三升平旦飲一服止消渴利及口吻瘡掘經年葵根燒灰敷之亦治小兒蓐瘡妊娠卒下血葵子一升水五鍾煮取二鍾分三服瘥亦治妊娠患淋並大便不通葵菜治諸瘻瘡先以泔清溫洗以綿拭水微火暖貼瘡上引膿不過三二百葉膿盡即肉生忌諸雜魚蒜房事等補日華子云冬葵久服堅筋骨合治根燒灰和豬脂塗疳瘡生身面上汁黃者煮葵菜葉合蒜齏啖之治天行斑瘡須臾遍身皆戴白漿惡毒氣者葵莖及子為末合酒服方寸匕治妒乳乳癰葵子為末合酒服方寸匕治兒死腹中若口噤不開格舉也口灌之藥下即活葵子二升水四升煮取一升納豬脂如雞子大一丸治卒關格大小便不通脹滿欲死者葵子炒令黃搗末合酒服二錢匕治倒生手足冷口噤禁葵菜若患天行病後食之頓喪明熱食之令人熱悶甚動風氣無蒜勿食四季月食生葵令飲食不消化發宿疾霜葵生食動五種留飲多食吐水亦不可合鯉魚食能害人解服丹石毒以葵菜吃一頓佳冬月葵菹汁解服丹石人發舌乾咳嗽每食後飲一盞便臥少時瘥根解蜀椒毒莧實無毒植生莧實出神農本經主青盲白翳明目除邪利大小便去寒熱久服益氣力不飢輕身以上朱字神農本經殺蛔蟲以上黑字名醫所録名人莧莫實細莧糖莧紫莧豬莧胡莧赤莧花莧白莧柀五色莧苗圖經曰莧實即人莧子也經云細莧亦同其葉如藍是也按莧有六種有人莧白莧紫莧馬莧五色莧馬莧即馬齒莧也自見後條入藥者惟人白二莧亦謂之粳莧胡莧細莧其實一也有細莧俗謂之野莧豬好食之又名豬莧但人莧小而白莧大耳其子霜後方熟實細而黑紫莧莖葉通紫赤莧亦謂之花莧莖葉深赤爾雅所謂柀赤莧也根莖亦可糟藏食之甘美五色莧今亦稀用地圖經曰生淮陽川澤及田中今處處有之時生春生苗採十一月取實收曬乾用實色青味甘性寒氣氣之薄者陽中之陰臭朽主明目利小便治療圖經曰子主翳目黑花肝風客熱紫莧主氣痢又取搗汁飲一升滓以水和塗瘡上赤莧主血痢及射工毒中人令寒熱發瘡偏在一處有異於常者連莖葉搗汁飲一升瘥豬莧主衆蛇螫人唐本注云赤葉莧主射工沙蝨毒日華子云莧菜通九竅孟詵云莧除熱補日華子云莧子益精孟詵云莧補氣合治五月五日採莧菜和馬齒莧等分為末服之治妊娠易産禁不可與鱉同食生鱉症以鱉細銼和莧於近水濕處置於土穴內上以土蓋之一宿盡成鱉也胡荽微毒附子叢生胡荽消穀治五臟補不足利大小腸通小腹氣拔四肢熱止頭痛療沙疹豌豆瘡不出作酒噴之立出通心竅子主小兒禿瘡油煎敷之亦主蠱五痔及食肉中毒下血煮冷取汁服名醫所録名香荽芫荽苗謹按胡荽即今芫荽也布子熟地生苗葉似芹而圓小嫩時食之其味香美至春暮開白花結實如防風子其莖經冬不萎焚之亦可以闢穢也地圖經曰出並州今處處有之時生春秋皆蒔採夏收子五月五日取別録云春夏取葉秋冬取莖根收陰乾用莖葉及子色青緑味辛性溫氣氣之厚者陽也臭香主補益筋脈消穀能食制子炒用治療陳藏器云子治蟲毒五野雞病食療云胡荽利五臟別録云小兒赤丹不止搗汁敷之瘥脫肛細切一升燒煙燻即入齒痛以子五升水五升煮取一升含之根治熱氣經滯經年數發以五月五日採半斤陰乾水七升煮取一升半去滓分服未瘥更服春夏用葉秋冬用莖根補食療云益筋脈合治子合醋煮尉腸頭出甚效合生菜食治腸風熱餅裹食甚良胡荽二三兩切合酒二大盞煎令沸沃胡荽便以物合定不令泄氣候冷去滓治小兒疹痘欲令速出者微微從頂以下噴遍身除面不噴根絞汁半斤合酒服之立下蠱毒神驗禁胡荽久食令人多忘損精神發腋臭及𧈟齒口氣臭患金瘡者不可食食之疾更加久冷人食之腳弱根發痼疾解食諸毒肉吐下血不止頓蔞黃者取淨胡荽子一升煮令腹破取汁停冷服半升一日一夜二服即止邪蒿無毒植生邪蒿主胸膈中臭爛惡邪氣利腸胃通血脈續不足氣作羹食良名醫所録名山花群蒿苗謹按邪蒿春生苗葉其莖微方高一二尺節間敷葉葉似青蒿而細軟至夏繁茂開黃白細花作穗秋末莖葉凋殘嫩時人亦採作羹食之地出山野及園圃中皆有之時生春苗採無時收陰乾用莖葉色青緑味辛性溫平氣氣之厚者陽中之陰臭腥香主利腸胃通血脈合治煮令熟和醬醋食之治五臟邪氣厭谷者及腸澼大渴熱中暴疾惡瘡禁不可與胡荽同食令人汗臭氣茼蒿無毒叢生茼蒿主安心氣養脾胃消水飲名醫所録名蓬蒿苗謹按茼蒿不限時月播子於畦至旬日而苗葉漸生及月遂繁茂開碎黃花作莢而生細子其葉似蓬又謂蓬蒿人取其嫩者以作菜茹或入菜食之更香美然治療之功則未可據地人家園圃皆種之時生無時採無時收陰乾用莖葉色青緑味辛性平散氣氣厚味薄陽中之陰臭香禁不可多食動風氣燻人心令人氣滿菜之走胡瓜葉小毒附根實有毒蔓生胡瓜葉主小兒閃癖一歲服一葉以上斟酌與之生挼絞汁服得吐下根搗敷胡刺毒腫實味甘寒有毒不可多食動寒熱多瘧病積瘀熱發疰氣令人虛熱上逆少氣發百病及瘡疥損陰血脈氣髮腳氣天行後不可食小兒切忌滑中生疳蟲不與醋同食名醫所録名黃瓜苗謹按胡瓜即今之黃瓜也圃人二月布子於地三月生苗移植漸茂蔓延垣籬而開黃花葉青黃色皆有微刺其葉稍大於甜瓜葉結實圓徑一二寸長尺許北人呼為黃瓜為石勒諱因而不改然有青皮者亦有白皮者人以為蔬而生啖之別無功用食之亦不益人一種秋間生者質頗相同俗呼為秋黃瓜也地處處有之時生春苗採夏秋取收陰乾用葉及根實色青白味苦性平泄氣味厚於氣陰也臭腥治療孫真人云蛇咬取胡瓜敷之數易良合治胡瓜一個破作兩片不出子以醋煮一半水煮一半俱爛空心頓服治水病肚脹至四肢腫服後須臾下水菜之草石胡荽無毒植生石胡荽通鼻氣利九竅吐風痰不任食亦去翳熟挼納鼻中翳自落名醫所録名鵝不食草苗謹按石胡荽春生苗葉莖圓而中空折之有白汁節間生葉青緑色其花細白至夏作叢而開子葉與胡荽無異此草鵝皆不食故名鵝不食草人採入藥欲辨之必以飼鵝鵝不食者為真鵝誤食之則死也地生田野及水岸間皆有之時生春生苗採秋取收陰乾用莖葉色青緑味辛性寒氣氣之薄者陽中之陰臭香蕪菁無毒叢生蕪菁主利五臟輕身益氣子主明目名醫所録名蔓荊薞蕪葑蓯葑芥大芥蘴蕘苔子諸葛菜風蓯須苗圖經曰蕪菁即蔓荊也梗短葉大連地上生闊葉紅花四時仍有春食苗夏食心亦謂之苔子秋冬食根亦可以備飢歲菜中之最有益者惟是此耳諸葛亮所止令兵士獨種蔓荊者取其才出甲可生啖一也葉舒可煮食二也久居則隨以滋長三也棄不令惜四也回即易尋而採之五也冬有根可斸竹足切食六也比諸蔬屬其利不亦博乎今三蜀江陵呼蔓荊為諸葛菜是也地圖經曰舊出河朔今處處有之時生春苗四時不凋採春苗夏葉秋冬取根用苗葉根子質類菘菜色青味苦性溫泄氣味厚於氣陰中之陽臭腥主通中益氣制子九蒸九曝治療圖經曰實久服可以辟穀除發黃利小腸並治青盲唐本注云子治癥瘕積聚水煮二升取濃汁服止霍亂心腹脹取汁少飲治目暗為末服陳藏器云蕪菁消黃疸及急黃內黃腹結不通搗為末水絞汁服當得嚏鼻中出黃水及下痢子為油入面膏令人去黑皯孟詵云蔓荊消食下氣子壓油塗頭能變蒜髮又研入面脂極去皺又搗水和服除熱黃結實不通少頃當瀉一切惡物沙石草發並出食療云根止消渴並熱毒風腫別録云子治陰黃汗染衣涕唾黃者搗末平旦以井花水服一匙日再加至兩匙以知為度色漸退白則瘥不過服五升愈及瘭疽著手足肩背纍纍如米起色白刮之水出復發熱以蕪菁子熟搗帛裹敷之即止妊娠小便不利為末水服方寸匕蕪菁常食之通中益氣令人肥健根治豌豆瘡搗汁挑瘡破敷之食頃根出及男子陰腫如斗大核痛以根搗敷之虛勞眼暗三月採蔓荊花陰乾為末以井花水每空心調下二錢匕久服長生可夜讀書蔓荊汁治犬咬傷服之佳又立春後庚子日以蕪菁汁合家大小並溫服不限多少可除時疾補圖經曰子九蒸九曝搗為粉服之長生蕭炳云子入丸藥用令人肥健尤宜婦人合治蕪菁和油敷蜘蛛咬恐毒入肉亦搗末合酒服根生搗和鹽醋漿水煮汁洗女子妒乳腫洗五六度瘥又搗和雞子白封之妙根葉淨擇去土不用水洗以鹽搗敷乳癰痛寒熱者敷上熱即換不過三五易之瘥冬月無葉即用根宜避風根大者削去皮熟搗合苦酒和如泥煮三沸急攪之出敷卒起腫毒急痛以帛裹上日三易之蔓荊子六升一物蒸之看氣遍合甑下以釜中熱湯淋之曝乾還淋如是三遍即杵篩為末食後清酒服二寸匕治青盲瞳子不壞者十得九愈蔓荊子三兩為末每合溫酒服一錢匕治風疹入腹身體強舌乾燥硬合酢和敷禿瘡蕪菁子三升以苦酒三升煮令熟曬乾為末以井花水服方寸匕加至三匕常服明目洞視腸肥禁根多食令人氣脹滿解面毒菜之走白冬瓜無毒蔓生白冬瓜主除小腹水脹利小便止渴名醫所録苗圖經曰蔓生布地莖葉有毛開黃花實生蔓下大者如斗而更長皮厚初生有毛青緑色但經霜則白如敷粉故謂之白冬瓜也人以藏蓄作菜入藥須霜後採者為佳地圖經曰生嵩高平澤今處處有之時生春生苗採八九月取用肉色皮青肉白味甘性微寒氣氣之薄者陽中之陰臭腥主消熱毒止煩悶治療圖經曰肉止三消渴疾及積熱利大小腸陶隱居云止煩悶搗汁服之藥性論云練汁能止煩燥熱及利小腸除消渴並五淋日華子云冬瓜除煩胸膈熱消熱毒癰腫切摩痱子甚良葉殺蟲詩云莫豫荓蜂自求辛螫亦可修事蜂兒荓腫毒及蜂可藤燒灰可出繡點黯洗黑皯並洗瘡疥濕瓤亦可漱練白縑孟詵云冬瓜除胸心滿悶頭面熱者食之佳衍義曰冬瓜治發背及一切癰疽削一大塊置瘡上熱則易之瓜當爛截去更合之分散熱毒甚良別録云小兒渴利單搗瓜汁飲之及傷寒後痢日久津液枯竭四肢浮腫口乾冬瓜一枚黃土泥厚裹五寸煨令爛熱去土絞汁服之及治水病初得危急冬瓜不限多少任吃神效小兒一月至五個月乍寒乍熱炮冬瓜絞汁服治渴不止補孟詵云益氣耐老禁患冷者食之瘦人九月勿食被霜瓜食之令人成反胃病解壓丹石毒並魚中毒飲瓜汁最驗白瓜子無毒蔓生白瓜子出神農本經主令人悅澤好顏色益氣不飢久服輕身耐老以上朱字神農本經除煩滿不樂久服寒中可作面脂令面悅澤以上黑字名醫所録名水芝白側絞切苗謹按白瓜子即前條冬瓜子也冬瓜皮雖青經霜亦白其中子則方正潔白比次整齊非他子形色之可比故謂之白瓜子歲時記云七月採犀以為脂者此也唐本作甘瓜者由其甘白字畫所誤考之別録有可作面脂之説正與本經相符此實冬瓜子明矣時生春生苗採八九月取收曝乾色白味甘性平寒氣氣之薄者陽中之陰制圖經曰洗淨擂取仁用治療圖經曰仁擂作面藥洗燥皴日華子云去皮膚風及黑皯潤肌膚合治瓜子熬作末合酒服治多年損傷不瘥瓜子七升絹袋盛絞沸湯中三遍以酢五升漬一宿曝乾搗篩合酒服方寸匕日三服治男子五勞七傷明目延年不老及去皮搗為丸空腹服三十丸令人白淨如玉甜瓜有毒蔓生甜瓜止渴除煩熱多食令人陰下濕癢生瘡動宿冷病發虛熱破腹又令人惙惙弱腳手無力少食即止渴利小便通三焦間壅塞氣兼主口鼻瘡葉治人無發搗汁塗之即生名醫所録苗謹按甜瓜二月布種三月生苗作蔓布地與諸瓜相似五月開黃花花下結實有青白二種至秋熟則黃色下條瓜蒂即此青瓜蒂也地圖經曰生嵩高平澤今處處園圃中皆蒔之時生春生苗採七月取實用瓜及葉色生青熟黃味甘性寒氣氣之薄者陽中之陰臭香治療唐本注云甘瓜子除腹內結聚破潰膿血最為腸胃脾內壅之要藥陳藏器云子止月經太過去油為末水調服別録云瓜去皮食後啖之止熱除煩渴煮皮作羹亦佳補食療云子熟補中益氣宜人葉補中合治葉碾末合酒服治打撲損折去瘀血及小兒疳子作末合蜜為丸如棗核大每旦淨漱含一丸治口臭亦可敷齒禁患腳氣人食甜瓜其患永不除又五月甜瓜沉水及兩蒂者並殺人多食發黃疸病動冷疾令人虛羸亦動痼疾多食下利消損陽氣解諸藥力及食瓜飽脹者入水自消或食鹽即化成水瓜蒂有毒蔓生瓜蒂出神農本經主大水身面四肢浮腫下水殺蠱毒咳逆上氣及食諸果病在胸腹中皆吐下之以上朱字神農本經去鼻中息肉療黃疸花主心痛咳逆以上黑字名醫所録苗圖經曰瓜蒂即甜瓜蒂也瓜有青白二種入藥當以青者為勝凡吐劑以此為聖藥也故今之治風癇喉風痰涎暴塞之證多以此合赤小豆輩服之蓋取其味酸苦相搏為湧泄之義耳正合內經所謂邪在上者因而越之也地圖經曰生蒿高平澤今處處園圃中蒔之時生春生苗採七月七日取收去瓜皮用蒂約半寸許陰乾用蒂及花色青緑味苦性寒氣氣薄味厚陰也臭香主吐膈散中制銼碎研細用治療日華子云治腦塞熱齆眼昏吐痰別録云時氣三日外忽覺心滿堅硬腳手心熱變黃以瓜蒂七枚杵末以大豆許吹兩鼻中令黃水出余末水調服得吐黃水一二升瘥瓜丁治黃疸目黃不除為細末以大豆許納鼻中令病人深吸取鼻中黃水出合治瓜蒂及莖合小豆丁香吹鼻治鼻中息肉齆鼻並黃陳瓜蒂一分為末合羊脂少許和敷鼻中息肉瓜蒂四十九個六月六日收者丁香四十九個用坩堝子燒煙盡為度細研為末每用一字吹鼻內治遍身黃如金色小兒用半字吹鼻內及揩牙瓜蒂二小合熬赤小豆二合為末暖漿水五合服方寸匕治急黃心上堅硬渴欲得水吃氣息喘粗眼黃飲之當吐不吐再服五分匕亦減之若吹鼻中兩三黑豆許黃水出歇瓜蒂為細末量疾每用一二錢匕合膩粉一錢匕以水半合同調勻灌之治風涎暴作氣塞倒臥服之良久涎自出或覺有涎用諸藥行化不下或服藥良久涎未出者含沙糖一塊下咽涎即出此物甚不損人全勝石碌硇砂輩禁胃弱及病後産後勿輕用諸亡血諸虛家亦不可用解過服吐不止以麝香末少許水調服之即止越瓜無毒蔓生越瓜主利腸胃止煩渴不可多食動氣發諸瘡令人虛弱不能行不益小兒天行病後不可食又不得與牛乳酪及鮓同餐及空心食令人心痛名醫所録苗謹按越瓜二月布種三月生苗蔓延於地五月開淡黃花葉青大有微刺葉下結實如甜瓜正圓而色白因生於越地故名越瓜也地出杭越今處處有之時生春苗採夏取用肉質類甜瓜而白色白味甘性寒氣氣之薄者陽中之陰臭香主利小便去煩熱治療陳藏器云宣泄熱氣合治小者糟藏之為灰敷口吻瘡及陰莖熱瘡越瓜和飯作鮓並菹久食益腸胃禁小兒夏月不可食冷中常令人臍下為症痛不止及天行病後不可食解酒毒菜之草芥無毒叢生芥歸鼻主除腎邪氣利九竅明耳目安中久食溫中名醫所録名青芥南芥花芥紫芥旋芥石芥苗圖經曰芥似菘而有毛味極辛辣此即青芥也芥之種亦多有紫芥莖葉純紫多作齏食之最美又有南芥旋芥花芥石芥之類皆菜茹之美者非藥品所須不復悉録唐本注云葉大粗者葉堪食子入藥用尉惡疰至良葉小子細者葉不堪食其子但堪作齏也地圖經曰處處有之道地蜀州時生春種採夏收子收曝乾用莖葉及子質似菘而有毛子類菟絲子色青紫實紫味辛性溫散氣氣之厚者陽也臭腥治療日華子云芥除邪氣止咳嗽及冷氣疾食療云治咳逆下氣明目去頭風別録云馬芥子治小兒緊唇搗汁令先揩唇血出敷之日七遍馬芥即刺芥也合治子搗為末合醋和塗射工毒及疰氣發無常處合醋研敷風毒腫及麻痹合生薑研暖塗貼撲損瘀血腰痛腎冷合酒醋服止心痛合雞子白調敷走疰風毒疼痛子一升醋三升煎取一升治婦人中風口噤舌本縮敷頷頰下立效搗碎合人乳調和綿裹塞耳內治聾搗碎合水及蜜和滓敷喉上下干即易之治瘻有五種不過此方禁芥煮食之動氣生食之發丹石葉不可多食細葉有毛者殺人忌與兔肉同食生惡瘡白芥無毒附子叢生白芥主冷氣子主射工及疰氣上氣發汗胸膈痰冷麵黃名醫所録苗圖經曰芥類頗多此亦是一種也莖葉雖白與諸芥相似但其子獨粗大甚辛色白如粱米入藥惟以此種最佳也其葉作茹甚美地圖經曰生河東今處處亦有道地西戎太原為佳時生春生苗採夏取實收曝乾用實質似菘而有毛實類菟絲子色白味辛性溫氣氣之厚者陽也臭腥主冷氣安五臟子主脅下痰癖治療日華子云白芥安五臟子燒之及服可辟邪魅合治子一升搗碎以絹袋盛好酒二升浸七日空心溫服三合日二服治氣曬乾為末合酒服方寸匕治反胃吐食上氣杵令熟合苦酒厚敷三種射工毒半日痛即止為末合豬膽和如泥敷遊腫諸癰日三易效合苦酒煮治中風卒不語敷頸一周以帛包之一日夕瘥炒熟勿令焦細研以湯浸蒸餅丸如赤小豆大合生薑湯吞七丸治肚腹冷夜起甚效萊蔔根無毒附子叢生萊蔔音卜根散服及炮煮服食大下氣消穀去痰癖肥健人生搗汁服主消渴試大有驗名醫所録名蘿蔔雹葖蘆蔔溫菘葖蘆萉苗圖經曰有大小二種大者肉堅宜蒸食之小者白而脆宜生啖也謹按萊蔔即蘿蔔也六月初伏內布子於熟地苗葉漸長尺余似白菘菜莖半圓而微赤莖葉俱有細毛至秋深其根堅實小者如拳大者如碗圃人欲留其作種故不採其根也北地九月則採之藏於窖中至春復種於地仍生苗葉三月開紫白花四月作莢其實如馬藺子圓匾而赤洪州信陽亦有甚大者重五六斤或近一稱又有一種小者初春播種之即生苗葉根白脆長甘而少辛隨可生食夏末開花時不中食之俗呼為水蘿蔔是也地圖經曰出河北秦晉甚多登萊者最佳今處處有之時生夏生苗採秋取根用根子質類蕪菁而大色白味辛甘性溫散氣氣之厚者陽也主消飲食下滯氣治療圖經曰根治飲食過多飽脹宜生嚼之子水研服吐風涎甚效唐本注云葉消食和中日華子云根消痰止咳及治肺痿吐血蕭炳云根消食利關節理顏色滌五臟惡氣孟詵云利五臟別録云治偏頭風用生蘿蔔汁一蜆殼仰臥注之鼻中左痛注左右痛注右左右俱注亦得神效積年上氣咳嗽多痰喘促唾膿血以子一合研煎湯食上服之補日華子云蘿蔔溫中補不足孟詵云食之令人肌細白淨合治蘿蔔合羊肉鯽魚煮食之治勞瘦咳嗽子合醋研消腫毒出了子蘿蔔三枚淨洗薄切曬乾為末每服二錢合煎豬肉汁澄清調下治消渴食後並夜臥日三服謂之獨勝散子半斤淘洗焙乾於銚子內炒令黃熟為末以沙糖丸如彈綿裹含之治肺痿咳嗽禁服地黃何首烏人勿食蘿蔔若同食之則令人髭發易白乃損血故也解蘿蔔解面毒菘菜無毒叢生菘音嵩主通利腸胃除胸中煩解酒渴名醫所録名白菜苗圖經曰其苗與蕪菁相類梗長葉不光者為蕪菁梗短葉闊厚而肥痹者為菘舊説菘不生北土人有將子北土種之初一年半為蕪菁二年菘種都絶南人種蕪菁亦然其有數種牛肚菘葉最大厚味甘紫菘葉薄細味小苦揚州一種葉圓而大若箑重有一二十斤生啖之脆美無渣絶勝他土者此謂之白菘也衍義曰張仲景傷寒論凡用甘草皆禁菘菜者是此菘菜也葉如蕪菁緑色差淡其味微苦而嫩稍闊耳地圖經曰舊不載所出州土今南北皆有之道地揚州者為勝時生春生苗採夏秋取用莖葉實質類蕪菁色淡緑味甘性溫氣氣之厚者陽也臭腥治療蕭炳云消食下氣祛瘴氣止熱嗽冬取汁飲為佳陳士良云紫花菘行風氣去邪熱食療云菘止消渴冬月作菹煮作羹食之別録云作羹啜之通利腸胃除胸中煩熱及治小兒赤遊行於上下至心即死杵菘菜敷之治發背杵地菘汁一升日再服瘥治酒醉不醒用菘子二合細研井花水一盞調為二服合治菘菜和粟米酒服方寸匕闢瘟病禁服藥有甘草者勿食菘菜令病不除多食動氣發病不益人又發諸風冷虛人勿食食之覺冷忌北人居南方不伏地土遂病足忌食菘菜解殺魚腥解酒渴多食過度惟生薑能制其毒苦菜無毒植生苦菜出神農本經主五臟邪氣厭於協切伏也谷胃痹久服安心益氣聰察少臥輕身耐老以上朱字神農本經腸澼渴熱中疾惡瘡耐飢寒豪氣不老以上黑字名醫所録名荼草遊冬堇荼選苗衍義曰苦菜葉似苦苣而狹緑色差淡折之有白汁出常常點瘊子自落花與野菊相似春夏秋皆旋開花四方皆有在北道則冬方凋斃生南方則冬夏常青此月令小滿節後所謂苦菜秀者是也又有一種苦𧄹味苦寒有小毒搗葉敷小兒閃癖煮汁服去暴熱目黃祕塞然其葉極似龍葵但龍葵子無殼苦𧄹子有殼如皮辨子圓如珠人亦呼為小苦耽也地圖經曰生益州川穀山陵道旁道地蜀川時生春苗採三月三日收陰乾用莖葉質葉類苦苣而狹色青味苦性寒泄氣味厚於氣陰也臭腥主除腸澼去邪氣治療衍義曰花去中熱安心神菜之木荏子無毒附葉子植生荏子主咳逆下氣溫中補體葉性溫主調中去臭氣名醫所録名䔡苗陶隱居云荏狀如蘇高大白色不甚香其子研之雜米作糜甚肥美下氣補益東人呼為䔡音魚以其似蘇字但除禾邊故也笮其子作油用煎之即今油帛及和漆所用者服食斷谷亦用之名為重油唐本注云荏葉人常生食其子故不及蘇也江東以荏子為油北土以大麻為油此二油俱堪油物若以和漆荏者為強爾蕭炳云又有大荏形似野荏高大葉大小荏一倍不堪食人收其子以充油絹帛與大麻子同其小荏子欲熟人採其角食甚香美大荏葉不堪食也地唐本注云出江東今北地多産之時生春生苗採九月取收陰乾用子及葉質類蘇高大而白色色白味辛性溫氣氣之厚者陽也臭微香治療唐本注云葉搗敷蟲咬及男子陰腫日華子云葉調氣潤心肺長肌膚消宿食止上氣咳嗽去狐臭敷蛇咬子下氣止嗽食療云子止咳逆下氣生食止渴潤肺補日華子云子補中益氣通血脈填精髓可蒸令熟烈日曝乾當口開舂取米食之亦可休糧合治子研之合雜米作糜食之甚肥美能下氣補益葉生搗和醋封男子陰腫女人綿裹納之三四易瘥葉爛杵合豬脂和薄敷虺中人禁子壓作油少破氣多食發心悶黃蜀葵無毒植生黃蜀葵花治小便淋及催生又主諸惡瘡膿水久不瘥者作末敷之即愈名醫所録苗圖經曰春生苗漸高丈許莖葉微有毛與蜀葵頗相似但其葉尖狹而多刻缺夏末開花淡黃色其實作匯長寸余有四五瓣上鋭下圓亦微有毛衍義曰此與蜀葵別種非為蜀葵中黃者也葉心下有紫檀色摘之剔為數處就曬乾之不爾即浥爛今瘡家用之為要藥也地圖經曰處處有之時生春生苗採六七月取收陰乾用花色黃臭香制花為細末子研爛用治療圖經曰花治瘡癰乾末水調塗之立愈子治淋澀又令婦人易産衍義曰花曬乾為末浥爛瘡子臨産時取四十九粒研爛用溫水調服即産別録云子催産焙乾為末井華水下三錢匕如無子以根細切煎汁令濃滑待冷服之菜之草紅蜀葵無毒植生蜀葵久食鈍人性靈根及莖並主客熱利小便散膿血惡汁葉燒為末敷金瘡煮食主丹石發熱結搗碎敷火瘡葉炙煮與小兒食治熱毒下痢及大人丹痢搗汁服亦可恐腹痛即暖飲之花冷無毒治小兒風疹子冷無毒治淋澀通小腸催生落胎療水腫治一切瘡疥並瘢疵赤靨白花療痎瘧去邪氣陰乾末食之名醫所録名錦葵戎葵苗圖經曰葵有數種有蜀葵爾雅所謂菺古田切戎葵者是也郭璞云似葵華如槿華戎蜀蓋其所自出因以名之也謹按蜀葵皆自宿根而生也春初發苗漸長莖幹高及丈許微有白毛葉圓而尖至五六月開花有深紅淺紅者亦有單瓣夾瓣者俱著花於莖間自下而上次第開放直至梢端葉乃始焦其子遂成子熟墮地即出嫩苗比與宿根者終不繁茂又有一種錦葵開紫白花甚小亦結細子其種蒔及莖葉最相類但低矮差小為異功用更強葵雖有五色而治療功能各隨其色而主之抑按左傳曰鮑莊子之知不及葵葵猶能衛其足今葵心隨日光所轉輒低覆其根似知孔子曰禾生垂穗向根不忘本也蓋禾之向根仁也葵之衛足知也仁所以守之知所以揆之故葵曰揆也地圖經曰出戎蜀今處處有之時生春苗夏花採秋取收陰乾用花根莖葉子色紅味甘性寒氣氣之薄者陽中之陰臭腥治療衍義曰單葉葵根治帶下排膿血惡物別録云蜀葵治癰毒無頭杵末敷之合治葵花末合酒服方寸匕治橫生倒産白葵花一兩陰乾為末空心合溫酒服二錢匕治婦人白帶下臍腹冷痛面色萎黃日漸虛困如赤帶用赤者為驗禁患狗咬瘡者食之不得瘥又能鈍人情性龍葵無毒附子叢生龍葵食之解勞少睡去虛熱腫子療疔腫名醫所録名苦葵苗圖經曰龍葵北人謂之苦葵葉圓似排風而無毛花白實若牛李子生青熟黑亦似排風子但堪煮食不任生啖其實赤者名赤珠服之變白令黑其根亦入藥用地圖經曰出北方今所在有之時生春生採無時收曬乾用莖子根味苦性寒氣味厚於氣陰也治療別録云龍葵治癰腫無頭搗敷之補藥性論云龍葵明目輕身子變白令黑耐老合治根一兩搗羅為末合麝香一分研令勻塗發背癰疽成膿者龍葵合土杵敷疔腫及火丹瘡禁不可與蔥薤同食苦耽小毒植生苦耽苗子主傳尸伏連鬼氣疰忤邪氣腹內熱結目黃不下食大小便澀骨熱咳嗽多睡勞乏嘔逆痰壅痃癖痞滿小兒無辜癧子寒熱大腹殺蟲落胎去蠱毒並煮汁服亦生搗絞汁服亦研敷小兒閃癖名醫所録名洛神珠王母珠皮辨草苗圖經曰苗高二三尺實作包如撮口袋中有子如珠生青熟赤關中謂之洛神珠又謂之王母珠一名皮辨草又有一種小者名苦𧄹也按衍義云此與酸漿同種今復出於此蓋其性味不同及治療有別而然也地圖經曰生故墟垣塹間今在處有之時生春生苗採三月取苗秋取實收陰乾用苗實味苦性寒泄氣味厚於氣陰也制煮汁或生搗用苦苣叢生苦苣除面目及舌下黃強力不睡折取莖中白汁敷疔腫出根又取汁滴癰上立潰碎莖葉敷蛇咬根主赤白痢及骨蒸並煮服之今人種為菜生食之久食輕身少睡調十二經脈利五臟霍亂後胃氣逆煩生搗汁飲之雖冷甚益人不可同血食一本作蜜食發痔疾名醫所録名扁苣白苣苗本經云苦苣即野苣也春生苗葉青緑色其莖折之有白汁堪作菜茹亦可生食又有野生者名扁苣今人家常食為白苣江外嶺南吳人無白苣嘗植野苣以供廚饌也地舊不著所出州土今山郭處皆有之時生春生苗採夏取莖葉秋取根收陰乾用莖葉及根味苦性平泄一云寒氣味厚於氣陰也臭腥制為末或生搗汁用治療衍義曰搗汁敷疔瘡殊驗青苗陰乾以備冬月為末水調敷苜蓿無毒叢生苜蓿主安中利人可久食名醫所録苗陶隱居云長安中乃有苜蓿園北人甚重之江南人不甚食以其無味故也外國別有苜蓿草以療目疾蓋非此類衍義曰唐李白詩云天馬常銜苜蓿花是此陝西甚多以飼牛馬嫩時人亦食之微甘淡不可多食利人大小腸有宿根刈訖又生其根酷似黃耆故土人採之以亂黃耆也時生春生苗採夏秋取收陰乾用莖葉及根色緑味苦性平泄氣味厚於氣陰中之陽臭腥治療唐本注云莖葉根治熱病煩滿目黃赤小便黃酒疸搗汁服一升令人吐利即愈日華子云去腹臟邪氣脾胃間熱氣通小腸孟詵云患疸黃人取根生搗絞汁服之良又利五臟洗去脾胃間邪氣及諸惡熱毒補孟詵云能輕身健人合治和醋作羹食之安中利五臟禁不宜多食多則冷氣入筋瘦人又利大小腸薺無毒散生薺主利肝氣和中實主明目目痛名醫所録苗謹按薺春生最先以諸菜似菠菜小而著地散生葉有鋸齒而青緑有毛其根色白二月抽苔高尺許莖有小葉三月開細白花結三尖莢子四月成實其葉霜後則微赤而經冬不凋也地處處有之時生春生新葉採四月八日取實收陰乾用子及根葉質類菠菜而小色青緑味甘性溫氣氣之厚者陽也臭香主散風毒消瘴翳治療藥性論云子治目青盲不見物根葉燒灰能治赤白痢極效日華子云薺菜利五臟根治目痛孟詵云子治眼疾別録云根汁治暴赤眼疼痛磣澀點目中效補藥性論云五臟不足禁患氣人食其子動冷疾及不可與面同食令人背悶服丹石人亦不可食之羅勒微毒叢生羅勒調中消食去惡氣消水氣宜生食又療齒根爛瘡為灰用甚良不可過多食壅關節澀營衛令血脈不行又動風發氣患啘取汁服半合定冬月用乾者煮之子主目翳及物入目三五顆致目中少頃當濕脹與物俱出又療風赤眵淚根主小兒黃爛瘡燒灰敷之佳名醫所録名蘭香王母菜苗陶隱居云術家取羊角馬蹄燒作灰撒於濕地遍踏之即生羅勒俗呼為王母菜食之益人此有三種一種堪作生菜一種葉大二十步內聞香一種似紫蘇葉也地舊不著所出州土今近處皆有之時生無時採無時收陰乾用莖葉實根味辛性溫散氣氣之厚者陽也臭香合治合木蘭香一斤以三歲米醋浸令沒百日出曝乾為末敷面上滅瘢合醋醬漬百日出曬乾末服方寸匕一種陳藏器余蕨葉似老蕨根如紫草按蕨味甘寒滑去暴熱利水道令人睡弱陽小兒食之腳弱不行生山間人作茹食之四皓食之而壽夷齊食蕨而夭固非良物搜神記云郗鑑鎮丹徒二月出獵有甲士折一枝食之覺心中淡淡成疾後吐一小蛇懸屋前漸幹成蕨遂明此物不可生食之也食療寒補五臟不足氣壅經絡筋骨間毒氣令人腳弱不能行消陽事令眼暗鼻中塞發落不可食又冷氣人食之多腹脹毛詩陟彼南山言採其蕨又曰言採其薇是蕨薇俱可食伯夷叔齊采薇而食恐蕨非薇也今永康道江居民多以醋淹而食之
