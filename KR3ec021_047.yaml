body:
  text: 續集卷之三谷豆部玉蜀黍無毒玉蜀黍主調中開胃根葉主小便淋瀝沙石痛不可忍煎湯頻飲本草綱目名玉高粱地李時珍曰玉蜀黍種出西土種者亦罕苗苗高三四尺如秕麥狀苗心別出一苞如棕魚形苞上出白鬚垂垂久則苞摺子出顆顆攢簇子亦大如稷子可䒽炒食之炒折白花如炒折糯谷之狀時六七月開花成穗質如秕麥狀其苗葉俱似蜀黍而肥矮亦似薏苡味甘性平穇子無毒穇子主補中益氣厚腸胃濟飢救荒本草名龍爪粟鴨爪粟李時珍曰穇乃不黏之稱也又不實之貌也龍爪鴨爪象其穗岐之形地周憲王曰穇子生水田中及下濕地苗葉似稻但差短稍頭結穗倣佛稗子穗其子如黍粒大茶褐色搗米煮粥炊飯磨面皆宜李時珍曰穇子山東河南亦種苗如茭黍有三稜如水中爊草之莖開細花簇簇結穗如粟穗而分數岐如鷹爪之狀內有細子有黍粒而細其稃甚薄其味粗澀時五月種之八九月抽莖色赤色味甘性澀稗無毒稗米主作飯食益氣宜脾故曹植有芳菰精稗之稱苗根主金瘡及傷損血出不已搗敷或研末摻之即止甚驗本草綱目名李時珍曰稗乃禾之卑賤者也故字從卑地李時珍曰稗處處野生最能亂苗苗莖葉穗粒並如黍稷一斗可得米三升故曰五穀不熟不如稊稗稊苗似稗而穗如粟有紫毛即烏禾也爾雅謂之草辛掬陶弘景曰稗子亦可食又有烏禾生野中如稗荒年可代糧而殺蟲煮以沃地螻蟻皆死陳藏器曰稗有二種一種黃白色一種紫黑色紫黑者似蟲忽有毛北人呼為烏禾周憲王曰稗有水稗旱稗水稗生田中苗葉似穇子色深緑根下葉帶紫色稍頭出扁穗結子如黍粒茶褐色味微苦性溫磨麵食之皆宜味辛甘苦穎曰辛脆性微寒菰米無毒菰米主止渴本草拾遺解煩熱調腸胃本草綱目名茭米雕蓬雕苽雕胡地蘇頌曰菰生水中李時珍曰菰本作菰茭草也其中生菌如瓜形可食故謂之菰其米須霜雕時採之故謂之雕苽或訛為雕胡枚乘七發謂之安胡爾雅齧雕蓬薦黍蓬也孫炎注云雕蓬即茭米古人以為五飯之一者鄭樵通志云雕蓬即米茭可作飯食故謂之齧其黍逢即茭之不結實者惟堪作薦故謂之薦楊慎卮言云蓬有水陸二種雕蓬乃水蓬雕苽是也黍蓬乃旱蓬青科是也青科結實如黍羌人食之今松州有焉李時珍按鄭楊二說不同然皆有理蓋蓬類非一種故也苗葉如蒲葦其苗有莖梗者謂菰蔣草至秋結實乃雕胡米也古人以為美饌今飢歲人猶採以當糧陶弘景曰菰米一名雕胡可作餅食陳藏器曰雕胡是菰蔣草米古人所貴故內則云魚宜苽皆水物也曹子建七啓云芳菰精稗謂二草之實可以為飯也葛洪西京雜記云漢太液池邊皆是雕胡紫籜緑節蒲叢之類蓋菰之有米者長安人謂之雕胡菰之有首者謂之緑節葭蘆之未解葉者謂之紫籜也寇宗奭曰菰蔣草如葦結青子細若青麻黃長几寸野人收之合粟為粥食之甚濟飢也李時珍曰雕胡開花如葦芴結實長尺許大如茅針其米甚白而滑膩作飯香脆杜甫詩波漂菰米沉云黑者即此周禮供御乃六穀九穀之數管子書謂之鷹膳故收米入此其茭筍菰根別見菜部時九月抽莖霜後採之色皮黑褐色米白臭香味甘性冷阿芙蓉微毒阿芙蓉主瀉痢脫肛不止能澀丈夫精氣本草綱目名阿李時珍曰俗作鴉片名義未詳或云阿片音稱訛也以其花色似芙蓉而得此名苗李時珍曰阿芙蓉前代罕聞近方有用者云是罌粟花之津液也罌粟結青苞時午後以大針刺其外面青皮勿損裡面硬皮或三五處次早津出以竹刀刮收入瓷器陰乾用之故今市者猶有苞片在內王氏醫林集要言是天方國種紅罌粟不令水淹頭七八月花謝後刺青皮取之者按此花五月實枯安得七八月後尚有青皮或方土不同乎治李時珍曰俗人房中術用之京師售一粒金丹云通治百病皆方技家之術耳一粒金丹真阿芙蓉一分粳米飯搗作三丸每服一丸未效再進一丸不可多服忌醋令人腸斷風癱熱酒下口眼喎斜羌活湯下百節痛獨活湯下正頭風羌活湯下偏頭風川芎湯下眩暈防風湯下陰毒豆淋酒下瘧疾桃柳枝湯下痰喘葶藶湯下久嗽乾薑阿膠湯下勞嗽款冬花湯下吐瀉藿香湯下赤痢黃連湯下白痢薑湯下噤口痢白朮湯下諸氣痛木香酒下熱痛梔子湯下臍下痛燈心湯下小腸氣川楝茴香湯下血氣痛乳香湯下脅痛熱酒下噎食生薑丁香湯下女人血崩五靈脂湯下小兒慢脾風砂仁湯下久痢阿芙蓉小豆許空心溫水化下日一服忌蔥蒜漿水若渴飲蜜水解之一方罌粟花未開時外有兩片青葉包之花開即落收取為末每米飲服一錢神效赤痢用紅花者白痢用白花者味酸澀性溫合治赤白痢下鴉片木香黃連白朮各一分研末飯丸小豆大壯者一分老幼半分空心米飲下忌酸物生冷油膩茶酒面無不止者口渴略飲米湯蠶豆無毒蠶豆主快胃和臟腑苗主酒醉不醒油鹽炒熟煮湯灌之效本草綱目名胡豆李時珍曰豆莢狀如老蠶故名王禎農書謂其蠶時始熟故名亦通吳瑞本草以此為豌豆誤矣此豆種亦自西胡來雖與豌豆同名同時種而形性迥別太平御覽云張騫使外國得胡豆種歸指此也今蜀人呼此為胡豆而豌豆不復名胡豆矣地李時珍曰蠶豆南土種之蜀中尤多收其子以備荒歉苗方莖中空葉狀如匙頭本圓末尖面緑背白柔厚一枝三葉花如蛾狀又如豇豆花結角連綴如大豆頗似蠶形時八月下種冬生嫩苗二月開花紫白色四月始熟味甘微辛性平合治李時珍曰蠶豆本草失載萬表積善堂方言一女子誤吞針入腹諸醫不能治一人教令煮蠶豆同韭菜食之針自大便同出此亦可驗其性之利臟腑也刀豆無毒刀豆主溫中下氣利腸胃止厄逆益腎補元本草綱目名挾劍豆李時珍曰以莢形命名也按段成式酉陽雜俎云樂浪有挾劍豆莢生橫斜如人挾劍即此豆也苗汪穎曰刀豆長尺許可入醬用李時珍曰刀豆人多種之三月下種蔓生引一二丈葉如豇豆葉而稍長大五六七月開紫花如蛾形結莢長者近尺微似皂莢扁而劍脊三稜宛然嫩時煮食醬食蜜煎皆佳老則收子其形如拇指頭淡紅色同豬肉雞肉煮食甚美味甘性平治李時珍曰刀豆本草失載惟近時小書載其暖而補元陽也又有人病後厄逆不止聲聞鄰家或令取刀豆子燒存性白湯調服二錢即止此亦取其下氣歸元而逆自止也造釀部豆黃無毒豆黃主濕痹膝痛五臟不足胃氣結積壯氣力潤肌膚益顏色填骨髓補虛損能食肥健人以煉豬脂和丸每服百丸神驗祕方也肥人勿服出延年祕録生嚼塗陰癢汗出本草綱目制李時珍曰造法用黑豆一斗蒸熟鋪席上以蒿覆之如𨠭法待上黃取出曬乾搗末收用味甘性溫禁忌豬肉治打擊青腫大豆黃為末水和塗之合治脾弱不食餌此當食大豆黃二升大麻子三升熬香為末每服一合飲下日四五服任意青精乾石䭀飯無毒青精乾石䭀飯主日進一合不飢益顏色堅筋骨能行本草拾遺益腸胃補髓滅三蟲久服變白卻老圖經出太極真人法言名烏飯蘇頌曰按陶隱居登真隱訣載太極真人青精乾石䭀飯法䭀音信䭀之為言飧也謂以酒蜜藥草輩溲而曝之也亦作迅凡內外諸書並無此字推施於此飯之名耳陳藏器本草名烏飯色青黑制蘇頌曰登真隱訣載南燭草木名狀注見本部本條下其作飯法以生白粳米一斛五斗舂治折取一斛二斗用南燭木葉五斤燥者三斤亦可雜莖皮煮取汁極令清冷以溲米米釋炊之從四月至八月末用新生葉色皆草辛人九月至三月用宿葉色皆淺可隨時進退其斤兩又採軟枝莖皮於石臼中搗碎假令四五月中作可用十許斤熟舂以斛三斗湯浸染得一斛也此來只以水浸一二宿不必用湯漉而炊之初米正作紅色蒸過便如紺色若色不好亦可淘去更以新汁漬之酒𮑮皆用此汁惟令飯作正青色乃止高格曝乾當三蒸曝每蒸輒以葉汁溲令浥浥每日可服二斤勿復血食填胃補髓消滅三蟲上元寶經云子服草木之王氣與神通子食青燭之津命不復殞此之謂也今茅山道士亦作此飯或以寄遠重蒸過食之甚香甘也陳藏器曰烏飯法取南燭莖葉搗碎漬汁浸粳米九浸九蒸九曝米粒緊小黑如醫珠袋盛可以適遠方也李時珍曰此飯乃仙家服食之法而今之釋家多於四月八日造之以供佛耳造者又入柿葉白楊葉數十枚以助色或又加生鐵一塊者止知其上色不知乃服食家所忌也味甘性平粽無毒粽主五月五日取粽尖和截瘧藥良本草綱目名角黍李時珍曰粽俗作粽古人以菰蘆葉裹黍米煮成尖角如棕櫚葉心之形故曰粽曰角黍近世多用糯米矣今俗五月五日以為節物相饋送或言為祭屈原作此投江以飼蛟龍也味甘性溫寒具無毒寒具主利大小便潤腸溫中益氣本草綱目名捻頭環餅饊李時珍曰寒具冬春可留數月及寒食禁烟用之故名寒具捻頭捻其頭也環餅象環釧形也饊易消散也服虔通俗文謂之餲張楫廣雅謂之麩𥹷楚辭謂之粔籹雜字解詁謂之膏環按鄭玄注周禮云寒具米食也錢乙方中有捻頭散葛洪肘後有捻頭湯醫書不載賈思協要術云環餅一名寒具以水溲入牛乳脂和作之入口即碎林洪清供云寒具捻頭也以糯粉和麵麻油煎成以糖食之可留月餘宜禁烟用觀此則寒具即今饊子也以糯粉和麵入少鹽牽索紐捻成環釧之形油煎食之劉禹錫寒具詩云纖手搓成玉數尋碧油煎出嫩黃深夜來春睡經輕重壓匾佳人纏臂金味甘鹹性溫合治錢氏捻頭散治小兒小便不通用延胡索苦楝子等分為末每服半錢或一錢以捻頭湯食前調下如無捻頭滴油數點代之血痢不止地榆曬研為末每服二錢摻在羊血上炙熱食之以捻頭煎湯送下或以地榆煮汁熬如飴狀一服三合捻頭湯化下蒸餅無毒蒸餅主消食養脾胃溫中化滯益氣和血止汗利三焦通水道本草綱目名李時珍曰按劉熙釋名云餅者並也溲麵使令並也有蒸餅湯胡餅索餅酥餅之屬皆隨形命名也味甘性平制李時珍曰小麥面修治食品甚多惟蒸餅其來最古是酵糟發成單面所造丸藥所須且能治疾而本草不載亦一缺也惟臘月及寒食日蒸之至皮裂去皮懸之風乾臨時以水浸脹搗爛濾過和脾胃及三焦藥甚易消化且面已過性不助濕熱其以果菜油膩諸物為餡者不堪入藥治療崩中下血陳年蒸餅燒存性米飲服三錢盜汗自汗每夜臥時帶飢吃蒸餅一枚不過數日即止一切折傷寒食蒸餅為末每服二錢酒下甚驗湯火傷灼饅頭餅燒存性研末油調塗敷之合治李時珍曰按愛竹談藪云宋寧宗為郡王時病淋日夜凡三百起國醫罔措或舉孫琳治之琳用蒸餅大蒜淡豆豉三物搗丸令以溫水下三十丸曰今日進三服病當減三之一明日亦然三日病除已而果然賜以千緡或問其說琳曰小兒何緣有淋只是水道不利三物皆能通利故爾若琳者其可語醫矣積年下血寒食蒸餅烏龍尾各一兩皂角七挺去皮酥炙為末煉蜜丸米飲每服二十丸下痢赤白營衛氣虛風邪襲入腸胃之間便痢赤白臍腹㽲痛裡急後重煩渴脹滿不進飲食用干蒸餅蜜拌炒二兩御米殼蜜炒四兩為末煉蜜丸芡子大每服一丸水一盞煎化熱服米秕無毒米秕主通腸開胃下氣磨積塊作糗食不飢充滑膚體可以頤養汪穎名米秕糠李時珍曰秕亦紕薄之義也質食物本草米秕即精米上細糠也昔陳平食糠核而肥也李時珍曰糠諸粟谷之殼也其近米之細者為米秕味極甜儉年人多以豆屑或草木花實可食者和劑蒸煮以救飢云味甘性平
