body:
  text: 卷之二玉石部上品之下石之土禹餘糧無毒土石生禹餘糧出神農本經主咳逆寒熱煩滿下赤白血閉癥瘕大熱煉餌服之不飢輕身延年以上朱字神農本經療小腹痛結煩疼以上黑字名醫所録名白餘糧地圖經曰生東海池澤及山島中或池澤中今惟澤潞州有之多出東陽山岸間茅山甚有好者狀如鵝鴨卵外有殼重疊中有末如蒲黃又若牛黃重重甲錯其佳處乃紫色泯泯如面齧之而無磣也陶隱居云平澤中有一種藤苗似菝葜根形如薯蕷者禹山行乏食採此以充糧而棄其所餘耳張華博物志云扶海洲上有草焉名蒒草其實食之如大麥從七月稔熟民斂至冬乃訖名自然谷亦曰禹餘糧今藥中有禹餘糧者世傳昔禹治水棄其所餘食於江中而為藥也然則蒒草與此異物而同名也其云棄之江中而為藥乃與生海池澤者同種乎時採無時收瓷器盛之用石內細末色黃白味甘性平寒緩氣氣之薄者陽中之陰臭朽主咳逆煩滿助牡丹為使制雷公云凡修事四兩先用黑豆五合黃精五合水二斗煮取五升置於瓷堝中下禹餘糧著火煮旋添汁盡為度其藥氣自然香如新米搗了又研一萬杵方用治療藥性論云止崩漏日華子云治邪氣及骨節疼四肢不仁痔瘻等疾補日華子云久服耐寒暑合治合赤石脂各一斤並碎之以水六升煮取二升去滓分二服治傷寒下利不止心下痞硬音硬或作靳利在下焦者禹餘糧一枚狀如酸餡者入地埋一半四面緊築用炭一稱發頂火一斤鍛以火三分耗二為度用濕砂土罨一宿取出打去外面一重細研水淘澄五七度將紙襯干再研數千遍用甘草煎湯服二錢匕治産後煩燥醋淬細研合乾薑末等分空心酒服二錢治白帶醋淬細研一兩合乾薑末五錢空心酒服二錢治赤帶太一餘糧無毒土石生太一餘糧出神農本經主咳逆上氣癥瘕血閉漏下除邪氣久服耐寒暑不飢輕身飛行千里神仙以上朱字神農本經肢節不利大飽絶力身重以上黑字名醫所録名石腦禹哀地圖經曰生泰山山谷蘇恭云此與禹餘糧但以精粗為別其精者為太一也其殼若瓷方圓不定初在殼中未凝結者猶是黃水名石中黃子久凝乃有數色或青或白或赤或黃年多變赤因赤漸紫惟赤及紫者俱名太一其餘通謂之禹餘糧也今醫家用之亦不能如此分別陳藏器云太一者道之宗源太者大也一者道也大道之師即禹之理化神君禹之師也師常服之故有太一之名蘇恭直以紫赤精粗為名都無按據雷公云太一禹餘糧看即如石輕敲便碎如粉兼重重如葉子雌黃也謹按諸說禹餘糧太一餘糧之源固有所自以至理論之未無疵也蓋嘗藥命名肇自神農二種之名皆神農朱書所載一云禹餘糧為大禹食余而名一云太一為理化神君常食而名殊未可信且禹後神農而出安得未生而預有其名乎理化先禹而生焉有先師而取弟之名乎如丁公藤劉寄奴何首烏之類一時感遇因人致名好事者遂以此例之若蘇恭以為禹余太一之異者但精粗之分耳此說似為得之時採無時或九月取用石殼中末色赤紫味甘性平緩氣氣之薄者陽中之陰臭朽主癥瘕血閉助杜仲為之使反畏貝母菖蒲鐵落制與禹餘糧同治療圖經曰定六腑鎮五臟補雷公云益脾安臟氣贋石中黃並卵石黃此二石真似禹餘糧也其石中黃向里赤黑黃味淡微跙卵石黃味酸個個如卵內有子一塊不堪用也若誤餌之令人腸干石之石白石英無毒附青黃赤黑石英石生白石英出神農本經主消渴陰痿不足咳逆胸膈間久寒益氣除風濕痹久服輕身長年以上朱字神農本經療肺痿下氣利小便補五臟通日月光耐寒熱以上黑字名醫所録地圖經曰生華陰山谷及泰山陶隱居以新安出者佳蘇恭以澤州者為勝大抵明徹有光精白無瑕如指長二三寸六面如削者可用長五六寸者彌佳其黃端白稜名黃石英赤端名赤石英青端名青石英黑端名黑石英古人服食惟白石英為重余色者方家不甚見用惟紫石英下品以具之矣蓋英乃精英之義況六英之貴者惟白石英也唐本注云所在皆有今虢州洛州山中俱出大徑三四寸長五六寸通以澤州者為勝也衍義曰紫白二石英當攻疾可暫煮汁用未聞久服之益張仲景只令㕮咀不為細末用者豈無意也其欲久服者更宜詳審時採無時亦云二月取用透明方潔者佳質類白玉而方稜瑩徹色白味甘辛性微溫氣氣厚於味陽中之陰臭朽主鎮心安魂魄反惡馬目毒公制銼如麻豆大或研如粉用治療藥性論云除肺癰吐膿嗽逆上氣黃疸日華子云五色石英去心腹邪氣女人心腹痛及胃中冷氣主驚悸安魂定魄下乳補日華子云益毛髮悅顏色壯陽道其補益隨臟色而治青者治肝赤者治心黃者治脾胃白者治肺黑者治腎合治取十兩捶如大豆許以瓷瓶盛用好酒二斗浸以泥重封瓶口將馬糞及糠火煨之常令酒小沸從卯至午次日暖三鍾飲日三度如飲酒少隨性飲之治腹堅脹滿白石英可更一度燒用合硃砂各一兩同研如散每服半錢夜臥煎金銀湯調下治心臟不安驚悸善忘上膈風熱化痰安神紫石英無毒石生紫石英出神農本經主心腹咳逆邪氣補不足女子風寒在子宮絶孕十年無子久服溫中輕身延年以上朱字神農本經療上氣心腹痛寒熱邪氣結氣補心氣不足定驚悸安魂魄填下焦止消渴除胃中久寒散癰腫令人悅澤以上黑字名醫所録地圖經曰生泰山山谷今嶺南及會稽山中亦有之欲令如削紫色達頭如樗蒱者陶隱居云泰山石色重徹下有根者最佳會稽石形色如石榴子者最下昔時並雜用今丸散家採擇惟用泰山最勝余處者可作丸酒餌又按嶺表録異云隴州山中多紫石英其色淡紫瑩徹隨其大小皆五稜兩頭如箭鏃者水飲之暖而無毒比北中白石英其力倍矣隱居又云今第一用泰山石色重徹下有根次出雹零山亦好又有南城石無根又有青綿石色赤重黑不明徹又有林邑石腹裡別有一物如眼吳興石四面才有紫色無光澤者次之時採無時用瑩徹者佳色紫味甘辛性溫平緩氣氣厚於味陽中之陰臭朽主安心神養肺氣助長石為之使反畏扁青附子惡鮀甲黃連麥句姜制生用打碎如米豆大入丸散火鍛醋淬七遍研細水飛用治療圖經曰鎮心療婦人諸疾藥性論云治驚癇蝕膿虛而驚悸不安補藥性論云女人服之有子主養肺氣別録云輕身充飢合治用醋淬搗為末合生姜米醋煎敷之摩亦得治癰腫毒瘥以五兩打碎如米豆大水淘一遍以水一斗煮二升去滓細細服或煮粥羹食亦得服盡更煎之補虛勞止驚悸令人能食合白石英寒水石石膏乾薑大黃龍齒牡蠣甘草滑石各等分㕮咀以水一升煎三分去滓食後溫呷治風熱瘛瘲及驚癇效石之土五色石脂無毒土石生五色石脂主黃疸泄痢腸澼膿血陰蝕下血赤白邪氣癰腫疽痔惡瘡頭瘍疥瘙久服補髓益氣肥健不飢輕身延年五石脂各隨五色補五臟神農本經圖經曰五色石脂舊經同一條並生南山之陽山谷中主治並同後人各分之所出既殊功用亦別用之當依後條然今惟用赤白二種余不復識也青石脂無毒土石生青石脂主養肝膽氣明目療黃疸泄痢腸澼女子帶下百病及疽痔惡瘡久服補髓益氣不飢延年名醫所録名青符地圖經曰生齊區山及海崖山谷中時採無時用色理鮮膩者佳質類滑石而酥軟色青味酸性平收氣味厚於氣陰中之陽臭朽主養肝氣除煩熱制火鍛通赤放冷研細水飛用赤石脂無毒土石生赤石脂主養心氣明目益精療腹痛泄澼下痢赤白小便利及癰疽瘡痔女子崩中漏下産難胞衣不出久服補髓好顏色益智不飢輕身延年名醫所録名赤符地圖經曰出濟南射陽及泰山之陰蘇恭云濟南泰山不聞出者惟虢州盧氏縣澤州陵川縣慈州呂鄉縣並有及宜州諸山亦出今出潞州以色理鮮膩者為勝時生無時採無時用紋理細膩者佳質類滑石而酥軟色赤味甘酸辛性大溫緩氣氣之厚者陽也臭朽主養心氣固腸胃反畏黃芩芫花惡大黃松脂制鍛過用生用亦可治補藥性論云補五臟虛乏合治取一斤搗篩合酒飲服方寸匕任加至三匕服盡一斤能補五臟則終身不吐痰水又不下痢令人肥健其源蓋飲冷過度遂令脾胃氣羸飲食入胃不消皆成冷水反吐不停也取一斤一半全用一半末用乾薑一兩粳米半升水七升煮之米熟為度去滓飲七合內石脂末一方寸匕服日三治傷寒下痢不止便膿血者合烏頭一分附子二分並炮赤石脂乾薑蜀椒各四分同為末蜜丸桐子大食前服一丸治心痛徹背者合乾薑各一兩胡椒半兩為末醋糊丸桐子大空心米飲下五七十丸治大腸寒滑小便精出末合粥飲調服半錢治小兒疳瀉加京芎等分同服妙黃石脂無毒土石生黃石脂主養脾氣安五臟調中大人小兒泄痢腸癖下膿血去白蟲除黃疸癰疽蟲久服輕身延年名醫所録名黃符地圖經曰生嵩高山色如鶯雛吳氏謂之黃符如豚腦雁雛者今潞州亦有之然醫家所用惟赤白二種也時生無時採無時用紋理膩綴唇者為上質類滑石而酥軟色黃味苦性平泄氣味厚於氣陰中之陽臭朽主養脾氣固腸胃助曾青為之使反畏蜚蠊黃連甘草惡細辛制凡使須研如粉以新汲水投器中攪不住手飛過三度澄者去之取飛過者入藥用禁不得食卵味白石脂無毒土石生白石脂主養肺氣厚腸補骨髓療五臟驚悸不足心下煩止腹痛下水小腸澼熱溏便膿血女子崩中漏下赤白沃排癰疽瘡痔久服安心不飢輕身長年名醫所録名白符地圖經曰生泰山之陰蘇恭云出慈州諸山泰山左側不聞有之今惟潞州有焉潞與慈相近此亦應可用古斷下方多用之今醫家亦多用也唐本注云出杭州餘杭山今不採而蘇州今乃見貢然入藥不甚佳惟延州山中所出最良揭兩石中取之延州每以蕃寇圍城若無水乃撅地深廣三五丈以石脂蜜固貯水得經時久不滲漏宜以此為良時採無時用紋理細膩者佳質類滑石而酥軟色白味甘酸性緩收氣氣之薄者陽中之陰主固腸胃排瘡瘍助燕屎為之使反畏黃芩黃連甘草飛廉惡松脂馬目毒公治療圖經曰小兒臍中汁出不止兼赤腫以石脂末熬溫撲臍中日三良藥性論云澀大腸衍義曰初生未滿月小兒多啼叫致臍中血出以石脂末貼之即愈未愈微炒過放冷再貼仍不得剝揭合治合乾薑等分搗以百遍沸湯和麵為糊溲勻丸如梧桐子大曝乾米飲下三十丸治瀉痢久痢不止更加三十丸研半兩如粉和白粥空肚服之治小兒水痢形羸不勝湯藥者瘥黑石脂無毒土石生黑石脂主養腎氣強陰主陰蝕瘡止腸澼泄痢療口瘡咽痛久服益氣不飢延年名醫所録名石涅黑符石墨地圖經曰出穎川陽城吳氏云生洛西山空地陶隱居云五石脂如本經療體亦相似別録各條所以具載今醫家惟用赤白二脂餘三色脂而無正用惟黑石脂乃可畫用今用亦稀也時採無時用紋理膩綴唇者為佳質類滑石而酥軟色黑味咸性平軟氣味厚於氣陰中之陽臭朽主益腎氣固腸胃反畏黃芩大黃制雷公云凡使須研如粉用新汲水投於器中攪不住手飛過三度澄者去之取飛過者用治療唐本注云治下痢白青無毒石生白青出神農本經主明目利九竅耳聾心下邪氣令人吐殺諸毒三蟲久服通神明輕身延年不老以上朱字神農本經可消為銅劍闢五兵以上黑字名醫所録地圖經曰生豫章山谷唐本注曰其白青似空青圓如鐵珠色白而腹不空者是也研之色白如碧亦謂之碧青不入畫用無空青時亦用之名魚目青以形似魚目故也今出簡州梓州者好時採無時用白如碧者為好質類空青而腹不空色白碧味甘酸鹹性平緩氣味厚氣薄陰中之陽臭朽主通九竅殺諸蟲制先搗羅更以水飛極細候乾再研用緑青無毒石生緑青主益氣療鼽音求鼻止泄痢名醫所録名石緑地圖經曰舊不著所出州土但云生山之陰穴中空青條云生益州山谷及越嶲山有銅處此物當是生其山之陰耳今出韶州信州其色青白即畫工用畫緑色者極有大塊其中青白花紋可愛信州人用琢為腰帶環及婦人服飾其入藥者當用顆塊如乳香不挾石者時生無時採無時用顆塊不挾石者佳色緑味酸性寒氣味厚於氣陰也臭朽主益氣止痢制圖經曰先搗羅更用水飛過乃再研至細用治療圖經曰吐風痰合治取二三錢匕同龍腦三四豆許研勻以生薄荷汁合溫酒調服治風痰眩悶使偃臥須臾涎自口角流出乃愈扁青無毒石生扁音褊青出神農本經主目痛明目折跌音迭癰腫金瘡不瘳音抽破積聚解毒氣利精神久服輕身不老以上朱字神農本經去寒熱風痹及丈夫莖中百病益精以上黑字名醫所録地圖經曰生朱崖山谷武都朱音殊提音時唐本注云出朱崖巴南及林邑扶南舶上來者形塊大如拳其色又青腹中時或有空者武昌出片塊者其色更佳簡州梓州者形扁作片而色淺也謹按蘇恭云扁青即緑青唐本注云緑青即扁青二論乃為一種也其緑青形塊如拳而色緑扁青形扁作片而色淺前人擬質命名必有所自況其性味治證各有不同難以為一物也明矣時採無時用片塊而色青者為好色青味甘性平緩氣氣薄味厚陰中之陽臭朽主消瘡腫養精神制先搗下篩更用水飛過至細乃再研治療別録云治丈夫內絶令人有子石之水石中黃子無毒石生石中黃子久服輕身延年不老名醫所録地圖經曰本經不載所生州土云出禹餘糧處有之今惟出河中府中條山谷內舊說是餘糧殼中未成餘糧黃濁水今云其石形如面劑紫黑色石皮內黃色者謂之中黃據此兩說小異今按抱朴子雲石子中黃所在有之近水之山尤多在大石中其石常潤濕不燥打石石有數十重見之赤黃溶溶如雞子之在殼得者即當飲之不爾便堅凝如石不中服也破一石中多者有一升少者數合法當正及未堅時飲之其堅凝亦可末服也若然舊說是初破取者今所用是久而堅凝者爾陶雲芝品中有石中黃子非也衍義曰石中黃子此子字誤也子當作水況當條自言未成餘糧黃濁水焉得卻名之子也若言未乾者亦不得謂之子也子字乃水字無疑矣時生無時採無時用石中黃濁水色黃味甘性平緩氣氣之薄者陽中之陰臭朽制研細用石之土無名異無毒石生無名異主金瘡折傷內損止痛生肌肉名醫所録地圖經曰出大食國生於石上狀如黑石炭蕃人以油煉如黳石嚼之如餳今廣州山石中及宜州南八里龍濟山中亦有之其色黑褐大者如彈丸小者如黑石子也時生無時採無時用如黳石者佳質類墨石而成碎顆色黑褐味甘性平緩氣氣之薄者陽中之陰臭朽主續骨長肉治療圖經曰消腫毒癰疣石之石菩薩石無毒石生菩薩石解藥毒蠱毒及金石藥發動作癰疽渴疾消撲損瘀血止熱狂驚癇通月經解風腫除淋並水磨服蛇蟲蜂蠍狼犬毒箭等所傷並末敷之良名醫所録地衍義曰出峨嵋山中如水精明徹日中照出五色如佛之圓光因以明之今醫家鮮用別録云嘉州峨嵋山有菩薩石人多采得其色瑩白若泰山狼牙石上饒州水晶之類日光射之有五色如佛頂圓光也時生無時採無時用明徹者佳質類水晶而有光色白味淡性平寒氣氣之薄者陽中之陰臭朽主解諸毒敷瘡瘍石之土婆娑石無毒石生婆娑石主解一切藥毒瘴疫熱悶頭痛名醫所録名摩娑石地圖經曰生南海胡人尤珍貴之無斑點有金星磨成乳汁者為上以金裝飾作指彄帶之每欲食及食罷輒含吮數四以防毒今人有得指面許塊則價值甚重又有豆斑石雖亦解毒功力不及復有鄂緑有文理磨鐵成銅色人多以此為之非真凡欲驗真者以水磨點雞冠熱血當化成水是也時生無時採無時質類石緑而有金星色緑味淡性平氣氣之薄者陽中之陰臭朽解一切藥毒石之石爐甘石無毒土生爐甘石主風熱赤眼或癢或痛漸生翳膜及治下部生瘡津唾調敷今補地謹按此種出川廣池州山谷其形膩軟稜層作塊大小不一有粉紅色如梅花瓣者亦有青白色而挾石者入藥惟以純白而膩者佳余色粗礪為劣今以點煉蟹殼銅而成黃銅者即此也時生無時採無時用如羊腦者佳色白味甘性平氣氣之薄者陽中之陰臭朽主明目退翳制凡使以炭火鍛赤童子小便淬三十次研細用黃連龍膽草各一兩當歸三錢煎水二碗飛過訖重湯蒸乾再研約一日令極細如面用治療眼目昏赤眵淚羞明及風眼赤爛隱澀疼痛暴發腫痛翳膜遮睛合治制過甘石四兩合膩粉硇砂白礬黃連各半兩銅青一兩半白丁香乳香鉛白霜膽礬各一字另研令極細每用少許點治新久病眼昏澀難開翳膜遮睛或成胬肉冷淚及暴發赤眼腫痛制過甘石一兩合珍珠孩兒茶輕粉枯白礬各一分片腦少許治下部瘡鵝管石無毒石生鵝管石主咳嗽痰喘及小兒諸嗽今補地謹按此石出蜀地嶺南今濟南歷城縣有之長二三寸形圓而層層甲錯色白酥脆易折中空如管故謂之鵝管石也時採無時用中空而明淨者佳質類石鐘乳而極短小色白味甘性平氣氣之薄者陽中之陰一十七種陳藏器余暈石無毒主石淋磨服之亦燒令赤投酒中服生大海底如姜石紫褐色極緊似石是鹹水結成之自然有暈也流黃香味辛溫無毒去惡氣除冷殺蟲似流黃而香吳時外國傳云流黃香出都昆國在扶南南三千里南洲異物志云流黃香出南海邊諸國今中國用者從西戎來白師子主白虎病向東人呼為歷節風置白師子於病者前自愈此壓伏之義也白虎鬼古人言如貓在糞堆中亦云是糞神今時人掃糞莫置門下令人病此療之法以雞子揩病人痛咒願送著糞堆頭勿反顧玄黃石味甘平溫無毒主驚恐身熱邪氣鎮心久服令人眼明令人悅澤出淄川北海山谷土石中如赤土代赭之類又有一名零陵極細研服之如代赭土人用以當朱呼為赤石恐是代赭之類也人未用之石欄杆味辛平無毒主石淋破血産後惡血磨服亦煮汁服亦火燒投酒中服生大海底高尺余如樹有眼莖莖上有孔如物點之漁人以網罾得之初從水出微紅後漸青玻璃味辛寒無毒主驚悸心熱能安心明目去赤眼尉熱腫此西國之寶也是水王或云千歲冰化為之應玉石之類生土石中未必是冰今水精珠精者極光明置水中不見珠也尉目除熱淚或云火燧珠向日取得火石髓味甘溫無毒主寒熱中羸瘦無顏色積聚心腹脹滿食飲不消皮膚枯槁小便數疾癖塊腹內腸鳴下利腰腳疼冷男子絶陽女子絶産血氣不調令人肥健能食合金瘡性壅宜寒瘦人生臨海華蓋山石窟土人採取澄淘如泥作丸如彈子有白有黃彌佳矣霹靂針無毒主大驚失心恍惚不識人並下淋磨服亦煮服此物伺候震處掘地三尺得之其形非一或言是人所造納與天曹不知事實今得之亦有似斧刃者亦有如銼刃者亦有安二孔者一用人間石作也注出雷州並河東山澤間因雷震後時多似斧色青黑斑文至硬如玉作枕除魔夢闢不祥名霹靂屑也大石鎮宅主災異不起宅經取大石鎮宅四隅荊楚歲時記十二月暮日掘宅四角各埋一大石為鎮宅又鴻寶萬畢術云埋丸石於宅四隅捶桃核七枚則鬼無能殃也金石味甘無毒主久羸瘦不能食無顏色補腰腳冷令人健壯益陽有暴熱脫髮飛煉服之生五臺山清涼寺石中金歷作赤褐色玉膏味甘平無毒五石主延年神仙術家取蟾蜍膏軟玉如泥以苦酒消之成水此則為膏之法今玉石間水飲之長生令人體潤以玉投朱草汁中化成醴朱草瑞物已出金水卷中十洲仙記瀛洲有玉膏泉如酒飲之數杯輒醉令人長生洲上多有仙家似吳兒雖仙境之事有可憑者故以引為證也溫石及燒磚主之得熱氣徹腰腹久患下部冷久痢腸腹下白膿燒磚並溫石尉及坐之並瘥但取堅石燒暖用之非別有溫石也印紙無毒主令婦人斷産無子剪有印處燒灰水服之一錢匕神效煙藥味辛溫有毒主瘰癧五痔瘻癭瘤瘡根惡腫石黃空青桂心並四兩乾薑一兩為末取鐵片闊五寸燒赤以藥置鐵上用瓷碗以豬脂塗碗底藥飛上待冷即開如此五度隨瘡孔大小以藥如鼠屎內孔中面封之三度根出也無孔者針破內之特蓬殺味辛苦溫小毒主飛金石用之煉丹亦須用生西國似食脂蠣粉之類能透金石鐵無礙下通出阿婆趙榮二藥有小毒主疔腫惡瘡出根蝕息肉肉刺齊人以白姜石犬屎緋帛棘針鉤等合成如墨硬土作丸又有阿婆趙榮藥功狀相同雲石灰和諸蟲及緋帛棘針合成之並出臨淄齊州六月河中諸熱砂主風濕頑痹不仁筋骨攣縮腳疼冷風掣癰緩血脈斷絶取干沙日曝令極熱伏坐其中冷則更易之取熱徹通汗然後隨病進藥及食忌風冷勞役
