body:
  text: 卷之二十五獸部下品毛蟲豚卵無毒附蹄心腎膽齒膏肉等胎生豚卵出神農本經主驚癇癲疾鬼疰蠱毒除寒熱賁豚五癃邪氣攣縮懸蹄平微寒主五痔伏熱在腸腸癰內蝕以上朱字神農本經豬四足小寒主傷撻諸敗瘡下乳汁心主驚邪憂恚腎冷和理腎氣通利膀胱膽微寒主傷寒熱渴肚微溫主補中益氣止渴利齒平主小兒驚癇五月五日取鬐膏微寒生髮肪膏主煎諸膏藥豭豬肉味酸冷療狂病凡豬肉味苦主閉血脈弱筋骨虛人肌不可久食病人金瘡者尤甚豬屎寒主寒熱黃疸濕痹豬膚味甘寒其氣先入腎能解少陰客熱以上黑字名醫所錄名豚顛地圖經曰豬乃水畜為用最多其細骨少筋多膏之物也本經不載所出州土今在處有之按揚雄方言云豬燕朝鮮之間謂之豭古瑕切牡豕也關東西謂之彘或謂之豕南楚謂之豨音喜其子謂豯音奚始生三月吳揚之間謂之豬子其實一種今云豚卵當是豬子也爾雅云彘五尺為𦯓章移切郭璞云大豕為𦯓今漁陽呼其大者為𦯓是也收陰乾藏之勿令敗味甘性溫緩氣氣之厚者陽也臭腥治療圖經曰肝除冷泄久滑赤白腎消積滯骨髓治撲損及惡瘡四蹄行婦人乳脈滑肌膚去寒熱肪膏敷諸惡瘡利血脈解風熱潤肺腸臟除大小腸風熱宜食之𦚟治肺氣干脹喘急潤五臟去皺疱䵟𪒟膽治骨熱勞極及小兒五疳殺蟲陶隱居云脂潤皮膚去皸裂屎汁治溫毒熱唐本注云豬耳中垢治蛇傷豬腦治風眩腦鳴及凍瘡血治賁豚暴氣中風頭眩淋瀝乳汁止小兒驚癇天吊大人豬雞癇病乳頭治小兒驚癇及鬼毒去來寒熱五癃五臟治小兒驚癇發汗十二月上亥日取肪脂內新瓦器中埋亥地百日治癰疽膽治大便不通以葦筒著膽縛一頭內下部入三寸灌之入腹立通膽汁敷小兒頭瘡臘月豬脂殺蟲久留不敗豬黃治金瘡血痢齒燒灰治蛇咬瘡日華子云心止驚癇血癖邪氣肚止痢腎治耳聾肉治水銀風並掘土土坑內惡氣腸止小便治賁豚氣及海外瘴氣糞治天行熱病蠱毒黃疸取東行牝豬者良窠內草止小兒夜啼安席下勿令母知孟詵云肚止暴痢虛弱大豬頭去驚癇五痔下丹石腸止虛渴小便數別錄云母豬尾頭血治蛇入口併入七孔中滴口中即出豬膽治盲取一枚微火煎之丸如黍米大內眼中食頃良又煎湯浴初生小兒不生瘡疥豬膽白皮治翳如重者取曝乾合作小繩子如粗釵股大燒灰待冷便以灰點翳上不過三五度瘥肉肝炙熱拓被打頭青腫臘月豬脂治漏瘡以紙沾取內瘡孔中日五夜三易之又治鼠瘻瘡瘰癧取調塗之豬脂治胞衣不出腹滿則殺人但多服佳及治五種黃疸谷疸酒疸黑疸女勞疸身體四肢微腫胸滿不得汗汗出如黃柏汁由大汗卒入水所致以一斤令溫熱盡服之日三當下下則稍愈豬肝治女子陰中苦癢搔之痛悶取炙熱內陰中蟲著肝即出之臘月豬屎燒灰敷小兒白禿髮不生者豬脂治蜈蚣蟻子入耳炙令香掩耳孔自出豬肪脂治吹乳惡寒壯熱以冷水浸拓之熱即易之立效肉爛煮取汁洗豌豆瘡補圖經曰心養血不足及虛劣肺能補肺得火麻仁良腎補虛壯氣肚止骨蒸勞熱血脈不行補羸助氣四季宜食日華子云腎補水臟暖腰膝補膀胱肚補虛損殺勞蟲腸補下焦生血孟詵云大豬頭補虛乏氣力別錄云肝補肝氣合治肚釀黃糯米蒸搗為丸治勞氣並小兒疳蛔黃瘦病肝切作生合姜醋空心服之治腳氣當微泄若先痢即勿服豬膽合生薑汁釅醋半合治濕䘌病下膿血不止乾嘔羸瘦多睡面黃者灌穀道手中急捻令醋氣至咽喉乃放手當下五色惡物及蟲子又合生姜橘皮訶黎勒桃皮煮服治瘦病咳嗽豬𦚟合棗肉浸酒服之治肺痿咳嗽及痃癖羸瘦子肝一葉薄批之搵著煨熟訶子末中微火炙之又搵炙盡半兩末空腹細嚼陳米飲送下治乳婦赤白下及冷勞腹臟虛者脾合陳皮紅生薑人參蔥白切拍之以陳米水煮如羹去橘皮空腹食之治脾胃虛熱豬蹄四枚以水二斗煮取一半去蹄合土瓜根通草漏蘆各三兩以汁煮取六升去滓內蔥白豉如常著少米煮作稀蔥豉粥食之治婦人無乳汁食後或身體微微熱少有汗出乳未下更三兩劑大有驗豬𦚟酒以豬𦚟一具細切合青蒿葉相和以無灰酒一大升微火搵之乘熱內豬𦚟蒿葉中共暖使消盡又取桂心一小兩別搗為末內酒中每日平旦空腹取一小盞服之午時夜間各再一服治冷痢久不瘥此是脾氣不足暴冷入脾舌上生瘡飲食無味縱吃下還吐小腹雷鳴時時心悶干皮細起膝脛痠疼兩耳絕聲四肢沉重漸瘦劣重成鬼氣及婦人血氣不通逆飯憂煩常行無力四肢不舉丈夫痃癖兩肋虛脹變為水氣服之皆效忌熱面油膩等食豬舌合五味煮取汁飲能健脾補不足之氣令人能食豬膚一斤水一斗煮取五升去滓加白蜜一升粉五合熬香和勻相得溫分六服治少陰病下痢咽痛胸滿心煩豬膏合羊屎塗熱毒病攻手足腫疼痛豬腦髓著熱酒中洗手足皴裂出血疼痛若冬月冒涉凍凌面目手足瘃壞及熱疼痛皆瘥生豬肝一具細切合苦酒頓食之勿用鹽治卒腫病身面皆洪大豬膏合芫花塗疥瘡豬膽大如雞子者合熱酒服治大小便不通豶豬腎一枚以刀開去筋膜入附子末一錢匕以濕紙裹煨熟空心稍熱食之便飲酒一盞多亦妙治男子水臟虛憊遺精盜汗夜夢鬼交者效豬蹄甲四十九個淨洗控干每個甲內半夏白礬各一字入罐子內封閉勿令煙出火煅通赤去火細研入麝香一錢匕治咳嗽定喘化涎每用一錢匕糯米飲下小兒半錢至妙豬腎一對去脂膜切枸杞葉半斤用豉汁一大盞半相和煮作羹入鹽椒蔥空腹食之治陰痿羸瘦精髓虛弱四肢少力豬腎造稀臛以蔥豉米如法食之治產後虛勞骨節疼痛汗不出母豬蹄兩隻合通草六分以綿裹和煮作羹食之治癰疽及發背或髮乳房初起微赤不急治之即殺人豬肝一斤薄切於瓦上曝令熟乾搗篩為末煮白粥布絞取汁和眾手丸如桐子大空心飲下五十丸日五服治脾胃氣虛食即汗出及嘔逆豬腎一對研著胡椒橘皮鹽醬椒末面作餛飩吃之治脾胃冷嘔逆下痢腰臍切痛豬肚一枚淨洗以水五升煮令爛熟取二升以來去肚著少豉治消渴日夜飲水數斗小便數瘦弱渴即飲之豬肝一具煮作羹任意下飯治水氣脹滿浮腫豬肉細切作䭔子於豬脂中煎食之治上氣咳嗽胸膈妨滿氣喘豬胰一具削薄竹筒盛於煻火中炮令熟食上吃之治一切肺病咳嗽膿血不止豬肝一具細切先布綟更以醋洗蒜齏食之治腫從足始上入腹者如食不盡三兩頓食亦可或洗切作臠著蔥白豉姜椒熟炙食之亦治浮腫脹滿不下食心悶豬心一枚切於豉汁中煮五味糝調和食之治產後中風血氣驚邪憂悸氣逆豬乳汁三合以綿纏浸令兒吮之雖多尤佳治小兒驚癇發動無時肝一具薄切以水淘漉干即以五味醬醋食之清肝臟壅熱目赤磣痛兼明目補肝氣禁白豬白蹄雜青者不可食心不可多食能耗心氣腎雖補腎令人少子冬月不可食損人真氣兼發虛壅肉久食令人虛肥動風氣患瘧人不宜食食之必再發忌心不與吳茱萸同食肺不與白花菜同食令人氣滯發霍亂肉不可合牛肉同煮食之令人生寸白蟲膏忌烏梅解肪膏解斑蝥芫青地膽亭長等毒肉壓丹石毒解殺藥毒燖豬湯解諸毒蟲魘狐陰莖有毒附五臟腸屎等胎生狐陰莖主女子絕產陰癢小兒陰頹卵腫五臟及腸味苦微寒有毒主蠱毒寒熱小兒驚癇雄狐屎燒之辟惡名醫所錄地圖經曰舊本不著所出州郡陶隱居注云江東無狐皆出北方及益州今江南亦時有之京洛尤多形似黃狗鼻尖尾大亦似貍而黃善能為魅北土作膾生食之甚暖雄狐糞陰莖五臟皆入藥用其屎在竹木間石上尖頭堅者是也衍義曰即今皮兼毛為裘者是也此獸多疑極審聽人智出之以多疑審聽而捕取捕者多用罝也時採無時用陰莖五臟肉尾糞質類狗而矮小味甘性微寒氣氣之薄者陽中之陰臭腥主辟邪惡補虛損治療圖經曰肝燒灰治風雄狐膽治卒暴亡未移時者溫水微研灌入喉即活須臘月收者佳唐本注云狐肉及腸作臛食之治疥瘡久不瘥者腸及頭尾治牛疫燒灰和水灌之日華子云狐肉治惡瘡疥肝生服祛狐魅雄狐尾燒辟惡孟詵云狐肉治五臟邪氣及蠱毒寒熱宜多服之食療云肉炙食之治小兒㿉卵腫頭燒辟邪腸肚作羹臛食之治大人見鬼別錄云雄狐糞燒之去瘟疫病狐屎治一切惡瘻中冷息肉用正月收者不限多少乾末食前新汲水下一錢匕補日華子云狐肉補虛損勞劣煮炙食之合治狐肉一片及五臟治如食法合豉汁中煮五味和作羹或作粥炙食之治驚癇神思恍惚語言錯謬歌笑無度及五臟積冷蠱毒寒熱並愈如無豉汁以骨汁或鯽魚汁代之狐唇杵和鹽封惡刺狐糞二升燒灰合薑黃三兩搗為末空腹酒服方寸匕日再服治五種心痛及肝心痛顏色蒼蒼如死灰狀而喘息大者狐屎灰合臘月膏和封惡刺獺肝有毒附肉膽等胎生獺肝主鬼疰蠱毒卻魚鯁止久嗽燒服之肉性寒療疫氣溫病及牛馬時行病煮屎灌之亦良名醫所錄名水狗地圖經曰舊不著所出州土今江湖土穴間多有之北土人亦馴養以為玩廣雅謂之水狗然有兩種有獱音賓獱或作猵音頻獺形大頸如馬身似蝙蝠淮南子云養池魚者不畜獱獺許慎注云猵獺類也入藥當以取魚祭天者是也凡諸畜肝皆葉數定惟此肝一月一葉十二月十二葉其間又有退葉用之須見形乃可驗不爾多偽也衍義曰四足俱短頭與身尾皆褊毛色若故紫白大者身與尾長三尺餘食魚居水中出水亦不死亦能休於大木上世謂之水獺嘗縻置大水甕中於其間旋轉如風水為之成旋壠起四面高中心凹下觀者駭目皮西戎將以飾毳服領袖問之云垢不著如風霾翳目即就袖口拭目中即出又毛端果不著塵亦一異也或云獺膽分杯嘗試之不驗惟塗於盞唇但使酒稍高於盞面分杯之事亦古今傳誤言也不可不正之肝用之有驗時生無時採無時用肝肉膽足骨屎皮毛色紫味甘鹹性微熱氣氣厚味薄陽中之陰臭腥主虛勞咳嗽制細研或燒灰用之治療圖經曰肉治婦人骨蒸熱勞血脈不行榮衛虛滿及女子經絡不通血熱大小腸秘澀肝治傳屍勞極四肢寒瘧虛汗客熱及產勞冷勞並鬼疰一門相染者取肝一具火炙水服方寸匕又治九十種蠱疰傳屍骨蒸伏連殗殜諸鬼毒癘疫等俱妙足治魚骨鯁項下爬之即下亦煮汁飲之皮毛治水癊病者作褥及履屧著之並煮汁服屎治魚臍瘡膽治眼翳黑花飛蠅上下視物不明唐本注云四足治手足皸裂屎治驢馬蟲顙細研灌鼻中藥性論云肝治上氣咳嗽勞損疾屍疰瘦病骨治嘔噦不止日華子云肉治水氣脹滿熱毒風孟詵云肝下水脹但熱毒風虛脹服之即瘥若是冷氣虛脹勿食食之虛腫益甚也只治熱不治冷不可一概用之別錄云肝治鬼魅為末水服日三服瘥及腸痔大便常有血燒服一錢匕獺皮令母帶易產補日華子云肝補虛勞並傳屍勞疾合治肝燒為灰合酒服治咳嗽水獺一個用罐子內鹽泥固濟放乾燒灰為末以黃米煮粥敷折傷處攤水獺末一錢粥上糝便用帛裹系立止疼痛禁男子不可多食其肉食之能消陽氣忌肉不可與兔肉同食貒膏無毒附肉胞獾貉胎生貒音湍膏主上氣乏氣咳逆酒和三合服之日二又主馬肺病蟲顙等病肉主久水脹不瘥垂死者作羹臛食之下水大效胞干之湯摩如雞卵許空腹服吐諸蠱毒名醫所錄地本經不載所出州土今山林間或有之衍義曰此獸肥矮毛微灰色頭連脊毛一道黑嘴尖尾短闊野獸中貒肉最甘美蒸食之益瘦人收瓷器盛之用膏味甘性平緩氣氣厚於味陽中之陰臭腥治療陳藏器云貒脂殺馬漏脊蟲瘡獾肉主小兒疳瘦啖之殺蛔蟲補衍義曰貒肉益瘦人長脂肉貉肉主元臟虛劣及女子虛憊合治脂銷於酒中服治傳屍鬼氣疰忤肉煮經宿露中空心和醬食治服丹石勞熱患赤白痢多時不瘥者骨炙末合酒服三合治上氣咳嗽肉半斤切和粳米三合水二升合蔥椒姜豉作粥食之治十種水不瘥垂死者貒脂膏煎一合和暖酒服治肺痿氣急解肉服丹石人食之良鼴鼠無毒胎生鼴音偃鼠主癰疽諸瘻蝕惡瘡陰䘌爛瘡名醫所錄名鼢扶粉切鼠隱鼠地圖經曰舊不著所出州土云在土中行者今處處田壠間皆有之爾雅鼠屬鼢鼠是其一郭璞云地中行者化為鴽汝居切皆為此也其形類鼠而肥多膏色黑口鼻尖大常穿地行旱歲則為田害亦有一種鼴鼠似牛而鼠首足黑色大者千斤多伏於水又能堰水放沫出滄州及湖中彼人取其肉食之皮可作鞦轡用是二物同名也陶隱居云其形如鼠大而無尾黑色長鼻甚強常穿耕地中行討掘即得今諸山林中有獸大如水牛形似豬灰赤色下腳似象胸前尾上皆白有力而鈍亦名鼴鼠人常取食之肉似牛肉多以作脯其膏亦能主瘻乃云此是鼠王其精一滴落地輒成一鼠谷有鼠災年則多出恐非虛耳衍義曰鼴鼠鼢鼠也其毛色如鼠今京畿田中甚多腳絕短但能行尾長寸許目極小項尤短兼易掘取或安竹弓射之取以飼鷹陶不合更引今諸山林中大如水牛形似豬灰赤色者設使是鼠則孰能見其溺精成鼠也陶如此輕信但真淳之士不以無稽之言為妄今經云在土中行則鼢鼠無疑矣時生無時採五月取收曝乾用肉脂色灰黑味咸性軟氣氣薄味厚陰中之陽臭腥主瘡瘍治療圖經曰肉治風熱久積血脈不行結成瘡疽食之可消去小兒食之殺蛔蟲陶隱居云肉久食治瘡疥痔瘻膏摩諸惡瘡鼺鼠胎生鼺音羸鼠主墮胎令產易神農本經名飛生地圖經曰鼺鼠即飛生鳥也出山都平谷今湖嶺間山中多有之狀如蝙蝠大如鴟鳶毛紫色暗夜行飛生南人見之多以為怪捕取其皮毛與產婦臨蓐持之令兒易生衍義曰鼺鼠經中不言性味惟難產藥中用之其毛赤黑色長尾人捕得取皮為暖帽但向下飛則可不能致遠今關西山中甚有毛極密人謂之飛生也質類蝙蝠而尾長色紫性微溫氣氣之厚者陽也治療圖經曰婦人將產燒末飲服之合治取一枚合槐子故弩箭羽各十四枝搗丸如桐子大以酒服二丸令孕婦易產野豬黃無毒胎生野豬黃主金瘡止血生肉療癲癇水研如棗核日二服效名醫所錄地衍義曰京西界野豬甚多形如家豬但腹小腳長毛色蒼褐作群行獵人惟敢射取最後者若射中前走者則群豬奔散傷人其肉如馬肉而赤由冬月在林中食橡子故也味甘美復軟尤勝家豬黃在膽中蓋不常有間得之方亦少用時生無時採無時收瓷器密貯用膽中黃色黃味辛甘性平散氣氣之薄者陽中之陰臭腥主鬼疰癇疾制研細或水磨用治療日華子云肉治腸風瀉血炙食之不過十頓愈膽中黃治鬼疰癇疾及惡毒風小兒疳氣客忤天吊脂悅顏色除風腫毒及瘡疥癬用臘月陳者佳孟詵云膽中黃治疰病研如水服齒燒作灰服治蛇毒膽治惡熱毒邪氣衍義曰膽中黃治小兒諸癇疾食療云脂治婦人無乳補孟詵云肉補肌膚及五臟不發風虛氣合治野豬膏煉令精細以一匙和酒一盞日三服令婦人多乳外腎和皮燒灰存性為末合飲下治崩中帶下並腸風瀉血及血痢野豬肉二斤切著五味炙空心食之治久痔野雞下血不止肛邊痛作羹食亦可禁肉多食令人虛肥微動風青蹄者不可食豺皮有毒胎生豺皮主冷痹腳氣熟之以纏病上即瘥名醫所錄地謹按埤雅云其形似狗而長尾白頰高前廣後其色黃季秋取獸四面陳之以祀其先世謂之豺祭獸以報本故先王候之以田禮記所謂豺祭獸然後田獵是也俗云豺群噬虎言其猛捷且眾可以窘虎也本經不載所出州土今在處山林或有之時生無時採無時用皮色黃性熱氣氣之厚者陽也臭腥制煮汁或燒灰用治療圖經曰皮燒灰敷䘌齒瘡合治豺皮煮汁飲或燒灰合酒服治疳痢腹中諸瘡禁肉不可食消人脂損人精神軟腳骨能瘦人狼無毒胎生狼肉主補益五臟厚腸胃填精髓腹有冷積者宜食之味勝狐犬肉喉嗉皮熟成皮條勒頭去頭痛皮熟作番皮大暖尾帶馬胸膛前辟邪令馬不驚牙帶之辟邪今補謹按埤雅云其形大如狗青色作聲諸竅皆沸蓋今訓狐鳴則亦後竅應之豺祭狼小又善逐獸皆獸之有才智者故豺從才狼從良是也里語曰狼卜食狼將遠逐食必先倒立以卜所向故今獵人遇狼輒喜蓋狼之所向獸之所在也而靈智有如此其糞燒之煙直而聚雖風吹之不斜故古今烽火用者亦取其直聚而不散也時生無時採無時用肉皮牙尾喉嗉皮味咸性熱氣氣厚味薄陽中之陰臭腥治療別錄云狼屎灰敷瘰癧瘡屎中骨燒末服如黍米許止小兒夜啼合治狼結喉曝乾杵末入半錢於飯內食之治噎病膃肭臍無毒附膃肭獸胎生膃肭臍主鬼氣屍疰夢與鬼交鬼魅狐魅心腹痛中惡邪氣宿血結塊痃癖羸瘦等名醫所錄地圖經曰出西戎今東海傍亦有之云是新羅國海狗腎舊說是骨肭獸似狐而大長尾其皮上自有肉黃毛三莖共一穴今滄州所圖乃是魚類而豕首兩足其臍紅紫色上有紫斑點全不相類每遇日出時即浮水面以弓矢而採之取其外腎醫家用之欲驗其真置睡犬傍其犬忽驚跳若狂者為佳兼耐收蓄置密器中常濕潤如新異魚圖云試膃肭臍者於臘月衝風處置盂水浸之不凍者為真也衍義曰膃肭臍今出登萊州藥性論以謂是海內狗外腎日華子又謂之獸今觀其狀非狗非獸亦非魚也但前即似獸尾即似魚其身短有密淡青白毛腹脅下全白仍相間於淡青白毛上有深青黑點久則色復淡皮厚且韌如牛皮邊將多取以飾鞍韉其臍治臍腹積冷精衰脾腎勞極有功不待別試也似狐長尾之說蓋今人多不識也收陰乾用外腎色紅紫味辛甘性大熱氣氣之厚者陽也臭臊主助陽氣除積冷制雷公云凡使先須細認其偽者多而海中有獸號曰水烏龍海人採得殺取腎將入藥中修合恐有誤其物自殊凡一對外有兩重薄皮裹丸其內核皮上自有肉黃毛三莖共一穴年年蔭濕常如新兼將於睡犬躡足置於犬頭其犬驀驚如狂即是真也若用須酒浸一日後以紙裹微微火上炙令香細銼單搗用之治療藥性論云治男子宿症氣塊積冷勞氣羸瘦腎精衰損漸成腎勞瘦悴日華子云破癥結止驚狂癇疾及心腹疼破宿血衍義曰治臍腹積冷精衰脾勞勞疾海藥云治五勞七傷陰痿少力腎氣衰弱虛損背膊勞悶面黑精冷補日華子云補中益腎氣暖腰膝助陽氣麂無毒附頭骨胎生麂音紀主五痔病炸出以姜醋進之大有效頭骨為灰飲下主飛屍名醫所錄地圖經曰出東南山谷今山林處處皆有之及均房湘漢間尤多實獐類也爾雅𪊨與麂同大麇旄毛狗足釋曰麇亦獐也旄毛㺜音猱長毛也大獐毛長狗足者名曰𪊨南人往往食其肉然堅韌不及獐味美其皮作履舄勝於眾皮頭亦入藥用又有一種類𪊨而更大名麖音京不堪藥用山海經曰女幾之山其獸多麖𪊨是此衍義曰麂獐之屬又小於獐但口兩邊有長牙好鬥則用其牙皮為第一無出其右者然多牙傷痕四方皆有山深處則頗多其聲如擊破鈸也時生無時採無時用肉頭骨色黃味甘性平緩氣氣厚於味陽中之陰臭香禁多食能動痼疾妊娠不可服及發瘡癤疥野駝無毒胎生野駝脂主頑痹風瘙惡瘡毒腫死肌筋皮攣縮踠損筋骨火炙摩之取熱氣入肉又以和米粉作煎餅食之療痔勿令病人知名醫所錄地圖經曰出塞北河西今惟西北番界有之此中盡人家畜養生息者其脂在兩峰肉間入藥家駝亦可然不及野者為佳耳衍義曰生西北界等處家生者峰蹄最精人多煮熟糟食之謹按埤雅云駝臥腹不著地屈足漏明能行千里背有肉鞍如峰長頸高腳善負知泉脈所在遇處輒停不行其糞直上如狼煙亦知風候也段氏云其毛褥溫厚暖於狐貈何各切極堪禦寒遇夏退毛至盡乃能避熱故古者冬取皮於狐類而裘成夏取毛於駝類而褐成也其峰脂味甚美而脆故為八珍之一蓋功用鍾於此也用脂毛蹄甲糞色黃白味甘性溫氣氣之厚者陽也主壯筋骨潤肌膚治療圖經曰治風下氣唐本注云駱駝毛蹄甲治婦人赤白帶下最善衍義曰糞為乾末搐鼻中治鼻衄合治頷下毛燒灰取半雞子大合酒服治痔瘡獼猴無毒附肉頭骨手屎皮胎生獼猴肉主諸風勞釀酒彌佳頭骨主瘴瘧作湯治小兒則闢驚鬼魅寒熱手主小兒驚癇口噤屎主蜘蛛咬肉為脯主久瘧皮主馬疫氣名醫所錄地別錄云出貴州諸山林間皆有之此物有數種都名禺屬取色黃尾長面赤者佳若人家養者肉及屎並不主病為其食息雜違其本真故也抱朴子云獼猴壽八百歲即變為猿猿壽五百歲變為玃玃壽一千歲變為蟾蜍用肉頭骨手屎皮色黃味酸性平收氣氣之薄者陽中之陰合治頭骨一枚燒灰為末空心合溫酒服一錢匕治鬼瘧進退不定臨發再服瘥敗鼓皮敗鼓皮主中蠱毒名醫所錄地衍義曰敗鼓皮處處有之以黃牛皮為勝今不言是何皮蓋亦以驢馬皮為之者唐韓退之所謂牛溲馬勃敗鼓之皮俱收並蓄待用無遺者今用處亦少尤好煎膠專用牛皮始可入藥用黃牛皮者為勝色黃白性平氣氣之薄者陽中之陰臭腥制燒灰作末用合治敗鼓皮廣五寸長一尺合薔薇根五寸如足拇指大銼以水一升酒三升煮取一升服之治蠱下蟲有效敗鼓皮燒作末合酒服方寸匕治中蠱毒須臾當呼蠱姓名令本蠱主呼取蠱名即瘥亦治小兒五種蠱毒六畜毛蹄甲有毒六畜毛蹄甲主鬼疰蠱毒寒熱驚癇癲痙狂走駱駝毛尤良神農本經地陶隱居云處處有之六畜謂馬牛羊豬狗雞也驢騾亦其類駱駝方家並少用且馬牛羊雞豬狗毛蹄亦以各出其身之品類中而所主療則皆同也味咸性平軟氣味厚於氣陰中之陽驢屎尿乳軸垢肉脂頭皮毛附驢屎熬之主熨風腫瘻瘡屎汁主心腹卒痛諸疰忤屎主症癖胃反吐不止牙齒痛水毒牝驢屎主燥水駮驢屎主濕水一服五合良燥水者畫體成字濕水者不成字乳甘冷主小兒熱急黃等多服使利尾下軸垢主瘧水洗取汁和麵如彈丸二枚作燒餅瘧未發前食一枚至發時食一枚療瘧無久新發無期者名醫所錄地蜀本云驢色類多以烏者為勝今河南山陝北地多有之日華子云驢肉涼無毒解心煩止風狂釀酒治一切風衍義曰驢肉食之動風脂肥尤甚屢試屢驗日華子乃以止風狂治一切風未可憑也煎膠用黑驢皮取其發散耳仍須烏者用烏之意如用烏雞子烏蛇烏鴉之類其物雖治風然更取其水色蓋以制其熱則生風之義也用屎乳肉脂頭皮毛及軸垢色黑臭臭主去風毒安心氣治療日華子云驢乳治小兒癇客忤天吊風疾驢肉解心煩止風狂脂敷惡瘡疥及風腫驢頭煮汁洗頭風風屑皮煎膠食治一切風並鼻洪吐血腸風血痢及崩中帶下陳藏器云黑驢溺及乳並治蜘蛛咬以物盛浸之瘡亦取驢溺處臭泥敷之驢乳治蚰蜒入耳灌耳中即消成水孟詵曰驢骨煮作湯浴漬身治歷節風煮頭汁令服二三升治多年消渴瘥皮覆患瘧人良食療云驢乳三升熱服之治卒心痛連腰臍痛別錄云驢溺熱服二合日三治反胃吐食稍有毒服時不可過多驢蹄硬處削下者治飲酒過度欲至穿腸以水濃煮汁冷飲之瘥驢耳中垢敷蠍螫黑驢乳食後暖服三大合治心熱風癇合治驢頭撏去毛煮汁以漬曲醞酒食之去大風生脂和生椒熟搗綿裹塞耳中治積年耳聾皮和毛煎令作膠合酒服治一切風毒骨節痛呻吟不止者脂和烏梅為丸如桐子大治多年瘧未發時服三十丸以毛一斤炒令黃投一斗酒中浸三日空心細細飲使醉衣覆臥取汗明日更依前服治頭中一切風忌陳倉米麥面驢肉釀酒服之治一切風驢駒衣燒灰合酒服之能斷酒驢脂合石鹽和勻注兩眥治眼中瘀肉脂和鹽敷身體手足腫烏驢頭一枚撏洗如法蒸熟細切於豉汁內煮著五味調點少酥食之治中風頭眩心肺浮熱手足無力筋骨煩疼言語似澀一身動搖烏驢皮一張撏洗如法蒸熟切於豉汁中煮和五味再煮空心食之治中風手足不隨骨節煩疼心躁口面喎邪驢肉一斤切於豉汁內煮五味食之治風狂憂愁不樂能安心氣驢蹄不計多少燒灰研以生油和敷於頭骨縫上治小兒解顱不合驢頭煮熟合姜齏啖之治黃疸病禁驢肉不宜多食多食動風脂肥尤甚及患眼疾者不宜食肉食之喪明塔剌不花無毒胎生塔剌不花主野雞瘻瘡煮食之宜人頭骨去下頦肉令齒全活小兒無睡懸之頭邊即令得睡今補名土撥鼠地生山後草澤中北人掘取以食雖肥煮則無油湯無味其皮番則不濕透而甚暖也時生無時採無時用肉頭骨味甘性緩氣氣之薄者陽中之陰臭腥禁多食難克化微動氣毫豬膏毫豬膏利大腸名醫所錄地圖經曰出陝洛江東諸山中並有之鬣間有毫如箭能射人肉味甘美其膏不可多食時生無時採冬月取者良收瓷器密貯用膏色白味甘性緩氣氣之薄者陽中之陰臭腥禁膏多食發風氣及令人虛羸五種陳藏器余諸血味甘平主補人身血不足或因患血枯皮上膚起面無顏色者皆不足也並生飲之又解諸藥毒菌毒止渴除丹毒去煩熱食筋令人多力果然肉味鹹無毒主瘧瘴寒熱煮食之亦坐其皮為褥似猴人面毛如蒼鴨肋邊堪作褥南州異物志云交州有果然獸其名自呼如猿白質黑文尾長過其頭鼻孔向天雨以尾塞鼻孔毛溫而細爾雅蜼仰鼻而長尾郭注與此相似也狨獸無毒主五野雞病取其脂敷瘡亦食其血肉亦坐其皮積久野雞病皆瘥也似猴而大毛長黃赤色生山南山谷中人將其皮作鞍褥狼筋如織絡袋子似筋膠所作大小如鴨卵人有犯盜者熏之當腳攣縮因之獲賊也或云是狼䏶下筋又云蟲所作未知孰是狼大如狗蒼色鳴聲諸孔皆沸諸肉有毒獸岐尾殺人鹿豹文殺人羊心有孔殺人馬蹄夜目五月以後食之殺人犬懸蹄肉有毒殺人不可食米甕中肉殺人漏沾脯殺人肉中不有星如米殺人羊脯三月以後有蟲如馬尾有毒殺人脯曝不燥火燒不動入腹不消久置黍米甕中令人氣閉白馬鞍下肉食之損人五臟馬及鹿膳白不可食乳酪及大酢和食令人為血痢驢馬兔肉妊娠不可食乳酪煎魚鱠瓜和食立患霍亂豬牛肉和食令人患寸白蟲諸肉煮熟不斂水食之成瘕食兔肉食乾薑令人霍亂市得野中脯多有射罔毒食諸肉過度還飲肉汁即消食腦立銷
