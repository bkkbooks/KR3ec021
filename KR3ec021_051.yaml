body:
  text: 續集卷之七上蟲魚部鱗蟲蛟龍髓精附蜃卵化生蛟龍本草綱目髓主敷面令人好顏色又主易産出東方朔別傳精有毒本草綱目名李時珍按任昉述異記云蛟乃龍屬其眉交生故謂之蛟有鱗曰蛟龍有翼曰應龍有角曰虯龍無角曰𦯸龍也梵書名宮毗羅地出處變化無窮不可拘定時生無時採難得按王子年拾遺記云漢昭帝釣於渭水得白蛟若蛇無鱗甲頭有軟角牙出唇外命大官作鮓食甚美據此則蛟亦可食也用髓質裴淵廣州記云蛟長丈餘似蛇而四足形廣如楯小頭細頸尾有肉環大者數圍其卵亦大能率魚飛得鱉可免色頸有白嬰胃前赭色背上青斑脅邊若錦骨青而肉紫治張仲景方蛟龍症痛不可忍治以硬糖日服二三升當吐出如蜥蠍狀也唐醫周顧治此用雄黃朴硝煮服下之禁金匱要略云春夏二時蛟龍帶精入芹菜中人食之則病蜃之刃切綱目附録李時珍云蛟之屬有蜃其狀似蛇而大有角如龍狀紅鬣腰以下鱗盡逆食燕子能吁氣成樓臺城郭之狀將雨即見名蜃樓亦曰海市其脂和蠟作燭香聞百步煙中亦有樓閣之形月令云雉入大水為蜃陸佃云蛇交龜則生龜交雉則生蜃物異而感同也類書云蛇與雉交而生子曰蟂似蛇四足能害人陸禋云蟂音梟即蛟也或曰蜃也又魯至剛云正月蛇與雉交生卵遇雷即入土數丈為蛇形經二三百年乃能升騰卵不入土但為雉爾觀此數說則蛟蜃皆是一類有生有化也一種海蛤與此同名羅願以為雉化之蜃未知然否詳甲蟲車螯下守宮有小毒原本注石龍子內綱目分條卵生守宮主中風癱瘓手足不舉或歷節風痛及風痓驚癇小兒疳痢血積成痞癘風瘰癧療蠍螫本草綱目名壁宮蘇恭蠍虎同上壁虎時珍蝘蜓音偃殄陶弘景雲蝘蜓喜緑籬壁間以朱飼之滿三斤殺乾末以塗女人身有交接事便脫不爾如赤志故名守宮而蜥蜴亦名守宮殊難分別按東方朔雲若非守宮則蜥蜴是矣蘇恭云蝘蜓又名蠍虎以其常在屋壁故名守宮亦名壁宮飼朱點婦人謬說也李時珍云守宮善捕蠍蠅故得虎名春秋考異郵云守宮食蠆土勝水也點臂之說淮南萬畢術張華博物志彭乘墨客揮犀皆有其法大抵不真恐別有術今不傳矣揚雄方言云秦晉西夏謂之守宮亦曰蠦牂南陽人呼為蝘蜓在澤中者謂之蜥蠍楚人謂之蠑螈地守宮處處人家牆壁有之時採諸方應用隨時取之收青囊方云端午日午時收壁虎一枚以雞蛋開一竅盛之陰乾蠆蠍螫傷每以一星敷上止疼神效用有全用者有去足者有用後半截者有連血生研者有陰乾者有用糞者質狀如蛇醫扁首長頸細鱗四足長者六七寸亦不聞噬人南方有十二時蟲即守宮之五色者並附於下色灰黑色味咸性寒主糞主治爛赤眼制有用硃砂末養之或焙炙乾用治李時珍曰守宮云不入藥用近時方術多用之楊仁齊言驚癇皆心血不足其血與心血相類故治驚癇取其血以補心其說近似而實不然蓋守宮食蠍蠆蠍蠆乃治風要藥故守宮所治風痓驚癇諸病亦猶蜈蠍之性能透經絡也且入血分故又治血病瘡瘍守宮祛風石龍利水功用自別不可不知方廣附余治小兒撮口用硃砂末安小瓶內捕活蠍虎一個入瓶中食砂末月餘待體赤陰乾為末每服薄荷湯調下三四分青囊雜纂方瘰癧初起用壁虎一枚焙研每日服半分用酒下醫方摘要云癰瘡大痛壁虎焙乾研末油調敷之即止合治鄧筆峰雜興方小兒臍風用壁虎後半截焙為末男用女乳女用男乳調勻入稀雞屎少許摻舌根及牙關仍以手蘸摩兒取汗出甚妙奇效方守宮膏治年久驚癇用守宮一個剪去四足連血研爛入珍珠麝香龍腦香各一字研勻以薄荷湯調服仍先或吐或下去痰涎而後用此大有神效仁齊直指方心虛驚癇用褐色壁虎一枚連血研爛入硃砂麝香末少許薄荷湯調服繼服二陳湯神效醫學正傳云癱瘓走痛用蠍虎一枚炙黃陳皮五分罌粟殼一錢甘草乳香沒藥各二錢半為末每服三錢水煎服聖濟總録方歷節風痛不可忍者壁虎丸用壁虎三枚生研蠐螬三枚紙包煨研地龍五條生研草烏頭三枚生研木香五錢乳香末二錢半麝香一錢龍腦五分合研成膏入酒糊搗丸如梧桐子大每日空心乳香酒服三十丸取效聖惠方破傷中風身如角弓反張筋急口噤者用守宮丸治之守宮炙乾去足七枚天南星酒浸三日曬乾一兩膩粉半錢為末以薄麵糊丸緑豆大每服七丸酒灌下少頃汗出得解更與一服再汗即瘥或加白附子一兩用蜜丸衛生寶鑑祛風散癘風成癩用東行蠍虎一條焙乾大蠶砂五升水淘炒各為末以小麥面四升拌作絡索曝乾研末每服一二合煎柏葉湯下日三服取效青囊雜纂方血積成塊用壁虎一枚白麵和一鴨子大包裹研爛作餅烙熟食之當下血塊不過三五次即愈甚驗奇效良方蠍虎丹治小兒一切疳疾消瘦下痢證候全備及無辜疳毒如邪病者用干雄蠍虎一個微炙蝸牛殼蘭香根靛花雄黃麝香各一分龍腦半分各研為末米醋煮糊丸黍米大每用脂麻湯下十丸日三服取效朱丹溪摘元方反胃膈氣用地塘蟲即壁虎也七個砂鍋炒焦木香人參硃砂各一錢半乳香一錢為末蜜丸梧子大每服七丸木香湯下早晚各一服聖濟總録云胎赤爛眼昏暗用蠍虎數枚以罐盛黃土按實入蠍虎在內勿令損傷以紙封口穿數孔出氣候有糞數粒去糞上一點黑者只取一頭白者唾津研成膏塗眼睫周圍不得揩拭來早以溫漿水洗三次甚效十二時蟲綱目附録李時珍云一名避役出容州交州諸處生人家籬壁樹木間守宮之類也大小如指狀同守宮而腦上連背有肉鬣如冠幘長頸長足身青色大者長尺許尾與身等齧人不可療嶺南異物志言其首隨十二時變色見者主有喜慶博物志言其陰多緗緑日中變易或青或緑或丹或紅北戶録言不能變十二色但黃褐青赤四色而已竊按陶弘景言石龍五色者為蜥蜴陸佃言蜥蜴能十二時變易故得易名然則此蟲亦蜥蜴矣而生籬壁間蓋五色守宮爾陶氏所謂守宮螫人必死及點臂成志者恐是此物至若尋常守宮既不堪點臂亦未有螫人至死者也鹽龍鹽龍鹽主興陽益腎品彙續集地出南蠻地收以海鹽飼之每鱗中出鹽則收取用鹽龍鹽質長尺余味鹹苦性大熱行走腎經治鹽龍鱗中所出之鹽每以溫酒服一錢匕云能興陽事李時珍按何遠春渚紀聞云宋徽宗時將軍蕭注破南蠻得其所養鹽龍長尺余藉以銀盤中置玉盂以玉箸托海鹽飼之每鱗中出鹽則收取用後龍為蔡京所得及死以鹽封數日取用亦有力愚按此物生於殊方古所不載而有此功用亦希物也因附於此以俟識者紫稍花無毒原本注獸部龍內綱目分注吊內寄生紫稍花主益陽祕精療真元虛憊陰痿遺精餘瀝白濁如脂小便不禁囊下濕癢女人陰寒冷帶入丸散及坐湯用本草綱目名吊精苗吉吊遺瀝附木而生地出於水中流槎木上按裴淵廣州記云吊生嶺南又姚和衆延齡至寶方云吉吊脂出福建州即知紫稍花亦出在此兩處無疑矣時生無時採無時甚難得用坐湯多用之質狀如蒲槌色微青黃復似灰色味甘性溫行走腎經助龍骨合治集簡方治陽事痿弱用紫稍花生龍骨各二錢麝香少許為末蜜丸梧子大每服二十丸燒酒下欲解飲生薑甘草湯總微論云陰養生瘡紫稍花一兩胡椒半兩煎湯溫洗數次即愈代和劑玉霜丸注云如無紫稍花以木賊代之贋李時珍按陳自明婦人良方云紫稍花生湖澤中乃魚蝦生卵於竹木之上狀如糖潵去木用之此說與孫說不同近時房中諸術多用紫稍花皆得於湖澤其色灰白而輕鬆恐非真者當以孫說為正或云紫稍花與龍涎相類未知是否孫光憲北夢瑣言云紫稍花出處甚詳已見獸部龍內注中鱗蛇有小毒卵生鱗蛇本草綱目膽主解藥毒治惡瘡及牙疼出勝覽及一統志地李時珍按方輿勝覽云鱗蛇出安南雲南鎮康州臨安沅江孟養諸處巨蟒也能食鹿時採無時用土人殺而食之取膽治疾以黃鱗者為上甚貴重之質身長丈餘有四足色有黃鱗黑鱗二色代李時珍按此亦蚺蛇之類但多足耳陶氏注蚺蛇分真假其亦此類與忌鱗蛇春冬居山夏秋居水能傷人人宜避之水蛇肉無毒附皮卵生水蛇肉主消渴煩熱毒痢皮主燒灰油調敷小兒骨疽膿血不止療手指天蛇毒瘡本草綱目名公蠣蛇苗生在水中地水蛇所在處處有之時採夏秋取之用肉與皮質大如鱔齧人不甚毒色黃黑色有纈紋味甘鹹性寒治小兒骨瘡海上方詩云小兒骨痛不堪言出血流膿實可憐尋取水蛇皮一個燒灰油抹上疼邊治天蛇毒劉松篁經驗方云會水灣陳玉田妻病天蛇毒瘡一老翁用水蛇一條去頭尾取中截如手指長剖去骨肉勿令病者見以蛇皮包手指自然束緊以紙外裹之頓覺遍身皆涼其病即愈數日後解視手指有一溝如小繩蛇皮內宛然有一小蛇頭目俱全也合治聖惠方水蛇丸治消渴四肢煩熱口乾心躁用水蛇一條活者剝皮炙黃為末蝸牛五十個水浸五日取涎入天花粉末煎稠入麝香一分用粟飯和丸緑豆大每服十丸薑湯下贋李時珍云水中又有一種泥蛇黑色穴居成群齧人有毒與水蛇不同張文仲備急方言山中一種蛇與公蠣相似亦不齧人陶弘景言公蠣蛇能化鱧者即此水蛇也黃頷蛇肉有小毒附頭骨涎有大毒蛇吞鼠蛙赤楝蛇卵生黃頷蛇本草綱目肉主風癩頑癬惡瘡自死蛇漬汁塗大疥煮汁浸臂腕作痛燒灰同豬脂塗風癬漏瘡婦人妒乳猘犬咬傷出肘後梅師千金諸方頭主久瘧及小腸癰骨主久瘧勞瘧涎主合蠱藥醫者應知解法本草綱目名黃喉蛇俗名李時珍云頷喉下也以色名之地李時珍按肘後千金外臺諸方多用自死蛇及蛇吞蛙鼠並不云是某蛇惟本草有蝮蛇腹中鼠陶氏所注術家所用黃頷赤𧐖多在人家屋間吞鼠子雀雛見腹中大者破取干之又蛇蛻注云草間不甚見虺蝮蛻多是赤𧐖黃頷輩據此則古方所用自死蛇及蛇吞蛙鼠當是二蛇雖蛇蛻亦多用之時生驚蟄後採夏秋取之用肉釀酒併入丸散頭入丸散用骨亦入丸散用質大者近丈小者不等色黃黑相間喉下色黃味肉味甘性肉性溫治千金方治猘犬齧傷自死蛇一枚燒焦為末納入瘡孔中又方惡瘡似癩及馬疥大如錢者自死蛇一條水漬至爛去骨取汁塗之隨手瘥又方發背腫毒蛇頭燒灰醋和敷之日三易又方蝦蟆瘻瘡五月五日蛇頭及野豬脂同水衣封之佳又方一切冷漏自死蛇取骨為末封之大痛以杏仁膏摩之即止解孫思邈云江南山間人一種蠱毒以蛇涎合藥著飲食中使人病瘕積年乃死但以雄黃蜈蚣之藥治之乃解蛇吞鼠主鼠瘻蟻瘻有細孔如針者以臘月豬脂煎焦去滓塗之綱目附録出千金方蛇吞蛙主噎膈勞嗽蛇瘻綱目附録治噎膈用蛇含蝦蟆泥包燒存性研末米飲服祕韞方久勞咳嗽吐臭痰者尋水邊蛇吞青蛙未咽者連蛇打死黃泥固濟煅研空心酒服一二錢至效忌生冷五七日永不發也千金方蛇瘻不愈蛇腹蛙燒灰封之赤楝蛇一名桑根蛇綱目附録李時珍云赤楝桑根象形陶氏作赤𧐖其色紅黑節節相間儼如赤楝桑根之狀大者近丈亦不甚毒丐兒多養為戲弄死即食之又有竹根蛇肘後謂之青蝰蛇不入藥用最毒喜緣竹木與竹同色大者長四五尺其尾三四寸有黑點者名熇尾蛇毒尤猛烈中之者急灸三五壯毒即不行仍以藥敷之又有菜花蛇亦長大黃緑色方家亦有用之者千金方貓鬼野道歌哭不自由五月五日自死赤蛇燒灰井華水服方寸匕日一服蚖有毒蚖主療痹內漏名醫別録破傷中風大風惡疾本草綱目名虺俗呼土虺地山間草澤所在有之時生驚蟄後採夏秋捕之用肉質長尺余如蝮蛇而小色身如土色合治普濟方破傷風牙關緊急口噤不開口面喎斜肢體弛緩用土虺蛇一條去頭尾腸皮骨醋炙地龍五條去泥醋炙天南星八錢重一枚炮右為末醋煮麵糊丸如緑豆大每服三丸至五丸生薑酒下仍食稀蔥白粥取汗即瘥昔宮使明光祖向任統制官被重傷服此得效贋名醫別録云蚖類一名蚖短身土色而無紋李時珍云蚖與蝮同類即虺也蝮大而蚖小其毒則一食經所謂虺色如土小於蝮蛇者是也舊本作蚖類一名蚖誤矣當作蚖蝮類一名𧈭𧈭即虺字蚖𧈭字像相近傳寫脫誤爾陶氏注蝮即蚖亦誤矣蚖既是蝮別録不應兩出今並改正天蛇有毒天蛇本草綱目地李時珍按沈存中筆談云天蛇生幽陰之地遇雨後則出越人深畏之質其大如箸而匾長三四尺色黃赤治水蛇治天蛇毒見前解李時珍曰錢塘一田夫忽病癩通身潰爛號呼欲絶西溪寺僧視之曰此天蛇毒非癩也以秦皮煮汁一斗令其恣飲初日減半三日頓愈贋又云天蛇不知何物人遭其螫乃為露水所濡則遍身潰爛或云草間花蜘蛛者非矣廣西一吏為蟲所毒舉身潰爛一醫視雲天蛇所螫不可治矣仍以藥敷其有一腫處以鉗拔出如蛇十餘而疾終不起沈存中筆談云若見天蛇治法澆之以醋則消或以石灰糝之亦死蛇角有毒蛇角主消腫毒以毒攻毒也本草綱目名骨咄犀亦作骨篤碧犀李時珍按陶九成輟耕録云骨咄犀大蛇之角也當作蠱毒謂其解蠱毒如犀角也唐書有古都國亦産此則骨咄又似古都之訛也地按大明會典云蛇角出哈密衛劉郁西域記云骨篤犀即大蛇角出西番地色曹昭格古論云骨篤犀碧犀也色如淡碧玉稍有黃色其紋理似角扣之聲清越如玉磨刮嗅之有香燒之不臭最貴重能消腫解毒洪邁松漠記聞云骨咄犀犀不甚大紋如象牙帶黃色作刀靶者以為無價之寶也解諸毒蠱毒諸蛇諸蛇本草綱目李時珍云蛇字古作它俗作蛇有餘移他三音篆文象其宛轉屈曲之形其行委他故名嶺南人食之或呼為訛或呼為茅鱔按山海經云海外西南人以蟲為蛇號蛇為魚則自古已然矣蛇類璅語不可類從者萃族於下以便考閲蛇在禽為翼火天文象形居南方在卦為巽風巳為蛇在神為元武北方之神元龜纁蛇相合也在物為毒蟲出說文有水火草木土五種出北戶録青黃赤白黑金翠斑花諸色見各條毒蟲也而有無毒者金蛇水蛇無毒鱗蟲也而有生毛者蝮蛇紋間有毛山海經云長蛇毛如彘毫也卵生也而有胎産者蝮蛇胎生腹行也而有四足者鱗蛇千歲蝮苟印蜥蜴皆有足又有冠者雞冠蛇頭生有冠最毒角者三角蛇有角翼者西山經云太華山有蛇六足四翼名曰肥螿飛者山海經云柴桑多飛蛇荀子云螣蛇無足而飛獸首者大荒經云肅慎國有琴蛇獸首蛇身人面者江湖紀聞云嶺表有人面蛇能呼人姓名害人惟畏蜈蚣兩首者枳首蛇兩身者北山經云渾夕之山有蛇曰肥遺一首兩身見則大旱管子曰涸水之精名曰蟡狀如蛇一首兩身長八尺呼其名可取魚鱉岐尾者廣志云出雲南鉤尾者張文仲云鉤蛇尾如鉤能鉤人獸入水食之熇尾者葛洪云熇尾蛇似青蝰其尾三四寸有異色最毒柂形者張文仲云柂蛇形似柂長七八尺中人必死削船柂煮汁浸之杵形者即合木蛇又有青蝰即竹根蛇白蝰蒼虺紋蝮白頸黑甲赤目黃口之類張文仲云惡蛇甚多四五月青蝰蒼虺白頸大蜴六七月白蝰紋蝮黑甲赤目黃口反鉤三角之類皆毒之猛烈者又南方有詬蛇人若傷之不死終身伺其主雖百衆人中亦來取之惟百里外乃免耳蛇出以春出則食物蛇以春夏為晝秋冬為夜乎其蟄以冬蟄則含土至春吐出即蛇黃石其舌雙物理論云舌者心苗火旺於巳巳為蛇故蛇雙舌其耳聾埤雅云蛇聾虎齆其聽以目埤雅其蟠向壬淮南子其毒在涎弄蛇洗淨涎則無毒也蛇涎著人生蛇漠瘡吐涎成絲能害人目段成式云蛇怒時毒在頭尾其珠在口陸佃云龍珠在頷蛇珠在口懷珍之蛇多喜投暗見人張口吐氣如燼火狀其行也紆淮南子云蛇屬紆行其食也吞有牙無齒皮數解脫變化論云龍易骨蛇易皮性曉方藥出稽聖賦又異苑云田父見蛇被傷一蛇銜草敷之遂去其人採草治瘡名曰蛇銜蛇交蛇則雄入雌腹交已即退出也段成式云人見蛇交三年死李廷飛雲人見蛇交主有喜蛇交雉則生蜃及蟂詳見蛟龍魯至剛云蛇交雉生卵遇雷入土久則成蛟不入土但為雉耳述異記云江淮中有獸名能乃蛇精所化也冬則為雉春復為蛇耳蛇以龜鱉為雌埤雅云大腰純雌以蛇為雄蛇求於龜鱉則生龜鱉蛇求於雉則生蜃蛟物異而感同也又與鱧鱔通氣見本條入水交石班魚見本條入山與孔雀匹禽經云鵲見蛇則噪而奔孔雀見蛇則喜而躍竹化蛇蛇化雉異苑云大元中汝南人伐木見一竹中央已成蛇形而枝葉如故又桐廬民伐竹見蛇化雉頭項已就身猶蛇也乃知竹化蛇蛇化雉夔憐蛇蛇憐風出莊子水蛇化鱔名蛇鱔有毒螣蛇化龍神蛇能乘雲霧而飛遊千里螣蛇聽孕出變化論又抱朴子云螣蛇不交蟒蛇目圓出述異記大蛇曰蟒巴蛇吞象山海經云巴蛇食象三年而出其骨蚺蛇吞鹿詳本條元蛇吞麈大鹿也出山海經活褥蛇能捕鼠唐書云貞觀中波斯國獻之狀同鼠色正青能捕鼠食蛇鼠能捕蛇唐書云罽賓國有食蛇鼠尖喙赤尾能食蛇被蛇螫者以鼠嗅而尿之立愈蛇吞鼠而有齧蛇之鼠狼寇曰嘗見一烏蛇長丈餘有鼠狼齧蛇頭曳之而去亦相畏服耳蛇吞蛙而有制蛇之田父洽聞記云蝦蟆大者名田父見蛇則齧其尾良久蛇死尾後數寸皮不損而肉已盡矣蛇令豹止而有食蛇之貘淮南子云蛇令豹止物相制也貘乃白豹食蛇及鐵龜蛇同氣而有呷蛇之龜見攝龜元龜食蟒王起云以小制大禽之制在氣也螂蛆甘帶出莊子螂蛆蜈蚣也帶蛇也陸佃云蜈蚣見大蛇能以氣禁之啖其腦眼蟾蜍食螂蛆螂蛆食蛇蛇食蟾蜍物畏其天也墨客揮犀云蜈蚣逐蛇蛇即張口乃入其腹食之鴆步則蛇出鵙鳴則蛇結出禽經鴆鳥能禹步禁咒使大石自轉取蛇食之蛇入口即麋也鸛亦然鵙伯勞也鸛鶴鷹鶻鶖皆鳥之食蛇者也蛇鷹蛇鶻余見本條虎猴麂麝牛皆獸之食蛇者也玃猴食蛇牛食蛇則獨肝有毒蛇所食之蟲則蛙鼠燕雀蝙蝠鳥雛所食之草則芹茄石楠茱萸蛇粟噇子也所憎之物則蘘荷庵䕡蛇芮草鵝糞所畏之藥則雄黃雌黃羖羊角蜈蚣千金云入山佩武都雄黃雌黃或燒羖羊角煙或筒盛蜈蚣則蛇不敢近誤觸萵菜則目不見物出續墨客揮犀炙以桑薪則足可立出陳藏器云蛇有足見之不佳惟桑薪火炙之則見不足怪也陶弘景雲五月五日燒地令熱以酒沃之置蛇於上則足見蛇蟠人足淋以熱尿或沃以熱湯則自解蛇入人竅灸以艾炷或辣以椒末則自出以艾炷灸蛇尾或割破蛇尾塞以椒末即出內解蛇毒之藥則雄黃貝母大蒜薤白蒼耳外治蛇䘌之藥則大青鶴蝨苦苣堇菜射菵薑黃乾薑白礬黑豆葉黃荊葉蛇含草犬糞鵝糞蔡苴機糞鱮魚音序無毒卵生鱮魚肉主溫中益氣多食令人熱中發渴本草綱目名鰱魚李時珍云酒之美者曰鱮魚之美者曰鱮陸佃云鱮好群行相與也故曰鱮相連也故曰鰱傳云魚屬連行是矣地處處有之時採無時用肉質狀如鱅而頭小形扁細鱗肥腹故西征賦云華魴躍鱗素鱮揚鬐失水易死此弱魚也亦有花鰱色甚白味甘性溫禁不宜多食發瘡鱒魚無毒卵生鱒魚肉主暖胃和中本草綱目名鮅魚音必赤眼魚李時珍按說文云鱒鮅赤目魚也孫炎云鱒好獨行尊而必者故字從尊從必地處處有之時採無時用肉質狀似鯶而小赤脈貫瞳身圓而長鱗細於鱔好食螺蚌善於遁網色青質赤章味甘性溫禁不宜多食動風熱發瘡癬竹魚無毒卵生竹魚肉主和中益氣除濕氣本草綱目地出桂林湘漓諸江中時採無時用肉味如鱖魚肉為廣南珍品質狀如青魚大而少骨刺色如竹色青翠可愛鱗下間以朱點味甘性平鱤魚音感無毒卵生鱤魚肉主食之已嘔暖中益胃本草綱目名𩹴魚音紺鰥魚黃頰魚李時珍云鱤敢也𩹴璖也璖音陷食而無厭也健而難取吞陷同類力敢而璖物者也其性獨行故曰鰥詩云其魚魴鰥是矣苗異苑云諸魚欲産𩹴以頭沖其腹世謂之衆魚生母然諸魚生子必雄魚沖其腹仍尿白以蓋其子不必盡是𩹴子也地出江湖中時採無時用肉質體似鯮而腹平頭似鯇而口大頰似鮎而色黃鱗似鱒而稍細大者三四十斤啖魚最毒池中有此不能畜魚東山經云姑兒之水多鱤魚是也色黃味甘性平勒魚無毒卵生勒魚肉主開胃暖中作鯗尤良本草綱目名李時珍云魚腹有硬刺勒人故名地出東南海中時以四月至漁人設網候之聽水中有聲則魚至矣有一次二次三次乃止用肉鰓骨甜瓜生者用勒鯗骨插蒂上一夜便熟石首鯗骨亦然質狀如鰣魚小首細鱗腹下有硬刺如鰣腹之刺頭上有骨合之如鶴喙形像色白味甘性平臭腥行走胃經助佐補脾之藥制以鹽醃之曬乾者謂之勒鯗治摘元方用勒魚鰓治瘧疾以一寸入七寶飲酒水各半煎露一夜服鯊魚無毒卵生鯊魚肉主暖中益氣草綱目名鮀魚爾雅吹沙郭璞沙溝魚俗名沙鰮音問李時珍云此非海中沙魚乃南方溪澗中小魚也居沙溝中吹沙而遊咂沙而食鮀者肉多形圓陀陀然也地出南方溪澗中用肉質大者長四五寸其頭尾一般大頭狀似鱒體圓似鱔厚肉重唇細鱗背有鬐刺甚硬其尾不岐小時即有子俗呼為阿浪魚色身黃白色有黑斑點紋味甘頗美性溫平石斑魚子及腸有毒卵生石斑魚本草綱目名石礬魚延壽書高魚地生南方溪澗水石處質長數寸浮游水面聞人聲則劃然深入臨海水土記云長者尺余其性淫春月與蛇醫交牝故其子有毒南方異物志云高魚似鱒有雌無雄二三月與蜥蜴合於水上其胎毒人酉陽雜俎云石斑與蛇交南方有土蜂土人殺此魚標樹上引鳥食之蜂窠皆盡也色白鱗黑斑其斑如虎紋禁石斑魚子及腸不宜食之令人吐瀉解醫說云用魚尾草汁少許解之黃鯝魚音固無毒卵生黃鯝魚肉白煮汁飲主止胃寒泄瀉油主療瘡癬有蟲本草綱目名黃骨魚李時珍云魚腸肥曰鯝此魚腸腹多脂漁人煉取黃油燃燈甚鯹也南人訛為黃姑北人訛為黃骨魚地生江湖中小魚也時生無時採無時用魚汁魚油質狀似白魚而頭尾不昂遍身細鱗闊不逾寸長不近尺色白味甘性溫制可作鮓菹煎炙甚美禁油不宜燃燈昏人目鰷魚無毒卵生鰷魚肉煮食已憂主暖胃止冷瀉本草綱目名白鯈音條䱗魚音餐鮂魚音囚李時珍云鰷條也䱗粲也鮂囚也條其狀也粲其色也囚其性也地生江湖中小魚也時生無時採無時用肉質長僅數寸形狹而扁狀如柳葉鱗細而整性好群遊色潔白可愛味甘性溫制荀子曰鰷浮陽之魚也最宜鮓菹鱠殘魚無毒卵生鱠殘魚主作羹食寬中健胃食鑑本草名王餘魚綱目銀魚李時珍按博物志云吳王闔閭江行食魚鱠棄其殘餘於水化為此魚故名或又作越王及僧寶志者蓋出傳會不足致辨地出蘇松浙江時採二三月取之清明前有子食之甚美清明後子散而瘦但可作鮓臘彼人尤重小者曝乾以貨四方耳用肉作羹質大者長四五寸身圓如箸無鱗若已鱠之魚但目有兩黑點爾色潔白如銀故名銀魚味甘性平鱵魚音針無毒卵生鱵魚肉主食之無疫本草綱目名姜公魚俗名銅哾魚音稅臨海志李時珍云此魚喙有一針故有諸名俗名姜太公釣針亦傳會也地生江湖水中質大小形狀並同鱠殘但喙尖有一細黑骨如針為異耳東山經云𣲵水北注於湖中多鯈魚狀如鰷其喙如針即此味甘性平鱊魚音聿無毒卵生鱊魚肉主和中益氣令人喜悅本草綱目名春魚俗名作臘名鵝毛脡李時珍按爾雅云鱊鯞小魚也名義未詳春以時名也脠以干臘名也地段公路北戶録云廣之恩州出鵝毛脠用鹽藏之其細如毛其味絶美郭義恭所謂武陽小魚大如針一斤千頭蜀人以為醬者也又一統志云廣東陽江縣出之即鱊魚兒也然今興國州諸處亦有之彼人呼為春魚云自春月岩穴中隨水流出土人取收曝乾為脠以充苞苴食以姜醋味同蝦米質狀似初化魚苗或云即鱧魚苗也味甘性平金魚無毒卵生金魚肉主久痢噤口本草綱目地李時珍云金魚有鯉鯽鰍䱗數種鰍䱗尤難得獨金鯽耐久前古罕知惟博物志云出功婆塞江腦中有金蓋亦訛傳述異記載晉桓沖遊廬山見湖中有赤鱗魚即此也自宋始有畜養者今則處處人家養玩矣時春末生子於草上好自吞啖亦易化生用肉其肉味短而韌色初出黑色久乃變紅又或變白者名銀魚亦有紅白黑斑相間無常者味甘鹹性平治楊拱醫方摘要云久痢噤口病勢欲死用金絲鯉魚一尾重一二斤者如常治淨用鹽醬蔥必入胡椒末三四錢煮熟置病人前嗅之欲吃隨意連湯食一飽病即除根屢治有效忌物類相感志云金魚食橄欖渣肥皂水即死得白楊皮不生蝨又有丹魚不審即此類否今附於下丹魚綱目附録按抱朴子云丹水出京兆上洛縣冢嶺山入於汋水中出丹魚先夏至十夜伺之魚浮水側必有赤光上照若火割血塗足可以履冰䱱魚音啼有毒原本注鮧魚內綱目分條䱱魚肉主食之療瘕名醫別録無蠱疾本草綱目名人魚弘景孩兒魚李時珍云啼聲如孩兒故有諸名作鯷鮧者並非地陶弘景雲人魚荊州臨沮青溪多有之北山經云決水多人魚又云休水北注於洛中多䱱魚李時珍云孩兒魚有二種䱱魚生江湖中一種鯢魚生溪澗中質陶弘景雲形似鯷而有四足聲如小兒其膏然之不消耗秦始皇驪山冢中所用人膏是也寇宗奭云䱱魚形微似獺四足腹重墜如囊翅鱗與鮎鮠相類嘗剖視之中有小蟹小魚小石數枚也李時珍云䱱魚形如鮎鮠腹下翅形似足其腮頰軋軋音如兒啼即䱱魚也一種鯢魚形聲皆同但能上樹乃鯢魚也北山經云人魚狀如鯷四足音如小兒食之無瘕疾又云狀如蟄蜼而長距足白而對食之無蠱疾可以御兵按此二說前與陶合後與寇合蓋一物也今漁人網得以為不利即驚異而棄之蓋不知其可食如此也色身微紫色色如鮎鮠味甘贋徐鉉稽神録云謝仲玉者見一婦人出沒水中腰以下皆魚乃人魚也又徂異記云查道奉使高麗見海沙中一婦人肘後有紅鬣問之曰人魚也此二者乃名同物異非䱱鯢也魚師有毒魚師本草綱目李時珍按陳藏器諸魚注云魚師大者有毒殺人今無識者但唐韻云鰤老魚也山海經云歷𮏭之水有師魚食之殺人其即此魚魚魫音枕無毒魚魫本草綱目主能銷毒名醫別録名李時珍云諸魚腦骨曰魫曰丁魚尾曰魩音抹曰丙魚腸曰鯝曰乙魚骨曰鯁曰刺魚脬曰鰾曰白魚翅曰鰭曰鬣魚子曰䱊曰䲑地處處魚頭生此骨惟青魚者極大可作器解延壽書云能解蠱毒作器盛飲食遇蠱輒裂破也魚鱗魚鱗主食魚中毒煩亂或成症積燒灰水服二錢本草綱目名李時珍云鱗者𧂠也魚産於水故鱗似𧂠鳥産於林故羽似葉獸産于山故毛似草魚行上水鳥飛上風恐亂鱗羽也治名醫別録云諸魚鱗燒灰治魚骨鯁魚子魚子主療目中障翳本草綱目名䱊音米䲑音蟻苗孟詵云凡魚生子皆黏在草上及土中冬月寒冰過後亦不腐壞到五月三伏日雨中便化為魚李時珍云凡魚皆冬月孕子至春末夏初則於湍水草際生子有牡魚隨之灑白蓋其子數日即化出謂之魚苗最易長大孟氏之說蓋出謬傳也地處處魚腹中生之時生於春採二三月取之用李時珍云魚子古方未見用惟聖濟總録治目決明散中用之亦不言是何魚之子大抵當取青魚鯉鯽之屬爾合治聖濟總録方決明散治一切遠年障翳胬肉赤腫疼痛用魚子活水中生下者半兩以硫黃水溫洗淨石決明草決明青葙子穀精草枸杞子黃連炙甘草枳實麩炒牡蠣粉蛇蛻燒灰白芷龍骨黃柏各一兩白附子炮白蒺藜炒黃黃芩炒羌活各半兩虎睛一隻切作七片文武火炙乾每一料用一片右通為末每服三錢五更時茶服午夜再服赤白翳膜七日減去胬肉赤腫痛不可忍者三五日見效凡遇惱怒酒色風熱即疼者是活眼尚可醫治如不疼是死眼不必醫也忌豬魚酒面辛辣色欲墨頭魚綱目附録石首魚內李時珍云四川嘉州出之狀類鯶子長者及尺其頭黑如墨頭上有白子二枚又名北斗魚常以二三月出漁人以火夜照又之鰧魚綱目附録鱖魚內山海經云洛水多鰧魚狀如鱖居於逵蒼紋赤尾食之不癰可以治瘻郭注云鰧音滕逵乃水中穴道交通者愚按鰧魚之形狀居止功用俱與鱖魚同亦鱖之類也日華子謂鱖為水豚者豈此鰧與甲蟲緑毛龜無毒緑毛龜主通任脈助陽道補陰血益精氣治痿弱本草綱目名緑衣使者綱目金線緑毛龜俗名地李時珍云緑毛龜出南陽之內鄉及唐縣今惟蘄州以充方物養鬻者取自溪澗蓄水缸中飼以魚蝦冬則除水久久生毛用甲肉頭頸俱用質毛長四五寸毛中有金線脊骨有三稜其大如五銖錢者為真池龜久養亦生毛但大而無金線底色黃黑為異爾南齊書載永明中有獻青毛神龜者即此也又録異記云唐元宗時方士獻徑寸小龜金色可愛云置碗中能闢蛇虺之毒此亦龜之異者也色身上緑毛底甲如象牙色味甘酸性平制其法用龜九枚以活鯉二尾安釜中入水覆以米篩安龜在篩上蒸熟取肉曬乾其甲仍以酥炙黃入藥用治陳嘉謨云縛置額端能禁邪瘧收藏書笥可闢蠹蟲李時珍云此龜古方無用者近世滋補方往往用之大抵與龜甲同功劉氏先天丸用之鶚龜無毒鶚龜主婦人難産臨月佩之臨時燒末酒服本草拾遺地生南海中質陳藏器云狀如龜長二三尺兩目在側如鶚亦呼水龜非前水龜也旋龜綱目附録山海經云䟰陽之山怪水出焉中多旋龜鳥首虺尾聲如破木佩之已聾亦此類也賁龜音奔賁龜肉主食之闢時疾消腫山海經名三足龜爾雅地李時珍按山海經云狂水西注伊水中多三足龜食之無大疾可以已腫唐書云江州獻六眼龜宋史云趙霆獻兩頭龜大明會典云暹羅國獻六足龜此又前人所未知者也珠鱉無毒珠鱉肉主食之闢疫癘本草綱目地李時珍按山海經云葛山澧水有珠鱉一統志云生高州海中常吐珠質山海經云狀如肺而有目六足有珠一統志云狀如肺四目六足而吐珠呂氏春秋云澧水魚之美者名曰珠鱉六足有珠淮南子云蛤蟹珠鱉與月盛衰埤雅云鱉珠在足蚌珠在腹皆指此也味甘酸𪓬𪓹音迷麻綱目附録蠵龜內臨海水土記云狀似𪓟鼊而甲薄形大如龜味極美一枚有膏三斛朝音朝綱目附録蠵龜類李時珍曰又有朝亦如𪓟鼊腹如羊胃可啖並生海邊沙中撒八兒綱目附録玳瑁內劉郁西域記云出西海中乃玳瑁遺精蛟魚吞食吐出年深結成者其價如金僞作者乃犀牛糞也竊謂此物貴重如此必有功用亦不知果是玳瑁遺精否亦無所詢證姑附於此以俊博識石蜐音劫無毒石蜐主利小便本草綱目名紫𧉧音劫與蜐同紫虈音枵龜腳俗名地李時珍云石蜐生東南海中石上蚌蛤之屬質形如龜腳亦有爪狀殼如蟹螯真臘記云有長八九寸者江淹石蜐賦云亦有足翼得春雨則生花故郭璞賦云石蜐應節而揚葩荀子云東海有紫𧉧魚鹽是矣色其色紫可食味甘鹹性平贋或指為紫貝及石決明者皆非矣蝸螺音羅無毒原本名蝸籬未詳綱目改蝸螺甚悉蝸螺肉主燭館明目下水止渴名醫別録上燭館二字疑訛誤醒酒解熱利大小便消黃疸水腫療反胃痢疾脫肛痔漏本草綱目爛殼主痰飲積及胃脘痛本草衍義補遺反胃膈氣痰嗽鼻淵脫肛痔疾瘡癤下疳湯火傷本草綱目名螺螄李時珍云師衆多也其形似蝸牛其類衆多故有二名爛殼名鬼眼睛地陶隱居云生江夏溪水中李時珍云處處湖溪有之江夏漢沔尤多時採二三月取之春月人採置鍋中蒸之其肉自出酒烹糟煮食之清明後其中有蟲不堪用矣用肉並爛殼質小於田螺上有稜大如指頭而殼薄于田螺色青白味甘性寒惟食泥水臭腥制用肉隨方製法用爛殼李時珍云泥中及牆壁上年久者良火煅過用陳藏器云此物難死誤泥入壁中數年猶活也治永類方黃疸酒疸小螺螄養去泥土日日煮食飲汁有效小山怪證方黃疸吐血病後身面俱黃吐血成盆諸藥不效用螺十個水漂去泥搗爛露一夜五更取清服二三次血止即愈一人病此用之經驗扶壽精方五淋白濁螺螄一碗連殼炒熟入白酒三碗煮至一碗挑肉食之以此酒下數次即效簡便方小兒脫肛螺螄二三升鋪在桶內坐之少頃即愈濟急仙方痘疹目翳水煮螺螄常食佳葉氏摘元方白遊風腫螺螄肉入鹽少許搗泥貼之神效肘後方卒得咳嗽屋上白螺或白蜆殼搗為末酒服方寸匕正傳方濕痰心痛白螺螄殼洗淨燒存性研末酒服方寸匕立止孫氏方膈氣疼痛白玉散用壁上陳白螺螄燒研每服一錢酒下甚效淡寮方湯火傷瘡用多年乾白螺螄殼煅研油調敷奇效方陰頭生瘡用溪港年久螺螄燒灰敷之葉氏摘元方小兒哮疾向南牆上年久螺螄為末日晡時以水調成日落時舉手合掌皈依吞之即效談野翁方瘰癧已破土牆上白螺螄殼為末日日敷之醫方摘要痘瘡不收牆上白螺螄殼洗淨煅研摻之合治壽域方小兒軟癤用鬼眼睛即牆上白螺螄殼燒灰入倒掛塵等分油調塗之治楊梅瘡爛古牆上螺螄殼辰砂等分片腦少許為末搽之李時珍云螺乃蚌蛤之屬其殼大抵與蚌粉蛤粉蚶蜆之類同功合而觀之自可神悟海燕無毒海燕主陰雨發損痛煮汁服取汗即解亦入滋陽藥本草綱目地李時珍云海燕出東海質大一寸狀扁面圓身上有紋如菌茵口在腹下食細沙口旁有五路正勾即其足也色背上青黑腹下白脆似海螵蛸味咸性溫臨海水土記云陽遂足生海中色青黑腹白有五足不知頭尾生時體耎死即乾脆即此物也臨海異物志載燕魚長五寸陰雨則飛起丈餘此或同名者也海鏡綱目附録海月內李時珍云一名鏡魚一名瑣𤥐一名膏藥盤生南海兩片相合成形殼圓如鏡中甚瑩滑映日光如雲母內有少肉如蚌胎腹有寄居蟲大如豆狀如蟹海鏡飢則出食入則鏡亦飽矣郭璞賦云瑣𤥐腹蟹水母目蝦即此續集卷之七下蟲魚部裸蟲九香蟲無毒卵生九香蟲主膈脘滯氣脾腎虧損壯元陽本草綱目名黑兜蟲地李時珍云九香蟲産於貴州永寧衛赤水河中時採冬月取之至冬伏於石下土人多取之以充人事至驚蟄後即飛出不可用矣用全用質大如小指頭狀如水黽色身青黑色味咸性溫合治攝生方烏龍丸治上證久服益人四川何卿總兵常服有效其方用九香蟲一兩半生焙車前子微炒陳橘皮各四錢白朮焙五錢杜仲酥炙八錢上為末煉蜜丸梧桐子大每服一錢五分以鹽白湯或鹽酒服早晚各一服此方妙在此蟲雪蠶無毒雪蠶主解內熱渴疾本草綱目名雪蛆地李時珍按葉子奇草木子云雪蠶生陰山以北及蛾眉山北人謂之雪蛆二山積雪歷世不消其中生此時採夏月取之用全用質大如瓠色潔白味極甘美性大寒冰蠶續集分録王子年拾遺記云員嶠之山有冰蠶長六七寸黑色有鱗角以霜雪覆之則作繭長一尺抽五色絲織為文綿入水不濡投火不燎堯時海人獻之其質輕暖柔滑按此亦雪蠶之類也蘹香蟲蘹香蟲主小腸疝氣本草綱目地李時珍云生蘹香枝葉中時生四五六七八月採七八月取之用全用質狀如尺蠖色青味甘辛性溫臭香五倍子內蟲五倍子內蟲主赤眼爛弦本草綱目合治李時珍方用五倍子內蟲同爐甘石末乳細點之百藥煎無毒百藥煎主清肺化痰定嗽解熱生津止渴收濕消酒烏鬚髮止下血久痢脫肛牙齒宣䘌面鼻疳蝕口舌糜爛風濕諸瘡本草綱目質或作餅丸方圓大小不拘色純黑味酸鹹微甘性涼制李時珍云用五倍子為粗末每一斤以真茶一兩煎濃汁入酵糟四兩擂爛拌和器盛置糠缸中罯之待發起如發麵狀即成矣捏作餅丸曬乾用陳嘉謨云入藥者五倍子鮮者十斤舂細用瓷缸盛稻草蓋𨠭七日夜取出再搗入桔梗甘草末各二兩又𨠭一七仍搗仍𨠭滿七次取出捏餅曬乾用如無鮮者用乾者水漬為之又方五倍子一斤生糯米一兩滾水浸過細茶一兩上共研末入罐內封固六月要一七取開配合用又方五倍子一斤研末酒麴半斤細茶一把研末上用小蓼汁調勻入鉢中按緊上以長稻草封固另用籮一個多著稻草將藥鉢坐草中上以稻草蓋置淨處過一七後看藥上長起長霜藥已成矣或捏作丸或作餅曬乾才收用治李時珍云百藥煎功用與五倍子不異但經釀造其體輕虛其性浮收且味帶余甘治上焦心肺咳嗽痰飲熱渴諸病含噙尤為相宜普濟方沐發除䐈百藥煎末干搽發上一夜篦之聖濟總録方風熱牙痛百藥煎泡湯噙漱醫林集要方腳肚生瘡初起粟米大搔之不已成片包腳相交黃水出癢不可忍久成痼疾用百藥煎末唾調遂瘡四圍塗之自外入內先以貫衆煎湯洗之日一次經驗方乳結硬痛百藥煎末每服三錢酒一盞煎數沸服之取效王璆百一選方腸風下血百藥煎二兩半生用半炒存性為末飯丸梧子大每服五十丸米飲下名聖金丸集簡方大腸氣痔作痛下血百藥煎末每服三錢稀粥湯調服日二次合治丹溪心法方斂肺劫嗽百藥煎訶黎勒荊芥穗等分為末薑汁入蜜和丸芡子大時時噙之瀕湖醫案方定嗽化痰百藥煎片黃芩橘紅甘草各等分共為細末蒸餅丸緑豆大時時咽數丸佳筆峰雜興方清氣化痰百藥煎細茶各一兩荊芥穗五錢海螵蛸一錢蜜丸芡子大每服噙一丸妙普濟方染烏鬚髮用百藥煎一兩針砂醋炒蕎麥麵各半兩先洗鬚髮以荷葉熬醋調刷荷葉包一夜洗去即黑妙又方揩牙烏須用百藥煎半兩延胡索三錢雄黃三錢為末先以姜擦去涎用此揩牙以津洗目日日用之甚佳此方又治牙痛引頭又方牙齦疳蝕百藥煎五倍子青鹽煅各一錢半銅緑一錢為末日摻二三次神效又方男婦血淋用真百藥煎車前子炒黃連各三錢半木香二錢滑石一錢為末空心燈草湯服二錢日二服外科精義方煉眉瘡癬小兒面湮瘡又名煉銀瘡乃母受胎時食酸辣邪物所致用百藥煎五錢生白礬二錢為末油調搽之直指方腸癰內痛大棗連核燒存性百藥煎等分為末每服一錢溫酒服日一取效聖惠方大腸便血百藥煎荊芥穗燒存性等分為末糊丸梧子大每服五十丸米飲下濟生方腸風臟毒下血者用百藥煎燒存性烏梅連核燒過白芷不見火為末水糊丸如梧子大每服七十丸米飲下本事方酒痢下血百藥煎五倍子陳槐花等分焙研末酒糊丸梧子大每服五十丸米飲送下聖濟總録方下痢脫肛百藥煎一塊陳白梅三個木瓜一握以水一碗煎半碗日二服事林廣記消暑止渴百藥煎蠟茶等分為末烏梅肉搗和丸芡子大每含一丸名水瓢丸螳螂卵生螳螂神農本經主小兒急驚風搐搦又出箭鏃生者能食疣目本草綱目名蟷螂音當郎刀螂綱目拒斧說文不過爾雅莫貈同上蟷蠰同上蝕疣音尤郭璞云江東呼為石螂李時珍云蟷螂兩臂如斧當輒不避故得當郎之名俗呼為刀螂燕人謂之拒斧又呼不過也蘇頌按爾雅云莫㼌蟷蠰不過螳螂也燕趙之間謂之蝕疣疣即疣子小肉贅也今人病疣者往往捕此食之其來有自矣代人謂之天馬因其首如驤馬也又揚雄方言云螳螂或謂之髡或謂之羊匕齊兗以東謂之敷常苗陶弘景雲螳螂俗呼石螂逢樹便産以桑上者為好是兼得桑皮之津氣也用時宜於桑樹上捕之地處處樹木花草上有之時生三四月中一窠出小螳螂數百枚至芒種節後一齊出故月令有云仲夏螳螂生也採五六七月取之用全用質李時珍云螳螂驤首奮臂修頸大腹二手四足善緣而捷以須代鼻喜食人發能翳葉捕蟬或云術家取翳作法可以引形深秋乳子作房黏著枝上即螵蛸也色青緑治李時珍云螳螂古方不見用者惟普濟方治驚風吹鼻定搐法中用之蓋亦蠶蠍定搐之義古方風藥多用螵蛸即知螳螂治風同一理也又醫林集要云出箭鏃亦用之合治普濟方驚風定搐中分散用螳螂一個蜥蜴一條赤足蜈蚣一條各中分之隨左右研末記定男用左女用右每以一字吹鼻內搐之吹左即左定吹右即右定也醫林集要方箭鏃入肉不可拔者用螳螂一個巴豆半個同研敷傷處微癢且忍極癢乃撼拔之以黃連貫衆湯洗拭石灰敷之蛺蝶蛺蝶主小兒脫肛陰乾為末唾調半錢塗手心以瘥為度本草綱目名𧌄音葉蝶蝴蝶李時珍云蛺蝶輕薄夾翅而飛枼枼然也蝶美於須蛾美於眉故又名蝴蝶俗謂須為胡也地古今注謂橘蠹化蝶爾雅翼謂菜蟲化蝶列子謂烏足之葉化蝶埤雅謂蔬菜化蝶酉陽雜俎謂百合花化蝶北戶録謂樹葉化蝶如丹青野史謂彩裙化蝶皆各據其所見者而言爾蓋不知蠹蠋諸蟲至老俱各蛻而為蝶為蛾如蠶之必羽化也朽衣物亦必生蟲而化草木花葉之化者乃氣化風化也楊慎丹鉛録云有草蝶水蝶在水中嶺南異物志云有人浮南海見蛺蝶大如蒲帆稱肉得八十斤啖之極肥美時生春夏秋間採春夏秋取之用全用質李時珍云蝶蛾類也大曰蝶小曰蛾其種甚繁皆四翅有粉好嗅花香以須代鼻其交以鼻交則粉退色有五色亦各隨其蟲所食花葉及所化之物而然治李時珍云蝴蝶古方無見用者惟普濟方載此前方治脫肛亦不知用何等蝶也棗貓棗貓主小兒臍風本草綱目地生棗樹上飛蟲也時生夏秋採夏秋取之收採得陰乾用之用全用質大如棗子有兩角色青灰色合治李時珍云棗貓古方無考近世方廣丹溪心法附余治小兒臍風初生時以綿裹臍帶離臍五六寸扎定咬斷以鵝翎筒送藥一二分入臍大孔輕輕揉散以艾炷灸臍頭三壯結住勿打動候其自落永無臍風之患萬不失一臍硬者用之軟者無病不必用也其法用陰乾棗貓研末三個真珠槌研四十九粒炒黃丹五分白枯礬蛤粉血竭各五分研勻如上法用臍有三孔一大二小也蟻卵生蟻本草綱目獨腳蟻主疔腫疽毒搗塗之本草拾遺名黑駒亦作蚼蚍蜉李時珍云蟻有君臣之義故字從義亦作蟻大者為蚍蜉亦曰馬蟻赤者名蠪飛者名螱揚雄方言云齊魯之間謂之蚼蟻梁益之間謂之黑駒幽燕之間謂之蟻蛘大蟻喜酣戰故有馬駒之稱而崔豹古今注遂以蟻妖附會其說謬矣今不取地處處有之穴居卵生其居有等其行有隊能知雨候壅土成封曰蟻封曰及蟻垤蟻塿蟻冢壯其如封垤塿冢也其卵名蚔音遲山人掘之有至鬥石者古人食之故內則周官饋食之豆有蚔醢也今惟南夷食之劉恂嶺表録異云交廣溪峒間酋長多取蟻卵淘淨為醬云味似肉醬非尊貴不可得也又云嶺南多蟻其窠如薄絮囊連帶枝葉彼人以布袋貯之賣與養柑子者以闢蠹蟲五行記云後魏時兗州有赤蟻與黑蟻鬥長六七步廣四寸赤蟻斷頭死則離騷所謂南方赤蟻若象黑蜂若壺者非寓言也又按陳藏器言嶺南有獨腳蟻一足連樹根下止能動搖不能脫去亦一異者也時生無時採無時按夏小正云十二月黑蚼奔謂蟻入蟄也春出冬蟄用全用質有大小不等色有黑白黃赤四種白蟻綱目附録李時珍云白蟻即蟻之白者一名螱一名飛蟻穴地而居蠹木而食因濕營土大為物害初生為蟻蝝音鉛至夏遺卵生翼而飛則變黑色尋亦隕死性畏烰炭桐油竹雞等物云蛆無毒化生糞中蛆主小兒諸疳積疳瘡熱病譫妄毒痢作吐本草綱目名李時珍云蛆行趑趄故謂之蛆或云沮洳則生亦通地出糞坑中時生五六七月採五六月取之收用米泔浸洗淨曬焙收之用全用質與米蟲相類尾尖色白味咸性寒制洗淨炙乾為末或焙或曬亦可治小兒熱疳尿如米泔大便不調糞蛆燒灰雜物與食之熱痢吐食因服熱藥而致者用糞中蛆流水洗淨曬乾為末每服一錢米飲下合治聖濟總録方治一切疳疾六月取糞坑中蛆淘浸入竹筒中封之待乾研末每服一二錢入麝香米飲服之又方用蛆蛻米泔逐日換浸五日再以清水換浸三日曬焙為末入黃連末等分每半兩入麝香五分以獖豬膽汁和丸黍米大每服三四十丸米飲下神效總微論方小兒𦯚積用糞中蛆洗浸曬乾為末入甘草末少許米糊丸梧子大每服五七丸米飲下甚妙齒鼻疳瘡糞蛆有尾者燒灰一錢褐衣灰五分和勻頻吹神效無比泥中蛆主目赤洗淨曬研貼之綱目附録保命集方眼目赤瞎青泥中蛆淘淨曬乾為末令患人仰臥合目每次用一錢散目上須臾藥行待少時去藥蝦蟆肉蛆主小兒諸疳綱目附録直指方治小兒疳積及無辜疳一服退熱二服煩渴止三服瀉痢住用端午午時取蝦蟆金眼大腹不跳不鳴者槌死置尿桶中候生蛆食盡取蛆入新布袋懸長流水中三日新瓦焙乾入麝香少許為末每空心以砂糖湯調服或粳米糊為丸每用米飲服二三十丸馬肉蛆主針箭入肉中及取蟲牙綱目附録普濟如神散取牙用肥赤馬肉一斤入硇砂二兩拌和候生蛆取曬乾為末每一兩入粉霜半錢研勻先以針撥動牙根四畔空虛次以燈心蘸末少許點之良久自落又祕韞利骨散用白馬腦上肉一二斤待生蛆與烏骨白雞一隻食之取糞陰乾每一錢入硇砂一錢研勻用少許擦疼處片時取之即落蠅卵化生蠅主拳毛倒睫以臘月蟄蠅乾研為末以鼻頻嗅之即愈本草綱目名李時珍云蠅飛營營其聲自呼故名地處處有之夏出冬蟄喜暖惡寒蒼者聲雄壯負金者聲清聒青者糞能敗物巨者首如火麻者茅根所化蠅聲在鼻而足喜交其蛆胎生蛆入灰中蛻化為蠅如蠶蠍之化蛾也蠅溺水死得灰復活故淮南子云爛灰生蠅古人憎之多有闢法一種小蟢蛛專捕食之謂之蠅虎者是也時生四五六七月採臘月取之用全用質大小不等色有蒼者青者金者麻者禁金者麻者不宜用李時珍云蠅古方未見用者近時普濟方載此法云出海上名方也狗蠅卵生狗蠅主痰瘧不止痘瘡倒黶本草綱目地出狗身上時生夏秋採無時冬月則藏狗耳中用頭身去翅足質狀如蠅能飛堅皮利喙啖咂狗血色黃治李時珍曰狗蠅古方未見用者近世醫方大成載治瘧方痰瘧不止活取一枚去翅足麵裹為丸衣以黃丹發日早米飲吞之得吐即止或以蠟丸酒服亦可又齊東野語載托痘方蓋亦鼠負牛蝨之類耳周密云同僚括蒼陳坡老儒也言其孫三歲時發熱七日痘出而倒黶色黑唇口冰冷危證也遍試諸藥不效因求卜遇一士告以故士曰恰有藥可起此疾甚奇因為經營少許持歸服之移時即紅潤也常懇其方乃用狗蠅七枚擂細和醅酒少許調服爾夫痘瘡固是危事然不可拘大要在固臟氣之外任其自然耳或有變證則不得不資於藥也壁蝨綱目附録李時珍曰即臭蟲也狀如酸棗仁咂人血食與蚤蝨皆為床榻之害古人多於席下置麝香雄黃或菖蒲末或蒴藿末或楝花末或蓼末或燒木瓜煙黃柏煙牛角煙馬蹄煙以闢之也牛蝨卵生牛蝨主預解小兒痘疹毒焙研服之本草綱目名牛蔗音卑李時珍云蔗亦作蜱按呂忱字林雲蔗齧牛蝨也地出牛身上時生無時採無時用入藥用白色者質狀如萆麻子色有白黑二色禁李時珍云牛蝨古方未見用者近世預解痘毒時或用之按高仲武痘疹管見云世俗用牛蝨治痘考之本草不載竊恐牛蝨齧血滿腹時自墜落地啖血之物例比虻蟲終非痘家所宜而毒亦未必能解也解談野翁方預解痘毒用白水牛蝨一歲一枚和米粉作餅與兒空腹食之取下惡糞終身可免痘瘡之患一方用白牛蝨四十九枚焙緑豆四十粒硃砂四分九釐研末煉蜜丸小豆大以緑豆湯下雲師綱目附録石蠶內遁甲開山圖云霍山有云師榮氏注云如蠶長六寸有毛似兔云布時則出在石內可炙食之此亦食蠶之類也雨虎綱目附録石蠶內遁甲開山圖云霍山有雨虎榮氏注云如蠶長七八寸似蛙雨下時則出在石內可炙食之此亦食蠶之類也龐降綱目附録青蚨內劉恂嶺表録異云龐降主於嶺南多在橄欖樹上形如蜩蟬腹青而薄其名自呼但聞其聲而鮮能得之人以善價求為媚藥按此形狀似蟬可為媚藥與李珣海藥青蚨雌雄不捨祕精之說相符恐亦青蚨之類在木上者也乳蟲無毒化生乳蟲主補虛羸益胃氣溫中明目本草綱目名土蛹廣雅蠁蟲同上地李時珍按白獺髓云廣中韶陽屬邑鄉中有乳田其法掘地成窖以粳米粉鋪入窖中蓋之以草壅之以糞候雨過氣蒸則發開而米粉皆化成蛹時生無時制即成採候化成取之用全用質狀如蠐螬色白味甘性溫制取蛹作汁和粳粉蒸成乳食味甚甘美也此蠐螬之類出自人為者淮南萬畢術所謂置黍溝中即生蠐螬廣雅所謂土蛹蠁蟲者皆此物也代服食用此代蠐螬更覺有功無毒柳蠹蟲有小毒化生柳蠹蟲主瘀血腰脊瀝血痛心腹血痛風疹風毒目中膚翳功同桑蠹糞主腸風下血産後下痢口瘡耳腫齒齦風毒本草綱目名柳蛀蟲地出柳木中甚多時生夏秋採秋冬取之李時珍曰至春夏間化為天牛用柳蠹末及屎質狀類蠐螬色內外潔白味甘辛性平合治幼幼新書方治口瘡風疳小兒病用柳木蛀蟲屎燒存性為末入麝香少許搽之雜木亦可御藥院方治齒齦風腫用柳蠹末半合赤小豆炒黑豆炒各一合柳枝一握地骨皮一兩每用三錢煎水熱漱肘後方治耳腫風毒腫起出血取柳蠹蟲糞化水濾清汁調白礬末少許滴之贋李時珍云諸家注蠐螬多取此亦誤矣桂蠹蟲無毒化生桂蠹蟲主去冷氣本草拾遺除寒痰澼飲冷痛糞主獸骨鯁煎醋漱咽本草綱目名桂蛀蟲地陳藏器云此桂樹中蟲辛美可啖用全身及糞色紫味辛性溫臭香治李時珍按漢書陸賈傳南越尉陀獻桂蠹二器又大業拾遺録云隋時始安獻桂蠹四瓶以蜜漬之紫色辛香有味啖之去痰飲之疾則此物自漢隋以來用充珍味矣棗蠹蟲化生棗蠹蟲屎主聤耳出惡水本草綱目名棗蛀蟲地出棗樹中時生無時採無時用糞質李時珍云此即蝤蠐之在棗樹中者色白味甘性溫治普濟方治耳中出膿水用屎研末同麝香少許吹之竹蠹蟲化生竹蠹蟲主小兒蠟梨頭瘡蛀末主聤耳出膿水湯火傷瘡本草綱目名竹蛀蟲地出諸竹中時生無時採無時用全身及蟲蛀末質狀如小蠶老則羽化為硬翅之蛾色黃白治李時珍曰竹蠹蟲古方未見用者惟袖珍方治小兒蠟梨頭瘡取慈竹內者搗和牛溺塗之外臺祕要方湯火傷瘡竹蟲蛀末敷之良合治朱氏集驗方治耳出臭膿用竹蛀蟲末胭脂坯子等分麝香少許為末吹之聖惠方聤耳出水苦竹蛀屑狼牙白蘞等分為末和勻頻摻之普濟方耳膿作痛因水入耳內者如聖散用箭竿內蛀末一錢膩粉一錢麝香半錢為末以綿杖繳盡送藥入耳以綿塞定有惡物放令流出甚者三度必愈救急方牙齒疼痛蛀竹屑陳皮各一兩為末烏梅肉同研如泥敷之又方治濕毒臁瘡用枯竹蛀屑黃檗末等分先以蔥椒茶湯洗淨搽之日一上按淮南萬畢術云竹蟲飲人自言其誠高誘注云以竹蟲三枚竹黃十枚和勻用一大豆許燒入酒中令人飲之勿至大醉叩問其事必得其誠此法傳自古典未試其果驗否姑載之蒼耳蠹蟲化生蒼耳蠹蟲主疔腫惡毒本草綱目名麻蟲地生蒼耳梗中時生夏月採春夏秋冬多可取之收取之時但看梗有大蛀眼者以刀截去兩頭不蛀梗多收線縛掛檐下其蟲在內經年不死用時取出細者以三條當一用之用全身質狀如小蠶色青治李時珍方治疔腫惡瘡用蒼耳蠹蟲燒存性研末油調塗之即效或以麻油浸死收貯每用一二枚搗敷即時毒散大有神效合治劉松石經驗方治一切疔腫及無名腫毒惡瘡用蒼耳草梗中蟲一條白梅肉三四分同搗如泥貼之立愈聖濟總録方用麻蟲炒黃色白殭蠶紅茶各等分為末蜜調塗之又方用蒼耳節內蟲四十九條捶碎入人言少許捶成塊刺瘡令破敷之少頃以手撮出根即愈解李時珍云蒼耳解疔腫腫毒故蟲亦與之同功古方不見用近時方法每用之青蒿蠹蟲化生青蒿蠹蟲主急慢驚風本草綱目名青蒿蛀蟲地出青蒿節間蟲也時生四五六月採五六月取之收或曬乾或焙乾陰乾亦可用全身質狀如小蠶久亦成蛾色青白合治李時珍云治急慢驚風用蟲搗和硃砂汞粉各五分丸粟粒大一歲一丸乳汁服此蟲古方不見用者保嬰集用治驚風雲十不失一其詩云一半硃砂一半雪其功只在青蒿節任教死去也還魂服時須用生人血皂莢蠹蟲化生皂莢蠹蟲主豁痰通關格功同皂莢祛風痹品彙續集名皂莢蛀蟲地出皂莢中時生八九月中採九十月取之用全身質狀如草葉上青蟲微黑便出所以不見俗人見其有蟲孔而未嘗見蟲形皆言不可近令人惡病殊不爾也若不待時候細心採之恐難得耳色始青色後黑色味辛性溫治危氏得效方治蠅入耳害人研爛同鱔魚血點之茶蛀蟲化生茶蛀蟲蛀屑主聤耳出汁本草綱目地李時珍云此裝茶籠內蛀蟲也時生夏秋採無時用屎並蛀屑色青治聖惠方治耳中出惡汁研末日日繳淨摻之收濕自愈天牛有毒化生天牛主瘧疾寒熱小兒急驚風及疔腫箭鏃入肉去痣靨本草綱目名天水牛綱目八角兒同上一角者名獨角仙李時珍云此蟲有黑角如八字似水牛角故名亦有一角者地處處有之云是蠍蠹所化者時生春雨後夏月有之出則主雨採春夏秋時取之用春夏秋用天牛身冬月用其窠質陳藏器注蠐螬云蠍蠹在朽木中食木心穿如錐刀身長足短節慢無毛至春雨後化為天牛兩角狀如水牛亦有一角者上下緣木飛騰不遠李時珍云大如蟬有甲甲下有翅能飛目前有二角甚長前向如水牛角能動其喙扁如鉗甚利亦似蜈蚣六足乃諸樹蠹蟲所化也按爾雅嚷齧桑也郭璞注云狀似天牛長角善齧桑樹作孔藏之江東呼為齧發此以天牛齧桑為二物也考蘇東坡天水牛詩云兩角徒自長空飛不服箱為牛竟何益利吻穴枯桑此又謂天牛即齧桑也大抵在桑樹者即為齧桑爾一角者名獨角仙也色身有甲黑光如漆甲上有黃白點兩角黑色口黑喙亦黑一角者色黑背有白點制去甲翅角足焙乾代如冬月無此用其窠代之治李時珍云天牛獨角仙本草不載宋金以來方家時用之聖惠治小兒急驚風吹鼻定命丹宣明方點身面痣靨芙蓉膏中俱用獨角仙蓋亦毒物也藥多不録蠍化天牛有毒蠐螬化蟬無毒又可見蠐螬與蠍之性味良惡也合治治疔腫惡毒透骨膏用八角兒楊柳上者陰乾去殼四個巴豆仁一個粉霜雄黃麝香少許蟾酥半錢先以八角兒研如泥入溶化黃蠟少許同衆藥末和作膏子密收每以針刺瘡頭破出血用榆條送膏子麥粒大入瘡中以雀糞二個放瘡口瘡𦧔即止不必再用也如針破無血系是著骨疔即男左女右中指甲末刺出血糊藥又無血即刺足大拇血糊藥如都無血必難醫也治箭鏃入肉用天水牛取一角者小瓶盛之入硇砂一錢同水數滴在內待自然化水取滴傷處即出也聖惠方治寒熱瘧疾發渴往來不定用豬膏丸豬膏二兩獨角仙一枚獨頭蒜一個樓蔥一握五月五日三家粽尖於五月五日五更時淨處露頭赤腳舌拄上齶回面北向搗一千丸皂子大每以新綿裹一丸係臂上男左女右其瘧即止忌如用透骨膏時應忌冷水灶馬化生灶馬主竹刺入肉取一枚搗敷本草綱目名灶雞俗名地處處有之穴灶而居時生無時採無時用全身質按酉陽雜俎云灶馬如促織稍大腳長好穴灶旁俗言灶有馬足食之兆色黃黑促織綱目附録李時珍云促織蟋蟀也一名蛬一名蜻蛚陸機詩義疏云似蝗而小正黑有光澤如漆有翅及角善跳好鬥立秋後則夜鳴豳風雲七月在野八月在宇九月在戶十月蟋蟀入我床下是矣古方未用附此以俟竹蝨有毒竹蝨主中風半身不遂能透經絡追涎本草綱目名竹佛子綱目天厭子地出諸竹及草木上皆有之古方未見用者惟南宮從蚼螻神書云江南巴卬吳越荊楚之間春秋竹內有蟲似蝨而蒼可治中風即此竹蝨也時生春秋採不時取之收取之陰乾用全用質初生如粉點久便能動百十成簇形大如蝨或云濕熱氣化或云蟲卵所化色蒼灰色治岣嶁神書方中風偏痹半身不遂者用麻黃以湯熬成糊攤紙上貼不病一邊上下令遍但除七孔其病處不糊以竹蝨焙為末三錢老人加麝香一錢研勻熱酒調服就臥須臾藥行如風聲口吐出惡水身出臭汗如膠乃急去糊紙別溫麻黃湯浴之暖臥將息淡食十日手足如故也蜉蝣綱目附録蜣螂內李時珍云蜉蝣一名渠略似蛣蜣而小大如指頭身狹而長有角黃黑色甲下有翅能飛夏月雨後叢生糞土中朝生暮死豬好啖之人取炙食云美於蟬也蓋蜣螂蜉蝣腹蜟天牛皆蠐螬蠹蠍所化此亦蜣螂之一種不可不知也或曰蜉蝣水蟲也狀似蠶蛾朝生暮死蚊子綱目附録蜚虻內李時珍云蚊處處有之冬無夏有晝伏夜飛細身利喙咂人膚血大為人害一名白鳥一名暑蚊或作黍民謬矣化生於木葉及爛灰中産子於水中為孑子蟲仍變為蚊也龜鱉畏之螢火蝙蝠食之故煮鱉入數枚即易爛也陳藏器曰嶺南有蚊子木葉如冬青實如枇杷熟則蚊出塞北有蚊母草葉中有血蟲化而為蚊江東有蚊母鳥一名鷏每吐蚊一二升也蚋子綱目附録蜚虻內元稹長慶集云蜀中小蚊名蚋子又小而黑者為蟆子微不可見與塵相浮上下者為浮塵子皆巢於巴蛇鱗中能透衣入人肌膚齧成瘡毒人極苦之惟搗楸葉敷之則瘥又祝穆方輿勝覽云雲南烏蒙峽中多毒蛇鱗中有蟲名黃蠅有毒齧人成瘡但勿搔以冷水沃之擦鹽少許即愈此亦蚋蟆之類也沙蝨沙蝨本草綱目名𧍲䗠音梗旋廣雅蓬活萬畢術地牌地生在水中質大不過蟣色赤禁入人皮中殺人解葛洪抱朴子云蝨水陸皆有之雨後人晨暮踐沙必著人如毛髮刺人便入皮里可以針挑取之正赤如丹不挑入肉能殺人凡遇有此蟲處行還以火炙身則蟲隨火去也肘後方云山水間多沙蝨甚細略不可見人入水中及陰行草中此蟲多著人鑽入皮里令人皮上如芒針刺赤如黍豆刺三日之後寒熱發瘡蟲漸入骨則殺人嶺南人初有此以茅葉或竹葉挑刮去之仍塗苦苣汁已深者針挑取蟲子正如疥蟲也李時珍云溪毒射工毒沙蝨毒三者相近俱似傷寒故有挑沙之法今俗病風寒者皆以麻及桃柳枝刮其遍身赤曰刮沙蓋始於刮沙病也沙病亦曰水沙水傷寒初起如傷寒頭痛壯熱嘔惡手足指末微厥或腹痛悶亂須臾殺人者謂之攪腸沙也沙蟲綱目附録録異記云潭袁處吉等州有沙蟲即毒蛇鱗甲中蟲蛇被苦每入急水中碾出人中其毒三日即死此亦沙蝨之類也風驢肚內蟲濕生風驢肚內蟲主目中膚翳本草綱目地李時珍云凡人畜有風病瘡病腸肚內必有蟲也此生風驢肚中時生無時採無時用以烏驢肚內者為良合治聖惠方治目翳用此蟲三七枚曝乾入石膽半錢同研瓷盒收勿令見風每日點三五次其翳自消金蠶大毒金蠶本草綱目名食錦蠶地蔡絛叢話云金蠶始於蜀中近及湖廣閩粵浸多質狀如蠶色金色治陳藏器云故錦灰療食錦蟲蠱毒注云蟲屈如指環食故緋帛錦如蠶之食葉也今考之此蟲即金蠶也禁此蠶日食蜀錦四寸南人畜之取其糞置飲食中以毒人人即死也蠶得所欲日置他財使人暴富然遣之極難水火兵刃所不能害必倍其所致金銀錦物置蠶於中投之路旁人偶收之蠶隨以往謂之嫁金蠶不然能入人腹殘齧腸胃宛然而出如尸蟲也有人守福清民訟金蠶毒治求不得或令取兩刺蝟入其家捕之必獲蝟果於榻下牆隙擒出夫金蠶甚毒若有鬼神而蝟能制之何耶又幕府燕閒録云池州進士鄒閬家貧一日啓戶獲一小籠內有銀器持歸覺股上有物蠕蠕如蠶金色爛然遂撥去之仍復在舊處踐之斫之投之水火皆即如故閬以問友人友人曰此金蠶也備告其故閬歸告妻云吾事之不能送之家貧何以生為遂吞之家人謂其必死寂無所苦竟以壽終豈至誠之盛妖不勝正也解李時珍謂金蠶之蠱為害甚大故備書二事一見此蠶畏蝟一見至誠勝邪也夷堅志言中此蠱者吮白礬味甘嚼黑豆不腥以石榴根皮煎汁吐之醫學正傳用樟木屑煎汁吐之亦一法也李時珍意不若以蝟皮治之為勝其天唼臘蟲音霎唼臘蟲綱目總附諸蟲內地裴淵廣州記云林任縣有甲蟲嗜臭肉人死食之都盡紛紛滿屋不可驅質張華博物志云廣州西南數郡人將死便有飛蟲狀如麥集入舍中人死必食不可斷遣惟剩殘骨乃去解用梓板作器此蟲即不來林邑國記云廣西南界有唼臘蟲食死人惟豹皮覆尸則不來按此三說皆一物也其蟲雖不入藥而為人害不可不知水虎綱目附録溪鬼蟲內襄沔記云中廬縣有涑水注沔中有物如三四歲小兒甲如鱗鯉射不能入秋曝沙上膝頭似虎掌爪常沒水出膝示人小兒弄之便咬人人生得者摘其鼻可小小使之名曰水虎鬼彈綱目附録溪鬼蟲內南中志云永昌郡有禁水惟十一二月可渡余月則殺人其氣有惡物作聲不見其形中人則青爛名曰鬼彈
