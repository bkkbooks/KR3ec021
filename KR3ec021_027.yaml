body:
  text: 卷之二十六禽部上品羽蟲丹雄雞無毒附頭肪腸䏶胵屎白翮羽卵生丹雄雞出神農本經主女人崩中漏下赤白沃補虛溫中止血通神殺毒闢不祥頭主殺鬼肪主耳聾腸主遺溺䏶胵里黃皮主泄痢屎白主消渴傷寒寒熱翮羽主下血閉雞白蠹肥脂以上朱字神農本經久傷乏瘡以上黑字名醫所錄地圖經曰雞本經云雞白蠹肥脂出朝鮮平澤陶隱居云朝鮮不應總是雞所出而云白蠹不知何物恐別是一種耳開寶注便謂之雞入藥用蓋取朝鮮者良今處處人家畜養甚多不聞自朝鮮來也衍義曰丹雄雞今言赤雞者是也蓋以毛色言之巽為雞為風雞鳴於五更者日將至巽位感動其氣而鳴也體有風人故不可食經注皆不言雞發風今體有風人食之無不發作為雞為巽信可驗矣食雞者當審慎之謹按丹雄雞出神農本經烏白雄雞黃黑雌雞皆名醫所附蓋雞之色類雖多而體之所具者莫不同有也惟雌雄及卵為異爾故蜀本云雞子黃及白用黃雌雞者膽心肝腸肪䏶胵及糞用烏雄雞者丹雄雞用頭烏雌雞用翮羽似為詳矣當時以丹雄雞之文而附具諸雞條下者蓋各從其類爾掌氏因襲至此用者不無致疑於其間也今以神農朱書摭集於丹雄雞之下名醫諸雞主療功用隨類墨書於次其卵仍立一條若此則今古之文不紊而其取用有所歸矣時生無時採無時用肉肪腸頭東門上者良屎白翮羽䏶胵里黃皮色赤味甘性微溫緩氣氣厚於味陽中之陰臭腥治療素問云雞矢醴治心腹滿旦食則不能暮食名為鼓脹圖經曰屎白為末量方寸匕水六合和溫服療轉筋入腹日華子云冠血療白癜風糞治白虎風並敷風痛肝入補腎方䏶胵里黃皮止泄精並尿血崩中帶下腸風瀉痢孟詵曰患白虎痛風者可鋪飯於患處使雞食之良又取熱糞封之別錄云冠血主百蟲入耳不出以滴耳中即出及敷蜈蚣蜘蛛毒又治小兒卒驚似有痛處不知疾狀者取少許塗兒口上瘥又塗馬咬瘡有毒疼痛效若牡馬用雌牝馬用雄並主自縊死安定心神徐緩解之慎勿割繩斷抱取心下猶溫者取滴口中立活男用雌女用雄又救卒死或先病或常寢臥奄忽而絕皆是中惡取塗其面干後復塗並以灰營死人一周又療卒得浸淫瘡轉有汁多起於心不早治之延及周身則殺人敷之瘥屎白敷蛐蟮咬良又燒研水服方寸匕療食藥中毒發狂悶吐下欲死及療妒乳並乳頭破裂及癰腫合治燒屎白合米飲下療小兒驚啼干屎白末合熱酒下一錢匕療肝風虛轉筋入腹屎白如棗大合酒半盞療自縊死灌入口鼻中立活屎白一升熬令黃極熱合酒二升攪和去滓服療中風寒痙直口噤不知人屎白燒灰綿裹治齒痛不可忍安痛處咬之立瘥屎白一升合大豆五升炒令變色乘熱以酒沃之微煮令豆味出量性飲之覆身出汗慎勿觸風治因瘡中風腰脊反張牙關口噤四肢強直糞三七枚水二升煎取五合下米作粥主子死腹中不出屎白日中曬半乾熬令燥末合漿飯飲方寸匕治石淋屎燒灰合酒空心服方寸匕療產後小便不禁禁雞具五色者食之致狂雞死足爪不伸者食之並害人小兒五歲以下未斷乳者勿與雞同食忌雞兔同食成泄痢肉和魚肉汁食之成心瘕白雄雞卵生白雄雞肉主下氣療狂邪安五臟傷中消渴名醫所錄地圖經曰處處人家畜養之陳藏器云白雄雞三年者能為鬼神所使經云除狂邪安五臟良有自矣今惟烏骨金睛翠耳者為世所貴入藥尤良時生無時採無時取用肉䏶胵里黃皮腦屎白翅下毛距色白味咸性微溫氣味厚於氣陰中之陽臭腥制治如食法治療唐本注云腦主小兒驚癇日華子云肉調中除邪利小便去丹毒䏶胵里黃皮止泄精屎血崩中帶下腸風瀉痢陳藏器云屎炒服主蟲咬毒別錄云取翅下第一毛兩邊各一莖燒灰研水調服治諸癰不消已成膿懼針不得欲令速快者合治以一隻煮熟合五味作羹粥食之療顛癇不欲眠臥自賢自智驕倨妄行不休者距及腦燒灰合酒服主產難以一隻合苦酒一斗煮取三升分三服治卒得嗽白雌雞屎隨多少合小便內器中火熬令燥為末每服方寸匕多服之療諸瘕禁白頭家雞及雞死足爪不伸者食並害人烏雄雞無毒卵生烏雄雞肉主補中止痛膽微寒主療目不明肌瘡心主五邪血平主踒折骨痛及痿痹肪寒主耳聾腸主遺溺小便數不禁肝及左翅毛主起陰冠血主乳難䏶胵里黃皮微寒主泄利小便利遺溺除熱止煩屎白微寒主消渴傷寒寒熱破石淋及轉筋利小便遺溺滅瘢痕名醫所錄地圖經曰處處人家畜養之惟羽純黑無雜色者入藥殊好時生無時採無時用肉膽心及血肪腸肝左翅毛冠血䏶胵里黃皮屎白色黑味甘性微溫氣氣厚於味陽中之陰制理如食法治療日華子云止肚痛除風濕麻痹安胎治折傷並癰疽生罯竹木刺不出者䏶胵里黃皮止泄精並尿血崩中帶下腸風瀉痢孟詵云止心痛除心腹惡氣三年冠血點目眥上日三度療目淚不止補日華子云補虛羸孟詵云以一隻如食法五味汁和內一器中封口重湯煮之使骨肉相去虛弱人食之甚補益合治肝一具勿令入水切過合酒服盡療卒腹痛安胎尾毛二七枚燒灰合小兒乳汁和塗刺在肉中不出者即瘥臘月屎一升炒黃為末絹袋盛之合酒三升漬溫服之常令醺酣療頭風黑雌雞無毒卵生黑雌雞主風寒濕痹五緩六急安胎血無毒主中惡腹痛及踒折骨痛乳難翮羽主下血閉名醫所錄地圖經曰處處人家畜養之蜀本云血及翮羽去病黑雌雞者最優時生無時採無時用肉血翮羽色黑味甘性溫氣氣之厚者陽也制如食法治療日華子云安心定志除邪辟惡氣治血邪破心中宿血及治癰疽排膿膽治疣目耳瘑瘡日三敷良腸治遺尿並小便多糞治中風失音痰逆消渴破石淋利小腸餘瀝敷瘡痍滅瘢痕炒服治小兒客忤蠱毒翼治小兒夜啼安席下勿令母知食療云肉除反胃消乳癰膽汁敷月蝕瘡繞耳根者日三度良補日華子云主產後虛羸養新血益色助氣合治以一隻治如食法合好酒漬半日出雞服酒療卒得嗽又合五味炒熟香即投二升酒中封口經宿取飲之令人肥白又合烏麻油二升熬令黃香末入酒飲盡極效黃雌雞無毒卵生黃雌雞主傷中消渴小便數不禁腸癖泄痢補益五臟續絕傷療勞益氣肋骨主小兒羸瘦食不生肌名醫所錄地圖經曰處處人家畜養之蜀本云雞子以此產者入藥為良故析條詳註於後時生無時採無時用肉及肋骨色黃味鹹甘性溫氣氣厚於味陽中之陰治療日華子云止勞劣及泄精除腹中水癖水腫補日華子云添髓補精助陽氣暖小腸補水臟陳藏器云益陽合治以一隻理如食法合赤小豆一升同煮候豆爛即出食之其汁日二夜一每服四合補丈夫陽氣及冷氣瘦著床者漸漸食之良若先患骨熱者不可食之屎合黑豆炒浸酒服主賊風風痹破血雞子出神農本經主除熱火瘡癇痙可作琥珀神物以上朱字神農本經卵白微寒療目熱赤痛除心下伏熱止煩滿咳逆小兒下泄婦人產難胞衣不出醯漬之一宿療黃疸破大煩熱卵中白皮主久咳結氣得麻黃紫菀和服之立已以上黑字名醫所錄地陶隱居云雞子作琥珀用毈卵黃白混雜煮作之亦極相似惟不拾芥爾又煮白合銀口含須臾其色如金謹按雞子乃神農之文舊本分注黃雌雞條下今另立本條蓋由諸色雌雞亦各生子治病所宜稍有區別時生無時採無時用白黃殼白皮色紅白味甘性微寒氣氣薄味厚陰中之陽治療唐本注云烏雞卵白解煩熱黃雞子一枚濁水攪煮兩沸連水服之主產後痢藥性論云雞子液除目赤黃塗敷漆瘡良煎服主痢除煩熱煉之主嘔逆日華子云雞子鎮心安五臟止驚安胎及懷妊天行有熱痰狂走及男子陰囊濕癢又開喉聲殼研摩翳障別錄云雞子一枚水煮令外熟內熱吞之療天行嘔逆不下食食之即出又以一枚打破用水一盞沖之碟蓋少時服主婦人產後口乾舌縮渴不止者又卒中五屍遁屍其狀腹脹氣急衝心或磥磈踴起或牽腰脊者以卵一枚取白吞之困者搖頭令下補唐本注云黃雞子益氣合治烏雞子三枚合醋半斤好酒二升分為四服微溫飲之治產後血不止黃雞子合醋煮空腹食之療久赤白痢又以三枚取白和蜜一合生服療大人小兒發熱合蠟作煎餅與小兒食止痢二枚破於器中合白粉調如稀粥主婦人胎動腰臍下血以一枚取白合釅醋如白之半攪和吞之主產後血閉不下雞子黃合常山末為丸竹葉煎湯下治久瘧不瘥卵合光粉炒乾止小兒疳痢及婦人陰瘡又合豆淋酒服治賊風麻痹又合醋浸令壞敷疵皯合蠟炒治疳痢耳鳴耳聾雞子黃炒取油和粉敷頭瘡又五枚合亂髮如雞子許大煎化成汁取敷初生小兒熱瘡甚妙服之去小兒驚熱下痢及痰熱主百病以一枚去殼分清合荊芥末二錢調服療產後血暈身痙直帶眼口角與目外眵向上牽急不知人者遂安功甚敏捷烏雞子尤善禁黃雞子動風氣不可多食忌雞卵白鱉同食損人獺肉同食成遁屍疰和蔥食之氣短白鵝膏無毒卵生白鵝膏主耳卒聾以灌之毛主射工水毒肉平利五臟名醫所錄地陶隱居云東川多溪毒養鵝以闢之毛羽亦佳中射工毒者飲血又以塗身鵝未必食射工蓋以威相制爾乃言鵝不食生蟲今鵝子亦啖蚯蚓陳藏器云蒼鵝有毒食蟲白鵝無毒不食蟲主射工毒當以蒼者良主渴以白者勝時生無時採無時用脂毛肉卵色白味微寒性氣之薄者陽中之陰臭腥治療唐本注云白鵝治消渴煮汁飲之鵝毛治小兒驚癇極者燒灰治噎疾日華子云蒼鵝糞敷蛇蟲咬毒白鵝解五臟熱脂潤皮膚尾罌治聤耳及耳聾內之亦治手足皴孟詵云脂可合面脂別錄云鵝羽治誤吞鐶若指彄者燒數枝末飲服之白鵝屎治小兒鵝口不食乳者汁灌口中愈補日華子云子補中益氣食療云子補五臟合治尾燒灰合酒服治噎禁蒼鵝不宜多食發瘡膿及令人易霍亂髮痼疾子亦發痼疾解肉解服丹石人毒鶩肪無毒附白鴨屎肉卵生鶩肪主風虛寒熱白鴨屎主殺石藥毒解結縛散蓄熱肉補虛除熱和臟腑利水道名醫所錄名刀鴨小鴨也通白鴨屎也地衍義曰江湖間處處有之陶隱居云鶩即鴨然有家鴨有野鴨陳藏器本草屍子云野鴨為鳧家鴨為鶩爾雅云野鳧鶩注云鴨也如此則鳧鶩皆是鴨也又云本經用鶩肪即家鴨也如此所說各不同其意不定又按唐王勃滕王閣記云落霞與孤鶩齊飛則明知鶩為野鴨也勃乃唐之名儒必有所據故知鶩為野鴨明矣時採九月後用脂色黃味甘性大寒氣氣之薄者陽中之陰臭腥治療唐本注云鴨肪治水腫鴨肉治小兒驚癇鴨頭治水腫通利小便日華子云野鴨消食及治熱毒風並惡瘡癤殺腹臟一切蟲家鴨消熱毒利小腸止驚癇及痢綠頭者亦佳卵治心腹胸膈熱孟詵云野鴨消十二種蟲平胃氣調中輕身及治身上小熱瘡多年不愈者食之瘥白鴨肉治小兒頭生瘡腫糞治熱毒毒痢食療云屎可拓蚯蚓咬瘡別錄云青雄鴨治卒大腹水病以水五升煮取一升飲盡厚蓋之取汗瘥補日華子云家鴨補虛孟詵云野鴨補中益氣合治白鴨肉合蔥豉作汁飲之治卒煩熱鴨糞和雞子白調敷熱毒瘡及腫毒內消青頭鴨一隻細切和米並五味煮令極熟作粥空腹食之治十種水病不瘥垂死者白鴨一隻去毛腸湯洗饙甫云切半蒸飲飯半升以飯姜釀鴨腹中縫合蒸候熟食之治水氣脹滿浮腫小便澀少禁凡鳥自死口不閉者食之殺人黑鴨食之能滑中發冷痢下腳氣鴨卵多食發氣動冷疾令背膊悶小兒食之腳軟不能行忌鴨卵及肉不可合鱉肉同食能害人野鴨病人不可與木耳胡桃豉同食解鴨血解諸毒及野葛毒飲之瘥家鴨肉解丹毒白鴨屎汁和水調服解服石藥過劑者及金銀銅鐵毒鷓鴣無毒卵生鷓鴣主嶺南野葛菌毒生金毒及溫瘴久欲死不可瘥者合毛熬酒漬之生搗取汁服最良名醫所錄名越雉隨陽鳥地圖經曰生江南今江西閩廣蜀夔州郡皆有之其形似母雞臆前有白圓點背間有紫赤毛彼人呼為越雉南越志云鷓鴣雖東西迴翔然開翅之始必先南翥故謂之隨陽鳥崔豹古今注云人言其名自呼此則不然其鳴若云鉤輈格䍽即鄭谷所謂相呼相喚湘江曲者是也時生無時採無時用毛肉質類母雞色紫赤味甘性溫緩氣氣厚於味陽也治療圖經曰其脂膏手可以已癉徒用切瘃踄王切令不龜裂衍義曰肉治瘴補孟詵云肉能補五臟益心力聰明合治肉合酒服治蠱氣瘴疾欲死者禁其自死者不可食忌與竹筍同食令人小腹脹解蛇菌等毒雁肪無毒卵生雁肪出神農本經主風攣拘急偏枯氣不通利久服益氣不飢輕身耐老以上朱字神農本經長毛髮鬚眉以上黑字名醫所錄地圖經曰生江南池澤陶隱居云大曰鴻小曰雁今雁類亦有大小皆同一形然冬則南翔夏則北徂時當春夏則孳音茲育於北又別有野鵝大於雁猶似家蒼鵝謂之鴐音加鵝雁肪自不多有食其肉亦好衍義曰雁人多不食者謂其知陰陽之升降分長少之行序世謂之天厭亦道家之一說爾雁為陽鳥其義未盡茲蓋得中和之氣熱則即北寒則即南以就和氣所以為禮幣者一以取其信二以取其和也時生無時採無時又云冬月取者良用肪毛色白味甘性平氣氣之薄者陽中之陰臭腥治療唐本注云雁喉下白毛治小兒癇疾日華子云雁肪治風麻痹其毛自落者小兒帶之療驚癇衍義曰雁肪治諸風孟詵云雁膏可合生發膏及治耳聾補日華子云雁肪久食助氣壯筋骨合治骨灰和泔洗頭長髮脂和豆黃作丸補勞瘦肥白人雁屎白合人精和敷灸瘡腫痛雁肪四兩煉濾過每日空心合暖酒一杯肪一匙頭飲之治風攣拘急偏枯血氣不通利禁六月七月食雁傷神解殺諸石藥毒魚狗無毒卵生魚狗主鯁及魚骨入肉不可出痛甚者燒令黑為末頓服之煮取汁飲亦佳名醫所錄謹按爾雅云鴗立及切天狗也穴土為巢江東人呼為水狗埤雅云此鳥知天將雨之鳥也其形小不盈握似燕紺色而長喙短尾居溪曲以自藏匿猶雉分畿雖飛不越分域至春先高作巢及生子愛之恐墮稍下作巢子生毛羽復益愛之又更下巢也亦自炫其毛羽日浴澄瀾之間鮮縟可愛或謂之翡翠名前為翡名後為翠又云雄赤曰翡雌青曰翠性善捕魚故曰魚師又謂之魚虎其小者謂之翠碧今花工取以為女人面飾者是也又虫部一種亦名魚虎但不能翔而形質與此不侔也名魚虎魚師天狗水狗翠碧鷸地出南海及江東今水澤處多有之時生春夏採無時色翠味咸性平軟氣味厚於氣陰中之陽臭腥制燒黑為末或煮汁用九種陳藏器余鷸蝟注蘇云如蚌鷸按鷸如鶉嘴長色蒼在泥塗間作鷸鷸聲人取食之如鶉無別余功蘇恭云如蚌鷸之相持也新注云取用補虛甚暖村民云田雞所化亦鵪鶉同類也鷃蟬注陶雲雀鷃蜩範按鷃是小鳥如鶉之類一名鴽鄭注禮記以鷃為鴽又云鴽㺐母也莊子云赤鷃人食之無別功用也陽烏鸛注陶雲陽烏是鸛按二物殊不似陽烏身黑頸長白殊小鸛嘴主惡蟲咬作瘡者燒為末酒下亦名陽鴉出建州鳳凰臺味辛平無毒主勞損積血利血脈安神異志云驚邪癲癇雞癇發熱狂走水磨服之此鳳凰腳下物如白石也鳳雖靈鳥時或來儀候其棲止處掘土二三尺取之狀如圓石白似卵然鳳鳥非梧桐不棲非竹實不食不知棲息那復近地得臺入土正是物有自然之理不可識者今有鳳處未必有竹有竹處未必有鳳恐是諸國麟鳳洲有之如漢時所貢續絃膠即煎鳳髓所造有亦曷足怪乎今雞亦有白臺如卵硬中有白無黃云是牡雞所生名為父公臺本經雞白橐橐字似臺後人寫之誤耳書記云諸天國食鳳卵如此土人食雞卵也鸀鳿鳥主溪毒沙蝨水弩射工蟈短狐蝦鬚等病將鳥來病人邊則能唼人身訖以物承之當有砂石出也其砂即是含沙射人砂是此蟲之箭也亦可燒屎及毛作灰服之亦可籠以近人令鳥氣相吸山中水毒處即生此鳥當為食毒蟲所致以前數病大略相似俱是山水間蟲含沙射影亦有無水處患者防之發夜臥常以手摩身體覺辣痛處熟視當有赤點如針頭急捻之以芋葉入肉刮卻視有細沙石以蒜封瘡頭上不爾少即寒熱瘡漸深也其蝦鬚瘡桂嶺獨多著者十活一二唯有早覺者當用芋草及大芋甘蔗等葉屈角入肉鉤之深盡根蒜封可瘥須臾即根入至骨其拔出如蝦鬚瘡號蝦鬚瘡有如疔腫最惡者人幽隱處自餘六病或如瘧及天行初著寒熱亦有瘡出者亦有無瘡者要當出得砂石遲緩易療不比蝦鬚鸀鳿鳥如鴨而大眼赤嘴斑好生山溪中巧婦鳥主婦人巧吞其卵小於雀在林藪間為窠窠如小囊袋亦取其窠燒女人多以熏手令巧爾雅云桃蟲鷦注云桃雀也俗呼為巧婦鳥也英雞味甘溫無毒主益陽道補虛損令人肥健悅澤能食不患冷常有實氣而不發也出澤州有石英處常食碎石英體熱無毛飛翔不遠人食之取其英之功也如雉尾短腹下毛赤腸中常有碎石瑛凡鳥食之石入腸必致銷爛終不出今人以末石瑛飼雞取其卵而食則不如英雞鴕鳥矢無毒主人中鐵刀入肉食之立銷鳥如駝生西夷好食鐵永徽中吐火羅獻鳥高七尺如駝鼓翅行能食鐵也鵁鶄水鳥人家養之厭火災似鴨綠衣馴優不去出南方池澤爾雅云鳽鳽音堅也鵁鶄畜之厭火災博物志云鵁鶄巢於高樹生子穴中銜其母翅飛下
