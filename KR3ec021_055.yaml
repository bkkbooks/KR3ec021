body:
  text: 續集脈訣四言舉要卷上血脈隧道第一脈乃血沠氣血之先血之隧道氣息應焉首言脈之源流水自源而分流曰沠合分起伏道各井然人身之血猶夫水也血中之脈猶夫沠也沠通則水源活脈通則氣血行故靈樞決氣篇曰中焦取汁變化而赤是謂血壅遏營氣令無所避是謂脈夫脈本氣血之先流行於經絡灌溉於一身晝夜循環動而不息蓋脈者乃人身一元之大氣也血之流行於經絡之中如水分流之象故謂脈乃血沠夫脈實血實脈虛血虛要知脈乃氣血之先兆也隧道即經脈也言其在血中精密隱隧自成一道靈樞營氣篇云精專者行於經隧而脈則指營氣流行不息之道耳然非呼吸不能流行故曰氣息應焉法地合心第二其象法地血之府也心之合也皮之部也次言配地府合之義夫人之脈以血為體固當配地然觀其出入臟腑聯絡貫通一如大氣之行於地中故其象取法乎地府者藏也聚也隧道乃精專所注故為血之府充遍人身應夏火之氣中焦變赤得正南之色蓋心主血脈故脈與心相合肺主皮毛而朝百脈如部落然故為皮之部也始生營衛第三資始於腎資生於胃陽中之陰本乎營衛營者陰血衛者陽氣營行脈中衛行脈外又言脈之資始資生之義腎為十二經脈之根故曰資始胃乃生化之源故曰資生腎之與胃蓋有先後天之分焉脈在皮膚之間肌肉之內故謂陽中之陰脈之流行本因氣血之升降故曰本乎營衛營者營運於中衛者衛護於外營為陰血行脈之中入隧道也衛為陽氣行脈之外不入隧道也氣動脈應第四脈不自行隨氣而至氣動脈應陰陽之誼氣如橐籥血如波瀾血脈氣息上下循環脈行走於經絡之中非脈自能行也蓋隨宗氣而至氣陽也血陰也陽主動陰主靜脈之行也必氣為之先氣行則血行氣動則脈動陰陽相應而不相失如交誼然橐無底之器籥有孔之物夫陽氣之自頂至踵也雖固護於外無間隔於中故如橐如籥波微浪也湧疊而前瀾回瀾也旋渦而返血之在氣中也瀧湧流行亦復回環灌溉故如波如瀾若合若分互為體用周流上下無始無終此則循環之義矣寸口大會男女定位第五十二經中皆有動脈惟手太陰寸口取決此經屬肺上系吭嗌脈之大會息之出入一呼一吸四至為息日夜一萬三千五百一呼一吸脈行六寸日夜八百十丈為準初持脈時令仰其掌掌後高骨是謂關上關前為陽關後為陰陽寸陰尺先後推尋心肝居左肺脾居右腎與命門居兩尺部魂魄穀神皆見寸口左主司官右主司府左大順男右大順女本命扶命男左女右關前一分人命之主左為人迎右為氣口神門決斷兩在關後人無二脈病死不愈男女脈同惟尺則異陽弱陰盛反此病至十二經者即手足三陰三陽之經脈也十二經中皆有動脈如手太陰肺之動脈太淵手陽明大腸經之動脈合谷足陽明胃之動脈衝陽足太陰脾之動脈衝門手少陰心之動脈極泉手太陽小腸經之動脈天窗足太陽膀胱經之動脈委中足少陰腎之動脈太溪手厥陰心包絡之動脈勞宮手少陽三焦之動脈禾髎足少陽膽之動脈聽會足厥陰肝之動脈太衝所謂十二經中皆有動脈者此也既皆有動脈是皆可即其脈以診病今惟取手太陰寸口動脈決諸病之死生吉凶者何耶蓋手太陰一經內屬肺臟其經起於中府終於少商其肺繫上連喉嚨吭嗌以通呼吸肺主一身之氣氣非呼吸不行脈非肺氣不布故張仲景云呼吸者脈之頭也又寅初方升之氣出於中焦中焦指胃也蓋胃為水穀之海屬土居中灌溉四臟以及百骸無非一水穀之氣也脈之晝夜五十環周原無少間但以一日定分四時論之必以寅初為更始也故脈要精微論云診法當以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂故乃可診有過之脈此時諸脈始於胃即注於肺必由肺之呼吸以行此所謂肺朝百脈也呼出於陽吸入於陰一呼脈二至一吸脈二至脈行四至為一息一日一夜約一萬三千五百息算來共得八百一十丈以脈數之十六丈二尺折算應得周行於身五十度此晝夜脈行度數之準則也大凡初持脈之法須分尺寸陰陽之義診脈時先令人仰其掌以掌後高骨之處定為關部以關前之寸口在上故為陽關後之尺部在下故為陰陽在寸而陰在尺也所謂寸者自寸口至魚際穴故名曰寸尺者自尺部至尺澤穴故名曰尺以關部為界以分陰陽之義故名曰關尺至寸共長一寸九分即此一寸九分三部分之為寸關尺也診法以指先按陽寸而後及陰尺以此先後推究各經之脈氣未有不得其病情者也三部中又各有定位以心火肝木居左肺金脾土居右腎水在下居於尺部素問脈要精微論曰尺內兩旁則季脅也尺外以候腎尺裡以候腹中附上左外以侯肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也此蓋岐伯亦述上古僦貸季所傳脈法之理晉之王叔和著脈經以心肝居左肺脾居右腎居尺部之理悉遵素問經旨非王叔和之私撰也後人不知此義出自內經興言是非多見其不知量也然以相生論之則左關肝木生左寸心火左寸心火生右關脾土右關脾土生右寸肺金右寸肺金生兩尺腎水其五行相生之理亦如此蓋五臟各有神魂為肝神魄為肺神谷不可言脾神然其變化資生生死以之更神乎神矣穀神一魂魄也魂魄一穀神也而又總攝於心君遊行出入雖無處不到而盛衰逆順未有不從寸口驗焉左肝心為木火為陽主升主生長故曰司官右肺脾為金土為陰主降主收受故曰司府男子以陽為體左陽也左大則氣鍾於陽故在男為順女子以陰為體右陰也右大則氣鍾於陰故在女為順由是男女之本命分系於左右順則雖病而本命猶可扶持關前一分人命之主者指魂魄穀神也左為人迎右為氣口者主司官司府也決斷神門關後有兩者指兩腎也應腎間動氣也即難經八難所謂三焦之原守邪之神故曰神門關前穀神關後神門二脈即生人先後二天也無二者言無此二脈則根本絶矣故死張仲景云寸脈下不至關為陽絶尺脈上不至關為陰絶殆亦關前關後之謂乎男女脈同同於定位唯尺則異異於盛衰男子鍾於陽故陰弱女子鍾於陰故陰盛獨驗於尺者天一資生之始陰陽即判於此耳反此則男得女盛女得男弱男女皆失其常故當病至七診九候第六脈有七診曰浮中沉上下左右消息求尋又有九候舉按輕重三部浮沉各候五動寸候胸上關候膈下尺候於臍下至跟踝左脈候左右脈候右病隨所在不病者否浮為心肺沉為腎肝脾胃中州浮沉之間心脈之浮浮大而散肺脈之浮浮澀而短肝脈之沉沉而弦長腎脈之沉沉實而濡脾胃屬土脈宜和緩命為相火左寸同斷此言脈有七診九候之法也七診者與皮毛相得曰浮按之至骨曰沉中則在浮沉之間上下即寸與尺此概兩手六部而言也左右左手右手也是謂七診言能消息細求錯綜審別則上下表里之病無遁情矣又素問三部九候論云獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病亦謂之七診但與本文七診之義不同當參看九候者言脈分三部三部中各有浮中沉是謂九候九候之情形非舉按輕重不能得也其候以五動為準寸候胸上至頭之有疾關候膈下至臍之有疾尺候臍下至足之有疾左脈候身之左右脈候身之右病隨脈之所在而見不病則脈不應也與前七診大同小異心肺居上脈應浮肝腎居下脈應沉脾胃居心肺肝腎之間謂之中州脈亦應在浮沉之間心肺同一浮也但浮大而散者象夏火故屬心浮澀而短者象秋金故屬肺肝腎同一沉也但沉而弦長者象春木故屬肝沉實而濡者象冬水故屬腎脈和而緩自有一種舒徐沖融氣象土之性也脾胃宜之命門右腎固含相火然終不能離火位故與左寸同斷四時胃氣第七春弦夏洪秋毛冬石四季和緩是為平脈太過實強病生於外不及虛微病生於內春得秋脈死在金日五臟准此推之不失四時百病胃氣為本脈貴有神不可不審此言四時正脈百病皆以胃氣為本天地之氣東升屬木於時為春萬物始生其氣從伏藏中透出在人肝應之而見弦脈氣轉而南屬火於時為夏萬物盛長其氣從升後散大於外在人則心應之而見鉤脈氣轉而西屬金於時為秋萬物收成其氣從散大之極自表初收在人則肺應之而見毛脈氣轉而北屬水於時為冬萬物合藏其氣從收降而斂實在人則腎應之而見石脈以上內經論四時正脈形狀然因時變易其中總不外和柔平緩氣象蓋和緩為土即是胃氣有胃氣而合時便為平脈所謂太過不及者言弦鉤毛石之脈與時相應俱宜和緩而適中欲其微似不欲其太顯欲其微見不欲其不見如春脈當微弦為平若太弦是為太過則氣實強而病生於外矣若不弦是為不及則氣虛微而病生於內矣其弦鉤毛石之太過不及病亦猶是不但不見春弦之太過不及而反見浮毛之秋脈當升而反降當生而反殺氣機大逆是謂克賊未有不病而死者春木既為金剋金日邪旺故死五臟皆以此理推之自無差失四時有四時之脈四時有四時之病但土灌溉四旁雖病變百出必以之為本況胃氣乃水穀之精諸脈有神乃水穀之力也豈不聞得谷者昌乎誠不可不審也平和遲數第八調停自氣呼吸定息四至五至平和之則三至為遲遲則為冷六至為數數即熱症轉遲轉冷轉數轉熱遲數既明浮沉當別此言診脈之法務要得其綱領醫至病家宜靜坐片時先調停自氣令呼吸均勻方診其脈必以我之呼吸一息得彼脈四至五至為準則此為平和之脈斷為無病雖病亦極微淺以脈不為病變故也若一息三至不及四五是名遲脈遲則氣寒而行慢故病主冷若一息六至過於四五是名數脈數則氣熱而行駃故病主熱轉遲則更遲在三至以下而冷者則愈冷矣轉數則更數在六至以上而熱者愈熱矣此遲數脈病之相應也遲數既明寒熱乃定欲知寒熱之所屬又當別乎浮沉耳內外因第九浮沉遲數辨內外因外因於天內因於人天有陰陽風雨晦明人喜怒憂思悲恐驚外因之浮則為表症沉里遲陰數則陽盛內因之浮虛風所為沉氣遲冷數熱何疑浮數表熱沉數里熱浮遲表虛沉遲冷結表裡陰陽風氣冷熱辨內外因脈證參別脈理浩繁總括於四既得提綱引申觸類此統言浮沉遲數四者脈之綱領以分內外所感之因在表則浮在裡則沉遲則為寒數則為熱固一定不易之理而因則有二焉此內外之不可不辨也外感六淫因之於天內傷七情因之於人六淫者天之陰陽風雨晦明也淫者淫溢偏勝久而不復之謂即左傳醫和所謂陰淫寒疾陽淫熱疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾是也七情者人之喜怒憂思悲恐驚也即所謂七氣而巢元方病源論所謂喜則氣緩怒則氣上悲則氣消恐則氣下憂則氣亂勞則氣耗思則氣結驚則氣散是也外因之邪自表而入當在其表正氣應之其脈必浮若見沉脈邪已去表而入里矣若脈不及四至名曰遲遲則邪在陰分主冷過於四至名曰數數則邪在陽分主熱內因之邪自內而生如暴喜卒驚暴怒陽氣浮越脈應之而浮其中必虛如今之暴怒蹶僕卒驚暈倒大喜傴痛如中風狀而非外來之風此即所謂虛風也若憂思悲恐久積沉鬱脈應之而沉以無虛浮風象故直指曰氣耳遲則為冷若脈遲不論因於何氣皆主冷也數則為熱若脈數不論因於何氣皆主熱也數皆主熱若浮而得之不論何因其熱在表沉而得之其熱在裡遲既主冷若浮而得之不論何因其冷在表而虛沉而得之其冷在裡而結外因之表裡陰陽內因之風氣冷熱非診以脈則不能分別然而脈理浩繁能提括其綱自可條析其目但以浮沉遲數四者而觸類焉則引彼可以證此申此可以例彼而診家之精義思過半矣浮脈第十浮脈法天輕手可得泛泛在上如水漂木有力洪大來盛去悠無力虛大遲而且柔虛甚則散渙漫不收有邊無中其名曰芤浮小為濡綿浮水面濡甚則微不任尋按此言浮脈之形兼諸脈之義天覆於上陽也浮脈似之故曰法天其脈應於皮毛輕手可得按之且有泛泛欲上之勢如水中漂木雖按之使沉亦必隨手而起脈經所謂舉之有餘按之不足者是也若浮脈中加以洪大來盛去悠是謂有力之浮脈謂之浮大之脈亦可若浮脈中加以虛大遲而且柔是謂無力之浮脈謂之虛大之脈亦可若浮而虛大之甚則渙散瀰漫不斂不實名曰散脈脈經所謂氣實血虛有表無里者是也若四邊有而中則無名曰芤脈芤者中空之草其狀如蔥脈經所謂浮大而軟按之中央空兩邊實者是也若浮而小名曰濡脈如帛浮於水按之軟薄全無力也若浮濡之甚則極虛極小名曰微脈不勝重為尋按脈經所謂若有若無或欲絶者是也沉脈第十一沉脈法地近於筋骨深深在下沉極為伏有力為牢實大弦長牢甚則實愊愊而強無力為弱柔小如綿弱甚則細如蛛絲然此言沉脈之形兼諸脈之義地載於下陰也沉脈似之故曰法地其脈近在筋骨非重按不可得更有深深下沉之勢脈經所謂舉之不足按之有餘者是也若沉之極似附著於筋骨名曰伏脈脈經所謂重按之乃得者是也若沉而有力實大弦長弦則強急且大且實堅牢之義自可想見若牢之甚則內外皆實愊愊而強如有根蒂也沉而無力既小且柔是名為弱脈脈經所謂極軟而沉細按之欲絶指下者是也弱之甚則更柔更小若有若無縈縈如蜘蛛之絲名曰細與微脈固不相遠也遲脈第十二遲脈屬陰一息三至小駃於遲緩不及四二損一敗病不可治兩息奪精脈已無氣浮大虛散或見芤革浮小濡微沉小細弱遲細為澀往來極難易散一止止而復還結則來緩止而復來代則來緩止不能回此言遲脈之形兼諸脈之義一呼一吸為一息脈應四至是其常也遲則一息三至氣不振發行不如度故曰屬陰緩則小駃於遲猶未及於四至若一息二至元氣已損一息一至元氣已敗病則必不可治兩息一至真精奪去雖一見脈正氣已無不過燼燈之餘焰耳遲而浮大或為虛散或為芤革遲而浮小不為濡則為微遲而沉小不為細則為弱遲而細則力不足於往來名曰澀往來艱澀則易於散而或有一止然非臟絶之脈故止而復還也結則緩中時或一止止而復來蓋氣有結滯脈為阻礙暫一止而復來與澀之易散一止者不相懸也代則緩中一止止不能回脈經所云不能自還因而復動正如替代之代有出無入有去無來之象數脈第十三數脈屬陽六至一息七疾八極九至為脫浮大者洪沉大牢實往來流利是謂之滑有力為緊彈如轉索數見寸口有止為促數見關中動脈可候厥厥動搖狀如小豆此言數脈之形兼諸脈之義脈以四至為平閏以太息不出五至若一息六至是為數脈氣行疾速逾於常度故曰屬陽一息七至氣更駃速故曰疾一息八至陽熱已極一息九至則元神散脫而與遲之奪精無異也數而浮大其名曰洪數而沉大不為牢即為實數而往來流利是名曰滑數而有力是名曰緊脈經所云如轉索如切繩彈搏似乎數也若數中時見一止名曰促脈脈流數疾偶不相繼故一止耳張仲景雲陽盛則促故當於寸口見焉若數脈見於關上名曰動脈蓋關為陰陽交互之處陰陽不和兩相抗激而厥厥動搖也然上下無頭尾止在關上一分非圓實之小豆不足以形容其狀也長脈第十四長則氣治過於本位長而端直弦脈應指此言長脈之形脈有三部寸關尺也長則透出本位乃見長象非氣之充暢不能有此故曰氣治若長而端直應於指下是為弦脈也短脈第十五短則氣病不能滿部不見於關惟尺寸候一脈一形各有主病數脈相兼則見諸症此言短脈之形脈短氣不充暢無論在寸在尺俱不能滿部非氣病而何惟尺寸見之若在關不能滿部則與尺寸不相接矣有一脈自有一形若脈數形兼見而病亦數種兼成矣浮脈主病第十六浮脈主表裡必不足有力風熱無力血弱浮遲風虛浮數風熱浮緊風寒浮緩風濕浮虛傷暑浮芤失血浮洪虛火浮微勞極浮濡陰虛浮散虛劇浮弦痰飲浮滑痰熱此言浮脈兼諸脈主病之義浮脈主表言在外也與皮毛相得表氣應之故里不足浮脈主風浮而有力風熱壅盛也無力則浮而虛矣血主裡氣主表血弱不能諧氣故反浮亦裡不足之義脈浮而遲鼓動不及為之風虛脈浮而數鼓動太過為之風熱脈浮而緊緊則收斂寒之性也故為風寒脈浮而緩緩則行慢濕之性也故為風濕浮虛傷暑者內經云脈虛身熱得之傷暑又曰暑傷於氣其脈必虛者是也浮芤失血者榮行脈中衛行脈外血失則榮損故脈空如芤草之狀也脈浮而洪火之象也浮則有表無里故曰虛火浮微勞極寸關浮微陽氣欲絶尺部浮微精血將竭即難經十四難所謂自皮毛以及於骨之五損從上下者是也脈浮而濡衰憊之甚僅有其上若無其下故主陰虛若浮而散則更陰虛之極乃陽無所依浮越而散耳脈浮弦者痰飲飲自何生乎由於陽氣虛弱不能運行其飲故見此弦斂之脈耳水飲應沉而言浮者當在上焦若浮而滑則非弦斂不鼓之脈寒當化熱飲當成痰此必然之理也沉脈主病第十七沉脈主裡主寒主積有力痰食無力氣鬱沉遲虛寒沉數熱伏沉緊冷痛沉緩水畜沉牢痼冷沉實熱極沉弱陰虛沉細痹濕沉弦飲痛沉滑宿食沉伏吐利陰毒聚積此言沉脈兼諸脈主病之義脈按之至骨曰沉故曰主裡寒乃水寒積乃藏積皆見沉脈沉而有力有物在裡非痰即食沉而無力里原非實但氣不伸暢沉為在裡而復遲虛寒可必沉為在裡而加數伏熱何疑沉而緊則寒為斂實故冷痛也沉而緩則陽不健行故水蓄焉沉而牢乃陰寒之滯著應當痼冷沉而實是陽氣聚搏宜乎熱深沉為陰弱為虛沉弱必主陰虛沉為里細為濕沉細定成痹濕沉為陰弦為飲沉弦則飲停腹陰而時痛沉為里滑為食沉滑則食宿腸里而難推沉已氣沉於骨伏則至骨如無勢甚篤危須分久暴暴則既吐且利而暴脫溫補可回久則陰毒聚積之久阻非峻攻莫愈遲脈主病第十八遲脈主臟陽氣伏潛有力為痛無力虛寒此言遲脈之為病也遲為陰脈五臟為陰故主臟難經九難曰遲者臟也又曰遲則為寒傷寒論亦曰遲為在臟以陽氣伏潛不能健行故至數遲耳遲而有力有壅實不通利之意痛可想見遲雲陽伏而又無力焉虛寒必矣數脈主病第十九數脈主腑主吐主狂有力為熱無力為瘡此言數脈之為病也數脈為陽六腑亦為陽故主腑難經九經曰數者腑也又曰數則為熱傷寒論亦曰數為在腑此以遲數分陰陽配臟腑耳數脈主吐者吐則胃氣逆亂主狂者狂則神志昏迷難經二十難曰重陽者狂又病能論曰狂生於陽也觀此則狂病之見數脈明矣數而有力聚熱所鼓數而無力雖有熱而虛散熱散於外發瘡之候也滑脈主病第二十滑脈主痰或傷於食下為畜血上為吐逆此言滑脈之為病也滑脈近於水象痰乃水飲所結薄則稠黏老則磈礧不腐不化之食象亦如之皆有物之脈也在下則見於尺主蓄血病若見於寸滑脈流利勢不安定自當為吐逆然所吐非痰即食設無痰食是為嘔逆則脈又當見澀矣澀脈主病第二十一澀脈少血或中寒濕反胃結腸自汗厥逆此言澀脈之為病也血少則枯澀理勢之必然者寒濕襲人肌腠痹著氣道不通脈亦滯澀反胃則朝食暮吐暮食朝吐胃無餘液而大便祕結脈安得不澀自汗者汗時時自出也汗出則血耗矣衛氣散失四肢厥寒是謂亡陽陽亡血耗脈必見澀滯矣弦脈主病第二十二弦脈主飲病屬膽肝弦數多熱弦遲多寒浮弦支飲沉弦懸痛陽弦頭痛陰弦腹痛此言弦脈之為病也弦脈主飲夫飲入於胃必陽氣為之遊溢輸布若陽氣力薄不能遊溢輸布即見弦陰斂束之脈則水飲停留於中矣蓋膽為甲木肝為乙木停飲而見弦脈其病當在膽與肝耳數則為熱弦而兼數者病亦多熱遲則為寒弦而兼遲者病亦多寒弦則為飲弦而浮則停飲在上名曰支飲不在胃而支流於心胸間也弦而沉則飲停在下當為懸痛不在胃而懸留於腹脅間也弦脈主飲又主痛者以弦寒斂束氣不舒暢耳陽弦者寸弦也邪在三陽三陽走頭上故頭痛也陰弦者尺弦也邪在三陰三陰走腹裡故腹痛也緊脈主病第二十三緊脈主寒又主諸痛浮緊表寒沉緊里痛此言緊脈之為病也緊脈主寒緊與弦相似所謂如轉索者是也陽為寒束故緊又主諸痛耳浮以候表浮而兼緊寒在表也沉以候里沉而兼緊寒在裡也里為陰分寒襲陰分陽困陰凝故痛也長短細大脈主病第二十四長脈氣平短脈氣病細則氣少大則病進此言長短細大脈之為病也長脈氣暢故曰平短脈氣促故曰病細為正不足故氣少也大為邪有餘故病進也長短虛實主病第二十五浮長風癇沉短宿食血虛脈虛氣實脈實此言長短虛實脈之為病也長類乎弦亦肝木之象也浮則為風風木偏勝癇證作矣沉脈主裡沉而兼短乃為宿食停留中氣不運也脈為血府脈虛者血虛脈由氣行氣實者脈實洪細主病第二十六洪脈為熱其陰則虛細脈為濕其血則虛洪脈陽盛之象故當為熱陽有餘而陰不足故為陰虛細為陰脈細小不振陰濕之候細又為血虛者蓋脈以血為體耳緩脈主病第二十七緩大者風緩細者濕緩澀血少緩滑內熱此言緩脈兼諸脈之為病也空疏緩大風所至也緩慢濡細濕所侵也緩而澀滯血必少也緩而滑疾內有熱也濡脈主病第二十八濡小陰虛弱小陽竭陽竭惡寒陰虛發熱此言濡脈之為病也濡小之脈即所謂如帛浮水面有上無下陰虛之候也弱小之脈體不充鼓陽竭之候也陽竭則陰乘陽故惡寒陰虛則陽乘陰故發熱微脈主病第二十九陽微惡寒陰微發熱男微虛損女微瀉血此言微脈之為病也微脈按之如欲絶若有若無言其虛極也寸微即陽虛而陰氣上入於陽中故惡寒也尺微即陰虛而陽氣下陷於陰中故發熱也男人得此不惟惡寒發熱而且為虛損女人得此不惟惡寒發熱而且為瀉血動脈主病第三十陽動汗出陰動發熱為痛與驚崩中失血此言動脈之為病也動乃數脈見於關上下無頭尾如豆大厥厥動搖故陽虛者為陽動外衛不密而汗自出矣陰虛者為陰動內守不寧而熱自發矣為痛為驚者陰陽不和衛守兩失其職而崩中失血有自來矣革脈主病第三十一虛寒相搏其名為革男子失精女子失血此言革脈之為病也脈弦而芤此名為革弦則為寒芤則為虛既虛且寒徒革於外而中則空在男則為亡血失精在女則為半産漏下是皆中空之驗也促結主病第三十二陽盛則促肺癰陽毒陰盛則結疝瘕積鬱此言促結二脈之為病也數脈時見一止名曰促數則為熱為陽盛主上焦熱聚成毒或成肺癰脈氣流行為其阻礙時一止也緩脈時見一止名曰結為陰盛主陰分或腹中聚疝痼瘕久積鬱氣堅結不散脈氣亦為所礙故一止也是又當審止歇之多寡而斷病之輕重耳代脈主病第三十三代則氣衰或泄膿血傷寒心悸女胎三月此言代脈之為病也代亦有止之脈促結之止內有所礙雖止無常數而脈不全斷中有還意代則止而不還有常數如更代者非元氣衰微之甚不至此也泄瀉膿血者則榮血耗竭故見此欲脫不續之狀也傷寒心悸乃中氣下陷汗后里虛故見此代脈也女胎十月而産三月之時心包絡用事胎賴血養若分氣及胎脈必虛代矣脈病順逆第三十四脈之主病有宜不宜陰陽順逆凶吉可推此言脈之陰陽順逆吉凶皆可類推也有是病則有是脈如影之隨形也脈病相宜則順不相宜則逆逆之與順何從區別是又在乎陰陽耳如表病見陽脈里病見陰脈皆順而相宜者也反此則逆而病之吉凶從可推矣中風脈證第三十五中風浮緩急實則忌浮滑中痰沉遲中氣尸厥沉滑卒不知人入臟身冷入腑身溫此言脈之主病各有宜忌風中於表脈宜浮緩急強而實則主病重故忌若浮而滑此則中痰如中風者若沉而遲則不在表而在裡名曰中氣尸厥亦類中風卒然僵仆昏不知人其邪入於臟者氣陷從陰則身必冷其邪入於腑者氣出從陽則身必溫也風寒脈證第三十六風傷於衛浮緩有汗傷寒於榮浮緊無汗此言風寒之邪而脈浮緩浮緊之不同也凡風邪之傷於人也則衛氣受之故脈浮而緩衛氣受傷則腠理疏泄故有汗寒邪之傷於人也則榮血受之故脈浮而緊榮血受傷則腠理固密故無汗暑濕脈證第三十七暑傷於氣脈虛身熱濕傷於血脈緩細澀此言暑濕之邪而脈虛澀之不同也暑乃陽邪性熱而散暑傷元氣故脈虛身熱濕為水濕血液相近濕傷血分故脈緩細澀傷寒脈證第三十八傷寒熱病脈喜浮洪沉微澀小證反必凶汗後脈靜身涼則安汗後脈躁熱甚必難陽病見陰病必危殆陰病見陽雖困無害上不至關陰氣已絶下不至關陽氣已竭代脈止歇臟絶傾危散脈無根形損難醫此言傷寒證之脈也經云人之傷於寒也則為病熱熱病火邪有餘雖是陰寒之邪襲人生氣中鬱蒸而成熱病故脈喜浮而洪大此脈症相應故喜焉若脈見沉微澀小即是陽病見陰脈故症反必凶傷寒得汗邪解正復熱退身涼而安矣若得汗後脈仍躁而熱加甚是正氣已衰必難乎其有生矣陽病見陰者熱病得沉微澀小之陰脈言證與脈反故亦危殆陰病見陽脈者是轉寒凜而變溫和病雖困篤自當無害尺為陰尺脈上不至關是陰氣已絶於下寸為陽寸脈下不至關是陽氣已竭於上是陰陽離異矣代脈止歇者乃臟真氣不能接續其傾危可立見也散脈無根者謂脈外散而不斂內無根蒂之固若形見損傷必難醫治矣飲食勞倦第三十九飲食內傷氣口急滑勞倦內傷脾脈大弱此言飲食勞倦內傷之為病也內經曰飲食自倍腸胃乃傷若飲食內傷則氣口之脈必緊急而帶滑若勞力之內傷則右關之脾脈必見大弱所謂飲食勞倦則傷脾是也氣病脈證第四十欲知是氣下手脈沉沉極則伏澀弱久深此言七氣之為病也七氣為內因故脈沉沉之極雖按之至骨猶不顯露是為伏脈再或見澀之往來不利弱之無力衰微非七氣內傷之久不如是也六郁脈證第四十一六郁多沉滑痰緊食氣澀血芤數火細濕此言六郁證之脈也郁有六種亦為內因故脈多沉然不盡沉也沉而滑停痰之郁也沉而緊食積之郁也沉而澀氣虛不舒之郁也沉而芤血虛不濡之郁也沉而數火伏之郁也沉而細濕著之郁也內經曰木鬱則達之火鬱則發之土鬱則奪之金鬱則泄之水鬱則折之然調其氣過者折之以其畏也所謂瀉之內經五法為因五連之氣所乘而致郁也朱震亨曰氣血沖和百病不生一有怫鬱諸病生焉又製為六郁之論立越鞠丸以治郁謂氣鬱而成濕滯濕滯而成熱熱鬱而成痰痰滯而血不行血不行而食不消此六者相因為病者也痰病脈證第四十二滑主多痰弦主留飲熱則滑數寒則弦緊浮滑兼風沉滑兼氣食傷短疾濕留濡細此言滑脈兼諸脈病證也滑脈往來流利如珠之應指故主多痰弦為木盛脾必受制故主留飲留飲者背寒如掌大或短氣如渴四肢歷節疼痛脅下滿引缺盆咳嗽轉盛謂之留飲若內有熱則脈必滑數若里有寒則脈必弦緊鼓動浮越故浮滑者兼風動疾沉下故沉滑者兼氣停食於中則氣為食礙脈為之短疾濕為陰邪留必緩滲故脈亦濡細耳瘧疾脈證第四十三瘧脈自弦弦數者熱弦遲者寒代散者折此言瘧證之脈宜別也瘧生於風瘧多寒熱往來系少陽膽經之邪居多膽屬甲木故脈自弦弦而兼數是知瘧之多熱也弦而兼遲是知瘧之多寒也若代止而又散乃正氣虛脫邪盛正衰定主凶折泄瀉脈證第四十四泄瀉下痢沉小滑弱實大浮洪發熱則惡此言瀉痢脈證宜別也泄有脾胃大腸小腸大瘕五泄之分瀉有寒火風暑濕傷食之別痢本濕熱相火之為病凡泄瀉下痢之症脈沉小滑弱則吉若實大浮洪則惡矣實大與虛相反浮洪與里相反邪盛正衰再加發熱便是惡候矣嘔吐反胃脈證第四十五嘔吐反胃浮滑者昌弦數緊澀結腸者亡此言嘔吐反胃脈證宜忌也有聲有物謂之嘔有物無聲謂之吐飲食入胃停久則反吐出謂之反胃上焦則脈應浮若脈見浮滑者則胃氣尚存故昌若脈見弦者木剋土也若脈數者是邪火為祟若脈緊者則是寒邪作寇若脈澀者則是血少夫胃為水穀之海加之大腸祕結是全無陰液而水穀之海枯矣未有能生者也霍亂脈證第四十六霍亂之候脈代勿訝厥逆遲微是則可怕此言霍亂脈證宜別也嘔吐而又下利名曰霍亂陰陽乖離之候是時脈或代止乃卒吐暴下元氣驟傷勿驚訝也若手足厥逆上過於肘下至於膝而脈又遲微者此係陽氣大衰元氣將脫必主多凶故云可怕咳嗽脈證第四十七咳嗽多浮聚肺關胃沉緊小危浮濡易治此言咳嗽脈證宜別也咳嗽不一風寒傷於皮毛痰飲停於胸胃皮毛者肺之合也邪襲其合肺氣應之故上逆而為咳胃居肺下寒痰冷飲停滯於中亦上逆而為咳內經云形寒飲冷則傷肺形寒固傷於外而冷飲寒痰皆聚於胃也肺居最上故脈多浮耳沉緊小危者沉則邪入里緊則寒不散小則正氣衰均主病危若浮濡在表故云易治喘急脈證第四十八喘急息肩浮滑者順沉澀肢寒散脈逆證此言喘急之脈證宜別也呼吸疾速曰喘氣息短促曰急呼吸不利故肩亦為之聳動耳浮為陽為表為風滑為陽為痰為食蓋因外邪閉遏胸膈痞塞而為喘急息肩者有矣若能散其邪痞塞可通故曰順脈沉澀者沉為陰為里澀為陰為虛乃元氣不能接續而四肢加寒也若更見散脈則真元將隨喘而散死亡必矣故曰逆證火病脈證第四十九病熱有火洪數可醫沉微無火無根者危此言火熱為病也病熱而有火證是火病也火則脈應洪數脈證相宜故可醫治若得沉微之陰脈是無火矣則知為無根之陽虛見熱象也故主危殆骨蒸脈證第五十骨蒸發熱脈數而虛熱而澀小必殞其軀此言骨蒸脈證宜別也骨蒸發熱者內傷虛勞之熱脈數而虛是其本然若骨蒸熱而見澀小之脈澀則精血少小則元氣衰真陰日損必至於殞其軀也勞極脈證第五十一勞極諸虛浮軟微弱土敗雙弦火炎急數此言勞極兼諸脈證也勞極者五勞六極也巢元方病源論云肺勞者氣短而面腫鼻不聞香臭肝勞者面目乾黑口苦精神不守恐畏不能獨臥目視不明心勞者忽忽喜忘大便苦難或時鴨溏口內生瘡脾勞者舌苦直不得咽唾腎勞者背難以俯仰小便不利色赤黃而有餘瀝莖內痛陰濕囊生瘡小腹滿急此五勞各見五臟也六極者一曰氣極二曰血極三曰筋極四曰骨極五曰肌極六曰精極是即五臟所合之病虛損而至於極處也腎則多一精極故為六極夫勞極損傷氣血日耗形體漸衰所見之脈隨病呈象如空虛之浮不鼓之軟欲絶之微無力之弱雖云病脈猶相宜也至若雙弦乃知土敗急數定為火炎蓋弦為肝木雙弦則木太盛久病之土故知其必敗也急數則躁疾直強邪火炎盛真陰自絶兩皆不治矣失血脈證第五十二諸病失血脈必見芤緩小可喜數大可憂此言失血脈證之義也凡失血脈證故見芤象者緩小不足與病相宜是可喜也脈數而大邪盛正衰火爍真陰誠可憂也瘀血脈證第五十三瘀血內蓄卻宜牢大沉小澀微反成其害此言瘀血脈證之義也血蓄於內瘀滯不行脈宜牢大亦因病呈象也逐之使去而致新不難矣設脈沉小澀微是病有餘而脈不足矣是反成其害也精濁脈證第五十四遺精白濁微澀而弱火盛陰虛芤濡洪數此言精濁脈證之義也腎主藏精欲後方為施泄今或念動即出或無欲自遺此腎虛不能藏攝故耳白濁者小便色白而濁形屬精液證屬脫亡脈安得不微澀而弱也設見芤濡洪數之脈芤濡固為陰虛洪數實因火盛與腎之虛寒而不能藏者又當別之矣三消脈證第五十五三消之脈浮大者生細小微澀形脫可驚此言三消脈病之義也三消者上中下也渴而多飲為上消消穀善飢為中消渴而便數有膏為下消其脈浮大者津液生而不枯氣血和而不澀尚屬可生若細小微澀則氣血之虛衰枯槁形氣兩敗豈直可驚已哉小便淋閟脈證第五十六小便淋閟鼻頭色黃澀小無血數大何妨此言小便淋閟脈病輕重之義也淋者淋瀝不淨閉者閉塞不通其證小便少而數少腹弦急痛引於臍皆腎虛膀胱熱之所成也淋分五種曰石淋勞淋血淋氣淋膏淋也又有寒熱二淋寒淋者由腎氣虛弱下焦受冷寒氣勝則戰寒而成淋也熱淋者三焦有熱氣搏於腎流入於胞而成淋也大抵淋雖分各種必因勞動火火盛搏氣而成也夫熱乘津液則水道不利內熱鬱蒸而外發黃色見於鼻者以鼻為肺竅耳脈澀小者澀滯微小而不滑利也徵其正衰而無血數大為火象火證見之又何妨乎較之無血是為易治大便燥結脈證第五十七大便燥結須分氣血陽數而實陰遲而澀此言燥結脈證宜分氣血而當別陰陽也燥結一證大抵血液少而火氣盛也但以脈合證而屬氣屬血自井然矣火氣盛者為陽脈必有餘故數實也血液少者為陰脈必不足故遲澀也氣血一判辨證用藥無餘蘊矣癲狂脈證第五十八癲乃重陰狂乃重陽浮洪吉兆沉急凶殃此言癲狂脈病宜別也癲云重陰謂偏重於陰也發時語言錯亂神意迷惑無有靈明此癲邪入於陰而陰實也狂云重陽謂偏重於陽也發時叫號罵詈逾垣上屋不避死生此狂邪入於陽而陽實也其脈浮洪者是為陽脈陽狂得之與證相宜即陰癲得之亦從陰轉陽自里達表之象故均為吉兆若沉而急沉則入陰迫裡急則強急不柔是無胃氣之脈也無論癲陰狂陽自無生理所以謂之凶殃也癇病脈證第五十九癇脈宜虛實急者惡浮陽沉陰滑痰數熱此言癇病脈證宜別也癇之始發卒然跌僕口噤作聲或吐痰沫又有牛馬豬羊雞五癇之別總之因驚以動臟氣不平鬱而生痰生涎閉塞諸經或在母腹受驚或感六氣或飲食不節逆於臟氣而成也其脈總宜虛而不宜實若實而急是無胃氣也浮則癇發於陽沉則癇發於陰滑則癇發多痰數則癇發多熱因病見脈因脈知病亦理之自然耳喉痹脈證第六十喉痹之脈數熱遲寒纏喉走馬微伏則難此言喉痹脈證宜別也痹者閉也閉塞不通之謂乃火盛氣結以致喉嚨腫脹呼吸難通痰涎壅塞水漿不下一二日即能殺人其脈多數數則為熱故耳間有脈遲者乃是外寒襲入經脈經氣不利鬱滯於所過之處故亦為痹而且當溫散也更有一種纏喉風或麻或癢又腫又痛纏綿於內一種走馬喉痹須臾之間痛而腫腫而閉閉而氣絶暴發暴死二者俱火中挾風風火交煽故發病凶暴如此其脈應浮大洪數而反見微伏是邪盛正衰欲其生也不亦難乎眩暈脈證第六十一諸風眩暈有火有痰左澀死血右大虛看此言眩暈脈證宜別也眩者目乍黑乍明𥉂𥉂不定也暈者頭昏冒旋轉岑岑欲倒也故眩暈者多屬諸風又不獨一風也有因於火者有因於痰者有因於死血者有因於虛者夫火性上炎衝於巔頂動搖轉旋不言可知胸中痰濁隨氣上升淆濁之氣擾亂其間欲其不眩不暈不可得矣其脈必徵於左者以左心主血肝藏血腎主液為血之源耳諸陽上行於頭諸脈上注於目血死則脈凝泣滯澀而不流利眩暈時時作矣其脈右手必大而無力以右肺主氣脾生氣命門真火為氣之根右大無力氣虛眩暈端可知矣頭痛脈證第六十二頭痛多弦浮風緊寒熱洪濕細緩滑厥痰氣虛弦軟血虛微澀腎厥弦堅真痛短澀此言頭痛脈證之義也頭乃六陽所聚弦乃陰脈邪束於外陽鬱於中安得不痛故頭痛者多弦多弦不皆弦也亦有脈浮而痛者屬風脈緊而痛者屬寒脈洪而痛者屬熱脈細而痛者屬濕脈緩滑而痛者屬痰脈弦軟而痛者屬氣虛脈微澀而痛者屬血虛脈弦堅而痛者屬腎虛腎氣厥逆難經六十難所云厥頭痛者是也厥痛不已甚則入腎而為真頭痛也其脈短澀者短則陽脫於上澀則陰衰於下若手足厥寒至節者必死不治雖然頭痛不止此數種五臟六腑皆能病此但宜細察其脈與兼見之證以別臟腑陰陽寒熱虛實而施治焉則萬舉萬當矣心腹痛脈證第六十三心腹之痛其類有九細遲從吉浮大延久此言心腹疼痛脈證之義也心腹之痛其類甚多此僅言有九者亦舉其要耳曰飲曰食曰風曰寒曰熱曰悸曰蟲曰忤曰疰飲者痰飲也痰飲留中故痛食者食物也食物停積故痛風者風邪也邪正相搏故痛寒者寒邪也榮脈凝泣故痛熱者火也火鬱不發故痛悸者心中動悸也中氣空虛故痛蟲者蟲積也蟲動攻衝上下故痛忤者客忤也不正之邪亂其清道故痛疰者尸疰也痛無定所即傳尸氣也以上諸痛若脈見細遲是氣減舒徐厥邪衰退之象理應從吉設或大浮知邪方盛況心腹裡證而得表脈更非所宜雖不至於殞軀亦難愈也疝氣脈證第六十四疝氣弦急積聚在裡牢急者生弱急者死此言疝氣脈證宜別也疝氣者氣聚而大外仍斂束故脈見弦急皆從寒濕積鬱於裡得之若弦急而牢見積聚之有根亦徵元本之壯實脈症兩宜故曰生若但急而弱急則邪盛弱則正衰更非積聚在裡者之所宜故曰死腰痛脈證第六十五腰痛之脈多沉而弦兼浮者風兼緊者寒弦滑痰飲濡細腎著大乃腎虛沉實閃肭此言腰痛脈證之義也腰痛者足之六經病也足三陽從頭走足足三陰從足入腹各經受邪則隨各經之所過者為痛諸經腰痛脈多沉弦者沉為在裡弦則為痛故多沉弦也兼浮者風沉弦中有泛泛欲浮之勢風虛之象也兼緊者寒寒緊斂也兼滑者痰飲痰飲滑利也兼濡細者腎著腎著者濕濡細滲著也兼大者腎虛腎虛不斂藏而反空松虛大也兼實者閃肭閃肭非瘀血則氣滯皆成凝滯故沉實也腳氣脈證第六十六腳氣有四遲寒數熱浮滑者風濡細者濕此言腳氣脈證之義也腳氣一證成於寒濕者十常八九內經曰清濕襲邪病起於下誠哉是言也其始發甚微發亦易解若不早治愈發愈重甚至痿痹不仁者有之發於三陽者輕三陰者重初發時大類傷寒頭痛發熱惡寒嘔吐但足屈伸不能或痛或紅為異耳在陽分多惡寒壯熱頭痛紅紫熱腫患多在外廉陽分三陽經所過之處面光澤脈多浮在陰分多惡寒甚或厥逆不發熱或嘔逆或腹痛下利或微赤而熱或反極冷患多在腿內廉陰分三陰經所過之處面青慘脈多沉此言陰陽之大概也腳氣總不出寒熱風濕四者脈來三至為遲遲則為寒脈來六至為數數即熱證若為風邪所襲脈必浮滑濕氣所侵脈必濡細是在圓機活法謹察脈證而分別之斯善矣痿病脈證第六十七痿病肺虛脈多微緩或澀或緊或細或濡此言痿病脈證之義也痿者委也足痿不用有委靡不振之義素問痿論岐伯曰肺葉熱焦則皮毛虛弱急薄著則生痿躄是痿病多生於肺虛也其脈多微緩或澀或緊或細或濡者以微應皮毛緩應肌肉澀應血脈緊應筋膜細濡應骨髓耳故治痿者必兼視各臟之榮俞察脈之盛衰宜補宜通而後逆順可和虛實可調病良已矣痹病脈證第六十八風寒濕氣合而為痹浮澀而緊三脈乃備此言痹病脈證之義也岐伯曰風寒濕三氣雜至合而為痹也其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹也夫脈浮澀而緊者浮為風澀為濕緊為寒乃一脈中見此三種始為三邪雜合若雜閣中邪有偏勝則又當審脈之浮多澀多緊多以別之也五疸脈證第六十九五疸實熱脈必洪數澀微屬虛切忌發渴此言五疸脈證之義也疸者黃疸也黃疸有五曰濕疸谷疸女勞疸酒疸及黃汗也其實脾胃為之總司濕熱為之根始夫脾胃屬土合肌肉而主四肢其化濕其色黃其性滯著其脈遲緩所畏者風木而復喜風之燥能制者寒水而反惡水之濕若內無脾胃之郁外無風濕之搏雖有外邪氣機自利熱不𨠭蒸黃又何自而生乎五疸皆屬濕熱者以疸皆濕與熱鬱外不得通內不得泄𨠭蒸成黃虛松而有通泄處則不能成黃故曰實熱若是則脈自應洪數澀微者自應為虛黃也渴為裡熱黃為表蒸表裡熱亢陰何以堪又疸既濕鬱汗溺不通可復加之飲乎渴則多飲故最忌也水病脈證第七十脈得諸沉責其有水浮氣與風沉實或里沉數為陽沉遲為陰浮大出厄虛小可驚此言水病脈證之義也水氣有四曰氣水曰風水曰石水曰里水其水雖諸種不一而脈之見沉者在在皆兼即氣水風水之在表而脈應浮者亦必有沉沉欲下之勢蓋沉下者水之性也以狀言浮則以位言耳若沉而數乃為陽水證必兼陽而熱多沉而遲乃為陰水證必兼陰而寒多水脈浮大水氣渙散災厄將出之象水脈虛小則正衰邪存誠可驚也脹滿脈證第七十一脹滿脈弦土製於木濕熱數洪陰寒遲弱浮為虛滿緊則中實浮大可治虛小危極此言脹滿脈證之義也脹謂脹於外滿謂滿於中排臟腑而郭胸脅急皮膚而露筋脈臍凸腰圓鼓之如鼓胸腹之疾也大抵起於飲食不節起居失宜房室過勞憂思無極致氣壅滯留中而脹滿之疾漸起矣故實者少虛者多熱者少寒者多皆成於脾胃者矣蓋脾胃者土也居中而溉四臟若見弦脈知木來侮土更為不吉若見數洪必濕熱之郁若見遲弱乃陰寒所凝浮則氣散外雖滿而中必虛緊則氣斂外固堅而中更實浮而大者元氣之振作與病形相宜故云可治虛而小者知元氣衰微又與病形相反故云危極也積聚脈證第七十二五臟為積六腑為聚實強者生沉細者死此言積聚脈證生死之義也難經五十五難曰積者陰氣也聚者陽氣也陰沉而伏陽浮而動又曰積者五臟所生聚者六腑所成積凡有五肝之積名曰肥氣心之積名曰伏梁脾之積名曰痞氣肺之積名曰息賁腎之積名曰奔豚其病各有五其痛有常處六腑為聚其病奔向流行痛無常處越人以陰陽分臟腑故有五六之名耳所以論積聚分臟腑者亦不過以沉伏留止不移者屬陰陰則為臟浮動聚散不常者屬陽陽則為腑耳其脈實強者陽脈也一以徵邪正之相搏一以徵元本之壯實從腑從陽故曰生其脈沉細者陰脈也一以徵邪氣之深入一以徵元本之衰微從臟從陰故曰死中惡脈證第七十三中惡腹脹緊細者生脈若浮大邪氣已深此言中惡脈證之義也不善之謂惡暗襲潛侵急然仆倒或手足厥逆或語言錯妄種種不一其證多得之涉水登山穿冢入廟即客忤卒厥鬼擊飛尸之類卒中外邪則正氣不能達外則氣機斂實腹安得不脹藥力一助正氣必張緊者仍舒細者仍充故知其生若脈浮大則正氣散越邪必深入而欲為之治不亦難乎癰疽脈證第七十四癰疽浮數惡寒發熱若有痛處癰疽所發脈數發熱而痛者陽不數不熱不疼陰瘡未潰癰疽不怕洪大已潰癰疽洪大可怕癰者壅也疽者阻也營衛氣血壅塞阻滯鬱熱成膿之所致癰大而淺疽小而深淺則從腑從陽故易消易潰深則從臟從陰故難消難潰易潰者則毒從外泄難潰者則毒常內陷此吉凶輕重之所由分也其脈浮數者以血泣而氣復從之邪與正鬱郁則化熱故數也在表在陽故浮也正與邪搏故復惡寒發熱今痛止一處而脈數此處必化熱為膿正癰疽所發之處也若脈浮數而發熱者蓄積有膿是也如此者乃為陽毒若脈不數身不熱所患之處不疼是邪客陰分多致內陷然必兼有煩懊嘔逆等證否則不熱不疼脈又不數熱邪不能發越此是陰瘡豈不反重於陽耶方癰疽之未潰也熱邪郁蓄外不疏通脈之鼓湧洪大是其宜也至於已潰則熱泄邪解而洪大之脈宜衰矣潰而不衰一沠邪熱正從何復誠為大可懼者肺癰脈證第七十五肺癰已成寸數而實肺痿之形數而無力肺癰色白脈宜短澀不宜浮大唾糊嘔血此言肺癰肺痿脈證宜別也肺癰之病喘逆上氣胸滿隱痛咳吐膿血寸脈數實者是也肺痿之病時吐涎沫遺尿便數或咳不渴寸脈虛數者是也大抵肺癰肺痿皆上焦鬱熱而成也夫肺癰已成寸數而實者即金匱要略所謂脈數實者為肺癰肺痿之形數而無力者即金匱要略所謂脈數虛者為肺痿必候於寸者以肺居最上也肺癰色白脈宜短澀者言其面色白為肺色短澀為肺脈色脈與證相符故宜也若脈浮大是為火上炎之象唾如米糊嘔見膿血是火剋金肺臟已傷真大不宜也腸癰脈證第七十六腸癰實熱滑數可知數而不熱關脈芤虛微澀而緊未膿當下緊數膿成切不可下此言腸癰脈證宜別也腸癰者腸內生癰也大腸小腸皆有之大抵得之不節飲食不適寒溫久郁化熱久熱腐膿而癰斯成矣如小腹腫痞皮急按之則痛小便數如淋或發熱惡寒皆腸癰之候也腸癰系實熱之證其脈滑數可知脈若數而不熱關脈必見芤虛無力脈若帶微澀而緊者其癰尚未成膿可用下法脈若緊而且數其膿已成任其自潰切忌下藥下則反以奪其生新之氣此即癰疽未潰宜瀉實已潰宜補虛之義也胎産脈證第七十七婦人之脈以血為本血旺易胎氣旺難孕少陰動甚謂之有子尺脈滑利妊娠可喜滑疾不散胎必三月但疾不散五月可別左疾為男右疾為女女腹如箕男腹如釜欲産之脈其至離經水下乃産未下勿驚新産之脈緩滑為吉實大弦牢有證則逆此言婦人胎産脈證宜辨也男為陽女為陰陽主氣陰主血一定之理也故女人以血為本經脈調而血旺者易以成胎氣脈旺必難成孕所以女人身肥胖者多不生子以其脂肥而不能成孕故也少陰者腎脈也動甚者即陰搏陽則謂之有子若尺脈滑利者主有妊故可喜即此滑利之脈應指疾而不散滑為血液斂結之象是為有胎三月矣若但疾而不散是從虛漸實轉為形體此妊娠五月之脈也其疾左勝於右是為男孕胎氣鍾於陽故左勝右勝於左是為女孕胎氣鍾於陰故右勝更視其腹如箕者為女胎腹如釜者為男胎所謂女生外嚮男子負陰而抱陽其理一也及其欲産之脈與平日忽異一旦欲落氣血動蕩胞胎迸裂自與經常離異而脈亦非平昔之狀貌矣然必有水先下俗謂之胞漿不爾猶未即下勿認為難産而驚訝也及其已産也氣血兩虛其脈宜緩滑為吉兆也若脈實大弦牢非産後氣血俱虛者所宜是皆相逆之脈設外有證又豈能順乎小兒脈證第七十八小兒之脈七至為平更察色證與虎口紋此言小兒有病脈以七至為平小兒氣血未定脈不足據更當以色證參察若三歲以下者視其虎口三關之紋以測其病何謂虎口蓋大人之脈皆以寸關尺三部而診之此一經之脈系手太陰肺經之一脈起自中府穴而出於手大指少商之穴肺屬辛金而手陽明大腸經起自次指云商陽穴其合谷之穴當在虎口之中大腸屬庚金虎西方金也商屬金故肺與大腸一稱少商一名商陽所以大指次指之間謂之虎口謂三關者以次指之紋初名風關次名氣關末名命關以男左女右為法其紋色紫者主內熱紅主傷寒青主驚風白主疳黑主危證若淡黃淡白則主無病然紋尚在風關者輕見在氣關者重見在命關者主危俗名虎口之隱義者此也奇經八脈脈證第七十九奇經八脈其診又別直上直下浮則為督牢則為沖緊則任脈寸左右彈陽蹺可決尺左右彈陰蹺可別關左右彈帶脈當訣尺外斜上至寸陰維尺內斜上至寸陽維督脈為病脊強癲癇任脈為病七疝瘕堅衝脈為病逆氣裡急帶主帶下臍痛精失陽維寒熱目眩僵仆陰維心痛胸脅刺筑陽蹺為病陰緩陽急陰蹺為病陽緩陰急癲癇瘛瘲寒熱恍惚八脈脈證各有所屬此言奇經八脈之形兼八脈之為病也八脈診法又各不同若脈直上之於寸直下之於尺其脈之浮者則為督脈其脈之沉牢者則為衝脈其脈緊急者則為任脈脈在寸口左右而彈指者則是陽蹺之脈脈在尺部左右而彈指者則是陰蹺之脈脈在關部左右而彈指者則為帶脈脈在尺外而斜上至於寸口則為陰維之脈脈在尺內而斜上至於寸口則為陽維之脈此奇經八脈之形其義甚深非淺學所能窺造者修真之士能明八脈之升降其道可成也夫八脈為病督脈在背之中央為陽脈之總督是病令人脊強不利又主癲癇任脈在腹之中央為陰脈之統任任脈之為病男子則為七疝女子則為瘕聚沖為經脈之海其脈與任脈皆起於少腹之內夾臍兩旁而直衝於上其為病主逆氣裡急帶脈在臍之周圍如束帶然其為病也女主帶下男主失精陽維脈在身之外側陽維為病苦發寒熱又主目作眩運卒然僵仆陰維脈在身之內側陰維為病則主心痛而胸脅之間刺痛築築然作動陽蹺脈在足踝之外側陽蹺為病則病在陽故陽結急而陰自和緩陰蹺脈在足踝之內側陰蹺為病則病在陰故陰結急而陽自和緩兩蹺脈之為病又主癲癇瘛瘲寒熱往來精神恍惚之證此八脈之為證各有分屬也反關脈第八十平人無脈移於外絡兄位弟乘陽溪列缺此言反關之脈平人無脈者非無脈也謂寸口脈不應指而反從尺旁過肺之列缺大腸之陽溪刺斜出於外絡其三部定位九候淺深俱與平常應見於寸口者無異若兄固有之位弟竊而乘之此反常異衆之脈千百中僅一二也真臟脈第八十一病脈既明吉凶當別經脈之外又有真脈肝絶之脈循刀責責心絶之脈轉豆躁疾脾則雀啄如屋之漏如水之流如杯之覆肺絶如毛無根蕭索麻子動搖浮波之合腎脈將絶至如省客來如彈石去如解索命脈將絶蝦游魚翔至如湧泉絶在膀胱真脈既形胃已無氣參察色證斷之以臆此言真臟之脈真臟者如肝見純弦脈無胃氣謂之真臟肝脈之絶指下如循刀責責然徑急之狀全無和緩之意故謂真臟主死其心絶之脈指下如轉豆之狀厥厥動搖躁疾之勢故心絶也脾絶之脈如雀之啄木頻啄數下而少一停止也又如屋漏之水其數勺勺一頃而一滴又如流水去而不返之象又如杯水傾覆之狀此皆脾絶之脈也肺絶之脈如風吹羽毛輕泛無根蕭索不振之義又如麻子碎小之多又如浮波一開一合之狀此皆肺之絶脈也其腎絶之脈至如省客而偶一來去也又如彈石指下沉石有力而擊指又如解索指下如索分解之狀此皆腎之絶脈也蝦游者其狀如蝦在水中緩緩而前倏然而退魚翔者狀如魚之在水始則浮游掉尾少則悠然而逝此皆命之絶脈也湧泉者狀如泉之泛溢從下湧上之象此係膀胱之絶脈也人之真臟脈者謂肝見純弦心見純洪肺見純毛腎見純石而無胃氣和緩之脈故謂真臟之脈若真脈既形則知胃已無氣蓋脈以胃氣為本脈無胃氣故皆死之兆也然脈理既明更當參察色證一一據理而斷之則死生吉凶之法其驗無不如影之隨形響之應聲者也蓋醫道之難所難在理之不明醫理之難尤難在脈理之不精脈理之最詳而易領會者莫過於崔嘉彥四言舉要也學者當熟讀深究默識參悟則胸中自然洞徹所謂得心應手之巧其在斯乎續集脈訣四言舉要卷下望診臟腑部分靈樞五色篇曰五臟六府各有部分能別部分萬舉萬當自額而下闕庭上屬咽喉之部分也自闕中循鼻而下鼻端屬五臟之部分也自內眥挾鼻而下至承漿屬六俯之部分也自顴而下頰屬肩背手之部分也自牙車以下頤屬股膝脛足之部分也又曰五臟次於中央六腑挾其兩側首面上於闕庭五官在於下極者是也五官靈樞五閲五使篇曰鼻者肺之官也目者肝之官也口唇者脾之官也舌者心之官也耳者腎之官也故肺病者喘息鼻張肝病者眥青脾病者唇黃心病者舌卷短顴赤腎病者顴與顏黑診病新久素問脈要精微論曰徵其脈小色不奪者新病也徵其脈不奪其色奪者此久病也徵其脈與五色俱奪者此久病也徵其脈與五色俱不奪者新病也統論色素問脈要精微論曰能合色脈可以萬全五色者氣之華也赤欲如帛裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧之澤不欲如藍黃欲如羅裹雄黃不欲如土黃黑欲如重漆色不欲如地蒼素問五臟生成篇曰青如翠羽者生赤如雞冠者生黃如蟹腹者生白如豕膏者生黑如烏羽者生此五色之見生也青如草茲者死黃如枳實者死黑如炱者死赤如衃血者死白如枯骨者死此五色之見死也又云生於心如以縞裹朱生於肺如以縞裹紅生於肝如以縞裹紺生於脾如以縞裹栝蔞實生於腎如以縞裹紫此五臟所生之外榮也夫氣由髒髮色隨氣華如青黃赤白黑者色也如帛裹朱如鵝羽如蒼璧之澤如羅裹雄黃如重漆色又云如翠羽如雞冠如蟹腹如豕膏如烏羽或有鮮明外露或有光潤內含者氣也氣至而後色彰故曰欲曰生若赤如赭白如鹽青如藍黃如土色黑如地蒼甚則青如草茲黃如枳實黑如炲赤如衃血白如枯骨或晦黯不澤或悴槁不榮敗色雖呈氣於何有故曰不欲且曰死由此觀之則色與氣固不可須臾離也然而外露者不如內含內含則氣藏外露則氣泄亦猶脈之弦鉤毛石欲其微不欲其甚下文所云如以縞裹者正取五色之微見方是五臟之外榮否則過於彰露與弦鉤毛石之獨見而無胃氣名曰真臟者何以異乎面難經十三難曰五臟有五色皆見於面亦當與寸口尺內相應假令色青其脈當弦而急色赤其脈浮大而散色黃其脈中緩而大色白其脈浮澀而短色黑其脈沉濡而滑脈數尺之皮膚亦數脈急尺之皮膚亦急脈緩尺之皮膚亦緩脈澀尺之皮膚亦澀脈滑尺之皮膚亦滑假令色青其脈浮澀而短若大而緩為相勝色青為肝脈得浮澀而短為肺脈為金剋木大而緩為脾脈為木剋土是謂相勝浮大而散若小而滑為相生也浮大而散為心脈為木生火小而滑為腎脈為水生木是謂相生玉機真臟論曰凡治病察其形氣色澤脈之盛衰病之新故乃治之無後其時形氣相得謂之可治色澤以浮謂之易已脈從四時謂之可治脈弱以滑是有胃氣命曰易治取之以時形氣相失謂之難治色夭不澤謂之難治脈實以堅謂之益甚脈逆四時為不可治必察四難而明告之五臟生成篇曰色味當五臟白當肺辛赤當心苦青當肝酸黃當脾甘黑當腎咸故白當皮赤當脈青當筋黃當肉黑當骨靈樞五色篇曰五臟六腑之肢節各有部分有部分用陰和陽用陽和陰當明部分萬舉萬當和陰陽之盛衰裒多益寡和而平之萬舉萬當矣能別左右是謂大道男女易位故曰陰陽審察澤夭謂之良工左右乃陰陽之道路而男女從逆不同故位亦異位定然後能察其潤澤枯夭也沉濁為內浮澤為外內為臟外為腑以沉浮別之然在色上看非心會不能得黃赤為風青黑為痛白為寒黃為膏潤為膿赤甚者為血痛甚為攣寒甚為皮不仁五色各見其部察其浮沉以知淺深察其澤夭以觀成敗察其散搏以知遠近視色上下以知病處淺則病淺沉則病深澤則成全夭則敗亡散解者新近搏聚者久遠上則在上下則在下皆以色形知病也積神於心以知往今故相氣不微不知是非屬意勿去乃知新故視色之道必積神屬意乃知已往來今及新病故疾色明不粗沉夭為甚不明不澤其病不甚明澤不粗顯而但見沉夭病必甚也若無沉夭雖不明澤病亦不甚其色散駒駒然未有聚其病散而氣痛聚未成也駒小馬也奔逸不定言其色散無定所氣雖聚痛未成形也腎乘心心先病腎為應色皆如是臟必自虛而後賊邪乘之所見之色自是勝我者五臟皆然男子色見於面王為小腹痛下為卵痛其圜直為莖痛高為本下為首狐疝潰陰之屬也卵莖狐潰乃膀胱小腸子處之病也其部位在於面王上下故色見於彼圜直象莖故以色見之高下分莖病之本末俗以鼻之大小驗前陰之巨細有以哉女子在於面王為膀胱子處之病散為病搏為聚方圓左右各如其色形其隨而下至胝為淫有潤如膏狀為暴食不潔女子部分亦同而病亦在下但所見皆衝任帶脈如淫帶淋濁瘕聚之類或有因暴食濕熱下流而成前證者若色搏則聚而結色散者但痛而已左為左右為右其色有邪聚散而不端面色所指者也病見於色左右不爽故隨其色之所指察聚散而知邪之搏與痛也色者青黑赤白黃皆端滿有別鄉別鄉赤者其色亦大如榆莢在面王為不日五色之正端滿合時日者是為無邪有別鄉者猶言正色之外別部又見一色也如赤見於面王則非其部不當見而見又非其時矣其色上鋭首空上向下鋭下向在左右如法色之侵乘必視其尖鋭處為乘之首上鋭上乘下鋭下乘左右皆如其法以五色命臟青為肝赤為心白為肺黃為脾黑為腎肝合筋心合脈肺合皮脾合肉腎合骨也別五色而知五臟因五臟而知五合再察在何部而分生克吉凶病固無遁情矣面上白點腹中蟲積面青白黃色不常及面上如蟹爪路一黃一白者食積兩顴時赤虛火上炎病人面無血色無寒熱脈沉弦者衄也病人見黃色光澤者為有胃氣不死干黃者凶赤色出兩顴大如拇指病雖小愈必卒死黑色出於庭大如拇指必不病而卒死冬月面慘傷寒紫濁時病色白而肥氣虛多痰黑而瘦陰虛火旺目靈樞論疾診尺篇曰目赤色者病在心白在肺青在肝黃在脾黑在腎黃色不可名者病在胸中白睛黃淡脾傷泄痢黃而濁兼面如熏濕盛黃疸黃如橘子明者熱多黃中兼青紫脈芤是瘀血胸中兩脅必有塊眼黑而頰赤者熱痰也眼胞上下如煙煤者痰也眼黑而行走艱難呻吟者入骨痰也其證遍體骨節痠痛眼黑麵帶土色四肢痿痹屈伸不便者風痰也目黃大煩脈大為病進目黃心煩脈和者為病將愈目睛暈黃衄未止平人見黑氣起口鼻耳目者凶目睛黃酒疸黃白及面眼胞上下腫者谷疸其人心下必痞脹明堂眼下青色多欲精神勞傷不爾即未睡面黃目青為傷酒面無精光齒黑者凶瘰癧赤脈貫瞳者凶一脈一歲死一脈半歲半死二脈二歲死三脈三歲死目間青脈起者掣痛乃少陽膽經之滯也瞳子高大者太陽不足病人面目俱等者吉面黃目青面黃目赤面黃目白麵黃目黑皆不死面赤目白麵青目黑麵黑目白麵赤目青皆死面目有黃色是有胃氣為吉前二節一有胃氣一無胃氣傷寒眼下青色屬挾陰挾陰者俗指房事也金匱要略曰其目正圓者痓不治瞪直屬太陽經絶太陽主筋故痓痓一作死又色青為痛色黑為勞色赤為風色黃者小便難色鮮明者有留飲鮮明者俗言水汪汪也俱指白珠目睛不了了鼻中呼不出吸不入氣短促而冷者陰病目睛了了鼻中呼吸出入能往能來口鼻息長而皆熱者陽病也鼻金匱要略曰病人有氣色見於面部願聞其說師曰鼻頭色微黑者有水氣色黃者胸上有寒色白者亡血也設微赤非時者死鼻頭色黃小便必難上云胸上有寒寒則水穀不運故小便難也余處無恙獨鼻尖青黃者其人必為淋也鼻頭青腹中痛舌冷者死鼻孔忽仰起者死鼻枯槁不澤者死鼻冷如冰連兩頤者多死病人鼻頭明山根亮目眥黃光起色鼻頭微白者亡血血脈論疾診尺篇曰診血脈者多赤多熱多青多痛多黑為久痹多赤多黑多青皆見者寒熱血脈即絡脈肌皮嫩薄者視之可見素問平人氣象論曰臂多青脈曰脫血絡中血脫故不紅而多青毛髮發枯生穗血少火盛毛髮不堅多墮落者衛氣疏或有風眉墮者風也病人頭毛上逆者凶血枯不榮如枯草不柔順而徑直小兒疳病多此亦主有蟲形體人之大體為形形之所充者氣形勝氣者夭肥白氣不充氣勝形者壽修長黑色有神氣實形實氣虛形虛形盛脈細少氣不足以息者死形瘦脈大胸中多氣者死形氣相得者生參伍不調者死肥人多中風以形厚氣虛難以周流而多鬱滯生痰痰壅氣塞成火而多暴厥也瘦人陰虛血液衰少相火易亢故多勞嗽病人形脫而氣盛者死正虛則形脫邪實則氣盛形體充大而皮膚寬緩者壽形體充大而皮膚緊急者夭形氣相失謂之難治形盛氣虛氣盛形虛形澀而脈滑形大脈小形小脈大形長脈短形短脈長形滑脈澀肥人脈細小輕虛如絲羸人脈躁俱凶血實氣虛則肥氣實血虛則瘦肥者能寒不能熱能讀耐瘦者能熱不能寒美髯而長至胸陽明血氣盈髯少血氣弱不足則無髯美髯者太陽多血坐而下一腳者腰痛也行遲者痹也或表強或腰腳痛或麻木風疾裡實護腹如懷卵物者心痛也持脈病人缺者無病也經雲陽引而上陰引而下則缺陰陽相引故云無病病亦即愈息搖肩者心中堅息引胸中上氣者咳息張口短氣者肺痿吐沫形肉已脫九候雖調者死掌中寒者腹中寒掌中熱者陰不足虛火盛診時病人以手捫心閉目不言必心虛怔忡倉廩不藏者門戶不要也水泉不止者膀胱不藏也頭者精明之府頭傾視深精神將奪背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂附筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣眼胞腫十指頭微腫者必久咳死證尸臭舌卷囊縮肝絶口不合脾絶肌肉不滑唇反胃絶髮直齒枯及遺尿腎絶毛焦面黑直視目瞑不見陰氣絶目眶陷目系傾汗出如珠陽絶系病後喘瀉脾脈將絶目正圓手撒戴眼太陽絶吐沫聲如鼾睡面赤面青黑唇青人中滿唇反發與眉衝起爪甲下肉黑手掌無紋臍凸足跗腫面青但欲伏眠目視不見汗出如油肝絶八日死眉傾者膽死手足爪甲青或脫落呼罵不休筋絶八日死肩息直視心絶立死髮直如麻不得屈伸自汗不止小腸絶六日死口冷足腫腹熱臚脹泄利無時不覺脾絶五日死脊痛腫身重不可反覆胃絶五日死耳干舌背腫溺血大便赤泄肉絶九日死口張氣出不返肺絶三日死泄利無度大腸絶齒枯面黑目黃腰欲折自汗腎絶四日死齒黃枯落骨絶五臟絶證五臟已奪神明不守聲嘶循衣摸床譫語陽明絶妄語錯亂及不語失音熱病猶可生脈浮而洪身汗如油喘而不休肺絶汗膩不流脈洪而喘不休真氣外散陽反獨留形體如煙燻直視搖頭心絶心為火臟故陽熱獨存煙燻火極焦灼之象唇吻反青四肢漐漐汗出肝絶唇吻屬脾而青色屬木木乘土故曰反環口黧黑柔汗發黃脾絶水色凌土冷汗身黃脾真發越溲溲遺矢狂言目反直視腎絶溲便二陰腎臟所司遺矢則門戶不閉水精敗絶目背瞳人陽氣先絶陰氣後竭者死時身面必青陽先脫陰絶於後故青色存也陰氣先絶陽氣後竭者死時身面手足必赤腋下溫心下熱陰先脫陽絶於後故赤色見余陽未即盡故腋溫心熱水漿不下形體不仁乍靜乍亂胃絶胃納水穀合肌肉故六腑氣絶足冷腳縮五臟氣絶便利不禁手足不仁手太陰氣絶則皮毛焦太陰者肺也行氣溫於皮毛者也故氣不榮則皮毛焦而津液去津液去則皮節傷皮上之紋皮節傷則皮枯毛折津液去而皮節平毛無潤養而折毛折者則毛先死丙日篤丁日死火剋金余仿此手少陰氣絶則脈不通脈不通則血不流血不流則色澤去故面色黑如黧此血先死壬日篤癸日死足太陰氣絶則脈不榮其口唇口唇者肌肉之本也脈不榮則肌肉不滑澤肌肉不滑澤則肉滿肉滿則唇反唇反則肉先死甲日篤乙日死足少陰氣絶則骨枯少陰者冬脈也伏行而溫於骨髓故骨髓不溫則肉不著骨骨肉不相親則肉濡而卻肉濡而卻故齒長而垢齒齦肉退卻而齒則長垢也發無潤澤無潤澤者則骨先死戊日篤巳日死足厥陰氣絶則筋縮引卵與舌厥陰者肝也肝者筋之合也筋者聚於陰器而絡於舌本故脈不榮則筋縮急筋縮急則引卵與舌故舌卷囊縮此筋先死庚日篤辛日死三陰氣俱絶則目眩轉目矇目矇者為失志失志則志先死死即目矇也目不見也脫陰者目矇六陽氣俱絶則陰與陽相離陰陽相離則腠理泄絶汗乃出大如貫珠轉出不流旦占夕死夕占旦死詐病向壁臥聞師到不驚起而目盼視若二言三止口之咽唾者此詐病也若脈和平當言此病太甚須針灸數十處服吐下藥乃愈嚇其詐也聲診聲難經六十一難曰聞其五音以別其病以五臟有五聲以合於五音謂肝呼應角心言應徵脾歌應宮肺哭應商腎呻應羽是也然此義深奧非尋常所可倣佛者今惟以名賢簡易之法匯著於下脈之呻者痛也為彼診時有呻吟之聲言遲者風也風滯於氣機關不利出言遲吃而蹇澀聲如從室中言此中氣之濕也濕濁淆氣言不清亮言而微終乃復言者此奪氣也謂氣短弱不相接言未已停止半晌復言衣被不斂言語罵詈不避親疏者此神明之亂也即風狂之類熱病不論出言懶怯先輕後重者內傷不足出言壯厲先重後輕者外感有邪攢眉呻吟者苦頭痛叫喊或呻吟以手捫心下者中脘痛呻吟不能轉身或轉而作楚態者腰痛呻吟頭搖或攢眉以手捫腮唇者齒痛呻吟不能行起者腰腳痛為彼診時數吁氣者屬鬱結籲則氣鬱少伸搖頭言者里痛形羸聲啞勞瘵不治此必咽中有瘡肺金火克肺主聲故耳暴啞者風痰伏火或忿怒叫喊所致聲嘶色敗久病不治坐而氣促喉聲者痰火哮喘言語蹇澀者風痰中年人聲濁痰火診時獨言獨語言談無緒者思慮傷神心神他寄故耳傷寒壞證聲啞為狐惑上唇有瘡蟲食其臟下唇有瘡蟲食其肛雖病而聲響如故者吉金匱要略曰病人語聲寂然喜驚呼者骨節間病語聲喑喑然不徹者心膈間病語聲啾啾然細而長者頭中病欲言復寂忽又驚呼非深入骨節之病不如此也況骨節中屬大筋筋為肝合骨乃膽主驚呼亦出於肝膽故耳喑喑低渺之聲聽不明徹必心膈間有所阻礙啾啾細長之聲所謂如室中甕中出者頭中有濕混其清陽故鼻窒發聲如此也息氣短促不足以息虛甚氣不能應呼吸平人無寒熱短氣不足以息者實也中焦有礙或痰火吸而微數其病在中焦實也當下之即愈中實吸不得入還出復入故微數也虛者不治實則可下中虛吸不盡入而微數者肝腎欲絶在上焦者其吸促在下焦者其吸遠此皆難治呼吸動搖振振者不治病在上焦氣宜通下病在下焦氣宜達上上下交通病斯愈矣今上焦者吸促而不能通下下焦者吸遠而不能達上上下不交通病豈易治乎動搖振振氣不載形也問診人品起居凡診病必先問所看何人或男或女或老或幼或童僕或婢妾次問得病之日受病之源及飲食胃氣如何便利如何曾服何藥日間何如夜間何如或寐或寤有無脹悶痛處病證問病不答必耳聾即當詢之是素聾否不則病久或汗下過傷虛聾問而懶言答唯點頭者是中氣虛昏憒不知人問是暴厥抑是久病婦女僵厥多是中氣亦須問其曾大怒否婦女當問其月水如何寡婦氣血凝滯兩尺多滑不可誤斷為胎室女同心腹脹痛問是舊病新病嗜欲苦樂問其所欲何味所嗜何物或縱酒或齊素喜酸者則知肝虛喜甘脾虛他味准此頭身臂膊作痛必問曾病惡瘡否臨病必審形志或形勞志苦或抑鬱傷中故貴脫勢眷戀於心雖不中邪病從內生名曰脫營謂脫散營氣常富後貧悲憂內結名曰失精謂精神喪失二者皮焦筋屈痿痹為攣以其外耗於衛內奪於營良工診之必知病情再問飲食起居暴樂暴苦始樂後苦暴怒傷陰暴喜傷陽形體毀沮精華日脫邪氣內並邪乘虛而襲附辨舌張三錫曰金鏡録載三十六舌辨傷寒之深淺吉凶可稱詳備然細討究不過陰陽表裡寒熱虛實而已陶節庵曰傷寒邪在表則舌無胎熱邪在表則胎漸生自白而黃黃而黑甚則黑裂矣黑胎多凶若根黑或中黑或尖黑皆屬裡熱全黑則熱極而難治常見外感挾內傷宿食重而結於心下者五六日舌漸黃或中干而邊潤名中焙舌此則裡熱尚淺若全乾無論黃黑皆屬裡證分輕重下之若曾經下或屢下不減乃宿滯結於中宮也診其脈之虛實及中氣何如實者潤而下之虛人神氣不足當生津固中氣有用生津散對解毒湯而愈者有用附子理中湯冷服而愈者一則陰極似陽一則陽極似陰不可不辨白胎屬寒外證煩躁欲坐臥於泥水中乃陰寒逼其無根失守之火而然脈大不鼓當從陰證治若不大躁嘔吐者從食陰治之白胎燥虛而微熱或不得汗或胃中少有飲而不行宜溫解白滑胎虛寒胃寒陽氣不振宜溫白胎起芒刺津液不足胃中有物宜運動黃胎微熱熱漸入里或燥渴之象宜清解灰色胎胃中有物中氣虛熱渴而不能消飲者宜溫解黑色胎熱入裡實燥厚者宜下滑潤者水困火宜溫雖黑而潤所謂水極似火也不燥為異凡傷寒辨舌者以舌屬心而主火寒為水也水寒凌火舌受其困産後辨舌者以心主血也經云少陰氣絶則血不流故舌紫黑者為血先死凡見黑舌要問曾食酸甜咸物否能染成黑色凡視舌色雖有成見亦必細審兼證及脈之虛實不爾恐有毫釐千里之謬
