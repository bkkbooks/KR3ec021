body:
  text: 卷之四十菜部下品菜之走苦瓠有毒蔓生苦瓠主大水面目四肢浮腫下水令人吐神農本經苗謹按苦瓠二月布種三月生苗蔓延於地莖葉都似葫蘆青緑色而有毛四月開白花結實初大如指五月方熟長者尺餘頭尾相似人採其苦者入藥甜者作菜食之考之唐本注云瓠與冬瓜瓠𤬏此三物苗葉相似而實形有異瓠味皆甜其有苦者是也地圖經曰生晉地川澤今處處有之時生春生苗採夏取實收曝乾用肉及瓤色白味苦性寒泄氣味厚於氣陰也臭腥主消水腫治療唐本注云苦瓠瓤消水腫石淋吐呀虛牙切張口貌嗽囊結疰蠱痰飲又煮汁漬陰療小便不通甜瓠𤬏通利水道止渴消熱藥性論云苦瓠瓤消水浮腫面目肢節腫脹下利大消氣疾日華子云瓠除煩止渴及心熱利小腸潤心肺療吐蛔蟲陳藏器云苦瓠煎汁取滴鼻中出黃水去傷寒鼻塞黃疸及取一枚破開口以水煮攪取汁滴鼻中主急黃又取未破者煮令熱解開尉小兒閃癖孟詵云止消渴及惡瘡別録云療鼠瘻用瓠花曝乾為末敷之又除卒患腫滿者曾有人忽腳跌腫漸上至膝足不可踐地漸加大水頭面遍身大腫脹滿者用苦瓠白瓤實捻如大豆粒以麵裹煮一二沸空心服七枚至午當出水一斗三日水自出不止大瘦乃瘥三年內忌口味用苦瓠須無靨翳細理妍淨不爾有毒又黃疸以瓠子白瓤子熬令黃搗為末每服半錢匕日一服十日愈用瓠數有吐者當先詳之中蠱毒吐血或下血皆如爛肝者苦瓠一枚水二升煮取一升服立吐即愈合治七月七日取苦瓠瓤白絞取汁一合合酢一升古錢七文和漬微火煎之減半以沫納眼眥中治眼暗解服之過分令人吐利不止者宜以黍穰灰汁解之解丹石毒忌患腳氣及虛脹冷氣人不可食食之尤甚菜之草葫有毒叢生葫主散癰腫𧈟瘡除風邪殺毒氣獨子者亦佳歸五臟久食傷人損目明名醫所録名大蒜苗謹按葫乃大蒜也八月布種於熟地數日生葉如蒲而短軟經冬不凋至三四月抽苗長尺餘人以淹藏食之花生莖端結實作瓣亦似葫狀而極小亦可種之其近根者俗呼為蒜頭有六七瓣惟獨頭者入藥為勝地圖經曰舊不著所出州土今處處皆有之時生春生新葉採五月五日取收曬乾用獨根子者佳色白味辛性溫氣氣之厚者陽也臭臭主除邪辟穢溫中消食治療圖經曰發背及癰疽惡瘡腫核等若初覺皮肉間有異知是必作瘡者切大蒜如銅錢厚片安腫處灸之不計壯數其人被苦初覺痛者以痛定為準初不覺痛者灸至極痛而止若是疣贅亦如此灸之便成痂自脫其效如神唐本注云下氣消穀除風破冷日華子云健脾治腎氣止霍亂轉筋腹痛除邪辟溫去蠱毒療勞瘧冷風痃癖溫疫氣傳風拍冷痛蛇蟲傷惡瘡疥溪毒沙蝨並搗貼之陳藏器云去水惡瘴氣除風濕破冷氣爛痃癖伏邪惡又魚骨鯁不出以蒜納鼻中即出食療云除風殺蟲別録云牙齒疼痛用獨頭蒜煨乘熱截以尉痛上冷易之亦主蟲痛又關格脹滿大小便不通獨頭蒜燒熟去皮綿裹納下部氣立通又暴痢搗蒜兩足下貼之又血氣逆心煩悶痛生搗汁服二升即瘥又丹毒惡瘡五色無常及發足踝者搗蒜厚敷干則易之又腹滿不能服藥取獨顆蒜煨令熟去皮綿裹納下部中導之冷則易又蜈蚣咬人痛不止獨蒜摩螫處即止又鼻血不止服藥不應宜用獨蒜一枚去皮細研如泥攤一餅子如錢大厚一豆許左鼻血出貼左腳心右鼻血出貼右腳心如兩鼻出即貼兩腳心立瘥血止急以溫水洗去合治蒜去皮一升搗合小便一升煮三四沸通手漬蛇咬瘡從旦至暮及初被咬未腫者速嚼蒜封之六七易瘥蒜一升去皮合乳二升煮使爛空腹頓服隨後用飯壓之明日依前進服下一切冷毒風氣獨頭蒜一枚合雄黃杏仁研為丸空心飲下三丸靜坐少時患鬼氣者當汗出即瘥獨頭蒜兩顆細搗合油麻和厚敷瘡上干則易之療癰腫毒瘡叫臥不得人不別者此方神效蒜一大升破去心合無灰酒四升煮令極爛並滓服一大升療金瘡中風角弓反張者須臾得汗愈獨頭蒜合酸草搗敷蛇虺螫人處禁久食令人血清使毛髮白多食傷肝令人無顏色四月八月勿食傷人神損膽氣忌合青魚鮓食之令人腹內生瘡腸中腫又成疝瘕蒜有小毒叢生蒜歸脾腎主霍亂腹中不安消穀理胃溫中除邪痹毒氣名醫所録名薍音亂子蒚力的切葷菜宅蒜苗圖經曰此乃小蒜也根苗皆如葫而極細小爾雅云蒚山蒜釋曰葷蒜也一云菜之美者雲夢之葷生山中者名蒚本經謂大蒜為葫小蒜為蒜爾雅説文所謂蒜葷菜者乃今之大蒜蒚乃今之小蒜也一種山蒜似大蒜臭山人以治積塊及婦人血瘕以苦醋磨服效又有一種似大蒜而多瓣有葷氣彼人謂之蓧子主腳氣宜煮與蓐婦食之易産江北則無書傳載物之別名不同如此用藥不可不審衍義曰苗如蔥針根白大者如烏芋子兼根煮食之又謂之宅蒜華他用蒜齏是此物也地圖經曰舊不著所出州土今田野中處處有之時生九月生苗採五月五日取收陰乾用根質類大蒜細小色青白味辛性溫氣氣之厚者陽也臭臭主理胃溫中消穀解毒治療陶隱居云中令霍亂煮飲之日華子云下氣及霍亂吐瀉消宿食並蠱毒敷蛇蟲沙蝨瘡孟詵云敷諸蟲毒疔腫甚良別録云療乾霍亂心腹脹滿氣未得吐下用蒜一升㕮咀以水三升煮取一升頓服瘥毒蛇螫人杵汁飲之以滓敷瘡上又水毒中人一名中溪一名中濕一名水病似射工而無物若身體發赤斑紋者是也用蒜三升㕮咀於湯中煮勿令大熱熱即無力濾去滓適寒溫浴患處合治蒜不拘多少研極爛合黃丹少許搗得所為度丸如雞頭大候乾每服一丸新汲水面東服治瘧至妙合釅醋煮不可著鹽食之飽療心痛不可忍十年五年諸藥不效者服此隨手瘥更不再發禁不可久食損人心力葫蔥無毒植生葫蔥溫中消穀下氣殺蟲久食傷神損性令人多忘損目明尤發痼疾患狐臭人不可食令轉甚名醫所録苗圖經曰葫蔥類食蔥根莖皆細其頭似大蒜而小形圓肉白皮赤稍長而鋭又云莖葉微短如金燈也地圖經曰生蜀郡山谷今處處皆有之時生春生新葉採五月六月收陰乾用子質類大蒜而小色白味辛性溫散氣氣之厚者陽也臭臭主消穀制雷公云凡使採得依文碎擘用緑梅子於砂盆中研如膏新瓦器中攤曬乾用治療食療云葫蔥消穀能食利五臟不足氣亦治傷絶血脈氣禁根食之發痼疾四月勿食葫蔥令人氣喘多驚患𧈟齒人勿食解食著諸毒肉吐血不止萎黃悴者取子一升洗煮使破取汁停冷服半升日夜各一服血定止蓴無毒水生蓴常倫切主消渴熱痹名醫所録名絲蓴瑰蓴苗圖經曰根生水底葉似鳧葵浮在水上採莖堪啖花黃白實紫色三月至八月莖細如叉股黃赤色短長隨水深淺而名為絲蓴九十月漸粗硬十一月萌在泥中粗短名瑰蓴體苦澀惟取汁味為羹甚美猶勝雜菜也地出松江三泖時生春生苗採八月九月十月十一月收陰乾用莖質莖如叉股葉似鳧葵色黃赤味甘性寒氣氣之薄者陽中之陰臭腥主下氣止渴治療日華子云絲蓴治疸厚腸胃安下焦逐水陳藏器云蓴下水利小便補日華子云少食能補大小腸虛氣合治蓴合鮒魚為羹食之治胃氣弱不下食至效合鯽魚作羹食之下氣止嘔多食發痔雖冷而補熱禁疫病起不宜食食之多死亦不宜常食能發氣令關節急嗜睡及壅氣不下甚損人胃與齒不可多食令人顏色惡久食損毛髮忌不宜和醋食之令人骨痿解百藥毒並蠱氣水斳無毒植生水斳音芹主女子赤沃止血養精保血脈益氣令人肥健嗜食神農本經名水英萩芹赤芹楚葵渣芹白芹苗圖經曰生水中葉似芎藭花白色而無實根亦白色爾雅云芹楚葵即今水中芹菜也然有兩種萩芹取根白赤芹取莖葉並堪作菹又有渣芹可為生菜亦可生啖俗中皆作芹字也地圖經曰生南海池澤今處處有之時生春初採二五六月取用根及莖葉色葉青根白味甘性平氣氣之薄者陽中之陰臭香主益氣血養精神治療唐本注云芹花主脈溢莖葉治小兒暴熱大人酒後熱毒鼻塞身熱利大小腸並搗汁服之日華子云治煩渴及崩中帶下陳藏器云利人口齒去頭中熱風別録云去伏熱及治五種黃病並女子白沃漏下作菹及煮食之亦治小兒霍亂吐痢以芹葉細切煮汁飲之補孟詵云養神益力禁患鱉瘕人不可食三月四月勿食芹菜恐病蛟龍瘕發則似癲面手青黃肚腹脹滿痛不可忍狀如懷妊急服硬糖三二升日二度吐出即瘥忌不可與醋同食能損齒解殺藥石毒馬齒莧無毒附子叢生馬齒莧主目盲白翳利大小便去寒熱殺諸蟲止渴破癥結癰瘡服之長年不白和梳垢封疔腫又燒為灰和多年醋滓先灸疔腫以封之即根出生搗絞汁服當利下惡物去白蟲煎為膏塗白禿又主三十六種風結瘡以一釜煮澄清納蠟三兩重煎成膏塗瘡上亦服之子明目仙經用之名醫所録名五行草苗圖經曰馬齒莧雖名莧類而苗葉與今莧輩都不相似其葉青梗赤花黃根白子黑因具五色故又名五行草也此有二種葉大者不堪用葉小者為勝云其節葉間有水銀每干之十斤中得水銀八兩至十兩者然至難燥當以槐木捶搗碎向日東作架曝之三兩日即干如經年者入藥去其莖節則佳也地圖經曰舊不著所出州土今處處有之時生春生苗採夏秋取收曬乾用小葉者為好色青味酸性寒氣氣薄味厚陰也臭腥主消癰腫殺諸蟲治療圖經曰除多年惡瘡百方不瘥或痛焮走不已者爛搗敷上不過三兩遍瘥蜀本云主諸腫瘻疣自尸腳陰腫反胃諸淋金瘡流血破血癖癥瘕用汁治緊唇面皰孟詵云療馬毒瘡以水煮冷服一升並塗瘡上濕癬白禿杖瘡以馬齒膏和灰塗效膏服之治疳痢及一切風陳藏器云破痃癖止消渴又主馬惡瘡蟲別録云馬咬人毒入心煮湯食之瘥又小兒臍瘡久不瘥者燒葉末敷之又豌豆瘡燒灰敷瘡上根鬚臾逐藥出若不出更敷良又氣不調作粥食又小兒火丹繞腰熱如火杵敷之日二次愈又五毒蟲毛螫赤痛不止熟杵敷之補食療云作膏服之能延年益壽明目合治煮一碗合鹽醋空腹食之少時去寸白蟲雞子白一枚先溫令熱乃合莧汁三大合微溫取頓服療赤白下不過再作則愈不問老稚孕婦悉可服燒灰細研合豬脂調敷反花瘡陰乾燒灰合臘月豬脂敷癧瘡先以暖泔清洗瘡拭乾後敷之日三次合少粳米醬汁煮食之理腳氣頭面浮腫心腹脹滿小便澀少生絞汁一合合蜜一匙空心飲之療小兒血痢生杵汁三合煎一沸下蜜一合攪服療産後血痢小便不通臍腹痛禁多食肥腸令人不思食解汁解射工馬汗毒菜之木茄子無毒植生茄子久冷人不可多食損人動氣發瘡及痼疾根及枯莖葉主凍腳瘡可煮作湯漬之良苦茄樹小有刺其子以醋摩癰腫根亦作浴湯名醫所録名落蘇苦茄苗圖經曰茄之類有數種紫茄黃茄南北通有之青水茄白茄惟北土多有入藥多用黃茄其餘惟可作菜茹耳又有一種苦茄生嶺南小株有刺亦入藥用地圖經曰舊不著所出州土今處處有之時生夏結實採夏秋取用實色黃味甘性寒氣氣之薄者陽中之陰臭腥治療日華子云治瘟疫傳尸勞氣陳藏器云醋摩敷臍腫瘥苦茄主瘴孟詵云療寒熱五臟勞又醋摩敷腫毒合治老黃茄子不計多少以新瓶盛貯埋土中經一年盡化為水取出合苦參末丸如梧子大飯後及臥時酒下三十粒療大風熱痰甚效重陽日收取茄子百枚去蒂四破切之硝石十二兩碎搗以不滲瓷器約大小可盛納茄子者於器中先鋪茄子一重乃下硝石一重覆之如此令盡然後以紙三數重密密封之安置淨處上下以新磚撢它甘切勿令著地氣至正月後取出去紙兩重日中曝之逐日如此至二三月度已爛即開瓶傾出濾去滓別入新器中以薄綿蓋頭又曝直至成膏乃可用治墜撲內損散敗血止痛及惡瘡發背等若內損者酒調半匙空腹飲之日再惡血散則痛止而愈諸瘡腫亦先酒飲半匙仍用膏於瘡口四面塗之當覺涼如冰雪瘡干便瘥若瘡有根本在膚腠者亦可內消其膏久乾硬即以飯飲化開塗之以茄子根五十斤細切淨洗訖用水五斗煮取濃汁濾去滓更入小鐺器中煎至一升以來合生粟米粉同煎令稀稠得所取出搜和再入麝香硃砂細末丸如梧子大每旦用秫米酒送下三十丸近暮再服治腰腳風血積冷筋急拘攣疼痛者男女通用皆驗茄子留作種通黃極大者切作片如一指厚新瓦上焙乾為末欲臥時酒調服二錢匕療榼撲損肌膚青腫一夜消盡無痕迹茄蒂燒存性為末每食前米飲調服三錢匕療腸風下血久不止者禁不可多食動氣及發痼疾菜之走蘩蔞無毒蔓生蘩蔞主積年惡瘡不愈及主毒腫止小便利名醫所録名雞腸草蔜五高切𤚩素老切𦎪與縷同蘩𦎪苗圖經曰蘩蔞即雞腸草也葉似荇菜而小夏秋間開小白黃花其莖梗作蔓斷之有絲縷又細中空似雞腸因得此名也本經作兩條而蘇恭以為一物二名爾雅釋曰蔜一名𤚩𦎪一名雞腸草實一物也今南北所生或肥瘠不同又其名多人不盡見故往往疑為二物也唐本注云雞腸草即蘩蔞是也原在草部下品剩出此條詳其主療相似其實一物今宜並之地圖經曰舊不著所出州土今南中多生於田野間近京下濕地亦或有之時生春生苗採五月五日午時取收曝乾用苗質葉類荇菜而小色青味酸性平氣味厚於氣陰中之陽臭腥主破積血消瘡腫治療圖經曰牙齒宣露燒灰揩擦然燒灰力減不若干末尤勝又治淋取兩手把以水煮飲之陶隱居云燒為末療雜瘡有效藥性論云洗手足水爛治遺尿及蠼螋尿瘡挼汁敷之陳藏器云主破血産婦煮食之及下乳汁孟詵燒灰敷疳𧈟食療云治一切惡瘡搗汁敷之五月五日取者驗別録云治發背欲死搗敷良合治合酒炒搗取汁溫服或炒熱和童子小便服俱療産後腹中有血塊痛曝乾為末合醋煎為丸空腹服三十丸下惡血燒作灰和鹽搗封一切瘡及風丹遍身如棗大癢痛者搗取汁一合和蜜服之治小兒赤白痢以一斤合豉汁中煮作羹食之止小便利作粥亦佳禁勿常食恐血盡菜之草白苣無毒附萵苣叢生白苣主補筋骨利五臟開胸膈壅氣通經脈止脾氣令人齒白聰明少睡可常食之名醫所録苗陳藏器云白苣如萵苣葉有白毛萵苣冷微毒紫色者入燒煉藥用余功與白苣同也紹興校定云白苣萵苣然分兩名其形少異性即一也又與前條苦苣性亦不遠惟萵苣乃世之常食菜品多食能昏人目也謹按白苣初春布種葉似蔓荊有鋸齒而柔軟但可生食至夏抽苔嫩時去皮葉醃食之脆美今謂之萵筍也地處處有之時生春生苗採春夏取用葉莖及子質葉類蔓荊小而柔軟色緑味苦性寒泄氣味厚於氣陰也臭腥治療別録云治魚臍瘡其頭白似腫痛不可忍先用針刺瘡上及四畔作孔以白苣汁滴孔子瘥治沙蝨毒以萵苣菜汁敷之瘥治腎黃用萵苣子一合細研水一大盞煎至五分去滓不拘時服禁白苣不可共飴食能生蟲患冷氣人産後不可食令人寒中小腹痛菜之走落葵無毒蔓生落葵主滑中散熱實主悅澤人面名醫所録名天葵藤葵胡燕脂滑藤繁露承露西洋菜苗圖經曰蔓生葉如杏葉圓厚而柔嫩人家多種之延引於籬落及樹上嫩時採藤葉作羹食之甚滑故名滑藤其實似五味子生青熟黑碎之則紫女人以漬粉敷面為假色俗呼為胡胭脂也少入藥用地所在有之時生春生苗採春夏取收曝乾用藤葉色緑味酸性寒氣氣薄味厚陰也臭腥合治子蒸烈日中曝乾挼去皮取仁細研合白蜜敷面令人面色鮮華可愛禁此菜患狗咬瘡者勿食食之終身不瘥菜之草堇無毒植生堇汁主馬毒瘡搗汁洗之並服之出小品方萬畢方云除蛇蠍毒及癰腫名醫所録名堇葵苦堇苗唐本注云此菜野生非人所種俗謂之堇菜葉似蕺花紫色按爾雅云齒苦堇注今堇葵也葉似柳子如米汋食之滑內則曰堇豆粉榆是也本草云味甘此云苦者古人語倒正猶甘草謂之大苦之義也地處處有之時生春生苗採無時用莖葉色青緑味甘性寒氣氣之薄者陽中之陰治療孟詵云久食除心煩熱及搗敷熱腫殺鬼毒生取汁半升服即吐出食療云主寒熱鼠瘻瘰癧瘡結核聚氣下瘀血葉主霍亂及生搗敷蛇咬瘡其毒即出合治乾末合油煎成膏摩結核上三五度瘥禁久食令人身重懈惰多睡菜之走蕺有毒蔓生蕺音戢主蠼音劬螋音搜溺瘡多食令人氣喘名醫所録名菹菜苗圖經曰蔓生莖紫赤色葉如蕎麥而肥英有臭氣山南江左人好生食之關中謂之菹菜者是也古今方家亦鮮用之地圖經云生江南山谷陰處濕地有之道地揚州關中用莖葉色紫赤味辛性微溫氣氣之厚者陽也臭臭治療日華子云淡竹筒內煨敷惡瘡白禿別録云背瘡熱腫搗汁敷瘡上開孔以歇熱毒干即易之瘥禁久食令人氣喘發虛弱損陽氣消精髓素有腳弱病尤忌之一啖令人終身不愈小兒食之三歲不能行菜之草馬芹子毒叢生馬芹子主心腹脹滿下氣消食名醫所録名茭牛蘄馬蘄子苗唐本注云苗似鬼針菾菜輩花青白色如芹花子黃黑色似防風子而匾大爾雅云茭牛蘄釋曰似芹可食者也其葉但鋭子可調味用之香似橘葉而無苦味亦入藥用惟根葉不堪食也地唐本注云生水澤旁時生春生苗採秋取實收曝乾用子色黃黑味甘性溫氣氣之厚者陽也臭香治療日華子云治卒心痛炒食令人得睡合治作末合醋服除卒心痛藝臺無毒叢生藝臺主風遊丹腫乳癰名醫所録苗唐本注云此人間所啖菜也衍義曰藝臺不堪香經冬根不死闢蠹於諸菜中亦不甚佳謹按埤雅云藝臺香草也仲冬之日始生類豌豆而作叢又似苜蓿葉似雅蒿極芬香可食秋後葉間微白如粉經冬根亦不死故淮南子云藝草死而復生是也採之著於衣書可以闢蠹在漢時種於蘭臺藏書之府今南人採置席下亦可以去蚤蝨又謂七里香也地舊不著所出州土今在處有之時生春生苗採夏秋取收陰乾用葉及實味辛性溫散氣氣之厚者陽也臭香治療唐本注云藝臺破癥瘕結血日華子云治産後血風及瘀血陳藏器云破血産婦宜食之子壓油敷頭令頭髮長黑葉搗敷赤遊疹禁春勿食能發膝痼疾久食極損傷氣若先患腰腳病不可多食及發口瘡齒痛又能生腹中諸蟲患狐臭人不宜食菠薐微毒叢生菠薐利五臟通腸胃熱解酒毒服丹石人食之佳北人食肉面即平南人食魚鱉水米即冷不可多食冷大小腸久食令人腳弱不能行發腰痛不與蛆魚同食發霍亂吐瀉名醫所録名赤根菜苗劉禹錫嘉話録云菠薐本西國中有自彼將其子來如苜蓿葡萄因張騫而至也本是頗陵國將來語訛爾時多不知也今據圃人播子於畦其葉漸長繁茂而有三尖者名為火焰菠薐根葉柔嫩作茹食之甘美至六七月莖高二三尺作莢生子頗類蒺藜子其根色赤故北人呼為赤根菜也時生秋初生苗採九月十月取用莖葉色青緑味甘性冷氣氣之薄者陽中之陰苦蕒無毒叢生苦蕒治面目黃強力止困敷蛇蟲咬又汁敷疔腫即根出蠶蛾出時切不可取拗令蛾子青爛蠶婦亦忌食野苦蕒五六回拗後味甘滑於家苦蕒甚佳名醫所録名天淨菜苗謹按春生苗摘其葉有白汁出人多采以生啖之亦可蒸作茹若遠行人馬皆可食也地處處有之時生春生苗採夏月取用莖葉色緑味苦性冷氣氣薄味厚陰也臭腥鹿角菜無毒微毒海生鹿角菜下熱風氣療小兒骨蒸熱勞丈夫不可久食發痼疾損經絡血氣令人腳冷痹損腰腎少顏色服丹石人食之下石力也名醫所録苗謹按鹿角菜莖長二三寸紅紫色生海中石上其莖中空而多岐形類鹿角故以名之海人採鬻以作蔬茹今筆家煮以制筆蓋取其黏滑而不散亂也地圖經曰出海州及登萊沂密州並有時生無時採無時收陰乾色紫味咸性大寒氣味厚於氣陰也臭腥解面熱莙薘微毒叢生莙薘補中下氣理脾氣去頭風利五臟冷氣不可多食動氣先患腹冷食必破腹莖灰淋汁洗衣白如玉色名醫所録苗謹按圃人春間以子水浸數日俟其萌動播種於畦苗葉漸高尺許至夏繁茂抽莖著碎黃花於其端作莢生子刈其莖燒灰淋汁浣衣大能去油垢也地舊不著所出州土今在處有之時生春生苗採春夏取用莖葉色青緑味甘性平氣氣之薄者陽中之陰臭腥東風菜無毒植生東風菜主風毒壅熱頭疼目眩肝熱眼赤名醫所録苗圖經曰莖高二三尺葉似杏葉而長極厚軟上有細毛先春而生故有東風之號堪入羹臛及煮食之甚美地圖經曰生嶺南平澤時生先春生苗採春夏取色青緑味甘性寒緩氣氣之薄者陽中之陰臭腥菜之走雍菜無毒蔓生雍菜主解葛毒煮食之亦生搗服之名醫所録苗圖經曰嶺南種之蔓生花白堪為菜雲南人先食雍菜後食野葛二物相伏自然無苦又取汁滴野葛苗當時煙死其相殺如此張司空云魏武帝啖野葛至一尺應是先食此菜也地圖經曰生嶺南時生春生苗採無時色緑味甘性平緩氣氣之薄者陽中之陰臭朽制生搗或煮汁飲之菜之草玉簪花有小毒叢生玉簪花根搗汁療諸骨鯁今補名白鶴花苗謹按此即白鶴花也苗高尺余葉生莖端淡緑色六七月抽莖分岐生數蕊長二三寸清香瑩白形如冠簪故名玉簪花也未開時採以拖面煎食肥滑香美至秋作莢四瓣如馬藺子其實若榆錢而狹長也一種莖葉花蕊與此無別但短小深緑色而花紫嗅之似有惡氣殊不堪食謂之紫鶴人亦呼為紫玉簪也八月作角如桑螵蛸有六瓣子亦若榆錢而黑亮如漆患骨鯁者取其根搗汁以葦筒吸入喉內有效吸時慎勿著牙犯之則酥落無紫者以白者代之亦可地處處有之時生春生苗採不拘時取根用根色白味微苦性寒氣味厚於氣陰也制去土搗汁用禁凡服勿犯牙齒一種陳藏器余甘藍平補骨髓利五臟六腑利關節通經絡中結氣明耳目健人少睡益心力壯筋骨此者是西土藍闊葉可食治黃毒者作菹經宿漬色黃和鹽食之去心下結伏氣別録云甘藍菜作齏菹煮食並得隴西多種食之漢地少有多食令人少睡
