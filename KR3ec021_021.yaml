body:
  text: 卷之二十本部下品之上木之木巴豆大毒植生巴豆出神農本經主傷寒溫瘧寒熱破癥瘕結聚堅積留飲痰癖大腹水脹盪滌五臟六腑開通閉塞利水穀道去惡肉除鬼毒蠱疰邪物殺蟲魚以上朱字神農本經療女子月閉爛胎金瘡膿血不利丈夫陰㿗可練餌之益血脈令人色好變化與鬼神通以上黑字名醫所錄名巴椒金線巴豆苗圖經曰木高一二丈葉如櫻桃而厚大初生青後漸黃赤至十二月葉漸凋二月葉漸生至四月舊葉落盡新葉齊生即花發成穗微黃色五六月結實作房生青至八月熟而黃類白豆蔻漸漸自落即收之一房有三瓣一瓣有實一粒同蒂各有殼裹一房共實三粒戎州出者殼上有縱文隱起如線一道至兩三道彼土人呼為金線巴豆最為上等它處亦稀有地圖經曰生巴郡川穀道地戎州眉州嘉州者良時生春生葉採八月十月取實收陰乾用實質類蓖麻子殼黃而有稜色殼微黃肉粒白味辛性生溫熟寒氣氣之厚者陽也臭焦主破癥瘕利穀道助芫花為之使反畏大黃黃連藜蘆惡蘘草制雷公云凡修事須敲碎去殼以麻油並酒等可煮巴豆子研膏後用每修事一兩以酒麻油各七合煮盡為度日華子云凡合丸散炒不如去心膜水煮五度換水各一沸或搗碎以重紙壓滲去油亦好治療藥性論云破心腹積聚結氣治十種水腫痿痹大腹日華子云通宣一切病泄壅滯除風補勞健脾開胃消痰破血排膿消腫毒殺腹臟蟲治蠱療息肉及疥癩疔腫陳藏器云主症癖痃氣痞滿腹內積聚冷氣血塊宿食不消痰飲吐水取青黑大者每日空腹服一枚去殼勿令白膜破乃作兩片並四邊不得有損缺吞之以飲壓令下少間腹內熱如火利出惡物雖利不虛若久服亦不利別錄云治喉閉纏喉風以巴豆兩粒紙緊角可通得入鼻用刀切斷兩頭殼子將針作孔子內鼻中良久即瘥合治巴豆微熬合蜣螂同研塗箭鏃入骨不可拔者塗之始則微癢待極癢不可忍便撼動即拔出巴豆一兩去皮心熬細研取豬肝和丸空心米飲量力加減服之治氣痢或牛肝丸之亦佳禁不宜多服妊娠服之墮胎忌蘆筍醬豉冷水解殺斑蝥蛇虺毒中巴豆毒以黃連汁大豆汁解之贗雷公云凡使巴與豆及剛子須細認勿誤用殺人巴顆小緊實色黃豆即顆有三稜黑色剛子顆小似棗核兩頭尖巴與豆可用剛子不可入藥蜀椒有毒附崖椒目葉叢生蜀椒出神農本經主邪氣咳逆溫中逐骨節皮膚死肌寒濕痹痛下氣久服之頭不白輕身增年以上朱字神農本經除六腑寒冷傷寒溫瘧大風汗不出心腹留飲宿食腸癖下痢泄精女子字乳余疾散風邪瘕結水腫黃疸鬼疰蠱毒殺蟲魚毒開腠理通血脈堅齒髮調關節耐寒暑可作膏藥多食令人乏氣以上黑字名醫所錄名巴椒蓎音唐藙音毅崖椒漢椒南椒苗圖經曰樹高四五尺似茱萸而小有針刺葉堅而滑四月結子無花但生於葉間如小豆顆而圓皮紫赤色此椒江淮及北土皆有之莖實都相類但不及蜀中者皮肉厚腹裡白氣味濃烈爾又有一種崖椒彼土人四季採皮入藥爾雅疏云檓大椒之別名郭云今椒樹叢生實大者名為檓陸機云蜀人作茶吳人作茗皆合煮其葉以為香今成皋諸山間有椒謂之竹葉椒其樹亦如蜀椒小毒熱不中合藥也可煮飲食中用蒸雞豚最佳謹按蜀椒由蜀地所產者故言蜀椒大率椒株皆相似但蜀椒皺紋高非比他椒皺紋低而為別也以上云江淮北土成皋諸山所出者概類蜀椒故附於此地圖經曰生武都川穀及巴郡今歸峽及陝洛間人家園圃多種之道地蜀川金州西域施州時生春生葉採八月取實收陰乾用實目葉皮質類小豆顆而圓開口有皺文色紫赤味辛性溫大熱氣氣之厚者陽也臭香主腹內冷痛溫中下氣助杏仁為之使反畏款冬花雄黃附子防風制雷公云凡使去目及閉口者先須酒拌令濕蒸從巳至午放冷密蓋除向下火四畔無氣後取出便入瓷器中盛勿令傷風用或微炒出汗去梗用治療藥性論云蜀椒治風頑頭風下淚腰腳不遂留結破血下諸石水止嗽除齒痛目主十二種水氣日華子云漢椒破癥結開胃及天行時氣溫疫產後宿血及心腹氣療陰汗縮小便目主膀胱急補藥性論云蜀椒補虛損日華子云漢椒壯陽暖腰膝合治目合巴豆菖蒲松脂熔蠟為筒子內耳中療腎氣虛耳中如風水等聲及卒暴耳聾葉合蔥艾研醋拌罯治奔豚伏梁氣及內外腎釣霍亂轉筋禁閉口者殺人六月十月食之損氣傷心令人多忘贗竹葉椒為偽皂莢有小毒附鬼皂莢植生皂莢出神農本經主風痹死肌邪氣風頭淚出利九竅殺精物以上朱字神農本經療腹脹滿消穀除咳嗽囊結婦人胞不落明目益精可為沐藥不入湯以上黑字名醫所錄苗圖經曰木極高大其葉嫩芽亦可為茹而更益人老幹多生刺針夏作莢經霜後色黑則熟此有三種但枝葉相似惟其莢有大小為異本經云形如豬牙者良陶注云長尺二者良唐注云長六七寸圓厚者大好今醫家入疏風藥多用長者入齒及取積藥多用小者所用雖殊大抵性味不遠核中白肉亦入藥用唐本注云豬牙皂莢最下其形曲戾薄惡全無滋潤洗垢不去其長尺二者粗大虛而無潤不若長六七寸圓厚節促而皮薄多肉味濃者最佳也陳藏器云又一種鬼皂莢生江南池澤如皂莢高一二尺作浴湯去風瘡疥癬沐髮長頭捋葉亦去衣垢地圖經曰出雍州川穀及魯鄒縣今處處有之道地懷孟州者為勝時生春生葉採九月十月取莢收陰乾用莢針核中肉色黑赤味辛鹹性溫散氣氣厚味薄陽中之陰臭腥主除風痹利九竅助柏實為之使反畏空青人參苦參惡麥門冬制雷公曰凡使須要赤肥不蚛者用新汲水浸一宿銅刀削去粗皮用酥炙盡為度然後捶之去子搗篩日乾用又子揀圓肥滿堅硬不蛀者用瓶盛下水於火畔煮待泡熟剝去硬皮一重取向里肉兩片去黃其黃消人腎氣將白兩片銅刀細切日乾用治療藥性論云破堅症腹中痛日華子云通關節消痰殺勞蟲及骨蒸開胃並中風口噤別錄云鬼魘不寤霍亂轉筋誤食物搶鼻中及物入眼不出並卒頭痛或卒暴死俱末吹鼻中圖經曰核炮取中黃心嚼餌去膈痰吞酸合治合酒熬膏貼一切腫毒止疼痛合鹽燒末揩齒痛嫩刺針合米醋熬濃汁敷瘡癬禁妊娠不可服訶梨勒無毒附隨風子植生訶梨勒主冷氣心腹脹滿下食名醫所錄名隨風子即未熟風飄墮者苗圖經曰株似木梡花白子似梔子青黃色皮肉相著七八月實熟時採六路者佳嶺南異物志云廣州法性寺有四五十株子極小而味不澀皆是六路每歲州貢只以此寺者其子未熟時被風飄墮者謂之隨風子彼人尤珍貴益小者益佳雷公云有毗梨勒罨梨勒榔精勒雜路勒若訶梨勒文只有六路也或多或少並是毗雜路勒個個皆圓露文或八路至十三路號曰榔精勒多澀不堪用地圖經曰生交愛州今嶺南皆有道地廣州者最勝波斯舶上者良時生春生葉採七月八月取實收曝乾用子肉厚六稜者良質類橄欖而有稜色青黃味苦酸性溫氣氣薄味厚陰中之陽臭香主心腹脹滿止瀉痢制雷公云凡用先於酒內浸然後蒸一伏時取出以刀削路銼焙乾用之或生用治療圖經曰止痢藥性論云通利津液破胸膈結氣止水道黑髭發日華子云消痰下氣除煩治水調中止霍亂奔豚腎氣肺氣喘急消食開胃腸風瀉血崩中帶下五膈氣及懷孕未足月人漏胎並胎動欲生脹悶氣喘蕭炳云下宿物止腸癖久泄赤白痢圖經曰隨風子療痰嗽咽喉不利合治合蠟燒熏及煎湯熏洗療患痢人後分急痛併產後陰痛禁氣虛人忌多服贗毗雜路勒榔精勒為偽柳華無毒附葉實子汁植生柳華出神農本經主風水黃疸面熱黑葉主馬疥痂瘡實主潰癰逐膿血以上朱字神農本經華痂疥惡瘡金瘡葉取煎煮以洗馬疥立愈又療心腹內血止痛子汁療渴以上黑字名醫所錄名柳絮子名苗圖經曰柳乃柔脆易生之木雖縱橫顛倒植之皆生俗所謂楊者非也三月生蕊如桑椹而細長蕊老則絮飛本經以絮為華陳藏器雲華即初發黃蕊子乃飛絮也衍義曰柳華即是初生黃蕊及其華干絮方出又謂之柳絮收之可貼炙瘡及為裀褥絮之下連黑子因風而起著濕便生如地丁之類不因種植於人家庭院中自然生出蓋如柳絮兼子而飛陳藏器所云花即初發黃蕊子為飛絮蓋不可以絮為花也地圖經曰生琅琊川穀今處處有之時生春生葉採四月取收陰乾用華葉實質類石菖蒲穗而體小色花白葉綠實黑味苦性寒泄氣味厚於氣陰也臭香主惡瘡齒痛制花為末其枝葉銼碎併入藥用治療陶隱居云貼炙瘡皮葉療漆瘡圖經曰枝皮根消癰疽腫毒妒乳枝葉並煎膏塗痔瘡及反花瘡唐本注云木中蟲屑並枝皮除痰熱淋可為吐湯及煮洗風腫癢並癮疹藥性論云苦柳華止血除濕痹四肢攣急膝痛日華子云葉主天行熱病傳屍骨蒸勞湯火瘡毒入腹熱悶下水氣煎膏續筋骨長肉止痛枝煎汁消食別錄云枝濃煎汁祛黃疸合治枝合鹽漿水煎含療牙齒疼痛解服金石藥人發大熱悶楝實有小毒附根皮植生楝實出神農本經主溫疾傷寒大熱煩狂殺三蟲疥瘍利小便水道以上朱字神農本經根微寒療蛔蟲利大腸以上黑字名醫所錄名金鈴子苦楝子苗圖經曰楝實即金鈴子也木高丈餘葉密如槐而長三四月開花紅紫色芬香滿庭實如彈丸生青熟黃俗間謂之苦楝子此有兩種有雄有雌雄者根赤無子有大毒服之使人吐不能止時有至死者雌者根白有子微毒用之當取雌者為佳陶隱居云俗人以五月五日皆取葉佩之以辟惡地圖經曰生荊山山谷今處處有之道地蜀川簡州梓州時生春生葉採十二月取實根取無時收曬乾用實根質類彈丸干而皮靨色生青熟黃味苦性寒泄氣味厚於氣陰也臭微香主殺三蟲利水道制凡採得後曬乾酒拌浸令濕蒸待上皮軟剝去皮取肉去核勿單用其核碎捶用漿水煮一伏時子用如使肉即不使核使核即不使肉治療藥性論云中大熱狂失心躁悶作湯浴日華子云皮治遊風熱毒風疹惡瘡疥癩小兒壯熱並煎湯浸洗別錄云蛔蟲咬心苦楝皮煎湯服之合治根煎汁合米煮粥作糜食之去蛔蟲根合苦酒摩塗疥禁雄楝不結子者不可服服之令人吐瀉殺人椿木葉有毒植生椿木葉主洗瘡疥風疽水煮葉汁用之皮主疳䘌名醫所錄名豬椿鳳眼草苗謹按木高四五丈形干類樗但樗木疏而氣臭其椿木結實葉香可啖葉似桃葉一枝數葉兩兩相對其莖自脫莖端似馬蹄初春生芽人採煮以入茶甚美春末開淡黃花至夏作莢成穗似鳳眼故名鳳眼草隨風飄落著處便生此木耐久莊子所謂椿壽八千是也地圖經云舊不載所出州土今南北皆有之時生初春生芽採冬取根皮收陰乾用葉根皮質類樗木色葉青根皮白味苦性溫泄氣氣厚於味陽中之陰臭香主女子血崩小兒疳痢制雷公曰椿木根及莖葉凡使不以向西者用根採出拌生蔥蒸半日去生蔥細銼用袋盛掛屋南畔陰乾用治療孟詵云東引根水煮服止女子血崩及產後血不止月信來多亦止赤帶下別錄云皮為末米飲下療臟毒赤白痢合治葉合楸桃葉心取汁敷小兒白禿瘡發不生禁動風熏十二經脈五臟六腑多食令人神昏血氣衰樗木有小毒植生樗木皮主赤白久痢口鼻中疳蟲去疥䘌鬼注傳屍蟲毒下血根皮去鬼氣名醫所錄名山椿鬼目虎眼苗圖經曰形干類椿但椿木結實葉香可啖其樗木疏而氣臭北人呼樗為山椿江東人呼為鬼目因葉脫處有痕如摴蒱子又如眼目故名之其木最為無用莊子所謂吾有大木人謂之樗其本臃腫不中繩墨小枝曲拳不中規矩立於道途匠者不顧根葉入藥尤良地圖經曰舊不載所出州土今南北皆有之時生春生葉採夏取葉冬取根收陰乾用皮葉根皮質類椿木色木青白根皮白味苦性微熱氣氣厚於味陽中之陰臭臭主赤白痢制銼碎蜜炙用治療藥性論云白皮治腸滑痔疾瀉血不住日華子云止瀉及腸風能縮小便合治合地榆療疳痢根煮汁合倉粳米蔥豉甘草煎服療下血及小兒疳痢根搗篩合面捻如皂莢子大水煮空心服十枚治秋後痢或水穀痢兼腰痛郁李仁無毒附根植生郁李仁出神農本經主大腹水腫面目四肢浮腫利小便水道根涼主齒齦腫齲丘禹切齒堅齒以上朱字神農本經去白蟲以上黑字名醫所錄名爵李車下李棣奧李雀梅苗圖經曰木高五六尺枝條葉花皆若李惟子小若櫻桃赤色核隨子熟採根並實取核中仁用詩云唐棣之華陸機草木疏云唐棣即奧李也亦曰車下李所在山中皆有其華或白或赤六月中成實如李子可食今近京人家園圃植一種枝莖作長條花極繁密而多葉亦謂之郁李不堪入藥地圖經曰生高山川穀及丘陵上今處處有之道地隰州時生春生葉採五月六月取實收曬乾用仁根質類櫻桃仁色赤味酸性平氣味厚於氣陰中之陽臭香主破血潤燥制雷公云凡使先湯浸去皮尖令淨用生蜜浸一宿漉出陰乾研如膏用治療藥性論云主腸中結氣關格不通根治齒痛宣結氣破結聚日華子云通泄五臟膀胱急痛宣腰胯冷膿消宿食下氣根療小兒熱發作湯浴風蚛牙濃煎含之別錄云小兒多熱不痊熟湯研仁如杏酪日一服莽草有毒植生莽草出神農本經主風頭癰腫乳癰疝瘕除結氣疥瘙殺蟲魚以上朱字神農本經療喉痹不通乳難頭風癢可用沐勿令入眼以上黑字名醫所錄名葞春草䒽音罔草芒草苗圖經曰木若石南而葉稀無花實一說藤生繞木石間古方治風毒厥痹諸酒皆用䒽草今醫家取葉煎含治齒疾者此木葉也觀此二物體療殊別今按衍義曰莽草今人呼為䒽草本經一名春草諸家皆為草今居木部圖經亦然今世所用者皆木葉也如石南枝梗干則縐揉之其嗅如椒爾雅釋草云葞春草釋曰今莽草也與本經合今當具言之石南條中陶隱居云似䒽草凌冬不凋誠木無疑陶隱居云搗葉和米內水中魚吞即死浮出人取食之亦無妨也地圖經曰出上谷山谷及冤句今南中州郡皆有之道地蜀州福州時生春生新葉採五月七月取葉收陰乾用葉青新烈者良質類石南葉色青味辛苦性溫氣氣厚味薄陽中之陰臭香主癰腫殺蟲制凡使取葉細銼生甘草水蓼二味並細銼之用生稀絹袋盛毒木葉於甑中上甘草水蓼同蒸一日去諸藥二件取出曬乾用之勿用尖有孿音涮生者治療藥性論云治疽疝氣腫墜凝血及瘰癧除濕風並頭瘡白禿殺蟲不入湯服日華子云皮膚麻痹濃煎湯淋及風蚛牙痛喉痹濃煎汁含之吐去後淨嗽口合治為末合白蘞赤小豆用雞子白調如糊敷毒腫干即易之末合雞子白調攤帛上貼瘰癧發腫堅結成核日二易之無食子無毒植生無食子主赤白痢腸滑生肌肉名醫所錄名沒食子墨食子沒石子苗唐本注云生沙磧間者樹似檉又按酉陽雜俎云樹高六七丈圍八九尺葉似桃而長三月開花白色心微紅子圓如彈丸初青熟乃黃白蟲蝕成孔者入藥用此波斯呼為摩賊樹者是也其樹一年生無食子一年生拔屢子大如指長三寸上有殼中仁如粟黃可啖也海藥云波斯每食以代果番胡呼為沒食子今人呼為墨食子則音轉相謬矣地圖經曰出西戎唐本注云波斯國時生春生葉採熟時取子收日乾用子質類彈丸而有大小色黃黑味苦性溫泄氣氣厚於味陽中之陰臭香主赤白痢烏髭發制雷公云凡用勿令犯銅鐵並被火驚者妙用漿水於砂盆中或硬青石上研令盡卻焙乾研細用治療唐本注云治兒疳䘌陰汗溫中和氣藥性論云大人小兒大腹冷滑痢不禁並治之補別錄云益血生精烏髭發和胃安神木之走黃藥根無毒蔓生黃藥根主諸惡腫瘡瘻喉痹蛇犬咬毒取根研服之亦含亦塗名醫所錄苗圖經曰藤生高三四尺根及莖似小桑秦州出者謂之紅藥子葉似蕎麥枝莖赤色七月開白花其根初採濕時紅赤色曝乾即黃開州興元府又產一種苦藥子大抵與黃藥相類地圖經曰生嶺南今夔峽州郡及明越秦隴州山中亦有之道地明州秦州施州興元府忠萬州者為勝時生春生葉採二三月十月取根收曝乾用根質類天花粉黃而有毛色黃味苦性平泄氣味厚於氣陰中之陽臭朽主瘡瘻喉痹制以水洗去粗皮細毛銼碎用治療日華子云主馬諸病圖經曰苦藥主五臟邪氣肺熱除煩躁亦入馬藥用別錄云鼻衄出血新汲水磨濃汁服亦敷疥瘡合治合酒貯瓶內封口糠火中燒一伏時待冷時時飲一盞療癭疾一二年者木之木雷丸有小毒土生雷丸出神農本經主殺三蟲逐毒氣胃中熱利丈夫不利女子作摩膏除小兒百病以上朱字神農本經逐邪氣惡風汗出除皮中熱結積蠱毒白蟲寸白自出不止以上黑字名醫所錄名雷矢雷實苗陶隱居云累累相連如丸肉色白者善唐本注云竹之苓也無有苗蔓皆零無相連者本經云利丈夫不利女子別錄云久服令人陰痿二說相反按此則疏利男子元氣不疏利女子臟氣其義顯矣地圖經曰生石城山谷及漢中土中陶隱居云今出建平宜都間唐本注云出房州金州時生無時採八月取收曝乾用肉白者良質類大風子而有大小色皮赤黑肉白味苦鹹性寒泄氣味厚於氣陰也臭朽主殺蟲去積助荔實厚朴為之使反惡葛根制雷公云凡使用甘草水浸一宿銅刀刮上黑皮破作四五片又用甘草湯浸一宿後蒸從巳至未出日乾卻以酒拌如前從巳至未蒸日乾用一云入藥炮用合治合芫花療癲癇狂走槲若無毒附皮植生槲音斛若主痔止血療血痢止渴取服炙用之皮味苦水煎濃汁除蠱及瘻俗用甚效名醫所錄苗圖經曰木高丈餘若即葉也與櫟相類亦有鬥但小不中用爾地圖經曰舊本不載所出州土今處處山林多有之時生春生葉採不拘時取葉收日乾用葉皮質類櫟葉色青味甘苦性平泄氣氣之薄者陽中之陰臭朽主諸痔血痢制摘去梗微炙銼碎或搗末用之治療別錄云小兒小便淋煎湯服藥性論云皮洗諸惡瘡日華子云皮能吐瘰癧澀五臟合治合蔥白煎服療冷淋小腸不利莖中急痛皮合櫸煮汁如飴治毒攻下部生瘡白楊無毒植生白楊樹皮主毒風腳氣腫四肢緩弱不隨毒氣遊易音翼在皮膚中痰癖等酒漬服之名醫所錄苗圖經曰株大似楊而皮白葉圓如梨衍義曰此木易生研木時碎札入土即生根芽故易於繁植其葉面青光背白木身微白故曰白楊非如粉之白也地圖經曰生北土今處處有之陝西及永耀間甚多時生春生葉採無時收日乾用皮質類椿樹皮而厚色白味苦性泄氣味厚於氣陰也臭朽主皮膚風癢四肢緩弱制雷公云凡使以銅刀刮粗皮蒸從巳至未出用布袋盛於屋東掛乾用治療陳藏器云去風痹宿血折傷血瀝在骨肉間痛不可忍日華子云續筋骨合治合酒療撲損瘀血桄榔子無毒植生桄榔子生宿血名醫所錄苗圖經曰其木似棕櫚而堅硬斫其間有面大者至數斛食之不飢其皮至柔堅韌可作綆其子作穗生木端嶺表錄異云桄榔木枝葉並茂與棗檳榔等小異然葉下有須如粗馬尾廣人採之以織巾子其須尤宜鹹水浸漬即粗服而柔韌故人以此縛舶不用釘線木性如竹紫黑色有紋理工人解之以制博弈局其木作艹鈠營歷切鋤利如鐵中石更利惟中焦蝍乃致敗耳地圖經曰生嶺南山谷今二廣州郡皆有之時生春生葉採無時收日乾用面子質類檳榔而小色紫紅味苦性平泄氣味厚於氣陰中之陽臭朽主宿血制銼碎用治補別錄云面益虛羸乏損腰腳無力久服輕身辟穀蘇方木無毒植生蘇方木主破血產後血脹悶欲死者水煮苦酒煮五兩取濃汁服之效名醫所錄苗唐本注云樹似菴羅葉若榆葉而無澀抽條長丈許花黃子生青熟黑葉亦似絳木若女楨也雷公云有中心文橫如紫角者號曰木中尊色其效倍常百等地唐本注云出海南崑崙及交州愛州時生春生葉採無時用木色赤味甘鹹性平緩氣氣薄味厚陽中之陰臭香主破畜血消癰腫制雷公云凡使去粗皮並節細銼重搗拌細條梅枝蒸從巳至申取出陰乾用或酒浸用治療陳藏器云治霍亂嘔吐日華子云治婦人血氣心腹痛月候不調及蓐勞排膿止痛消癰腫撲損瘀血女人失音血噤赤白痢後分急痛別錄云治血暈合治合酒煮服破血合酒煎調乳香末服治血癖氣壅滯產後惡露衝心腹中攪痛及經絡不通木之走櫸樹皮無毒附葉山櫸樹皮植生櫸樹皮主時行頭痛熱結在腸胃名醫所錄苗唐本注云樹大者連抱高及數仞其皮極粗葉似樗葉狹而長雷公云三四年者無力用二十年以上者其樹心空只有半邊向西生者為佳衍義曰今人呼為櫸柳其葉謂柳非柳謂槐非槐木雖高大不堪為器乃下材也湖南北最多取其嫩皮可緣拷栳與箕唇者是也地唐本注云生溪澗水側所在皆有之時生春生葉採無時收日乾用皮葉質類樗木而粗厚色青綠味苦性大寒泄氣味厚於氣陰也臭香主止熱痢下水氣制雷公云凡使去上粗皮細銼蒸從巳至未出焙乾用櫸牛凡採得用銅刀取作兩片去兩翅用紙袋盛於舍東掛待乾用治療唐本注云療水及斷痢葉挼貼大爛瘡日華子云下水氣止熱痢安胎妊娠腹痛及熱毒風熁腫毒合治葉合鹽搗罯腫爛惡瘡木之木桐葉無毒附花皮油植生桐葉出神農本經主惡蝕瘡著陰皮主五痔殺三蟲花主敷豬瘡飼豬肥大三倍以上朱字神農本經皮療賁豚氣病以上黑字名醫所錄名白桐青桐岡桐花桐榮桐椅桐桐木黃桐梧桐櫬油桐苗圖經曰桐有三種白桐二月開黃紫花不結實冬生似子者乃是明年之花房也其木無子材堪琴瑟藥中所用花葉者此也爾雅云榮桐因其花而不實之謂亦謂之花桐一種皮青枝上橐鄂有五其子綴於橐鄂之傍者曰梧桐亦謂之青桐炒其實啖之味似菱芡復有岡桐生於高岡故曰岡桐蓋桐性便濕不生於岡此種故有岡桐之號其子大而油多亦曰油桐也或曰梧桐以知日月正閏生十二葉一邊有六葉從下敷一葉為一月有閏則生十三葉視葉小者則知閏何月也故曰梧桐不生則九州異故名之曰桐亦猶蓂莢十五以知塑望之義也地圖經曰生桐柏山谷今處處有之時生春舒葉採秋前取收陰乾用葉皮花質類梓樹葉而大色青味苦性寒泄氣味厚於氣陰也臭朽主惡蝕瘡制凡使銼碎用治療圖經曰刺桐止金瘡血梧桐白皮主痔藥性論云白桐皮治五淋沐發去頭風及生髮滋潤日華子云桐油敷惡瘡疥及宣水腫塗鼠咬患處木之草胡椒無毒植生胡椒主下氣溫中去痰除臟腑中風冷名醫所錄名昧履支苗段成式酉陽雜俎云春夏生葉青滑可愛莖極柔弱有細條與葉齊條上結子如鼠李子兩兩相對葉晨開暮合則裹其子於葉中又似漢椒至辛辣今作胡盤肉食皆用之地圖經曰生西戎海藥云出南海諸國別錄云摩伽陀國時生春生葉採六月取實收日乾用子質類鼠李子色黑褐味辛性大溫散氣氣之厚者陽也臭香主霍亂腹痛冷氣上衝制雷公云凡使揀淨於石槽中碾碎成粉用治療日華子云調五臟止霍亂心腹冷痛壯腎氣及冷痢別錄云去胃口氣虛冷宿食不消冷氣上衝及胃中寒痰食已即吐禁多食損肺解殺一切魚肉鱉蕈毒木之木釣樟根皮無毒附樟材植生釣樟音章根皮主金瘡止血名醫所錄名烏樟苗唐本注云樹高丈餘葉似楠音南葉而尖長背有赤毛若枇杷葉縣名豫章因木而為名也地唐本注云生彬州山谷及出桂陽邵陵諸處皆有之時生春生葉採八九月取根皮收日乾用根皮質根似烏藥色青褐味辛性溫散氣氣厚於味陽也臭微香主金瘡制細銼或為末用治療陶隱居云能合金瘡斷血日華子云治賁豚腳氣水腫及洗諸瘡痍風瘙疥癬合治樟材煮酒療惡氣中惡心腹痛鬼疰霍亂腹脹宿食不消常吐酸臭水木之草千金藤無毒蔓生千金藤主一切血毒諸氣霍亂中惡天行虛勞瘧痹痰嗽不利癰腫蛇犬毒藥石發癲癇悉主之名醫所錄名古藤石黃香苗陳藏器云有數種南北名模不同大略主疾相似或是皆近於藤生北地者根大如指色黑似漆生南土者黃赤如細辛舒廬間有一種藤似木蓼又有烏虎藤繞樹冬青亦名千金藤又江西山林間有草生葉頭有癭子似鶴膝葉如柳亦名千金藤似荷葉只錢許大亦呼為千金藤故千金者以貴為名爾地圖經曰生嶺南山野間及北地亦有之時生春生葉採無時收日乾用藤質類木蓼藤色青味苦性平泄氣味厚於氣陰也臭朽主一切毒風制銼碎用治療陳藏器云古藤主痢及小兒大腹別錄云治蠱癰腫發背解野豬毒木之木南燭枝葉無毒植生南燭枝葉止泄除睡強筋益氣力久服輕身長年令人不飢變白去老莖葉汁浸粳米九浸九蒸九曝米粒緊小正黑如瑿珠袋盛之可適遠方日進一合不飢益顏色堅筋骨能行名醫所錄名猴藥男續後卓草木之王猴菽染菽烏草南燭草木文燭烏飯草惟那木牛筋南天燭苗圖經曰株高三五尺葉類苦楝而小凌冬不凋冬生紅子作穗人家多植庭除間俗謂之南天燭搗汁炊飯食之健如牛故名牛筋或云其種是木而似草故號南燭草木也陶隱居云此木至難長初生三四年狀若菘菜之屬亦頗似梔子二三十年乃成大株故曰木而似草也凡有八名各從其邦域所稱而正名是南燭也其子似茱萸九月熟酸美可食葉不相對如茗而圓厚味小酢冬夏常青枝莖微紫大者亦高四五丈甚肥脆易摧折也地圖經曰生江東州郡及嵩高少室抱犢雞頭山江左吳越皆有之道地江州時生春生新葉採春夏取枝葉秋冬取根皮收日乾用枝葉質類苦楝而小色青味苦性平泄氣味厚於氣陰也臭香主強筋益氣制蒸過曬乾或搗汁用治療日華子云益腸胃無患子皮有小毒植生無患子皮主浣垢去面䵟喉痹研內喉中立開又主飛屍子中人燒令香辟惡氣其子如漆珠名醫所錄名噤婁桓苗陳藏器云樹大生深山名桓桓患字聲訛也博物志云葉似柳子核堅正黑可作香纓用辟惡氣浣垢古今注云程稚問木曰無患何也答曰昔有神巫曰瑤眊能符刻百鬼擒鬼則以此木為棒殺之世人相傳以此木為眾鬼所惡競取為器用以厭鬼故號無患衍義曰無患子今釋子取以為念珠出佛經惟取紫紅色小者佳今入藥絕少謹按舊本不載所出州土博詢所自於廣東監生戴志在京歷事備云無患子木生廣州府山谷間及人家園圃中有之木高四五丈徑二三尺許其皮黃白色葉如柳葉而大兩兩相對初夏開黃白碎花至秋結實外皮如龍眼肉生青熟紫光亮如膠可愛干則文皺若棗核亦似龍眼核而紫黑核中仁如芡實土人呼為沒患子盥手去垢尤勝皂角據其所說吻合本文故並載之地陳藏器云生深山衍義曰西洛亦有之時生春生葉採無時收陰乾用皮子色皮青子黑性平氣氣之薄者陽中之陰主喉痹辟邪梓白皮無毒附葉植生梓白皮出神農本經主熱去三蟲葉搗敷豬瘡飼豬肥大三倍以上朱字神農本經皮療目中疾以上黑字名醫所錄名椅梓鼠梓虎梓𦒃楸苗圖經曰木似桐而葉小花紫爾雅云椅梓郭璞注云即楸也詩鄘風雲椅桐梓漆陸機云梓者楸之疏理白色而生子者為梓梓實桐皮曰椅大同而小別也又一種鼠梓一名𦒃亦楸之屬也江東人謂之虎梓詩小雅云北山有𦒃陸機云其枝葉木理如楸而山楸之異者今人謂之苦楸是也鼠李名鼠梓或云即此也然鼠花之實都不相類恐別一物而名同耳梓之入藥當用有子者日華子云梓樹皮有數般惟楸梓佳余不堪用地圖經曰生河內山谷今近道皆有之時生春生葉採無時收日乾用皮葉色青綠味苦性寒氣味厚於氣陰也臭朽主洗瘡疥去三蟲制銼碎或搗用治療圖經曰療毒腫唐本注云止吐逆胃反小兒熱瘡身頭熱煩蝕瘡葉主火爛瘡蕭炳云洗小兒壯熱一切瘡疥皮膚瘙癢橡實無毒附實皮殼橡實主下痢厚腸胃肥健人其殼為散及煮汁服亦主痢並堪染用槲櫟皆有鬥以櫟為勝名醫所錄名杼鬥苗圖經曰橡實櫟木子也木高四五丈葉如慄葉三四月開黃花八九月結實其實為皂鬥槲櫟皆有鬥而以櫟為勝爾雅云櫟其實梂釋曰櫟似樗之木也捄盛實之房也其實橡也有梂匯自裹詩秦風雲山有苞櫟陸機云秦人謂柞櫟為櫟唐風雲集於苞栩陸機云今柞櫟也徐州人謂櫟為杼或謂之栩今京洛及河內謂櫟亦為杼五方通語也然則柞櫟也杼也栩也皆橡櫟之通名也衍義曰木堅而不堪充材亦木之性也其實山中以椿仁為糧木善為炭他木皆不及其殼堪染皂若曾經雨水者其色淡不若不經雨水者槲亦有殼但小而不及櫟木所實者地圖經曰所在山谷中皆有之時生三四月開花八九月結實採十月取實不拘時取皮收曝乾用實皮殼質類榛子皮薄而光大色淡黃味苦性微溫泄氣氣厚於味陽中之陰臭微香主澀腸止痢制雷公云凡使去粗皮一重取橡實蒸從巳至未銼片用殼搗炒焦用治療日華子云皮治水痢消瘰癧除惡瘡殼止腸風崩中帶下冷熱瀉痢並染鬚髮別錄云消食補日華子云煮食可止飢御歉歲別錄云非果非殼最益人服食亦能斷谷無氣而受氣無味而受味令人強健禁不宜多食石楠無毒附實植生石楠出神農本經主養腎氣內傷陰衰利筋骨皮毛實殺蠱毒破積聚逐風痹以上朱字神農本經療腳弱五臟邪氣除熱女子不可久服令思男以上黑字名醫所錄名鬼目實名苗圖經曰石南生於石上株極有高大者江湖間出者葉如枇杷葉有小刺凌冬不凋春生白花成簇秋結細紅實關隴間出者葉似莽草青黃色背有紫點雨多則並生長及二三寸根橫細紫色無花實葉至茂密南北人多移植亭宇間陰翳可愛不透日氣衍義曰葉如枇杷葉之小者但背無毛光而不皺正二月間開花冬有二葉為花苞苞既開中有十五餘花大小如椿花甚細碎每一苞約彈許大成一球一花六葉一朵有七八球淡白綠色葉末微淡赤色花既開蕊滿花但見蕊不見花花才罷去年綠葉盡脫落漸生新葉但京洛河北河東山東頗少人故少用湖南北江東西二浙甚多故多用南實今醫家絕不用地圖經曰生華陰山谷今南北皆有之道地道州關中者良時生正月採二月四月取葉八月取實收陰乾用葉實質類枇杷葉而小背光不皺色青味辛苦性平散氣氣之薄者陽中之陰臭朽主強陰道利筋骨助五加皮為之使反惡小薊制銼碎用治療唐本注云療風邪藥性論云治軟腳煩悶疼補藥性論云益腎氣禁多服令人陰痿贗石葦為偽木天蓼有小毒附子無毒植生木天蓼主癥結積聚風勞虛冷名醫所錄苗圖經曰木高二三丈三月四月開花似柘花子作球形如䒻其球子可藏作果啖之唐本注云出安州申州有作蔓生者乃藤天蓼也葉似柘光而薄花白子如棗許無定形中瓤似茄子味辛甘啖之以當姜蓼其苗藤切以酒浸服或以釀酒去風冷症癖腰腳疼冷大效然則天蓼有三種雖其狀不同而體療甚相似也陳藏器云木天蓼今時所用者出鳳州深山樹高如冬青不凋山人云多服損壽以其逐風損氣故也不當以藤天蓼為注既云木蓼豈更藤生蓋自有藤蓼不復疑矣地圖經曰生山谷中陳藏器云鳳州道地信陽軍時春生新葉採五月取子不拘時取莖收日乾用莖子色青綠味苦辛性溫散氣氣厚味薄陽中之陰臭微香主虛冷積聚制細銼用治療藥性論云中賊風口面喎斜及冷痃癖氣塊女子虛勞以此主之合治木天蓼一斤合好酒一斗以生絹袋盛浸之春夏一七秋冬二七治風立有奇效禁多服損壽損氣木之走黃環有毒蔓生黃環主蠱毒鬼疰鬼魅邪氣在臟中除咳逆寒熱神農本經名凌泉大就苗唐本注云藤生根亦葛類襄陽巴西人謂之就葛其子作角生似皂莢花實與葛同時矣今園庭種之大者徑徑六七寸謂其子名狼跋子今太常科劍南來者乃雜屎葛根非也或云似防己作東輻解者近之人取葛根誤得食之吐痢不止用土漿解之乃瘥此真黃環也本經用根今云是大戟花者非黃環也地圖經曰生蜀郡山谷唐本注云惟襄陽巴西所在有之時生春生葉採三月取根收陰乾用根質類葛色皮褐肉白味苦性平泄氣味厚於氣陰中之陽臭朽主止咳逆除邪氣助鳶尾為之使反惡茯苓防己制銼碎用治療藥性論云治上氣急寒熱及百邪木之木溲疏無毒植生溲音搜疏出神農本經主身皮膚中熱除邪氣止遺溺可作浴湯以上朱字神農本經通利水道除胃中熱下氣以上黑字名醫所錄名巨骨苗唐本注云樹高丈餘形似空疏中空皮白有刺其子八九月熟色赤似枸杞子兩兩相對但空疏有莢與此不同爾地圖經曰生熊耳川穀及田野故丘墟地時生春生葉採八九月取實收陰乾用實色赤味辛苦性寒泄氣氣薄味厚陰中之陽臭朽主利水除熱助漏蘆為之使制搗碎用鼠李無毒植生鼠李出神農本經主寒熱瘰癧瘡以上朱字神農本經皮苦微寒主除身皮熱毒以上黑字名醫所錄名牛李鼠梓椑音卑趙李皂李木烏槎樹苗圖經曰鼠李即烏巢子也枝葉如李實若五味子色瑿黑其汁則紫色也衍義曰木高七八尺葉如李但狹而不澤子於條上四邊生熟則紫黑生則青色葉至秋則落其子尚在枝是處皆有之故經不言所出處皮與子兩用地圖經曰生田野今關陝及湖南江南北甚多道地蜀州時生春生葉採實熟時取不拘時取皮收日乾用實皮質類五味子而大色黑味甘性涼緩氣氣之薄者陽中之陰臭朽主殺蟲消毒制子酒漬九蒸日乾搗碎用治療日華子云消水腫皮除風痹唐本注云皮療諸瘡寒熱毒痹別錄云消腹脹滿合治子九蒸酒漬服能下血除疝瘕積冷氣枳椇無毒植生枳音止椇音矩主頭風小腹拘急其木皮溫無毒主五痔和五臟名醫所錄名實木蜜木白石苗圖經曰木大徑尺葉如桑柘葉其子作房似珊瑚核在其端人多食之即詩小雅所謂南山有枸是也陸機云枸枝枸也木似白楊枝枸不直其實八九月熟啖之甘美如飴謂之木蜜本從南方來其木能敗酒若以木為屋屋中酒則味薄此亦奇物也地圖經曰生江南所在山中皆有之時生春生葉採八九月取實不拘時取皮收鹽荷裹一冬儲備用實質類珊瑚子色紅味甘性平緩氣氣之薄者陽中之陰臭朽制搗碎用忌多食發蛔蟲小天蓼無毒植生小天蓼主一切風虛羸冷手足疼痹無論老幼輕重浸酒及煮汁服之十許日覺皮膚間風出如蟲行名醫所錄苗圖經曰樹如梔子經冬不凋野獸多食之然天蓼有三種俱能逐風其中優劣小者最為勝也地圖經曰生天目山四明山時生經冬不凋採無時收日乾用莖色綠味甘性溫緩氣氣之厚者陽也臭朽主諸風虛冷制細銼或煮汁用小柏無毒植生小柏主口瘡疳䘌殺諸蟲去心腹中熱氣名醫所錄名山石榴苗唐本注云其樹枝葉與石榴無別但花異子細黑圓如牛李子一種皮白葉多刺者乃太常所貯名曰刺柏非小柏也陳藏器云凡柏皆皮黃今既不黃而自然非柏矣其小柏如石榴皮黃子赤如枸杞子兩頭尖人銼枝以染黃是也地圖經曰生山石間所在皆有之道地襄陽峴山東者良時生春生葉採無時收日乾用皮枝質類槐皮而薄色黃味苦性大寒泄氣味厚於氣陰也臭朽主口瘡制銼碎用莢蒾無毒植生莢蒾音迷主三蟲下氣消穀名醫所錄名擊迷羿先苗唐本注云葉似木槿及似榆作小樹其子如溲疏兩兩相併四四相對而色赤不入方用陸機云蓋檀榆之類也地唐本注云生山谷及北土山林間所在有之時生春生葉採無時收日乾用枝質類木槿色青味甘苦性平泄氣氣厚於味陽中之陰臭朽主下氣消穀制銼碎用治療唐本注云殺蛔蟲一十三種陳藏器余栟櫚木皮味苦澀平無毒燒作灰主破血止血初生子黃白色作房如魚子有小毒破血但戟人喉未可輕服皮作繩入土千歲不爛昔有人開塚得之索已生根此木類嶺南有虎散桄榔冬葉蒲葵椰子檳榔多羅等皆相似各有所用栟櫚一名棕櫚即今川中棕櫚海藥云謹按徐表南州記云生嶺南山谷平溫主金瘡疥癬生肌止血並宜燒灰使用其實黃白色有大毒不堪服食也楸木皮味苦小寒無毒主吐逆殺三蟲及皮膚蟲煎膏黏敷惡瘡疽瘻癰腫疳野雞病除膿血生肌膚長筋骨葉搗敷瘡腫亦煮湯洗膿血冬取干葉湯揉用之範汪方諸腫癰潰及內有刺不出者取楸葉十重貼之生山谷間亦植園林以為材用與梓樹本同末異若柏葉之有松身蘇敬以二木為一誤也其分析在解紛條中矣圖經文具梓白皮條下海藥云微溫主消食澀腸下氣及上氣咳嗽並宜入面藥聖惠方治頭極癢不痛出瘡用楸葉不拘多少搗絞汁塗之立效又方治炙瘡多時不瘥癢痛出黃水用楸葉或根皮搗羅為末敷瘡上即瘥外臺秘要療癰腫煩困生楸葉十重貼之布帛裹緩急得所日三易止痛消腫食膿血良無比勝於眾藥冬以先收乾者臨時鹽湯沃潤用之又主患癰破下膿著甕藥塞瘡孔瘡痛煩悶困極楸葉十重去甕藥下之以布帛裹緩急得所日再三易之痛悶即止此法大良無比勝於眾法主癰疽潰後及凍瘡有刺不出甚良冬無楸葉當早收之臨時以鹽湯沃之今擇日亦佳薄削楸白皮用之亦得又方療口吻瘡楸枝皮白濕貼上數易千金翼治小兒頭髮不生取楸葉中心搗絞塗之肘後方治瘻煎楸枝作煎淨洗瘡孔中大效子母秘錄治小兒頭上瘡發不生楸葉搗汁塗瘡上發即生兼白禿沒離梨味辛平無毒主上氣下食生西南諸國以毗梨勒上有毛少許也海藥云微溫主消食澀腸下氣及上氣咳嗽並宜入面藥柯樹皮味辛平有小毒主大腹水病取白皮作煎令可丸如梧桐子大平旦三丸須臾又一丸一名木奴南人用作大舡者也海藥云謹按廣志云生廣南山谷臨海志云是木奴樹主乳氣揉皮以水煮去滓復煉候凝結丸得為度每朝空心飲下三丸浮氣水腫並從小便出故波斯家用為舡舫也敗扇主蚊子新造屋柱下四隅埋之蚊永不入燒為末和粉粉身上主汗彌敗者佳楤根去王切一作楤味辛平小毒主水蔭取根白皮煮汁服之一盞當下水如病已困取根搗碎坐其取氣水自下又能爛人牙齒齒有蟲者取片子許大內孔中當自爛落生以南山谷高丈許直上無枝莖上有刺山人折取頭茹食之亦治冷氣一名吻頭橉木灰良刃切味甘溫小毒主卒心腹癥瘕堅滿痃癖燒為白灰淋取汁以釀酒酒熟漸漸半合溫服增至一二盞即愈此灰入染家用生江南深山大樹樹有數種取葉厚大白花者入藥自余用染灰一名橝音潭灰本經汗於病者床下灰之勿令病人知也㿔桐皮而郢切味甘溫無毒主爛絲葉搗封蛇蟲蜘蛛咬皮為末服之亦主蠶咬毒入肉者雞犬食欲死煮汁灌之絲爛即差樹似青桐葉有椏生山谷人取皮以漚絲也竹肉味鹹溫有大毒主殺三蟲毒邪氣破老血灰汁煮三度煉訖然後依常菜食之煉不熟者戟人喉出血手爪盡脫生苦竹枝上如雞子似肉臠應別有功人未盡識之一名竹實也桃竹筍味苦有小毒主六畜瘡中蛆搗碎內之蛆盡出亦如皂李葉能殺蛆蟲南人謂之黃筍灰汁煮可食不爾戟人喉其竹叢生醜類非一張鼎食療云慈竹夏月逢雨滴汁著地生蓐似鹿角色白取洗之和姜醬食之主一切赤白痢極驗罌子桐子有大毒壓為油毒鼠主死摩疥癬蟲瘡毒腫一名虎子桐似梧桐生山中馬瘍木根皮有小毒主惡瘡疥癬有蟲者為末和油塗之出江南山谷樹如櫪也木細辛味苦溫有毒主腹內結積癥瘕大便不利推陳去惡破冷氣未可輕服令人利下至困生終南山冬月不凋苗如大戟根似細辛
