body:
  text: 卷之三十六米穀部中品谷之木生大豆無毒附穭豆植生生大豆出神農本經塗癰腫煮汁飲殺鬼毒止痛以上朱字神農本經逐水脹除胃中熱痹傷中淋露下瘀血散五臟結積內寒殺烏頭毒久服令人身重炒為屑味甘主胃中熱去腫除痹消穀止腹脹以上黑字名醫所錄苗圖經曰苗高二三尺莖葉有毛花白作莢至秋收之其豆有黑白二種黑者入藥白者不用其緊小者為雄入藥尤佳豆性本平修治便有數等之效煮其汁甚涼可以壓丹石毒及解諸藥毒作腐則寒而動氣炒食則熱投酒主風作豉極冷黃卷及醬皆平牛食之溫馬食之涼一體而用別大抵宜作藥使爾仙方修制末服可以辟穀度飢歲然多食令人體重久則如故矣陳藏器云一種穭音呂豆味甘無毒生田野小黑爾雅云戎菽一名驢豆又名䝁豆炒令黑及熱投酒中漸漸飲之去賊風風痹更治婦人產後冷血亦堪作醬地圖經曰生泰山平澤今處處有之時生三四月生苗採九月取實收曬乾用實黑者良色黑味甘性平氣氣厚於味陽也臭朽助得前胡烏喙杏仁牡蠣良反惡五參龍膽制煮汁或炒入藥用治療日華子云黑豆調中下氣通關脈陳藏器云大豆生服半兩除心胸煩熱去熱風恍惚煮食下熱氣腫壓丹石煩熱汁消腫孟詵云大豆煮飲服除胃中熱痹腸中淋露下淋血散五臟結聚內寒蜀本云大豆煮食療溫毒水腫別錄云黑豆葉搗敷蛇蛟處大豆汁塗小兒火瘡及小兒斑瘡豌豆瘡並服汁補陳藏器云大豆明目鎮心溫補久服好顏色變白去風不忘合治黑豆五升合酒一斗半看酒紫黑色去豆飲之破血去風除氣防熱產後兩日尤宜服如中風口噤加雞白屎二升和熬投酒中服神效大豆炒令煙未斷乘熱合酒中服療風痹癱緩口噤產後諸風穭豆炒黑乘熱合酒中漸漸飲之去賊風婦人產後冷血大豆合桑柴灰煮汁服下水鼓腹脹大豆一升合青竹算子四十九枚長四寸闊一分和水煮熟日夜服療卒失音大豆合甘草煮湯飲去一切熱毒氣大豆合飯搗塗療一切毒腫禁豆腐多食動氣解金石諸藥毒殺烏頭附子毒忌豬肉谷之草大豆黃卷無毒大豆黃卷出神農本經主濕痹筋攣膝痛以上朱字神農本經五臟胃氣結積益氣止毒去黑皯潤澤皮毛以上黑字名醫所錄苗圖經曰黃卷是以生大豆為糵待其芽出是也方書名黃卷皮今蓐婦藥中用之地圖經曰處處有之時生無時採無時收曝乾用糵色黃味甘性平緩氣氣厚於味陽也臭腥制以大豆不拘多寡先以井水淘淨堆置筐內筐口封罨蒲草外以缸覆之令其溫暖每日頻頻汲水灌溉候其發糵取出曬乾用之治療別錄云卷糵破婦人惡血合治作末合豬膏為丸服能肥健人赤小豆無毒叢生赤小豆出神農本經主下水排癰腫膿血以上朱字神農本經寒熱熱中消渴止泄利小便吐逆卒澼下脹滿以上黑字名醫所錄名脫氣藿葉名苗謹按人家園圃多種之春布子於熟地而生苗高二三尺作叢莖葉俱青綠色而微有毛四五月間開紅白花隨著長莢每莢生子五七枚至秋葉黃時摘其莢而取其實也其實驢食則腳輕人食則體重耳地圖經曰生江淮間今處處有之衍義曰關西河北京東西皆有人多食之時生春苗採秋取收曝乾用實質類白豆而紅小色赤味甘酸性平緩氣氣味俱薄陰中之陽臭腥主利水道消癰腫治療圖經曰消水腫從腳入腹煮爛取汁溫漬膝下若已入腹但服豆勿雜食患腳氣人以豆置袋中足下朝夕展轉踐踏即瘥諸腫毒欲作癰疽者水和末塗便消散毒氣藥性論云消熱毒癰腫散惡血不盡煩滿治水腫皮肌脹滿搗薄塗癰腫上及縮氣行風療水氣能令人美食汁洗小兒急黃爛瘡唐本注云葉止小便數去煩熱日華子云豆粉消煩排膿衍義曰花療宿酒渴病炒補藥性論云健脾胃日華子云豆粉補血脈葉食之明目合治合桑白皮煮食療濕氣痹腫合通草煮食下氣作末合雞子白調塗熱毒癰腫以豆五合合大蒜一顆生薑五錢商陸根一條同水煮豆爛去藥等空腹取豆細嚼及徐啜汁令盡療水氣腳氣腫消勿服作末合雞子白塗丹毒即消作末合葛花末服飲酒不知醉作末合醋敷疽初發禁逐津液抽肌肉久食令人枯瘦解諸腫熱毒酒有毒酒主行藥勢殺百邪惡毒氣名醫所錄名長春酒清酒灰酒地黃酒糟下酒白酒苦酒餅子酒葡萄酒粳酒糯酒四夷酒秫黍酒蜜酒煮酒桑椹酒鹿頭酒紫酒豉酒麻姑酒羔兒酒姜酒金酒東陽酒社壇余胙酒小豆麴酒醇酒新熟無灰酒香藥麴酒豆酒秋露白醴甜酒也牛膝虎骨仙靈脾通草大豆牛蒡枸杞等皆可釀浸作酒今不悉載謹按酒為消憂發怒宣言暢意之物也品類甚多飲家但尚其味適口不顧入藥何如多飲未有不作疾者蓋此主行藥勢損益兼行用之最宜斟酌所以入藥修制惟糯米白曲造者為正也按湯液本草云辛者能散苦者能下甘者居中而緩為引導可以通行一身之表至極高之分味淡者僅利小便而已考之陶隱居云大寒凝海惟酒不水昔三人晨行遇大寒食粥者病腹空者死飲酒者安明其性熱獨冠群物也雖然余月晨行亦宜飲之蓋春月百毒蟄動夏月暑熱外凌秋月濕氣相搏皆宜小飲以御之由其能壯氣通血脈俾里充實而外邪不得以侮之也收瓷器盛貯用白曲糯米作者佳味苦甘辛性大熱氣氣味俱厚陽也臭香行諸經治療唐本注云葡萄酒消痰破癖日華子云酒通血脈厚腸胃除風下氣社壇余胙酒治孩兒語遲以少許吃吐酒噴屋四角闢蚊子糟䐬撲損瘀血浸洗凍瘡及敷蛇蜂叮毒糟下酒開胃下食暖水臟溫腸胃消宿食御風寒陳藏器云酒潤皮膚散石氣甜糟溫中冷氣消食亦潤皮膚調腑臟三歲糟下有酒以物承之堪摩風瘙止嘔噦別錄云紫酒治角弓風姜酒主偏風中惡蔥豉酒解煩熱蜜酒療風疹補別錄云桑椹酒補五臟明耳目蔥豉酒補虛勞葡萄酒益氣調中耐飢強志取藤汁釀酒亦佳狗肉汁釀酒大補春酒令人肥白合治熱暖酒一碗合姜服治中惡疰忤及通脈養脾氣扶肝大豆一升熬令汗出簸去灰塵投入二升酒中久時頓服療食丹石人胸背急悶熱者服後少頃汗出瘥朝朝服之甚去一切風及婦人產後諸風亦可服禁酒漿照無影不可飲醉臥扇之中惡風久飲傷神損壽解一切蔬菜毒忌諸甜物與乳飲之令人氣結食豬肉醉臥黍穰中令人患大風白酒同牛肉食令人腹內生蟲粟米無毒附粉泔糗植生粟米主養腎氣去胃脾中熱益氣陳者味苦主胃熱消渴利小便名醫所錄苗圖經曰夏初生苗如稗秋深結實其粒比粱米而圓細熟舂令白亦謂之白粱也大抵人多種粟而少種粱以其損地力而收穫少耳諸粱食之比他谷最益脾胃性亦相似然其粟種類雖多功用則無別矣其泔汁及米粉皆入藥近世作英粉乃用粟米浸累日令敗研澄取之今人用去痱瘡為佳又有糗一名𥓌昌少切味酸寒無毒和水服之解煩熱止泄實大腸壓石熱止渴河東人以麥為之粗者為干糗糧東人以粳米為之炒乾磨成也地陶隱居云生江東及西間唐本注云北土常食多種之時生夏初生苗採秋取實收曬乾用實色皮赤肉白味咸性微寒氣氣薄味厚陰中之陽臭香主益脾胃養腎氣治療圖經曰粟米浸累日令敗研澄取之治痱瘡陶隱居云陳粟米作粉止煩悶唐本注云泔汁主霍亂卒心煩渴飲數升立瘥臭泔止消渴陳藏器云粉主卒得鬼打水攪服之亦主熱腹痛鼻衄並水煮服之泔汁主轉筋入腹酸泔洗皮膚瘡疥服主五野雞病及消渴下澱酸者殺蟲及惡瘡孟詵云陳粟米止痢別錄云粟米飲主消渴口乾胃中熱利小便碾粟米敷小兒赤丹不止又治小兒重舌補衍義曰益脾胃合注酸泔合臭樗皮煎服主疳痢粉和水丸如桐子大每服七丸爛煮納醋中治反胃食即吐細吞之得下便已粟米半升杵如粉和水丸如桐子大煮令熟點少鹽空心和汁吞下治脾胃氣弱食不消化嘔逆反胃湯飲不下禁粟米浸至敗者食之損人泔汁胃冷者不宜多食解陳粟米壓丹石熱毒粳粟米解小麥虛熱粉解諸毒谷之飛秫音述米無毒植生秫米止寒熱利大腸療漆瘡名醫所錄名薥薥苗圖經曰秫乃粟之黏者也其苗高丈許有節如蘆莖中有瓤類通脫木而小白葉長一二尺實生莖端作穗江南謂之粟北土所謂薥薥者是也然有二種其黏者為秫可以釀酒不黏者為粟但可作糜食耳唐本注云此米功用似稻秫也今大都呼粟為秫而稻秫為糯矣北土最多以粟秫釀酒而汁少於黍米粟秫應有別功但本草不載凡黍稷粟秫粳糯此三谷之秈音仙秫也衍義曰初搗出淡黃白色經久色如糯最黏故宜釀酒今之村落作酒者是此不堪為飯也地處處有之時生夏生苗採七月八月取實收曬乾用實色黃白味甘性微寒氣氣之薄者陽中之陰臭香治療陶隱居云嚼爛塗漆瘡日華子云嚼敷犬咬凍瘡孟詵云能殺瘡疥毒熱壅五臟氣根煮作湯洗風別錄云秫米汁治食鴨肉成病胸滿面赤不下食及療卒得浸淫瘡有汁多發於心不早治周身則殺人熬秫米令黃黑杵以敷之並主寒熱利大腸治漆瘡秫米飯食之良合治生搗合雞子白敷毒腫良以一石合面三斗和地黃一斤茵陳蒿一斤炙令黃一依釀酒法服之療筋骨攣急禁動風不可常食谷之草粳米無毒叢生粳米主益氣止煩止泄名醫所錄苗圖經曰三月布種於水田中叢生苗長尺許曰秧四五月分蒔成畝至秋開白花作穗其實曰谷長匾有芒八九月熟則黃色然其種有二以黏為糯不黏為粳用之以白晚者勝早熟者則不及食之稍生則復不益脾過熟則佳也陶隱居云此即人常所食之米但有白赤大小異族四五種猶同一類其陳廩米亦是此種由儲積經久以廩軍人故謂之陳廩米湯液云本草諸家共言益脾胃如何白虎湯用之入肺以其陽明為胃之經色為西方之白故入肺也然治陽明之經即在胃也色白味甘寒入手太陰又少陰證桃花湯用此甘以補正氣竹葉石膏湯用此甘以益不足也地食療云出淮泗京都襄州今處處皆有之時生春生苗採九月取實收曬乾用實色白味甘苦性平微寒氣氣厚於味陽中之陰臭香主平和五臟補益胃氣行手太陰經少陰經制舂白用治療蜀本云粳米斷下痢和胃氣長肌肉溫中孟詵云倉粳米炊之甕中水浸令酸食之暖五臟六腑氣白粳米汁主心痛止渴斷熱毒痢別錄云小兒新生三日應開腸胃助穀神碎米濃作汁飲如乳酪與兒大豆許飲之頻與三豆許二七日可與哺慎不得與雜藥紅雪少少得也補日華子云粳米補中壯筋骨補腸胃孟詵云火稻宜人溫中益氣補下元倉粳米補中益氣堅筋通血脈起陽道衍義曰平和五臟補益胃氣合治倉粳米久陳者蒸作飯合醋封毒腫又研服之去卒心痛合餳杏仁乳餅煮粥食之三升日三服治蛟龍子生在芹菜上人誤食之入腹變成龍子服後當吐出龍子有兩頭者其病即愈禁與馬肉同食發痼疾解誤與蒼耳食令人卒心痛燒倉米灰和蜜漿解之不爾即死青粱米無毒叢生青粱米主胃痹熱中消渴止泄痢利小便益氣補中輕身長年名醫所錄苗唐本注云青粱穀穗有毛粒青而米亦微青且細於黃粱也穀粒似青稞而少粗夏月食之清涼但以味短色惡不如黃白粱故人少種之此谷早熟而收少也作餳清白勝余米大抵人多種粟而少種粱以其損地力而收穫少而諸粱食之比他谷益脾胃性亦相似耳衍義曰青黃白粱此三種食之不及黃粱青白二種性皆惟涼獨黃粱性甘平豈非得土中和之氣多耶今黃白二種西洛間農家多種為飯尤佳余用則不相宜然其粒尖小於他谷收之實少故耳種者亦稀白色者味淡地陶隱居云青粱出北方時生春生苗採秋收收曬乾用實色微青味甘性微寒氣氣之薄者陽中之陰臭香主益脾胃止消渴制舂白用治療日華子云止泄精補圖經曰益脾胃日華子云健脾黍米無毒叢生黍米主益氣補中多熱令人煩名醫所錄苗圖經曰黍米乃肺之谷蓋補肺氣也然有二種黏者為秫可以釀酒不黏者為黍可以食之如稻之有粳糯耳陶隱居云其苗如藘而異於粟粒亦大粟而多是秫今人又呼秫粟為黍非也北人作黍飯釀酒則皆用秫黍也又有穄米與黍米相似而粒殊大地圖經曰舊不載所出州土今京東西河陝間皆有之時生春生苗採秋取實收曬乾用實色黃白味甘性溫氣氣之厚者陽也臭香主益氣安中治療別錄云小兒鵝口不能飲乳以米汁敷之瘥及四十年心痛不瘥以米淘汁溫服隨多少愈補孫真人云肺之谷也肺病宜食主益氣別錄云益氣安中補不足宜脈合治燒為灰合油塗杖瘡不作瘢止痛穰莖燒灰合酒服方寸匕療妊娠尿血合女曲等分各熬令焦杵下以雞子白敷之治湯火所灼未成瘡者禁發宿病久服昏五臟令人好睡及煩悶小兒食之不能行緩人筋骨絕血脈忌與葵菜食之成痼疾並癇病與牛肉白酒同食必生寸白蟲解煮穰汁飲數升解食苦瓠中毒丹黍米無毒叢生丹黍米主咳逆霍亂止泄除熱止煩渴名醫所錄苗圖經曰此即赤黍米也葉似蘆而異於粟然有二種黏者為秫可以釀酒不黏者為黍可食如稻之有粳糯也衍義云丹黍米皮赤其米黃者惟可為糜不堪為飯黏著難解北人謂秫為黃米亦謂之黃糯釀酒比糯稻差劣也地圖經曰丹黍米舊不載所出州土今京東河陝皆有之北地最多時生夏生苗採秋收實收曬乾用實色皮赤肉黃味苦性微溫氣氣厚於味陽中之陰臭香主溫中制去皮舂白用治療日華子云下氣止咳嗽除煩止渴退熱孟詵云患鱉瘕者以新熟赤黍米淘取泔汁生服一升不過三度愈別錄云飯食之除煩熱主泄痢汁敷小兒鵝口不乳合治米三兩煮薄飲合酒和飲之治傷寒後男子陰易發汗出愈隨人加減禁不可與蜜並葵同食白粱米無毒叢生白粱米主除熱益氣名醫所錄苗唐本注云苗實與諸粱都相似但白粱穗大而多長芒谷亦粗扁而長不似粟圓也其米白大食之香美為黃粱之亞矣地圖經曰舊不著所出州土今京東西河陝間及處處皆種蒔之時生春生苗採八九月取實收曬乾用實色白味甘性微寒氣氣之薄者陽中之陰臭香主和中益氣治療孟詵云除胸膈中客熱移五臟氣續筋骨別錄云米五合水一升煮粥頓服之治霍亂不止炊飯食之治虛熱和中止煩滿粱粉取鐵鐺熬令赤以塗手足忽發疣以眾人唾和塗上厚一寸即消合治用米汁二合合生薑汁一合服之治患胃虛並嘔吐食及水者黃粱米無毒叢生黃粱米主益氣和中止泄名醫所錄苗唐本注云苗實與白粱相似但穗大毛長谷米俱粗於白粱而收子少不耐水旱食之香美逾於諸粱人號為竹根黃也地陶隱居云出青冀州唐本注云出蜀漢兩浙間亦有之時生春生苗採八九月取實收曬乾用實色黃味甘性平緩氣氣厚於味陽也臭香治療日華子云去客風治頑痹別錄云米粉半升水一半和絞如白飲頓服治霍亂煩躁米五升水一斗煮取三升清澄稍稍飲之治霍亂吐下後大渴多飲則殺人作飲食之止痢去當風臥濕遇冷所中等症合治米末一升合蜜水和敷小兒面身生瘡如火燒米粉和雞子白敷小兒赤丹不止糵米無毒糵米主寒中下氣除熱名醫所錄苗陶隱居云此是以米為糵爾非別米名也唐本注云糵者生不以理之名也皆當以可生之物為之即麥作糵之義陶稱以米為糵其米豈能更生乎止當取糵中之米爾按食經稱用稻糵稻即穬谷之名明非米作衍義曰糵米即稻糵米也若已作米則難生糵矣今穀神散中用之性又溫於大麥糵也收曝乾用糵色黃白味苦甘性微溫氣氣厚於味陽中之陰臭香主消宿食開胃口制研碎用治療日華子云除煩消宿食開胃舂杵頭細糠無毒舂杵頭細糠主卒噎名醫所錄地陶隱居云舊不載所產今在處皆有治食卒噎不下刮取含之即去亦是舂搗之義爾天下事理多有相影響如此者紹興校定云本經雖不載性味然固當同米性矣止云主卒噎蓋借意為用而已時生無時採無時色黃白味甘性平氣氣之薄者陽中之陰臭香主噎食治療陶隱居云治卒噎不下刮取含之即去別錄云燒末服方寸匕令易產合治合蜜丸如彈子大不拘時含一丸咽津治膈氣咽喉噎塞飲食不下禁不可作枕與小兒枕枕之能損目小麥無毒叢生小麥主除熱止燥渴咽乾利小便養肝氣止漏血唾血以作曲溫消穀止痢以作面溫不能消熱止煩名醫所錄苗圖經曰小麥乃世之作面常食之物也其麥秋種冬長春秀夏實具四時中和之氣故為五穀之貴地暖處亦可春種之至夏便收然比秋種者四氣不足故有毒爾其實性寒作面則味甘溫而有毒作曲則平胃止痢作麨則微寒其皮為麩則味甘寒無毒又麥苗味辛寒而無毒苗上黑黴明飢切謂之麥奴又有女曲黃蒸女曲完小麥為之又名䴷音桓子黃蒸磨小麥為之又名黃衣也地圖經曰舊不著所出州土今南北處處有之時生秋生苗採夏取實收曝乾用苗實面曲色黃味甘性微寒氣氣之薄者陽中之陰臭朽主止消渴利小便制去芒殼用治療圖經曰麩調中去熱藥性論云麥能殺腸中蛔蟲熬末服之唐本注云女曲黃蒸並消食止泄痢下胎破冷血日華子云麥黃溫中下氣消食除煩麥苗除煩悶解時疾狂熱消酒毒退胸膈熱患黃疸人絞汁服並利小腸作齏吃甚益顏色陳藏器云麩和麵作餅止泄調中去熱健人蒸熱袋盛熨人馬冷失腰腳麥苗除酒疸目黃消酒毒暴熱麥奴主熱煩蜀本云麥作麨充小切主消渴止煩孟詵云炒粉一合和服斷下痢食療云麥養肝氣煮飲服之良作粉調經絡續氣脈衍義曰麥止暴淋煎湯飲之為面水調治人中暑馬病肺卒熱亦以水調灌愈孫真人云小麥除熱止渴利小便養心氣別錄云麥除煩熱少睡多渴用作飯水淘食之面療鼻衄以冷水調漿服之立瘥患頭上皮虛腫薄如蒸餅狀如裹水以口嚼面敷之瘥補日華子云面養氣補不足助五臟久食實人陳藏器云面補虛實人膚體厚腸胃強氣力孟詵云作粉補中益氣和五臟調脈合治小麥麩合醋蒸包所傷折處止痛散血白麵半斤炒令黃色合醋煮為糊塗於乳上療婦人乳癰不消麩炒合醋貼窨時疾熱瘡湯火瘡爛撲損折傷瘀血禁小麥動風氣作醬和鯉魚食之令人患口瘡解麥奴解丹石天行熱毒大麥無毒附麥糵叢生大麥主消渴除熱益氣調中又云令人多熱為五穀長名醫所錄名麰音牟麥苗圖經曰苗葉與小麥相似但實差大而皮厚為五穀長故謂之大麥入藥用之以秋種夏收者為佳然春種者不具四時之氣故不及也今醫家惟作糵則味甘無毒以為開胃消食之要藥也地圖經曰舊不著所出州土今關中南北皆能種蒔處處有之時生秋生苗採夏取實收曝乾用實及苗糵色黃味咸性溫微寒氣氣厚於味陽中之陰臭朽主益氣調中助蜜為之使制去芒殼水漬之罨暖處生芽為糵治療圖經云面平胃止渴消食糵消化宿食破冷氣止心痛脹滿唐本注云面療脹日華子云糵溫中下氣開胃止霍亂除煩消痰破癥結能催生陳藏器云不動風氣調中止泄令人肥健孟詵云麥久食之頭髮不白暴食之亦稍似腳弱為下氣及腰腎故久食甚宜人孫真人云麥芒入目煮大麥汁洗之別錄云麥療蠼螋尿瘡嚼以敷之日三上苗杵汁服治諸黃糵治妊娠欲去胎以麥糵二兩水一盞半煎至一盞分溫三服補陳士良云補虛劣壯血脈益顏色實五臟久食令人肥白滑肌膚合治糵一升合蜜一升服之治妊娠得病欲去胎即下神驗糵末一合合酒服之治產後腹中鼓脹不通轉氣急坐臥不安神驗禁麥熟即益人帶生即冷損人糵落胎久食消腎穬麥無毒叢生穬麥主輕身除熱久服令人多力健行以作糵溫消食和中名醫所錄苗圖經曰穬麥乃麥之別種也共有二種一種類小麥一種類大麥皆比大小差大亦可作糵然皆以秋種者為佳山東河北人正月種之者名春穬蓋不具四時中和之氣入藥恐不善也地圖經曰舊不著所出州土今西州山東河北皆有之時生秋生苗採夏取實收曝乾用實色黃白味甘性微寒緩氣氣之薄者陽中之陰臭朽主除熱補中制去芒殼治補日華子云作餅食不動氣若暴食時間似動氣多食益人蕭炳云補中禁患冷氣人不宜服曲無毒曲療臟腑中風氣調中下氣開胃消宿食主霍亂心膈氣痰逆除煩破癥結及補虛去冷氣除腸胃中塞不下食令人有顏色六畜食米脹欲死者煮曲汁灌之立消落胎並下鬼胎又神麯使無毒能化水穀宿食症氣健脾暖胃名醫所錄地謹按丹溪修造神麯之法以六月六日或六月上寅日五更旋取清水和白麵作餅如拳大每餅中納生薑一塊如指大外用紙裹懸於梁間待隔年用之造時切勿言語亦不可使人知方有驗矣今人以淮地酒麴入藥殊不及神麯為勝本經所云落胎蓋謂有消化之性非毒利之藥可比也收風乾用陳久者良色白味甘性溫氣氣之厚者陽也臭香主健脾胃消宿食行足陽明經制雷公云凡使作末後掘地坑深二尺用物裹納坑中至一宿取出焙乾用或炒令香用治療圖經曰平胃止痢別錄云曲治產後暈絕水服方寸匕不瘥更服亦治小兒腹堅大如盤胸中滿能食而不消止河魚之腹疾能消穀及小兒癇消食痔生曲末治妊娠卒胎動不安或腰痛胎轉搶心下血不止及胎動上迫心痛如折並和水絞取汁服之傷寒飲食勞復曲一餅煮取汁服之合治合粟米粥服方寸匕療赤白痢下水穀食不消合獨頭蒜治狐刺杵如帽簪頭納瘡孔中蟲出愈禁妊娠不可服蕎麥無毒叢生蕎麥實腸胃益氣力久食動風令人頭眩和豬肉食之患熱風脫人眉須雖動諸病猶挫丹石能煉五臟滓穢續精神作飯與丹石人食之良其飯法可蒸使氣餾於烈日中曝令口開使舂取人作飯葉作茹食之下氣利耳目多食即微泄燒其穰作灰淋洗六畜瘡並驢馬躁蹄名醫所錄苗謹按蕎麥五月布種於熟地苗高一二尺葉似杏葉而有角莖赤中空七八月作穗開碎白花漸結實九月成熟其皮赤黑肉白有三稜與他麥收種不同實形亦不似大小麥今藥品不甚用者由其能動風氣及令人昏眩故也地圖經曰舊不著所出州土今南北處處有之時生夏生苗採九月取實收曬乾用實及莖葉色皮赤肉白味甘平性寒氣氣之薄者陽中之陰臭朽主益氣補胃制實舂去殼磨細作麵食之其莖燒灰淋汁用治補圖經曰實腸胃益氣力合治合醋調敷小兒赤丹不止及小兒遊丹赤腫並熱瘡赤腫禁同豬羊肉食之成風癩多食發痼疾動風氣脫人眉須亦不可與平胃散及礬同食食之殺人谷之走扁豆蔓生扁音扁豆主和中下氣葉主霍亂吐下不止名醫所錄名鵲豆苗圖經曰扁豆人家多種於籬援間蔓延而上每枝生三葉似杏葉而大五六月開花花有紫白二色莢生花下其莢蒸食之甚美然實亦有黑白二種白者溫而黑者小冷入藥當用白者為佳黑色者亦名鵲豆以其黑間而脊有白道如鵲羽故耳地圖經曰舊不著所出州土今處處有之時生春生苗採秋取實收曬乾用實色白味甘性微溫氣氣之厚者陽也臭腥主消暑和中制去莢銼碎用治療圖經曰白豆行風氣女子帶下葉止吐痢後轉筋生搗一把以少酢浸汁飲之立瘥日華子云葉敷蛇蟲咬孟詵云豆治霍亂吐痢不止食療云嘔逆衍義曰霍亂轉筋補日華子云豆補五臟食療云久食頭不白合治花乾末合米飲和服治女子赤白帶下豆末合醋服之下氣葉合醋煮服治瘕葉汁合醋服理轉筋禁患寒熱病者不可食患冷氣者勿食解解酒毒及河豚毒殺一切草木毒生嚼及煎湯服取效豉無毒豉主傷寒頭痛寒熱瘴氣惡毒煩躁滿悶虛勞喘吸兩腳疼冷又殺六畜胎子諸毒名醫所錄地陶隱居云此食中常用之物也春夏天氣不和蒸炒以酒漬服之至佳依康伯法先以醋酒搜蒸曝燥以麻油和又蒸曝之凡三過乃末椒乾薑屑合和以進食勝今作油豉也出襄陽錢塘香美而濃取中心者彌善食療云陝府豉汁甚勝於常豉以大豆為黃蒸每一斗用鹽四升椒四兩春三日夏兩日冬五日即成半熟加生薑五兩既潔且精勝埋於馬糞中黃蒸以好豉心代之陳藏器云出蒲州者味鹹作法與諸豉不同其味烈陝州又有豉汁經年不敗大除煩熱入藥並不如今之豉心為其無鹽故也收曬乾用豉心色黑味苦性寒泄氣氣薄味厚陰也臭香主發汗除煩熱助得醯良制搗碎用治療藥性論云止下血痢如刺者豉一升水漬才令相淹煎一兩沸絞汁頓服又熬末能止汗除時疾熱病煩燥患寒熱風胸中生瘡者可搗為丸服日華子云蠱氣瘧疾骨蒸並犬咬陳藏器云蒲州豉解煩熱熱毒寒熱虛勞調中發汗通關節傷寒鼻塞陝州豉汁大除煩熱湯液本草云去心懊憹別錄云口舌生瘡胸膈疼痛用焦豉細末含一宿便瘥又除蟲刺螫人用好豉心熟嚼以敷之少頃見豉中毛即瘥不見又嚼敷之晝夜勿絕見毛為度又四肢骨破及筋傷蹉跌以致心悶水二升豉三升漬絞取汁飲之瘥又療蠼螋尿瘡杵豉敷之又患發背癰腫已潰未潰者用香豉三升少與水和熟搗成泥可著腫處作餅子厚三分有孔勿覆孔上布豉餅以艾列其上灸之使溫溫而熱勿令破肉如熱痛即急易之患當減快得分穩一日二度灸之如先有瘡孔中汁出即瘥又赤白痢熬豉令小焦杵服一合日三有驗又舌上出血如針孔取豉一升水三升煮之沸去滓服一升日三又治小兒寒熱惡氣中人以濕豉為丸如雞子大以摩腮上及手足心六七遍又摩心臍上旋旋祝之了破豉丸看有細毛棄道中即瘥又能安胎豉汁服之妙又患惡瘡熬豉為末敷之不過三四次瘥合治豉蒸炒合酒漬之以滓敷腳氣瘥豉一升合薤白一握切以水三升先煮薤納豉更煮湯色黑去豉分為二服不瘥再服療傷寒暴痢腹痛者爛豉一分蚯蚓濕泥二分水研和塗陰莖上生瘡痛干則易之禁熱食酒菜蒜以一升微炒令香清酒三升漬滿三日取汁冷暖任人服之療久患盜汗者不瘥更作三兩劑即止合蔥白各半升水二升煮取一升頓服治患酒病蒸豉合白朮浸酒常服之闢溫疫豉一升合梔子十四枚銼水三升煎取一升分三服治傷寒服藥搶心煩熱豉心五升九蒸九曝合酒一斗取浸一宿空心隨性緩飲之療風毒腳膝攣急骨節痛以黃泥裹豉煨熟冷後取出豆豉為末合純菜油敷小兒頭生惡瘡瘥合大蒜等分杵勻丸如梧子大每服鹽湯下三十丸治臟毒下血不止及血痢豉五合微炒合酒一升半煎五七沸任性稍熱服治傷寒後毒氣攻手足及身體虛腫豉焦炒令煙絕為末合油調敷小兒丹毒破作瘡黃水出者解中藥毒谷之木綠豆無毒稙豆附綠豆主丹毒煩熱風疹藥石發動熱氣奔豚生研絞汁服亦煮食消腫下氣壓熱解石用之勿去皮令人小壅當是皮寒肉平又有稙音陟豆主霍亂吐下取葉搗絞汁和少醋溫服子亦下氣名醫所錄苗謹按綠豆苗高一二尺叢生莖葉有毛其葉似大豆葉而小五六月開白花作莢每莢有子五七枚至八九月成熟入藥以圓小綠者佳今人食之皆撻去皮即少有壅氣而本經所言信矣若愈病故不可去其皮也又有稙豆苗子雖亦相似而別是一種也地南北處處皆有之時生春生苗採秋收實收曬乾用實色綠味甘性寒緩氣氣之薄者陽中之陰臭腥主和五臟去諸熱行十二經脈制去莢和皮用治療日華子云除熱毒風及頭風頭痛作枕枕之明目孟詵云研汁煮服止消渴去浮風補日華子云益氣厚腸胃孟詵云和五臟安精神益氣力潤皮肉可常食之谷之走白豆無毒蔓生白豆補五臟益中助十二經脈調中暖腸胃葉利五臟下氣名醫所錄名豇豆苗謹按白豆即今之豇豆也蔓生葉似扁豆葉而莢長五六月開白花作莢長尺許每莢子有數枚嫩時連莢作茹食之至八九月實熟北人採以和米作飯故呼為飯豆也其嫩葉可作菜食生啖之亦佳又一種苗葉皆相似但莢實紫黑為異其療疾之功亦無所稽地處處有之時生春生苗採八九月取實收曬乾用實葉色白味甘性平氣氣厚於味陽也臭腥主暖腸胃制去莢用治療孫真人云主腎病宜食煞鬼氣三種陳藏器余胡豆子味甘無毒主消渴勿以鹽煮食之苗似豆生野田間米中往往有之東廧味甘平無毒益氣輕身久服不飢堅筋骨能步行生河西苗似蓬子似葵可為飯魏書曰東廧生焉九月十月熟廣志曰東廧之子似葵青色並涼間有之河西人語貸我東廧償爾田粱廧疾羊切麥苗味辛寒無毒主蠱煮取汁細絹濾服之穩與本切即芒秕也
