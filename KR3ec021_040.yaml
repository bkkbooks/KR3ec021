body:
  text: 卷之三十九菜部中品菜之草生薑無毒叢生生薑主傷寒頭痛鼻塞咳逆上氣止嘔吐久服去臭氣通神明名醫所錄名母姜苗圖經曰苗高二三尺葉似箭竹葉而長兩兩相對苗青根黃無花實圃人種蒔用葦箔棚覆其上以避日至深秋採之為嘔家之聖藥也地圖經曰生犍為川穀及荊州揚州今處處有之道地漢州溫州池州者良時生春生苗採八九月取根收以濕土培藏用根色黃白味辛甘性溫散氣氣味俱輕陽也臭香主嘔逆去痰下氣助秦椒為之使反惡黃芩黃連天鼠糞制洗去土去皮即熱留皮則冷入藥切片或搗汁用治療陶隱居云歸五臟止嘔吐除風邪寒熱藥性論云消痰水氣滿止嗽及時疾嘔逆不下食陳藏器云破血調中去冷開胃氣孟詵云止逆散煩悶汁作煎下一切結實沖胸膈惡氣食療曰除壯熱轉筋心滿去胸中雚氣通神明湯液本草云益脾胃散風寒別錄云止乾嘔若手足厥冷宜食生薑又產後穢汙下不盡腹滿生薑二斤以水煮取汁服即下患霍亂心腹脹痛煩滿短氣未得吐下生薑一斤切以水七升煮取二升分作三服治狐臭生薑塗腋下絕根又小兒咳嗽用四兩煎湯沐浴又胎後血上衝心以五兩切用水八盞煮三盞分三服合治合半夏療心下急痛搗汁合蜜服治中熱不能食汁合杏仁作煎服治一切結氣實心胸壅隔冷熱氣以八兩合生附子四兩四破之二物同水五升煮取二升分再服療痰澼及卒風服此禁豬肉冷水以生薑切如麻粒大合好茶一兩碗呷任意治痢若熱痢姜留皮冷痢去皮用合大棗散風寒益元氣合芍藥溫經散寒薑汁半雞子殼合生地黃汁少許蜜一匙頭和水三合頓服治胃氣虛風熱不能食皮作屑末合酒服療偏風以三兩搗破合酒一升煮三四沸頓服療霍亂注痢不止轉筋入腹欲死者汁半合合蜜一匙頭煎令熟溫服如此三服療久患咳噫連咳四五十年者以八兩細切用水三升煮取一升半夏五合洗去滑以水五升煮取一升二味合煮取一升半稍稍服之治心下痞堅不能食胸中嘔噦禁夜間勿食令人閉氣解殺半夏莨菪毒又製厚朴毒乾薑無毒乾薑出神農本經主胸滿咳逆上氣溫中止血出汗逐風濕痹腸澼下痢生者尤良以上朱字神農本經寒冷腹痛中惡霍亂脹滿風邪諸毒皮膚間結氣止唾血以上黑字名醫所錄地圖經曰乾薑乃秋取生薑於長流水洗過日曬為之漢州所作之法以水淹三日去皮又置流水中六日更刮去皮然後曝之令乾釀於甕中三日乃成也陶隱居云出臨海章安惟兩三村解作之蜀漢姜舊美荊州有好姜而並不能作乾者今溫州及池州出一種白色者謂之白乾薑入藥最勝收曬乾色蒼褐味辛炮之則苦性溫大熱氣氣之厚者陽也臭香主生則逐寒邪而發表炮則除胃冷而守中制洗淨以濕紙裹入灰火中炮之令熱透取出銼碎用治療唐本注云治風止血宣諸絡脈發汗藥性論云除腰腎中冷疼冷氣破血去風通四肢關節開五臟六腑去風毒冷痹夜多小便止嗽溫中及血閉病人虛冷者宜加用日華子云治轉筋吐瀉腹臟冷反胃乾嘔撲損瘀血止鼻洪解冷熱毒開胃消宿食除痰下氣湯液本草云補下焦去裡寒及脾中寒熱邪氣別錄云蠍螫人嚼塗患處又鼻衄以乾薑削令頭尖微煨塞鼻中即止傷寒陰陽易病手足拘急欲死者以四兩為末湯調連服被覆出汗得手足伸即愈猘音制惡犬也犬咬人為末納瘡中立瘥合治合秦艽療霍亂腹痛不止及消脹滿冷痢合高良薑等分為末用一錢水一中盞煎至七分服治瘧不痊者作末合蜜和丸塞鼻中治齆鼻合黑附子為引用名姜附湯治傷寒沉寒痼冷腎中無陽脈氣欲絕者效合雄黃等分同研用小絹袋盛男左女右係臂上闢蛇毒蛇聞藥氣逆避之及治蛇毒螫人慾死者搗敷螫毒處乾薑火燒令黑存性碗蓋候冷為末合米飲調一錢服之治痢神效作末合酒調服一錢治寒嗽冷氣結脹又治頭旋眼眩白乾薑以漿水煮令透濕焙乾搗為末合陳廩米粥飲為丸如梧子大一服三五十枚湯使任用療脾胃虛冷不下食羸弱成瘵者為末合粥飲調服一錢療水瀉無度及止卒心痛禁久服令人眼暗多用則耗散元氣蓼實無毒附馬蓼水蓼赤蓼植生蓼實出神農本經主明目溫中耐風寒下水氣面目浮腫癰瘍馬蓼去腸中蛭蟲輕身以上朱字神農本經蓼實葉歸舌除大小腸邪氣利中益志以上黑字名醫所錄名紫蓼赤蓼紅蓼青蓼香蓼天蓼荼蓼馬蓼水蓼木蓼籠艹鈠虞蓼蘬葒草薔虞蓼苗圖經曰蓼類甚多有紫赤二種葉俱小狹而厚青香二種葉亦相似而俱薄馬水二種葉俱闊大上有黑點此六種花皆黃白子皆青黑木蓼亦名天蓼亦有小大二種蔓生葉似柘葉花黃白子皮青滑爾雅所謂薔虞蓼是也衍義曰蓼實即神農本經第十一卷中水蓼之子也彼言蓼則用莖此言實即用子故此復論子之功故分為二條耳地圖經曰生雷澤川澤今在處有之時生春生苗採秋取實收曝乾用實葉色青味辛性溫氣氣之厚者陽也臭腥辣主風冷痃癖治療陶隱居云青蓼釀酒除風冷唐本注云水蓼搗敷蛇傷根莖並用及搗汁服止蛇毒入腹心悶者又水煮漬腳捋之消腳氣腫藥性論云蓼實歸鼻除腎氣兼能去癧瘍葉祛邪氣陳藏器云蓼主痃癖每日取一服煮服之療霍亂轉筋多取煮湯極熱捋腳葉搗敷療狐刺瘡及小兒頭瘡孟詵云子通五臟壅氣別錄云熱暍心悶濃煮蓼汁一大盞分為二服飲之或夏月暍死者濃煮三升灌之亦愈腳痛成瘡銼水蓼煮湯頻頻淋洗候瘡干自安霍亂轉筋取蓼以手把去兩頭以水二升半煮取一升半頓服之合治蓼合白蜜雞子白塗小兒頭瘡蟲出不作瘢先切蓼葉以水三升煮取二升合蓼子一把香豉一升納於汁中更煮取一升半分三服療霍亂轉筋赤蓼燒灰淋汁浸捋曝腳軟人及蒸桑葉罯之立愈赤蓼莖葉切三合以水一盞酒三合煎至四合去渣分溫二服治肝虛轉筋蓼根細銼合酒浸服治血氣攻心痛不可忍者瘥禁多食令人吐水及損陽氣二月勿食水蓼食之傷腎忌與魚鱠同食令人陰冷痛氣欲絕蔥實無毒植生蔥實出神農本經主明目補中不足莖可作湯主傷寒寒熱出汗中風面目腫以上朱字神農本經蔥白平傷寒骨肉痛喉痹不通安胎歸目除肝邪氣安中利五臟益目睛殺百藥毒蔥根主傷寒頭痛蔥汁平溫主溺血以上黑字名醫所錄名山蔥凍蔥漢蔥茖蔥冬蔥樓蔥胡蔥苗圖經曰蔥有數種入藥用山蔥胡蔥食品用凍蔥漢蔥山蔥生山中細莖大葉食之香美於常蔥一名茖蔥爾雅所謂茖山蔥是也胡蔥類食蔥而根莖皆細白又云莖葉細短如金燈者是也舊云生蜀郡山谷似大蒜而小形圓皮赤梢長而銳凍蔥冬夏常有但分莖栽蒔而無子氣味最佳亦入藥用一名冬蔥又有一種樓蔥亦冬蔥類也江南人呼龍角蔥言其苗有八角故爾淮楚間多種之漢蔥莖實硬而味薄冬即葉枯凡蔥皆能殺魚肉毒食品所不可闕也地圖經曰處處有之時生春生苗三月開花採五月收實收曝乾用實莖根色黑味辛性溫氣氣厚味薄陽也臭腥主蔥白行手太陰經足陽明經治療圖經曰葉及莖去水病兩足腫者煮令爛漬之日三五次愈又打撲損傷取蔥新折者便入煻火煨熱剝去皮擘開其間有涕便將罯損處仍多煨取續續易熱者佳日華子云蔥止天行時疾頭痛熱狂通大小腸霍亂轉筋及賁豚氣腳氣心腹痛目眩並止心迷悶金瘡水入皸腫煨研窨敷蜀本云胡蔥能消腫痛孟詵云根主瘡中有水風腫疼痛者食療云蔥止血衄利小便蔥須及白通氣主傷寒頭痛別錄云腸痔大便常血取白三五斤煮作湯盆中坐立瘥又急氣淋陰腎腫用泥蔥半斤煨過爛貼臍上又胎動五六個月困篤難救者蔥白一大握水三升煎取一升去滓頓服合治胡蔥合小蒜茱萸煮汁浸或搗敷諸惡蛪狐尿刺毒及山溪中沙蝨射工等毒莖葉合鹽研罯蛇蟲傷處及中射工溪毒蔥花一升合吳茱萸一升以水一大升八合煎七合去滓分二服止脾心痛痛則腹脹如錐刀刺者青葉合乾薑黃柏煮作湯浸洗患瘡中有風水腫疼者蔥白合酢搗封小腹上治大小便不通蔥白二十莖合大棗二十枚以水三升煎取二升分服療霍亂後煩躁臥不安穩蔥合米煮粥空心食療赤白痢蔥須陰乾為末二錢合蒲州膽礬一錢研勻以一字入竹管中吹喉中瘡腫病處禁不可多食食則拔氣上衝人五臟悶絕虛人患氣者多食發氣忌不可與蜜同食食則促氣殺人解殺一切魚肉毒韭無毒叢生韭歸心安五臟除胃中熱利病人可久食子主夢泄精溺白根主養髮名醫所錄苗圖經曰初生如麥秋深抽莖著花乃菜種之最久者故謂之韭圃人種蒔一歲而三四次割之其根不傷至冬壅培先春復生信乎一種而久者也此物最溫而益人宜常食之易稽覽圖云政道得則陰物變為陽若蔥變為韭是也然則蔥寒而韭溫可驗矣又有一種山韭形性亦相類但葉如燈心苗為異爾雅所謂蔱於六切山韭也山中往往有之而人多不識耳衍義曰春食則香夏食則臭其未出土者為韭黃最不益人食之滯氣蓋含抑鬱未達之氣故也孔子所謂不時不食正謂此輩地圖經曰處處有之時生春生苗採無時用葉根實色青綠味辛微酸性溫氣氣厚味薄陽中之陰臭臭主益陽泄精尿血制搗汁用治療日華子云止尿血除心腹痼冷胸中痹冷痃癖氣並腹痛及中風失音研汁服心脾骨痛甚生研服蛇犬咬並惡瘡搗敷子治鬼交陳藏器云溫中下氣令人能食止泄白膿腹冷痛並煮食之葉及根療狂犬咬人慾發者亦殺諸蛇虺蠍惡蟲毒根搗汁服除胸痹骨痛不可觸者韭子生吞三十粒空心鹽湯下止夢泄精及溺白孟詵云胸痹心中急痛如錐刺不得俯仰自汗或痛徹背上不治或至死可取生韭或根五斤洗搗汁灌少許即吐胸中惡血蕭炳云小兒初生與韭根汁灌之即吐出惡水別錄云百蟲入耳搗韭汁灌耳中瘥喉腫不下食以韭一把搗熬敷之冷則易之又臥忽不寤勿以火照之殺人但痛齧拇指甲際而唾其面則活取韭汁吹鼻孔冬月取根汁灌口中亦得又卒上氣鳴息便欲絕搗韭汁飲一升愈止水穀痢作羹粥炸炒任食又漆瘡韭葉研敷又小兒患黃搗韭根汁滴鼻中如大豆許補日華子云補虛和腑臟益陽止泄精暖腰膝食之令人肥白合治子合桑螵蛸龍骨療漏精葉合煮鯽魚鮓斷卒下痢根搗合醬汁灌馬鼻蟲顙子合龍骨服甚補中韭子二兩微炒為散食前合酒下二錢匕治虛勞腎損夢中泄精韭根炒存性旋搗末合豬脂油敷五般瘡癬上三五度瘥禁多食昏神暗目霜韭不可生食花食動風酒後及熱病後勿食食之發睏忌不可與蜜同食解藥毒薤無毒叢生薤出神農本經主金瘡瘡敗輕身不飢耐老以上朱字神農本經歸於骨菜芝也除寒熱去水氣溫中散結利病人諸瘡中風寒水腫以塗之以上黑字名醫所錄名𣚊與薤同鴻薈烏胃切莖巨盈切山𣚊苗圖經曰薤似韭而葉闊多白無實人家種者有赤白二種皆春分蒔之至冬而葉枯爾雅云𣚊鴻薈又云葝山𣚊莖葉亦與家薤相類而根長葉差大僅若鹿蔥體性亦與家薤同然今少用薤雖辛而不葷五臟故道家常餌之兼補虛最宜人凡用蔥薤皆去青留白蓋白冷而青熱故也地魯山平澤今處處有之時生春生苗採無時用薤白質類韭而葉闊多白色青白味辛苦性溫散氣氣厚味薄陽中之陰臭臭主療瘡生肌行手陽明經制去葉用治療圖經曰薤白止霍亂乾嘔不息薤根除卒得胸痛瘥而復發者搗汁飲之立止日華子云薤止久痢冷瀉食療云薤白止金瘡生肌肉生搗封之更以火就炙令熱氣徹瘡中干則易之作羹食之除女子赤白帶下併骨鯁在咽不下者食之即下衍義曰薤白治肺氣喘急取其滑泄也別錄云薤白治誤吞釵取曝令萎黃煮使熟勿切長食一大束釵即隨出及止赤白痢取一握切煮作粥食之又除目中風腫痛並頭卒痛者薤汁治中惡或先病者或常居寢臥奄忽而絕者灌鼻中瘥及治虎犬咬人飲一升日三瘥若傷手足已中水毒及犯惡露風寒腫痛杵薤炙熱拓瘡上便愈補日華子云薤輕身耐寒調中補不足肥健人孟詵云學道人常食之可通神安魂魄益氣續筋骨合治薤白切一升豬脂一斤細切合苦酒浸經宿微火煎三上三下去滓敷炙瘡腫痛薤白二握生搗如泥合粳米粉蜜調相和捏作餅炙取熟不過三兩服止疳痢薤白合蜜同搗塗湯火瘡其效甚速禁薤不可與牛肉同食食之令人成癥瘕冬月勿食生薤多涕唾三月四月不可生食發熱病人不宜食解薤白同黃柏煮服之解毒及食鬱肉脯毒杵汁服二三升即解菾菜無毒叢生菾音甜菜主時行壯熱解風熱毒名醫所錄苗圖經曰苗似升麻葉似紫菊而大春秋播種於畦而生莖高一二尺若蒴藋而有細稜四月開白花六月結子其莢與諸菜不同此菜夏盛而冬枯也地處處有之時生春生苗採五月取收炸過曬乾用莖葉及子色青綠味甘苦性大寒氣味厚於氣陰也臭腥主除冷熱痢止血生肌治療陶隱居云菾菜除時行熱病初得便搗汁飲之瘥唐本注云夏月以此菜研作粥食之解熱及止熱毒痢並搗敷灸瘡止痛易瘥日華子云炙作熱水飲開胃通心膈陳藏器云菾菜止冷熱痢搗汁服之及止血生肌亦治人與禽獸有折傷處敷之立愈孟詵云子煮半生搗汁含止小兒熱陳士良云菾菜食之宜婦人合治子合醋浸之揩面令面潤澤有光菜之木荊芥無毒植生荊芥主寒熱鼠瘻瘰癧生瘡破結聚氣下瘀血除濕痹神農本經名鼠蓂姜芥假蘇苗圖經曰荊芥即假蘇也葉似落藜而細初生香辛可啖人取作生菜食之江左人以其香氣似蘇故名假蘇又有胡荊芥俗呼為新羅荊芥石荊芥體性相近入藥亦同地生漢中川澤今處處有之時生春生苗採夏秋取收曝乾用花實成穗者佳質葉似落藜而細色青味辛苦性溫散氣氣味俱薄陽中之陰臭香主祛風發汗制去根銼碎用治療圖經曰除頭風虛勞瘡疥婦人血風唐本注云去邪出汗除冷風煮汁服之藥性論云治惡風賊風口面喎斜遍身𤸷痹心虛忘事辟邪毒氣治疔腫取一握切以水五升煮取二升冷分二服主通利血脈傳送五臟不足氣日華子云利五臟消食下氣醒酒作菜生熟食之陳士良云治血勞風氣壅滿背脊疼痛虛汗丈夫腳氣筋骨煩疼及陰陽毒傷寒頭痛頭旋目眩手足筋急補藥性論云益氣添精合治搗末合酢封疔腫及風毒腫合茶煎食之止頭風並出汗合豉汁煎服治暴傷寒穗搗篩為末每服二錢匕合童子小便一酒盞調熱服治產後血暈築心眼倒風縮欲死者為末合酒服二錢匕治產後中風身強直眼反折四肢搐搦青荊芥一斤青薄苛一斤以砂盆納一處研生絹絞汁於瓷器內看厚薄煎成膏余滓三分去一分漉滓不用將二分滓曬乾為末以膏和為丸如梧桐子大每服二十丸早至暮可三服忌食動風物禁多食熏五臟神久食動渴疾菜之草白蘘荷有小毒植生白蘘荷主中蠱及瘧名醫所錄名嘉草覆菹苗圖經曰春初生葉似甘蕉葉根似姜而肥其根莖堪為菹其性好陰在水下生者尤美然有赤白二種白者入藥昔人呼為覆菹赤者堪啖及作梅果多用之潘岳閒居賦云蘘荷依陰時藿向陽也周禮蔗氏以嘉草除蠱毒宗懍巨禁切以謂嘉草即蘘荷是也地圖經曰荊襄江湖間多種之北地亦有時生春生葉採八九月取收陰乾用莖葉及根味辛甘性微溫氣氣之厚者陽也臭朽主惡瘡喉痹制雷公云凡使以銅刀刮上粗皮一重了細切入砂盆中研如膏只收取自然汁煉作煎卻於新盆器中攤令冷如干膠煎刮取研用治療圖經曰蘘荷除喉痹乾末水服之陶隱居云白者除溪毒及沙蝨輩唐本注云根治諸惡瘡根心去稻麥芒入目中不出者以汁注目中即出別錄云根葉除傷寒時氣瘟病頭痛壯熱脈盛生搗絞汁服三四升瘥及治卒吐血痔血婦人患腰痛取向東根一把搗汁服之又治喉中似物吞吐不出腹脹羸瘦亦取根汁服蠱立出治卒中蠱毒下血如雞肝晝夜不絕臟腑敗壞待死以葉蜜安病人席下勿令知覺使病者自呼蠱主姓名瘥合治蘘荷根二兩研絞取汁合酒一大盞和勻不計時溫服半錢治風冷失聲咽喉不利根合酒漬半日含漱其汁治喉中及口舌生瘡爛根細切煎取二升空心人酒調服治婦人月信滯澀禁多食損藥勢又不利腳解殺蠱毒贗革牛草為偽菜之木紫蘇無毒附子植生紫蘇主下氣除寒中子尤良名醫所錄名桂荏苗圖經曰蘇乃紫蘇也苗高二三尺莖方葉圓葉下紫色而氣甚香夏採莖葉秋採實俱堪入藥用之爾雅謂蘇為桂荏蓋以其味辛而形類荏乃名之然蘇有數種有白蘇魚蘇山魚蘇皆是荏類白蘇亦是方莖圓葉不紫亦甚香實亦入藥魚蘇似茵陳大葉而香吳人以煮魚故名魚𦺗𦺗生山石間者又名山魚蘇也陶隱居云葉下紫色而氣甚香者入藥最佳其無紫色不香似荏者名野蘇不堪用地圖經曰舊不著所出州土今處處有之道地吳中者佳時生春生苗採夏取莖葉秋取實收曬乾用莖葉子色紫味辛性溫散氣氣厚味薄陽也臭香主解肌發表開胃下食制去根銼碎用治療圖經曰莖葉通心經益脾胃煮飯尤勝單用莖去節能宣通風毒雞瘕藥性論云子除上氣咳逆冷氣及腰腳中濕風結氣研汁煮粥良日華子云除心腹脹滿止霍亂轉筋一切冷氣腳氣通大小腸子調中益五臟下氣止霍亂嘔吐反胃利大小便破癥結消五膈止嗽潤心肺消痰氣孟詵云除寒熱衍義曰子定肺氣喘急補圖經曰子常食之令人肥健肥白身香日華子云子補虛勞合治子合橘皮服能下氣子合高良薑橘皮等分蜜丸空心下十丸治一切宿冷氣及腳濕風子一升微炒杵以生絹袋盛納三斗清酒中浸三宿少少飲之祛風順氣利腸子一升熬杵為末合酒服方寸匕日再服治夢遺失精紫蘇不限多少於大鍋內水煎令乾後去滓熬膏以赤小豆炒熟杵末調煎為丸如梧子大合酒下三十丸至五十丸治失血常服瘥紫蘇二兩杵碎水二升研取汁以蘇子汁煮粳米合作粥和蔥豉椒姜食之治腳氣及風寒濕痹四肢攣急腳腫不可踐地者禁紫蘇湯多飲無益人脾胃寒者飲之多滑泄解蟹毒水蘇無毒植生水蘇出神農本經主下氣殺穀除飲食闢口臭去毒辟惡氣久服通神明輕身耐老以上朱字神農本經主吐血衄血血崩以上黑字名醫所錄名雞蘇勞祖芥蒩音祖芥苴七餘切苗圖經曰水蘇乃雞蘇也此種多生水岸傍苗似旋覆兩葉相當大香馥花生節間紫白色青濟間呼為水蘇江左名為薺薴吳會謂之雞蘇南人多以作菜江北甚多而人不取食又江左謂雞蘇水蘇是兩種陳藏器謂薺苧自是一物非水蘇水蘇葉有雁齒及有香薷氣辛薺苧葉上有毛稍長氣臭為異蜀本云葉似白薇兩葉相當花生節間紫白色味辛而香者即水蘇也衍義曰水蘇氣味與紫蘇不同辛而不和然亦如蘇但面不紫及周圍槎牙和雁齒而香少也地圖經曰生九真池澤及江北甚多今處處有之時生春生苗採六月七月收曬乾用莖葉色青白味辛性微溫氣氣之厚者陽也臭香主頭風目眩制去根銼碎用治療圖經曰水蘇作菜除諸氣疾及腳腫石薺苧去風血冷氣並瘡疥痔漏並煮汁服日華子云雞蘇治肺痿崩中帶下血痢產後中風及血不止並頭風目眩並服之瘥孟詵云水蘇熟搗生葉綿裹塞耳聾及燒作灰淋汁或煮汁洗頭令髮香白屑不生別錄云莖葉煎取汁飲療婦人漏下合治生雞蘇五合合香豉二合同杵研搓如棗核大納鼻中治衄不止菜之草香薷無毒植生香薷主霍亂腹痛吐下散水腫名醫所錄名香茸香葇香戎石香柔苗圖經曰香薷似白蘇而葉更細一作香葇俗呼香戎又一種石上生者莖葉更細而辛香彌甚用之尤佳今人謂之石香薷也衍義曰葉如茵陳花茸紫在一邊成穗凡四五十房為一穗如荊芥穗別是一種香氣暑月亦可作蔬菜食之治暑氣不可闕者也地舊不著所出州土今蜀郡陵榮資簡州及南中諸山岩石間皆有之道地江西新定新安者佳時生二月生苗採八月十月中採收曬乾用莖葉穗質類白蘇而葉細色黃綠味辛性微溫氣氣之厚者陽也臭香主消暑氣止霍亂制去根莖葉銼細用勿令犯火治療陶隱居云作煎除水腫日華子云下氣除煩熱療嘔逆冷氣孟詵云乾末止鼻衄水服之別錄云水病洪腫氣脹不消食取乾者五十斤濕者亦得銼納釜中水浸之出香薷上數寸煮使氣盡去滓沉清之微火煎令可丸如梧子大一服五丸三日稍加之以小便利為度石香薷苗莖花實俱調中溫胃療霍亂吐瀉又口臭取一把以水一斗煮取三升稍稍含之療舌上忽出血如鑽孔者煮汁服一盞日三次愈合治合蓼同切煮飲療霍亂轉筋轉加四肢煩冷汗出而渴者陳香薷濃煮汁少許合脂和胡粉敷小兒白禿瘡發不生汁出滲痛薄荷無毒叢生薄荷主賊風傷寒發汗惡氣心腹脹滿霍亂宿食不消下氣煮汁服亦堪生食人家種之飲汁發汗大解勞乏名醫所錄名龍腦薄荷新羅菝𦽅石薄荷連連錢草新羅薄荷吳菝𦽅胡菝莆達切𦽅火個切苗圖經曰春生苗葉似荏而尖長至夏茂盛其根經冬不死與胡薄荷相類但味少甘為別浙人多以作茶飲之俗呼新羅薄荷天寶方云連連錢草者是石薄荷生江南山石上葉微小至冬而紫色不聞有別功用惟二種龍腦薄荷於蘇州郡學前產之蓋彼達勢似龍其地居龍腦之分得稟地脈靈異故其氣味功力倍於他所謂之龍腦薄荷非此則皆劣矣地圖經曰舊不著所出州土今江浙處處有之道地出南京岳州及蘇州郡學前者為佳時生春生苗採夏秋取收曝乾用莖葉質類荏而葉尖長色青綠味辛苦性溫氣氣味俱薄陽中之陰臭香行手太陰肺經手厥陰心包絡治療圖經曰傷風頭腦風通關格及小兒風涎藥性論云去憤氣發毒汗破血止痢通利關節日華子云中風失音吐痰及頭風等陳士良云除陰陽毒傷寒頭痛及風氣壅並攻胸膈作茶服之立效衍義曰去小兒驚風壯熱及治骨蒸勞熱食療云去心臟風熱杵汁服別錄云蜂螫挼莖貼之禁新病瘥人勿食食之令人虛汗不止菜之走葫蘆無毒蔓生葫蘆主消水腫益氣今補苗謹按葫蘆三月生苗蔓延籬垣及屋上其葉似瓠葉五六月開白花結實如瓜而大嫩時甘者作茹苦者不堪啖經霜則枯取以為器又有一種小者名瓢即瓠瓜也亦有甘苦二種然苗葉相似但實形有異爾地處處有之時生春生苗採秋取實用實色白味甘性平氣氣之薄者陽中之陰臭朽菜之草甘露子無毒叢生甘露子利五臟下氣清神今補名滴露地蠶苗謹按甘露子莖高尺余而方枝葉兩兩相對如薄荷有毛七八月莖端作穗如水蘇開紫花其根即甘露子也世人作菜食之稀入藥用其形如蠶故又呼為地蠶也地處處有之時生春生苗採十月取根用根質形似蠶色白味甘性平氣氣之薄者陽中之陰臭朽蘑菇植生蘑菇動氣發病不可多食今補苗謹按蘑菇乃蕈之屬也苗高二三寸中空而輕脆其色黃白五六月多生濕處今入諸湯中食之味甚鮮美但不可多食由其動氣而發病故也地出河南今北地亦有之時生無時採無時收曬乾色黃白味甘性寒氣氣之薄者陽中之陰臭香反酒制初採得與米飯同炒如飯黑者有毒食之即死解中蘑菇毒以生綠豆和水研濃汁飲之遂解香菜無毒植生香菜與諸菜同食氣味香闢腥今補苗謹按香菜至春宿根分蒔而生苗高尺許莖方色紫葉似薄荷葉而小今人採葉入諸羹中由其味香以闢腥氣但不聞入藥用之地北地多產之時生春生苗採春夏取葉用葉色青綠味辛性平氣氣厚於味陽中之陰臭香菜之走薇菜無毒蔓生薇菜益氣潤肌清神強志今補苗謹按薇乃菜之微者即今之野豌豆也其苗蔓生莖葉皆似小豆而味亦相似蜀人謂之巢菜昔官園種之以供宗廟祭祀也地生山野處處有之時生春生苗採嫩時取用莖葉色青綠味甘性平氣氣厚於味陽中之陰臭香菜之草天花叢生天花食之有毒與蘑菇稍相似今補名天花菜苗謹按此種如蕈生於山谷其苗高五六寸大小不等上有碎瓣如木耳而黃色數十瓣攢生一本採之以形似松花大而氣足者佳亦謂之天花菜世人惟作菜品食之未聞入藥用也地生五臺山谷時生無時採無時收曬乾用大而氣足者佳質類雞冠花而多瓣色黃白味甘性平氣氣之薄者陽中之陰臭香胡蘿蔔無毒叢生胡蘿蔔主下氣調利腸胃今補苗謹按胡蘿蔔乃世之常食菜品也然與萊菔相類固非一種今圃人五月布種生苗高尺許葉似胡荽葉而大其根色黃頭大尾銳至霜後採之味甘美值冬覆養至春末莖端作叢開淡白花結實如小茴香也地處處有之時生夏生苗採九月取根用根色黃味甘性平氣氣之薄者陽中之陰臭香秦荻梨無毒附五心菜叢生秦荻梨主心腹冷脹下氣消食名醫所錄苗孟詵云秦荻梨於生菜中最香美人所啖者甚破氣之物也一種五辛菜味辛溫歲朝食之助發五臟氣常食溫中去惡消食下氣荊楚歲時記亦作此說熱病後勿食食之損目地圖經曰生下濕地所在有之味辛性溫氣氣之厚者陽也臭香合治秦荻梨為末合酒服治卒心痛悒悒寒滿氣子末合醋封腫氣日三易菜之走醍醐菜蔓生醍醐菜治傷中崩絕及月水不利並搗汁和酒空心服名醫所錄苗雷公曰形似牛皮其蔓掏之有乳汁出香甜入頂者是也臭香制雷公曰採得去根以苦竹刀細切入砂盆中研如膏用生稀絹裹挼取汁出暖飲合治醍醐杵汁合酒煎沸空心服一盞治傷中崩絕葉絞汁合酒煎服一盞治月水不利一種陳藏器余翹搖味辛平無毒主破血止血生肌亦充生菜食之又主五種黃病絞汁服之生平澤紫花蔓生如勞豆詩義疏云苕饒幽州人謂之翹饒爾雅云柱天搖車也食療療五種黃病生搗汁服一升日二瘥甚益人利五臟明耳目去熱風令人輕健長食不厭煮熟吃佳若生吃令人吐水
