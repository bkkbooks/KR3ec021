body:
  text: 卷之三十三果部中品果之木梅實無毒附烏梅白梅植生梅實出神農本經主下氣除熱煩滿安心肢體痛偏枯不仁死肌去青黑志惡疾以上朱字神農本經止下痢好唾口乾以上黑字名醫所録苗謹按木似杏而枝幹徑脆春初時開白花甚清馥花將謝而葉始生二月結實如豆味酸美人皆啖之五月採將熟大於杏者以百草煙燻至黑色為烏梅以鹽淹曝乾者為白梅也地圖經曰生漢中川穀今襄漢川蜀江湖淮嶺皆有之道地郢州今安吉為勝時生春初開花二月結實採五月取實收火干用實質類杏實色生青熟黃味酸性平收氣氣之薄者陽中陰也臭香主生津止渴除冷熱痢制去核用治療圖經曰葉煮汁已休息痢根除風痹烏梅治傷寒煩熱及霍亂燥渴虛勞瘦羸産婦氣痢陶隱居云白梅點痣蝕惡肉唐本注云實利筋脈去痹藥性論云核除煩熱日華子云實止渴葉止霍亂白梅敷刀箭所傷及刺在肉中烏梅除勞及骨蒸去煩悶澀腸消酒毒並偏枯皮膚麻痹去黑點令人得睡陳藏器云烏梅消痰祛瘧瘴調中止吐逆孟詵云大便不通氣奔欲死烏梅湯泡挼去核杵丸如棗大內下部即通湯液本草云烏梅燒灰敷一切瘡肉及蛔蟲合治烏梅合建茶乾薑為丸止休息痢合蜜為丸石榴皮根湯下治傷寒下部生䘌瘡禁服黃精不宜食多啖傷骨蝕脾胃發熱損齒梅根出土者不用生食令人膈上熱木瓜無毒附榠楂植生木瓜實主濕痹邪氣霍亂大吐下轉筋不止其枝亦可煮用名醫所録名楙苗圖經曰其木狀若奈花生於春末而深紅色其實大者如瓜小者如拳味酢可食爾雅謂之楙宣州人種蒔尤謹遍滿山谷始實成則鏃紙花薄其上夜露日曝漸而變紅花文如生本州以充上貢焉又有一種榠楂一名蠻楂木葉花實酷類木瓜陶云欲辨之看蒂間別有重蒂如乳者為木瓜無此者為榠楂也木瓜大枝可作杖策利筋脈又截其木干之作桶以濯足尤益陶隱居云彼人以為果最療轉筋如轉筋時但默呼其名及書木瓜字於患處即愈地圖經曰舊不著所出州土今山陰蘭亭尤多處處有之道地宣城為佳時生春末開花採秋取實收曝乾用實質類榠楂子而葉有別色赤黃味酸性溫收氣氣厚於味陽中之陰臭香主除腳氣去濕痹行手足太陰經制雷公云凡使勿令犯鐵用銅刀削去硬皮並子薄切於日曬卻用黃牛乳汁拌蒸從巳至未其木瓜如膏煎卻於日薄攤曬乾用治療圖經曰實侑酒去痰根及葉煮湯淋足脛止蹶陶隱居云凡轉筋呼木瓜及書二字於患處即愈日華子云木瓜止吐瀉賁豚及水腫冷熱痢心腹痛消渴嘔逆心膈痰唾根及實除腳氣榠楂消痰解酒毒及咽酸浸油梳頭治發赤並白陳藏器云木瓜下冷氣強筋骨消食止水痢後渴不止榠楂去噁心止心中酸水水痢止酒痰水衍義曰木瓜入肝故益筋與血病腰腎腳膝無力不可缺合治合酒煮木瓜爛研裹膝筋急痛禁榠楂不可多食損齒及骨解榠楂解酒毒贋和圓子蔓子土伏子為僞柿無毒植生柿主通鼻耳氣腸澼不足名醫所録名牛奶柿紅柿朱柿牛心柿蒸餅柿烏柿白柿小柿塔柿苗圖經曰其木高二三丈春敷青葉類梨葉而圓大夏開青白花其實結於花心至秋漸大而熟柿之種類甚多黃柿生近京州郡紅柿南北通有朱柿出華山似紅柿而皮薄更甘珍椑音卑柿出宣歙荊襄閩廣諸州但可生啖不堪干也諸柿食之皆美而益人其乾柿火乾者謂之烏柿出宣州越州性甚溫曬乾者謂之白柿入藥微冷又有一種小柿謂之軟棗俚俗曝乾貨之謂之牛奶柿其枯葉至滑澤古人取以臨書俗傳柿有七絶一壽二多陰三無鳥巢四無蟲蠹五霜葉可玩六嘉實七落葉肥大衍義曰柿有著蓋柿於蒂下別生一種又牛心柿如牛之心蒸餅柿如今市賣之蒸餅華州有一等朱柿比諸品中最小深紅色又一種塔柿亦大於諸柿性皆涼不至大寒食之引痰極甘故也去皮掛大木株上使風日中自干食之動風火乾者味不佳生則澀以溫水養之需澀去可食逮至自然紅爛澀亦自去幹則性平地圖經曰舊不著所出州土今近京州郡及華山宣州越州南北皆有之時生春生葉採秋熟取實收曝乾火干用實色紅黃味甘性寒緩氣氣薄味厚陰中之陽臭香主止吐血厚腸胃制火熏並曝乾用治療日華子云潤心肺止渴澀腸療肺痿心熱嗽消痰開胃乾柿潤聲喉殺蟲陳藏器云多食去面皯除腹中宿血蒂止噦氣唐本注云火柿金瘡火瘡生肉止痛軟熟柿止口乾壓胃間熱孟詵云乾柿消宿血補孟詵云乾柿虛勞不足健脾胃氣紅柿續經脈氣合治黃柿合米粉作糗食小兒止痢乾柿合酥蜜煎食治脾胃薄食木皮搗末合米飲和服治下血不止亦止上衝下脫者禁牛奶柿性冷不可多食凡食柿不可與蟹同食令人腹痛大瀉解酒毒果之草芋有毒叢生芋主寬腸胃充肌膚滑中名醫所録名土芝白芋青芋真芋蓮禪芋莒紫芋苗圖經曰葉如荷葉而長根類山藥而圓其種類雖多大抵性效相近蜀川出者形圓而大狀若蹲鴟謂之芋魁三年不採者謂之莒彼人蒔之最盛可以當糧食而度饑年左思三都賦所謂徇蹲鴟之沃則以為濟世陽丸是也江西閩中出者形長而大葉皆相類甚細者如雞卵生於大魁旁食之尤美不可過多乃有損也凡食芋並須園圃蒔者為佳其野芋生溪澗非人所種者根葉亦相類不堪食也唐本注云此有六種有青芋紫芋真芋白芋連禪芋野芋其青芋毒多初煮要須灰汁易水煮熟乃堪食爾白芋真芋連禪芋紫芋毒少蒸煮啖之兼肉作羹亦佳蹲鴟之饒蓋此謂也野芋有大毒而不可啖衍義曰江浙二川者最大而長京洛者差圓而小惟東西京者佳他處味不及也當心出苗者為芋頭四邊附芋頭而生者為芋子八九月以後可食至時掘出置十數日阹以好土勾埋至春猶好生則味辛而涎多過食亦能滯氣困脾也地圖經曰錢塘最多閩蜀淮甸尤殖今處處有之衍義曰江浙川廣最佳時生春生苗採八九月以後取根收曬乾用根色紫青白味辛性平散氣氣之薄者陽中之陰臭朽主煩熱止渴制蒸煮熟爛可食治療日華子云芋破宿血去死肌葉止瀉及妊孕心煩迷悶胎動不安陳藏器云小者開胃及腸閉産後煮食破血及飲汁止血渴孟詵云紫色者破氣作湯浴去身上浮風補陳藏器云食之令人肥白合治野芋合醋摩敷蟲瘡疥癬姜芋合生姜並魚煮食下氣調中補虛芋葉合鹽研敷蛇蟲咬並癰腫毒及窨敷箭毒禁久食令人虛勞無力滯氣困脾冬月宜食他時月不可食野芋有大毒不可輒食食則殺人解中野芋毒惟土漿及糞汁解之烏芋無毒叢生烏芋主消渴疸熱溫中益氣名醫所録名藉姑水萍鳧茨芍下了切苗圖經曰烏芋今鳧茨也苗似龍鬚而細正青色根黑如指大皮厚有毛又有一種皮薄無毛者亦同田中生人並食之亦以作粉食之厚人腸胃不飢爾雅所謂之芍是也衍義曰今人謂之葧臍皮厚色黑肉硬白者謂之豬葧臍皮薄色澤淡紫肉軟者謂之羊葧臍此二種藥中罕用荒歲人多采以充糧也地圖經曰處處水田中皆有之時生二月生苗採三月三日十月取收曝乾用根色紫黑味甘苦性微寒氣氣薄味厚陰中之陽臭香主清胃熱止消渴制生用或搗作粉治療孟詵云消風毒除胸中實熱氣可作粉食明耳目日華子云治黃疸開胃下食服金石藥人食之良丹溪云下石淋禁患冷氣人不可生食食之令腹脹氣滿小兒秋食臍下當痛解丹石毒慈菰有毒一云無毒泥生慈菰主百毒産後血悶攻心欲死産難胎衣不出搗汁一升服之莖葉搗爛如泥塗敷諸惡瘡腫及小兒遊瘤丹毒以冷水調此草膏化如糊以雞羽掃上腫便消退甚效名醫所録名白地栗河鳧茨槎芽剪刀草燕尾草苗圖經曰葉如剪刀形莖幹似嫩蒲又似三稜苗甚軟其色深青緑每叢十餘莖內抽一兩莖莖上分枝開小白花四瓣蕊深黃色根大者如杏小者如杏核色白而瑩滑人採煮食之味甘美而無毒也福州別有一種小異三月生花四時採根葉亦治癰腫地圖經曰生江湖及京東近水河溝田中今處處皆有之時生春生苗採正二月取根五六月七月取葉收曝乾用根及莖葉質類芋而小色黃白味甘微苦性寒氣氣薄味厚陰中之陽臭香治療日華子云葉研敷蛇蟲咬禁不可多食發虛熱及腸風痔瘻崩中帶下瘡癤煮生薑以御之常食之令人患腳又髮腳氣癱緩風損齒令人失顏色皮肉乾燥卒食之令人嘔水孕婦亦不宜服果之木枇杷葉無毒植生枇杷葉主卒啘不止下氣名醫所録苗圖經曰木高丈餘葉作驢耳形背有毛其木陰密婆娑可愛四時不凋盛冬開白花至四五月而成實故謝瞻枇杷賦云稟金秋之青條抱東陽之和氣肇寒葩之結霜成炎果乎纖露是也其實作梂如彈丸黃色微有毛皮肉甚薄中核如小栗其性味與葉不同也地圖經曰襄漢吳蜀閩嶺南北二川皆有之道地眉州江南西湖時生春生新葉採不拘時取葉收曝乾用葉子木上白皮質類奔草葉背有毛色青黃味苦性平泄氣氣薄味厚陰也臭香主肺氣渴疾制雷公云凡使採得後稱濕者一葉重一兩乾者三葉重一兩是氣足堪用使粗布拭令毛盡用甘草湯洗一遍卻用綿再拭令乾每一兩以酥一分炙之酥盡為度銼碎或煮汁用治療藥性論云葉和胃氣冷嘔噦不止日華子云葉止産婦口乾實潤五臟別録云葉消肺風瘡胸面上瘡圖經曰木白皮止嘔逆不下食合治葉合木通款冬花紫菀杏仁桑白皮等分大黃減半為末蜜丸含化療肺熱久嗽身如炙肌瘦將成肺癆禁去毛不淨射人肺令咳不已實久食發痰熱子和熱炙肉及熱麵食患熱毒黃病荔枝子無毒植生荔枝子主止渴益人顏色名醫所録苗圖經曰木高二三丈自徑尺至於合抱頗類桂木冬青之屬葉蓬蓬然四時榮茂不凋二三月開青白花狀若冠之蕤纓三四月結實如松花之初生者殼若羅文初青漸紅肉淡白如肪玉味甘而多汁五六月成熟其木大者子至百斛白曝荔枝並蜜煎荔枝肉俱為上方之珍果白曝者不失真味其市者多用雜色荔枝入鹽梅曝之而皮深紅味亦少酸殊失本真又有焦核荔枝味更甜美或云是木生背陽結實不完就者白曝之尤佳又有緑色蠟色皆其品之奇者本土亦自難得其蜀嶺荔枝初生亦小酢肉薄不堪曝花及根亦入藥此木以荔枝為名者以其結實時枝弱而蒂牢不可摘取以刀斧蠡音利其枝故以為名耳蔡君謨荔枝譜其說甚詳地圖經曰生嶺南及巴中今蜀渝涪州興化軍及二廣川郡皆有之道地閩中者佳時生冬採五月六月取收曝乾用實核花根色赤味甘性平緩氣氣厚於味陽中之陰臭香主生津止渴益氣駐顏治療別録云消煩渴頭重心躁背膊勞悶圖經曰花並根喉痹腫痛水煮含瘥補別録云通神益智健氣悅顏色合治核火煅末合酒服止心痛及小腸氣禁多食發熱瘡解食過多發熱者以蜜漿解之乳柑子無毒植生乳柑子主利腸胃中熱毒止暴渴利小便名醫所録苗圖經曰樹若橘樹其實亦類橘而圓大皮色生青熟黃赤未經霜時尤酸霜後甚甜故名柑子又有沙柑青柑山柑體性相類惟山柑皮療咽痛余者不甚用衍義曰乳柑子今人多作橘皮售於人不可不擇也柑皮不甚苦橘皮極苦至熟亦苦若以皮緊慢分別橘與柑又緣方宜各不同亦互有緊慢者也地圖經曰生嶺南及江南有之出西戎者佳時生四月葉脫復生採十月取實收曝乾用皮質類橘而圓大色生青熟黃赤味甘性大寒緩氣氣之薄者陽中之陰臭香主清胃熱止煩渴治療圖經曰核作塗面藥日華子云皮作湯消酒渴合治皮末合酒服療産後肌浮皮末合鹽水煎服治酒毒或醉昏悶煩渴禁多食令人脾冷發痼癖大腸泄多食令人肺躁冷中發痃癖脾腎冷人食其肉多致臟寒或泄利發陰汗解丹石毒果之草甘蔗無毒叢生甘蔗主下氣和中助脾氣利大腸名醫所録名崑崙蔗荻蔗竹蔗苗圖經曰此有二種一種似荻節疏而細短者謂荻蔗一種似竹粗長者謂之竹蔗又廣州出一種數年生皆如大竹長丈餘今江澤閩廣蜀川所生大者亦高丈許人取笮汁以為沙糖是也陶隱居云蔗有兩種赤色名崑崙蔗白色名荻蔗出蜀及嶺南為勝並煎為沙糖今江東甚多而劣於蜀者味亦甘美地圖經曰出江東為勝廬陵亦有好者今江浙閩廣蜀川皆有之時生春生苗採八月九月取莖用莖色赤白味甘性平緩氣氣厚於味陽中之陰臭香主除熱止渴治療日華子云利大小腸下氣痢消痰除心煩熱別録云搗汁服主發熱口乾小便澀補日華子云補脾益氣合治搗汁七升合生薑汁一升相和為三服主胃反朝食暮吐暮食朝吐或旋旋吐者禁不可共酒食令人發痰解酒毒石蜜無毒煎煉成石蜜主心腹熱脹口乾渴性冷利名醫所録名捻糖乳糖地圖經曰此即乳糖也煉沙糖和牛乳為之可作餅塊唐本注云用水牛乳米粉乃得成塊西戎來者佳江左亦有殆勝蜀人云用牛乳汁和沙糖煎之作餅堅重此與蟲部石蜜同名而異類也孟詵云波斯國來者良東吳亦有此皆煎甘蔗汁及牛乳汁則易細白耳衍義曰川浙最佳其味厚其他次之煎煉成以鉶象物達遠至夏月及久陰雨多自消化土人先以竹葉及紙裹外用石灰埋之仍不得見風遂免今人謂乳糖其作餅黃白色者謂之捻糖易消化入藥至少收包裹勿令見風色黃白味甘性寒緩氣氣之薄者陽中之陰臭香主生津止渴治療孟詵云目中熱膜明目陶隱居云去熱止渴合治合棗肉巨勝子末為丸含之潤肺氣助五臟津液沙糖無毒沙糖主心腹熱脹口乾渴功體與石蜜同而冷利過之名醫所録地圖經曰出蜀地西戎江東並有之蔗有荻蔗竹蔗於經霜後人取竹蔗笮其汁以為沙糖今泉福吉廣州多作之荻蔗惟蜀川煎作稀糖亦堪啖商人所貨者其糖多以荻蔗為之而竹蔗者少也衍義曰沙糖次於石蜜蔗汁清故費煎煉致紫黑色今醫家治暴熱多以此物為先導小兒多食則損齒土製水也及生蟯蟲裸蟲屬土故因甘遂生收以瓷器貯之色紫黑味甘性寒緩氣氣之薄者陽中之陰臭香主心熱口渴制去葉用笮取汁煎煉成糖去滓用治療日華子云潤心肺殺蟲衍義曰退心肺大腸熱及暴熱合治白糖合酒煮服治腹緊禁多食令人心痛生長蟲消肌肉損齒髮疳䘌不宜與鯽魚同食成疳蟲與葵同食生流癖與筍同食使筍不消成症身重不能行履解酒毒果之木椑柿無毒植生椑音卑柿主壓石藥發熱利水解酒熱久食令人寒中去胃中熱名醫所録苗圖經曰似柿而青黑閒居賦云梁侯烏椑之柿是也但可生啖不堪乾用諸柿食之皆美而益人惟椑柿更壓丹石毒爾然其性冷復甚於柿故散石家熱啖之亦無嫌不入藥用惟可作漆甚妙地圖經曰生江淮南及宣歙荊襄閩廣諸州時生春生葉採十月取實用實色青黑味甘性寒緩氣氣之薄者陽中之陰臭朽主清胃熱消酒毒治療日華子云止渴潤心肺除腹臟冷熱忌不宜與蟹同食令人腹痛並大瀉解壓丹石毒四種陳藏器余懸鉤根皮味苦平無毒主子死腹中不下破血殺蟲毒卒下血婦人赤帶下久患痢不問赤白膿血腹痛並濃煮服之子如梅酸美人食之醒酒止渴除痰唾去酒毒莖上有刺如鉤生江淮林澤取莖燒為末服之亦主喉中塞也鉤栗味甘平主不飢厚腸胃令人肥健子似栗而圓小生江南山谷樹大數圍冬月不凋一名巢鉤子又有雀子小圓黑味甘久食不飢生高山子小圓黑又有櫧音諸子小於橡子味苦澀止瀉痢破血食之不飢令健行木皮葉煮取汁與産婦飲之止血皮樹如栗冬月不凋生江南子能除惡血止渴也石都念子味酸小溫無毒主痰嗽噦氣生嶺南樹高丈餘葉如白楊花如蜀葵正赤子如小棗蜜漬為粉甘美益人隋朝植於西苑也摩廚子味甘香平無毒主益氣潤五臟久服令人肥健生西域及南海子如瓜可為茹異物志云木有摩廚生自斯調厥汁肥潤其澤如膏馨香穓射可以煎熬彼州之人仰以為儲斯調國名也海藥云謹按異物志云生西域三月開花四月五月結實如瓜許益氣安神養血生肌久服健人也
