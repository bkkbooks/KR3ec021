body:
  text: 卷之二十一木部下品之下木之木紫荊木無毒植生紫荊木主破宿血下五淋濃煮服之名醫所録名紫荊樹紫珠苗圖經曰木似黃荊葉小無丫花深紫色或云田氏之荊也至秋子熟圓如小珠名紫珠其花皮功用亦同衍義曰紫荊木春開紫花甚細碎共作朵生出無常處或生於木身之上或附根上枝下直出花花罷葉出光緊微圓今人多植於庭院間花豔可愛地圖經曰生江東林澤間今處處有之時生春生葉採無時收日乾用木皮花質類黃荊色蒼味苦性平泄氣味厚於氣陰中之陽臭朽主通小腸破宿血制銼碎用或煮汁用治療陳藏器云治癰腫喉痹飛尸蠱毒腫煮汁洗瘡腫除血長膚解諸物毒及下瘻蛇虺蟲蠶狂犬等毒紫真檀無毒植生紫真檀主惡毒風毒名醫所録苗唐本注云樹如檀此物出崑崙盤盤國雖不生中華人間遍有之地陳藏器云出南海時生春生葉採無時收陰乾用木質類降真香色紫赤味咸性微寒軟氣氣薄味厚陰中之陽臭香主心腹痛制銼碎用治療陶隱居云治金瘡止血淋及摩塗風毒諸腫陳藏器云治霍亂中惡鬼氣殺蟲烏臼木根皮有毒附子無毒植生烏臼木根皮主暴水癥結積聚名醫所録苗唐本注云樹高數仞葉似梨杏花黃白子黑色其葉好染皂子多取壓為油塗頭令黑變白然燈極明衍義曰葉似小杏葉但微薄而緑色差淡八九月子熟初青後黑分為三瓣者是也地圖經曰生山南平澤時生春生葉採不拘時取根皮收日乾用木根皮色紫白味苦性微溫泄子涼氣氣厚於味陽中之陰臭朽主頭風積聚制以慢火炙令脂汁盡黃干後用治療日華子云根皮除頭風通大小便陳藏器云子去陰下水禁子令人下痢木之走南藤無毒蔓生南藤主風血補衰老起陽強腰腳除痹變白逐冷氣排風邪亦煮汁服亦浸酒冬月用之名醫所録名丁公藤苗圖經曰此藤依南木而生故名南藤莖如馬鞭有節紫褐色葉如杏葉而尖南史解叔謙雁門人母有疾夜於庭中稽顙祈告聞空中雲得丁公藤治即瘥訪醫及本草皆無至宜都山中見一翁伐木云是丁公藤療風乃拜泣求得之及授漬酒法畢失翁所在持歸制服之母疾遂愈因名丁公藤也地圖經曰生南山山谷今榮州藍田有之道地泉州時生春生苗採八月或不拘時取藤收日乾用藤質類紫藤色紫褐味辛性溫散氣氣之厚者陽也臭朽主排風除痹制銼碎用治療別録云除諸風木之木鹽麩子無毒植生鹽麩子主除痰飲瘴瘧喉中熱結喉痹止渴解酒毒黃疸飛尸蠱毒天行寒熱痰嗽變白生毛髮樹白皮主破血止血蠱毒血痢殺蛔蟲並煎服根白皮主酒疸名醫所録名叛奴鹽苗圖經曰葉如椿其子秋熟作穗粒如小豆上有鹽似雪食之酸鹹止渴陳藏器云蜀人謂之酸桶博物志云酸桶七月出穗上有鹽著可為羹亦謂之酢桶吳人名為烏鹽是也地圖經曰生吳蜀山谷時生春生葉採七八月取子收日乾用子根皮質類小豆色白味酸性微寒收氣氣薄味厚陰也臭朽主痰飲喉痹制干搗末用治療陳藏器云除頭風白屑合治根白皮搗碎合米泔浸一宿平旦溫服一二升治酒疸解蠱毒藥毒酒毒杉材無毒植生杉材主療漆瘡名醫所録苗圖經曰木類松而徑直葉附枝生若刺針爾雅云柀音彼煔胡甘切與杉同郭璞注云煔似松生江南可以為船及棺材作柱埋之不腐也又杉菌味苦辛微溫生積年杉木上若菌狀衍義曰杉其干端直大抵如松冬不凋但葉闊成枝廬山有萬杉寺即此杉也地圖經曰出宜州廬山今南中深山處處有之時生經冬不凋採無時收日乾用木有油者良質類松而徑直色紫味辛性微溫散氣氣之厚者陽也臭香主心腹脹痛制銼碎或煮汁用治療唐本注云除心腹脹痛去惡氣水煮捋腳氣腫滿日華子云治風毒賁豚霍亂上氣煎服並淋洗木之草接骨木無毒陳藏器云有小毒植生接骨木主折傷續筋骨除風癢齲齒可作浴湯名醫所録名木蒴藋苗圖經曰木高一二丈花葉都類陸英水芹輩但樹高大爾其木輕虛無心斫枝插土易活人家亦種之地圖經曰舊不著所出州土今近京皆有之時生春生葉採無時收日乾用木葉根皮質類陸英色青白味苦性平泄氣味厚於氣陰中之陽臭朽主折傷續筋骨制銼碎用治療陳藏器云根皮消痰飲下水腫及痰瘧煮服當下及吐立瘥別録云治産後心悶手腳煩熱氣力欲絶血暈連心頭硬及寒熱不禁或小便數惡血不止禁多服令人吐木之木楓柳皮有毒植生楓柳皮主風齲齒痛名醫所録苗唐本注云葉似槐莖赤根黃六月子熟緑色而細地圖經曰出原州時生春生葉採無時收日乾用莖皮色赤白味辛性大熱散氣氣之厚者陽也臭腥主止痢齒痛制銼碎用治療陳藏器云止水痢別録云治中熱遊及火燒外痛燒末敷兼治炙瘡赤爪木無毒植生赤爪側絞切木主水痢風頭身癢實味酸冷無毒汁服主水痢沐頭及洗身上瘡癢名醫所録名子羊梂鼠查梂苗唐本注云樹小高五六尺葉似香葇子似虎掌爪木如小林檎赤色爾雅云櫟其實梂有梂草自裹其子房生為梂又爪木名羊梂鼠查梂此乃名同爾梂似小查而赤人食之也地圖經曰生平陸所在有之唐本注云出山南申安隨等州陳藏器云生高原時生春生葉採無時收日乾用木實質類小林檎色赤味苦性寒泄氣氣薄味厚陰也臭朽主水痢制銼碎煮汁用治療陳藏器云洗漆瘡樺木皮無毒植生樺木皮主諸黃疸濃煮飲之良名醫所録苗別録云樹似山桃而高大皮堪為燭取脂燒闢鬼衍義曰今人取皮裹鞍弓蟲龴囗𢆉但皮上有紫黑花勻者為佳地出上谷所在有之道地北土為勝時生春生葉採無時收日乾用皮色紫褐味苦性平泄氣味厚於氣陰中之陽臭朽主黃疸制凡使去上粗皮銼碎或燒灰用治療陳藏器云除傷寒時行熱毒合治合酒服方寸匕療乳痛癰初發腫痛結硬欲破膿木之走榼藤子無毒蔓生榼藤子主蠱毒五痔喉痹及小兒脫肛血痢並燒灰服瀉血宜取一枚以刀剜內瓤熬研為散空腹熱酒調二錢不過三服必效又宜入藻豆善除䵟𪒟名醫所録名象豆苗圖經曰樹如通草藤也三年子始熟紫黑色其殼用貯丹藥經載不壞今醫家亦稀用之衍義曰榼藤子紫黑色微光大一二寸圓褊人多剔去肉作藥瓢垂於腰間地圖經曰生廣南山林間時生春生葉採熟時取子收曝乾用子色黑味甘澀性平緩氣氣厚於味陽中之陰臭腥主五痔血痢制燒灰或炙用治療日華子云治飛尸木之木欒荊有小毒子無毒植生欒荊主大風頭面手足諸風癲癇狂痙濕痹寒冷疼痛俗方大用之而本草不載亦無別名但有欒花功用又別非此花也名醫所録名頑荊苗圖經曰枝莖白色葉頗似榆葉青色而長冬夏不枯乾則自反捲六月開花花有紫白二種子似大麻亦入藥用唐本注云雍州所産者其葉乾亦反捲經冬不死葉上有細黑點者為真金洛州乃用石荊當之非也地圖經曰生東海及淄州汾州唐本注云雍州道地海州時生經冬不凋採四月取苗葉八月取子收曝乾用苗葉子質葉似榆葉而長色莖白葉青味辛苦子甘辛性溫泄子微熱氣氣厚味薄陽中之陰臭朽反子惡石膏制銼碎用治療圖經曰除大風頭面手足諸風癲狂痙痹冷病合治子合決明為使服之能治四肢不遂主通血脈明目益精光扶栘木皮有小毒植生扶栘木皮去風血腳氣疼痹踠損瘀血痛不可忍取白皮火炙酒浸服之名醫所録名栘楊苗圖經曰樹大十數圍無風葉動花反而後合詩云棠棣之華偏其反爾鄭注云棠棣栘也亦名栘楊崔豹云栘楊圓葉弱蒂微風大搖地圖經曰生江南山谷時生春生葉採無時收日乾用皮質類白楊色青白味苦性平泄氣味厚於氣陰中之陽臭朽主疼痹制去上粗皮銼碎用合治合五木皮煮作湯捋腳氣疼腫殺龿蟲風瘙木之走木鱉子無毒蔓生木鱉子主折傷消結腫惡瘡生肌止腰痛除粉刺䵟𪒟婦人乳癰肛門腫痛名醫所録苗圖經曰苗作蔓葉有五花狀如山芋葉青色面光四月生黃花六月結實似栝蔞而極大生青熟紅肉上有刺其核似鱉故以為名每一實其核三四十枚衍義曰其苗一歲一枯葉如葡萄葉實中之子名木鱉子但根不死春旋生苗其子一頭尖者為雄凡植時須雌雄相合麻縷纏定及其生也則去其雄者方能結實地圖經曰生朗州及南中湖廣杭越全嶽諸州亦有之道地宜州蜀郡時生春生苗採七月八月取子收日乾用子質類小鱉色殼褐肉青白味甘性溫緩氣氣薄臭焦主消惡瘡散結腫制凡使去殼用仁銼碎或去油用治療別録云治痔瘡以三枚去皮研如泥用百沸湯一碗同入盆內熏洗解醋摩消腫毒木之木藥實根無毒植生藥實根主邪氣諸痹疼酸續絶傷補骨髓神農本經名連木苗唐本注云樹葉似杏花開紅白色子肉味酸今亦稀用又云即藥子也用其核仁本經誤載根字疑即黃藥之實也今按唐本與本經所載性味及所産之地大不相侔實非一種明矣地圖經曰生蜀郡山谷日華子云出通州渝州時生春生葉採無時收日乾用根色褐味辛子辛性溫散子平氣氣之厚者陽也臭朽主諸痹疼酸制剝去皮搗用治療唐本注云子破血止痢消腫除蠱疰蛇毒釣藤無毒植生釣藤主小兒寒熱十二驚癇名醫所録苗圖經曰葉細莖長節間有刺若釣鉤者是也衍義曰釣藤中空二經不言之長八九尺或一二丈者小人有以穴隙間致酒甕中盜取酒以氣吸之酒既出而涓涓不斷地圖經曰本經不載所出州土今梁州有之陶隱居云生建平衍義曰河南北江南江西山中皆有之道地興元府時生春生葉採三月取藤收日乾用藤皮質類風藤而有鉤色青味苦甘性寒平泄氣氣薄味厚陰中之陽臭朽主小兒驚熱制銼碎或為末用治療藥性論云治小兒驚啼瘛瘲熱壅日華子云治客忤胎風合治合甘草各二分水五合煮取二合服如小棗大日五夜三治小兒驚癇欒華無毒植生欒華主目痛淚出傷眥消目腫神農本經名子木欒子苗圖經曰葉似木槿而薄細花黃似槐而稍長大子殼似酸漿其中有實如熟豌豆圓黑堅硬堪為數珠者是也其花亦可染黃色甚鮮好衍義曰其子即謂之木欒子攜至京都為數珠未見其入藥用也地圖經曰生漢中川穀今南方及都下園圃中或有之衍義曰長安山中亦有之時生春生葉採五月六月取花收陰乾用花質類槐花而稍長大色黃味苦性寒氣味厚於氣陰也臭微香主目腫助決明為之使制揀淨搗為末用合治合黃連作煎療目赤爛蔓椒無毒植生蔓椒主風寒濕痹歷節疼除四肢厥氣膝痛神農本經名豕椒豬椒彘椒狗椒豨椒樛苗圖經曰其木似樗莖間有刺子辛辣如椒南人淹藏以作果品俗呼為樛似椒𧅗音黨小但不香耳採莖根煮釀酒用之或云金椒是也地圖經曰生雲中川穀及丘冢間閩中江東皆有之時生春生葉採秋取子不拘時取莖根收曝乾用子莖根質木類樗子如椒色淡紅味苦性溫泄氣氣厚於味陽中之陰臭朽主賊風攣急制莖根洗去土銼碎用治療陶隱居云能蒸病出汗木之走感藤無毒蔓生感藤主調中益氣五臟通血氣解諸熱止渴除煩悶治腎釣氣名醫所録名甘藤甜藤苗圖經曰藤如木防己大如雞卵斫藤斷吹氣出一頭其汁甘美如蜜故名甜藤又名甘藤其甘感聲近故以甘作感蓋傳寫之誤也地圖經曰生江南山谷時生春生葉採無時收日乾用藤葉質類木防己色褐味甘性平緩氣氣厚於味陽也臭香主調中益氣止渴除煩制銼碎用治療圖經曰葉研敷蛇蟲咬瘡木之木赤柳木無毒植生赤柳木主剝驢馬血入肉毒取以火炙用尉之亦可煮汁浸之脂名柳乳入合質汗用之名醫所録名春柳雨師河柳柳乳苗圖經曰赤柳木皮赤葉細即今所謂柳柳也爾雅疏云柳河柳郭璞云今河傍赤莖小楊陸機詩疏云皮正赤如絳枝葉似松是也衍義曰赤柳木人謂之三春柳以其一年三秀也花肉紅色成細穗戎人取滑枝為鞭京師亦甚多地圖經曰生河西沙地今處處有之時生春生葉採無時收陰乾用木枝脂質類小楊而皮赤葉細如松色青性溫氣氣之厚者陽也臭朽制銼碎用突厥白植生突厥白主金瘡生肉止血補腰續筋名醫所録苗謹按苗高三四尺春夏葉如薄荷花似牽牛而紫上有白稜其根黃白色狀似茯苓而虛軟出突厥國色白如灰乃雲石灰共諸藥合成之夷人以合金瘡今中國醫家見用經效者也地突厥國潞州時生春生葉採二月八月取根收曝乾用根質類茯苓而虛軟色黃白味苦性泄氣味厚於氣陰也臭朽主生肌止血制搗末用賣子木無毒植生賣子木主折傷血內溜續絶補骨髓止痛安胎名醫所録苗圖經曰株高五七尺木徑寸許春生嫩枝條葉如柿尖長一二寸俱青緑色枝稍淡紫色三四月開碎花百十枝圍簇作大朵焦紅色隨花便生子如椒目在花瓣中黑而光潔每株花裁與才同三五大朵耳因每歲土貢謂之賣子木也地圖經曰生山谷中今劍南邛州有之道地渠州時生春生葉採五月取枝葉收陰乾用枝葉色青緑味甘鹹性平緩氣氣味俱薄陽中之陰臭朽主折傷止痛制雷公云凡採得後粗搗用酥炒令酥盡為度然入藥每一兩用酥二分為度婆羅得無毒植生婆羅得主冷氣塊溫中補腰腎破痃癖可染髭發令黑名醫所録苗圖經曰樹如柳子如萆音卑麻徐氏云生西海波斯國似中華柳樹也地圖經曰生西國時生春生葉採無時收陰乾用木子色紫黑味辛性溫散氣氣之厚者陽也臭朽主破痃癖烏髭發制銼碎用木之走甘露藤無毒蔓生甘露藤主風血氣諸病久服調中溫補令人肥健好顏色止消渴潤五臟除腹內諸冷名醫所録名肥藤苗圖經曰藤蔓如筋人服之得肥故名肥藤地圖經曰生嶺南時生春生葉採無時收日乾用藤色青緑味甘性溫緩氣氣之厚者陽也臭朽主益五臟除諸冷制銼碎用木之木大空有小毒植生大空主三蟲殺蟣蝨根皮作末油和塗蟣蝨皆死名醫所録名獨空苗唐本注云木高六七尺葉似楮葉小而圓厚根皮赤色秦隴人名獨空也地圖經曰生山谷中唐本注云出襄州山谷所在亦有時生春生葉採無時收曝乾用根皮色赤味辛苦性平散氣氣厚於味陽中之陰臭朽主三蟲制銼碎或搗末用椿莢無毒植生椿莢主大便下血名醫所録苗衍義曰世以無花不實木身大其干端直為椿有花而莢木身小干多迂矮者為樗故曰未見椿上有莢者惟樗木上有又有樗雞故知古人命名不言椿雞而言樗雞者以顯有雞者為樗無雞者為椿其義甚明也然世俗不辨椿樗之異故僞名為椿莢其實樗莢耳地圖經曰舊本不載所出州土今南北皆有之色緑味微苦性泄氣氣薄味厚陰中之陽臭腥水楊葉嫩枝無毒植生水楊葉嫩枝主久痢赤白搗和水絞取汁服一升日二大效名醫所録名旄澤柳苗圖經曰其葉圓闊而赤枝條短硬多生岸傍其形如楊柳相似因生於水岸故名水楊爾雅所謂旄澤柳即今蒲柳是也地圖經曰生水岸傍處處有之時生春生葉採無時收日乾用葉嫩枝質類楊柳而葉圓闊色青赤味苦性平泄氣味厚於氣陰中之陽臭朽主赤白痢制銼碎用楊櫨木有毒植生楊櫨木主疽瘻惡瘡水煮葉汁洗瘡立瘥名醫所録名空疏苗謹按木高丈餘皮褐木黃春生葉似榆葉而尖夏開黃花秋結實似大棗而青紅今染黃色用者是也地圖經曰生籬間所在皆有之時生春生葉採無時收陰乾用木質類桑木色黃味苦性寒氣氣薄味厚陰也臭朽制銼碎用檔子植生檔子主遊蠱飛尸著喉口者刺破以子揩之令血出當下涎沫煮汁服之去暴冷腹痛食不消殺腥物名醫所録苗圖經曰其木高大似樗莖間有刺子辛辣如椒南人淹藏以作果品或以寄遠吳越春秋云越以甘蜜丸檔報吳增封之禮然則檔之相贈尚矣地圖經曰出閩中江東時生春生葉採八九月取實收陰乾用實色赤味辛辣性散氣氣之厚者陽也臭香主腹中冷痛制煮汁用楠材微毒植生楠材主霍亂吐下不止名醫所録苗圖經曰其木頗似石南而更高大葉差小其材堪中梁柱今醫方亦稀用也衍義曰楠材今江南等路造船場皆此木也緣木性堅而善居水久則多中空為白蟻所穴地圖經曰出江南山谷間有之時生春生葉採無時用木質類杉木而堅大色赤褐味辛性溫熱散氣氣之厚者陽也臭香主霍亂轉筋制銼碎用柘木無毒植生柘木主補虛損婦人崩中血結及主瘧疾白皮及東行根白皮煮汁釀酒主風虛耳聾勞損虛羸瘦腰腎冷夢與人交接泄精者取汁服之名醫所録名實隹音錐苗衍義曰木有文可鏇為器其葉飼蠶曰柘蠶然葉梗不及桑葉木堪染黃考工記曰弓人取材莫良於檿尤莫良於柘蠶書記曰柘葉飼蠶其絲作琴瑟弦清鳴響亮勝於凡絲遠矣地別録云今江南甚多時生春生葉採春夏取葉不拘時取皮根收日乾用木皮東行根白皮質木似桑而有文色黃白味甘性溫緩氣氣之厚者陽也臭朽主祛風止瘧制銼碎用柞木皮無毒植生柞木皮主黃疸病皮燒末服方寸匕名醫所録苗圖經曰木高一二丈葉細於櫟枝幹多刺文理堅實而黑今之可作梳者是陸機云秦人謂柞櫟為櫟又唐風雲集於苞栩釋云栩柞櫟也其子為皂鬥殼可以染皂者是也地圖經曰生南方時生春生葉採不拘時取皮收陰乾用皮質木類櫟而文理細實味苦性平泄氣味厚於氣陰中之陽臭朽制燒末用黃櫨無毒植生黃櫨主除煩熱解酒疸目黃煮服之亦洗湯火漆瘡及赤眼名醫所録苗謹按木高丈餘皮褐木黃春生葉似榆葉而圓夏開黃花不結實今染黃色者是也地圖經曰生商洛山谷及川界甚有之時生春生葉採無時收陰乾用木質類桑木色黃味苦性寒泄氣味厚於氣陰也臭朽主洗漆瘡制銼碎用棕櫚子無毒植生棕櫚子主澀腸止瀉痢腸風崩中帶下及養血皮平無毒止鼻洪吐血破症治崩中帶下腸風赤白痢名醫所録名葉蒲葵栟櫚苗圖經曰木高一二丈傍無枝條葉大而圓岐生枝端有皮相重被於四傍每皮一匝為一節二旬一採轉復生上六七月開黃白花八九月結實作房如魚子黃嫩時可淹以為茹大則黑色如茶實採入藥用山海經曰石脆一作翠之山其木多棕是也衍義曰棕櫚木今人鏇為器其皮不剝則木束死傳曰棕長則剝為是故也地圖經曰生嶺南西川今江南多有之時生春生葉採九月十月取實收日乾用子皮色生青熟黑味淡性平氣氣味俱薄陰中之陽臭朽主崩中帶下制子搗碎用皮燒灰存性用治療衍義曰皮燒黑灰治婦人血露及吐血為末服之瘥木槿無毒植生木槿主腸風瀉血痢後熱渴作飲服之令人得睡花涼無毒治腸風瀉血並赤白痢炒用作湯代茶吃治風名醫所録名椵大館切舜苗衍義曰木似李五月始華其花開五出或多瓣重疊淡紅色如蜀葵朝開暮斂月令木槿榮是也江南多種植為籬障取汁度絲使得易絡地衍義曰生湖南北今處處人家種之時生春生葉採無時收日乾用花枝葉質類李樹色青性平氣氣之薄者陽中之陰臭朽主腸風痢後熱渴制入藥並炒用木之草芫花有小毒植生芫花出神農本經主咳逆上氣喉鳴喘咽腫短氣蟲毒鬼瘧疝瘕癰腫殺蟲魚以上朱字神農本經消胸中痰水喜音戲唾水腫五水在五臟皮膚及腰痛下寒毒肉毒根療疥瘡可用毒魚以上黑字名醫所録名去水黃大戟杜芫兒草毒魚黃芫花敗華根蜀桑根苗圖經曰宿根舊枝莖紫長一二尺根入土深三五寸白色似榆根皮黃赤似桑根春生苗葉小而尖似楊柳枝葉亦似白前二月開紫花頗似紫荊作穗又似藤花而細其花須於蕊蒂細小未生葉時收之三月葉生其花落即不堪用今絳州出者花黃謂之黃芫花也地圖經曰生淮源川穀今在處有之道地絳州綿州滁州邯州時生春生苗葉採三月三日取花收陰乾用花質類藤花而細色紫味辛苦性溫泄氣氣厚味薄陽中之陰臭朽主瀉水氣利五臟助決明為之使反甘草制挼碎用治療圖經曰主蟯瘕藥性論云治心腹脹滿寒痰涕唾如膠者及通利血脈並惡瘡風痹濕一切毒風四肢攣急不能行步能瀉水腫脹滿日華子云止嗽瘴瘧一十三種陳藏器余百家箸主狂狗咬乞取煎汁飲之又燒箸頭為灰敷吻上燕口瘡樳木皮葉煮洗蛇咬亦可作屑敷之樳木木也出江南也刀鞘無毒主鬼打卒得取二三寸燒末服水下之此是長刀鞘也腰刀彌佳芺樹音夭有大毒主風痹偏枯筋骨攣縮癱瘓皮膚不仁疼冷等取枝葉搗碎大甑中蒸令熱鋪著床上展臥其中冷更易骨節間風盡出當得大汗補藥及羹粥食之慎風冷勞復生江南深山葉長厚冬月不凋山人總識也丹桎木皮主癧瘍風取一握去上黑打碎煎如糖塗風上桎木似杉木生江南深山結殺味香主頭風去白屑生髮入膏藥用之生西國樹花胡人將香油敷頭也杓打人身上結筋二下筋散矣東家雞棲木無毒主失音不語雜方云作灰服一升立效也檀秦皮注蘇云檀似秦皮按檀樹取其皮和榆皮食之可斷谷爾雅云檀苦茶其葉堪為飲樹體細堪作斧柯至夏有不生者忽然葉開當有大水農人候之以測水旱號為水檀又有一種葉如檀高五六尺生高原花四月開色正紫亦名檀根如葛極主瘡疥殺蟲有小毒也爾雅無檀苦茶唯言檟苦茶郭注樹小似梔子冬生葉可煮作羹今早採者為茶晚採者為茗一名菽蜀人呼名之苦茶前面已有茗苦茶又引爾雅疑此誤矣石荊欒荊注蘇云用當欒荊非也按石荊似荊而小生水傍作灰汁沐頭生髮廣濟方云一名水荊主長髮是也木黎蘆漏蘆注陶云漏蘆一名鹿驪生山南人用苗北人用根功在本經木黎蘆有毒非漏蘆樹生如茱萸樹高二尺有毒殺蟲山人以瘡疥用之瓜蘆苦菜注陶云又有瓜蘆木似茗取葉煎飲通夜不寐按此木一名皋蘆而葉大似茗味苦澀南人煮為飲止渴明目除煩不睡消痰和水當茗用之廣州記曰新平縣出皋蘆葉大而澀南越志雲龍川縣有皋蘆葉似茗土人謂之過羅諸木有毒合口椒有毒椒白色有毒木耳惡蛇蟲從下過有毒生楓木上者令人笑不止採歸色變者有毒夜中視光有毒欲爛不生蟲者有毒並生搗冬瓜蔓主之也
