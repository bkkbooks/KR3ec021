body:
  text: 卷之二十九蟲魚部上品石蜜無毒石蜜出神農本經主心腹邪氣諸驚癇痙安五臟諸不足益氣補中止痛解毒除衆病和百藥久服強志輕身不飢不老以上朱字神農本經養脾氣除心煩食飲不下止腸澼肌中疼痛口瘡明耳目延年神仙以上黑字名醫所録名黃連蜜石飴土蜜木蜜梨花蜜崖蜜岩蜜食蜜檜花蜜白蜜何首烏蜜白沙蜜山蜜地圖經曰生武都山谷及河源諸山谷中今川蜀江南嶺南處處皆有之石蜜即崖蜜也其蜂黑色似虻作房於岩崖高峻處或石窟中人不可到但以長竿刺令蜜出以物承之多者至三四石味醇色緑入藥勝於他蜜張司空雲山郡幽僻處出蜜所著絶巖石壁非攀緣所及惟于山頂籃輿自垂挂下遂得采取蜂去余蠟著石有鳥如雀群飛來啄之殆盡至春蜂歸如舊人亦占護其處謂之蜜塞其鳥謂之靈雀其蜜即今之石蜜也亦有木中作者有土中作者北方地燥多在土中南方地濕多在山林木上作房亦有一種在人家作窠檻收養之其蜂甚小而微黃蜜皆濃厚而味美又近世宣州有黃連蜜色黃味小苦雍洛間有梨花蜜如凝脂亳州太清宮有檜花蜜色小赤南京柘城縣有何首烏蜜色更赤並以蜂採其花作之各隨其花色而性之溫涼亦相近也謹按石蜜出山岩石窟中經二三年者則氣味醇厚而色自白愈久不變故本經云白如膏者良今人家作房於簷楣間蓄養者一歲春秋二取之則蜜居房日少氣味不足而色黃所以不逮白者過夏則酸壞矣此種由作窩於石崖中而成故稱其為石蜜也時生無時採八九月取收瓷器盛貯用白如膏者良色黃白味甘性平微溫緩氣氣厚於味陽中之陰臭香主安五臟潤腸胃反蔥制雷公云凡煉蜜一斤只得十二兩半或一分是數若火少火過並用不得治療陳藏器云主牙齒疳𧈟唇口瘡目膚赤障殺蟲藥性論云白蜜療卒心痛及赤白痢水和作蜜漿頓服一碗即止食療云除心肚痛血刺腹痛點目中去熱膜別録云食諸魚骨並雜物鯁及誤吞錢稍稍服之即下又治虛弱人大便不通蜜導法以四兩微火煎可丸捻作挺子如手指大令納穀道中須臾即通合治合生薑汁各一合水和頓服之主赤白痢合浸大青葉含之治口瘡以一斤合生薑二斤取汁先下蜜於鐺中次下薑汁於蜜中微火煎以薑汁盡為度治患癩三十年者平旦服棗許大一丸一日三服酒飲任下忌生冷醋滑臭物功用甚多合甘草煎塗陰頭生瘡合升麻煎治天行斑發瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨決隨生不即療之數日必死先去蜜通摩瘡上後用此頻頻拭之效合竹中白膜貼火灼成瘡合茯苓末塗面皯七日便瘥以一升合豬膽一枚相和微火煎令可丸捻長三寸作挺塗油內穀道中治肺熱肛門塞腫縮生瘡令臥覺後重須臾通泄忌七月勿食生蜜若食則暴下發霍亂不宜與薤白相和食生諸風羽蟲蜂子無毒附大黃蜂子土蜂子化生蜂子出神農本經主風頭除蠱毒補虛羸傷中久服令人光澤好顏色不老大黃蜂子主心腹脹滿痛輕身益氣土蜂子主癰腫以上朱字神農本經蜂子治心腹痛大人小兒腹中五蟲口吐出者面目黃輕身益氣大黃蜂子乾嘔土蜂子嗌痛以上黑字名醫所録名蜚零地圖經曰生武都山谷今處處有之蜂子即蜜蜂子也在蜜脾中如蛹而白一種大黃蜂子及人家屋上作房及大木間𤫱音侯𤬏音婁蜂子也嶺南人亦作饌食之蜂並黃色比蜜蜂更大又有土蜂子即穴土居者其蜂最大螫人或至死郭璞注爾雅土蜂云今江東呼大蜂在地中作房者為土蜂啖其子即馬蜂荊巴間呼為蟺音憚又注木蜂云似土蜂而小在木上作房江東人亦呼木蜂人食其子然則三蜂子皆可食大抵蜂類皆同故其性效不遠矣時生二月採三四月取收曝乾用頭足未成者色白味甘性平微寒氣氣之薄者陽中之陰臭腥主丹毒風疹腹內留熱反畏黃芩芍藥牡蠣制以鹽拌炒乾治療陳藏器云治大小便澀去浮血婦人帶下及下乳汁合治合酒漬以敷面悅白土蜂赤黑色者燒末合油和敷蜘蛛咬瘡此物能食蜘蛛亦取其相伏也解冬瓜苦蕒生薑紫蘇以制蜂毒蜜蠟無毒附白蠟蜜蠟出神農本經主下痢膿血補續絶傷金瘡益氣不飢耐老以上朱字神農本經白蠟味甘平無毒療久泄澼後重見白膿補絶傷利小兒久服輕身不飢以上黑字名醫所録名蜜跖地圖經曰生武都山谷及河源諸山谷中今川蜀江南嶺南處處皆有之蜜蠟者蜜脾底也因生於蜜中故謂之蜜蠟初時香嫩重煮治乃成藥家應用白蠟更須煎煉水中煬十數過即白古人荒歲多食蠟以度飢欲啖之當合大棗咀嚼即易爛也謹按一種蠟樹即冬青樹也高及丈時畜蠟蟲於上食其津液日漸成膏纏積枝幹於白露前採之如法煎煉遂成白蠟其質堅瑩非蜜房中取蠟煬制之精華者也朱丹溪云白蠟屬金全稟收斂至凝之氣為外科之要藥生肌止血定痛接骨續筋補虛與合歡皮同入長肉膏藥用之有神效但未嘗試其可餌否合歡皮嘗試之矣服之大有妙理且有速效不可不知也時生無時採春秋取收陰乾用堅淨者佳色黃白味甘性微溫緩氣氣之薄者陽中之陰臭香主下痢膿血反惡芫花齊蛤制熔化濾去粗滓治療別録云療犬咬人重發及小兒腳凍如有瘡並熔化塗敷即瘥又療狐尿刺人腫痛用熱蠟著瘡中並煙燻之令汁出即愈白蠟主白髮鑷去銷蠟點孔中即生黑者合治白蠟如雞子大一塊煎三五沸合美酒半升投入服之療孕婦胎動漏下血不絶欲死合松脂杏仁棗肉茯苓等分為丸食後服五十丸便不飢功用甚多亦主下痢膿血以二升合鹽半斤熔化相和捏作一兜鍪勢可合腦大小搭頭至額治頭風掣疼即止合蛤粉熔和得所成球每用二錢以豬肝二兩批開裝藥在內麻線扎定水一碗同入銚子內煮熟取出乘熱熏治雀目至溫冷並肝食之其效如神甲蟲牡蠣無毒牡蠣出神農本經主傷寒寒熱溫瘧灑灑驚恚怒氣除拘緩鼠痿女子帶下赤白久服強骨節殺邪鬼延年以上朱字神農本經除留熱在關節榮衛虛熱去來不定煩滿止汗心痛氣結止渴除老血澀大小腸止大小便療泄精喉痹咳嗽心脅下痞熱以上黑字名醫所録名蠣蛤牡蛤蠣房真海牡蠣蠔山蠔莆石牡蠣石魚蠣地圖經曰生東海池澤今海傍皆有之而南海閩中及通泰間尤多此物附石而生磈礧相連如房故名蠣房初生海邊才如拳石四面漸長有一二丈嶄岩如山每一房內有蠔肉一塊肉之大小隨房所生大房如馬蹄小者如人指面每潮來則諸房皆開有小蟲入則合之以充腹海人取之皆鑿房以烈火逼開之挑取其肉而其殼左顧者為雄右顧者則牝蠣耳或曰以尖頭為左顧大抵以大者為貴南人以其肉當食品其味甚美更有益兼令人細肌膚美顏色海族之最可貴者也衍義曰牡蠣經中不言左顧止從陶隱居説其酉陽雜俎云牡蠣言牡非為雄也且如牡丹豈可更有牝丹也今則合於地人面向午位以牡蠣頂向子視之口口在左者為左顧此物本無目如此焉得更有顧盼也時生無時採無時用左顧者入藥色青白味咸性平微寒氣氣薄味厚陰中之陽臭腥主斂盜汗止泄精行足少陰經助貝母為之使得甘草牛膝遠志蛇床良反惡麻黃吳茱萸辛夷制雷公云凡修事二十個用鹽一兩以東流水煮一伏時後入火中燒令通赤然後入鉢中研如粉用治療藥性論云除女子崩中止盜汗消風熱定痛祛溫瘧陳藏器云搗為粉撲之治大人小兒盜汗海藥云去煩熱並小兒驚癇湯液本草云能軟積氣之痞及泄水氣別録云白者為末水調塗療一切癰腫未成膿者效合治以柴胡引之去脅下硬以茶引之能消結核以大黃引之能除股間腫合地黃為之使能益精收澀止小便久服強骨節殺邪鬼延年合麻黃根蛇床子乾薑為粉去陰汗肉於薑醋中生食之主丹毒酒後煩熱渴和杜仲服止盜汗蜜丸服三十丸令人面光白永不值時氣主鬼交精出加地黃小草以十分合石膏五分搗末酒服方寸匕日三四服或蜜丸如梧子大服療大病瘥後小勞鼻衄臘日端午日黃泥裹煅通赤為末用活鯽魚煎湯調下一錢匕小兒服半錢匕治一切渴以四兩火煅過出火毒合玄參三兩搗羅為末糊丸梧子大食後臨臥各三十丸酒下治丈夫婦人瘰癧最效以二兩火煅過合炮乾薑一兩為細末冷水調塗治水㿗偏大小不定疼痛解肉解丹毒龜甲有毒卵生龜甲出神農本經主漏下赤白破癥瘕痎瘧五痔陰蝕濕痹四肢重弱小兒囟不合久服輕身不飢以上朱字神農本經頭瘡難燥女子陰瘡及驚恚氣心腹痛不可久立骨中寒熱傷寒勞復或肌體寒熱欲死以作湯良益氣資智亦使人能食以上黑字名醫所録名神屋神龜灼過者名敗龜敗將漏天機地圖經曰龜甲乃水中神龜也生南海池澤及湖水中今江湖間皆有之其龜骨白而厚色至分明所以供卜及入藥用以長一尺二寸為善敗龜乃鑽灼之多者一名漏天機一説入藥須用神龜神龜底殼當心前有一處四方透明如琥珀色者是矣其頭方殼圓腳短者為陽龜形長頭尖腳長者為陰龜陰人用陽陽人用陰今醫家當如此分別而用之時生無時採無時用殼色黃黑味鹹甘性平緩氣味厚於氣陰中微陽臭腥主滋陰反惡沙參蜚蠊畏狗膽制刮去皮酥塗炙黃研細入藥治療藥性論云甲燒灰塗療小兒頭瘡不燥及脫肛血亦主脫肛日華子云敗龜板治麻痹入藥酥炙用食療云肉主除溫瘴氣風痹身腫踒折補陶隱居云肉作羹臛火補人合治肉釀酒主大風緩急四肢拘攣或久癱緩不收攝者並效殼末合酒服主風腳弱敗龜板末合酒服二錢療風疾敗龜板米醋炙搗為末米飲調下二錢匕療産前後痢禁勿令中濕中濕則有毒十二月勿食龜肉食之殺人秦龜無毒附龜尿龜筒𪚻龜蟕蠵蠳龜卵生秦龜主除濕痹氣身重四肢關節不可動搖名醫所録名山龜地圖經曰秦龜山中龜不入水者是也生山之陰土中或云秦以地稱云生山之陰者是秦地山陰也其形大小無定大者有如碑趺食草根竹萌冬月藏土中至春而出遊山谷中今市肆間人或畜養為玩至冬而埋土穴中然藥中稀用卜人亦取以占山澤揭取其甲亦堪飾器物又一種𪚻龜小夾長尾腹下有橫折見蛇則呷而食之故肉寒有毒江東人謂之陵龜即夾蛇龜也爾雅所謂水龜又謂攝龜日華子云呷蛇龜是也能療蛇毒又有蟕蠵平微毒大甲可以卜即爾雅所謂靈龜也按嶺表録異云蟕蠵俗謂之茲夷又名靈蠵蓋山龜之大者人立背上可負而行潮循間甚多鄉人取殼以生得全者為貴初用木楔出其肉龜被楚毒鳴吼如牛聲動山谷工人以其甲通明黃色者煮拍陷玳玳為器今所謂龜筒者是也據此乃別是一種山龜未必是此秦龜也其入藥亦以生脫者為上凡龜之類甚多而時人罕復遍識蓋近世貨幣所不用而知卜術者亦稀又藥中用龜尿最難得孫光憲北夢瑣言載其説云龜之性妒而與蛇交或雌蛇至有相趁鬥噬力小者或至斃採時取雄龜於瓷碗中或小盤中置之於後以鑑照龜既見鑒中影往往淫發而失尿急以物收取又以紙炷火上熁熱以點其尻亦致失尿然不及鑑照之駃也衍義曰秦龜生秦地山中多老龜極大而壽其大者為勝取龜筒治療亦入衆藥以其靈於物醫家故用補心然甚有驗時生無時採二月八月取用甲肉血溺色黃黑味苦性泄氣味厚於氣陰也臭腥主壯筋骨除濕痹制甲酥炙令黃用肉血溺生用肉或熟用治療陶隱居云蟕蠵血塗俚人毒箭傷龜溺治久嗽亦斷瘧日華子云蟕蠵血療中刀箭悶絶飲之即瘥皮甲名鼊皮治血疾若無生血煎汁代之夾蛇龜肉生搗罯敷蛇毒海藥云山龜殼治婦人赤白漏下破積症頑風冷痹關節氣壅或經卜者更妙陳士良云𪚻龜肉主筋脈凡撲損生研厚塗之或取血作酒飲之立效陳藏器云溺滴耳中主耳聾抱朴子云蠳龜尾人帶之以闢蛇蛇中人刮此敷之其瘡亦愈別録云溺治小兒龜背塗摩胸背上即瘥真珠無毒真珠主手足皮膚逆臚鎮心綿裹塞耳主聾敷面令人潤澤好顏色粉點目中主膚翳障膜名醫所録名真珠子地圖經曰出廉州北海生於珠牡俗謂之珠母珠牡蚌類也按嶺表録異廉州邊海中有洲島島上有大池謂之珠池每歲刺史親監珠戶入池採老蚌割取珠以充貢池雖在海上而人疑其底與海通池水乃淡此不可測也士人採小蚌肉作脯食之往往得細珠如米者乃知此池之蚌隨大小皆有珠矣而今取珠牡云得之海傍不必是珠池中也其北海珠蚌種類小別人取其肉或有得珠者但不常有其珠亦不甚光瑩藥中不堪用又蚌屬中有一種似江珧者其腹亦有珠皆不及南海者奇而且多入藥須用新完未經鑽綴者為佳海藥云生南海石決明産出也蜀中西路女瓜亦出真珠是蚌蛤光白甚好不及舶上者彩耀欲穿透須得金剛鑽也衍義曰河北塘濼中亦有圍及寸者色多微紅珠母與廉州者不相類但清水急流處其色光白水濁及不流處其色暗也時生無時採無時用珠未經鑽綴者色紅白味淡性寒氣氣味俱薄陰也臭腥主安心明目制雷公云須取新淨者以絹袋盛之然後用地榆五花皮五方草三味各四兩細銼了又以牡蠣約重四五斤以來先置於平底鐺中以物四向搘令穩然後著真珠於上方下銼了三件藥籠之以漿水煮三日夜勿令火歇日滿出之用甘草湯淘淨於臼中搗細似絹羅重重篩過卻更研二萬匝方可用如研不細傷人臟腑治療藥性論云退眼中翳障白膜亦能墜痰日華子云駐顏色衍義曰小兒風熱藥中多用之海藥云除面皯止泄合治合知母療煩熱消渴合左纏根治小兒麩豆瘡入眼二兩為末合酒服盡治妊婦子死腹中立出減半服之亦主難産末合雞冠血和丸如小豆大以三四粒內口中療卒忤停口不能言末一兩合苦酒服主胞衣不出玳瑁無毒附䵶鼊卵生玳瑁主解嶺南百藥毒俚人刺其血飲以解諸藥毒名醫所録名玳瑁地圖經曰生嶺南山水間今亦出廣南蓋龜類也惟腹背甲皆有紅點斑文其大者如盤身似龜首嘴如鸚鵡者是也入藥須生者為靈帶之亦可以闢蠱毒凡遇飲食有毒則必自搖動其自死及煮拍為器者則不能神矣昔唐嗣薛王之鎮南海海人有獻生玳瑁者王令揭取上甲二小片繫於左臂欲以闢毒玳瑁甚被楚毒復養於使宅後池伺其揭處復生還遣逆舊處並無傷矣今人多用雜龜筒作器皿又有一種䵶鼊亦玳瑁之類也其形如笠四足縵胡無指其甲有黑珠文采亦好但薄而色淺不任作器惟堪貼飾耳今人謂之鼊皮不堪入藥用時生無時採無時用甲生取者佳質類龜而有斑色黃黑味咸性寒氣味厚於氣陰也臭臭主消癰毒止驚癇制銼碎入藥或水磨服亦可治療日華子云破癥結止驚癇等疾陳士良云去諸風毒行氣血去胸膈中風痰鎮心脾逐邪熱利大小腸通婦人經脈甲殼亦似肉同療心風邪解風熱衍義曰治心經風熱別録云水磨濃汁服一盞療中蠱毒羽蟲桑螵蛸無毒卵生桑螵蛸出神農本經主傷中疝瘕陰痿益精生子女子血閉腰痛通五淋利小便水道以上朱字神農本經又療男子虛損五臟氣微夢寐失精遺溺久服益氣養神以上黑字名醫所録名蝕疣蟷蠰螳螂子䖨螂蜱蛸䗚蟭地圖經曰本經不載所出州土今在處有之螳螂逢木便産一枚出子百數多在小木荊棘間桑上者兼得桑皮之津氣故以為佳而貨者多非真須連枝折取為驗然偽者亦以膠著桑枝上者不堪入藥今出蜀州者佳時生秋生採三月四月取收焙乾用桑枝上者佳色黃味鹹甘性平氣味厚氣薄陰中之陽臭腥主男子腎衰漏精妊娠小便不禁反畏旋覆花戴椹制雷公云凡採諸雜樹上生者不堪入藥須覓桑樹東畔枝上採得去核子用沸漿水浸淘七遍令水遍沸於瓷鍋中熬令乾用勿亂別修事卻無效也凡用採蒸之當火炙不爾令人泄治療圖經曰消風藥中多用藥性論云火炮令熟空心食之止小便利因虛而小便利者加用之補藥性論云主男子患虛冷腎衰精滑自出衍義曰主男女虛損益精陰痿夢失精遺溺疝瘕小便白濁腎衰不可缺也合治合龍骨療泄精合遠志菖蒲龍骨人參茯神當歸龜甲醋炙各一兩為末臨臥以人參湯調服二錢療男子小便日數十次如稠米泔色亦白心神恍惚瘦瘁食減因女勞得之服此一劑安神魂定心志治健忘止小便補心氣如無桑上者即用余者仍須以炙桑白皮佐之量多小可也蓋桑白皮行水意以接螵蛸就腎經也合米飲調服療胞轉小便不通禁生用令人泄贋別樹枝上者為偽甲蟲石決明無毒石決明主目障翳痛青盲久服益精輕身名醫所録名九孔螺地圖經曰生南海今嶺南州郡及登萊州皆有之舊説或以為紫貝或以為鰒步角切魚甲按紫貝即今人砑螺古人用以為貨幣者殊非此類鰒魚王莽所食者一邊著石光明可愛自是一種與決明相近耳決明附石而生殼大者如手小者三兩指海人亦啖其肉亦取其殼漬水洗眼七孔九孔者良十孔者不佳衍義曰經云味鹹即是肉也人採肉以供饌及干致都下北人遂為珍味肉與殼兩可用方家宜審用之時生無時採無時用殼色白味咸性平軟氣味厚於氣陰中之陽臭腥主明目磨翳制雷公云凡使先去上粗皮用鹽泥並東流水於大瓷器中煮一伏時了漉出拭乾搗末研如粉卻入鍋子中再用五花皮地榆阿膠三件更用東流水於瓷器中如此淘之三度待乾再研一萬匝方入藥中用凡修事五兩以鹽半分取則第二度煮用地榆五花皮阿膠各十兩又云細研水飛用治療海藥云除青盲內障肝肺風熱骨蒸勞極並良別録云止小腸五淋合治合朽木細末熟水調服療有軟硬物淋忌服此後永不得食山桃令人喪目海蛤無毒化生海蛤出神農本經主咳逆上氣喘急煩滿胸痛寒熱以上朱字神農本經療陰痿以上黑字名醫所録名魁蛤伏老地圖經曰生東海今登萊滄州皆有之陶隱居以細如巨勝潤澤光淨者為海蛤云經雁食之從糞中出過數多故有光澤也陳藏器云海蛤是海中爛殼久在泥沙風波淘洗自然圓淨此有大有小以小為久遠者佳非雁腹中出也然海蛤難得真爛久者海人多以他蛤殼經風濤摩蕩瑩滑者偽作之殊無力又有一種遊波骨極類海蛤但少瑩澤誤食之令人狂眩用醋蜜解之則愈按説文曰千歲燕化為海蛤是也衍義曰陳藏器所説是今海中無雁豈有食蛤糞出者若蛤殼中有肉時尚可食肉既無焉得更有糞中過數多者必為其皆無廉稜乃有是説殊不知風浪日久淘汰故如是也時生無時採四月五月取用殼色青白味苦鹹性平泄氣味厚於氣陰也臭腥主止消渴潤五臟助蜀漆為之使反畏狗膽甘遂芫花制雷公云此修事一兩於漿水中煮一伏時卻以地骨皮柏葉二味又煮一伏時後出於東流水中淘三遍拭乾細搗研如粉然後用凡一兩用地骨皮二兩並細銼以東流水淘取用之治療唐本注云去十二種水滿急痛利膀胱大小腸藥性論云消水氣浮腫下小便及項下癭瘤日華子云止嘔逆胸脅脹及腰痛五痔婦人崩中帶下孟詵云止消渴潤五臟及服丹石人有瘡合治二兩先研三日合漢防己杏仁棗肉各二兩葶藶子六兩研成脂為丸一服十丸利水主水癊贋遊波骨為偽誤食之使人狂眩以醋蜜解之文蛤無毒化生文蛤出神農本經主惡瘡蝕五痔以上朱字神農本經咳逆胸痹腰痛脅急鼠瘻大孔出血崩中漏下以上黑字名醫所録地圖經曰生東海南海今登萊滄密諸州皆有之此有大小其大者圓二三寸小者圓五六分殼表有紫斑文者非北海蛤久在泥沙風波中淘洗圓淨而無文也因其有文故名文蛤也時生無時採三月中旬取用殼有斑文者佳色紫白味咸性平軟氣味厚於氣陰也臭腥主墜痰止渴制煅存性研末用合治燒灰合臘月脂和塗之治急疳蝕口鼻數日盡欲死者魁蛤無毒化生魁蛤主痿痹泄痢便膿血名醫所録名魁陸瓦屋子瓦壟子地圖經曰生東海南海今登萊滄密諸州皆有之其形正圓亦曰大腹檳榔兩頭有孔表有文者是也陶隱居云一種形似紡軠音恁小狹長外有縱橫文耳時生無時採無時用殼正圓兩頭空者色青白味甘性平緩氣氣之薄者陽中之陰臭腥主止消渴開關節制洗去土研細如粉用治療食療云潤五臟服丹石人食之不生熱毒瘡腫鱗蟲蠡魚無毒卵生蠡音禮魚出神農本經主濕痹面目浮腫下大水以上朱字神農本經療五痔有瘡者不可食令人瘢白以上黑字名醫所録名鱧鯇鱧鮦鱧鮦黑鱧魚鮦魚文魚鯇鱧魚地圖經曰生九江池澤今處處有之此魚有舌鱗細而有花文故名文魚與蛇通氣其首載星道家以謂頭有星為厭夜則北響蓋謂北方之魚也陶隱居以為公蠣蛇所變至難死猶有蛇性爾雅謂之鱧鯇郭璞云鱧鮦音同也詩小雅云魚麗於罶魴鱧正義云諸本或作鱧鮦音重陸機謂鯇即鱧魚也似鱧狹而厚今京東人猶呼鮦魚者其實一類也據上所説則似今之黑鱧魚者亦至難死形近蛇類浙中人多食之然鱧魚肝腸亦入藥諸魚膽皆苦惟此膽味甘可食為異也時生春夏採無時色黑味甘性寒緩氣氣之薄者陽中之陰臭腥主下水去腫制去鱗洗淨煮食之治療圖經曰除濕痹下水及婦人妊娠安胎唐本注云腸及肝主久敗瘡中蟲諸魚灰並主哽噎日華子云腸以五味炙之貼痔瘻蚛骭久而蟲出即去之瘥孟詵云鱧魚下大小便壅塞氣又作鱠食療風氣腳氣別録云臘月收膽陰乾為末以少許點治急喉閉逡巡不救者藥至即瘥病深者則以水調灌之合治合小豆白煮療腫滿以大者洗去泥開肚合胡椒末半兩切大蒜三兩顆內魚腹中縫合並和小豆一升煮熟時下蘿蔔三五顆如指大切蔥一握煮熟空腹服之並豆等強飽必盡食之至夜即泄氣無限下一切惡氣合薑齏作鱠食之療患腸痔每大便常有血瘥忌冷毒物以一頭重一斤熟煮汁合冬瓜蔥作羹食之療十種水氣病不瘥垂死者鮧魚無毒附鮠魚卵生鮧音夷又音題魚主百病名醫所録名鯷魚鮎魚鰋地圖經曰鮧即大鮎魚江浙多有之大首方口兩目上陳尾小背青黑身滑無鱗多涎其類有三陶隱居云即鯷音題魚也鯷即鮎魚也又有鱯音護魚相似而大鮠五回切魚秦人呼為䲚魚亦相似背黃腹白而美三種形性相類而大小不同此三魚大抵寒而有毒非食品之佳味也鮎亦名鰋詩小雅云魚麗於罶鰋鱧傳云鰋鮎也爾雅釋魚鰋鮎郭璞注云今鮎額白魚鮎別名鯷江東通呼鮎為鮠是也今江浙多食之陶隱居云又有人魚似鯷而有四足聲如小兒食之療瘕疾其膏燃之不消耗始皇驪山冢中用之謂人膏也今荊州臨沮青溪多出此魚蓋其形相似而有四足為異故附於此時生無時採無時色青黑味甘性寒緩氣氣之薄者陽中之陰臭腥主利小便去水腫治療圖經曰涎主三消別録云魚目燒灰敷刺傷中毒水合治生魚涎合黃連末作丸飯後烏梅煎飲下五七丸止消渴禁鮎魚鱯魚無鱗有毒勿多食其合鹿肉及赤目赤須無腮者並殺人鮎魚不可與牛肝同食令人患風多噎鱯魚四季不可食又不可與野豬肉合食令人吐瀉鮠魚能動痼疾不可與野雞野豬肉合食令人患癩鯽魚無毒卵生鯽魚主諸瘡燒以醬汁和塗之或取豬脂煎用又主腸癰頭灰主小兒頭瘡口瘡重舌目翳合蓴作羹主胃弱不下食作鱠主久赤白痢名醫所録名鮒魚地圖經曰舊不載所出州土今所在池澤皆有之似鯉魚色黑而體促肚大而脊隆其小者重八九兩大者重二三斤諸魚中最可食者或云稷米所化故其腹尚有米色又一種背高腹狹小者名䲙魚功用亦與鯽同但力差劣耳又黔州有一種重唇石鯽魚亦其類也時生無時採無時用肉並頭質類鯉魚而體促色青黑味甘性溫緩氣氣厚味薄陽中之陰臭腥主平胃氣益五臟治療日華子云溫中下氣作鱠療腸澼水穀不調及治赤白痢燒灰敷惡瘡頭燒灰療嗽孟詵云平胃氣調中食療云骨燒灰敷𧈟瘡上三五度瘥子調中益肝氣別録云膽療小兒腦疳鼻癢毛髮作穗面黃羸瘦取汁滴於鼻中連三五日效補日華子云補不足陳藏器云主虛羸合治釀白礬燒灰療腸風血痢合鹽內肚中燒灰敷牙疼作鱠合胡椒乾薑蒔蘿橘皮作羹食之治脾胃氣冷不能下食虛弱無力頭燒灰合醬清汁敷小兒面上黃水瘡燒灰合酒調服治妊娠時行傷寒肉合小豆屑搗如泥水調敷小兒丹毒燒灰合苦酒服治中風寒熱腹中絞痛忌不可與豬肝同食若與沙糖同食令人成疳蟲鯽魚子不宜與猴肉雉肉豬肉同食鱔魚無毒鱔魚主補中益氣療沈音審唇五月五日取頭骨燒之止痢名醫所録地圖經曰生水岸泥窟中今所在皆有之似鰻鱺魚而頭大身細亦似蛇而無鱗有青黃二色冬蟄夏出人作臛食之衍義曰鱔魚腹有黃色世謂之黃鱔又有白鱔稍粗大色白二者皆無鱗大者長尺余其形類蛇但不能陸行今江陵府西湖每歲夏秋沮河水漲即湖水滿溢冬即復涸土人於乾土下撅而得之每及二三尺者則有往來鱔行之路中有泥水水涸又下水至復出也時生四月五月採五月五日取質類鰻鱺魚而細長色青黃味甘性大溫緩氣氣之厚者陽也臭腥主補五臟逐風邪制去腸肚洗淨煮熟食之治療唐本注云干鱔頭主消渴食不消去冷氣除痞疾陳藏器云鱔魚主濕痹及婦人産後淋瀝血氣不調止血除腹中冷氣腸鳴血敷癰及瘻孟詵云鱔魚逐十二風邪患惡氣人作臛空腹食之取汁仍以五木湯浴之須慎風並治濕風補陳藏器云主虛損羸瘦合治皮燒灰合酒空心調二錢服療婦人乳結硬疼禁又時行病起食之多復發多食則動風氣令人霍亂忌不可同白犬血食之鮑魚無毒卵生鮑魚主墜墮腿吐猥切蹶音厥踠折瘀血血痹在四肢不散者女子崩中血不止勿令中咸名醫所録地圖經曰鮑乃饐魚饐即陳臭也據陶蘇之説今漢沔間所作淡乾魚味辛而臭者蘇又引李當之本草亦言胸中濕者良蓋暴魚時不以鹽外雖干而魚肥故中濕也中濕則彌臭矣所謂與不善人居如入鮑魚之肆是也蓋鮑魚自是一種形如小鱅魚生海中其臭如尸始皇置車中者是此據紹興校定云鮑乃海生之魚其氣極臭然素問有治血枯飲鮑魚汁以利腸中之説但今未聞用驗之據雖有性味主治固非起疾之物矣時生無時採無時收曝乾味辛性溫散氣氣厚味薄陽中之陰臭臭合治乾魚一枚燒為末合酒服方寸匕取汗療妊娠中風寒熱腹中絞痛鯉魚無毒附肉骨齒卵生鯉魚膽出神農本經主目熱赤痛青盲明目久服強悍益志氣以上朱字神農本經肉甘主咳逆上氣黃疸止渴生者主水腫腳滿下氣骨主女子帶下赤白齒主石淋以上黑字名醫所録名赤鯉魚玄駒白鯉白草力黃鯉黃雉地圖經曰生九江池澤今處處有之即赤鯉魚也其脊中鱗一道每鱗上皆有小黑點從頭數至尾不拘大小皆三十六鱗古語云五尺之鯉與一寸之鯉大小雖殊而鱗之數等是也又崔豹古今注釋鯉魚有三種兗州又謂赤鯉為玄駒謂白鯉為白草力黃鯉為黃雉蓋諸魚中此為最佳又能神變故多貴之也衍義曰鯉魚至陰之物也其鱗故三十六陰極則陽復所以素問云魚熱中王叔和云熱則生風食之所以多發風熱諸家所解並不言日華子云涼今不取直取素問為正萬一風家更使食魚則是貽禍無窮矣時生三四月採無時用腦髓目睛脂血膽肉骨齒鱗皮腸質類鯽魚長大而尾赤色青黃味苦性寒泄氣氣薄味厚陰也臭腥主目赤翳痛助蜀漆為之使制凡修理可去脊上兩筋及黑血有毒故也治療唐本注云血主小兒丹腫及瘡皮主癮疹腦主諸癇腸主小兒肌瘡陳藏器云肉安胎懷妊身腫煮為湯食之膽主耳聾滴耳中目為灰研敷刺瘡中風水疼腫汁出即愈諸魚目並得藥性論云膽點眼消目赤腫翳痛及敷小兒熱腫日華子云肉止咳嗽除腳氣破冷氣痃癖懷妊人胎不安用絹裹鱗和魚煮羹熟後去鱗食之驗脂治小兒癇疾驚忤腦髓治耳暴聾煮粥食良食療云腸主小兒腹中瘡別録云鱗皮合作屑水調服療魚鯁骨橫喉中六七日不出者膽及腦敷治雀目覺燥痛者即明合治肉作鱠以濃蒜齏食之破冷氣痃癖氣塊橫關伏梁魚燒灰合糯米煮粥治咳嗽魚齒一升篩末以三歲苦酒和分三服旦服一分中服一分暮服一分治石淋赤魚鱗燒灰合酒服療産婦腹痛兼治血氣小鯉魚燒為末合米飲服治大人小兒暴痢膽和灶底土調塗小兒咽腫喉痹立瘥以一頭作鱠合薑醋食主上氣咳嗽胸膈妨滿氣喘並有效禁炙鯉魚切忌煙不得令熏著眼損人眼光三兩日內必見驗也又天行病後不可食再發即死其在砂石中者有毒多在腦中不可食頭凡人腹中痼瘕者不可食忌鯉魚鮓和豆藿食令人瘦子合豬肝食害人服天門冬不宜食八種食療余鰣魚平補虛勞稍發疳痼黃顙魚一名䱀䰲醒酒亦無鱗不益人也比目魚平補虛益氣力多食稍動氣鱭魚發疥不可多食鯸鮧魚有毒不可食之其肝毒殺人緣腹中無膽頭中無腮故知害人若中此毒及鱸魚毒者便銼蘆根煮汁飲解之又此魚行水之次或自觸著物即自怒氣脹浮於水上為鴉雛所食孫真人云食忌鯸鮧魚勿食肝殺人鯮魚平補五臟益筋骨和脾胃多食宜人作鮓尤佳曝乾甚香美不毒亦不發病黃魚平有毒發諸氣病不可多食亦發瘡疥動風不宜和蕎麥同食令人失音也魴魚調胃氣利五臟和芥子醬食之助肺氣去胃家風消穀不化者作鱠食助脾氣令人能食患疳痢者不得食作羹臛食宜人其功與鯽魚同二十三種陳藏器余鱘魚味甘平無毒主益氣補虛令人肥健生江中背如龍長一二丈鼻上肉作脯名鹿頭一名鹿肉補虛下氣子如小豆食之肥美殺腹內小蟲食療有毒主血淋可煮汁飲之其味雖美而發諸藥毒鮓世人雖重尤不益人服丹石人不可食令人少氣發一切瘡疥動風氣不與干筍同食發癱緩風小兒不與食結癥瘕及嗽大人久食令人卒心痛並使人卒患腰痛鱁鯷上逐下題魚白主竹木入肉經久不出者取白敷瘡上四邊肉爛即出刺一名鰾毗眇切海藥云謹按廣州記云生南海無毒主月蝕瘡陰瘡痿瘡並燒灰用經驗方治嘔血鰾膠長八寸闊二寸炙令黃刮二錢以來用甘蔗節三十五個取自然汁調服之文鰩魚余招反無毒婦人臨月帶之令易産亦可臨時燒為黑末酒下一錢匕出南海大者長尺許有翅與尾齊一名飛魚群飛水上海人候之當有大風吳都賦云文鰩夜飛而觸網是也牛魚無毒主六畜疾疫作干脯搗為末以水灌之即鼻中黃涕出亦可置病牛處其氣相熏生東海頭如牛也海豚魚味鹹無毒肉主飛尸蠱毒瘴瘧作脯食之一如水牛肉味小腥耳皮中肪摩惡瘡疥癬痔瘻犬馬瘑疥殺蟲生大海中候風潮出形如豚鼻在腦上作聲噴水直上百數為群人先取得其子系著水中母自來就而取之其子如蠡魚子數萬為群常隨母而行亦有江豚狀如豚鼻中為聲出沒水上海中舟人候之知大風雨又中有曲脂堪摩病照摴蒱即明照讀書工作即暗俗言懶婦化為此也杜父魚主小兒差頽差頽核大小也取魚擘開口咬之七下生溪澗下背有刺大頭闊口長二三寸色黑斑如吹砂而短也海鷂魚齒無毒主瘴瘧燒令黑末服二錢匕魚似鷂有肉翅能飛上石頭一名石蠣一名邵陽魚齒如石版生東海鮠魚一作魤並音五禾反驗屬又五回反味甘平無毒不腥主膀胱水下開胃作鱠白如雪隋朝吳都進鮠魚乾鱠取快日曝乾瓶盛臨食以布裹水浸良久灑去水如初鱠無異魚生海中大如石首鮹魚味甘平無毒主五野雞痔下血瘀血在腹似馬鞭尾有兩岐如鞭鞘故名之出江湖鱣魚肝無毒主惡瘡疥癬勿以鹽炙食郭注爾雅云鱣魚長二三丈顏氏家訓曰鱣魚純灰色無文古書云有多用鱣魚字為鱔既長二三丈則非鱔魚明矣本經又以鱔為鼉此誤深矣今明鱑魚體有三行甲逆上龍門化為龍也石鮅音必魚味甘平有小毒主瘡疥癬出南海方山澗中長一寸背裹腹下赤南人取之作鮓魚鮓味甘平無毒主癬和柳葉搗碎熱炙敷之又主馬瘑瘡取酸臭者和糝及屋上塵敷之瘑似疥而大凡鮓皆發瘡疥可合殺蟲瘡藥用之魚脂主牛疥狗瘑瘡塗之立愈脂是和灰泥船者腥臭為佳又主症取銅器盛二升作大火炷脂上燃之令暖徹於症上尉之以紙藉腹上晝夜勿息火良鱠味甘溫蒜齏食之溫補去冷氣濕痹除膀胱水喉中氣結心下酸水腹內伏梁冷痃結癖疝氣補腰腳起陽道鯽魚鱠主腸澼水穀不調下利小兒大人丹毒風眩鯉魚鱠主冷氣氣塊結在心腹並宜蒜齏進之魚鱠以菰菜為羹吳人謂之金羹玉鱠開胃口利大小腸食鱠不欲近夜食不消兼飲冷水腹內為蟲時行病起食鱠令人胃弱又不可同乳酪食之令人霍亂凡羹以蔓菁煮之蔓菁去魚腥又萬物腦能消毒所以食鱠食魚頭羹也昌侯魚味甘平無毒腹中子有毒令人痢下食其肉肥健益氣力生南海如鯽魚身正圓無硬骨作炙食之至美一名昌鼠也鯇魚無毒主喉閉飛尸取膽和暖水攪服之鯇音患似鯉生江湖間內喉中飛尸上此膽至苦䲅魚肝及子有大毒入口爛舌入腹爛腸肉小毒人亦食之煮之不可近鐺當以物懸之一名鶘夷魚以物觸之即嗔腹如氣球亦名嗔魚腹白背有赤道如印魚目得合與諸魚不同江海中並有之海中者大毒江中者次之人欲收其肝子毒人則當反被其噬為此人皆不録唯有橄欖木及魚茗木解之次用蘆根烏蓲草根汁解之此物毒疾非藥所及橄欖魚茗已出木部魚虎有毒背上刺著人如蛇咬皮如猥有刺頭如虎也生南海亦有變為虎者蕁魚音拱鯤魚鰍魚鰍同音鼠尾魚地青魚鯆魮魚鯆魮普胡反音毗邵陽魚尾刺人者有大毒三刺中之者死二刺者困一刺者可以救候人溺處釘之令人陰腫痛拔去即愈海人被其刺毒煮魚簄竹及海獺皮解之以上魚並生南海總有肉翅尾長二尺刺在尾中逢物以尾撥之食其肉而去其刺其鯆魮魚已在本經鱔魚注中鯢魚鰻鱺注陶云鰻鱺能上樹蘇云鯢魚能上樹非鰻鱺也按鯢魚一名王鮪在山溪中似鮎有四腳長尾能上樹天旱則含水上山葉覆身鳥來飲水因而取之伊洛間亦有聲如小兒啼故曰鯢魚一名鱯魚一名人魚膏燃燭不滅秦始皇冢中用之陶注鮎魚條云人魚即鯢魚也諸魚有毒者魚目有火龷早殺人目得開合殺人逆鰓殺人腦中白連珠殺人無鰓殺人二目不同殺人連鱗者殺人白鬐殺人腹下丹字殺人魚師大者有毒食之殺人水龜無毒主難産産婦戴之亦可臨時燒末酒下出南海如龜長二三尺兩目在側傍瘧龜無毒主老瘧發無時者亦名痎瘧下俚人呼為妖瘧燒作灰飲服一二錢匕當微利取頭燒服彌佳亦候發時煮為沸湯坐中浸身亦懸安病人臥處生高山石下身偏頭大嘴如鶚鳥亦呼為鶚龜
