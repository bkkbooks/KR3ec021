body:
  text: 卷之二十二人部發髲無毒發髲音被出神農本經主五癃關格不通利小便水道療小兒癇大人癇仍自還神化以上朱字神農本經合雞子黃煎之消為水療小兒驚熱以上黑字名醫所録陶隱居云李云是童男發神化之事未見別方今俗用發皆取其父梳頭亂者爾不知此發髲審是何物且髲字書記所無或作蒜今人呼斑發為蒜髮衍義曰發髲與亂髮自是兩等發髲味苦即陳舊經年歲者如橘皮皆橘也而取其陳者狼毒麻黃吳茱萸半夏枳實之類皆須陳者謂之六陳入藥更良敗蒲亦然此用發之義耳今人又謂之頭髲其亂髮條中自無用髲之義此二義甚明亦不必如此過為搜索謹按以上三說不同及無義據今揆之則不然考鄘風偕老之詩曰鬒音軫發如雲不肖髢音替也髢發髢也人少發則以髢益之發自美則不潔於髢而用之也觀此實今之束以飾發者俗雲頭髲是矣色黑味苦性溫又云小寒氣氣之薄者陽中之陰臭臭主止血悶制凡用以苦參水浸一宿漉出入瓶子以火煅之令通赤放冷研用治療日華子云燒灰止血暈金瘡傷風血痢煎膏長肉消瘀血別録云治石淋傷寒發黃俱燒灰水服一寸匕日三胎衣不出含口中立下亂髮亂髮主咳嗽五淋大小便不通小兒驚癇止血鼻衄燒之吹內立已名醫所録名血餘陶隱居云此即人之頭髮梳下亂畜者是也色黑味苦性微溫泄氣味厚於氣陰中之陽主止血制燒灰研細用治療唐本注云治轉胞小便不通及赤白痢哽噎癰腫尸疰疔腫骨疽等瘡藥性論云消瘀血關格不通利水道別録云治黃疸燒發灰水調服一錢匕日三服治鼻衄眩冒欲死燒亂髮細研水服方寸匕須臾更吹少許入鼻中治小兒童舌欲死以亂髮灰細研半錢敷舌下日不住用之治食中誤吞發繞喉不出取己頭亂髮燒灰水調服一錢匕治尸疰燒亂髮如雞子大為末水調服之治小兒斑瘡及豌豆瘡燒發灰水服三錢匕合治發灰合酒服方寸匕治小兒驚啼亂髮如雞子大燒灰合鹽湯服之治霍亂煩燥以吐為度不吐再服亂髮合爪甲燒灰酒服方寸匕治無故遺血亂髮如雞子大合豬脂半斤煎令盡分二服治女勞疸身目皆黃髮熱惡寒小腹急滿小便難內大熱乃大勞交接後入水所致也亂髮一團如梨許大合雞子黃煮熟二物相和於銚子炭火熬初甚干少頃發焦遂有液出旋取置一瓷盞中以液盡為度取此液敷熱瘡上即又以苦參末摻之亂髮燒灰合豬脂塗治小口燕口兩角生瘡亂髮合露蜂房蛇蛻皮各燒灰酒調服方寸匕治口瘡久不合神驗收自己亂髮洗淨曬乾每一兩合椒五十粒泥封固入爐大火煅如黑糟細研酒調服一錢匕髭發黑長人乳無毒人乳汁主補五臟令人肥白悅澤名醫所録衍義曰人乳汁治目之功多何也人心生血肝臟之肝受血則能視蓋水入於經其血乃成又曰上則為乳汁下則為月水故知乳汁即血也用以點眼豈有不相宜者血為陰故其性冷臟寒人如乳餅酪之類不可多食雖曰牛羊乳然亦不出乎陰陽造化爾色白味甘性冷平緩氣氣之薄者陽中之陰臭腥主明目止淚治療日華子云點眼止淚並療赤目使之明潤別録云首生男乳療目赤痛多淚又療月經不通飲三合即通又誤食啖蛇牛肉欲死飲乳汁一升立愈欲知啖蛇者毛髮向後順者是也補日華子云益氣治瘦悴悅皮膚潤毛髮合治合雀屎去目赤胬肉以五合合三年陳醬五合和研用生布絞取汁不計時候少少與服療卒中風不語舌根強硬良久當語頭垢無毒頭垢主淋閉不通名醫所録治療陶隱居云頭垢為丸服之治噎及勞復用悅澤人者佳別録云頭垢燒熱水為丸如梧桐子大飲服一丸治傷寒病後欲令不勞復有驗頭垢水調服一小豆大治百邪鬼魅頭垢治緊唇敷之妙頭垢一分熟水調下治馬肝殺人頭垢治竹木刺在肉中不出者塗之即出故膩頭巾浸取汁暖服一升治天行勞復作渴故頭巾垢一錢匕熱湯中煬服之主食自死鳥獸肝中毒頭𢄼三年者主卒心痛沸湯煮取汁飲之以頭𢄼於閒處碗覆之周時開即愈合治頭垢合酸漿煎膏服之治噎病立愈頭垢少許合熱牛糞治犬咬人重發瘡者效頭垢合苦參末酒調敷治蜈蚣咬人痛不可忍者立效解蠱毒及菌毒米飲或酒化下並以吐為度人牙齒人牙齒除勞治瘧蠱毒氣名醫所録味咸性平軟氣味厚氣薄陰中之陽制燒灰存性細研用合治齒垽和黑蝨研塗出箭頭並惡刺破癰腫人牙齒燒灰細研合酥調貼癰瘡耳塞無毒耳寒治顛狂鬼神及嗜酒名醫所録名腦膏泥丸脂性溫氣氣之厚者陽也人屎無毒附坑中青泥人屎寒主療時行大熱狂走解諸毒宜用絶乾者搗末沸湯沃服之東向圊音青廁溺坑中青泥療喉痹消癰腫若已有膿即潰名醫所録治療陶隱居云交廣俚音里人同焦銅為箭鏃射人才傷皮便死惟飲糞汁即瘥而射豬狗不死以其食糞故也時行大熱飲糞汁亦愈今近城寺別塞空罌口內糞倉中積年得汁甚黑而苦名為黃龍湯療溫病垂死皆瘥唐本注云人屎主諸毒卒惡熱黃悶欲死新者最效與水和服之其乾者燒之煙絶水漬飲汁名破棺湯主傷寒熱毒水漬飲彌善破疔腫開以新者封之一日根爛衍義曰人屎用干陳者為末於陰地淨黃土中作五六寸小坑將末三兩匙於坑中以新汲水調勻良久俟澄清與時行大熱狂渴須水人飲之愈今世俗謂之地清然飲之勿極意恐過多耳別録云治蛇咬以屎厚敷上後帛裹之即消治小兒陰瘡屎燒灰敷之瘥合治糞清冷臘月截淡竹去青皮浸滲取汁治天行熱狂熱疾中毒並惡瘡菌毒取汁服浸皂莢甘蔗治天行熱疾治産後陰下脫人屎炒令赤以酒服方寸匕日三骨蒸熱取屎乾燒令外黑內水中澄清每旦服一小升至晚合小童便服一小升以瘥為度人溺無毒人溺療寒熱頭疼溫氣名醫所録用童子者佳味咸性寒軟氣味厚於氣陰也主明目益聲治療唐本注云尿煎服之每服一升主卒血攻心被打內有瘀血及治症積滿腹諸藥不瘥者服之皆下血片塊亦治久嗽上氣失音尿坑中竹木主小兒齒不生正旦刮塗之即生日華子云止勞渴潤心肺療血悶熱狂撲損瘀血運絶及困乏揩灑皮膚治皸裂能潤澤人蛇犬等咬以熱尿淋患處陳藏器云潤肌膚利大腸推陳致新止咳嗽治肺痿鬼氣痓病彌久停臭者佳恐性冷當以熱物和溫服之妙合治尿合蔥豉作湯服之治人初患頭痛尿一升合薑蔥各一分煎三兩沸乘熱飲之治難産及胞衣不下立效溺白垽溺白垽療鼻衄湯火灼瘡名醫所録名人中白色白味咸性涼軟氣味厚於氣陰也臭臊主傳尸熱勞膈熱肺痿制研細如粉治療唐本注云燒研為細末敷緊唇瘡妙日華子云止吐血鼻洪羸瘦渴疾合治人中白不限多少刮在新瓦上用火煏乾研入麝香少許合酒調下三錢止血汗鼻衄五七日不止者立愈秋石還元丹補暖悅色進飲食益下元久服去百疾強骨髓補血開心益志煉人中白方男子小便十石更多不妨先搘大鍋灶一副於空屋內鍋上用深瓦甑接鍋口令高用紙筋杵石灰泥卻甑縫並鍋口勿令通風候乾下小便只可於鍋中及七八分以來灶下用焰火煮專令人看之若湧出即添冷小便些小勿令湧出熬久候乾細研入好盒子內如法固濟入炭爐中煅之旋取三二兩再研如粉煮棗瓤為丸如緑豆大每服五七丸漸至十五丸空心溫酒鹽湯下久服臍下常如火暖諸般冷疾皆愈久年冷勞虛憊甚者服之皆壯盛其藥常要近火或時復養火三五日功效大也婦人月水婦人月水解毒箭並女勞復名醫所録治療陳藏器云經衣主金瘡血湧出取衣熱炙尉之又燒灰敷虎狼傷瘡別録云女人月經赤衣燒灰熟水調服方寸匕治丈夫熱病瘥後交接復發忽卵縮入腸腸中絞痛欲死立效月水治剝馬被骨刺破毒欲死敷瘡口立效婦人月經衣和血燒灰水調方寸匕治陰陽易病合治童女月經衣和血燒灰合酒服方寸匕治霍亂困篤立愈婦人月經衣燒灰合酒服方寸匕治聚血兼箭鏃在胸喉間效解月水同屎汁解交州夷人以焦銅為鏃毒藥於鏃鋒上中人即沸爛須臾骨壞者效浣褌汁浣褌音昆汁解毒箭並女勞復亦善扶南國舊有奇術能令刀斫不入惟以月水塗刀便死此是汙穢壞神氣也人合藥所以忌觸之此既一種物故從屎溺之例名醫所録人精人精和鷹屎亦滅瘢名醫所録治療別録云治金瘡血不止以精塗之治瘤以精一合或半合亦得青竹筒盛火上燒炮之以器承取汁密置器中數敷之良合治人精合鷹屎白去面上靨敷之二日愈合白蜜亦得及治湯火灼瘡令不痛速愈懷妊婦人爪甲懷妊婦人爪甲取細末置目中去翳障名醫所録治療唐本注云手指甲能催生衍義曰人指甲治鼻衄細細刮取俟血稍定去瘀血於所衄鼻中搐之立愈獨不可備則衆人取之甚善治衄藥並法最多或效或不效故須博採以備道途田野中用可也別録云治忍小便胞轉者取自己爪甲燒灰水調服之並婦人淋及尿血並治之天靈蓋天靈蓋主傳尸尸疰鬼氣伏連久瘴勞瘧寒熱無時者此死人頂骨十字解者燒令黑細研白飲和服亦合諸藥為散用之方家婉其名爾名醫所録味咸性平軟氣氣之薄者陽中之陰治療陳藏器云彌腐爛者入用有一片如三指闊此骨是天生天賜蓋甲一身之骨未合即未有隻有囟門取得後用煻灰火罨一夜待腥穢氣出盡卻用童兒溺於瓷鍋子中煮一伏時滿漉出於屋下掘一坑深一尺置天靈蓋於中一伏時其藥魂歸神效陽人使陰陰人使陽日華子云治肺痿乏力羸瘦骨蒸勞及盜汗等入藥酥炙用別録云治犬咬衆治不瘥毒攻人煩亂喚已作犬聲者燒灰為末以水服方寸匕諸犬咬瘡不瘥吐白沫者為毒入心叫喚似犬聲以髑髏骨燒灰研以東流水調方寸匕按天靈蓋神農本經人部惟發髲一物外余皆出後世醫家或禁術之流奇怪之論殊非仁人之用心世稱孫真人有大功於世以殺命治命尚有陰責何況於是乎近數見醫家用以治傳尸病未有一效者信本經不用未為害也殘忍傷神又不急於取效苟有可見仁者宜盡心焉苟不以是說為然決為庸人之所惑亂設云非此不可是不得已則宜以年深塵泥所漬朽者為良以其絶尸氣也人髭人髭唐李績嘗疾醫診之云得須灰服之方止太宗遂自剪髭燒灰賜服之復令敷癰瘡立愈故白樂天云剪須燒藥賜功臣仁宗皇帝賜呂夷簡古人有語髭可治疾今朕剪髭與之合藥表朕意一十種陳藏器余人血主羸病人皮肉乾枯身上麩片起又狂犬咬寒熱欲發者並刺熱血飲之人肉治瘵疾人胞主血氣羸瘦婦人勞損麵皮皯黑腹內諸病漸瘦悴者以五味和之如䭔𩚲音餅甲也法與食之勿令知婦人胞衣變成水味辛無毒主小兒丹毒諸熱毒發寒熱不歇狂言妄語頭上無辜發豎虛痞等此人産後時衣埋地下七八年化為水清澄如真水南方人以甘草升麻和諸藥罐盛埋之三五年後撥去取為藥主天行熱病立效梅師方治草蠱其狀入咽刺痛欲死者取胞衣一具切曝乾為末熱水調一錢匕最療蛇蠱蜣螂草毒等婦人裩襠主陰易病當陰上割取燒末服方寸匕童女裩益佳若女患陰易即須男子裩也陰易病者人患時行病起後合陰陽便即相著甚於本病其候小便赤澀寒熱甚者是服此便通利不爾炙陰二七壯又婦人裩主胞衣不出覆井口立下取本婦人者為佳人膽主鬼氣尸疰伏連男子陰毛主蛇咬口含二十條咽其汁蛇毒不入腹內也死人枕及席患疣拭之二七遍令爛去疣嘗有嫗人患滯冷積年不瘥徐嗣伯為診曰此尸疰也當以死人枕煮服之乃愈於是往古冢中取枕枕已一邊腐缺嫗服之即瘥張景年十五歲患腹脹面黃衆藥不能治以問徐嗣伯嗣伯曰此石蝤耳極難療當取死人枕煮服之得大蝤蟲頭堅如石者五六升病即瘥沈僧翼患眼痛又多見鬼物嗣伯曰邪氣入肝可覓死人枕煮服之竟可埋枕於故處如其言又愈王宴問曰三病不同皆用死人枕而俱瘥何也答曰尸疰者鬼氣也伏而未起故令人沉滯得死人枕治之魂氣飛越不復附體故尸疰自瘥石疣者醫療既癖蝤蟲轉堅世間藥不能遣所以須鬼物馳之然後乃散故令煮死人枕服之夫邪氣入肝故使眼痛而見魍魎須邪物以鉤之故用死人枕之氣因而去之故令埋於冢間也夫衣帶主難産臨時取五寸燒為末酒下裩帶最佳孫真人云治金瘡未愈而交接血出不止取與交婦人衣帶二寸燒研末水服之衣中故綿絮主卒下血及驚瘡出血不止取一握煮汁溫服之新綿一兩燒為黑末酒下主五野雞病新生小兒臍中屎主惡瘡食息肉除面印字盡候初生取胎中屎也初生臍帶主瘧燒為灰飲下之
