body:
  text: 卷之十草部中品之上草之草葈耳實有小毒叢生葈私以切耳實出神農本經主風頭寒痛風濕周痹四肢拘攣痛惡肉死肌久服益氣耳目聰明強志輕身以上朱字神農本經漆痛溪毒以上黑字名醫所録名胡葈地葵常思蒼耳苓耳菤耳常葈爵耳葹羊負來白葫荽耳璫草道人頭苗圖經曰陸機疏云葉青白似胡荽白華細莖叢生可煮為茹滑而少味四月中生子正如婦人耳璫今或謂之耳璫草鄭康成謂是白鬍荽幽州人呼爵耳郭璞云葉似鼠耳叢生如盤今之所有皆類此但不作蔓生耳詩人謂之菤耳爾雅謂之蒼耳廣雅謂之葈耳皆以實得名也或曰此物本生蜀中其實多刺因羊過之毛中黏綴遂至中國收者名羊負來俗呼為道人頭也地圖經曰出安陸川穀及江東幽州蜀中六安田野處處有之道地滁州時生二月三月採五月五日午時取葉七月取實收日乾用實葉質類棗核而多刺葉如鼠耳色黃褐葉青白味苦甘葉苦辛性溫緩葉微寒泄氣氣厚味薄陽中之陰臭朽主頭風濕痹制雷公云凡採得去心取黃精切拌之同蒸從巳至亥去黃精取出陰乾用今炒香搗去刺治療藥性論云除肝家熱明目日華子云除一切風氣及瘰癧疥癬瘙癢孟詵云中風傷寒頭痛陳藏器云葉挼安舌下令涎出去目黃好睡補日華子云填髓暖腰腳合治子炒香搗去刺使腹破合酒浸去風補益燒灰和臘月豬脂封疔腫出根生搗根葉合小兒尿絞汁冷服一升治疔瘡困重花葉子等分搗羅為末合豆淋酒調服二錢匕療婦人風瘙癮疹身癢不止忌豬肉米泔草之走葛根無毒附汁葉花蔓生葛根出神農本經主消渴身大熱嘔吐諸痹起陰氣解諸毒葛谷主下痢十歲以上以上朱字神農本經療傷寒中風頭痛解肌發表出汗開腠理療金瘡止痛脅風痛生根汁大寒療消渴傷寒壯熱葉主金瘡止血花主消酒以上黑字名醫所録名雞齊根鹿藿黃斤葛脰苗圖經曰春生苗引藤蔓長一二丈紫色葉頗似楸葉而青七月著花似豌豆花不結實根形如手臂紫黑色以入土深者為佳唐本注云葛谷即是實爾葛雖除毒其根入土五六寸以上者名葛脰脰脛也服之令人吐以其有微毒也地圖經曰生汶山川穀及成州海州今處處有之道地江浙南康廬陵時生春生苗採五月五日午時取根收曝乾用根葉花谷汁質形如手臂而長色皮紫黑肉白味甘性平緩氣氣味俱輕陽中之陰臭香主止煩渴解肌熱行足陽明經手陽明經制刮去皮或搗汁用治療藥性論云治天行上氣嘔逆開胃下食止煩渴熬屑治金瘡日華子云去胸膈熱心煩悶熱狂止血痢通小腸排膿破血敷蛇蟲齧衍義曰除中熱酒渴湯液本草云益陽生津圖經曰生根汁除䐴腰痛及金創中風痙欲死者灌之瘥葉主金刃瘡及山行傷刺血出不止陶隱居云生根汁解溫病發熱亦療瘧及瘡唐本注云汁主猘狗齧蔓燒灰主喉痹合治合黃芩黃連治大熱解肌開腠理汁合豉治時氣頭痛壯熱合藕汁治熱毒下血或因吃熱物發動者解野葛巴豆百藥毒酒毒罯箭毒食諸菜中毒葛粉無毒蔓生葛粉主壓丹石去煩熱利大小便止渴小兒熱痞以葛根浸搗汁飲之良名醫所録苗圖經曰葛粉即葛根之所作也今人多食之甚益人衍義曰葛根澧鼎之間冬月取生葛以水中揉出粉澄塊垛先煎湯使沸後擘成塊下湯中良久色如膠其體甚韌彼人以此供茶蓋取其甘美耳地圖經曰生汶山川穀今處處有之道地江浙尤多南康廬陵間最勝時生春生苗採冬月取根收曝乾用粉質類豆粉而韌色白味甘性大寒氣氣之薄者陽中之陰臭香主煩熱止渴行足陽明經制以水中揉出成粉用治療陳藏器云裛小兒熱瘡別録云中鴆毒氣欲絶者灌之良合治合粟米療胸中煩熱或渴心燥合糜飲治小兒壯熱嘔吐不住食驚癇合蜜摻少生薑尤佳治中熱酒渴疾有效禁多食行小便使人利栝蔞根無毒蔓生栝蔞根出神農本經主消渴身熱煩滿大熱補虛安中續絶傷以上朱字神農本經除腸胃中痼熱八疸身面黃唇乾口燥短氣通月水止小便利莖葉療中熱傷暑以上黑字名醫所録名地蔞澤菰苗圖經曰三四月生苗引藤蔓葉如甜瓜葉作叉有細花七月開淺黃色似葫蘆花實在花下生其根惟歲久入土深者為佳鹵地生者有毒陶隱居云藤生狀如土瓜而葉有叉根入土六七尺而大二三圍者用之地圖經曰生洪農山谷及山陰地皆有之道地衡州及均州陝州者最佳時生春生苗採二月八月取收曝三十日成用根堅實者佳質類白藥色白味苦性寒泄氣氣薄味厚陰也臭腥主解熱生津散腫消毒助枸杞為之使反烏頭畏牛膝乾漆惡乾薑制刮去皮銼碎用治療圖經曰止消渴唐本注云作粉退虛熱日華子云通小腸排膿消腫毒生肌長肉消撲損瘀血治熱狂時疾乳癰發背痔瘻瘡癤別録云搗塗折傷重布裹之熱除痛止合治為末合釅醋調塗治熱遊丹赤腫生根搗汁合蜜暖相合服治小兒發黃水煮釀酒久服治耳聾燒灰合米飲服治乳無汁栝蔞實無毒蔓生栝蔞實主胸痹悅澤人面名醫所録名黃瓜果裸果蓏天瓜苗圖經曰三四月生苗引藤於垣牆籬落及屋宇之上葉如甜瓜葉作叉有細花七月開淺黃色似葫蘆花實在花下大如拳有正而圓者有鋭而長者生青至秋後熟赤黃色功用皆同爾雅云果裸之草其實名栝蔞即詩所謂果蓏之實亦施於宇是也地圖經曰生洪農山谷及山陰地今所在有之道地衡州及均州陝州者佳時生春生苗採十月取實收陰乾用仁質類冬瓜仁而蒼色蒼黃味苦性寒泄氣氣薄味厚陰也臭焦主消結痰散癰毒助枸杞為之使反烏頭畏牛膝乾漆惡乾薑制剝去殼及皮膜微炒治療日華子云治面皺吐血腸風瀉血赤白痢名醫別録云頭疼發熱胸膈痛徹背及心腹痞滿氣不得通補日華子云虛勞口乾潤心肺合治合乾葛粉銀石器中炒熱調服療肺燥熱渴大腸祕合半夏熬膏為丸療痰嗽利胸膈合白酒療乳腫痛合薤白白酒半夏療卒患胸痹痛汁合蜜朴硝療時疾發黃心狂煩熱悶不認人者合酒調服下乳汁草之草苦參無毒植生苦參出神農本經主心腹結氣癥瘕積聚黃疸溺有餘瀝逐水除癰腫補中明目止淚以上朱字神農本經養肝膽氣安五臟定志益精利九竅除伏熱腸澼止渴醒酒小便黃赤療惡瘡下部𧈟平胃氣令人嗜食輕身以上黑字名醫所録名水槐地槐菟槐驕槐虎麻芩莖陵郎祿白白莖苦𧄹音識苗圖經曰春生苗高二三尺三四月開黃白花七月作莢實如小豆子河北生者無花子其根黃白色長五七寸粗細並生三五莖其葉青碎極似槐葉故曰水槐其味甚苦謂之苦參也地圖經曰出汝南山谷及田野間今近道處處皆有之道地成德軍秦州邵州時生春生苗採三月八月十月取根實收曝乾用根實質根如桑根實如小豆色黃白味苦性寒泄氣氣薄味厚陰也臭腥主瘡疹惡蟲助玄參為之使反藜蘆惡貝母漏蘆菟絲子制雷公云凡使不計多少先須用糯米濃泔汁浸一宿上有腥穢氣並在水面上浮必須重重淘過即蒸從巳至申出曬乾細銼用治療藥性論云去熱毒風皮肌煩燥生瘡赤癩眉脫除大熱嗜唾及腹中冷痛中惡腹痛體悶並去心腹積聚日華子云殺疳蟲補唐本注云餌實如槐子法久服輕身不老明目合治炒苦參帶煙出為末合飯飲下療腸風瀉血並熱痢合酒清飲療癩疾若覺痹即瘥禁久用揩齒傷腎使人腰疼當歸無毒植生當歸出神農本經主咳逆上氣溫瘧寒熱洗音癬在皮膚中婦人漏下絶子諸惡瘡瘍音羊金瘡煮飲之以上朱字神農本經溫中止痛除客血內塞中風痓汗不出濕痹中惡客氣虛冷補五臟生肌肉以上黑字名醫所録名干歸山蘄苗圖經曰春生苗緑葉有三瓣七八月開花似蒔蘿淺紫色根黑黃色然苗有二種都類芎藭而葉有大小為異莖梗比芎藭甚卑下根亦二種大葉名馬尾當歸細葉名蠶頭當歸大抵肉厚而不枯者為勝廣雅雲山蘄當歸也似蘄而粗大説文云蘄草也生山中者名薜又名山蘄然則當歸芹類也在平地者名芹生山中而粗大者名當歸也地圖經曰生隴西川穀今陝西諸郡及江寧府滁州皆有之道地以川蜀及隴西四陽文州宕州當州翼州松州者最勝時生春生苗採二月八月取根收陰乾用根多韌潤者為好質類前胡大而多尾色黑黃味甘辛性溫散氣氣味俱輕陽也又云陽中微陰臭香主諸血瘡瘍行手少陰經足太陰經厥陰經助酒為之使反畏菖蒲海藻牡蒙惡䕡茹濕面制去土酒洗焙用治療藥性論云止嘔逆虛勞寒熱破宿血女子崩中下血腸胃冷止痢腹痛單煮汁飲治溫瘧主女人瀝血腰痛並齒疼痛不可忍者患人虛冷加而用之日華子云治一切風一切血破惡血及症癖湯液本草云除血刺痛東垣云頭止血身養血稍破血全活血補藥性論云補諸虛不足日華子云補一切勞養新血合治合人參黃耆能補血合大黃牽牛能破血麻黃無毒叢生麻黃出神農本經主中風傷寒頭痛溫瘧發表出汗去邪熱氣止咳逆上氣除寒熱破症堅積聚以上朱字神農本經五臟邪氣緩急風脅痛字乳余疾止好唾通腠理疏傷寒頭疼解肌泄邪惡氣消赤黑斑毒以上黑字名醫所録名龍沙卑相卑鹽苗圖經曰春生苗至夏五月則長及一尺許稍上有黃花結實如百合瓣而小又似皂莢子味甘可啖皮紅仁黑根紫赤色俗云有雌雄二種雌者於三月四月開花六月結子雄者無花而不結子酉陽雜俎云莖端開花花小而黃簇生子如覆盆子可食地圖經曰生晉地及河東今處處多有之唐本注云開封府鄭州鹿臺及關中沙苑河傍沙洲上太多道地茂州同州滎陽中牟者為勝時生春生苗採立秋後取莖根收陰乾用莖根質類小草而有節色青根黃赤味苦性溫散氣氣味俱輕陽也臭朽主解表發汗行手陽明經少陰經太陰經足太陽經助厚朴白薇為之使反惡辛夷石葦制雷公云用夾刀剪去節並頭槐砧上用銅刀細銼煎三四十沸竹片掠去上沫盡漉出曬乾用之若不盡令人心悶圖經曰丸散內用皆不必煮今取發汗但去節治療藥性論云莖散毒風𤸷痹皮肉不仁壯熱瘟疫根能止汗日華子云通九竅調血脈開毛孔皮膚逐風退熱御山嵐瘴氣合治綿裹酒煮服治傷寒表熱發疸冬用酒春用水及産後腹痛血下不盡合桂枝芍藥杏仁甘草治傷寒合射干厚朴治肺痿上氣去節合蜜炒水煎乘熱服療病瘡疱倒黶黑根末合牡蠣粉粟粉撲之止盜汗禁不可多服令人虛木通無毒蔓生木通出神農本經主去惡蟲除脾胃寒熱通利九竅血脈關節令人不忘以上朱字神農本經療脾疸常欲眠心煩噦出音聲療耳聾散癰腫諸結不消及金瘡惡瘡鼠瘻踒折齆音甕鼻息肉墮胎去三蟲以上黑字名醫所録名附支丁翁王翁萬年葍藤子燕𧄏子烏𧄏拿子畜葍子桴棪子苗圖經曰生作藤蔓大如指其莖幹大者徑約二三寸每節有二三枝枝頭出五葉頗類石葦又似芍藥三葉相對夏秋開紫花亦有白花者結實如小木瓜核黑瓤白食之甘美陶隱居云繞樹藤生汁白莖有細孔紋如車輻兩頭皆通含一頭吹之則氣出彼頭者良地圖經曰生石城山谷及山陽今澤潞漢中廣州江淮湖南州郡亦有之道地海州興元府解州時生春生葉採正月二月取莖七月八月取子收陰乾用莖實質類葡萄藤而有紋理色蒼味辛甘子甘性平散子平寒氣氣味俱薄陽中之陰臭微香主通經利竅散腫消癰制去皮銼碎用治療藥性論云治五淋利小便開關格療多睡去水腫浮大除煩熱根治項下瘤癭日華子云安心除煩止渴退熱治健忘明耳目治鼻塞通小腸下水破積聚血塊排膿消瘡癤止痛催生下胞女人血閉月候不勻天行時疾頭痛目眩羸劣乳結及下乳陳藏器云子利大小便宜通去煩熱食之令人心寬止渴下氣孟詵云子厚腸胃令人能食下三焦除惡氣續五臟斷絶氣使語聲足氣通十二經脈別録云治瘻瘡喉嚨痛及喉痹煎磨並宜服急則含之子治胃口熱閉反胃不下食除三焦客熱合治煎湯合蔥食之理風熱淋疾小便數急疼痛小腹虛滿禁妊娠不可服草之木通草無毒植生通草治陰竅不利除水腫閉利小便治五淋明目退熱催生下胞下乳名醫所録名通脫木離南草活莌寇脫倚商苗圖經曰生山側莖高五七尺葉似萆麻心空有瓤輕虛正白可愛女工取以飾物爾雅疏云大若樹然故又謂之通脫木也謹按通脫木據圖經苗莖即是今之通草耳本經以木通主療注之故致名質難辨考諸湯液本草通草木通自是二種木通莖折之紋如車輻其通草莖中有瓤輕虛正白灼然明矣用之不可混為一也地圖經曰生江南時生春生苗採八月取莖收哂干用莖色皮蒼褐肉白味甘辛性平散氣氣味俱薄陽中之陰臭朽主通竅下乳制去皮銼用治療圖經曰療瘰癧花下粉治諸蟲瘻惡瘡痔疾取粉內瘡中禁妊娠不可服草之草白芍藥有小毒叢生芍藥出神農本經主邪氣腹痛除血痹破堅積寒熱疝瘕止痛利小便益氣以上朱字神農本經通順血脈緩中散惡血逐賊血去水氣利膀胱大小腸消癰腫時行寒熱中惡腹痛腰痛以上黑字名醫所録名白木余容犁食解倉鋋苗圖經曰春生紅芽作叢莖上三枝五葉似牡丹而狹長高一二尺夏開花有紅白紫色數種子似牡丹子而小秋時採根衍義曰芍藥全用根其品亦多但千葉者則根虛須用單葉山中者為佳地圖經曰生中嶽川穀及丘陵今處處有之道地澤州白山蔣山茅山淮南海鹽杭越時生春生芽採二月八月取根收曝乾用根堅實者為好質類烏藥而細白色白味苦酸性平微寒氣氣薄味厚陰中之陽臭腥主腹痛健脾行手太陰經足太陰經助雷丸為之使反藜蘆畏硝石鱉甲小薊惡石斛芒硝制生用或炒用酒浸行經治療藥性論云主腹中㽱痛骨熱日華子云治女人一切病産前後諸疾通月水退熱除煩驚狂婦人血暈腸風瀉血頭痛下痢及血虛腹痛補藥性論云強五臟益腎氣日華子云補勞益氣合治合白朮補脾合川芎補肝合人參白朮補氣禁血虛寒人不可多服赤芍藥有小毒叢生赤芍藥利小便下氣瀉肝行經通順血脈散惡血消癰腫名醫所録名花根苗圖經曰春生紅芽作叢莖高一二尺葉似牡丹而狹長夏開花紅色其實似牡丹子而小衍義云花赤者為赤芍藥謹按芍藥所重在根鬚以花紅而單葉者由其花不繁則根氣實也然有赤白二種色既不同其與白者所治必異故後人用白補赤瀉以其色在西方故補色在南方故瀉也地圖經曰生中嶽川穀及丘陵今處處有之道地茅山者最勝日華子云海鹽杭越者亦佳時生春生芽採二月八月取根收曝乾用根肥實者為好質類烏藥而皮赤色赤味酸苦性微寒泄氣氣薄味厚陰中之陽臭腥主活血止痛行手足太陰經助雷丸為之使反藜蘆畏硝石鱉甲小薊惡石斛芒硝制以竹刀刮去粗皮細銼微炒生亦可用治療藥性論云除血氣積聚宣通臟腑壅氣心腹堅脹婦人血閉不通消瘀血敗血日華子云治痔瘻發背瘡疥目赤胬肉明目合治赤芍藥一兩合檳榔一個麵裹煨為末水煎服治五淋蠡實無毒叢生蠡實出神農本經主皮膚寒熱胃中熱氣風寒濕痹堅筋骨令人嗜食久服輕身花葉去白蟲以上朱字神農本經止心煩滿利大小便長肌膚肥大療喉痹以上黑字名醫所録名荔實劇草三堅豕首馬藺子旱蒲豚耳苗圖經曰葉如薤而長厚即馬藺子也三月開紫碧花五月結實作角子如麻大而赤色有稜根細長通黃色人多取以為刷地圖經曰生河東川穀今陝西諸郡及鼎澧州亦有之近京尤多道地冀州時生春生苗採四月取花五月取實收陰乾用花實質類麻子而肥圓色赤黑味甘性溫緩氣氣之厚者陽也臭朽主堅筋骨利大小便制搗末用治療圖經曰治喉痹腫痛唐本注云止金瘡血內流癰腫日華子云主婦人血氣煩悶産後血暈並經脈不止崩中帶下止鼻洪吐血通小腸消酒毒治黃病敷蛇蟲咬別録云治鼻病酒皶合治合乾薑黃連各等分為散以煮熟湯調服方寸匕治水痢百起冷熱痢良服時忌豬肉冷水禁多服令人溏泄瞿麥無毒叢生瞿音劬麥出神農本經主關格諸癃結小便不通出刺決癰腫明目去翳破胎墮子下閉血以上朱字神農本經養腎氣逐膀胱邪逆止霍亂長毛髮以上黑字名醫所録名巨句麥大菊大蘭石竹葉杜母草茈萎燕麥籥麥苗圖經曰苗高一二尺葉尖小青色如柳葉而有鋸齒根紫黑色形如細蔓荊二月至五月開花紅紫赤色亦似映山紅七月結實作穗頗似麥故以名之地圖經曰生泰山川穀河陽河中府淮甸今處處有之道地絳州時生春生苗採立秋取實秋後合子葉取收陰乾用子葉質形如大麥色淡黃味苦辛性寒泄氣氣薄味厚陰中之陽臭朽主利小便通關格助蓑草牡丹為之使反惡螵蛸制雷公云凡用先以堇竹瀝浸一伏時漉出曬乾用生用亦可治療圖經曰通心經利小腸藥性論云除五淋日華子云催生葉治痔瘻瀉血作湯粥食並得小兒蛔蟲煎湯服丹石藥發並眼目腫痛及腫毒搗敷治浸淫瘡並婦人陰瘡子治月經不通破血塊排膿合治合栝蔞根大附子茯苓山芋等分杵末蜜丸服之療小便不利有水氣禁妊娠不可服小腸虛者不宜服玄參無毒植生玄參出神農本經主腹中寒熱積聚女子産乳余疾補腎氣令人目明以上朱字神農本經主暴中風傷寒身熱支滿狂邪忽忽不知人溫瘧灑灑血瘕下寒血除胸中氣下水止煩渴散頸下核癰腫心腹痛堅症定五臟久服補虛明目強陰益精以上黑字名醫所録名重臺玄臺鹿腸正馬咸端逐馬苗圖經曰二月生苗葉似脂麻又如槐柳細莖青紫色七月開花青碧色八月結子黑色亦有白花莖方大紫赤色細毛有節若竹者高五六尺葉如掌大而尖長如鋸齒其根生青白乾即紫黑新者潤膩一根可生五七枚合香亦用之地圖經曰生河間川穀及冤句今處處有之道地江州衡州邢州時生二月生苗採三月四月八月九月取根收曝乾用根黑潤者為好質形如續斷而黑色紫黑味苦鹹性微寒泄氣氣薄味厚陰也臭香主清咽喉之腫瀉無根之火行足少陰經反藜蘆惡黃耆乾薑大棗山茱萸制雷公云凡採得須用蒲草重重相膈入甑蒸兩伏時後出曬乾用治療藥性論云除暴結熱熱風喉痛傷寒勞復並散瘤癭瘰癧日華子云止健忘消腫毒及遊風頭風熱毒心驚煩躁勞乏骨蒸傳尸邪氣補日華子云補虛羸勞損合治合升麻葛根芍藥甘草療傷寒陽毒發斑合酒飲療諸毒鼠瘻禁勿犯銅器餌之噎人喉喪人目秦艽無毒植生秦艽出神農本經主寒熱邪氣寒濕風痹肢節痛下水利小便以上朱字神農本經療風無問久新通身攣急以上黑字名醫所録名秦瓜苗圖經曰枝幹高五六寸葉婆娑連莖梗俱青色如萵苣葉六月中開紫色花似葛花當月結子根上黃色而相交糾長一尺許粗細不等陶隱居云根皆作羅紋相交黃白色中多銜土地圖經曰生飛鳥山谷及石州寧化軍秦州齊州今河陝州軍多有之陶隱居云今出甘松龍洞蠶陵道地涇州鄜州岐州者良時生春生苗採二月八月取根收曝乾用根羅紋者為佳質形如防風而粗虛色土褐味苦辛性平微溫散日華子云冷氣味厚於氣陰中微陽臭腥主風濕黃疸行手陽明經助菖蒲為之使反畏牛乳制雷公云以布拭去黃毛破開去土湯洗銼碎用治療圖經曰黃病有數種傷酒曰酒黃夜食誤餐鼠糞亦作黃病因勞發黃多痰涕目有赤脈日益憔悴或面赤噁心用之皆效日華子云主傳尸骨蒸消疳及時氣蕭炳云治酒黃黃疸大效合治合牛乳點服之利大小便瘥五種黃病去頭風及發背疑似者秦艽十二分牛乳一升同煮七合去滓分溫再服治黃疸心煩熱口乾皮肉皆黃禁多服解米脂人食谷不充悅解酒毒百合無毒植生百合出神農本經主邪氣腹脹心痛利大小便補中益氣以上朱字神農本經除浮腫臚脹痞滿寒熱通身疼痛及乳難喉痹止涕淚以上黑字名醫所録名重箱摩羅強瞿重邁中庭中逢花苗圖經曰苗高數尺干粗如箭四面有葉如雞距又似柳葉青色葉近莖微紫莖端碧白四五月開紅白花如石榴嘴而大根如胡蒜重疊生二三十瓣又一種花黃有黑斑細葉葉間有黑子不堪入藥衍義云莖高三尺許葉如大柳葉四向攢枝而上其顛有長蕊開淡黃白花四垂向下覆長蕊花心有檀色每一枝顛須五六花子紫色圓如梧子生於枝葉間每葉一子不在花中地圖經曰生荊州川穀吳氏云冤句荊山及近道處處皆有之道地滁州成州時生春生苗四五月開花採二月八月取收曝乾用根下子瓣質類胡蒜而有瓣色白味甘性平緩氣氣之薄者陽中之陰臭腥主傷寒百合病制蒸熟用治療藥性論云祛百邪鬼魅除心下急滿痛並腳氣熱咳逆日華子云安心定膽並顛邪啼泣狂叫驚悸殺蠱毒氣脅乳癰發背諸瘡腫毒及産後血狂暈孫真人云煮濃汁服治陰毒傷寒補日華子云益志養五臟合治合蜜蒸令軟時含棗大一塊咽津療肺臟壅熱煩悶知母無毒叢生知母出神農本經主消渴熱中除邪氣肢體浮腫下水補不足益氣以上朱字神農本經療傷寒久瘧煩熱脅下邪氣膈中惡及風汗內疸多服令人泄以上黑字名醫所録名蚳音岐母連母野蓼地參水參兒踵草水浚貨母女雷女理蝭音匙母兒草鹿列韭逢東根水須沈燔昌支𧂇徒含切苗圖經曰春生苗葉如韭四月開青花如韭花八月結實其根黃色似菖蒲而柔潤葉至難死掘出隨生須枯燥乃已地圖經曰生河內川穀今瀕河諸郡解州滁州亦有之陶隱居云出彭城道地衛州威勝軍隰州時生春生苗採二月八月取收陰乾用根黃白脂潤者為好質類菖蒲而柔潤有毛色淡黃味苦性寒泄氣味厚於氣陰也臭香主瀉腎火補虛勞行手太陰經足陽明經少陰經助酒為之使制雷公云去蘆及皮槐砧上細切焙木臼內杵上行須用酒炒治療圖經曰解溪毒陶隱居云治熱瘧熱煩藥性論云除心煩燥悶骨蒸勞熱産後蓐勞腎氣勞憎寒患人虛而口乾日華子云除傳尸疰病通小腸消痰止嗽潤心肺安心止驚悸別録云安胎下乳補日華子云益虛之忌勿犯鐵器貝母無毒植生貝母出神農本經主傷寒煩熱淋瀝邪氣疝瘕喉痹乳難金瘡風痙以上朱字神農本經療腹中結實心下滿洗洗惡風寒目眩項直咳嗽上氣止煩熱渴出汗安五臟利骨髓以上黑字名醫所録名空草藥實苦花苦菜商草勤母𦯶苗圖經曰春生苗莖細青色葉亦青似蕎麥葉隨苗出七月花開碧緑色形如鼓子花其根圓而有瓣黃白色如聚貝子故名貝母陸機疏云其葉如栝蔞而細小其子在根下如芋子正白四方連纍相著有分解其中獨顆而無兩瓣亦無皺者號曰丹龍精不入藥用唐本注云又一種葉如大蒜蒜熟時採之良舊本云十月採恐苗枯根亦不佳也地圖經曰生晉地及河中江陵府郢壽隨鄭蔡潤滁州皆有之唐本注云荊襄産者佳江南諸州亦有道地峽州越州時生二月生苗採四月八月取根收曝乾用根圓白不僵者佳質類半夏而有瓣色黃白味辛苦性微寒氣味厚於氣陰中之陽臭朽主化痰解鬱助厚朴白薇為之使反烏頭畏秦艽礬石莽草惡桃花制雷公云凡使先於柳木灰火中炮黃劈破去內口鼻上有米許大者心一小顆後拌糯米於𨫼上同炒待米黃熟然後去米生亦可用治療圖經曰除惡瘡並人面瘡藥性論云退虛熱催難産為末點眼去膚翳消胸脅逆氣並時疾黃疸日華子云消痰潤肺衍義曰散心胸鬱結之氣補陶隱居云斷谷服之不飢合治合酒調服療胞衣不出合連翹療項下瘤癭疾合沙糖為丸含化止嗽合油敷人畜惡瘡禁誤服丹龍精令人筋脈不收解若誤服丹龍精者用黃精小藍汁解之立愈贋丹龍精為偽白芷無毒植生白芷出神農本經主女人漏下赤白血閉陰腫寒熱風頭侵目淚出長肌膚潤澤可作面脂以上朱字神農本經療風邪久渴吐嘔兩脅滿風痛頭眩目癢可作膏藥面脂潤顏色以上黑字名醫所録名芳香白茝音採虈音囂莞苻蘺澤芬葉蒚音歷麻藥苗圖經曰根長尺余白色粗細不等枝杆去地五六寸春生葉相對婆娑紫色闊三指許花白微黃入伏後結子立秋後苗枯楚人謂之藥九歌云辛夷楣兮藥房王逸注云藥白芷也地圖經曰出河東川穀下澤及齊郡今所在有之陶隱居云生下濕地今近道處處有之道地澤州吳地尤勝時生春生葉採二月八月取根收曝乾用根大而不蛀者佳質類栝蔞根而細色白味辛性溫氣氣味俱輕陽也臭香主頭風侵目排膿生肌行手陽明經足陽明經助當歸為之使反惡旋覆花制雷公云採得後刮削上皮細銼用黃精亦細銼以竹刀切二味等分兩度蒸一伏時後出於日中曬乾去黃精用或生用治療陶隱居云作湯浴以去尸蟲藥性論云止心腹血刺痛及嘔逆明目止淚出女人血崩瀝血腰痛能蝕膿日華子云退目赤胬肉止胎漏滑落破宿血消乳癰發背瘰癧腸風痔瘻排膿瘡痍疥癬止痛生肌去面皯疵瘢補日華子云生新血贋喪公藤為偽淫羊藿無毒植生淫羊藿出神農本經主陰痿絶傷莖中痛利小便益氣力強志以上朱字神農本經堅筋骨消瘰癧赤癰下部有瘡洗出蟲丈夫久服令人無子以上黑字名醫所録名仙靈脾黃連祖千兩金剛前乾雞筋放杖草棄杖草苗圖經曰葉青似杏葉上有刺莖如粟稈根紫色有須四月開白花亦有紫色碎小獨頭子湖湘出者苗高一二尺許葉如小豆而圓薄枝莖緊細經冬不凋根似黃連關中俗呼三枝九葉草是也其根葉俱堪用地圖經曰生上郡陽山山谷及江東陝西泰山漢中湖湘間皆有之時生春生苗採五月取葉以不聞水聲處者良收曬乾用葉根質莖如粟稈葉似杏葉色青味辛性寒氣氣之薄者陽中之陰臭朽主堅筋益骨助山藥紫芝為之使制雷公云須用夾刀去葉四畔花枝盡後細銼每修事一斤用羊脂四兩相對拌炒過待羊脂盡為度治療日華子云治一切冷風勞氣筋骨攣急四肢不仁老人昏耄及健忘補日華子云補腰膝強心力丈夫絶陽不起女人絶陰無子合治合酒浸服療偏風手足不遂皮膚不仁合威靈仙食後米湯調服療痘瘡入眼黃芩無毒叢生黃芩出神農本經主諸熱黃疸腸澼泄痢逐水下血閉惡瘡疽蝕火傷以上朱字神農本經療痰熱胃中熱小腹絞痛消穀利小腸女子血閉淋露下血小兒腹痛子主腸澼膿血以上黑字名醫所録名腐腸空腸內虛黃文經芩妒婦印頭子芩豚尾芩宿芩苗圖經曰苗長尺余莖幹粗如箸葉從四面作叢生類紫草亦有獨莖者葉細長青色兩兩相對六月開紫花根黃如知母粗細長四五寸又吳普本草云二月生赤黃葉兩兩四四相值其莖空中或方圓高三四尺花紫紅赤五月實黑根黃有中枯而飄者名腐腸有細實圓者名子芩也地圖經曰生秭歸山谷及冤句今川蜀河東陝西近郡皆有之陶隱居云出彭城郁州道地宜州鄜州涇州兗州時生春生苗採二月三月三日八月九月取根收陰乾用根色黃味苦性平大寒泄氣氣薄味厚陰中微陽臭香主諸熱行手太陰經陽明經助山茱萸龍骨為之使反畏丹砂牡丹藜蘆惡蔥實制去粗皮及腐爛者銼用或酒炒治療藥性論云消熱毒骨蒸寒熱往來腸胃不利破壅氣除五淋令人宣暢去關節煩悶解熱渴治熱腹中㽱痛心腹堅脹日華子云下氣主天行熱疾疔瘡乳癰發背排膿東垣云中枯而飄者瀉肺火消痰利氣除風濕留熱於肌表細實而堅者瀉大腸火養陰退陽滋化源退熱於膀胱合治合白朮安胎合厚朴黃連止腹痛合五味子牡蒙牡蠣令人有子合黃耆白蘞赤小豆療鼠瘻狗脊無毒植生狗脊出神農本經主腰背強關機緩急周痹寒濕膝痛頗利老人以上朱字神農本經療失溺不節男子腳弱腰痛風邪淋露少氣目暗堅脊利俯仰女子傷中關節重以上黑字名醫所録名百枝強膂扶蓋扶筋狗青赤節苗圖經曰苗尖細碎青色高尺余無花其莖葉似貫衆根長尺許而多岐肉作青緑色亦有黑色形似狗脊骨故以名之今方亦以金毛者為勝陶隱居云一種與菝葜相似而小異其莖葉小肥其節疏其莖大直上有刺葉圓有赤脈根凹凸蘢蓯如羊角而細強者唐本注云今江左俗猶用者是陶所説乃是有刺萆薢耳非狗脊也地圖經曰生常山川穀及太行山道地成德軍眉州溫州淄州時生春生苗採二月八月取根收曝乾用根有金毛者為佳質如犬脊而有毛色黃黑味苦甘性平微溫緩氣氣厚味薄陽中之陰臭朽主除濕定痛助萆薢為之使反惡敗醬制雷公云凡修事細銼酒拌蒸從巳至申方出乾用治療藥性論云治男女毒風軟腳濕痹腎氣虛弱補藥性論云益男子續筋骨贋透山藤味苦入頂為偽石龍芮無毒叢生石龍芮出神農本經主風寒濕痹心腹邪氣利關節止煩滿久服輕身明目不老以上朱字神農本經平腎胃氣補陰氣不足失精莖冷令人皮膚光澤有子以上黑字名醫所録名地椹石龍彭根天豆水堇天灸魯果能苗圖經曰一叢數莖莖青紫色每莖三葉其葉芮芮短小多刻缺子如葶藶而色黃唐本注云今用者俗名水堇苗似附子葉似桑椹故名地椹生下濕地五月熟時葉子皆味辛山南者粒大如葵子關中河北者細如葶藶氣力劣於山南者衍義曰石龍芮今有兩種水中生者葉光而末圓陸生者葉有毛而末鋭入藥須用水生者陸生者又謂之天灸取少葉揉係臂上一夜作大泡如火燒者是真也地圖經曰出泰山川澤石邊唐本注云生關中河北陶隱居云近道處處有之道地兗州時生春生苗採五月五日取子二月八日取皮收陰乾用子及皮質子類葶藶而黃色黃味苦性平泄氣氣之薄者陽中之陰臭朽主除痹舒筋助大戟為之使反畏蛇蛻皮吳茱萸治療圖經曰能逐諸風除心熱燥補衍義曰陸生者補陰不足莖常冷失精贋蓄菜子為偽草之飛茅根無毒附苗花根屋茅叢生茅根出神農本經主勞傷虛羸補中益氣除瘀血血閉寒熱利小便苗主下水以上朱字神農本經下五淋除客熱在腸胃止渴堅筋婦人崩中久服利人以上黑字名醫所録名蘭根茹根地管地筋兼杜苗圖經曰春生苗布地如針俗謂之茅針可啖甚益小兒夏生白花茸茸然至秋而枯其根至潔白味亦甘美陸機草木疏云菅似茅而滑無毛根下五寸中有白粉者柔韌宜為索漚之尤善其未漚者名野管詩所謂白茅菅兮是也入藥功用與茅等其屋苫茅用之須經久者良地圖經曰生楚地山谷田野今處處有之道地澶州鼎州時生春生苗採四月取花六月取根收曬乾用根花苗針質根類茅香根而粗色白味甘茅針甘花甘性寒緩茅針平涼花溫氣氣之薄者陽中之陰臭香主除瘀血下五淋制刷去沙土銼碎用治療日華子云療婦人月經不勻通血脈淋瀝茅針通小腸花罯刀箭瘡止血並痛屋四角茅止鼻洪唐本注云菅花止衄血吐血灸瘡藥性論云白茅破血並止消渴陳藏器云茅針消惡瘡腫未潰者煮服之服一針一孔二針二孔生挼敷金瘡止血煮服之主鼻衄及暴下血合治合脂膏療諸竹木刺在肉中不出及因風致腫屋茅合酒煮療卒吐血屋上爛茅和醬汁研敷斑瘡蠶齧瘡茅針合酒煎服療癰毒軟癤不作頭禁妊娠不可服解茅屋滴溜水殺雲母毒草之草紫菀無毒植生紫菀出神農本經主咳逆上氣胸中寒熱結氣去蠱毒痰蹶安五臟以上朱字神農本經療咳唾膿血止喘悸五勞體虛補不足小兒驚癇以上黑字名醫所録名紫茜青菀液牽牛苗圖經曰三月布地生苗葉其葉三四相連五月六月開黃紫白花結黑子本有白毛根甚柔細地圖經曰生房陵山谷及真定邯鄲今耀成泗壽臺孟州興國軍皆有之時生春生苗採二月三月取根收陰乾用根潤軟者為佳質類重臺根作節而有茸色紫味苦辛性溫散氣氣厚味薄陽中之陰臭香主氣喘咳嗽助款冬花為之使反畏茵陳蒿惡天雄瞿麥雷丸遠志制雷公云凡使去頭土用東流水洗淨以蜜浸一宿至明於火上焙乾用治療藥性論云除尸疰及胸脅逆氣百邪鬼魅日華子云調中及肺痿吐血消痰止渴勞氣虛熱補藥性論云補虛日華子云潤肌膚添骨髓衍義曰益肺氣合治合款冬花百部為散生薑烏梅煎服療久嗽不瘥紫草無毒植生紫草出神農本經主心腹邪氣五疸補中益氣利九竅通水道以上朱字神農本經療腹腫脹滿痛以合膏療小兒瘡及面渣音查以上黑字名醫所録名紫丹紫芙哀老切藐茈䓞苗圖經曰苗似蘭香莖赤節青二月有花紫白色秋結實亦白人家園圃或種蒔其根所以染紫也地圖經曰生碭山山谷及楚地今處處有之陶隱居云襄陽南陽道地單州東京為勝時生春生苗採三月取根收陰乾用根色赤者為好質莖類威靈仙而粗壯色紫味苦性寒氣味厚於氣陰也臭香主透斑瘡利水道制雷公云凡使須用蠟水蒸之待水乾取去頭並兩畔髭細銼用每修事紫草一斤用蠟二兩於鐺中熔熔盡便投蠟水作湯用治療圖經曰治傷寒時疾發瘡疹不出並豌豆瘡藥性論云療惡瘡疹癬別録云治小便淋瀝痛水調末服亦治嬰兒童子患疹痘疾前胡無毒植生前胡主療痰滿胸脅中痞心腹結氣風頭痛去痰實下氣治傷寒熱推陳致新明目益精名醫所録苗圖經曰苗青白色似斜蒿初出時有白芽長三四寸味甚香美又似藝蒿七月開白花與蔥花相類八月結實根細青紫色今酈延將來者大與柴胡相似但柴胡赤色而脆前胡黃而柔軟不同耳今諸方所用前胡皆不同京師北地者色黃白枯脆絶無氣味江東乃有三四種一種類當歸皮斑黑肌黃而脂潤氣味濃烈一種色理黃白似人參而細短香味都微又有如草烏頭膚黑而堅有兩三岐為一本者食之亦戟人咽喉然此皆非前胡也地圖經曰出陝西梁漢江淮荊襄州郡及相州孟州皆有之道地吳中壽春及越衢婺陸等處皆好時生春生苗採二月八月取根收曝乾用根潤實者為好質類北柴胡而柔軟色黃褐味苦性微寒泄氣氣味俱薄陰中之陽臭香主止痰嗽去寒熱助半夏為之使反畏藜蘆惡皂莢制雷公云凡修事用刀刮去蒼黑皮並髭土了細銼用甜竹瀝浸令潤於日中曬乾用之治療圖經曰下氣化痰藥性論云去熱實下氣並時氣內外俱熱日華子云去一切勞下一切氣止嗽破癥結開胃下食通五臟及霍亂轉筋骨節煩悶反胃嘔逆氣喘安胎小兒一切疳氣禁野蒿根為偽誤服之令人反胃敗醬無毒叢生敗醬出神農本經主暴熱火瘡赤氣疥瘙疽痔馬鞍熱氣以上朱字神農本經除癰腫浮腫結氣風痹不足産後疾痛以上黑字名醫所録名鹿腸鹿首馬草澤敗鹿醬酸益苗圖經曰葉似水莨及薇銜花黃根紫色叢生嗅如陳敗豆醬之氣故以為名耳陶隱居云葉似豨蘞根似柴胡地圖經曰生江夏川穀今江東亦有之道地江寧府時生春生苗採七月八月十月取根收曝乾用根質根類柴胡色紫味苦鹹性平微寒泄氣味厚於氣陰中之陽臭臭主癰腫風痹行手厥陰經足少陰經制雷公云凡使收得後便粗杵入甘草葉相拌對蒸從巳至未出焙乾去甘草葉取用治療藥性論云除毒風𤸷痹破多年凝血能化膿為水及産後諸病止腹痛除疹煩渴日華子云療赤眼障膜胬肉聤耳血氣心腹痛破癥結産前後諸疾催生落胞血暈排膿補瘻鼻洪吐血赤白帶下瘡痍疥癬丹毒別録云蠼螋尿繞腰者煎汁塗之瘥合治合薏苡仁附子治腹癰腹有膿者白蘚無毒植生白蘚出神農本經主頭風黃疸咳逆淋瀝女子陰中腫痛濕痹死肌不可屈伸起止行步以上朱字神農本經療四肢不安時行腹中大熱飲水欲走大呼小兒驚癇婦人産後余痛以上黑字名醫所録名白羊蘚白膻金雀兒椒地羊膻苗圖經曰苗高尺余莖青葉稍白如槐亦似茱萸夏開花淡紫色似小蜀葵根似蔓荊皮黃白而心實其氣膻似羊故名地羊膻也地圖經曰生上谷川谷及冤句今河中潤州皆有道地江寧府滁州蜀中時生春生苗採四月五月取根又云宜二月取瘥晚則虛惡收陰乾用根上皮質類牡丹皮而白色白味苦鹹性寒泄氣味厚於氣陰也臭膻主濕痹風瘡反惡螵蛸桔梗茯苓萆薢治療圖經曰鼠瘻巳有口膿血出者煮汁服一升當吐鼠子愈藥性論云去一切熱毒惡風風瘡疥癬赤爛眉發脫脆皮肌急壯熱惡寒解熱黃酒黃谷黃勞黃日華子云通關節利九竅及血脈並一切風痹筋骨弱乏通小腸水氣天行時疾頭痛眼疼酸漿無毒附根子植生酸漿主熱煩滿定志益氣利水道産難吞其實立産神農本經名醋漿苦葴音針葴寒漿苗圖經曰苗似水茄而小葉亦可食實作房如囊囊中有子如梅李大皆赤黃色根似菹芹色白絶苦爾雅所謂葴寒漿郭璞注云今酸漿草江東人呼為苦葴是也衍義曰苗如天茄子開小白花結青殼熟則深紅殼中子大如櫻亦紅色櫻中腹有細子如落蘇子食之有青草氣此即苦耽也又一種三葉酸漿草生人家園林亭檻中著地開黃花味酸亦入藥用地圖經曰生荊楚川澤及人家田園中今處處有之時生春生苗採五月五日取根收陰乾用葉根實色莖青根白味酸苦性平寒氣味厚於氣陰也臭腥主除熱催生泄水制搗汁用治療陶隱居云實小兒食之能除熱亦主黃病別録云根搗汁治黃病合治三葉酸漿草陰乾為末空心合酒下三錢匕治婦人赤白帶下三葉酸漿草淨洗研絞自然汁合酒各一合令溫暖空心服之治卒患諸淋遺瀝不止小便赤澀疼痛鬱金香無毒叢生鬱金香主蟲野諸毒心氣鬼疰鴉鶻等臭名醫所録地圖經曰陳氏云其香十二葉為百草之英按魏略云二月三月有花狀如紅藍陳藏器云鬱金香平入諸香藥用之説文鬱金芳草也十二葉為貫將以煮之用為瑩為百草之英合而釀酒以降神也地圖經曰生秦國時生春生苗採四月五月取莖葉收曝乾用花莖葉質花類紅藍色黃味苦性溫泄氣氣厚於味陽中之陰臭香主除一切臭治療陳藏器云除心腹間惡氣鬼疰一十二種陳藏器余兜納香味甘溫無毒去惡氣溫中除暴冷廣志云生剽國魏略曰大秦國出兜納香海藥云謹按廣志云生西海諸山味辛平無毒主惡瘡腫瘻止痛生肌併入膏用燒之能闢遠近惡氣帶之夜行壯膽安神與茆香柳枝合為湯浴小兒則易長風延母味苦寒無毒小兒發熱發強驚癇寒熱熱淋解煩利小便明目主蛇犬毒惡瘡癰腫黃疸並煮服之細葉蔓生纓繞草木南都賦云風衍蔓延于衡皋是也海藥云謹按徐表南州記生南海山野中主三消五淋下痰小兒赤白毒痢蛇毒疸溪等毒一切瘡腫並煎服只出南中諸無所出也耕香味辛溫無毒主臭鬼氣調中生烏滸國南方草木狀曰耕香莖生細葉大瓠藤水味甘寒無毒主煩熱止渴潤五臟利小便藤如瓠斷之水出生安南太康地記曰朱崖儋耳無水處種用此藤取汁用之海藥云謹按太原記生安南朱崖上彼無水惟大瓠中有天生水味甘冷香美主解大熱止煩渴潤五臟利水道彼人造飲饌皆瓠色筋子根味苦溫無毒主心腹痛不問冷熱遠近惡鬼氣注刺痛霍亂蠱毒暴下血腹冷不調酒飲磨服生四明山苗高尺余葉圓厚光潤冬不凋根大如指亦名根子土芋味甘寒小毒解諸藥毒生研水服當吐出惡物盡便止煮食之甘美不飢厚人腸胃去熱嗽蔓如豆根圓如卵鶗鴂食後彌吐人不可食優殿味辛溫去惡氣溫中消食生安南人種為茹南方草木狀曰合浦有優殿人種之以豆醬汁食芳香好味土落草味甘溫無毒主腹冷疼氣痃癖作煎酒亦搗絞汁溫服葉細長生嶺南山谷土人服之㩉菜豬孝切味辛溫無毒主冷氣腹內久寒食飲不消令人能食字林曰㩉辛菜南人食之去冷氣必似勒味辛溫無毒主冷氣胃閉不消食心腹脹滿生崑崙似馬藺子胡面莽味甘溫去痃癖及冷氣止腹痛煮之生嶺南葉如地黃海蘊味鹹寒無毒主癭瘤結氣在喉間下水生大海中細葉如馬尾似海藻而短也
