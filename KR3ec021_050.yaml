body:
  text: 續集卷之六禽部羽蟲鶬雞無毒卵生鶬雞肉主殺蟲食物本草名鶬鴰爾雅麋鴰同上鴰鹿爾雅翼麥雞羅願云鶬麋其色蒼如麋也鴰鹿其聲也關西呼曰鴰鹿山東呼曰鶬鴰訛為錯落南人呼為鶬雞江人呼為麥雞諸名地處處有之時生無時採無時用肉李時珍曰鶬雞古人多食之故宋玉小招云鵠酸臇鳧煎鴻鶬景差大招云炙鴰蒸鳧鶑鶉陳今惟俚人捕食不復充饌品矣質汪穎云鶬雞狀如鶴大而頂無丹兩頰紅李時珍云鶬水鳥也食于田澤洲渚之間大如鶴長頸高腳群飛可以候霜或以為即古之鷫鸘其皮可為裘與鳳同名者也色青蒼色亦有灰色者味甘性溫解蠱毒鷫鸘綱目附録羅願爾雅翼云鷫鸘水鳥雁屬也似雁而長頸緑色皮可為裘霜時乃來就暖故禽經云鸘飛則霜鷫飛則雨鷫即商羊也又西方之鳳亦名鷫鸘鸏䱰音蒙童鸏䱰本草綱目糞主水和塗雜瘡竺真羅山疏名越王鳥綱目鶴頂同上䴂鵰同上地劉欣期交州志云鸏䱰即越王鳥也是水鳥出九真交趾時生無時採無時用糞質羅山疏云越王鳥大如孔雀狀如烏鳶而足長口勾末如冠可受二升許以為酒器極堅緻不踐地不飲江湖不唼百草不食魚惟啖木葉糞似薰陸香山人得之以為香可入藥用楊慎丹鉛録云鸏䱰即今鶴頂也色劉欣期交州志云鸏䱰喙長尺余黃白黑色光瑩如漆南人以為飲器鳧無毒原本誤注鶩為野鴨綱目正誤分條卵生鳧肉主補中益氣平胃消食除十二種蟲身上有諸小熱瘡年久不愈者但多食之即瘥食療本草名野鴨詩疏野鶩同上㓠音施沉鳧李時珍云鳧從幾音殊短羽高飛貌鳧義取此爾雅云㓠沉鳧也鳧性好沒故也俗作晨鳧云鳧常以晨飛亦通鳧為野鴨鶩為家鴨今按李時珍正誤云鶩有舒鳧之名鳧有野鶩之稱故王勃滕王閣序云落霞與孤鶩齊飛可以通用其義自明周禮庶人執鶩豈野鴨乎國風弋鳧與雁豈家鴨乎屈原離騷云將與雞鶩爭食乎將泛泛然若水中之鳧乎此以鳧鶩對言則家鴨野鴨益自明矣地李時珍云鳧生東南江海湖泊中皆有之數百為群晨夜蔽天而飛聲如風雨所至稻粱一空時生無時採冬月取之孟詵云九月以後立春以前即中食大益病人全勝家者雖寒不動氣用肉與血或云食用緑頭者為上尾尖者次之質陸機詩疏云狀似鴨而小短喙長尾卑腳紅掌水鳥之謹願者肥而耐寒海中一種冠鳧頭上有冠乃石首魚所化也亦宜冬月取之色雜青白色背上有紋味甘性涼治日華子云治熱毒風及惡瘡癤殺腹臟一切蟲又治水腫忌日華子云不可合胡桃木耳豆豉同食解摘元方云鳧血解挑生蠱毒熱飲探吐鷺無毒卵生鷺肉主虛瘦益脾補氣炙熟食之食物本草名鷺鷥禽經絲禽陸龜蒙雪客李昉所命舂鋤爾雅白鳥禽經云鸘飛則霜鷺飛則露其名以此步於淺水好自低昂如舂如鋤之狀故曰舂鋤陸機詩疏云青齊之間謂之舂鋤遼東吳揚諸處皆云白鷺地出青齊遼東吳揚諸處皆有時生無時採無時用肉及頭質李時珍云鷺水鳥也林棲水食群飛成序頸細而長腳善翹高尺余解指短尾喙長三寸頂有長毛十數莖毿毿然如絲欲取魚則弭之郭景純云其毛可為睫䍦變化論云鷺以目盼而受胎色潔白如雪腳青汪穎云似鷺而頭無絲腳黃色者俗名白鶴子又有紅鶴相類色紅禽經所謂朱鷺是也味咸性平治救急方鷺頭治破傷風肢強口緊連尾燒研以臘豬脂調敷瘡口鷗鷗食物本草名鷖音醫水梟李時珍云鷗者浮水上輕漾如漚也鷖者鳴聲也梟者形似也在海者名海鷗在江者名江鷗江夏人訛為江鵝也海中一種隨潮往來謂之信鳧按大雅云鳧鷖在涇是矣地鷗生南方江海湖溪間質長喙長腳群飛耀日時三月生卵用肉色形色如白鴿及小白雞贋羅氏謂青黑色誤矣鸐雉音狄有小毒原本注雉內綱目分條卵生鸐雉肉主五臟氣喘不得息者食療本草名鸐雞禽經山雞同上山雉李時珍云翟美羽貌雉居原野鸐居山林故得山名大者為鷮地蘇頌云伊落江淮間一種雉小而尾長者為山雞人多畜之樊中即爾雅所謂鸐山雞也時生無時採冬月取之用其肉皆美於雉傳云四足之美有麃兩足之美有鷮質山雞有四種名同物異似雉而尾長三四尺者鸐雉也似鸐而尾長五六尺能走且鳴者鷮雉也俗通呼為鷮矣其二則鸐雉錦雞也鷮鸐皆勇健自愛其尾不入叢林雨雪則岩伏木棲不敢下食往往餓死故師曠云雪封枯原文禽多死南方隸人多插其尾於冠色爾雅云鷂雉黃色自呼鸐雉山雞也味甘性平制肉作羹臛食炙食補中益氣禁孟詵云發五痔久食瘦人忌和蕎麥食生肥蟲同豉食害人卵同蔥食生寸白蟲余並同雉白鷳無毒原本注雉內綱目分條卵生白鷳出圖經本草肉主補中食物本草名白䲚音寒閒客張華云行止閒暇故曰鷳李昉命為閒客薛氏以為雉類汪氏以為白雉按爾雅白雉名䲚南人呼閒如寒則鷳即䲚音之轉也當作白䲚如錦雞謂之文䲚也䲚者羽美之貌又西京雜記云南粵王獻白鷳黑鷳各一蓋雉亦有黑色者名鸕雉彼通呼為䲚矣地蘇頌云白鷳出江南雉類也彼人亦食之時生無時採冬月取之用肉質李時珍云鷳似山雞尾長三四尺體備冠距其性耿介李太白言其卵可以雞伏色白色而背有細黑紋可畜養之汪穎云即白雉也李時珍云色白有黑紋如漣木朮紅頰赤嘴丹爪亦有黑鷳同類耳味甘性平解毒秧流程雞無毒秧雞肉主蟻瘻食物本草地多居田澤畔時夏至後夜鳴達旦秋後即止用肉質大如小雞長嘴短尾色白頰背有白斑味甘性溫李時珍云又有一種䳾音鄧雞亦秧雞之類也大如雞而長腳紅冠雄者大而色褐雌者小而色斑秋月即無其聲甚大人並食之突厥雀無毒突厥雀肉主補虛暖中本草拾遺名鵽鳩音奪寇雉陳藏器云雀從北來當有賊下邊人候之故名李時珍按唐書云高宗時突厥犯塞有鳴鵽群飛入塞邊人驚曰此鳥一名突厥雀南飛則突厥必入寇已而果然按此即爾雅鵽鳩寇雉也然則奪寇之義亦由此矣地陳藏器云突厥雀生塞北郭璞云鵽鳩生北方沙漠池張華云鵽生關西質郭璞云大如鴿形似雌雉鼠腳無後趾岐尾為鳥憨急群飛張華云飛則雌前雄後隨其行止色陳藏器云狀如雀而身赤莊周云青鵽愛其子而忘其母味甘性熱桑鳸無毒卵生桑鳸肉主肌肉虛羸益皮膚食物本草名竊脂爾雅青雀郭璞蠟脂雀李時珍云鳸意同扈止也左傳少皞氏以鳥名官九鳸為九農正所以止民無淫也桑鳸乃鳸之在桑間者其嘴或淡白如脂或凝黃如蠟故古名竊脂俗名蠟嘴淺色曰竊陸機謂其好盜食脂肉殆不然也地處處山林有之好食粟稻詩云交交桑扈是矣質大如鴝鵒其嘴喙微曲而厚壯光瑩色其毛蒼褐色有黃斑點其嘴喙有淺黃淺白淺青淺黑淺藍淺丹鳸類有九種皆以喙色及聲音別之非謂毛色也味甘性溫爾雅云春鳸鳻鶞夏鳸竊黑秋鳸竊藍冬鳸竊黃桑鳸竊脂棘鳸竊丹行鳸唶唶霄鳸嘖嘖老鳸鷃鷃是矣今俗多畜其雛教作戲舞鶯無毒卵生鶯肉主補益陽氣助脾食物本草名黃鳥詩經黃鸝說文黧黃爾雅倉庚月令青鳥左傳黃伯勞禽經云鶯鳴嚶嚶故名或云鶯項有紋故從賏賏項飭也或作鶯鳥羽有紋也詩云有鶯其羽是矣豳風雲有鳴倉庚爾雅又名商庚陸機云齊人謂之搏黍周人謂之楚雀幽州謂之黃鸝秦人謂之黃鸝𧑐淮人謂之黃伯勞唐元宗呼為金衣公子或謂之黃袍地處處有之時立春後即鳴麥黃椹熟尤甚其音圓滑如織機聲乃應節趨時之鳥也月令云仲春倉庚鳴說文云倉庚鳴則蠶生冬月則藏蟄入田塘中以泥自裹如卵至春始出用肉汪穎云此鳥感春陽先鳴所以補人質大如鸜鵒雌雄雙棲雙飛色體毛黃色羽及尾有黑色相間黑眉尖嘴青腳味甘性溫治山海經云黃鳥食之不妒楊夔止妒論云梁武帝郤後性妒或言倉庚為膳療忌遂令茹之妒果減半山鵲無毒卵生山鵲主食之能去果毒食物本草名鷽渥學二音爾雅𮔠音汗同上山鷓俗名赤嘴鳥酉陽雜俎地李時珍云山鵲處處山林有之時生無時採無時用肉質狀如鵲而尾長不能遠飛亦能食雞雀色身上鳥色有文彩赤嘴赤足如戴花勝人因名戴鵀戴頒味甘性溫解肉解諸果毒贋鄭樵以為喜鵲誤矣諺云朝鷽叫晴暮鷽叫雨說文以此為知來事之鳥字說云能效鷹鸇之聲而性惡其類相值則搏者皆指此也鸚䳇無毒卵生鸚䳇肉主食之已虛嗽食物本草名鸚哥鸚鵡乾皋隴客臊陀字說云鸚䳇如嬰兒之學母語故字從嬰母亦作鸚鵡熊太古云大者為嬰母小者為嬰哥則䳇義又取乎此師曠謂之乾皋李昉呼為隴客梵書謂之臊陀耳地李時珍云鸚䳇有數種緑者出隴蜀而滇南交廣近海諸地尤多數百群飛白者出西洋南番五色者出海外諸國用肉南人以為鮓食質緑者紅者大如烏鵲白者大如母雞五色者大於白而小於緑性尤慧利俱丹咮鉤吻長尾赤足金睛深目上下目臉皆能眨動舌如嬰兒其趾前後各二異於衆鳥色有緑色白色五色紅者紫赤色嘴俱赤足俱赤或云雄者喙變丹雌者喙黑不變味甘鹹性溫禁或云摩其背則喑解其性畏寒即發顫如瘴而死飼以余甘子可解張思正倦遊録云海中有黃魚能化鸚䳇此必又一種也有秦吉了鳥鳳皆能人言並附於下秦吉了綱目附録李時珍云即了哥也唐書作結遼鳥番音也出嶺南容管廉雍諸州峒中大如鸜鵒紺黑色夾腦有黃肉冠如人耳丹咮黃距人舌人目目下連頸有深黃紋頂尾有分縫能效人言音頗雄重用熟雞子和飯飼之亦有白色者鳥鳳綱目附録范成大虞衡志云鳥鳳出桂海左右兩江峒中大如喜鵲紺碧色項毛似雄雞頭上有冠尾垂二弱骨長一尺四五寸至杪始有毛其形略似鳳音聲清越如笙簫能度小曲合宮商又能為百鳥之音彼處亦自難得雕音凋卵生雕本草綱目骨主接骨斷傷屎主鳥獸骨哽品彙續集名鷲音就山海經鷻音團說文禽經云鷹以膺之鶻以猾之准以尹之雕以周之鷲以就之鷻以搏之皆言其擊搏之異也梵書謂之揭羅闍地皂雕即鷲也出北地青雕出遼東羌鷲出西南夷用骨屎其翮可為箭羽質雕似鷹而大尾長翅短鷙悍多力盤旋空中無細不睹能搏鴻鵠獐鹿豕犬又有虎鷹翼廣丈餘能搏虎也劉郁西域記云皂雕一産三卵者內有一卵化犬短尾灰色與犬無異但尾背有羽毛數莖耳隨母影而走所逐無不獲者謂之鷹背狗色雕土黃色皂雕色皂青雕最俊者謂之海東青羌鷲黃頭赤目五色皆備治接骨方治折傷斷骨用骨燒灰每服二錢酒下在上食後在下食前服骨即接如初外臺祕要方治諸鳥獸骨鯁用屎燒灰酒服方寸匕忌李時珍云鷹鵰雖鷙而畏燕子物無大小也鶚卵生鶚骨主接骨嘴主蛇咬傷本草綱目名魚鷹禽經雕雞詩疏雎鳩周南王雎音疽沸波淮南子下窟烏李時珍云鶚狀可愕故謂之鶚其視雎健故謂之雎能入穴取食故謂之下窟烏翱翔水上扇魚令出故曰沸波禽經云王雎魚鷹也尾上白者名曰鷢地禽經云鳩生三子一為鶚鳩鳲鳩也杜預以王雎為尸鳩或以此也時採無時用骨嘴質李時珍云鶚雕類也似鷹深目好峙雄雌相得摯而有別交則雙翔別則異處能翱翔水上捕魚食江表人呼為食魚鷹亦啖蛇詩云關關雎鳩在河之洲即此色土黃色臭腥制燒存性治李時珍方治蛇咬用嘴燒存性研末一半酒服一半塗之合治唐藺道人方治骨折傷用下窟烏即鶚也取骨燒存性以古銅錢一個煅紅醋淬七次為末等分酒服一錢不可過多病在下空心服在上食後服極有效驗須先夾縛定乃服此李時珍云鷹鵰鶚骨皆能接骨蓋鷙鳥之力在骨故以骨治骨從其類也禁其肉腥惡不可食解凡蛇咬用嘴燒研末敷之贋陸機以為鷲揚雄以為白鷢黃氏以為杜鵑李時珍皆以為誤今按周南朱注云雎鳩水鳥一名王雎狀類鳧鷖想其形不甚大恐非雕類李時珍未必非誤再俟識者治鳥治鳥本草綱目窠表主作履屜治腳氣出雜俎地干寶搜神記云越地深山有治鳥質大如鳩色青色忌穿樹作窠大如五六升器口經數寸飭以土堊赤白相間狀如射候伐木者見此樹即避之犯之則能役虎害人燒人廬舍白日見之鳥形也夜聞其鳴鳥聲也時或作人形長三尺入澗中取蟹就人間火炙食山人謂之越祀之祖又段成式酉陽雜俎云俗說昔有人遇洪水食都樹皮餓死化為此物居樹根者為豬都居樹中者為人都居樹尾者為鳥都鳥都左脅下有鏡印闊二寸一分南人食其窠味如木芝也竊謂獸有山都山𤢖木客而鳥亦有治鳥山蕭木客鳥此皆戾氣所賦同受而異形者歟今附於下木客鳥綱目附録異物志云木客鳥大如鵲千百為群飛集有度俗呼黃白色有翼有綬飛獨高者為君長居前正赤者為五伯正黑者為鈐下緗色雜赤者為功曹左脅有白帶者為主簿各有章色廬陵郡東有之獨足鳥綱目附録一名山蕭鳥廣州志云獨足鳥閩廣有之大如鵠其色蒼其聲自呼臨海志云獨足紋身赤口晝伏夜飛或時晝出群鳥噪之惟食蟲豸不食稻粱聲如人嘯將雨轉鳴即孔子所謂一足之鳥商羊者也山海經云羭次之山有鳥狀如梟人面而一足名曰橐蜚音肥冬則蟄服之不畏雷孫㿐唐韻云𪂅土精也似雁一足黃色毀之殺人翡翠綱目附録魚狗內李時珍云爾雅謂之鷸出交廣南越諸地飲啄水側穴居生子亦巢於木似魚狗稍大或云前身翡後身翠如鵝翠雁翠之義或云雄為翡其色多赤雌為翠其色多青彼人亦以肉作臘食之方書不見用功應與魚狗相同旋目綱目附録鵁鶄內旋目水鳥也生荊郢間大如鷺而短尾紅白色深目目旁毛皆長而旋上林賦云交睛旋目是矣方目綱目附録鵁鶄內方目一名鴋音紡一名澤虞俗名護田鳥西人謂之蝦蟆護水鳥也常在田澤中形似鷗鷺蒼黑色頭有白肉冠赤足見人輒鳴喚不去漁人呼為烏雞閩人訛為姑雞吐綬雞綱目附録鷩雉內李時珍云出巴峽及閩廣山中人多畜玩大如家雞小者如鴝鵒頭鵊似雉羽色多黑雜以黃白圓點如真珍斑項有嗉囊內藏肉綬常時不見每春夏晴明則向日擺之頂上先出兩翠角二寸許乃徐舒其頷下之綬長闊近尺紅碧相間彩色煥爛逾時悉斂不見或剖而視之一無所睹此鳥生亦反哺行則避草木故禽經謂之避株食物本草謂之吐錦雞古今注謂之錦囊蔡氏詩話謂之真珍雞倦遊録謂之孝鳥詩經謂之鷊音厄邛有旨鷊是矣杉雞綱目附録竹雞內臨海異物志云閩越有杉雞常居杉樹下頭上有長黃毛冠頰正青色如垂縷亦可食如竹雞鷑鳩綱目附録伯勞內李時珍云鷑鳩爾雅名鵧鷑音批及又曰台水鴒音匹汲戴勝也一曰鵯鵊訛作批鵊鳥羅願云即祝鳩也江東謂之烏臼音掬又曰鴉鴨小於烏能逐烏三月即鳴今俗謂之駕梨農人以為候五更輒鳴曰架架格格至曙乃止故滇人呼為榨油郎亦曰鐵鸚鵡能啄鷹鶻鳥鵲乃隼屬也南人呼為鳳凰皂隸汴人呼為夏雞古有催明之鳥名喚起者蓋即此也其鳥大如燕黑色長尾有岐頭上戴勝所巢之處其類不得再巢必相鬥不已楊氏指此為伯勞乃謂批鵊為䳾雞俱誤矣月令三月戴勝降於桑
