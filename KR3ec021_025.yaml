body:
  text: 卷之二十四獸部中品毛蟲鹿茸附角骨髓肉腎俱無毒鹿茸出神農本經主漏下惡血寒熱驚癇益氣強志生齒不老角主惡瘡癰腫逐邪惡氣留血在陰中以上朱字神農本經鹿茸療虛勞灑灑如瘧羸瘦四肢痠疼腰脊痛小便利泄精溺血破留血在腹散石淋癰腫骨中熱疽癢骨味甘微熱無毒主安胎下氣殺鬼精物不可近陰令痿久服耐老角味鹹微溫無毒主除小腹血急痛腰脊痛折傷惡血益氣髓味甘溫主丈夫女子傷中絶脈筋急痛咳逆以酒和服之良腎平主補腎氣肉溫補中強五臟益氣力生者療口僻割薄之以上黑字名醫所録地圖經曰舊不載所出州土今有山林處皆有之於四月角欲生時取之以其形如小紫茄者為上或以茄茸太嫩血氣猶未全具不若以分歧如馬鞍者為有力月令云夏至一陰生鹿角解冬至一陽生麋角解麋即鹿之大者也各隨時解落然麋茸利補陽鹿茸利補陰今人類用之殆疏矣麋鹿角自生至堅完無兩月之久大者二十餘斤其堅如石凡骨之類成長無速於此雖草木至易生亦無能及之豈可與凡骨為比也時生夏至後生採初生時取茸七月取角收陰乾及火乾者大好色紫味甘酸性溫收氣氣厚於味陽也臭膻主助陽氣壯筋骨助骨麻勃為之使鹿角杜仲為之使制衍義曰凡使先以薄酥塗勻放烈焰中急灼之若不先以酥塗恐火傷茸俟毛淨微炙入藥用治療唐本注云頭止消渴煎之可作膠服之彌善筋主勞損續絶髓脂主癰腫死肌溫中四肢不隨頭通腠理角主貓鬼中惡心腹疰痛血主狂犬傷鼻衄折傷齒治留血滯氣及鼠瘻心腹痛日華子云鹿茸破瘀血殺鬼精安胎下氣角以火炙熱尉小兒重舌鵝口瘡生肉治偏風左患右貼右患左貼頭肉治煩悶多夢孟詵云頭肉止消渴治夜夢見鬼蹄肉治腳膝疼痛別録云溺利五臟調血脈筋療骨鯁以鹿筋漬之索緊令大如彈丸持筋端吞之候至鯁處徐徐引之鯁著筋出之角燒灰以水塗治竹木刺入肉皮中不過一夕而出補日華子云茸補虛羸腎益中氣安五臟壯陽氣肉益氣力助五臟合治茸酥炙為末空心合酒服方寸匕補男子腰腎虛冷腳膝無力夜夢鬼交精溢自出女人崩中漏血赤白帶下並治之角錯為屑合白蜜五升淹之微火熬令小變曝乾搗篩細末三指一撮合酒服之令人輕身益氣強骨髓補絶傷及婦人夜夢鬼交角燒灰合酒調服方寸匕日三夜一治女子胞中余血不盡欲死者立效角燒灰為末合小豆汁和塗重舌下日三度瘥鹿髓合地黃汁煎作膏填骨髓壯筋骨止嘔吐合蜜煮服壯陽氣令人有子生肉合生椒同搗敷治中風口偏不正如口正速除之血和酒服之治肺痿吐血及崩中帶下血和酒服之充氣血止飢渴腎一對去脂膜切浸豉汁中入粳米二合和煮粥入五味之法調和空腹食之治腎氣虛損耳聾角一具酥炙令焦搗篩細末合酒服方寸匕治腎消小便數角燒末合苦酒調塗治蠼螋尿瘡生角銼搗細末合人乳調一字服治小兒瘧疾先發時服之角為細末合酒調三指撮治男女善夢鬼交及恍惚者角燒為末和豬脂敷丹毒惡瘡角為細末二三方寸匕合蔥豉湯服之治胎死腹中立出蹄四隻燖洗如法熟煮取肉內豉汁中著五味煮熟空腹服之治諸風腳膝疼痛不可踐地角屑二大兩熬令微黃搗末合酒一盞調服方寸匕治腎臟虛冷腰脊痛如錐刺角末和豬脂膏塗之治人面目卒得赤黑丹似疥狀如不急治遍身即死角一枚長五寸合酒二升燒角赤內酒中浸一宿飲之治卒腰痛茸不限多少塗酥炙紫色為末合酒調下一錢匕治腰膝疼痛角灰和酢塗之治馬鞍瘡角燒末合豉汁方寸匕日三服漸加至三錢匕療煩悶腹痛畜血不盡角屑熬令黃赤研酒服方寸匕日五六服治腰痛角五寸燒赤內酒一大升中浸之冷又燒赤又浸如此數過細研空心合酒調服方寸匕治妊娠卒腰痛禁不可嗅其氣能傷人鼻五月勿食鹿肉能傷人解鹿肉能解諸藥毒贋麋茸為僞麋脂角肉骨茸附俱無毒麋脂出神農本經主癰腫惡瘡死肌寒風濕痹四肢拘緩不收風頭腫氣通腠理以上朱字神農本經柔皮膚不可近陰令痿角主痹止血益氣力以上黑字名醫所録名官脂遁脂地陶隱居云生南山山谷及淮海邊今海陵間最多千百為群多牝少牡人言一牡輒交十餘牝交畢即死其脂墮土中經年人得之方好名曰遁脂麋性乃爾淫快不應痿人陰一方言不可近陰令陰不痿此乃有理唐本注云麋茸服之功力勝鹿茸煮為膠亦勝白膠言遊牝畢即死者此亦虛傳遍問山澤人不聞遊牝畢致死者別録云按禮記月令仲夏鹿角解仲冬麋角解日華子謂麋角夏至解誤矣疏曰據熊氏云鹿是山獸夏至得陰而解角麋是澤獸故冬至得陽氣而解角今以麋為陰獸情淫而遊澤冬至陰方退故解角從陰退之象鹿是陽獸情淫而遊山夏至得陰而解角從陽退之象也用脂肉骨茸味辛性溫散氣氣厚於味陽也臭膻主補虛損益陽道反畏大黃治療日華子云治風氣孟詵云茸作粉服治丈夫冷氣及風筋骨疼痛別録云脂治年少氣盛面生疱瘡塗之即瘥補日華子云角添精補髓益氣血暖腰膝悅色壯陽及治腰膝不仁補一切血病孟詵云肉益五臟不足氣骨補虛勞合治骨煮汁釀酒飲之令人肥白美顏色角截五寸破炙令黃香為末合酒空腹調服三錢匕補虛勞填骨髓及卒心痛茸作粉合漿水調塗面令不皺光華可愛茸五兩去毛塗酥炙微黃為末合清酒二升於銀鍋中慢火熬成膏瓷器盛每服半匙溫水調下空心或食前服之治老人骨髓虛竭甚驗禁肉多食令人弱房及髮腳氣忌肉不與雉肉同食及魚蝦生菜梅李果實同食皆病人白膠附鹿角霜俱無毒熬煉成白膠出神農本經主傷中勞絶腰痛羸瘦補中益氣婦人血閉無子止痛安胎久服輕身延年以上朱字神農本經療吐血下血崩中不止四肢痠疼多汗淋露折音舌跌音迭傷損煮鹿角作之以上黑字名醫所録名鹿角膠黃明膠地雷公云鹿出雲中山捕得取其角須全戴者並鋸長三寸許以物盛於急水中浸之一百日滿出用刀削去粗皮一重了拭去水垢令淨然後用醶醋煮七日旋旋添醋勿令火歇戌時不用著火只從子時至戌時也日足其角白色軟如粉即細搗作粉卻以無灰酒煮其膠削了重研篩過用每修事十兩以無灰酒一鎰煎乾為度也今熬膠之法採鹿年歲久其角堅好新鮮全具者先用本鹿天靈蓋及皮同裹之安室上一宿以歸魂也後將角鋸成段子長二三寸許以竹籃盛於長流水中浸三七漉出清水洗去垢穢以大鍋一口用桑木篦子安鍋底內卻用桑皮鋪於篦子上層層鋪角注長流水八分再旋旋添水煮一日候角軟乘熱削去粗皮每角十斤用人參茯苓各四兩楮實子八兩仍於鍋內如前安桑木篦勿令著鍋底篦子上鋪桑白皮一層卻將鹿角層層鋪注長流水八分以人參茯苓楮實子用夏布袋盛之同入鍋內下用桑柴火再旋旋添水慢煮至三日夜或五日夜七日夜候角內虛白漉出角則成霜矣卻將原煮角汁水再用細絹袋濾過於銀器內盛之以重湯鍋內微火慢慢熬至稠黏黃黑色者即成膠也收陰乾用明淨者佳色黃黑味甘性平緩氣氣厚於味陽也臭腥主補中益氣助得火良反畏大黃治療藥性論云能安胎去冷氣止吐血及漏下赤白別録云敷瘡腫四邊中心留一孔其腫即起頭而自開也凡腫已潰未潰者以膠一片水漬令軟納納然隨腫大小貼當頭上開孔若已潰還合者膿當被膠急撮之膿皆出盡未有膿者膿當自消矣膠三兩水二升煮取一升四合分二服治尿血膠水煎令稀稠得所待冷塗湯火瘡補藥性論云主男子腎臟氣衰勞損婦人服之令有子合治以膠炙令半焦為末一錢匕合人參末二錢匕薄豉湯一盞八分蔥少許入銚子煎一二沸服治咳嗽不瘥者每呷三五口其嗽漸止膠一兩切作小片子炙令黃合新綿一兩燒作灰細研每服一錢匕新米飲調下臨臥服之治吐血咯血立效干膠三兩炙搗細末合酒二升溫服治虛勞尿精膠炙搗為末合酒服方寸匕日三服補虛勞益髓長肌悅顏色令人肥健膠二兩合酒煮消盡頓服之治妊娠卒下血膠慢火炙為末合酒調服一錢療小兒面上瘡豆子瘢已出者服之無瘢未出者服之瀉下羖羊角無毒附髓膽肺心腎齒肉骨屎胎生羖羊角出神農本經主青盲明目殺疥蟲止寒泄辟惡鬼虎狼止驚悸久服安心益氣輕身以上朱字神農本經療百節中結氣風頭痛及蠱毒吐血婦人産後余痛燒之殺鬼魅闢虎狼羊髓味甘溫無毒主男女傷中陰氣不足利血脈益經氣以酒服之青羊膽主青盲明目羊肺補肺主咳嗽羊心主憂恚膈氣羊腎補腎氣益精髓羊齒主小兒羊癇寒熱三月三日取羊肉味甘大熱無毒主緩中字乳余疾及頭腦大風汗出虛勞寒冷補中益氣安心止驚羊骨熱主虛勞寒中羸瘦羊屎燔之主小兒泄痢腸鳴驚癇以上黑字名醫所録地圖經曰羖羊即青羝羊也亦謂之羖䍽羊出河西川穀今河東陝西及近都州郡皆有之羊之種類亦多然有灰褐及黑白色者毛長尺余北人引大羊多以此為群首齒骨及五臟各有主疾之功其角入藥唯以青羝羊為佳余不堪用取時勿令中濕濕則有毒也時生無時採無時收陰乾勿令中濕用角髓膽肺心腎齒肉骨屎色青白味鹹苦性溫一云微寒氣氣薄味厚陰中之陽臭膻主明目止驚助菟絲子為之使制凡使燒灰存性用或鎊屑用之治療唐本注云屎煮湯灌下治大人小兒腹中諸疾疳濕大小便不通燒之熏鼻治中惡心腹刺痛及熏諸瘡中毒痔瘻肝治肝臟風虛熱目赤暗無所見子肝生食七枚神效頭療風眩瘦疾及小兒驚癇血主女人中風血虛悶及産後血暈悶欲絶者生飲一升即活藥性論云青羊肝明目膽點眼中治赤障白膜風淚日華子云牯羊角退熱及治山瘴溪毒燒之祛蛇肉治腦風及大風頭治骨蒸腦熱頭眩明目小兒驚癇脂治遊風並黑䵟牯羊糞燒灰治聤耳並罯刺孟詵云肉治風眩瘦病小兒驚癇角燒灰治鬼氣下血別録云角燒灰治鬼氣及漏下惡血頭肉主緩中汗出虛勞安心止驚及治熱風眩疫疾丈夫五勞骨熱肝治目赤暗痛及熱病後失明者以青羊肝或子肝薄切水浸貼之極效生子肝吞之尤妙肚盛水令滿系兩頭熟煮開取水頓服之療尿床即瘥眼睛曝乾為末敷目赤及翳甚效糞燒灰淋取汁洗之治發不生三日一洗不過十度即生肉不經水取鮮者貼被打頭青腫處瘥新羊血乘熱飲二升治卒驚悸九竅血出立止肉如作脯法炙令香及熱拓白禿瘡不過三四日瘥膽治熱病後失明旦暮各一敷之效肥羊肉肥脂及諸般肥肉食之裹出誤吞釘並箭金針錢等物新羊血一盞飲之三兩服治産後余血攻心或下血不止心悶面青身冷氣欲絶者妙補日華子云腎補虛耳聾陰弱壯陽益胃止小便虛損盜汗肉開胃肥健陳藏器云羊五臟補人五臟孟詵云肚主補胃小便數別録云角安心益氣頭肉補胃虛損及丈夫五勞骨熱肚補胃病虛損小便數止虛汗合治羖羊角燒灰合酒調服治産後惡血煩悶及治小兒驚癇青羊膽合醋服之治疳濕時行熱熛瘡良肺合小豆葉煮食之療渴止小便數腎合脂為羹療勞痢甚效腎合蒜齏食之消癥瘕屎燒灰合雁肪塗頭生髮毛合醋煮之裹腳治轉筋屎內鯽魚腹中瓦缶固濟燒灰以塗髭發令易生而黑甚效羊胃一枚白朮一升並切以水二斗煮取九升一服一升日三服治久病瘦羸不生肌肉水氣在脅下不能飲食四肢煩熱者甚佳肉一斤合當歸四兩生薑五兩以水一斗二升煮熟取七升去肉內諸藥煮取三升一服七合日三夜一補虛勞不足産後腹中激痛羖羊肝一斤去脂膜切薄片以新瓦盆一個揩淨鋪肝於盆中置於炭火上爆令脂汁盡候極干取決明子半斤蓼子一合炒令香為末和肝杵為末以白蜜漿下方寸匕食後服之日三服治目失明極效熟羊頭眼睛中白珠子二枚於細石上和棗汁研之取如小麻子大安眼睛上仰臥日夜各二治常患眼痛澀不能視物及看日光燈火不得者不過三四度即瘥糞和雁膏敷毛髮落者三宿即生羖羊角屑微炒搗羅為末不計時候合溫酒調下一錢匕治心煩恍惚腹中痛或時悶絶而復蘇甚效干羊屎燒灰合豬脂搗爛治木刺入肉不得出塗之立出羖羊角燒為灰研令極細以雞子清和塗治面目身癢得赤斑或癢或瘭子腫起不即治之日甚害人羖羊膽一枚合酒二升煮三沸療面多皯𪒟如雀卵色日三塗效青羊肝合醋煮食之治目暗黃昏不見物羊腎一雙炮去脂細切於豉汁中合五味米糅如常法作羹食之治勞損精竭白羊頭一枚煮熟切於豉汁中合五味調和食之治脾胃氣冷食入口即吐出羖羊角燒為末合酒服方寸匕療産後寒熱心悶極脹肉合生姜作湯治寒疝極效禁白羊黑頭者食之令人患腸癰獨角羊不可食六月食羊傷神心有孔者殺人熱病後食之令人發熱困重致死妊娠及宿有冷病人亦勿多食解蠱毒忌肝不可與豬肉及梅子小豆同食之傷人心大病人頭中髓發風與酒服則迷人心令人中風羊乳羊乳補寒冷虛乏名醫所録地陶隱居云羊乳實為補潤故北人多食皆肥健唐本注云北人肥健不啖咸腥方土使然何關飲乳陶以未達故屢有此言也時生無時採無時收瓷器收貯色白味甘性溫氣氣厚於味陽中之陰治療藥性論云潤心肺止消渴日華子云利大腸含療口瘡小兒驚癇孟詵云治卒心痛溫服之別録云治蚰蜒入耳以乳灌耳中即化成水止小兒噦以乳一升煎減半分五服牛乳亦得治小兒舌腫乳汁飲之瘥止乾嘔以乳一杯空心飲之療漆瘡以乳敷之治蜘蛛咬遍身生絲以乳一件飲之及蜘蛛咬致人腹大如孕飲不過數日而愈補陶隱居云潤肌膚體肥健陳藏器云補虛弱別録云補虛勞益精氣合治乳合脂作羹食補腎虛及治男子與女子中風瘥牡狗陰莖無毒附膽心齒骨蹄血肉腦胎生牡狗陰莖出神農本經主傷中陰痿不起令強熱大生子除女子帶下十二疾以上朱字神農本經膽苦平主明目痂瘍惡瘡心主憂恚氣除邪腦主頭風痹下部䘌瘡鼻中息肉齒性平主顛癇寒熱卒風痱伏日取之頭骨性平主金瘡止血四腳蹄性平煮飲之下乳汁白狗血味鹹性溫無毒主顛疾發作肉味鹹酸溫主安五臟補絶傷輕身益氣屎中骨主寒熱小兒驚癇以上黑字名醫所録名狗精地陶隱居云舊不載所出州土今處處有之其種腳上別有一懸蹄人呼為犬者是也白狗烏狗皆入藥用惟正黃色者溫補余色者微補為不及也時採六月上伏取收陰乾百日用陰莖頭骨膽心腦齒肉四腳蹄血屎中骨味咸性平氣味厚於氣陰中之陽臭腥主強陰治療陶隱居云白狗骨燒末療諸瘡瘻及妒乳癰腫唐本注云骨燒灰主下痢生肌敷馬瘡烏狗主血難産橫生血上搶心下頷骨治小兒諸癇陰卵燒灰主婦人十二疾毛主産難白狗糞治疔瘡藥性論云膽治鼻齆及鼻中息肉日華子云陰莖治婦人陰瘻膽主撲損瘀血及刀箭瘡心療狂犬咬除邪氣風痹及鼻衄下部瘡齒燒為末湯調服治小兒客忤孟詵云膽去腸中膿水別録云膽汁注目中治眼癢急赤澀頭骨燒煙燻治附骨疽及魚眼瘡黃狗皮炙裹腰痛處取暖徹為度白犬骨燒研為末以水服方寸匕治産後煩悶不能食骨炙黃焦搗為末飲服方寸匕日三服治久下痢不止者名休息痢猘犬咬人即殺所咬犬取腦敷之後不復發白犬頭取熱血一升飲之治鬼擊之病卒著如刀刺狀胸脅腹內絞痛不可抑按或即吐血衄血下血立效骨煮湯摩頭上療小兒桃李鯁活狗膽治左膝瘡癢華他視之以膽塗瘡口須臾有蟲若蛇從瘡口出長二三尺病即愈補陶隱居云黃狗肉大補虛日華子云陰莖續絶陽頭骨燒灰壯陽氣血安五臟肉益胃氣暖腰膝壯陽氣補虛勞益氣力陳藏器云肉益腰腎起陽道骨煎汁為粥食之令婦人有子別録云陰莖益髓肉溫五臟補五勞七傷填骨髓大補氣力空腹食之佳合治頭骨燒灰為末合乾薑莨菪焦炒見煙為丸治久痢及勞痢以白飲空心下十丸極效屎合臘月豬脂敷瘻瘡及敷溪毒疔腫肝合生姜醋作湯治腳氣攻心服之當泄其邪若大便不實者勿服之膽合酒服之明目膽半個合酒治中傷因損調服之瘀血盡下頭骨燒灰為末每日空心合酒調服一錢匕治婦人赤白帶下狗牙燒灰合酢調敷馬鞍瘡毛細剪以膠煬塗湯火燒瘡痛不可忍肉半斤合米鹽豉等煮粥頻食一兩頓治脾胃虛弱腸中積冷腹脹刺痛神驗肉一斤細切和米煮食之治水鼓脹浮腫作羹臛吃亦佳禁狗肉不可炙食恐成消渴疾狗瘦者多是病不堪食諸犬春月目赤鼻燥欲狂猘者不宜食妊娠不可食犬肉令兒無聲自死舌不出者食之害人九月勿食犬肉能損神忌不與蒜同食食之損人白狗血合白雞肉白鵝肝白羊肉烏雞肉蒲子羹等病人皆不可食羚羊角無毒胎生羚羊角出神農本經主明目益氣起陰去惡血注下闢蠱毒惡鬼不祥安心氣常不魘寐久服強筋骨輕身以上朱字神農本經療傷寒時氣寒熱熱在肌膚溫風注毒伏在骨間除邪氣驚夢狂越僻謬及食噎不通起陰益氣利丈夫以上黑字名醫所録地圖經曰出石城山谷及華陰山今秦隴龍蜀金商諸州山中皆有之其形似羊色青而大角細長四五寸至堅徑多節緊深鋭文細而有掛痕者真其痕因羚羊夜宿不著地以角掛木故也或云其角有文疏大長一二尺似吳羊角置耳邊聽之集集鳴者皆非也今取他角附耳亦皆有聲不如掛痕一說盡矣此亦多僞不可不察有獏齒僞佛牙誑俗以此擊之則碎時生無時採無時收用紙包裹勿失元氣用角色白味鹹苦性微寒氣氣薄味厚陰中之陽臭膻主清肝明目除熱鎮驚制雷公云凡修事之時勿令單用不復有驗須要不拆元對以繩縛之將鐵鎊旋旋鎊取用勿令犯風鎊未盡處須三重紙裹恐力散也鎊了搗細重篩更研萬匝了入藥用之更妙免刮人腸也治療唐本注云角治溪毒及驚悸煩悶臥不安心胸間惡氣毒瘰癧肉治蛇咬惡瘡藥性論云角燒灰治小兒驚癇及山瘴能散惡血並噎塞不通孟詵云角治中風筋攣附骨疼痛生摩水塗腫上及惡瘡別録云角治傷寒熱毒下血及疝氣末服之即瘥産後心悶不識人汗出燒末以東流水服方寸匕未瘥再服又血氣逆心煩滿胸脅痛及腹痛煩滿燒末水服方寸匕角中骨治小兒洞下痢燒末飲服方寸匕合治角燒灰合酒服治一切熱毒風攻注中惡毒風卒死昏亂不識人散産後血衝心煩悶角屑作末合蜜服治卒熱悶及熱毒痢並血痢角一枚刮尖為末合酒服方寸匕令易産肉內五味子酒中治中風筋骨急強贋山驢角羱羊角為僞犀角無毒胎生犀角出神農本經主百毒蠱疰邪鬼瘴氣除邪不迷惑魘寐久服輕身駿健以上朱字神農本經療傷寒瘟疫頭痛寒熱諸毒氣以上黑字名醫所録名通天犀烏犀南犀川犀分水犀黃犀毛犀牯犀胡帽犀兕犀黔犀奴角駭雞犀食角墮羅犀地圖經曰出永昌山谷及益州南海者為上黔蜀者次之其形似牛豬首大腹卑腳腳有三蹄色黑好食棘其皮每孔三毛頂生一角或云有二角三角者生鼻上為食角為奴角為胡帽犀在額為兕犀也牯犀亦有二角皆為毛犀今人多傳一角之說此數種俱有粟文且犀無水陸二種並以精粗為貴賤川犀南犀文理皆細烏犀有顯文黃犀文絶少皆不及西番所出文高兩腳顯也物像黃而外黑者為正透物像黑而外黃者為倒透通天犀生腦上千歲者長且鋭白星徹端黃黑分明有兩腳滑潤端能出氣通神故曰通天人刻為魚銜入水中開水三尺故曰分水犀以此盛米雞不敢啄故曰駭雞犀其文理絶好者有百物奇異之形所以犀飲濁水不欲形影照見故也鹿取茸犀取尖其精鋭之力在於此耳時生無時採無時用角色黑味苦酸鹹性寒泄氣氣薄味厚陰中之陽臭朽主鎮心神大熱助松脂為之使反惡萑菌雷丸制雷公云凡修治之時鎊其屑入臼中搗令細再入鉢中研萬匝方入藥中用之歸田録云近人氣久則易碎治療唐本注云犀肉治諸蠱蛇獸咬毒藥性論云犀角辟邪精鬼魅中惡毒氣散風毒及治發背癰疽瘡腫化膿水並時疾熱如火煩悶毒入心中狂言妄語日華子云犀角治心煩止驚退熱消痰鎮肝明目解山瘴溪毒並中風失音熱毒及時氣發狂海藥云犀角治風毒攻心毷氉熱悶壅毒赤痢小兒麩豆風熱驚癇食療云角治赤痢燒灰為末和水服之又卒中惡心痛及熱毒筋骨中風心風煩悶治小兒驚熱以水磨汁服之肉治瘴氣百毒蠱疰邪鬼除客熱頭痛及五痔及諸血痢別録云雉肉作臛食之吐下用生犀角末新汲水調服方寸匕即瘥又蠼螋尿瘡磨塗之又小兒驚癇不知人迷悶嚼舌仰目以犀角末半錢匕和水服之補日華子云犀角安五臟補虛勞禁犀角妊娠勿服能消胎氣肉不宜多食若食過多令人煩即取麝香少許和水服之即散解角解諸飲食中毒及藥毒若服藥過劑及中毒煩悶欲死者以犀角燒末水服方寸匕即瘥又殺鉤吻鴆羽蛇毒忌鹽虎骨無毒附膏爪肉胎生虎骨主除邪惡氣殺鬼疰毒止驚悸主惡瘡鼠瘻頭骨尤良膏主狗齧瘡爪辟惡魅肉味酸平無毒主噁心欲嘔益氣力名醫所録地圖經曰本經不載所出州土今山林處多有之骨用頭及脛色黃者佳睛亦多僞須自獲者乃真爪並指骨毛存之以系小兒臂辟惡鬼此數物皆用雄虎者為勝鹿虎之類凡是藥箭射死者不可入藥蓋藥毒浸漬骨肉間猶能傷人也陳藏器云虎威令人有威帶之臨官者佳無官反為人所憎威有骨如乙字長一寸在脅兩傍破肉取之尾端亦有不如脅者眼光乃虎夜視以一目放光一目看物獵人候而射之弩箭才及目光隨墮地得之如白石者是也衍義曰頭脛與脊骨入藥陳藏器所注一骨之事及射之目光墮地如白石之說必得之於人終不免其所誣也人或問曰風從虎何也風木也虎金也木受金制焉得不從故呼嘯則風生自然之道也所以治風攣急屈伸不得走注癲疾驚癇骨節風毒等乃此義爾時生無時採無時用骨牙膽鼻爪膏肉屎中骨屎眼睛眼光色黃白味辛性微熱散氣氣之厚者陽也臭腥主骨節痛風癲疾驚癇制雷公云虎睛先於羊血中浸一宿漉出微微火上焙之干搗成粉虎骨去肉膜塗酥炙令黃熟研細入藥用治療陶隱居云虎頭作枕辟惡魘以置戶上闢鬼鼻懸戶上令生男骨雜朱書符辟邪須治齒痛爪懸小兒臂上辟惡鬼唐本注云屎敷惡瘡及鬼氣眼睛治癲疾屎中骨為屑治火瘡牙治丈夫陰瘡及疽瘻鼻除癲疾及小兒驚癇肉及皮止瘧骨煮汁浴小兒去瘡疥鬼疰驚癇眼光去驚邪辟惡鎮心膽治小兒驚癇藥性論云骨治筋骨毒風攣急屈伸不得走疰疼痛及尸疰腹痛溫瘧並傷寒溫氣日華子云睛鎮心及小兒驚啼疳氣客忤孟詵云肉食之闢三十六種精魅眼睛治瘧病辟惡小兒熱驚悸膽治小兒疳痢驚神不安研水服之骨煮湯浴去骨節風毒膏內下部治五痔下血丹溪云虎骨治痿別録云虎骨治骨鯁為末水服方寸匕又肛門凸出燒末水服方寸匕又痢久下經時不愈者名休息取虎骨炙令黃焦搗末飲服方寸匕日三即愈虎睛治小兒驚癇掣瘲細研水調灌服之虎脂以消令凝每日三四次塗之治小兒頭瘡不瘥合治虎脛骨二大兩粗搗熬黃合羚羊角一大兩屑新芍藥二大兩切細三物以無灰酒浸之春夏七日秋冬倍之每旦空腹飲一杯治臂脛痛不計深淺皆效冬中速要服即以銀器物盛火爐中暖養之三兩日即可服虎腰脊骨一具細銼訖又以斧於石上更捶碎又取前兩腳全骨如前細捶之兩件並於鐵床上以大炭火勻炙翻轉候待脂出甚則投濃美無灰酒中密封春夏二七日秋冬三七日每日空腹隨飲性多則多飲性少則少飲未飯前三度溫飲之治腰腳不隨不拘年深年淺者服此甚效又方以虎脛骨五六寸淨刮去肉膜等塗酥炙令極黃熟細搗絹袋子盛以酒一斗置袋子於瓷瓶中然後以糖火微煎至七日後任情飲之當微利即瘥虎脛骨煮作湯浴之或合醋浸治腰膝急疼筋骨風急痛虎骨合通草煮汁空腹服半升覆蓋臥少時汗即出治筋骨節急痛虎頭骨一具塗酥炙黃捶碎絹袋盛合酒二斗浸五宿隨性多少暖飲之治歷節風百節疼痛不可忍虎屎白者以馬屎和之曝乾燒灰敷治熛疽著手足肩背纍纍如米起色白刮之汁出愈而復發者虎脛骨塗酥炙合黑附子炮裂去皮臍各一兩為末每服溫酒調下二錢匕治白虎風走注疼痛兩膝熱腫虎牙虎頭骨刮取末合酒服方寸匕治猘犬咬人發狂如犬虎脛骨兩節合蜜二兩炙令赤搗末蒸餅糊丸如桐子大每服清晨溫酒下二十丸治大腸痔漏並脫肛虎頭骨二兩搗碎合豬脂一斤熬以骨黃取涂月蝕瘡眼睛一隻為散合竹瀝調少許治小兒夜啼禁正月勿食虎肉解殺犬咬毒忌不可熱食虎肉恐傷齒小兒齒生未足不可與食恐齒不生兔頭骨無毒附腦肝肉胎生兔頭骨主頭眩痛癲疾骨味甘主熱中消渴腦主凍瘡肝主目暗肉味辛平無毒主補中益氣名醫所録名玩月砂屎名地圖經曰舊不著所出州土今處處有之為食品之珍蓋兔止有八竅感氣而生子從口出故妊娠禁食之衍義曰兔有白毛者全得金之氣也入藥尤功余兔至秋深時則可食金氣全也才至春夏其味變取四腳肘後毛為逐食飼雕鷹至次日卻吐出其意欲腹中逐盡脂肥使飢急則捕逐速爾時生無時採無時用骨肉腦肝色白味甘性平氣氣之薄者陽中之陰臭腥主癲疾制為末或燒灰用治療圖經曰髓及膏治耳聾毛煎湯洗豌豆瘡燒灰敷灸瘡久不瘥者腦月兔頭並皮毛治天行嘔吐不下食燒令煙盡擘破作黑灰搗羅之以飲汁服方寸匕則下食不瘥更服燒之勿令火耗唐本注云頭皮除鬼疰毒氣在皮中如針刺者及鼠瘻兔肉治熱氣濕痹藥性論云腦月兔作醬食去小兒豌豆瘡日華子云頭骨和毛髓燒為丸催生落胎併産後余血不下兔骨塗瘡疥刺風及鬼疰肝明目及治頭旋眼疼肉止渴健脾別録云兔腦生塗手足皸裂成瘡兔頭骨除消渴飲水不知足以一具水煮取汁飲之臘月兔頭治發腦發背及癰疽熱癤惡瘡以細銼入瓶內密封惟久愈佳塗帛上厚封之熱痛敷之如冰頻換瘥及治産後陰下脫燒兔頭灰敷之補陶隱居云兔肉為羹食之益人日華子云肝補勞合治兔肝合決明子作丸服之明目及治丹石人上衝眼暗不見物兔皮毛同燒為灰合酒服治産後胞衣不出余血搶心脹欲死者骨合醋摩敷久疥不瘥兔頭燒灰合酒服治難産兔骨合大麥苗煮汁服治消渴羸瘦小便不禁兔皮燒令煙絶為末合酒服方寸匕治婦人帶下以瘥為度月望夕取兔屎內蝦蟆腹中合燒為灰作末敷大人小兒卒得月蝕瘡兔腹下白毛燒膠塗於毛上貼火瘡已破者待毛落即瘥臘月兔頭腦髓一個攤於紙上令勻候乾剪作符子於面上書生字一個覺母陳痛時用母叉子股上夾定燈焰上燒灰盞盛之煎丁香酒調下能易産滑胎玩月砂不限多少漫火熬令黃色為末每二錢入乳香半錢空心溫酒調下治痔漏下血疼痛不止日三四服瘥禁兔肉妊娠不可食食之令子唇缺多食損人元氣及陽事絶人血脈凡兔死眼合者食之殺人二月亦不宜食兔能傷神忌不可與白雞肉同食令人面色痿黃與獺肉食之令人病遁尸與姜橘同食令人卒患心痛不可治與乾薑同食成霍亂解兔肉生吃壓丹石毒筆頭灰無毒筆頭灰主小便不通小便數難陰腫中惡脫肛淋瀝燒灰水服之名醫所録用兔毫年久使之者良性微寒氣氣之薄者陽中之陰主利小便治療別録云治喉中腫痛不得飲食燒灰漿飲下方寸匕合治燒灰合酒服治男子交婚之夕莖痿敗筆頭一枚燒灰細研為末合生藕汁一盞調下能催生及難産若産母虛弱及素有冷疾者恐藕性冷動氣即於銀器內重湯暖過服之妙貍骨無毒附陰莖貓貍骨主風疰尸疰鬼疰毒氣在皮中淫躍如針刺者心腹痛走無常處及鼠瘻惡瘡頭骨尤良肉療諸疰陰莖主月水不通男子陰㿗燒之以東流水服之名醫所録地圖經曰本經不載所出州士今處處有之其形似貓種類甚多以虎斑文者堪用貓斑者不佳皆當用頭骨南方一種香貍人以作膾食若北地狐食法其氣甚香微有麝氣雍州以南一種風貍似兔而短多棲息於高木候風吹而過他木其溺如乳甚難取人久養之始可得也衍義曰其形類貓紋色有二如連錢如虎斑紋者皆可入藥其肉味如狐不相遠江西一種牛尾貍其尾如牛人多糟食未聞入藥宜當辨也時生無時採無時用骨肉陰莖糞溺質類貓而有虎斑色黃黑味甘性溫緩氣氣厚味薄陽中之陰臭臊主尸疰惡瘡治療圖經曰肉及骨治痔疾疼痛可作羹臛食之不可與酒同食陶隱居云肉治鼠瘻唐本注云屎燒灰止寒熱鬼瘧發無時度風貍溺除諸風藥性論云頭骨炒末治噎病不進飲食日華子云肉及頭骨祛遊風別録云貍頭治鼠瘻鼠齧瘡貓治鼠瘻腫核痛已有瘡口膿血出者取一物作羹如食法空心服之瘥貓屎塗蠍螫人痛處貍頭燒作灰合酒二錢匕治痔病及一切不止風並尸疰腹痛邪氣骨炙合麝香雄黃為丸服治痔及瘻瘡貍頭蹄骨並塗酥炙令黃搗羅為散每日空心合粥飲調下一錢匕治瘰癧腫硬疼痛時正月勿食肉食野鳥肉中毒久不瘥食之傷神燒骨灰服之獐骨無毒附肉髓胎生獐骨主虛損泄精肉溫補益五臟髓益氣力悅澤人面名醫所録地圖經曰本經不載所出州土今陂澤淺草中多有之亦呼為麇獐之類甚多麇其總名也有有牙者有無牙者用之皆同然其牙不能噬齧崔豹古今注云獐有牙而不能噬鹿有角而不能觸是也其肉自八月以後至十一月以前食之勝於羊肉十二月至七月不宜食道家以獐鹿肉羞為白脯食之言其無禁忌者蓋野獸之中惟獐鹿生則不膻腥又非辰屬八卦而兼能溫補於人故也時生無時採無時用骨肉髓腦色黑黃味甘性微溫氣氣厚味薄陽中之陰治療別録云肉作臛治乳無汁與食之勿令婦人知補日華子云骨補虛損益精髓悅顏色臍中香治一切虛損合治獐鹿二肉剖如厚脯炙令熱拓淹瘤病可三四易攪痛出膿便愈不除更炙新肉用之良禁十二月至七月食之動氣若瘦惡者食之發痼疾忌肉不可合鵠肉同食成症痼豹肉無毒附貊胎生豹肉主安五臟補絶傷輕身益氣久服利人名醫所録地圖經曰本經不載所出州土今河洛唐郢間或有之豹有數種有赤豹詩云赤豹黃羆陸機疏云尾赤而文黑謂之赤豹有玄豹山海經云幽都之山有玄虎豹豹有白豹爾雅云貘音與豹同白豹也郭璞注云似熊小頭卑腳黑白相駁能舐食銅鐵及竹骨節強直中實少髓皮闢濕人寢其皮可以驅溫癘或曰豹白色者別名貘古方鮮有用者今黔蜀中時有豹象鼻犀目牛尾虎足土人鼎釜多為所食頗為山居之患亦捕以為藥其齒骨極堅以刀斧椎鍛鐵皆碎落火亦不能燒人得之詐為佛牙佛骨以誑俚俗唯羚羊角擊之則碎衍義曰毛赤黃其文黑如泉而中空比比相次此獸猛捷過虎故能安五臟續絶傷輕身又有土豹毛更無紋色亦不赤其形亦小此各自有種也時生無時採無時用肉頭骨脂味酸性平氣味厚於氣陰中之陽臭腥主強志益氣治療圖經曰頭骨燒灰淋汁沐頭去風屑脂可合生發藥朝塗而暮生唐本注云豹除鬼魅邪神補日華子云肉壯筋骨強志氣令人猛健孟詵云肉久食令人耐寒暑食療云肉食之益人合治豹鼻合狐鼻煮食之治狐魅禁正月食之傷神多食令人性粗獅子屎無毒胎生獅子屎燒之去鬼氣服之破宿血殺蟲名醫所録謹按物理論云獅子名狻猊為獸之長也其形似虎正黃色有鬣微紫銅頭鐵額鉤爪鋸齒攝目跪足目光如電聲吼如雷尾端茸毛黑色大如升捻之中有鉤向下能食虎豹其牝者形色不異但無鬣耳所産之地多畜之因以名國蓋賢君德及幽遠而出者也然其品類不啻七十餘種今撒麻罕所貢馴養天柙者色狀正符物理所云名狻猊時採無時收陰乾用屎毛色赤黑臭臭治療毛治鬼瘧囊盛佩之四種陳藏器余犢子臍屎主卒九竅中出血燒末服之方寸匕新生未食草者預取之黃犢為上姚氏方人有九竅四肢指岐間血出乃暴驚所為取新生犢子未食草者臍屎日乾燒末水服方寸匕日四五頓瘥又云口鼻出血亦良靈貓陰味辛溫無毒主中惡鬼氣飛尸蠱毒心腹卒痛狂邪鬼神如麝用之功似麝生南海山谷如貍自為牝牡亦云蛉貍異物志云靈貍一體自為陰陽刳其水道遭囊以酒灑陰乾其氣如麝若雜真香罕有別者用之亦如麝焉震肉無毒主小兒夜驚大人因驚失心亦作脯與食之此畜為天雷所霹靂者是鼠邑鼠邑獸名也亦作𥝃扶佛切無毒飲其血令人見鬼也亦堪染緋發可為頭髮出西南夷如猴宋孝建中獠子以西波尸地高城郡安西縣主簿韋文禮進雌雄二頭宋帝曰吾聞鼠邑鼠邑能負千鈞若既力如此何能致之彼土人丁鑾進曰鼠邑鼠邑見人喜笑則上唇掩其目人以釘釘著額任其奔馳候死而取之發極長可為頭髮血堪染靴其毛一似獼猴人面紅赤色作人言馬聲或作鳥聲善知生死飲其血使人見鬼帝聞而欣然命工圖之亦比山海經爾雅云狒狒如人被髮迅走食人亦曰梟羊彼俗亦謂之山都郭景純有贊文繁不載脯帶脂者薄割火上炙熱於人肉敷癬上蟲當入脯中候其少頃揭卻須臾更三五度瘥
