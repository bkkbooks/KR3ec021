body:
  text: 脈訣考證脈訣非叔和書晦庵朱子曰古人察脈非一道今世惟守寸關尺之法所謂關者多不明獨俗傳脈訣詞最鄙淺非叔和本書乃能直指高骨為關然世之高醫以其書贋遂委棄而羞言之跋郭長陽書東陽柳貫曰王叔和撰脈經十卷為醫家一經今脈訣熟在人口直謂叔和所作不知叔和西晉時尚未有歌括此乃宋之中世人僞託以便習肄爾朱子取其高骨為關之說不知其正出脈經也廬陵謝縉翁曰今稱叔和脈訣不知起於何時宋熙寧初校正脈經尚未有此陳孔碩始言脈訣出而脈經隱則脈訣乃熙寧以後人作耳惟陳無擇三因方言高陽生剽竊作歌訣劉元賓從而和之其說似深知脈經者而又自著七表八里九道之名則陳氏亦未嘗詳讀脈經矣河東王世相曰診候之法不易精也軒岐微蘊越人叔和撰難經脈經猶未盡泄其奧五代高陽生著脈訣假叔和之名語多抵牾辭語鄙俚又被俗學妄注世醫家傳戶誦茫然無所下手不過藉此求食而已於診視何益哉云間錢溥曰晉太醫令王叔和著脈經其言可守而不可變及托叔和脈訣行而醫經之理遂微蓋叔和為世所信重故假其名而得行耳然醫道之日淺未必不由此而誤之也七表八里九道之非金陵戴起宗曰脈不可以表裡定名也軒岐越人叔和皆不言表裡脈訣竊叔和之名而立七表八里九道為世大惑脈之變化從陰陽生但可以陰陽對待而言各從其類豈可以一浮二芤為定序而分七八九之名乎大抵因浮而見者皆為表因沉而見者皆為里何拘於七八九哉廬山劉立之以浮沉遲數為綱以教學者雖似捷徑然必博學反約然後能入脈妙若以此自足亦畫矣攖寧滑壽曰脈之陰陽表裡以對待而為名象也高陽生之七表八里九道蓋鑿鑿也求脈之明為脈之晦謝氏曰脈經論脈二十四種初無表裡九道之目其言芤脈雲中央空兩邊實云芤則為陰而脈訣以芤為七表屬陽雲中間有兩頭無仲景脈法云浮大數動滑為陽沉澀弱弦微為陰而脈訣以動為陰以弦為陽似此背誤頗多則脈訣非叔和書可推矣草廬吳澄曰俗誤以脈訣為脈經而王氏脈經知者或鮮脈書往往混牢革為一夫牢為寒實革為虛寒安可混乎脈之浮沉虛實緊緩數遲滑澀長短之相反匹配自不容易況有難辨如洪散俱大而洪有力微細俱小而微無力芤類浮而邊有中無伏類沉而邊無中有若豆粒而搖搖不定者動也若鼓皮而如如不動者革也俱對待也又有促結代皆有止之脈促疾結緩故可為對代則無對總之凡二十七脈不止於七表八里九道二十四脈也詳文集瀕湖李時珍曰脈經論脈止有二十四種無長短二脈脈訣歌脈亦有二十四種增長短而去數散皆非也素難仲景論脈只別陰陽初無定數如素問之鼓搏喘橫仲景之惵平榮章綱損縱橫逆順之類是也後世脈之精微失傳無所依准因立名而為之歸著耳今之學者按圖索驥猶若望洋而況舉其全旨乎此草廬公說獨得要領也男女脈位齊褚澄曰男子陽順自下生上故右尺為受命之根萬物從土而出故右關為脾生右寸肺肺生左尺腎腎生左關肝肝生左寸心女子陰逆自上生下故左寸為受命之根萬物從土而出故左關為脾生左尺肺肺生右寸腎腎生右關肝肝生右尺心詳褚氏遺書華谷儲泳曰脈訣以女人尺脈盛弱與男子相反為背看夫男女形體絶異陰陽殊塗男生而覆女生而仰男則左旋女則右轉男主施女主受男之至命在腎處臟腑之極下女之至命在乳處臟腑之極上形氣既異脈行於形氣之間豈略不少異耶此褚氏之說為有理也詳祛疑說戴起宗曰脈訣因男子左腎右命女子左命右腎之別遂言反此背看而諸家以尺脈盛弱解之褚氏又以女人心肺診於尺倒裝五臟其謬又甚不知男女形氣精血雖異而十二經脈所行始終五臟之定位則一也安可以女人脈位為反耶丹溪朱震亨曰昔軒轅使伶倫截懈谷之竹作黃鐘律管以候天地之節氣使岐伯取氣口作脈法以候人之動氣故黃鐘之數九分氣口之數亦九分律管具而寸之數始形故脈之動也陽得九分陰得一寸吻合於黃鐘天不足西北陽南而陰北故男子寸盛而尺弱肖乎天也地不滿東南陽北而陰南故女子尺盛而寸弱肖乎地也黃鐘者氣之先兆故能測天地之節候氣口者脈之要會故能知人命之死生世之俗醫誦高陽生之妄作欲以治病其不殺人也幾希龍丘葉氏曰脈者天地之元性故男女尺寸盛弱肖乎天地越人以為男生於寅女生於申三陽從天生三陰從地長謬之甚也獨丹溪推本律法混合天人而闢之使千載之誤一旦昭然豈不韙哉臟腑部位紹興王宗正曰診脈之法當從心肺俱浮肝腎俱沉脾在中州之說王叔和獨守寸關尺分部位以測五臟六腑之脈者非也慈溪趙繼宗曰脈訣言左心小腸肝膽腎右肺大腸脾胃命者非也心肺居上為陽為浮肝腎居下為陰為沉脾居中州半陰半陽半浮半沉當以左寸為心右寸為肺左尺為肝右尺為腎兩關為脾關者陰陽之界限前取陽三分後取陰三分所謂土居金木水火之中寄王於四時不獨右關為脾也肝既為陰豈宜在半陰半陽半浮半沉之左關耶命門即是腎不宜以右尺為診詳儒醫精要吳草廬曰醫者於寸關尺輒名之曰此心脈此肺脈此肝脈此脾脈此腎脈者非也五臟六腑凡十二經兩手寸關尺者手太陰肺經之一脈也分其部位以候他臟之氣耳脈行始於肺終於肝而復會於肺肺為氣所出之門戶故名曰氣口而為脈之大會以占一身焉詳文集李時珍曰兩手六部皆肺之經脈也特取此以候五臟六腑之氣耳非五臟六腑所居之處也凡診察皆以肺心脾肝腎各候一動五十動不止者五臟皆足內有一止則知一臟之脈不至據此推之則以肺經一脈候五臟六腑之氣者可心解矣褚儲趙氏不知脈隨五臟之氣行於經隧之間欲以男女臟腑顛倒部位執泥不通戴同父言褚氏倒裝五臟丹溪別男女尺寸草廬明三部皆肺三說皆有真見學者所當宗師若夫趙氏所云蓋本於宋人王宗正難經圖解豈知脈分兩手出於素問脈要精微論而越人推明關脈及一脈十變於難經非始於叔和也若如其說則一脈十變何從推之可謂鑿而任矣命門即腎之說乃越人之誤也豫嘗著命門考命門三焦客難二說凡二千餘言云脈訣四言舉要宋南康崔嘉彥著四言舉要脈乃血沠氣血之先血之隧道氣息應焉其象法地血之府也心之合也皮之部也資始於腎資生於胃陽中之陰本乎營衛營者陰血衛者陽氣營行脈中衛行脈外脈不自行隨氣而至氣動脈應陰陽之誼氣如橐籥血如波瀾血脈氣息上下循環十二經中皆有動脈惟手太陰寸口取決此經屬肺上系吭嗌脈之大會息之出入一呼一吸四至為息日夜一萬三千五百一呼一吸脈行六寸日夜八百十丈為準初持脈時令仰其掌掌後高骨是為關上關前為陽關後為陰陽寸陰尺先後推尋心肝居左肺脾居右腎與命門居兩尺部魂魄穀神皆見寸口左主司官右主司腑左大順男右大順女本命扶命男左女右關前一分人命之主左為人迎右為氣口神門決斷兩在關後人無二脈病死不愈男女脈同惟尺則異陽弱陰盛反此病至脈有七診曰浮中沉上下左右消息求尋又有九候舉按輕重三部浮沉各候五動寸候胸上關候膈下尺候於臍下至跟踝左脈候左右脈候右病隨所在不病者否浮為心肺沉為腎肝脾胃中州浮沉之間心脈之浮浮大而散肺脈之浮浮澀而短肝脈之沉沉而弦長腎脈之沉沉實而濡脾胃屬土脈宜和緩命為相火左寸同斷春弦夏洪秋毛冬石四季和緩是謂平脈太過實強病生於外不及虛微病生於內春得秋脈死在金日五臟准此推之不失四時百病胃氣為本脈貴有神不可不審調停自氣呼吸定息四至五至平和之則三至為遲遲則為冷六至為數數則熱證轉遲轉冷轉數轉熱遲數既明浮沉當別浮沉遲數辨內外因外因於天內因於人天有陰陽風雨晦明人喜怒憂思悲恐驚外因之浮則為表證沉里遲陰數則陽盛內因之浮虛風所為沉氣遲冷數熱何疑浮數表熱沉數里熱浮遲表虛沉遲冷結表裡陰陽風氣冷熱辨內外因脈證參別脈理浩繁總括於四既得提綱引申觸類浮脈法天輕手可得泛泛在上如水漂木有力洪大來盛去悠無力虛大遲而且柔虛甚則散渙漫不收有邊無中其名曰芤浮小為濡綿浮水面濡甚則微不任尋按沉脈法地近於筋骨深深在下沉極為伏有力為牢實大弦長牢甚則實愊愊而強無力為弱柔小如綿弱甚則細如蛛絲然遲脈屬陰一息三至小駃於遲緩不及四二損一敗病不可治兩息奪精脈已無氣浮大虛散或見芤革浮小濡微沉小細弱遲細為澀往來極難易散一止止而復還結則來緩止而復來代則來緩止不能回數脈屬陽六至一息七疾八極九至為脫浮大者洪沉大牢實往來流利是謂之滑有力為緊彈如轉索數見寸口有止為促數見關中動脈可候厥厥動搖狀如小豆長則氣治過於本位長而端直弦脈應指短則氣病不能滿部不見於關惟尺寸候一脈一形各有主病數脈相兼則見諸證浮脈主表里必不足有力風熱無力血弱浮遲風虛浮數風熱浮緊風寒浮緩風濕浮虛傷暑浮芤失血浮洪虛火浮微勞極浮濡陰虛浮散虛劇浮弦痰飲浮滑痰熱沉脈主裡主寒主積有力痰食無力氣鬱沉遲虛寒沉數熱伏沉緊冷痛沉緩水蓄沉牢痼冷沉實熱極沉弱陰虛沉細痹濕沉弦飲痛沉滑宿食沉伏吐利陰毒聚積遲脈主臟陽氣伏潛有力為痛無力虛寒數脈主腑主吐主狂有力為熱無力為瘡滑脈主痰或傷於食下為蓄血上為吐逆澀脈少血或中寒濕反胃結腸自汗厥逆弦脈主飲病屬膽肝弦數多熱弦遲多寒浮弦支飲沉弦懸痛陽弦頭痛陰弦腹痛緊脈主寒又主諸痛浮緊表寒沉緊里痛長脈氣平短脈氣病細則氣少大則病進浮長風癇沉短宿食血虛脈虛氣實脈實洪脈為熱其陰則虛細脈為濕其血則虛緩大者風緩細者濕緩澀血少緩滑內熱濡小陰虛弱小陽竭陽竭惡寒陰虛發熱陽微惡寒陰微發熱男微虛損女微瀉血陽動汗出陰動發熱為痛與驚崩中失血虛寒相搏其名為革男子失精女子失血陽盛則促肺癰陽毒陰盛則結疝瘕積鬱代則氣衰或泄膿血傷寒心悸女胎三月脈之主病有宜不宜陰陽順逆凶吉可推中風浮緩急實則忌浮滑中痰沉遲中氣尸厥沉滑卒不知人入臟身冷入腑身溫風傷於衛浮緩有汗寒傷於營浮緊無汗暑傷於氣脈虛身熱濕傷於血脈緩細澀傷寒熱病脈喜洪浮沉微澀小證反必凶汗後脈靜身涼則安汗後脈躁熱甚必難陽病見陰病必危殆陰病見陽雖困無害上不至關陰氣已絶下不至關陽氣已竭代脈止歇臟絶傾危散脈無根形損難醫飲食內傷氣口急滑勞倦內傷脾脈大弱欲知是氣下手脈沉沉極則伏澀弱久深六郁多沉滑痰緊食氣澀血芤數火細濕滑主多痰弦主留飲熱則滑數寒則弦緊浮滑兼風沉滑兼氣食傷短疾濕留濡細瘧脈自弦弦數者熱弦遲者寒代散者折泄瀉下痢沉小滑弱實大浮洪發熱則惡嘔吐反胃浮滑者昌弦數緊澀結腸者亡霍亂之後脈代勿訝厥逆遲微是則可怕咳嗽多浮聚肺關胃沉緊小危浮濡易治喘急息肩浮滑者順沉澀肢寒散脈逆證病熱有火洪數可醫沉微無火無根者危骨蒸發熱脈數而虛熱而澀小必殞其軀勞極諸虛浮耎微弱土敗雙弦火炎急數諸病失血脈必見芤緩小可喜數大可憂瘀血內蓄卻宜牢大沉小澀微反成其害遺精白濁微澀而弱火盛陰虛芤濡洪數三消之脈浮大者生細小微澀形脫可驚小便淋閉鼻頭色黃澀小無血數大何妨大便燥結須分氣血陽數而實陰遲而澀癲乃重陰狂乃重陽浮洪吉兆沉急凶殃癇脈宜虛實急者惡浮陽沉陰滑痰數熱喉痹之脈數熱遲寒纏喉走馬微伏則難諸風眩暈有火有痰左澀死血右大虛看頭痛多弦浮風緊寒熱洪濕細緩滑厥痰氣虛弦耎血虛微澀腎厥弦堅真痛短澀心腹之痛其類有九細遲從吉浮大延久疝氣弦急積聚在裡牢急者生弱急者死腰痛之脈多沉而弦兼浮者風兼緊者寒弦滑痰飲濡細腎著大乃腎虛沉實閃肭腳氣有四遲寒數熱浮滑者風濡細者濕痿病肺虛脈多微緩或澀或緊或細或濡風寒濕氣合而為痹浮澀而緊三脈乃備五疸實熱脈必洪數澀微屬虛切忌發渴脈得諸沉責其有水浮氣與風沉石或里沉數為陽沉遲為陰浮大出厄虛小可驚脹滿脈弦土製於木濕熱數洪陰寒遲弱浮為虛滿緊則中實浮大可治虛小危極五臟為積六腑為聚實強者生沉細者死中惡腹脹緊細者生脈若浮大邪氣已深癰疽浮數惡寒發熱若有痛處癰疽所發脈數發熱而痛者陽不數不熱不痛陰瘡未潰癰疽不怕洪大已潰癰疽洪大可怕肺癰已成寸數而實肺痿之形數而無力肺癰色白脈宜短澀不宜浮大唾糊嘔血腸癰實熱滑數可知數而不熱關脈芤虛微澀而緊未膿當下緊數膿成切不可下婦人之脈以血為本血旺易胎氣旺難孕少陰動甚謂之有子尺脈滑利妊娠可喜滑疾不散胎必三月但疾不散五月可別左疾為男右疾為女女腹如箕男腹如釜欲産之脈其至離經水下乃産未下勿驚新産之脈緩滑為吉實大弦牢有證則逆小兒之脈七至為平更察色證與虎口文奇經八脈其診又別直上直下浮則為督牢則為沖緊則任脈寸左右彈陽蹺可決尺左右彈陰蹺可別關左右彈帶脈當訣尺外斜上至寸陰維尺內斜上至寸陽維督脈為病脊強癲癇任脈為病七疝瘕堅衝脈為病逆氣裡急帶主帶下臍痛精失陽維寒熱目眩僵仆陰維心痛胸脅刺築陽蹺為病陰緩陽急陰蹺為病陽緩陰急癲癇瘛瘲寒熱恍惚八脈脈證各有所屬平人無脈移於外絡兄位弟乘陽溪列缺病脈既明吉凶當別經脈之外又有真脈肝絶之脈循刀責責心絶之脈轉豆躁疾脾則雀啄如屋之漏如水之流如杯之覆肺絶如毛無根蕭索麻子動搖浮波之合腎脈將絶至如省客來如彈石去如解索命脈將絶蝦游魚翔至如湧泉絶在膀胱真脈既形胃已無氣參察色證斷之以臆
