body:
  text: 卷之三十二果部上品果之草豆蔻無毒附花山姜花植生豆蔻主溫中心腹痛嘔吐去口臭氣名醫所録名草豆蔻苗圖經曰豆蔻即草豆蔻也苗似蘆葉似山姜杜若輩根似高良薑微有樟木氣花作穗嫩葉卷之而生初如芙蓉穗頭深紅色葉漸展花漸出而色漸淡亦有黃白色者其實若龍眼子而鋭皮無鱗甲中子若石榴瓣南人採當果實尤貴其嫩者並穗入鹽同淹治疊疊作朵不散落又以木槿花同浸欲其色紅耳閩中一種亦名草豆蔻子白似縮砂子殼如山梔但味淡不香東垣治胃口痛者此也又有一種山姜花味辛性溫莖葉皆姜但根不堪食亦與豆蔻花相似而微小耳花生葉間作穗如麥粒嫩紅色南人取其未大開者謂之含胎花以鹽水淹藏入甜糟中經冬如琥珀色香辛可愛用其鱠醋最相宜也二種苗葉小異而治療亦各有功故並載之地圖經曰生南海今嶺南皆有之時生春生苗採十月取收曝乾用實色蒼褐味辛性溫散氣氣之厚者陽也臭香主溫中理氣行足太陰經陽明經制雷公云凡使須去蒂並向裡子後取皮用茱萸同於𨫼上緩炒待茱萸微黃黑去茱萸取草豆蔻皮及子杵用之治療唐本注云下氣止霍亂藥性論云一切冷氣日華子云豆蔻花下氣止嘔逆除霍亂調中補胃氣消酒毒山姜花調中下氣消食陳藏器云山姜去惡氣溫中中惡霍亂心腹冷痛草豆蔻煨熟治風寒客邪在胃口之上及脾胃客寒心與胃痛藕實無毒泥生藕實莖主補中養神益氣力除百疾久服輕身耐老不飢延年神農本經名水芝丹蓮蕊金櫻草苗圖經曰詩傳云荷芙蕖也總名曰荷其莖曰茄未出水者曰銀條其葉曰蕸葉中蒂謂之荷鼻其本曰藌藌即莖下白蒻在泥中者也荂曰芙蓉秀而未發曰菡萏已發暢茂曰華其實曰蓮蓮謂房也其中菂乃蓮內青皮白實爾中有青為薏即所謂苦如薏也其根曰藕花有紅白二種白者藕大實小紅者藕小實大千葉者皆不實然則生於水而水不能沒雖居於淤泥而泥不能淤其體中空食之故能令人心悅也地圖經曰生汝南池澤江南今處處有之時生三月四月生苗六月開花採八月九月取實收曬乾用藕實莖葉蒂房薏即花色黃白味甘苦荷鼻藕甘性平寒緩藕溫花暖氣氣之薄者陽中之陰臭香主清心止痢制剝去黑殼敲碎去心用治療圖經曰止痢定腰痛及噦逆藕主霍亂後虛渴煩悶不敢食葉止渴荷鼻安胎去惡血留好血日華子云止渴助心止痢多食令人喜藕止霍亂開胃消食除煩止悶口乾渴疾止怒破産後血悶搗罯金瘡並傷折止暴痛蒸食開胃薏止霍亂葉落胞併産後口乾心肺燥煩悶藥性論云藕消淤血不散節止口鼻吐衄血補圖經曰輕身益氣令人強健花鎮心益顏色藥性論云主五臟不足傷中氣利益十二經脈血氣陳藏器云令發變黑不白日華子云止泄精安心花輕身駐顏合治合蠟蜜為丸服令人不飢葉及房合酒煮服治産後胎衣不下即合生地黃汁熱酒童便能解熱毒消淤血産後血悶禁苦薏不可多食令人霍亂及吐食生食微動氣實生食脹人腹忌花忌地黃生蒜解葉殺菌毒及食蟹中毒荷鼻解食野菌毒水煮服之藕解酒毒果之木橘無毒植生橘出神農本經主胸中瘕熱逆氣利水穀久服去臭下氣通神以上朱字神農本經下氣止嘔咳除膀胱留熱停水五淋利小便主脾不能消穀氣衝胸中吐逆霍亂止泄去寸白輕身長年以上黑字名醫所録名橘皮朱橘塌橘山橘苗圖經曰木高丈餘葉與枳無辨刺出莖間夏開白花六七月成實至冬黃熟啖之甚甘美謹按青橘黃橘青者味苦而小六七月未成熟時採之以刀劃開曝乾者謂之蓮花青皮至十月霜降後已成熟者味辛而黃大謂之橘皮醫家所用陳皮即經久者是也蓋二藥功用雖殊實出一種舊本橘柚同條然橘與柚自是二種功用既殊性味亦異其柚故析條於下地圖經曰生南山川穀及江南今江浙荊襄湖嶺皆有之道地廣東時生春生新葉採十月取實收曝乾用肉核皮陳久者良質類柚色黃味辛苦性溫散氣氣厚於味陽中之陰臭香主留白者和胃調中去白者消痰下氣行手太陰經足太陰經助白檀為之使制去穰細銼用治療藥性論云皮除胸膈間氣開胃氣痢消痰涎止上氣咳嗽日華子云橘止消渴開胃去胸中膈氣皮消痰止嗽破癥瘕痃癖橘囊上筋膜止渴及吐酒陳藏器云橘止泄痢下食開胃膈痰結氣合治合白朮補脾胃合甘草補肺氣合葛根茯苓甘草生薑治氣逆上而不下核合酒服治腰痛膀胱腎冷解皮食魚中毒贋柚皮皺子皮為僞青皮無毒植生青皮主氣滯消食破積結膈氣名醫所録名乳橘苗謹按本經二橘通云味辛又云一名橘皮又云十月採都是今之黃橘也後人由其味辛苦其形大小遂以為二種今則各立其條便於治用蓋青皮即青橘皮也實與黃橘同種由其所採時月生熟及體色性味不同故攻疾有異其霜後採黃大已穰而味辛者謂之黃橘則入脾胃走肺氣六七月未成熟時採青小未穰而味苦者謂之青皮則入厥陰少陽疏肝氣正如枳殼枳實同種枳殼治高以其性詳而緩枳實治低以其性酷而烈之故也地圖經曰生南山川穀及江南今江浙荊襄湖嶺皆有之道地廣東時生春生新葉採六七月取實收曝乾用實刀劃蓮花瓣者佳色青黑味苦辛性寒泄氣氣薄味厚陰也臭香主消堅攻滯下食安脾行手少陽經足厥陰經制去穰銼碎用合治合蔥白童便煎服治婦人産後氣逆合酒調末服治吹乳不癢不痛腫硬如石禁多服則損真氣柚子無毒植生柚子主妊孕人吃食少並口淡去胃中惡氣消食去腸胃氣解酒毒治飲酒人口氣名醫所録苗圖經曰木高丈許葉與枳無辨刺生莖間夏初開白花六七月成實至冬黃熟時亦可啖其實似橙而酢大於橘但皮厚不堪入藥衍義曰橘柚自是兩種一名橘皮是元無柚字豈有兩物而治療無一字別者即知柚之一字為誤後人不深求其意為柚字所惑妄生分別且青橘與黃橘治療尚別矧柚為別種也郭璞云柚似橙而大於橘且柚皮極苦乃不堪嘗皮甘者乃橙耳人以柚為橘者誤矣原本橘柚同條混淆缺明今則分為二種矣地圖經曰生南山山谷及江南今江浙荊襄湖嶺皆有之時生春生葉採十月取實收去肉曝乾用皮質類香橙而大色黃味甘酢性寒緩氣味厚於氣陰中之陽臭香主消食和胃治療陶隱居云下氣解酒毒大棗無毒植生大棗出神農本經主心腹邪氣安中養脾助十二經平胃氣通九竅補少氣少津液身中不足大驚四肢重和百藥久服輕身長年葉溫無毒覆麻黃能令出汗以上朱字神農本經補中益氣強力除煩悶療心下懸腸澼不飢神仙三歲陳核中仁燔音煩之味苦主腹痛邪氣以上黑字名醫所録名御棗良棗遵羊棗轆轤棗美棗牙棗水菱棗波斯棗干棗壺棗洗大棗羊矢棗邊腰棗皙無實棗蹶泄苦棗櫅白棗天蒸棗撲落酥苗圖經曰大棗乃干棗也其木高三五丈枝上多刺如針四月發萌漸生葉至五月開花黃白色七八月結實熟則紫赤郭璞注爾雅云壺棗者由其大而鋭上者為壺壺猶瓠也邊大而腰細者為邊腰棗亦謂之轆轤棗棗白熟者謂之櫅實小而圓紫黑色者謂之遵俗呼為羊矢棗是也出河東猗氏縣如雞卵最大者謂之洗味苦者謂之蹶泄不著子者謂之皙還味稔棗謂其味之短者也南人蒸熟曝乾皮薄而皺味更甘美於他者謂之天蒸棗然其種類圃人亦不能別其名入藥以青州者最佳雖晉絳大實亦不及青州者之肉厚也又廣州一種波斯棗木無傍枝直聳三四丈至巔四向共生十餘枝葉如棕櫚彼土人呼為海棕木三五年一著子都類北棗味極甘而差小然其核兩頭不尖雙卷而圓為異也又有水菱棗御棗之類其味甚美但肌實輕虛暴服之則枯敗及江南出者堅燥少脂皆不堪入藥也地圖經曰生河東平澤今近北州郡及江南廣州皆有之陶隱居云出郁州及東臨沂金城道地青州晉州絳州為佳時生四月生葉採八月取實收曝乾用實葉仁色紅味甘性平氣氣之厚者陽也臭香主和中益氣制蒸熟去皮核用治療唐本注云葉揩熱痱瘡日華子云干棗潤心肺止嗽除腸胃癖氣葉小兒壯熱煎湯浴孟詵云干棗治心腹邪氣通九竅核中仁祛惡氣卒疰忤補日華子云干棗補五臟虛勞損孟詵云干棗補虛強志補不足氣助陽胃肥中別録云調中益脾氣令人好顏色美志氣合治合光粉燒療疳痢葉合葛粉揩痱子及熱瘡禁中滿牙齒痛者勿食亦不宜合生蔥食葉服之使人瘦久即嘔吐生棗味甘辛多食令人多寒熱羸瘦者不可食解和百藥毒殺烏頭毒仲思棗無毒仲思棗主補虛益氣潤五臟去痰嗽冷氣久服令人肥健好顏色神仙不飢名醫所録苗圖經曰形如大棗長一二寸正紫色細文小核味甘重北齊時有仙人仲思得此棗因以為名隋大業中信都郡嘗獻數顆近世稀復有之又有千年棗生波斯國亦稍溫補非此之儔也地圖經曰出信都郡收曝乾用實質形如大棗色紫味甘性溫緩氣氣之厚者陽也臭香主補虛益氣果之走葡萄無毒蔓生葡萄出神農本經主筋骨濕痹益氣倍力強志令人肥健耐飢忍風寒久食輕身不老延年可作酒以上朱字神農本經逐水利小便以上黑字名醫所録苗圖經曰苗作藤蔓而極長大盛者一二本綿被山谷間花極細而白色其實有紫白二色然形之圓鋭亦有二種其江東出者實細而味酸謂之櫻薁子是山葡萄也皆七八月熟取其汁可以釀酒其根苗中空相通圃人將採實貨之欲得厚利暮溉其根而晨則水溢子中矣故俗亦呼其苗為木通也漢張騫使西域得其種而還中國始有蓋北果之最珍者魏文帝詔群臣云醉酒宿酲掩露而食甘而不飴酸而不酢冷而不寒味長汁多除煩解悁他方之果寧有匹之者乎地圖經曰生隴西五原敦煌山谷今河東近京州郡皆有之時生三月苗四月花隨結實採七月八月取實收曝乾用實根質類馬乳色紫白味甘性平緩氣氣之薄者陽中之陰臭香主除濕痹利水道制根煮汁治療藥性論云實除腸間水氣調中止淋通小便孟詵云根止嘔噦及霍亂後噁心妊孕人子上衝心煮汁飲胎即下安合治實合酒飲治時氣發瘡疹不出者禁子不堪多食令人卒煩悶眼暗果之木栗子無毒植生栗子主益氣厚腸胃補腎氣令人耐飢名醫所録名皮扶苗圖經曰樹高二三丈極類櫟花青黃色似胡桃花實有房匯其匯大若拳者中子三五枚小若桃李者中子惟一二將熟則罅摺子出栗之種類亦多陸機疏云栗五方皆有之周秦吳楊特鐃吳越被城表裡皆栗惟濮陽及范陽栗甜美味長他方者悉不及也倭韓國諸島上栗大如雞子亦短味不美桂陽有莘而叢生實大如杏子中仁皮子形色與栗無異也但差小耳又有奧栗皆與栗同子圓而細或云即莘也今此色惟江湖有之又有茅栗隹音錐栗其實更小而木與栗不殊但春生夏花秋實冬枯為異爾栗房當心一子謂之栗楔治血尤效陶隱居云今會稽最豐諸暨音既栗形大皮厚不美剡時冉切及豐皮薄而甜相傳有人患腳弱往栗樹下食數升便能起行此是補腎之義然應生啖之若餌服則宜蒸曝也地圖經曰舊本不著所出州土今山陰處處有之道地兗州宣州者最勝時生春生葉夏開花秋結實採九月取實收曝乾用實色殼紫肉黃白味咸性溫軟氣氣厚於味陽中之陰臭微香主腎虛腳弱制去殼治療圖經曰殼止反胃及消渴木皮消瘡毒唐本注云栗作粉塗瘡上及筋骨斷碎疼痛腫瘀血毛殼除火丹毒腫樹白皮療溪毒日華子云生栗破冷痃癖生嚼罯惡刺箭頭不出者並敷瘰癧腫毒痛殼止瀉血補孟詵云栗日中曝乾食下氣補益合治栗上薄皮合蜜塗面展皺禁小兒不可多食生者難化熟即滯氣隔食生蟲往往致病實飼孩兒令齒不生患風水氣不宜食果之草蓬藟無毒叢生蓬藟出神農本經主安五臟益精氣長陰令堅強志倍力有子久服輕身不老以上朱字神農本經療暴中風身熱大驚以上黑字名醫所録名陵藟陰藟西國草畢楞伽子覆盆苗圖經曰蓬藟即覆盆子之苗莖也蔓短不過尺莖葉皆有刺花白子黃赤色形如半彈丸而下有莖承之如柿蒂狀小兒多食其實江南人謂之莓然其地所生差晚而功用則同古方用葉汁滴目中去膚赤有蟲出如絲線者是也唐本注云蓬藟覆盆一物異名亦如蜀漆與常山異條芎藭與蘼蕪各用今以附入果部者蓋其子是覆盆故也地圖經曰生荊山平澤及冤句今處處有之秦吳尤多道地成州時生春生苗採五月取苗不拘時取葉收曝乾用苗葉色青緑味酸鹹性平收氣味厚於氣陰中之陽臭香主益精強志制搗碎或挼汁用治補別録云耐寒濕好顏色覆盆子無毒叢生覆盆子主益氣輕身令發不白名醫所録名懸鉤子苗衍義曰覆盆子四五月紅熟山中人採來賣者其味酸甘外如荔枝櫻桃許大紅軟可愛失採則枝上就生蛆益腎臟縮小便服之當覆其溺器如此取名食之多熱收時須乘五六分熟便可採於烈日中曝仍須薄綿蒙裹著水則不堪用也地圖經曰生荊山平澤及冤句今處處有之秦吳地尤多時生三月生苗採五月取實收曝乾用實於麥田中得者良色紅味甘性平緩氣氣厚於味陽中之陰臭朽主補肝明目滋陰駐顏制雷公云凡使用東流水淘去黃葉並皮蒂盡了用酒蒸一宿以東流水淘兩遍曬乾用治療日華子云主中風身熱及驚別録云熬湯服平肺虛寒補唐本注云補虛續絶強陰健陽悅澤肌膚安和臟腑和中益力療勞損風虛補肝明目藥性論云療男子腎精虛竭女人食之有子日華子云益顏色養精氣長髮強志陳藏器云令人好顏色合治子搗綿裹合人乳浸點目中治眼暗不見物冷淚浸淫青盲天行目暗等疾贋茅莓為僞果之走芰實無毒浮生芰音技實主安中補五臟不飢輕身名醫所録名菱浮菱水菱菱角苗圖經曰芰菱實也葉似荇浮在水面花黃白色晝合夜開隨月轉移猶葵之向日也花落而實生實有紅緑二種潛向水中成熟南人取莖淹作菹食之然腫亦多有四角者有二角者其皮嫩謂之浮菱生食之味尤甘美楚人謂之芰秦謂之薢茩今俗謂之菱江淮及山東人曝其實以為米可以當糧衍義曰芰今世俗謂之菱角煮食可以代糧然不益脾又有水菱亦芰也但大而脆可生食修合治療未聞其用地圖經曰生廬江江南山東今處處有之時生三月生苗五月開花採夏秋取實收曝乾用實色殼青紅肉白味甘性平冷氣氣之薄者陽中之陰臭香主補五臟合治蒸作粉合蜜漬食之以斷谷禁多食令人腹脹滿用暖酒和姜飲一兩盞即消性冷不可多食令人陰不強生者不宜多食令人臟冷損陽氣解丹石毒果之木橙子皮無毒植生橙子皮作醬醋香美散腸胃惡氣消食去胃中浮風氣瓤味酸去噁心不可多食傷肝氣名醫所録苗圖經曰樹似橘而葉大實亦類橘但皮厚皺而尤香耳八月熟採食之衍義曰橙子皮今人只以為果或取皮合湯待賓未見入藥也地圖經曰生南山川穀及江南今江浙荊襄湖嶺皆有之時生夏開花採八九月取實收曝乾用皮瓤質類橘皮厚多皺色黃味苦辛性溫散氣氣厚味薄陽中之陰臭香主消食理氣治療別録云散癭氣及瘰癧合治合鹽蜜食去惡氣噁心胃氣禁多食發虛熱及瘰癧與獱肉同食髮旋噁心解殺魚蠱毒櫻桃微毒植生櫻桃主調中益脾氣令人好顏色美志名醫所録名朱果臘櫻朱茱荊桃李桃奈桃含桃紫桃麥甘酣山朱櫻苗圖經曰其木多陰最先百果而熟故方多貴之其實熟時深紅色者謂之朱櫻正黃明者謂之臘櫻其大若彈丸核細而肉厚者尤難得也衍義曰此即古謂之含桃可薦宗廟禮記云先薦寢廟者是也於四月初熟得正陽之氣先諸果而熟其性故熱今西洛一種紫櫻至熟時正紫色皮裡間有細碎紫黃點此為最珍藥中不甚須也地圖經曰處處有之道地洛中南都者最勝時生春生葉採四月取實用實色紅紫味甘性熱緩氣氣厚味薄陽中之陰臭香主調中益氣治療圖經曰美顏色東行根殺寸白蛔蟲唐本注云葉搗敷蛇咬並絞汁服防蛇毒內攻別録云止水穀痢及泄精禁暗風人不可啖啖之立發小兒多食發熱及嘔吐果之走雞頭實無毒浮生雞頭實主濕痹腰脊膝痛補中除暴疾益精氣強志令耳目聰明久服輕身不飢耐老神仙神農本經名雁啄實芡雁頭䓈菜苗圖經曰葉大如荷皺而有刺浮在水面謂之雞頭盤花下結實有匯大如拳形類雞頭故以名之芡即匯中子也江南産者其匯紅紫光潤無刺自揚而北産者匯有刺而青緑為異其莖裛公幸切之嫩者名花為詭切裛人採以為菜茹衍義曰雞頭實今天下皆有之河北兜溏濼居人採得舂去皮搗仁為粉蒸泄作餅可以代糧多食不益脾胃氣蓋難消化也地圖經曰生雷池水澤中今處處有之時生春生苗採八月取實收曝乾用實質類雞頭色殼青肉白味甘性平緩氣氣厚於味陽中之陰臭微香主補中益精制別録云蒸熟於烈日曬之其皮即開亦可舂作粉治療別録云根除小腹結氣痛實已瘻頸疾補日華子云開胃助氣合治搗末合金櫻子煎為丸補益下氣禁小兒多食不能長大生食動風冷氣五種陳藏器余靈床上果子主人夜臥譫語食之瘥也無漏子味甘溫無毒主溫中益氣除痰嗽補虛損好顏色令人肥健生波斯國如棗一云波斯棗海藥云樹若栗木其實如橡子有三角消食止咳嗽虛羸悅人久服無損也都角子味酸澀平無毒久食益氣止泄生南方樹高丈餘子如卵徐表南方記云都角樹二月花花連著實也海藥云謹按徐表南州記云生廣南山谷二月開花至夏末結實如卵主益氣安神遺泄痔溫腸久服無所損也文林郎味甘無毒主水痢去煩熱子如李或如林檎生渤海間人食之云其樹從河中浮來拾得人身是文林郎因以此為名也海藥云又南山亦出彼人呼榲桲是味酸香微溫無毒主水瀉腸虛煩熱並宜生食散酒氣也木威子味酸平無毒主心中惡水水氣生嶺南山谷樹葉似楝子如橄欖而堅亦似棗也
