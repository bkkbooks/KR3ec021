body:
  text: 續集卷之八菜部白花菜無毒白花菜主下氣汪穎煎水洗痔搗爛敷風濕痹痛擂酒飲止瘧本草綱目名羊角菜苗李時珍曰白花菜柔莖延蔓一枝五葉葉大如拇指秋間開小白花長蕊結小角長二三寸菜氣膻臭惟宜鹽菹食之汪穎曰一種黃花者名黃花菜形狀相同但花黃也時三月種之質其子黑色而細狀如初眠蠶沙不光澤禁汪穎曰多食動風氣滯臟腑令人胃中悶滿傷脾臭膻味苦辛翻白草無毒翻白草根主吐血下血崩中瘧疾癰瘡本草綱目名雞腿根天藕李時珍曰翻白以葉之形名雞腿天藕以根之味名也楚人謂之湖雞腿淮人謂之天藕苗周憲王曰翻白草高七八寸葉硬而厚有鋸齒背白似地榆開黃花根如指大長三寸許皮赤肉白兩頭尖峭生食煮食皆宜地李時珍曰雞腿兒生近澤田地高不盈尺一莖三葉尖長而厚有皺紋鋸齒結子如胡荽子中有細子時春生弱莖四月開小黃花色葉面青背白根赤肉白色質根狀如小白朮頭剝去赤皮其內白色如雞肉食之有粉小兒生食之荒年人掘以和飯食味甘微苦性平治吐血不止翻白草每用五七科㕮咀水二鍾煎一鍾空心服崩中下血用湖雞腿根一兩搗碎酒二盞煎一盞服瘧疾寒熱翻白草根五七個煎酒服之無名腫毒疔毒初起不拘已成未成用翻白草十科酒煎服出汗即愈渾身疥癩並臁瘡潰爛端午日午時採翻白草洗收每用一握煎濃水熏洗效黃瓜菜無毒黃瓜菜主通結氣利腸胃汪穎名黃花菜李時珍曰其花黃其氣如瓜故名地汪穎曰黃瓜菜野生田澤形似油菜但味少苦取為羹茹甚香美苗李時珍曰此菜田野遍有小科如薺花與莖葉並同地丁但差小耳一科數花結細子不似地丁之花成絮也野人茹之亦採以飼鵝兒時二月生苗三四五月開黃花味甘微苦性微寒水蕨水蕨主腹中痞積淡煮食一二日即下惡物忌雜食一月餘乃佳本草綱目地李時珍曰水蕨似蕨生水中呂氏春秋云菜之美者有云夢之䔇即此菜也䔇音豈味甘苦性寒藜微毒藜葉主殺蟲陳藏器煎湯洗蟲瘡漱齒䘌搗爛塗諸蟲傷去癜風本草綱目根主燒灰和荻灰蒿灰等分水和蒸取汁煎膏點疣贅黑子蝕惡肉本草綱目名萊紅心灰藋鶴頂草胭脂菜地藜處處有之苗藜即灰藋之紅心者莖葉稍大河朔人名落藜南人名胭脂菜亦曰鶴頂草皆形色名也嫩時亦可食故昔人謂藜藿與膏粱不同老則莖可為杖詩云南山有萊北山有臺陸機注云萊即藜也初生可食譙沛人以雞蘇為萊皆名同物異也韻府謂藜為落帚亦誤矣寶鑑論云鶴頂龍芽其頂如鶴入外丹用收八九月和子收之用李時珍曰按庚辛玉冊云鶴頂陰草也搗汁煮粉霜燒灰淋汁煎粉霜伏礬石結草砂制硫伏汞及雌黃砒石味甘性平合治紅灰藋五斤茄子根莖三斤蒼耳根莖五斤並曬乾燒灰以水一斗煎湯淋汁熬成膏別以好乳香半兩鉛霜一分膩粉一分煉成牛脂二兩和勻每日塗三次治白癜風甘薯無毒甘薯主補虛乏益氣力健脾胃強腎陰功同薯蕷本草綱目地李時珍曰按陳祈暢異物志云甘薯出交廣南方苗按嵇含草木狀云甘薯薯蕷之類或云芋類也根葉亦如芋根大如拳甑蒸煮食之味同薯蕷性不甚冷珠崖之不業耕者惟種此蒸切曬收以充糧糗名薯糧海中之人多壽亦由不食五穀而食甘薯故也時以二月種十月收之用根質其根似芋亦有巨魁大者如鵝卵小者如雞鴨卵剝去紫皮肌肉正白如肌南人用當米穀果食蒸炙皆香美初時甚甜經久得風稍淡也味甘性平酸筍無毒酸筍主作湯食止渴解酲利膈本草綱目地李時珍曰酸筍出粵南顧玠海槎録云筍大如臂摘至用沸湯泡去苦水投冷井水中浸二三日取出縷如絲繩醋煮可食好事者攜入中州成罕物云味酸性涼蓏菜部敗瓢無毒敗瓢主消脹殺蟲治痔漏下血崩中帶下赤白本草綱目用李時珍曰瓢乃匏壺破開為之者近世方藥亦時用當以苦瓠者為佳年久者尤妙味苦性平治腋下瘤癭用長柄茶壺盧燒存性研末搽之以消為度一府校老嫗右腋生一瘤漸長至尺許其狀如長匏子久而潰爛一方士教以此法用之遂出水消盡而愈合治中滿鼓脹用三五年陳壺盧瓢一個以糯米一斗作酒待熟以瓢於炭火上炙熱入酒浸之如此三五次將瓢燒存性研末每服三錢酒下神效大便下血敗瓢燒存性黃連等分研末每空心酒服二錢赤白崩中舊壺盧瓢炒存性蓮房煅存性等分研末每服二錢熱水調服二服有汗為度即止甚者五服止最妙忌房事發物生冷腦漏流膿破瓢白雞冠花白螺螄殼各燒存性等分血竭麝香各五分為末以好酒灑濕熟艾連藥揉成餅貼在頂門上以尉斗尉之以愈為度南瓜無毒南瓜主補中益氣本草綱目地李時珍曰南瓜種出南番轉入閩浙今燕京諸處亦有之矣苗引蔓甚繁一蔓可延十餘丈飾節有根近地即著其莖中空其葉狀如蜀葵而大如荷葉八九月開黃花如西瓜花結瓜正圓大如西瓜皮上有稜如甜瓜一本可結數十顆其子如冬瓜子形時三月下種宜沙沃地四月生苗經霜收置可留至春用肉厚色黃不可生食惟去皮穰瀹食味如山藥同豬肉煮食更良亦可蜜煎色或緑或黃或紅按王禎農書云浙中一種陰瓜宜陰地種之秋熟色黃如金皮膚稍厚可藏至春食之如新疑此即南瓜也味甘性溫禁多食髮腳氣黃疸不可同羊肉食令人氣壅苦瓜無毒苦瓜主除邪熱解勞乏清心明目生生編子主益氣壯陽本草綱目味苦甘名錦荔枝癩葡萄李時珍曰苦以味名瓜及荔枝葡萄皆以實及莖葉相似得名地苦瓜原出南番今閩廣皆種之苗周憲王曰錦荔枝即癩葡萄蔓延草木莖長七八尺莖有毛澀葉似野葡萄而花又開黃花實大如雞子有皺紋似荔枝李時珍曰苗引蔓莖葉卷鬚並如葡萄而小結瓜長者四五寸短者二三寸皮上痱㿔如癩及荔枝殼狀熟則黃色自裂內有紅瓤裹子瓤味甘可食其子形扁如瓜子亦有痱㿔南人以青皮煮肉及鹽醬充蔬苦澀有青氣按費信星槎勝覽云蘇門答剌國一等瓜皮若荔枝未剖時甚臭如爛蒜剖開如囊味如酥香甜可口疑此即苦瓜也時五月下子生苗七八月開小黃花五瓣如碗形色青色味苦性寒水菜部石花菜無毒石花菜主去上焦浮熱發下部虛寒寧原名橘枝李時珍曰並以形名也地李時珍曰石花生南海沙石間苗高二三寸狀如珊瑚有紅白二色枝上有細齒以沸湯泡去砂屑沃以姜醋食之甚脆其根埋沙中可再生枝也一種稍粗而似雞爪者謂之雞腳菜味更佳二物久浸皆化成膠凍也郭璞海賦所謂水物則玉珧海月十肉石華即此物也味甘鹹性大寒滑龍鬚菜無毒龍鬚菜主癭結熱氣利小便本草綱目名一種石發似指此物與石衣之石發同名也地李時珍曰龍鬚菜生東南海邊石上苗叢生無枝葉狀如柳根鬚長者尺余色白色用以醋浸食之和肉蒸食亦佳味甘性寒睡菜睡菜主心膈邪熱不得眠本草綱目名瞑菜綽菜醉草懶婦葳苗李時珍曰按嵇含草木狀云綽菜夏生池沼間葉類茨菰根如藕條南海人食之令人思睡呼為瞑菜郭憲洞冥記有卻睡草食之令人不睡與此相反也綱目云按苦菜龍葵皆能使人不睡卻睡之草其此類乎時段公路北戶録云睡菜五六月生田塘中土人採根為鹽菹食之好睡味甘微苦性寒芝栭部皂莢菌有毒皂莢菌主積垢作痛泡湯飲之微泄效未已再服又治腫毒初起磨醋塗之良本草綱目用李時珍曰生皂莢樹上木耳也不可食採得烘乾備用味辛治腸風瀉血皂莢樹上菌瓦焙為末每服一錢溫酒下葛花菜無毒葛花菜本草綱目主醒神治酒積太和志録名葛乳地李時珍曰諸名山皆有之惟太和山採取云乃葛之精華也秋霜浮空如芝菌湧生地上蓋菌類也色其色赤脆味苦甘雞㙡無毒雞㙡主益胃清神治痔本草綱目名雞菌李時珍曰南人謂為雞㙡皆言其味似之也地李時珍曰雞㙡出雲南生沙地間下菌也又廣西橫州出雷菌遇雷過即生須疾採之稍遲即腐或老故名作羹甚美亦如雞㙡之屬此數種其價並珍苗高腳傘頭土人採烘寄遠以充方物點茶烹肉皆宜氣味皆似香菌而不及其風韻也味甘性平舵菜無毒舵菜主癭結氣痰飲本草綱目苗李時珍曰此即海舶舵上所生菌也亦不多得味鹹甘性寒竹蓐無毒陳藏器曰苦竹肉有大毒竹蓐本草綱目主一切赤白痢和姜醬食之孟詵苦竹肉灰汁煉過食殺三蟲毒邪氣破老血陳藏器名竹蓐竹菰竹菌李時珍曰草更生曰蓐得溽濕之氣而成也陳藏器本草作竹肉因其味也地孟詵曰慈竹林夏月逢雨滴汁著地生蓐似鹿角白色可食李時珍曰此即竹菰也生朽竹根節上狀如木耳紅色段成式酉陽雜俎云江淮有竹肉大如彈丸味如白樹雞即此物也惟苦竹生者有毒耳禁陳藏器曰竹蓐生苦竹枝上如雞子似肉臠有大毒以灰汁煮三度訖然後依常菜茹食之煉不熟者戟人喉出血手爪盡脫應別有功人未盡識之耳味甘鹹性寒石耳無毒石耳主久食益色至老不改令人不飢大小便少吳瑞明目益精本草綱目名靈芝地吳瑞曰石耳生天台四明河南宣州黃山巴西邊徼諸山石崖上遠望如煙李時珍曰廬山亦多狀如地耳山僧採曝饋遠洗去沙土作茹勝於木耳佳品也味甘性平合治瀉血脫肛石耳五兩炒白枯礬一兩密陀僧半兩為末蒸餅丸梧桐子大每米飲下二十丸
