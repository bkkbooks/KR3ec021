body:
  text: 卷之二十八禽部下品羽蟲白鶴無毒卵生白鶴血主益氣力補勞乏去風益肺肫中砂石子磨服治蠱毒邪名醫所録名胎禽地圖經曰生青田及揚州今處處有之其形似鸛而大竦身高腳頂丹身白項有烏帶翼末有黑羽其唳清亮遠聞數里小雅云鶴鳴於九皋聲聞於野是也然有玄有黃有曰有蒼白者堪用余者次之穆天子傳雲天子至巨搜二氏獻白鶴之血以飲天子注云血益人氣力時生無時採無時色白味咸性平氣味厚於氣陰中之陽臭腥孔雀屎日華子云孔雀微毒孔雀屎主女子帶下小便不利名醫所録地陶隱居云出廣益諸州方家不見用唐本注云交廣有劍南元無其屎堪入藥用謹按埤雅云孔雀不必配合只以音影相接便孕亦與蛇偶禽經曰鵲見蛇則噪而賁孔雀見蛇則婉而躍博物志云孔雀尾多變色或紅或黃喻如雲霞其色無定人拍其尾則舞尾有金翠五年之後成始生三年金翠尚小初春乃生三四月後復凋其金翠亦與花萼同衰榮也其類有雌有雄雌者不冠尾短而無金翠雄者有冠尾長而多金翠其性頗妒忌自矜其尾雖馴養已久遇婦人童子服錦彩者必逐而啄之每欲山棲先擇置尾之地欲生捕者候雨甚往擒之因其尾沾雨重不能高翔人雖至且愛其尾不復騫揚也人採其尾以飾扇惟生取則金翠之色不減南人取其尾者持刀預潛隱於叢竹處伺過即斬其尾若不即斷回頭一顧金翠無復光彩矣時生無時採無時用屎血肉色青白味肉咸性屎微寒肉涼氣味厚於氣陰也臭臭制研細用治療日華子云糞治崩中帶下及敷惡瘡禁尾入人眼則翳入人耳則聾解肉解藥毒蠱毒血生飲之解毒藥鴟頭無毒卵生鴟頭主頭風眩顛倒癇疾名醫所録名鴟休只狐鳶地謹按埤雅云怪鴟即鵂鶹也貓目燕顙似鷹而白其鳴即雨為囮可以聚諸鳥晝無所見夜則飛啖蚊虻梟服鬼車之類莊子所謂鴟鵂夜撮蚤察毫末晝則瞑目而不見丘山藍田呂氏曰惡聲之鷙鳥也有梟萃止翩彼飛梟為梟為鴟此亦梟之類爾本經不載所出州土今處處有之用頭色蒼褐味咸性平軟氣味厚於氣陰中之陽治療食療云肉治癲癇疾合治飛鴟頭二枚合鉛丹一斤上二味末和蜜丸食後三丸治癲癇瘛瘲鸂𪆟無毒卵生鸂𪆟主食之去驚邪及短狐毒亦可養以闢之名醫所録地圖經曰鸂𪆟五色尾有毛如船舵小於鴨臨海異物志曰鸂𪆟水鳥食短狐蓋短狐即史記云蜮其形似鱉含沙射人為害者謹按埤雅云沈約郊居賦所謂秋鷖寒𪆟修鷁短兜是也性食短狐在山澤中無復毒氣故淮賦云鸂𪆟尋邪而逐害此鳥蓋溪中之敕邪逐害者故以名之如鴆之步罡鴷之晝印鸂𪆟之敕蜾螺之祝皆物之有術智者也然其溪遊雄者左雌者右雖群伍皆有式度也時生無時採無時用肉味甘性平緩氣氣厚於味陽中之陰臭腥斑鷦無毒附青鷦卵生斑鷦主明目多食其肉益氣助陰陽又有青鷦平無毒安五臟助氣虛損排膿治血並一切瘡癤癰瘻名醫所録名斑鳩布穀黃褐侯鳥地圖經曰處處有之春分則化為黃褐侯秋分則化為斑鷦衍義曰斑鷦即斑鳩也其性拙不能為巢詩云維鵲有巢維鳩居之正謂此也然有斑者有無斑者有灰色者有小者有大者雖有此數色其用則一也經云能化人嘗養之數年並不見其春秋分化也時生春夏生採無時用肉色灰紫味甘性平緩氣氣厚於味陽中之陰臭腥治補衍義曰久病虛損人食之補氣烏鴉無毒卵生烏鴉治瘦咳嗽骨蒸勞臘月瓦缶泥煨燒為灰飲下治小兒癇及鬼魅目睛注目中通治目名醫所録地圖經曰舊不著所出州土今在處有之謹按此鳥大於慈烏身喙盡黑其鳴啞啞故名之烏鴉也格物論云一種大喙白頸者南人謂之鬼雀其聲惡而致人所憎故俗以吉凶占之也時生無時採臘月取用翅羽嘴足頭質類慈烏而大色黑味酸鹹性平氣味厚於氣陰也臭腥主小兒風癇大人骨蒸制燒灰用治療別録云鴉頭治土蜂瘻以燒灰細研敷之其翅羽七枚燒末合酒服治從高墮下瘀血脹心面青短氣者當吐出血即愈烏鴉以臘月取翅羽嘴足全者泥缶固濟大火燒鍛入藥治急風練鵲無毒卵生練鵲益氣治風疾冬春間取細銼炒令香袋盛於酒中浸每朝取酒溫服之名醫所録地圖經曰舊本不著所出州土今山林間處處有之形似鴝鵒眼赤而小雄者色白雌則灰褐其尾俱長觜腳盡紅項頷微翠常與鴉鵲群飛人以網得之入藥唯食槐子者良時生無時採冬春間取質類鴝鵒色灰褐味甘性溫平氣氣之厚者陽也臭腥制細銼炒令香用鴝鵒無毒卵生鴝鵒肉主五痔止血炙食或為散飲服之名醫所録地唐本注云舊本不著所出州土江南多有之此鳥似鵙而有幘黑身金眼翅翎有白人於端午以東壁土拈其舌能效人言也時生無時採臘月臘日取用肉質類鵙而有幘色黑味甘性平緩氣氣厚味薄陽中之陰臭腥主止吃噫除久嗽制食療云作羹食之或搗用治療日華子云肉治老嗽及吃噫下氣須臘月取者炙食之合治臘月臘日取鴝鵒炙搗為末合白蜜丸服之治老嗽不瘥非臘日得者不堪用目睛合乳汁研點眼甚明能見云外之物雄鵲無毒卵生雄鵲主石淋消結熱名醫所録名飛駁鳥地圖經曰舊不著所出州土今在處有之每遇冬至架巢春乃成之其巢最為完固此鳥不交惟是傳枝感氣育卵而生也用之燒作灰以石投中散解者是雄也陶隱居云鳥之雌雄難別舊云其翼左覆右者是雄右覆左者是雌又燒羽作屑內水中沉者是雄浮者是雌今云投石恐止是鵲也余鳥未必爾其腦五月五日取之亦入術家用時生春夏採無時用肉腦色黑白味甘性寒氣氣之薄者陽中之陰臭腥主消渴制燒灰或淋汁用治療圖經曰肉治風及大小腸澀四肢煩熱胸膈痰結陶隱居云雄鵲子下石淋燒作灰淋取汁飲之日華子云肉治消渴疾鵲巢多年者燒灰療癲狂鬼魅及蠱毒亦敷瘻瘡禁婦人不可食鸕鷀屎有毒附頭鸕鷀屎主去面黑皯黶志頭微寒主鯁及噎燒服之名醫所録名蜀水花地圖經曰舊不載所出州土今水鄉皆有之此鳥胎生從口中吐雛如兔子類故杜臺卿淮賦云鸕鷀吐雛於八九鵁鶄銜翼而低昂是也産婦臨蓐令執之則易生其屎多在山石上紫色如花就石上刮取用之本經名蜀水花而唐之面膏方有用鸕鷀屎又用蜀水花者安得一物而兩用未知其的別有一種似鸕鷀而頭細背長頂上有白者名曰白鮫不堪藥用衍義曰此鳥不卵生口吐其雛今人謂之水老鴉巢於大木群集宿處常久則木枯以其糞毒也懷妊者不敢食蓋為口吐其雛又云執之易産二説相戾嘗官於澧州公宇後有大木一株其上有三四十巢日夕觀之既能交合兼有卵殼布地其色碧豈得雛吐口中是未目及蓋傳聞之誤也時生無時採無時用屎色紫性冷氣氣之薄者陽中之陰臭腥制研細用治療陶隱居云骨治魚骨鯁別録云糞燒灰水服方寸匕能斷酒合治糞和脂油調敷面瘢疵及湯火瘡痕並疔瘡屎干碾為末炙豬肉點與小兒啖之治疳蛔糞一合研以臘月豬脂和每夜敷鼻面酒齄疱禁肉懷妊不宜食鸛骨無毒鸛骨主鬼蠱諸疰毒五尸心腹疾名醫所録地陶隱居云鸛有兩種似鵠而巢樹者為白鸛黑色曲頸者為烏鸛入藥以白者良衍義曰其巢棲殿吻上亦有鸛頭無丹項烏帶身如鶴者是惟不善唳但以喙相系而鳴也時生春夏採無時用骨嘴腳色白味甘性大寒氣氣之薄者陽中之陰臭腥治療陶隱居云腳骨及觜治喉痹飛尸蛇𤊿咬及小兒閃癖大腹痞滿並煮汁服之燒為黑灰飲服亦佳合治骨炙令黃末空心合暖酒服方寸匕治尸疰鬼疰腹痛白鴿無毒卵生白鴿肉主解諸藥毒及人馬久患疥屎主馬疥一云犬疥人患疥食之立愈馬患疥入鬃尾者取屎炒令黃搗為末和草飼之又云鵓鴿暖無毒調精益氣治惡瘡疥並風瘙白癜癧瘍風炒酒服敷驢馬疥瘡亦可名醫所録地圖經曰舊不著所出州土今處處有之此鳥類鳩而大畜之能馴攜至數十里縱之亦能抵家乃禽中之靈者也其種羽色品類尤多而以純白者堪入藥用一種野鴿其形不殊但集巢於寺觀樓閣上其性不受人畜所謂左盤龍者是其屎也風藥多用之時生無時採無時用肉屎質類鳩而大色白味咸性平氣味厚於氣陰中之陽臭腥治療別録云白禿瘡以糞搗羅為散先以醋米泔洗了敷之立瘥合治白鴿屎五合以好醋和如稀膏煮三兩沸日三敷之治頭極癢不痛生瘡者白鴿毛糞燒灰以飲和服之治蠱白花鴿一隻切作小臠合土蘇煎含咽汁治消渴飲水不知足野鴿糞一兩炒微焦合麝香別研白朮各一分赤芍藥青木香各半兩柴胡三分延胡索一兩炒赤色去薄皮七物同為末溫無灰酒空心調一錢服治帶下排膿候膿盡即止後服仍以他藥補血臟禁病者食之雖益恐多食減藥力解一切藥毒百勞卵生百勞毛主小兒繼病繼病母有娠乳兒兒有病如瘧痢他日亦相繼腹大或瘥或發他人相近亦能相繼北人未識此病懷妊者取毛帶之又取其踏枝鞭小兒令速語名醫所録名鵙博勞伯趙地圖經曰舊不著所出州土今處處有之鄭禮注云鵙博勞也其飛不能翱翔但竦翅上下而已月令鵙始鳴應陰氣之動陽氣為仁義陰氣為殘賊伯勞賊害之鳥也其聲鵙鵙故因其音而名之詩曰七月鳴鵙八月載績蓋倉庚知分鳴鵙知至故陽氣分而倉庚鳴可蠶之候也陰氣至而鵙鳴可績之候也或曰鵙鳴在上蛇盤不動鵲鳴在上蝟反不行金得伯勞之血則昏鐵得𨁡雞之膏則瑩石得鵲髓則化銀得雉糞則枯凡物之相制有如此也時生春夏採無時用毛性平氣氣之薄者陽中之陰臭腥鶉無毒卵生鶉主補五臟益中續氣實筋骨耐寒溫消結熱小豆和生薑煮食之止泄痢酥煎食令人下焦肥四月勿食蝦蟆化為也名醫所録名羅鶉早秋白唐地別録云鶉有兩種有丹有白江北田野處皆有之此鳥性淳蠢不越橫草若遇小草橫於前即旋行避礙以其性淳厚之易熟故曰鶉也然鶉無常居而有常匹詩云鶉之奔奔言能不亂其匹本經云四月以前不宜食鶉以其蛙變故耳是時雨水絶無蛙聲人有得於水次者半為蛙張湛注云事見墨子斯不謬矣月令云田鼠化為鴽素問云鴽鶉也蓋物之變非一揆也衍義曰鶉有雌雄從卵生何言化也其説甚容易嘗于田野屢得其卵初生謂之羅鶉至初秋謂之早秋中秋以後謂之白唐然一物四名當悉書之時生夏生採冬取用肉色赤黃白味甘性溫平氣氣厚於味陽中之陰臭腥治療衍義曰治小兒患疳及下痢五色旦食之有效忌與豬肉同食令人生小黑子和菌子食之令人發痔啄木鳥無毒卵生啄木鳥主痔瘻及牙齒疳𧈟蚛牙名醫所録地圖經曰啄木即鴷鳥也有大有小有褐有斑褐者是雌斑者是雄剛爪利嘴舌長寸余而有利針穿木食蠹俗云此鳥善為禁法能曲爪書地為印則穴之塞自開飛輒以翼墁之此乃物之有智術者也今人鼠竊用其印以發扃鑰荊楚歲時記云野人以五月五日得啄木貨之主齒痛古今異傳云本雷公採藥吏化為此鳥淮南子云斫木愈齲信哉又有青黑者黑者頭上有紅毛生山中土人呼為山啄木大如鵲也時生無時採無時用嘴肉性平氣氣之薄者陽中之陰臭腥主齒痛制燒灰研細用治療別録云其舌尖治蛀牙有孔疼痛用綿裹咬於患處啄木鳥燒為末內蚛牙孔中不過三次即愈合治啄木一隻燒灰合酒下二錢治瘻有頭膿水出不止者慈鴉無毒卵生慈鴉補勞治瘦助氣止咳嗽骨蒸羸弱者和五味淹炙食之良名醫所録名慈烏寒鴉地圖經曰舊本不著所出州土今處處有之惟北地極多此鳥似鳥而小多集群飛作鴉鴉聲而能反哺故名慈鴉其肉不作膻臭即今之寒鴉也謹按埤雅云純黑而反哺者謂之烏小而腹下白不反哺者謂之鴉烏白項而群飛者謂之燕烏也用肉目睛質類烏鴉而小色黑味酸鹹性平氣味厚於氣陰也臭腥主止嗽補羸弱合治合五味醃炙食之治瘦病咳嗽骨蒸鶻嘲卵生鶻嘲主助氣益脾胃頭風目眩煮炙食之頓盡一枚至驗名醫所録名鴝䕵鶻鵃鶻雕地圖經曰其鳥南北皆有似鵲尾短黃色多聲在深林間飛翔不遠北人名鴝䕵東京賦云鶻嘲春鳴或呼為骨雕也謹按埤雅云鶻拳堅處大如彈丸俯擊鳩鴿食之鳩鴿中其拳隨空中即側身自下承之捷於鷹隼舊言鶻有義性杜甫所賦義鶻行是也冬撮鳥之盈握者夜以燠其爪掌左右易之旦即縱去其在東矣則是日不東向搏物南北亦然蓋其義性有擒有縱如此凡鳥朝鳴曰嘲夜鳴曰㖡禽經曰林棲之鳥多朝鳴水宿之鳥多夜叫此鳥朝鳴故謂之鶻嘲也時生春夏採無時用肉質類鵲而尾短色灰褐味咸性平軟氣味厚於氣陰中之陽臭腥主頭風目眩制煮炙用治療圖經曰肉治江東人呼頭風為腫頭先從兩項邊筋起直上入頭目眩頭悶者是鵜鶘卵生鵜鶘嘴主赤白久痢成疳者燒為黑末服一方寸匕名醫所録名逃河地圖經曰舊不載所出州土今江北水澤間皆有之此鳥大如蒼鵝頤下有皮袋容數升物展縮由袋中盛水以養魚其性好群飛沉水食魚若遇小澤有魚各以頤下胡去水令水竭魚露乃共食之身是水沫惟胸前有兩塊肉如拳云昔人竊肉入河化為此鳥今猶有肉因名逃河詩云維鵜在梁不濡其咮竹救切鄭云鵜鶘咮喙也言愛其嘴其油能透人肌骨故膏藥中多用之時生春夏採無時收油以諸器不能盛貯惟以此鳥頤下皮袋盛之則不漏用嘴及油質類蒼鵝而大頷下有囊色灰白味咸性平軟氣味厚於氣陰中之陽臭腥制嘴燒灰為末用鴛鴦有小毒卵生鴛鴦肉主諸瘻疥癬病以酒浸炙令熱敷瘡上冷更易名醫所録謹按格物論云鴛鴦文禽也類鳧毛有文采和鳴多好音雌雄並飛未嘗相離人得其一則一相思而死故謂之匹鳥也名匹鳥鄧木鳥鴦也時生春夏採無時用肉質類鳧色彩味咸性平軟氣味厚於氣陰中之陽臭腥治療食療云肉食之則令人美麗及治夫婦不和作羹臛私與食之立相愛也別録云鄧木鳥治齒痛合治肉合清酒炙食之治瘻瘡鴛鴦一隻煮令極熟細細切合五味醋食之治五痔瘻瘡作羹亦妙禁肉多食令人患大風天鵝無毒卵生天鵝主補中益氣今補地謹按此種出江淮間水澤處多有之狀似家鵝而大嘴黑頂黃其頸細長足黑毛白俗謂之金頭鵝以大者為上小者次之又有花者亦有不能鳴者飛則翎響其肉微腥皆不及金頭為勝也時生春夏採無時用肉色白味甘性熱氣氣之厚者陽也臭腥鴇無毒卵生鴇肉主補益人今補謹按埤雅云此鳥似雁而足無後指亦無舌性不木止毛有豹文故名獨豹肉雖粗而味美遇鷙鳥能激糞御之著其毛悉脫其群居如雁自然而有行列詩曰肅肅鴇羽集於苞桑是也時生春夏採無時用肉色斑味甘性平氣氣厚於味陽中之陰臭腥䳄䳓無毒卵生䳄䳓主補中益氣食之甚有益人髓味甘美補精髓今補地謹按此鳥舊本不載今考其形似鶴而小灰色赤頰項有白帶然有數種有白䳄䳓黑頭䳄䳓胡䳄䳓其味皆不同也今處處田澤中有之時生春夏採無時用肉髓質類鶴而小色灰褐味甘性溫緩氣氣之厚者陽也臭腥制炙食之味尤美水札無毒卵生水𩿤主補中益氣宜炙食甚美今補地謹按舊本不載所産今池澤水田多有之其形似水雞小而尖喙長頸短尾蒼赤色飛躍水面能捕魚食者也時生無時採無時用肉色蒼赤味甘性平氣氣之薄者陽中之陰臭腥八種陳藏器余布穀腳腦骨令人夫妻相愛五月五日收帶之各一男左女右云置水中自能相隨又江東呼為郭公北人云撥穀一名獲谷似鷂長尾爾雅云鳲鳩注云今之布穀也牝牡飛鳴以翼相拂禮記云鳴鳩拂其羽鄭注云飛且翼相擊蚊母鳥翅主作扇蚊即去矣鳥大如雞黑色生南方池澤茹藘中其聲如人嘔吐每口中吐出蚊一二升爾雅云鷏蚊母注云常説常吐蚊蚊雖是惡水中蟲羽化所生然亦有蚊母吐之猶如塞北有蚊母草嶺南有虻母草江東有蚊母鳥此三物異類而同功也杜鵑初鳴先聞者主離別學其聲令人吐血於廁溷上聞者不祥厭之法當為狗聲以應之俗作此説按荊楚歲時記亦云有此言乃復古今相會鳥小似鷂鳴呼不已蜀王本記云杜宇為望帝淫其臣鱉靈妻乃亡去蜀人謂之望帝異苑云杜鵑先鳴者則人不敢學其聲有人山行見一群聊學之嘔血便殞楚詞云鶗鴂鳴而草木不芳人云口出血聲始止故有嘔血之事也梟目無毒吞之令人夜中見物又食其肉主鼠瘻古人重其炙固當肥美內則云鵲梟眸其一名梟一名鵂吳人呼為𩴂魂惡聲鳥也賈誼云鵩似梟其實一物入室主人當去此鳥盛午不見物夜則飛行常入人家捕鼠周禮哲蔟氏掌覆妖鳥之巢注云惡鳴之鳥若梟鵂也鉤鵅音革入城城空入宅宅空怪鳥也常在一處則無若聞其聲如笑者宜速去之鳥似㮙有角夜飛晝伏爾雅云鵅鵋欺注云江東人呼謂之鉤鵅北土有訓胡二物相似抑亦有其類訓胡聲呼其名兩目如貓兒大於鴝鵒乃云作笑聲當有人死又有鵂鶹亦是其類微小而黃夜能入人家拾人手爪知人吉凶張司空云鵂鶹夜鳴人剪爪棄露地鳥拾之知吉凶鳴則有殃五行書云除手爪埋之戶內恐此鳥得之也爾雅云鵅鵋欺人獲之者於嗉中猶有爪甲莊子云㮙梟夜撮蚤察毫釐晝則瞑目不見丘山言殊性也姑獲能收人魂魄今人一云乳母鳥言産婦死變化作之能取人之子以為己子胸前有兩乳玄中記云姑獲一名天帝少女一名隱飛一名夜行遊女好取人小兒養之有小子之家則血點其衣以為志今時人小兒衣不欲夜露者為此也時人亦名鬼鳥荊楚歲時記云姑獲一名鉤星衣毛為鳥脫毛為女左傳云鳥鳴於亳杜注云嘻嘻音希是也周禮庭氏以救日之弓救月之矢射之即此鳥也鬼車晦瞑則飛鳴能入人室收人魂氣一名鬼鳥此鳥昔有十首一首為犬所噬今猶餘九首其一常下血滴人家則凶夜聞其飛鳴則捩狗耳猶言其畏狗也一名九頭鳥荊楚歲時記云姑獲夜鳴聞則捩耳乃非姑獲也鬼車鳥耳二鳥相似故有此同白澤圖云蒼鶊昔孔子與子夏所見故歌之其圖九首諸鳥有毒凡鳥自死目不閉者勿食鴨目白者殺人鳥三足四距殺人鳥六指不可食鳥死足不伸不可食白鳥玄首玄鳥白首不可食卵有八字不可食婦人妊娠食雀腦令子雀目凡鳥飛投人其口中必有物拔毛放之吉也
