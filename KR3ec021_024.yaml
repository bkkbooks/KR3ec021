body:
  text: 卷之二十三獸部上品鱗蟲龍骨無毒白龍骨齒角吉吊紫稍花等附龍骨出神農本經主心腹鬼疰精物老魅咳逆泄痢膿血女子漏下癥瘕堅結小兒熱氣驚癇齒主小兒大人驚癇癲疾狂走心下結氣不能喘息諸痙殺精物角久服輕身通神明延年以上朱字神農本經骨療心腹煩滿四肢痿枯汗出夜臥自驚恚怒伏氣在心下不得喘息腸癰內疽陰蝕止汗縮小便溺血養精神定魂魄安五臟白龍骨療夢寐泄精齒小兒五驚十二癇身熱不可近大人骨間寒熱又殺蠱毒角主驚癇瘛尺曳切瘲子用切身熱如火腹中堅及熱泄以上黑字名醫所録地圖經曰出晉地川穀及泰山岩水岩土穴中死龍處今河東州郡梁邑間蜀中多有之其齒小強猶有齒形角強而實及骨並腦須白地錦文舐之黏舌而具五色者為佳黃白色者次之黑色及生硬或經絡不淨處者不堪用其文細而廣者是雌文粗而狹者是雄皆出龍蛻實非死龍也然其色有五與五臟相應如五芝五石英五石脂輩之義惜乎本經而未分耳若無文如朽骨者謂之土龍骨藥不甚須海人云龍每生二卵一為吉吊多與鹿遊或於水邊遺瀝值流槎則黏著木枝如蒲槌狀其色微青黃復似灰色號為紫稍花坐湯多用之李肇國史補云春水時至魚登龍門蛻其骨人採之亦有五色者況龍門又屬晉地恐今所謂龍骨乃此魚之骨乎衍義曰諸家之説紛然不一既不能指定終是臆度西京潁陽縣民家崖壞忽得龍骨一副肢體頭角悉具不知其蛻也其斃也若謂蛻斃則是有形之物而又生不可得見死方可見謂其化也則其形獨不能化蓋萬物所稟各異造化不可盡知莫可得而詳矣時生無時採無時用舐之黏舌者良色錦文味甘性平微寒氣氣之薄者陽中之陰臭朽主澀精固氣助得人參牛黃良反畏石膏畏乾漆蜀椒理石制雷公云凡使先以香草煎湯浴過兩度搗研如粉用絹袋子盛粉末子以燕子一隻擘破腹去腸安骨末袋於燕腹內懸於井面上一宿至明取骨末重研萬下用之治療圖經曰齒角兼用治心爛龍角除心熱風癇藥性論云骨逐邪氣安心神止冷痢女子崩中帶下及夜夢鬼交虛而多夢紛紜齒鎮心安魂魄齒角主小兒熱日華子云骨健脾澀腸胃止瀉痢渴疾懷孕漏胎腸風下血鼻洪吐血止汗合治骨合虎骨遠志為末酒服治好忘聰明益智合韭子為末酒服止失精暫睡即泄毛蟲麝香無毒胎生麝香出神農本經主辟惡氣殺鬼精物溫瘧蠱毒癇痙去三蟲久服除邪不夢寤魘寐以上朱字神農本經療諸凶邪鬼氣中惡心腹暴痛脹急痞滿風毒婦人産難墮胎去面𪒟音暈目中膚翳通神仙以上黑字名醫所録名麝父地圖經曰出中臺山谷及益州雍州山中今陝西益利河東諸路山中皆有之而泰州文州諸蠻中尤多形似獐而小常食柏葉其香正在陰前皮內別有膜裹之春分取其生者益良蠻人採得以一子香刮取皮膜雜內余物裹以四足膝皮共作五子而土人買得又復分揉一為二三其偽可知惟生得之乃為真爾商汝山多群麝所遺糞常就一處雖遠近逐食必還走其地不敢遺迹他所慮為人獲人反以是求得必掩群而取之蓋麝絶愛其臍每為人所逐勢急即投岩舉爪剔裂其香就縶而死猶拱四足保其臍李商隱云投岩麝退香許渾云尋麝採生香正此謂也蘄光山中或時亦有然其香絶小一子才若彈丸往往是真香蓋彼人不甚能作偽爾一説香有三種第一生香麝子夏食蛇蟲多至寒則香滿入春臍內急痛自以爪剔出之落處遠近草木皆焦黃此極難得今人帶真香過園中瓜果皆不實此其驗也其次臍香乃捕得殺取者又其次心結香麝被大獸捕逐驚畏失心狂走巔墜岩谷而斃人得之破心見血流出作塊者是也此香乾燥不可用又有一種水麝其香更奇好臍中皆水瀝一滴於鬥水中用濯衣其衣至敝而香不歇唐天寶虞人嘗獲一水麝詔養於囿中每取以針刺其臍捻真雄黃塗之復合其香氣倍於肉麝近歲不復聞有之時生無時採春分取收以瓷器收貯色黑味辛性溫散氣氣之厚者陽也臭香主辟邪穢通關竅制雷公云凡使麝香並用子日開之不用苦細研篩用之也治療陶隱居云祛蛇毒辟惡夢及尸疰鬼氣藥性論云除百邪魅鬼疰心腹痛小兒驚癇客忤鎮心安神止小便利蝕一切癰瘡膿日華子云催生殺臟腑蟲制蛇蠶咬沙蝨溪瘴毒吐風痰納子宮暖水臟止冷帶疾別録云除百病一切惡氣合治合乳汁調服療中水氣已服藥未平除合墨研書額上去邪魘治瘧有效合醋研服治中惡客忤垂死瘥禁妊娠不可服忌大蒜解蛇毒熊脂無毒附膽腦髓掌肉血胎生熊脂出神農本經主風痹不仁筋急五臟腹中積聚寒熱羸瘦頭瘍白禿面皯皰久服強志不飢輕身長年以上朱字神農本經食飲嘔吐以上黑字名醫所録地圖經曰出雍州山谷今雍洛河東及懷衛山中皆有之其形類大豕而性輕捷好攀緣上高木見人則顛倒自投地而下冬則入穴藏蟄至春而出其脂謂之熊白也十一月取之須其背上者寒月則有夏月則無其腹中肪及他處脂煎煉亦可入藥而不中啖膽亦多偽欲試之取粟顆許滴水中一道若線不散者為真蹯即掌也為八珍之一古今最重之但胹𪄀之切煮熟也之難熟多食令人耐寒熊性惡鹽食之則死時生無時採十一月取脂收脂以瓷器盛貯膽陰乾用脂膽腦髓掌肉血色白味甘膽苦肉甘性微寒膽寒肉平氣氣之薄者陽中之陰臭腥主補虛損除風痹反膽惡防己地黃制雷公云凡收脂後煉過就器中安生椒一斤熊脂入生椒十四個煉了去脂革並椒入瓶中收任用治療唐本注云膽除熱盛變為黃疸暑月久痢疳𧈟心痛疰忤腦除諸聾血小兒客忤脂長髮令黑悅澤人面酒煉服之瘥風痹藥性論云膽消小兒五疳殺蟲塗惡瘡脂去面上皯𪒟及塗瘡日華子云白祛風殺勞蟲脂強心腦髓去白禿風屑頭旋並落髮掌食御風寒膽塗疳瘡耳鼻瘡及疳疾別録云肉除風痹筋骨不仁骨煮湯浴歷節風及小兒客忤膽小兒驚癇合治膽合乳汁並竹瀝療小兒驚癇瘛瘲去心中涎良禁熊脂燃燈損人眼光十月勿食肉食之傷神有痼疾人不宜食熊肉令終身不愈腹中有積聚寒熱者食熊肉永不除牛黃有小毒胎生牛黃出神農本經主驚癇寒熱熱盛狂痙除邪逐鬼以上朱字神農本經療小兒百病諸癇熱口不開大人狂癲又墮胎久服輕身增年令人不忘以上黑字名醫所録地圖經曰出晉地平澤今出登萊密淄青嶲戎州它處或有不甚佳凡牛有黃者皮毛光澤眼如血色時復鳴吼又好照水人以盆水承之伺其吐出乃喝迫即墮落水中既得之陰乾百日一子如雞子黃大其重疊可揭析輕虛而氣香者佳然此物多偽今人試之皆揩摩手甲上以透甲黃者為真又云此有四種喝迫而得者名生黃其殺死而在角中得者名角中黃心中剝得者名心黃初在心中如漿汁取得便投水中沾水乃硬如碎蒺藜或皂莢子是也肝膽中得之者名肝黃大抵皆不及喝迫得者最勝唐本注云黃有三種散黃粒如麻豆慢黃若雞卵中黃糊在肝膽圓黃為塊形有大小並在肝膽中多生於𤚩音秦特牛其吳牛未聞有黃也衍義曰亦有駱駝黃皆西戎所出也駱駝黃極易得醫家當審別考而用之為其形相亂也黃牛黃性輕鬆自然微香以此為異若犛音茅牛黃則堅而不香也時生無時採無時收陰乾百日使時燥無令見日月光用喝迫吐出者最佳質類雞子黃而輕鬆可析色黃味苦性平日華子云涼氣味厚氣薄陰中之陽臭香主寧心神除癇熱助人參為之使反惡龍骨地黃龍膽蜚蠊常山畏牛膝乾漆制雷公云凡使用須先單搗細研如塵卻以絹裹又用黃嫩牛皮裹安於水面上去水三四尺以來一宿至明方取用之治療藥性論云辟邪魅安魂定魄小兒夜啼又卒中惡日華子云中風失音口噤驚悸天行時疾健忘虛乏合治合竹瀝調敷初生小兒口噤合乳汁調臍下書田字療小兒腹痛夜啼合蜜水調服療小兒驚癇不知迷悶嚼舌仰目合牡丹菖蒲利耳目禁妊婦勿服贋駱駝黃為偽牛角䚡無毒附髓膽心脾腎齒肉屎溺牛角䚡出神農本經主下閉血瘀血疼痛女人帶下血髓補中填骨髓久服增年膽可丸藥以上朱字神農本經水牛角味苦冷無毒療時氣寒熱頭痛髓味甘溫無毒主安五臟平三焦溫骨髓補中續絶傷益氣止泄痢消渴以酒服之膽味苦大寒降心腹熱渴利口焦燥益目精心主虛忘肝主明目腎主補腎氣益精齒主小兒牛癇肉味甘平無毒主消渴止啘泄安中益氣養脾胃自死者不良屎寒主水腫惡氣用塗門戶著壁者燔之主鼠瘻惡瘡黃犍牛烏牯牛溺主水腫腹脹腳滿利小便以上黑字名醫所録地陳藏器云本經不言黃牛烏牛水牛但言牛牛有數種南人以水牛為牛北人以黃牛烏牛為牛牛種既殊入用亦別故乳及溺屎去病者黑牛勝於黃牛也孟詵云牛者稼穡之資不多屠殺自死者血脈以絶骨髓已竭而不堪食黃牛發藥動病不如水牛也惟酥乳佳黑牛尤不可食但其屎及尿宜入藥用收取牛涎以水洗口後鹽塗之則重吐出收用用角䚡心肝腎肉膽齒頭蹄尿屎鼻牛莖口中涎口中齝草髓耳中垢毛鼻中木卷草卷味黃牛角䚡苦甘沙牛角䚡苦性黃牛角䚡澀沙牛角䚡溫氣味厚於氣陰中之陽臭腥主消瘀血止帶下制燒灰用治療圖經曰沙牛角䚡灰塗乳上令兒吮之治飲乳不快覺似喉痹者烏特牛溺除腳氣少腹脹小便澀黃犍牛溺下水腫屎燒灰敷炙瘡口中涎止反胃老牛涎沫主噎口中齝醜之反草絞汁服止噦唐本注云鼻中木卷治小兒癇草卷燒屑敷小兒鼻下瘡耳中垢塗蛇傷惡蠔七吏切毒臍中毛治小兒久不行白牛懸蹄止婦人崩中漏下赤白屎止霍亂屎中大豆除小兒癇及婦人産難特牛莖治婦人漏下赤白無子腦止消渴除風眩齒主小兒驚癇屎止消渴黃疸水腫腳氣小便不通藥性論云黃牛角䚡止婦人崩中赤白帶下及冷痢瀉血青牛膽止消渴利大小便日華子云水牛角煎治熱毒風並壯熱角䚡燒焦止腸風瀉血痢崩中帶下水瀉涎止嘔吐黃牛骨髓止吐血鼻洪崩中帶下腸風瀉血並水瀉燒灰用陳藏器云牛肉消水腫除濕氣黃牛水牛角䚡灰主赤白痢孟詵云烏牛干糞止小兒夜啼取如手大置臥席下勿令母知子母俱吉頭啼下風熱衍義曰白水牛鼻治偏風口喎斜以火炙熱於不患處一邊尉之漸正別録云牛鼻作羹婦人空心食之乳汁即下烏牛耳中垢敷疳蟲蝕鼻生瘡補陳藏器云黃牛肉補虛令人強筋骨壯健益腰腳合治沙牛角䚡燒灰合酒服療喉痹腫塞欲死者黃牛膽合天南星末消痰除風黑牛髓合地黃汁白蜜作煎服治瘦病臘月牯牛膽入黑豆浸百日每夜服二七粒鎮肝明目肝合腹內百葉生薑醋食之療熱氣水氣丹毒壓丹石發熱解酒勞鼻合石燕煮汁服療消渴禁牛自死者發痼疾痃癖令人成疰病頭蹄患冷疾人不可食獨肝者有大毒食之痢血至死北人牛瘦多以蛇從鼻灌之則為獨肝也水牛則無之忌青牛腸不可共犬肉犬血食令人成病牛乳無毒牛乳主補虛羸止渴名醫所録地唐本注云𤚩牛水牛南北皆有之𤚩牛乳為佳而不用新飲者水牛乳造石蜜須用之及作酪濃厚味勝於𤚩牛也時生無時採無時收瓷器收貯色白味甘性微寒氣氣之薄者陽中之陰臭膻主止渴潤燥制凡使乳必煮一二沸停冷啜之熱食即壅治療日華子云黃牛乳髓潤皮膚養心肺解熱毒陳藏器云下熱氣止渴別録云除胃中熱心脾中熱下焦虛冷小便多漸羸瘦補別録云補虛羸合治合酥煎數沸待冷服去冷氣痃癖羸瘦合薑汁銀石器中煎數沸服治小兒煩熱穢禁熟飲令人口乾患冷氣人不宜服之𤚩牛乳生飲令人利忌與生魚食之則作瘕與酸物同食令人腹中結症解熱毒酥無毒酥補五臟利大腸主口瘡名醫所録地陶隱居云出外國亦從益州來今南北皆有之是牛羊乳而成作之自有法蓋酪成於乳酥成於酪堪作餅食之甚肥甘唐本注云酥掏他勞切酪作之其性猶與酪異然有牛酥羊酥而牛酥甚於羊酥其犛音茅牛復優於家牛也時生無時採無時收瓷器盛貯用冬月取者佳色白味甘性微寒氣氣之薄者陽中之陰臭膻主益心肺潤毛髮治療日華子云酥止渴及嗽除肺痿心熱並吐血孟詵云除胸中熱利腸胃別録云敷蜂螫合治合諸膏摩風腫踠趺血瘀合鹽敷惡蟲咬酪無毒酪主熱毒止渴解散發利除胸中虛熱身面上熱瘡肌瘡名醫所録地圖經曰舊本不載所出州郡今南北多有之牛馬驢羊乳大抵功用相近惟驢乳性冷利不堪作酪羊乳溫補馬乳作酪為佳不若牛乳為上也時生無時採無時收以瓷器貯之色白味甘酸性寒氣氣薄味厚陰中之陽臭膻治療日華子云牛酪止煩渴熱悶心膈熱痛別録云牛酪消熱毒除胸中熱及蚰蜒入耳灌耳中即出若入腹飲酪自消為黃水合治合鹽熱煮摩丹毒癮疹即消禁患冷人勿食羊乳酪患痢人亦不可食乳腐無毒乳腐潤五臟利大小便益十二經脈微動氣細切如豆麵拌醋漿水煮二十餘沸治赤白痢小兒患服之彌佳名醫所録地南北皆有之時生無時採無時用細膩不去酥者佳色白味甘性微寒氣氣之薄者陽中之陰臭膻禁多食動氣醍醐無毒醍醐主風邪痹氣通潤骨髓名醫所録地圖經曰舊不載所出州土今南北皆有之此酥中之精液也功優於酥好酥一石止有醍醐三四升熟抨普耕切煉貯器中待凝穿中至底便津出而得之蜀本云一説在酥中盛冬不凝盛夏不融者是也衍義曰作酪時上有一重凝者為酪面酪面上其色如油者為醍醐熬之即出不可多得極甘美雖如此取之用處亦少惟潤養瘡痂最相宜也時生無時採無時收性滑以物盛之皆透惟雞子殼及葫瓢盛之不出色白味甘性平寒氣氣之薄者陽中之陰臭膻主潤心肺澤肌膚制雷公云凡使以綿重濾過於銅器中沸三兩沸了用治療日華子云止驚悸心熱頭疼明目敷腦頂心衍義曰潤養瘡痂別録云散風邪通潤骨髓及肺病咳嗽膿血不止合治合酒調服療中風煩熱皮膚瘙癢及補虛去風濕痹象牙無毒附齒肉睛膽胸骨胎生象牙主諸鐵及雜物入肉刮取屑細研和水敷瘡上及雜物刺等立出齒主癇病屑為末炙黃飲下肉味淡不堪啖多食令人體重主禿瘡作灰和油塗之睛主目疾和乳滴目中胸前小橫骨令人能浮水作灰酒服之名醫所録地圖經曰出交趾潮循等州其獸孕五歲始産六十歲骨方足身有百獸肉自有分段或曰身具十二肖肉配十二辰惟鼻是其本肉鼻端有爪可拈針芥膽不附肝隨四季而在四腿春在前左夏在前右如龜定體太平廣記雲安南有象能知人曲直有鬥訟者行立而嗅之有理者則過無理者以鼻卷之擲空數丈以牙接而刺之即若豸之觸姦草之指佞蓋物性之靈而所稟剛正之氣然耳用牙齒骨肉睛膽色白味淡性平氣氣之薄者陽中之陰臭朽制刮細屑用治療圖經曰治咽中刺刮屑水調服日華子云治小便不通生煎服之小便多燒灰飲下膽明目及治疳別録云膽水和塗瘡腫瘥又口臭每夜水研少許綿裹貼齒根或含之平明暖水洗口如此三五度瘥合治合白梅肉敷小兒誤為諸骨及魚骨刺入肉不出者合琥珀竹膏真珠犀角牛黃治風癇熱骨蒸勞諸瘡膽合乳滴目中療目疾禁多食肉令人體重阿膠無毒熬成阿膠出神農本經主心腹內崩勞極灑灑音蘚如瘧狀腰腹痛四肢痠疼女子下血安胎久服輕身益氣以上朱字神農本經丈夫小腹痛虛勞羸瘦陰氣不足腳痠不能久立養肝氣以上黑字名醫所録名傅致膠盆覆膠地圖經曰出東平郡之東阿故名阿膠也其法以阿縣城北井水煮烏驢皮成之其井官禁民間真者最為難得今之市者形色製作頗精入藥未聞其效蓋不得此井水故耳大抵驢皮得阿井水煎者乃佳也其餘但可膠物不堪藥用時無時收陰乾用明淨者佳色黑緑味甘性平微溫氣氣厚味薄陽也臭腥主益肺安胎行手太陰經足少陰經厥陰經助山藥為之使得火良反畏大黃制雷公云凡使先於豬脂內浸一宿至明出於柳木火上炙待泡了細研用今以銼如麻豆大與蛤粉同入鍋內炒令成珠方入藥用治療藥性論云止痢陳藏器云治風為最諸膠祛風止泄補藥性論云堅筋骨益氣陳藏器云補虛湯液本草云和血脈補肺金不足合治炒令黃燥為散每食前以粥飲調下二錢匕療妊娠尿血以三兩炒搗末和酒一鍾半煎令消化療妊娠無故卒下血不止一服即愈以二兩合酒一鍾半煮取一鍾頓服療妊娠血利白馬莖無毒附眼蹄齒心肺肉骨屎溺白馬莖出神農本經主傷中脈絶陰不起強志益氣長肌肉肥健生子眼平主驚癇腹滿瘧疾當殺用之懸蹄平主驚邪瘛瘲乳難辟惡氣鬼毒蠱疰不祥以上朱字神農本經白馬莖治小兒驚癇懸蹄止衄血內漏齲齒白馬蹄味甘平熱無毒療婦人瘻下白崩赤馬蹄療婦人赤崩齒主小兒驚癇鬐頭膏平主生髮鬐毛主女子崩中赤白心主喜忘肺主寒熱莖痿肉味辛苦冷有毒主熱下氣長筋強腰脊壯健強志輕身不飢脯療寒熱痿痹屎微溫主婦人崩中止渴及吐下血鼻衄金瘡止血頭骨微寒主喜眠令人不睡溺味辛微寒主消渴破症堅積聚男子伏梁積疝婦人瘕疾銅器承飲之以上黑字名醫所録地圖經曰出雲中平澤今處處有之馬之色類甚多以純白及口眼蹄皆白者是也然百數中時兩三爾按陳藏器云凡收白馬莖當以遊牝時力勢正強而生取得者為佳尿屎入藥亦以白馬者良時生無時採春月收陰乾百日用莖眼白馬蹄懸蹄心脯肺齒鬐頭膏鬐毛肉溺屎頭骨赤馬蹄味鹹甘性平氣氣厚於味陽中之陰臭臊主強陰益氣制雷公曰凡用以銅刀劈破作七片將生羊血拌蒸半日出曬乾以粗布拭上皮並干羊血細銼用之治療唐本注云馬毛止小兒驚癇白馬眼闢小兒鬾病令母帶之屎中粟治金瘡及小兒客忤寒熱不能食絆繩主小兒癇作湯洗之藥性論云白馬莖主男子陰痿日華子云頭骨治多睡作枕枕之及燒灰敷頭耳瘡尿洗頭瘡白禿陳藏器云屎絞汁治傷寒時疾服之當吐下及産後諸血氣並時行病起合陰陽垂死者並溫服之孟詵云懸蹄主驚癇赤馬蹄闢瘟瘧鬃燒灰止血並敷惡瘡食療云馬汗入人瘡毒氣攻心悶絶者以粟杆草燒作灰淋取濃灰汁熱煮蘸瘡於灰汁中須臾白沫出盡即瘥白沫者是毒氣也別録云糞水煮絞汁漬毒熱攻手足腫疼痛欲脫者骨作末敷乳上令兒飲止小兒夜啼不已白馬懸蹄切碎塞患齒齲不過三度瘥白馬尿取三升空心飲之療肉症思肉不已食訖復思法當吐肉不吐即死及治斃瘕馬蹄屑二兩縫囊男左女右帶之闢瘟疫夜眼如米大以綿裹內蛀齒孔中治齒痛頭骨燒灰為末水服方寸匕日三夜一療人嗜眠喜睡糞燒灰為末研敷馬咬人傷或刺破瘡及馬汗入瘡毒痛者或馬尿洗亦佳尾燒於小兒面前令兒咽煙氣療小兒中馬毒及客忤每日燒之以瘥為度肉爛煮汁洗踠豆瘡或煮乾脯亦得溺塗乳腫立愈黑駁馬尿熱浸刺瘡當蟲出愈馬騾濕糞炒分取半替換熱尉杖瘡並打損瘡中風疼痛處令則易之滿五十過極效赤馬皮療難産臨産鋪之令産母坐上即易生合治白馬莖陰乾為末合蓯蓉蜜丸空心酒下四十丸日再服主益丈夫陰氣骨作灰合醋敷小兒頭瘡亦煮身上瘡並白禿瘡白馬蹄燒灰為末合臘月豬脂和敷頭赤禿尿三升燒令煙盡合酒三斗煮三沸去滓浴小兒卒中客忤蹄燒作灰末合豬脂塗綿上導下部日數度療病人齒無色舌上白或喜睡憒憒不知痛癢處或下痢可急治下部不曉此者但攻其上不以下為意下部生蟲食其肛門爛見五臟便死者瘥野馬肉一斤細切合豉煮汁著五味蔥白調和作醃臘食之或作羹粥及白煮吃之能治馬癇動發無時筋脈不收周痹肌肉不仁蹄灰合豬脂和敷天行𧈟瘡日五六次馬通絞取汁一盞合酒和服之療産後寒熱心悶極脹並百病糞合齒共研爛敷多年惡瘡不瘥或痛或癢及生釁者不過三兩度良牙燒作灰合唾攤緋帛上貼疔腫根出禁馬心患痢人不得食駿馬肉食之不飲酒殺人馬肝及鞍下肉食之殺人白馬青蹄亦不可食馬黑脊而斑臂漏不可食患瘡疥人切不可食馬骨傷人馬汗馬氣馬尾並能為害馬自死肉不可食五月勿食傷神白馬黑頭食之令人癲及生馬血入人肉中多隻三兩日便腫連心則死有人剝馬被骨傷肉中一夜致死蹄無夜眼者勿食馬生疥者不可食食之生寸白蟲婦人懷娠不得食馬肉為其十二月胎恐産遲故也解食諸馬肉心悶飲清酒即解濁酒即加食血亦飲美酒解之馬肉不與薑同食生氣嗽及忌蒼耳生薑同食又勿與倉米同食必卒得惡疾馬乳無毒驢乳附馬乳止渴名醫所録地陶隱居云今人不甚服當緣難得也唐本注云馬乳與驢乳性同冷利馬乳作酪尤為酷冷江南乏馬乳今俱合是冷委言之胡言馬酪性溫飲之消肉當以物類自相制伏不拘冷熱也時採無時收以瓷器盛貯色白味甘性冷利氣氣之薄者陽中之陰臭腥治療唐本注云祛熱消肉積驢乳治微熱黃及小兒中熱驚熱服之忌不可與生魚同食食之成瘕疾底野迦無毒底野迦主百病中惡客忤邪氣心腹積聚名醫所録地圖經曰出西戎彼人用諸膽合和作之狀似久壞丸藥赤黑色今海南或有之唐本注云胡人時將至此甚珍貴試用有效收瓷器貯之質狀如久壞丸藥色赤黑味辛苦性平氣氣薄味厚陰中之陽臭腥五種陳藏器余荼苜機屎主蛇虺毒兩頭鹿屎也出永昌郡取屎以敷瘡博物志云蔡余義獸似鹿兩頭其胎中屎四時取之未知今有此物否荼苜機余義也范曄後漢書云云陽縣有神鹿兩頭能食毒草華陽國志曰此鹿出雲陽南郡熊舍山即此余義也諸朽骨主骨蒸多取淨洗刮卻土氣於釜中煮之取桃柳枝各五斗煮枯棘針三斗煮減半去滓以酢漿水和之煮三五沸將出令患者散發正坐以湯從頂淋之唯熱為佳若心悶可進少冷飯當得大汗去惡氣汗乾可粉身食豉粥羸者少與又東牆腐骨醋磨塗痕得滅及除癧瘍風瘡癬白爛東牆牆之東最向陽也烏氈無毒主火燒生瘡令不著風水止血除賊風燒為灰酒下二錢匕主産後血下不止久臥吸人脂血令人無顏色上氣海獺味鹹無毒主人食魚中毒魚骨傷人痛不可忍及鯁不下者取皮煮汁服之海人亦食其肉似獺大如犬腳下有皮如人胼栂毛著水不濡海中魚獺海牛海馬海驢等皮毛在陸地皆候風潮猶能毛起博物志有此説也土撥鼠味甘平無毒主野雞瘻瘡肥美煮食之宜人生西蕃山澤穴土為窠形如獺夷人掘取食之魏略曰大秦國出闢毒鼠近似此也
