body:
  text: 卷之一玉石部上品之上石之石丹砂無毒石穴生丹砂出神農本經主身體五臟百病養精神安魂魄益氣明目殺精魅邪惡鬼久服通神明不老能化為汞以上朱字神農本經通血脈止煩滿消渴益精神悅澤人面除中惡腹痛毒氣疥瘻諸瘡輕身神仙以上黑字名醫所録名云丹砂馬齒砂豆砂末砂土砂石砂硃砂真朱光明砂馬牙砂無重砂越砂鹿蔌妙硫砂白庭砂金座砂梅柏砂白金砂澄水砂玉座砂辰錦砂芙蓉砂陰成砂箭簇砂曹末砂鏡面砂平面砂神末砂金星砂巴砂地圖經曰丹砂生符陵山谷今出辰州宜州階州而辰州者最勝謂之辰砂生深山石崖間土人採之掘地數十尺始見其苗乃白石耳謂之硃砂床砂生石上其塊大者如雞子小者如石榴子狀若芙蓉頭箭簇連床者紫黯若鐵色而光明瑩徹碎之嶄岩作牆壁又似雲母片可析者真辰砂也無石者彌佳過此皆淘土石中得之非生於石床者陶隱居云出武陵西川諸蠻夷中皆通屬巴地謂之巴砂仙經亦用越砂出廣州臨津者二處並好惟光明瑩徹為佳如雲母片者謂之雲母砂如樗蒲子紫石英形者謂馬齒砂亦好如大小豆及大塊圓滑者謂豆砂細末碎者謂末砂此二種粗不入藥用但可畫用爾時生無時採無時質光明瑩徹如雲母可析者良色赤味甘性微寒氣氣薄於味陰中之陽臭朽主鎮心安魂魄反畏鹹水制雷公云凡使宜須細認尚有百等有妙硫砂如拳大或重一鎰有十四面面如鏡若遇陰沉天雨即鏡面上有紅漿汁出有梅柏砂如梅子大夜有光生照見一室有白庭砂如帝朱子大面上有小星現有神座砂金座砂玉座砂不經丹灶服之而自延壽命次有白金砂澄水砂陰成砂辰錦砂芙蓉砂鏡面砂箭簇砂曹末砂土砂金星砂平面砂神末砂不可一一細述也夫修事硃砂先於一靜室內焚香齊沐然後取砂以香水浴過了拭乾即碎搗之後向鉢中更研三伏時竟取一甕鍋子著研了砂子內用甘草紫背天葵五方草各銼之著砂上下以東流水煮亦三伏時勿令水火闕失時候滿去三件草又以東流水淘令淨干曬又研如粉用小瓷瓶子盛又入青芝草山須草半兩蓋之下十斤火鍛從巳至子時方歇候冷再研似粉如要服則入熬蜜丸如細麻子大空腹服一丸如尋常入藥乳極細水飛過用治療藥性論云鎮心並尸疰風日華子云潤心肺療瘡疥痂息內服並塗用別録云傷寒時氣溫疫頭痛壯熱脈盛才一二日者以一兩水煮一升頓服覆衣被取汗即瘥又療小兒未滿月驚著似中風欲死者以新汲水濃磨汁塗五心上立瘥合治以一兩水煮數沸為末合酒服療妊婦子死腹中不出贋武都仇池雄黃挾雌黃者名為丹砂方家亦往往俱用此為僞矣雲母石無毒土石生雲母石出神農本經主身皮死肌中風寒熱如在車船上除邪氣安五臟益子精明目久服輕身延年以上朱字神農本經下氣堅肌續絶補中療五勞七傷虛損少氣止痢悅澤不老耐寒暑志高神仙以上黑字名醫所録名云珠雲華雲英磷石雲液云砂云膽地涿地圖經曰生泰山山谷及琅邪北定山今兗州雲夢山江州濠州杭越間有之多生於土石間作片成層可析明滑光白者為上其片絶有大而瑩潔者今人或以飾燈籠亦古屏扇之遺事耳抱朴子內篇云云母有五種人莫能辨當舉以向日詳視其色乃可知其正於陰地視之不見其雜色也其五色並具而多青者名雲英宜以春服之五色並具而多赤者名云珠宜以夏月服之五色並具而多白者名雲液宜以秋服之五色並具而多黑者名雲母宜以冬服之但有青黃二色者名云砂宜以季夏服之皛刑料切皛純白者名磷石四時可服也然則醫方所用正白者乃磷石一種耳惟青州江東及廬山者為勝其黯黯純黑有紋斑斑如鐵者名云膽雜黑而強肥者名地涿及江南多青黑色者皆不可入藥也時採二月取用通透輕薄者質類紗縠而明淨色青赤黃白黑味甘性平緩氣氣厚於味陽中之陰臭朽主下痢腸澼助澤瀉為之使反畏鮀甲及流水惡徐長卿制雷公云凡修事一斤先用小地膽草紫背天葵生甘草地黃汁各一鎰乾者細銼濕者取汁了於瓷鍋中安雲母並諸藥了下天池水三鎰者火著七日夜水火勿令失度其雲母自然成碧玉漿在鍋底卻以天池水猛投其中將物攪之浮如蝸涎者即去之如此三度淘淨了取沉香一兩搗作末以天池水煎沉香湯三升已末分為三度再淘雲母漿了日中曬任用治療別録云雲母粉消風疹遍身百計治不瘥者以清水調服之亦主帶下並淋疾敷金瘡及一切惡瘡尤妙補藥性論云補腎冷合治雲母粉合生羊髓和如泥塗之療火瘡敗壞禁色黃黑者厚而頑赤色者經婦人手把者並不中用忌羊血玉屑無毒石生玉屑主除胃中熱喘息煩滿止渴屑如麻豆服之久服輕身長年名醫所録名玄真璞玉珏琛和氏璧球琳璠璵珩瓊連城璧黃璧玄璧琚瑤璆瑜青璧白璧白玉碧玉紫玉緑玉蒼玉紅玉玫瑰赤璋地圖經曰玉按本經玉屑生藍田陶隱居注云好玉出藍田及南陽徐善亭部界中日南盧容水中外國於闐疏勒諸處皆善今藍田南陽日南不聞有玉禮器及乘輿服御多是于闐國玉陶隱居云玉屑是以玉為屑非應別是一物仙經服珏玉有搗如米粒乃以苦酒輩消令如泥亦有合漿者蘇恭云屑如麻豆服之取其精潤臟腑滓穢當完出若為粉服之即使人淋壅書傳載玉之色曰赤如雞冠黃如蒸栗白如截肪黑如純漆為之玉符而青玉獨無說焉又其質溫潤而澤其聲清越以長所以為貴也今五色玉青白者常有黑者時有黃赤者絶無雖禮之六器亦不能得其真然服玉食玉惟貴純白他色亦不取焉時採無時用屑質類水精而溫潤色白味甘性寒緩氣氣之薄者陽中之陰臭朽主止渴滅瘢反惡鹿角制陶隱居云仙經服珏音角玉有搗如米粒乃以苦酒輩消令如泥服之治療日華子云潤心肺明目滋毛髮助聲喉別録云含玉咽津以解肺熱合治璧玉合金銀麥門冬等煎服滋養五臟除煩躁石之水玉泉無毒穴生玉泉出神農本經主五臟百病柔筋強骨安魂魄長肌肉益氣久服耐寒暑不飢渴不老神仙人臨死服五斤死三年色不變以上朱字神農本經利血脈療婦人帶下十二病除氣癃音隆明耳輕身長年以上黑字名醫所録名玉札玉液瓊漿地圖經曰玉泉生藍田山谷陶隱居云藍田在長安東南舊出美玉此當是玉之精華白者質色明徹可消之為水故名玉泉今人無復的識者惟通呼為玉爾蘇公云玉泉者玉之泉液也以仙室池中者為上其以法化為漿者功劣於自然泉液也衍義曰經云玉泉生藍田山谷今藍田山谷無玉泉泉水古今不言採又曰服五斤古今方水不言斤又曰一名玉札如此則不知定是何物諸家所解更不言泉但為玉立文陶隱居雖曰可消之為水故名玉泉誠如是則當言玉水亦不當言玉泉也今詳泉字乃是漿字於義方允採玉為漿斷無疑焉時採無時用漿質明徹如水色白味甘淡性寒氣氣之薄者陽中之陰臭朽主治血塊反畏款冬花礬石無毒煎煉成礬石出神農本經主寒熱泄痢白沃陰蝕惡瘡目痛堅骨齒煉餌服之輕身不老增年以上朱字神農本經除固熱在骨髓去鼻中息肉以上黑字名醫所録名羽𧍪泥結切黃礬馬齒礬白礬羽澤黑礬礬蝴蝶青礬絳礬皂礬皂莢礬石膽礬精地圖經曰生河西山谷及隴西武都石門今白礬則晉州慈州無為軍初生皆石也採石碎之煎煉乃成礬有五種其色各異謂白礬青礬黃礬黑礬絳礬也白礬則入藥又有礬精礬蝴蝶皆煉白礬時候其極沸盤心有濺溢者如物飛出以鐵匕接之作蟲形者謂之礬蝴蝶但成塊如水晶者謂之礬精此二種入藥力緊於常礬也衍義曰今坊州礬務以其火燒過石取以煎礬色惟白不逮晉州者皆不可多服損心肺卻水故也水化書紙上才幹水不能濡故知其性卻水治涎藥多須者用此意爾時採無時用白色光明者質類方解石而明淨色青白味酸澀性寒氣味厚氣薄陰中之陽臭腥主泄痢消痰助甘草為之使反畏麻黃惡牡蠣制用瓷瓶盛於火中鍛過研細為度治療圖經曰白礬治蛇咬蠍螫以刀頭燒赤礬置刀上成汁乘熱滴咬處黑礬染須鬢唐本注云青黑二礬療疳及諸瘡黃礬亦療瘡生肉藥性論云礬石治鼠漏瘰癧及鼻衄齆鼻生含咽津治急喉痹日華子云白礬除風去勞消痰止渴暖水臟別録云白礬治小兒臍中赤腫汁出不止燒細研敷之治目翳及胬肉以真白好者內一黍米大於患處即令淚出綿拭之令惡汁盡其疾日日減翳自消薄治腳氣衝心以白礬三兩用水一斗五升煎三五沸浸洗腳良治足甲長刺入肉作瘡枯白礬末內瘡中即瘥若牙縫中出血如衄貼之亦愈治狾犬咬人操礬末於傷處裹之止痛其瘡速愈治耳猝腫出膿水以礬燒末日三四度用筆管吹耳中或綿裹塞之立瘥治患䘌齒碎壞欲盡常以綿裹礬石含嚼之其汁吐出治大小便不通用白礬細末令患人仰臥滿置於臍中以新汲水滴之覺冷透腹內即通如無臍孔以紙作環高一指亦依前法用之治初産小兒有皮膜如榴中膜裹舌或遍舌根以指甲刺破令血出燒礬灰細研敷之半緑豆許若不摘去兒必啞治腳膝風濕虛汗少力多疼痛及陰汗燒礬作灰細研一匙投沸湯中淋洗痛處合治白礬合桃仁蔥湯浴之出汗治中風失音疥癬白礬一兩以水二升煮一升內蜜半合治胸中多痰瘀癖頭痛不欲食者頓服令吐未吐當飲少熱湯白礬合雞子置醋中治小兒舌上生瘡飲乳不得者塗兒足底二匕即愈礬石燒為末每日合酒調方寸匕日三服治陰癢脫白礬末和豬脂綿裹塞鼻中數日治鼻中息肉自隨藥出煎醋半升投礬石末一兩於醋中浸洗蠍螫痛處效飛礬合炒紫色黃丹調貼驢涎馬汗毒所傷白礬燒灰合鹽花細研為散以箸頭點治懸癰垂長咽中妨悶白礬十二分以熱酒投化用馬尾搵酒塗之治小兒風疹不止白礬一分以水四合銅器中煎取半合下少白蜜調之以綿濾過每日三度點小兒目睛上白膜白礬一兩燒灰合露蜂房一兩微炙為散每用二錢水一鍾煎十餘沸熱漱吐之治牙齒腫痛緑礬無毒煎煉成緑礬治喉痹蚛牙口瘡及惡瘡疥癬釀鯽魚燒灰和服療腸風瀉血名醫所録地圖經曰生隰州溫泉縣池州銅陵縣並煎礬處出焉初生皆石也採得碎之煎煉乃成今染家亦多用之時採無時用明淨者佳色緑味酸性寒氣氣薄味厚陰也臭腥主喉痹口瘡治療經驗方治小兒疳氣不可療神效丹丸用火煅通赤取出用釅醋淬過復煅如此三度細研用棗肉和丸如緑豆大溫水下日進兩三服今醫家用治痰壅及心肺煩熱甚佳柳絮礬無毒煎煉成柳絮礬消痰治渴潤心肺名醫所録地圖經曰生河西山谷及隴西武都石門及隰州溫泉縣池州銅陵縣並出礬處有之初生皆石也採得碎之煎煉乃成凡有五種其色各異此礬惟輕虛如綿絮故以名之時採無時用輕虛者佳色灰白味酸性寒收氣氣薄味厚陰也臭腥主消痰止嗽治療圖經曰治痰壅及心肺煩熱硝石無毒土生硝石出神農本經主五臟積熱胃脹閉滌去蓄結飲食推陳致新除邪氣煉之如膏久服輕身以上朱字神農本經療五臟十二經脈中百二十疾暴傷寒腹中大熱止煩滿消渴利小便及瘻蝕瘡天地至神之物能化七十二種石以上黑字名醫所録地圖經曰南北皆有之以西川者為佳此即地霜也掃得煎煉而成如解鹽燒之成焰都盡能化金石其性畏火而能制諸石使拒火亦天地之神物也今之入藥多以朴硝中來在上者為芒硝其在下凝結如石者即硝石也蓋諸硝同體本經各載所出州土者乃方俗冶煉之法有精粗療疾之功有緩急故須分別如芎藭之與蘼蕪大戟之與澤漆俱是一物本經亦各著州土者蓋根與苗土地各有所宜非別是一物也其朴硝硝石輩亦此義歟今濟南肥城縣有洞深二三里曰婁敬洞亦産硝石人嘗採得煎煉而成方家用之珍於他硝也收瓷器盛貯用瑩徹者佳質類晉礬而輕脆色白味苦辛微咸扁鵲云甘性大寒泄氣氣薄味厚陰中之陽臭朽主潤燥軟堅助大黃及火為之使反惡苦參苦菜曾青畏女菀杏仁竹葉硫黃並粥制雷公云凡使先研硝石如粉以瓷瓶子於五斤火中鍛令通赤用雞腸菜柏子仁和作一處分丸如小帝珠子許待瓶赤投硝石於瓶子內其硝石自然伏火每四兩硝石用雞腸菜柏子仁共十五個帝珠子盡為度如常用研令極細以瓷瓶盛炭火中鍛令通赤治療藥性論云治項下瘰癧瀉根出破血破積散堅結及腹脹日華子云含之治喉閉別録云五種淋疾又頭痛欲死鼻內吹硝末即愈並服丹石人有熱瘡疼不可忍用紙環圍腫處中心填硝令滿用匙抄水淋之覺甚不熱疼即止又血淋小便不出時下血疼痛滿急熱淋小便赤色淋瀝不快臍下急痛每服二錢並用冷水調下如石淋莖內痛尿不能出引小腹膨脹急痛尿下砂石令人悶絶將硝石末先入銚子內隔紙炒至焦為度研細溫水下合治取硝石研令極細每夜臨臥以銅箸取如黍米大點目眥頭至明早以鹽漿水洗之治眼赤痛取硝石三兩以暖水一升和勻待冷取故青布折三重可似赤處方圓濕布塌之熱即換頻易療惡寒嗇嗇似欲發背或已生瘡腫癮疹立瘥合葵子末煎湯調下二錢治勞淋勞倦虛損小便不出小腹急痛合木通湯調下二錢治氣淋小腹滿急尿後常有餘瀝合小麥湯調下二錢治小便不通禁妊娠不可服芒硝無毒土生芒硝主五臟積聚久熱胃閉除邪氣破留血腹中痰實結搏通經脈利大小便及月水破五淋推陳致新名醫所録名盆硝地圖經曰生益州山谷武都隴西今南北皆有之此亦出於朴硝也以朴硝用暖水淋汁澄清煉之傾木盆中經宿瑩白如冰雪結細芒而有廉稜蘇脆易碎風吹之則結霜泯泯如粉故謂之芒硝又謂之盆硝也其性和緩古今多用之人藥以寧州者為佳時生無時採三月收以瓷器盛貯用明淨者為好色白味辛苦性寒泄氣味厚於氣陰也臭朽主時疾壅熱利大小便助石葦為之使反惡麥句姜硫黃畏京三稜制雷公云以水飛過用五重紙濾過去腳於鐺中干之方入乳鉢研如粉任用治療藥性論云通女子月閉癥瘕下瘰癧黃疸病漆瘡以汁敷之時疾壅熱能散惡血別録云代指煎湯淋浸之火丹毒水調塗之一切疹水煮塗之小兒赤遊行於體上下至心即死以芒硝內湯中取濃汁以拭丹上又療關格大小便不通脹滿欲死用硝三兩紙裹三四重炭火燒之令內一升湯中盡服當先飲湯一升候吐出乃服之又取硝一兩置銅器中急火上煉之放冷後以生絹細羅治眼有翳點眼角中每臨臥時點一度合治研硝合豬膽治傷寒發豌豆瘡未成膿塗之立效禁妊娠不可服朴硝無毒附甜硝土生朴硝出神農本經主百病除寒熱邪氣逐六腑積聚結固留癖能化七十二種石煉餌服之輕身神仙以上朱字神農本經胃中食飲熱結破留血閉絶停痰痞滿推陳致新以上黑字名醫所録名硝石朴地圖經曰生益州山谷鹹水之陽及武都隴西西羌以西川者為佳彼人採掃之以水淋取汁一煎而成乃朴硝也煉之白如銀能寒能熱能滑能澀能辛能苦能咸能酸入地千年不變色青白者佳黃者傷人赤者殺人一名硝石朴其未煉成塊微青色者亦謂之朴硝朴即未化之義一說芒硝輩皆從此出故謂之朴也一種甜硝更好或云出於英硝煉治之法未聞時生無時採冬月取收以磁器盛用明淨者為好質如碎礬色白味辛苦性寒泄氣氣薄味厚陰中之陽臭朽主蕩滌臟腑實熱反畏麥句姜治療藥性論云除腹脹大小便不通女子月候不通日華子云通泄五臟百病及癥結天行熱疾消腫毒及頭痛排膿潤毛髮孫真人曰含之治口瘡葛仙翁曰食膾不化取此以蕩逐之別録云喉痹用一兩細細含咽汁頃刻立瘥合治每硝一大斤冬合蜜十三兩春夏秋合蜜十二兩先搗篩硝成末後以白蜜和令勻便入青新竹筒隨小大者一節著藥得半筒以上即止不得令滿卻入炊甑中令有藥處在飯內其虛處出其上不妨甑簞即得候飯熟取出乘熱綿濾入一瓷鉢中竹篦攪勿停手令至凝即藥成收入盒中如夏月即於冷水浸鉢然後攪凝每食後或欲臥時含半匙漸漸咽之療熱壅涼胸膈驅積滯如要通轉亦得用二兩搗羅為散合生麻油調塗頂上治時氣頭痛不止取煉成硝半兩細研如粉每服合蜜水調下一錢匕日三四服治乳石發動煩悶及諸風熱為末每服二錢匕合溫茴香酒調下無時服治小便不通膀胱熱臘月中以新瓦罐滿注熱水用硝二升投湯中攪散掛北檐下候硝滲出罐外羽收之合人乳汁調半錢掃一切風熱毒氣攻注目臉外及發於頭面四肢腫痛應手神驗禁黃者傷人赤者殺人妊娠不可服代以芒硝代之玄明粉無毒鍛鍊成玄明粉主心熱煩躁並五臟宿滯癥結明目退膈上虛熱消腫毒名醫所録地太陰經云以益州朴硝二斤須是白淨者以瓷罐一個疊實卻以瓦一片蓋罐用十斤炭火一鍛罐口不蓋著炭一條候沸定了方蓋之復以十五斤炭鍛之放冷一伏時提罐出藥以紙攤在地上盆蓋之一伏時日取干入甘草二兩生熟用細搗羅為末別録云明淨朴硝不拘多少於臘月霜雪凝寒之際用皂莢三兩重略炮捶碎溫熱湯六碗挼去渣浸化薄紙二重濾過澄清入鐵鍋內煮至一半候溫傾出瓦盆內於見天處露一宿次早結塊再用淨熟水六碗化開入大蘿蔔八兩重切作二分厚一片用煮見蘿蔔熟為度仍傾在瓦盆去蘿蔔片再放在見天處露一宿次日結塊去水取出濾干入好皮紙袋盛懸掛當風處自然成粉乃陰中有陽之藥太陰之精華水之子也收瓷器盛貯用白淨者佳質類膩粉而輕亮色白味辛甘性冷散緩氣氣薄味厚陰中之陽主積熱煩躁制研細為末治療別録云治諸熱毒風除冷痃癖氣脹滿五勞七傷骨蒸傳尸頭痛煩熱搜除惡疾五臟祕澀大小腸不通三焦熱淋疰忤疾咳嗽嘔逆口苦幹澀咽喉閉塞心肝脾肺臟胃積熱驚悸健忘榮衛不調中酒中膾飲食過度腰膝冷痛手足酸久冷久熱四肢壅塞背膊拘急眼目昏眩久視無力腸風痔病血癖不調婦人産後小兒疳氣陰毒傷寒表裡疫癘等疾補別録云久服令人輕身耳聰駐顏禁痼冷寒多者勿服忌苦參解中諸魚藕菜飲食毒以蔥白煎湯一碗調玄明粉兩錢頓服之立瀉下馬牙硝無毒土生馬牙硝主除五臟積熱伏氣末篩點眼及點眼藥中用甚去赤腫障翳澀淚痛名醫所録名英硝地圖經曰生益州山谷武都隴西今南北皆有之此亦出於朴硝也以朴硝用暖水淋汁澄清煉之傾木盆中經宿瑩白若白石英作四五稜白色瑩徹可愛功用與芒硝頗同但不能下利力差小耳近世用之最多時生無時採無時收以瓷器盛貯用明淨者為好色白味甘性大寒氣氣之薄者陰中之陽臭朽主諸熱制碾細如粉用治療別録云小兒鵝口細研摻於舌上日三五度及小兒重舌細研塗舌下日三度合治取一兩碎合吳茱萸半升陳者煎取濃汁投硝在內乘熱服治食物過飽不消遂成痞膈良久未轉更進一服立愈取硝光淨者用厚紙裹令按實安在懷內著肉處養一百二十日取出研如粉入少龍腦同研細每用藥末兩米許點目中治不計年歲深遠眼內生翳膜漸漸昏暗遠視不明但瞳人不破散並醫得禁妊娠不可服解消化火石之氣及能制伏陽精生硝無毒石穴生生硝主風熱癲癇小兒驚邪瘛瘲風眩頭痛肺壅耳聾口瘡喉痹咽塞牙頷腫痛目赤熱痛多眵淚名醫所録地圖經曰生茂州西山岩石間及蜀道其形塊大小不常似朴硝而小堅其色青白不由煮煉而成者也今醫家所用甜硝彌更精好或疑是此時生無時採冬月取收以瓷器密封盛貯用青白而堅者佳質類朴硝而小堅色青白味苦性大寒泄氣氣薄味厚陰也臭朽主積熱反惡麥句姜禁妊娠不可服石之土滑石無毒山穴生滑石出神農本經主身熱泄澼女子乳難癃音隆閉利小便蕩胃中積聚寒熱益精氣久服輕身耐飢長年以上朱字神農本經通九竅六腑津液去留結止渴令人利中以上黑字名醫所録名液石共石脫石番石畫石夕冷地圖經曰生赭陽山谷及泰山之陰或掖北白山或卷羌權切山今道永菜濠州皆有之此有三種道永州出者白滑如凝脂南越志云膋音僚城縣出膋石膋石即滑石也菜濠州出者理粗質青有白黑點又謂之斑石二種惟可作烹器不堪入藥本經所載土地皆是北方而今醫家所用多是白色者乃自南方來按雷公云滑石有五色當用白色如方解石白青色畫石上有白膩紋者為真余皆有毒不入藥也如此與今南中來者形色相類用之無疑矣時生無時採無時用白膩者為好質如方解石而軟暗色白味甘性大寒氣氣之薄者陽中之陰臭朽主利水道行足太陽經助石葦為之使反惡曾青制雷公云用刀刮研如粉以牡丹皮同煮一伏時出去牡丹皮取滑石卻用東流水淘過於日中曬乾方用治療圖經曰利小便治淋澀石淋煩悶取十二分研粉分二服以水調和攪令散頓服之煩熱定即停後服未已盡服必瘥藥性論云末服治五淋主難産除煩熱心躁日華子云治乳癰利津液衍義曰若暴得吐逆不下食以生細末二錢匕溫水服仍急以細面半盞押定別録云乳石發動躁熱煩渴不止用半兩細研如粉以水一中盞絞如白飲頓服之未瘥再服妊娠不得小便研為末水和塗臍下二寸氣壅關格不通小便淋結臍下妨悶兼痛用滑石八分研如面以水五大合和攪頓服合治末合末丹參蜜豬肪為膏治妊娠入其月空心酒下彈丸大臨産倍服令滑胎易生合蔥湯調末二錢匕服之治婦人過忍小便致胞轉取二兩搗碎以水三大盞煎取二盞去滓下粳米二合煮粥溫溫食之治膈上煩熱多渴通利九竅取末一升合車前汁和塗臍四畔方四寸療小便不通熱即易之冬月水和亦得禁畫石上有青黑色者殺人緑色者性寒有毒不入藥用石之水石膽有毒山窟生石膽出神農本經主明目目痛金瘡諸癇痙臣郢切女子陰蝕痛石淋寒熱崩中下血諸邪毒氣令人有子煉餌服之不老久服增壽神仙能化鐵為銅成金銀以上朱字神農本經散症積咳逆上氣及鼠瘻惡瘡以上黑字名醫所録名畢石黑石棋石銅勒膽礬立制石地圖經曰出羌道山谷羌里句青山今惟信州鉛山縣有之生於銅坑中採得煎煉而成又有自然生者尤為珍貴蘇恭云真者出蒲州虞鄉縣東亭谷窟及薛集窟中有塊如雞卵者為真今南方醫人多用之又著其說雲石膽最上出蒲州大者如拳小者如桃栗擊之縱橫解皆成疊紋色青見風久則緑擊碎其中亦青也其次出上饒曲江銅坑間者粒細有廉稜如叉股米粒本草注言僞者以醋揉青礬為之今不然但取粗惡石膽合硝石銷溜而成今塊大色淺渾渾無脈理擊之則碎無廉稜者是也亦有挾石者乃削取石膽床溜造時投硝汁中及凝則相著也陶隱居云仙經有用此處俗方甚少此藥殆絶今人時有采者其色青緑狀如琉璃而有白紋易破折梁州信都無復有俗用乃以青色礬石當去聲之殊無倣佛時採二月庚子辛丑日取用畫鐵上有金線者佳質類匾青而形如鴨嘴色青碧味酸辛性寒收氣氣薄味厚陰中之陽臭腥主去痰熱喉痹助水英陸英為之使反畏牡桂菌桂芫花辛荑白薇制凡用研為細末治療圖經曰吐風痰藥性論云破熱毒日華子云治蚛牙鼻內息肉唐本云下血赤白麵黃女子臟寒別録云甲疽以一兩於火上燒令煙盡碎研末敷瘡上不過四五度立瘥患口瘡衆療不效膽礬半兩入銀鍋子內火鍛通赤置於地上出火毒一夜細研每取少許敷瘡上吐酸水清涎便瘥合治細研石膽合人乳汁和如膏療齒痛及落盡擦齒上或孔中日三四度止痛復生齒百日後復故齒生乃止每日以新汲水漱令淨膽礬為末用糯米糊丸如芡實大以硃砂為衣常以硃砂養之冷水化一丸治一切毒立瘥細研膽礬每使一字許用溫醋湯下治初中風癱瘓一日內者立吐出涎漸輕贋醋揉青礬為僞石之石空青無毒土石生空青出神農本經主青盲耳聾明目利九竅通血脈養精神久服輕身延年不老能化銅鐵鉛錫作金以上朱字神農本經益肝氣療目赤痛去膚翳止淚出利水道下乳汁通關節破堅積令人不忘志高神仙以上黑字名醫所録名楊梅青碧青魚目青白青脫剔牙地圖經曰空青生益州山谷及越西山有銅處銅精熏則生空青今信州亦時有之狀若楊梅故別名楊梅青其腹中空破之有漿者絶難得亦有大者如雞子小者如豆古方雖稀用而今治眼翳障為最要之物又有白青出豫章山谷亦似空青圓如鐵珠色白而腹不空亦謂之碧青以其研之色碧也亦謂之魚目青以其形似魚目也無空青時亦可用今不復見之陶隱居云越西屬益州今出銅官者色最鮮深出始興者弗如益州諸郡無復有恐久不採之故也涼州西平郡有空青山亦甚多今空青但圓實如鐵珠無空腹者皆鑿土石中取之又以合丹成則化鉛為金矣諸石藥中惟此最貴醫方乃稀用之而多充畫色殊為可惜唐本注云此物出銅處有乃兼諸青但空青為難得今出蔚州蘭州宣州梓州宣州者最好塊段細時有腹中空者蔚州蘭州者片塊大色極深無空腹者時採無時又云三月中旬取收採時搖之響者有漿隨以濕土養之否則漿幹不甚珍也入藥功力差小用有漿者最佳質殼如荔枝其腹中空色青味甘酸性寒緩收氣味厚於氣陰也主鎮肝明目反畏菟絲子治療藥性論云去頭風鎮肝瞳人破者再得見物日華子云殼內漿能點多年青盲內障翳膜養精氣其殼又可磨翳也曾青無毒土石生曾青出神農本經主目痛止淚出風痹利關節通九竅破症堅積聚久服輕身不老能化金銅以上朱字神農本經養肝膽除寒熱殺白蟲療頭風腦中寒止煩渴補不足盛陰氣以上黑字名醫所録地圖經曰生益州山谷及越西山有銅處銅精熏則生今信州亦有之與空青療頗相似而色理亦無異但其形纍纍如連珠相綴今極難得唐本注云蔚州者好其次鄂州余州並不任用時採無時用無夾石者佳質類蟬腹而連珠相綴色土黃味酸性微寒收氣味厚於氣陰也主目痛爽神氣反畏菟絲子制雷公云凡修事二兩要紫背天葵甘草青芝草三件乾溼各一鎰並細銼放於一瓷堝內將曾青於中以東流水二鎰並諸藥等緩緩煮之五晝夜勿令水火失時足取出以東流水浴過卻入乳鉢內研如粉用三種海藥余車渠集韻云生西國是玉石之類形似蚌蛤有文理大寒無毒主安神鎮宅解諸毒藥及蟲螫以玳瑁一片車渠等同以人乳磨服極驗也又西域記云重堂殿梁檐皆以七寶飾之此其一也金線礬廣州志云生波斯國味鹹酸澀有毒主野雞瘻痔惡瘡疥癬等疾打破內有金線文者為上多入燒家用波斯白礬廣州記云出大秦國其色白而瑩淨內有棘針紋味酸澀溫無毒主赤白漏下陰蝕泄痢瘡疥解一切蟲蛇等毒去目赤暴腫齒痛火煉之良惡牡蠣多入丹灶家功力逾於河西石門者近日文州諸番往往亦有可用也一十八種陳藏器余金漿味辛平無毒主長生神仙久服腸中盡為金色古鏡味辛無毒主驚癇邪氣小兒諸惡煮取汁和諸藥煮服之文字彌古者佳爾勞鐵主賊風燒赤投酒中熱服之勞鐵經用辛苦者鐵是也神丹味辛溫有小毒主萬病有寒溫飛金石及諸藥隨寒溫共成之長生神仙鐵繡主惡瘡疥癬和油塗之蜘蛛蟲等咬和蒜磨敷之此鐵上衣也繡生鐵上者堪用布針主婦人橫産燒令赤內酒中七遍服之可取二七布針一時火燒粗者用縫布大針是也銅盆主尉霍亂可盛灰厚二寸許以炭火安其上令微熱下以衣藉患者腹漸漸尉之腹中通熱瘥釘棺下斧聲之時主人身胬肉可候有時專聽其聲聲發之時便下手速擦二七遍以後自得消平也産婦勿用枷上鐵釘有犯罪者忽遇恩得免枷了取葉釘等後遇有人官纍帶之除得災黃銀銀注中蘇云作器辟惡瑞物也按瑞物即黃銀載於圖經銀甕丹甑非人所為既堪為器明非瑞物今烏銀辟惡煮之工人以為器物養生者為器以煮藥兼於庭中高一丈夜承得醴投別器中飲長年今人作烏銀以硫黃熏之再宿瀉之出即其銀黑矣此是假非真也石黃雄黃注中蘇云通名黃石按石黃今人敲取精明者為雄黃外黑者為熏黃主惡瘡殺蟲熏瘡疥蟣蝨和諸藥熏嗽其武都雄黃燒不臭熏黃中者燒則臭以此分別之蘇云通名未之是也石脾芒硝注中陶云取石脾為硝石以水煮之一斛得三斗正白如雪以石投中則消故名硝石按石脾芒硝硝石並生西戎鹵地鹹水結成所生次對相似諸金有毒生金有大毒藥人至死生嶺南夷獠洞穴山中如赤黑碎石金鐵屎之類南人云毒蛇齒脫在石中又云蛇著石上又鴆屎著石上皆碎取毒處為生金以此為雌黃有毒雄黃亦有毒生金皆同此類人中金藥毒者用蛇解之其候法在金蛇條中本經云黃金有毒誤甚也生金與彼黃金全別也水中石子無毒主食魚鱠腹中脹滿成瘕痛悶飲食不下日漸瘦取水中石子數十枚火燒赤投五升水中各七遍即熱飲之如此三五度當利出瘕也石漆堪燃燭膏半缸如漆不可食此物水石之精固應有所主療檢諸方見有說博物志酒泉南山石出水其如肥肉汁取著器中如凝脂正黑與膏無異彼方人謂之石漆今檢不見其方深所恨也燒石令赤投水中內鹽數合主風瘙癮疹及洗之又取石如鵝卵大猛火燒令赤內醋中十餘度至石碎盡取屑曝乾和醋塗腫上出北齊書醫人馬嗣明發背及諸惡腫皆愈此並是尋常石也石藥味苦寒無毒主折傷內損瘀血止煩悶欲死者酒消服之南方俚人以敷毒箭簇及深山大蝮中人速取病者當頂上十字剺之令皮斷出血以藥末瘡上並敷所傷處其毒必攻上下泄之當出黃汁數升則悶解俚人重之帶於腰以防毒箭亦主惡瘡熱毒癰腫赤白遊瘻蝕等瘡北人呼腫名之曰遊並水和敷之出賀州石上山內似碎石硇砂之類土人以竹筒盛之研朱石槌主妒乳主令熱尉乳上取二槌更互用之以巾覆乳上令熱徹內數十遍取瘥為度也
