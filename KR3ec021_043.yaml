body:
  text: 卷之四十二有名未用總一百九十四種玉石類二十六種青玉味甘平無毒主婦人無子輕身不老長年一名谷玉生藍田陶隱居云張華云合玉漿用谷玉正縹白色不夾石者大如升小者如雞子取穴中者非今作器物玉也出襄鄉縣舊穴中黃初中詔徵南將軍夏侯尚求之白玉髓味甘平無毒主婦人無子不老延年生藍田玉石間玉英味甘主風瘙皮膚癢一名石鏡明白可作鏡生山竅十二月採璧玉味甘無毒主明目益氣使人多精生子合玉石味甘無毒主益氣療消渴輕身辟穀生常山中丘如豬肪紫石花味甘平無毒主渴去小腸熱一名茈石華生中牛山陰採無時白石花味辛無毒主癉消渴膀胱熱生液北鄉北邑山採無時黑石花味甘無毒主陰痿消渴去熱療月水不利生弗其勞山陰石間採無時黃石花味甘無毒主陰痿消渴膈中熱去百毒生液北山黃色採無時厲石花味甘無毒主益氣養神止渴除熱強陰生江南如石花采無時石肺味辛無毒主癘咳寒久痿益氣明目生水中狀如肺黑澤有赤紋出水即干陶隱居云今浮石亦療咳似肺而不黑澤恐非是石肝味酸無毒主身癢令人色美生常山色如肝石脾味甘無毒主胃寒熱益氣令人有子一名胃石一名膏石一名硝石生隱蕃山谷石間黑如大豆有赤紋色微黃而輕薄如棋子採無時石腎味鹹無毒主泄痢色如白珠封石味甘無毒主消渴熱中女子疽蝕生常山及少室採無時陵石味甘無毒主益氣耐寒輕身長年生華山其形薄澤碧石青味甘無毒主明目益精去白𤸭音癬延年遂石味甘無毒主消渴傷中益氣生太山陰採無時白肌石味辛無毒主強筋骨止渴不飢陰熱不足一名肌石一名洞石生廣焦國卷音權山青石間龍石膏無毒主消渴益壽生杜陵如鐵脂中黃五羽石主輕身長年一名金黃生海水中蓬葭山上谷中黃如金石流青味酸無毒主療泄益肝氣明目輕身長年生武都山石間青白色石流赤味苦無毒主婦人帶下止血輕身長年理如石耆生山石間陶隱居云芝品中有石流丹又有石中黃子石耆味甘無毒主咳逆氣生石間色赤如鐵脂四月採紫佳石味酸主痹血氣一名赤英一名石血赤無理生邯鄲山如爵茈二月採陶隱居云三十六水方呼為紫賀石終石味辛無毒主陰痿痹小便難益精氣生陵陰採無時一百三十二種草木類玉伯味酸溫無毒主輕身益氣止渴一名玉遂生石上如松高五六寸紫花用莖葉陳藏器云今之石松生石上高一二尺山人取根莖浸酒去風血除風瘙宜老伯應是柏字傳寫有誤文石味甘主寒熱心煩一名黍石生東郡山澤中水下五色有汁潤澤曼諸石味甘主益五臟氣輕身長年一名陰精六月七月出石上青黃色夜有光山慈石味苦平無毒主女子帶下一名爰茈生山之陽正月生葉如藜蘆莖有衣石濡主明目益精氣令人不飢渴輕身長年一名石芥陳藏器云生石之陰如屋遊垣衣之類得雨即展故名石濡早春青翠端開四葉山人名石芥性冷明目不飢渴石芸味甘無毒主目痛淋露寒熱溢血一名螫烈一名顧喙三月五月採莖葉陰乾爾雅云茢勃茢郭注云一名石芸石劇味甘無毒主渴消中路石味甘酸無毒主心腹止汗生肌酒痂益氣耐寒實骨髓一名陵石生草石上天雨獨干日出獨濡花黃莖赤黑三歲一實赤如麻子五月十月採莖葉陰乾曠石味甘平無毒主益氣養神除熱止渴生江南如石草敗石味苦無毒主渴痹越砥音旨味甘無毒主目盲止痛除熱瘙陶隱居云今細礪石出臨平者蜀本注云今據此在草本類中恐非細礪石也金莖味苦平無毒主金瘡內漏一名葉金草生澤中高處夏臺味甘主百疾濟絕氣陶隱居云此藥乃爾神奇而不復識用可恨也柴紫味苦主小腹痛利小腹破積聚長肌肉久服輕身長年生冤句二月七月採鬼目味酸平無毒主明目一名來甘實赤如五味十月採陶隱居云俗人今呼白草子亦為鬼目此乃相似也陳藏器云一名排風一名白幕爾雅云符鬼目注云葉似葛子如耳璫赤色鬼蓋味甘平無毒主小兒寒熱癇一名地蓋生垣牆下叢生赤旦生暮死陶隱居云一名朝生疑是今鬼傘也陳藏器云鬼蓋名為鬼屋如菌生陰濕處蓋黑莖赤和醋敷腫毒馬脊腫人惡瘡杜正倫云鬼傘夏日得雨聚生糞堆見日消黑此物有小毒馬顛味甘有毒療浮腫不可多食馬唐味甘寒主調中明耳目一名羊麻一名羊粟生下濕地莖有節生根五月採陳藏器云生南土廢稻田中節節有根著土如結縷草堪飼馬雲馬食如糖故曰馬唐煎取汁明目潤肺爾雅云馬唐馬飯也馬逢味辛無毒主癬蟲牛舌實味鹹溫無毒主輕身益氣一名彖屍生水中澤旁實大葉長尺五月採陳藏器云今東土人呼田水中大葉如牛耳亦呼為牛耳菜羊乳味甘溫無毒主頭眩痛益氣長肌肉一名地黃三月採立夏後母死陳藏器云羊乳根似薺苨而圓大小如拳上有角節剖之有白汁人取根當薺苨三月採苗作蔓折有白汁羊實味苦寒主頭禿惡瘡疥瘙痂𤸭音癬生蜀郡犀洛味甘無毒主癃一名星洛一名泥洛鹿良味鹹臭主小兒驚癇賁豚瘛瘲大人痓五月採菟棗味酸無毒主輕身益氣生丹陽陵地高尺許實如棗雀梅味酸寒有毒主蝕惡瘡一名千雀生海水石谷間陶隱居云葉與實俱似麥李雀翹味鹹主益氣明目一名去母一名更生生藍中葉細黃莖赤有刺四月實兌音銳黃中黑五月採陰乾雞涅味甘平無毒主明目目中寒風諸不足水腹邪氣補中止泄痢療女子白沃一名陰洛生雞山採無時相烏味苦主陰痿一名烏葵如蘭香赤莖生山陽五月十五日採陰乾鼠耳味酸無毒主痹寒寒熱止咳一名無心生田中下地厚葉肥莖蛇舌味酸平無毒主除留血驚氣蛇癇生大水之陽四月採花八月採根龍常草味鹹溫無毒主輕身益陰氣療痹寒濕生河水旁如龍蒭冬夏生離樓草味鹹平無毒主益氣力多子輕身長年生常山七月八月採實神護草可使獨守叱咄人寇盜不敢入門生常山北八月採陶隱居云此亦奇草計彼人猶應識用之黃護草無毒主痹益氣令人嗜食生隴西吳唐草味甘平無毒主輕身益氣長年生故稻田中日夜有光草中有膏天雄草味甘溫無毒主益氣陰痿生山澤中狀如蘭實如大豆赤色雀醫草味苦無毒主輕身益氣洗浴爛瘡療風水一名白氣春生秋花白冬實黑木甘草主療癰腫盛熱煮洗之生木間三月生大葉如蛇床四四相值但折枝種之便生五月花白實核赤三月三日採益決草味辛溫無毒主咳逆肺傷生山陰根如細辛九熟草味甘溫無毒主出汗止泄療悶一名烏粟一名雀粟生人家庭中葉如棗一歲九熟七月採陶隱居云今不見有此兌草味酸平無毒主輕身益氣長年生蔓草木上葉黃有毛冬生酸草主輕身延年生名山醴泉上陰居莖有五葉青澤根赤黃可以消玉一名醜草陶隱居云李云是今酸箕布地生者今處處有然恐非也異草味甘無毒主痿痹寒熱去黑子生籬木上葉如葵莖傍有角汁白灌草葉主癰腫一名鼠肝葉滑青白䒻音起草味辛無毒主傷金瘡莘草味甘無毒主盛傷痹腫生山澤如蒲黃葉如芥勒草味甘無毒主瘀血止精溢盛氣一名黑草生山谷如栝蔞陶隱居云疑此猶是薰草兩字皆相似一誤爾而栝蔞為殊矣英草華味辛平無毒主痹氣強陰療面勞疽解煩堅筋骨療風頭可作沐藥生蔓木上一名鹿英九月採陰乾吳葵華味鹹無毒主理心氣不足封華味甘有毒主疥瘡養肌去惡肉夏至日採𨹻他典切華味甘無毒主上氣解煩堅筋骨棑華味苦主水氣去赤蟲令人好色不可久服春生乃採陳藏器云棑音斐樹似杉子如檳榔食之肥美主痔殺蟲春華並與本經相會本經虫部云彼子蘇注云彼字合從木爾雅云彼一名棑陶復於果部重出棑此即是其華也節華味苦無毒主傷中痿痹溢腫皮主脾中客熱氣一名山節一名達節一名通漆十月採曝乾徐李主益氣輕身長年生太山陰如李小形實青色無核熟採食之新雉木味苦香溫無毒主風眩痛可作沐藥七月採陰乾實如桃合新木味辛平無毒解心煩止瘡痛生遼東俳蒲木味甘平無毒主少氣止煩生陵谷葉如柰實赤三核遂陽木味甘無毒主益氣生山中如白楊葉三月實十月熟赤可食學木核味甘寒無毒主脅下留飲胃氣不平除熱如蕤核五月採陰乾木核療腸澼華療不足子療傷中根療心腹逆氣止渴十月採栒音筍核味苦療水身面癰腫五月採荻皮味苦止消渴去白蟲益氣生江南如松葉有別刺實赤黃十月採桑莖實味酸溫無毒主孕乳余疾輕身益氣一名草王葉如荏方莖大葉生園中十月採滿陰實味酸平無毒主益氣除熱止渴利小便輕身長年生深山谷及園中莖如芥葉小實如櫻桃七月成可聚實味甘溫無毒主輕身益氣明目一名長壽生山野道中穗如麥葉如艾五月採讓實味酸主喉痹止泄痢十月採陰乾蕙實味辛主明目補中根莖中涕療傷寒寒熱出汗中風面腫消渴熱中逐水生魯山平澤陳藏器云五月收味辛香明目正氣是蘭蕙之蕙青雌味苦主惡瘡禿敗瘡火氣殺三蟲一名蟲損一名孟推生方山山谷白背味苦平無毒主寒熱洗浴疥惡瘡生山陵根似紫葳葉如燕盧採無時白女腸味辛溫無毒主泄痢腸澼療心痛破疝瘕生深山谷中葉如藍實赤赤女腸亦同白扇根味苦寒無毒主瘧皮膚寒熱出汗令人變白給味辛平無毒主伏蟲白𤸭音癬腫痛生山谷如藜蘆根白相連九月採白並味苦無毒主肺咳上氣行五臟令百病不起一名玉簫一名箭悍葉如小竹根黃皮白生山陵三月四月採根曝乾白辛味辛有毒主寒熱一名脫尾一名羊草生楚山三月採根白而香白昌味甘無毒主食諸蟲一名水昌一名水宿一名莖蒲十月採陳藏器云白昌即今之溪蓀也一名昌陽生水畔人亦呼為昌蒲與石上昌蒲都別大而臭者是一名水昌蒲根色正白去蚤蝨赤舉味甘無毒主腹痛一名羊飴一名陵渴生山陰二月花兌音銳蔓草上五月實黑中有核三月三日採葉陰乾赤涅味甘無毒主疰崩中止血益氣生蜀郡山石陰地濕處採無時黃秫味苦無毒主心煩止汗出生如桐根徐黃味辛平無毒主心腹積瘕莖主惡瘡生澤中大莖細葉香如蒿本黃白支生山陵三月四月採根曝乾紫藍味鹹無毒主食肉得毒能消除之紫給味鹹主風毒頭泄注一名野葵生高陵下地三月三日採根根如烏頭天蓼味辛有毒主惡瘡去痹氣一名石龍生水中陳藏器云即今之水葒一名游龍亦名大蓼地朕味苦平無毒主心氣女子陰疝血結一名承夜一名夜光三月採陳藏器云地朕一名地錦一名地噤葉光淨露下有光蔓生節節著地地芩味苦無毒主小兒癇除邪養胎風痹洗洗寒熱目中青翳女子帶下生腐木積草處如朝生天雨生蓋黃白色四月採地筋味甘平無毒主益氣止渴除熱在腹臍利筋一名管根一名土筋生澤中根有毛三月生四月實白三月三日採根陶隱居云疑此猶是白茅而小異也陳藏器云地筋如地黃根葉並相似而細多毛生平澤功用亦同地黃李邕方用之地耳味甘無毒主明目益氣令人有子生丘陵如碧石青土齒味甘平無毒主輕身益氣長年生山陵地中狀如馬牙燕齒主小兒癇寒熱五月五日採酸惡主惡瘡去白蟲生水旁狀如澤瀉酸赭味酸主內漏止血不足生昌陽山採無時巴棘味苦有毒主惡疥瘡出蟲一名女木生高地葉白有刺根連數十枚巴朱味甘無毒主寒止血帶下生蟲陽蜀格味苦平無毒主寒熱痿痹女子帶下癰腫生山陽如萑菌有刺累根主緩筋令不痛陳藏器云苗如豆爾雅云攝虎累注云江東呼虆為藤似葛而虛大今或豆也莢有毛一名巨荒千歲虆是也苗根味鹹平無毒主痹及熱中傷跌折生山陰谷中蔓草木上莖有刺實如椒陳藏器云茜字從西與苗字相似人寫誤為苗此即茜也參果根味苦有毒主鼠瘻一名百連一名烏蓼一名鼠莖一名鹿蒲生百餘根根有衣裹莖三月三日採根黃辯味甘平無毒主心腹疝瘕口瘡臍傷一名經辯良達主齒痛止渴輕身生山陰莖蔓延大如葵子滑小對廬味苦寒無毒主疥諸瘡久不瘳生死肌除大熱煮洗之八月採似庵䕡糞藍味苦主身癢瘡白禿漆瘡洗之生房陵委音威蛇音貽味甘平無毒主消渴少氣令人耐寒生人家園中大枝長鬚多葉而兩兩相值子如芥子麻伯味酸無毒主益氣出汗一名君莒一名衍草一名道止一名自死生平陵如蘭葉黑厚白裹莖實赤黑九月採根王明味苦主身熱邪氣小兒身熱以浴之生山谷一名王草類鼻味酸溫無毒主痿痹一名類重生田中高地葉如天名精美根五月採蜀本云可煮以洗病師系味甘無毒主癰腫惡瘡煮洗之一名臣堯一名臣骨一名鬼芭生平澤八月採逐折殺鼠益氣明目一名百合厚實生木間莖黃七月實黑如大豆陶隱居云又杜仲子亦名逐折並苦主咳逆上氣益肺氣安五臟一名𧌒音或薰一名玉荊三月採陰乾父陛根味辛有毒以熨癰腫膚脹一名膏魚一名梓藻索干味苦無毒主易耳一名馬耳荊莖療灼爛八月十月採陰乾陳藏器云即今之荊樹也煮汁堪染其洗灼爛及熱焱瘡有效鬼𪋘音麗生石上挼奴和切之日柔為沐竹付味甘無毒主止痛除血秘惡味酸無毒主療肝邪氣一名杜逢唐夷味苦無毒主療踒折知杖味甘無毒療疝地音地松味辛無毒主眩痹河煎味酸主結氣癰在喉頸者生海中八月九月採區餘味辛無毒主心腹熱瘙蜀本作癃三葉味辛主寒熱蛇蜂螫人一名起莫蜀本一名赴魚一名三石一名當田生田中莖小黑白高三尺根黑三月採陰乾五母麻味苦有毒主痿痹不便下痢一名鹿麻一名歸澤麻一名天麻一名若一草蜀本無一字生田野五月採疥拍腹味辛溫無毒主輕身療痹五月採陰乾常吏之生蜀本云常更之生味苦平無毒主明目實有刺大如稻米救赦人者味甘有毒主疝痹通氣諸不足生人家宮室五月十月採曝乾丁公寄味甘主金瘡痛延年一名丁父生石間蔓延木上葉細大枝赤莖母大如磧黃有汁七月七日採陳藏器云丁公寄即丁公藤也城裡赤柱味辛平療婦人漏血白沃陰蝕濕痹邪氣補中益氣生晉平陽城東腐木味鹹溫主心腹痛止泄便膿血陳藏器云城東腐木即今之城東古木木在土中一名地至主心腹痛鬼氣城東者猶取東牆之土也杜正倫方云古城柱木煮湯服主難產此即其類也芥味苦寒無毒主消渴止血婦人疾除痹一名梨葉如大青載味酸無毒主諸惡氣慶味苦無毒主咳嗽腂戶瓦切味甘無毒主益氣延年生山谷中白順理十月採一十五種蟲類雄黃蟲主明目闢兵不祥益氣力狀如蠮螉天社蟲味甘無毒主絕孕益氣如蜂大腰食草木葉三月採桑蠹蟲味甘無毒主心暴痛金瘡肉生不足陳藏器云桑蠹去氣桃蠹闢鬼皆隨所出而各有功又主小兒乳霍石蠹蟲主石癃小便不利生石中陳藏器云伊洛間水底石下有蟲如蠶解放絲連綴小石如繭春夏羽化作小蛾水上飛一名石下新婦行夜療腹痛寒熱利血一名負盤陶隱居云今小兒呼𥧔音屈盤或曰𥧔𧔪音𤥭蟲者也陳藏器云𥧔盤蟲一名負盤一名夜行蜚蠊又名員盤雖作相似終非一物戎人食之味極辛辣𥧔盤蟲有短翅飛不遠好夜中行觸之氣出也蝸蠃味甘無毒主燭館明目生江夏陳藏器云一名螄螺小如田螺上有稜生溪水中寒汁主明目下水亦呼為螺麋魚味甘無毒主痹止血丹戩味辛主心腹積血一名飛龍生蜀都如鼠負青股蜚頭赤七月七日採扁前味甘有毒主鼠瘻癃利水道生山陵如牛虻翼赤五月八月採蚖類療痹內漏一名蚖短土色而文蜚厲主婦人寒熱梗雞味甘無毒療痹益符療閉一名無舌地防令人不飢不渴生黃陵如濡居土中黃蟲味苦療寒熱生地上赤頭長足有角群居七月七日採唐本退二十種六種神農本經一十四種名醫別錄薰草味甘平無毒主明目止淚療泄精去臭惡氣傷寒頭痛上氣腰痛一名蕙草生下濕地三月採陰乾脫節者良陶隱居云俗人呼燕草狀如茅而香者為薰草人家頗種之藥錄云葉如麻兩兩相對山海經云薰草麻葉而方莖赤花而黑實氣如靡蕪可以已厲今市人皆用燕草此則非今詩書家多用蕙語而竟不知是何草尚其名而逆其實皆此類也藥性論云薰草亦可單用味苦無毒能治鼻中息肉鼻齆主泄精陳藏器云薰即蕙根此即是零陵香一名蕪草姑活味甘溫無毒主大風邪氣濕痹寒痛久服輕身益壽耐老一名冬葵子生河東陶隱居云方藥亦無用此者乃有固活丸即是野葛一名爾此又名冬葵子非葵菜之冬葵子療體乖異唐本注云別錄一名雞精也別羇味苦微溫無毒主風寒濕痹身重四肢疼酸寒邪歷節痛一名別枝一名別騎一名鱉羇生藍田川穀二月八月採陶隱居云方家時有用處今俗亦絕爾牡蒿味苦溫無毒主充肌膚益氣令人暴肥不可久服血脈滿盛生田野五月八月採陶隱居云方藥不復用唐本注云齊頭蒿也所在有之葉似防風細薄無光澤石下長卿味鹹平有毒主鬼疰精物邪惡氣殺百精蠱毒老魅注易亡走啼哭悲傷恍惚一名徐長卿生隴西池澤山谷陶隱居云此又名徐長卿恐是誤爾方家無用此處俗中皆不復識也麇俱倫切舌味辛微溫無毒主霍亂腹痛吐逆心煩生水中五月採陶隱居云生小溪水中今人五月五日採干以療霍亂良也練石草味苦寒無毒主五癃破石淋膀胱中結氣利水道小便生南陽川澤陶隱居云一名爛石草又云即馬矢蒿弋共味苦寒無毒主驚氣傷寒腹痛羸瘦皮中有邪氣手足寒無色生益州山谷惡玉扎蜚蠊蕈音譚草味鹹平無毒主養心氣除心溫溫辛痛浸淫身熱可作鹽生淮南平澤七月採礬石為之使藥性論云蕈草亦可單用味苦無毒主遍生風瘡壯熱理石為之使五色符味苦微溫主咳逆五臟邪氣調中益氣明目殺蝨青符白符赤符黑符黃符各隨色補其臟白符一名女木生巴郡山谷陶隱居云方藥皆不復用今人並無識者吳氏云五色石脂一名青赤黃白黑符蘘音襄草味甘苦寒無毒主溫瘧寒熱酸嘶邪氣闢不祥生淮南山谷翹根味甘寒平有小毒主下熱氣益陰精令人面悅好明目久服輕身耐老以作蒸飲酒病人生嵩高平澤二月八月採陶隱居云方藥不復用俗無識者鼠姑味苦平寒無毒主咳逆上氣寒熱鼠瘻惡瘡邪氣一名𧸗音雪生丹水陶隱居云今人不識此鼠姑乃牡丹又名鼠姑罔知孰是船虹味酸無毒主下氣止煩滿可作浴湯藥色黃生蜀郡立秋取陶隱居云方藥不用俗人無識者屈草味苦微寒無毒主胸脅下痛邪氣腸間寒熱陰痹久服輕身益氣耐老生漢中川澤五月採陶隱居云方藥不復用俗無識者赤赫味苦寒有毒主痂瘍惡敗瘡除三蟲邪氣生益州川穀二月八月採淮木味苦平無毒主久咳上氣傷中虛羸補中益氣女子陰蝕漏下赤白沃一名百歲城中木生晉陽平澤陶隱居云方藥亦不復用占斯味苦溫無毒主邪氣濕痹寒熱疽瘡除水堅積血症月閉無子小兒躄不能行諸惡瘡癰腫止腹痛令女人有子一名炭皮生太山山谷採無時陶隱居云解狼毒毒李云是樟樹上寄生樹大銜枝在肌肉今人皆以胡桃皮當之非是真也按桐君錄云生上洛是木皮狀如厚朴色似桂白其理一縱一橫今市人皆削乃似厚朴而無正縱橫理不知此復是何物莫測真假何者為是也藥性論云占斯臣味辛平無毒能治血症通利月水主脾熱茱萸為之使主洗手足水爛瘡嬰桃味辛平無毒主止泄腸澼除熱調中益脾氣令人好色美志一名牛桃一名英豆實大如麥多毛四月採陰乾陶隱居云此非今果實嬰桃形乃相似而實乖異山間乃時有方藥亦不復用爾鴆直蔭切鳥毛有大毒入五臟爛殺人其口主殺蝮蛇毒一名䲰音運日生南海陶隱居云此乃是兩種鴆鳥狀如孔雀五色雜斑高大黑頸赤喙出交廣深山中䲰日鳥狀如黑傖雞能禁大石朽樹令反覓蛇吞之作聲似云同力故江東人呼為同力鳥並啖蛇人誤食其肉立即死鴆毛羽不可近人而並療蛇毒帶鴆喙亦闢蛇昔時皆用鴆毛為毒酒故名鴆酒頃來不復爾又云有物赤色狀如龍名海姜生海中亦大有毒甚於鴆羽也唐本注云此鳥商州以南江嶺間亦有人皆諳識其肉腥有毒亦不堪啖云羽畫酒殺人此是浪證按玉篇引郭璞云鴆鳥大如雕長頸赤喙食蛇又說文廣雅淮南子皆一名運日䲰運同也問交廣人並云䲰日一名鴆鳥一名同力䲰日鳥外更無如孔雀者陶云如孔雀者交廣人誑也宋本退一種彼子味甘溫有毒主腹中邪氣去三蟲蛇螫蠱毒鬼疰伏屍生永昌山谷陶隱居云方家從來無用此者古今諸醫及藥家子不復識又一名羆子不知其形何類也唐本注云此彼字當木旁作皮柀仍音披木實也誤入虫部爾雅云柀一名杉葉似杉木如柏肌軟子名榧子陶於木部出之此條宜在果部中也今注陶隱居不識唐本注以為榧實今據木部下品自有榧實一條而彼子又在蟲魚部中雖同出永昌而主療稍別古今未辨兩注不明今移入於此卷末以俟識者今退二種地菘味鹹主金瘡止血解惡蟲蛇螫毒挼以敷之生人家及路旁陰處所在有之高二三寸宋本云本經上品天名精唐注云南人名為地菘又尋所主功狀與此正同及據陳藏器解紛令陶蘇二說亦以天名精為地菘則今此條不當重出雖陳藏器拾遺別立地菘條此陳藏器自成一書務多條目爾解紛拾遺亦是差互後人即不當踵其謬而重有新附也今亦附於退出之次以備參考雞腸草主毒腫止小便利圖經曰雞腸草即蘩蔞也莖梗作蔓斷之有絲縷又細而中空似雞腸因得此名本經作兩條蘇恭以為一物二名爾雅云蔜虫吅一口𧘇𦎪釋曰䘒一名䖀𦎪一名蘩𦎪一名雞腸草實一物也由南北所生肥瘠不同亦其名多人不盡見往往疑為二物也此種自唐本於草部移附蘩蔞之下因襲至此今並於退出之後解百藥及金石等毒例蛇虺百蟲毒雄黃巴豆麝香丹砂乾薑蜈蚣毒桑汁及煮桑根汁蜘蛛毒藍青麝香蜂毒蜂房藍青汁狗毒杏仁礬石韭根人屎汁惡氣瘴毒犀角羚羊角雄黃麝香喉痹腫邪氣惡毒入腹升麻犀角射干風腫毒腫沉香木香薰陸香雞舌香麝香紫檀香百藥毒甘草薺苨大小豆汁藍汁藍實射罔毒藍汁大小豆汁竹瀝大麻子汁六畜血貝齒屑葍根屑蚯蚓屎藕芰汁野葛毒雞子清葛根汁甘草汁鴨頭熱血豬膏若已死口噤者以大竹筒盛冷水注兩脅及臍上暖輒易之口須臾開開則納藥藥入口便活矣用薺苨汁解之斑蝥芫青毒豬膏大豆汁戎鹽藍汁鹽湯煮豬膏巴豆狼毒毒杏仁藍汁白蘞鹽汁木占斯躑躅毒梔子汁巴豆毒煮黃連汁大豆汁生藿汁菖蒲屑汁煮寒水石汁藜蘆毒雄黃煮蔥汁溫湯雄黃毒防己甘遂毒大豆汁蜀椒毒葵子汁桂汁豉汁人溺冷水土漿食蒜雞毛燒吸菸及水調服半夏毒生薑汁煮乾薑汁礜石毒大豆汁白鵝膏芫花毒防己防風甘草桂汁烏頭天雄附子毒大豆汁遠志防風棗肌飴糖莨菪毒薺苨甘草犀角蟹汁馬刀毒清水大戟毒菖蒲汁桔梗毒白粥杏仁毒藍子汁諸菌毒掘地作坑以水沃中攪令濁俄頃飲之防葵毒葵根汁按防葵本經無毒試用亦無毒今用葵根汁應是解狼毒浮者爾蜀本云防葵傷火者不可服令人恍惚故以解之野芋毒土漿人糞汁雞子毒淳醋鐵毒磁石食諸肉馬肝漏脯中毒生韭汁韭根燒末燒豬骨末頭垢燒大屎酒服豉汁亦佳食金銀毒服水銀數兩即出鴨血雞子汁水淋雞屎汁食諸魚中毒煮橘皮生蘆葦根汁大豆汁馬鞭