body:
  text: 卷之七草部上品之上草之草黃精無毒植生黃精主補中益氣除風濕安五臟久服輕身延年不飢名醫所録名重樓菟竹雞格救窮鹿竹葳蕤垂珠馬箭白芨黃芝仙人餘糧太陽之草苗圖經曰苗高一二尺葉如竹葉而短兩兩相對莖梗柔脆頗似桃枝本黃末赤四月開細青白花如小豆花子白如黍亦有無子者根如嫩生薑黃色肥地生者大如拳薄地生者如拇指山人蒸曝作果食之甚甘美地圖經曰生山谷今處處有之永嘉記云出嵩陽永寧縣道地嵩山茅山時生三月生苗採二月取根收曝乾用根肥而脂潤者佳質類嫩生薑色生黃熟黑味甘性平緩氣氣之薄者陽中之陰臭腥主補中益氣制日華子云九蒸九曝雷公云以溪水洗淨後蒸從已至子薄切曝乾治補日華子云五勞七傷助筋骨止飢耐寒暑益脾胃潤心肺駐顏贋鉤吻為偽菖蒲無毒叢生菖蒲主風寒濕痹咳逆上氣開心孔補五臟通九竅明耳目出音聲主耳聾癰瘡溫腸胃止小便利四肢濕痹不得屈伸小兒溫瘧身積熱不解可作浴湯久服輕身聰耳目不忘不迷惑延年益心智高志不老名醫所録名昌陽堯韭苗圖經曰春生青葉長一二尺其葉中心有脊狀如劍無花實其根盤屈有節狀如馬鞭大一根傍引三四根傍根節尤密一寸九節佳有一寸十二節者採之初則虛軟干則堅實折之中心色微赤嚼之辛香少滓人多植於乾燥砂石土中臘月移之尤易活陶隱居云生磧上概音既節者為好在下濕地大根者名昌陽雷公云石上生者根條嫩黃緊硬節稠長一寸九節者是真也地圖經曰出上洛梁州池澤及蜀郡嚴道今處處有之道地池州戎州者佳時生春生葉採五月五日及十二月取根收曝乾用根一寸九節堅實者為好質類知母細而盤屈有節色微赤味辛性溫散氣氣之厚者陽也臭香主聰耳目通心氣助秦皮秦艽為之使反惡地膽麻黃制雷公云銅刀刮去上黃黑硬節皮一重用嫩桑條拌蒸去桑條曝乾銼用治療藥性論云風濕𤸷痹耳鳴頭風淚下鬼氣殺諸蟲惡瘡疥瘙日華子云除風下氣丈夫水臟女人血海冷敗多忘長智除煩悶止心腹痛霍亂轉筋客風瘡疥澀小便殺腹臟蟲及瘙蝨耳痛合治菖蒲一二寸合吳茱萸煎湯飲之治心腹冷氣逆痛合酒煎服治産後崩中下血不止禁露根不可用忌飴糖羊肉鐵器解大戟巴豆毒贋溪蓀為偽菊花無毒叢生菊花出神農本經主風頭眩腫痛目欲脫淚出皮膚死肌惡風濕痹久服利血氣輕身耐老延年以上朱字神農本經療腰痛去來陶陶除胸中煩熱安腸胃利五脈調四肢以上黑字名醫所録名節花日精女節傅延年更生周盈女華回蜂菊陰成玉英女莖蔡苦蒿容成金精長生地薇蒿羊歡草苗圖經曰初春布地生苗夏繁茂至深秋著花然菊有兩種莖紫氣香而味甘葉可作羹食者為真一種青莖而大葉細作蒿艾氣味苦不堪食者名苦薏非真也葉正相似惟以甘苦別之爾南陽亦有兩種白菊葉大似艾葉莖青根細花白蕊黃其黃菊葉似茼蒿花蕊都黃然今服餌家多用白者南京又有一種開小花花瓣下有小珠子如實謂之珠子菊十一月採實入藥亦佳衍義曰菊種不啻數十惟單葉花小而黃葉深緑小薄應候而開者宜入藥用月令所謂菊有黃花者是也地圖經曰生雍州川澤及南陽山谷田野中南京潁川汝南上黨建安順政郡河內今處處有之道地南陽菊潭者佳時生春生苗採正月根三月葉五月莖九月花收陰乾用花蕊甘美者為好質類旋覆花色黃白味甘性平緩氣氣之薄者陽中之陰臭香主除風明目助水枸杞根桑根白皮為之使治療藥性論云熱頭風旋倒地腦骨疼痛身上諸風日華子云四肢遊風利血脈心煩胸膈壅悶並癰毒頭痛別録云頭風目眩胸中洶洶目淚出風痹骨肉痛作枕療頭目風熱葉搗汁療疔腫垂死神效補日華子云花上水飲之益色壯陽合治白菊花三斤以生絹囊盛貯用酒三斗經七日服之日用三次療丈夫婦人久患頭風眩悶頭髮乾落胸中痰結髮時即頭旋眼昏暗不覺欲倒者白菊合巨勝茯苓蜜丸主風眩益顏色變白不老甘菊花葉莖根等分以成日千杵為末合酒調下一錢或合蜜丸如梧桐子大酒服七丸日三服之能輕身潤澤明目黑髭九月九日採菊花為末酒飲方寸匕治酒醉不醒人參無毒植生人參出神農本經主補五臟安精神定魂魄止驚悸除邪氣明目開心益智久服輕身延年以上朱字神農本經療腸胃中冷心腹鼓痛胸脅逆滿霍亂吐逆調中止消渴通血脈破堅積令人不忘以上黑字名醫所録名人銜鬼蓋神草人微土精血參苗圖經曰春生苗初夏有花細小如粟蕊如絲紫白色秋後結子或七八枚如大豆生青熟紅自落根如人形者有神其苗初生小者三四寸許一丫五葉四五年後生兩丫五葉未有花莖至十年後生三丫年深者生四丫各五葉中心生一莖俗名百尺杵多生於深山中背陰近椵音賈漆下濕潤處故贊曰三丫五葉背陽向陰欲來求我椵樹相尋蓋椵樹葉大蔭廣故也陶隱居云一莖直上四五葉相對而生花紫色根長而黃狀如防風多潤實而甘百濟者形細而堅白氣味薄遼東者形大而虛軟不及百濟遠矣衍義曰今之用者皆河北榷場博易到盡是高麗所出率虛軟味薄不若潞州上黨者味厚體實為佳也湯液本草云味既甘溫調中益氣即補肺之陽泄肺之陰也若便言補肺而不論陰陽寒熱何氣不足則誤矣若肺受寒邪宜此補之肺受火邪不宜用也肺為天之地即手太陰也為清肅之臟貴涼而不貴熱其象可知若傷熱則宜沙參然人參補五臟之陽也沙參苦甘微寒補五臟之陰也用者宜當審之地圖經曰生上黨山谷及閩中新羅今河東泰山諸州皆有之唐本注云潞州平州澤州易州檀州箕州幽州媯州太行山藥性論云渤海道地遼東高麗上黨者佳時生春生苗採八月上旬取根收以竹刀刮淨曝乾勿令見風和細辛密封經年不壞用根滋潤堅實者為好質類桔梗而似人形色淡黃味甘性微寒溫緩氣氣味俱輕陽也陽中微陰臭香主保中守神生津益氣助茯苓馬藺為之使反藜蘆惡滷鹽溲疏制雷公云凡使要肥大塊如雞腿並似人形者採得陰乾去蘆銼碎用治療藥性論云吐逆不下食止霍亂煩悶嘔噦湯液本草云瀉脾肺胃中火邪補藥性論云五臟氣不足五勞七傷虛損痰弱海藥云養臟腑益氣安神湯液本草云脾肺陽氣不足及能補肺氣促短氣少氣補而緩中又云補陽利氣脈不足者是亡血也人參補之合治合馬藺為之使消胸中痰主肺痿吐膿及癇疾冷氣傷寒不下食患人虛而多夢紛紜合白朮乾薑甘草各三兩水煎服療胸痹心中痞堅留氣結胸胸滿脅下逆氣搶心合麥門冬五味子名生脈散夏月服之以救肺金生化之源茯苓為之使補下焦元氣瀉腎中火邪人參三分合升麻一分為引用補上升之氣合乾薑治裡虛腹痛益脾補氣禁肺熱者勿服代易老云沙參代人參取其味甘可也解金石毒贋桔梗薺苨為偽天門冬無毒叢生天門冬出神農本經主諸暴風濕偏痹強骨髓殺三蟲去伏尸久服輕身益氣延年以上朱字神農本經保定肺氣去寒熱養飢膚益氣力利小便冷而能補不飢以上黑字名醫所録名淫羊藿顛勒無不愈百部淫羊食顛棘筵門冬管松絺體滿冬門音門浣草蘼門苗圖經曰春生藤蔓大如叉股高至丈餘葉如茴香極尖細而疏滑有逆刺亦有澀而無刺者其葉如絲杉而細散夏開白花亦有黃色者秋結黑子在其根枝傍其根白或黃紫色大如手指長二三寸者大為勝頗與百部根相類然圓實而長一二十枚同撮洛中出者葉大幹粗殊不相類嶺南産者入伏後但無花暗結子余無他異抱朴子云神仙食服方云在東嶽名淫羊藿在中嶽名天門冬在西嶽名管松在北嶽名無不愈在南嶽名百部在京陸山阜名顛棘雖處處皆有名雖各異其實一也生高地根短味甜氣香者為上其生水側下地者葉細似蘊而微黃根長而味多苦氣臭者為下亦可服食善令人下氣為益服之百日皆力壯兼倍駃於朮及黃精也唐本注云此有二種苗有刺而澀者無刺而滑者俱是門冬顛刺浣草者形貌詺音冥之雖作數名終是一物二根浣垢俱淨故互名之也地圖經曰奉高山谷金城今處處有之道地北嶽地陰者尤佳時生春生苗採二月三月七月八月取根收曝乾用根圓而短實者為好質形類百部而脂潤色赤黃味甘苦性平寒緩泄氣氣薄味厚陽也陽中之陰臭朽主保肺氣血熱行手太陰經足少陰經助貝母垣衣地黃為之使反畏曾青制衍義曰凡使以水漬漉使周潤滲入肌俟軟緩緩擘去心不可浸出脂液其不知者乃以湯浸一二時柔即柔矣然氣味都盡用之不效藥欲其神不可得也治療藥性論云肺氣咳逆喘息促急除熱通腎氣肺痿生癰吐膿濕疥止消渴去熱中風令人肌體滑澤除身上一切惡氣不潔之疾令人白淨湯液本草云泄滯血及血妄行補湯液本草云助元氣合治合地黃為使服之奈老頭不白能冷補患人體虛而熱合貝母為使鎮心潤五臟益皮膚悅顏色補五勞七傷肺氣並嗽消痰風痹熱毒遊風煩悶吐血合蜜煮之食後服補虛勞肺勞止渴去熱風暴乾搗篩合酒服方寸匕治風癲引脅牽痛發作則吐耳如蟬鳴又除瘟痹癥瘕積聚風痰癲狂合人參黃耆為主保肺氣血熱侵肺止喘氣促用之神效禁勿食鯉魚誤食中毒以浮萍解之甘草無毒叢生甘草出神農本經主五臟六腑寒熱邪氣堅筋骨長肌肉倍力金瘡腫時勇切解毒久服輕身延年以上朱字神農本經溫中下氣煩滿短氣傷臟咳嗽止渴通經脈利血氣解百藥毒為九土之精安和七十二種石一千二百種草以上黑字名醫所録名國老蜜甘美草蜜草蕗草大苦蕁與苓通苗圖經曰春生青苗高一二尺葉如槐葉七月開紫花似奈冬結實作角子如畢豆根長者三四尺粗細不定皮赤生有橫梁梁下皆細根也然有數種以堅實斷理者為勝其輕虛縱理及細韌者不堪惟貨湯家用之爾雅云蕁蔓延生葉似荷青黃莖赤有節節有枝相當或云蕁似地黃詩唐風雲采苓采苓首陽之巔是也蕁與苓通用而先儒所説苗葉與今全別豈種類有不同者哉地圖經曰河西川穀積沙山及上郡今陝西河東州郡皆有之陶隱居云河西上郡及蜀漢諸夷中者佳道地山西隆慶州者最勝時生春生苗採二月八月除日取根收曝乾十日成用根堅實有粉而肥者為好質類黃耆皮粗而赤色皮赤肉黃味甘性平溫緩氣氣味俱厚陽也臭香主生瀉火炙和中行足厥陽經太陰經少陰經助術乾漆苦參為之使反甘遂大戟芫花海藻惡遠志制炙去蘆頭刮赤皮生亦可用治療藥性論云腹中冷痛並驚癇除腹脹滿及腎氣內傷令人陰痿及婦人血瀝腰痛虛而多熱日華子云安魂定魄驚悸煩悶健忘通九竅利百脈解冷熱別録云小兒中蠱欲死補藥性論云益五臟日華子云五勞七傷一切虛損益精養氣壯筋骨合治合去皮生薑治赤白痢合豆蔻治冷熱赤白痢及霍亂禁中滿者勿服忌豬肉解百藥毒烏頭巴豆毒生地黃無毒植生生地黃主婦人崩中血不止及産後血上薄心悶絶傷身胎動下血胎不落墮墜踠折瘀血留血衄鼻吐血皆搗飲之名醫所録名地髓苄音虎芑苗圖經曰二月生葉布地似車前葉上有皺紋而不光高者尺余低者三四寸其花似油麻花而紅紫色亦有黃花者其實作房如連翹子甚細而沙褐色其根色狀與南胡蘿蔔逼直但粗細長短不一日華子云生者水浸有浮者名天黃不堪用半沉者名人黃為次其沉者名地黃最佳也衍義曰地黃葉如甘露子花如脂麻花但有細斑點北人謂之牛奶子花其莖微細短促而有白毛者是也地圖經曰咸陽川澤及同州今處處有之陶隱居云渭城彭城歷陽江寧道地今懷慶者為勝時生春生葉採二月八月取根收陰乾用根肥大者為好質類南胡蘿蔔而脆色黃味甘苦性大寒泄氣味厚氣薄陰中之陽臭香主安心神涼血熱行手太陽經少陰經助得麥門冬清酒良反惡貝母畏蕪荑制酒浸上行或搗汁用治療藥性論云解諸熱破血通利月水閉絶不利水道搗薄心腹能消瘀血病人虛而多熱加而用之李杲云涼心火之血熱瀉脾土之濕熱止鼻中之衄熱除五心之煩熱補湯液本草云生血益腎水真陰不足蕭炳云黑鬚發合治與木通同用以導赤也忌蘿蔔蔥白韭白薤白銅鐵器熟地黃無毒干熟地黃出神農本經主折跌絶筋傷中逐血痹填骨髓長肌肉作湯除寒熱積聚除痹久服輕身不老以上朱字神農本經主男子五勞七傷女子傷中胞漏下血破惡血溺血利大小腸去胃中宿食飽力斷絶補五臟內傷不足通血脈益氣力利耳目以上黑字名醫所録名熟苄苗謹按苗葉文具生地黃條下舊本制治混而不分考其功用隨其生熟故表出之然蒸曝者謂之熟地黃其制之法以生地黃去皮瓷鍋上柳木甑蒸之攤曬令乾拌酒再蒸如此九度謂之九蒸九曝乃平易之法耳及據圖經曰八月取根以水浸驗其浮者名天黃不堪用半浮半沉者名人黃為次惟沉水肥實者名地黃為上以水淨洗並去細而根節瘦短者取二三十斤曝乾又以二三十斤搗取汁置銀瓷器中入地黃浸令透先於飯上蒸三四過時時蒸曝使汁盡為度其色黑如漆味甘如飴脂柔而潤澤此法為至精也收瓷器藏之用根肥大柔潤者為好質類干黃精而細長色黑味甘性寒緩氣味厚氣薄陰中之陽臭香主補諸虛益腎水行手少陰經厥陰經足少陰經助得麥門冬清酒良反惡貝母畏蕪荑治療藥性論云溫中下氣通血脈吐血不止日華子云止鼻衄婦人崩中血暈李杲云傷寒後脛股最痛新産後臍腹難禁補藥性論云補虛損久服變白延年日華子云助心膽氣安魂定魄止驚悸勞劣心肺損助筋骨長志李杲云活血氣封填骨髓滋腎水補益真陰忌蘿蔔蔥白韭白薤白銅鐵器蒼朮無毒植生蒼朮主治與白朮同若除上濕發汗功最大若補中焦除濕力小於白朮也本草但言術而不分蒼白其蒼朮別有雄壯之氣以其經泔浸火炒故能出汗與白朮止汗特異用者不可以此代彼名醫所録名山連山精天蘇山薊苗圖經曰春生苗葉葉細無毛兩兩相對莖作蒿桿狀而青赤色長二三尺夏開花似刺薊花而紫碧色入伏後結子至秋苗枯其根似薑而無丫傍有細根皮黑肉黃中多膏液其味苦甘而烈惟春及秋冬取者為佳易生白霜者是也地出鄭山山谷漢中南鄭今處處有之道地茅山蔣山嵩山者為勝時生春生苗採八九月十一十二月取根收曝乾用根干堅實者為好質類薑而無丫色黑褐味苦甘性溫緩氣味厚氣薄陰中陽也臭香主除濕寬中行足陽明經足太陰經助防風地榆為之使制米泔浸洗刮去粗皮治療藥性論云大風𤸷痹心腹脹痛除寒熱水腫脹滿腹內冷痛吐瀉不住日華子云一切風疾冷氣腹脹婦人冷癥瘕溫疾山嵐瘴氣合治合香附撫芎解諸郁忌桃李雀肉菘菜胡荽大蒜青魚白朮無毒植生白朮出神農本經主風寒濕痹死肌痙渠井切疸止汗除熱消食作煎餌久服輕身延年不飢以上朱字神農本經主大風在身面風眩頭痛目淚出消痰水逐皮間風水結腫除心下急滿及霍亂吐下不止利腰臍間血益津液暖胃消穀嗜食以上黑字名醫所録名山薑山芬馬薊楊枹音孚薊乞力伽苗圖經曰春生苗葉葉大有毛兩兩相對莖作蒿干狀而青赤色長二三尺夏開黃白花入伏後結子至秋苗枯其根似薑而有丫傍有細根皮褐肉白中少膏液其味甘苦而不烈惟春及秋冬取者佳銼碎不生霜者是也謹按二術圖經云春月採根蓋值春生之際元氣發於苗則根不實而力薄固非其時矣秋冬採之則元氣歸於根而力全也地圖經曰宣州舒州及鄭山山谷漢中南鄭今處處有之道地杭州於潛佳時生春生苗採八九月十一十二月取根收曝乾用根堅白不油者為好質類生薑而皮粗皺色土褐味甘性溫泄緩氣味厚氣薄陰中陽也臭香主除濕健脾行手太陽經少陰經足陽明經太陰經少陰經厥陰經助防風地榆為之使制去蘆刮皮治療藥性論云多年氣痢消導宿食開胃去痰涎止下泄嘔逆胃氣虛冷痢日華子云消痰治水氣利小便止翻胃及筋骨軟弱痃癖氣塊除煩長肌湯液本草云和中益氣利腰臍間血除胃中熱去諸經之濕及皮間風止汗消痞補胃通水道上而皮毛中而心胃下而腰臍在氣主氣在血主血日華子云五勞七傷壯腰膝合治潔古云合枳實消痞悶合人參芍藥補脾合澤瀉療心下有水合黃芩能安胎忌桃李雀肉菘菜胡荽大蒜青魚草之走菟絲子無毒蔓生菟絲子出神農本經主續絶傷補不足益氣力肥健汁去面皯久服明目輕身延年以上朱字神農本經養肌強陰堅筋骨主莖中寒精自出溺有餘瀝口苦燥渴寒血為積以上黑字名醫所録名菟蘆菟縷菟纍玉女蔦赤網唐蒙苗圖經曰夏生苗如絲綜蔓延草木之上六七月結實極細如蠶子然有二種色黃而細者名赤網色淺而大者名菟纍其功用並同書傳多雲菟絲無根其根不屬地假氣而生今觀其苗初生若絲遍地不能自起得草梗則纏繞隨上而生其根漸絶於地而寄空中信書傳之説不謬矣地圖經曰生朝鮮川澤田野及近京亦有之道地冤句者為勝時生夏生苗採八月九月取實收曝乾用子堅實細者為好質類如蠶子而細色土黃味辛甘性平散緩氣氣之薄者陽中之陰臭香主駐悅顏色強陰益精助得酒良山藥松脂為之使反惡雚菌制雷公云全採得去粗薄殼了用苦酒浸二日漉出用黃精自然汁浸一宿至明微用火煎至干入臼中熱燒鐵杵一丟三千餘杵成粉用苦酒並黃精自然汁與菟絲子相對用之治療藥性論云去腰疼膝冷及消渴熱中日華子云鬼交泄精尿血潤心肺補藥性論云男子女人虛冷添精益髓日華子云五勞七傷雷公云益氣助筋脈合治合牛膝內銀器中酒浸五日曝乾酒糊丸如桐子大空心酒下治丈夫腰膝積冷痛或頑麻無力贋天碧草子為偽草之草牛膝無毒植生牛膝出神農本經主寒濕痿痹四肢拘攣膝痛不可屈伸逐血氣傷熱火爛墮胎久服輕身耐老以上朱字神農本經療傷中少氣男子陰消老人失溺補中續絶填骨髓除腦中痛及腰脊痛婦人月水不通血結益精利陰氣止發白以上黑字名醫所録名百倍苗圖經曰春生苗莖高二三尺青紫色有節如鶴膝及牛膝狀故以名之葉尖圓如匙兩兩相對於節上生花作穗秋結實甚細此有二種莖紫節大者為雄青細者為雌根極長大而柔潤者佳莖葉亦可單用地圖經曰生河內川穀及臨朐今閩粵關中江淮蔡州蘇州亦有之道地懷州者為佳時生春生苗採二月八月十月取根收陰乾用根肥潤者為好色土褐味苦酸性平緩收氣氣之薄者陽中之陰臭腥主填髓壯筋反惡螢火陸英龜甲畏白前制雷公云去蘆並土以黃精自然汁浸一宿漉出焙乾銼碎用或酒浸炒用治療藥性論云陰痿逐惡血流結日華子云腰膝軟怯冷弱破癥結排膿止痛産後心腹痛並血暈落死胎補藥性論云益腎填精助十二經脈病人虛羸加用之日華子云壯陽合治合酒煮飲療小便不利莖中痛欲死兼婦人血結腹堅痛為末五兩合生地黃汁五升晝曝夜浸汁干為度蜜丸桐子大每服五六十丸空心溫酒下治消渴不止下元虛損久服壯筋骨駐顏色黑髮津液自生為末合酒服方寸匕日三療風瘙癮疹併骨疽癩病及㾦㿔禁妊娠不可服忌牛肉草之木茺蔚子無毒特生茺蔚子出神農本經主明目益精除水氣久服輕身莖主癮疹癢可作浴湯以上朱字神農本經子療血逆大熱頭痛心煩以上黑字名醫所録名蓷臭穢蕉萑蓷蓷莖益母益明大札郁臭草苦低草貞蔚負擔夏枯草苗圖經曰葉似荏葉莖作四方稜至夏節節開白花實似雞冠子黑色陸機云韓詩及三蒼皆云蓷益母也故曾子見子感恩劉歆亦謂蓷臭穢即茺蔚是也地圖經曰生海濱池澤及園圃田野間處處有之時生春生苗採五月取莖九月取子收曝乾用子莖質類菥蓂子色黑味辛甘性微溫緩散氣氣之薄者陽也臭臭主子明目益精葉難産浮腫制圖經曰唐天后煉益母草澤面法五月五日採根苗具者勿令著土曝乾搗羅以水和之令極熟團之如雞子大再曝仍作爐四傍開竅上下置火安藥中央大火燒一炊久即去大火留小火養之勿令絶經一伏時出之瓷器中研治篩再研三日收之使如澡豆法治療陳藏器云入面藥令人光澤莖敷乳癰惡腫痛服汁消浮腫下水圖經曰莖煮食療小兒疳痢沉困垂死者飲汁療女子因熱病胎死腹中及難産唐本注云莖産後血脹悶諸雜毒腫丹遊等腫搗敷疔腫並取汁服使毒內消及滴耳中消聤耳虺蛇毒敷之良名醫別録云莖葉汁療産後血暈心氣絶合治莖煎膏合酒服治折傷內損天陰則痛及産婦惡露不盡血暈諸疾燒灰以麵湯溲燒之遍除面上風刺忌鐵器草之草葳蕤無毒植生葳蕤出神農本經主中風曝熱不能動搖跌筋結肉諸不足久服去面黑皯好顏色潤澤輕身不老以上朱字神農本經心腹結氣虛熱濕毒腰痛莖中寒及目痛眥爛淚出以上黑字名醫所録名萎萎地節玉竹馬薰熒苗圖經曰葉狹而長表白里青亦類黃精莖幹強直似竹箭桿有節節上有毛莖班葉尖處有小黃點三月開青花結青圓實根黃多須大如指長一二尺或云可啖謹按本經與女葳同條云是一物二名又云自是二物然女葳味辛性溫主霍亂泄痢葳蕤味甘平主虛熱濕毒腰痛況葳蕤用根而女葳用苗葉二者主治既殊實非一物矣地圖經曰生泰山山谷丘陵滁州舒州漢中時生初春生苗採立春後取根收陰乾用根質類黃精而小異色淡黃味甘性平緩氣氣厚於味陽也臭臊主潤肺除熱反胃滷咸制雷公云竹刀刮去節皮洗淨以蜜水浸一宿蒸焙用治療圖經曰虛熱濕毒腰痛藥性論云時疾寒熱頭痛不安加而用之陳藏器云調氣血補日華子云除煩悶止渴潤心肺及天行熱狂藥性論云內補不足虛勞客熱陳藏器云聰耳明目令人強壯蕭炳云補中益氣日華子云五勞七傷虛損腰腳疼痛合治合漆葉為散療五臟益精去三蟲輕身不老變白潤肌膚暖腰腳贋鉤吻黃精為偽防葵無毒植生防葵出神農本經主疝瘕腸泄膀胱熱結溺不下咳逆溫瘧癲癇驚邪狂走久服堅骨髓益氣輕身以上朱字神農本經療五臟虛氣小腹支滿臚脹口乾除腎邪強志中火者不可服令人恍惚見鬼以上黑字名醫所録名梨蓋房慈爵離農果利茹方蓋苗圖經曰春生葉似葵葉每莖三葉一本十數莖中發一干其端六月開花如蔥花景天輩其根葉似葵花子根香味似防風故名防葵今以枯朽狼毒當之極為謬矣其防葵置水不沉狼毒則不然以此為別爾地圖經曰生臨淄川穀及嵩高少室泰山襄陽望楚山東皆有之道地興州時生春生葉採三月三日取根收曝乾用根不蚛者為好質類防風色土黃味辛甘苦性寒散泄氣味厚於氣陰中之陽臭香主邪氣驚狂制雷公云凡使先須揀去蚛末用甘草湯浸一宿漉出曝乾用黃精自然汁一二升拌了土氣中炒令黃精汁盡為度治療藥性論云疝氣痃癖氣塊膀胱宿水血氣瘤大如碗悉能消散鬼瘧百邪鬼魅精怪通氣贋枯朽狼毒為偽柴胡無毒植生柴胡出神農本經主心腹去腸胃中結氣飲食積聚寒熱邪氣推陳致新久服輕身明目益精以上朱字神農本經除傷寒心下煩熱諸痰熱結實胸中邪逆五臟間遊氣大腸停積水脹及濕痹拘攣亦可作浴湯以上黑字名醫所録名地薰山菜茹草葉藝蒿柴薑邈音貌柴草苗圖經曰二月生苗甚香莖青紫葉似竹葉稍緊有似斜蒿亦有似麥門冬而短者七月開黃花一種生丹州者結青子與他處者不類根赤色似前胡而強蘆頭有赤毛如鼠尾獨窠長者為佳地圖經曰生洪農山谷及冤句今關陝江湖間近道皆有之道地銀州壽州欒州者為佳時生春生苗採二月八月取根收曝乾用根柔軟者為好質類前胡而細小色紫赤味微苦性平微寒泄氣氣味俱輕純陽丹溪云陰中之陽臭香主傷寒往來寒熱行足少陽經厥陰經助半夏為之使反畏女菀藜蘆惡皂莢制雷公云去蘆銀刀削上赤薄皮少許細銼用之勿令犯火治療藥性論云熱勞骨節煩疼熱氣肩背疼痛宣暢血氣下氣消食及時疾內外熱不解蕭炳云痰滿胸脅中痞日華子云除煩止驚消痰止嗽潤心肺及天行瘟疾熱狂乏絶胸脅氣滿健忘湯液本草云除虛勞寒熱去早晨潮熱及心下痞胸膈痛並往來寒熱膽痹李杲云左右兩傍脅下痛目晡潮熱往來生在臟調經內主血在肌主氣上行經補藥性論云勞乏羸瘦日華子云五勞七傷益氣力添精補髓衍義曰柴胡本經並無一字治勞今人治勞方中鮮有不用者凡此誤世甚多嘗原病勞有一種真臟虛損復受邪熱因虛而致勞故曰勞者牢也須當斟酌用之如經驗方治勞熱青蒿煎丸用柴胡正合宜耳服之無不效日華子云味甘補五勞七傷除煩止驚益氣力藥性論云謂治勞乏羸瘦若此等病苟無實熱醫者取而用之不亡何待注釋本草一字亦不可忽蓋萬世所誤無窮也苟有明哲之士自可處制中下之士不肯考究枉致淪沒可不謹哉可不戒哉如張仲景治寒熱往來如瘧用柴胡正合其宜合治合茯苓桔梗大黃石膏麻子仁甘草桂以水一斗煮取四升入硝石三方寸匕療傷寒寒熱頭痛心下煩滿麥門冬無毒叢生麥門冬出神農本經主心腹結氣傷中傷飽胃絡脈絶羸瘦短氣久服輕身不老不飢以上朱字神農本經身重目黃心下支滿虛勞客熱口乾燥渴止嘔吐愈痿蹶強陰益精消穀調中保神定肺氣安五臟令人肥健美顏色有子以上黑字名醫所録名羊韭愛韭馬韭門音門火冬忍陵僕壘隨脂不死藥忍冬羊蓍禹葭禹餘糧苗圖經曰葉青似莎草長及尺餘四季不凋根黃白色有鬚根作連珠形似穬麥顆故名麥門冬四月開淡紅花如紅蓼花實碧而圓如珠江南出者葉大如鹿蔥小者如韭大小雖有三四種其功用亦相似也地圖經曰生函谷川谷及堤阪肥土石間久廢處今所在有之道地江寧新安者佳吳地尤勝時生四季不凋採二月三月八月十月取根收陰乾用根上子以肥大者為好質根如連珠形似穬麥顆色淡碧味甘微苦性平泄緩氣氣厚於味陽中微陰臭朽主肺熱煩渴行手太陰經助地黃車前子為之使反畏苦參青蘘苦芙木耳惡款冬花苦瓠制凡使以水漬漉周潤俟柔軟去心用若以湯浸則氣味失矣治療藥性論云熱毒止煩渴面目肢節浮腫下水肺痿吐膿療心腹結氣身黑目黃心下苦支滿日華子云止渴肥人時疾熱狂頭痛止嗽陳藏器云止煩熱消渴身重目黃寒熱體勞止嘔開胃下痰飲東垣云退肺中隱伏之火生肺中不足之金補藥性論云泄止燥渴陰得其養補虛勞益氣強陰精日華子云五勞七傷安魂定魄衍義曰心肺虛熱並虛勞客熱湯液本草云益心氣不足及血妄行合治鮮肥麥門冬二兩以苦瓠汁浸經宿去心搗爛內宣州九節黃連末二兩和劑並手丸如梧桐子大食後飲下五十丸止消渴合白蜜銀器中重湯煮攪不停手候如飴乃成酒化溫服之補中益心悅顏色安神益氣令人肥健其力甚駃合五味子人參為生脈之劑補肺中元氣不足禁不抽心令人煩悶絶谷寒多人不可服獨活無毒叢生獨活出神農本經主風寒所擊金瘡止痛奔豚癇痓音熾女子疝瘕久服輕身耐老以上朱字神農本經療諸賊風百節痛風久新者此草得風不搖無風自動以上黑字名醫所録名胡王使者獨搖草苗圖經曰春生苗葉如青麻六月開花作叢而黃夾石上生者結實時則葉黃土脈中生者則葉青此草一莖直上得風不搖無風自動故名獨活以微黃白色而作愧形虛大者是也地圖經曰雍州川穀或隴西南安及文州鳳翔府陶隱居云出益州北部及西川茂州道地蜀漢者為佳時生春生苗採二月八月取根收曝乾用根虛大者為好質類前胡而粗大色微黃白味苦辛性溫泄散氣氣味俱薄陽也東垣云陰中之陽臭香主風寒濕痹行足少陰經助蠡實為之使制去蘆淨用治療藥性論云諸中風濕冷奔喘逆氣皮肌苦癢手足攣痛勞損及風毒齒痛湯液本草云頭眩目暈及燥濕經云風能勝濕又云獨活細而低治足少陰伏風而不治太陽故兩足寒濕痹不能動止非此不能除東垣云諸風掉眩頸項難伸風寒濕痹兩足不仁合治合細辛療少陰經頭痛合地黃等分每服三錢治牙風上攻腫痛每用四兩合好酒一升煎半升溫服治中風通身冷口噤不知人羌活無毒叢生羌活主遍身百節疼痛肌表八風賊邪除新舊風濕排腐肉疽瘡亦去溫濕風一身盡痛非此不能除名醫所録名羌青護羌使者苗圖經曰春生苗葉如青麻六月開花作叢而紫夾石上生者結實時則葉黃土脈中生者則葉青此草得風不搖無風自動以紫色而節密者為羌活也謹按舊本羌獨不分混而為一然其形色功用不同表裡行經亦異故分為二則各適其用也地圖經曰出雍州川穀或隴西南安及文州寧化軍陶隱居云出益州北部及西川道地今蜀漢出者佳時生春生苗採二月八月取根收曝乾用根節密者為佳質類川大黃苗而有節色紫赤味苦辛性溫散氣氣味俱輕陽也東垣云陰中之陽臭香主肢節疼痛行足太陽經厥陰經助蠡實為之使制去蘆淨用治療唐本注云除風兼水藥性論云賊風失音不語多癢血癩手足不遂口面喎斜遍身𤸷痹日華子云一切風並氣筋骨拳攣四肢羸劣頭旋明目赤疼及伏梁水氣通利五臟補日華子云五勞七傷虛損冷氣骨節痠疼合治為末每服五錢水酒各半盞煎去滓溫服治産後中風語澀四肢拘急合川芎治足太陽少陰頭痛透關節升麻無毒植生升麻主解百毒殺百精老物殃鬼闢瘟疫瘴氣邪氣蠱毒入口皆吐出中惡腹痛時氣毒癘頭痛寒熱風腫諸毒喉痛口瘡久服不夭輕身長年名醫所録名周麻苗圖經曰春生苗高二三尺葉似麻葉而青四五月著白花似粟穗六月結黑實根紫如蒿根有須多孔其孔如眼用引諸藥上升故俗謂之鬼眼升麻也地圖經曰出陝西及寧州嵩高淮南州郡皆有之道地益州川穀及蜀川者為勝時生春生苗採二月八月取根收曝乾用根堅實者為好質類羌活而多須色青白味甘苦性平微寒氣氣厚味薄陽中之陰東垣云陰中之陽臭香主解肌升胃氣行手陽明經太陰經足陽明經制雷公云以刀刮去粗皮一重用黃精自然汁浸一宿出蒸曝乾用治療圖經曰咽喉腫痛口舌生瘡解傷寒頭痛並諸丹毒藥性論云小兒風驚癇時氣熱雍閉不通口瘡煩悶療癰腫豌豆瘡水煎綿沾拭瘡上又主百邪鬼魅日華子云安魂定魄鬼附啼泣遊風腫毒口氣疳𧈟丹溪云理胃解肌肉間熱脾痹手足陽明傷風引用之要藥及發散本經風邪補湯液本草云元氣不足者用此於陰中升陽氣於上行不可缺也合治合犀角黃芩朴硝梔子大黃各二兩豉二升微熬同搗末蜜丸每服三十丸治四肢大熱大便難以五兩合水蜜煎三沸半服半敷治時行病發瘡合芍藥葛根等分甘草少許治春溫頭疼發熱及小兒斑疹禁升麻入足陽明若初病太陽證便服升麻葛根發出陽明經汗或失之過陽明經燥太陽經不可解必傳陽明矣投湯不當非徒無益而又害之代瘀血入里若衄血吐血者犀角地黃湯乃陽明經聖藥也如無犀角以升麻代之升麻犀角性味相遠不同何以代之蓋以升麻止是引地黃及余藥同入陽明爾解喉痹腫邪氣惡毒入腹贋落新婦為偽車前子無毒叢生車前子出神農本經主氣癃止痛利水道小便除濕痹久服輕身耐老以上朱字神農本經男子傷中女子淋瀝不欲食養肺強陰益精令人有子明目療赤痛葉及根味甘寒主金瘡止血衄鼻瘀血血瘕下血小便赤止煩下氣除小蟲以上黑字名醫所録名當道蝦蟆衣馬舄音昔勝舄牛遺牛舌草芣音浮苜音以苗圖經曰春生葉布地如匙面纍年者長及尺余穗如鼠尾花甚細青色微赤實如葶藶赤黑色今人家庭除中多有之亦可作茹蜀中尤尚郭璞云大葉長穗好生道傍喜在牛迹中生故曰車前當道也地圖經曰生真定平澤丘陵道路中今江湖淮甸近京北地處處有之道地開州者為最時生春生苗採五月五日取苗七月八月取實收陰乾用子黑細者為好質類雞冠子色黑味甘鹹性冷軟氣味厚於氣陰中之陽臭朽主明目利小便助常山為之使制雷公云凡使須一窠有九葉內蕊莖可長一尺二寸者和蕊葉根去土稱重一鎰者力全堪用使葉勿使蕊莖其葉銼於新瓦上攤乾用之治療圖經曰婦人難産葉生研以水解飲之止衄血藥性論云去風毒肝中風熱毒風沖眼目赤痛瘴翳腦痛淚出及心胸煩熱葉主尿血明目利小便通五淋蕭炳云養肝東垣云利小便而不走氣補藥性論云葉補五臟合治合常山為使通小便淋澀壯陽治脫精心煩下氣以五兩合葵根切一升以水五升煎取一升半分三服治妊娠患淋小便澀水道熱而不通為末合米飲服二錢治瀉如神合乾地黃麥門冬等分為末蜜丸如梧桐子大服之治久患內瘴眼葉絞取汁一盞入蜜一合煎溫作二服治熱痢不止者禁葉搗取汁服療泄精大誤矣此藥甘滑利小便走泄精氣及主小便赤下氣有人作菜食小便不禁嘗為所誤草之木木香無毒植生木香出神農本經主邪氣闢毒疫溫鬼強志主淋露久服不夢寤魘寐以上朱字神農本經療氣劣肌中偏寒主氣不足消毒殺鬼精物溫瘧蠱毒行藥之精輕身致神仙除肺中滯氣若治中下焦氣結滯須用檳榔為使以上黑字名醫所録名蜜香苗圖經曰根窠大類茄子葉似羊蹄而長大花開如菊其實黃黑色以根形如枯骨者良地圖經曰出永昌山谷道地崑崙及廣州舶上來者佳時生春生苗採不拘時取收曬乾用根輕浮苦而黏齒者為好質類枯骨色土褐味辛苦性溫散氣味厚於氣陰中陽也東垣云純陽臭香主調諸氣止瀉痢助得肉豆蔻陳皮生薑檳榔為佐使制不見火細銼用治療陶隱居云消毒腫除惡氣藥性論云九種心痛積年冷氣痃癖症塊脹滿逐諸壅氣上衝煩悶及霍亂吐瀉心腹㽱刺日華子云除心腹一切氣止瀉霍亂痢疾安胎健脾消食及膀胱冷痛嘔逆反胃衍義曰專泄決胸膈間滯塞冷氣湯液本草云去肺中滯氣及腹中氣轉運和胃氣丹溪云行肝經氣火煨可實大腸合治為末合酒服治女人血氣刺心心痛不可忍贋土青木香為偽草之草青木香無毒植生青木香主婦人血氣刺心痛不可忍九種心痛積年冷氣痃癖症塊脹痛逐諸壅氣上衝煩悶霍亂吐瀉心腹㽱刺名醫所録苗圖經曰春生苗三四尺葉如牛蒡但狹長八九寸皺軟而有毛夏開黃花如金錢其根類甘草而辛香又一種葉如山芋而開紫花者江淮人呼為土青木香也地圖經曰出岷州及江淮間苑中處處有之時生春生苗採不拘時收曬乾用根質類南苦參而黑褐色青黑味辛苦性溫氣味厚於氣陰中之陽臭香主行氣草之走山藥無毒蔓生山藥出神農本經主傷中補虛羸除寒熱邪氣補中益氣力長肌肉久服耳目聰明輕身不飢延年以上朱字神農本經主頭面遊風頭風眼眩下氣止腰痛補虛勞羸瘦充五臟煩熱以上黑字名醫所録名薯蕷山芋玉延土薯薯署山羊修脆兒草苗圖經曰春生苗蔓延苗蔓延援籬莖紫葉青有三尖角似牽牛更厚而光澤夏開細白花大類棗花秋生實於葉間其狀如鈴南中有一種生山中根細如指極緊實過於家園種者味更珍美食之尤益人今江湖閩中出一種根如薑芋之類皮紫極有大者一枚可重斤余但性冷於北地者爾吳氏云始生赤莖細蔓五月華白七月實青黃八月熟落其根中白皮黃類芋地圖經曰生嵩高山谷及臨朐鐘山今處處有之陶隱居云東山南江南康唐本注云蜀道道地北都四明今河南者佳時生春生苗採二月八月取根收曝乾或風乾用白色堅實不蛀者為好色皮土褐肉白味甘性溫平緩氣氣厚於味陽中之陰臭朽主安神健脾助天門冬麥門冬紫芝為之使反惡甘遂制取粗大者用竹刀刮去黃皮以水浸末白礬少許摻水中經宿取淨洗去涎風乾用治療藥性論云去冷氣止腰疼鎮心神安魂魄開達心孔多記事日華子云長志安神療泄精健忘東垣云涼而能補亦治皮膚乾燥此物潤之草之草薏苡仁無毒薏音意苡音以仁出神農本經主筋急拘攣不可屈伸風濕痹下氣久服輕身益氣其根下三蟲以上朱字神農本經除筋骨邪氣不仁利腸胃消水腫令人能食以上黑字名醫所録名解蠡屋菼音毯起實㶆音感竿珠薏珠子苗圖經曰春生苗莖高三四尺葉如黍葉開紅白花作穗五六月結實其色青白形如珠子而稍長故呼薏珠子別本注云今多用漢梁者氣力劣於真定取青水色者良地陶隱居云生交址及漢梁今處處有之道地真定平澤及田野為佳時生春生苗採八月取根實收曝乾用實白微青者為好質類珠子而稍長色青白味甘性微寒緩氣氣之薄者陽中之陰臭香主除肺痿止消渴制曝於日中按之得仁治療圖經曰根煮汁除心腹煩滿胸脅痛葉益中空膈陶隱居云根煮汁去小兒蛔蟲藥性論云熱風筋脈攣急令人能食除肺氣吐膿血咳嗽涕唾上氣破五溪毒腫陳藏器云煞蛔蟲孟詵云乾溼腳氣合治合苦酒療肺癰心胸甲錯合麻黃杏仁甘草治風濕身煩疼日晡劇者合大附子治胸痹偏緩急禁妊娠不可服贋粳欇為偽益智子無毒叢生益智子主遺精虛漏小便餘瀝益氣安神補不足安三焦調諸氣夜多小便者取二十四枚碎之入鹽同煎服有神效名醫所録苗圖經曰益智子葉似蘘荷長丈餘其根傍生小枝高七八寸無葉花萼作種生其上如棗許大皮白中仁黑仁細者佳地圖經曰益智子生崑崙國今嶺南州郡往往有之時生春採無時用去皮用仁質如棗許大色黑味辛性溫氣氣之厚者陽也臭香主止嘔噦攝涎穢行手足太陰經足少陰經制去皮治療湯液本草云治脾胃中受寒邪和中益氣治多唾當於補中藥內兼用之合治本脾經在集香丸則入肺在四君子湯則入脾在鳳髓丹則入腎禁多服草果無毒草果溫脾胃止嘔吐霍亂噁心消宿食導滯逐邪除脹滿卻心腹中冷痛今補地謹按草果生廣南及海南苗草果形如橄欖其皮薄其色紫其仁如縮砂仁而大又云南出者名雲南草果其形差小耳用仁質如橄欖色皮紫仁白味辛性溫氣氣之厚者陽也臭香主截諸般瘧疾制去皮杵仁治山嵐瘴氣合治治瘧疾藥中同青皮厚朴白朮半夏黃芩柴胡茯苓甘草同煎為清脾湯同人參厚朴陳皮蒼朮茯苓半夏藿香甘草同煎為養胃湯一種唐本余闢虺雷味苦大寒無毒主解百毒消痰祛大熱療頭痛闢瘟疫一名闢蛇雷其狀如粗塊蒼朮節中有眼二十六種陳藏器余藥王味甘平無毒解一切毒止鼻衄吐血祛煩躁苗莖青色葉摘之有汁搗汁飲驗兜木香燒去惡氣除病疫漢武帝故事西王母降上燒兜木香末兜木香兜渠國所獻如大豆塗宮門香聞百里關中大疾疫死者相枕燒此香疫則止內傳云死者皆起此則靈香非中國所致標其功用為衆草之首焉草犀根味辛平無毒主解諸藥毒嶺南及睦婺間如中毒草此藥及千金藤並解之亦主蠱毒溪毒惡刺虎狼蟲虺等毒天行瘧瘴寒熱咳嗽痰壅飛尸喉閉瘡腫小兒寒熱丹毒中惡注忤痢血等並煮汁服之其功用如犀故名草犀解毒為最生衢婺洪饒間苗高二三尺獨莖根細辛研服更良生水中者名水犀也海藥云謹按廣州記云生嶺南及海中獨莖對葉而生如燈臺草若細辛平無毒主解一切毒氣虎狼所傷溪毒野蠱等毒並宜燒碎服臨死者服之得活薇味甘寒無毒久食不飢調中利大小腸生水傍葉似萍爾雅曰薇垂也三秦記曰夷齊食之三年顏色不異武王誡之不食而死廣志曰薇葉似萍可食利人也海藥云謹按廣州記云生海池澤中爾雅注云薇水菜主利水道下浮腫潤大腸無風獨搖草帶之令夫婦相愛生嶺南頭如彈子尾若烏尾兩片開合見人自動故曰獨搖草海藥云謹按廣志云生嶺南又云生大秦國性溫平無毒主頭而遊風遍身癢煮汁淋蘸陶朱術云五月五日採諸山野往往亦有之零餘子味甘溫無毒主補虛強腰腳益腎食之不飢曬乾功用強於薯蕷有數種此則是其一也一本云大如雞子小者如彈丸在葉下生百草花主百病長生神仙亦煮花汁釀酒服之異類云鳳剛者漁陽人也常採百花水漬封泥埋之百日煎為丸猝死者內口中即活鳳剛服藥百餘歲入地肺山列仙傳云堯時赤松子服之得仙紅蓮花白蓮花味甘平無毒久服令人好顏色變白卻老生西國胡人將來至中國也旱藕味甘平無毒主長生不飢黑毛髮生太行如藕羊不吃草味苦辛溫無毒主一切風血補益攻諸病煮之亦浸酒生蜀川山谷葉細長在諸草中羊不吃者是萍蓬草根味甘無毒主補虛益氣力久食不飢厚腸胃生南方池澤大如荇花黃未開前如算袋根如藕飢年當谷也石蕊王長年不飢生太山石上如花蕊為丸散服之今時無復有王隱晉書曰庚褒入林慮山食木實餌石蕊得長年也仙人草主小兒酢瘡煮湯浴亦搗敷之酢瘡頭小而硬小者此瘡或有不因藥而自瘥者當丹毒入腹必危可預飲冷藥以防之兼用此草洗瘡亦明目去膚翳挼汁滴目中生階庭間高二三寸葉細有雁齒似離鬲草北地不生也會州白藥主金瘡生膚止血碎末敷瘡上藥如白蘞出會州也救藭草食之可絶谷長生生地肺山大松樹下如竹出新道書地肺山高六千丈其下有之應可求也草豉味辛平無毒主惡氣調中益五臟開胃令人能食生巴西諸國草似韭豉出花中人食之陳思岌味辛平無毒主解諸藥毒熱毒丹毒癰腫天行壯熱喉痹蠱毒除風血補益以上並煮服之亦磨敷瘡上亦浸酒出嶺南一名千金藤一名石黃香今江東又有千金藤一名鳥虎藤與陳思岌所主頗有異同終非一物也陳思岌蔓生於小豆根及葉辛香也千里及味苦平小毒主天行疫氣結黃瘧瘴蠱毒煮服之吐下亦搗敷瘡蟲蛇犬等咬處藤生道傍籬落間有之葉細厚宣湖間有之孝文韭味辛溫無毒主腹內冷脹滿泄痢腸澼溫中補虛生塞北山谷如韭人多食之能行雲昔後魏孝文帝所種以是為名又有山韭亦如韭生山間治毛髮又有石蒜生石間又有澤蒜根如小蒜葉如韭生平澤並溫補下氣又滑水源又有諸葛亮韭更長彼人食之是蜀魏時諸葛亮所種也倚待草味甘溫無毒主血氣虛勞腰膝疼弱風緩羸瘦無顏色絶傷無子婦人老血浸酒服之逐病極疾故名倚待生桂州如安山谷葉圓高二三尺八月採取雞侯菜味辛溫無毒久食溫中益氣生嶺南顧廣州記曰雞侯菜似艾二月生宜雞羹故名之桃朱術取子帶之令婦人為夫所愛生園中細如芹花紫子作角以鏡向旁敲之則子自發五月五日收之也鐵葛味甘溫無毒主一切風血氣羸弱令人性健久服風緩及偏風並正生山南峽中葉似枸杞如葛黑色也伏雞子根味苦寒無毒主解百藥毒諸熱煩悶急黃天行黃疸疽瘡瘧瘴中惡寒熱頭痛馬急黃及牛疫並水磨服生者尤佳亦敷癰腫與陳家白藥同功但霍亂諸冷不可服耳生四明天台葉圓薄似錢蔓延根作鳥形者良一名承露仙陳家白藥味苦寒無毒主解諸藥毒水研服之入腹與毒相攻必吐疑毒未止更服亦去心胸煩熱天行瘟瘴出蒼梧陳家解藥用之故有陳家之號蔓及根並似土瓜緊小者良冬春採取一名吉利菜人亦食之與婆羅門白藥及赤藥功用並相似葉如錢根如防己出明山龍珠味苦寒無毒子主疔腫葉變白髮令人不睡李雍方云主諸熱毒石氣發動調中解煩生道傍子圓赤珠似龍葵但子熟時赤耳
