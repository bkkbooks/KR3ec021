body:
  text: 卷之八草部上品之中草之草澤瀉無毒叢生澤瀉出神農本經主風寒濕痹乳難消水養五臟益氣力肥健久服耳目聰明不飢延年輕身面生光能行水上以上朱字神農本經補虛損五勞除五臟痞滿起陰氣止泄精消渴淋瀝逐膀胱三焦停水扁鵲云多服病人眼葉主大風乳汁不出産難強陰氣久服輕身實主風痹消渴益腎氣強陰補不足除邪濕久服面生光令人無子以上黑字名醫所録名水瀉及瀉芒芋鵠瀉蕍藛苗圖經曰春生苗多在淺水中其葉狹長似牛舌草獨莖而長秋開白花作叢似穀精草乾久極易朽蠹常須密藏之漢中出者其形長大尾間有兩岐最佳地圖經曰汝南池澤山東河陝江淮南鄭邵武青代亦有之道地涇州華州漢中者佳時生春生苗採五六八九月取根五月取葉九月取實收陰乾用根不蛀者為好葉實亦可用質類京三稜而輕浮色白味甘鹹性寒緩氣味厚陰也陰中微陽臭朽主利水除濕行足太陽經少陰經反畏海蛤文蛤制雷公云去毛細銼酒浸一宿漉出曝乾用治療藥性論云治五淋利膀胱熱宣通水道日華子云筋骨攣縮通小腸止遺瀝尿血催生難産葉壯水臟下乳通血脈湯液本草云去陰間汗滲瀉止渴補藥性論云腎虛精自出日華子云五勞七傷頭旋耳虛鳴益女人血海令人有子禁多服病人眼遠志無毒叢生遠志出神農本經主咳逆傷中補不足除邪氣利九竅益智慧耳目聰明不忘強志倍力久服輕身不老以上朱字神農本經利丈夫定心氣止驚悸益精去心下膈氣皮膚中熱面目黃好顏色延年葉主益精補陰氣止虛損夢泄以上黑字名醫所録名棘菀葽繞細草苗小草苗圖經曰苗似麻黃而青又如蓽豆葉亦有似大青而小者三月開花白色根黃色形如蒿根長及一尺泗州出者花紅根葉俱大於他處商州者根又黑色俗傳夷門者最佳爾雅云葽繞棘菀即遠志也似麻黃赤華葉鋭而黃其苗謂之小草地圖經曰生泰山及冤句川穀泗州商州今河陝京西州郡亦有之道地夷門者為佳時生春生苗採四月取根葉收曬乾用根肥大者為好質類枸杞根而長色黃味苦性溫泄氣氣厚於味陽中之陰臭香主安心神止驚悸助得茯苓冬葵子龍骨良反畏珍珠藜蘆蜚蠊齊蛤蠐螬制雷公云以甘草湯浸一宿漉出去心曝乾用治療日華子云膈氣驚魘婦人血噤失音小兒客忤補藥性論云心神健忘安魂魄令人不迷堅壯陽道主夢邪日華子云長肌肉助筋骨抱朴子云久服令人有子合治小草合蜀椒去汗乾薑桂心細辛各三分附子二分炮為末蜜丸如桐子大名小草丸食後米湯下三丸日三服治胸痹心痛逆氣膈中飲不下忌服小草丸忌豬肉冷水生蔥菜解殺天雄附子毒禁不去心服之令人悶草龍膽無毒附山龍膽植生草龍膽出神農本經主骨間寒熱驚癇邪氣續絶傷定五臟殺蠱毒久服益智不忘輕身耐老以上朱字神農本經除胃中伏熱時氣溫熱熱泄下痢去腸中小蟲益肝膽氣止驚惕以上黑字名醫所録名陵遊苗圖經曰苗因舊根而生下抽根十餘本類牛膝直上生苗高尺餘四月生葉而細莖如小竹枝七月開花如牽牛花而作鈴其色青碧冬後結子苗葉遂枯因味苦甚故以膽為名也一種浙中所産者名山龍膽草其味苦澀以薑汁製之亦可入藥其莖葉經霜雪不凋與此相類而非一種也故附於此地圖經曰生齊朐山谷及冤句今近道亦有之陶隱居云道地吳興為勝時生四月採二月八月十一月十二月收陰乾用根肥長而脂潤者為好質類牛膝而赤色赤黃味大苦性大寒泄氣氣味俱厚陰也臭朽主瀉肝熱除濕腫助小豆柴胡貫衆為之使反惡防葵地黃制雷公云去蘆洗淨銅刀銼碎甘草水浸一宿曝乾用酒浸上行治療藥性論云小兒驚癇入心壯熱骨熱癰腫時疾熱黃口瘡日華子云客忤疳氣熱病狂語瘡疥明目止煩益智健忘湯液本草云除下焦之濕及翳膜之濕兩目赤腫睛脹瘀肉高起疼痛別録云蛔蟲攻心如刺吐清水用水煎空心服卒下血不止水煎服圖經曰山龍膽草主四肢疼痛合治合柴胡為主治目疾必用之藥合酒煎服治卒心痛禁空心勿服服之令人溺不禁細辛無毒叢生細辛出神農本經主咳逆頭痛腦動百節拘攣風濕痹痛死肌久服明目利九竅輕身長年以上朱字神農本經溫中下氣破痰利水道開胸中除喉痹齆音甕鼻風癇癲疾下乳結汗不出血不行安五臟益肝膽通精氣以上黑字名醫所録名小辛細草苗圖經曰葉如葵葉赤黑色一根一葉相連根極柔韌而細嚼之其味辛烈如椒故以名之地陶隱居云東陽臨海高麗圖經曰今處處有之道地華陰山谷時生春生苗採二月八月取根收陰乾用根細褐而長者為好質類馬蹄香色土褐味辛性溫散氣氣厚於味陽也臭香主頭痛齒痛行手少陰經助曾青棗根為之使反藜蘆惡狼毒山茱萸黃耆畏硝石滑石制雷公云揀去土並蘆頭雙葉瓜水浸一宿至明漉出曝乾銼碎用治療陶隱居云除痰明目食之去口臭藥性論云咳逆上氣惡風頭風手足拘急安五臟六腑添膽氣去皮風濕癢能止眼風淚下開胸中滯除齒痛血閉婦人血瀝腰痛日華子云止嗽消死肌瘡肉胸中結聚衍義曰頭面風痛合治合當歸芍藥白芷芎藭牡丹藁本甘草療婦人血病合決明鯉魚膽青羊肝療目痛合桂心內口中治卒客忤不能言禁不可多用及雙葉者服之害人忌生菜貍肉贋杜蘅為偽石斛無毒叢生石斛出神農本經主傷中除痹下氣補五臟虛勞羸瘦強陰久服厚腸胃輕身延年以上朱字神農本經益精補內絶不足平胃氣長肌肉逐皮膚邪熱痱音沸氣腳膝疼冷痹弱定志除驚以上黑字名醫所録名林蘭禁生杜蘭雀髀斛石蓫麥斛苗圖經曰五月生苗莖似竹節節間出碎葉七月開花十月結實其根細長黃色七八月採莖以桑灰湯沃之其色如金江南生者有二種一種似大麥纍纍相連頭生一葉名麥斛一種大如雀髀名雀髀斛惟生石上者勝亦有生櫟木上者名木斛不堪用唐本注云麥斛葉在莖端其餘斛如竹節間生葉也地圖經曰生六安山谷水傍石上今荊州廣州郡及溫台州亦有之唐本注云荊襄及漢中江左陶隱居云出始興宣城廬江始安道地廣南者為佳時生五月生苗採七月八月取莖收陰乾用莖質類木賊而扁色黃味甘性平緩氣氣厚於味陽中之陰臭朽主補腎氣暖腰膝助陸英為之使反畏殭蠶雷丸惡凝水石巴豆制雷公云去頭土用酒浸一宿漉出於日中曝乾卻用酥蒸從巳至酉徐徐焙乾用之治療藥性論云除熱及男子腰腳軟弱逐皮肌風痹骨中久冷虛損腰痛日華子云平胃氣逐虛邪衍義曰去胃中虛熱補藥性論云益氣健陽補腎積精養腎氣益力日華子云補虛損劣弱壯筋骨暖水臟輕身益智巴戟天無毒叢生巴戟天出神農本經主大風邪氣陰痿不起強筋骨安五臟補中增志益氣以上朱字神農本經療頭面遊風小腹及陰中相引痛下氣補五勞益精利男子以上黑字名醫所録名三蔓草不凋草苗圖經曰葉似茗經冬不枯多生竹林內內地生者葉似麥門冬而厚大至秋結實有宿根者青色嫩根者白色用之皆同以連珠肉厚紫色為良蜀人云都無紫色者彼方人採得或用黑豆同蒸欲其色紫殊失氣味尤宜辨之蜀中又有一種山律根似巴戟但色白土人採得以醋水煮之乃紫以雜之莫能辨也真巴戟嫩者亦白欲其紫色以大豆汁沃之則其力弱不可用兩種相雜人莫能識但擊破視之其中紫而鮮潔者為偽若紫而有微白糝如粉色理小暗者真也地圖經曰生巴郡及下邳山谷今江淮河東州郡亦有之陶隱居云建平宜都道地蜀川者為佳時生春生苗採二月八月取根收陰乾用根連珠肉厚者為好質狀如牡丹根細而有須色紫白味辛甘性微溫緩氣氣之厚者陽也臭香主一切風邪強陰益精助覆盆子為之使反惡朝生雷丸丹參制雷公云凡使打碎去心用枸杞子湯浸一宿漉出酒浸一伏時又漉出用菊花同熬令焦黃去菊花以布拭令乾用治療藥性論云除頭面中風下氣大風血癩日華子云除一切風邪氣水腫補藥性論云男子夜夢鬼交泄精強陰病人虛損加而用之日華子云安五臟定心氣贋山律根為偽草之走白英無毒蔓生白英主寒熱八疸消渴補中益氣久服輕身延年名醫所録名谷菜白草鬼目苗唐本注云蔓生葉似王瓜葉小長而生五丫其實圓若龍葵子生青熟紫黑煮汁解勞東人謂之白草即鬼目草也陶隱居云諸方藥不用其葉作羹飲之甚療勞而不用根華益州乃有苦菜土人專食之皆充健無病與圖經吻合疑或是此地圖經曰生益州山谷時生春生苗採春採葉夏採莖秋採花冬採根收曬乾用根葉花莖色白味甘性寒緩氣氣之薄者陽中之陰主煩熱風疹制煮汁或作羹飲之治療唐本注云煮汁飲解毒陳藏器云煩熱風疹丹毒瘧瘴寒熱小兒結熱煮汁飲之別録云莖葉煮粥極解熱毒草之草白蒿無毒植生白蒿主五臟邪氣風寒濕痹補中益氣長毛髮令黑療心懸少食常飢久服輕身耳目聰明不老神農本經名蓬蒿繁遊胡旁勃遊胡旁勃蘩音煩皤音婆蒿苗圖經曰春初最先諸草而生似青蒿而葉粗上有白毛錯澀從初生至枯白於衆蒿頗似細艾至秋香美可生食爾雅所謂繁皤蒿即此是也地圖經曰生中山川澤今所在有之時生春初生苗採二月七月取收陰乾用苗葉白色者為好子亦可用質類青蒿色白味甘性平緩氣氣厚於味陽中之陰臭香主補中益氣風寒濕痹制去根土或生搗汁或燒淋灰汁治療孟詵云汁去熱黃心痛灰淋汁止淋瀝補孟詵云葉為菹益人合治葉乾為末合米飲調一匙空腹服之療夏日暴水痢子為末合酒調服主鬼氣白艾蒿十束如升大煮取汁合面及米一如釀酒法候熟稍稍飲之治惡疾遍體面目有瘡贋蔞蒿為偽赤箭無毒植生赤箭出神農本經主殺鬼精物蠱毒惡氣久服益氣力長陰肥健輕身增年以上朱字神農本經消癰腫下肢滿疝音山下血以上黑字名醫所録名離母鬼督郵獨搖合離草苗圖經曰赤箭天麻苗也獨莖如箭竿葉生其端有風不動無風自搖四月開花竿葉俱赤實似枯苦楝子核作五六稜中有肉如面日曝則枯萎其根大類天門冬惟無心脈耳去根尺許有十餘子似芋而為衛之抱朴子云仙方中謂此為合離草者由此物下根如芋魁有遊子十二枚周環之去大魁數尺雖相須而實不連但以氣相屬故也地圖經曰生陳倉川穀雍州及泰山少室今江湖間亦有之道地兗州時生春初生苗採三月四月八月取收曝乾用莖質類箭竿而莖端有葉色赤味辛性溫散氣氣之厚者陽也臭臊主消癰腫益元氣制銼碎用庵䕡子無毒植生菴音淹䕡音閭子出神農本經主五臟瘀血腹中水氣臚脹留熱風寒濕痹身體諸痛久服輕身延年不老以上朱字神農本經療心下堅膈中寒熱周痹婦人月水不通消食明目駏音巨驉音墟食之神仙以上黑字名醫所録苗圖經曰春生苗葉如艾蒿高二三尺七月開花八月結實江南人家種此闢蛇地圖經曰出雍州川穀及上黨道邊江淮亦有之道地寧州秦州時生春生苗採十月九月取實收陰乾用子葉質類艾蒿色青味苦性微寒微溫泄氣味厚於氣陰中之陽臭香主瘀血囊濕助荊實薏苡仁為之使制為末或煮汁治療圖經曰踠折瘀血打撲損煮汁服藥性論云男子陰痿不起心腹脹滿能消瘀血日華子云腰腳重痛膀胱疼骨節煩痛不下食陶隱居云種之闢蛇別録云諸瘀血不散變成癰搗汁服補藥性論云益氣日華子云明目菥蓂子無毒植生菥音錫蓂音覓子出神農本經主明目目痛淚出除痹補五臟益精光久服輕身不老以上朱字神農本經療心腹腰痛以上黑字名醫所録名薎菥大蕺馬辛大薺苗圖經曰菥蓂大薺郭璞云似薺細葉俗呼之曰老薺蘇恭亦云是大薺又云然菥蓂味辛大薺味甘陳藏器云大薺當是葶藶非菥蓂菥蓂大而扁葶藶細而圓二物殊也而爾雅自有葶藶謂之蕇音典注云實葉皆似芥一名狗薺大抵二物皆薺類故人多不能細分乃爾致疑也地圖經曰生咸陽川澤及道傍今處處有之時生春生苗採四月五月取子收曝乾用子質類葶藶而匾大色淡黃味辛性微溫散氣氣之厚者陽也臭焦主肝熱明目助得荊實細辛良反惡乾薑苦參制搗碎用治療名醫別録云為細末療眼熱痛淚不止欲臥時用銅箸點眼中當有熱淚及惡物出並去胬肉合治以苦參為使能治肝家積聚眼目赤腫蓍實無毒叢生蓍實主益氣充肌膚明目聰慧先知久服不飢不老輕身神農本經苗圖經曰其生如蒿作叢高五六尺一本一二十莖至多者三五十莖生便條直所以異於衆蒿也秋後有花出於枝端紅紫色形如菊今醫家亦稀用其莖為筮以問鬼神知吉凶故聖人贊之謂之神物史記龜策傳曰龜千歲乃遊於蓮葉之上蓍百莖共一根又其所生獸無虎狼蟲無毒螫劉向云龜千年而靈蓍百年而一本生百莖又楮先生云蓍生滿百莖者其下必有神龜守之其上常有青雲覆之傳曰天下和平王道得而蓍莖長丈其叢生滿百莖方今世取蓍者不能中古法度不能得滿百莖長丈者取八十莖以上蓍長八尺即難得也好用卦者取滿六十莖以上長滿六尺者即可用矣今蔡州所生者皆不言如此然則此類其神物也故不常有地圖經曰出少室山谷今蔡州上蔡縣白龜祠傍唐本注云所在有之時生無時採八月九月取實收曬乾用實堅澤者為好質莖如蘬蕭實類粟米色蒼黃味苦酸性平緩氣味厚於氣陰中之陽臭香主明目益氣贋楮實為偽草之木赤芝無毒寄生赤芝主胸中結益心氣補中增慧智不忘久食輕身不老延年神仙神農本經名丹芝苗唐本注云五芝經云皆以五色生於五嶽諸方所獻白芝未必華山黑芝又非常嶽且芝多黃白稀有黑青者然紫芝最多非五芝之類但芝自難得縱獲一二豈得終久服耶陶隱居云按郡縣無高夏名恐是山名爾此六芝皆是仙草之類俗所稀見族種甚多形色環異並載芝草圖中今俗所用紫芝此是朽樹木株上所生狀如木檽音軟名為紫芝爾雅云苬音囚芝釋曰瑞草名也一歲三華為苬為芝論衡雲芝生於土土氣和故芝草生瑞命禮曰王者仁慈則芝草生是也地圖經曰生霍山黑芝無毒寄生黑芝主癃音隆利水道益腎氣通九竅聰察久食輕身不老延年神仙神農本經名玄芝地圖經曰生常山時生無時採六月八月取質類澤漆色黑味咸性平氣味厚於氣陰中之陽臭朽助山藥為之使得發良反畏扁青茵陳蒿惡常山制水洗銼碎或為末用合治合麻子仁白瓜子牡桂共益人青芝無毒寄生青芝主明目補肝氣安精魂仁恕久食輕身不老延年神仙神農本經名龍芝地圖經曰生泰山時生無時採六月八月取質類翠羽色青味酸性平泄氣味厚於氣陰中之陽臭朽主不忘強志助山藥為之使得發良反畏扁青茵陳蒿制水洗銼碎或為末用合治合麻子仁白瓜子牡桂共益人白芝無毒寄生白芝主咳逆上氣益肺氣通利口鼻強志意勇悍安魄久食輕身不老延年神仙神農本經名玉芝地圖經曰生華山時生無時採六月八月取質類截肪色白味辛性平散氣氣之薄者陽中之陰臭朽助山藥為之使得發良反畏扁青茵陳蒿惡常山制水洗銼碎或為末用合治合麻子仁白瓜子牡桂共益人黃芝無毒寄生黃芝主心腹五邪益脾氣安神忠信和樂久食輕身不老延年神仙神農本經名金芝地圖經曰生嵩山時生無時採六月八月取質類紫金而光明洞徹如堅冰色黃味甘性平緩氣氣之薄者陽中之陰臭朽助山藥為之使得發良反畏扁青茵陳蒿惡常山制水洗銼碎或為末用治合麻子仁白瓜子牡桂共益人紫芝無毒寄生紫芝主耳聾利關節保神益精氣堅筋骨好顏色久服輕身不老延年神仙神農本經名木芝地圖經曰生高夏山谷時生無時採六月八月取收陰乾用鮮明潤澤者為佳質類木檽色紫味甘性溫氣氣味俱厚陽也臭朽主療痔疾助山藥為之使反畏發扁青茵陳蒿制水洗銼碎或為末治補藥性論云保神益壽合治合麻子仁白瓜子牡桂共益人草之草卷柏無毒叢生卷柏出神農本經主五臟邪氣女人陰中寒熱痛癥瘕血閉無子久服輕身和顏色以上朱字神農本經止咳逆治脫肛散淋結頭中風眩痿蹶強陰益精名醫所録名萬歲豹足求股交時地圖經曰卷柏生常山山谷間今關陝沂兗諸州亦有之宿根紫色多須春生苗似柏葉而細碎拳攣如雞足青黃色高三五寸無花子多生石上五月七月採陰乾去下近石有沙土處用之考之範子云卷柏出三輔建康記云出建康時生春生苗採五月七月取根收陰乾用細碎拳攣者為好質形如雞足而拳屈色青黃味辛甘性溫平微寒氣氣厚味薄陽中之陰臭香主生破血炙止血制去石沙土治療藥性論云月經不通尸疰鬼疰腹痛去百邪鬼魅日華子云鎮心中邪啼泣消面皯頭風暖水藏藍實無毒植生藍實出神農本經主解諸毒殺蠱蚑音其小兒鬼也疰鬼螫毒久服頭不白輕身以上朱字神農本經葉汁殺百藥毒解狼毒射罔毒其莖葉可以染青以上黑字名醫所録名實木藍子葉蓼藍馬藍吳藍菘藍槐藍苗圖經曰苗高二三尺許葉似水蓼花紅白色實亦若蓼實而大黑色藍有數種有木藍出嶺南不入藥有松藍可以為澱者亦名馬藍爾雅所謂葴馬藍是也有蓼藍但可染碧而不堪作澱即醫方所用者也又福州有一種馬藍四時俱有葉類苦益菜又江寧有一種吳藍二三月內生如蒿狀葉青花白此二種雖不類而俱有藍名古方多用吳藍者或恐是此故並附之衍義曰藍實即大藍實也謂之蓼藍非是爾雅所説是解諸藥等毒不可闕也實與葉兩用注不解實只解藍葉為未盡經所説盡矣藍一本而有數色刮竹青緑雲碧青藍黃豈非青出於藍而青於藍者也生葉汁解藥毒此即大葉藍又非蓼藍也蓼藍但堪揉汁染翠碧其花成長穗細小淺紅色為別地圖經曰出河內平澤福州太原廬陵南康江寧今處處有之時生三月四月採五月六月取實收曝乾用實葉質實類蓼子葉類水蓼色實黑葉青味苦性寒泄氣氣薄味厚陰中之陽臭腥主益心力解毒制葉搗汁用治療圖經曰吳藍去熱解毒止吐血陶隱居云汁塗五心止煩悶及蜂螫毒唐本注云木藍子消毒腫蓼藍汁去熱毒藥性論云藍實利五臟調六腑利關節治經絡中結氣使人健少睡汁止心煩躁日華子云吳藍除天行熱狂疔瘡遊風熱毒腫毒風疹去煩止渴殺疳金瘡血悶蟲蛇傷毒刺鼻洪吐血排膿寒熱頭痛赤眼産後血暈小兒壯熱熱疳陳藏器云槐藍澱敷熱瘡滓敷小兒禿瘡熱腫初作甘藍食之去熱黃青布天行煩毒小兒寒熱丹毒並水漬取汁飲燒作黑灰敷惡瘡經年不瘥者及敷灸瘡止血令不中風別録云唇上生瘡連年不瘥者以八月藍葉一斤搗汁洗瘥虎傷人瘡以青布緊卷燒一頭內竹筒中射瘡口令煙燻入瘡瘥補藥性論云填骨髓明耳目益心力合治馬藍焙搗為末合酒服錢匕治婦人敗血大藍汁合雄黃麝香細末點蜘蛛咬處即瘥藍合鼠屎兩頭尖者二七枚水五升煮取二升盡服之溫覆取汗治陰陽易病身體重小腹急熱上衝胸頭重不能舉䁾膝脛拘急欲死者解毒藥毒箭金石藥毒狼毒射罔毒蠱毒槐藍解諸毒青皮解諸物毒青黛青黛主解諸藥毒小兒諸熱驚癇發熱天行頭痛寒熱並水研服之亦摩敷熱瘡惡腫金瘡下血蛇犬等毒染澱亦堪敷熱惡腫蛇虺螫毒名醫所録苗謹按青黛出於藍也其種人家園圃蒔之葉似蓼夏採得以水漬缸甕中日攪令沫旋結水面取起曬乾入藥或云一種出波斯國者今不復見之地圖經曰出波斯國今太原廬陵南康處處有之時生春生苗採夏取葉收曬乾用輕浮者為好色青味咸性寒軟氣氣薄味厚陰也臭腥主殺蟲解毒制研細用治療陳藏器云小兒丹熱和水服之芎藭無毒叢生芎藭出神農本經主中風入腦頭痛寒痹筋攣緩急金瘡婦人血閉無子以上朱字神農本經除腦中冷動面上遊風去來目淚出多涕唾忽忽如醉諸寒冷氣心腹堅痛中惡卒急腫痛脅風痛溫中內寒以上黑字名醫所録名胡藭香果苗圖經曰芎藭即蘼蕪根也其苗四月五月間生葉似芹胡荽蛇床輩作叢而莖細七月八月開白花根堅瘦黃黑色關中出者俗呼為京芎並通用惟貴形塊重實作雀腦狀者謂之雀腦芎此最有力也吳氏云葉香細青黑文赤如藁本冬夏叢生五月華赤七月實黑莖端兩葉根有節似馬銜狀衍義曰今出川中大塊其里色白不油嚼之惟辛甘者佳他種不入藥止可為末煎湯沐浴此藥今人所用最多頭面風不可闕也然須以他藥佐之地圖經曰生武功川穀斜谷西嶺及關中秦州山陰泰山道地蜀川者為勝時生四月五月生苗採九月十月取根收曝乾用根如雀腦者佳質形類馬銜而成塊色黑赤味辛性溫散氣氣之厚者陽也臭香主頭風腦痛行手足厥陰經手足少陽經助白芷為之使反畏黃連制水洗去土銼用治療圖經曰葉作香飲止泄瀉陶隱居云齒根血出者含之瘥藥性論云主腰腳軟弱半身不遂及胞衣不出腹內冷痛日華子云除一切風一切氣一切血一切勞損調衆脈破癥結消宿血養新血長肉止鼻洪吐血及溺血痔瘻腦癰發背瘰癧癭贅瘡疥排膿消瘀血湯液本草云補血主血虛頭痛之聖藥散肝經之風上行頭目下行血海貫芎治少陽經苦頭痛補日華子云五勞七傷壯筋骨合治合當歸等分水二盞煎一盞服治婦人數月胎不動末一匙合艾湯調如婦人經水三月不行服此驗腹內微動者是胎銼一兩合酒一盞煎五分去滓入生地黃汁二合煎三沸食前分二服療婦人血崩晝夜不止禁久服則走散真氣蘼蕪無毒叢生蘼蕪出神農本經主咳逆定驚氣辟邪惡除蠱毒鬼疰去三蟲久服通神以上朱字神農本經主身中老風頭中久風風眩以上黑字名醫所録名薇蕪江蘺蘄茝苗圖經曰蘼蕪即芎藭苗也其苗四五月生葉似芹及胡荽蛇床輩作叢而莖細七八月開白花亦入藥用淮南子所謂夫亂人者芎藭之與藁本蛇床之與蘼蕪是也其葉倍香或蒔於園庭則分馨滿徑故江東蜀人採其葉作飲香也地圖經曰雍州川澤及冤句道地今關陝蜀川江東山中皆有之時生春生苗採四月五月取葉收曝乾用葉花質類蛇床葉色葉青花白味辛性溫散氣氣之厚者陽也臭香主祛風眩治療圖經曰止泄瀉黃連無毒叢生黃連出神農本經主熱氣目痛眥傷泣出明目腸澼腹痛下痢婦人陰中腫痛久服令人不忘以上朱字神農本經五臟冷熱久下泄澼膿血止消渴大驚除水利骨調胃厚腸益膽療口瘡以上黑字名醫所録名王連支連苗圖經曰苗高尺許一莖生三葉葉似甘菊四月開黃花六月結實似芹子而黃江左一種根若連珠其苗經冬不凋葉似小雉尾草正月開花作細穗淡白微黃色其根於六七月後始堅實也地圖經曰生巫陽山谷及泰山今江湖荊夔州郡亦有之陶隱居云生臨海諸縣者不佳別録云歙州處州者次之道地出宣城秦地及杭州柳州蜀道澧州東陽新安諸縣者最勝時生春生苗四月開花採二月八月取收曝乾用根連珠九節者為好質類巴戟色黃味苦性微寒泄氣味厚氣薄陰中之陽臭焦主瀉心火消痞滿行手少陰經助黃芩龍骨理石為之使反畏款冬花惡菊花白蘚皮白殭蠶芫花玄參勝烏頭制去須生用酒炒上行治療陶隱居云止下痢及渴藥性論云小兒疳蟲赤眼昏痛鎮肝去熱毒日華子云止心腹痛驚悸煩躁潤心肺長肉止血並瘡疥盜汗天行熱疾陳藏器云羸瘦氣急湯液本草云瀉心火除脾胃中濕熱治煩噁心鬱熱在中焦兀兀欲吐心下痞滿主陽有餘眼暴赤腫並諸瘡瘍及安蛔通寒格療下焦虛堅腎又能令人終身不發斑瘡煎黃連一口兒生未出聲時灌之大應已出聲灌之斑雖出亦輕別録云以㕮咀八兩用水七升煮五升去滓適寒溫飲五合日三服療卒心痛及傷寒病發豌豆瘡未成膿者又為末敷小兒月蝕瘡補日華子云五勞七傷益氣合治合豬肚蒸為丸療小兒疳氣以長三寸者三十枚稱重一兩半龍骨如棋子四枚重四分附子大者一枚乾薑一兩半膠一兩半並切先以水五合著銅器中去火三寸煎沸便下著生土上沸止又上水五合如此九上九下內諸藥著火上沸輒下著土沸止又復九上九下度可得一升頓服療下痢不問冷熱赤白谷滯休息久下之疾即愈合青木香各等分同搗為末以白蜜丸如梧子大空腹米飲下二三十丸日再如神其久冷人即煨熟大蒜作丸服以末一大兩合白羊子肝一具去膜同於砂盆內研令極細衆手捻為丸如梧子大每服以暖漿水吞三七枚連作五劑瘥凡諸眼目疾及障翳青盲皆主之合當歸芍藥等分細切以雪水或甜水煎濃汁洗眼冷即再溫甚益眼目但是風毒赤目花翳等皆可療之末合乳汁浸點止目卒癢並痛煎之治目中百病末合酒服方寸匕日三療妊婦因驚舉重胎動出血末合赤小豆末等分敷療痔疾有頭如雞冠者即瘥忌豬肉冷水解巴豆毒熱毒草之走絡石無毒附地錦扶芳土鼓石血薜荔木蓮麗生絡石出神農本經主風熱死肌癰傷口乾舌焦癰腫不消喉舌腫不通水漿不下久服輕身明目潤澤好顏色不老延年以上朱字神農本經大驚入腹除邪氣養腎主腰髖音寬痛堅筋骨利關節通神以上黑字名醫所録名石鯪石蹉略石明石領石懸石耐冬石龍藤苗圖經曰葉圓如細橘正青冬夏不凋其莖蔓延莖節著處即生根鬚包絡石上以此得名花白子黑以石上生者良其在水上者隨性而移薜荔木蓮地錦石血皆其類也薜荔與此極相類但莖葉粗大如藤狀木蓮更大如絡石其實若蓮房地錦味甘溫無毒葉如鴨掌蔓著地上隨節有根亦緣木石上石血極與絡石相類但葉頭尖而赤耳扶芳藤味苦小溫無毒山人取楓樹上者為附楓藤亦如桑上寄生一名滂藤小時如絡石薜荔夤緣樹木三五十年漸大枝葉蘩茂葉圓長二三寸厚若石葦生子似蓮房中有細子一年一熟一名木蓮打破有白汁停久如漆土鼓藤味苦子味甘溫無毒生林薄間作蔓繞草木葉頭尖子熟如珠碧色正圓小兒取藤於地打作鼓聲李雍名為長春藤以上六種皆相類各有療疾之功故附於此地圖經曰泰山川穀或石山之陰或高山岩上或宮寺及人家亭囿山石間在處有之時生春生苗採正月六月七月取收曬乾用莖葉生於石上者為好質類薜荔而細小色青味苦性溫微寒氣味厚於氣陰中之陽臭朽主瘡瘍喉痹助杜仲牡丹為之使反畏貝母菖蒲惡鐵落鐵精制雷公丸凡採得後用粗布揩葉莖上毛用熟甘草水浸一伏時出切曬乾任用治療唐本注云汁洗蝮蛇瘡服之去蛇毒心悶及刀斧傷敷之陳藏器云去一切風別録云喉痹咽喉寒喘息不通須臾欲絶圖經曰薜荔治背癰唐本注云石血治産後血結陳藏器云地錦破老血産後血結婦人瘦損不能飲食腹中有塊淋瀝不盡赤白帶下天行心悶扶芳藤主一切血一切氣一切冷其楓上者主血風及渴木蓮房破血土鼓藤主血風羸劣腹內諸冷血悶木蓮藤汁敷白癜癧瘍及風惡疥癬補陳藏器云暖腰腳久服延年去百病變白不老圖經曰木蓮壯陽道解殺孽毒蒺藜子無毒散生蒺藜子出神農本經主惡血破癥結積聚喉痹乳難久服長肌肉明目輕身以上朱字神農本經身體風癢頭痛咳逆傷肺肺痿止煩下氣小兒頭瘡癰腫陰潰可作摩粉其葉主風癢可煮以浴以上黑字名醫所録名旁通屈人止行休羽升推茨苗圖經曰蔓生細葉布地子有三角刺人者是也又一種白蒺藜無刺緑葉細蔓綿布沙上七月開花黃紫色如豌豆花而小九月結實作莢子便可採其實味甘而微腥褐緑色如蠶種子相類而差大又與馬薸子酷相似但馬薸子微大不堪入藥須細辨之地圖經曰蒺藜子生馮翊平澤或道傍沙苑蒺藜生同州沙苑牧馬草地最多時生二月四月苗採七八月取實沙苑蒺藜九月取實收曝乾用子質蒺藜子狀類菱角而細小有刺沙苑蒺藜形如蠶種子而大色白味苦辛性溫微寒氣氣厚於味陽中之陰臭香主明目去風助烏頭為之使制雷公云凡使採得後淨揀擇了蒸從午至酉出曬乾於木臼中舂令皮上刺盡用酒拌再蒸從午至酉出曬乾治療圖經曰祛風明目痔漏陰汗婦人髮乳帶下日華子云奔豚腎氣肺氣胸膈滿催生療腫毒及水臟冷小便多止遺瀝溺血藥性論云白蒺藜去諸風癧瘍破宿血療吐膿産難去燥熱補日華子云益精止泄精衍義曰沙苑者補腎合治合蜜為丸服如胡豆二枚治卒中五尸日三服愈禁妊娠服之即墮胎贋馬薸子為偽草之木黃耆無毒植生黃耆出神農本經主癰疽久敗瘡排膿止痛大風癩疾五痔鼠瘻補虛小兒百病以上朱字神農本經婦人子臟風邪氣逐五臟間惡血補丈夫虛損五勞羸瘦止渴腹痛泄痢益氣利陰氣生白水者冷補其莖葉療渴及筋攣癰腫疽瘡以上黑字名醫所録名戴椹戴糝獨椹芰草蜀脂百本王孫苗圖經曰根長二三尺獨莖作葉生枝杆去地二三寸其葉扶疏作羊齒狀又如蒺藜苗七月中開黃紫花其實作莢子長寸許其皮折之如綿謂之綿黃氏然有數種有白水耆有赤水耆有木耆功用水耆並同而力不及白水耆木耆短而理橫人多以苜蓿根假作黃耆折皮亦似綿頗能亂真但苜蓿根堅而脆黃耆至柔韌皮微黃褐色肉中白色此為異耳地圖經曰蜀郡山谷及白水漢中今河東陝西州郡多有之陶隱居云出隴西叨陽黑水宕昌道地憲州原州華原宜州寧州時生春生苗採二月十月取根收陰乾用根折之如綿者為好質類甘草而皮褐色皮黃肉白味甘性微溫平緩氣氣之厚者純陽臭微腥主補中益氣行手少陽經足太陰經足少陰經反惡白蘚皮龜甲制雷公云去蘆蒸槐砧上銼用或蜜炙生用亦可治療藥性論云去寒熱客熱日華子云破癥瘕瘰癧癭贅腸風血崩帶下赤白痢産前後一切病月候不勻消渴痰嗽及頭風熱毒赤目白水耆治血及煩悶骨蒸勞無汗則發汗有汗則止汗補藥性論云發背內補及虛喘腎衰耳聾補五臟日華子云壯筋骨長肉補血合治合防風煮湯薰風病脈沉口噤不語合人參甘草退勞役發熱合白芷連翹排膿止痛消毒合防風補力愈大禁面黑人不可多服贋苜蓿根為偽草之草肉蓯蓉無毒草蓯蓉附叢生肉蓯蓉出神農本經主五勞七傷補中除莖中寒熱痛養五臟強陰益精氣多子婦人癥瘕久服輕身以上朱字神農本經除膀胱邪氣腰痛止痢以上黑字名醫所録名肉鬆蓉苗圖經曰舊説是野馬遺瀝落地所生今西人云大木間及土塹垣中多生此非遊牝之所而乃有則知自有種類耳或疑其初生於馬瀝後乃滋殖如茜根生於人血之類是也皮如松子有鱗甲苗下有一細匾根長尺余然西羌來者肉厚而力緊為佳也採時掘取中央好者以繩穿至秋乃堪用又有一種草蓯蓉極相類但根莖圓紫色北來人多取刮去花壓令匾以代肉者功力殊劣耳又下品有列當條云生山南岩石上如藕根初生掘取亦名草蓯蓉性溫補男子疑即是此物今人鮮用故少有辨之者因附見於此陶隱居云第一齣隴西形匾廣柔潤多花而味甘次出北國者形短而少花巴東建平間者不如也日華子云又有花蓯蓉即是春抽苗者力較微耳地圖經曰生河西山谷及代郡雁門今陝西州郡多有之陶隱居云河南巴東建平道地西羌隴西時生春生採三月五月五日取根收陰乾用根肥潤者為好質形似松塔而長軟色紫味甘酸鹹性溫緩氣氣厚於味陽中之陰臭腥主補精壯陽制先以酒浸去浮甲心中白膜復以酒蒸酥炙治療藥性論云女人血崩帶下陰痛日華子云男子泄精尿血遺瀝補藥性論云益髓悅顏色延年壯陽日華子云男絶陽不興女絶陰不産潤五臟長肌肉暖腰膝湯液本草云補命門相火不足合治合山芋羊肉作羹益人防風無毒植生防風出神農本經主大風頭眩痛惡風風邪目盲無所見風行周身骨節疼痹煩滿久服輕身以上朱字神農本經脅痛脅風頭面去來四肢攣急字乳金瘡內痙葉主中風熱汗出以上黑字名醫所録名銅藝茴草百枝屏風蕳根百蜚苗圖經曰莖葉俱青緑色莖深葉淡似青蒿而短小初時嫩紫作菜茹極爽口五月開細白花中心攢聚作大房似蒔蘿花實似胡荽而大根土黃色與蜀葵根相類而潤實其關中所産者輕虛多不及齊州者良又有石防風出河中府根如蒿根而黃葉青花白五月開花六月採根亦療頭風眩痛又宋亳間及江東出一種防風其苗初春便生嫩時紅紫色彼人以作菜茹味甚佳然云動風氣本經云葉主中風熱汗出與此相反恐別是一種耳地圖經曰生沙苑川澤及邯鄲上蔡同州解州河中府京東淮浙州郡皆有之陶隱居云彭城蘭陵琅琊郁州道地齊州龍山者最善淄州兗州青州者尤佳時生初春生苗採二月十月取根收曝乾用根頭節堅如蚯蚓頭實而脂潤者為好質類沙參而細長色土黃味甘辛性溫散氣氣厚味薄陽也臭微香主祛風勝濕行足陽明經太陰經手太陽經反惡乾薑藜蘆白蘞芫花制去蘆洗淨銼用治療日華子云去三十六般風氣赤眼止淚及癱瘓通利五臟關脈藥性論云花主心腹痛四肢拘急行履不得經脈虛羸除骨節間疼痛湯液本草云治風通用瀉肺實散頭目中滯氣除上焦風邪之仙藥身去身半以上風邪稍去身半以下風邪又云去濕之仙藥補日華子云男子一切勞劣補中益神五勞七傷羸損盜汗心煩體重能安神定志勻氣脈合治合澤瀉藁本療風合當歸芍藥陽起石禹餘糧療婦人子臟風合南星童便療破傷風禁又頭者令人發狂又尾者發痼疾解殺附子毒蒲黃無毒叢生蒲黃出神農本經主心腹膀胱寒熱利小便止血消瘀血久服輕身益氣力延年神仙以上朱字神農本經蒲萼以澀腸止泄殊勝止瀉血及血痢以上黑字名醫所録名蒲捶蒲釐花苗圖經曰春初生嫩葉未出水時紅白色茸茸然至夏抽梗於叢葉中花抱梗端如武士捧杵故俚俗謂蒲捶亦謂之蒲釐花黃即花中蕊屑也細若金粉當其欲開時有便取之市釐間亦採以蜜搜作果食貨賣甚益小兒醫家又取其粉下篩後有赤滓謂之蒲萼也地圖經曰生河東及南海池澤今處處有之道地泰州者為良時生春葉採夏取蕊收曬乾用花中蕊屑質類松花色黃褐味甘性平緩氣氣厚於味陽中之陰臭香主諸血制雷公云凡使須隔三重紙焙令色黃蒸半日再焙乾用治療藥性論云通經脈止女子崩中不住痢血及鼻衄尿血利水道日華子云撲傷血悶排膿及瘡癤婦人帶下月候不勻血氣心腹痛妊娠下血墮胎血暈血症兒枕急痛小便不通腸風瀉血遊風腫毒鼻洪吐血下乳血痢生用破血消腫炒用補血止血補日華子云止泄精禁妊娠不可生用贋松黃黃蒿為偽香蒲無毒叢生香蒲主五臟心下邪氣口中爛臭堅齒明目聰耳久服輕身耐老神農本經名睢醮苗圖經曰香蒲乃蒲黃苗也初生時取其中心入地大如匕柄白色者生啖之甘脆周禮以為菹者是也至夏抽莖於叢葉中其端花蕊有屑如金粉即蒲黃也唐本注云此甘蒲可作薦者用白為菹亦堪蒸食山南名此蒲為香蒲謂菖蒲為臭蒲也地圖經曰生南海池澤今處處有之道地泰州者良時生春初採夏收曬乾用根質類茭白而細色白味甘性平緩氣氣厚於味陽中之陰臭香主聰耳目二十種陳藏器余捶胡根味甘寒無毒主潤五臟止消渴除煩去熱明目功用如麥門冬生江南川穀蔭地苗如萱草根似天門冬用去心甜藤味甘寒無毒去熱煩解毒調中氣令人肥健又主剝馬血毒入肉狂犬牛馬熱黃搗絞取汁和米粉作糗餌食之甜美止泄搗葉汁敷蛇咬瘡生江南山林下蔓如葛又有小葉尖長氣辛臭搗敷小兒腹除痞滿閃癖孟娘菜味苦小溫無毒主婦人腹中血結羸瘦男子陰囊濕癢強陽道令人健行不睡補虛去痔瘻瘰癧癭瘤作菜生四明諸山冬夏常有葉似升麻方莖山人取之為菜一名孟母菜一名厄菜吉祥草味甘溫無毒主明目強記補心力生西國胡人將來也地衣草味苦平無毒主明目崔知悌方云服之令人目明地上衣如草生濕處是郎耶草味苦平無毒主赤白久痢小兒大腹痞滿丹毒寒熱取根莖服煮之生山澤間三四尺葉作雁齒如鬼針苗地楊梅味辛平無毒主赤白痢取莖子煎服生江東溫濕地四五月有子似楊梅苗如蓑草也茅膏菜味甘平無毒主赤白久痢煮服之草高一尺生茅中葉有毛如油膩黏人手子作角中有小子也鏨菜味辛平無毒主破血産後腹痛煮汁服之亦搗碎敷疔瘡生江南國蔭地似益母方莖對節白花花中甜搗敷蛇咬瘡生高原如小蒜而長産後作羹食之良益奶草味苦平無毒主五野雞病脫肛止血炙令香浸酒服之生永嘉山谷葉如澤蘭莖赤高二三尺也蜀胡爛味辛平無毒主冷氣心腹脹滿補腎除婦人血氣下痢殺牙齒蟲生安南似蘹香子雞腳草味苦平無毒主赤白久痢成疳生澤畔赤莖對葉如百合苗難火蘭味酸溫無毒主冷氣風痹開胃下食去腹脹久服明目生巴西胡國似菟絲子長少許蓼蕎味辛溫無毒主霍亂腹冷脹滿冷氣攻擊腹內不調産後血攻胸脅刺痛煮服之亦食其苗如蔥韭也石薺寧味辛溫無毒主風冷氣並瘡疥瘙野雞漏下血煮汁服生山石上紫花細葉高一二尺山人並用之藍藤根味辛溫無毒上氣冷嗽煮服之生新羅國根如細辛七仙草主杖瘡搗杖葉敷之王山足葉尖細長甘家白藥味苦大寒小有毒主解諸藥毒與陳家白藥功用相似人吐毒物疑不穩水研服之即當吐之未盡又服此二藥性冷與霍亂下痢相反出龔州以南甘家亦因人為號葉似車前生陰處根形如半夏嶺南多毒物亦多解物豈天資乎汁飲之如蜜天竺乾薑味辛溫無毒主冷氣宿中宿食不消腹脹下痢腰背疼痃癖氣塊惡血積聚生婆羅門國似薑小黃一名胡乾薑池德勒味辛溫無毒主破冷氣消食生西國草根也胡國人用之
