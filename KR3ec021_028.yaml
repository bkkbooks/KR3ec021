body:
  text: 卷之二十七禽部中品羽蟲雀卵無毒附腦頭血屎雀卵主下氣男子陰痿不起強之令熱多精有子腦平主耳聾頭血主雀盲雄雀屎溫療目痛決癰癤女子帶下溺不利除疝瘕名醫所錄名青丹白丁香並雄雀糞也雀蘇黃口小雀糞也地圖經曰舊本不著所出州土今處處有之謹按埤雅雲雀頭如顆蒜目如擘椒物之至淫者也頭紫頷嘴黑色腮白身尾蒼褐有黑斑相雜其聲嘖嘖不息其行輕捷跳躍不定蓋其性屬陽故也正謂凡動屬火所以功用能助陰道而益陽也時生春夏採五月取卵冬月取肉臘月取屎用卵及頭血雄雀屎腦色蒼褐有斑味酸性溫收氣氣厚於味陽也臭腥主益精強陰制雷公云雀蘇凡使勿用雀兒糞其雀兒口黃未經淫者糞是蘇若底作尖在上者是雄兩頭圓者是雌陰人使雄陽人使雌凡採之先去兩畔有附子生者勿用然後於缽中研如粉煎甘草湯浸一宿傾上清甘草水盡焙乾任用治療陶隱居云頭血治黃昏目無所見謂之雀盲雄雀屎治齲齒痛有蟲以綿裹塞孔中日二三易之日華子云肉縮小便治血崩帶下孟詵云腦塗凍瘡別錄云雄雀糞治咽喉閉塞口噤細研每服半錢匕溫水調下及治諸癰不消已成膿者取塗頭上即破又治小兒中風口噤食乳不下以雀屎白水丸如麻子大服二丸即愈補唐本注云肉起陽道食之令人有子日華子云肉益氣暖腰膝孟詵云肉十月以後正月以前食之續五臟不足助陰道益精髓合治卵白合天雄菟絲子末為丸空心酒下五丸治男子陰痿不足女子帶下便溺不利除疝瘕決癰腫續五臟氣屎合首生男兒乳研如薄泥點目中胬肉赤脈貫瞳子者即消合蜜和為丸飲服之治癥瘕久痢冷病或和少乾薑服之大肥悅人臘月收雀屎合乾薑桂心艾等為丸治痃癖諸塊伏梁入腹能爛痃癖患癰腫若不潰以一丸敷之立決及治急黃欲死以二丸細研水溫服之白丁香半兩搗羅為末每服一錢匕合溫酒不拘時調下治婦人吹奶忌雀肉不可與李子同食又妊婦合醬食之令子面上多生斑䵟同酒食之令子心淫亂燕屎有小毒燕屎主蠱毒鬼疰逐不祥邪氣破五癃利小便神農本經名燕鳦玄鳥地圖經曰生高山平谷今處處有之陶隱居云燕有兩種有胡有越紫胸輕小者是越燕不入藥用胸斑黑聲大者是胡燕俗呼為夏侯者是也其作窠喜長人言有容一疋絹者令家富窠亦入藥用與屎同惟抱子處者為佳別錄云一種石燕暖無毒在乳穴石洞中冬月採之堪食余不中食只可治病也時採三月至八月取屎用屎窠味辛性平氣氣之薄者陽中之陰臭臭治療陶隱居云胡燕窠與屎作湯浴小兒驚邪唐本注云胡燕卵治水腫肉出痔蟲越燕屎療痔殺蟲去目翳日華子云石燕縮小便御風寒嵐瘴瘟疫氣別錄云胡燕卵中黃頓吞十枚治卒大腹水病胡燕窠中土水和敷卒得浸淫瘡有汁多發於心不早療周匝身則殺人燕屎末以冷水服五錢匕治石淋旦服至食時當尿石出燕糞一合以水漿二升相和灌之治牛非時吃著雜蟲腹脹滿者補日華子云石燕壯陽暖腰膝添精補髓益氣潤皮膚合治燕屎取方寸匕合酒一升調令患人兩手捧碗當鼻下承取氣治瘧疾慎勿入口毒人取屎三合熬令香合獨頭蒜十枚去皮和搗為丸如桐子大每服三丸治蠱毒當隨利下而出燕窠中土合豬脂苦酒和敷蠼螋尿瘡不速治繞身匝即死禁燕肉不可食亦不宜殺之伏翼無毒伏翼出神農本經主目瞑癢痛明目夜視有精光久服令人喜樂媚好無憂以上朱字神農本經療淋利水道以上黑字名醫所錄名蝙蝠天鼠仙鼠地圖經曰伏翼蝙蝠也出泰山川穀及人家房屋間亦有之蘇恭謂之仙鼠者在山孔中食諸乳石精汁皆千歲頭上有冠純白大如鳩鵲食之令人肥健長年其大如鶉未白者皆已百歲而並倒懸蓋倒懸者腦重故耳其石乳中者即仙經所謂肉芝是也其屎皆白即下條天鼠屎也然今蝙蝠多生屋中白而大者蓋稀有屎亦少白色者料其出乳石處山中生者當應如此爾衍義曰伏翼白日亦能飛但畏鷙鳥不敢出此物善服氣故能壽冬月不食亦可驗也時生無時採立夏後取收陰乾用倒懸者佳質類鼠而有翅色灰黑味咸性平氣氣之薄者陽中之陰臭腥主清眼目利水道助莧實雲實為之使制雷公云凡仙鼠重一斤者方採之每修事先拭去肉上毛去爪腸留翅並肉腳及嘴然後用酒浸一宿漉出取黃精自然汁塗之炙令乾方用每修事重一斤一個用黃精自然汁五兩為度治療唐本注云天鼠十一月十二月取治女人生子余疾帶下腦主女子面靤服之令人不忘其血滴目中令人不睡夜中見物藥性論云肉治五淋日華子云肉久服解愁合治五月五日取伏翼倒懸者曬乾和桂薰陸香為末燒之去蚊蟲伏翼燒為灰細研合粥飲調下半錢日四五服治小兒生十餘月後母又妊令兒精神不爽身體萎瘁名為魃病炙令香熟嚼之哺兒亦效又除翅足燒令焦末合米飲服之治咳嗽上氣諸藥無效久不瘥者禁非倒懸者不可服天鼠屎無毒天鼠屎出神農本經主面癰腫皮膚洗洗時痛腹中血氣破寒熱積聚除驚悸以上朱字神農本經去面黑䵟以上黑字名醫所錄名石肝夜明沙鼠法地圖經曰出合浦山谷其屎皆白如大鼠屎入藥當用此也今生古屋中者其屎少有白色恐出山谷中如此又按唐本注云天鼠屎即伏翼屎也伏翼條下不用屎是此明矣時採十月十二月取用屎味辛性寒散氣氣之薄者陽中之陰臭臭主破積聚去面皯反惡白蘞白薇制燒灰入藥生亦可用治療日華子云夜明沙炒服治瘰癧合治天鼠屎燒為灰合酒服方寸匕主子死腹中夜明沙搗為末每服一大錢合冷茶調下治五瘧立效仙鼠屎三兩枚細研以熱酒一升投之取其清酒服治馬撲損痛不可忍者不過二三次即瘥夜明沙為散任意拌飯並吃食中食之治一歲至二歲小兒無辜二歲號干無辜鷹屎白有小毒鷹屎白主傷撻滅瘢名醫所錄謹按鷹之為物其目如電其嘴如鉤劍翎鐵爪勢力勇健有降伏百鳥之威乃羽蟲中猛烈者也故取以辟邪魅其搏啖快利所以食哽之疾用之乃物類之相制此哲人格致之理斯可見矣名鷹條時採無時用頭嘴爪肉屎目睛色白性平微寒氣氣之薄者陽中之陰臭臭主中惡治療陳藏器云肉食之主邪魅野狐魅嘴及爪主五痔狐魅燒為末服之別錄云治食哽以鷹屎燒末服方寸匕虎狼雕屎亦得合治頭燒灰合米飲服之主五痔眼睛合乳汁研之夜三注眼中三日見碧霄中物忌菸熏黃鷹屎白一錢合密陀僧一兩舶上硫黃一分丁香二十一個為末每服一字治小兒奶癖三歲以上半錢用乳汁或白麵湯調下並不轉瀉一伏時取下青黑物後服補藥酸石榴皮半兩炙黑色蛜𧌴一分木香一分麝香半錢同為末每服一字溫薄酒調下並吃二服凡小兒脅下硬如有物乃是癖氣俗謂之奶脾只服溫脾化積氣丸藥不可取瀉無不愈也取之多失鷹屎白獨用不能滅瘢須合諸藥殭蠶衣魚之屬為膏則有驗也雉無毒日華子云有小毒附白鷳卵生雉肉主補中益氣力止泄痢除蟻瘻名醫所錄名山雞翟山雉野雞地圖經曰本經不載所出州土今南北皆有之類家雞而尾長頂具朱冠羽分五彩周禮庖人供六禽而雉居其一亦食品之貴者爾雅所載雉名尤多今人鮮能盡識江淮伊洛間一種尾長而小者為山雞人多畜之樊中所謂翟山雉也江南又一種毛白而背有細黑文名曰白鷳亦堪畜養彼人食其肉亦雉之類其餘不復用也衍義曰其飛若矢一往而墮故今人取其尾置船車上意欲取其快速之義也時生冬夏採秋冬取用肉質類家雞尾長而有五色味酸性微寒氣味厚於氣陰也治療唐本注云肉治諸瘻瘡別錄云主五臟氣喘不得息者效作餛飩食治產後下痢腰腹痛合治和鹽豉作羹食之治消渴飲水無度小便多口乾渴野雞一隻如食法細切合橘皮椒蔥鹽醬調和作餛飩煮熟空心食之治脾胃氣虛下痢日夜不止腸滑不下食禁九月至十一月食之即有補他月有毒食之發五痔及諸瘡疥自死足爪不伸者食之殺人忌不可與胡桃菌蕈木耳豉之類同食令人發頭風及心痛亦發痔疾立下血與蕎麥麵同食生肥蟲卵與蔥同食生寸白蟲八種陳藏器余蒿雀味甘溫無毒食之益陽道取其腦塗凍瘡手足不皸似雀青黑在蒿間塞外彌多食之美於諸雀塞北突厥雀如雀身赤從北來當有賊下邊人候之食其肉極熱補益人也鶡雞味甘無毒食肉令人勇健出上黨魏武帝賦云鶡雞猛氣其鬥終無負期於必死今人以鶡曷渴二音為冠像此也山菌子味甘平無毒主野雞病殺蟲煮炙食之生江東山林間如小雞無尾百舌鳥主蟲咬炙食之亦主小兒久不語又取其窠及糞塗蟲咬處今之鶯一名反舌也黃褐侯味甘平無毒主蟻瘻惡瘡五味淹炙食之極美如鳩作綠褐色聲如小兒吹竽鷩雉主火災天竺法真登羅山疏雲山海經曰鷩雉養之穰火災如雉五色鳥目無毒生吞之令人見諸魅或以目睛研注目中夜見鬼也肉及卵食之令人昏忘毛把之亦然未必昏為其臭膻鸊扶歷反鷉天黎反膏主耳聾滴耳中又主刀劍令不鏽以膏塗之水鳥也如鳩鴨腳連尾不能陸行常在水中人至即沉或擊之便起爾雅云膏主堪瑩劍續英華詩云馬銜苜蓿葉劍瑩鸊鷉膏是也
