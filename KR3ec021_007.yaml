body:
  text: 卷之六玉石部下品之下石之金自然銅石生自然銅主療折傷散血止痛破積聚名醫所録名石髓鉛地圖經曰生雍州山岩中出銅處今信州火山軍皆有之於銅坑中及石間採之方圓不定其色青黃如銅不從礦煉故號自然銅今信州出一種如亂銅絲狀云在銅礦中山氣熏蒸自然流出亦若生銀如老翁須之類入藥最好火山軍者顆塊如銅而堅重如石醫家謂之缿石用之力薄今南方醫者説自然銅有兩三體一體大如麻黍或多方解纍纍相綴至如斗大者色煌煌明爛如黃金䃋石最上一體成塊大小不定亦光明而赤一體如薑鐵屎之類又有如不冶而成者形大小不定皆出銅坑中擊之易碎有黃赤有青黑者煉之乃成銅據如此説雖分析頗精而未見似亂絲者又云今市人多以銗石為自然銅燒之皆成青焰如硫黃者是也此亦有二三種一種有殼如禹餘糧擊破其中光明如鑑色黃類䃋石也一種青黃而有牆壁或文如束針一種碎理如摶砂者皆光明如銅色多青白而赤少者燒之皆成煙焰頃刻都盡今醫家多誤以此為自然銅市中所貨往往是此自然銅用多須鍛此乃畏火不必形色只此可辨也雷公云石髓鉛即自然銅也凡使勿用方金牙其方金牙真似石髓鉛若誤餌吐殺人其石髓鉛色似干銀泥別録云自然銅出信州鉛山縣銀場銅坑中深處有銅礦多年礦氣結成似馬氣勃色紫重食之苦澀是真自然銅今人只以大裛石為自然銅誤也別説云今辰州川澤中出一種形圓似蛇含大者如胡桃小者如栗外有皮黑色光潤破之與銗石無別但比銗石不作臭氣耳入藥用之殊驗時生無時質類方金牙色青黃味辛性平氣氣之薄者陽中之陰臭腥主筋骨折傷制雷公云如採得先捶碎同甘草湯煮一伏時至明漉出攤令乾入臼中搗了重篩過以醋浸一宿至明用泥六兩鹽一兩令勻名為六一泥固封瓷合子約盛二升已來於文武火中養三日夜才幹便用蓋蓋了泥固火鍛兩伏時去土抉蓋研如粉用若修事五兩以醋兩鎰為度治療日華子云排膿消瘀血續筋骨合治合酒摩服治産後血邪安心止驚悸研極細末水飛過合當歸沒藥各五分酒調頓服療打撲損服藥後仍以手摩痛處贋方金牙及大裛石為偽誤服吐殺人銗石燒之有臭氣亦為偽石之石金牙無毒石生金牙主鬼疰毒蠱諸疰名醫所録地圖經曰生蜀郡今雍州亦有之此物出於溪谷在蜀漢江岸石間打出者內即金色岸摧入水年久者多黑葛仙翁有大小金牙酒孫真人有大小金牙散用者是也又有銅牙亦相似而外黑色方書少見用者唐本注云金牙離本處入土水中久皆色黑不可謂之銅牙也此出漢中金牙湍湍兩岸入石間打出者內即金色岸摧入水久者皆黑近南山溪谷茂州維州亦有勝於漢中者衍義曰金牙今方家絶可用以此故商客無利不販賣醫者由是委而不用兼所出惟蜀郡有之蓋亦不廣也時生無時用金色者佳色赤味咸性軟氣味厚於氣陰也臭朽主舒筋骨暖腰膝合治燒赤合酒浸服之治一切風筋骨攣急腰腳不遂者並良燒赤淬酒去粗滓溫飲之治一切冷風氣暖腰膝補水臟除驚悸及小兒驚癇以四兩搗末別盛練囊合細辛地膚子莽草乾地黃蒴藋根防風附子茵芋續斷蜀椒各四兩獨活一斤十一物皆薄切並金牙共內大絹囊中以清酒四斗漬之密泥器口四宿酒成矣溫服二合日三漸增之療風疰百病虛勞濕冷緩痹不仁不能行步用之多效銅礦石有小毒石生銅礦石主疔腫惡瘡驢馬脊瘡臭腋石上水磨取汁塗之其疔腫末之敷瘡上良名醫所録地別録云此石出蜀郡銅礦中夾土石而生狀如薑石而有銅星熔取銅者是也時生無時用有銅星者佳色黃赤味酸性寒氣味厚於氣陰也臭腥主瘡腫制磨汁或研細用石之金銅弩牙微毒銅弩牙主婦人産難血閉月水不通陰陽膈塞名醫所録地陶隱居云即今之所用射者是也取燒赤內酒中飲汁得古者彌勝按南越志云唐時龍川嘗有銅弩牙流出水皆銀黃雕鏤取以制弩用年久者良色黃性平氣氣之薄者陽中之陰治療別録云療小兒吞珠璫錢而哽銅弩牙燒令赤內水中冷飲其汁立出合治銅弩牙燒赤投醋三合良久頓服令妊娠易産又燒赤內酒中飲之療誤吞銅鐵而哽者立愈石之石金星石無毒附銀星石土生金星石主脾肺壅毒及主肺損吐血嗽血下熱涎解衆毒又有銀星石主療與金星石大體相似名醫所録地圖經曰生並州濠州又有一種銀星石然其色不同而體性亦相似也衍義曰金星石於蒼石內外有金色麩片銀星石有如銀色麩片又一種深青色堅潤中有金色如麩片不入藥工人碾為器或首飾多用之時採無時用蒼色有金星者為佳色蒼味淡性寒氣氣之薄者陽中之陰臭朽主清肺熱止吐血制火鍛研細水飛用治療衍義曰去大風疾解諸毒特生礜石有毒特生礜石主明目利耳腹內絶寒破堅結及鼠瘻殺百蟲惡獸久服延年名醫所録名蒼礜石鼠毒地圖經曰生西域及梁州陶隱居云舊鸛巢中者最佳鸛常入水冷故取以壅卵令熱今不可得惟用出漢中者其外形紫赤色內白如霜中央有臼形狀如齒者佳大散方云又出荊州新城郡房陵縣縹白色為好用之亦先以黃土包燒之合玉壺諸丸用此仙經不云特生則止是前白礜石耳唐本注云陶所説特生雲中如齒臼形者是今出梁州北馬道戍澗中亦有之形塊大於白礜石而肌粒大數倍乃如小豆許白礜石粒細若粟米耳衍義曰特生礜石並礜石博物志及陶隱居皆言此二石鸛取以壅卵如此則是一物也隱居又言仙經不云特生則止是前白礜石今補注但隨文解義不見特生之意蓋二條止是一物但以特生不特生為異耳所謂特生者不附著他石為特耳今用者絶少惟兩字礜石入藥然極須慎用其毒至甚及言鸛巢中者恐為謬説況鸛巢中皆無此石乃曰鸛常入水冷故取以壅卵如此鸕鷀雁鶩之類皆食於水亦自繁息生化復不用此亦不必泥於鸛巢中者也時採無時用獨生不附石者良色外紫赤內白味甘性溫緩氣氣之厚者陽也臭臭反畏水制火煉用握雪礜石無毒石生握雪礜石主痼冷積聚輕身延年多食令人熱名醫所録名化公石地圖經曰出徐州西宋里山入土丈餘於爛土石間黃白色細軟如面一名化公石又名石腦考之中品自有石腦一條但所産雖同而主療甚別似乎重出於此正如徐長卿一名鬼督郵之類也時採無時用細軟如面者佳色黃白味甘性溫緩氣氣之薄者陽也臭朽主冷疾制研細用梁上塵無毒梁上塵主腹痛噎中惡鼻衄小兒軟瘡名醫所録地處處梁上皆有之時採無時用遠去煙火者佳色黑性平微寒氣氣之薄陽中之陰臭朽主止衄制雷公云凡使須去煙火遠者高堂殿上拂下篩用之治療別録云小便不通及胞轉者取梁上塵三指撮以水服之瘥及自縊死者用梁上塵如大斗許各內一筒中四人各一筒同時極力吹兩耳鼻即活合治合醋和塗妒乳亦治陰腫合灶突煤二味酒服方寸匕療婦人日月未足而欲産合葵莖等分醋和敷癰腫合酒服方寸匕療橫生不可出及倒産合油瓶中滓療小兒頭瘡先以皂莢湯洗淨塗之瘥石之土土陰孽無毒土生土陰孽主婦人陰蝕大熱干痂名醫所録地圖經曰生高山崖上之陰色白如脂陶隱居云此猶似鍾乳孔公孽之類故亦有孽名但在崖上耳唐本注云此即土乳是也出渭州鄣縣三交驛西北坡平地土窟中見有六十餘坎是昔人所採之處土人云服之亦同鍾乳而不發熱陶及本經俱云在崖上此説非也今渭州不復採用別本注云此則土脂液也生於土穴狀如殷孽故名土陰孽也時採無時用如脂白者為好質狀如殷孽色白味咸性軟氣味厚於氣陰也臭朽制研細用鍛灶灰無毒附灶突墨灶中熱灰鍛灶灰主癥瘕堅積去邪惡氣名醫所録地陶隱居云此即鍛鐵灶中灰耳兼得鐵力治疾多獲其效今處處有之色黑臭朽主消堅積制碾細用治療陶隱居云除暴症大有效陳藏器云灶突後黑土主産後胞衣不下為末以三指撮暖水及酒服之天未明時取至驗也合治灶中熱灰合醋尉心腹冷氣痛及血氣絞痛冷即易之淋石無毒淋石主石淋水磨服之當得碎石隨溺出名醫所録謹按淋石乃患石淋之人溺中出者非他物也蓋人下部鬱結濕熱積久不散移入膀胱煎熬日漬輕則凝如脂膏甚則結如砂石即若烹器煎熬日久遂成湯鹼之義候出時收之仍服以治淋正謂物各從其類也收瓷器貯之色白味咸性溫氣氣厚於味陽中之陰臭臊主噎病吐食制水磨服之石之石礞石礞石主食積不消留滯在臟腑宿食症塊久不瘥及小兒食積羸瘦婦人積年食症攻刺心腹名醫所録名青礞石地謹按舊本不載所出州郡今齊魯山中有之青色微有金星其質堅理細鑿製為磨取其出物最速為末亦細及考王隱君論痰致病百端入滾痰丸用之丹溪治食積成痰良有驗也時採無時用微有金星質堅色青者為佳質類玄石而有星色青臭朽主墜痰消食助得硇砂巴豆大黃京三稜等良制每二兩捶碎用焰硝二兩同入小砂罐內瓦片蓋定鐵線縛之鹽泥固濟曬乾火煅紅上有金星透出為度候冷研為極細末石之土薑石無毒附粗理黃石水中圓石土石生薑石主熱豌豆瘡疔毒等腫名醫所録地圖經曰生土石間齊州歷城東者良所在亦有今惟出齊州其狀如薑有五種凡用以白爛而不磣插荏切者好又有粗理黃石水中圓石多主癰疽瘡腫然皆各有其效故並附之衍義曰薑石所在皆有須不見日色旋取微白者佳時採無時用爛而不磣者佳色白味咸性寒軟氣味厚於氣陰也臭朽主疔腫癰疽制研細用治療別録云水中圓石治背上忽腫漸如碟子大不識名者以一兩碗燒令極熱投入清水中沸定後洗腫處立瘥合治白薑石末合雞子清敷疔腫其疔自出乳癰塗之亦善粗理黃石如鵝卵大猛烈火燒令赤頻淬釅醋中待淬石至盡取屑曝乾搗篩和醋塗療背瘡立愈石之石麥飯石麥飯石治發背諸般癰疽神效名醫所録地圖經曰其石粗黃白類麥飯曾作磨磑者尤佳抑考陳自明云麥飯石不可作磨古云作磨者尤佳恐惑人矣蓋因其石狀如飯糰生粒點耳若無此石當以舊面磨近齒處石代之取其有麥性故也屢試得效此石鋪家有時亦無賣者如欲用之但於溪中尋麻石中有白石肌粒如豆煅米大者即是也但其石大小不同或如拳或如鵝卵或如盞大者大略如握聚一團麥飯耳時採無時質類麥飯糰色黃白臭朽制不限多少用炭火煅至紅以好釅米醋淬之如此煅淬十次卻碾為末重羅去粗者取細末入乳鉢內用數人更迭研五七日要如面樣極細為妙若不細塗瘡極痛難忍合治煅成細末二兩合生取鹿角一具連腦骨全者截作二三寸長用炭火燒令煙盡為度碾羅為末再入乳鉢研令極細四兩並白蘞末二兩三物同和用三年好米醋入銀石器中煎令魚眼沸卻旋旋入前藥末在內用竹篦子不住手攪熬一二時久令稀稠得所取出傾在瓷盆內候冷以紙蓋其上勿令著塵埃每用時先用豬蹄湯洗去癰瘡上膿血至淨以故帛挹干以鵝翎蘸藥膏塗敷四圍凡有赤處盡塗之但留中心一孔如錢大以出膿血使熱毒之氣隨出如膿未潰能令內消如已潰則排膿如湍水逐日見瘡口收斂如患瘡久肌肉腐爛筋骨出露用舊布片塗藥以貼瘡上但膈膜不穴亦能取安洗瘡勿以手觸動嫩肉仍不可以口氣吹著瘡更忌有腋氣之人及月經見行婦人或有孕者合藥時亦忌之代如無此石取舊面磨近齒處石代之井泉石無毒土生井泉石主諸熱治眼腫痛解心臟熱結消去腫毒及療小兒熱疳雀目青肓名醫所録地圖經曰生深州城西二十里劇家村地泉深一丈許其石如土色圓方長短大小不等內實外圓作層重疊相交者一種出饒陽郡者為勝生田野間穿地深丈餘得之又有一種如薑石時人多指以為井泉者非也時採無時用重疊作層者佳色青黑性大寒氣氣之薄者陽中之陰臭朽主療諸熱毒制研細如粉水飛過用合治合大黃梔子治眼臉腫合決膽菊花療小兒眼疳生翳膜甚良亦治熱嗽禁制不如法使人患淋蒼石有毒石生蒼石主寒熱下氣瘻蝕殺禽獸名醫所録地圖經曰生西域唐本注云特生礜石一名蒼礜石而梁州特生亦有青者今房陵漢川與白礜石同處有色青者並毒殺禽獸與礜石同漢中人亦取以毒鼠不入方用此石出梁州均州房州與二礜石同處特生蒼石並生西域在漢川金州也時採無時色蒼味甘性平緩氣氣厚於味陽中之陰臭朽花乳石花乳石主金瘡止血又療産婦血暈惡血名醫所録名花蕊石地圖經曰出陝華諸郡其閿鄉縣者體至堅重色如硫黃形塊有大小方圓無定陝人用琢為器古方未有用者衍義曰於黃石中間有淡白點以此得花之名今惠民局花乳石散用者是此也時採無時質類硫黃有淡白點而堅重色黃白臭朽主産婦血暈制火煅通赤碾細用治療圖經曰人倉卒中金刃刮取石上細末敷之效合治合硫黃同鍛研末敷金瘡其效如神石蠶無毒藥訣云有毒水石生石蠶主金瘡止血生肌破石淋血結摩服之當下碎石名醫所録地圖經曰生海岸石傍狀如蠶其實石也時採無時質類殭蠶色青白味苦性熱氣氣厚於味陽中之陰臭朽主石淋金瘡制研細或摩用之石之水石腦油石生石腦油主小兒驚風化涎可和諸藥作丸服道家多用俗方亦不甚須名醫所録衍義曰石腦油真者難收多滲蝕器物今入藥最少燒煉或須也仍常用有油去聲器貯之又研生砒霜入石腦油再研如膏入坩堝內用淨瓦片子蓋定置火上俟堝子紅泣盡油出之又再研再入油再上火凡如此兩次即砒霜伏矣時採無時收用瓷器密固之不可近金銀器雖至完密直爾透之色黑主祛風化痰石之土白瓷瓦屑無毒白瓷瓦屑主婦人帶下白崩止嘔吐破血止血水摩塗瘡滅瘢名醫所録地圖經曰定州瓷器者良余皆不如也色白性平氣氣之薄者陽中之陰臭朽制搗為末或水摩用治療別録云搗為細末每抄一剜耳許吹入鼻中治鼻衄久不止合治合豬脂和塗療人面卒得赤黑丹如疥狀不急治發遍身即死如白丹者用之良烏古瓦無毒烏古瓦以水煮及漬汁飲止消渴名醫所録地圖經曰處處有之以屋上年深者良色黑性寒氣氣之薄者陽中之陰臭朽制水煮或漬汁用治療藥性論云煎湯解人中大熱日華子云煎汁服之止小便陳藏器云燙火傷當取土底深者既古且潤三角瓦子灸牙痛法令三姓童子候星初出時指第一星下火三角瓦上灸之石之木不灰木不灰木主熱痱瘡和棗葉石灰為粉敷身名醫所録名無灰木地圖經曰出上黨今澤潞山中皆有之蓋石類也其色青白如爛木燒之不然以此得名或云滑石根也出滑石處皆有之亦名無灰木今處州山中出一種松石如松干而實石也或云松久化為石人家多取以飾山亭及琢為枕雖不入藥然與不灰木相類故附之時採無時質類爛木色青白味淡性大寒氣氣味俱薄陰也臭朽主敷熱瘡制陳藏器云細研入藥用要燒成灰即斫破以牛乳煮了用黃牛糞燒之便成灰也石之水蓬砂無毒土生蓬砂主消痰止嗽破癥結喉痹及焊金銀用名醫所録名鵬砂地圖經曰出於南海其狀甚光瑩亦有極大塊者今醫家治咽喉最為切要之藥也衍義曰南番者色重褐其味和其效速西戎者其色白其味焦其功緩亦不堪作焊時採無時收瓷器盛貯用光瑩色褐者佳色白褐味苦辛性溫泄氣氣厚味薄陽中之陰臭腥主喉閉制研細用治療衍義曰蓬砂含化咽津治喉中腫痛膈上痰熱初覺便用不成喉痹亦緩取效可也金之土鉛霜無毒鉛霜主消痰止驚悸解酒毒療胸膈煩悶中風痰實止渴名醫所録地圖經曰用蜀郡平澤鉛十五兩符陵平土水銀一兩合煉作片置醋甕中密封經久成霜謂之鉛白霜今醫家多用之衍義曰取塗木瓜以失酸味蓋金剋木之義也用霜色白性冷氣氣之薄者陽中之陰臭朽主止驚悸去風痰制研細用治療圖經曰消風痰及鎮驚衍義曰涼膈熱涎塞別録云為末新汲水調一字服之止鼻衄合治細研一錢合溫生地黃汁一合調下治室女月經滯澀心煩恍惚或生地黃煎湯調服亦得解酒毒石之金古文錢有毒古文錢主翳障明目療風赤眼鹽滷浸用婦人橫逆産心腹痛月隔五淋燒以醋淬用名醫所録地圖經曰凡鑄銅之物多和以錫考工記曰攻金之工金有六齊是也如藥用銅弩牙之類皆以有錫故其用亦近之衍義曰古銅焦赤治諸疾者非特為有錫也此説非是今但取景王時大泉五十及寶貨秦半兩漢莢錢大小五銖吳大泉五百大泉當千宋四銖二銖及梁四柱北齊常平五銖耳後其品尚多如此之類方可用也用古者良色青性平氣氣之薄者陽中之陰臭腥治療陳藏器云青錢煮汁主五淋磨入目治盲障膚赤比輪錢以新汲水投服之療時氣含青錢治口內熱瘡衍義曰少時常自患暴赤目腫痛數日不能開客有教以生薑一塊洗淨去皮以古青銅錢刮取薑汁就錢稜上點初甚苦熱淚蔑面然終無損後有患者教如此點往往疑惑信士點之無不獲驗一點遂愈更不再作有瘡者不可用合治合薏苡根煮服療心腹痛以二十文燒赤投酒中服之利婦人橫産石之石蛇黃無毒蛇黃主心痛疰忤石淋産難小兒驚癇以水煮研服汁名醫所録地圖經曰出嶺南今越州信州亦有之本經云是蛇腹中得之圓重如錫黃黑青雜色注云多赤色有吐出者野人或得之今醫家用者大如彈丸堅如石外黃內黑色云是蛇冬蟄時所含土到春發蟄吐之而去與舊説不同未知孰是時採二月取質類彈丸色黃黑青雜色或赤性冷制日華子云如入藥燒赤三四次醋淬研細飛過用治療日華子云鎮心東流水無毒東流水及千里水主病後虛弱二者皆堪蕩滌邪穢名醫所録謹按水自崑崙發源由江河淮濟而注於海所謂江漢朝宗是也然人病後虛弱而氣不能健運者必用東流水及千里水也蓋千里水不泥於東流者但取其活水耳其東流水必取其向東流者也然水有二功用則一揚之萬遍以煮藥則藥假其力以運行而元氣生生不息矣抑考陳藏器雲水本為一物皆堪蕩滌邪穢煎煮湯藥禁咒鬼神潢汙行潦尚可薦羞王公況其靈長者哉蓋取其潔誠也本經云東流水為雲母所畏煉雲母用之與諸水不同即其驗也故衍義取其快順疾速通關下膈之義乃因其性而用也時採無時用東流揚過者佳色白味甘性平寒氣氣之薄者陽中之陰甘爛水無毒甘爛水主霍亂及入膀胱治奔豚藥用殊勝名醫所録地湯液本草云揚之水上成珠是也外臺祕要作甘爛水法以木盆盛湯杓揚千百次泡起作珠千百顆撇取之謹按仲景治奔豚之藥用甘爛水煎以杓揚之而緩其本然之性故曰甘也水上有珠數千顆相逐其光燦然故曰爛也蓋腎屬水恐水從類而助邪故揚之使其無力不能助矣經曰緩則氣味薄是也仲景用之深得軒岐之微旨時採無時用揚過作漚者佳色白味甘性微溫氣氣之薄者陽中之陰粉霜有小毒粉霜主急風口噤手足搐搦涎潮作聲止痢膿血消瘰癧今補謹按升粉霜之法用焰硝食鹽白礬皂礬各一斤入鐵鍋內炒熔成汁急以鐵鏟頻攪結成黃色砂子謂之粗曲內石臼中以鐵杵研令極細謂之細曲入水銀一斤研令不見微星為度是謂汞曲分作四分先以陽城罐長五六寸者用細炭灰一斤入鹽六兩水和得所留罐口二分許周匝固濟曬乾內汞曲一分於內上用鐵燈盞深一二寸者蓋之下用鐵鉡上用鐵線將燈盞與鉡纏束極緊外用鹽十兩白炭灰十六兩水和為泥捏作餅子燒通紅待冷研為細末水調得所用小竹籤細細將罐口封固約一指厚盞罐相平曬極乾用大鐵釘三個釘在地下高三四寸周圍離罐二寸用磚數個圍成爐煤用四斤炭用二斤火候之法先文後武煤炭陸續旋添上勿近盞待盞熱時徐徐添極熱水止可九分滿水少即添常令水足仍以沿盞邊滾為度若滿盞通滾為火大火大則罐必烈慢慢滾起為火小火小則粉不升水上火下欲其相濟別點長線香以三炷為則至二炷香盡時火方漸漸近盞與盞相平至三炷香完即便去火莫動其罐待罐極冷時方可開罐罐底曲查不用盞下之霜用刀刮下其色尚未白至汞曲四分俱升畢時共研為細末通入一罐如前法再升一遍其色漸白再研為細末如前法再升一遍其霜堅白壯如寒水石一般方入藥用也一十五種陳藏器余好井水及土石間新出泉水味甘平無毒主霍亂煩悶嘔吐腹空轉筋恐入腹及多服之名曰洗腸人皆懼此嘗試有效不令腹空空則更服如遇力弱身冷則恐藏胃悉寒寒則不能支持當以意消息兼及當時橫量灸脊骨三五十壯令暖氣徹內補胃氣間不然則危又主消渴反胃熱痢淋小便赤澀兼洗漆瘡射癰腫令散久服調中下熱氣傷胃利大小便並多飲之令主喉少消下正月雨水夫妻各飲一杯還房當獲時有子神效也生熟湯味鹹無毒熱鹽投中飲之吐宿食毒惡物之氣臚脹欲為霍亂者覺腹內不穩即進一二升令吐得盡便愈亦主痰瘧皆須吐出痰及宿食調中消食又人大醉及食瓜果過度以生熟湯浸身湯皆為酒及瓜味博物志云浸至腰食瓜可五十枚至脛頸則無限未試屋漏水主洗犬咬瘡以水澆屋簷承取用之以水滴簷下令土濕取土以敷犬咬處瘡上中大有毒誤食必生惡疾三家洗碗水主惡瘡久不瘥者煎令沸以鹽投中洗之不過三五度立效蟹膏投漆中化為水仙人用和藥博物志亦載又蚯蚓破之去泥以鹽塗之化成水大主天行諸熱小兒熱病癇癲等疾新注云塗丹毒並敷漆瘡效豬槽中水無毒主諸蠱毒服一杯主蛇咬可浸瘡皆有效驗者矣市門衆人溺坑中水無毒主消渴重者取一小盞服之勿令病人知之三度瘥鹽膽水味鹹苦有大毒主𧈟蝕疥癬瘻蟲咬馬牛為蟲蝕毒蟲入肉生子毒六畜飲一合當時死人亦如之並鹽初熟槽中瀝黑汁也主瘡有血不可敷也水氣有毒能為風濕疼痹水腫面黃腹大初在皮膚腳手入漸至六腑令人大小便澀主五臟漸漸加至忽攻心便死急不旋踵無寬延歲月既是陰病復宜以陰物生類諸豬魚螺鱉之屬春夏秋宜瀉冬宜補藥尤宜浸酒中服之隨陰陽所行者昔馬援南征多載薏苡仁閔叔留寓常食豬肝蓋以為濕疾也江湖間霧氣成瘴兩山夾水中氣瘧一冷一熱相激成病症此三疾俱是濕為能與人作寒熱消鑠骨肉南土尤甚若欲醫療須細分析其大略皆瘴類也人多一概醫之則不瘥也冢井中水有毒人中之者立死欲入冢井者當先試之法以雞毛投井中毛直而下者無毒毛回旋而舞似不下者有毒以熱醋數斗投井穴中則可入矣凡冢井及灶中從夏至秋毒氣害人從冬至春則無毒氣凡秋露春水著草木亦能害人冬夏則無人素為物所傷並有諸瘡觸犯毒露及毒水覺瘡頑不癢痛當中風水所為身必反張似角弓主之法以鹽豉和麵作碗子蓋瘡上作大艾炷灸一百壯令抽惡水數升舉身覺癢瘡處知痛瘥也陰地流泉二月八月行途之間勿飲之令人夏發瘧瘴又損腳令軟五月六月勿飲澤中停水食著魚鱉精令人鱉瘕病也銅器蓋食器上汗滴食中令人發惡瘡內疽食性忌之也炊湯經宿洗面令人無顏色洗體令人成癬未經宿者洗面令人亦然諸水有毒水府龍宮不可觸犯水中亦有赤脈不可斷之井水沸不可食之以上並害人東晉溫嶠以物照水為神所怒楚詞云鱗房貝闕言河伯所居國語云季桓子穿井獲土缶仲尼曰水之怪魍魎土之怪羵羊水有脈及沸並見白澤圖
